cross_domain_chains:

  pv_signal_mega_chain:
    description: "PRR signal → causality → action — the universal PV decision backbone"
    micrograms: ["prr-signal", "signal-to-causality", "naranjo-quick", "causality-to-action"]
    applies_to: ["accessdata.fda.gov", "vigiaccess.org", "www.ema.europa.eu"]
    key: "→"

  multi_method_consensus:
    description: "Four-method signal consensus — PRR + ROR + IC + EBGM → combined verdict"
    micrograms: ["prr-signal", "ror-signal", "ic-signal", "ebgm-signal", "multi-signal-combiner"]
    applies_to: ["accessdata.fda.gov", "www.ema.europa.eu", "vigiaccess.org"]
    key: "Σ"

  ich_e2a_seriousness_pipeline:
    description: "ICH E2A seriousness → deadline — drives reporting obligation"
    micrograms: ["case-seriousness", "report-deadline", "deadline-alert"]
    applies_to: ["dailymed.nlm.nih.gov", "clinicaltrials.gov", "www.ema.europa.eu"]
    key: "→ς"

  susar_full_chain:
    description: "Seriousness + expectedness + causality → SUSAR → expedited report"
    micrograms: ["case-seriousness", "expectedness-check", "susar-classifier", "causality-to-action"]
    applies_to: ["clinicaltrials.gov", "www.ema.europa.eu"]
    key: "∧→"

