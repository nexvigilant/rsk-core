        intermediate_note: No intermediate condition when 30°C/65% RH is the long-term condition
        long_term_frequency: Every 3 months over first year, every 6 months over second year, then annually
        accelerated_frequency: 0, 3, 6 months minimum
        long_term_min_duration_months: 12
        accelerated_min_duration_months: 6
        shelf_life_approach: extrapolate_from_long_term
        significant_change: false
        significant_change_criteria: 1) 5% change in assay or potency failure; 2) degradation product exceeding criterion; 3) appearance/physical/functionality failure; 4) pH criterion failure (dosage-form dependent); 5) dissolution failure for 12 units
        action: No significant change — propose shelf life from long-term data
    dp_general_30_65_sig_change:
      type: return
      value:
        guideline: ICH Q1A(R2) §2.2.7.1
        product_type: drug_product
        storage_type: general
        long_term_conditions: 30°C ± 2°C / 65% RH ± 5% RH
        accelerated_conditions: 40°C ± 2°C / 75% RH ± 5% RH
        intermediate_required: false
        intermediate_note: No intermediate condition when 30°C/65% RH is the long-term condition
        long_term_min_duration_months: 12
        accelerated_min_duration_months: 6
        shelf_life_approach: long_term_data_only
        significant_change: true
        significant_change_criteria: 1) 5% change in assay or potency failure; 2) degradation product exceeding criterion; 3) appearance/physical/functionality failure; 4) pH criterion failure (dosage-form dependent); 5) dissolution failure for 12 units
