name: ich-s7b-gate
description: "ICH S7B compliance: QT Assessment — Nonclinical"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "herg_tested"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH S7B"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH S7B"
        compliant: false
        action: "remediate"
        gap: "herg_tested"

tests:
  - input: {"herg_tested": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
