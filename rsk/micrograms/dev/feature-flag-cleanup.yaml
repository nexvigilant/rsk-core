# MICROGRAM++ (upgraded 2026-04-23)
name: feature-flag-cleanup
version: 0.1.0
description: "Development gate: feature-flag-cleanup"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: metric_value
    type: int
    required: false
    description: ""
  - name: threshold
    type: int
    required: false
    description: ""
outputs:
  - name: gate
    type: string
  - name: action
    type: string
interface:
  inputs:
    metric_value:
      type: int
      required: false
    threshold:
      type: int
      required: false
  outputs:
    gate:
      type: string
    action:
      type: string
ui:
  title: Feature Flag Cleanup
  subtitle: "Development gate: feature-flag-cleanup"
  icon: circle
  route: /vigilance/mg/feature-flag-cleanup
  steps:
    - field: metric_value
      label: metric value
      help: Enter metric_value
      widget: text
      placeholder: null
    - field: threshold
      label: threshold
      help: Enter threshold
      widget: text
      placeholder: null
  result:
    template: "gate: {{gate}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/feature-flag-cleanup
  cli: rsk mcg run feature-flag-cleanup
  auth: none
  rate_limit: 600/min
tree:
  start: check_pass
  nodes:
    check_pass:
      type: condition
      variable: metric_value
      operator: gte
      value: 80
      true_next: pass
      false_next: check_warn
    check_warn:
      type: condition
      variable: metric_value
      operator: gte
      value: 50
      true_next: warn
      false_next: check_block
    check_block:
      type: condition
      variable: metric_value
      operator: gte
      value: 20
      true_next: block
      false_next: critical
    pass:
      type: return
      value:
        gate: PASS
        action: proceed
    warn:
      type: return
      value:
        gate: WARN
        action: review_before_merge
    block:
      type: return
      value:
        gate: BLOCK
        action: fix_before_proceed
    critical:
      type: return
      value:
        gate: CRITICAL
        action: stop_and_investigate
tests:
  - input:
      metric_value: 90
      threshold: 80
    expect:
      gate: PASS
      action: proceed
  - input:
      metric_value: 60
      threshold: 80
    expect:
      gate: WARN
      action: review_before_merge
  - input:
      metric_value: 30
      threshold: 80
    expect:
      gate: BLOCK
      action: fix_before_proceed
  - input:
      metric_value: 5
      threshold: 80
    expect:
      gate: CRITICAL
      action: stop_and_investigate
  - input: {}
    expect:
      gate: CRITICAL
      action: stop_and_investigate
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - gate
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
