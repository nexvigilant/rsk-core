# MICROGRAM++ (upgraded 2026-04-23)
name: reporting-velocity-governor
version: 0.1.0
description: "Governor for RSK chain execution. Reads signal velocity (reporting rate) and outputs throttle decision: run_now, wait, or escalate. Prevents chain thrashing and detects Weber effect (reporting spikes)."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Reporting Velocity Governor
  subtitle: "Governor for RSK chain execution. Reads signal velocity (reporting rate) and outputs throttle decision: run_now, wait, or escalate. Prevents chain thrashing and detects Weber effect (reporting spikes)."
  icon: circle
  route: /vigilance/mg/reporting-velocity-governor
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/reporting-velocity-governor
  cli: rsk mcg run reporting-velocity-governor
  auth: none
  rate_limit: 600/min
tree:
  start: check_current_rate_null
  nodes:
    check_current_rate_null:
      type: condition
      variable: current_rate
      operator: is_null
      true_next: no_data_available
      false_next: check_spike_first
    check_spike_first:
      type: condition
      variable: current_rate
      operator: gt
      value: 500
      true_next: spike_check_baseline
      false_next: check_velocity
    spike_check_baseline:
      type: condition
      variable: baseline_rate
      operator: is_not_null
      true_next: spike_compute_ratio
      false_next: check_velocity
    spike_compute_ratio:
      type: condition
      variable: rate_ratio
      operator: gt
      value: 3
      true_next: spike_escalate
      false_next: check_velocity
    spike_escalate:
      type: return
      value:
        action: escalate
        reason: Reporting rate spike — possible Weber effect or safety event
        urgency: critical
        governor_state: throttle_escalated
    check_velocity:
      type: condition
      variable: signal_velocity
      operator: eq
      value: ACCELERATING
      true_next: accelerating_check_staleness
      false_next: check_stable
    accelerating_check_staleness:
      type: condition
      variable: hours_since_last_run
      operator: gt
      value: 6
      true_next: accelerating_stale
      false_next: accelerating_fresh
    accelerating_stale:
      type: return
      value:
        action: run_now
        reason: Signal accelerating and chain stale
        urgency: high
        governor_state: throttle_open
    accelerating_fresh:
      type: return
      value:
        action: wait
        reason: Signal accelerating but chain is fresh
        urgency: low
        governor_state: throttle_closed
    check_stable:
      type: condition
      variable: signal_velocity
      operator: eq
      value: STABLE
      true_next: stable_check_staleness
      false_next: check_decelerating
    stable_check_staleness:
      type: condition
      variable: hours_since_last_run
      operator: gt
      value: 24
      true_next: stable_stale
      false_next: stable_fresh
    stable_stale:
      type: return
      value:
        action: run_now
        reason: Scheduled cadence — 24h since last run
        urgency: medium
        governor_state: throttle_open
    stable_fresh:
      type: return
      value:
        action: wait
        reason: Signal stable and chain is fresh
        urgency: none
        governor_state: throttle_closed
    check_decelerating:
      type: condition
      variable: signal_velocity
      operator: eq
      value: DECELERATING
      true_next: decelerating_no_urgency
      false_next: check_stalled
    decelerating_no_urgency:
      type: return
      value:
        action: wait
        reason: Signal decelerating — no urgency
        urgency: none
        governor_state: throttle_closed
    check_stalled:
      type: condition
      variable: signal_velocity
      operator: eq
      value: STALLED
      true_next: stalled_check_active_signals
      false_next: default_wait
    stalled_check_active_signals:
      type: condition
      variable: active_signals
      operator: gt
      value: 0
      true_next: stalled_with_signals
      false_next: stalled_no_signals
    stalled_with_signals:
      type: return
      value:
        action: run_now
        reason: Stalled with active signals — check for data source failure
        urgency: high
        governor_state: throttle_open
    stalled_no_signals:
      type: return
      value:
        action: wait
        reason: Stalled with no active signals — dormant drug
        urgency: none
        governor_state: throttle_closed
    no_data_available:
      type: return
      value:
        action: wait
        reason: No reporting data available
        urgency: none
        governor_state: throttle_closed
    default_wait:
      type: return
      value:
        action: wait
        reason: No high-priority condition met
        urgency: low
        governor_state: throttle_closed
tests:
  - input:
      current_rate: null
      baseline_rate: 100
      hours_since_last_run: 12
      signal_velocity: STABLE
      active_signals: 2
    expect:
      action: wait
      reason: No reporting data available
      urgency: none
      governor_state: throttle_closed
  - input:
      current_rate: 150
      baseline_rate: 100
      hours_since_last_run: 8
      signal_velocity: ACCELERATING
      active_signals: 1
    expect:
      action: run_now
      reason: Signal accelerating and chain stale
      urgency: high
      governor_state: throttle_open
  - input:
      current_rate: 180
      baseline_rate: 100
      hours_since_last_run: 3
      signal_velocity: ACCELERATING
      active_signals: 2
    expect:
      action: wait
      reason: Signal accelerating but chain is fresh
      urgency: low
      governor_state: throttle_closed
  - input:
      current_rate: 110
      baseline_rate: 100
      hours_since_last_run: 30
      signal_velocity: STABLE
      active_signals: 1
    expect:
      action: run_now
      reason: Scheduled cadence — 24h since last run
      urgency: medium
      governor_state: throttle_open
  - input:
      current_rate: 105
      baseline_rate: 100
      hours_since_last_run: 12
      signal_velocity: STABLE
      active_signals: 1
    expect:
      action: wait
      reason: Signal stable and chain is fresh
      urgency: none
      governor_state: throttle_closed
  - input:
      current_rate: 80
      baseline_rate: 100
      hours_since_last_run: 48
      signal_velocity: DECELERATING
      active_signals: 0
    expect:
      action: wait
      reason: Signal decelerating — no urgency
      urgency: none
      governor_state: throttle_closed
  - input:
      current_rate: 0
      baseline_rate: 100
      hours_since_last_run: 72
      signal_velocity: STALLED
      active_signals: 3
    expect:
      action: run_now
      reason: Stalled with active signals — check for data source failure
      urgency: high
      governor_state: throttle_open
  - input:
      current_rate: 0
      baseline_rate: 100
      hours_since_last_run: 120
      signal_velocity: STALLED
      active_signals: 0
    expect:
      action: wait
      reason: Stalled with no active signals — dormant drug
      urgency: none
      governor_state: throttle_closed
  - input:
      current_rate: 550
      baseline_rate: 150
      hours_since_last_run: 2
      signal_velocity: ACCELERATING
      active_signals: 5
      rate_ratio: 3.67
    expect:
      action: escalate
      reason: Reporting rate spike — possible Weber effect or safety event
      urgency: critical
      governor_state: throttle_escalated
  - input:
      current_rate: 600
      baseline_rate: 250
      hours_since_last_run: 6
      signal_velocity: STABLE
      active_signals: 2
      rate_ratio: 2.4
    expect:
      action: wait
      reason: Signal stable and chain is fresh
      urgency: none
      governor_state: throttle_closed
  - input: {}
    expect:
      action: wait
      reason: No reporting data available
      urgency: none
      governor_state: throttle_closed
  - input:
      current_rate: 200
      baseline_rate: 100
      hours_since_last_run: 6
      signal_velocity: ACCELERATING
      active_signals: 1
    expect:
      action: wait
      reason: Signal accelerating but chain is fresh
      urgency: low
      governor_state: throttle_closed
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
