# MICROGRAM++ (upgraded 2026-04-23)
name: module-complexity-gate
version: 0.1.0
description: "Code hygiene gate: classifies Rust modules by public function count. Modules with 10+ pub fns are doing too much."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: pub_fn_count
    type: int
    required: true
    description: ""
  - name: struct_count
    type: int
    required: false
    description: ""
outputs:
  - name: complexity_class
    type: string
  - name: needs_decomposition
    type: bool
  - name: reason
    type: string
interface:
  inputs:
    pub_fn_count:
      type: int
      required: true
    struct_count:
      type: int
      required: false
  outputs:
    complexity_class:
      type: string
    needs_decomposition:
      type: bool
    reason:
      type: string
ui:
  title: Module Complexity Gate
  subtitle: "Code hygiene gate: classifies Rust modules by public function count. Modules with 10+ pub fns are doing too much."
  icon: circle
  route: /vigilance/mg/module-complexity-gate
  steps:
    - field: pub_fn_count
      label: pub fn count
      help: Enter pub_fn_count
      widget: text
      placeholder: null
    - field: struct_count
      label: struct count
      help: Enter struct_count
      widget: text
      placeholder: null
  result:
    template: "complexity_class: {{complexity_class}} — needs_decomposition: {{needs_decomposition}} — reason: {{reason}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/module-complexity-gate
  cli: rsk mcg run module-complexity-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_excessive
  nodes:
    check_excessive:
      type: condition
      variable: pub_fn_count
      operator: gte
      value: 20
      true_next: excessive
      false_next: check_high
    check_high:
      type: condition
      variable: pub_fn_count
      operator: gte
      value: 10
      true_next: high
      false_next: check_moderate
    check_moderate:
      type: condition
      variable: pub_fn_count
      operator: gte
      value: 5
      true_next: moderate
      false_next: focused
    excessive:
      type: return
      value:
        complexity_class: EXCESSIVE
        needs_decomposition: true
        reason: Module has 20+ public functions — violates single responsibility, split into submodules
    high:
      type: return
      value:
        complexity_class: HIGH
        needs_decomposition: true
        reason: Module has 10-19 public functions — approaching complexity limit, plan decomposition
    moderate:
      type: return
      value:
        complexity_class: MODERATE
        needs_decomposition: false
        reason: Module has 5-9 public functions — acceptable complexity
    focused:
      type: return
      value:
        complexity_class: FOCUSED
        needs_decomposition: false
        reason: Module has fewer than 5 public functions — well-focused
tests:
  - input:
      pub_fn_count: 25
    expect:
      complexity_class: EXCESSIVE
      needs_decomposition: true
      reason: Module has 20+ public functions — violates single responsibility, split into submodules
  - input:
      pub_fn_count: 20
    expect:
      complexity_class: EXCESSIVE
      needs_decomposition: true
      reason: Module has 20+ public functions — violates single responsibility, split into submodules
  - input:
      pub_fn_count: 15
    expect:
      complexity_class: HIGH
      needs_decomposition: true
      reason: Module has 10-19 public functions — approaching complexity limit, plan decomposition
  - input:
      pub_fn_count: 10
    expect:
      complexity_class: HIGH
      needs_decomposition: true
      reason: Module has 10-19 public functions — approaching complexity limit, plan decomposition
  - input:
      pub_fn_count: 7
    expect:
      complexity_class: MODERATE
      needs_decomposition: false
      reason: Module has 5-9 public functions — acceptable complexity
  - input:
      pub_fn_count: 5
    expect:
      complexity_class: MODERATE
      needs_decomposition: false
      reason: Module has 5-9 public functions — acceptable complexity
  - input:
      pub_fn_count: 3
    expect:
      complexity_class: FOCUSED
      needs_decomposition: false
      reason: Module has fewer than 5 public functions — well-focused
  - input:
      pub_fn_count: 0
    expect:
      complexity_class: FOCUSED
      needs_decomposition: false
      reason: Module has fewer than 5 public functions — well-focused
  - input: {}
    expect:
      complexity_class: FOCUSED
      needs_decomposition: false
      reason: Module has fewer than 5 public functions — well-focused
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - complexity_class
    - needs_decomposition
    - reason
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
