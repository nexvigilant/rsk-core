# MICROGRAM++ (upgraded 2026-04-23)
name: d02-b002-patient-outcome-tracking
version: 0.1.0
description: Assess whether ADR follow-up includes patient outcome tracking and resolution status
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: D02 B002 Patient Outcome Tracking
  subtitle: Assess whether ADR follow-up includes patient outcome tracking and resolution status
  icon: circle
  route: /vigilance/mg/d02-b002-patient-outcome-tracking
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/d02-b002-patient-outcome-tracking
  cli: rsk mcg run d02-b002-patient-outcome-tracking
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    no:
      type: return
      value:
        outcome_missing: false
    check:
      type: condition
      variable: outcome_tracked
      operator: eq
      value: 1
      true_next: yes
      false_next: no
    yes:
      type: return
      value:
        outcome_tracked: true
tests:
  - input:
      outcome_tracked: 1
    expect:
      outcome_tracked: true
  - input:
      outcome_tracked: 1
    expect:
      outcome_tracked: true
  - input:
      outcome_tracked: 0
    expect:
      outcome_missing: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
