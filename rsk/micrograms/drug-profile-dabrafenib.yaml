name: drug-profile-dabrafenib
description: 'Safety triage for dabrafenib: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    no_signal:
      type: return
      value:
        signal: false
        expected_prr: 5.3
        harm_type: B
        action: monitor
        drug: dabrafenib
    signal:
      type: return
      value:
        action: investigate
        drug: dabrafenib
        harm_type: B
        expected_prr: 5.3
        signal: true
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 5.3
  expect:
    drug: dabrafenib
    signal: true
- input:
    prr: 0.5
  expect:
    signal: false
    drug: dabrafenib
- input: {}
  expect:
    drug: dabrafenib
    signal: false
- input:
    prr: 4.999
  expect:
    expected_prr: 5.3
    action: monitor
    drug: dabrafenib
    signal: false
    harm_type: B
- input:
    prr: 5.001
  expect:
    harm_type: B
    action: investigate
    expected_prr: 5.3
    drug: dabrafenib
    signal: true
interface: null
primitive_signature: null
