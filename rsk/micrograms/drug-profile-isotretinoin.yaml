name: drug-profile-isotretinoin
description: 'Safety triage for isotretinoin: PRR-based signal routing (Type C)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    no_signal:
      type: return
      value:
        action: monitor
        drug: isotretinoin
        signal: false
        expected_prr: 4.7
        harm_type: C
    signal:
      type: return
      value:
        signal: true
        expected_prr: 4.7
        action: investigate
        harm_type: C
        drug: isotretinoin
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 4.7
  expect:
    drug: isotretinoin
    signal: true
- input:
    prr: 0.5
  expect:
    signal: false
    drug: isotretinoin
- input: {}
  expect:
    drug: isotretinoin
    signal: false
- input:
    prr: 1.999
  expect:
    expected_prr: 4.7
    drug: isotretinoin
    harm_type: C
    signal: false
    action: monitor
- input:
    prr: 2.001
  expect:
    harm_type: C
    signal: true
    expected_prr: 4.7
    action: investigate
    drug: isotretinoin
interface: null
primitive_signature: null
