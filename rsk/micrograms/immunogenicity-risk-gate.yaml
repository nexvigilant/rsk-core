# MICROGRAM++ (upgraded 2026-04-23)
name: immunogenicity-risk-gate
version: 0.1.0
description: "Immunogenicity risk classifier: maps immune-mediated adverse reactions including anaphylaxis, autoimmune conditions, and immunosuppression"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reaction_pt
    type: string
    required: true
    description: MedDRA preferred term for the immune reaction
outputs:
  - name: severity
    type: string
  - name: soc
    type: string
  - name: action
    type: string
interface:
  inputs:
    reaction_pt:
      type: string
      required: true
      description: MedDRA preferred term for the immune reaction
  outputs:
    severity:
      type: string
      description: critical | serious | moderate | mild
    soc:
      type: string
    action:
      type: string
ui:
  title: Immunogenicity Risk Gate
  subtitle: "Immunogenicity risk classifier: maps immune-mediated adverse reactions including anaphylaxis, autoimmune conditions, and immunosuppression"
  icon: circle
  route: /vigilance/mg/immunogenicity-risk-gate
  steps:
    - field: reaction_pt
      label: reaction pt
      help: MedDRA preferred term for the immune reaction
      widget: text
      placeholder: null
  result:
    template: "severity: {{severity}} — soc: {{soc}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/immunogenicity-risk-gate
  cli: rsk mcg run immunogenicity-risk-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_anaphylaxis
  nodes:
    check_anaphylaxis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: ANAPHYLAC
      true_next: critical
      false_next: check_serum_sickness
    check_serum_sickness:
      type: condition
      variable: reaction_pt
      operator: contains
      value: SERUM SICKNESS
      true_next: serious
      false_next: check_autoimmune
    check_autoimmune:
      type: condition
      variable: reaction_pt
      operator: contains
      value: AUTOIMMUNE
      true_next: serious
      false_next: check_vasculitis
    check_vasculitis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: VASCULITIS
      true_next: serious
      false_next: check_infusion
    check_infusion:
      type: condition
      variable: reaction_pt
      operator: contains
      value: INFUSION RELATED
      true_next: moderate
      false_next: mild
    critical:
      type: return
      value:
        severity: critical
        soc: Immune system disorders
        action: immediate_expedited_report
    serious:
      type: return
      value:
        severity: serious
        soc: Immune system disorders
        action: expedited_report
    moderate:
      type: return
      value:
        severity: moderate
        soc: Immune system disorders
        action: monitor_and_assess
    mild:
      type: return
      value:
        severity: mild
        soc: Immune system disorders
        action: routine_surveillance
tests:
  - name: anaphylaxis
    input:
      reaction_pt: ANAPHYLACTIC SHOCK
    expect:
      severity: critical
  - name: serum_sickness
    input:
      reaction_pt: SERUM SICKNESS
    expect:
      severity: serious
  - name: autoimmune
    input:
      reaction_pt: AUTOIMMUNE HEPATITIS
    expect:
      severity: serious
  - name: vasculitis
    input:
      reaction_pt: VASCULITIS
    expect:
      severity: serious
  - name: infusion_reaction
    input:
      reaction_pt: INFUSION RELATED REACTION
    expect:
      severity: moderate
  - name: mild_allergy
    input:
      reaction_pt: PRURITUS
    expect:
      severity: mild
  - name: null_safety
    input: {}
    expect:
      severity: mild
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - severity
    - soc
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
