# MICROGRAM++ (upgraded 2026-04-23)
name: trend-lag-short
version: 0.1.0
description: Short onset latency
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Trend Lag Short
  subtitle: Short onset latency
  icon: circle
  route: /vigilance/mg/trend-lag-short
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/trend-lag-short
  cli: rsk mcg run trend-lag-short
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: median_onset_days
      operator: lte
      value: 7
      true_next: detected
      false_next: not_detected
    detected:
      type: return
      value:
        pattern: acute
        action: investigate
        detected: true
    not_detected:
      type: return
      value:
        detected: false
        pattern: acute
        action: continue_monitoring
tests:
  - input:
      median_onset_days: 7
    expect:
      pattern: acute
      detected: true
  - input: {}
    expect:
      detected: false
      pattern: acute
  - input:
      median_onset_days: 0
    expect:
      pattern: acute
      detected: true
      action: investigate
  - input:
      median_onset_days: -1
    expect:
      detected: true
      pattern: acute
      action: investigate
  - input:
      median_onset_days: 6
    expect:
      pattern: acute
      action: investigate
      detected: true
  - input:
      median_onset_days: 8
    expect:
      detected: false
      pattern: acute
      action: continue_monitoring
  - input:
      median_onset_days: 700
    expect:
      pattern: acute
      action: continue_monitoring
      detected: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
