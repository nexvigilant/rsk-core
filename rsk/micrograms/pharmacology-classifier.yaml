name: pharmacology-classifier
description: "Classify drug pharmacology by mechanism of action and therapeutic area"
version: 0.1.0

tree:
  start: check_moa
  nodes:
    check_moa:
      type: condition
      variable: mechanism_of_action
      operator: is_not_null
      true_next: check_drug_class
      false_next: missing_input

    check_drug_class:
      type: condition
      variable: drug_class
      operator: is_not_null
      true_next: classify_pharmacology
      false_next: missing_class

    classify_pharmacology:
      type: condition
      variable: mechanism_of_action
      operator: matches
      value: "(?i)(receptor antagonist|blocker|inhibitor)"
      true_next: classify_therapeutic_area
      false_next: check_agonist

    check_agonist:
      type: condition
      variable: mechanism_of_action
      operator: matches
      value: "(?i)(agonist|activator|enhancer)"
      true_next: classify_therapeutic_area
      false_next: check_enzyme

    check_enzyme:
      type: condition
      variable: mechanism_of_action
      operator: matches
      value: "(?i)(enzyme|inhibitor|catalytic)"
      true_next: classify_therapeutic_area
      false_next: unknown_mechanism

    classify_therapeutic_area:
      type: condition
      variable: drug_class
      operator: matches
      value: "(?i)(cardiac|cardiovascular|heart)"
      true_next: therapeutic_cardiovascular
      false_next: check_infectious

    check_infectious:
      type: condition
      variable: drug_class
      operator: matches
      value: "(?i)(antibiotic|antiviral|antifungal|antimicrobial)"
      true_next: therapeutic_infectious
      false_next: check_neuro

    check_neuro:
      type: condition
      variable: drug_class
      operator: matches
      value: "(?i)(psychotropic|neurological|neuro|psychiatric)"
      true_next: therapeutic_neuro
      false_next: therapeutic_other

    therapeutic_cardiovascular:
      type: return
      value:
        pharmacology_category: "cardiovascular_agent"
        therapeutic_area: "cardiology"
        safety_relevant: true

    therapeutic_infectious:
      type: return
      value:
        pharmacology_category: "antimicrobial_agent"
        therapeutic_area: "infectious_disease"
        safety_relevant: true

    therapeutic_neuro:
      type: return
      value:
        pharmacology_category: "neuro_agent"
        therapeutic_area: "neurology_psychiatry"
        safety_relevant: true

    therapeutic_other:
      type: return
      value:
        pharmacology_category: "other"
        therapeutic_area: "general"
        safety_relevant: false

    unknown_mechanism:
      type: return
      value:
        pharmacology_category: "unknown"
        therapeutic_area: null
        safety_relevant: true

    missing_input:
      type: return
      value:
        pharmacology_category: "unknown"
        therapeutic_area: null
        safety_relevant: true

    missing_class:
      type: return
      value:
        pharmacology_category: "unknown"
        therapeutic_area: null
        safety_relevant: true

tests:
  - input: { mechanism_of_action: "beta-adrenergic receptor antagonist", drug_class: "cardiac" }
    expect: { pharmacology_category: "cardiovascular_agent", therapeutic_area: "cardiology", safety_relevant: true }

  - input: { mechanism_of_action: "bacterial cell wall inhibitor", drug_class: "antibiotic" }
    expect: { pharmacology_category: "antimicrobial_agent", therapeutic_area: "infectious_disease", safety_relevant: true }

  - input: { mechanism_of_action: "serotonin reuptake inhibitor", drug_class: "psychotropic" }
    expect: { pharmacology_category: "neuro_agent", therapeutic_area: "neurology_psychiatry", safety_relevant: true }

  - input: { mechanism_of_action: null, drug_class: "cardiovascular" }
    expect: { pharmacology_category: "unknown", therapeutic_area: null, safety_relevant: true }

  - input: { mechanism_of_action: "protease activator", drug_class: "immunological" }
    expect: { pharmacology_category: "other", therapeutic_area: "general", safety_relevant: false }
