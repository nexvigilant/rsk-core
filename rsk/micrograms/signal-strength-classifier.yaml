# MICROGRAM++ (upgraded 2026-04-23)
name: signal-strength-classifier
version: 0.1.0
description: "Signal level to strength mapper: converts traffic level (red/yellow/green) to signal strength label for dashboard display"
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: level
    type: string
    required: true
    description: Traffic level from signal detection (red, yellow, green)
outputs:
  - name: strength
    type: string
interface:
  inputs:
    level:
      type: string
      required: true
      description: Traffic level from signal detection (red, yellow, green)
  outputs:
    strength:
      type: string
ui:
  title: Signal Strength Classifier
  subtitle: "Signal level to strength mapper: converts traffic level (red/yellow/green) to signal strength label for dashboard display"
  icon: activity
  route: /vigilance/mg/signal-strength-classifier
  steps:
    - field: level
      label: level
      help: Traffic level from signal detection (red, yellow, green)
      widget: text
      placeholder: null
  result:
    template: "strength: {{strength}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/signal-strength-classifier
  cli: rsk mcg run signal-strength-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_red
  nodes:
    check_red:
      type: condition
      variable: level
      operator: eq
      value: red
      true_next: strong
      false_next: check_yellow
    check_yellow:
      type: condition
      variable: level
      operator: eq
      value: yellow
      true_next: moderate
      false_next: none_strength
    strong:
      type: return
      value:
        strength: strong
    moderate:
      type: return
      value:
        strength: moderate
    none_strength:
      type: return
      value:
        strength: none
tests:
  - input:
      level: red
    expect:
      strength: strong
  - input:
      level: yellow
    expect:
      strength: moderate
  - input:
      level: green
    expect:
      strength: none
  - input:
      level: unknown
    expect:
      strength: none
  - input: {}
    expect:
      strength: none
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - strength
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
