# MICROGRAM++ (upgraded 2026-04-23)
name: workflow-regulatory-action
version: 0.1.0
description: Determine regulatory action type from signal severity and jurisdiction
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Workflow Regulatory Action
  subtitle: Determine regulatory action type from signal severity and jurisdiction
  icon: circle
  route: /vigilance/mg/workflow-regulatory-action
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/workflow-regulatory-action
  cli: rsk mcg run workflow-regulatory-action
  auth: none
  rate_limit: 600/min
tree:
  start: check_severity
  nodes:
    check_severity:
      type: condition
      variable: signal_severity
      operator: eq
      value: critical
      true_next: check_jurisdiction_critical
      false_next: check_moderate
    check_jurisdiction_critical:
      type: condition
      variable: jurisdiction
      operator: eq
      value: US
      true_next: us_critical
      false_next: eu_critical
    us_critical:
      type: return
      value:
        action: boxed_warning
        chain: fda-safety → fda-accessdata → compliance
        timeline_days: 30
    eu_critical:
      type: return
      value:
        action: referral
        chain: ema → compliance → benefit-risk
        timeline_days: 60
    check_moderate:
      type: condition
      variable: signal_severity
      operator: eq
      value: high
      true_next: labeling
      false_next: monitor
    labeling:
      type: return
      value:
        action: labeling_change
        chain: fda-safety → dailymed → compliance
        timeline_days: 90
    monitor:
      type: return
      value:
        action: enhanced_monitoring
        chain: vigilance → preemptive-pv → epidemiology
        timeline_days: 180
tests:
  - input:
      signal_severity: critical
      jurisdiction: US
    expect:
      action: boxed_warning
      timeline_days: 30
  - input:
      signal_severity: critical
      jurisdiction: EU
    expect:
      action: referral
      timeline_days: 60
  - input:
      signal_severity: high
      jurisdiction: US
    expect:
      action: labeling_change
      timeline_days: 90
  - input:
      signal_severity: moderate
      jurisdiction: US
    expect:
      action: enhanced_monitoring
      timeline_days: 180
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
