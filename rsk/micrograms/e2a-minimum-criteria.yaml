# MICROGRAM++ (upgraded 2026-04-23)
name: e2a-minimum-criteria
version: 0.1.0
description: "ICH E2A / CIOMS-I minimum ICSR validity gate: all 4 elements (reporter, patient, drug, event) must be identifiable"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: adverse_event
    type: bool
    required: false
    description: ""
  - name: identifiable_patient
    type: bool
    required: false
    description: ""
  - name: identifiable_reporter
    type: bool
    required: false
    description: ""
  - name: suspected_drug
    type: bool
    required: false
    description: ""
outputs:
  - name: description
    type: string
  - name: missing_elements
    type: string
  - name: regulatory_reference
    type: string
  - name: valid_icsr
    type: bool
interface:
  inputs:
    adverse_event:
      type: bool
      required: false
    identifiable_patient:
      type: bool
      required: false
    identifiable_reporter:
      type: bool
      required: false
    suspected_drug:
      type: bool
      required: false
  outputs:
    description:
      type: string
    missing_elements:
      type: string
    regulatory_reference:
      type: string
    valid_icsr:
      type: bool
ui:
  title: E2a Minimum Criteria
  subtitle: "ICH E2A / CIOMS-I minimum ICSR validity gate: all 4 elements (reporter, patient, drug, event) must be identifiable"
  icon: circle
  route: /vigilance/mg/e2a-minimum-criteria
  steps:
    - field: adverse_event
      label: adverse event
      help: Enter adverse_event
      widget: toggle
      placeholder: null
    - field: identifiable_patient
      label: identifiable patient
      help: Enter identifiable_patient
      widget: toggle
      placeholder: null
    - field: identifiable_reporter
      label: identifiable reporter
      help: Enter identifiable_reporter
      widget: toggle
      placeholder: null
    - field: suspected_drug
      label: suspected drug
      help: Enter suspected_drug
      widget: toggle
      placeholder: null
  result:
    template: "description: {{description}} — missing_elements: {{missing_elements}} — regulatory_reference: {{regulatory_reference}} — valid_icsr: {{valid_icsr}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2a-minimum-criteria
  cli: rsk mcg run e2a-minimum-criteria
  auth: none
  rate_limit: 600/min
tree:
  start: check_reporter
  nodes:
    check_reporter:
      type: condition
      variable: identifiable_reporter
      operator: eq
      value: true
      true_next: check_patient
      false_next: missing_reporter
    check_patient:
      type: condition
      variable: identifiable_patient
      operator: eq
      value: true
      true_next: check_drug
      false_next: missing_patient
    check_drug:
      type: condition
      variable: suspected_drug
      operator: eq
      value: true
      true_next: check_event
      false_next: missing_drug
    check_event:
      type: condition
      variable: adverse_event
      operator: eq
      value: true
      true_next: valid
      false_next: missing_event
    valid:
      type: return
      value:
        valid_icsr: true
        missing_elements: NONE
        description: All 4 minimum ICSR elements present - case is valid for processing
        regulatory_reference: ICH E2A Section III.A / CIOMS-I
    missing_reporter:
      type: return
      value:
        valid_icsr: false
        missing_elements: IDENTIFIABLE_REPORTER
        description: No identifiable reporter - case does not meet minimum ICSR criteria
        regulatory_reference: ICH E2A Section III.A / CIOMS-I
    missing_patient:
      type: return
      value:
        valid_icsr: false
        missing_elements: IDENTIFIABLE_PATIENT
        description: No identifiable patient - case does not meet minimum ICSR criteria
        regulatory_reference: ICH E2A Section III.A / CIOMS-I
    missing_drug:
      type: return
      value:
        valid_icsr: false
        missing_elements: SUSPECTED_DRUG
        description: No suspected drug identified - case does not meet minimum ICSR criteria
        regulatory_reference: ICH E2A Section III.A / CIOMS-I
    missing_event:
      type: return
      value:
        valid_icsr: false
        missing_elements: ADVERSE_EVENT
        description: No adverse event described - case does not meet minimum ICSR criteria
        regulatory_reference: ICH E2A Section III.A / CIOMS-I
tests:
  - input:
      identifiable_reporter: true
      identifiable_patient: true
      suspected_drug: true
      adverse_event: true
    expect:
      valid_icsr: true
      missing_elements: NONE
      description: All 4 minimum ICSR elements present - case is valid for processing
      regulatory_reference: ICH E2A Section III.A / CIOMS-I
  - input:
      identifiable_reporter: false
      identifiable_patient: true
      suspected_drug: true
      adverse_event: true
    expect:
      valid_icsr: false
      missing_elements: IDENTIFIABLE_REPORTER
      description: No identifiable reporter - case does not meet minimum ICSR criteria
      regulatory_reference: ICH E2A Section III.A / CIOMS-I
  - input:
      identifiable_reporter: true
      identifiable_patient: false
      suspected_drug: true
      adverse_event: true
    expect:
      valid_icsr: false
      missing_elements: IDENTIFIABLE_PATIENT
      description: No identifiable patient - case does not meet minimum ICSR criteria
      regulatory_reference: ICH E2A Section III.A / CIOMS-I
  - input:
      identifiable_reporter: true
      identifiable_patient: true
      suspected_drug: false
      adverse_event: true
    expect:
      valid_icsr: false
      missing_elements: SUSPECTED_DRUG
      description: No suspected drug identified - case does not meet minimum ICSR criteria
      regulatory_reference: ICH E2A Section III.A / CIOMS-I
  - input:
      identifiable_reporter: true
      identifiable_patient: true
      suspected_drug: true
      adverse_event: false
    expect:
      valid_icsr: false
      missing_elements: ADVERSE_EVENT
      description: No adverse event described - case does not meet minimum ICSR criteria
      regulatory_reference: ICH E2A Section III.A / CIOMS-I
  - input: {}
    expect:
      valid_icsr: false
      missing_elements: IDENTIFIABLE_REPORTER
      description: No identifiable reporter - case does not meet minimum ICSR criteria
      regulatory_reference: ICH E2A Section III.A / CIOMS-I
  - input:
      identifiable_reporter: false
      identifiable_patient: false
      suspected_drug: false
      adverse_event: false
    expect:
      valid_icsr: false
      missing_elements: IDENTIFIABLE_REPORTER
      description: No identifiable reporter - case does not meet minimum ICSR criteria
      regulatory_reference: ICH E2A Section III.A / CIOMS-I
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - description
    - missing_elements
    - regulatory_reference
    - valid_icsr
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
