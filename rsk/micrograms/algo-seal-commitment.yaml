# MICROGRAM++ (upgraded 2026-04-23)
name: algo-seal-commitment
version: 0.1.0
description: "Algorithm 11 (SEAL): Irreversible commitment gate. Checks prerequisites before applying ∝(DEFINE). Guards against premature SEAL and ensures PERSPECTIVE was applied first."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: decision_defined
    type: boolean
    required: true
    description: ""
  - name: perspectives_checked
    type: integer
    required: true
    description: ""
  - name: evidence_sufficient
    type: boolean
    required: true
    description: ""
  - name: reversibility_cost
    type: string
    required: true
    description: ""
outputs:
  - name: seal_verdict
    type: string
  - name: algorithm
    type: string
interface:
  inputs:
    decision_defined:
      type: boolean
      required: true
    perspectives_checked:
      type: integer
      required: true
    evidence_sufficient:
      type: boolean
      required: true
    reversibility_cost:
      type: string
      required: true
      enum:
        - trivial
        - moderate
        - expensive
        - impossible
  outputs:
    seal_verdict:
      type: string
    algorithm:
      type: string
ui:
  title: Algo Seal Commitment
  subtitle: "Algorithm 11 (SEAL): Irreversible commitment gate. Checks prerequisites before applying ∝(DEFINE). Guards against premature SEAL and ensures PERSPECTIVE was applied first."
  icon: circle
  route: /vigilance/mg/algo-seal-commitment
  steps:
    - field: decision_defined
      label: decision defined
      help: Enter decision_defined
      widget: toggle
      placeholder: null
    - field: perspectives_checked
      label: perspectives checked
      help: Enter perspectives_checked
      widget: number
      placeholder: null
    - field: evidence_sufficient
      label: evidence sufficient
      help: Enter evidence_sufficient
      widget: toggle
      placeholder: null
    - field: reversibility_cost
      label: reversibility cost
      help: Enter reversibility_cost
      widget: text
      placeholder: null
  result:
    template: "seal_verdict: {{seal_verdict}} — algorithm: {{algorithm}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/algo-seal-commitment
  cli: rsk mcg run algo-seal-commitment
  auth: none
  rate_limit: 600/min
tree:
  start: check_defined
  nodes:
    check_defined:
      type: condition
      variable: decision_defined
      operator: eq
      value: false
      true_next: block_undefined
      false_next: check_multi_perspective
    block_undefined:
      type: return
      value:
        seal_verdict: BLOCK
        algorithm: "SEAL blocked: DEFINE not applied — cannot seal an unfixed variable"
    check_multi_perspective:
      type: condition
      variable: perspectives_checked
      operator: gte
      value: 2
      true_next: check_evidence
      false_next: check_single_perspective
    check_single_perspective:
      type: condition
      variable: perspectives_checked
      operator: gte
      value: 1
      true_next: check_single_cost_trivial
      false_next: block_no_perspective
    block_no_perspective:
      type: return
      value:
        seal_verdict: BLOCK
        algorithm: "SEAL blocked: zero perspectives — Failure Mode #7 risk"
    check_single_cost_trivial:
      type: condition
      variable: reversibility_cost
      operator: eq
      value: trivial
      true_next: warn_proceed
      false_next: check_single_cost_moderate
    check_single_cost_moderate:
      type: condition
      variable: reversibility_cost
      operator: eq
      value: moderate
      true_next: warn_proceed
      false_next: block_high_stakes_single
    block_high_stakes_single:
      type: return
      value:
        seal_verdict: BLOCK
        algorithm: "SEAL blocked: 1 perspective on expensive/impossible reversal — ∝ amplifies perspective collapse"
    warn_proceed:
      type: return
      value:
        seal_verdict: WARN_PROCEED
        algorithm: "SEAL with warning: 1 perspective but low reversal cost — proceed with caution"
    check_evidence:
      type: condition
      variable: evidence_sufficient
      operator: eq
      value: true
      true_next: check_impossible
      false_next: block_weak_evidence
    block_weak_evidence:
      type: return
      value:
        seal_verdict: BLOCK
        algorithm: "SEAL blocked: insufficient evidence — ∝(DEFINE) on weak evidence creates irreversible error"
    check_impossible:
      type: condition
      variable: reversibility_cost
      operator: eq
      value: impossible
      true_next: seal_irreversible
      false_next: seal_reversible
    seal_irreversible:
      type: return
      value:
        seal_verdict: SEAL
        algorithm: "SEAL: ∝(μ(ς → π(ς))) — truly irreversible commitment. No inverse exists."
    seal_reversible:
      type: return
      value:
        seal_verdict: SEAL
        algorithm: "SEAL: ∝(μ(ς → π(ς))) — commitment executed. Reversal possible but costly."
tests:
  - input:
      decision_defined: true
      perspectives_checked: 3
      evidence_sufficient: true
      reversibility_cost: impossible
    expect:
      seal_verdict: SEAL
  - input:
      decision_defined: true
      perspectives_checked: 2
      evidence_sufficient: true
      reversibility_cost: moderate
    expect:
      seal_verdict: SEAL
  - input:
      decision_defined: false
      perspectives_checked: 3
      evidence_sufficient: true
      reversibility_cost: trivial
    expect:
      seal_verdict: BLOCK
  - input:
      decision_defined: true
      perspectives_checked: 0
      evidence_sufficient: true
      reversibility_cost: expensive
    expect:
      seal_verdict: BLOCK
  - input:
      decision_defined: true
      perspectives_checked: 1
      evidence_sufficient: true
      reversibility_cost: impossible
    expect:
      seal_verdict: BLOCK
  - input:
      decision_defined: true
      perspectives_checked: 1
      evidence_sufficient: true
      reversibility_cost: trivial
    expect:
      seal_verdict: WARN_PROCEED
  - input:
      decision_defined: true
      perspectives_checked: 3
      evidence_sufficient: false
      reversibility_cost: expensive
    expect:
      seal_verdict: BLOCK
  - input:
      decision_defined: true
      perspectives_checked: 1
      evidence_sufficient: true
      reversibility_cost: moderate
    expect:
      seal_verdict: WARN_PROCEED
  - input: {}
    expect:
      seal_verdict: BLOCK
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - seal_verdict
    - algorithm
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
