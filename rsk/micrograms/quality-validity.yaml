name: quality-validity
description: "Case validity check"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "valid_case"
      operator: "eq"
      value: true
      true_next: "pass"
      false_next: "fail"
    pass:
      type: "return"
      value:
        check: "quality-validity"
        passed: true
        action: "accept"
    fail:
      type: "return"
      value:
        check: "quality-validity"
        passed: false
        action: "flag_for_review"

tests:
  - input: {"valid_case": true}
    expect: {"check": "quality-validity", "passed": true}
  - input: {}
    expect: {"check": "quality-validity", "passed": false}
