# MICROGRAM++ (upgraded 2026-04-23)
name: ab-coupling-imbalance
version: 0.1.0
description: "Antibody: detects action-reaction imbalance (stem-phys Couple trait). Input is pre-computed magnitude_delta = abs(action - reaction)."
family: antibody.chemistry
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - antibody
inputs:
  - name: magnitude_delta
    type: number
    required: true
    description: abs(action_magnitude - reaction_magnitude)
  - name: tolerance
    type: number
    required: true
    description: ""
outputs:
  - name: threat
    type: boolean
  - name: response
    type: string
interface:
  inputs:
    magnitude_delta:
      type: number
      required: true
      description: abs(action_magnitude - reaction_magnitude)
    tolerance:
      type: number
      required: true
  outputs:
    threat:
      type: boolean
    response:
      type: string
ui:
  title: Coupling Imbalance
  subtitle: "Antibody: detects action-reaction imbalance (stem-phys Couple trait). Input is pre-computed magnitude_delta = abs(action - reaction)."
  icon: shield
  route: /vigilance/mg/ab-coupling-imbalance
  steps:
    - field: magnitude_delta
      label: magnitude delta
      help: abs(action_magnitude - reaction_magnitude)
      widget: number
      placeholder: null
    - field: tolerance
      label: tolerance
      help: Enter tolerance
      widget: number
      placeholder: null
  result:
    template: "threat: {{threat}} — response: {{response}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ab-coupling-imbalance
  cli: rsk mcg run ab-coupling-imbalance
  auth: none
  rate_limit: 600/min
tree:
  start: check_zero
  nodes:
    check_zero:
      type: condition
      variable: magnitude_delta
      operator: eq
      value: 0
      true_next: clean
      false_next: check_tolerance
    check_tolerance:
      type: condition
      variable: magnitude_delta
      operator: lte
      value: 0.01
      true_next: clean
      false_next: violation
    violation:
      type: return
      value:
        threat: true
        response: "BLOCK: action-reaction imbalance — Newton third law violated"
    clean:
      type: return
      value:
        threat: false
        response: PASS
tests:
  - input:
      magnitude_delta: 0
      tolerance: 0.01
    expect:
      threat: false
  - input:
      magnitude_delta: 0.005
      tolerance: 0.01
    expect:
      threat: false
  - input:
      magnitude_delta: 5
      tolerance: 0.01
    expect:
      threat: true
  - input: {}
    expect:
      response: "BLOCK: action-reaction imbalance — Newton third law violated"
      threat: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - threat
    - response
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: antibody.chemistry
  log_level: info
governance:
  sop_ref: SOP-CHEM-001
  regulatory_ref: []
  harm_types:
    - F
  review_cadence: quarterly
  tov_axioms:
    - conservation
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
