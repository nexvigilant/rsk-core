# MICROGRAM++ (upgraded 2026-04-23)
name: gate-serious-high
version: 0.1.0
description: High serious outcome rate
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Gate Serious High
  subtitle: High serious outcome rate
  icon: circle
  route: /vigilance/mg/gate-serious-high
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-serious-high
  cli: rsk mcg run gate-serious-high
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    pass:
      type: return
      value:
        gate: true
        met: true
        threshold: serious_pct
    check:
      type: condition
      variable: serious_pct
      operator: gte
      value: 30
      true_next: pass
      false_next: fail
    fail:
      type: return
      value:
        gate: false
        threshold: serious_pct
        met: false
tests:
  - input:
      serious_pct: 30
    expect:
      gate: true
      met: true
  - input: {}
    expect:
      gate: false
      met: false
  - input:
      serious_pct: 0
    expect:
      threshold: serious_pct
      gate: false
      met: false
  - input:
      serious_pct: -1
    expect:
      gate: false
      met: false
      threshold: serious_pct
  - input:
      serious_pct: 29
    expect:
      threshold: serious_pct
      met: false
      gate: false
  - input:
      serious_pct: 31
    expect:
      met: true
      gate: true
      threshold: serious_pct
  - input:
      serious_pct: 3000
    expect:
      gate: true
      met: true
      threshold: serious_pct
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
