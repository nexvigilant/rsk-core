# MICROGRAM++ (upgraded 2026-04-23)
name: reporting-rate-gate
version: 0.1.0
description: Fills the ν (Frequency) primitive gap. Rate-of-change signal detection — detects if adverse event reporting rate is accelerating, stable, or declining quarter-over-quarter.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: rate_change_pct
    type: i64
    required: true
    description: ""
  - name: current_count
    type: i64
    required: true
    description: ""
  - name: baseline_exists
    type: bool
    required: true
    description: ""
outputs:
  - name: chemistry_analog
    type: string
  - name: trend
    type: string
  - name: frequency_primitive
    type: string
  - name: action
    type: string
interface:
  inputs:
    rate_change_pct:
      type: i64
      required: true
    current_count:
      type: i64
      required: true
    baseline_exists:
      type: bool
      required: true
  outputs:
    chemistry_analog:
      type: string
      required: false
    trend:
      type: string
      required: false
    frequency_primitive:
      type: string
      required: false
    action:
      type: string
      required: false
  aliases: {}
ui:
  title: Reporting Rate Gate
  subtitle: Fills the ν (Frequency) primitive gap. Rate-of-change signal detection — detects if adverse event reporting rate is accelerating, stable, or declining quarter-over-quarter.
  icon: circle
  route: /vigilance/mg/reporting-rate-gate
  steps:
    - field: rate_change_pct
      label: rate change pct
      help: Enter rate_change_pct
      widget: text
      placeholder: null
    - field: current_count
      label: current count
      help: Enter current_count
      widget: text
      placeholder: null
    - field: baseline_exists
      label: baseline exists
      help: Enter baseline_exists
      widget: toggle
      placeholder: null
  result:
    template: "chemistry_analog: {{chemistry_analog}} — trend: {{trend}} — frequency_primitive: {{frequency_primitive}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/reporting-rate-gate
  cli: rsk mcg run reporting-rate-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_baseline
  nodes:
    signal_emerging:
      type: return
      value:
        trend: SIGNAL_EMERGING
        frequency_primitive: ν — rate of change over time
        chemistry_analog: Dramatic increase in reaction velocity
        action: Escalate to signal evaluation - reporting rate increased ≥50% quarter-over-quarter
    check_watch_threshold:
      type: condition
      variable: rate_change_pct
      operator: gte
      value: 20
      true_next: watch
      false_next: check_stable_threshold
    no_activity:
      type: return
      value:
        frequency_primitive: ν — rate of change over time
        trend: NO_ACTIVITY
        chemistry_analog: Zero reaction rate across periods
        action: Continue routine monitoring - no baseline and no current events
    check_stable_threshold:
      type: condition
      variable: rate_change_pct
      operator: gte
      value: -20
      true_next: stable
      false_next: declining
    new_signal:
      type: return
      value:
        frequency_primitive: ν — rate of change over time
        action: Initiate signal evaluation - no prior baseline, new event reporting detected
        trend: NEW_SIGNAL
        chemistry_analog: Appearance of new reaction intermediate with no baseline
    check_no_baseline_count:
      type: condition
      variable: current_count
      operator: gt
      value: 0
      true_next: new_signal
      false_next: no_activity
    watch:
      type: return
      value:
        chemistry_analog: Moderate acceleration in reaction kinetics
        trend: WATCH
        frequency_primitive: ν — rate of change over time
        action: Flag for enhanced surveillance - reporting rate increased 20-49% quarter-over-quarter
    stable:
      type: return
      value:
        chemistry_analog: Steady-state reaction equilibrium
        frequency_primitive: ν — rate of change over time
        action: Continue standard monitoring - reporting rate within normal variation (-20% to +19%)
        trend: STABLE
    check_baseline_rate:
      type: condition
      variable: rate_change_pct
      operator: gte
      value: 50
      true_next: signal_emerging
      false_next: check_watch_threshold
    declining:
      type: return
      value:
        action: Document trend - reporting rate declined >20% quarter-over-quarter
        frequency_primitive: ν — rate of change over time
        chemistry_analog: Reaction rate decreasing toward completion
        trend: DECLINING
    check_baseline:
      type: condition
      variable: baseline_exists
      operator: eq
      value: true
      true_next: check_baseline_rate
      false_next: check_no_baseline_count
tests:
  - input:
      rate_change_pct: 0
      current_count: 5
      baseline_exists: false
    expect:
      trend: NEW_SIGNAL
      action: Initiate signal evaluation - no prior baseline, new event reporting detected
      frequency_primitive: ν — rate of change over time
      chemistry_analog: Appearance of new reaction intermediate with no baseline
  - input:
      baseline_exists: false
      current_count: 0
      rate_change_pct: 0
    expect:
      chemistry_analog: Zero reaction rate across periods
      frequency_primitive: ν — rate of change over time
      trend: NO_ACTIVITY
      action: Continue routine monitoring - no baseline and no current events
  - input:
      rate_change_pct: 100
      baseline_exists: true
      current_count: 50
