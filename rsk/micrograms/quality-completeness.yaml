# MICROGRAM++ (upgraded 2026-04-23)
name: quality-completeness
version: 0.1.0
description: Case completeness score
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Quality Completeness
  subtitle: Case completeness score
  icon: circle
  route: /vigilance/mg/quality-completeness
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/quality-completeness
  cli: rsk mcg run quality-completeness
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: completeness_pct
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    fail:
      type: return
      value:
        check: quality-completeness
        passed: false
        action: flag_for_review
    pass:
      type: return
      value:
        action: accept
        check: quality-completeness
        passed: true
tests:
  - input:
      completeness_pct: 80
    expect:
      check: quality-completeness
      passed: true
  - input: {}
    expect:
      check: quality-completeness
      passed: false
  - input:
      completeness_pct: 0
    expect:
      check: quality-completeness
      action: flag_for_review
      passed: false
  - input:
      completeness_pct: -1
    expect:
      passed: false
      action: flag_for_review
      check: quality-completeness
  - input:
      completeness_pct: 79
    expect:
      check: quality-completeness
      passed: false
      action: flag_for_review
  - input:
      completeness_pct: 81
    expect:
      check: quality-completeness
      action: accept
      passed: true
  - input:
      completeness_pct: 8000
    expect:
      check: quality-completeness
      action: accept
      passed: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
