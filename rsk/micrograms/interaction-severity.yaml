# MICROGRAM++ (upgraded 2026-04-23)
name: interaction-severity
version: 0.1.0
description: Classify drug interaction severity (contraindicated, major, moderate, minor)
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Interaction Severity
  subtitle: Classify drug interaction severity (contraindicated, major, moderate, minor)
  icon: circle
  route: /vigilance/mg/interaction-severity
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/interaction-severity
  cli: rsk mcg run interaction-severity
  auth: none
  rate_limit: 600/min
tree:
  start: validate_drugs
  nodes:
    validate_drugs:
      type: condition
      variable: drug1_name
      operator: is_not_null
      value: null
      true_next: check_contraindication
      false_next: severity_unknown
    check_contraindication:
      type: condition
      variable: is_contraindicated
      operator: eq
      value: true
      true_next: contraindicated
      false_next: check_major
    check_major:
      type: condition
      variable: interaction_severity_level
      operator: eq
      value: major
      true_next: major_interaction
      false_next: check_moderate
    check_moderate:
      type: condition
      variable: interaction_severity_level
      operator: eq
      value: moderate
      true_next: moderate_interaction
      false_next: minor_interaction
    contraindicated:
      type: return
      value:
        severity_category: contraindicated
        severity_score: 4
        clinical_significance: contraindicated_combination
        action_required: true
        interaction_compliant: true
    major_interaction:
      type: return
      value:
        severity_category: major
        severity_score: 3
        clinical_significance: significant_clinical_effect
        action_required: true
        interaction_compliant: true
    moderate_interaction:
      type: return
      value:
        severity_category: moderate
        severity_score: 2
        clinical_significance: moderate_clinical_effect
        action_required: false
        interaction_compliant: true
    minor_interaction:
      type: return
      value:
        severity_category: minor
        severity_score: 1
        clinical_significance: minimal_clinical_effect
        action_required: false
        interaction_compliant: true
    severity_unknown:
      type: return
      value:
        severity_category: unknown
        severity_score: null
        clinical_significance: null
        action_required: null
        interaction_compliant: false
tests:
  - input:
      drug1_name: warfarin
      is_contraindicated: true
    expect:
      severity_category: contraindicated
      severity_score: 4
      action_required: true
  - input:
      drug1_name: simvastatin
      interaction_severity_level: major
    expect:
      severity_category: major
      severity_score: 3
  - input:
      drug1_name: metformin
      interaction_severity_level: moderate
    expect:
      severity_category: moderate
      severity_score: 2
  - input:
      drug1_name: ibuprofen
      interaction_severity_level: minor
    expect:
      severity_category: minor
  - input: {}
    expect:
      severity_category: unknown
      interaction_compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
