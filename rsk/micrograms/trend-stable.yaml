name: trend-stable
description: Signal reports stable
version: 0.1.0
tree:
  start: check
  nodes:
    detected:
      type: return
      value:
        action: investigate
        pattern: stable
        detected: true
    not_detected:
      type: return
      value:
        action: continue_monitoring
        pattern: stable
        detected: false
    check:
      type: condition
      variable: trend_slope
      operator: eq
      value: 0
      true_next: detected
      false_next: not_detected
tests:
- input:
    trend_slope: 0
  expect:
    pattern: stable
    detected: true
- input: {}
  expect:
    pattern: stable
    detected: false
- input:
    trend_slope: -1
  expect:
    action: continue_monitoring
    pattern: stable
    detected: false
- input:
    trend_slope: -1
  expect:
    detected: false
    action: continue_monitoring
    pattern: stable
- input:
    trend_slope: 1
  expect:
    pattern: stable
    action: continue_monitoring
    detected: false
- input:
    trend_slope: 0
  expect:
    detected: true
    pattern: stable
    action: investigate
interface: null
primitive_signature: null
