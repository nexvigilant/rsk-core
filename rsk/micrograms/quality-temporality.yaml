name: quality-temporality
description: "Temporal info present"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "dates_provided"
      operator: "eq"
      value: true
      true_next: "pass"
      false_next: "fail"
    pass:
      type: "return"
      value:
        check: "quality-temporality"
        passed: true
        action: "accept"
    fail:
      type: "return"
      value:
        check: "quality-temporality"
        passed: false
        action: "flag_for_review"

tests:
  - input: {"dates_provided": true}
    expect: {"check": "quality-temporality", "passed": true}
  - input: {}
    expect: {"check": "quality-temporality", "passed": false}
