# MICROGRAM++ (upgraded 2026-04-23)
name: age-adolescent
version: 0.1.0
description: Adolescent age classifier. Identifies subjects aged 7-17 years.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Age Adolescent
  subtitle: Adolescent age classifier. Identifies subjects aged 7-17 years.
  icon: circle
  route: /vigilance/mg/age-adolescent
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/age-adolescent
  cli: rsk mcg run age-adolescent
  auth: none
  rate_limit: 600/min
tree:
  start: check_lower_bound
  nodes:
    check_lower_bound:
      type: condition
      variable: age_years
      operator: gte
      value: 7
      true_next: check_upper_bound
      false_next: not_adolescent
    check_upper_bound:
      type: condition
      variable: age_years
      operator: lte
      value: 17
      true_next: is_adolescent
      false_next: not_adolescent
    is_adolescent:
      type: return
      value:
        age_group: adolescent
        age_range: 7-17 years
        developmental_stage: puberty
        special_monitoring: psychiatric_monitoring
    not_adolescent:
      type: return
      value:
        age_group: other
        is_adolescent: false
tests:
  - input:
      age_years: 12
    expect:
      age_group: adolescent
      developmental_stage: puberty
  - input:
      age_years: 7
    expect:
      age_group: adolescent
  - input:
      age_years: 17
    expect:
      age_group: adolescent
  - input:
      age_years: 18
    expect:
      age_group: other
      is_adolescent: false
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
