# MICROGRAM++ (upgraded 2026-04-23)
name: expectedness-check
version: 0.2.0
description: "ICH E2A expectedness classification with severity dimension: EXPECTED_LISTED, EXPECTED_CLASS, UNEXPECTED_SEVERITY, or UNEXPECTED_NATURE"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: event_class_in_label
    type: bool
    required: false
    description: ""
  - name: event_in_label
    type: bool
    required: false
    description: ""
  - name: severity_in_label
    type: bool
    required: false
    description: ""
outputs:
  - name: description
    type: string
  - name: expectedness
    type: string
  - name: regulatory_impact
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    event_class_in_label:
      type: bool
      required: false
    event_in_label:
      type: bool
      required: false
    severity_in_label:
      type: bool
      required: false
  outputs:
    description:
      type: string
    expectedness:
      type: string
    regulatory_impact:
      type: string
    regulatory_reference:
      type: string
ui:
  title: Expectedness Check
  subtitle: "ICH E2A expectedness classification with severity dimension: EXPECTED_LISTED, EXPECTED_CLASS, UNEXPECTED_SEVERITY, or UNEXPECTED_NATURE"
  icon: circle
  route: /vigilance/mg/expectedness-check
  steps:
    - field: event_class_in_label
      label: event class in label
      help: Enter event_class_in_label
      widget: toggle
      placeholder: null
    - field: event_in_label
      label: event in label
      help: Enter event_in_label
      widget: toggle
      placeholder: null
    - field: severity_in_label
      label: severity in label
      help: Enter severity_in_label
      widget: toggle
      placeholder: null
  result:
    template: "description: {{description}} — expectedness: {{expectedness}} — regulatory_impact: {{regulatory_impact}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/expectedness-check
  cli: rsk mcg run expectedness-check
  auth: none
  rate_limit: 600/min
tree:
  start: check_event_listed
  nodes:
    check_event_listed:
      type: condition
      variable: event_in_label
      operator: eq
      value: true
      true_next: check_severity_listed
      false_next: check_class_listed
    check_severity_listed:
      type: condition
      variable: severity_in_label
      operator: eq
      value: true
      true_next: expected_listed
      false_next: unexpected_severity
    check_class_listed:
      type: condition
      variable: event_class_in_label
      operator: eq
      value: true
      true_next: expected_class
      false_next: unexpected_nature
    expected_listed:
      type: return
      value:
        expectedness: EXPECTED_LISTED
        description: Specific adverse event and its observed severity are listed in product labeling
        regulatory_impact: Periodic reporting only - no expedited submission required
        regulatory_reference: ICH E2A Section II.C
    unexpected_severity:
      type: return
      value:
        expectedness: UNEXPECTED_SEVERITY
        description: Adverse event nature is listed but observed severity exceeds labeling
        regulatory_impact: Expedited reporting required - event unexpected by severity per ICH E2A
        regulatory_reference: ICH E2A Section II.C
    expected_class:
      type: return
      value:
        expectedness: EXPECTED_CLASS
        description: Event class is labeled but specific event not listed - borderline expectedness
        regulatory_impact: Medical review required to confirm expectedness determination
        regulatory_reference: ICH E2A Section II.C
    unexpected_nature:
      type: return
      value:
        expectedness: UNEXPECTED_NATURE
        description: Adverse event not listed in product labeling - unexpected by nature
        regulatory_impact: Expedited reporting required if case is serious per ICH E2A
        regulatory_reference: ICH E2A Section II.C
tests:
  - input:
      event_in_label: true
      event_class_in_label: true
      severity_in_label: true
    expect:
      expectedness: EXPECTED_LISTED
      description: Specific adverse event and its observed severity are listed in product labeling
      regulatory_impact: Periodic reporting only - no expedited submission required
      regulatory_reference: ICH E2A Section II.C
  - input:
      event_in_label: true
      event_class_in_label: true
      severity_in_label: false
    expect:
      expectedness: UNEXPECTED_SEVERITY
      description: Adverse event nature is listed but observed severity exceeds labeling
      regulatory_impact: Expedited reporting required - event unexpected by severity per ICH E2A
      regulatory_reference: ICH E2A Section II.C
  - input:
      event_in_label: true
      event_class_in_label: false
      severity_in_label: true
    expect:
      expectedness: EXPECTED_LISTED
      description: Specific adverse event and its observed severity are listed in product labeling
      regulatory_impact: Periodic reporting only - no expedited submission required
      regulatory_reference: ICH E2A Section II.C
  - input:
      event_in_label: false
      event_class_in_label: true
      severity_in_label: false
    expect:
      expectedness: EXPECTED_CLASS
      description: Event class is labeled but specific event not listed - borderline expectedness
      regulatory_impact: Medical review required to confirm expectedness determination
      regulatory_reference: ICH E2A Section II.C
  - input:
      event_in_label: false
      event_class_in_label: false
      severity_in_label: false
    expect:
      expectedness: UNEXPECTED_NATURE
      description: Adverse event not listed in product labeling - unexpected by nature
      regulatory_impact: Expedited reporting required if case is serious per ICH E2A
      regulatory_reference: ICH E2A Section II.C
  - input: {}
    expect:
      expectedness: UNEXPECTED_NATURE
      description: Adverse event not listed in product labeling - unexpected by nature
      regulatory_impact: Expedited reporting required if case is serious per ICH E2A
      regulatory_reference: ICH E2A Section II.C
  - input:
      event_in_label: true
      event_class_in_label: false
    expect:
      expectedness: UNEXPECTED_SEVERITY
      description: Adverse event nature is listed but observed severity exceeds labeling
      regulatory_impact: Expedited reporting required - event unexpected by severity per ICH E2A
      regulatory_reference: ICH E2A Section II.C
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - description
    - expectedness
    - regulatory_impact
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
