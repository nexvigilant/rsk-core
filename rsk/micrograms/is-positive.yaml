name: is-positive
description: Check if a number is positive
version: 0.1.0
interface:
  inputs:
    n:
      type: int
      required: false
  outputs:
    positive:
      type: bool
tree:
  start: check
  nodes:
    yes:
      type: return
      value:
        positive: true
    check:
      type: condition
      variable: n
      operator: gt
      value: 0
      true_next: yes
      false_next: no
    no:
      type: return
      value:
        positive: false
tests:
- input:
    n: 5
  expect:
    positive: true
- input:
    n: -3
  expect:
    positive: false
- input:
    n: 0
  expect:
    positive: false
- input:
    n: -1
  expect:
    positive: false
- input:
    n: 1
  expect:
    positive: true
- input: {}
  expect:
    positive: false
