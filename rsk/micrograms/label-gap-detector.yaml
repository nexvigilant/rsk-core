# MICROGRAM++ (upgraded 2026-04-23)
name: label-gap-detector
version: 0.1.0
description: Detects when a FAERS signal exists for a drug-event pair but the event is NOT on the drug current label
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: signal_detected
    type: bool
    required: false
    description: ""
  - name: on_label
    type: bool
    required: false
    description: ""
  - name: prr
    type: float
    required: false
    description: ""
  - name: case_count
    type: int
    required: false
    description: ""
outputs:
  - name: gap_classification
    type: string
  - name: urgency
    type: string
  - name: recommended_action
    type: string
interface:
  inputs:
    signal_detected:
      type: bool
      required: false
    on_label:
      type: bool
      required: false
    prr:
      type: float
      required: false
    case_count:
      type: int
      required: false
  outputs:
    gap_classification:
      type: string
    urgency:
      type: string
    recommended_action:
      type: string
ui:
  title: Label Gap Detector
  subtitle: Detects when a FAERS signal exists for a drug-event pair but the event is NOT on the drug current label
  icon: circle
  route: /vigilance/mg/label-gap-detector
  steps:
    - field: signal_detected
      label: signal detected
      help: Enter signal_detected
      widget: toggle
      placeholder: null
    - field: on_label
      label: on label
      help: Enter on_label
      widget: toggle
      placeholder: null
    - field: prr
      label: prr
      help: Enter prr
      widget: text
      placeholder: null
    - field: case_count
      label: case count
      help: Enter case_count
      widget: text
      placeholder: null
  result:
    template: "gap_classification: {{gap_classification}} — urgency: {{urgency}} — recommended_action: {{recommended_action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/label-gap-detector
  cli: rsk mcg run label-gap-detector
  auth: none
  rate_limit: 600/min
tree:
  start: check_signal
  nodes:
    check_signal:
      type: condition
      variable: signal_detected
      operator: eq
      value: true
      true_next: check_on_label
      false_next: no_gap
    check_on_label:
      type: condition
      variable: on_label
      operator: eq
      value: true
      true_next: already_labeled
      false_next: check_critical_prr
    check_critical_prr:
      type: condition
      variable: prr
      operator: gte
      value: 4
      true_next: check_critical_cases
      false_next: check_significant_prr
    check_critical_cases:
      type: condition
      variable: case_count
      operator: gte
      value: 10
      true_next: critical_gap
      false_next: check_significant_prr_from_critical
    check_significant_prr_from_critical:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: check_significant_cases_from_critical
      false_next: check_emerging_prr
    check_significant_cases_from_critical:
      type: condition
      variable: case_count
      operator: gte
      value: 5
      true_next: significant_gap
      false_next: check_emerging_prr
    check_significant_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: check_significant_cases
      false_next: check_emerging_prr
    check_significant_cases:
      type: condition
      variable: case_count
      operator: gte
      value: 5
      true_next: significant_gap
      false_next: check_emerging_prr
    check_emerging_prr:
      type: condition
      variable: prr
      operator: gte
      value: 1.5
      true_next: check_emerging_cases
      false_next: signal_but_weak
    check_emerging_cases:
      type: condition
      variable: case_count
      operator: gte
      value: 3
      true_next: emerging_gap
      false_next: signal_but_weak
    critical_gap:
      type: return
      value:
        gap_classification: critical_gap
        urgency: immediate
        recommended_action: Escalate to safety committee for urgent label update review
    significant_gap:
      type: return
      value:
        gap_classification: significant_gap
        urgency: high
        recommended_action: Initiate formal signal evaluation and label update assessment
    emerging_gap:
      type: return
      value:
        gap_classification: emerging_gap
        urgency: moderate
        recommended_action: Add to signal tracking list and schedule periodic review
    signal_but_weak:
      type: return
      value:
        gap_classification: no_gap
        urgency: low
        recommended_action: Signal too weak for label gap classification. Continue monitoring
    already_labeled:
      type: return
      value:
        gap_classification: no_gap
        urgency: none
        recommended_action: Event already on label. No label gap exists
    no_gap:
      type: return
      value:
        gap_classification: no_gap
        urgency: none
        recommended_action: No signal detected. No label gap assessment needed
tests:
  - input:
      signal_detected: true
      on_label: false
      prr: 6.5
      case_count: 25
    expect:
      gap_classification: critical_gap
      urgency: immediate
      recommended_action: Escalate to safety committee for urgent label update review
  - input:
      signal_detected: true
      on_label: false
      prr: 4
      case_count: 10
    expect:
      gap_classification: critical_gap
      urgency: immediate
      recommended_action: Escalate to safety committee for urgent label update review
  - input:
      signal_detected: true
      on_label: false
      prr: 2.8
      case_count: 8
    expect:
      gap_classification: significant_gap
      urgency: high
      recommended_action: Initiate formal signal evaluation and label update assessment
  - input:
      signal_detected: true
      on_label: false
      prr: 5
      case_count: 7
    expect:
      gap_classification: significant_gap
      urgency: high
      recommended_action: Initiate formal signal evaluation and label update assessment
  - input:
      signal_detected: true
      on_label: false
      prr: 1.8
      case_count: 4
    expect:
      gap_classification: emerging_gap
      urgency: moderate
      recommended_action: Add to signal tracking list and schedule periodic review
  - input:
      signal_detected: true
      on_label: false
      prr: 1.2
      case_count: 2
    expect:
      gap_classification: no_gap
      urgency: low
      recommended_action: Signal too weak for label gap classification. Continue monitoring
  - input:
      signal_detected: true
      on_label: true
      prr: 5
      case_count: 20
    expect:
      gap_classification: no_gap
      urgency: none
      recommended_action: Event already on label. No label gap exists
  - input:
      signal_detected: false
      on_label: false
      prr: 3
      case_count: 15
    expect:
      gap_classification: no_gap
      urgency: none
      recommended_action: No signal detected. No label gap assessment needed
  - input: {}
    expect:
      gap_classification: no_gap
      urgency: none
      recommended_action: No signal detected. No label gap assessment needed
  - input:
      signal_detected: true
      on_label: false
      prr: 2
      case_count: 5
    expect:
      gap_classification: significant_gap
      urgency: high
      recommended_action: Initiate formal signal evaluation and label update assessment
  - input:
      signal_detected: true
      on_label: false
      prr: 1.5
      case_count: 3
    expect:
      gap_classification: emerging_gap
      urgency: moderate
      recommended_action: Add to signal tracking list and schedule periodic review
  - input:
      signal_detected: true
      on_label: false
      prr: 3
      case_count: 2
    expect:
      gap_classification: no_gap
      urgency: low
      recommended_action: Signal too weak for label gap classification. Continue monitoring
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - gap_classification
    - urgency
    - recommended_action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
