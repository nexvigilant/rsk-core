name: causality-assessment-exercise
description: "Academy L2: Given a Naranjo score and WHO-UMC categorical inputs, validate dual causality assessment and provide learning feedback on agreement/disagreement between the two methods."
version: 0.1.0

primitive_signature:
  dominant: 'κ'
  expression: 'κ(→₁, →₂) — compares two independent causality assessments (Naranjo quantitative vs WHO-UMC categorical) to surface agreement and disagreement patterns'
  primes: ['κ', '→', 'ς', '∂']
  arguments: ['naranjo_score', 'temporal', 'dechallenge', 'rechallenge', 'alternatives']

interface:
  inputs:
    naranjo_score:
      type: int
      required: true
    temporal:
      type: string
      required: true
      description: "reasonable | unreasonable | unknown"
    dechallenge:
      type: string
      required: true
      description: "positive | negative | not_done | unknown"
    rechallenge:
      type: string
      required: true
      description: "positive | negative | not_done | unknown"
    alternatives:
      type: string
      required: true
      description: "unlikely | possible | unknown"
  outputs:
    naranjo_category:
      type: string
    who_umc_category:
      type: string
    agreement:
      type: string
    learning_note:
      type: string

tree:
  start: validate_naranjo
  nodes:
    validate_naranjo:
      type: condition
      variable: naranjo_score
      operator: is_null
      value: null
      true_next: reject_missing
      false_next: classify_naranjo

    reject_missing:
      type: return
      value:
        naranjo_category: REJECTED
        who_umc_category: REJECTED
        agreement: N/A
        learning_note: "Both Naranjo score and WHO-UMC inputs are required for dual assessment comparison."

    classify_naranjo:
      type: condition
      variable: naranjo_score
      operator: gte
      value: 9
      true_next: naranjo_definite
      false_next: check_probable

    naranjo_definite:
      type: condition
      variable: temporal
      operator: eq
      value: "reasonable"
      true_next: definite_certain_check
      false_next: definite_disagree

    definite_certain_check:
      type: condition
      variable: rechallenge
      operator: eq
      value: "positive"
      true_next: both_highest
      false_next: definite_probable_match

    both_highest:
      type: return
      value:
        naranjo_category: Definite
        who_umc_category: Certain
        agreement: STRONG_AGREEMENT
        learning_note: "Both methods agree on the highest causality category. Naranjo Definite (>=9) aligns with WHO-UMC Certain (temporal + dechallenge + rechallenge + no alternatives). This is the strongest possible evidence of drug causality."

    definite_probable_match:
      type: return
      value:
        naranjo_category: Definite
        who_umc_category: Probable/Likely
        agreement: PARTIAL_AGREEMENT
        learning_note: "Naranjo scores Definite but WHO-UMC gives Probable (no positive rechallenge). The quantitative Naranjo can reach 9+ without rechallenge if other questions score high. This shows why dual assessment catches nuances a single method misses."

    definite_disagree:
      type: return
      value:
        naranjo_category: Definite
        who_umc_category: Unlikely
        agreement: DISAGREEMENT
        learning_note: "Naranjo Definite but WHO-UMC categorizes as Unlikely due to unreasonable temporal relationship. This disagreement flags a potential scoring error — review Q2 (temporal sequence). High Naranjo scores with poor temporality warrant re-evaluation."

    check_probable:
      type: condition
      variable: naranjo_score
      operator: gte
      value: 5
      true_next: naranjo_probable
      false_next: check_possible

    naranjo_probable:
      type: condition
      variable: dechallenge
      operator: eq
      value: "positive"
      true_next: probable_agree
      false_next: probable_partial

    probable_agree:
      type: condition
      variable: alternatives
      operator: eq
      value: "unlikely"
      true_next: probable_strong
      false_next: probable_possible_who

    probable_strong:
      type: return
      value:
        naranjo_category: Probable
        who_umc_category: Probable/Likely
        agreement: STRONG_AGREEMENT
        learning_note: "Both methods agree: Probable causality. Positive dechallenge and no plausible alternatives support the drug-event relationship. In regulatory practice, this triggers expedited reporting for serious cases."

    probable_possible_who:
      type: return
      value:
        naranjo_category: Probable
        who_umc_category: Possible
        agreement: PARTIAL_AGREEMENT
        learning_note: "Naranjo Probable but WHO-UMC downgrades to Possible because alternative causes exist. WHO-UMC weighs alternative explanations more heavily. Consider whether the alternatives were adequately investigated."

    probable_partial:
      type: return
      value:
        naranjo_category: Probable
        who_umc_category: Possible
        agreement: PARTIAL_AGREEMENT
        learning_note: "Naranjo Probable but WHO-UMC Possible — dechallenge was not positive. WHO-UMC requires positive dechallenge for Probable. Quantitative scoring (Naranjo) can compensate for missing dechallenge with other strong evidence."

    check_possible:
      type: condition
      variable: naranjo_score
      operator: gte
      value: 1
      true_next: naranjo_possible
      false_next: naranjo_doubtful

    naranjo_possible:
      type: condition
      variable: temporal
      operator: eq
      value: "reasonable"
      true_next: possible_agree
      false_next: possible_disagree

    possible_agree:
      type: return
      value:
        naranjo_category: Possible
        who_umc_category: Possible
        agreement: AGREEMENT
        learning_note: "Both methods agree: Possible causality. The evidence is suggestive but not conclusive. Collect more information — especially dechallenge data and alternative cause investigation."

    possible_disagree:
      type: return
      value:
        naranjo_category: Possible
        who_umc_category: Unlikely
        agreement: DISAGREEMENT
        learning_note: "Naranjo scores Possible (1-4) but WHO-UMC says Unlikely because temporal relationship is not reasonable. Temporal plausibility is a threshold requirement for WHO-UMC. Naranjo can accumulate small positive scores without strong temporality."

    naranjo_doubtful:
      type: condition
      variable: temporal
      operator: eq
      value: "unreasonable"
      true_next: doubtful_unlikely
      false_next: doubtful_unknown

    doubtful_unlikely:
      type: return
      value:
        naranjo_category: Doubtful
        who_umc_category: Unlikely
        agreement: STRONG_AGREEMENT
        learning_note: "Both methods agree: causality is doubtful/unlikely. The low Naranjo score (<=0) and unreasonable temporal relationship both point away from drug causality. Document this clearly in the case narrative."

    doubtful_unknown:
      type: return
      value:
        naranjo_category: Doubtful
        who_umc_category: Unassessable
        agreement: AGREEMENT
        learning_note: "Low Naranjo (<=0) and insufficient WHO-UMC data. Both methods indicate the case lacks sufficient evidence for causality assessment. Priority: gather more clinical information before re-assessing."

tests:
  - name: "Perfect agreement — Definite/Certain"
    input: { naranjo_score: 10, temporal: "reasonable", dechallenge: "positive", rechallenge: "positive", alternatives: "unlikely" }
    expect: { agreement: STRONG_AGREEMENT, naranjo_category: Definite, who_umc_category: Certain }

  - name: "High Naranjo but no rechallenge — Definite/Probable"
    input: { naranjo_score: 9, temporal: "reasonable", dechallenge: "positive", rechallenge: "not_done", alternatives: "unlikely" }
    expect: { agreement: PARTIAL_AGREEMENT, naranjo_category: Definite }

  - name: "Probable agreement — strong case"
    input: { naranjo_score: 7, temporal: "reasonable", dechallenge: "positive", rechallenge: "not_done", alternatives: "unlikely" }
    expect: { agreement: STRONG_AGREEMENT, naranjo_category: Probable, who_umc_category: "Probable/Likely" }

  - name: "Probable/Possible split — alternatives exist"
    input: { naranjo_score: 6, temporal: "reasonable", dechallenge: "positive", rechallenge: "not_done", alternatives: "possible" }
    expect: { agreement: PARTIAL_AGREEMENT, naranjo_category: Probable, who_umc_category: Possible }

  - name: "Possible agreement"
    input: { naranjo_score: 3, temporal: "reasonable", dechallenge: "unknown", rechallenge: "not_done", alternatives: "possible" }
    expect: { agreement: AGREEMENT, naranjo_category: Possible, who_umc_category: Possible }

  - name: "Possible/Unlikely disagreement — bad temporal"
    input: { naranjo_score: 2, temporal: "unreasonable", dechallenge: "unknown", rechallenge: "not_done", alternatives: "possible" }
    expect: { agreement: DISAGREEMENT, naranjo_category: Possible }

  - name: "Doubtful/Unlikely agreement"
    input: { naranjo_score: -1, temporal: "unreasonable", dechallenge: "negative", rechallenge: "not_done", alternatives: "possible" }
    expect: { agreement: STRONG_AGREEMENT, naranjo_category: Doubtful, who_umc_category: Unlikely }

  - name: "Doubtful/Unassessable — insufficient data"
    input: { naranjo_score: 0, temporal: "unknown", dechallenge: "unknown", rechallenge: "not_done", alternatives: "unknown" }
    expect: { agreement: AGREEMENT, naranjo_category: Doubtful, who_umc_category: Unassessable }

  - name: "Empty input — rejection"
    input: {}
    expect: { naranjo_category: REJECTED }
