# MICROGRAM++ (upgraded 2026-04-23)
name: signal-detection-exercise
version: 0.1.0
description: "Academy L2: Given pre-computed disproportionality metrics (PRR, chi-squared, case count), determine if Evans (2001) signal criteria are met: PRR >= 2.0, chi-squared >= 4.0, N >= 3."
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs: []
outputs: []
ui:
  title: Signal Detection Exercise
  subtitle: "Academy L2: Given pre-computed disproportionality metrics (PRR, chi-squared, case count), determine if Evans (2001) signal criteria are met: PRR >= 2.0, chi-squared >= 4.0, N >= 3."
  icon: activity
  route: /vigilance/mg/signal-detection-exercise
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/signal-detection-exercise
  cli: rsk mcg run signal-detection-exercise
  auth: none
  rate_limit: 600/min
tree:
  start: check_n
  nodes:
    check_n:
      type: condition
      variable: case_count
      operator: gte
      value: 3
      true_next: check_prr
      false_next: insufficient_cases
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: check_chi2
      false_next: no_signal
    check_chi2:
      type: condition
      variable: chi_squared
      operator: gte
      value: 4
      true_next: signal_detected
      false_next: no_signal
    signal_detected:
      type: return
      value:
        verdict: signal_detected
        explanation: "Evans criteria met: PRR >= 2.0, chi-squared >= 4.0, N >= 3. This drug-event pair warrants further investigation."
        next_step: Proceed to causality assessment (Naranjo or WHO-UMC)
    no_signal:
      type: return
      value:
        verdict: no_signal
        explanation: Evans criteria NOT met. PRR < 2.0 or chi-squared < 4.0. No disproportionality signal detected.
        next_step: Continue routine monitoring
    insufficient_cases:
      type: return
      value:
        verdict: insufficient_data
        explanation: Fewer than 3 cases. Cannot apply disproportionality analysis.
        next_step: Accumulate more reports before re-evaluating
tests:
  - name: Semaglutide pancreatitis — strong signal
    input:
      case_count: 2068
      prr: 6.93
      chi_squared: 10245.1
    expect:
      verdict: signal_detected
  - name: Liraglutide pancreatitis — very strong signal
    input:
      case_count: 3219
      prr: 17.39
      chi_squared: 47846.3
    expect:
      verdict: signal_detected
  - name: Metformin lactic acidosis — extreme signal
    input:
      case_count: 18417
      prr: 71.42
      chi_squared: 499469.5
    expect:
      verdict: signal_detected
  - name: Atorvastatin rhabdomyolysis — moderate signal
    input:
      case_count: 2226
      prr: 4.79
      chi_squared: 6312.6
    expect:
      verdict: signal_detected
  - name: Weak association — PRR below threshold
    input:
      case_count: 50
      prr: 1.2
      chi_squared: 2.1
    expect:
      verdict: no_signal
  - name: PRR above but chi2 below — no signal
    input:
      case_count: 5
      prr: 3.5
      chi_squared: 2.8
    expect:
      verdict: no_signal
  - name: Only 2 cases — insufficient
    input:
      case_count: 2
      prr: 8
      chi_squared: 15
    expect:
      verdict: insufficient_data
  - name: Borderline PRR exactly 2.0 — signal
    input:
      case_count: 100
      prr: 2
      chi_squared: 12.5
    expect:
      verdict: signal_detected
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
