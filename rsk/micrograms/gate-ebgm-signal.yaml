# MICROGRAM++ (upgraded 2026-04-23)
name: gate-ebgm-signal
version: 0.1.0
description: EB05 signal threshold
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs: []
outputs: []
ui:
  title: Gate Ebgm Signal
  subtitle: EB05 signal threshold
  icon: activity
  route: /vigilance/mg/gate-ebgm-signal
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-ebgm-signal
  cli: rsk mcg run gate-ebgm-signal
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: eb05
      operator: gte
      value: 2
      true_next: pass
      false_next: fail
    fail:
      type: return
      value:
        met: false
        threshold: eb05
        gate: false
    pass:
      type: return
      value:
        threshold: eb05
        met: true
        gate: true
tests:
  - input:
      eb05: 2
    expect:
      met: true
      gate: true
  - input: {}
    expect:
      gate: false
      met: false
  - input:
      eb05: 1.999
    expect:
      gate: false
      met: false
      threshold: eb05
  - input:
      eb05: 2.001
    expect:
      threshold: eb05
      met: true
      gate: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
