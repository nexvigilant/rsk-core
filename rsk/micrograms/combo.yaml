# MICROGRAM++ (upgraded 2026-04-23)
name: combo
version: 0.1.0
description: Positive or gate
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: n
    type: int
    required: false
    description: ""
  - name: value
    type: int
    required: false
    description: ""
outputs:
  - name: gate
    type: string
  - name: passed
    type: bool
  - name: positive
    type: bool
interface:
  inputs:
    n:
      type: int
      required: false
    value:
      type: int
      required: false
  outputs:
    gate:
      type: string
    passed:
      type: bool
    positive:
      type: bool
ui:
  title: Combo
  subtitle: Positive or gate
  icon: circle
  route: /vigilance/mg/combo
  steps:
    - field: n
      label: n
      help: Enter n
      widget: text
      placeholder: null
    - field: value
      label: value
      help: Enter value
      widget: text
      placeholder: null
  result:
    template: "gate: {{gate}} — passed: {{passed}} — positive: {{positive}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/combo
  cli: rsk mcg run combo
  auth: none
  rate_limit: 600/min
tree:
  start: dispatch
  nodes:
    dispatch:
      type: condition
      variable: n
      operator: is_not_null
      value: null
      true_next: a_check
      false_next: b_check
    a_yes:
      type: return
      value:
        positive: true
    b_fail:
      type: return
      value:
        passed: false
        gate: FAIL
    b_pass:
      type: return
      value:
        gate: PASS
        passed: true
    a_check:
      type: condition
      variable: n
      operator: gt
      value: 0
      true_next: a_yes
      false_next: a_no
    b_check:
      type: condition
      variable: value
      operator: gte
      value: 80
      true_next: b_pass
      false_next: b_fail
    a_no:
      type: return
      value:
        positive: false
tests:
  - input:
      n: 5
    expect:
      positive: true
  - input:
      n: -3
    expect:
      positive: false
  - input:
      n: 0
    expect:
      positive: false
  - input:
      value: 95
    expect:
      passed: true
      gate: PASS
  - input:
      value: 80
    expect:
      passed: true
      gate: PASS
  - input:
      value: 79
    expect:
      gate: FAIL
      passed: false
  - input:
      value: 0
    expect:
      passed: false
      gate: FAIL
  - input:
      n: -1
    expect:
      positive: false
  - input:
      n: 1
    expect:
      positive: true
  - input:
      value: -1
    expect:
      passed: false
      gate: FAIL
  - input:
      value: 81
    expect:
      gate: PASS
      passed: true
  - input:
      value: 8000
    expect:
      gate: PASS
      passed: true
  - input: {}
    expect:
      gate: FAIL
      passed: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - gate
    - passed
    - positive
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
