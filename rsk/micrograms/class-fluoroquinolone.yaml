name: class-fluoroquinolone
description: 'Fluoroquinolones class safety: Tendinopathy monitoring'
version: 0.1.0
tree:
  start: check
  nodes:
    safe:
      type: return
      value:
        drug_class: Fluoroquinolones
        action: continue
        alert: false
        concern: Tendinopathy
    alert:
      type: return
      value:
        action: class_effect_investigation
        concern: Tendinopathy
        drug_class: Fluoroquinolones
        alert: true
    check:
      type: condition
      variable: tendon_risk
      operator: gte
      value: 2
      true_next: alert
      false_next: safe
tests:
- input:
    tendon_risk: 2
  expect:
    alert: true
    drug_class: Fluoroquinolones
- input: {}
  expect:
    drug_class: Fluoroquinolones
    alert: false
- input:
    tendon_risk: 0
  expect:
    alert: false
    concern: Tendinopathy
    drug_class: Fluoroquinolones
    action: continue
- input:
    tendon_risk: -1
  expect:
    concern: Tendinopathy
    action: continue
    drug_class: Fluoroquinolones
    alert: false
- input:
    tendon_risk: 1
  expect:
    alert: false
    drug_class: Fluoroquinolones
    concern: Tendinopathy
    action: continue
- input:
    tendon_risk: 3
  expect:
    concern: Tendinopathy
    action: class_effect_investigation
    alert: true
    drug_class: Fluoroquinolones
- input:
    tendon_risk: 200
  expect:
    concern: Tendinopathy
    drug_class: Fluoroquinolones
    alert: true
    action: class_effect_investigation
interface: null
primitive_signature: null
