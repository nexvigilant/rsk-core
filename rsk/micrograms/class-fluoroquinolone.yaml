# MICROGRAM++ (upgraded 2026-04-23)
name: class-fluoroquinolone
version: 0.1.0
description: "Fluoroquinolones class safety: Tendinopathy monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Fluoroquinolone
  subtitle: "Fluoroquinolones class safety: Tendinopathy monitoring"
  icon: circle
  route: /vigilance/mg/class-fluoroquinolone
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-fluoroquinolone
  cli: rsk mcg run class-fluoroquinolone
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    safe:
      type: return
      value:
        drug_class: Fluoroquinolones
        action: continue
        alert: false
        concern: Tendinopathy
    alert:
      type: return
      value:
        action: class_effect_investigation
        concern: Tendinopathy
        drug_class: Fluoroquinolones
        alert: true
    check:
      type: condition
      variable: tendon_risk
      operator: gte
      value: 2
      true_next: alert
      false_next: safe
tests:
  - input:
      tendon_risk: 2
    expect:
      alert: true
      drug_class: Fluoroquinolones
  - input: {}
    expect:
      drug_class: Fluoroquinolones
      alert: false
  - input:
      tendon_risk: 0
    expect:
      alert: false
      concern: Tendinopathy
      drug_class: Fluoroquinolones
      action: continue
  - input:
      tendon_risk: -1
    expect:
      concern: Tendinopathy
      action: continue
      drug_class: Fluoroquinolones
      alert: false
  - input:
      tendon_risk: 1
    expect:
      alert: false
      drug_class: Fluoroquinolones
      concern: Tendinopathy
      action: continue
  - input:
      tendon_risk: 3
    expect:
      concern: Tendinopathy
      action: class_effect_investigation
      alert: true
      drug_class: Fluoroquinolones
  - input:
      tendon_risk: 200
    expect:
      concern: Tendinopathy
      drug_class: Fluoroquinolones
      alert: true
      action: class_effect_investigation
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
