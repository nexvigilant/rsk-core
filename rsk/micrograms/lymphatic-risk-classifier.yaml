# MICROGRAM++ (upgraded 2026-04-23)
name: lymphatic-risk-classifier
version: 0.1.0
description: "Lymphatic safety classifier: maps lymphoproliferative and haematologic adverse reactions to severity grades"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reaction_pt
    type: string
    required: true
    description: MedDRA preferred term for the haematologic/lymphatic reaction
outputs:
  - name: severity
    type: string
  - name: soc
    type: string
  - name: action
    type: string
interface:
  inputs:
    reaction_pt:
      type: string
      required: true
      description: MedDRA preferred term for the haematologic/lymphatic reaction
  outputs:
    severity:
      type: string
      description: critical | serious | moderate | mild
    soc:
      type: string
    action:
      type: string
ui:
  title: Lymphatic Risk Classifier
  subtitle: "Lymphatic safety classifier: maps lymphoproliferative and haematologic adverse reactions to severity grades"
  icon: circle
  route: /vigilance/mg/lymphatic-risk-classifier
  steps:
    - field: reaction_pt
      label: reaction pt
      help: MedDRA preferred term for the haematologic/lymphatic reaction
      widget: text
      placeholder: null
  result:
    template: "severity: {{severity}} — soc: {{soc}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/lymphatic-risk-classifier
  cli: rsk mcg run lymphatic-risk-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_lymphoma
  nodes:
    check_lymphoma:
      type: condition
      variable: reaction_pt
      operator: contains
      value: LYMPHOMA
      true_next: critical
      false_next: check_leukaemia
    check_leukaemia:
      type: condition
      variable: reaction_pt
      operator: contains
      value: LEUKAEMIA
      true_next: critical
      false_next: check_pancytopenia
    check_pancytopenia:
      type: condition
      variable: reaction_pt
      operator: contains
      value: PANCYTOPENIA
      true_next: serious
      false_next: check_agranulocytosis
    check_agranulocytosis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: AGRANULOCYTOSIS
      true_next: serious
      false_next: check_neutropenia
    check_neutropenia:
      type: condition
      variable: reaction_pt
      operator: contains
      value: NEUTROPENIA
      true_next: moderate
      false_next: check_lymphopenia
    check_lymphopenia:
      type: condition
      variable: reaction_pt
      operator: contains
      value: LYMPHOPENIA
      true_next: moderate
      false_next: mild
    critical:
      type: return
      value:
        severity: critical
        soc: Blood and lymphatic system disorders
        action: immediate_expedited_report
    serious:
      type: return
      value:
        severity: serious
        soc: Blood and lymphatic system disorders
        action: expedited_report
    moderate:
      type: return
      value:
        severity: moderate
        soc: Blood and lymphatic system disorders
        action: monitor_and_assess
    mild:
      type: return
      value:
        severity: mild
        soc: Blood and lymphatic system disorders
        action: routine_surveillance
tests:
  - name: lymphoma
    input:
      reaction_pt: B-CELL LYMPHOMA
    expect:
      severity: critical
  - name: leukaemia
    input:
      reaction_pt: ACUTE MYELOID LEUKAEMIA
    expect:
      severity: critical
  - name: pancytopenia
    input:
      reaction_pt: PANCYTOPENIA
    expect:
      severity: serious
  - name: agranulocytosis
    input:
      reaction_pt: AGRANULOCYTOSIS
    expect:
      severity: serious
  - name: neutropenia
    input:
      reaction_pt: FEBRILE NEUTROPENIA
    expect:
      severity: moderate
  - name: lymphopenia
    input:
      reaction_pt: LYMPHOPENIA
    expect:
      severity: moderate
  - name: mild_anaemia
    input:
      reaction_pt: ANAEMIA
    expect:
      severity: mild
  - name: null_safety
    input: {}
    expect:
      severity: mild
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - severity
    - soc
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
