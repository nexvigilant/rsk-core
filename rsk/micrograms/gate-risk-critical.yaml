# MICROGRAM++ (upgraded 2026-04-23)
name: gate-risk-critical
version: 0.1.0
description: Guardian critical risk
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Gate Risk Critical
  subtitle: Guardian critical risk
  icon: circle
  route: /vigilance/mg/gate-risk-critical
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-risk-critical
  cli: rsk mcg run gate-risk-critical
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        gate: false
        met: false
        threshold: risk_score
    pass:
      type: return
      value:
        gate: true
        met: true
        threshold: risk_score
    check:
      type: condition
      variable: risk_score
      operator: gte
      value: 8
      true_next: pass
      false_next: fail
tests:
  - input:
      risk_score: 8
    expect:
      met: true
      gate: true
  - input: {}
    expect:
      gate: false
      met: false
  - input:
      risk_score: 7.999
    expect:
      met: false
      gate: false
      threshold: risk_score
  - input:
      risk_score: 8.001
    expect:
      met: true
      threshold: risk_score
      gate: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
