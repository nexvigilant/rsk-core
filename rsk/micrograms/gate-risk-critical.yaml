name: gate-risk-critical
description: Guardian critical risk
version: 0.1.0
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        gate: false
        met: false
        threshold: risk_score
    pass:
      type: return
      value:
        gate: true
        met: true
        threshold: risk_score
    check:
      type: condition
      variable: risk_score
      operator: gte
      value: 8.0
      true_next: pass
      false_next: fail
tests:
- input:
    risk_score: 8.0
  expect:
    met: true
    gate: true
- input: {}
  expect:
    gate: false
    met: false
- input:
    risk_score: 7.999
  expect:
    met: false
    gate: false
    threshold: risk_score
- input:
    risk_score: 8.001
  expect:
    met: true
    threshold: risk_score
    gate: true
interface: null
primitive_signature: null
