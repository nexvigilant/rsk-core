name: drug-profile-ribociclib
description: 'Safety triage for ribociclib: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    no_signal:
      type: return
      value:
        drug: ribociclib
        signal: false
        action: monitor
        harm_type: B
        expected_prr: 5.6
    signal:
      type: return
      value:
        action: investigate
        drug: ribociclib
        expected_prr: 5.6
        harm_type: B
        signal: true
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 5.6
  expect:
    drug: ribociclib
    signal: true
- input:
    prr: 0.5
  expect:
    signal: false
    drug: ribociclib
- input: {}
  expect:
    drug: ribociclib
    signal: false
- input:
    prr: 4.999
  expect:
    action: monitor
    harm_type: B
    signal: false
    drug: ribociclib
    expected_prr: 5.6
- input:
    prr: 5.001
  expect:
    signal: true
    action: investigate
    expected_prr: 5.6
    harm_type: B
    drug: ribociclib
interface: null
primitive_signature: null
