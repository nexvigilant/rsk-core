name: ich-e9-gate
description: "ICH E9 compliance: Statistical Principles"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "stats_valid"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH E9"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH E9"
        compliant: false
        action: "remediate"
        gap: "stats_valid"

tests:
  - input: {"stats_valid": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
