# MICROGRAM++ (upgraded 2026-04-23)
name: gate-cases-large
version: 0.1.0
description: Large case volume
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Gate Cases Large
  subtitle: Large case volume
  icon: circle
  route: /vigilance/mg/gate-cases-large
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-cases-large
  cli: rsk mcg run gate-cases-large
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: case_count
      operator: gte
      value: 1000
      true_next: pass
      false_next: fail
    fail:
      type: return
      value:
        met: false
        gate: false
        threshold: case_count
    pass:
      type: return
      value:
        threshold: case_count
        met: true
        gate: true
tests:
  - input:
      case_count: 1000
    expect:
      gate: true
      met: true
  - input: {}
    expect:
      gate: false
      met: false
  - input:
      case_count: 0
    expect:
      met: false
      threshold: case_count
      gate: false
  - input:
      case_count: -1
    expect:
      threshold: case_count
      met: false
      gate: false
  - input:
      case_count: 999
    expect:
      threshold: case_count
      met: false
      gate: false
  - input:
      case_count: 1001
    expect:
      gate: true
      threshold: case_count
      met: true
  - input:
      case_count: 100000
    expect:
      gate: true
      threshold: case_count
      met: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
