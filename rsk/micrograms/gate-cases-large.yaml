name: gate-cases-large
description: Large case volume
version: 0.1.0
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: case_count
      operator: gte
      value: 1000
      true_next: pass
      false_next: fail
    fail:
      type: return
      value:
        met: false
        gate: false
        threshold: case_count
    pass:
      type: return
      value:
        threshold: case_count
        met: true
        gate: true
tests:
- input:
    case_count: 1000
  expect:
    gate: true
    met: true
- input: {}
  expect:
    gate: false
    met: false
- input:
    case_count: 0
  expect:
    met: false
    threshold: case_count
    gate: false
- input:
    case_count: -1
  expect:
    threshold: case_count
    met: false
    gate: false
- input:
    case_count: 999
  expect:
    threshold: case_count
    met: false
    gate: false
- input:
    case_count: 1001
  expect:
    gate: true
    threshold: case_count
    met: true
- input:
    case_count: 100000
  expect:
    gate: true
    threshold: case_count
    met: true
interface: null
primitive_signature: null
