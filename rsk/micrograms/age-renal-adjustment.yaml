# MICROGRAM++ (upgraded 2026-04-23)
name: age-renal-adjustment
version: 0.1.0
description: Age-based renal clearance adjustment. Estimates eGFR adjustment for elderly based on serum creatinine.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Age Renal Adjustment
  subtitle: Age-based renal clearance adjustment. Estimates eGFR adjustment for elderly based on serum creatinine.
  icon: circle
  route: /vigilance/mg/age-renal-adjustment
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/age-renal-adjustment
  cli: rsk mcg run age-renal-adjustment
  auth: none
  rate_limit: 600/min
tree:
  start: check_age_category
  nodes:
    check_age_category:
      type: condition
      variable: age_years
      operator: gte
      value: 65
      true_next: elderly_eGFR_adjustment
      false_next: adult_eGFR
    elderly_eGFR_adjustment:
      type: return
      value:
        age_group: elderly
        adjustment_needed: true
        notes: eGFR may overestimate renal function in elderly; use cystatin C confirmation if eGFR 45-60
    adult_eGFR:
      type: return
      value:
        age_group: adult
        adjustment_needed: false
        notes: Standard MDRD or CKD-EPI equation applies
tests:
  - input:
      age_years: 72
    expect:
      age_group: elderly
      adjustment_needed: true
  - input:
      age_years: 65
    expect:
      age_group: elderly
      adjustment_needed: true
  - input:
      age_years: 45
    expect:
      age_group: adult
      adjustment_needed: false
  - input:
      age_years: 30
    expect:
      age_group: adult
      adjustment_needed: false
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
