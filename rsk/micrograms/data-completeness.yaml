# MICROGRAM++ (upgraded 2026-04-23)
name: data-completeness
version: 0.1.0
description: "Assess data completeness: COMPLETE (>=95%), PARTIAL (>=70%), INSUFFICIENT (<70%)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: pct_filled
    type: int
    required: false
    description: ""
outputs:
  - name: completeness
    type: string
  - name: needs_enrichment
    type: bool
  - name: proceed
    type: bool
interface:
  inputs:
    pct_filled:
      type: int
      required: false
  outputs:
    completeness:
      type: string
    needs_enrichment:
      type: bool
    proceed:
      type: bool
ui:
  title: Data Completeness
  subtitle: "Assess data completeness: COMPLETE (>=95%), PARTIAL (>=70%), INSUFFICIENT (<70%)"
  icon: circle
  route: /vigilance/mg/data-completeness
  steps:
    - field: pct_filled
      label: pct filled
      help: Enter pct_filled
      widget: text
      placeholder: null
  result:
    template: "completeness: {{completeness}} — needs_enrichment: {{needs_enrichment}} — proceed: {{proceed}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/data-completeness
  cli: rsk mcg run data-completeness
  auth: none
  rate_limit: 600/min
tree:
  start: complete_check
  nodes:
    partial_check:
      type: condition
      variable: pct_filled
      operator: gte
      value: 70
      true_next: partial
      false_next: insufficient
    complete_check:
      type: condition
      variable: pct_filled
      operator: gte
      value: 95
      true_next: complete
      false_next: partial_check
    insufficient:
      type: return
      value:
        proceed: false
        completeness: INSUFFICIENT
        needs_enrichment: true
    complete:
      type: return
      value:
        completeness: COMPLETE
        proceed: true
        needs_enrichment: false
    partial:
      type: return
      value:
        completeness: PARTIAL
        proceed: true
        needs_enrichment: true
tests:
  - input:
      pct_filled: 98
    expect:
      proceed: true
      completeness: COMPLETE
      needs_enrichment: false
  - input:
      pct_filled: 80
    expect:
      completeness: PARTIAL
      needs_enrichment: true
      proceed: true
  - input:
      pct_filled: 50
    expect:
      needs_enrichment: true
      proceed: false
      completeness: INSUFFICIENT
  - input:
      pct_filled: 95
    expect:
      completeness: COMPLETE
      proceed: true
      needs_enrichment: false
  - input:
      pct_filled: 70
    expect:
      completeness: PARTIAL
      proceed: true
      needs_enrichment: true
  - input:
      pct_filled: 69
    expect:
      needs_enrichment: true
      completeness: INSUFFICIENT
      proceed: false
  - input:
      pct_filled: 0
    expect:
      proceed: false
      completeness: INSUFFICIENT
      needs_enrichment: true
  - input:
      pct_filled: -1
    expect:
      completeness: INSUFFICIENT
      needs_enrichment: true
      proceed: false
  - input:
      pct_filled: 71
    expect:
      proceed: true
      completeness: PARTIAL
      needs_enrichment: true
  - input:
      pct_filled: 7000
    expect:
      needs_enrichment: false
      completeness: COMPLETE
      proceed: true
  - input: {}
    expect:
      proceed: false
      completeness: INSUFFICIENT
      needs_enrichment: true
  - input:
      pct_filled: 0
    expect:
      proceed: false
      completeness: INSUFFICIENT
      needs_enrichment: true
  - input:
      pct_filled: -1
    expect:
      needs_enrichment: true
      completeness: INSUFFICIENT
      proceed: false
  - input:
      pct_filled: 94
    expect:
      completeness: PARTIAL
      proceed: true
      needs_enrichment: true
  - input:
      pct_filled: 96
    expect:
      proceed: true
      needs_enrichment: false
      completeness: COMPLETE
  - input:
      pct_filled: 9500
    expect:
      needs_enrichment: false
      completeness: COMPLETE
      proceed: true
  - input: {}
    expect:
      proceed: false
      needs_enrichment: true
      completeness: INSUFFICIENT
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - completeness
    - needs_enrichment
    - proceed
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
