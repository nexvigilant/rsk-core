# MICROGRAM++ (upgraded 2026-04-23)
name: staleness-count-drift
version: 0.3.0
description: |
  Clasifica la deriva de conteo como OK o DRIFTED. Caller pre-computes: exceeded = (abs(actual - claimed) > threshold). Microgram classifies the boolean result. Simplest possible interface — caller does math, microgram does classification.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: exceeded
    type: bool
    required: true
    description: true if abs(actual - claimed) > threshold, false otherwise. Caller computes.
  - name: surface_name
    type: string
    required: false
    description: Name of the surface being checked
outputs:
  - name: status
    type: string
  - name: action
    type: string
interface:
  inputs:
    exceeded:
      type: bool
      required: true
      description: true if abs(actual - claimed) > threshold, false otherwise. Caller computes.
    surface_name:
      type: string
      required: false
      description: Name of the surface being checked
  outputs:
    status:
      type: string
      description: OK | DRIFTED | REJECTED
    action:
      type: string
ui:
  title: Staleness Count Drift
  subtitle: |
    Clasifica la deriva de conteo como OK o DRIFTED. Caller pre-computes: exceeded = (abs(actual - claimed) > threshold). Microgram classifies the boolean result. Simplest possible interface — caller does math, microgram does classification.
  icon: circle
  route: /vigilance/mg/staleness-count-drift
  steps:
    - field: exceeded
      label: exceeded
      help: true if abs(actual - claimed) > threshold, false otherwise. Caller computes.
      widget: toggle
      placeholder: null
    - field: surface_name
      label: surface name
      help: Name of the surface being checked
      widget: text
      placeholder: null
  result:
    template: "status: {{status}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/staleness-count-drift
  cli: rsk mcg run staleness-count-drift
  auth: none
  rate_limit: 600/min
tree:
  start: check_exceeded_present
  nodes:
    check_exceeded_present:
      type: condition
      variable: exceeded
      operator: is_null
      value: null
      true_next: reject_missing
      false_next: check_drifted
    reject_missing:
      type: return
      value:
        status: REJECTED
        action: "REJECTED: exceeded is required (bool: did drift exceed threshold?)"
    check_drifted:
      type: condition
      variable: exceeded
      operator: eq
      value: true
      true_next: drifted
      false_next: ok
    ok:
      type: return
      value:
        status: OK
        action: Count within threshold — no update needed
    drifted:
      type: return
      value:
        status: DRIFTED
        action: Count drift exceeds threshold — update MEMORY.md or investigate
tests:
  - input:
      exceeded: false
      surface_name: skills
    expect:
      status: OK
  - input:
      exceeded: true
      surface_name: skills
    expect:
      status: DRIFTED
  - input:
      exceeded: false
      surface_name: station_configs
    expect:
      status: OK
  - input:
      exceeded: true
      surface_name: agents
    expect:
      status: DRIFTED
  - input: {}
    expect:
      status: REJECTED
  - input:
      exceeded: false
    expect:
      status: OK
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - status
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
