    at_risk: true
    population: pediatric-adolescent
    action: special_monitoring
    reason: Adolescent safety — growth plate risk
- input:
    age_years: 16
  expect:
    action: special_monitoring
    population: pediatric-adolescent
    at_risk: true
    reason: Adolescent safety — growth plate risk
- input:
    age_years: 18
  expect:
    population: pediatric-adolescent
    action: standard_care
