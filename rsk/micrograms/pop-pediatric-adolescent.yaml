# MICROGRAM++ (upgraded 2026-04-23)
name: pop-pediatric-adolescent
version: 0.1.0
description: Adolescent safety — growth plate risk
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Pop Pediatric Adolescent
  subtitle: Adolescent safety — growth plate risk
  icon: circle
  route: /vigilance/mg/pop-pediatric-adolescent
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pop-pediatric-adolescent
  cli: rsk mcg run pop-pediatric-adolescent
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: age_years
      operator: lte
      value: 17
      true_next: at_risk
      false_next: standard
    standard:
      type: return
      value:
        action: standard_care
        at_risk: false
        population: pediatric-adolescent
    at_risk:
      type: return
      value:
        action: special_monitoring
        population: pediatric-adolescent
        at_risk: true
        reason: Adolescent safety — growth plate risk
tests:
  - input:
      age_years: 17
    expect:
      at_risk: true
      population: pediatric-adolescent
  - input: {}
    expect:
      at_risk: false
      population: pediatric-adolescent
  - input:
      age_years: 0
    expect:
      at_risk: true
      action: special_monitoring
      population: pediatric-adolescent
      reason: Adolescent safety — growth plate risk
  - input:
      age_years: -1
    expect:
      at_risk: true
      population: pediatric-adolescent
      action: special_monitoring
      reason: Adolescent safety — growth plate risk
  - input:
      age_years: 16
    expect:
      action: special_monitoring
      population: pediatric-adolescent
      at_risk: true
      reason: Adolescent safety — growth plate risk
  - input:
      age_years: 18
    expect:
      population: pediatric-adolescent
      action: standard_care
      at_risk: false
  - input:
      age_years: 1700
    expect:
      at_risk: false
      action: standard_care
      population: pediatric-adolescent
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
