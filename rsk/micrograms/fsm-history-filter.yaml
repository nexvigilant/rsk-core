# MICROGRAM++ (upgraded 2026-04-23)
name: fsm-history-filter
version: 0.1.0
description: "PVOS FSM history: filters state machine transition history relevance based on transition count and recency - ACTIVE/STALE/ARCHIVED"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: days_since_last
    type: int
    required: false
    description: ""
  - name: transitions_count
    type: int
    required: false
    description: ""
outputs:
  - name: description
    type: string
  - name: relevance
    type: string
interface:
  inputs:
    days_since_last:
      type: int
      required: false
    transitions_count:
      type: int
      required: false
  outputs:
    description:
      type: string
    relevance:
      type: string
ui:
  title: Fsm History Filter
  subtitle: "PVOS FSM history: filters state machine transition history relevance based on transition count and recency - ACTIVE/STALE/ARCHIVED"
  icon: circle
  route: /vigilance/mg/fsm-history-filter
  steps:
    - field: days_since_last
      label: days since last
      help: Enter days_since_last
      widget: text
      placeholder: null
    - field: transitions_count
      label: transitions count
      help: Enter transitions_count
      widget: text
      placeholder: null
  result:
    template: "description: {{description}} — relevance: {{relevance}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/fsm-history-filter
  cli: rsk mcg run fsm-history-filter
  auth: none
  rate_limit: 600/min
tree:
  start: check_active
  nodes:
    check_active:
      type: condition
      variable: days_since_last
      operator: lte
      value: 7
      true_next: active
      false_next: check_stale
    check_stale:
      type: condition
      variable: days_since_last
      operator: lte
      value: 30
      true_next: check_stale_count
      false_next: archived
    check_stale_count:
      type: condition
      variable: transitions_count
      operator: gte
      value: 1
      true_next: stale
      false_next: archived
    active:
      type: return
      value:
        relevance: ACTIVE
        description: Recent FSM activity within 7 days - history is current and actionable
    stale:
      type: return
      value:
        relevance: STALE
        description: FSM last updated 8-30 days ago - history may need refresh or follow-up
    archived:
      type: return
      value:
        relevance: ARCHIVED
        description: FSM inactive for more than 30 days - history archived for audit purposes
tests:
  - input:
      transitions_count: 5
      days_since_last: 3
    expect:
      relevance: ACTIVE
      description: Recent FSM activity within 7 days - history is current and actionable
  - input:
      transitions_count: 3
      days_since_last: 15
    expect:
      relevance: STALE
      description: FSM last updated 8-30 days ago - history may need refresh or follow-up
  - input:
      transitions_count: 2
      days_since_last: 45
    expect:
      relevance: ARCHIVED
      description: FSM inactive for more than 30 days - history archived for audit purposes
  - input:
      transitions_count: 0
      days_since_last: 20
    expect:
      relevance: ARCHIVED
      description: FSM inactive for more than 30 days - history archived for audit purposes
  - input: {}
    expect:
      description: FSM inactive for more than 30 days - history archived for audit purposes
      relevance: ARCHIVED
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - description
    - relevance
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
