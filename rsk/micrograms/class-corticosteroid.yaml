# MICROGRAM++ (upgraded 2026-04-23)
name: class-corticosteroid
version: 0.1.0
description: "Corticosteroids class safety: Adrenal suppression monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Corticosteroid
  subtitle: "Corticosteroids class safety: Adrenal suppression monitoring"
  icon: circle
  route: /vigilance/mg/class-corticosteroid
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-corticosteroid
  cli: rsk mcg run class-corticosteroid
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    safe:
      type: return
      value:
        concern: Adrenal suppression
        action: continue
        drug_class: Corticosteroids
        alert: false
    alert:
      type: return
      value:
        concern: Adrenal suppression
        alert: true
        drug_class: Corticosteroids
        action: class_effect_investigation
    check:
      type: condition
      variable: duration_days
      operator: gte
      value: 30
      true_next: alert
      false_next: safe
tests:
  - input:
      duration_days: 30
    expect:
      alert: true
      drug_class: Corticosteroids
  - input: {}
    expect:
      alert: false
      drug_class: Corticosteroids
  - input:
      duration_days: 0
    expect:
      alert: false
      action: continue
      drug_class: Corticosteroids
      concern: Adrenal suppression
  - input:
      duration_days: -1
    expect:
      action: continue
      alert: false
      concern: Adrenal suppression
      drug_class: Corticosteroids
  - input:
      duration_days: 29
    expect:
      concern: Adrenal suppression
      alert: false
      action: continue
      drug_class: Corticosteroids
  - input:
      duration_days: 31
    expect:
      action: class_effect_investigation
      concern: Adrenal suppression
      drug_class: Corticosteroids
      alert: true
  - input:
      duration_days: 3000
    expect:
      concern: Adrenal suppression
      drug_class: Corticosteroids
      alert: true
      action: class_effect_investigation
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
