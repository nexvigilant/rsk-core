# MICROGRAM++ (upgraded 2026-04-23)
name: class-ace-inhibitor
version: 0.1.0
description: "ACE inhibitors class safety: Hyperkalemia monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Ace Inhibitor
  subtitle: "ACE inhibitors class safety: Hyperkalemia monitoring"
  icon: circle
  route: /vigilance/mg/class-ace-inhibitor
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-ace-inhibitor
  cli: rsk mcg run class-ace-inhibitor
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    alert:
      type: return
      value:
        concern: Hyperkalemia
        drug_class: ACE inhibitors
        action: class_effect_investigation
        alert: true
    check:
      type: condition
      variable: potassium
      operator: gte
      value: 5.5
      true_next: alert
      false_next: safe
    safe:
      type: return
      value:
        action: continue
        drug_class: ACE inhibitors
        concern: Hyperkalemia
        alert: false
tests:
  - input:
      potassium: 5.5
    expect:
      drug_class: ACE inhibitors
      alert: true
  - input: {}
    expect:
      drug_class: ACE inhibitors
      alert: false
  - input:
      potassium: 5.499
    expect:
      drug_class: ACE inhibitors
      action: continue
      concern: Hyperkalemia
      alert: false
  - input:
      potassium: 5.501
    expect:
      action: class_effect_investigation
      drug_class: ACE inhibitors
      concern: Hyperkalemia
      alert: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
