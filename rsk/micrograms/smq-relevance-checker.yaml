# MICROGRAM++ (upgraded 2026-04-23)
name: smq-relevance-checker
version: 0.1.0
description: Check MedDRA SMQ relevance for an event term and estimate scope
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Smq Relevance Checker
  subtitle: Check MedDRA SMQ relevance for an event term and estimate scope
  icon: circle
  route: /vigilance/mg/smq-relevance-checker
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/smq-relevance-checker
  cli: rsk mcg run smq-relevance-checker
  auth: none
  rate_limit: 600/min
tree:
  start: validate_inputs
  nodes:
    check_smq_cardiac:
      type: condition
      variable: smq_name
      operator: matches
      value: (?i)(cardiac|heart|arrhythmia)
      true_next: relevant_narrow
      false_next: not_relevant
    check_smq_infection:
      type: condition
      variable: smq_name
      operator: matches
      value: (?i)(infection|sepsis|immunosuppression)
      true_next: relevant_broad
      false_next: not_relevant
    check_smq_neuro:
      type: condition
      variable: smq_name
      operator: matches
      value: (?i)(neuro|seizure|brain|stroke)
      true_next: relevant_narrow
      false_next: not_relevant
    relevant_broad:
      type: return
      value:
        likely_relevant: true
        scope: broad
        confidence: 0.7
    missing_input:
      type: return
      value:
        confidence: 0
        likely_relevant: false
        scope: null
    relevant_narrow:
      type: return
      value:
        confidence: 0.9
        likely_relevant: true
        scope: narrow
    not_relevant:
      type: return
      value:
        confidence: 0.8
        likely_relevant: false
        scope: none
    validate_inputs:
      type: condition
      variable: event_term
      operator: is_not_null
      value: null
      true_next: validate_smq
      false_next: missing_input
    check_neuro:
      type: condition
      variable: event_term
      operator: matches
      value: (?i)(seizure|stroke|neurological|brain)
      true_next: check_smq_neuro
      false_next: check_infection
    check_relevance:
      type: condition
      variable: event_term
      operator: matches
      value: (?i)(cardiac|heart|arrhythmia|infarction)
      true_next: check_smq_cardiac
      false_next: check_respiratory
    validate_smq:
      type: condition
      variable: smq_name
      operator: is_not_null
      value: null
      true_next: check_relevance
      false_next: missing_input
    check_respiratory:
      type: condition
      variable: event_term
      operator: matches
      value: (?i)(respiratory|asthma|pneumonia|dyspnea)
      true_next: check_smq_respiratory
      false_next: check_neuro
    check_smq_respiratory:
      type: condition
      variable: smq_name
      operator: matches
      value: (?i)(respiratory|asthma|lung|pneumonia)
      true_next: relevant_broad
      false_next: not_relevant
    check_infection:
      type: condition
      variable: event_term
      operator: matches
      value: (?i)(infection|sepsis|pneumonia|abscess)
      true_next: check_smq_infection
      false_next: not_relevant
tests:
  - input:
      event_term: ZZZZZ_NO_MATCH
      smq_name: ZZZZZ_NO_MATCH
    expect:
      confidence: 0.8
      likely_relevant: false
      scope: none
  - input:
      event_term: ZZZZZ_NO_MATCH
    expect:
      confidence: 0
      likely_relevant: false
      scope: null
  - input:
      event_term: cardiac
      smq_name: ZZZZZ_NO_MATCH
    expect:
      confidence: 0.8
      likely_relevant: false
      scope: none
  - input:
      event_term: cardiac
      smq_name: cardiac
    expect:
      confidence: 0.9
      likely_relevant: true
      scope: narrow
  - input:
      event_term: infection
      smq_name: ZZZZZ_NO_MATCH
    expect:
      confidence: 0.8
      likely_relevant: false
      scope: none
  - input:
      event_term: infection
      smq_name: infection
    expect:
      likely_relevant: true
      scope: broad
      confidence: 0.7
  - input:
      event_term: respiratory
      smq_name: ZZZZZ_NO_MATCH
    expect:
      confidence: 0.8
      likely_relevant: false
      scope: none
  - input:
      event_term: respiratory
      smq_name: respiratory
    expect:
      likely_relevant: true
      scope: broad
      confidence: 0.7
  - input:
      event_term: seizure
      smq_name: ZZZZZ_NO_MATCH
    expect:
      confidence: 0.8
      likely_relevant: false
      scope: none
  - input:
      event_term: seizure
      smq_name: neuro
    expect:
      confidence: 0.9
      likely_relevant: true
      scope: narrow
  - input:
      smq_name: ZZZZZ_NO_MATCH
    expect:
      confidence: 0
      likely_relevant: false
      scope: null
  - input: {}
    expect:
      confidence: 0
      likely_relevant: false
      scope: null
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
