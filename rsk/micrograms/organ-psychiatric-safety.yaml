# MICROGRAM++ (upgraded 2026-04-23)
name: organ-psychiatric-safety
version: 0.1.0
description: Psychiatric safety assessment. Evaluates suicide risk, psychosis, mood destabilization, and behavioral changes.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Organ Psychiatric Safety
  subtitle: Psychiatric safety assessment. Evaluates suicide risk, psychosis, mood destabilization, and behavioral changes.
  icon: circle
  route: /vigilance/mg/organ-psychiatric-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/organ-psychiatric-safety
  cli: rsk mcg run organ-psychiatric-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_suicidal_ideation
  nodes:
    check_suicidal_ideation:
      type: condition
      variable: has_active_suicidal_ideation
      operator: eq
      value: true
      true_next: suicide_alert
      false_next: check_psychosis_history
    suicide_alert:
      type: return
      value:
        organ: psychiatric
        risk_level: critical
        monitoring: intensive
        message: Active suicidal ideation; antidepressants require black box warning monitoring
    check_psychosis_history:
      type: condition
      variable: has_psychotic_disorder
      operator: eq
      value: true
      true_next: psychosis_alert
      false_next: check_mood_stability
    psychosis_alert:
      type: return
      value:
        organ: psychiatric
        risk_level: high
        psychosis_monitoring: required
        message: History of psychosis; psychotomimetic drugs contraindicated
    check_mood_stability:
      type: condition
      variable: has_bipolar_disorder
      operator: eq
      value: true
      true_next: bipolar_alert
      false_next: standard_dosing
    bipolar_alert:
      type: return
      value:
        organ: psychiatric
        risk_level: high
        mood_destabilization_risk: true
        mood_stabilizer_required: true
        message: Bipolar disorder; antidepressants without mood stabilizer risk mood destabilization
    standard_dosing:
      type: return
      value:
        organ: psychiatric
        risk_level: low
        psychiatric_assessment: recommended
tests:
  - input:
      has_active_suicidal_ideation: true
      has_psychotic_disorder: false
      has_bipolar_disorder: false
    expect:
      organ: psychiatric
      risk_level: critical
      monitoring: intensive
  - input:
      has_active_suicidal_ideation: false
      has_psychotic_disorder: true
      has_bipolar_disorder: false
    expect:
      organ: psychiatric
      risk_level: high
      psychosis_monitoring: required
  - input:
      has_active_suicidal_ideation: false
      has_psychotic_disorder: false
      has_bipolar_disorder: true
    expect:
      organ: psychiatric
      risk_level: high
      mood_destabilization_risk: true
  - input:
      has_active_suicidal_ideation: false
      has_psychotic_disorder: false
      has_bipolar_disorder: false
    expect:
      organ: psychiatric
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
