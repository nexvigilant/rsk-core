# MICROGRAM++ (upgraded 2026-04-23)
name: age-elderly
version: 0.1.0
description: Elderly age classifier. Identifies subjects aged 65-79 years.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Age Elderly
  subtitle: Elderly age classifier. Identifies subjects aged 65-79 years.
  icon: circle
  route: /vigilance/mg/age-elderly
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/age-elderly
  cli: rsk mcg run age-elderly
  auth: none
  rate_limit: 600/min
tree:
  start: check_lower_bound
  nodes:
    check_lower_bound:
      type: condition
      variable: age_years
      operator: gte
      value: 65
      true_next: check_upper_bound
      false_next: not_elderly
    check_upper_bound:
      type: condition
      variable: age_years
      operator: lte
      value: 79
      true_next: is_elderly
      false_next: not_elderly
    is_elderly:
      type: return
      value:
        age_group: elderly
        age_range: 65-79 years
        increased_sensitivity: true
        dose_adjustment: often_required
    not_elderly:
      type: return
      value:
        age_group: other
        is_elderly: false
tests:
  - input:
      age_years: 70
    expect:
      age_group: elderly
      increased_sensitivity: true
  - input:
      age_years: 65
    expect:
      age_group: elderly
  - input:
      age_years: 79
    expect:
      age_group: elderly
  - input:
      age_years: 80
    expect:
      age_group: other
      is_elderly: false
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
