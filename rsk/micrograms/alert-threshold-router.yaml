# MICROGRAM++ (upgraded 2026-04-23)
name: alert-threshold-router
version: 0.1.0
description: Route signal type + value to threshold action using Evans criteria and standard PV thresholds
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: signal_type
    type: string
    required: false
    description: ""
  - name: signal_value
    type: float
    required: false
    description: ""
outputs:
  - name: action
    type: string
  - name: next_step
    type: string
  - name: requires_review
    type: bool
interface:
  inputs:
    signal_type:
      type: string
      required: false
    signal_value:
      type: float
      required: false
  outputs:
    action:
      type: string
    next_step:
      type: string
    requires_review:
      type: bool
ui:
  title: Alert Threshold Router
  subtitle: Route signal type + value to threshold action using Evans criteria and standard PV thresholds
  icon: circle
  route: /vigilance/mg/alert-threshold-router
  steps:
    - field: signal_type
      label: signal type
      help: Enter signal_type
      widget: text
      placeholder: null
    - field: signal_value
      label: signal value
      help: Enter signal_value
      widget: text
      placeholder: null
  result:
    template: "action: {{action}} — next_step: {{next_step}} — requires_review: {{requires_review}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/alert-threshold-router
  cli: rsk mcg run alert-threshold-router
  auth: none
  rate_limit: 600/min
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: signal_type
      operator: eq
      value: PRR
      true_next: prr_threshold
      false_next: check_ror
    prr_threshold:
      type: condition
      variable: signal_value
      operator: gte
      value: 2
      true_next: alert
      false_next: monitor
    check_ror:
      type: condition
      variable: signal_type
      operator: eq
      value: ROR
      true_next: ror_threshold
      false_next: check_ic
    ror_threshold:
      type: condition
      variable: signal_value
      operator: gte
      value: 2.5
      true_next: alert
      false_next: monitor
    check_ic:
      type: condition
      variable: signal_type
      operator: eq
      value: IC
      true_next: ic_threshold
      false_next: monitor
    ic_threshold:
      type: condition
      variable: signal_value
      operator: gte
      value: 1
      true_next: alert
      false_next: monitor
    alert:
      type: return
      value:
        action: ALERT
        requires_review: true
        next_step: causality_assessment
    monitor:
      type: return
      value:
        action: MONITOR
        requires_review: false
        next_step: continue_surveillance
tests:
  - input:
      signal_type: PRR
      signal_value: 3.5
    expect:
      action: ALERT
      requires_review: true
      next_step: causality_assessment
  - input:
      signal_type: PRR
      signal_value: 1.5
    expect:
      action: MONITOR
      requires_review: false
      next_step: continue_surveillance
  - input:
      signal_type: ROR
      signal_value: 4
    expect:
      action: ALERT
      requires_review: true
      next_step: causality_assessment
  - input:
      signal_type: IC
      signal_value: 1.2
    expect:
      action: ALERT
      requires_review: true
      next_step: causality_assessment
  - input:
      signal_type: EBGM
      signal_value: 5
    expect:
      action: MONITOR
      requires_review: false
      next_step: continue_surveillance
  - input: {}
    expect:
      action: MONITOR
      next_step: continue_surveillance
      requires_review: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - action
    - next_step
    - requires_review
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
