# MICROGRAM++ (upgraded 2026-04-23)
name: e2d-postapproval-study-reporting
version: 0.1.0
description: "ICH E2D Section 4.3: Classifies post-approval study safety report type and determines whether IND-equivalent expedited reporting applies or periodic reporting suffices"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: study_type
    type: string
    required: false
    description: ""
  - name: is_interventional
    type: bool
    required: false
    description: ""
  - name: is_serious
    type: bool
    required: false
    description: ""
  - name: is_unexpected
    type: bool
    required: false
    description: ""
  - name: protocol_defined
    type: bool
    required: false
    description: ""
outputs:
  - name: reporting_pathway
    type: string
  - name: deadline_days
    type: int
  - name: expedited_required
    type: bool
  - name: regulatory_reference
    type: string
interface:
  inputs:
    study_type:
      type: string
      required: false
    is_interventional:
      type: bool
      required: false
    is_serious:
      type: bool
      required: false
    is_unexpected:
      type: bool
      required: false
    protocol_defined:
      type: bool
      required: false
  outputs:
    reporting_pathway:
      type: string
    deadline_days:
      type: int
    expedited_required:
      type: bool
    regulatory_reference:
      type: string
ui:
  title: E2d Postapproval Study Reporting
  subtitle: "ICH E2D Section 4.3: Classifies post-approval study safety report type and determines whether IND-equivalent expedited reporting applies or periodic reporting suffices"
  icon: circle
  route: /vigilance/mg/e2d-postapproval-study-reporting
  steps:
    - field: study_type
      label: study type
      help: Enter study_type
      widget: text
      placeholder: null
    - field: is_interventional
      label: is interventional
      help: Enter is_interventional
      widget: toggle
      placeholder: null
    - field: is_serious
      label: is serious
      help: Enter is_serious
      widget: toggle
      placeholder: null
    - field: is_unexpected
      label: is unexpected
      help: Enter is_unexpected
      widget: toggle
      placeholder: null
    - field: protocol_defined
      label: protocol defined
      help: Enter protocol_defined
      widget: toggle
      placeholder: null
  result:
    template: "reporting_pathway: {{reporting_pathway}} — deadline_days: {{deadline_days}} — expedited_required: {{expedited_required}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2d-postapproval-study-reporting
  cli: rsk mcg run e2d-postapproval-study-reporting
  auth: none
  rate_limit: 600/min
tree:
  start: check_interventional
  nodes:
    check_interventional:
      type: condition
      variable: is_interventional
      operator: eq
      value: true
      true_next: check_serious_interventional
      false_next: check_study_type_obs
    check_serious_interventional:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: check_unexpected_interventional
      false_next: return_periodic_interventional
    check_unexpected_interventional:
      type: condition
      variable: is_unexpected
      operator: eq
      value: true
      true_next: return_expedited_interventional
      false_next: return_periodic_interventional
    check_study_type_obs:
      type: condition
      variable: study_type
      operator: eq
      value: observational
      true_next: check_serious_obs
      false_next: check_registry
    check_serious_obs:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: check_unexpected_obs
      false_next: return_aggregate_obs
    check_unexpected_obs:
      type: condition
      variable: is_unexpected
      operator: eq
      value: true
      true_next: return_expedited_obs
      false_next: return_periodic_obs
    check_registry:
      type: condition
      variable: study_type
      operator: eq
      value: registry
      true_next: check_protocol_registry
      false_next: return_standard_periodic
    check_protocol_registry:
      type: condition
      variable: protocol_defined
      operator: eq
      value: true
      true_next: return_registry_protocol
      false_next: return_aggregate_obs
    return_expedited_interventional:
      type: return
      value:
        reporting_pathway: IND_EQUIVALENT_EXPEDITED
        deadline_days: 15
        expedited_required: true
        regulatory_reference: ICH E2D Section 4.3 - Post-Approval Study Safety Reporting
    return_periodic_interventional:
      type: return
      value:
        reporting_pathway: DSUR_PERIODIC
        deadline_days: 365
        expedited_required: false
        regulatory_reference: ICH E2D Section 4.3 / ICH E2F DSUR
    return_expedited_obs:
      type: return
      value:
        reporting_pathway: SPONTANEOUS_EQUIVALENT_EXPEDITED
        deadline_days: 15
        expedited_required: true
        regulatory_reference: ICH E2D Section 4.3 - Post-Approval Study Safety Reporting
    return_periodic_obs:
      type: return
      value:
        reporting_pathway: PSUR_AGGREGATE
        deadline_days: 90
        expedited_required: false
        regulatory_reference: ICH E2D Section 6 / ICH E2C(R2)
    return_aggregate_obs:
      type: return
      value:
        reporting_pathway: AGGREGATE_LINE_LISTING
        deadline_days: 90
        expedited_required: false
        regulatory_reference: ICH E2D Section 6 - Periodic Safety Update Reports
    return_registry_protocol:
      type: return
      value:
        reporting_pathway: REGISTRY_PROTOCOL_DEFINED
        deadline_days: 15
        expedited_required: true
        regulatory_reference: ICH E2D Section 4.3 - Post-Approval Study Safety Reporting
    return_standard_periodic:
      type: return
      value:
        reporting_pathway: STANDARD_PERIODIC
        deadline_days: 90
        expedited_required: false
        regulatory_reference: ICH E2D Section 6 - Periodic Safety Update Reports
tests:
  - input:
      is_interventional: true
      is_serious: true
      is_unexpected: true
      study_type: interventional
    expect:
      reporting_pathway: IND_EQUIVALENT_EXPEDITED
      deadline_days: 15
      expedited_required: true
      regulatory_reference: ICH E2D Section 4.3 - Post-Approval Study Safety Reporting
  - input:
      is_interventional: true
      is_serious: true
      is_unexpected: false
      study_type: interventional
    expect:
      reporting_pathway: DSUR_PERIODIC
      deadline_days: 365
      expedited_required: false
      regulatory_reference: ICH E2D Section 4.3 / ICH E2F DSUR
  - input:
      is_interventional: true
      is_serious: false
      is_unexpected: true
      study_type: interventional
    expect:
      reporting_pathway: DSUR_PERIODIC
      deadline_days: 365
      expedited_required: false
      regulatory_reference: ICH E2D Section 4.3 / ICH E2F DSUR
  - input:
      is_interventional: false
      study_type: observational
      is_serious: true
      is_unexpected: true
    expect:
      reporting_pathway: SPONTANEOUS_EQUIVALENT_EXPEDITED
      deadline_days: 15
      expedited_required: true
      regulatory_reference: ICH E2D Section 4.3 - Post-Approval Study Safety Reporting
  - input:
      is_interventional: false
      study_type: observational
      is_serious: true
      is_unexpected: false
    expect:
      reporting_pathway: PSUR_AGGREGATE
      deadline_days: 90
      expedited_required: false
      regulatory_reference: ICH E2D Section 6 / ICH E2C(R2)
  - input:
      is_interventional: false
      study_type: observational
      is_serious: false
      is_unexpected: false
    expect:
      reporting_pathway: AGGREGATE_LINE_LISTING
      deadline_days: 90
      expedited_required: false
      regulatory_reference: ICH E2D Section 6 - Periodic Safety Update Reports
  - input:
      is_interventional: false
      study_type: registry
      protocol_defined: true
      is_serious: true
      is_unexpected: true
    expect:
      reporting_pathway: REGISTRY_PROTOCOL_DEFINED
      deadline_days: 15
      expedited_required: true
      regulatory_reference: ICH E2D Section 4.3 - Post-Approval Study Safety Reporting
  - input: {}
    expect:
      reporting_pathway: STANDARD_PERIODIC
      deadline_days: 90
      expedited_required: false
      regulatory_reference: ICH E2D Section 6 - Periodic Safety Update Reports
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - reporting_pathway
    - deadline_days
    - expedited_required
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
