    has_assessment: false
    current_state: triaged
    has_report: false
  expect:
    transition_class: INVALID_REGRESSION
    transition_valid: false
- input:
    proposed_state: closed
    has_assessment: false
    current_state: triaged
    has_report: false
  expect:
    transition_class: INVALID_SKIP
    transition_valid: false
- input:
    has_report: true
    has_assessment: true
    proposed_state: reported
    current_state: assessed
  expect:
    transition_class: VALID
    transition_valid: true
- input:
    has_assessment: true
    has_report: false
    proposed_state: reported
    current_state: assessed
  expect:
    transition_valid: false
    transition_class: BLOCKED_MISSING_REPORT
- input:
    has_report: false
    current_state: assessed
    has_assessment: true
    proposed_state: closed
  expect:
    transition_valid: true
    transition_class: VALID
- input:
    proposed_state: new
    current_state: assessed
    has_assessment: true
    has_report: false
  expect:
    transition_class: INVALID_REGRESSION
    transition_valid: false
- input:
