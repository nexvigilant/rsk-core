# MICROGRAM++ (upgraded 2026-04-23)
name: station-benefit-risk-pipeline
version: 0.1.0
description: "Triage benefit-risk assessment results: classify QBR/QBRI scores into regulatory action paths"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Benefit Risk Pipeline
  subtitle: "Triage benefit-risk assessment results: classify QBR/QBRI scores into regulatory action paths"
  icon: circle
  route: /vigilance/mg/station-benefit-risk-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-benefit-risk-pipeline
  cli: rsk mcg run station-benefit-risk-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_qbri
  nodes:
    unfavorable:
      type: return
      value:
        action: escalate
        reason: QBRI<0.5 — unfavorable benefit-risk, regulatory action required
        route: regulatory_referral
        priority: critical
    marginal:
      type: return
      value:
        priority: moderate
        reason: QBRI 0.5-1.0 — marginal benefit-risk, additional risk minimization needed
        route: rmp_update
        action: review
    check_qbri:
      type: condition
      variable: qbri_score
      operator: gte
      value: 1
      true_next: favorable
      false_next: check_marginal
    favorable:
      type: return
      value:
        route: archive
        priority: low
        action: approve
        reason: QBRI≥1.0 — benefits outweigh risks, favorable profile
    check_marginal:
      type: condition
      variable: qbri_score
      operator: gte
      value: 0.5
      true_next: marginal
      false_next: unfavorable
tests:
  - input:
      qbri_score: 1.5
    expect:
      priority: low
      action: approve
      route: archive
  - input:
      qbri_score: 0.7
    expect:
      action: review
      route: rmp_update
      priority: moderate
  - input:
      qbri_score: 0.3
    expect:
      action: escalate
      priority: critical
      route: regulatory_referral
  - input:
      qbri_score: 0.999
    expect:
      action: review
      priority: moderate
      reason: QBRI 0.5-1.0 — marginal benefit-risk, additional risk minimization needed
      route: rmp_update
  - input:
      qbri_score: 1.001
    expect:
      action: approve
      priority: low
      reason: QBRI≥1.0 — benefits outweigh risks, favorable profile
      route: archive
  - input: {}
    expect:
      route: regulatory_referral
      reason: QBRI<0.5 — unfavorable benefit-risk, regulatory action required
      action: escalate
      priority: critical
  - input:
      qbri_score: 0.499
    expect:
      route: regulatory_referral
      reason: QBRI<0.5 — unfavorable benefit-risk, regulatory action required
      action: escalate
      priority: critical
  - input:
      qbri_score: 0.501
    expect:
      priority: moderate
      reason: QBRI 0.5-1.0 — marginal benefit-risk, additional risk minimization needed
      route: rmp_update
      action: review
  - input: {}
    expect:
      action: escalate
      reason: QBRI<0.5 — unfavorable benefit-risk, regulatory action required
      route: regulatory_referral
      priority: critical
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
