# MICROGRAM++ (upgraded 2026-04-23)
name: organ-gastrointestinal-safety
version: 0.1.0
description: Gastrointestinal safety assessment. Evaluates GI ulceration, severe diarrhea, and hepatotoxicity risks.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Organ Gastrointestinal Safety
  subtitle: Gastrointestinal safety assessment. Evaluates GI ulceration, severe diarrhea, and hepatotoxicity risks.
  icon: circle
  route: /vigilance/mg/organ-gastrointestinal-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/organ-gastrointestinal-safety
  cli: rsk mcg run organ-gastrointestinal-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_gi_ulcer_history
  nodes:
    check_gi_ulcer_history:
      type: condition
      variable: prior_gi_ulcer_perforation
      operator: eq
      value: true
      true_next: ulcer_alert
      false_next: check_ibd
    ulcer_alert:
      type: return
      value:
        organ: gastrointestinal
        risk_level: high
        ulcerogenic_risk: true
        gastroprotection: required
        message: Prior GI ulcer/perforation; ulcerogenic drugs contraindicated or require PPI
    check_ibd:
      type: condition
      variable: has_inflammatory_bowel_disease
      operator: eq
      value: true
      true_next: ibd_alert
      false_next: check_severe_diarrhea
    ibd_alert:
      type: return
      value:
        organ: gastrointestinal
        risk_level: moderate
        diarrhea_monitoring: required
        message: IBD present; diarrhea-inducing drugs may worsen disease
    check_severe_diarrhea:
      type: condition
      variable: has_recent_severe_diarrhea
      operator: eq
      value: true
      true_next: diarrhea_alert
      false_next: standard_dosing
    diarrhea_alert:
      type: return
      value:
        organ: gastrointestinal
        risk_level: moderate
        gi_tolerance: monitor
        message: Recent severe diarrhea; monitor GI tolerability
    standard_dosing:
      type: return
      value:
        organ: gastrointestinal
        risk_level: low
tests:
  - input:
      prior_gi_ulcer_perforation: true
      has_inflammatory_bowel_disease: false
      has_recent_severe_diarrhea: false
    expect:
      organ: gastrointestinal
      risk_level: high
      ulcerogenic_risk: true
  - input:
      prior_gi_ulcer_perforation: false
      has_inflammatory_bowel_disease: true
      has_recent_severe_diarrhea: false
    expect:
      organ: gastrointestinal
      risk_level: moderate
      diarrhea_monitoring: required
  - input:
      prior_gi_ulcer_perforation: false
      has_inflammatory_bowel_disease: false
      has_recent_severe_diarrhea: true
    expect:
      organ: gastrointestinal
      risk_level: moderate
      gi_tolerance: monitor
  - input:
      prior_gi_ulcer_perforation: false
      has_inflammatory_bowel_disease: false
      has_recent_severe_diarrhea: false
    expect:
      organ: gastrointestinal
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
