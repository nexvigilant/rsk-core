name: drug-profile-bevacizumab
description: 'Safety triage for bevacizumab: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        harm_type: B
        signal: true
        action: investigate
        expected_prr: 5.1
        drug: bevacizumab
    no_signal:
      type: return
      value:
        signal: false
        drug: bevacizumab
        harm_type: B
        expected_prr: 5.1
        action: monitor
tests:
- input:
    prr: 5.1
  expect:
    drug: bevacizumab
    signal: true
- input:
    prr: 0.5
  expect:
    drug: bevacizumab
    signal: false
- input: {}
  expect:
    drug: bevacizumab
    signal: false
- input:
    prr: 4.999
  expect:
    signal: false
    expected_prr: 5.1
    harm_type: B
    action: monitor
    drug: bevacizumab
- input:
    prr: 5.001
  expect:
    signal: true
    action: investigate
    expected_prr: 5.1
    drug: bevacizumab
    harm_type: B
interface: null
primitive_signature: null
