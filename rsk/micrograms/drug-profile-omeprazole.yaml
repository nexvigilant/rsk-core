name: drug-profile-omeprazole
description: 'Safety triage for omeprazole: PRR-based signal routing (Type A)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    no_signal:
      type: return
      value:
        signal: false
        action: monitor
        expected_prr: 2.1
        drug: omeprazole
        harm_type: A
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        signal: true
        expected_prr: 2.1
        harm_type: A
        drug: omeprazole
        action: investigate
tests:
- input:
    prr: 2.1
  expect:
    drug: omeprazole
    signal: true
- input:
    prr: 0.5
  expect:
    signal: false
    drug: omeprazole
- input: {}
  expect:
    drug: omeprazole
    signal: false
- input:
    prr: 1.999
  expect:
    drug: omeprazole
    expected_prr: 2.1
    signal: false
    harm_type: A
    action: monitor
- input:
    prr: 2.001
  expect:
    signal: true
    action: investigate
    harm_type: A
    drug: omeprazole
    expected_prr: 2.1
interface: null
primitive_signature: null
