name: ich-e2f-gate
description: "ICH E2F compliance: DSUR — Development Safety"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "in_development"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH E2F"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH E2F"
        compliant: false
        action: "remediate"
        gap: "in_development"

tests:
  - input: {"in_development": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
