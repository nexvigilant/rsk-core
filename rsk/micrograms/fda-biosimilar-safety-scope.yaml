# MICROGRAM++ (upgraded 2026-04-23)
name: fda-biosimilar-safety-scope
version: 0.1.0
description: "FDA biosimilar safety study scope: determines comparative safety requirements by similarity level per FDA Guidance 'Biosimilar Comparative Analytical Assessment' (2025) and Interchangeability Guidance"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: analytical_similarity
    type: string
    required: true
    description: "Analytical similarity to reference: highly_similar, similar, residual_uncertainty"
  - name: functional_similarity
    type: bool
    required: true
    description: Whether functional assays show comparable biological activity
  - name: seeking_interchangeability
    type: bool
    required: false
    description: Whether applicant seeks interchangeability designation
  - name: immunogenicity_risk_level
    type: string
    required: false
    description: "Immunogenicity risk: low, moderate, high"
outputs:
  - name: safety_study_scope
    type: string
  - name: clinical_trial_required
    type: bool
  - name: switching_study_required
    type: bool
  - name: immunogenicity_assessment
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    analytical_similarity:
      type: string
      required: true
      description: "Analytical similarity to reference: highly_similar, similar, residual_uncertainty"
    functional_similarity:
      type: bool
      required: true
      description: Whether functional assays show comparable biological activity
    seeking_interchangeability:
      type: bool
      required: false
      description: Whether applicant seeks interchangeability designation
    immunogenicity_risk_level:
      type: string
      required: false
      description: "Immunogenicity risk: low, moderate, high"
  outputs:
    safety_study_scope:
      type: string
    clinical_trial_required:
      type: bool
    switching_study_required:
      type: bool
    immunogenicity_assessment:
      type: string
    regulatory_reference:
      type: string
ui:
  title: Fda Biosimilar Safety Scope
  subtitle: "FDA biosimilar safety study scope: determines comparative safety requirements by similarity level per FDA Guidance 'Biosimilar Comparative Analytical Assessment' (2025) and Interchangeability Guidance"
  icon: circle
  route: /vigilance/mg/fda-biosimilar-safety-scope
  steps:
    - field: analytical_similarity
      label: analytical similarity
      help: "Analytical similarity to reference: highly_similar, similar, residual_uncertainty"
      widget: text
      placeholder: null
    - field: functional_similarity
      label: functional similarity
      help: Whether functional assays show comparable biological activity
      widget: toggle
      placeholder: null
    - field: seeking_interchangeability
      label: seeking interchangeability
      help: Whether applicant seeks interchangeability designation
      widget: toggle
      placeholder: null
    - field: immunogenicity_risk_level
      label: immunogenicity risk level
      help: "Immunogenicity risk: low, moderate, high"
      widget: text
      placeholder: null
  result:
    template: "safety_study_scope: {{safety_study_scope}} — clinical_trial_required: {{clinical_trial_required}} — switching_study_required: {{switching_study_required}} — immunogenicity_assessment: {{immunogenicity_assessment}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/fda-biosimilar-safety-scope
  cli: rsk mcg run fda-biosimilar-safety-scope
  auth: none
  rate_limit: 600/min
tree:
  start: check_analytical
  nodes:
    check_analytical:
      type: condition
      variable: analytical_similarity
      operator: eq
      value: highly_similar
      true_next: highly_similar_functional
      false_next: check_similar
    check_similar:
      type: condition
      variable: analytical_similarity
      operator: eq
      value: similar
      true_next: similar_functional
      false_next: residual_uncertainty_path
    highly_similar_functional:
      type: condition
      variable: functional_similarity
      operator: eq
      value: true
      true_next: check_interchangeability_hs
      false_next: reduced_clinical
    check_interchangeability_hs:
      type: condition
      variable: seeking_interchangeability
      operator: eq
      value: true
      true_next: interchangeable_path
      false_next: check_immuno_hs
    check_immuno_hs:
      type: condition
      variable: immunogenicity_risk_level
      operator: eq
      value: high
      true_next: reduced_with_immuno
      false_next: streamlined_path
    streamlined_path:
      type: return
      value:
        safety_study_scope: STREAMLINED
        clinical_trial_required: false
        switching_study_required: false
        immunogenicity_assessment: Comparative PK/PD study with immunogenicity endpoints sufficient
        regulatory_reference: "FDA Guidance: Biosimilar Comparative Analytical Assessment (2025), Section VI — Totality of Evidence"
    reduced_with_immuno:
      type: return
      value:
        safety_study_scope: REDUCED_WITH_IMMUNOGENICITY
        clinical_trial_required: false
        switching_study_required: false
        immunogenicity_assessment: Dedicated comparative immunogenicity study required due to high risk. 12-month duration with ADA testing.
        regulatory_reference: "FDA Guidance: Biosimilar Comparative Analytical Assessment (2025); Immunogenicity Assessment (2014)"
    interchangeable_path:
      type: condition
      variable: immunogenicity_risk_level
      operator: eq
      value: low
      true_next: interchangeable_low_immuno
      false_next: interchangeable_standard
    interchangeable_low_immuno:
      type: return
      value:
        safety_study_scope: INTERCHANGEABLE_STREAMLINED
        clinical_trial_required: true
        switching_study_required: true
        immunogenicity_assessment: Switching study with ADA endpoints. May use integrated PK/PD/immunogenicity design.
        regulatory_reference: "FDA Guidance: Interchangeable Biosimilar Products (2019); Comparative Analytical Assessment (2025)"
    interchangeable_standard:
      type: return
      value:
        safety_study_scope: INTERCHANGEABLE_FULL
        clinical_trial_required: true
        switching_study_required: true
        immunogenicity_assessment: Dedicated switching study with comparative immunogenicity. Multiple switch design required.
        regulatory_reference: "FDA Guidance: Interchangeable Biosimilar Products (2019), Section V"
    similar_functional:
      type: condition
      variable: functional_similarity
      operator: eq
      value: true
      true_next: reduced_clinical
      false_next: full_clinical
    reduced_clinical:
      type: return
      value:
        safety_study_scope: REDUCED_CLINICAL
        clinical_trial_required: true
        switching_study_required: false
        immunogenicity_assessment: Comparative clinical study with safety and immunogenicity co-primary endpoints. Reduced sample size acceptable.
        regulatory_reference: "FDA Guidance: Biosimilar Comparative Analytical Assessment (2025), Section V"
    residual_uncertainty_path:
      type: return
      value:
        safety_study_scope: FULL_CLINICAL_PROGRAM
        clinical_trial_required: true
        switching_study_required: false
        immunogenicity_assessment: Full comparative clinical program including efficacy, safety, and immunogenicity. Standard BLA-level evidence.
        regulatory_reference: "FDA Guidance: Biosimilar Comparative Analytical Assessment (2025), Section IV"
    full_clinical:
      type: return
      value:
        safety_study_scope: FULL_CLINICAL_PROGRAM
        clinical_trial_required: true
        switching_study_required: false
        immunogenicity_assessment: Full comparative clinical program required. Functional dissimilarity necessitates clinical confirmation.
        regulatory_reference: "FDA Guidance: Biosimilar Comparative Analytical Assessment (2025), Section IV"
tests:
  - input:
      analytical_similarity: highly_similar
      functional_similarity: true
      seeking_interchangeability: false
      immunogenicity_risk_level: low
    expect:
      safety_study_scope: STREAMLINED
      clinical_trial_required: false
  - input:
      analytical_similarity: highly_similar
      functional_similarity: true
      seeking_interchangeability: false
      immunogenicity_risk_level: high
    expect:
      safety_study_scope: REDUCED_WITH_IMMUNOGENICITY
      clinical_trial_required: false
  - input:
      analytical_similarity: highly_similar
      functional_similarity: true
      seeking_interchangeability: true
      immunogenicity_risk_level: low
    expect:
      safety_study_scope: INTERCHANGEABLE_STREAMLINED
      switching_study_required: true
  - input:
      analytical_similarity: highly_similar
      functional_similarity: true
      seeking_interchangeability: true
      immunogenicity_risk_level: moderate
    expect:
      safety_study_scope: INTERCHANGEABLE_FULL
      switching_study_required: true
  - input:
      analytical_similarity: similar
      functional_similarity: true
    expect:
      safety_study_scope: REDUCED_CLINICAL
      clinical_trial_required: true
  - input:
      analytical_similarity: similar
      functional_similarity: false
    expect:
      safety_study_scope: FULL_CLINICAL_PROGRAM
  - input:
      analytical_similarity: residual_uncertainty
      functional_similarity: true
    expect:
      safety_study_scope: FULL_CLINICAL_PROGRAM
  - input: {}
    expect:
      safety_study_scope: FULL_CLINICAL_PROGRAM
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - safety_study_scope
    - clinical_trial_required
    - switching_study_required
    - immunogenicity_assessment
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
