# MICROGRAM++ (upgraded 2026-04-23)
name: station-dna-pipeline
version: 0.1.0
description: Route DNA/nucleotide encoding operations through validation gates
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Dna Pipeline
  subtitle: Route DNA/nucleotide encoding operations through validation gates
  icon: circle
  route: /vigilance/mg/station-dna-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-dna-pipeline
  cli: rsk mcg run station-dna-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_valid
  nodes:
    invalid:
      type: return
      value:
        action: reject
        route: encoding_repair
        priority: high
        reason: Invalid DNA encoding — non-ACGT characters or length mismatch
    certified:
      type: return
      value:
        route: archive
        action: certify
        priority: low
        reason: Bijective DNA encoding verified — lossless round-trip
    lossy:
      type: return
      value:
        reason: Encoding valid but not bijective — information loss on decode
        priority: moderate
        route: encoding_review
        action: flag
    check_valid:
      type: condition
      variable: encoding_valid
      operator: eq
      value: true
      true_next: check_bijective
      false_next: invalid
    check_bijective:
      type: condition
      variable: is_bijective
      operator: eq
      value: true
      true_next: certified
      false_next: lossy
tests:
  - input:
      encoding_valid: false
      is_bijective: false
    expect:
      action: reject
      priority: high
      route: encoding_repair
  - input:
      encoding_valid: true
      is_bijective: true
    expect:
      route: archive
      priority: low
      action: certify
  - input:
      encoding_valid: true
      is_bijective: false
    expect:
      action: flag
      route: encoding_review
      priority: moderate
  - input: {}
    expect:
      priority: high
      route: encoding_repair
      action: reject
      reason: Invalid DNA encoding — non-ACGT characters or length mismatch
  - input: {}
    expect:
      route: encoding_repair
      reason: Invalid DNA encoding — non-ACGT characters or length mismatch
      priority: high
      action: reject
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
