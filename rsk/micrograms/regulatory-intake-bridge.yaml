name: regulatory-intake-bridge
description: Translates regulatory assessment outputs into case intake fields. Bridges e2a-minimum-criteria (valid_icsr), benefit-risk-ratio (regulatory_action, br_ratio), and workflow-start-gate (gate) outputs into intake-to-triage and expedited-reporting inputs.
version: 0.1.0
tree:
  start: check_valid_icsr
  nodes:
    critical_regulatory:
      type: return
      value:
        score: 100
        completeness_pct: 100
        intake_action: Drug withdrawal action — expedited reporting required within 15 days
        serious: true
        valid: true
    standard_intake:
      type: return
      value:
        completeness_pct: 75
        valid: true
        score: 50
        intake_action: Standard regulatory assessment — routine processing
        serious: false
    check_restriction:
      type: condition
      variable: regulatory_action
      operator: eq
      value: RESTRICTION
      true_next: serious_regulatory
      false_next: check_label_change
    serious_regulatory:
      type: return
      value:
        serious: true
        intake_action: Drug restriction — serious case requiring priority triage
        valid: true
        completeness_pct: 87
        score: 85
    check_valid_icsr:
      type: condition
      variable: valid_icsr
      operator: eq
      value: true
      true_next: check_regulatory_action
      false_next: invalid_case
    check_gate_label:
      type: condition
      variable: gate
      operator: eq
      value: PASS
      true_next: elevated_intake
      false_next: deferred_intake
    deferred_intake:
      type: return
      value:
        intake_action: Workflow gate not passed — defer until prerequisites met
        serious: false
        completeness_pct: 50
        valid: true
        score: 40
    check_gate_standard:
      type: condition
      variable: gate
      operator: eq
      value: PASS
      true_next: standard_intake
      false_next: deferred_intake
    elevated_intake:
      type: return
      value:
        intake_action: Label change with approved workflow — elevated monitoring
        completeness_pct: 75
        valid: true
        serious: false
        score: 65
    invalid_case:
      type: return
      value:
        intake_action: Case does not meet E2A minimum criteria — return to reporter
        serious: false
        valid: false
        score: 0
        completeness_pct: 0
    check_regulatory_action:
      type: condition
      variable: regulatory_action
      operator: eq
      value: WITHDRAWAL
      true_next: critical_regulatory
      false_next: check_restriction
    check_label_change:
      type: condition
      variable: regulatory_action
      operator: eq
      value: LABEL_CHANGE
      true_next: check_gate_label
      false_next: check_gate_standard
tests:
- input:
    gate: FAIL
    regulatory_action: NONE
    valid_icsr: false
  expect:
    valid: false
    serious: false
    completeness_pct: 0
- input:
    regulatory_action: WITHDRAWAL
    valid_icsr: true
    gate: PASS
  expect:
    score: 100
    serious: true
    valid: true
    completeness_pct: 100
- input:
    gate: PASS
    valid_icsr: true
    regulatory_action: RESTRICTION
  expect:
    valid: true
    score: 85
    serious: true
- input:
    gate: PASS
    valid_icsr: true
    regulatory_action: LABEL_CHANGE
  expect:
    valid: true
    completeness_pct: 75
    serious: false
- input:
    gate: FAIL
    regulatory_action: LABEL_CHANGE
    valid_icsr: true
  expect:
    completeness_pct: 50
    score: 40
    valid: true
- input:
    valid_icsr: true
    gate: PASS
    regulatory_action: NONE
  expect:
    valid: true
    serious: false
    score: 50
    completeness_pct: 75
- input:
    valid_icsr: true
    regulatory_action: NONE
    gate: FAIL
  expect:
    completeness_pct: 50
    valid: true
- input: {}
  expect:
    intake_action: Case does not meet E2A minimum criteria — return to reporter
    score: 0
    completeness_pct: 0
    serious: false
    valid: false
- input: {}
  expect:
    intake_action: Case does not meet E2A minimum criteria — return to reporter
    score: 0
    completeness_pct: 0
    valid: false
    serious: false
- input: {}
  expect:
    intake_action: Case does not meet E2A minimum criteria — return to reporter
    serious: false
    valid: false
    completeness_pct: 0
    score: 0
- input: {}
  expect:
    intake_action: Case does not meet E2A minimum criteria — return to reporter
    completeness_pct: 0
    valid: false
    score: 0
    serious: false
- input: {}
  expect:
    completeness_pct: 0
    valid: false
    score: 0
    serious: false
    intake_action: Case does not meet E2A minimum criteria — return to reporter
- input: {}
  expect:
    completeness_pct: 0
    valid: false
    intake_action: Case does not meet E2A minimum criteria — return to reporter
    serious: false
    score: 0
interface:
  inputs:
    gate:
      type: string
      required: false
    valid_icsr:
      type: bool
      required: true
    regulatory_action:
      type: string
      required: false
  outputs:
    completeness_pct:
      type: int
      required: true
    serious:
      type: bool
      required: true
    score:
      type: int
      required: true
    intake_action:
      type: string
      required: true
    valid:
      type: bool
      required: true
  aliases: {}
