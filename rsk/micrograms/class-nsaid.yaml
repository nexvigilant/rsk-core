# MICROGRAM++ (upgraded 2026-04-23)
name: class-nsaid
version: 0.1.0
description: "NSAIDs class safety: GI bleeding monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Nsaid
  subtitle: "NSAIDs class safety: GI bleeding monitoring"
  icon: circle
  route: /vigilance/mg/class-nsaid
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-nsaid
  cli: rsk mcg run class-nsaid
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    safe:
      type: return
      value:
        alert: false
        action: continue
        drug_class: NSAIDs
        concern: GI bleeding
    alert:
      type: return
      value:
        action: class_effect_investigation
        concern: GI bleeding
        alert: true
        drug_class: NSAIDs
    check:
      type: condition
      variable: gi_risk
      operator: gte
      value: 2
      true_next: alert
      false_next: safe
tests:
  - input:
      gi_risk: 2
    expect:
      drug_class: NSAIDs
      alert: true
  - input: {}
    expect:
      alert: false
      drug_class: NSAIDs
  - input:
      gi_risk: 0
    expect:
      action: continue
      concern: GI bleeding
      alert: false
      drug_class: NSAIDs
  - input:
      gi_risk: -1
    expect:
      action: continue
      concern: GI bleeding
      alert: false
      drug_class: NSAIDs
  - input:
      gi_risk: 1
    expect:
      concern: GI bleeding
      action: continue
      alert: false
      drug_class: NSAIDs
  - input:
      gi_risk: 3
    expect:
      alert: true
      concern: GI bleeding
      drug_class: NSAIDs
      action: class_effect_investigation
  - input:
      gi_risk: 200
    expect:
      action: class_effect_investigation
      alert: true
      drug_class: NSAIDs
      concern: GI bleeding
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
