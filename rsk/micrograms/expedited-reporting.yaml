# MICROGRAM++ (upgraded 2026-04-23)
name: expedited-reporting
version: 0.1.0
description: "ICH E2D / FDA 21 CFR 312.32 expedited reporting timeline: determines report type and deadline from case characteristics and study phase"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: fatal
    type: bool
    required: false
    description: ""
  - name: life_threatening
    type: bool
    required: false
    description: ""
  - name: serious
    type: bool
    required: false
    description: ""
  - name: study_type
    type: string
    required: false
    description: ""
  - name: unexpected
    type: bool
    required: false
    description: ""
outputs:
  - name: days_from_awareness
    type: int
  - name: regulatory_reference
    type: string
  - name: report_type
    type: string
  - name: timeline
    type: string
interface:
  inputs:
    fatal:
      type: bool
      required: false
    life_threatening:
      type: bool
      required: false
    serious:
      type: bool
      required: false
    study_type:
      type: string
      required: false
    unexpected:
      type: bool
      required: false
  outputs:
    days_from_awareness:
      type: int
    regulatory_reference:
      type: string
    report_type:
      type: string
    timeline:
      type: string
ui:
  title: Expedited Reporting
  subtitle: "ICH E2D / FDA 21 CFR 312.32 expedited reporting timeline: determines report type and deadline from case characteristics and study phase"
  icon: circle
  route: /vigilance/mg/expedited-reporting
  steps:
    - field: fatal
      label: fatal
      help: Enter fatal
      widget: toggle
      placeholder: null
    - field: life_threatening
      label: life threatening
      help: Enter life_threatening
      widget: toggle
      placeholder: null
    - field: serious
      label: serious
      help: Enter serious
      widget: toggle
      placeholder: null
    - field: study_type
      label: study type
      help: Enter study_type
      widget: text
      placeholder: null
    - field: unexpected
      label: unexpected
      help: Enter unexpected
      widget: toggle
      placeholder: null
  result:
    template: "days_from_awareness: {{days_from_awareness}} — regulatory_reference: {{regulatory_reference}} — report_type: {{report_type}} — timeline: {{timeline}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/expedited-reporting
  cli: rsk mcg run expedited-reporting
  auth: none
  rate_limit: 600/min
tree:
  start: serious_check
  nodes:
    serious_check:
      type: condition
      variable: serious
      operator: eq
      value: true
      true_next: fatal_check
      false_next: not_serious
    fatal_check:
      type: condition
      variable: fatal
      operator: eq
      value: true
      true_next: fatal_study_check
      false_next: life_threatening_check
    life_threatening_check:
      type: condition
      variable: life_threatening
      operator: eq
      value: true
      true_next: lt_study_check
      false_next: unexpected_check
    fatal_study_check:
      type: condition
      variable: study_type
      operator: eq
      value: premarket
      true_next: day7_ind
      false_next: day15_postmarket
    lt_study_check:
      type: condition
      variable: study_type
      operator: eq
      value: premarket
      true_next: day7_ind
      false_next: day15_postmarket
    unexpected_check:
      type: condition
      variable: unexpected
      operator: eq
      value: true
      true_next: unexpected_study_check
      false_next: serious_expected
    unexpected_study_check:
      type: condition
      variable: study_type
      operator: eq
      value: premarket
      true_next: day15_ind
      false_next: day15_field_alert
    not_serious:
      type: return
      value:
        timeline: PERIODIC
        report_type: LINE_LISTING
        regulatory_reference: ICH E2C(R2)
        days_from_awareness: 90
    serious_expected:
      type: return
      value:
        timeline: PERIODIC
        report_type: PSUR_DSUR
        regulatory_reference: ICH E2C(R2)
        days_from_awareness: 90
    day7_ind:
      type: return
      value:
        timeline: 7_CALENDAR_DAYS
        report_type: IND_SAFETY
        regulatory_reference: 21 CFR 312.32(c)(2)
        days_from_awareness: 7
    day15_postmarket:
      type: return
      value:
        timeline: 15_CALENDAR_DAYS
        report_type: FIELD_ALERT
        regulatory_reference: 21 CFR 314.80
        days_from_awareness: 15
    day15_ind:
      type: return
      value:
        timeline: 15_CALENDAR_DAYS
        report_type: IND_SAFETY
        regulatory_reference: 21 CFR 312.32(c)(1)
        days_from_awareness: 15
    day15_field_alert:
      type: return
      value:
        timeline: 15_CALENDAR_DAYS
        report_type: FIELD_ALERT
        regulatory_reference: 21 CFR 314.80
        days_from_awareness: 15
tests:
  - input:
      serious: true
      fatal: true
      life_threatening: false
      unexpected: true
      study_type: premarket
    expect:
      timeline: 7_CALENDAR_DAYS
      report_type: IND_SAFETY
      regulatory_reference: 21 CFR 312.32(c)(2)
      days_from_awareness: 7
  - input:
      serious: true
      fatal: false
      life_threatening: true
      unexpected: true
      study_type: premarket
    expect:
      timeline: 7_CALENDAR_DAYS
      report_type: IND_SAFETY
      regulatory_reference: 21 CFR 312.32(c)(2)
      days_from_awareness: 7
  - input:
      serious: true
      fatal: false
      life_threatening: false
      unexpected: true
      study_type: premarket
    expect:
      timeline: 15_CALENDAR_DAYS
      report_type: IND_SAFETY
      regulatory_reference: 21 CFR 312.32(c)(1)
      days_from_awareness: 15
  - input:
      serious: true
      fatal: false
      life_threatening: false
      unexpected: true
      study_type: postmarket
    expect:
      timeline: 15_CALENDAR_DAYS
      report_type: FIELD_ALERT
      regulatory_reference: 21 CFR 314.80
      days_from_awareness: 15
  - input:
      serious: true
      fatal: true
      life_threatening: false
      unexpected: false
      study_type: postmarket
    expect:
      timeline: 15_CALENDAR_DAYS
      report_type: FIELD_ALERT
      regulatory_reference: 21 CFR 314.80
      days_from_awareness: 15
  - input:
      serious: true
      fatal: false
      life_threatening: true
      unexpected: true
      study_type: postmarket
    expect:
      timeline: 15_CALENDAR_DAYS
      report_type: FIELD_ALERT
      regulatory_reference: 21 CFR 314.80
      days_from_awareness: 15
  - input:
      serious: true
      fatal: false
      life_threatening: false
      unexpected: false
      study_type: premarket
    expect:
      timeline: PERIODIC
      report_type: PSUR_DSUR
      regulatory_reference: ICH E2C(R2)
      days_from_awareness: 90
  - input:
      serious: true
      fatal: false
      life_threatening: false
      unexpected: false
      study_type: postmarket
    expect:
      timeline: PERIODIC
      report_type: PSUR_DSUR
      regulatory_reference: ICH E2C(R2)
      days_from_awareness: 90
  - input:
      serious: false
      fatal: false
      life_threatening: false
      unexpected: true
      study_type: premarket
    expect:
      timeline: PERIODIC
      report_type: LINE_LISTING
      regulatory_reference: ICH E2C(R2)
      days_from_awareness: 90
  - input:
      serious: false
      fatal: false
      life_threatening: false
      unexpected: false
      study_type: postmarket
    expect:
      timeline: PERIODIC
      report_type: LINE_LISTING
      regulatory_reference: ICH E2C(R2)
      days_from_awareness: 90
  - input: {}
    expect:
      timeline: PERIODIC
      report_type: LINE_LISTING
      regulatory_reference: ICH E2C(R2)
      days_from_awareness: 90
  - input:
      serious: true
      fatal: true
      life_threatening: true
      unexpected: true
      study_type: premarket
    expect:
      timeline: 7_CALENDAR_DAYS
      report_type: IND_SAFETY
      days_from_awareness: 7
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - days_from_awareness
    - regulatory_reference
    - report_type
    - timeline
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
