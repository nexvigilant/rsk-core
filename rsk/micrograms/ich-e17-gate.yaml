name: ich-e17-gate
description: "ICH E17 compliance: Multi-Regional Trials"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "multi_regional"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH E17"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH E17"
        compliant: false
        action: "remediate"
        gap: "multi_regional"

tests:
  - input: {"multi_regional": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
