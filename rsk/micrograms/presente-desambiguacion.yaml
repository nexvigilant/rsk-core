# MICROGRAM++ (upgraded 2026-04-23)
name: presente-desambiguacion
version: 0.1.0
description: |
  Desambigua "presente" entre indicativo y subjuntivo usando el verbo rector (verbo_contexto) como árbitro. "Creo que presenta" (indicativo) vs "Dudo que presente" (subjuntivo) — el verbo que gobierna la cláusula determina el modo. Resolves the presente/presenta collision where the same surface form maps to different grammatical moods.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: forma_verbal
    type: string
    required: true
    description: |
      La forma verbal ambigua a desambiguar (ej. "presente", "cause"). The ambiguous verb form to disambiguate.
  - name: verbo_contexto
    type: string
    required: false
    description: |
      El verbo rector que introduce la cláusula subordinada. Verbos de certeza (creer, afirmar, saber) → indicativo. Verbos de duda/deseo/negación (dudar, querer, negar, esperar, temer) → subjuntivo. If absent, uses heuristic based on form endings.
outputs:
  - name: modo_resuelto
    type: string
  - name: resolved_mood
    type: string
  - name: confianza_resolucion
    type: int
  - name: razon
    type: string
  - name: modo_verbal
    type: string
interface:
  inputs:
    forma_verbal:
      type: string
      required: true
      description: |
        La forma verbal ambigua a desambiguar (ej. "presente", "cause"). The ambiguous verb form to disambiguate.
    verbo_contexto:
      type: string
      required: false
      description: |
        El verbo rector que introduce la cláusula subordinada. Verbos de certeza (creer, afirmar, saber) → indicativo. Verbos de duda/deseo/negación (dudar, querer, negar, esperar, temer) → subjuntivo. If absent, uses heuristic based on form endings.
  outputs:
    modo_resuelto:
      type: string
      description: INDICATIVO | SUBJUNTIVO | AMBIGUO
    resolved_mood:
      type: string
      description: "English: INDICATIVE | SUBJUNCTIVE | AMBIGUOUS"
    confianza_resolucion:
      type: int
      description: "0-100. Con verbo_contexto: 95. Sin verbo_contexto: 60 (heuristic)."
    razon:
      type: string
      description: Justificación de la desambiguación
    modo_verbal:
      type: string
      description: |
        Output compatible con subjuntivo-confianza-epistemica: maps to its input field modo_verbal for chain composition.
ui:
  title: Presente Desambiguacion
  subtitle: |
    Desambigua "presente" entre indicativo y subjuntivo usando el verbo rector (verbo_contexto) como árbitro. "Creo que presenta" (indicativo) vs "Dudo que presente" (subjuntivo) — el verbo que gobierna la cláusula determina el modo. Resolves the presente/presenta collision where the same surface form maps to different grammatical moods.
  icon: circle
  route: /vigilance/mg/presente-desambiguacion
  steps:
    - field: forma_verbal
      label: forma verbal
      help: |
        La forma verbal ambigua a desambiguar (ej. "presente", "cause"). The ambiguous verb form to disambiguate.
      widget: text
      placeholder: null
    - field: verbo_contexto
      label: verbo contexto
      help: |
        El verbo rector que introduce la cláusula subordinada. Verbos de certeza (creer, afirmar, saber) → indicativo. Verbos de duda/deseo/negación (dudar, querer, negar, esperar, temer) → subjuntivo. If absent, uses heuristic based on form endings.
      widget: text
      placeholder: null
  result:
    template: "modo_resuelto: {{modo_resuelto}} — resolved_mood: {{resolved_mood}} — confianza_resolucion: {{confianza_resolucion}} — razon: {{razon}} — modo_verbal: {{modo_verbal}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/presente-desambiguacion
  cli: rsk mcg run presente-desambiguacion
  auth: none
  rate_limit: 600/min
tree:
  start: check_forma_present
  nodes:
    check_forma_present:
      type: condition
      variable: forma_verbal
      operator: is_null
      value: null
      true_next: reject_missing
      false_next: check_contexto_present
    reject_missing:
      type: return
      value:
        modo_resuelto: RECHAZADO
        resolved_mood: REJECTED
        confianza_resolucion: 0
        razon: forma_verbal es obligatorio
        modo_verbal: ""
    check_contexto_present:
      type: condition
      variable: verbo_contexto
      operator: is_null
      value: null
      true_next: heuristic_by_form
      false_next: check_certeza_verbs
    check_certeza_verbs:
      type: condition
      variable: verbo_contexto
      operator: matches
      value: ^(creer|creo|cree|creemos|afirmar|afirmo|afirma|saber|sé|sabe|sabemos|confirmar|confirmo|confirma|asegurar|aseguro|asegura|notar|noto|nota|observar|observo|observa|declarar|declaro|declara|reconocer|reconozco|reconoce)$
      true_next: resolve_indicativo_high
      false_next: check_duda_verbs
    check_duda_verbs:
      type: condition
      variable: verbo_contexto
      operator: matches
      value: ^(dudar|dudo|duda|dudamos|negar|niego|niega|negamos|querer|quiero|quiere|queremos|esperar|espero|espera|esperamos|temer|temo|teme|tememos|desear|deseo|desea|pedir|pido|pide|sugerir|sugiero|sugiere|recomendar|recomiendo|recomienda|prohibir|prohíbo|prohíbe|ordenar|ordeno|ordena|lamentar|lamento|lamenta)$
      true_next: resolve_subjuntivo_high
      false_next: resolve_ambiguo_contexto
    resolve_indicativo_high:
      type: return
      value:
        modo_resuelto: INDICATIVO
        resolved_mood: INDICATIVE
        confianza_resolucion: 95
        razon: |
          Verbo rector de certeza detectado. Los verbos de afirmación/conocimiento (creer, saber, afirmar) rigen indicativo en la cláusula subordinada. "Creo que PRESENTA hepatotoxicidad" — el hablante afirma.
        modo_verbal: indicativo
    resolve_subjuntivo_high:
      type: return
      value:
        modo_resuelto: SUBJUNTIVO
        resolved_mood: SUBJUNCTIVE
        confianza_resolucion: 95
        razon: |
          Verbo rector de duda/deseo/negación detectado. Estos verbos rigen subjuntivo obligatoriamente. "Dudo que PRESENTE hepatotoxicidad" — el hablante expresa incertidumbre. Señal epistémica débil.
        modo_verbal: subjuntivo
    resolve_ambiguo_contexto:
      type: return
      value:
        modo_resuelto: AMBIGUO
        resolved_mood: AMBIGUOUS
        confianza_resolucion: 40
        razon: |
          Verbo rector no clasificado como certeza ni duda. Posibilidades: verbo neutro, condicional, o error de entrada. Se requiere contexto adicional para desambiguar.
        modo_verbal: presente
    heuristic_by_form:
      type: condition
      variable: forma_verbal
      operator: matches
      value: ^(presenta|presentan|presentaba|presentó|muestra|muestran|causa|causan|produce|producen|sufre|sufren|tiene|tienen|manifiesta|desarrolla)$
      true_next: heuristic_indicativo
      false_next: check_subjuntivo_forms
    check_subjuntivo_forms:
      type: condition
      variable: forma_verbal
      operator: matches
      value: ^(presente|presenten|muestre|muestren|cause|causen|produzca|produzcan|sufra|sufran|tenga|tengan|manifieste|desarrolle|padezca)$
      true_next: heuristic_subjuntivo
      false_next: heuristic_ambiguo
    heuristic_indicativo:
      type: return
      value:
        modo_resuelto: INDICATIVO
        resolved_mood: INDICATIVE
        confianza_resolucion: 75
        razon: |
          Sin verbo rector, usando heurística morfológica. La forma verbal termina en patrón indicativo (-a, -an, -aba, -ó para 3ra persona). Confianza reducida: sin contexto, la desambiguación es probabilística.
        modo_verbal: indicativo
    heuristic_subjuntivo:
      type: return
      value:
        modo_resuelto: SUBJUNTIVO
        resolved_mood: SUBJUNCTIVE
        confianza_resolucion: 60
        razon: |
          Sin verbo rector, usando heurística morfológica. La forma verbal termina en patrón subjuntivo (-e, -en, -a para verbos -er/-ir). Confianza baja: "presente" es la forma más ambigua del español — puede ser indicativo de "presentar" (yo presento) o subjuntivo.
        modo_verbal: subjuntivo
    heuristic_ambiguo:
      type: return
      value:
        modo_resuelto: AMBIGUO
        resolved_mood: AMBIGUOUS
        confianza_resolucion: 30
        razon: |
          Forma verbal no reconocida por heurística morfológica. Sin verbo rector y sin patrón de terminación conocido. Requiere análisis sintáctico completo.
        modo_verbal: presente
tests:
  - input:
      forma_verbal: presente
      verbo_contexto: creo
    expect:
      modo_resuelto: INDICATIVO
      resolved_mood: INDICATIVE
      confianza_resolucion: 95
      modo_verbal: indicativo
  - input:
