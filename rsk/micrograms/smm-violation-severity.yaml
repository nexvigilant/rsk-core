# MICROGRAM++ (upgraded 2026-04-23)
name: smm-violation-severity
version: 0.1.0
description: Classifies violation severity into bands approximating CS/MS formulas. Micrograms cannot multiply floats, so threshold-based classification maps violation counts to severity bands. Separate thresholds for empirical vs pre-empirical.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: study_type
    type: string
    required: false
    description: ""
  - name: n_critical
    type: int
    required: false
    description: ""
  - name: n_major
    type: int
    required: false
    description: ""
  - name: n_minor
    type: int
    required: false
    description: ""
outputs:
  - name: severity_band
    type: string
  - name: dominant_violation
    type: string
  - name: requires_remediation
    type: bool
  - name: severity_note
    type: string
interface:
  inputs:
    study_type:
      type: string
      required: false
    n_critical:
      type: int
      required: false
    n_major:
      type: int
      required: false
    n_minor:
      type: int
      required: false
  outputs:
    severity_band:
      type: string
    dominant_violation:
      type: string
    requires_remediation:
      type: bool
    severity_note:
      type: string
ui:
  title: Smm Violation Severity
  subtitle: Classifies violation severity into bands approximating CS/MS formulas. Micrograms cannot multiply floats, so threshold-based classification maps violation counts to severity bands. Separate thresholds for empirical vs pre-empirical.
  icon: circle
  route: /vigilance/mg/smm-violation-severity
  steps:
    - field: study_type
      label: study type
      help: Enter study_type
      widget: text
      placeholder: null
    - field: n_critical
      label: n critical
      help: Enter n_critical
      widget: text
      placeholder: null
    - field: n_major
      label: n major
      help: Enter n_major
      widget: text
      placeholder: null
    - field: n_minor
      label: n minor
      help: Enter n_minor
      widget: text
      placeholder: null
  result:
    template: "severity_band: {{severity_band}} — dominant_violation: {{dominant_violation}} — requires_remediation: {{requires_remediation}} — severity_note: {{severity_note}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/smm-violation-severity
  cli: rsk mcg run smm-violation-severity
  auth: none
  rate_limit: 600/min
tree:
  start: check_study_type
  nodes:
    check_study_type:
      type: condition
      variable: study_type
      operator: eq
      value: empirical
      true_next: emp_check_critical_high
      false_next: pre_check_critical_high
    emp_check_critical_high:
      type: condition
      variable: n_critical
      operator: gte
      value: 3
      true_next: emp_very_low
      false_next: emp_check_critical_mid
    emp_check_critical_mid:
      type: condition
      variable: n_critical
      operator: gte
      value: 2
      true_next: emp_low
      false_next: emp_check_critical_one
    emp_check_critical_one:
      type: condition
      variable: n_critical
      operator: gte
      value: 1
      true_next: emp_check_major_with_critical
      false_next: emp_check_major_only
    emp_check_major_with_critical:
      type: condition
      variable: n_major
      operator: gte
      value: 3
      true_next: emp_low
      false_next: emp_moderate
    emp_check_major_only:
      type: condition
      variable: n_major
      operator: gte
      value: 4
      true_next: emp_low
      false_next: emp_check_major_mid
    emp_check_major_mid:
      type: condition
      variable: n_major
      operator: gte
      value: 2
      true_next: emp_moderate
      false_next: emp_check_major_one
    emp_check_major_one:
      type: condition
      variable: n_major
      operator: gte
      value: 1
      true_next: emp_high
      false_next: emp_check_minor
    emp_check_minor:
      type: condition
      variable: n_minor
      operator: gte
      value: 1
      true_next: emp_high
      false_next: emp_exemplary
    emp_very_low:
      type: return
      value:
        severity_band: VERY_LOW
        dominant_violation: critical
        requires_remediation: true
        severity_note: 3+ critical violations — CS likely below 0.30. Structural integrity compromised.
    emp_low:
      type: return
      value:
        severity_band: LOW
        dominant_violation: critical
        requires_remediation: true
        severity_note: Heavy violation load — CS likely 0.30-0.59. Significant bias risk.
    emp_moderate:
      type: return
      value:
        severity_band: MODERATE
        dominant_violation: mixed
        requires_remediation: true
        severity_note: Moderate violations — CS likely 0.60-0.79. Correctable with remediation.
    emp_high:
      type: return
      value:
        severity_band: HIGH
        dominant_violation: minor
        requires_remediation: false
        severity_note: Minor violations only — CS likely 0.80-0.89. Advisory flags.
    emp_exemplary:
      type: return
      value:
        severity_band: EXEMPLARY
        dominant_violation: none
        requires_remediation: false
        severity_note: No violations detected — CS 1.00. Full credibility.
    pre_check_critical_high:
      type: condition
      variable: n_critical
      operator: gte
      value: 4
      true_next: pre_very_low
      false_next: pre_check_critical_mid
    pre_check_critical_mid:
      type: condition
      variable: n_critical
      operator: gte
      value: 3
      true_next: pre_low
      false_next: pre_check_critical_some
    pre_check_critical_some:
      type: condition
      variable: n_critical
      operator: gte
      value: 1
      true_next: pre_check_major_with_critical
      false_next: pre_check_major_only
    pre_check_major_with_critical:
      type: condition
      variable: n_major
      operator: gte
      value: 4
      true_next: pre_low
      false_next: pre_moderate
    pre_check_major_only:
      type: condition
      variable: n_major
      operator: gte
      value: 5
      true_next: pre_low
      false_next: pre_check_major_mid
    pre_check_major_mid:
      type: condition
      variable: n_major
      operator: gte
      value: 3
      true_next: pre_moderate
      false_next: pre_check_major_some
    pre_check_major_some:
      type: condition
      variable: n_major
      operator: gte
      value: 1
      true_next: pre_high
      false_next: pre_check_minor
    pre_check_minor:
      type: condition
      variable: n_minor
      operator: gte
      value: 1
      true_next: pre_high
      false_next: pre_exemplary
    pre_very_low:
      type: return
      value:
        severity_band: VERY_LOW
        dominant_violation: critical
        requires_remediation: true
        severity_note: 4+ critical violations — MS likely below 0.30. Framework structurally unsound.
    pre_low:
      type: return
      value:
        severity_band: LOW
        dominant_violation: critical
        requires_remediation: true
        severity_note: Heavy violation load — MS likely 0.30-0.49. Major maturation gaps.
    pre_moderate:
      type: return
      value:
        severity_band: MODERATE
        dominant_violation: mixed
        requires_remediation: true
        severity_note: Moderate violations — MS likely 0.50-0.69. Maturation work needed.
    pre_high:
      type: return
      value:
        severity_band: HIGH
        dominant_violation: minor
        requires_remediation: false
        severity_note: Minor gaps — MS likely 0.70-0.89. Eligible for protocol development.
    pre_exemplary:
      type: return
      value:
        severity_band: EXEMPLARY
        dominant_violation: none
        requires_remediation: false
        severity_note: No violations — MS 1.00. Exemplary maturation.
