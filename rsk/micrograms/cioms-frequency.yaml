name: cioms-frequency
description: 'CIOMS frequency classification for adverse reactions per EU SmPC Section 4.8 labeling convention'
version: 0.1.0
interface:
  inputs:
    incidence_pct:
      type: float
      required: false
  outputs:
    cioms_category:
      type: string
    frequency:
      type: string
    label_text:
      type: string
    section_in_smpc:
      type: string
tree:
  start: very_common_check
  nodes:
    very_common_check:
      type: condition
      variable: incidence_pct
      operator: gte
      value: 10.0
      true_next: very_common
      false_next: common_check
    common_check:
      type: condition
      variable: incidence_pct
      operator: gte
      value: 1.0
      true_next: common
      false_next: uncommon_check
    uncommon_check:
      type: condition
      variable: incidence_pct
      operator: gte
      value: 0.1
      true_next: uncommon
      false_next: rare_check
    rare_check:
      type: condition
      variable: incidence_pct
      operator: gte
      value: 0.01
      true_next: rare
      false_next: very_rare_check
    very_rare_check:
      type: condition
      variable: incidence_pct
      operator: gt
      value: 0.0
      true_next: very_rare
      false_next: not_known
    very_common:
      type: return
      value:
        frequency: VERY_COMMON
        cioms_category: ">=1/10"
        label_text: Very common
        section_in_smpc: Section 4.8
    common:
      type: return
      value:
        frequency: COMMON
        cioms_category: ">=1/100 to <1/10"
        label_text: Common
        section_in_smpc: Section 4.8
    uncommon:
      type: return
      value:
        frequency: UNCOMMON
        cioms_category: ">=1/1,000 to <1/100"
        label_text: Uncommon
        section_in_smpc: Section 4.8
    rare:
      type: return
      value:
        frequency: RARE
        cioms_category: ">=1/10,000 to <1/1,000"
        label_text: Rare
        section_in_smpc: Section 4.8
    very_rare:
      type: return
      value:
        frequency: VERY_RARE
        cioms_category: "<1/10,000"
        label_text: Very rare
        section_in_smpc: Section 4.8
    not_known:
      type: return
      value:
        frequency: NOT_KNOWN
        cioms_category: "not known"
        label_text: Frequency not known
        section_in_smpc: Section 4.8
tests:
- input:
    incidence_pct: 25.0
  expect:
    frequency: VERY_COMMON
    cioms_category: ">=1/10"
    label_text: Very common
- input:
    incidence_pct: 10.0
  expect:
    frequency: VERY_COMMON
    cioms_category: ">=1/10"
    label_text: Very common
- input:
    incidence_pct: 5.0
  expect:
    frequency: COMMON
    cioms_category: ">=1/100 to <1/10"
    label_text: Common
- input:
    incidence_pct: 1.0
  expect:
    frequency: COMMON
    cioms_category: ">=1/100 to <1/10"
    label_text: Common
- input:
    incidence_pct: 0.5
  expect:
    frequency: UNCOMMON
    cioms_category: ">=1/1,000 to <1/100"
    label_text: Uncommon
- input:
    incidence_pct: 0.1
  expect:
    frequency: UNCOMMON
    cioms_category: ">=1/1,000 to <1/100"
    label_text: Uncommon
- input:
    incidence_pct: 0.05
  expect:
    frequency: RARE
    cioms_category: ">=1/10,000 to <1/1,000"
    label_text: Rare
- input:
    incidence_pct: 0.01
  expect:
    frequency: RARE
    cioms_category: ">=1/10,000 to <1/1,000"
    label_text: Rare
- input:
    incidence_pct: 0.001
  expect:
    frequency: VERY_RARE
    cioms_category: "<1/10,000"
    label_text: Very rare
- input:
    incidence_pct: 0.009
  expect:
    frequency: VERY_RARE
    cioms_category: "<1/10,000"
    label_text: Very rare
- input:
    incidence_pct: 0.0
  expect:
    frequency: NOT_KNOWN
    label_text: Frequency not known
    section_in_smpc: Section 4.8
- input: {}
  expect:
    frequency: NOT_KNOWN
    label_text: Frequency not known
    section_in_smpc: Section 4.8
