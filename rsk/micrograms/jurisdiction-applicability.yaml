name: jurisdiction-applicability
description: Fills the λ (Location) primitive gap. Determines which jurisdictions' PV reporting rules apply based on market authorization, event origin, and seriousness.
version: 0.1.0
tree:
  start: market_check
  nodes:
    canada_cross_border_serious:
      type: return
      value:
        expedited_reporting_required: true
        jurisdiction_class: CROSS_BORDER_EXPEDITED
        action: Serious adverse event in non-authorized market; expedited reporting to authorized market required
        location_primitive: λ — event in unauthorized location; expedited cross-border reference; high partition coefficient
        chemistry_analog: High partition coefficient; rapid diffusion across multiple phase boundaries
    us_market_check:
      type: condition
      variable: market_authorization
      operator: eq
      value: us
      true_next: us_origin_check
      false_next: eu_market_check
    eu_cross_border_seriousness:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: eu_cross_border_serious
      false_next: eu_cross_border_not_serious
    canada_cross_border_seriousness:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: canada_cross_border_serious
      false_next: canada_cross_border_not_serious
    japan_market_check:
      type: condition
      variable: market_authorization
      operator: eq
      value: japan
      true_next: japan_origin_check
      false_next: canada_market_check
    us_cross_border_not_serious:
      type: return
      value:
        action: Non-serious adverse event in non-authorized market; routine reporting within timeframe
        expedited_reporting_required: false
        location_primitive: λ — event in unauthorized location; routine cross-border reference; low partition coefficient
        jurisdiction_class: CROSS_BORDER_ROUTINE
        chemistry_analog: Low partition coefficient; gradual diffusion across phase boundaries
    eu_domestic_serious:
      type: return
      value:
        location_primitive: λ — event in authorized market; cross-border notification required due to seriousness
        expedited_reporting_required: true
        chemistry_analog: Reaction vessel with partition coefficient gradient; diffusion across phase boundaries
        jurisdiction_class: DOMESTIC_WITH_CROSS_BORDER
        action: Report domestically with expedited cross-border notification to other authorized markets
    eu_cross_border_serious:
