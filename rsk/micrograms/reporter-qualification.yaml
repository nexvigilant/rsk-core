# MICROGRAM++ (upgraded 2026-04-23)
name: reporter-qualification
version: 0.1.0
description: Classify reporter by type and derive qualification level, causality weight, and MedWatch submission eligibility. ICH E2A Section III.A.1 reporter classification.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reporter_type
    type: string
    required: true
    description: ""
outputs:
  - name: qualification_level
    type: string
  - name: weight_in_causality
    type: float
  - name: can_submit_medwatch
    type: bool
  - name: regulatory_reference
    type: string
interface:
  inputs:
    reporter_type:
      type: string
      required: true
  outputs:
    qualification_level:
      type: string
    weight_in_causality:
      type: float
    can_submit_medwatch:
      type: bool
    regulatory_reference:
      type: string
ui:
  title: Reporter Qualification
  subtitle: Classify reporter by type and derive qualification level, causality weight, and MedWatch submission eligibility. ICH E2A Section III.A.1 reporter classification.
  icon: circle
  route: /vigilance/mg/reporter-qualification
  steps:
    - field: reporter_type
      label: reporter type
      help: Enter reporter_type
      widget: text
      placeholder: null
  result:
    template: "qualification_level: {{qualification_level}} — weight_in_causality: {{weight_in_causality}} — can_submit_medwatch: {{can_submit_medwatch}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/reporter-qualification
  cli: rsk mcg run reporter-qualification
  auth: none
  rate_limit: 600/min
tree:
  start: type_check
  nodes:
    type_check:
      type: condition
      variable: reporter_type
      operator: eq
      value: physician
      true_next: healthcare_professional_result
      false_next: pharmacist_check
    pharmacist_check:
      type: condition
      variable: reporter_type
      operator: eq
      value: pharmacist
      true_next: healthcare_professional_result
      false_next: nurse_check
    nurse_check:
      type: condition
      variable: reporter_type
      operator: eq
      value: nurse
      true_next: healthcare_professional_result
      false_next: consumer_check
    consumer_check:
      type: condition
      variable: reporter_type
      operator: eq
      value: consumer
      true_next: consumer_result
      false_next: lawyer_check
    lawyer_check:
      type: condition
      variable: reporter_type
      operator: eq
      value: lawyer
      true_next: other_result
      false_next: other_result
    healthcare_professional_result:
      type: return
      value:
        qualification_level: healthcare_professional
        weight_in_causality: 1
        can_submit_medwatch: true
        regulatory_reference: ICH E2A Section III.A.1 (Healthcare Professional)
    consumer_result:
      type: return
      value:
        qualification_level: consumer
        weight_in_causality: 0.5
        can_submit_medwatch: true
        regulatory_reference: ICH E2A Section III.A.1 (Consumer)
    other_result:
      type: return
      value:
        qualification_level: other
        weight_in_causality: 0.3
        can_submit_medwatch: true
        regulatory_reference: ICH E2A Section III.A.1 (Other)
tests:
  - input:
      reporter_type: physician
    expect:
      qualification_level: healthcare_professional
      weight_in_causality: 1
      can_submit_medwatch: true
      regulatory_reference: ICH E2A Section III.A.1 (Healthcare Professional)
  - input:
      reporter_type: pharmacist
    expect:
      qualification_level: healthcare_professional
      weight_in_causality: 1
      can_submit_medwatch: true
      regulatory_reference: ICH E2A Section III.A.1 (Healthcare Professional)
  - input:
      reporter_type: nurse
    expect:
      qualification_level: healthcare_professional
      weight_in_causality: 1
      can_submit_medwatch: true
      regulatory_reference: ICH E2A Section III.A.1 (Healthcare Professional)
  - input:
      reporter_type: consumer
    expect:
      qualification_level: consumer
      weight_in_causality: 0.5
      can_submit_medwatch: true
      regulatory_reference: ICH E2A Section III.A.1 (Consumer)
  - input:
      reporter_type: lawyer
    expect:
      qualification_level: other
      weight_in_causality: 0.3
      can_submit_medwatch: true
      regulatory_reference: ICH E2A Section III.A.1 (Other)
  - input:
      reporter_type: unknown
    expect:
      qualification_level: other
      weight_in_causality: 0.3
      can_submit_medwatch: true
      regulatory_reference: ICH E2A Section III.A.1 (Other)
  - input: {}
    expect:
      qualification_level: other
      weight_in_causality: 0.3
      can_submit_medwatch: true
      regulatory_reference: ICH E2A Section III.A.1 (Other)
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - qualification_level
    - weight_in_causality
    - can_submit_medwatch
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
