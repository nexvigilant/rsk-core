# MICROGRAM++ (upgraded 2026-04-23)
name: suse-classifier
version: 1.0.0
description: "Classify drug-event pair as Suspected Unexpected Serious Adverse Reaction. Three gates: Serious (ICH E2A) → Unexpected (not on label) → Signal strength (Evans disproportionality)."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: prr
    type: float
    required: true
    description: ""
  - name: ror_lower
    type: float
    required: true
    description: ""
  - name: ic025
    type: float
    required: true
    description: ""
  - name: case_count
    type: integer
    required: true
    description: ""
  - name: is_serious
    type: bool
    required: true
    description: ""
  - name: on_label
    type: bool
    required: true
    description: ""
outputs:
  - name: classification
    type: string
  - name: suse
    type: bool
  - name: priority
    type: string
  - name: action
    type: string
interface:
  inputs:
    prr:
      type: float
      required: true
    ror_lower:
      type: float
      required: true
    ic025:
      type: float
      required: true
    case_count:
      type: integer
      required: true
    is_serious:
      type: bool
      required: true
    on_label:
      type: bool
      required: true
  outputs:
    classification:
      type: string
    suse:
      type: bool
    priority:
      type: string
    action:
      type: string
ui:
  title: Suse Classifier
  subtitle: "Classify drug-event pair as Suspected Unexpected Serious Adverse Reaction. Three gates: Serious (ICH E2A) → Unexpected (not on label) → Signal strength (Evans disproportionality)."
  icon: circle
  route: /vigilance/mg/suse-classifier
  steps:
    - field: prr
      label: prr
      help: Enter prr
      widget: text
      placeholder: null
    - field: ror_lower
      label: ror lower
      help: Enter ror_lower
      widget: text
      placeholder: null
    - field: ic025
      label: ic025
      help: Enter ic025
      widget: text
      placeholder: null
    - field: case_count
      label: case count
      help: Enter case_count
      widget: number
      placeholder: null
    - field: is_serious
      label: is serious
      help: Enter is_serious
      widget: toggle
      placeholder: null
    - field: on_label
      label: on label
      help: Enter on_label
      widget: toggle
      placeholder: null
  result:
    template: "classification: {{classification}} — suse: {{suse}} — priority: {{priority}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/suse-classifier
  cli: rsk mcg run suse-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_serious
  nodes:
    check_serious:
      type: condition
      variable: is_serious
      operator: eq
      value: false
      true_next: not_serious
      false_next: check_label
    not_serious:
      type: return
      value:
        classification: NOT_SERIOUS
        suse: false
        priority: P5
        action: No SUSE — event does not meet ICH E2A seriousness criteria
    check_label:
      type: condition
      variable: on_label
      operator: eq
      value: true
      true_next: expected
      false_next: check_cases
    expected:
      type: return
      value:
        classification: EXPECTED
        suse: false
        priority: P4
        action: No SUSE — event is listed on current drug labeling
    check_cases:
      type: condition
      variable: case_count
      operator: lt
      value: 3
      true_next: insufficient
      false_next: check_critical
    insufficient:
      type: return
      value:
        classification: INSUFFICIENT_DATA
        suse: false
        priority: P4
        action: Insufficient cases for signal detection (N < 3)
    check_critical:
      type: condition
      variable: prr
      operator: gte
      value: 10
      true_next: check_critical_ror
      false_next: check_high
    check_critical_ror:
      type: condition
      variable: ror_lower
      operator: gt
      value: 5
      true_next: check_critical_ic
      false_next: check_high
    check_critical_ic:
      type: condition
      variable: ic025
      operator: gt
      value: 2
      true_next: suse_critical
      false_next: check_high
    suse_critical:
      type: return
      value:
        classification: SUSE_CRITICAL
        suse: true
        priority: P0
        action: CRITICAL SUSE — initiate expedited regulatory review within 15 days
    check_high:
      type: condition
      variable: prr
      operator: gte
      value: 5
      true_next: check_high_ror
      false_next: check_moderate
    check_high_ror:
      type: condition
      variable: ror_lower
      operator: gt
      value: 2
      true_next: check_high_ic
      false_next: check_moderate
    check_high_ic:
      type: condition
      variable: ic025
      operator: gt
      value: 1
      true_next: suse_high
      false_next: check_moderate
    suse_high:
      type: return
      value:
        classification: SUSE_HIGH
        suse: true
        priority: P1
        action: HIGH SUSE — schedule causality assessment and regulatory notification
    check_moderate:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: check_moderate_ror
      false_next: check_low
    check_moderate_ror:
      type: condition
      variable: ror_lower
      operator: gt
      value: 1
      true_next: check_moderate_ic
      false_next: check_low
    check_moderate_ic:
      type: condition
      variable: ic025
      operator: gt
      value: 0
      true_next: suse_moderate
      false_next: check_low
    suse_moderate:
      type: return
      value:
        classification: SUSE_MODERATE
        suse: true
        priority: P2
        action: MODERATE SUSE — signal confirmed, begin investigation and monitoring
    check_low:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: suse_low
      false_next: no_signal
    suse_low:
      type: return
      value:
        classification: SUSE_LOW
        suse: true
        priority: P3
        action: LOW SUSE — partial signal, continue data collection
    no_signal:
      type: return
      value:
        classification: NO_SIGNAL
        suse: false
        priority: P5
        action: No disproportionality signal detected
tests:
  - input:
      prr: 134.4
      ror_lower: 216.7
      ic025: 6.69
      case_count: 16103
      is_serious: true
      on_label: false
    expect:
      classification: SUSE_CRITICAL
      suse: true
      priority: P0
  - input:
      prr: 12.9
      ror_lower: 11.4
      ic025: 3.47
      case_count: 181
      is_serious: true
      on_label: false
    expect:
      classification: SUSE_CRITICAL
      suse: true
      priority: P0
  - input:
      prr: 71.4
      ror_lower: 72.9
      ic025: 4.8
      case_count: 18372
      is_serious: true
      on_label: true
    expect:
      classification: EXPECTED
      suse: false
  - input:
      prr: 0.96
      ror_lower: 0.84
      ic025: -0.25
      case_count: 224
      is_serious: true
      on_label: false
    expect:
      classification: NO_SIGNAL
      suse: false
  - input:
      prr: 50
      ror_lower: 40
      ic025: 5
      case_count: 1000
      is_serious: false
      on_label: false
    expect:
      classification: NOT_SERIOUS
      suse: false
  - input:
      prr: 2.5
      ror_lower: 1.5
      ic025: 0.3
      case_count: 20
      is_serious: true
      on_label: false
    expect:
      classification: SUSE_MODERATE
      suse: true
      priority: P2
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - classification
    - suse
    - priority
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
