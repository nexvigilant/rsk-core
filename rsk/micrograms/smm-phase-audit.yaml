# MICROGRAM++ (upgraded 2026-04-23)
name: smm-phase-audit
version: 0.1.0
description: "NVG-SMM-001 Section 3: Audit a scientific method phase for documentation compliance. 10 phases (I-X), each with required docs and violation class if absent. Chemistry analog: Beer-Lambert — signal (documentation) must exceed noise floor for detection."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: phase
    type: string
    required: false
    description: ""
  - name: phase_name
    type: string
    required: false
    description: ""
  - name: fatal_if_absent
    type: bool
    required: true
    description: ""
  - name: documentation_present
    type: bool
    required: true
    description: ""
  - name: violation_class
    type: string
    required: false
    description: ""
outputs:
  - name: compliant
    type: bool
  - name: violation_class
    type: string
  - name: label
    type: string
  - name: action
    type: string
  - name: chemistry_analog
    type: string
interface:
  inputs:
    phase:
      type: string
      required: false
    phase_name:
      type: string
      required: false
    fatal_if_absent:
      type: bool
      required: true
    documentation_present:
      type: bool
      required: true
    violation_class:
      type: string
      required: false
  outputs:
    compliant:
      type: bool
    violation_class:
      type: string
    label:
      type: string
    action:
      type: string
    chemistry_analog:
      type: string
ui:
  title: Smm Phase Audit
  subtitle: "NVG-SMM-001 Section 3: Audit a scientific method phase for documentation compliance. 10 phases (I-X), each with required docs and violation class if absent. Chemistry analog: Beer-Lambert — signal (documentation) must exceed noise floor for detection."
  icon: circle
  route: /vigilance/mg/smm-phase-audit
  steps:
    - field: phase
      label: phase
      help: Enter phase
      widget: text
      placeholder: null
    - field: phase_name
      label: phase name
      help: Enter phase_name
      widget: text
      placeholder: null
    - field: fatal_if_absent
      label: fatal if absent
      help: Enter fatal_if_absent
      widget: toggle
      placeholder: null
    - field: documentation_present
      label: documentation present
      help: Enter documentation_present
      widget: toggle
      placeholder: null
    - field: violation_class
      label: violation class
      help: Enter violation_class
      widget: text
      placeholder: null
  result:
    template: "compliant: {{compliant}} — violation_class: {{violation_class}} — label: {{label}} — action: {{action}} — chemistry_analog: {{chemistry_analog}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/smm-phase-audit
  cli: rsk mcg run smm-phase-audit
  auth: none
  rate_limit: 600/min
tree:
  start: route_phase
  nodes:
    route_phase:
      type: condition
      variable: fatal_if_absent
      operator: eq
      value: true
      true_next: check_fatal_doc
      false_next: check_nonfatal_doc
    check_fatal_doc:
      type: condition
      variable: documentation_present
      operator: eq
      value: true
      true_next: compliant
      false_next: fatal_violation
    check_nonfatal_doc:
      type: condition
      variable: documentation_present
      operator: eq
      value: true
      true_next: compliant
      false_next: route_nonfatal_class
    route_nonfatal_class:
      type: condition
      variable: violation_class
      operator: eq
      value: C
      true_next: critical_violation
      false_next: major_violation
    fatal_violation:
      type: return
      value:
        compliant: false
        violation_class: F
        label: FATAL
        action: Required documentation absent in fatal-if-absent phase. Evidence excluded.
        chemistry_analog: Signal below detection limit — instrument cannot register
    critical_violation:
      type: return
      value:
        compliant: false
        violation_class: C
        label: CRITICAL
        action: Structural deficiency. Reduced weight integration.
        chemistry_analog: Signal present but below quantification limit
    major_violation:
      type: return
      value:
        compliant: false
        violation_class: M
        label: MAJOR
        action: Methodological gap. Advisory flag on integration.
        chemistry_analog: Signal quantifiable but imprecise — wide confidence interval
    compliant:
      type: return
      value:
        compliant: true
        violation_class: none
        label: COMPLIANT
        action: Phase documentation complete.
        chemistry_analog: Signal clear — good signal-to-noise ratio
tests:
  - input:
      phase: IV
      phase_name: Hypothesize
      fatal_if_absent: true
      documentation_present: false
      violation_class: F
    expect:
      compliant: false
      violation_class: F
      label: FATAL
  - input:
      phase: IV
      phase_name: Hypothesize
      fatal_if_absent: true
      documentation_present: true
      violation_class: F
    expect:
      compliant: true
      violation_class: none
      label: COMPLIANT
  - input:
      phase: II
      phase_name: Observe
      fatal_if_absent: false
      documentation_present: false
      violation_class: C
    expect:
      compliant: false
      violation_class: C
      label: CRITICAL
  - input:
      phase: I
      phase_name: Initialize
      fatal_if_absent: false
      documentation_present: false
      violation_class: M
    expect:
      compliant: false
      violation_class: M
      label: MAJOR
  - input:
      phase: V
      phase_name: Design
      fatal_if_absent: true
      documentation_present: true
      violation_class: F
    expect:
      compliant: true
      violation_class: none
      label: COMPLIANT
  - input: {}
    expect:
      action: Methodological gap. Advisory flag on integration.
      chemistry_analog: Signal quantifiable but imprecise — wide confidence interval
      compliant: false
      label: MAJOR
      violation_class: M
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - compliant
    - violation_class
    - label
    - action
    - chemistry_analog
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
