name: drug-profile-prednisone
description: 'Safety triage for prednisone: PRR-based signal routing (Type A)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        harm_type: A
        action: investigate
        signal: true
        drug: prednisone
        expected_prr: 2.4
    no_signal:
      type: return
      value:
        action: monitor
        drug: prednisone
        expected_prr: 2.4
        harm_type: A
        signal: false
tests:
- input:
    prr: 2.4
  expect:
    drug: prednisone
    signal: true
- input:
    prr: 0.5
  expect:
    drug: prednisone
    signal: false
- input: {}
  expect:
    drug: prednisone
    signal: false
- input:
    prr: 1.999
  expect:
    harm_type: A
    signal: false
    drug: prednisone
    expected_prr: 2.4
    action: monitor
- input:
    prr: 2.001
  expect:
    drug: prednisone
    harm_type: A
    action: investigate
    signal: true
    expected_prr: 2.4
interface: null
primitive_signature: null
