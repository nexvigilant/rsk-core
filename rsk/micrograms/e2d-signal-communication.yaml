# MICROGRAM++ (upgraded 2026-04-23)
name: e2d-signal-communication
version: 0.1.0
description: "ICH E2D Section 7: Determines the regulatory communication action required when a safety signal is identified post-approval — from routine PSUR inclusion to urgent Dear Healthcare Professional letter"
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: signal_strength
    type: string
    required: false
    description: ""
  - name: affects_labeling
    type: bool
    required: false
    description: ""
  - name: imminent_patient_risk
    type: bool
    required: false
    description: ""
  - name: signal_confirmed
    type: bool
    required: false
    description: ""
  - name: authority_notified
    type: bool
    required: false
    description: ""
outputs:
  - name: communication_action
    type: string
  - name: urgency
    type: string
  - name: deadline_days
    type: int
  - name: regulatory_reference
    type: string
interface:
  inputs:
    signal_strength:
      type: string
      required: false
    affects_labeling:
      type: bool
      required: false
    imminent_patient_risk:
      type: bool
      required: false
    signal_confirmed:
      type: bool
      required: false
    authority_notified:
      type: bool
      required: false
  outputs:
    communication_action:
      type: string
    urgency:
      type: string
    deadline_days:
      type: int
    regulatory_reference:
      type: string
ui:
  title: E2d Signal Communication
  subtitle: "ICH E2D Section 7: Determines the regulatory communication action required when a safety signal is identified post-approval — from routine PSUR inclusion to urgent Dear Healthcare Professional letter"
  icon: activity
  route: /vigilance/mg/e2d-signal-communication
  steps:
    - field: signal_strength
      label: signal strength
      help: Enter signal_strength
      widget: text
      placeholder: null
    - field: affects_labeling
      label: affects labeling
      help: Enter affects_labeling
      widget: toggle
      placeholder: null
    - field: imminent_patient_risk
      label: imminent patient risk
      help: Enter imminent_patient_risk
      widget: toggle
      placeholder: null
    - field: signal_confirmed
      label: signal confirmed
      help: Enter signal_confirmed
      widget: toggle
      placeholder: null
    - field: authority_notified
      label: authority notified
      help: Enter authority_notified
      widget: toggle
      placeholder: null
  result:
    template: "communication_action: {{communication_action}} — urgency: {{urgency}} — deadline_days: {{deadline_days}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2d-signal-communication
  cli: rsk mcg run e2d-signal-communication
  auth: none
  rate_limit: 600/min
tree:
  start: check_imminent_risk
  nodes:
    check_imminent_risk:
      type: condition
      variable: imminent_patient_risk
      operator: eq
      value: true
      true_next: return_urgent_dhpc
      false_next: check_confirmed
    check_confirmed:
      type: condition
      variable: signal_confirmed
      operator: eq
      value: true
      true_next: check_labeling
      false_next: check_strength
    check_labeling:
      type: condition
      variable: affects_labeling
      operator: eq
      value: true
      true_next: return_label_update
      false_next: check_authority_notified
    check_authority_notified:
      type: condition
      variable: authority_notified
      operator: eq
      value: true
      true_next: return_psur_inclusion
      false_next: return_notify_authority
    check_strength:
      type: condition
      variable: signal_strength
      operator: eq
      value: strong
      true_next: return_expedited_signal
      false_next: check_strength_moderate
    check_strength_moderate:
      type: condition
      variable: signal_strength
      operator: eq
      value: moderate
      true_next: return_enhanced_monitoring
      false_next: return_routine_monitoring
    return_urgent_dhpc:
      type: return
      value:
        communication_action: DEAR_HCP_LETTER
        urgency: URGENT
        deadline_days: 7
        regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
    return_label_update:
      type: return
      value:
        communication_action: LABEL_UPDATE_VARIATION
        urgency: HIGH
        deadline_days: 15
        regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
    return_notify_authority:
      type: return
      value:
        communication_action: NOTIFY_REGULATORY_AUTHORITY
        urgency: HIGH
        deadline_days: 15
        regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
    return_psur_inclusion:
      type: return
      value:
        communication_action: PSUR_SIGNAL_SECTION
        urgency: STANDARD
        deadline_days: 90
        regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
    return_expedited_signal:
      type: return
      value:
        communication_action: EXPEDITED_SIGNAL_REPORT
        urgency: HIGH
        deadline_days: 15
        regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
    return_enhanced_monitoring:
      type: return
      value:
        communication_action: ENHANCED_MONITORING_PSUR
        urgency: STANDARD
        deadline_days: 90
        regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
    return_routine_monitoring:
      type: return
      value:
        communication_action: ROUTINE_PSUR_MONITORING
        urgency: LOW
        deadline_days: 180
        regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
tests:
  - input:
      imminent_patient_risk: true
      signal_confirmed: true
      affects_labeling: true
      authority_notified: false
    expect:
      communication_action: DEAR_HCP_LETTER
      urgency: URGENT
      deadline_days: 7
      regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
  - input:
      imminent_patient_risk: false
      signal_confirmed: true
      affects_labeling: true
      authority_notified: false
    expect:
      communication_action: LABEL_UPDATE_VARIATION
      urgency: HIGH
      deadline_days: 15
      regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
  - input:
      imminent_patient_risk: false
      signal_confirmed: true
      affects_labeling: false
      authority_notified: false
    expect:
      communication_action: NOTIFY_REGULATORY_AUTHORITY
      urgency: HIGH
      deadline_days: 15
      regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
  - input:
      imminent_patient_risk: false
      signal_confirmed: true
      affects_labeling: false
      authority_notified: true
    expect:
      communication_action: PSUR_SIGNAL_SECTION
      urgency: STANDARD
      deadline_days: 90
      regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
  - input:
      imminent_patient_risk: false
      signal_confirmed: false
      signal_strength: strong
    expect:
      communication_action: EXPEDITED_SIGNAL_REPORT
      urgency: HIGH
      deadline_days: 15
      regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
  - input:
      imminent_patient_risk: false
      signal_confirmed: false
      signal_strength: moderate
    expect:
      communication_action: ENHANCED_MONITORING_PSUR
      urgency: STANDARD
      deadline_days: 90
      regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
  - input:
      imminent_patient_risk: false
      signal_confirmed: false
      signal_strength: weak
    expect:
      communication_action: ROUTINE_PSUR_MONITORING
      urgency: LOW
      deadline_days: 180
      regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
  - input: {}
    expect:
      communication_action: ROUTINE_PSUR_MONITORING
      urgency: LOW
      deadline_days: 180
      regulatory_reference: ICH E2D Section 7 - Safety Signal Communication
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - communication_action
    - urgency
    - deadline_days
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
