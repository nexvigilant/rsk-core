name: ich-e2a-gate
description: "ICH E2A compliance: Clinical Safety — Definitions"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "is_serious"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH E2A"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH E2A"
        compliant: false
        action: "remediate"
        gap: "is_serious"

tests:
  - input: {"is_serious": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
