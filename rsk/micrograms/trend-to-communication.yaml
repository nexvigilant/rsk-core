# MICROGRAM++ (upgraded 2026-04-23)
name: trend-to-communication
version: 0.1.0
description: Routes trend analysis to communication action level determination
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: magnitude
    type: string
    required: true
    description: ""
  - name: trend_direction
    type: string
    required: true
    description: ""
outputs:
  - name: communication_level
    type: string
  - name: urgency
    type: string
interface:
  inputs:
    magnitude:
      type: string
      required: true
    trend_direction:
      type: string
      required: true
  outputs:
    communication_level:
      type: string
      required: false
    urgency:
      type: string
      required: false
  aliases: {}
ui:
  title: Trend To Communication
  subtitle: Routes trend analysis to communication action level determination
  icon: circle
  route: /vigilance/mg/trend-to-communication
  steps:
    - field: magnitude
      label: magnitude
      help: Enter magnitude
      widget: text
      placeholder: null
    - field: trend_direction
      label: trend direction
      help: Enter trend_direction
      widget: text
      placeholder: null
  result:
    template: "communication_level: {{communication_level}} — urgency: {{urgency}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/trend-to-communication
  cli: rsk mcg run trend-to-communication
  auth: none
  rate_limit: 600/min
tree:
  start: check_direction
  nodes:
    stable_other:
      type: return
      value:
        urgency: deferred
        communication_level: routine
    decreasing_large:
      type: return
      value:
        communication_level: none
        urgency: deferred
    check_direction:
      type: condition
      variable: trend_direction
      operator: eq
      value: increasing
      true_next: check_magnitude_increasing
      false_next: check_stable
    stable_large:
      type: return
      value:
        communication_level: routine
        urgency: 90_days
    decreasing_other:
      type: return
      value:
        urgency: deferred
        communication_level: none
    check_magnitude_stable:
      type: condition
      variable: magnitude
      operator: eq
      value: large
      true_next: stable_large
      false_next: stable_other
    check_magnitude_inc_moderate:
      type: condition
      variable: magnitude
      operator: eq
      value: moderate
      true_next: increasing_moderate
      false_next: increasing_small
    check_stable:
      type: condition
      variable: trend_direction
      operator: eq
      value: stable
      true_next: check_magnitude_stable
      false_next: decreasing_path
    increasing_large:
      type: return
      value:
        communication_level: dhpc
        urgency: immediate
    increasing_small:
      type: return
      value:
        urgency: 90_days
        communication_level: routine
    check_magnitude_increasing:
      type: condition
      variable: magnitude
      operator: eq
      value: large
      true_next: increasing_large
      false_next: check_magnitude_inc_moderate
    decreasing_path:
      type: condition
      variable: magnitude
      operator: eq
      value: large
      true_next: decreasing_large
      false_next: decreasing_other
    increasing_moderate:
      type: return
      value:
        communication_level: label_update
        urgency: 30_days
tests:
  - input:
      magnitude: ""
      trend_direction: ""
    expect:
      urgency: deferred
      communication_level: none
  - input:
      magnitude: ""
      trend_direction: increasing
    expect:
      urgency: 90_days
      communication_level: routine
  - input:
      magnitude: ""
      trend_direction: stable
    expect:
      urgency: deferred
      communication_level: routine
  - input:
      magnitude: large
      trend_direction: ""
    expect:
      communication_level: none
      urgency: deferred
  - input:
      magnitude: large
      trend_direction: increasing
    expect:
      communication_level: dhpc
      urgency: immediate
  - input:
      magnitude: large
      trend_direction: stable
    expect:
      communication_level: routine
      urgency: 90_days
  - input:
      magnitude: moderate
      trend_direction: increasing
    expect:
      communication_level: label_update
      urgency: 30_days
  - input: {}
    expect:
      urgency: deferred
      communication_level: none
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - communication_level
    - urgency
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
