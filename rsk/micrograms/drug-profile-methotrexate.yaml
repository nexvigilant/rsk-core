name: drug-profile-methotrexate
description: 'Safety triage for methotrexate: PRR-based signal routing (Type C)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    no_signal:
      type: return
      value:
        harm_type: C
        action: monitor
        drug: methotrexate
        signal: false
        expected_prr: 5.5
    signal:
      type: return
      value:
        harm_type: C
        drug: methotrexate
        action: investigate
        expected_prr: 5.5
        signal: true
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 5.5
  expect:
    drug: methotrexate
    signal: true
- input:
    prr: 0.5
  expect:
    drug: methotrexate
    signal: false
- input: {}
  expect:
    signal: false
    drug: methotrexate
- input:
    prr: 1.999
  expect:
    signal: false
    expected_prr: 5.5
    harm_type: C
    drug: methotrexate
    action: monitor
- input:
    prr: 2.001
  expect:
    harm_type: C
    expected_prr: 5.5
    signal: true
    action: investigate
    drug: methotrexate
interface: null
primitive_signature: null
