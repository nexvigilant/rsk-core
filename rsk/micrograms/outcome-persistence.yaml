name: outcome-persistence
description: ICH E2A outcome duration classification — does the adverse outcome endure? Fills the π (Persistence) primitive gap.
version: 0.1.0
tree:
  start: check_permanent
  nodes:
    check_permanent:
      type: condition
      variable: is_permanent
      operator: eq
      value: true
      true_next: return_irreversible
      false_next: check_resolved
    check_30_days:
      type: condition
      variable: days_to_resolution
      operator: lte
      value: 30
      true_next: return_short_term
      false_next: check_90_days
    classify_by_days:
      type: condition
      variable: days_to_resolution
      operator: lte
      value: 7
      true_next: return_transient
      false_next: check_30_days
    return_medium_term:
      type: return
      value:
        action: Outcome resolved within 3 months. High clinical significance — escalate for further review.
        persistence_class: MEDIUM_TERM
        chemistry_analog: Long half-life decay (T_half 7–30 days)
        persistence_primitive: π — does the outcome endure
        ich_reference: ICH E2A Section 3.1 — persistent effects indicate seriousness
    check_resolved:
      type: condition
      variable: outcome_resolved
      operator: eq
      value: true
      true_next: classify_by_days
      false_next: return_ongoing
    return_transient:
      type: return
      value:
        persistence_primitive: π — does the outcome endure
        ich_reference: ICH E2A Section 3.3 — mild outcomes with rapid resolution
        chemistry_analog: Short half-life decay (T_half < 12 hours)
        action: Brief outcome resolved within 1 week. Low regulatory priority unless serious.
        persistence_class: TRANSIENT
    check_90_days:
      type: condition
      variable: days_to_resolution
      operator: lte
      value: 90
      true_next: return_medium_term
      false_next: return_chronic
    return_short_term:
      type: return
      value:
        action: Outcome resolved within 1 month. Moderate clinical significance.
        persistence_primitive: π — does the outcome endure
        persistence_class: SHORT_TERM
        ich_reference: ICH E2A Section 3.1 — duration is a modifier of seriousness
        chemistry_analog: Intermediate half-life decay (T_half 1–7 days)
    return_chronic:
      type: return
      value:
        ich_reference: ICH E2A Section 3.1 — prolonged course suggests causality strength
        persistence_class: CHRONIC
        persistence_primitive: π — does the outcome endure
        action: Outcome took >3 months to resolve. Severe persistence — likely serious or unexpected.
        chemistry_analog: Very long half-life decay (T_half > 30 days)
    return_ongoing:
      type: return
      value:
        action: Outcome still unresolved. Continue monitoring. Persistence timeline unknown.
        ich_reference: ICH E2A Section 3.2 — life-threatening events require ongoing assessment
        persistence_class: ONGOING
        persistence_primitive: π — does the outcome endure
        chemistry_analog: Intermediate reaction (substrate still converting)
    return_irreversible:
      type: return
      value:
        ich_reference: ICH E2A Section 3.1 — persistent or significant disability
        action: Permanent outcome — regulatory notification required. No recovery expected.
        persistence_class: IRREVERSIBLE
        persistence_primitive: π — does the outcome endure
        chemistry_analog: Covalent bond (permanent modification of tissue/organ function)
tests:
- input:
    is_permanent: true
    days_to_resolution: -1
    outcome_resolved: false
  expect:
    persistence_class: IRREVERSIBLE
- input:
