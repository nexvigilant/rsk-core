name: risk-score-classifier
description: 'Classify risk score 0-100 into CRITICAL/HIGH/MODERATE/LOW bands for Guardian risk routing'
version: 0.1.0
interface:
  inputs:
    risk_score:
      type: int
      required: false
  outputs:
    action:
      type: string
    escalate:
      type: bool
    level:
      type: string
tree:
  start: check_critical
  nodes:
    check_critical:
      type: condition
      variable: risk_score
      operator: gte
      value: 80
      true_next: critical
      false_next: check_high
    check_high:
      type: condition
      variable: risk_score
      operator: gte
      value: 60
      true_next: high
      false_next: check_moderate
    check_moderate:
      type: condition
      variable: risk_score
      operator: gte
      value: 30
      true_next: moderate
      false_next: low
    critical:
      type: return
      value:
        level: CRITICAL
        action: immediate_review
        escalate: true
    high:
      type: return
      value:
        level: HIGH
        action: priority_review
        escalate: true
    moderate:
      type: return
      value:
        level: MODERATE
        action: scheduled_review
        escalate: false
    low:
      type: return
      value:
        level: LOW
        action: routine_monitoring
        escalate: false
tests:
- input:
    risk_score: 95
  expect:
    level: CRITICAL
    action: immediate_review
    escalate: true
- input:
    risk_score: 80
  expect:
    level: CRITICAL
    action: immediate_review
    escalate: true
- input:
    risk_score: 65
  expect:
    level: HIGH
    action: priority_review
    escalate: true
- input:
    risk_score: 45
  expect:
    level: MODERATE
    action: scheduled_review
    escalate: false
- input:
    risk_score: 10
  expect:
    level: LOW
    action: routine_monitoring
    escalate: false
