# MICROGRAM++ (upgraded 2026-04-23)
name: spanglish-code-switch-detector
version: 0.1.0
description: |
  Detecta cambios de código español↔inglés en texto clínico y extrae señales de causalidad de los puntos de cambio. El cambio de código en sí ES la señal: switching to Spanish for symptoms often means English can't capture the nuance. "Está feeling dizzy" preserves estar's temporal signal with English vocabulary. "Es diabetic" preserves ser's identity signal through the switch. Detects code-switch patterns and classifies the PV-relevant signal they carry.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: text_fragment
    type: string
    required: true
    description: |
      Clinical text fragment that may contain Spanglish code-switching. Examples: "Está feeling dizzy", "Patient es diabetic", "Se siente very nauseous"
  - name: switch_direction
    type: string
    required: false
    description: |
      Direction of code-switch: "es_to_en" (Spanish frame, English content), "en_to_es" (English frame, Spanish content), or "mixed". If absent, auto-detected from text_fragment.
outputs:
  - name: pattern
    type: string
  - name: temporal_signal
    type: string
  - name: confidence_boost
    type: int
  - name: verbo_extraido
    type: string
  - name: accion
    type: string
interface:
  inputs:
    text_fragment:
      type: string
      required: true
      description: |
        Clinical text fragment that may contain Spanglish code-switching. Examples: "Está feeling dizzy", "Patient es diabetic", "Se siente very nauseous"
    switch_direction:
      type: string
      required: false
      description: |
        Direction of code-switch: "es_to_en" (Spanish frame, English content), "en_to_es" (English frame, Spanish content), or "mixed". If absent, auto-detected from text_fragment.
  outputs:
    pattern:
      type: string
      description: ESTAR_FRAME | SER_FRAME | SENTIRSE_FRAME | TENER_FRAME | ENGLISH_ONLY | SPANISH_ONLY | UNCLASSIFIED
    temporal_signal:
      type: string
      description: TRANSIENT | PERMANENT | NEUTRAL
    confidence_boost:
      type: int
      description: |
        0-100. Code-switching to Spanish for symptoms INCREASES relevance because the speaker invoked a more precise system. +20 for estar frame, +10 for sentirse frame, 0 for ser frame (identity, not ADR).
    verbo_extraido:
      type: string
      description: The Spanish verb extracted from the Spanglish text, for downstream chain
    accion:
      type: string
ui:
  title: Spanglish Code Switch Detector
  subtitle: |
    Detecta cambios de código español↔inglés en texto clínico y extrae señales de causalidad de los puntos de cambio. El cambio de código en sí ES la señal: switching to Spanish for symptoms often means English can't capture the nuance. "Está feeling dizzy" preserves estar's temporal signal with English vocabulary. "Es diabetic" preserves ser's identity signal through the switch. Detects code-switch patterns and classifies the PV-relevant signal they carry.
  icon: circle
  route: /vigilance/mg/spanglish-code-switch-detector
  steps:
    - field: text_fragment
      label: text fragment
      help: |
        Clinical text fragment that may contain Spanglish code-switching. Examples: "Está feeling dizzy", "Patient es diabetic", "Se siente very nauseous"
      widget: text
      placeholder: null
    - field: switch_direction
      label: switch direction
      help: |
        Direction of code-switch: "es_to_en" (Spanish frame, English content), "en_to_es" (English frame, Spanish content), or "mixed". If absent, auto-detected from text_fragment.
      widget: text
      placeholder: null
  result:
    template: "pattern: {{pattern}} — temporal_signal: {{temporal_signal}} — confidence_boost: {{confidence_boost}} — verbo_extraido: {{verbo_extraido}} — accion: {{accion}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/spanglish-code-switch-detector
  cli: rsk mcg run spanglish-code-switch-detector
  auth: none
  rate_limit: 600/min
tree:
  start: check_text_present
  nodes:
    check_text_present:
      type: condition
      variable: text_fragment
      operator: is_null
      value: null
      true_next: reject
      false_next: check_estar_frame
    reject:
      type: return
      value:
        pattern: UNCLASSIFIED
        temporal_signal: NEUTRAL
        confidence_boost: 0
        verbo_extraido: ""
        accion: "REJECTED: text_fragment is required"
    check_estar_frame:
      type: condition
      variable: text_fragment
      operator: matches
      value: (?i)(est[áa]|estaba|estaban|estuvo|estuve|estando|est[ée])
      true_next: estar_detected
      false_next: check_ser_frame
    estar_detected:
      type: return
      value:
        pattern: ESTAR_FRAME
        temporal_signal: TRANSIENT
        confidence_boost: 20
        verbo_extraido: estar
        accion: |
          INVESTIGAR: estar-frame Spanglish detected. The speaker switched to Spanish estar to describe a TRANSIENT state, then continued in English. This is a stronger temporal signal than pure English — the speaker chose the more precise language for the symptom description.
    check_ser_frame:
      type: condition
      variable: text_fragment
      operator: matches
      value: (?i)(\bes\b|\bson\b|\bera\b|\beran\b|\bfue\b|\bsiendo\b|\bsea\b)
      true_next: ser_detected
      false_next: check_sentirse_frame
    ser_detected:
      type: return
      value:
        pattern: SER_FRAME
        temporal_signal: PERMANENT
        confidence_boost: 0
        verbo_extraido: ser
        accion: |
          DOCUMENTAR: ser-frame Spanglish detected. The speaker used ser (identity/permanent) for this condition. Likely pre-existing, not drug-induced. No confidence boost — ser signals identity.
    check_sentirse_frame:
      type: condition
      variable: text_fragment
      operator: matches
      value: (?i)(se siente|se sent[ií]a|se sinti[óo]|sinti[ée]ndose|me siento)
      true_next: sentirse_detected
      false_next: check_tener_frame
    sentirse_detected:
      type: return
      value:
        pattern: SENTIRSE_FRAME
        temporal_signal: TRANSIENT
        confidence_boost: 10
        verbo_extraido: sentirse
        accion: |
          INVESTIGAR: sentirse-frame Spanglish detected. "Se siente" (feels) is reflexive estar — the patient experiences a transient state. Moderate confidence boost — sentirse implies subjective symptom report, weaker than medical estar but still temporal.
    check_tener_frame:
      type: condition
      variable: text_fragment
      operator: matches
      value: (?i)(\btiene\b|\bten[ií]a\b|\btuvo\b|\btengo\b|\btenga\b)
      true_next: tener_detected
      false_next: check_pure_english
    tener_detected:
      type: return
      value:
        pattern: TENER_FRAME
        temporal_signal: TRANSIENT
        confidence_boost: 15
        verbo_extraido: tener
        accion: |
          INVESTIGAR: tener-frame Spanglish detected. "Tiene" (has) in medical Spanglish typically describes current symptoms. Stronger than sentirse — "tiene fever" is more assertive than "se siente with fever". Temporal: current possession of symptom.
    check_pure_english:
      type: condition
      variable: text_fragment
      operator: matches
      value: (?i)^[a-z0-9 ,.'"!?;:\-]+$
      true_next: english_only
      false_next: unclassified
    english_only:
      type: return
      value:
        pattern: ENGLISH_ONLY
        temporal_signal: NEUTRAL
        confidence_boost: 0
        verbo_extraido: ""
        accion: No code-switch detected — pure English. No temporal signal from grammar.
    unclassified:
      type: return
      value:
        pattern: UNCLASSIFIED
        temporal_signal: NEUTRAL
        confidence_boost: 0
        verbo_extraido: ""
        accion: Code pattern not recognized — may be pure Spanish or other switch pattern.
tests:
  - input:
      text_fragment: Está feeling very dizzy since starting the medication
    expect:
      pattern: ESTAR_FRAME
      temporal_signal: TRANSIENT
      confidence_boost: 20
      verbo_extraido: estar
  - input:
      text_fragment: Patient estaba very confused after the infusion
    expect:
      pattern: ESTAR_FRAME
      temporal_signal: TRANSIENT
      confidence_boost: 20
  - input:
      text_fragment: Estuvo vomiting toda la noche
    expect:
      pattern: ESTAR_FRAME
      temporal_signal: TRANSIENT
      confidence_boost: 20
  - input:
      text_fragment: Patient es diabetic, on metformin
    expect:
      pattern: SER_FRAME
      temporal_signal: PERMANENT
      confidence_boost: 0
      verbo_extraido: ser
  - input:
      text_fragment: Era hypertensive before starting treatment
    expect:
      pattern: SER_FRAME
      temporal_signal: PERMANENT
      confidence_boost: 0
  - input:
      text_fragment: Se siente very nauseous after taking the pills
    expect:
      pattern: SENTIRSE_FRAME
      temporal_signal: TRANSIENT
      confidence_boost: 10
      verbo_extraido: sentirse
  - input:
      text_fragment: Me siento really tired since the dose increase
    expect:
      pattern: SENTIRSE_FRAME
      temporal_signal: TRANSIENT
      confidence_boost: 10
  - input:
      text_fragment: Tiene headache and joint pain
    expect:
      pattern: TENER_FRAME
      temporal_signal: TRANSIENT
      confidence_boost: 15
      verbo_extraido: tener
  - input:
      text_fragment: Tenía fever for three days
    expect:
      pattern: TENER_FRAME
      temporal_signal: TRANSIENT
      confidence_boost: 15
  - input:
      text_fragment: Patient reported dizziness and nausea
    expect:
      pattern: ENGLISH_ONLY
      temporal_signal: NEUTRAL
      confidence_boost: 0
  - input: {}
    expect:
      pattern: UNCLASSIFIED
      temporal_signal: NEUTRAL
      confidence_boost: 0
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - pattern
    - temporal_signal
    - confidence_boost
    - verbo_extraido
    - accion
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
