# MICROGRAM++ (upgraded 2026-04-23)
name: compliance-state-tracker
version: 0.1.0
description: "Case lifecycle FSM for compliance tracking: RECEIVED -> VALIDATED -> ASSESSED -> REPORTED -> CLOSED. Routes based on current state and gate conditions from upstream micrograms."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: assessed
    type: bool
    required: false
    description: ""
  - name: current_state
    type: string
    required: false
    description: ""
  - name: reported
    type: bool
    required: false
    description: ""
  - name: valid_icsr
    type: bool
    required: false
    description: ""
outputs:
  - name: action_required
    type: string
  - name: compliance_state
    type: string
  - name: ich_control
    type: string
  - name: next_state
    type: string
interface:
  inputs:
    assessed:
      type: bool
      required: false
    current_state:
      type: string
      required: false
    reported:
      type: bool
      required: false
    valid_icsr:
      type: bool
      required: false
  outputs:
    action_required:
      type: string
    compliance_state:
      type: string
    ich_control:
      type: string
    next_state:
      type: string
ui:
  title: Compliance State Tracker
  subtitle: "Case lifecycle FSM for compliance tracking: RECEIVED -> VALIDATED -> ASSESSED -> REPORTED -> CLOSED. Routes based on current state and gate conditions from upstream micrograms."
  icon: circle
  route: /vigilance/mg/compliance-state-tracker
  steps:
    - field: assessed
      label: assessed
      help: Enter assessed
      widget: toggle
      placeholder: null
    - field: current_state
      label: current state
      help: Enter current_state
      widget: text
      placeholder: null
    - field: reported
      label: reported
      help: Enter reported
      widget: toggle
      placeholder: null
    - field: valid_icsr
      label: valid icsr
      help: Enter valid_icsr
      widget: toggle
      placeholder: null
  result:
    template: "action_required: {{action_required}} — compliance_state: {{compliance_state}} — ich_control: {{ich_control}} — next_state: {{next_state}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/compliance-state-tracker
  cli: rsk mcg run compliance-state-tracker
  auth: none
  rate_limit: 600/min
tree:
  start: check_state
  nodes:
    check_state:
      type: condition
      variable: current_state
      operator: eq
      value: RECEIVED
      true_next: validate_gate
      false_next: check_validated
    check_validated:
      type: condition
      variable: current_state
      operator: eq
      value: VALIDATED
      true_next: assess_gate
      false_next: check_assessed
    check_assessed:
      type: condition
      variable: current_state
      operator: eq
      value: ASSESSED
      true_next: report_gate
      false_next: check_reported
    check_reported:
      type: condition
      variable: current_state
      operator: eq
      value: REPORTED
      true_next: close_gate
      false_next: initial_state
    validate_gate:
      type: condition
      variable: valid_icsr
      operator: eq
      value: true
      true_next: advance_to_validated
      false_next: blocked_validation
    assess_gate:
      type: condition
      variable: assessed
      operator: eq
      value: true
      true_next: advance_to_assessed
      false_next: blocked_assessment
    report_gate:
      type: condition
      variable: reported
      operator: eq
      value: true
      true_next: advance_to_reported
      false_next: blocked_reporting
    close_gate:
      type: return
      value:
        compliance_state: REPORTED
        next_state: CLOSED
        action_required: archive_case
        ich_control: ICH-E2A-1
    initial_state:
      type: return
      value:
        compliance_state: RECEIVED
        next_state: RECEIVED
        action_required: run_e2a_minimum_criteria
        ich_control: ICH-E2A-1
    advance_to_validated:
      type: return
      value:
        compliance_state: RECEIVED
        next_state: VALIDATED
        action_required: run_case_assessment_pipeline
        ich_control: ICH-E2A-1
    blocked_validation:
      type: return
      value:
        compliance_state: RECEIVED
        next_state: RECEIVED
        action_required: collect_missing_icsr_elements
        ich_control: ICH-E2A-1
    advance_to_assessed:
      type: return
      value:
        compliance_state: VALIDATED
        next_state: ASSESSED
        action_required: run_expedited_reporting_decision
        ich_control: ICH-E2A-2
    blocked_assessment:
      type: return
      value:
        compliance_state: VALIDATED
        next_state: VALIDATED
        action_required: complete_seriousness_causality_assessment
        ich_control: ICH-E2C-2
    advance_to_reported:
      type: return
      value:
        compliance_state: ASSESSED
        next_state: REPORTED
        action_required: monitor_for_followup
        ich_control: ICH-E2A-2
    blocked_reporting:
      type: return
      value:
        compliance_state: ASSESSED
        next_state: ASSESSED
        action_required: submit_regulatory_report
        ich_control: ICH-E2A-2
tests:
  - name: new case enters at RECEIVED - needs validation
    input:
      current_state: RECEIVED
      valid_icsr: false
    expect:
      compliance_state: RECEIVED
      next_state: RECEIVED
      action_required: collect_missing_icsr_elements
      ich_control: ICH-E2A-1
  - name: RECEIVED with valid ICSR advances to VALIDATED
    input:
      current_state: RECEIVED
      valid_icsr: true
    expect:
      compliance_state: RECEIVED
      next_state: VALIDATED
      action_required: run_case_assessment_pipeline
      ich_control: ICH-E2A-1
  - name: VALIDATED with assessment advances to ASSESSED
    input:
      current_state: VALIDATED
      assessed: true
    expect:
      compliance_state: VALIDATED
      next_state: ASSESSED
      action_required: run_expedited_reporting_decision
      ich_control: ICH-E2A-2
  - name: VALIDATED without assessment stays blocked
    input:
      current_state: VALIDATED
      assessed: false
    expect:
      compliance_state: VALIDATED
      next_state: VALIDATED
      action_required: complete_seriousness_causality_assessment
      ich_control: ICH-E2C-2
  - name: ASSESSED with report advances to REPORTED
    input:
      current_state: ASSESSED
      reported: true
    expect:
      compliance_state: ASSESSED
      next_state: REPORTED
      action_required: monitor_for_followup
      ich_control: ICH-E2A-2
  - name: ASSESSED without report stays blocked
    input:
      current_state: ASSESSED
      reported: false
    expect:
      compliance_state: ASSESSED
      next_state: ASSESSED
      action_required: submit_regulatory_report
      ich_control: ICH-E2A-2
  - name: REPORTED advances to CLOSED
    input:
      current_state: REPORTED
    expect:
      compliance_state: REPORTED
      next_state: CLOSED
      action_required: archive_case
      ich_control: ICH-E2A-1
  - name: null input defaults to initial state
    input: {}
    expect:
      compliance_state: RECEIVED
      next_state: RECEIVED
      action_required: run_e2a_minimum_criteria
      ich_control: ICH-E2A-1
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - action_required
    - compliance_state
    - ich_control
    - next_state
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
