name: ich-e2c-gate
description: "ICH E2C compliance: Periodic Safety — PSUR/PBRER"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "is_periodic"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH E2C"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH E2C"
        compliant: false
        action: "remediate"
        gap: "is_periodic"

tests:
  - input: {"is_periodic": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
