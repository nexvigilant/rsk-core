# MICROGRAM++ (upgraded 2026-04-23)
name: void-gap-predict
version: 0.1.0
description: Mendeleev-method void prediction — gate framework gaps at confidence>=0.7 (Module 20 port)
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: neighbor_count
    type: int
    required: true
    description: ""
  - name: confidence
    type: float
    required: true
    description: ""
outputs:
  - name: predict_gap
    type: bool
  - name: classification
    type: string
interface:
  inputs:
    neighbor_count:
      type: int
      required: true
    confidence:
      type: float
      required: true
  outputs:
    predict_gap:
      type: bool
    classification:
      type: string
ui:
  title: Void Gap Predict
  subtitle: Mendeleev-method void prediction — gate framework gaps at confidence>=0.7 (Module 20 port)
  icon: circle
  route: /vigilance/mg/void-gap-predict
  steps:
    - field: neighbor_count
      label: neighbor count
      help: Enter neighbor_count
      widget: text
      placeholder: null
    - field: confidence
      label: confidence
      help: Enter confidence
      widget: text
      placeholder: null
  result:
    template: "predict_gap: {{predict_gap}} — classification: {{classification}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/void-gap-predict
  cli: rsk mcg run void-gap-predict
  auth: none
  rate_limit: 600/min
tree:
  start: check_neighbors
  nodes:
    check_neighbors:
      type: condition
      variable: neighbor_count
      operator: gte
      value: 2
      true_next: check_confidence
      false_next: insufficient_neighbors
    check_confidence:
      type: condition
      variable: confidence
      operator: gte
      value: 0.7
      true_next: predict
      false_next: low_confidence
    predict:
      type: return
      value:
        predict_gap: true
        classification: high_confidence_gap
    low_confidence:
      type: return
      value:
        predict_gap: false
        classification: below_threshold
    insufficient_neighbors:
      type: return
      value:
        predict_gap: false
        classification: insufficient_neighbors
tests:
  - input:
      neighbor_count: 4
      confidence: 0.9
    expect:
      predict_gap: true
      classification: high_confidence_gap
  - input:
      neighbor_count: 1
      confidence: 0.95
    expect:
      predict_gap: false
      classification: insufficient_neighbors
  - input:
      neighbor_count: 3
      confidence: 0.5
    expect:
      predict_gap: false
      classification: below_threshold
  - input:
      neighbor_count: 2
      confidence: 0.7
    expect:
      predict_gap: true
      classification: high_confidence_gap
  - input: {}
    expect:
      predict_gap: false
      classification: insufficient_neighbors
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - predict_gap
    - classification
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
