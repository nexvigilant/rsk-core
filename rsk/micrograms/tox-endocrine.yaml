name: tox-endocrine
description: 'Endocrine toxicity gate: tsh_ratio thresholds for thyroid'
version: 0.1.0
tree:
  start: check_severe
  nodes:
    check_mild:
      type: condition
      variable: tsh_ratio
      operator: gte
      value: 2.0
      true_next: mild
      false_next: normal
    normal:
      type: return
      value:
        severity: normal
        organ: endocrine
        action: continue
        target: thyroid
    severe:
      type: return
      value:
        action: discontinue
        severity: severe
        target: thyroid
        organ: endocrine
    check_severe:
      type: condition
      variable: tsh_ratio
      operator: gte
      value: 5.0
      true_next: severe
      false_next: check_mild
    mild:
      type: return
      value:
        target: thyroid
        severity: mild
        organ: endocrine
        action: monitor_closely
tests:
- input:
    tsh_ratio: 6.0
  expect:
    organ: endocrine
    severity: severe
- input:
    tsh_ratio: 2.0
  expect:
    severity: mild
    organ: endocrine
- input:
    tsh_ratio: 0
  expect:
    severity: normal
    organ: endocrine
- input: {}
  expect:
    organ: endocrine
    severity: normal
- input:
    tsh_ratio: 1.999
  expect:
    organ: endocrine
    severity: normal
    target: thyroid
    action: continue
- input:
    tsh_ratio: 2.001
  expect:
    severity: mild
    action: monitor_closely
    organ: endocrine
    target: thyroid
- input:
    tsh_ratio: 4.999
  expect:
    severity: mild
    organ: endocrine
    target: thyroid
    action: monitor_closely
- input:
    tsh_ratio: 5.001
  expect:
    action: discontinue
    target: thyroid
    severity: severe
    organ: endocrine
interface: null
primitive_signature: null
