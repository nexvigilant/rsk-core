name: benefit-risk-ratio
description: Compute benefit-risk classification from numeric scores. Maps to ICH E2C(R2) PBRER benefit-risk evaluation framework. Chains from signal-to-risk and benefit-risk-gate.
version: 0.1.0
tree:
  start: check_benefit_high
  nodes:
    favorable:
      type: return
      value:
        reassessment_interval: 12 months per PBRER cycle
        classification: Benefits clearly outweigh risks
        br_ratio: FAVORABLE
        regulatory_action: No additional risk minimization required
    check_low_benefit:
      type: condition
      variable: risk_score
      operator: lt
      value: 20
      true_next: uncertain
      false_next: unfavorable
    favorable_with_monitoring:
      type: return
      value:
        regulatory_action: Implement or maintain risk minimization measures
        reassessment_interval: 6 months with enhanced monitoring
        br_ratio: FAVORABLE_WITH_CONDITIONS
        classification: Benefits outweigh risks with risk minimization measures
    unfavorable_despite_benefit:
      type: return
      value:
        br_ratio: UNFAVORABLE
        classification: Risks outweigh benefits despite demonstrated efficacy
        regulatory_action: Consider labeling changes, REMS, or market withdrawal
        reassessment_interval: Immediate regulatory consultation
    unfavorable:
      type: return
      value:
        reassessment_interval: Immediate regulatory action required
        regulatory_action: Recommend market withdrawal or severe use restriction
        br_ratio: UNFAVORABLE
        classification: Risks outweigh limited benefits
    check_vulnerable_favorable:
      type: condition
      variable: patient_population_vulnerability
      operator: eq
      value: high
      true_next: uncertain_vulnerable
      false_next: favorable_with_monitoring
    check_risk_low_for_high_benefit:
      type: condition
      variable: risk_score
      operator: lt
      value: 30
      true_next: favorable
      false_next: check_risk_moderate_for_high_benefit
    check_risk_moderate_for_high_benefit:
      type: condition
      variable: risk_score
      operator: lt
      value: 70
      true_next: check_vulnerable_favorable
      false_next: unfavorable_despite_benefit
    uncertain:
      type: return
      value:
        reassessment_interval: 3 months pending data collection
        br_ratio: UNCERTAIN
        classification: Benefit-risk balance requires further data
        regulatory_action: Initiate additional studies or post-authorization safety study
    check_benefit_high:
      type: condition
      variable: benefit_score
      operator: gte
      value: 70
      true_next: check_risk_low_for_high_benefit
      false_next: check_benefit_moderate
    check_benefit_moderate:
      type: condition
      variable: benefit_score
      operator: gte
      value: 40
      true_next: check_risk_for_moderate_benefit
      false_next: check_low_benefit
    check_risk_for_moderate_benefit:
      type: condition
      variable: risk_score
      operator: lt
      value: 50
      true_next: favorable_with_monitoring
      false_next: uncertain
    uncertain_vulnerable:
      type: return
      value:
        regulatory_action: Risk minimization measures required — contraindication review
        br_ratio: UNCERTAIN_VULNERABLE
        reassessment_interval: Monthly review until resolved
        classification: Uncertain benefit-risk in vulnerable population
primitive_signature:
  dominant: 'κ'
  expression: 'κ — measurement, comparison, or classification'
  primes: ['κ']
  arguments: []
