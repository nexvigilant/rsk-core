# MICROGRAM++ (upgraded 2026-04-23)
name: reality-gradient-classifier
version: 0.1.0
description: Classify VDAG reality gradient score into 5-tier rating
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Reality Gradient Classifier
  subtitle: Classify VDAG reality gradient score into 5-tier rating
  icon: circle
  route: /vigilance/mg/reality-gradient-classifier
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/reality-gradient-classifier
  cli: rsk mcg run reality-gradient-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_production
  nodes:
    safety_validated:
      type: return
      value:
        executable: true
        description: Safety baseline met — efficacy evidence needed
        rating: safety_validated
    efficacy_demonstrated:
      type: return
      value:
        rating: efficacy_demonstrated
        executable: true
        description: Core efficacy demonstrated — scale testing required
    testing_theater:
      type: return
      value:
        executable: false
        description: Insufficient evidence — testing theater risk
        rating: testing_theater
    check_production:
      type: condition
      variable: score
      operator: gte
      value: 0.95
      true_next: production_ready
      false_next: check_scale
    check_scale:
      type: condition
      variable: score
      operator: gte
      value: 0.8
      true_next: scale_confirmed
      false_next: check_efficacy
    production_ready:
      type: return
      value:
        rating: production_ready
        executable: true
        description: All evidence strong — production deployment approved
    check_efficacy:
      type: condition
      variable: score
      operator: gte
      value: 0.5
      true_next: efficacy_demonstrated
      false_next: check_safety
    scale_confirmed:
      type: return
      value:
        rating: scale_confirmed
        description: Scale evidence confirmed — final validation pending
        executable: true
    check_safety:
      type: condition
      variable: score
      operator: gte
      value: 0.2
      true_next: safety_validated
      false_next: testing_theater
