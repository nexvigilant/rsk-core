# MICROGRAM++ (upgraded 2026-04-23)
name: drug-class-tnf-inhibitor-safety
version: 0.1.0
description: TNF-alpha inhibitor safety assessment. Evaluates TB reactivation, opportunistic infections, and autoimmune complications.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Class Tnf Inhibitor Safety
  subtitle: TNF-alpha inhibitor safety assessment. Evaluates TB reactivation, opportunistic infections, and autoimmune complications.
  icon: circle
  route: /vigilance/mg/drug-class-tnf-inhibitor-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-class-tnf-inhibitor-safety
  cli: rsk mcg run drug-class-tnf-inhibitor-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_tb_status
  nodes:
    check_tb_status:
      type: condition
      variable: tb_positive
      operator: eq
      value: true
      true_next: tb_alert
      false_next: check_active_infection
    tb_alert:
      type: return
      value:
        risk_level: critical
        prophylaxis_required: true
        message: TB-positive; require TB prophylaxis before starting TNF inhibitor
    check_active_infection:
      type: condition
      variable: has_active_infection
      operator: eq
      value: true
      true_next: infection_alert
      false_next: check_hbv
    infection_alert:
      type: return
      value:
        risk_level: critical
        contraindication: true
        message: Active infection present; defer TNF inhibitor until resolved
    check_hbv:
      type: condition
      variable: hbv_surface_antigen
      operator: eq
      value: true
      true_next: hbv_reactivation_risk
      false_next: check_cytopenias
    hbv_reactivation_risk:
      type: return
      value:
        risk_level: high
        antiviral_prophylaxis: required
        message: HBsAg positive; require antiviral prophylaxis to prevent reactivation
    check_cytopenias:
      type: condition
      variable: wbc_k_ul
      operator: lt
      value: 2
      true_next: cytopenia_alert
      false_next: standard_dosing
    cytopenia_alert:
      type: return
      value:
        risk_level: moderate
        monitoring_required: true
        message: Borderline leukopenia; monitor CBC closely during TNF inhibitor therapy
    standard_dosing:
      type: return
      value:
        risk_level: low
        message: Standard TNF inhibitor dosing appropriate
tests:
  - input:
      tb_positive: true
      has_active_infection: false
      hbv_surface_antigen: false
      wbc_k_ul: 5
    expect:
      risk_level: critical
      prophylaxis_required: true
  - input:
      tb_positive: false
      has_active_infection: true
      hbv_surface_antigen: false
      wbc_k_ul: 5
    expect:
      risk_level: critical
      contraindication: true
  - input:
      tb_positive: false
      has_active_infection: false
      hbv_surface_antigen: true
      wbc_k_ul: 5
    expect:
      risk_level: high
      antiviral_prophylaxis: required
  - input:
      tb_positive: false
      has_active_infection: false
      hbv_surface_antigen: false
      wbc_k_ul: 5
    expect:
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
