# MICROGRAM++ (upgraded 2026-04-23)
name: drug-profile-carbamazepine
version: 0.1.0
description: "Safety triage for carbamazepine: PRR-based signal routing (Type B)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Profile Carbamazepine
  subtitle: "Safety triage for carbamazepine: PRR-based signal routing (Type B)"
  icon: circle
  route: /vigilance/mg/drug-profile-carbamazepine
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-profile-carbamazepine
  cli: rsk mcg run drug-profile-carbamazepine
  auth: none
  rate_limit: 600/min
tree:
  start: check_prr
  nodes:
    signal:
      type: return
      value:
        harm_type: B
        drug: carbamazepine
        action: investigate
        expected_prr: 12.5
        signal: true
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5
      true_next: signal
      false_next: no_signal
    no_signal:
      type: return
      value:
        signal: false
        drug: carbamazepine
        harm_type: B
        expected_prr: 12.5
        action: monitor
tests:
  - input:
      prr: 12.5
    expect:
      signal: true
      drug: carbamazepine
  - input:
      prr: 0.5
    expect:
      drug: carbamazepine
      signal: false
  - input: {}
    expect:
      drug: carbamazepine
      signal: false
  - input:
      prr: 4.999
    expect:
      expected_prr: 12.5
      action: monitor
      harm_type: B
      drug: carbamazepine
      signal: false
  - input:
      prr: 5.001
    expect:
      signal: true
      harm_type: B
      expected_prr: 12.5
      action: investigate
      drug: carbamazepine
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
