name: drug-profile-carbamazepine
description: 'Safety triage for carbamazepine: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    signal:
      type: return
      value:
        harm_type: B
        drug: carbamazepine
        action: investigate
        expected_prr: 12.5
        signal: true
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
    no_signal:
      type: return
      value:
        signal: false
        drug: carbamazepine
        harm_type: B
        expected_prr: 12.5
        action: monitor
tests:
- input:
    prr: 12.5
  expect:
    signal: true
    drug: carbamazepine
- input:
    prr: 0.5
  expect:
    drug: carbamazepine
    signal: false
- input: {}
  expect:
    drug: carbamazepine
    signal: false
- input:
    prr: 4.999
  expect:
    expected_prr: 12.5
    action: monitor
    harm_type: B
    drug: carbamazepine
    signal: false
- input:
    prr: 5.001
  expect:
    signal: true
    harm_type: B
    expected_prr: 12.5
    action: investigate
    drug: carbamazepine
interface: null
primitive_signature: null
