# MICROGRAM++ (upgraded 2026-04-23)
name: flywheel-composite
version: 0.1.0
description: Composite flywheel health gate combining event flow, velocity band, and tier coverage. GREEN (healthy+fast+covered), YELLOW (any warning), RED (any critical failure).
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: event_health
    type: string
    required: false
    description: ""
  - name: live_node_count
    type: int
    required: false
    description: ""
  - name: staging_node_count
    type: int
    required: false
    description: ""
  - name: velocity_band
    type: string
    required: false
    description: ""
  - name: crypto_health
    type: string
    required: false
    description: ""
outputs:
  - name: action
    type: string
  - name: composite_health
    type: string
  - name: flywheel_operational
    type: bool
interface:
  inputs:
    event_health:
      type: string
      required: false
    live_node_count:
      type: int
      required: false
    staging_node_count:
      type: int
      required: false
    velocity_band:
      type: string
      required: false
    crypto_health:
      type: string
      required: false
  outputs:
    action:
      type: string
    composite_health:
      type: string
    flywheel_operational:
      type: bool
ui:
  title: Flywheel Composite
  subtitle: Composite flywheel health gate combining event flow, velocity band, and tier coverage. GREEN (healthy+fast+covered), YELLOW (any warning), RED (any critical failure).
  icon: circle
  route: /vigilance/mg/flywheel-composite
  steps:
    - field: event_health
      label: event health
      help: Enter event_health
      widget: text
      placeholder: null
    - field: live_node_count
      label: live node count
      help: Enter live_node_count
      widget: text
      placeholder: null
    - field: staging_node_count
      label: staging node count
      help: Enter staging_node_count
      widget: text
      placeholder: null
    - field: velocity_band
      label: velocity band
      help: Enter velocity_band
      widget: text
      placeholder: null
    - field: crypto_health
      label: crypto health
      help: Enter crypto_health
      widget: text
      placeholder: null
  result:
    template: "action: {{action}} — composite_health: {{composite_health}} — flywheel_operational: {{flywheel_operational}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/flywheel-composite
  cli: rsk mcg run flywheel-composite
  auth: none
  rate_limit: 600/min
tree:
  start: check_event_red
  nodes:
    check_event_red:
      type: condition
      variable: event_health
      operator: eq
      value: RED
      true_next: red
      false_next: check_crypto_red
    check_crypto_red:
      type: condition
      variable: crypto_health
      operator: eq
      value: RED
      true_next: red
      false_next: check_velocity_slow
    check_velocity_slow:
      type: condition
      variable: velocity_band
      operator: eq
      value: SLOW
      true_next: yellow
      false_next: check_crypto_yellow
    check_crypto_yellow:
      type: condition
      variable: crypto_health
      operator: eq
      value: YELLOW
      true_next: yellow
      false_next: check_live_nodes
    check_live_nodes:
      type: condition
      variable: live_node_count
      operator: gte
      value: 1
      true_next: check_warnings
      false_next: red
    check_warnings:
      type: condition
      variable: event_health
      operator: eq
      value: YELLOW
      true_next: yellow
      false_next: check_velocity_acceptable
    check_velocity_acceptable:
      type: condition
      variable: velocity_band
      operator: eq
      value: ACCEPTABLE
      true_next: yellow
      false_next: check_staging_empty
    check_staging_empty:
      type: condition
      variable: staging_node_count
      operator: eq
      value: 0
      true_next: yellow
      false_next: green
    green:
      type: return
      value:
        composite_health: GREEN
        flywheel_operational: true
        action: none
    yellow:
      type: return
      value:
        composite_health: YELLOW
        flywheel_operational: true
        action: monitor
    red:
      type: return
      value:
        composite_health: RED
        flywheel_operational: false
        action: intervene
tests:
  - input:
      event_health: GREEN
      velocity_band: EXCEPTIONAL
      live_node_count: 2
      staging_node_count: 2
      crypto_health: GREEN
    expect:
      composite_health: GREEN
      flywheel_operational: true
      action: none
  - input:
      event_health: GREEN
      velocity_band: TARGET
      live_node_count: 2
      staging_node_count: 2
      crypto_health: GREEN
    expect:
      composite_health: GREEN
      flywheel_operational: true
      action: none
  - input:
      event_health: RED
      velocity_band: EXCEPTIONAL
      live_node_count: 2
      staging_node_count: 2
      crypto_health: GREEN
    expect:
      composite_health: RED
      flywheel_operational: false
      action: intervene
  - input:
      event_health: GREEN
      velocity_band: SLOW
      live_node_count: 2
      staging_node_count: 2
      crypto_health: GREEN
    expect:
      composite_health: YELLOW
      flywheel_operational: true
      action: monitor
  - input:
      event_health: GREEN
      velocity_band: TARGET
      live_node_count: 0
      staging_node_count: 2
      crypto_health: GREEN
    expect:
      composite_health: RED
      flywheel_operational: false
      action: intervene
  - input:
      event_health: YELLOW
      velocity_band: TARGET
      live_node_count: 2
      staging_node_count: 2
      crypto_health: GREEN
    expect:
      composite_health: YELLOW
      flywheel_operational: true
      action: monitor
  - input:
      event_health: GREEN
      velocity_band: ACCEPTABLE
      live_node_count: 2
      staging_node_count: 2
      crypto_health: GREEN
    expect:
      composite_health: YELLOW
      flywheel_operational: true
      action: monitor
  - input:
      event_health: GREEN
      velocity_band: TARGET
      live_node_count: 2
      staging_node_count: 0
    expect:
      composite_health: YELLOW
      flywheel_operational: true
      action: monitor
  - input:
      event_health: GREEN
      velocity_band: EXCEPTIONAL
      live_node_count: 3
      staging_node_count: 1
      crypto_health: GREEN
    expect:
      composite_health: GREEN
      flywheel_operational: true
      action: none
  - input:
      event_health: YELLOW
      velocity_band: SLOW
      live_node_count: 2
      staging_node_count: 2
      crypto_health: GREEN
    expect:
      composite_health: YELLOW
      flywheel_operational: true
      action: monitor
  - input: {}
    expect:
      action: intervene
      composite_health: RED
      flywheel_operational: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - action
    - composite_health
    - flywheel_operational
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
