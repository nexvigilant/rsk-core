# MICROGRAM++ (upgraded 2026-04-23)
name: velocity-check
version: 0.1.0
description: "Flywheel velocity classifier: ACCELERATING (nodes_wired_this_session>=2), STEADY (=1), STALLED (=0)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: nodes_wired
    type: int
    required: false
    description: ""
outputs:
  - name: momentum
    type: string
  - name: velocity
    type: string
interface:
  inputs:
    nodes_wired:
      type: int
      required: false
  outputs:
    momentum:
      type: string
    velocity:
      type: string
ui:
  title: Velocity Check
  subtitle: "Flywheel velocity classifier: ACCELERATING (nodes_wired_this_session>=2), STEADY (=1), STALLED (=0)"
  icon: circle
  route: /vigilance/mg/velocity-check
  steps:
    - field: nodes_wired
      label: nodes wired
      help: Enter nodes_wired
      widget: text
      placeholder: null
  result:
    template: "momentum: {{momentum}} — velocity: {{velocity}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/velocity-check
  cli: rsk mcg run velocity-check
  auth: none
  rate_limit: 600/min
tree:
  start: check_accelerating
  nodes:
    check_accelerating:
      type: condition
      variable: nodes_wired
      operator: gte
      value: 2
      true_next: accelerating
      false_next: check_steady
    check_steady:
      type: condition
      variable: nodes_wired
      operator: gte
      value: 1
      true_next: steady
      false_next: stalled
    accelerating:
      type: return
      value:
        velocity: ACCELERATING
        momentum: high
    steady:
      type: return
      value:
        velocity: STEADY
        momentum: normal
    stalled:
      type: return
      value:
        velocity: STALLED
        momentum: zero
tests:
  - input:
      nodes_wired: 5
    expect:
      velocity: ACCELERATING
      momentum: high
  - input:
      nodes_wired: 2
    expect:
      velocity: ACCELERATING
      momentum: high
  - input:
      nodes_wired: 1
    expect:
      velocity: STEADY
      momentum: normal
  - input:
      nodes_wired: 0
    expect:
      velocity: STALLED
      momentum: zero
  - input: {}
    expect:
      momentum: zero
      velocity: STALLED
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - momentum
    - velocity
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
