# MICROGRAM++ (upgraded 2026-04-23)
name: delta-classifier
version: 0.1.0
description: "Classify flywheel score delta between sessions: SURGE (>+10), GROWTH (+3..+10), STABLE (-2..+2), DECLINE (-10..-3), CRASH (<-10)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: delta
    type: int
    required: false
    description: ""
outputs:
  - name: classification
    type: string
  - name: urgency
    type: string
interface:
  inputs:
    delta:
      type: int
      required: false
  outputs:
    classification:
      type: string
    urgency:
      type: string
ui:
  title: Delta Classifier
  subtitle: "Classify flywheel score delta between sessions: SURGE (>+10), GROWTH (+3..+10), STABLE (-2..+2), DECLINE (-10..-3), CRASH (<-10)"
  icon: circle
  route: /vigilance/mg/delta-classifier
  steps:
    - field: delta
      label: delta
      help: Enter delta
      widget: text
      placeholder: null
  result:
    template: "classification: {{classification}} — urgency: {{urgency}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/delta-classifier
  cli: rsk mcg run delta-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_surge
  nodes:
    check_surge:
      type: condition
      variable: delta
      operator: gte
      value: 10
      true_next: surge
      false_next: check_growth
    check_growth:
      type: condition
      variable: delta
      operator: gte
      value: 3
      true_next: growth
      false_next: check_stable
    check_stable:
      type: condition
      variable: delta
      operator: gte
      value: -2
      true_next: stable
      false_next: check_decline
    check_decline:
      type: condition
      variable: delta
      operator: gte
      value: -10
      true_next: decline
      false_next: crash
    surge:
      type: return
      value:
        classification: SURGE
        urgency: celebrate
    growth:
      type: return
      value:
        classification: GROWTH
        urgency: sustain
    stable:
      type: return
      value:
        classification: STABLE
        urgency: push
    decline:
      type: return
      value:
        classification: DECLINE
        urgency: investigate
    crash:
      type: return
      value:
        classification: CRASH
        urgency: emergency
tests:
  - input:
      delta: 15
    expect:
      classification: SURGE
      urgency: celebrate
  - input:
      delta: 5
    expect:
      classification: GROWTH
      urgency: sustain
  - input:
      delta: 0
    expect:
      classification: STABLE
      urgency: push
  - input:
      delta: -5
    expect:
      classification: DECLINE
      urgency: investigate
  - input:
      delta: -15
    expect:
      classification: CRASH
      urgency: emergency
  - input: {}
    expect:
      classification: CRASH
      urgency: emergency
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - classification
    - urgency
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
