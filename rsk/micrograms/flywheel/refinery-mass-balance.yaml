# MICROGRAM++ (upgraded 2026-04-23)
name: refinery-mass-balance
version: 0.1.0
description: "Verify mass balance law: crude_in == products + recycled + loss. Nonzero imbalance means signals are leaking or appearing from nowhere."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Refinery Mass Balance
  subtitle: "Verify mass balance law: crude_in == products + recycled + loss. Nonzero imbalance means signals are leaking or appearing from nowhere."
  icon: circle
  route: /vigilance/mg/refinery-mass-balance
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/refinery-mass-balance
  cli: rsk mcg run refinery-mass-balance
  auth: none
  rate_limit: 600/min
tree:
  start: check_balance
  nodes:
    check_balance:
      type: condition
      variable: imbalance
      operator: eq
      value: 0
      true_next: return_balanced
      false_next: check_positive
    check_positive:
      type: condition
      variable: imbalance
      operator: gt
      value: 0
      true_next: return_leak
      false_next: return_phantom
    return_balanced:
      type: return
      value:
        balance_class: BALANCED
        balance_valid: true
        action: Mass balance holds; no signal leaks
        refinery_analog: Conservation of mass verified; all species accounted
    return_leak:
      type: return
      value:
        balance_class: LEAK
        balance_valid: false
        action: Signals entering but not exiting; check processing pipeline for silent drops
        refinery_analog: Material loss in process; check for leaks, venting, or unmetered waste streams
    return_phantom:
      type: return
      value:
        balance_class: PHANTOM
        balance_valid: false
        action: More output than input; phantom signals appearing mid-pipeline
        refinery_analog: Mass appearing from nowhere; metering error or contaminated feedstock
tests:
  - input:
      imbalance: 0
    expect:
      balance_class: BALANCED
      balance_valid: true
  - input:
      imbalance: 15
    expect:
      balance_class: LEAK
      balance_valid: false
  - input:
      imbalance: -5
    expect:
      balance_class: PHANTOM
      balance_valid: false
  - input: {}
    expect:
      action: More output than input; phantom signals appearing mid-pipeline
      balance_class: PHANTOM
      balance_valid: false
      refinery_analog: Mass appearing from nowhere; metering error or contaminated feedstock
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
