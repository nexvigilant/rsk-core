name: friction-dissipation
description: 'Flywheel friction drain classifier. ACCEPTABLE (net_drain < 10), WARNING (10-50), CRITICAL (>= 50). net_drain = (manual_processes*touchpoints + velocity^3*0.001) * (1 - automation_coverage). Requires pre-computed net_drain.'
version: 0.1.0
interface:
  inputs:
    manual_processes:
      type: int
      required: false
    touchpoints:
      type: int
      required: false
    velocity:
      type: string
      required: false
    automation_coverage:
      type: float
      required: false
    net_drain:
      type: float
      required: false
  outputs:
    classification:
      type: string
tree:
  start: check_acceptable
  nodes:
    check_acceptable:
      type: condition
      variable: net_drain
      operator: lt
      value: 10.0
      true_next: acceptable
      false_next: check_warning
    check_warning:
      type: condition
      variable: net_drain
      operator: lt
      value: 50.0
      true_next: warning
      false_next: critical
    acceptable:
      type: return
      value:
        classification: acceptable
    warning:
      type: return
      value:
        classification: warning
    critical:
      type: return
      value:
        classification: critical
tests:
- input:
    manual_processes: 1
    touchpoints: 2
    velocity: 1.0
    automation_coverage: 0.5
    net_drain: 1.0
  expect:
    classification: acceptable
- input:
    manual_processes: 5
    touchpoints: 5
    velocity: 10.0
    automation_coverage: 0.0
    net_drain: 26.0
  expect:
    classification: warning
- input:
    manual_processes: 100
    touchpoints: 100
    velocity: 100.0
    automation_coverage: 1.0
    net_drain: 0.0
  expect:
    classification: acceptable
- input:
    manual_processes: 0
    touchpoints: 0
    velocity: 0.0
    automation_coverage: 0.0
    net_drain: 0.0
  expect:
    classification: acceptable
- input:
    manual_processes: 0
    touchpoints: 0
    velocity: 50.0
    automation_coverage: 0.0
    net_drain: 125.0
  expect:
    classification: critical
- input:
    manual_processes: 5
    touchpoints: 5
    velocity: 5.0
    automation_coverage: 0.8
    net_drain: 5.025
  expect:
    classification: acceptable
- input:
    manual_processes: 10
    touchpoints: 5
    velocity: 20.0
    automation_coverage: 0.0
    net_drain: 58.0
  expect:
    classification: critical
- input: {}
  expect:
    classification: critical
