# MICROGRAM++ (upgraded 2026-04-23)
name: build-flywheel-chain
version: 0.1.0
description: "Closed-loop build management chain: memory-gate → job-scaler → build → cache-prune. Chains build-memory-gate and build-job-scaler into a single decision pipeline. Input is crate name + system state, output is full build strategy or block decision."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: available_mb
    type: int
    required: true
    description: ""
  - name: cpu_cores
    type: int
    required: true
    description: ""
  - name: crate_tier
    type: string
    required: true
    description: ""
  - name: incremental_cache_gb
    type: int
    required: false
    description: ""
outputs:
  - name: decision
    type: string
  - name: jobs
    type: int
  - name: prune_cache
    type: bool
  - name: strategy
    type: string
interface:
  inputs:
    available_mb:
      type: int
      required: true
    cpu_cores:
      type: int
      required: true
    crate_tier:
      type: string
      required: true
    incremental_cache_gb:
      type: int
      required: false
  outputs:
    decision:
      type: string
    jobs:
      type: int
    prune_cache:
      type: bool
    strategy:
      type: string
ui:
  title: Build Flywheel Chain
  subtitle: "Closed-loop build management chain: memory-gate → job-scaler → build → cache-prune. Chains build-memory-gate and build-job-scaler into a single decision pipeline. Input is crate name + system state, output is full build strategy or block decision."
  icon: circle
  route: /vigilance/mg/build-flywheel-chain
  steps:
    - field: available_mb
      label: available mb
      help: Enter available_mb
      widget: text
      placeholder: null
    - field: cpu_cores
      label: cpu cores
      help: Enter cpu_cores
      widget: text
      placeholder: null
    - field: crate_tier
      label: crate tier
      help: Enter crate_tier
      widget: text
      placeholder: null
    - field: incremental_cache_gb
      label: incremental cache gb
      help: Enter incremental_cache_gb
      widget: text
      placeholder: null
  result:
    template: "decision: {{decision}} — jobs: {{jobs}} — prune_cache: {{prune_cache}} — strategy: {{strategy}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/build-flywheel-chain
  cli: rsk mcg run build-flywheel-chain
  auth: none
  rate_limit: 600/min
tree:
  start: gate_check
  nodes:
    gate_check:
      type: condition
      variable: available_mb
      operator: gte
      value: 500
      true_next: check_tier
      false_next: blocked
    check_tier:
      type: condition
      variable: crate_tier
      operator: eq
      value: heavy
      true_next: heavy_gate
      false_next: normal_scale
    heavy_gate:
      type: condition
      variable: available_mb
      operator: gte
      value: 2000
      true_next: heavy_scale
      false_next: blocked
    heavy_scale:
      type: condition
      variable: available_mb
      operator: gte
      value: 8000
      true_next: heavy_full_check_cache
      false_next: heavy_half_check_cache
    heavy_full_check_cache:
      type: condition
      variable: incremental_cache_gb
      operator: gte
      value: 15
      true_next: heavy_full_prune
      false_next: heavy_full_no_prune
    heavy_half_check_cache:
      type: condition
      variable: incremental_cache_gb
      operator: gte
      value: 15
      true_next: heavy_half_prune
      false_next: heavy_half_no_prune
    normal_scale:
      type: condition
      variable: available_mb
      operator: gte
      value: 4000
      true_next: normal_full
      false_next: normal_half
    blocked:
      type: return
      value:
        decision: BLOCK
        jobs: 0
        prune_cache: false
        strategy: wait_for_memory
    heavy_full_prune:
      type: return
      value:
        decision: GO
        jobs: 8
        prune_cache: true
        strategy: full_parallel_with_prune
    heavy_full_no_prune:
      type: return
      value:
        decision: GO
        jobs: 8
        prune_cache: false
        strategy: full_parallel
    heavy_half_prune:
      type: return
      value:
        decision: GO
        jobs: 4
        prune_cache: true
        strategy: half_parallel_with_prune
    heavy_half_no_prune:
      type: return
      value:
        decision: GO
        jobs: 4
        prune_cache: false
        strategy: half_parallel
    normal_full:
      type: return
      value:
        decision: GO
        jobs: 12
        prune_cache: false
        strategy: full_parallel
    normal_half:
      type: return
      value:
        decision: GO
        jobs: 6
        prune_cache: false
        strategy: half_parallel
tests:
  - input:
      available_mb: 12000
      cpu_cores: 20
      crate_tier: heavy
      incremental_cache_gb: 20
    expect:
      decision: GO
      jobs: 8
      prune_cache: true
      strategy: full_parallel_with_prune
  - input:
      available_mb: 5000
      cpu_cores: 20
      crate_tier: heavy
      incremental_cache_gb: 5
    expect:
      decision: GO
      jobs: 4
      prune_cache: false
      strategy: half_parallel
  - input:
      available_mb: 1000
      cpu_cores: 20
      crate_tier: heavy
      incremental_cache_gb: 30
    expect:
      decision: BLOCK
      jobs: 0
      prune_cache: false
      strategy: wait_for_memory
  - input:
      available_mb: 300
      cpu_cores: 20
      crate_tier: normal
      incremental_cache_gb: 5
    expect:
      decision: BLOCK
      jobs: 0
      prune_cache: false
      strategy: wait_for_memory
  - input:
      available_mb: 6000
      cpu_cores: 20
      crate_tier: normal
      incremental_cache_gb: 5
    expect:
      decision: GO
      jobs: 12
      prune_cache: false
      strategy: full_parallel
  - input:
      available_mb: 3000
      cpu_cores: 20
      crate_tier: normal
      incremental_cache_gb: 5
    expect:
      decision: GO
      jobs: 6
      prune_cache: false
      strategy: half_parallel
  - input:
      available_mb: 10000
      cpu_cores: 20
      crate_tier: heavy
      incremental_cache_gb: 10
    expect:
      decision: GO
      jobs: 8
      prune_cache: false
      strategy: full_parallel
  - input:
      available_mb: 5000
      cpu_cores: 20
      crate_tier: heavy
      incremental_cache_gb: 20
    expect:
      decision: GO
      jobs: 4
      prune_cache: true
      strategy: half_parallel_with_prune
  - input: {}
    expect:
      decision: BLOCK
      jobs: 0
      prune_cache: false
      strategy: wait_for_memory
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - decision
    - jobs
    - prune_cache
    - strategy
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
