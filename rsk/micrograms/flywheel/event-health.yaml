# MICROGRAM++ (upgraded 2026-04-23)
name: event-health
version: 0.1.0
description: "Flywheel event flow health: GREEN (emitting>0 AND pending<100), YELLOW (emitting>0 AND pending>=100), RED (emitting=0)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: emitting_nodes
    type: int
    required: false
    description: ""
  - name: pending_events
    type: int
    required: false
    description: ""
outputs:
  - name: action
    type: string
  - name: health
    type: string
interface:
  inputs:
    emitting_nodes:
      type: int
      required: false
    pending_events:
      type: int
      required: false
  outputs:
    action:
      type: string
    health:
      type: string
ui:
  title: Event Health
  subtitle: "Flywheel event flow health: GREEN (emitting>0 AND pending<100), YELLOW (emitting>0 AND pending>=100), RED (emitting=0)"
  icon: circle
  route: /vigilance/mg/event-health
  steps:
    - field: emitting_nodes
      label: emitting nodes
      help: Enter emitting_nodes
      widget: text
      placeholder: null
    - field: pending_events
      label: pending events
      help: Enter pending_events
      widget: text
      placeholder: null
  result:
    template: "action: {{action}} — health: {{health}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/event-health
  cli: rsk mcg run event-health
  auth: none
  rate_limit: 600/min
tree:
  start: check_emitting
  nodes:
    check_emitting:
      type: condition
      variable: emitting_nodes
      operator: gte
      value: 1
      true_next: check_backlog
      false_next: red
    check_backlog:
      type: condition
      variable: pending_events
      operator: gte
      value: 100
      true_next: yellow
      false_next: green
    green:
      type: return
      value:
        health: GREEN
        action: none
    yellow:
      type: return
      value:
        health: YELLOW
        action: drain_consumers
    red:
      type: return
      value:
        health: RED
        action: wire_emitters
tests:
  - input:
      emitting_nodes: 3
      pending_events: 5
    expect:
      health: GREEN
      action: none
  - input:
      emitting_nodes: 3
      pending_events: 150
    expect:
      health: YELLOW
      action: drain_consumers
  - input:
      emitting_nodes: 0
      pending_events: 0
    expect:
      health: RED
      action: wire_emitters
  - input:
      emitting_nodes: 1
      pending_events: 0
    expect:
      health: GREEN
      action: none
  - input:
      emitting_nodes: 0
      pending_events: 50
    expect:
      health: RED
      action: wire_emitters
  - input:
      emitting_nodes: 5
      pending_events: 99
    expect:
      health: GREEN
      action: none
  - input:
      emitting_nodes: 5
      pending_events: 100
    expect:
      health: YELLOW
      action: drain_consumers
  - input: {}
    expect:
      action: wire_emitters
      health: RED
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - action
    - health
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
