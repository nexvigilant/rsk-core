# MICROGRAM++ (upgraded 2026-04-23)
name: rim-integrity
version: 0.1.0
description: Flywheel rim structural integrity classifier. THRIVING (tensile >= 110% of centrifugal force), CRITICAL (90-110%), DISINTEGRATED (< 90%). Requires pre-computed force_ratio = tensile/centrifugal (1.0 if both zero).
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: tensile_strength
    type: float
    required: false
    description: ""
  - name: centrifugal_force
    type: float
    required: false
    description: ""
  - name: force_ratio
    type: float
    required: false
    description: ""
outputs:
  - name: state
    type: string
interface:
  inputs:
    tensile_strength:
      type: float
      required: false
    centrifugal_force:
      type: float
      required: false
    force_ratio:
      type: float
      required: false
  outputs:
    state:
      type: string
ui:
  title: Rim Integrity
  subtitle: Flywheel rim structural integrity classifier. THRIVING (tensile >= 110% of centrifugal force), CRITICAL (90-110%), DISINTEGRATED (< 90%). Requires pre-computed force_ratio = tensile/centrifugal (1.0 if both zero).
  icon: circle
  route: /vigilance/mg/rim-integrity
  steps:
    - field: tensile_strength
      label: tensile strength
      help: Enter tensile_strength
      widget: text
      placeholder: null
    - field: centrifugal_force
      label: centrifugal force
      help: Enter centrifugal_force
      widget: text
      placeholder: null
    - field: force_ratio
      label: force ratio
      help: Enter force_ratio
      widget: text
      placeholder: null
  result:
    template: "state: {{state}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/rim-integrity
  cli: rsk mcg run rim-integrity
  auth: none
  rate_limit: 600/min
tree:
  start: check_thriving
  nodes:
    check_thriving:
      type: condition
      variable: force_ratio
      operator: gte
      value: 1.1
      true_next: thriving
      false_next: check_critical
    check_critical:
      type: condition
      variable: force_ratio
      operator: gte
      value: 0.9
      true_next: critical
      false_next: disintegrated
    thriving:
      type: return
      value:
        state: thriving
    critical:
      type: return
      value:
        state: critical
    disintegrated:
      type: return
      value:
        state: disintegrated
tests:
  - input:
      tensile_strength: 100
      centrifugal_force: 50
      force_ratio: 2
    expect:
      state: thriving
  - input:
      tensile_strength: 100
      centrifugal_force: 100
      force_ratio: 1
    expect:
      state: critical
  - input:
      tensile_strength: 40
      centrifugal_force: 100
      force_ratio: 0.4
    expect:
      state: disintegrated
  - input:
      tensile_strength: 0
      centrifugal_force: 0
      force_ratio: 1
    expect:
      state: critical
  - input:
      tensile_strength: 110
      centrifugal_force: 100
      force_ratio: 1.1
    expect:
      state: thriving
  - input:
      tensile_strength: 89
      centrifugal_force: 100
      force_ratio: 0.89
    expect:
      state: disintegrated
  - input:
      tensile_strength: 50
      centrifugal_force: 100
      force_ratio: 0.5
    expect:
      state: disintegrated
  - input: {}
    expect:
      state: disintegrated
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - state
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
