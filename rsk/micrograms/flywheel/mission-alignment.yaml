# MICROGRAM++ (upgraded 2026-04-23)
name: mission-alignment
version: 0.1.0
description: "Loop 4 FlywheelVitals: Gyroscopic stability inputs. Measures mission alignment via scope creep frequency, pivot resistance (momentum/perturbation ratio), and decision consistency. Spec §3.4: stability only exists above critical momentum — emergent property."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: scope_creep_incidents
    type: int
    required: true
    description: ""
  - name: pivot_resistance
    type: float
    required: true
    description: ""
  - name: decision_consistency
    type: float
    required: true
    description: ""
  - name: momentum_above_critical
    type: int
    required: true
    description: ""
outputs:
  - name: alignment
    type: string
  - name: stability_input
    type: string
  - name: action
    type: string
interface:
  inputs:
    scope_creep_incidents:
      type: int
      required: true
    pivot_resistance:
      type: float
      required: true
    decision_consistency:
      type: float
      required: true
    momentum_above_critical:
      type: int
      required: true
  outputs:
    alignment:
      type: string
    stability_input:
      type: string
    action:
      type: string
ui:
  title: Mission Alignment
  subtitle: "Loop 4 FlywheelVitals: Gyroscopic stability inputs. Measures mission alignment via scope creep frequency, pivot resistance (momentum/perturbation ratio), and decision consistency. Spec §3.4: stability only exists above critical momentum — emergent property."
  icon: circle
  route: /vigilance/mg/mission-alignment
  steps:
    - field: scope_creep_incidents
      label: scope creep incidents
      help: Enter scope_creep_incidents
      widget: text
      placeholder: null
    - field: pivot_resistance
      label: pivot resistance
      help: Enter pivot_resistance
      widget: text
      placeholder: null
    - field: decision_consistency
      label: decision consistency
      help: Enter decision_consistency
      widget: text
      placeholder: null
    - field: momentum_above_critical
      label: momentum above critical
      help: Enter momentum_above_critical
      widget: text
      placeholder: null
  result:
    template: "alignment: {{alignment}} — stability_input: {{stability_input}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/mission-alignment
  cli: rsk mcg run mission-alignment
  auth: none
  rate_limit: 600/min
tree:
  start: check_momentum
  nodes:
    check_momentum:
      type: condition
      variable: momentum_above_critical
      operator: eq
      value: 1
      true_next: check_scope_creep_high
      false_next: no_stability_possible
    check_scope_creep_high:
      type: condition
      variable: scope_creep_incidents
      operator: gte
      value: 5
      true_next: misaligned
      false_next: check_pivot_resistance
    check_pivot_resistance:
      type: condition
      variable: pivot_resistance
      operator: gte
      value: 2
      true_next: check_consistency_high
      false_next: check_consistency_low
    check_consistency_high:
      type: condition
      variable: decision_consistency
      operator: gte
      value: 0.8
      true_next: aligned
      false_next: check_scope_creep_moderate
    check_consistency_low:
      type: condition
      variable: decision_consistency
      operator: gte
      value: 0.5
      true_next: check_scope_creep_moderate
      false_next: drifting
    check_scope_creep_moderate:
      type: condition
      variable: scope_creep_incidents
      operator: gte
      value: 3
      true_next: precessing
      false_next: stable_enough
    aligned:
      type: return
      value:
        alignment: ALIGNED
        stability_input: stable
        action: maintain_course
    stable_enough:
      type: return
      value:
        alignment: STABLE
        stability_input: precessing
        action: minor_course_correction
    precessing:
      type: return
      value:
        alignment: PRECESSING
        stability_input: precessing
        action: scope_review_needed
    drifting:
      type: return
      value:
        alignment: DRIFTING
        stability_input: gimbal_lock
        action: strategic_realignment
    misaligned:
      type: return
      value:
        alignment: MISALIGNED
        stability_input: gimbal_lock
        action: emergency_scope_freeze
    no_stability_possible:
      type: return
      value:
        alignment: NO_AXIS
        stability_input: no_stability
        action: build_momentum_first
tests:
  - input:
      scope_creep_incidents: 1
      pivot_resistance: 5
      decision_consistency: 0.9
      momentum_above_critical: 1
    expect:
      alignment: ALIGNED
      stability_input: stable
      action: maintain_course
  - input:
      scope_creep_incidents: 0
      pivot_resistance: 10
      decision_consistency: 1
      momentum_above_critical: 0
    expect:
      alignment: NO_AXIS
      stability_input: no_stability
      action: build_momentum_first
  - input:
      scope_creep_incidents: 7
      pivot_resistance: 3
      decision_consistency: 0.8
      momentum_above_critical: 1
    expect:
      alignment: MISALIGNED
      stability_input: gimbal_lock
      action: emergency_scope_freeze
  - input:
      scope_creep_incidents: 2
      pivot_resistance: 1
      decision_consistency: 0.3
      momentum_above_critical: 1
    expect:
      alignment: DRIFTING
      stability_input: gimbal_lock
      action: strategic_realignment
  - input:
      scope_creep_incidents: 4
      pivot_resistance: 1.5
      decision_consistency: 0.6
      momentum_above_critical: 1
    expect:
      alignment: PRECESSING
      stability_input: precessing
      action: scope_review_needed
  - input:
      scope_creep_incidents: 2
      pivot_resistance: 3
      decision_consistency: 0.7
      momentum_above_critical: 1
    expect:
      alignment: STABLE
      stability_input: precessing
      action: minor_course_correction
  - input:
      scope_creep_incidents: 5
      pivot_resistance: 2
      decision_consistency: 0.8
      momentum_above_critical: 1
    expect:
      alignment: MISALIGNED
      stability_input: gimbal_lock
      action: emergency_scope_freeze
  - input:
      scope_creep_incidents: 3
      pivot_resistance: 2
      decision_consistency: 0.8
      momentum_above_critical: 1
    expect:
      alignment: ALIGNED
      stability_input: stable
      action: maintain_course
  - input: {}
    expect:
      action: build_momentum_first
      alignment: NO_AXIS
      stability_input: no_stability
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - alignment
    - stability_input
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
