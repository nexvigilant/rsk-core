# MICROGRAM++ (upgraded 2026-04-23)
name: actuator-balance
version: 0.1.0
description: "Classify actuator/sensor ratio: BALANCED (2-5:1), SENSOR_HEAVY (>5:1), ACTUATOR_HEAVY (<2:1)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: sensor_count
    type: int
    required: false
    description: ""
  - name: actuator_count
    type: int
    required: false
    description: ""
outputs:
  - name: balance
    type: string
  - name: action
    type: string
interface:
  inputs:
    sensor_count:
      type: int
      required: false
    actuator_count:
      type: int
      required: false
  outputs:
    balance:
      type: string
    action:
      type: string
ui:
  title: Actuator Balance
  subtitle: "Classify actuator/sensor ratio: BALANCED (2-5:1), SENSOR_HEAVY (>5:1), ACTUATOR_HEAVY (<2:1)"
  icon: circle
  route: /vigilance/mg/actuator-balance
  steps:
    - field: sensor_count
      label: sensor count
      help: Enter sensor_count
      widget: text
      placeholder: null
    - field: actuator_count
      label: actuator count
      help: Enter actuator_count
      widget: text
      placeholder: null
  result:
    template: "balance: {{balance}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/actuator-balance
  cli: rsk mcg run actuator-balance
  auth: none
  rate_limit: 600/min
tree:
  start: check_actuator_zero
  nodes:
    check_actuator_zero:
      type: condition
      variable: actuator_count
      operator: lte
      value: 0
      true_next: sensor_heavy
      false_next: check_sensor_heavy
    check_sensor_heavy:
      type: condition
      variable: sensor_count
      operator: gte
      value: 50
      true_next: check_ratio_high
      false_next: check_actuator_heavy
    check_ratio_high:
      type: condition
      variable: actuator_count
      operator: lte
      value: 10
      true_next: sensor_heavy
      false_next: balanced
    check_actuator_heavy:
      type: condition
      variable: actuator_count
      operator: gte
      value: 30
      true_next: actuator_heavy
      false_next: balanced
    sensor_heavy:
      type: return
      value:
        balance: SENSOR_HEAVY
        action: add_actuators
    actuator_heavy:
      type: return
      value:
        balance: ACTUATOR_HEAVY
        action: add_sensors
    balanced:
      type: return
      value:
        balance: BALANCED
        action: maintain
tests:
  - input:
      sensor_count: 100
      actuator_count: 10
    expect:
      balance: SENSOR_HEAVY
      action: add_actuators
  - input:
      sensor_count: 50
      actuator_count: 20
    expect:
      balance: BALANCED
      action: maintain
  - input:
      sensor_count: 10
      actuator_count: 30
    expect:
      balance: ACTUATOR_HEAVY
      action: add_sensors
  - input:
      sensor_count: 100
      actuator_count: 0
    expect:
      balance: SENSOR_HEAVY
      action: add_actuators
  - input:
      sensor_count: 0
      actuator_count: 0
    expect:
      balance: SENSOR_HEAVY
      action: add_actuators
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - balance
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
