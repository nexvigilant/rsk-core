# MICROGRAM++ (upgraded 2026-04-23)
name: crypto-provenance-coverage
version: 1.0.0
description: "Provenance manifest coverage for insight flywheel: GREEN (all signed), YELLOW (partial), GREY (none yet)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: manifests_count
    type: int
    required: false
    description: ""
  - name: all_signed
    type: bool
    required: false
    description: ""
outputs:
  - name: provenance
    type: string
  - name: level
    type: string
  - name: action
    type: string
interface:
  inputs:
    manifests_count:
      type: int
      required: false
    all_signed:
      type: bool
      required: false
  outputs:
    provenance:
      type: string
    level:
      type: string
    action:
      type: string
ui:
  title: Crypto Provenance Coverage
  subtitle: "Provenance manifest coverage for insight flywheel: GREEN (all signed), YELLOW (partial), GREY (none yet)"
  icon: circle
  route: /vigilance/mg/crypto-provenance-coverage
  steps:
    - field: manifests_count
      label: manifests count
      help: Enter manifests_count
      widget: text
      placeholder: null
    - field: all_signed
      label: all signed
      help: Enter all_signed
      widget: toggle
      placeholder: null
  result:
    template: "provenance: {{provenance}} — level: {{level}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/crypto-provenance-coverage
  cli: rsk mcg run crypto-provenance-coverage
  auth: none
  rate_limit: 600/min
tree:
  start: check_exists
  nodes:
    check_exists:
      type: condition
      variable: manifests_count
      operator: gte
      value: 1
      true_next: check_signed
      false_next: no_manifests
    check_signed:
      type: condition
      variable: all_signed
      operator: eq
      value: true
      true_next: full
      false_next: partial
    full:
      type: return
      value:
        provenance: full
        level: green
        action: none
    partial:
      type: return
      value:
        provenance: partial
        level: yellow
        action: sign_unsigned_manifests
    no_manifests:
      type: return
      value:
        provenance: none
        level: grey
        action: create_provenance_for_analyses
tests:
  - input:
      manifests_count: 10
      all_signed: true
    expect:
      provenance: full
      level: green
      action: none
  - input:
      manifests_count: 10
      all_signed: false
    expect:
      provenance: partial
      level: yellow
      action: sign_unsigned_manifests
  - input:
      manifests_count: 0
      all_signed: false
    expect:
      provenance: none
      level: grey
      action: create_provenance_for_analyses
  - input: {}
    expect:
      provenance: none
      level: grey
      action: create_provenance_for_analyses
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - provenance
    - level
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
