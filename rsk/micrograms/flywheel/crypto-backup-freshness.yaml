# MICROGRAM++ (upgraded 2026-04-23)
name: crypto-backup-freshness
version: 1.0.0
description: "Brain backup freshness for trust flywheel: GREEN (<12h), YELLOW (<24h), RED (>24h or missing)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: backup_age_hours
    type: int
    required: false
    description: ""
  - name: backup_count
    type: int
    required: false
    description: ""
outputs:
  - name: freshness
    type: string
  - name: level
    type: string
  - name: action
    type: string
interface:
  inputs:
    backup_age_hours:
      type: int
      required: false
    backup_count:
      type: int
      required: false
  outputs:
    freshness:
      type: string
    level:
      type: string
    action:
      type: string
ui:
  title: Crypto Backup Freshness
  subtitle: "Brain backup freshness for trust flywheel: GREEN (<12h), YELLOW (<24h), RED (>24h or missing)"
  icon: circle
  route: /vigilance/mg/crypto-backup-freshness
  steps:
    - field: backup_age_hours
      label: backup age hours
      help: Enter backup_age_hours
      widget: text
      placeholder: null
    - field: backup_count
      label: backup count
      help: Enter backup_count
      widget: text
      placeholder: null
  result:
    template: "freshness: {{freshness}} — level: {{level}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/crypto-backup-freshness
  cli: rsk mcg run crypto-backup-freshness
  auth: none
  rate_limit: 600/min
tree:
  start: check_exists
  nodes:
    check_exists:
      type: condition
      variable: backup_count
      operator: gte
      value: 1
      true_next: check_fresh
      false_next: missing
    check_fresh:
      type: condition
      variable: backup_age_hours
      operator: lte
      value: 12
      true_next: fresh
      false_next: check_aging
    check_aging:
      type: condition
      variable: backup_age_hours
      operator: lte
      value: 24
      true_next: aging
      false_next: stale
    fresh:
      type: return
      value:
        freshness: fresh
        level: green
        action: none
    aging:
      type: return
      value:
        freshness: aging
        level: yellow
        action: monitor
    stale:
      type: return
      value:
        freshness: stale
        level: red
        action: run_nv_vault_backup
    missing:
      type: return
      value:
        freshness: missing
        level: red
        action: run_nv_vault_backup
tests:
  - input:
      backup_age_hours: 3
      backup_count: 5
    expect:
      freshness: fresh
      level: green
      action: none
  - input:
      backup_age_hours: 18
      backup_count: 3
    expect:
      freshness: aging
      level: yellow
      action: monitor
  - input:
      backup_age_hours: 48
      backup_count: 2
    expect:
      freshness: stale
      level: red
      action: run_nv_vault_backup
  - input:
      backup_count: 0
    expect:
      freshness: missing
      level: red
      action: run_nv_vault_backup
  - input: {}
    expect:
      freshness: missing
      level: red
      action: run_nv_vault_backup
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - freshness
    - level
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
