# MICROGRAM++ (upgraded 2026-04-23)
name: momentum-conservation
version: 0.1.0
description: Angular momentum classifier for flywheel conservation law. HIGH (L > 2x critical), NORMAL (L >= critical), LOW (L > 0.5x critical), STALLED (L <= 0.5x critical). Requires pre-computed momentum_ratio = L / critical_threshold.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: inertia
    type: float
    required: false
    description: ""
  - name: omega
    type: float
    required: false
    description: ""
  - name: friction_drain
    type: float
    required: false
    description: ""
  - name: critical_threshold
    type: float
    required: false
    description: ""
  - name: momentum_ratio
    type: float
    required: false
    description: ""
outputs:
  - name: classification
    type: string
  - name: above_critical
    type: bool
interface:
  inputs:
    inertia:
      type: float
      required: false
    omega:
      type: float
      required: false
    friction_drain:
      type: float
      required: false
    critical_threshold:
      type: float
      required: false
    momentum_ratio:
      type: float
      required: false
  outputs:
    classification:
      type: string
    above_critical:
      type: bool
ui:
  title: Momentum Conservation
  subtitle: Angular momentum classifier for flywheel conservation law. HIGH (L > 2x critical), NORMAL (L >= critical), LOW (L > 0.5x critical), STALLED (L <= 0.5x critical). Requires pre-computed momentum_ratio = L / critical_threshold.
  icon: circle
  route: /vigilance/mg/momentum-conservation
  steps:
    - field: inertia
      label: inertia
      help: Enter inertia
      widget: text
      placeholder: null
    - field: omega
      label: omega
      help: Enter omega
      widget: text
      placeholder: null
    - field: friction_drain
      label: friction drain
      help: Enter friction_drain
      widget: text
      placeholder: null
    - field: critical_threshold
      label: critical threshold
      help: Enter critical_threshold
      widget: text
      placeholder: null
    - field: momentum_ratio
      label: momentum ratio
      help: Enter momentum_ratio
      widget: text
      placeholder: null
  result:
    template: "classification: {{classification}} — above_critical: {{above_critical}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/momentum-conservation
  cli: rsk mcg run momentum-conservation
  auth: none
  rate_limit: 600/min
tree:
  start: check_high
  nodes:
    check_high:
      type: condition
      variable: momentum_ratio
      operator: gt
      value: 2
      true_next: high
      false_next: check_normal
    check_normal:
      type: condition
      variable: momentum_ratio
      operator: gte
      value: 1
      true_next: normal
      false_next: check_low
    check_low:
      type: condition
      variable: momentum_ratio
      operator: gt
      value: 0.5
      true_next: low
      false_next: stalled
    high:
      type: return
      value:
        classification: high
        above_critical: true
    normal:
      type: return
      value:
        classification: normal
        above_critical: true
    low:
      type: return
      value:
        classification: low
        above_critical: false
    stalled:
      type: return
      value:
        classification: stalled
        above_critical: false
tests:
  - input:
      inertia: 100
      omega: 5
      friction_drain: 0
      critical_threshold: 100
      momentum_ratio: 5
    expect:
      classification: high
      above_critical: true
  - input:
      inertia: 10
      omega: 5
      friction_drain: 0
      critical_threshold: 40
      momentum_ratio: 1.25
    expect:
      classification: normal
      above_critical: true
  - input:
      inertia: 10
      omega: 3
      friction_drain: 5
      critical_threshold: 40
      momentum_ratio: 0.625
    expect:
      classification: low
      above_critical: false
  - input:
      inertia: 1
      omega: 1
      friction_drain: 5
      critical_threshold: 40
      momentum_ratio: -0.1
    expect:
      classification: stalled
      above_critical: false
  - input:
      inertia: 10
      omega: 5
      friction_drain: 50
      critical_threshold: 100
      momentum_ratio: 0
    expect:
      classification: stalled
      above_critical: false
  - input:
      inertia: 20
      omega: 5
      friction_drain: 0
      critical_threshold: 100
      momentum_ratio: 1
    expect:
      classification: normal
      above_critical: true
  - input:
      inertia: 50
      omega: 5
      friction_drain: 0
      critical_threshold: 100
      momentum_ratio: 2.5
    expect:
      classification: high
      above_critical: true
  - input: {}
    expect:
      above_critical: false
      classification: stalled
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - classification
    - above_critical
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
