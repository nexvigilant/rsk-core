# MICROGRAM++ (upgraded 2026-04-23)
name: threshold-drift-detector
version: 0.1.0
description: Detect threshold drift from consecutive warnings/criticals and declining reality trend. Outputs drift severity (NONE/MILD/SIGNIFICANT) with recommended action.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: consecutive_warnings
    type: integer
    required: true
    description: ""
  - name: consecutive_criticals
    type: integer
    required: true
    description: ""
  - name: reality_trend
    type: string
    required: true
    description: ""
outputs:
  - name: drift_detected
    type: boolean
  - name: severity
    type: string
  - name: action
    type: string
interface:
  inputs:
    consecutive_warnings:
      type: integer
      required: true
    consecutive_criticals:
      type: integer
      required: true
    reality_trend:
      type: string
      required: true
  outputs:
    drift_detected:
      type: boolean
    severity:
      type: string
    action:
      type: string
ui:
  title: Threshold Drift Detector
  subtitle: Detect threshold drift from consecutive warnings/criticals and declining reality trend. Outputs drift severity (NONE/MILD/SIGNIFICANT) with recommended action.
  icon: circle
  route: /vigilance/mg/threshold-drift-detector
  steps:
    - field: consecutive_warnings
      label: consecutive warnings
      help: Enter consecutive_warnings
      widget: number
      placeholder: null
    - field: consecutive_criticals
      label: consecutive criticals
      help: Enter consecutive_criticals
      widget: number
      placeholder: null
    - field: reality_trend
      label: reality trend
      help: Enter reality_trend
      widget: text
      placeholder: null
  result:
    template: "drift_detected: {{drift_detected}} — severity: {{severity}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/threshold-drift-detector
  cli: rsk mcg run threshold-drift-detector
  auth: none
  rate_limit: 600/min
tree:
  start: check_criticals
  nodes:
    check_criticals:
      type: condition
      variable: consecutive_criticals
      operator: gte
      value: 3
      true_next: return_significant
      false_next: check_warnings
    check_warnings:
      type: condition
      variable: consecutive_warnings
      operator: gte
      value: 5
      true_next: return_mild_warnings
      false_next: check_declining
    check_declining:
      type: condition
      variable: reality_trend
      operator: eq
      value: declining
      true_next: check_declining_warnings
      false_next: return_none
    check_declining_warnings:
      type: condition
      variable: consecutive_warnings
      operator: gte
      value: 2
      true_next: return_mild_declining
      false_next: return_none
    return_significant:
      type: return
      value:
        drift_detected: true
        severity: SIGNIFICANT
        action: Immediate threshold recalibration required — 3+ consecutive criticals indicate systematic miscalibration
    return_mild_warnings:
      type: return
      value:
        drift_detected: true
        severity: MILD
        action: Review warning thresholds — 5+ consecutive warnings suggest gradual drift
    return_mild_declining:
      type: return
      value:
        drift_detected: true
        severity: MILD
        action: Monitor closely — declining reality trend with warnings suggests emerging drift
    return_none:
      type: return
      value:
        drift_detected: false
        severity: NONE
        action: No drift detected — thresholds appear well-calibrated
tests:
  - input:
      consecutive_warnings: 0
      consecutive_criticals: 3
      reality_trend: stable
    expect:
      drift_detected: true
      severity: SIGNIFICANT
  - input:
      consecutive_warnings: 10
      consecutive_criticals: 5
      reality_trend: declining
    expect:
      drift_detected: true
      severity: SIGNIFICANT
  - input:
      consecutive_warnings: 5
      consecutive_criticals: 0
      reality_trend: stable
    expect:
      drift_detected: true
      severity: MILD
  - input:
      consecutive_warnings: 7
      consecutive_criticals: 2
      reality_trend: stable
    expect:
      drift_detected: true
      severity: MILD
  - input:
      consecutive_warnings: 2
      consecutive_criticals: 0
      reality_trend: declining
    expect:
      drift_detected: true
      severity: MILD
  - input:
      consecutive_warnings: 3
      consecutive_criticals: 0
      reality_trend: declining
    expect:
      drift_detected: true
      severity: MILD
  - input:
      consecutive_warnings: 0
      consecutive_criticals: 0
      reality_trend: stable
    expect:
      drift_detected: false
      severity: NONE
  - input:
      consecutive_warnings: 1
      consecutive_criticals: 0
      reality_trend: declining
    expect:
      drift_detected: false
      severity: NONE
  - input:
      consecutive_warnings: 4
      consecutive_criticals: 0
      reality_trend: stable
    expect:
      drift_detected: false
      severity: NONE
  - input:
      consecutive_warnings: 0
      consecutive_criticals: 2
      reality_trend: declining
    expect:
      drift_detected: false
      severity: NONE
  - input:
      consecutive_warnings: 0
      consecutive_criticals: 0
      reality_trend: declining
    expect:
      drift_detected: false
      severity: NONE
  - input:
      consecutive_warnings: 1
      consecutive_criticals: 1
      reality_trend: stable
    expect:
      drift_detected: false
      severity: NONE
  - input: {}
    expect:
      action: No drift detected — thresholds appear well-calibrated
      drift_detected: false
      severity: NONE
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - drift_detected
    - severity
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
