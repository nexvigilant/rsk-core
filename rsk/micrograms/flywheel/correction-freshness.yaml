# MICROGRAM++ (upgraded 2026-04-23)
name: correction-freshness
version: 0.1.0
description: "Classify correction recency: FRESH (<7d), AGING (7-30d), STALE (>30d)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: days_since_correction
    type: int
    required: false
    description: ""
outputs:
  - name: freshness
    type: string
  - name: action
    type: string
interface:
  inputs:
    days_since_correction:
      type: int
      required: false
  outputs:
    freshness:
      type: string
    action:
      type: string
ui:
  title: Correction Freshness
  subtitle: "Classify correction recency: FRESH (<7d), AGING (7-30d), STALE (>30d)"
  icon: circle
  route: /vigilance/mg/correction-freshness
  steps:
    - field: days_since_correction
      label: days since correction
      help: Enter days_since_correction
      widget: text
      placeholder: null
  result:
    template: "freshness: {{freshness}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/correction-freshness
  cli: rsk mcg run correction-freshness
  auth: none
  rate_limit: 600/min
tree:
  start: check_fresh
  nodes:
    check_fresh:
      type: condition
      variable: days_since_correction
      operator: lte
      value: 7
      true_next: fresh
      false_next: check_aging
    check_aging:
      type: condition
      variable: days_since_correction
      operator: lte
      value: 30
      true_next: aging
      false_next: stale
    fresh:
      type: return
      value:
        freshness: FRESH
        action: none
    aging:
      type: return
      value:
        freshness: AGING
        action: review
    stale:
      type: return
      value:
        freshness: STALE
        action: revalidate
tests:
  - input:
      days_since_correction: 1
    expect:
      freshness: FRESH
      action: none
  - input:
      days_since_correction: 7
    expect:
      freshness: FRESH
      action: none
  - input:
      days_since_correction: 14
    expect:
      freshness: AGING
      action: review
  - input:
      days_since_correction: 60
    expect:
      freshness: STALE
      action: revalidate
  - input: {}
    expect:
      freshness: STALE
      action: revalidate
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - freshness
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
