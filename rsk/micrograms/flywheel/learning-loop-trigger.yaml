# MICROGRAM++ (upgraded 2026-04-23)
name: learning-loop-trigger
version: 0.1.0
description: Determine which VDAG learning loop to activate based on failure rate and evaluation count. Triple every 5th evaluation, Double when failure_rate > 20%, Single otherwise.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: failure_rate
    type: integer
    required: true
    description: ""
  - name: is_fifth_evaluation
    type: boolean
    required: true
    description: ""
outputs:
  - name: loop_type
    type: string
  - name: action
    type: string
interface:
  inputs:
    failure_rate:
      type: integer
      required: true
    is_fifth_evaluation:
      type: boolean
      required: true
  outputs:
    loop_type:
      type: string
    action:
      type: string
ui:
  title: Learning Loop Trigger
  subtitle: Determine which VDAG learning loop to activate based on failure rate and evaluation count. Triple every 5th evaluation, Double when failure_rate > 20%, Single otherwise.
  icon: circle
  route: /vigilance/mg/learning-loop-trigger
  steps:
    - field: failure_rate
      label: failure rate
      help: Enter failure_rate
      widget: number
      placeholder: null
    - field: is_fifth_evaluation
      label: is fifth evaluation
      help: Enter is_fifth_evaluation
      widget: toggle
      placeholder: null
  result:
    template: "loop_type: {{loop_type}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/learning-loop-trigger
  cli: rsk mcg run learning-loop-trigger
  auth: none
  rate_limit: 600/min
tree:
  start: check_fifth
  nodes:
    check_fifth:
      type: condition
      variable: is_fifth_evaluation
      operator: eq
      value: true
      true_next: return_triple
      false_next: check_failure_rate
    check_failure_rate:
      type: condition
      variable: failure_rate
      operator: gt
      value: 20
      true_next: return_double
      false_next: return_single
    return_triple:
      type: return
      value:
        loop_type: TRIPLE
        action: Question the loop model itself — are loop weights and evidence grading still appropriate?
    return_double:
      type: return
      value:
        loop_type: DOUBLE
        action: Question thresholds — failure rate exceeds 20%, thresholds may be miscalibrated
    return_single:
      type: return
      value:
        loop_type: SINGLE
        action: Fix execution errors — identify and correct the most recent failure
tests:
  - input:
      failure_rate: 0
      is_fifth_evaluation: true
    expect:
      loop_type: TRIPLE
  - input:
      failure_rate: 50
      is_fifth_evaluation: true
    expect:
      loop_type: TRIPLE
  - input:
      failure_rate: 25
      is_fifth_evaluation: false
    expect:
      loop_type: DOUBLE
  - input:
      failure_rate: 100
      is_fifth_evaluation: false
    expect:
      loop_type: DOUBLE
  - input:
      failure_rate: 21
      is_fifth_evaluation: false
    expect:
      loop_type: DOUBLE
  - input:
      failure_rate: 20
      is_fifth_evaluation: false
    expect:
      loop_type: SINGLE
  - input:
      failure_rate: 0
      is_fifth_evaluation: false
    expect:
      loop_type: SINGLE
  - input:
      failure_rate: 10
      is_fifth_evaluation: false
    expect:
      loop_type: SINGLE
  - input:
      failure_rate: 19
      is_fifth_evaluation: false
    expect:
      loop_type: SINGLE
  - input:
      failure_rate: 1
      is_fifth_evaluation: false
    expect:
      loop_type: SINGLE
  - input: {}
    expect:
      action: Fix execution errors — identify and correct the most recent failure
      loop_type: SINGLE
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - loop_type
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
