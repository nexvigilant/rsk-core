name: velocity-classifier
description: 'Classify flywheel velocity from avg_fix_time_ms matching MCP foundation_flywheel_velocity bands: EXCEPTIONAL (<=1h), TARGET (<=24h), ACCEPTABLE (<=168h/7d), SLOW (>168h)'
version: 0.2.0
interface:
  inputs:
    avg_fix_time_ms:
      type: int
      required: false
  outputs:
    action:
      type: string
    band:
      type: string
    velocity_inverse:
      type: string
tree:
  start: check_exceptional
  nodes:
    check_exceptional:
      type: condition
      variable: avg_fix_time_ms
      operator: lte
      value: 3600000
      true_next: exceptional
      false_next: check_target
    check_target:
      type: condition
      variable: avg_fix_time_ms
      operator: lte
      value: 86400000
      true_next: target
      false_next: check_acceptable
    check_acceptable:
      type: condition
      variable: avg_fix_time_ms
      operator: lte
      value: 604800000
      true_next: acceptable
      false_next: slow
    exceptional:
      type: return
      value:
        band: EXCEPTIONAL
        velocity_inverse: very_high
        action: maintain_pace
    target:
      type: return
      value:
        band: TARGET
        velocity_inverse: high
        action: maintain_pace
    acceptable:
      type: return
      value:
        band: ACCEPTABLE
        velocity_inverse: moderate
        action: investigate_bottlenecks
    slow:
      type: return
      value:
        band: SLOW
        velocity_inverse: low
        action: escalate_blockers
tests:
# Exceptional: <= 1 hour (3,600,000 ms)
- input:
    avg_fix_time_ms: 1800000
  expect:
    band: EXCEPTIONAL
    velocity_inverse: very_high
    action: maintain_pace
- input:
    avg_fix_time_ms: 3600000
  expect:
    band: EXCEPTIONAL
    velocity_inverse: very_high
    action: maintain_pace
# Target: <= 24 hours (86,400,000 ms)
- input:
    avg_fix_time_ms: 3600001
  expect:
    band: TARGET
    velocity_inverse: high
    action: maintain_pace
- input:
    avg_fix_time_ms: 19200000
  expect:
    band: TARGET
    velocity_inverse: high
    action: maintain_pace
- input:
    avg_fix_time_ms: 86400000
  expect:
    band: TARGET
    velocity_inverse: high
    action: maintain_pace
# Acceptable: <= 168 hours (604,800,000 ms)
- input:
    avg_fix_time_ms: 86400001
  expect:
    band: ACCEPTABLE
    velocity_inverse: moderate
    action: investigate_bottlenecks
- input:
    avg_fix_time_ms: 604800000
  expect:
    band: ACCEPTABLE
    velocity_inverse: moderate
    action: investigate_bottlenecks
# Slow: > 168 hours
- input:
    avg_fix_time_ms: 604800001
  expect:
    band: SLOW
    velocity_inverse: low
    action: escalate_blockers
- input:
    avg_fix_time_ms: 1209600000
  expect:
    band: SLOW
    velocity_inverse: low
    action: escalate_blockers
# Edge: zero (instantaneous fix)
- input:
    avg_fix_time_ms: 0
  expect:
    band: EXCEPTIONAL
    velocity_inverse: very_high
    action: maintain_pace
- input: {}
  expect:
    action: escalate_blockers
    band: SLOW
    velocity_inverse: low
