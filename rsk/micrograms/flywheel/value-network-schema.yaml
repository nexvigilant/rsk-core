name: value-network-schema
description: 'Component: Rim (Value Network) — Spec §2.1. Schema validator for value network data completeness. Instead of classifying state (no equation yet), validates that sufficient data exists to COMPUTE rim health. Returns data_complete=true when all required metrics are present and non-zero.'
version: 0.1.0
interface:
  inputs:
    member_count:
      type: int
      required: false
    content_items:
      type: int
      required: false
    engagement_events_30d:
      type: int
      required: false
    churn_exits_30d:
      type: int
      required: false
    alternatives_known:
      type: int
      required: false
    has_identity_signal:
      type: int
      required: false
  outputs:
    data_complete:
      type: bool
    missing_fields:
      type: string
    can_compute_rim:
      type: bool
tree:
  start: check_members
  nodes:
    check_members:
      type: condition
      variable: member_count
      operator: gt
      value: 0
      true_next: check_content
      false_next: missing_members
    check_content:
      type: condition
      variable: content_items
      operator: gt
      value: 0
      true_next: check_engagement
      false_next: missing_content
    check_engagement:
      type: condition
      variable: engagement_events_30d
      operator: gt
      value: 0
      true_next: check_churn
      false_next: missing_engagement
    check_churn:
      type: condition
      variable: churn_exits_30d
      operator: is_not_null
      value: true
      true_next: check_alternatives
      false_next: missing_churn
    check_alternatives:
      type: condition
      variable: alternatives_known
      operator: is_not_null
      value: true
      true_next: check_identity
      false_next: missing_alternatives
    check_identity:
      type: condition
      variable: has_identity_signal
      operator: eq
      value: 1
      true_next: complete
      false_next: missing_identity
    complete:
      type: return
      value:
        data_complete: true
        missing_fields: none
        can_compute_rim: true
    missing_members:
      type: return
      value:
        data_complete: false
        missing_fields: member_count
        can_compute_rim: false
    missing_content:
      type: return
      value:
        data_complete: false
        missing_fields: content_items
        can_compute_rim: false
    missing_engagement:
      type: return
      value:
        data_complete: false
        missing_fields: engagement_events_30d
        can_compute_rim: false
    missing_churn:
      type: return
      value:
        data_complete: false
        missing_fields: churn_exits_30d
        can_compute_rim: false
    missing_alternatives:
      type: return
      value:
        data_complete: false
        missing_fields: alternatives_known
        can_compute_rim: false
    missing_identity:
      type: return
      value:
        data_complete: false
        missing_fields: has_identity_signal
        can_compute_rim: false
tests:
# Complete data
- input:
    member_count: 50
    content_items: 200
    engagement_events_30d: 1500
    churn_exits_30d: 3
    alternatives_known: 5
    has_identity_signal: 1
  expect:
    data_complete: true
    missing_fields: none
    can_compute_rim: true
# Missing members
- input:
    member_count: 0
    content_items: 200
    engagement_events_30d: 1500
    churn_exits_30d: 3
    alternatives_known: 5
    has_identity_signal: 1
  expect:
    data_complete: false
    missing_fields: member_count
    can_compute_rim: false
# Missing content
- input:
    member_count: 50
    content_items: 0
    engagement_events_30d: 1500
    churn_exits_30d: 3
    alternatives_known: 5
    has_identity_signal: 1
  expect:
    data_complete: false
    missing_fields: content_items
    can_compute_rim: false
# Missing engagement
- input:
    member_count: 50
    content_items: 200
    engagement_events_30d: 0
    churn_exits_30d: 3
    alternatives_known: 5
    has_identity_signal: 1
  expect:
    data_complete: false
    missing_fields: engagement_events_30d
    can_compute_rim: false
# Missing identity signal
- input:
    member_count: 50
    content_items: 200
    engagement_events_30d: 1500
    churn_exits_30d: 3
    alternatives_known: 5
    has_identity_signal: 0
  expect:
    data_complete: false
    missing_fields: has_identity_signal
    can_compute_rim: false
# All zeros
- input: {}
  expect:
    data_complete: false
    missing_fields: member_count
    can_compute_rim: false
