    friction_risk: maximum
interface:
  inputs:
    overhead_ratio:
      type: float
      required: true
    automated_processes:
      type: int
      required: true
    overhead_trend:
      type: string
      required: true
    manual_processes:
      type: int
      required: true
  outputs:
    coverage_class:
      type: string
      required: false
    friction_risk:
      type: string
      required: false
    action:
      type: string
      required: false
  aliases: {}
