# MICROGRAM++ (upgraded 2026-04-23)
name: refinery-octane
version: 0.1.0
description: Compute octane rating (confidence x coverage) for product quality. High octane = high-quality decision. Low octane = unreliable output.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Refinery Octane
  subtitle: Compute octane rating (confidence x coverage) for product quality. High octane = high-quality decision. Low octane = unreliable output.
  icon: circle
  route: /vigilance/mg/refinery-octane
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/refinery-octane
  cli: rsk mcg run refinery-octane
  auth: none
  rate_limit: 600/min
tree:
  start: classify_octane
  nodes:
    classify_octane:
      type: condition
      variable: octane_rating
      operator: gte
      value: 87
      true_next: return_premium
      false_next: check_regular
    check_regular:
      type: condition
      variable: octane_rating
      operator: gte
      value: 70
      true_next: return_regular
      false_next: check_substandard
    check_substandard:
      type: condition
      variable: octane_rating
      operator: gte
      value: 40
      true_next: return_substandard
      false_next: return_off_spec
    return_premium:
      type: return
      value:
        octane_class: PREMIUM
        action: High-quality decision output; ship with confidence
        refinery_analog: Premium grade (91+); high anti-knock index, suitable for high-compression engines
    return_regular:
      type: return
      value:
        octane_class: REGULAR
        action: Acceptable quality; adequate for most decisions
        refinery_analog: Regular grade (87); standard performance, no knock risk
    return_substandard:
      type: return
      value:
        octane_class: SUBSTANDARD
        action: Low quality; supplement with additional validation before acting
        refinery_analog: Below specification; risk of engine knock under load
    return_off_spec:
      type: return
      value:
        octane_class: OFF_SPEC
        action: Product fails spec; do not ship — reprocess or discard
        refinery_analog: Off-specification; must be reblended or downgraded
tests:
  - input:
      octane_rating: 92
    expect:
      octane_class: PREMIUM
  - input:
      octane_rating: 75
    expect:
      octane_class: REGULAR
  - input:
      octane_rating: 50
    expect:
      octane_class: SUBSTANDARD
  - input:
      octane_rating: 20
    expect:
      octane_class: OFF_SPEC
  - input: {}
    expect:
      action: Product fails spec; do not ship — reprocess or discard
      octane_class: OFF_SPEC
      refinery_analog: Off-specification; must be reblended or downgraded
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
