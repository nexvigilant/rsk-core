# MICROGRAM++ (upgraded 2026-04-23)
name: drug-class-beta-blocker-safety
version: 0.1.0
description: Beta-blocker safety assessment. Evaluates bradycardia, bronchoconstriction in asthma, and hypoglycemia masking.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Class Beta Blocker Safety
  subtitle: Beta-blocker safety assessment. Evaluates bradycardia, bronchoconstriction in asthma, and hypoglycemia masking.
  icon: circle
  route: /vigilance/mg/drug-class-beta-blocker-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-class-beta-blocker-safety
  cli: rsk mcg run drug-class-beta-blocker-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_asthma_copd
  nodes:
    check_asthma_copd:
      type: condition
      variable: has_asthma_or_copd
      operator: eq
      value: true
      true_next: bronchospasm_alert
      false_next: check_diabetes
    bronchospasm_alert:
      type: return
      value:
        risk_level: high
        relative_contraindication: true
        message: Asthma/COPD present; non-selective beta-blockers contraindicated; cardioselective preferred
    check_diabetes:
      type: condition
      variable: has_diabetes
      operator: eq
      value: true
      true_next: diabetes_assessment
      false_next: check_heart_rate
    diabetes_assessment:
      type: return
      value:
        risk_level: moderate
        hypoglycemia_masking: true
        monitoring_required: true
        message: Diabetic patient; beta-blocker masks hypoglycemia symptoms; monitor glucose closely
    check_heart_rate:
      type: condition
      variable: resting_heart_rate
      operator: lt
      value: 50
      true_next: bradycardia_alert
      false_next: standard_dosing
    bradycardia_alert:
      type: return
      value:
        risk_level: moderate
        message: Bradycardia present; reduce beta-blocker dose
    standard_dosing:
      type: return
      value:
        risk_level: low
        message: Standard beta-blocker dosing appropriate
tests:
  - input:
      has_asthma_or_copd: true
      has_diabetes: false
      resting_heart_rate: 65
    expect:
      risk_level: high
      relative_contraindication: true
  - input:
      has_asthma_or_copd: false
      has_diabetes: true
      resting_heart_rate: 70
    expect:
      risk_level: moderate
      hypoglycemia_masking: true
  - input:
      has_asthma_or_copd: false
      has_diabetes: false
      resting_heart_rate: 48
    expect:
      risk_level: moderate
  - input:
      has_asthma_or_copd: false
      has_diabetes: false
      resting_heart_rate: 65
    expect:
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
