# MICROGRAM++ (upgraded 2026-04-23)
name: station-crystalbook-pipeline
version: 0.1.0
description: "Route Crystalbook law diagnostics: classify by violated law and vice detection"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Crystalbook Pipeline
  subtitle: "Route Crystalbook law diagnostics: classify by violated law and vice detection"
  icon: circle
  route: /vigilance/mg/station-crystalbook-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-crystalbook-pipeline
  cli: rsk mcg run station-crystalbook-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_law
  nodes:
    check_vice:
      type: condition
      variable: vice_detected
      operator: eq
      value: true
      true_next: vice_annihilate
      false_next: law_fix
    check_law:
      type: condition
      variable: violated_law
      operator: gte
      value: 1
      true_next: check_vice
      false_next: clean
    clean:
      type: return
      value:
        action: certify
        route: archive
        priority: low
        reason: No law violations — 8-law compliance verified
    vice_annihilate:
      type: return
      value:
        route: vice_remediation
        action: annihilate
        priority: critical
        reason: Capital vice detected alongside law violation — destroy before it spreads
    law_fix:
      type: return
      value:
        action: remediate
        route: law_compliance
        priority: high
        reason: Law violation without vice — structural fix needed
tests:
  - input:
      violated_law: 0
      vice_detected: false
    expect:
      route: archive
      action: certify
      priority: low
  - input:
      violated_law: 3
      vice_detected: true
    expect:
      priority: critical
      route: vice_remediation
      action: annihilate
  - input:
      vice_detected: false
      violated_law: 2
    expect:
      route: law_compliance
      priority: high
      action: remediate
  - input: {}
    expect:
      priority: low
      action: certify
      reason: No law violations — 8-law compliance verified
      route: archive
  - input:
      violated_law: -1
    expect:
      action: certify
      route: archive
      priority: low
      reason: No law violations — 8-law compliance verified
  - input:
      violated_law: 100
    expect:
      route: law_compliance
      action: remediate
      priority: high
      reason: Law violation without vice — structural fix needed
  - input: {}
    expect:
      priority: low
      route: archive
      reason: No law violations — 8-law compliance verified
      action: certify
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
