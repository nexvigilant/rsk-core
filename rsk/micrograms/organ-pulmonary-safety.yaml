# MICROGRAM++ (upgraded 2026-04-23)
name: organ-pulmonary-safety
version: 0.1.0
description: Pulmonary (lung) safety assessment. Evaluates interstitial lung disease, bronchospasm, and respiratory depression risk.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Organ Pulmonary Safety
  subtitle: Pulmonary (lung) safety assessment. Evaluates interstitial lung disease, bronchospasm, and respiratory depression risk.
  icon: circle
  route: /vigilance/mg/organ-pulmonary-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/organ-pulmonary-safety
  cli: rsk mcg run organ-pulmonary-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_baseline_ild
  nodes:
    check_baseline_ild:
      type: condition
      variable: has_interstitial_lung_disease
      operator: eq
      value: true
      true_next: ild_alert
      false_next: check_copd
    ild_alert:
      type: return
      value:
        organ: lung
        risk_level: high
        pneumonitis_risk: true
        contraindication: true
        message: ILD present; pneumonitis-risk drugs contraindicated
    check_copd:
      type: condition
      variable: has_severe_copd
      operator: eq
      value: true
      true_next: copd_alert
      false_next: check_fev1
    copd_alert:
      type: return
      value:
        organ: lung
        risk_level: high
        bronchospasm_risk: true
        message: Severe COPD; bronchospasm-risk drugs require caution
    check_fev1:
      type: condition
      variable: fev1_percent_predicted
      operator: lt
      value: 50
      true_next: reduced_fev1
      false_next: standard_dosing
    reduced_fev1:
      type: return
      value:
        organ: lung
        risk_level: moderate
        respiratory_monitoring: required
        message: Reduced FEV1 <50%; respiratory monitoring required
    standard_dosing:
      type: return
      value:
        organ: lung
        risk_level: low
        baseline_pulmonary_function: recommended
tests:
  - input:
      has_interstitial_lung_disease: true
      has_severe_copd: false
      fev1_percent_predicted: 70
    expect:
      organ: lung
      risk_level: high
      pneumonitis_risk: true
  - input:
      has_interstitial_lung_disease: false
      has_severe_copd: true
      fev1_percent_predicted: 70
    expect:
      organ: lung
      risk_level: high
      bronchospasm_risk: true
  - input:
      has_interstitial_lung_disease: false
      has_severe_copd: false
      fev1_percent_predicted: 45
    expect:
      organ: lung
      risk_level: moderate
      respiratory_monitoring: required
  - input:
      has_interstitial_lung_disease: false
      has_severe_copd: false
      fev1_percent_predicted: 80
    expect:
      organ: lung
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
