# MICROGRAM++ (upgraded 2026-04-23)
name: station-daemon-pipeline
version: 0.1.0
description: Route daemon/service health checks by uptime and error rate
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Daemon Pipeline
  subtitle: Route daemon/service health checks by uptime and error rate
  icon: circle
  route: /vigilance/mg/station-daemon-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-daemon-pipeline
  cli: rsk mcg run station-daemon-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_uptime
  nodes:
    check_uptime:
      type: condition
      variable: uptime_pct
      operator: gte
      value: 99
      true_next: check_errors
      false_next: degraded
    healthy:
      type: return
      value:
        route: archive
        priority: low
        reason: Uptime ≥99%, errors <1% — service healthy
        action: certify
    degraded:
      type: return
      value:
        action: restart
        priority: critical
        reason: Uptime <99% — service degraded, restart needed
        route: service_restart
    error_spike:
      type: return
      value:
        route: error_diagnosis
        priority: high
        action: diagnose
        reason: Error rate ≥1% despite high uptime — silent failures
    check_errors:
      type: condition
      variable: error_rate_pct
      operator: gte
      value: 1
      true_next: error_spike
      false_next: healthy
tests:
  - input:
      uptime_pct: 95
      error_rate_pct: 3
    expect:
      route: service_restart
      action: restart
      priority: critical
  - input:
      uptime_pct: 99.5
      error_rate_pct: 2
    expect:
      route: error_diagnosis
      priority: high
      action: diagnose
  - input:
      error_rate_pct: 0.1
      uptime_pct: 99.9
    expect:
      route: archive
      priority: low
      action: certify
  - input:
      uptime_pct: 98.999
    expect:
      action: restart
      priority: critical
      route: service_restart
      reason: Uptime <99% — service degraded, restart needed
  - input:
      uptime_pct: 99.001
    expect:
      priority: low
      route: archive
      action: certify
      reason: Uptime ≥99%, errors <1% — service healthy
  - input: {}
    expect:
      priority: critical
      reason: Uptime <99% — service degraded, restart needed
      route: service_restart
      action: restart
  - input:
      error_rate_pct: 0.999
    expect:
      priority: critical
      reason: Uptime <99% — service degraded, restart needed
      action: restart
      route: service_restart
  - input:
      error_rate_pct: 1.001
    expect:
      reason: Uptime <99% — service degraded, restart needed
      action: restart
      priority: critical
      route: service_restart
  - input: {}
    expect:
      route: service_restart
      priority: critical
      reason: Uptime <99% — service degraded, restart needed
      action: restart
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
