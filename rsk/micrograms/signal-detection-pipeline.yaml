# MICROGRAM++ (upgraded 2026-04-23)
name: signal-detection-pipeline
version: 0.1.0
description: "Routes a drug through the full signal detection pipeline: classifies signal strength from PRR/ROR/case_count or routes to FAERS lookup"
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: drug_name
    type: string
    required: false
    description: ""
  - name: event_term
    type: string
    required: false
    description: ""
  - name: prr
    type: float
    required: false
    description: ""
  - name: ror
    type: float
    required: false
    description: ""
  - name: case_count
    type: int
    required: false
    description: ""
outputs:
  - name: signal_strength
    type: string
  - name: recommended_action
    type: string
  - name: next_step
    type: string
interface:
  inputs:
    drug_name:
      type: string
      required: false
    event_term:
      type: string
      required: false
    prr:
      type: float
      required: false
    ror:
      type: float
      required: false
    case_count:
      type: int
      required: false
  outputs:
    signal_strength:
      type: string
    recommended_action:
      type: string
    next_step:
      type: string
ui:
  title: Signal Detection Pipeline
  subtitle: "Routes a drug through the full signal detection pipeline: classifies signal strength from PRR/ROR/case_count or routes to FAERS lookup"
  icon: activity
  route: /vigilance/mg/signal-detection-pipeline
  steps:
    - field: drug_name
      label: drug name
      help: Enter drug_name
      widget: text
      placeholder: null
    - field: event_term
      label: event term
      help: Enter event_term
      widget: text
      placeholder: null
    - field: prr
      label: prr
      help: Enter prr
      widget: text
      placeholder: null
    - field: ror
      label: ror
      help: Enter ror
      widget: text
      placeholder: null
    - field: case_count
      label: case count
      help: Enter case_count
      widget: text
      placeholder: null
  result:
    template: "signal_strength: {{signal_strength}} — recommended_action: {{recommended_action}} — next_step: {{next_step}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/signal-detection-pipeline
  cli: rsk mcg run signal-detection-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_prr_present
  nodes:
    check_prr_present:
      type: condition
      variable: prr
      operator: is_not_null
      value: true
      true_next: check_ror_present
      false_next: check_drug_name
    check_ror_present:
      type: condition
      variable: ror
      operator: is_not_null
      value: true
      true_next: check_strong_prr
      false_next: check_prr_strong_solo
    check_drug_name:
      type: condition
      variable: drug_name
      operator: is_not_null
      value: true
      true_next: route_faers
      false_next: insufficient_data
    check_strong_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: check_strong_ror
      false_next: check_moderate_prr
    check_strong_ror:
      type: condition
      variable: ror
      operator: gte
      value: 2
      true_next: check_strong_cases
      false_next: moderate_signal
    check_strong_cases:
      type: condition
      variable: case_count
      operator: gte
      value: 3
      true_next: strong_signal
      false_next: moderate_signal
    check_moderate_prr:
      type: condition
      variable: prr
      operator: gte
      value: 1.5
      true_next: check_moderate_ror
      false_next: check_ror_moderate_solo
    check_moderate_ror:
      type: condition
      variable: ror
      operator: gte
      value: 2
      true_next: moderate_signal
      false_next: weak_signal
    check_ror_moderate_solo:
      type: condition
      variable: ror
      operator: gte
      value: 2
      true_next: moderate_signal
      false_next: noise_signal
    check_prr_strong_solo:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: moderate_signal_prr_only
      false_next: check_prr_weak_solo
    check_prr_weak_solo:
      type: condition
      variable: prr
      operator: gte
      value: 1.5
      true_next: weak_signal
      false_next: noise_signal
    strong_signal:
      type: return
      value:
        signal_strength: strong
        recommended_action: Initiate causality assessment and regulatory review
        next_step: causality_assessment
    moderate_signal:
      type: return
      value:
        signal_strength: moderate
        recommended_action: Schedule causality assessment and continue monitoring
        next_step: causality_assessment
    moderate_signal_prr_only:
      type: return
      value:
        signal_strength: moderate
        recommended_action: Schedule causality assessment and continue monitoring
        next_step: causality_assessment
    weak_signal:
      type: return
      value:
        signal_strength: weak
        recommended_action: Continue monitoring and collect additional data
        next_step: enhanced_monitoring
    noise_signal:
      type: return
      value:
        signal_strength: noise
        recommended_action: No action required at this time
        next_step: routine_monitoring
    route_faers:
      type: return
      value:
        signal_strength: pending
        recommended_action: Query FAERS for adverse event data before signal classification
        next_step: faers_lookup
    insufficient_data:
      type: return
      value:
        signal_strength: unknown
        recommended_action: Provide drug name or signal metrics to begin analysis
        next_step: data_collection
tests:
  - input:
      drug_name: metformin
      event_term: lactic_acidosis
      prr: 4.5
      ror: 3.2
      case_count: 15
    expect:
      signal_strength: strong
      recommended_action: Initiate causality assessment and regulatory review
      next_step: causality_assessment
  - input:
      drug_name: aspirin
      event_term: gi_bleed
      prr: 2
      ror: 2
      case_count: 3
    expect:
      signal_strength: strong
      recommended_action: Initiate causality assessment and regulatory review
      next_step: causality_assessment
  - input:
      prr: 3
      ror: 2.5
      case_count: 1
    expect:
      signal_strength: moderate
      recommended_action: Schedule causality assessment and continue monitoring
      next_step: causality_assessment
  - input:
      prr: 2.5
      ror: 1.5
      case_count: 10
    expect:
      signal_strength: moderate
      recommended_action: Schedule causality assessment and continue monitoring
      next_step: causality_assessment
  - input:
      prr: 1.2
      ror: 3
      case_count: 5
    expect:
      signal_strength: moderate
      recommended_action: Schedule causality assessment and continue monitoring
      next_step: causality_assessment
  - input:
      prr: 1.7
      ror: 1.3
      case_count: 4
    expect:
      signal_strength: weak
      recommended_action: Continue monitoring and collect additional data
      next_step: enhanced_monitoring
  - input:
      prr: 1
      ror: 0.8
      case_count: 2
    expect:
      signal_strength: noise
      recommended_action: No action required at this time
      next_step: routine_monitoring
  - input:
      drug_name: ibuprofen
    expect:
      signal_strength: pending
      recommended_action: Query FAERS for adverse event data before signal classification
      next_step: faers_lookup
  - input:
      drug_name: warfarin
      event_term: hemorrhage
    expect:
      signal_strength: pending
      recommended_action: Query FAERS for adverse event data before signal classification
      next_step: faers_lookup
  - input:
      prr: 2.5
    expect:
      signal_strength: moderate
      recommended_action: Schedule causality assessment and continue monitoring
      next_step: causality_assessment
  - input:
      prr: 1.6
    expect:
      signal_strength: weak
      recommended_action: Continue monitoring and collect additional data
      next_step: enhanced_monitoring
  - input:
      prr: 0.9
    expect:
      signal_strength: noise
      recommended_action: No action required at this time
      next_step: routine_monitoring
  - input: {}
    expect:
      signal_strength: unknown
      recommended_action: Provide drug name or signal metrics to begin analysis
      next_step: data_collection
  - input:
      prr: 50
      ror: 25
      case_count: 100
    expect:
      signal_strength: strong
      recommended_action: Initiate causality assessment and regulatory review
      next_step: causality_assessment
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - signal_strength
    - recommended_action
    - next_step
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
