# MICROGRAM++ (upgraded 2026-04-23)
name: algo-converge-signal
version: 0.1.0
description: "Algorithm 8 (CONVERGE): Fixpoint iteration for signal stability. Checks delta between successive estimates against tolerance tiers. Returns CONVERGED/CONTINUE/DIVERGE."
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: delta
    type: float
    required: true
    description: abs(current - previous) pre-computed
  - name: tolerance_met
    type: boolean
    required: true
    description: Is delta <= tolerance? (pre-computed by caller)
  - name: iteration_count
    type: integer
    required: true
    description: ""
  - name: max_iterations
    type: integer
    required: true
    description: ""
outputs:
  - name: verdict
    type: string
  - name: algorithm
    type: string
interface:
  inputs:
    delta:
      type: float
      required: true
      description: abs(current - previous) pre-computed
    tolerance_met:
      type: boolean
      required: true
      description: Is delta <= tolerance? (pre-computed by caller)
    iteration_count:
      type: integer
      required: true
    max_iterations:
      type: integer
      required: true
  outputs:
    verdict:
      type: string
    algorithm:
      type: string
ui:
  title: Algo Converge Signal
  subtitle: "Algorithm 8 (CONVERGE): Fixpoint iteration for signal stability. Checks delta between successive estimates against tolerance tiers. Returns CONVERGED/CONTINUE/DIVERGE."
  icon: activity
  route: /vigilance/mg/algo-converge-signal
  steps:
    - field: delta
      label: delta
      help: abs(current - previous) pre-computed
      widget: text
      placeholder: null
    - field: tolerance_met
      label: tolerance met
      help: Is delta <= tolerance? (pre-computed by caller)
      widget: toggle
      placeholder: null
    - field: iteration_count
      label: iteration count
      help: Enter iteration_count
      widget: number
      placeholder: null
    - field: max_iterations
      label: max iterations
      help: Enter max_iterations
      widget: number
      placeholder: null
  result:
    template: "verdict: {{verdict}} — algorithm: {{algorithm}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/algo-converge-signal
  cli: rsk mcg run algo-converge-signal
  auth: none
  rate_limit: 600/min
tree:
  start: check_convergence
  nodes:
    check_convergence:
      type: condition
      variable: tolerance_met
      operator: eq
      value: true
      true_next: converged
      false_next: check_max_iterations
    check_max_iterations:
      type: condition
      variable: iteration_count
      operator: gte
      value: 20
      true_next: diverge_exhausted
      false_next: check_unstable
    check_unstable:
      type: condition
      variable: delta
      operator: gte
      value: 10
      true_next: diverge_unstable
      false_next: continue_iteration
    converged:
      type: return
      value:
        verdict: CONVERGED
        algorithm: "CONVERGE: ρ(→(Δς) at ∂) → π(ς) — delta within tolerance, fixpoint reached"
    diverge_exhausted:
      type: return
      value:
        verdict: DIVERGE
        algorithm: "CONVERGE inverse: ∂_tolerance never satisfied within max iterations"
    diverge_unstable:
      type: return
      value:
        verdict: DIVERGE
        algorithm: "CONVERGE inverse: Δ > 10.0 — ENERGY increasing, system unstable"
    continue_iteration:
      type: return
      value:
        verdict: CONTINUE
        algorithm: "CONVERGE: Δ > tolerance but within bounds — iterate again"
tests:
  - input:
      delta: 0.01
      tolerance_met: true
      iteration_count: 5
      max_iterations: 20
    expect:
      verdict: CONVERGED
  - input:
      delta: 0.3
      tolerance_met: false
      iteration_count: 3
      max_iterations: 20
    expect:
      verdict: CONTINUE
  - input:
      delta: 0.3
      tolerance_met: false
      iteration_count: 20
      max_iterations: 20
    expect:
      verdict: DIVERGE
  - input:
      delta: 22
      tolerance_met: false
      iteration_count: 2
      max_iterations: 20
    expect:
      verdict: DIVERGE
  - input:
      delta: 0
      tolerance_met: true
      iteration_count: 1
      max_iterations: 10
    expect:
      verdict: CONVERGED
  - input:
      delta: 0.05
      tolerance_met: true
      iteration_count: 8
      max_iterations: 20
    expect:
      verdict: CONVERGED
  - input:
      delta: 1.5
      tolerance_met: false
      iteration_count: 1
      max_iterations: 10
    expect:
      verdict: CONTINUE
  - input: {}
    expect:
      verdict: CONTINUE
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - verdict
    - algorithm
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
