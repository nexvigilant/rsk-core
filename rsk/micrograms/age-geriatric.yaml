# MICROGRAM++ (upgraded 2026-04-23)
name: age-geriatric
version: 0.1.0
description: Geriatric age classifier. Identifies subjects aged 80+ years (very elderly).
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Age Geriatric
  subtitle: Geriatric age classifier. Identifies subjects aged 80+ years (very elderly).
  icon: circle
  route: /vigilance/mg/age-geriatric
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/age-geriatric
  cli: rsk mcg run age-geriatric
  auth: none
  rate_limit: 600/min
tree:
  start: check_age_threshold
  nodes:
    check_age_threshold:
      type: condition
      variable: age_years
      operator: gte
      value: 80
      true_next: is_geriatric
      false_next: not_geriatric
    is_geriatric:
      type: return
      value:
        age_group: geriatric
        age_range: 80+ years
        frailty_assessment: required
        polypharmacy_risk: high
        fall_risk: high
    not_geriatric:
      type: return
      value:
        age_group: other
        is_geriatric: false
tests:
  - input:
      age_years: 85
    expect:
      age_group: geriatric
      frailty_assessment: required
  - input:
      age_years: 80
    expect:
      age_group: geriatric
  - input:
      age_years: 100
    expect:
      age_group: geriatric
  - input:
      age_years: 79
    expect:
      age_group: other
      is_geriatric: false
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
