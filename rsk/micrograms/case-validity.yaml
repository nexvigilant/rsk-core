      valid: false
      status: INVALID_INSUFFICIENT
      missing_count: 3
      action: cannot_process
  - input:
      has_reporter: false
      has_patient: false
      has_suspect_drug: false
      has_adverse_event: false
    expect:
      valid: false
      status: INVALID_INSUFFICIENT
      missing_count: 4
      action: cannot_process
  - input: {}
    expect:
      valid: false
