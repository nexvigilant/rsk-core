    expect:
      valid: false
      status: INVALID_MINIMAL
      missing_count: 2
      action: request_followup_urgent
  - input:
      has_reporter: false
      has_patient: true
      has_suspect_drug: false
      has_adverse_event: false
    expect:
      valid: false
      status: INVALID_INSUFFICIENT
      missing_count: 3
      action: cannot_process
  - input:
      has_reporter: false
      has_patient: true
      has_suspect_drug: false
      has_adverse_event: true
    expect:
      valid: false
      status: INVALID_MINIMAL
      missing_count: 2
      action: request_followup_urgent
  - input:
      has_reporter: false
      has_patient: false
      has_suspect_drug: true
      has_adverse_event: false
    expect:
      valid: false
