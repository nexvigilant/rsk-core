# MICROGRAM++ (upgraded 2026-04-23)
name: ab-dopamine-spike
version: 0.1.0
description: "Antibody: detects dopamine spike without cooldown (stem-bio reward pathway). Consecutive high-reward stimuli without temporal decay cause hedonic adaptation."
family: antibody.chemistry
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - antibody
inputs:
  - name: dopamine_level
    type: number
    required: true
    description: ""
  - name: reward_count_consecutive
    type: number
    required: true
    description: ""
outputs:
  - name: threat
    type: boolean
  - name: response
    type: string
interface:
  inputs:
    dopamine_level:
      type: number
      required: true
    reward_count_consecutive:
      type: number
      required: true
  outputs:
    threat:
      type: boolean
    response:
      type: string
ui:
  title: Dopamine Spike
  subtitle: "Antibody: detects dopamine spike without cooldown (stem-bio reward pathway). Consecutive high-reward stimuli without temporal decay cause hedonic adaptation."
  icon: shield
  route: /vigilance/mg/ab-dopamine-spike
  steps:
    - field: dopamine_level
      label: dopamine level
      help: Enter dopamine_level
      widget: number
      placeholder: null
    - field: reward_count_consecutive
      label: reward count consecutive
      help: Enter reward_count_consecutive
      widget: number
      placeholder: null
  result:
    template: "threat: {{threat}} — response: {{response}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ab-dopamine-spike
  cli: rsk mcg run ab-dopamine-spike
  auth: none
  rate_limit: 600/min
tree:
  start: check_level
  nodes:
    check_level:
      type: condition
      variable: dopamine_level
      operator: gt
      value: 0.7
      true_next: check_consecutive
      false_next: clean
    check_consecutive:
      type: condition
      variable: reward_count_consecutive
      operator: gte
      value: 3
      true_next: adaptation
      false_next: clean
    adaptation:
      type: return
      value:
        threat: true
        response: "WARN: hedonic adaptation risk — 3+ consecutive rewards without decay"
    clean:
      type: return
      value:
        threat: false
        response: PASS
tests:
  - input:
      dopamine_level: 0.5
      reward_count_consecutive: 5
    expect:
      threat: false
  - input:
      dopamine_level: 0.8
      reward_count_consecutive: 2
    expect:
      threat: false
  - input:
      dopamine_level: 0.8
      reward_count_consecutive: 3
    expect:
      threat: true
  - input:
      dopamine_level: 0.9
      reward_count_consecutive: 10
    expect:
      threat: true
  - input: {}
    expect:
      response: PASS
      threat: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - threat
    - response
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: antibody.chemistry
  log_level: info
governance:
  sop_ref: SOP-CHEM-001
  regulatory_ref: []
  harm_types:
    - F
  review_cadence: quarterly
  tov_axioms:
    - conservation
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
