# MICROGRAM++ (upgraded 2026-04-23)
name: station-cioms-pipeline
version: 0.1.0
description: "Route CIOMS form and reporting data: classify by form type and deadline urgency"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Cioms Pipeline
  subtitle: "Route CIOMS form and reporting data: classify by form type and deadline urgency"
  icon: circle
  route: /vigilance/mg/station-cioms-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-cioms-pipeline
  cli: rsk mcg run station-cioms-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_form
  nodes:
    check_form:
      type: condition
      variable: form_type
      operator: eq
      value: I
      true_next: cioms_i
      false_next: check_form_ii
    cioms_i:
      type: condition
      variable: days_to_deadline
      operator: lte
      value: 3
      true_next: urgent_report
      false_next: standard_report
    other_form:
      type: return
      value:
        route: archive
        action: reference
        priority: low
        reason: CIOMS working group reference — informational
    standard_report:
      type: return
      value:
        route: case_submission
        priority: moderate
        reason: CIOMS I form within deadline — standard submission workflow
        action: submit
    cioms_ii:
      type: return
      value:
        priority: moderate
        action: review
        reason: CIOMS II periodic safety report — aggregate analysis
        route: periodic_review
    check_form_ii:
      type: condition
      variable: form_type
      operator: eq
      value: II
      true_next: cioms_ii
      false_next: other_form
    urgent_report:
      type: return
      value:
        priority: critical
        reason: CIOMS I form with ≤3 days to deadline — expedited submission required
        route: expedited_reporting
        action: expedite
tests:
  - input:
      form_type: I
      days_to_deadline: 2
    expect:
      action: expedite
      priority: critical
      route: expedited_reporting
  - input:
      form_type: I
      days_to_deadline: 10
    expect:
      action: submit
      priority: moderate
      route: case_submission
  - input:
      form_type: II
      days_to_deadline: 30
    expect:
      action: review
      priority: moderate
      route: periodic_review
  - input:
      form_type: V
      days_to_deadline: 90
    expect:
      action: reference
      priority: low
      route: archive
  - input: {}
    expect:
      reason: CIOMS working group reference — informational
      action: reference
      priority: low
      route: archive
  - input:
      days_to_deadline: 0
    expect:
      route: archive
      reason: CIOMS working group reference — informational
      action: reference
      priority: low
  - input:
      days_to_deadline: -1
    expect:
      action: reference
      priority: low
      reason: CIOMS working group reference — informational
      route: archive
  - input:
      days_to_deadline: 4
    expect:
      route: archive
      priority: low
      action: reference
      reason: CIOMS working group reference — informational
  - input: {}
    expect:
      action: reference
      priority: low
      reason: CIOMS working group reference — informational
      route: archive
  - input: {}
    expect:
      action: reference
      priority: low
      route: archive
      reason: CIOMS working group reference — informational
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
