name: drug-profile-metformin
description: 'Safety triage for metformin: PRR-based signal routing (Type A)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    signal:
      type: return
      value:
        drug: metformin
        expected_prr: 71.4
        signal: true
        action: investigate
        harm_type: A
    no_signal:
      type: return
      value:
        action: monitor
        signal: false
        expected_prr: 71.4
        harm_type: A
        drug: metformin
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 71.4
  expect:
    signal: true
    drug: metformin
- input:
    prr: 0.5
  expect:
    signal: false
    drug: metformin
- input: {}
  expect:
    drug: metformin
    signal: false
- input:
    prr: 1.999
  expect:
    harm_type: A
    drug: metformin
    signal: false
    action: monitor
    expected_prr: 71.4
- input:
    prr: 2.001
  expect:
    drug: metformin
    expected_prr: 71.4
    action: investigate
    harm_type: A
    signal: true
interface: null
primitive_signature: null
