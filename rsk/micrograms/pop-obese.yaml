# MICROGRAM++ (upgraded 2026-04-23)
name: pop-obese
version: 0.1.0
description: Obese — altered drug distribution
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Pop Obese
  subtitle: Obese — altered drug distribution
  icon: circle
  route: /vigilance/mg/pop-obese
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pop-obese
  cli: rsk mcg run pop-obese
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    standard:
      type: return
      value:
        action: standard_care
        population: obese
        at_risk: false
    at_risk:
      type: return
      value:
        population: obese
        action: special_monitoring
        at_risk: true
        reason: Obese — altered drug distribution
    check:
      type: condition
      variable: bmi
      operator: gte
      value: 35
      true_next: at_risk
      false_next: standard
tests:
  - input:
      bmi: 35
    expect:
      at_risk: true
      population: obese
  - input: {}
    expect:
      at_risk: false
      population: obese
  - input:
      bmi: 0
    expect:
      action: standard_care
      population: obese
      at_risk: false
  - input:
      bmi: -1
    expect:
      action: standard_care
      at_risk: false
      population: obese
  - input:
      bmi: 34
    expect:
      at_risk: false
      action: standard_care
      population: obese
  - input:
      bmi: 36
    expect:
      at_risk: true
      action: special_monitoring
      reason: Obese — altered drug distribution
      population: obese
  - input:
      bmi: 3500
    expect:
      population: obese
      reason: Obese — altered drug distribution
      at_risk: true
      action: special_monitoring
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
