# MICROGRAM++ (upgraded 2026-04-23)
name: smm-credibility-gate
version: 0.1.0
description: Maps severity bands to credibility levels for empirical works (SMM-001 path). Determines integration weight and review action for K-state.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: severity_band
    type: string
    required: false
    description: ""
outputs:
  - name: credibility_level
    type: string
  - name: integration_weight
    type: string
  - name: review_action
    type: string
  - name: cs_range
    type: string
interface:
  inputs:
    severity_band:
      type: string
      required: false
  outputs:
    credibility_level:
      type: string
    integration_weight:
      type: string
    review_action:
      type: string
    cs_range:
      type: string
ui:
  title: Smm Credibility Gate
  subtitle: Maps severity bands to credibility levels for empirical works (SMM-001 path). Determines integration weight and review action for K-state.
  icon: circle
  route: /vigilance/mg/smm-credibility-gate
  steps:
    - field: severity_band
      label: severity band
      help: Enter severity_band
      widget: text
      placeholder: null
  result:
    template: "credibility_level: {{credibility_level}} — integration_weight: {{integration_weight}} — review_action: {{review_action}} — cs_range: {{cs_range}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/smm-credibility-gate
  cli: rsk mcg run smm-credibility-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_exemplary
  nodes:
    check_exemplary:
      type: condition
      variable: severity_band
      operator: eq
      value: EXEMPLARY
      true_next: authoritative
      false_next: check_high
    check_high:
      type: condition
      variable: severity_band
      operator: eq
      value: HIGH
      true_next: credible
      false_next: check_moderate
    check_moderate:
      type: condition
      variable: severity_band
      operator: eq
      value: MODERATE
      true_next: conditional
      false_next: check_low
    check_low:
      type: condition
      variable: severity_band
      operator: eq
      value: LOW
      true_next: weak
      false_next: not_credible
    authoritative:
      type: return
      value:
        credibility_level: AUTHORITATIVE
        integration_weight: full
        review_action: Integrate at full weight. Minor violations annotated.
        cs_range: 0.90-1.00
    credible:
      type: return
      value:
        credibility_level: CREDIBLE
        integration_weight: high
        review_action: Integrate at high weight. Advisory flags for minor gaps.
        cs_range: 0.80-0.89
    conditional:
      type: return
      value:
        credibility_level: CONDITIONAL
        integration_weight: conditional
        review_action: Integrate at 0.60x weight. Violation summary appended. Remediation recommended.
        cs_range: 0.60-0.79
    weak:
      type: return
      value:
        credibility_level: WEAK
        integration_weight: low
        review_action: Integrate at 0.25x weight. Requires supporting corroboration from independent sources.
        cs_range: 0.30-0.59
    not_credible:
      type: return
      value:
        credibility_level: NOT_CREDIBLE
        integration_weight: exclude
        review_action: Exclude from K-state. Structural integrity insufficient for evidence integration.
        cs_range: 0.00-0.29
tests:
  - input:
      severity_band: EXEMPLARY
    expect:
      credibility_level: AUTHORITATIVE
      integration_weight: full
      cs_range: 0.90-1.00
  - input:
      severity_band: HIGH
    expect:
      credibility_level: CREDIBLE
      integration_weight: high
      cs_range: 0.80-0.89
  - input:
      severity_band: MODERATE
    expect:
      credibility_level: CONDITIONAL
      integration_weight: conditional
      cs_range: 0.60-0.79
  - input:
      severity_band: LOW
    expect:
      credibility_level: WEAK
      integration_weight: low
      cs_range: 0.30-0.59
  - input:
      severity_band: VERY_LOW
    expect:
      credibility_level: NOT_CREDIBLE
      integration_weight: exclude
      cs_range: 0.00-0.29
  - input: {}
    expect:
      credibility_level: NOT_CREDIBLE
      integration_weight: exclude
  - input:
      severity_band: UNKNOWN
    expect:
      credibility_level: NOT_CREDIBLE
      integration_weight: exclude
  - input:
      severity_band: LOW
    expect:
      review_action: Integrate at 0.25x weight. Requires supporting corroboration from independent sources.
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - credibility_level
    - integration_weight
    - review_action
    - cs_range
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
