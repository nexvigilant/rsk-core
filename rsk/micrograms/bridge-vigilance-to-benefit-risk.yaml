# MICROGRAM++ (upgraded 2026-04-23)
name: bridge-vigilance-to-benefit-risk
version: 0.1.0
description: "Bridge: converts Guardian risk score verdict into QBRI assessment input"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Bridge Vigilance To Benefit Risk
  subtitle: "Bridge: converts Guardian risk score verdict into QBRI assessment input"
  icon: circle
  route: /vigilance/mg/bridge-vigilance-to-benefit-risk
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/bridge-vigilance-to-benefit-risk
  cli: rsk mcg run bridge-vigilance-to-benefit-risk
  auth: none
  rate_limit: 600/min
tree:
  start: check_action
  nodes:
    unfavorable:
      type: return
      value:
        risk_level: critical
        qbri_score: 0.3
        bridge: vigilance-to-benefit-risk
    marginal:
      type: return
      value:
        bridge: vigilance-to-benefit-risk
        risk_level: high
        qbri_score: 0.7
    check_investigate:
      type: condition
      variable: action
      operator: eq
      value: investigate
      true_next: marginal
      false_next: favorable
    favorable:
      type: return
      value:
        bridge: vigilance-to-benefit-risk
        qbri_score: 1.5
        risk_level: low
    check_action:
      type: condition
      variable: action
      operator: eq
      value: escalate
      true_next: unfavorable
      false_next: check_investigate
tests:
  - input:
      action: escalate
      priority: critical
    expect:
      risk_level: critical
      qbri_score: 0.3
      bridge: vigilance-to-benefit-risk
  - input:
      priority: high
      action: investigate
    expect:
      qbri_score: 0.7
      bridge: vigilance-to-benefit-risk
      risk_level: high
  - input:
      action: archive
      priority: low
    expect:
      risk_level: low
      bridge: vigilance-to-benefit-risk
      qbri_score: 1.5
  - input: {}
    expect:
      qbri_score: 1.5
      bridge: vigilance-to-benefit-risk
      risk_level: low
  - input: {}
    expect:
      risk_level: low
      bridge: vigilance-to-benefit-risk
      qbri_score: 1.5
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
