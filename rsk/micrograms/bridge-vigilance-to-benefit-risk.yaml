name: bridge-vigilance-to-benefit-risk
description: 'Bridge: converts Guardian risk score verdict into QBRI assessment input'
version: 0.1.0
tree:
  start: check_action
  nodes:
    unfavorable:
      type: return
      value:
        risk_level: critical
        qbri_score: 0.3
        bridge: vigilance-to-benefit-risk
    marginal:
      type: return
      value:
        bridge: vigilance-to-benefit-risk
        risk_level: high
        qbri_score: 0.7
    check_investigate:
      type: condition
      variable: action
      operator: eq
      value: investigate
      true_next: marginal
      false_next: favorable
    favorable:
      type: return
      value:
        bridge: vigilance-to-benefit-risk
        qbri_score: 1.5
        risk_level: low
    check_action:
      type: condition
      variable: action
      operator: eq
      value: escalate
      true_next: unfavorable
      false_next: check_investigate
tests:
- input:
    action: escalate
    priority: critical
  expect:
    risk_level: critical
    qbri_score: 0.3
    bridge: vigilance-to-benefit-risk
- input:
    priority: high
    action: investigate
  expect:
    qbri_score: 0.7
    bridge: vigilance-to-benefit-risk
    risk_level: high
- input:
    action: archive
    priority: low
  expect:
    risk_level: low
    bridge: vigilance-to-benefit-risk
    qbri_score: 1.5
- input: {}
  expect:
    qbri_score: 1.5
    bridge: vigilance-to-benefit-risk
    risk_level: low
- input: {}
  expect:
    risk_level: low
    bridge: vigilance-to-benefit-risk
    qbri_score: 1.5
interface: null
primitive_signature: null
