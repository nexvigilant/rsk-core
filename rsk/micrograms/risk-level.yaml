# MICROGRAM++ (upgraded 2026-04-23)
name: risk-level
version: 0.1.0
description: Classify risk level by score
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: score
    type: float
    required: false
    description: ""
outputs:
  - name: risk
    type: bool
interface:
  inputs:
    score:
      type: float
      required: false
  outputs:
    risk:
      type: bool
ui:
  title: Risk Level
  subtitle: Classify risk level by score
  icon: circle
  route: /vigilance/mg/risk-level
  steps:
    - field: score
      label: score
      help: Enter score
      widget: text
      placeholder: null
  result:
    template: "risk: {{risk}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/risk-level
  cli: rsk mcg run risk-level
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    yes:
      type: return
      value:
        risk: true
    check:
      type: condition
      variable: score
      operator: gte
      value: 70
      true_next: yes
      false_next: no
    no:
      type: return
      value:
        risk: false
tests:
  - input:
      score: 70
    expect:
      risk: true
  - input:
      score: 71
    expect:
      risk: true
  - input:
      score: 69
    expect:
      risk: false
  - input:
      score: 0
    expect:
      risk: false
  - input:
      score: -1
    expect:
      risk: false
  - input:
      score: 7000
    expect:
      risk: true
  - input: {}
    expect:
      risk: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - risk
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
