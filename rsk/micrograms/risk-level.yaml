name: risk-level
description: Classify risk level by score
version: 0.1.0
interface:
  inputs:
    score:
      type: float
      required: false
  outputs:
    risk:
      type: bool
tree:
  start: check
  nodes:
    yes:
      type: return
      value:
        risk: true
    check:
      type: condition
      variable: score
      operator: gte
      value: 70
      true_next: yes
      false_next: no
    no:
      type: return
      value:
        risk: false
tests:
- input:
    score: 70
  expect:
    risk: true
- input:
    score: 71
  expect:
    risk: true
- input:
    score: 69
  expect:
    risk: false
- input:
    score: 0
  expect:
    risk: false
- input:
    score: -1
  expect:
    risk: false
- input:
    score: 7000
  expect:
    risk: true
- input: {}
  expect:
    risk: false
