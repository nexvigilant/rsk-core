# MICROGRAM++ (upgraded 2026-04-23)
name: pharma-portfolio-triage
version: 0.1.0
description: Routes a pharmaceutical company to a portfolio tier based on pipeline size. Determines analysis depth for competitive intelligence workflows.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: company_key
    type: string
    required: false
    description: ""
  - name: portfolio_size
    type: int
    required: false
    description: ""
outputs:
  - name: portfolio_tier
    type: string
  - name: recommended_depth
    type: string
interface:
  inputs:
    company_key:
      type: string
      required: false
    portfolio_size:
      type: int
      required: false
  outputs:
    portfolio_tier:
      type: string
    recommended_depth:
      type: string
ui:
  title: Pharma Portfolio Triage
  subtitle: Routes a pharmaceutical company to a portfolio tier based on pipeline size. Determines analysis depth for competitive intelligence workflows.
  icon: circle
  route: /vigilance/mg/pharma-portfolio-triage
  steps:
    - field: company_key
      label: company key
      help: Enter company_key
      widget: text
      placeholder: null
    - field: portfolio_size
      label: portfolio size
      help: Enter portfolio_size
      widget: text
      placeholder: null
  result:
    template: "portfolio_tier: {{portfolio_tier}} — recommended_depth: {{recommended_depth}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pharma-portfolio-triage
  cli: rsk mcg run pharma-portfolio-triage
  auth: none
  rate_limit: 600/min
tree:
  start: check_large
  nodes:
    check_large:
      type: condition
      variable: portfolio_size
      operator: gte
      value: 50
      true_next: return_large
      false_next: check_mid
    check_mid:
      type: condition
      variable: portfolio_size
      operator: gte
      value: 20
      true_next: return_mid
      false_next: return_niche
    return_large:
      type: return
      value:
        portfolio_tier: large_portfolio
        recommended_depth: deep
    return_mid:
      type: return
      value:
        portfolio_tier: mid_portfolio
        recommended_depth: standard
    return_niche:
      type: return
      value:
        portfolio_tier: niche_portfolio
        recommended_depth: focused
tests:
  - name: Large pharma — exactly 50 products
    input:
      company_key: pfizer
      portfolio_size: 50
    expect:
      portfolio_tier: large_portfolio
      recommended_depth: deep
  - name: Large pharma — well above threshold
    input:
      company_key: roche
      portfolio_size: 120
    expect:
      portfolio_tier: large_portfolio
      recommended_depth: deep
  - name: Mid portfolio — exactly 20 products
    input:
      company_key: biomarin
      portfolio_size: 20
    expect:
      portfolio_tier: mid_portfolio
      recommended_depth: standard
  - name: Mid portfolio — mid-range
    input:
      company_key: jazz-pharma
      portfolio_size: 35
    expect:
      portfolio_tier: mid_portfolio
      recommended_depth: standard
  - name: Niche portfolio — below 20 products
    input:
      company_key: ultragenyx
      portfolio_size: 8
    expect:
      portfolio_tier: niche_portfolio
      recommended_depth: focused
  - name: Niche portfolio — boundary below 20
    input:
      company_key: agios
      portfolio_size: 19
    expect:
      portfolio_tier: niche_portfolio
      recommended_depth: focused
  - name: Null input safety
    input: {}
    expect:
      portfolio_tier: niche_portfolio
      recommended_depth: focused
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - portfolio_tier
    - recommended_depth
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
