# MICROGRAM++ (upgraded 2026-04-23)
name: drug-class-fluoroquinolone-safety
version: 0.1.0
description: Fluoroquinolone safety assessment. Evaluates tendinopathy, QT prolongation, neuropathy, and myasthenia risk.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Class Fluoroquinolone Safety
  subtitle: Fluoroquinolone safety assessment. Evaluates tendinopathy, QT prolongation, neuropathy, and myasthenia risk.
  icon: circle
  route: /vigilance/mg/drug-class-fluoroquinolone-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-class-fluoroquinolone-safety
  cli: rsk mcg run drug-class-fluoroquinolone-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_myasthenia
  nodes:
    check_myasthenia:
      type: condition
      variable: has_myasthenia_gravis
      operator: eq
      value: true
      true_next: myasthenia_alert
      false_next: check_qpointer_prolongation
    myasthenia_alert:
      type: return
      value:
        risk_level: critical
        contraindication: true
        message: Myasthenia gravis; fluoroquinolone contraindicated due to exacerbation risk
    check_qpointer_prolongation:
      type: condition
      variable: baseline_qt_ms
      operator: gte
      value: 450
      true_next: qt_risk
      false_next: check_age
    qt_risk:
      type: return
      value:
        risk_level: moderate
        qt_monitoring: required
        message: Prolonged baseline QT; monitor for further prolongation
    check_age:
      type: condition
      variable: age_years
      operator: gte
      value: 60
      true_next: elderly_tendon_risk
      false_next: standard_dosing
    elderly_tendon_risk:
      type: return
      value:
        risk_level: moderate
        tendon_monitoring: required
        message: Elderly patient; increased tendon rupture risk; avoid in tendon disease
    standard_dosing:
      type: return
      value:
        risk_level: low
        message: Standard fluoroquinolone dosing appropriate
tests:
  - input:
      has_myasthenia_gravis: true
      baseline_qt_ms: 400
      age_years: 50
    expect:
      risk_level: critical
      contraindication: true
  - input:
      has_myasthenia_gravis: false
      baseline_qt_ms: 460
      age_years: 50
    expect:
      risk_level: moderate
      qt_monitoring: required
  - input:
      has_myasthenia_gravis: false
      baseline_qt_ms: 400
      age_years: 65
    expect:
      risk_level: moderate
      tendon_monitoring: required
  - input:
      has_myasthenia_gravis: false
      baseline_qt_ms: 400
      age_years: 45
    expect:
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
