# MICROGRAM++ (upgraded 2026-04-23)
name: sota-authority-decompose
version: 0.1.0
description: "SOTA Tracker: decomposes threshold authority into its T2-C primitives — consensus, credential, evidence, institutional power — and scores defensibility"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: consensus_level
    type: int
    required: true
    description: "Breadth of agreement: 1=single author, 2=research group, 3=professional society, 4=multi-society, 5=international harmonization (ICH/WHO)"
  - name: credential_strength
    type: int
    required: true
    description: "Credentialing depth: 1=self-declared, 2=peer-recognized, 3=board-certified, 4=regulatory-designated, 5=statutory mandate"
  - name: evidence_basis
    type: int
    required: true
    description: "Evidence grounding: 1=assertion only, 2=case-based, 3=empirical study, 4=validated framework, 5=replicated multi-site"
  - name: institutional_backing
    type: int
    required: true
    description: "Institutional power: 1=individual, 2=academic dept, 3=professional body, 4=national regulator, 5=supranational (WHO/ICH/EMA)"
outputs:
  - name: authority_class
    type: string
  - name: defensibility
    type: string
  - name: vulnerability
    type: string
  - name: authority_score
    type: int
  - name: recommendation
    type: string
interface:
  inputs:
    consensus_level:
      type: int
      required: true
      description: "Breadth of agreement: 1=single author, 2=research group, 3=professional society, 4=multi-society, 5=international harmonization (ICH/WHO)"
    credential_strength:
      type: int
      required: true
      description: "Credentialing depth: 1=self-declared, 2=peer-recognized, 3=board-certified, 4=regulatory-designated, 5=statutory mandate"
    evidence_basis:
      type: int
      required: true
      description: "Evidence grounding: 1=assertion only, 2=case-based, 3=empirical study, 4=validated framework, 5=replicated multi-site"
    institutional_backing:
      type: int
      required: true
      description: "Institutional power: 1=individual, 2=academic dept, 3=professional body, 4=national regulator, 5=supranational (WHO/ICH/EMA)"
  outputs:
    authority_class:
      type: string
    defensibility:
      type: string
    vulnerability:
      type: string
    authority_score:
      type: int
    recommendation:
      type: string
ui:
  title: Sota Authority Decompose
  subtitle: "SOTA Tracker: decomposes threshold authority into its T2-C primitives — consensus, credential, evidence, institutional power — and scores defensibility"
  icon: circle
  route: /vigilance/mg/sota-authority-decompose
  steps:
    - field: consensus_level
      label: consensus level
      help: "Breadth of agreement: 1=single author, 2=research group, 3=professional society, 4=multi-society, 5=international harmonization (ICH/WHO)"
      widget: text
      placeholder: null
    - field: credential_strength
      label: credential strength
      help: "Credentialing depth: 1=self-declared, 2=peer-recognized, 3=board-certified, 4=regulatory-designated, 5=statutory mandate"
      widget: text
      placeholder: null
    - field: evidence_basis
      label: evidence basis
      help: "Evidence grounding: 1=assertion only, 2=case-based, 3=empirical study, 4=validated framework, 5=replicated multi-site"
      widget: text
      placeholder: null
    - field: institutional_backing
      label: institutional backing
      help: "Institutional power: 1=individual, 2=academic dept, 3=professional body, 4=national regulator, 5=supranational (WHO/ICH/EMA)"
      widget: text
      placeholder: null
  result:
    template: "authority_class: {{authority_class}} — defensibility: {{defensibility}} — vulnerability: {{vulnerability}} — authority_score: {{authority_score}} — recommendation: {{recommendation}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/sota-authority-decompose
  cli: rsk mcg run sota-authority-decompose
  auth: none
  rate_limit: 600/min
tree:
  start: check_evidence_basis
  nodes:
    check_evidence_basis:
      type: condition
      variable: evidence_basis
      operator: gte
      value: 3
      true_next: check_consensus
      false_next: check_assertion_only
    check_assertion_only:
      type: condition
      variable: evidence_basis
      operator: lte
      value: 1
      true_next: naked_assertion
      false_next: weak_evidence
    check_consensus:
      type: condition
      variable: consensus_level
      operator: gte
      value: 4
      true_next: check_sovereign
      false_next: check_local_consensus
    check_local_consensus:
      type: condition
      variable: consensus_level
      operator: gte
      value: 2
      true_next: check_credential_mid
      false_next: lone_authority
    check_sovereign:
      type: condition
      variable: institutional_backing
      operator: gte
      value: 4
      true_next: check_sovereign_credential
      false_next: check_established
    check_sovereign_credential:
      type: condition
      variable: credential_strength
      operator: gte
      value: 4
      true_next: sovereign_authority
      false_next: check_established
    check_established:
      type: condition
      variable: credential_strength
      operator: gte
      value: 3
      true_next: established_authority
      false_next: emerging_authority
    check_credential_mid:
      type: condition
      variable: credential_strength
      operator: gte
      value: 3
      true_next: established_authority
      false_next: check_credential_low
    check_credential_low:
      type: condition
      variable: credential_strength
      operator: gte
      value: 2
      true_next: emerging_authority
      false_next: contested_authority
    sovereign_authority:
      type: return
      value:
        authority_class: SOVEREIGN
        defensibility: MAXIMUM
        vulnerability: Slow to update — consensus cycles of 5-10 years can lag behind frontier movement
        authority_score: 95
        recommendation: Accepted as definitive. Challenge only with evidence_basis >= 4 AND consensus_level >= 4.
    established_authority:
      type: return
      value:
        authority_class: ESTABLISHED
        defensibility: HIGH
        vulnerability: Regional bias — may reflect one regulatory tradition over another. Check cross-jurisdictional alignment.
        authority_score: 75
        recommendation: Strong but verify cross-jurisdictional. Accepted for single-market decisions.
    emerging_authority:
      type: return
      value:
        authority_class: EMERGING
        defensibility: MODERATE
        vulnerability: Credential-evidence gap — authority may exceed evidence base. Verify evidence_basis independently.
        authority_score: 50
        recommendation: Provisional. Monitor for consensus convergence. Do not use as sole basis for standard-setting.
    contested_authority:
      type: return
      value:
        authority_class: CONTESTED
        defensibility: LOW
        vulnerability: "Consensus deficit — local agreement without broad validation. Takeda-pattern risk: authority asserted without defensible criteria."
        authority_score: 25
        recommendation: Do not accept as threshold authority. Require evidence_basis >= 3 AND consensus_level >= 3 before recognition.
    lone_authority:
      type: return
      value:
        authority_class: LONE
        defensibility: MINIMAL
        vulnerability: Single-source authority — no consensus check, no peer validation. Maximum Takeda risk.
        authority_score: 10
        recommendation: Reject as threshold authority. Individual expertise informs but cannot define frontier.
    weak_evidence:
      type: return
      value:
        authority_class: UNGROUNDED
        defensibility: NONE
        vulnerability: Case-based only — insufficient evidence to establish authority claim. Anecdote is not frontier.
        authority_score: 5
        recommendation: Reject. Authority claims require minimum observational evidence (level 3).
    naked_assertion:
      type: return
      value:
        authority_class: ASSERTION
        defensibility: NONE
        vulnerability: Pure assertion — no evidence, no consensus, no institutional backing. The definition of indefensible authority.
        authority_score: 0
        recommendation: Reject immediately. This is opinion presented as standard. Flag as Takeda-pattern violation.
tests:
  - input:
      consensus_level: 5
      credential_strength: 5
      evidence_basis: 5
      institutional_backing: 5
    expect:
      authority_class: SOVEREIGN
      authority_score: 95
  - input:
      consensus_level: 3
      credential_strength: 4
      evidence_basis: 4
      institutional_backing: 4
    expect:
      authority_class: ESTABLISHED
      authority_score: 75
  - input:
      consensus_level: 4
      credential_strength: 3
      evidence_basis: 4
      institutional_backing: 3
    expect:
      authority_class: ESTABLISHED
      authority_score: 75
  - input:
      consensus_level: 2
      credential_strength: 2
      evidence_basis: 4
      institutional_backing: 2
    expect:
      authority_class: EMERGING
      authority_score: 50
  - input:
      consensus_level: 2
      credential_strength: 1
      evidence_basis: 3
      institutional_backing: 2
    expect:
      authority_class: CONTESTED
      authority_score: 25
  - input:
      consensus_level: 1
      credential_strength: 3
      evidence_basis: 4
      institutional_backing: 1
    expect:
      authority_class: LONE
      authority_score: 10
  - input:
      consensus_level: 1
      credential_strength: 1
      evidence_basis: 1
      institutional_backing: 1
    expect:
      authority_class: ASSERTION
      authority_score: 0
  - input:
      consensus_level: 3
      credential_strength: 3
      evidence_basis: 2
      institutional_backing: 3
    expect:
      authority_class: UNGROUNDED
      authority_score: 5
  - input: {}
    expect:
      authority_class: UNGROUNDED
      authority_score: 5
  - input:
      consensus_level: 5
      credential_strength: 5
      evidence_basis: 1
      institutional_backing: 5
    expect:
      authority_class: ASSERTION
      authority_score: 0
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - authority_class
    - defensibility
    - vulnerability
    - authority_score
    - recommendation
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
