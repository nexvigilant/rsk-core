# MICROGRAM++ (upgraded 2026-04-23)
name: risk-to-regulatory
version: 1.0.0
description: "Router: routes risk management decisions to the appropriate regulatory submission action based on market action, benefit-risk verdict, and labeling needs"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: benefit_risk_decision
    type: string
    required: false
    description: ""
  - name: labeling_update_needed
    type: bool
    required: false
    description: ""
  - name: market_action
    type: string
    required: false
    description: ""
  - name: rems_required
    type: bool
    required: false
    description: ""
outputs:
  - name: next_mg
    type: string
  - name: regulatory_filing
    type: string
  - name: route
    type: string
  - name: submission_type
    type: string
  - name: timeline
    type: string
interface:
  inputs:
    benefit_risk_decision:
      type: string
      required: false
    labeling_update_needed:
      type: bool
      required: false
    market_action:
      type: string
      required: false
    rems_required:
      type: bool
      required: false
  outputs:
    next_mg:
      type: string
    regulatory_filing:
      type: string
    route:
      type: string
    submission_type:
      type: string
    timeline:
      type: string
ui:
  title: Risk To Regulatory
  subtitle: "Router: routes risk management decisions to the appropriate regulatory submission action based on market action, benefit-risk verdict, and labeling needs"
  icon: circle
  route: /vigilance/mg/risk-to-regulatory
  steps:
    - field: benefit_risk_decision
      label: benefit risk decision
      help: Enter benefit_risk_decision
      widget: text
      placeholder: null
    - field: labeling_update_needed
      label: labeling update needed
      help: Enter labeling_update_needed
      widget: toggle
      placeholder: null
    - field: market_action
      label: market action
      help: Enter market_action
      widget: text
      placeholder: null
    - field: rems_required
      label: rems required
      help: Enter rems_required
      widget: toggle
      placeholder: null
  result:
    template: "next_mg: {{next_mg}} — regulatory_filing: {{regulatory_filing}} — route: {{route}} — submission_type: {{submission_type}} — timeline: {{timeline}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/risk-to-regulatory
  cli: rsk mcg run risk-to-regulatory
  auth: none
  rate_limit: 600/min
tree:
  start: check_withdrawal
  nodes:
    check_withdrawal:
      type: condition
      variable: market_action
      operator: eq
      value: withdrawal
      true_next: market_withdrawal
      false_next: check_restriction
    market_withdrawal:
      type: return
      value:
        route: MARKET_WITHDRAWAL
        regulatory_filing: FDA_Form_3580
        timeline: immediate
        next_mg: expedited-reporting
        submission_type: withdrawal
    check_restriction:
      type: condition
      variable: market_action
      operator: eq
      value: restriction
      true_next: market_restriction
      false_next: check_negative_br
    market_restriction:
      type: return
      value:
        route: MARKET_RESTRICTION
        regulatory_filing: sNDA_safety
        timeline: 30_days
        next_mg: rems-classifier
        submission_type: safety_supplement
    check_negative_br:
      type: condition
      variable: benefit_risk_decision
      operator: eq
      value: NEGATIVE
      true_next: safety_review
      false_next: check_rems
    safety_review:
      type: return
      value:
        route: SAFETY_REVIEW
        regulatory_filing: Type_II_Variation
        timeline: urgent
        next_mg: expedited-reporting
        submission_type: variation
    check_rems:
      type: condition
      variable: rems_required
      operator: eq
      value: true
      true_next: rems_submission
      false_next: check_labeling
    rems_submission:
      type: return
      value:
        route: REMS_SUBMISSION
        regulatory_filing: REMS_modification
        timeline: 60_days
        next_mg: rems-classifier
        submission_type: rems
    check_labeling:
      type: condition
      variable: labeling_update_needed
      operator: eq
      value: true
      true_next: labeling_update
      false_next: check_conditional_br
    labeling_update:
      type: return
      value:
        route: LABELING_UPDATE
        regulatory_filing: CBE_supplement
        timeline: 90_days
        next_mg: cioms-frequency
        submission_type: labeling
    check_conditional_br:
      type: condition
      variable: benefit_risk_decision
      operator: eq
      value: CONDITIONAL
      true_next: rmp_update
      false_next: no_regulatory_action
    rmp_update:
      type: return
      value:
        route: RMP_UPDATE
        regulatory_filing: RMP_variation
        timeline: 120_days
        next_mg: benefit-risk-gate
        submission_type: rmp
    no_regulatory_action:
      type: return
      value:
        route: NO_REGULATORY_ACTION
        regulatory_filing: none
        timeline: periodic
        next_mg: report-deadline
        submission_type: none
tests:
  - name: withdrawal triggers immediate market withdrawal filing
    input:
      benefit_risk_decision: NEGATIVE
      rems_required: false
      labeling_update_needed: false
      market_action: withdrawal
    expect:
      route: MARKET_WITHDRAWAL
      regulatory_filing: FDA_Form_3580
      timeline: immediate
      next_mg: expedited-reporting
      submission_type: withdrawal
  - name: restriction triggers sNDA safety supplement in 30 days
    input:
      benefit_risk_decision: ACCEPTABLE
      rems_required: false
      labeling_update_needed: false
      market_action: restriction
    expect:
      route: MARKET_RESTRICTION
      regulatory_filing: sNDA_safety
      timeline: 30_days
      next_mg: rems-classifier
      submission_type: safety_supplement
  - name: negative benefit-risk decision triggers safety review
    input:
      benefit_risk_decision: NEGATIVE
      rems_required: false
      labeling_update_needed: false
      market_action: none
    expect:
      route: SAFETY_REVIEW
      regulatory_filing: Type_II_Variation
      timeline: urgent
      next_mg: expedited-reporting
      submission_type: variation
  - name: rems required triggers REMS modification filing
    input:
      benefit_risk_decision: CONDITIONAL
      rems_required: true
      labeling_update_needed: false
      market_action: none
    expect:
      route: REMS_SUBMISSION
      regulatory_filing: REMS_modification
      timeline: 60_days
      next_mg: rems-classifier
      submission_type: rems
  - name: labeling update needed triggers CBE supplement
    input:
      benefit_risk_decision: FAVORABLE
      rems_required: false
      labeling_update_needed: true
      market_action: none
    expect:
      route: LABELING_UPDATE
      regulatory_filing: CBE_supplement
      timeline: 90_days
      next_mg: cioms-frequency
      submission_type: labeling
  - name: conditional benefit-risk triggers RMP variation
    input:
      benefit_risk_decision: CONDITIONAL
      rems_required: false
      labeling_update_needed: false
      market_action: none
    expect:
      route: RMP_UPDATE
      regulatory_filing: RMP_variation
      timeline: 120_days
      next_mg: benefit-risk-gate
      submission_type: rmp
  - name: favorable decision with no flags yields no regulatory action
    input:
      benefit_risk_decision: FAVORABLE
      rems_required: false
      labeling_update_needed: false
      market_action: none
    expect:
      route: NO_REGULATORY_ACTION
      regulatory_filing: none
      timeline: periodic
      next_mg: report-deadline
      submission_type: none
  - name: acceptable decision with no flags yields no regulatory action
    input:
      benefit_risk_decision: ACCEPTABLE
      rems_required: false
      labeling_update_needed: false
      market_action: none
    expect:
      route: NO_REGULATORY_ACTION
      regulatory_filing: none
      timeline: periodic
      next_mg: report-deadline
      submission_type: none
  - name: withdrawal takes priority over negative benefit-risk
    input:
      benefit_risk_decision: NEGATIVE
      rems_required: true
      labeling_update_needed: true
      market_action: withdrawal
    expect:
      route: MARKET_WITHDRAWAL
      regulatory_filing: FDA_Form_3580
      timeline: immediate
      next_mg: expedited-reporting
      submission_type: withdrawal
  - name: restriction takes priority over REMS requirement
    input:
      benefit_risk_decision: CONDITIONAL
      rems_required: true
      labeling_update_needed: false
      market_action: restriction
    expect:
      route: MARKET_RESTRICTION
      regulatory_filing: sNDA_safety
      timeline: 30_days
      next_mg: rems-classifier
      submission_type: safety_supplement
  - name: REMS takes priority over labeling update
    input:
      benefit_risk_decision: FAVORABLE
      rems_required: true
      labeling_update_needed: true
      market_action: none
    expect:
      route: REMS_SUBMISSION
      regulatory_filing: REMS_modification
      timeline: 60_days
      next_mg: rems-classifier
      submission_type: rems
  - name: empty input defaults to no regulatory action
    input: {}
    expect:
      route: NO_REGULATORY_ACTION
      regulatory_filing: none
      timeline: periodic
      next_mg: report-deadline
      submission_type: none
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - next_mg
    - regulatory_filing
    - route
    - submission_type
    - timeline
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
