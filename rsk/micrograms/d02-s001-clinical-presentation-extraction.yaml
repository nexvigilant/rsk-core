# MICROGRAM++ (upgraded 2026-04-23)
name: d02-s001-clinical-presentation-extraction
version: 0.1.0
description: "Extract key ADR features from clinical description: onset, severity, organ system, dose relationship"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: D02 S001 Clinical Presentation Extraction
  subtitle: "Extract key ADR features from clinical description: onset, severity, organ system, dose relationship"
  icon: circle
  route: /vigilance/mg/d02-s001-clinical-presentation-extraction
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/d02-s001-clinical-presentation-extraction
  cli: rsk mcg run d02-s001-clinical-presentation-extraction
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    no:
      type: return
      value:
        extraction_incomplete: false
    yes:
      type: return
      value:
        extraction_complete: true
    check:
      type: condition
      variable: features_extracted
      operator: gte
      value: 1
      true_next: yes
      false_next: no
tests:
  - input:
      features_extracted: 1
    expect:
      extraction_complete: true
  - input:
      features_extracted: 2
    expect:
      extraction_complete: true
  - input:
      features_extracted: 0
    expect:
      extraction_incomplete: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
