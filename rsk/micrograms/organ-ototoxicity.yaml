# MICROGRAM++ (upgraded 2026-04-23)
name: organ-ototoxicity
version: 0.1.0
description: Ototoxicity safety assessment. Evaluates hearing loss and vestibular dysfunction risks from ototoxic drugs.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Organ Ototoxicity
  subtitle: Ototoxicity safety assessment. Evaluates hearing loss and vestibular dysfunction risks from ototoxic drugs.
  icon: circle
  route: /vigilance/mg/organ-ototoxicity
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/organ-ototoxicity
  cli: rsk mcg run organ-ototoxicity
  auth: none
  rate_limit: 600/min
tree:
  start: check_baseline_hearing
  nodes:
    check_baseline_hearing:
      type: condition
      variable: baseline_hearing_loss
      operator: eq
      value: true
      true_next: hearing_loss_alert
      false_next: check_renal
    hearing_loss_alert:
      type: return
      value:
        organ: ear
        risk_level: high
        ototoxicity_risk: true
        monitoring: required
        message: Baseline hearing loss; ototoxic drugs contraindicated or require monitoring
    check_renal:
      type: condition
      variable: renal_clearance_ml_min
      operator: lt
      value: 30
      true_next: renal_ototoxicity_risk
      false_next: check_concurrent_ototoxics
    renal_ototoxicity_risk:
      type: return
      value:
        organ: ear
        risk_level: moderate
        ototoxicity_accumulation: true
        monitoring: required
        message: Severe renal impairment increases ototoxic drug accumulation
    check_concurrent_ototoxics:
      type: condition
      variable: concurrent_ototoxic_drugs
      operator: eq
      value: true
      true_next: concurrent_ototoxic_alert
      false_next: standard_dosing
    concurrent_ototoxic_alert:
      type: return
      value:
        organ: ear
        risk_level: high
        synergistic_risk: true
        message: Concurrent ototoxic drugs; synergistic hearing loss risk
    standard_dosing:
      type: return
      value:
        organ: ear
        risk_level: low
        baseline_audiometry: recommended
tests:
  - input:
      baseline_hearing_loss: true
      renal_clearance_ml_min: 70
      concurrent_ototoxic_drugs: false
    expect:
      organ: ear
      risk_level: high
      ototoxicity_risk: true
  - input:
      baseline_hearing_loss: false
      renal_clearance_ml_min: 20
      concurrent_ototoxic_drugs: false
    expect:
      organ: ear
      risk_level: moderate
      ototoxicity_accumulation: true
  - input:
      baseline_hearing_loss: false
      renal_clearance_ml_min: 70
      concurrent_ototoxic_drugs: true
    expect:
      organ: ear
      risk_level: high
      synergistic_risk: true
  - input:
      baseline_hearing_loss: false
      renal_clearance_ml_min: 70
      concurrent_ototoxic_drugs: false
    expect:
      organ: ear
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
