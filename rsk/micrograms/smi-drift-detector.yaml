  - input:
      drift_sigma: 3.5
      drift_direction: stable
      measurement_count: 29
    expect:
      alert_level: ALERT
      sigma_band: ≥3.0σ (downgraded from CRITICAL — baseline n<30)
      action: Confirm with larger baseline — drift exceeds 3σ but insufficient measurement history
      algorithm: "ALG-2025-029: drift ≥ 3.0σ, n<30 → ALERT (downgraded)"
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - alert_level
    - sigma_band
    - action
    - algorithm
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
