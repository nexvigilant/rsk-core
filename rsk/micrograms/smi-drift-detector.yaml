      alert_level: CRITICAL
      sigma_band: ≥3.0σ (0.3% false positive rate)
      action: "Immediate investigation required — extreme drift from baseline (improving: signal decreasing)"
      algorithm: "ALG-2025-029: drift ≥ 3.0σ, direction decreasing → CRITICAL improving"
  - input:
      drift_sigma: 2.3
