# MICROGRAM++ (upgraded 2026-04-23)
name: multi-signal-ranker
version: 0.1.0
description: "Rank 4 PV signal measures (PRR, ROR, IC, EBGM) against each other using cross-variable comparison. Determines which method gives strongest evidence, how many agree on signal detection, and overall concordance. Uses threshold: PRR>=2, ROR>=2, IC>=0.5, EBGM>=2."
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: prr
    type: float
    required: false
    description: Proportional Reporting Ratio
  - name: ror
    type: float
    required: false
    description: Reporting Odds Ratio
  - name: ic
    type: float
    required: false
    description: Information Component (IC025)
  - name: ebgm
    type: float
    required: false
    description: Empirical Bayes Geometric Mean
outputs:
  - name: strongest_method
    type: string
  - name: signals_detected
    type: int
  - name: concordance
    type: string
  - name: ranking
    type: string
interface:
  inputs:
    prr:
      type: float
      required: false
      description: Proportional Reporting Ratio
    ror:
      type: float
      required: false
      description: Reporting Odds Ratio
    ic:
      type: float
      required: false
      description: Information Component (IC025)
    ebgm:
      type: float
      required: false
      description: Empirical Bayes Geometric Mean
  outputs:
    strongest_method:
      type: string
      description: "Which signal method is strongest: PRR, ROR, IC, EBGM, or NONE"
    signals_detected:
      type: int
      description: Count of methods detecting a signal (0-4)
    concordance:
      type: string
      description: ALL_AGREE, MAJORITY, MIXED, NONE_DETECTED
    ranking:
      type: string
      description: Ordered ranking of signal strength
ui:
  title: Multi Signal Ranker
  subtitle: "Rank 4 PV signal measures (PRR, ROR, IC, EBGM) against each other using cross-variable comparison. Determines which method gives strongest evidence, how many agree on signal detection, and overall concordance. Uses threshold: PRR>=2, ROR>=2, IC>=0.5, EBGM>=2."
  icon: activity
  route: /vigilance/mg/multi-signal-ranker
  steps:
    - field: prr
      label: prr
      help: Proportional Reporting Ratio
      widget: text
      placeholder: null
    - field: ror
      label: ror
      help: Reporting Odds Ratio
      widget: text
      placeholder: null
    - field: ic
      label: ic
      help: Information Component (IC025)
      widget: text
      placeholder: null
    - field: ebgm
      label: ebgm
      help: Empirical Bayes Geometric Mean
      widget: text
      placeholder: null
  result:
    template: "strongest_method: {{strongest_method}} — signals_detected: {{signals_detected}} — concordance: {{concordance}} — ranking: {{ranking}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/multi-signal-ranker
  cli: rsk mcg run multi-signal-ranker
  auth: none
  rate_limit: 600/min
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: prr_detected_check_ror
      false_next: prr_absent_check_ror
    prr_detected_check_ror:
      type: condition
      variable: ror
      operator: gte
      value: 2
      true_next: prr_ror_detected_check_ic
      false_next: prr_only_check_ic
    prr_absent_check_ror:
      type: condition
      variable: ror
      operator: gte
      value: 2
      true_next: ror_only_check_ic
      false_next: none_so_far_check_ic
    prr_ror_detected_check_ic:
      type: condition
      variable: ic
      operator: gte
      value: 0.5
      true_next: three_check_ebgm_prr_ror_ic
      false_next: two_check_ebgm_prr_ror
    prr_only_check_ic:
      type: condition
      variable: ic
      operator: gte
      value: 0.5
      true_next: two_check_ebgm_prr_ic
      false_next: one_check_ebgm_prr
    ror_only_check_ic:
      type: condition
      variable: ic
      operator: gte
      value: 0.5
      true_next: two_check_ebgm_ror_ic
      false_next: one_check_ebgm_ror
    none_so_far_check_ic:
      type: condition
      variable: ic
      operator: gte
      value: 0.5
      true_next: one_check_ebgm_ic
      false_next: zero_check_ebgm
    three_check_ebgm_prr_ror_ic:
      type: condition
      variable: ebgm
      operator: gte
      value: 2
      true_next: all_four_detected
      false_next: three_detected
    two_check_ebgm_prr_ror:
      type: condition
      variable: ebgm
      operator: gte
      value: 2
      true_next: three_detected
      false_next: two_detected_prr_ror
    two_check_ebgm_prr_ic:
      type: condition
      variable: ebgm
      operator: gte
      value: 2
      true_next: three_detected
      false_next: two_detected_mixed
    two_check_ebgm_ror_ic:
      type: condition
      variable: ebgm
      operator: gte
      value: 2
      true_next: three_detected
      false_next: two_detected_mixed
    one_check_ebgm_prr:
      type: condition
      variable: ebgm
      operator: gte
      value: 2
      true_next: two_detected_mixed
      false_next: one_detected
    one_check_ebgm_ror:
      type: condition
      variable: ebgm
      operator: gte
      value: 2
      true_next: two_detected_mixed
      false_next: one_detected
    one_check_ebgm_ic:
      type: condition
      variable: ebgm
      operator: gte
      value: 2
      true_next: two_detected_mixed
      false_next: one_detected
    zero_check_ebgm:
      type: condition
      variable: ebgm
      operator: gte
      value: 2
      true_next: one_detected
      false_next: none_detected
    all_four_detected:
      type: return
      value:
        signals_detected: 4
        concordance: ALL_AGREE
        strongest_method: MULTIPLE
        ranking: All four methods detect signal — unanimous agreement
    three_detected:
      type: return
      value:
        signals_detected: 3
        concordance: MAJORITY
        strongest_method: MULTIPLE
        ranking: Three of four methods detect signal — strong majority agreement
    two_detected_prr_ror:
      type: return
      value:
        signals_detected: 2
        concordance: MIXED
        strongest_method: PRR_ROR
        ranking: PRR and ROR agree, IC and EBGM do not — frequency-based methods aligned
    two_detected_mixed:
      type: return
      value:
        signals_detected: 2
        concordance: MIXED
        strongest_method: MIXED
        ranking: Two of four methods detect signal — partial agreement
    one_detected:
      type: return
      value:
        signals_detected: 1
        concordance: MIXED
        strongest_method: ISOLATED
        ranking: Only one method detects signal — isolated finding, investigate further
    none_detected:
      type: return
      value:
        signals_detected: 0
        concordance: NONE_DETECTED
        strongest_method: NONE
        ranking: No method detects signal — below all thresholds
tests:
  - input:
      prr: 5
      ror: 4
      ic: 1.2
      ebgm: 3.5
    expect:
      signals_detected: 4
      concordance: ALL_AGREE
  - input:
      prr: 3
      ror: 2.5
      ic: 0.8
      ebgm: 1.5
    expect:
      signals_detected: 3
      concordance: MAJORITY
  - input:
      prr: 4
      ror: 3
      ic: 0.2
      ebgm: 1
    expect:
      signals_detected: 2
      concordance: MIXED
  - input:
      prr: 3
      ror: 1.5
      ic: 0.3
      ebgm: 1
    expect:
      signals_detected: 1
      concordance: MIXED
  - input:
      prr: 1
      ror: 1.2
      ic: 0.1
      ebgm: 0.8
    expect:
      signals_detected: 0
      concordance: NONE_DETECTED
  - input:
      prr: 2
      ror: 2
      ic: 0.5
      ebgm: 2
    expect:
      signals_detected: 4
      concordance: ALL_AGREE
  - input:
      prr: 1.5
      ror: 3
      ic: 0.3
      ebgm: 1
    expect:
      signals_detected: 1
      concordance: MIXED
  - input:
      prr: 1
      ror: 1.5
      ic: 0.8
      ebgm: 1
    expect:
      signals_detected: 1
      concordance: MIXED
  - input:
      prr: 2.5
      ror: 1.5
      ic: 0.7
      ebgm: 1
    expect:
      signals_detected: 2
      concordance: MIXED
  - input:
      prr: 1.5
      ror: 2.5
      ic: 0.6
      ebgm: 1
    expect:
      signals_detected: 2
      concordance: MIXED
  - input:
      prr: 1.5
      ror: 2.5
      ic: 0.3
      ebgm: 2.5
    expect:
      signals_detected: 2
      concordance: MIXED
  - input:
      prr: 1
      ror: 1
      ic: 0.8
      ebgm: 2.5
    expect:
      signals_detected: 2
      concordance: MIXED
  - input: {}
    expect:
      signals_detected: 0
      concordance: NONE_DETECTED
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - strongest_method
    - signals_detected
    - concordance
    - ranking
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
