name: ich-q3a-gate
description: "ICH Q3A compliance: Impurities — Drug Substance"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "impurity_qualified"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH Q3A"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH Q3A"
        compliant: false
        action: "remediate"
        gap: "impurity_qualified"

tests:
  - input: {"impurity_qualified": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
