# MICROGRAM++ (upgraded 2026-04-23)
name: crystalbook-4primitive
version: 0.1.0
description: "Crystalbook Conservation Law: check 4 primitives (Existence, Boundary, State, Nothing) for system health. Source: Crystalbook v2.0 by Matthew A. Campion, PharmD."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: existence_evidence
    type: string
    required: false
    description: ""
  - name: boundary_description
    type: string
    required: false
    description: ""
  - name: state_observation
    type: string
    required: false
    description: ""
  - name: void_identification
    type: string
    required: false
    description: ""
outputs:
  - name: existence_status
    type: string
  - name: boundary_status
    type: string
  - name: state_status
    type: string
  - name: void_status
    type: string
  - name: conservation_holds
    type: bool
  - name: degraded_count
    type: integer
  - name: diagnosis
    type: string
  - name: source
    type: string
interface:
  inputs:
    existence_evidence:
      type: string
      required: false
    boundary_description:
      type: string
      required: false
    state_observation:
      type: string
      required: false
    void_identification:
      type: string
      required: false
  outputs:
    existence_status:
      type: string
    boundary_status:
      type: string
    state_status:
      type: string
    void_status:
      type: string
    conservation_holds:
      type: bool
    degraded_count:
      type: integer
    diagnosis:
      type: string
    source:
      type: string
ui:
  title: Crystalbook 4primitive
  subtitle: "Crystalbook Conservation Law: check 4 primitives (Existence, Boundary, State, Nothing) for system health. Source: Crystalbook v2.0 by Matthew A. Campion, PharmD."
  icon: circle
  route: /vigilance/mg/crystalbook-4primitive
  steps:
    - field: existence_evidence
      label: existence evidence
      help: Enter existence_evidence
      widget: text
      placeholder: null
    - field: boundary_description
      label: boundary description
      help: Enter boundary_description
      widget: text
      placeholder: null
    - field: state_observation
      label: state observation
      help: Enter state_observation
      widget: text
      placeholder: null
    - field: void_identification
      label: void identification
      help: Enter void_identification
      widget: text
      placeholder: null
  result:
    template: "existence_status: {{existence_status}} — boundary_status: {{boundary_status}} — state_status: {{state_status}} — void_status: {{void_status}} — conservation_holds: {{conservation_holds}} — degraded_count: {{degraded_count}} — diagnosis: {{diagnosis}} — source: {{source}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/crystalbook-4primitive
  cli: rsk mcg run crystalbook-4primitive
  auth: none
  rate_limit: 600/min
tree:
  start: check_existence
  nodes:
    check_existence:
      type: condition
      variable: existence_evidence
      operator: is_not_null
      true_next: check_boundary
      false_next: existence_absent
    existence_absent:
      type: condition
      variable: boundary_description
      operator: is_not_null
      true_next: boundary_present_no_existence
      false_next: all_absent
    check_boundary:
      type: condition
      variable: boundary_description
      operator: is_not_null
      true_next: check_state
      false_next: boundary_absent
    check_state:
      type: condition
      variable: state_observation
      operator: is_not_null
      true_next: check_void
      false_next: state_absent
    check_void:
      type: condition
      variable: void_identification
      operator: is_not_null
      true_next: all_conserved
      false_next: void_unnamed
    all_conserved:
      type: return
      value:
        existence_status: PRESENT
        boundary_status: CLEAR
        state_status: OBSERVED
        void_status: NAMED
        conservation_holds: true
        degraded_count: 0
        diagnosis: CONSERVING
        source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
    void_unnamed:
      type: return
      value:
        existence_status: PRESENT
        boundary_status: CLEAR
        state_status: OBSERVED
        void_status: UNNAMED
        conservation_holds: false
        degraded_count: 1
        diagnosis: STRESSED
        source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
    state_absent:
      type: condition
      variable: void_identification
      operator: is_not_null
      true_next: state_absent_void_present
      false_next: state_and_void_absent
    state_absent_void_present:
      type: return
      value:
        existence_status: PRESENT
        boundary_status: CLEAR
        state_status: INFERRED
        void_status: NAMED
        conservation_holds: false
        degraded_count: 1
        diagnosis: STRESSED
        source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
    state_and_void_absent:
      type: return
      value:
        existence_status: PRESENT
        boundary_status: CLEAR
        state_status: INFERRED
        void_status: UNNAMED
        conservation_holds: false
        degraded_count: 2
        diagnosis: LOSING_COHERENCE
        source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
    boundary_absent:
      type: condition
      variable: state_observation
      operator: is_not_null
      true_next: boundary_absent_state_present
      false_next: boundary_and_state_absent
    boundary_absent_state_present:
      type: condition
      variable: void_identification
      operator: is_not_null
      true_next: boundary_absent_rest_present
      false_next: boundary_and_void_absent
    boundary_absent_rest_present:
      type: return
      value:
        existence_status: PRESENT
        boundary_status: AMBIGUOUS
        state_status: OBSERVED
        void_status: NAMED
        conservation_holds: false
        degraded_count: 1
        diagnosis: STRESSED
        source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
    boundary_and_void_absent:
      type: return
      value:
        existence_status: PRESENT
        boundary_status: AMBIGUOUS
        state_status: OBSERVED
        void_status: UNNAMED
        conservation_holds: false
        degraded_count: 2
        diagnosis: LOSING_COHERENCE
        source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
    boundary_and_state_absent:
      type: return
      value:
        existence_status: PRESENT
        boundary_status: AMBIGUOUS
        state_status: INFERRED
        void_status: UNNAMED
        conservation_holds: false
        degraded_count: 3
        diagnosis: LOSING_COHERENCE
        source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
    boundary_present_no_existence:
      type: return
      value:
        existence_status: ABSENT
        boundary_status: CLEAR
        state_status: INFERRED
        void_status: UNNAMED
        conservation_holds: false
        degraded_count: 3
        diagnosis: LOSING_COHERENCE
        source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
    all_absent:
      type: return
      value:
        existence_status: ABSENT
        boundary_status: DISSOLVED
        state_status: STALE
        void_status: IGNORED
        conservation_holds: false
        degraded_count: 4
        diagnosis: NON_EXISTENT
        source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
tests:
  - input:
      existence_evidence: Running process observed at pid 1234
      boundary_description: Scope limited to crystalbook plugin directory
      state_observation: All 8 laws loaded, diagnostic functional
      void_identification: No hooks wired, no MCP tools exposed
    expect:
      existence_status: PRESENT
      boundary_status: CLEAR
      state_status: OBSERVED
      void_status: NAMED
      conservation_holds: true
      degraded_count: 0
      diagnosis: CONSERVING
      source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
  - input:
      existence_evidence: Binary exists on disk
      boundary_description: Crate boundary defined in Cargo.toml
      state_observation: Compiles successfully
    expect:
      existence_status: PRESENT
      boundary_status: CLEAR
      state_status: OBSERVED
      void_status: UNNAMED
      conservation_holds: false
      degraded_count: 1
      diagnosis: STRESSED
      source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
  - input:
      existence_evidence: File exists
      boundary_description: Module boundary
    expect:
      existence_status: PRESENT
      boundary_status: CLEAR
      state_status: INFERRED
      void_status: UNNAMED
      conservation_holds: false
      degraded_count: 2
      diagnosis: LOSING_COHERENCE
      source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
  - input:
      existence_evidence: Something is there
    expect:
      existence_status: PRESENT
      boundary_status: AMBIGUOUS
      state_status: INFERRED
      void_status: UNNAMED
      conservation_holds: false
      degraded_count: 3
      diagnosis: LOSING_COHERENCE
      source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
  - input: {}
    expect:
      existence_status: ABSENT
      boundary_status: DISSOLVED
      state_status: STALE
      void_status: IGNORED
      conservation_holds: false
      degraded_count: 4
      diagnosis: NON_EXISTENT
      source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
  - input:
      boundary_description: A boundary with nothing inside it
    expect:
      existence_status: ABSENT
      boundary_status: CLEAR
      state_status: INFERRED
      void_status: UNNAMED
      conservation_holds: false
      degraded_count: 3
      diagnosis: LOSING_COHERENCE
      source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
  - input:
      existence_evidence: Process running
      state_observation: Healthy
      void_identification: Missing docs
    expect:
      existence_status: PRESENT
      boundary_status: AMBIGUOUS
      state_status: OBSERVED
      void_status: NAMED
      conservation_holds: false
      degraded_count: 1
      diagnosis: STRESSED
      source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
  - input:
      existence_evidence: Artifact on disk
      boundary_description: Defined scope
      void_identification: No tests
    expect:
      existence_status: PRESENT
      boundary_status: CLEAR
      state_status: INFERRED
      void_status: NAMED
      conservation_holds: false
      degraded_count: 1
      diagnosis: STRESSED
      source: "Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))"
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - existence_status
    - boundary_status
    - state_status
    - void_status
    - conservation_holds
    - degraded_count
    - diagnosis
    - source
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
