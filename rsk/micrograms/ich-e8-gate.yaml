name: ich-e8-gate
description: "ICH E8 compliance: General Study Design"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "design_adequate"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH E8"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH E8"
        compliant: false
        action: "remediate"
        gap: "design_adequate"

tests:
  - input: {"design_adequate": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
