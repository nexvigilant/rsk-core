name: ich-q2-gate
description: "ICH Q2 compliance: Analytical Validation"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "method_validated"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH Q2"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH Q2"
        compliant: false
        action: "remediate"
        gap: "method_validated"

tests:
  - input: {"method_validated": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
