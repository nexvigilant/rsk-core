# MICROGRAM++ (upgraded 2026-04-23)
name: fda-dili-hy-law
version: 0.1.0
description: "FDA drug-induced liver injury evaluation: Hy's Law and DILI severity classification per FDA Guidance 'Drug-Induced Liver Injury: Premarketing Clinical Evaluation' (2009)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: alt_elevation
    type: float
    required: true
    description: ALT elevation as multiple of ULN (e.g., 3.0 = 3x ULN)
  - name: bilirubin_elevation
    type: float
    required: true
    description: Total bilirubin elevation as multiple of ULN
  - name: alkaline_phosphatase_elevated
    type: bool
    required: false
    description: Whether ALP is elevated above 2x ULN (rules out cholestasis)
  - name: other_cause_excluded
    type: bool
    required: false
    description: Whether other causes of liver injury have been excluded
outputs:
  - name: dili_classification
    type: string
  - name: hy_law_case
    type: bool
  - name: action_required
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    alt_elevation:
      type: float
      required: true
      description: ALT elevation as multiple of ULN (e.g., 3.0 = 3x ULN)
    bilirubin_elevation:
      type: float
      required: true
      description: Total bilirubin elevation as multiple of ULN
    alkaline_phosphatase_elevated:
      type: bool
      required: false
      description: Whether ALP is elevated above 2x ULN (rules out cholestasis)
    other_cause_excluded:
      type: bool
      required: false
      description: Whether other causes of liver injury have been excluded
  outputs:
    dili_classification:
      type: string
    hy_law_case:
      type: bool
    action_required:
      type: string
    regulatory_reference:
      type: string
ui:
  title: Fda Dili Hy Law
  subtitle: "FDA drug-induced liver injury evaluation: Hy's Law and DILI severity classification per FDA Guidance 'Drug-Induced Liver Injury: Premarketing Clinical Evaluation' (2009)"
  icon: circle
  route: /vigilance/mg/fda-dili-hy-law
  steps:
    - field: alt_elevation
      label: alt elevation
      help: ALT elevation as multiple of ULN (e.g., 3.0 = 3x ULN)
      widget: text
      placeholder: null
    - field: bilirubin_elevation
      label: bilirubin elevation
      help: Total bilirubin elevation as multiple of ULN
      widget: text
      placeholder: null
    - field: alkaline_phosphatase_elevated
      label: alkaline phosphatase elevated
      help: Whether ALP is elevated above 2x ULN (rules out cholestasis)
      widget: toggle
      placeholder: null
    - field: other_cause_excluded
      label: other cause excluded
      help: Whether other causes of liver injury have been excluded
      widget: toggle
      placeholder: null
  result:
    template: "dili_classification: {{dili_classification}} — hy_law_case: {{hy_law_case}} — action_required: {{action_required}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/fda-dili-hy-law
  cli: rsk mcg run fda-dili-hy-law
  auth: none
  rate_limit: 600/min
tree:
  start: check_alt
  nodes:
    check_alt:
      type: condition
      variable: alt_elevation
      operator: gte
      value: 3
      true_next: alt_elevated_bili_check
      false_next: check_mild_alt
    check_mild_alt:
      type: condition
      variable: alt_elevation
      operator: gte
      value: 2
      true_next: mild_elevation
      false_next: normal_range
    alt_elevated_bili_check:
      type: condition
      variable: bilirubin_elevation
      operator: gte
      value: 2
      true_next: check_alp_for_hy
      false_next: check_high_alt
    check_alp_for_hy:
      type: condition
      variable: alkaline_phosphatase_elevated
      operator: eq
      value: true
      true_next: cholestatic_pattern
      false_next: check_other_causes
    check_other_causes:
      type: condition
      variable: other_cause_excluded
      operator: eq
      value: true
      true_next: hy_law_confirmed
      false_next: hy_law_possible
    hy_law_confirmed:
      type: return
      value:
        dili_classification: HY_LAW_CASE
        hy_law_case: true
        action_required: "CRITICAL: Hy's Law case confirmed. Fatality risk ~10-50% without intervention. Immediately discontinue suspect drug, report as SAE, assess for clinical trial hold."
        regulatory_reference: "FDA Guidance: Drug-Induced Liver Injury: Premarketing Clinical Evaluation (2009), Section V.B — Hy's Law"
    hy_law_possible:
      type: return
      value:
        dili_classification: POSSIBLE_HY_LAW
        hy_law_case: false
        action_required: Investigate and exclude other causes (viral hepatitis, alcohol, concomitant hepatotoxic drugs). If other causes excluded, reclassify as Hy's Law case.
        regulatory_reference: "FDA Guidance: Drug-Induced Liver Injury (2009), Section V.B"
    cholestatic_pattern:
      type: return
      value:
        dili_classification: CHOLESTATIC_DILI
        hy_law_case: false
        action_required: Cholestatic pattern (elevated ALP) — does not meet Hy's Law criteria but requires monitoring. Evaluate for biliary obstruction.
        regulatory_reference: "FDA Guidance: Drug-Induced Liver Injury (2009), Section IV.C"
    check_high_alt:
      type: condition
      variable: alt_elevation
      operator: gte
      value: 5
      true_next: severe_alt_no_bili
      false_next: moderate_alt_no_bili
    severe_alt_no_bili:
      type: return
      value:
        dili_classification: SEVERE_ALT_ELEVATION
        hy_law_case: false
        action_required: ALT >= 5x ULN without bilirubin elevation. Discontinue suspect drug. Monitor for progression to Hy's Law. Report as SAE if >= 10x ULN.
        regulatory_reference: "FDA Guidance: Drug-Induced Liver Injury (2009), Section V.A"
    moderate_alt_no_bili:
      type: return
      value:
        dili_classification: MODERATE_ALT_ELEVATION
        hy_law_case: false
        action_required: ALT 3-5x ULN. Increase monitoring frequency. Consider dose reduction. Repeat LFTs within 48-72 hours.
        regulatory_reference: "FDA Guidance: Drug-Induced Liver Injury (2009), Section V.A"
    mild_elevation:
      type: return
      value:
        dili_classification: MILD_ALT_ELEVATION
        hy_law_case: false
        action_required: Mild ALT elevation (2-3x ULN). Monitor LFTs at next scheduled visit. Document in case record.
        regulatory_reference: "FDA Guidance: Drug-Induced Liver Injury (2009), Section IV.A"
    normal_range:
      type: return
      value:
        dili_classification: WITHIN_ACCEPTABLE_RANGE
        hy_law_case: false
        action_required: No DILI concern at current levels. Continue routine monitoring per protocol.
        regulatory_reference: "FDA Guidance: Drug-Induced Liver Injury (2009), Section IV.A"
tests:
  - input:
      alt_elevation: 8
      bilirubin_elevation: 3
      alkaline_phosphatase_elevated: false
      other_cause_excluded: true
    expect:
      dili_classification: HY_LAW_CASE
      hy_law_case: true
  - input:
      alt_elevation: 5
      bilirubin_elevation: 2.5
      alkaline_phosphatase_elevated: false
      other_cause_excluded: false
    expect:
      dili_classification: POSSIBLE_HY_LAW
      hy_law_case: false
  - input:
      alt_elevation: 4
      bilirubin_elevation: 3
      alkaline_phosphatase_elevated: true
    expect:
      dili_classification: CHOLESTATIC_DILI
      hy_law_case: false
  - input:
      alt_elevation: 7
      bilirubin_elevation: 1.2
    expect:
      dili_classification: SEVERE_ALT_ELEVATION
      hy_law_case: false
  - input:
      alt_elevation: 4
      bilirubin_elevation: 1
    expect:
      dili_classification: MODERATE_ALT_ELEVATION
  - input:
      alt_elevation: 2.5
      bilirubin_elevation: 1
    expect:
      dili_classification: MILD_ALT_ELEVATION
  - input:
      alt_elevation: 1.5
      bilirubin_elevation: 0.8
    expect:
      dili_classification: WITHIN_ACCEPTABLE_RANGE
  - input:
      alt_elevation: 3
      bilirubin_elevation: 2
      alkaline_phosphatase_elevated: false
      other_cause_excluded: true
    expect:
      dili_classification: HY_LAW_CASE
      hy_law_case: true
  - input: {}
    expect:
      dili_classification: WITHIN_ACCEPTABLE_RANGE
      hy_law_case: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - dili_classification
    - hy_law_case
    - action_required
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
