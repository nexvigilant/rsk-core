name: session-8f1759de-dag
version: "1.0.0"
description: "Auto-generated DAG from session 8f1759de fast-food prompts (2 nodes)"

interface:
  inputs:
    step_0_done:
      type: bool
      required: false
    step_1_done:
      type: bool
      required: false
  outputs:
    task:
      type: string
    prompt:
      type: string
    priority:
      type: int

tree:
  start: gate_0
  nodes:
    gate_0:
      type: condition
      variable: step_0_done
      operator: eq
      value: true
      true_next: gate_1
      false_next: node_0
    node_0:
      type: return
      value:
        task: "step-0"
        prompt: "Build a train function that accumulates learned patterns from each verdict chain execution — not a test harness, a learning harness that compounds overnight"
        priority: 1
    gate_1:
      type: condition
      variable: step_1_done
      operator: eq
      value: true
      true_next: node_1
      false_next: node_1
    node_1:
      type: return
      value:
        task: "step-1"
        prompt: "Add a self-regulate mode to loop-grappler that prunes low-value prompts before DAG generation — prompts that repeat across 3+ sessions without execution get composted"
        priority: 2

tests:
  - name: "empty input routes to first prompt"
    input: {}
    expect:
      task: "step-0"
      priority: 1
  - name: "first done routes to second"
    input:
      step_0_done: true
    expect:
      task: "step-1"
      priority: 2
