name: ich-s6-gate
description: "ICH S6 compliance: Biotechnology Safety"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "biotech_eval"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH S6"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH S6"
        compliant: false
        action: "remediate"
        gap: "biotech_eval"

tests:
  - input: {"biotech_eval": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
