name: pop-pregnancy-t3
description: Third trimester — fetal effects
version: 0.1.0
tree:
  start: check
  nodes:
    standard:
      type: return
      value:
        population: pregnancy-t3
        at_risk: false
        action: standard_care
    check:
      type: condition
      variable: trimester
      operator: eq
      value: 3
      true_next: at_risk
      false_next: standard
    at_risk:
      type: return
      value:
        action: special_monitoring
        population: pregnancy-t3
        at_risk: true
        reason: Third trimester — fetal effects
tests:
- input:
    trimester: 3
  expect:
    at_risk: true
    population: pregnancy-t3
- input: {}
  expect:
    at_risk: false
    population: pregnancy-t3
- input:
    trimester: 0
  expect:
    at_risk: false
    action: standard_care
    population: pregnancy-t3
- input:
    trimester: -1
  expect:
    population: pregnancy-t3
    at_risk: false
    action: standard_care
- input:
    trimester: 2
  expect:
    at_risk: false
    action: standard_care
    population: pregnancy-t3
- input:
    trimester: 4
  expect:
    action: standard_care
    population: pregnancy-t3
    at_risk: false
- input:
    trimester: 300
  expect:
    at_risk: false
    action: standard_care
    population: pregnancy-t3
interface: null
primitive_signature: null
