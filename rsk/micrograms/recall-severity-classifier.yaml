name: recall-severity-classifier
description: "Classify FDA drug recall severity based on class and reason"
version: 0.1.0

tree:
  start: validate_class
  nodes:
    validate_class:
      type: condition
      variable: recall_class
      operator: is_not_null
      true_next: validate_reason
      false_next: missing_input

    validate_reason:
      type: condition
      variable: reason
      operator: is_not_null
      true_next: classify_class
      false_next: missing_input

    classify_class:
      type: condition
      variable: recall_class
      operator: matches
      value: "(?i)^I$"
      true_next: severity_class_i
      false_next: check_class_ii

    check_class_ii:
      type: condition
      variable: recall_class
      operator: matches
      value: "(?i)^II$"
      true_next: check_reason_ii
      false_next: check_class_iii

    check_class_iii:
      type: condition
      variable: recall_class
      operator: matches
      value: "(?i)^III$"
      true_next: severity_class_iii
      false_next: unknown_class

    check_reason_ii:
      type: condition
      variable: reason
      operator: matches
      value: "(?i)(contamination|sterility|potency|impurity)"
      true_next: severity_class_ii_major
      false_next: severity_class_ii_minor

    severity_class_i:
      type: return
      value:
        severity: "life_threatening"
        public_warning: true
        rationale: "Class I recalls have the most serious potential for adverse health consequences"

    severity_class_ii_major:
      type: return
      value:
        severity: "adverse_health"
        public_warning: true
        rationale: "Class II recall with significant quality defect that could cause adverse health"

    severity_class_ii_minor:
      type: return
      value:
        severity: "adverse_health"
        public_warning: false
        rationale: "Class II recall with moderate quality issue requiring professional guidance"

    severity_class_iii:
      type: return
      value:
        severity: "unlikely_harm"
        public_warning: false
        rationale: "Class III recalls are unlikely to cause adverse health consequences"

    unknown_class:
      type: return
      value:
        severity: null
        public_warning: false
        rationale: null

    missing_input:
      type: return
      value:
        severity: null
        public_warning: false
        rationale: null

tests:
  - input: { recall_class: "I", reason: "microbial contamination" }
    expect: { severity: "life_threatening", public_warning: true, rationale: "Class I recalls have the most serious potential for adverse health consequences" }

  - input: { recall_class: "II", reason: "potency defect" }
    expect: { severity: "adverse_health", public_warning: true, rationale: "Class II recall with significant quality defect that could cause adverse health" }

  - input: { recall_class: "II", reason: "labeling issue" }
    expect: { severity: "adverse_health", public_warning: false, rationale: "Class II recall with moderate quality issue requiring professional guidance" }

  - input: { recall_class: "III", reason: "cosmetic defect" }
    expect: { severity: "unlikely_harm", public_warning: false, rationale: "Class III recalls are unlikely to cause adverse health consequences" }

  - input: { recall_class: null, reason: "contamination" }
    expect: { severity: null, public_warning: false, rationale: null }
