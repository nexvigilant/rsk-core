# MICROGRAM++ (upgraded 2026-04-23)
name: null-check
version: 0.1.0
description: Verify a required field is present
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: field
    type: string
    required: false
    description: ""
outputs:
  - name: message
    type: string
  - name: valid
    type: bool
interface:
  inputs:
    field:
      type: string
      required: false
  outputs:
    message:
      type: string
    valid:
      type: bool
ui:
  title: Null Check
  subtitle: Verify a required field is present
  icon: circle
  route: /vigilance/mg/null-check
  steps:
    - field: field
      label: field
      help: Enter field
      widget: text
      placeholder: null
  result:
    template: "message: {{message}} — valid: {{valid}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/null-check
  cli: rsk mcg run null-check
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: field
      operator: is_not_null
      true_next: present
      false_next: missing
    present:
      type: return
      value:
        valid: true
        message: Field is present
    missing:
      type: return
      value:
        valid: false
        message: Required field is missing
tests:
  - input:
      field: hello
    expect:
      valid: true
  - input: {}
    expect:
      valid: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - message
    - valid
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
