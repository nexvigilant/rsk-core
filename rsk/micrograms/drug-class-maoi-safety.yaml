# MICROGRAM++ (upgraded 2026-04-23)
name: drug-class-maoi-safety
version: 0.1.0
description: MAOI safety assessment. Evaluates hypertensive crisis risk with sympathomimetics and serotonin syndrome risk.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Class Maoi Safety
  subtitle: MAOI safety assessment. Evaluates hypertensive crisis risk with sympathomimetics and serotonin syndrome risk.
  icon: circle
  route: /vigilance/mg/drug-class-maoi-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-class-maoi-safety
  cli: rsk mcg run drug-class-maoi-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_sympathomimetic
  nodes:
    check_sympathomimetic:
      type: condition
      variable: concurrent_sympathomimetic
      operator: eq
      value: true
      true_next: hypertensive_crisis_alert
      false_next: check_serotoninergic
    hypertensive_crisis_alert:
      type: return
      value:
        risk_level: critical
        contraindication: true
        message: Concurrent sympathomimetic; hypertensive crisis risk; avoid combination
    check_serotoninergic:
      type: condition
      variable: concurrent_serotoninergic
      operator: eq
      value: true
      true_next: serotonin_syndrome_alert
      false_next: check_tyramine_diet
    serotonin_syndrome_alert:
      type: return
      value:
        risk_level: critical
        contraindication: true
        message: Concurrent serotoninergic drug; serotonin syndrome risk; avoid combination
    check_tyramine_diet:
      type: condition
      variable: patient_compliant_with_diet
      operator: eq
      value: false
      true_next: dietary_alert
      false_next: standard_dosing
    dietary_alert:
      type: return
      value:
        risk_level: high
        dietary_education: required
        message: Patient non-compliant with tyramine-restricted diet; hypertensive crisis risk
    standard_dosing:
      type: return
      value:
        risk_level: low
        dietary_compliance: required
        message: MAOI dosing appropriate with strict dietary compliance
tests:
  - input:
      concurrent_sympathomimetic: true
      concurrent_serotoninergic: false
      patient_compliant_with_diet: true
    expect:
      risk_level: critical
      contraindication: true
  - input:
      concurrent_sympathomimetic: false
      concurrent_serotoninergic: true
      patient_compliant_with_diet: true
    expect:
      risk_level: critical
      contraindication: true
  - input:
      concurrent_sympathomimetic: false
      concurrent_serotoninergic: false
      patient_compliant_with_diet: false
    expect:
      risk_level: high
      dietary_education: required
  - input:
      concurrent_sympathomimetic: false
      concurrent_serotoninergic: false
      patient_compliant_with_diet: true
    expect:
      risk_level: low
      dietary_compliance: required
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
