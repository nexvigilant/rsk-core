# MICROGRAM++ (upgraded 2026-04-23)
name: threshold-gate
version: 0.1.0
description: Pass/fail gate against a configurable threshold
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: value
    type: int
    required: false
    description: ""
outputs:
  - name: gate
    type: string
  - name: passed
    type: bool
interface:
  inputs:
    value:
      type: int
      required: false
  outputs:
    gate:
      type: string
    passed:
      type: bool
ui:
  title: Threshold Gate
  subtitle: Pass/fail gate against a configurable threshold
  icon: circle
  route: /vigilance/mg/threshold-gate
  steps:
    - field: value
      label: value
      help: Enter value
      widget: text
      placeholder: null
  result:
    template: "gate: {{gate}} — passed: {{passed}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/threshold-gate
  cli: rsk mcg run threshold-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    pass:
      type: return
      value:
        passed: true
        gate: PASS
    check:
      type: condition
      variable: value
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    fail:
      type: return
      value:
        passed: false
        gate: FAIL
tests:
  - input:
      value: 95
    expect:
      gate: PASS
      passed: true
  - input:
      value: 80
    expect:
      gate: PASS
      passed: true
  - input:
      value: 79
    expect:
      gate: FAIL
      passed: false
  - input:
      value: 0
    expect:
      passed: false
      gate: FAIL
  - input:
      value: -1
    expect:
      passed: false
      gate: FAIL
  - input:
      value: 81
    expect:
      gate: PASS
      passed: true
  - input:
      value: 8000
    expect:
      gate: PASS
      passed: true
  - input: {}
    expect:
      passed: false
      gate: FAIL
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - gate
    - passed
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
