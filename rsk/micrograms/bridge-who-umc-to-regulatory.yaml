# MICROGRAM++ (upgraded 2026-04-23)
name: bridge-who-umc-to-regulatory
version: 0.1.0
description: "Bridge: converts WHO-UMC causality verdict into FDA safety action type"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Bridge Who Umc To Regulatory
  subtitle: "Bridge: converts WHO-UMC causality verdict into FDA safety action type"
  icon: circle
  route: /vigilance/mg/bridge-who-umc-to-regulatory
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/bridge-who-umc-to-regulatory
  cli: rsk mcg run bridge-who-umc-to-regulatory
  auth: none
  rate_limit: 600/min
tree:
  start: check_action
  nodes:
    check_investigate:
      type: condition
      variable: action
      operator: eq
      value: investigate
      true_next: medwatch
      false_next: labeling
    boxed:
      type: return
      value:
        bridge: who-umc-to-regulatory
        comm_type: boxed_warning
    check_action:
      type: condition
      variable: action
      operator: eq
      value: confirm
      true_next: boxed
      false_next: check_investigate
    medwatch:
      type: return
      value:
        comm_type: medwatch
        bridge: who-umc-to-regulatory
    labeling:
      type: return
      value:
        bridge: who-umc-to-regulatory
        comm_type: labeling_change
tests:
  - input:
      action: confirm
      priority: critical
    expect:
      bridge: who-umc-to-regulatory
      comm_type: boxed_warning
  - input:
      action: investigate
      priority: high
    expect:
      bridge: who-umc-to-regulatory
      comm_type: medwatch
  - input:
      priority: moderate
      action: validate
    expect:
      bridge: who-umc-to-regulatory
      comm_type: labeling_change
  - input: {}
    expect:
      bridge: who-umc-to-regulatory
      comm_type: labeling_change
  - input: {}
    expect:
      bridge: who-umc-to-regulatory
      comm_type: labeling_change
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
