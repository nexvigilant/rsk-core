name: thermal-management-router
description: "Routes thermal management actions based on zone temperature, heat flux, and cooling capacity. 5 zones (battery, motor, electronics, pilot, ambient). Escalates from passive cooling through active cooling to emergency shutdown."
version: 0.1.0
interface:
  inputs:
    zone:
      type: string
      required: true
      enum: [battery_pack, motor_controller, power_electronics, pilot_interface, ambient]
    temperature_c:
      type: float
      required: true
      description: "Current zone temperature in Celsius"
    heat_flux_w:
      type: float
      required: false
      description: "Current heat generation rate in watts"
    coolant_flow_available:
      type: boolean
      required: false
      description: "Whether active liquid cooling loop is operational"
    ambient_temp_c:
      type: float
      required: false
      description: "External ambient temperature in Celsius"
  outputs:
    action:
      type: string
    cooling_method:
      type: string
    power_derate_pct:
      type: float
    alert_level:
      type: string
    rationale:
      type: string
tree:
  start: check_emergency
  nodes:
    check_emergency:
      type: condition
      variable: temperature_c
      operator: gt
      value: 80
      true_next: emergency_shutdown
      false_next: check_critical

    check_critical:
      type: condition
      variable: temperature_c
      operator: gt
      value: 60
      true_next: check_zone_battery_crit
      false_next: check_warm

    check_zone_battery_crit:
      type: condition
      variable: zone
      operator: eq
      value: battery_pack
      true_next: battery_critical
      false_next: check_zone_pilot_crit

    check_zone_pilot_crit:
      type: condition
      variable: zone
      operator: eq
      value: pilot_interface
      true_next: pilot_critical
      false_next: general_critical

    check_warm:
      type: condition
      variable: temperature_c
      operator: gt
      value: 40
      true_next: check_coolant_available
      false_next: check_cold

    check_coolant_available:
      type: condition
      variable: coolant_flow_available
      operator: eq
      value: true
      true_next: active_cooling
      false_next: passive_derate

    check_cold:
      type: condition
      variable: temperature_c
      operator: lt
      value: 0
      true_next: cold_preheat
      false_next: nominal

    emergency_shutdown:
      type: return
      value:
        action: emergency_shutdown
        cooling_method: "ALL — dump coolant, open vents, shed all non-critical loads"
        power_derate_pct: 100
        alert_level: emergency
        rationale: "Zone >80°C — thermal runaway imminent for batteries, component failure for electronics. Immediate full shutdown. Vent battery enclosure. Pyro disconnect if battery zone."

    battery_critical:
      type: return
      value:
        action: battery_isolation
        cooling_method: "Burst coolant to battery zone + open pressure relief valve + shed actuator loads"
        power_derate_pct: 80
        alert_level: critical
        rationale: "Battery pack >60°C — NMC thermal runaway onset 80-130°C. Aggressive cooling NOW. Derate to 20% power. Prepare pyro disconnect. Monitor for thermal propagation between cells."

    pilot_critical:
      type: return
      value:
        action: pilot_protection
        cooling_method: "Maximize suit ventilation + redirect coolant to pilot interface + reduce motor heat output"
        power_derate_pct: 50
        alert_level: critical
        rationale: "Pilot interface >60°C — skin burn risk. Reduce power output to halve heat generation. Increase ventilation flow. Alert pilot via HUD."

    general_critical:
      type: return
      value:
        action: aggressive_cooling
        cooling_method: "Maximum coolant flow + forced air + load shedding"
        power_derate_pct: 60
        alert_level: critical
        rationale: "Electronics/motor >60°C — component derating zone. Power electronics derate at 60°C, MOSFETs fail at 150°C. Aggressive cooling before junction temps cascade."

    active_cooling:
      type: return
      value:
        action: active_cooling
        cooling_method: "Liquid cooling loop at elevated flow rate + heat sink fan boost"
        power_derate_pct: 0
        alert_level: warning
        rationale: "Zone 40-60°C with coolant available. Active cooling maintains thermal equilibrium. No power deration needed. Monitor for rising trend."

    passive_derate:
      type: return
      value:
        action: passive_derate
        cooling_method: "Conductive heat sinking only — no active cooling available"
        power_derate_pct: 30
        alert_level: warning
        rationale: "Zone 40-60°C but coolant offline. Reduce power 30% to lower heat generation. Passive conduction through aluminum frame + airflow. Repair coolant loop when safe."

    cold_preheat:
      type: return
      value:
        action: preheat
        cooling_method: "Resistive preheater on battery zone + reduce charging to C/10"
        power_derate_pct: 20
        alert_level: info
        rationale: "Zone <0°C — lithium plating risk on charge, reduced capacity on discharge. Preheat battery pack before high-current operations. Derate 20% until >5°C."

    nominal:
      type: return
      value:
        action: nominal
        cooling_method: "Passive — ambient convection + structural heat sinking sufficient"
        power_derate_pct: 0
        alert_level: nominal
        rationale: "Zone 0-40°C — normal operating range. No intervention needed. Passive cooling handles heat dissipation."

primitive_signature:
  dominant: '→'
  expression: '→(∂(ς_thermal, N_power)) — causal routing across thermal boundary by temperature state and power quantity'
  primes: ['→', '∂', 'ς', 'N']
  arguments: ['l']

tests:
- name: "emergency — above 80°C"
  input: { zone: motor_controller, temperature_c: 85 }
  expect: { action: emergency_shutdown, alert_level: emergency, power_derate_pct: 100 }

- name: "battery critical — 65°C"
  input: { zone: battery_pack, temperature_c: 65 }
  expect: { action: battery_isolation, alert_level: critical }

- name: "pilot critical — 62°C"
  input: { zone: pilot_interface, temperature_c: 62 }
  expect: { action: pilot_protection, power_derate_pct: 50 }

- name: "electronics critical — 61°C"
  input: { zone: power_electronics, temperature_c: 61 }
  expect: { action: aggressive_cooling, alert_level: critical }

- name: "warm with coolant — active cooling"
  input: { zone: motor_controller, temperature_c: 50, coolant_flow_available: true }
  expect: { action: active_cooling, power_derate_pct: 0 }

- name: "warm without coolant — passive derate"
  input: { zone: motor_controller, temperature_c: 50, coolant_flow_available: false }
  expect: { action: passive_derate, power_derate_pct: 30 }

- name: "cold — preheat"
  input: { zone: battery_pack, temperature_c: -10 }
  expect: { action: preheat, alert_level: info }

- name: "nominal"
  input: { zone: ambient, temperature_c: 25 }
  expect: { action: nominal, power_derate_pct: 0 }

- name: "null safety"
  input: {}
  expect: { action: nominal }
