# MICROGRAM++ (upgraded 2026-04-23)
name: tox-neurological
version: 0.1.0
description: "Neurological toxicity gate: neurotox_grade thresholds for brain"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Tox Neurological
  subtitle: "Neurological toxicity gate: neurotox_grade thresholds for brain"
  icon: circle
  route: /vigilance/mg/tox-neurological
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/tox-neurological
  cli: rsk mcg run tox-neurological
  auth: none
  rate_limit: 600/min
tree:
  start: check_severe
  nodes:
    check_severe:
      type: condition
      variable: neurotox_grade
      operator: gte
      value: 3
      true_next: severe
      false_next: check_mild
    check_mild:
      type: condition
      variable: neurotox_grade
      operator: gte
      value: 2
      true_next: mild
      false_next: normal
    mild:
      type: return
      value:
        severity: mild
        action: monitor_closely
        organ: neurological
        target: brain
    severe:
      type: return
      value:
        target: brain
        severity: severe
        organ: neurological
        action: discontinue
    normal:
      type: return
      value:
        severity: normal
        action: continue
        target: brain
        organ: neurological
tests:
  - input:
      neurotox_grade: 4
    expect:
      organ: neurological
      severity: severe
  - input:
      neurotox_grade: 2
    expect:
      organ: neurological
      severity: mild
  - input:
      neurotox_grade: 0
    expect:
      organ: neurological
      severity: normal
  - input: {}
    expect:
      organ: neurological
      severity: normal
  - input:
      neurotox_grade: -1
    expect:
      action: continue
      severity: normal
      organ: neurological
      target: brain
  - input:
      neurotox_grade: 300
    expect:
      severity: severe
      organ: neurological
      action: discontinue
      target: brain
  - input:
      neurotox_grade: -1
    expect:
      organ: neurological
      target: brain
      action: continue
      severity: normal
  - input:
      neurotox_grade: 1
    expect:
      severity: normal
      organ: neurological
      action: continue
      target: brain
  - input:
      neurotox_grade: 3
    expect:
      severity: severe
      organ: neurological
      target: brain
      action: discontinue
  - input:
      neurotox_grade: 200
    expect:
      severity: severe
      organ: neurological
      action: discontinue
      target: brain
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
