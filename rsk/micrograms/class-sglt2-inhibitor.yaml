# MICROGRAM++ (upgraded 2026-04-23)
name: class-sglt2-inhibitor
version: 0.1.0
description: "SGLT2 inhibitors class safety: Diabetic ketoacidosis monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Sglt2 Inhibitor
  subtitle: "SGLT2 inhibitors class safety: Diabetic ketoacidosis monitoring"
  icon: circle
  route: /vigilance/mg/class-sglt2-inhibitor
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-sglt2-inhibitor
  cli: rsk mcg run class-sglt2-inhibitor
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: dka_risk
      operator: gte
      value: 2
      true_next: alert
      false_next: safe
    alert:
      type: return
      value:
        action: class_effect_investigation
        drug_class: SGLT2 inhibitors
        concern: Diabetic ketoacidosis
        alert: true
    safe:
      type: return
      value:
        action: continue
        drug_class: SGLT2 inhibitors
        concern: Diabetic ketoacidosis
        alert: false
tests:
  - input:
      dka_risk: 2
    expect:
      drug_class: SGLT2 inhibitors
      alert: true
  - input: {}
    expect:
      drug_class: SGLT2 inhibitors
      alert: false
  - input:
      dka_risk: 0
    expect:
      concern: Diabetic ketoacidosis
      drug_class: SGLT2 inhibitors
      action: continue
      alert: false
  - input:
      dka_risk: -1
    expect:
      concern: Diabetic ketoacidosis
      action: continue
      alert: false
      drug_class: SGLT2 inhibitors
  - input:
      dka_risk: 1
    expect:
      concern: Diabetic ketoacidosis
      alert: false
      drug_class: SGLT2 inhibitors
      action: continue
  - input:
      dka_risk: 3
    expect:
      action: class_effect_investigation
      drug_class: SGLT2 inhibitors
      alert: true
      concern: Diabetic ketoacidosis
  - input:
      dka_risk: 200
    expect:
      action: class_effect_investigation
      drug_class: SGLT2 inhibitors
      concern: Diabetic ketoacidosis
      alert: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
