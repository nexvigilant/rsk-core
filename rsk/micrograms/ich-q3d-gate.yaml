name: ich-q3d-gate
description: "ICH Q3D compliance: Elemental Impurities"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "elemental_ok"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH Q3D"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH Q3D"
        compliant: false
        action: "remediate"
        gap: "elemental_ok"

tests:
  - input: {"elemental_ok": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
