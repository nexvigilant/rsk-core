# MICROGRAM++ (upgraded 2026-04-23)
name: ich-q3d-gate
version: 0.1.0
description: "ICH Q3D compliance: Elemental Impurities"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Ich Q3d Gate
  subtitle: "ICH Q3D compliance: Elemental Impurities"
  icon: circle
  route: /vigilance/mg/ich-q3d-gate
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ich-q3d-gate
  cli: rsk mcg run ich-q3d-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: elemental_ok
      operator: eq
      value: true
      true_next: compliant
      false_next: gap
    compliant:
      type: return
      value:
        guideline: ICH Q3D
        compliant: true
        action: proceed
    gap:
      type: return
      value:
        guideline: ICH Q3D
        compliant: false
        action: remediate
        gap: elemental_ok
tests:
  - input:
      elemental_ok: true
    expect:
      compliant: true
  - input: {}
    expect:
      compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
