# MICROGRAM++ (upgraded 2026-04-23)
name: station-pvdsl-pipeline
version: 0.1.0
description: "Route PVDSL compilation results: parse errors, evaluation, and function coverage"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Pvdsl Pipeline
  subtitle: "Route PVDSL compilation results: parse errors, evaluation, and function coverage"
  icon: circle
  route: /vigilance/mg/station-pvdsl-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-pvdsl-pipeline
  cli: rsk mcg run station-pvdsl-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_parse
  nodes:
    success:
      type: return
      value:
        reason: PVDSL compiles and evaluates — expression valid
        route: archive
        action: certify
        priority: low
    eval_error:
      type: return
      value:
        reason: PVDSL parses but evaluation fails — runtime error in function
        route: runtime_debug
        action: debug
        priority: moderate
    parse_error:
      type: return
      value:
        action: fix
        reason: PVDSL parse failure — syntax error in expression
        route: syntax_repair
        priority: high
    check_parse:
      type: condition
      variable: parse_success
      operator: eq
      value: true
      true_next: check_eval
      false_next: parse_error
    check_eval:
      type: condition
      variable: eval_success
      operator: eq
      value: true
      true_next: success
      false_next: eval_error
tests:
  - input:
      parse_success: false
      eval_success: false
    expect:
      priority: high
      route: syntax_repair
      action: fix
  - input:
      eval_success: false
      parse_success: true
    expect:
      priority: moderate
      route: runtime_debug
      action: debug
  - input:
      eval_success: true
      parse_success: true
    expect:
      action: certify
      priority: low
      route: archive
  - input: {}
    expect:
      reason: PVDSL parse failure — syntax error in expression
      route: syntax_repair
      action: fix
      priority: high
  - input: {}
    expect:
      priority: high
      action: fix
      route: syntax_repair
      reason: PVDSL parse failure — syntax error in expression
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
