name: drug-profile-adalimumab
description: 'Safety triage for adalimumab: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    signal:
      type: return
      value:
        drug: adalimumab
        action: investigate
        expected_prr: 4.9
        harm_type: B
        signal: true
    no_signal:
      type: return
      value:
        signal: false
        drug: adalimumab
        expected_prr: 4.9
        action: monitor
        harm_type: B
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 4.9
  expect:
    drug: adalimumab
    signal: false
- input:
    prr: 0.5
  expect:
    signal: false
    drug: adalimumab
- input: {}
  expect:
    signal: false
    drug: adalimumab
- input:
    prr: 4.999
  expect:
    action: monitor
    signal: false
    harm_type: B
    expected_prr: 4.9
    drug: adalimumab
- input:
    prr: 5.001
  expect:
    drug: adalimumab
    signal: true
    action: investigate
    harm_type: B
    expected_prr: 4.9
interface: null
primitive_signature: null
