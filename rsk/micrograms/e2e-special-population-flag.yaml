# MICROGRAM++ (upgraded 2026-04-23)
name: e2e-special-population-flag
version: 0.1.0
description: "ICH E2E Section 3.5: Flags whether special population safety data gaps exist for pediatric, geriatric, pregnant, renal-impaired, or hepatic-impaired populations"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: population
    type: string
    required: true
    description: ""
  - name: pediatric_data_available
    type: bool
    required: false
    description: ""
  - name: geriatric_data_available
    type: bool
    required: false
    description: ""
  - name: pregnancy_data_available
    type: bool
    required: false
    description: ""
  - name: renal_data_available
    type: bool
    required: false
    description: ""
  - name: hepatic_data_available
    type: bool
    required: false
    description: ""
outputs:
  - name: flag
    type: bool
  - name: gap_type
    type: string
  - name: population_group
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    population:
      type: string
      required: true
    pediatric_data_available:
      type: bool
      required: false
    geriatric_data_available:
      type: bool
      required: false
    pregnancy_data_available:
      type: bool
      required: false
    renal_data_available:
      type: bool
      required: false
    hepatic_data_available:
      type: bool
      required: false
  outputs:
    flag:
      type: bool
    gap_type:
      type: string
    population_group:
      type: string
    regulatory_reference:
      type: string
ui:
  title: E2e Special Population Flag
  subtitle: "ICH E2E Section 3.5: Flags whether special population safety data gaps exist for pediatric, geriatric, pregnant, renal-impaired, or hepatic-impaired populations"
  icon: circle
  route: /vigilance/mg/e2e-special-population-flag
  steps:
    - field: population
      label: population
      help: Enter population
      widget: text
      placeholder: null
    - field: pediatric_data_available
      label: pediatric data available
      help: Enter pediatric_data_available
      widget: toggle
      placeholder: null
    - field: geriatric_data_available
      label: geriatric data available
      help: Enter geriatric_data_available
      widget: toggle
      placeholder: null
    - field: pregnancy_data_available
      label: pregnancy data available
      help: Enter pregnancy_data_available
      widget: toggle
      placeholder: null
    - field: renal_data_available
      label: renal data available
      help: Enter renal_data_available
      widget: toggle
      placeholder: null
    - field: hepatic_data_available
      label: hepatic data available
      help: Enter hepatic_data_available
      widget: toggle
      placeholder: null
  result:
    template: "flag: {{flag}} — gap_type: {{gap_type}} — population_group: {{population_group}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2e-special-population-flag
  cli: rsk mcg run e2e-special-population-flag
  auth: none
  rate_limit: 600/min
tree:
  start: check_pediatric
  nodes:
    check_pediatric:
      type: condition
      variable: population
      operator: eq
      value: pediatric
      true_next: check_pediatric_data
      false_next: check_geriatric
    check_pediatric_data:
      type: condition
      variable: pediatric_data_available
      operator: eq
      value: true
      true_next: result_no_gap_pediatric
      false_next: result_gap_pediatric
    check_geriatric:
      type: condition
      variable: population
      operator: eq
      value: geriatric
      true_next: check_geriatric_data
      false_next: check_pregnant
    check_geriatric_data:
      type: condition
      variable: geriatric_data_available
      operator: eq
      value: true
      true_next: result_no_gap_geriatric
      false_next: result_gap_geriatric
    check_pregnant:
      type: condition
      variable: population
      operator: eq
      value: pregnant
      true_next: check_pregnancy_data
      false_next: check_renal
    check_pregnancy_data:
      type: condition
      variable: pregnancy_data_available
      operator: eq
      value: true
      true_next: result_no_gap_pregnant
      false_next: result_gap_pregnant
    check_renal:
      type: condition
      variable: population
      operator: eq
      value: renal_impaired
      true_next: check_renal_data
      false_next: check_hepatic
    check_renal_data:
      type: condition
      variable: renal_data_available
      operator: eq
      value: true
      true_next: result_no_gap_renal
      false_next: result_gap_renal
    check_hepatic:
      type: condition
      variable: population
      operator: eq
      value: hepatic_impaired
      true_next: check_hepatic_data
      false_next: result_no_gap_unknown
    check_hepatic_data:
      type: condition
      variable: hepatic_data_available
      operator: eq
      value: true
      true_next: result_no_gap_hepatic
      false_next: result_gap_hepatic
    result_gap_pediatric:
      type: return
      value:
        flag: true
        gap_type: MISSING_INFORMATION
        population_group: pediatric
        regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
    result_no_gap_pediatric:
      type: return
      value:
        flag: false
        gap_type: NONE
        population_group: pediatric
        regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
    result_gap_geriatric:
      type: return
      value:
        flag: true
        gap_type: MISSING_INFORMATION
        population_group: geriatric
        regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
    result_no_gap_geriatric:
      type: return
      value:
        flag: false
        gap_type: NONE
        population_group: geriatric
        regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
    result_gap_pregnant:
      type: return
      value:
        flag: true
        gap_type: MISSING_INFORMATION
        population_group: pregnant
        regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
    result_no_gap_pregnant:
      type: return
      value:
        flag: false
        gap_type: NONE
        population_group: pregnant
        regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
    result_gap_renal:
      type: return
      value:
        flag: true
        gap_type: MISSING_INFORMATION
        population_group: renal_impaired
        regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
    result_no_gap_renal:
      type: return
      value:
        flag: false
        gap_type: NONE
        population_group: renal_impaired
        regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
    result_gap_hepatic:
      type: return
      value:
        flag: true
        gap_type: MISSING_INFORMATION
        population_group: hepatic_impaired
        regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
    result_no_gap_hepatic:
      type: return
      value:
        flag: false
        gap_type: NONE
        population_group: hepatic_impaired
        regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
    result_no_gap_unknown:
      type: return
      value:
        flag: false
        gap_type: NONE
        population_group: unknown
        regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
tests:
  - input:
      population: pediatric
      pediatric_data_available: false
    expect:
      flag: true
      gap_type: MISSING_INFORMATION
      population_group: pediatric
      regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
  - input:
      population: pediatric
      pediatric_data_available: true
    expect:
      flag: false
      gap_type: NONE
      population_group: pediatric
      regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
  - input:
      population: geriatric
      geriatric_data_available: false
    expect:
      flag: true
      gap_type: MISSING_INFORMATION
      population_group: geriatric
      regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
  - input:
      population: pregnant
      pregnancy_data_available: false
    expect:
      flag: true
      gap_type: MISSING_INFORMATION
      population_group: pregnant
      regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
  - input:
      population: renal_impaired
      renal_data_available: true
    expect:
      flag: false
      gap_type: NONE
      population_group: renal_impaired
      regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
  - input:
      population: hepatic_impaired
      hepatic_data_available: false
    expect:
      flag: true
      gap_type: MISSING_INFORMATION
      population_group: hepatic_impaired
      regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
  - input:
      population: hepatic_impaired
      hepatic_data_available: true
    expect:
      flag: false
      gap_type: NONE
      population_group: hepatic_impaired
      regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
  - input:
      population: general
    expect:
      flag: false
      gap_type: NONE
      population_group: unknown
      regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
  - input: {}
    expect:
      flag: false
      gap_type: NONE
      population_group: unknown
      regulatory_reference: ICH E2E Section 3.5 - Populations Not Studied
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - flag
    - gap_type
    - population_group
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
