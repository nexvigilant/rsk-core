      type: condition
      variable: relative_risk
      operator: gte
      value: 2
      true_next: pass
      false_next: fail
tests:
  - input:
      relative_risk: 2
    expect:
      gate: true
      met: true
  - input: {}
    expect:
      met: false
      gate: false
  - input:
      relative_risk: 1.999
    expect:
      threshold: relative_risk
      gate: false
      met: false
  - input:
      relative_risk: 2.001
    expect:
      met: true
      gate: true
      threshold: relative_risk
persistence:
