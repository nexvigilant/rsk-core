name: gate-cases-robust
description: Robust case count for analysis
version: 0.1.0
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        met: false
        gate: false
        threshold: case_count
    check:
      type: condition
      variable: case_count
      operator: gte
      value: 100
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        gate: true
        met: true
        threshold: case_count
tests:
- input:
    case_count: 100
  expect:
    met: true
    gate: true
- input: {}
  expect:
    met: false
    gate: false
- input:
    case_count: 0
  expect:
    gate: false
    threshold: case_count
    met: false
- input:
    case_count: -1
  expect:
    gate: false
    met: false
    threshold: case_count
- input:
    case_count: 99
  expect:
    threshold: case_count
    gate: false
    met: false
- input:
    case_count: 101
  expect:
    met: true
    threshold: case_count
    gate: true
- input:
    case_count: 10000
  expect:
    gate: true
    met: true
    threshold: case_count
interface: null
primitive_signature: null
