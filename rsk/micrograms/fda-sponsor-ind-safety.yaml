# MICROGRAM++ (upgraded 2026-04-23)
name: fda-sponsor-ind-safety
version: 0.1.0
description: "FDA sponsor IND safety reporting assessment: determines reporting obligation from event characteristics per FDA Guidance 'Sponsor Responsibilities - Safety Reporting Requirements and Safety Assessment for IND and BA/BE Studies' (2025) and 21 CFR 312.32"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: suspected_adverse_reaction
    type: bool
    required: true
    description: Whether there is a reasonable possibility the drug caused the event
  - name: serious
    type: bool
    required: true
    description: Whether the event meets serious criteria per 21 CFR 312.32(a)
  - name: unexpected
    type: bool
    required: true
    description: Whether the event is not listed in the Investigator Brochure
  - name: fatal_or_life_threatening
    type: bool
    required: false
    description: Whether the event resulted in death or was life-threatening
  - name: study_type
    type: string
    required: false
    description: "Type of study: ind, ba_be, ba_be_ind_exempt"
outputs:
  - name: reporting_required
    type: bool
  - name: report_type
    type: string
  - name: timeline_days
    type: int
  - name: notification_recipients
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    suspected_adverse_reaction:
      type: bool
      required: true
      description: Whether there is a reasonable possibility the drug caused the event
    serious:
      type: bool
      required: true
      description: Whether the event meets serious criteria per 21 CFR 312.32(a)
    unexpected:
      type: bool
      required: true
      description: Whether the event is not listed in the Investigator Brochure
    fatal_or_life_threatening:
      type: bool
      required: false
      description: Whether the event resulted in death or was life-threatening
    study_type:
      type: string
      required: false
      description: "Type of study: ind, ba_be, ba_be_ind_exempt"
  outputs:
    reporting_required:
      type: bool
    report_type:
      type: string
    timeline_days:
      type: int
    notification_recipients:
      type: string
    regulatory_reference:
      type: string
ui:
  title: Fda Sponsor Ind Safety
  subtitle: "FDA sponsor IND safety reporting assessment: determines reporting obligation from event characteristics per FDA Guidance 'Sponsor Responsibilities - Safety Reporting Requirements and Safety Assessment for IND and BA/BE Studies' (2025) and 21 CFR 312.32"
  icon: circle
  route: /vigilance/mg/fda-sponsor-ind-safety
  steps:
    - field: suspected_adverse_reaction
      label: suspected adverse reaction
      help: Whether there is a reasonable possibility the drug caused the event
      widget: toggle
      placeholder: null
    - field: serious
      label: serious
      help: Whether the event meets serious criteria per 21 CFR 312.32(a)
      widget: toggle
      placeholder: null
    - field: unexpected
      label: unexpected
      help: Whether the event is not listed in the Investigator Brochure
      widget: toggle
      placeholder: null
    - field: fatal_or_life_threatening
      label: fatal or life threatening
      help: Whether the event resulted in death or was life-threatening
      widget: toggle
      placeholder: null
    - field: study_type
      label: study type
      help: "Type of study: ind, ba_be, ba_be_ind_exempt"
      widget: text
      placeholder: null
  result:
    template: "reporting_required: {{reporting_required}} — report_type: {{report_type}} — timeline_days: {{timeline_days}} — notification_recipients: {{notification_recipients}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/fda-sponsor-ind-safety
  cli: rsk mcg run fda-sponsor-ind-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_sar
  nodes:
    check_sar:
      type: condition
      variable: suspected_adverse_reaction
      operator: eq
      value: true
      true_next: sar_serious_check
      false_next: not_sar
    not_sar:
      type: return
      value:
        reporting_required: false
        report_type: NONE
        timeline_days: 0
        notification_recipients: N/A
        regulatory_reference: 21 CFR 312.32(c) - only suspected adverse reactions require IND safety reports
    sar_serious_check:
      type: condition
      variable: serious
      operator: eq
      value: true
      true_next: serious_unexpected_check
      false_next: nonserious_sar
    nonserious_sar:
      type: return
      value:
        reporting_required: false
        report_type: ANNUAL_REPORT
        timeline_days: 365
        notification_recipients: Include in IND Annual Report (21 CFR 312.33)
        regulatory_reference: "21 CFR 312.33; FDA Guidance: Sponsor Responsibilities (2025), Section III.A"
    serious_unexpected_check:
      type: condition
      variable: unexpected
      operator: eq
      value: true
      true_next: susar_fatal_check
      false_next: serious_expected
    serious_expected:
      type: return
      value:
        reporting_required: false
        report_type: ANNUAL_REPORT
        timeline_days: 365
        notification_recipients: Include in IND Annual Report; update IB if frequency changes
        regulatory_reference: 21 CFR 312.32(c) - serious expected SARs reported in annual report; FDA Guidance (2025), Section III.B
    susar_fatal_check:
      type: condition
      variable: fatal_or_life_threatening
      operator: eq
      value: true
      true_next: susar_7day
      false_next: susar_study_type_check
    susar_7day:
      type: return
      value:
        reporting_required: true
        report_type: IND_SAFETY_7DAY
        timeline_days: 7
        notification_recipients: FDA + all participating investigators + IRBs
        regulatory_reference: "21 CFR 312.32(c)(2); FDA Guidance: Sponsor Responsibilities (2025), Section IV.A"
    susar_study_type_check:
      type: condition
      variable: study_type
      operator: eq
      value: ba_be_ind_exempt
      true_next: susar_ba_be_exempt
      false_next: susar_15day
    susar_15day:
      type: return
      value:
        reporting_required: true
        report_type: IND_SAFETY_15DAY
        timeline_days: 15
        notification_recipients: FDA + all participating investigators + IRBs
        regulatory_reference: "21 CFR 312.32(c)(1); FDA Guidance: Sponsor Responsibilities (2025), Section IV.B"
    susar_ba_be_exempt:
      type: return
      value:
        reporting_required: true
        report_type: BA_BE_EXEMPT_SAFETY
        timeline_days: 15
        notification_recipients: FDA via ESG electronic submission
        regulatory_reference: "FDA Guidance: Electronic Submission of Expedited Safety Reports From IND-Exempt BA/BE Studies (2024)"
tests:
  - input:
      suspected_adverse_reaction: true
      serious: true
      unexpected: true
      fatal_or_life_threatening: true
      study_type: ind
    expect:
      reporting_required: true
      report_type: IND_SAFETY_7DAY
      timeline_days: 7
  - input:
      suspected_adverse_reaction: true
      serious: true
      unexpected: true
      fatal_or_life_threatening: false
      study_type: ind
    expect:
      reporting_required: true
      report_type: IND_SAFETY_15DAY
      timeline_days: 15
  - input:
      suspected_adverse_reaction: true
      serious: true
      unexpected: true
      fatal_or_life_threatening: false
      study_type: ba_be_ind_exempt
    expect:
      reporting_required: true
      report_type: BA_BE_EXEMPT_SAFETY
      timeline_days: 15
  - input:
      suspected_adverse_reaction: true
      serious: true
      unexpected: false
      fatal_or_life_threatening: false
    expect:
      reporting_required: false
      report_type: ANNUAL_REPORT
  - input:
      suspected_adverse_reaction: true
      serious: false
      unexpected: false
    expect:
      reporting_required: false
      report_type: ANNUAL_REPORT
  - input:
      suspected_adverse_reaction: false
      serious: true
      unexpected: true
    expect:
      reporting_required: false
      report_type: NONE
  - input: {}
    expect:
      reporting_required: false
      report_type: NONE
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - reporting_required
    - report_type
    - timeline_days
    - notification_recipients
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
