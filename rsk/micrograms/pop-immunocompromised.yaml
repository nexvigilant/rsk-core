# MICROGRAM++ (upgraded 2026-04-23)
name: pop-immunocompromised
version: 0.1.0
description: Immunocompromised — infection risk
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Pop Immunocompromised
  subtitle: Immunocompromised — infection risk
  icon: circle
  route: /vigilance/mg/pop-immunocompromised
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pop-immunocompromised
  cli: rsk mcg run pop-immunocompromised
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    at_risk:
      type: return
      value:
        population: immunocompromised
        action: special_monitoring
        reason: Immunocompromised — infection risk
        at_risk: true
    standard:
      type: return
      value:
        at_risk: false
        action: standard_care
        population: immunocompromised
    check:
      type: condition
      variable: cd4_count
      operator: lte
      value: 200
      true_next: at_risk
      false_next: standard
tests:
  - input:
      cd4_count: 200
    expect:
      at_risk: true
      population: immunocompromised
  - input: {}
    expect:
      population: immunocompromised
      at_risk: false
  - input:
      cd4_count: 0
    expect:
      population: immunocompromised
      action: special_monitoring
      at_risk: true
      reason: Immunocompromised — infection risk
  - input:
      cd4_count: -1
    expect:
      action: special_monitoring
      at_risk: true
      population: immunocompromised
      reason: Immunocompromised — infection risk
  - input:
      cd4_count: 199
    expect:
      at_risk: true
      population: immunocompromised
      action: special_monitoring
      reason: Immunocompromised — infection risk
  - input:
      cd4_count: 201
    expect:
      population: immunocompromised
      action: standard_care
      at_risk: false
  - input:
      cd4_count: 20000
    expect:
      population: immunocompromised
      at_risk: false
      action: standard_care
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
