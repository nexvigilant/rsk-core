# MICROGRAM++ (upgraded 2026-04-23)
name: cusum-monitor
version: 0.1.0
description: CUSUM (cumulative sum) control chart for sequential signal surveillance. Classifies monitoring state based on cumulative deviation from baseline and threshold breach.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: previous_cusum
    type: int
    required: false
    description: Cumulative sum from previous observation (scaled x100 for integer math)
  - name: threshold_h
    type: int
    required: false
    description: Decision threshold for shift detection (scaled x100)
  - name: current_value
    type: int
    required: false
    description: Current observed value (scaled x100)
  - name: baseline_mean
    type: int
    required: false
    description: Expected baseline mean (scaled x100)
outputs:
  - name: status
    type: string
  - name: action
    type: string
  - name: cusum_breached
    type: bool
interface:
  inputs:
    previous_cusum:
      type: int
      required: false
      description: Cumulative sum from previous observation (scaled x100 for integer math)
    threshold_h:
      type: int
      required: false
      description: Decision threshold for shift detection (scaled x100)
    current_value:
      type: int
      required: false
      description: Current observed value (scaled x100)
    baseline_mean:
      type: int
      required: false
      description: Expected baseline mean (scaled x100)
  outputs:
    status:
      type: string
    action:
      type: string
    cusum_breached:
      type: bool
ui:
  title: Cusum Monitor
  subtitle: CUSUM (cumulative sum) control chart for sequential signal surveillance. Classifies monitoring state based on cumulative deviation from baseline and threshold breach.
  icon: circle
  route: /vigilance/mg/cusum-monitor
  steps:
    - field: previous_cusum
      label: previous cusum
      help: Cumulative sum from previous observation (scaled x100 for integer math)
      widget: text
      placeholder: null
    - field: threshold_h
      label: threshold h
      help: Decision threshold for shift detection (scaled x100)
      widget: text
      placeholder: null
    - field: current_value
      label: current value
      help: Current observed value (scaled x100)
      widget: text
      placeholder: null
    - field: baseline_mean
      label: baseline mean
      help: Expected baseline mean (scaled x100)
      widget: text
      placeholder: null
  result:
    template: "status: {{status}} — action: {{action}} — cusum_breached: {{cusum_breached}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/cusum-monitor
  cli: rsk mcg run cusum-monitor
  auth: none
  rate_limit: 600/min
tree:
  start: check_breach
  nodes:
    check_breach:
      type: condition
      variable: previous_cusum
      operator: gt
      value: 0
      true_next: check_threshold
      false_next: check_elevated
    check_threshold:
      type: condition
      variable: previous_cusum
      operator: gte
      value: 500
      true_next: alert
      false_next: check_elevated
    check_elevated:
      type: condition
      variable: current_value
      operator: gt
      value: 150
      true_next: accumulating
      false_next: normal
    alert:
      type: return
      value:
        status: ALERT
        action: Shift detected — cumulative deviation exceeds threshold. Initiate signal review.
        cusum_breached: true
    accumulating:
      type: return
      value:
        status: ACCUMULATING
        action: Current value elevated above baseline. Continue monitoring and update cumulative sum.
        cusum_breached: false
    normal:
      type: return
      value:
        status: NORMAL
        action: No deviation detected. Routine monitoring continues.
        cusum_breached: false
tests:
  - name: CUSUM above threshold — ALERT
    input:
      previous_cusum: 550
      threshold_h: 500
      current_value: 200
      baseline_mean: 100
    expect:
      status: ALERT
      action: Shift detected — cumulative deviation exceeds threshold. Initiate signal review.
      cusum_breached: true
  - name: CUSUM at exact threshold — ALERT
    input:
      previous_cusum: 500
      threshold_h: 500
      current_value: 180
      baseline_mean: 100
    expect:
      status: ALERT
      action: Shift detected — cumulative deviation exceeds threshold. Initiate signal review.
      cusum_breached: true
  - name: CUSUM accumulating but below threshold with elevated value
    input:
      previous_cusum: 300
      threshold_h: 500
      current_value: 200
      baseline_mean: 100
    expect:
      status: ACCUMULATING
      action: Current value elevated above baseline. Continue monitoring and update cumulative sum.
      cusum_breached: false
  - name: CUSUM accumulating below threshold with normal value
    input:
      previous_cusum: 200
      threshold_h: 500
      current_value: 120
      baseline_mean: 100
    expect:
      status: NORMAL
      action: No deviation detected. Routine monitoring continues.
      cusum_breached: false
  - name: Zero CUSUM with elevated current value
    input:
      previous_cusum: 0
      threshold_h: 500
      current_value: 250
      baseline_mean: 100
    expect:
      status: ACCUMULATING
      action: Current value elevated above baseline. Continue monitoring and update cumulative sum.
      cusum_breached: false
  - name: Zero CUSUM with normal current value
    input:
      previous_cusum: 0
      threshold_h: 500
      current_value: 100
      baseline_mean: 100
    expect:
      status: NORMAL
      action: No deviation detected. Routine monitoring continues.
      cusum_breached: false
  - name: Very high CUSUM — well above threshold
    input:
      previous_cusum: 1200
      threshold_h: 500
      current_value: 300
      baseline_mean: 100
    expect:
      status: ALERT
      action: Shift detected — cumulative deviation exceeds threshold. Initiate signal review.
      cusum_breached: true
  - name: Negative current value — normal
    input:
      previous_cusum: 0
      threshold_h: 500
      current_value: -50
      baseline_mean: 100
    expect:
      status: NORMAL
      action: No deviation detected. Routine monitoring continues.
      cusum_breached: false
  - name: Null safety — empty input
    input: {}
    expect:
      status: NORMAL
      action: No deviation detected. Routine monitoring continues.
      cusum_breached: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - status
    - action
    - cusum_breached
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
