name: convergence-freq-bayes
description: "Frequentist+Bayesian agree"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "freq_bayes_agree"
      operator: "eq"
      value: true
      true_next: "converged"
      false_next: "divergent"
    converged:
      type: "return"
      value:
        convergence: "cross_paradigm"
        met: true
        action: "escalate"
    divergent:
      type: "return"
      value:
        convergence: "cross_paradigm"
        met: false
        action: "investigate_discrepancy"

tests:
  - input: {"freq_bayes_agree": true}
    expect: {"convergence": "cross_paradigm", "met": true}
  - input: {}
    expect: {"convergence": "cross_paradigm", "met": false}
