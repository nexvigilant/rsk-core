# MICROGRAM++ (upgraded 2026-04-23)
name: convergence-freq-bayes
version: 0.1.0
description: Frequentist+Bayesian agree
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Convergence Freq Bayes
  subtitle: Frequentist+Bayesian agree
  icon: circle
  route: /vigilance/mg/convergence-freq-bayes
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/convergence-freq-bayes
  cli: rsk mcg run convergence-freq-bayes
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: freq_bayes_agree
      operator: eq
      value: true
      true_next: converged
      false_next: divergent
    converged:
      type: return
      value:
        convergence: cross_paradigm
        met: true
        action: escalate
    divergent:
      type: return
      value:
        convergence: cross_paradigm
        met: false
        action: investigate_discrepancy
tests:
  - input:
      freq_bayes_agree: true
    expect:
      convergence: cross_paradigm
      met: true
  - input: {}
    expect:
      convergence: cross_paradigm
      met: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
