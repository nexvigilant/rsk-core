# MICROGRAM++ (upgraded 2026-04-23)
name: class-glp1-agonist
version: 0.1.0
description: "GLP-1 agonists class safety: Pancreatitis monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Glp1 Agonist
  subtitle: "GLP-1 agonists class safety: Pancreatitis monitoring"
  icon: circle
  route: /vigilance/mg/class-glp1-agonist
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-glp1-agonist
  cli: rsk mcg run class-glp1-agonist
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    safe:
      type: return
      value:
        concern: Pancreatitis
        alert: false
        action: continue
        drug_class: GLP-1 agonists
    check:
      type: condition
      variable: pancreatitis_risk
      operator: gte
      value: 2
      true_next: alert
      false_next: safe
    alert:
      type: return
      value:
        drug_class: GLP-1 agonists
        concern: Pancreatitis
        alert: true
        action: class_effect_investigation
tests:
  - input:
      pancreatitis_risk: 2
    expect:
      drug_class: GLP-1 agonists
      alert: true
  - input: {}
    expect:
      drug_class: GLP-1 agonists
      alert: false
  - input:
      pancreatitis_risk: 0
    expect:
      drug_class: GLP-1 agonists
      alert: false
      concern: Pancreatitis
      action: continue
  - input:
      pancreatitis_risk: -1
    expect:
      concern: Pancreatitis
      drug_class: GLP-1 agonists
      alert: false
      action: continue
  - input:
      pancreatitis_risk: 1
    expect:
      alert: false
      drug_class: GLP-1 agonists
      concern: Pancreatitis
      action: continue
  - input:
      pancreatitis_risk: 3
    expect:
      drug_class: GLP-1 agonists
      concern: Pancreatitis
      alert: true
      action: class_effect_investigation
  - input:
      pancreatitis_risk: 200
    expect:
      alert: true
      action: class_effect_investigation
      concern: Pancreatitis
      drug_class: GLP-1 agonists
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
