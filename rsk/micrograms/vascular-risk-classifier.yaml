# MICROGRAM++ (upgraded 2026-04-23)
name: vascular-risk-classifier
version: 0.1.0
description: "Vascular safety classifier: maps circulatory adverse reactions to severity grades for thromboembolism, hemorrhage, and vascular disorders"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reaction_pt
    type: string
    required: true
    description: MedDRA preferred term for the vascular reaction
outputs:
  - name: severity
    type: string
  - name: soc
    type: string
  - name: action
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    reaction_pt:
      type: string
      required: true
      description: MedDRA preferred term for the vascular reaction
  outputs:
    severity:
      type: string
      description: critical | serious | moderate | mild
    soc:
      type: string
    action:
      type: string
    regulatory_reference:
      type: string
ui:
  title: Vascular Risk Classifier
  subtitle: "Vascular safety classifier: maps circulatory adverse reactions to severity grades for thromboembolism, hemorrhage, and vascular disorders"
  icon: circle
  route: /vigilance/mg/vascular-risk-classifier
  steps:
    - field: reaction_pt
      label: reaction pt
      help: MedDRA preferred term for the vascular reaction
      widget: text
      placeholder: null
  result:
    template: "severity: {{severity}} — soc: {{soc}} — action: {{action}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/vascular-risk-classifier
  cli: rsk mcg run vascular-risk-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_pe
  nodes:
    check_pe:
      type: condition
      variable: reaction_pt
      operator: contains
      value: PULMONARY EMBOLISM
      true_next: critical
      false_next: check_dvt
    check_dvt:
      type: condition
      variable: reaction_pt
      operator: contains
      value: DEEP VEIN THROMBOSIS
      true_next: serious
      false_next: check_stroke
    check_stroke:
      type: condition
      variable: reaction_pt
      operator: contains
      value: CEREBROVASCULAR ACCIDENT
      true_next: critical
      false_next: check_haemorrhage
    check_haemorrhage:
      type: condition
      variable: reaction_pt
      operator: contains
      value: HAEMORRHAGE
      true_next: serious
      false_next: check_thrombosis
    check_thrombosis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: THROMBOSIS
      true_next: serious
      false_next: check_hypertension
    check_hypertension:
      type: condition
      variable: reaction_pt
      operator: contains
      value: HYPERTENSION
      true_next: moderate
      false_next: mild
    critical:
      type: return
      value:
        severity: critical
        soc: Vascular disorders
        action: immediate_expedited_report
        regulatory_reference: ICH E2D
    serious:
      type: return
      value:
        severity: serious
        soc: Vascular disorders
        action: expedited_report
        regulatory_reference: ICH E2D
    moderate:
      type: return
      value:
        severity: moderate
        soc: Vascular disorders
        action: monitor_and_assess
        regulatory_reference: ICH E2B
    mild:
      type: return
      value:
        severity: mild
        soc: Vascular disorders
        action: routine_surveillance
        regulatory_reference: ICH E2B
tests:
  - name: pulmonary_embolism
    input:
      reaction_pt: PULMONARY EMBOLISM
    expect:
      severity: critical
  - name: dvt
    input:
      reaction_pt: DEEP VEIN THROMBOSIS
    expect:
      severity: serious
  - name: stroke
    input:
      reaction_pt: CEREBROVASCULAR ACCIDENT
    expect:
      severity: critical
  - name: gi_haemorrhage
    input:
      reaction_pt: GASTROINTESTINAL HAEMORRHAGE
    expect:
      severity: serious
  - name: hypertension
    input:
      reaction_pt: HYPERTENSION
    expect:
      severity: moderate
  - name: mild_bruising
    input:
      reaction_pt: ECCHYMOSIS
    expect:
      severity: mild
  - name: null_safety
    input: {}
    expect:
      severity: mild
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - severity
    - soc
    - action
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
