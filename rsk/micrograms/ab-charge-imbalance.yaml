# MICROGRAM++ (upgraded 2026-04-23)
name: ab-charge-imbalance
version: 0.2.0
description: "Antibody: detects charge imbalance in reaction (prima-chem conservation). Input is pre-computed charge_delta = charge_after - charge_before."
family: antibody.chemistry
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - antibody
  - conservation
  - chemistry
inputs:
  - name: charge_delta
    type: number
    required: true
    description: charge_after - charge_before (0 = conserved)
outputs:
  - name: threat
    type: boolean
  - name: response
    type: string
interface:
  inputs:
    charge_delta:
      type: number
      required: true
      description: charge_after - charge_before (0 = conserved)
  outputs:
    threat:
      type: boolean
    response:
      type: string
ui:
  title: Charge Imbalance
  subtitle: "Antibody: detects charge imbalance in reaction (prima-chem conservation). Input is pre-computed charge_delta = charge_after - charge_before."
  icon: shield
  route: /vigilance/mg/ab-charge-imbalance
  steps:
    - field: charge_delta
      label: charge delta
      help: charge_after - charge_before (0 = conserved)
      widget: number
      placeholder: null
  result:
    template: "threat: {{threat}} — response: {{response}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ab-charge-imbalance
  cli: rsk mcg run ab-charge-imbalance
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: charge_delta
      operator: eq
      value: 0
      true_next: clean
      false_next: violation
    violation:
      type: return
      value:
        threat: true
        response: "BLOCK: charge not conserved across reaction"
    clean:
      type: return
      value:
        threat: false
        response: PASS
tests:
  - input:
      charge_delta: 0
    expect:
      threat: false
  - input:
      charge_delta: 1
    expect:
      threat: true
  - input:
      charge_delta: -1
    expect:
      threat: true
  - input:
      charge_delta: 3
    expect:
      threat: true
  - input: {}
    expect:
      response: "BLOCK: charge not conserved across reaction"
      threat: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - threat
    - response
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: antibody.chemistry
  log_level: info
governance:
  sop_ref: SOP-CHEM-001
  regulatory_ref: []
  harm_types:
    - F
  review_cadence: quarterly
  tov_axioms:
    - conservation
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
