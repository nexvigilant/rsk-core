name: ich-e6-gate
description: "ICH E6 compliance: Good Clinical Practice"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "gcp_compliant"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH E6"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH E6"
        compliant: false
        action: "remediate"
        gap: "gcp_compliant"

tests:
  - input: {"gcp_compliant": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
