name: ndc-validator
description: "Validate NDC format and determine padding requirements"
version: 0.1.0

tree:
  start: validate_ndc_format
  nodes:
    validate_ndc_format:
      type: condition
      variable: ndc_format
      operator: is_not_null
      true_next: validate_digit_count
      false_next: missing_input

    validate_digit_count:
      type: condition
      variable: digit_count
      operator: gte
      value: 10
      true_next: check_digit_count_max
      false_next: invalid_format

    check_digit_count_max:
      type: condition
      variable: digit_count
      operator: lte
      value: 11
      true_next: classify_ndc_format
      false_next: invalid_format

    classify_ndc_format:
      type: condition
      variable: ndc_format
      operator: matches
      value: "(?i)^4-4-2$"
      true_next: format_4_4_2
      false_next: check_5_3_2

    check_5_3_2:
      type: condition
      variable: ndc_format
      operator: matches
      value: "(?i)^5-3-2$"
      true_next: format_5_3_2
      false_next: check_5_4_1

    check_5_4_1:
      type: condition
      variable: ndc_format
      operator: matches
      value: "(?i)^5-4-1$"
      true_next: format_5_4_1
      false_next: check_5_4_2

    check_5_4_2:
      type: condition
      variable: ndc_format
      operator: matches
      value: "(?i)^5-4-2$"
      true_next: format_5_4_2
      false_next: invalid_ndc_type

    format_4_4_2:
      type: return
      value:
        valid_format: true
        ndc_type: "4-4-2"
        needs_padding: true

    format_5_3_2:
      type: return
      value:
        valid_format: true
        ndc_type: "5-3-2"
        needs_padding: true

    format_5_4_1:
      type: return
      value:
        valid_format: true
        ndc_type: "5-4-1"
        needs_padding: true

    format_5_4_2:
      type: return
      value:
        valid_format: true
        ndc_type: "5-4-2"
        needs_padding: false

    invalid_ndc_type:
      type: return
      value:
        valid_format: false
        ndc_type: null
        needs_padding: false

    invalid_format:
      type: return
      value:
        valid_format: false
        ndc_type: null
        needs_padding: false

    missing_input:
      type: return
      value:
        valid_format: false
        ndc_type: null
        needs_padding: false

tests:
  - input: { ndc_format: "4-4-2", digit_count: 10 }
    expect: { valid_format: true, ndc_type: "4-4-2", needs_padding: true }

  - input: { ndc_format: "5-3-2", digit_count: 10 }
    expect: { valid_format: true, ndc_type: "5-3-2", needs_padding: true }

  - input: { ndc_format: "5-4-1", digit_count: 10 }
    expect: { valid_format: true, ndc_type: "5-4-1", needs_padding: true }

  - input: { ndc_format: "5-4-2", digit_count: 11 }
    expect: { valid_format: true, ndc_type: "5-4-2", needs_padding: false }

  - input: { ndc_format: "3-3-3", digit_count: 9 }
    expect: { valid_format: false, ndc_type: null, needs_padding: false }

  - input: { ndc_format: null, digit_count: 10 }
    expect: { valid_format: false, ndc_type: null, needs_padding: false }
