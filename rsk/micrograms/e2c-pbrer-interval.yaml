# MICROGRAM++ (upgraded 2026-04-23)
name: e2c-pbrer-interval
version: 0.1.0
description: "ICH E2C(R2) Section 2: Determines PBRER reporting interval based on product lifecycle stage, approval duration, and risk management requirements"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: years_since_approval
    type: number
    required: true
    description: ""
  - name: renewal_granted
    type: bool
    required: false
    description: ""
  - name: risk_management_plan_required
    type: bool
    required: false
    description: ""
outputs:
  - name: interval_months
    type: number
  - name: regulatory_reference
    type: string
interface:
  inputs:
    years_since_approval:
      type: number
      required: true
    renewal_granted:
      type: bool
      required: false
    risk_management_plan_required:
      type: bool
      required: false
  outputs:
    interval_months:
      type: number
    regulatory_reference:
      type: string
ui:
  title: E2c Pbrer Interval
  subtitle: "ICH E2C(R2) Section 2: Determines PBRER reporting interval based on product lifecycle stage, approval duration, and risk management requirements"
  icon: circle
  route: /vigilance/mg/e2c-pbrer-interval
  steps:
    - field: years_since_approval
      label: years since approval
      help: Enter years_since_approval
      widget: number
      placeholder: null
    - field: renewal_granted
      label: renewal granted
      help: Enter renewal_granted
      widget: toggle
      placeholder: null
    - field: risk_management_plan_required
      label: risk management plan required
      help: Enter risk_management_plan_required
      widget: toggle
      placeholder: null
  result:
    template: "interval_months: {{interval_months}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2c-pbrer-interval
  cli: rsk mcg run e2c-pbrer-interval
  auth: none
  rate_limit: 600/min
tree:
  start: check_years_lt_2
  nodes:
    check_years_lt_2:
      type: condition
      variable: years_since_approval
      operator: lt
      value: 2
      true_next: check_rmp_6
      false_next: check_years_lt_5
    check_years_lt_5:
      type: condition
      variable: years_since_approval
      operator: lt
      value: 5
      true_next: check_rmp_12
      false_next: check_renewal
    check_renewal:
      type: condition
      variable: renewal_granted
      operator: eq
      value: true
      true_next: check_rmp_36
      false_next: check_rmp_12
    check_rmp_6:
      type: condition
      variable: risk_management_plan_required
      operator: eq
      value: true
      true_next: return_6
      false_next: return_6
    check_rmp_12:
      type: condition
      variable: risk_management_plan_required
      operator: eq
      value: true
      true_next: return_12_rmp
      false_next: return_12
    check_rmp_36:
      type: condition
      variable: risk_management_plan_required
      operator: eq
      value: true
      true_next: return_12_rmp
      false_next: return_36
    return_6:
      type: return
      value:
        interval_months: 6
        regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
    return_12:
      type: return
      value:
        interval_months: 12
        regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
    return_12_rmp:
      type: return
      value:
        interval_months: 12
        regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
    return_36:
      type: return
      value:
        interval_months: 36
        regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
tests:
  - input:
      years_since_approval: 1
      renewal_granted: false
      risk_management_plan_required: false
    expect:
      interval_months: 6
      regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
  - input:
      years_since_approval: 3
      renewal_granted: false
      risk_management_plan_required: false
    expect:
      interval_months: 12
      regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
  - input:
      years_since_approval: 7
      renewal_granted: false
      risk_management_plan_required: false
    expect:
      interval_months: 12
      regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
  - input:
      years_since_approval: 7
      renewal_granted: true
      risk_management_plan_required: false
    expect:
      interval_months: 36
      regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
  - input:
      years_since_approval: 7
      renewal_granted: true
      risk_management_plan_required: true
    expect:
      interval_months: 12
      regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
  - input:
      years_since_approval: 0.5
      renewal_granted: false
      risk_management_plan_required: true
    expect:
      interval_months: 6
      regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
  - input:
      years_since_approval: 4
      renewal_granted: false
      risk_management_plan_required: true
    expect:
      interval_months: 12
      regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
  - input: {}
    expect:
      interval_months: 12
      regulatory_reference: ICH E2C(R2) Section 2 - Reporting Interval
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - interval_months
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
