name: tox-immunological
description: "Immunological toxicity: lymphocyte threshold"
version: 0.1.0

tree:
  start: check_severe
  nodes:
    check_severe:
      type: condition
      variable: lymphocyte_pct
      operator: lte
      value: 20
      true_next: severe
      false_next: check_mild
    check_mild:
      type: condition
      variable: lymphocyte_pct
      operator: lte
      value: 50
      true_next: mild
      false_next: normal
    severe:
      type: return
      value:
        organ: "immunological"
        severity: "severe"
        action: "discontinue"
    mild:
      type: return
      value:
        organ: "immunological"
        severity: "mild"
        action: "monitor_closely"
    normal:
      type: return
      value:
        organ: "immunological"
        severity: "normal"
        action: "continue"

tests:
  - input: {lymphocyte_pct: -80}
    expect: {severity: "severe", action: "discontinue"}
  - input: {lymphocyte_pct: 50}
    expect: {severity: "mild", action: "monitor_closely"}
  - input: {lymphocyte_pct: 1050}
    expect: {severity: "normal", action: "continue"}
  - input: {}
    expect: {severity: "normal", action: "continue"}
