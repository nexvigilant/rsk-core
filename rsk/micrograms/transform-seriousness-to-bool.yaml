# MICROGRAM++ (upgraded 2026-04-23)
name: transform-seriousness-to-bool
version: 0.2.0
description: "Transform: decomposes case-seriousness string + criterion into boolean flags (serious, fatal, life_threatening) for downstream mcgs"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: seriousness
    type: string
    required: true
    description: ""
  - name: criterion
    type: string
    required: false
    description: ""
outputs:
  - name: serious
    type: bool
  - name: serious_ae
    type: bool
  - name: fatal
    type: bool
  - name: is_life_threatening
    type: bool
  - name: source
    type: string
interface:
  inputs:
    seriousness:
      type: string
      required: true
    criterion:
      type: string
      required: false
  outputs:
    serious:
      type: bool
    serious_ae:
      type: bool
    fatal:
      type: bool
    is_life_threatening:
      type: bool
    source:
      type: string
ui:
  title: Transform Seriousness To Bool
  subtitle: "Transform: decomposes case-seriousness string + criterion into boolean flags (serious, fatal, life_threatening) for downstream mcgs"
  icon: circle
  route: /vigilance/mg/transform-seriousness-to-bool
  steps:
    - field: seriousness
      label: seriousness
      help: Enter seriousness
      widget: text
      placeholder: null
    - field: criterion
      label: criterion
      help: Enter criterion
      widget: text
      placeholder: null
  result:
    template: "serious: {{serious}} — serious_ae: {{serious_ae}} — fatal: {{fatal}} — is_life_threatening: {{is_life_threatening}} — source: {{source}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/transform-seriousness-to-bool
  cli: rsk mcg run transform-seriousness-to-bool
  auth: none
  rate_limit: 600/min
tree:
  start: check_serious
  nodes:
    check_serious:
      type: condition
      variable: seriousness
      operator: eq
      value: SERIOUS
      true_next: check_death
      false_next: not_serious
    check_death:
      type: condition
      variable: criterion
      operator: eq
      value: DEATH
      true_next: serious_fatal
      false_next: check_lt
    check_lt:
      type: condition
      variable: criterion
      operator: eq
      value: LIFE_THREATENING
      true_next: serious_lt
      false_next: serious_other
    serious_fatal:
      type: return
      value:
        serious: true
        serious_ae: true
        fatal: true
        is_life_threatening: false
        source: case-seriousness
    serious_lt:
      type: return
      value:
        serious: true
        serious_ae: true
        fatal: false
        is_life_threatening: true
        source: case-seriousness
    serious_other:
      type: return
      value:
        serious: true
        serious_ae: true
        fatal: false
        is_life_threatening: false
        source: case-seriousness
    not_serious:
      type: return
      value:
        serious: false
        serious_ae: false
        fatal: false
        is_life_threatening: false
        source: case-seriousness
tests:
  - input:
      seriousness: SERIOUS
      criterion: DEATH
    expect:
      serious: true
      serious_ae: true
      fatal: true
      is_life_threatening: false
      source: case-seriousness
  - input:
      seriousness: SERIOUS
      criterion: LIFE_THREATENING
    expect:
      serious: true
      serious_ae: true
      fatal: false
      is_life_threatening: true
      source: case-seriousness
  - input:
      seriousness: SERIOUS
      criterion: HOSPITALIZATION
    expect:
      serious: true
      serious_ae: true
      fatal: false
      is_life_threatening: false
      source: case-seriousness
  - input:
      seriousness: SERIOUS
      criterion: CONGENITAL_ANOMALY
    expect:
      serious: true
      serious_ae: true
      fatal: false
      is_life_threatening: false
      source: case-seriousness
  - input:
      seriousness: NON-SERIOUS
    expect:
      serious: false
      serious_ae: false
      fatal: false
      is_life_threatening: false
      source: case-seriousness
  - input: {}
    expect:
      serious: false
      serious_ae: false
      fatal: false
      is_life_threatening: false
      source: case-seriousness
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - serious
    - serious_ae
    - fatal
    - is_life_threatening
    - source
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
