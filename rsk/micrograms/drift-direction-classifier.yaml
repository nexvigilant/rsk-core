# MICROGRAM++ (upgraded 2026-04-23)
name: drift-direction-classifier
version: 0.1.0
description: "Signal drift direction classifier: determines whether a signal metric is rising, falling, or stable based on percentage change"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: change_pct
    type: number
    required: true
    description: Percentage change in signal metric (positive = increase, negative = decrease)
outputs:
  - name: direction
    type: string
  - name: traffic_level
    type: string
interface:
  inputs:
    change_pct:
      type: number
      required: true
      description: Percentage change in signal metric (positive = increase, negative = decrease)
  outputs:
    direction:
      type: string
    traffic_level:
      type: string
ui:
  title: Drift Direction Classifier
  subtitle: "Signal drift direction classifier: determines whether a signal metric is rising, falling, or stable based on percentage change"
  icon: circle
  route: /vigilance/mg/drift-direction-classifier
  steps:
    - field: change_pct
      label: change pct
      help: Percentage change in signal metric (positive = increase, negative = decrease)
      widget: number
      placeholder: null
  result:
    template: "direction: {{direction}} — traffic_level: {{traffic_level}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drift-direction-classifier
  cli: rsk mcg run drift-direction-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_rising
  nodes:
    check_rising:
      type: condition
      variable: change_pct
      operator: gt
      value: 5
      true_next: rising
      false_next: check_falling
    check_falling:
      type: condition
      variable: change_pct
      operator: lt
      value: -5
      true_next: falling
      false_next: stable
    rising:
      type: return
      value:
        direction: rising
        traffic_level: red
    falling:
      type: return
      value:
        direction: falling
        traffic_level: green
    stable:
      type: return
      value:
        direction: stable
        traffic_level: green
tests:
  - input:
      change_pct: 15
    expect:
      direction: rising
      traffic_level: red
  - input:
      change_pct: -10
    expect:
      direction: falling
      traffic_level: green
  - input:
      change_pct: 3
    expect:
      direction: stable
      traffic_level: green
  - input:
      change_pct: 5
    expect:
      direction: stable
      traffic_level: green
  - input:
      change_pct: -5
    expect:
      direction: stable
      traffic_level: green
  - input:
      change_pct: 5.1
    expect:
      direction: rising
      traffic_level: red
  - input:
      change_pct: -5.1
    expect:
      direction: falling
      traffic_level: green
  - input:
      change_pct: 0
    expect:
      direction: stable
      traffic_level: green
  - input:
      change_pct: 80
    expect:
      direction: rising
      traffic_level: red
  - input: {}
    expect:
      direction: stable
      traffic_level: green
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - direction
    - traffic_level
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
