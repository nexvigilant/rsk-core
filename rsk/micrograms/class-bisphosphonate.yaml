  nodes:
    alert:
      type: return
      value:
        action: class_effect_investigation
        concern: Osteonecrosis of jaw
        alert: true
        drug_class: Bisphosphonates
    safe:
      type: return
      value:
        drug_class: Bisphosphonates
        alert: false
        concern: Osteonecrosis of jaw
        action: continue
    check:
