# MICROGRAM++ (upgraded 2026-04-23)
name: timeline-us-7day
version: 0.1.0
description: US 7-day alert report
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Timeline Us 7day
  subtitle: US 7-day alert report
  icon: circle
  route: /vigilance/mg/timeline-us-7day
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/timeline-us-7day
  cli: rsk mcg run timeline-us-7day
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: days_to_deadline
      operator: lte
      value: 7
      true_next: due
      false_next: not_due
    due:
      type: return
      value:
        report_type: alert
        due: true
        action: submit
        jurisdiction: US
    not_due:
      type: return
      value:
        jurisdiction: US
        due: false
        action: schedule
        report_type: alert
tests:
  - input:
      days_to_deadline: 7
    expect:
      jurisdiction: US
      due: true
  - input: {}
    expect:
      jurisdiction: US
      due: false
  - input:
      days_to_deadline: 0
    expect:
      report_type: alert
      jurisdiction: US
      action: submit
      due: true
  - input:
      days_to_deadline: -1
    expect:
      report_type: alert
      jurisdiction: US
      action: submit
      due: true
  - input:
      days_to_deadline: 6
    expect:
      due: true
      report_type: alert
      action: submit
      jurisdiction: US
  - input:
      days_to_deadline: 8
    expect:
      action: schedule
      jurisdiction: US
      report_type: alert
      due: false
  - input:
      days_to_deadline: 700
    expect:
      jurisdiction: US
      due: false
      action: schedule
      report_type: alert
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
