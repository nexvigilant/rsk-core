# MICROGRAM++ (upgraded 2026-04-23)
name: ich-e6-gcp-compliance
version: 0.1.0
description: "ICH E6: Good Clinical Practice compliance check for trial governance"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Ich E6 Gcp Compliance
  subtitle: "ICH E6: Good Clinical Practice compliance check for trial governance"
  icon: circle
  route: /vigilance/mg/ich-e6-gcp-compliance
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ich-e6-gcp-compliance
  cli: rsk mcg run ich-e6-gcp-compliance
  auth: none
  rate_limit: 600/min
tree:
  start: validate_informed_consent
  nodes:
    validate_informed_consent:
      type: condition
      variable: informed_consent_obtained
      operator: eq
      value: true
      true_next: validate_protocol_approval
      false_next: non_compliant_consent
    validate_protocol_approval:
      type: condition
      variable: protocol_approved_by_irb
      operator: eq
      value: true
      true_next: validate_safety_monitoring
      false_next: non_compliant_approval
    validate_safety_monitoring:
      type: condition
      variable: safety_monitoring_board_established
      operator: eq
      value: true
      true_next: validate_data_integrity
      false_next: non_compliant_monitoring
    validate_data_integrity:
      type: condition
      variable: data_integrity_procedures_in_place
      operator: eq
      value: true
      true_next: compliant
      false_next: non_compliant_data
    compliant:
      type: return
      value:
        gcp_compliance_status: compliant
        major_violations: 0
        action_required: false
        ich_e6_compliant: true
        audit_level: routine
    non_compliant_consent:
      type: return
      value:
        gcp_compliance_status: non_compliant
        violation_type: informed_consent_missing
        major_violations: 1
        action_required: true
        ich_e6_compliant: false
        audit_level: critical
    non_compliant_approval:
      type: return
      value:
        gcp_compliance_status: non_compliant
        violation_type: protocol_approval_missing
        major_violations: 1
        action_required: true
        ich_e6_compliant: false
        audit_level: critical
    non_compliant_monitoring:
      type: return
      value:
        gcp_compliance_status: non_compliant
        violation_type: safety_monitoring_missing
        major_violations: 1
        action_required: true
        ich_e6_compliant: false
        audit_level: major
    non_compliant_data:
      type: return
      value:
        gcp_compliance_status: non_compliant
        violation_type: data_integrity_missing
        major_violations: 1
        action_required: true
        ich_e6_compliant: false
        audit_level: major
tests:
  - input:
      informed_consent_obtained: true
      protocol_approved_by_irb: true
      safety_monitoring_board_established: true
      data_integrity_procedures_in_place: true
    expect:
      gcp_compliance_status: compliant
      major_violations: 0
  - input:
      informed_consent_obtained: false
      protocol_approved_by_irb: true
      safety_monitoring_board_established: true
      data_integrity_procedures_in_place: true
    expect:
      gcp_compliance_status: non_compliant
      violation_type: informed_consent_missing
  - input:
      informed_consent_obtained: true
      protocol_approved_by_irb: true
      safety_monitoring_board_established: false
    expect:
      gcp_compliance_status: non_compliant
      violation_type: safety_monitoring_missing
  - input: {}
    expect:
      gcp_compliance_status: non_compliant
      ich_e6_compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
