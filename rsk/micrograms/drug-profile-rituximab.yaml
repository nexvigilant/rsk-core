name: drug-profile-rituximab
description: 'Safety triage for rituximab: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
    no_signal:
      type: return
      value:
        signal: false
        action: monitor
        drug: rituximab
        expected_prr: 6.2
        harm_type: B
    signal:
      type: return
      value:
        drug: rituximab
        harm_type: B
        signal: true
        action: investigate
        expected_prr: 6.2
tests:
- input:
    prr: 6.2
  expect:
    drug: rituximab
    signal: true
- input:
    prr: 0.5
  expect:
    signal: false
    drug: rituximab
- input: {}
  expect:
    drug: rituximab
    signal: false
- input:
    prr: 4.999
  expect:
    drug: rituximab
    harm_type: B
    expected_prr: 6.2
    signal: false
    action: monitor
- input:
    prr: 5.001
  expect:
    expected_prr: 6.2
    signal: true
    drug: rituximab
    harm_type: B
    action: investigate
interface: null
primitive_signature: null
