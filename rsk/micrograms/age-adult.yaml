# MICROGRAM++ (upgraded 2026-04-23)
name: age-adult
version: 0.1.0
description: Adult age classifier. Identifies subjects aged 18-64 years.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Age Adult
  subtitle: Adult age classifier. Identifies subjects aged 18-64 years.
  icon: circle
  route: /vigilance/mg/age-adult
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/age-adult
  cli: rsk mcg run age-adult
  auth: none
  rate_limit: 600/min
tree:
  start: check_lower_bound
  nodes:
    check_lower_bound:
      type: condition
      variable: age_years
      operator: gte
      value: 18
      true_next: check_upper_bound
      false_next: not_adult
    check_upper_bound:
      type: condition
      variable: age_years
      operator: lte
      value: 64
      true_next: is_adult
      false_next: not_adult
    is_adult:
      type: return
      value:
        age_group: adult
        age_range: 18-64 years
        category: working_age
        normal_dosing: true
    not_adult:
      type: return
      value:
        age_group: other
        is_adult: false
tests:
  - input:
      age_years: 35
    expect:
      age_group: adult
      category: working_age
  - input:
      age_years: 18
    expect:
      age_group: adult
  - input:
      age_years: 64
    expect:
      age_group: adult
  - input:
      age_years: 65
    expect:
      age_group: other
      is_adult: false
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
