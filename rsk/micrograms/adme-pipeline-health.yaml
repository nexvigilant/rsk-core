# MICROGRAM++ (upgraded 2026-04-23)
name: adme-pipeline-health
version: 0.1.0
description: Diagnose PV signal pipeline health using ADME pharmacokinetic primitives. Maps Absorb (intake), Distribute (triage), Metabolize (computation), Excrete (action) to pipeline stages and returns the failing primitive with fix guidance.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: absorb_ok
    type: bool
    required: true
    description: Data sources responding and returning results
  - name: distribute_ok
    type: bool
    required: true
    description: Triage/routing classifying cases to correct queues
  - name: metabolize_ok
    type: bool
    required: true
    description: Signal detection producing correct disproportionality scores
  - name: excrete_ok
    type: bool
    required: true
    description: Regulatory actions being generated from confirmed signals
outputs:
  - name: pipeline_health
    type: string
  - name: failing_primitive
    type: string
  - name: adme_stage
    type: string
  - name: recommendation
    type: string
  - name: healthy_count
    type: int
interface:
  inputs:
    absorb_ok:
      type: bool
      required: true
      description: Data sources responding and returning results
    distribute_ok:
      type: bool
      required: true
      description: Triage/routing classifying cases to correct queues
    metabolize_ok:
      type: bool
      required: true
      description: Signal detection producing correct disproportionality scores
    excrete_ok:
      type: bool
      required: true
      description: Regulatory actions being generated from confirmed signals
  outputs:
    pipeline_health:
      type: string
    failing_primitive:
      type: string
    adme_stage:
      type: string
    recommendation:
      type: string
    healthy_count:
      type: int
ui:
  title: Adme Pipeline Health
  subtitle: Diagnose PV signal pipeline health using ADME pharmacokinetic primitives. Maps Absorb (intake), Distribute (triage), Metabolize (computation), Excrete (action) to pipeline stages and returns the failing primitive with fix guidance.
  icon: circle
  route: /vigilance/mg/adme-pipeline-health
  steps:
    - field: absorb_ok
      label: absorb ok
      help: Data sources responding and returning results
      widget: toggle
      placeholder: null
    - field: distribute_ok
      label: distribute ok
      help: Triage/routing classifying cases to correct queues
      widget: toggle
      placeholder: null
    - field: metabolize_ok
      label: metabolize ok
      help: Signal detection producing correct disproportionality scores
      widget: toggle
      placeholder: null
    - field: excrete_ok
      label: excrete ok
      help: Regulatory actions being generated from confirmed signals
      widget: toggle
      placeholder: null
  result:
    template: "pipeline_health: {{pipeline_health}} — failing_primitive: {{failing_primitive}} — adme_stage: {{adme_stage}} — recommendation: {{recommendation}} — healthy_count: {{healthy_count}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/adme-pipeline-health
  cli: rsk mcg run adme-pipeline-health
  auth: none
  rate_limit: 600/min
tree:
  start: check_absorb
  nodes:
    check_absorb:
      type: condition
      variable: absorb_ok
      operator: neq
      value: true
      true_next: absorb_failure
      false_next: check_distribute
    absorb_failure:
      type: return
      value:
        pipeline_health: IMPAIRED
        failing_primitive: Absorb
        adme_stage: absorption
        recommendation: Data intake boundary failure — check FAERS/DailyMed/PubMed connectivity and query parameters
        healthy_count: 0
    check_distribute:
      type: condition
      variable: distribute_ok
      operator: neq
      value: true
      true_next: distribute_failure
      false_next: check_metabolize
    distribute_failure:
      type: return
      value:
        pipeline_health: IMPAIRED
        failing_primitive: Distribute
        adme_stage: distribution
        recommendation: Triage routing failure — cases not reaching correct analysis queues. Check case-validity and triage classifiers
        healthy_count: 1
    check_metabolize:
      type: condition
      variable: metabolize_ok
      operator: neq
      value: true
      true_next: metabolize_failure
      false_next: check_excrete
    metabolize_failure:
      type: return
      value:
        pipeline_health: IMPAIRED
        failing_primitive: Metabolize
        adme_stage: metabolism
        recommendation: Signal computation failure — PRR/ROR/IC/EBGM producing incorrect results. Check 2x2 table inputs and statistical thresholds
        healthy_count: 2
    check_excrete:
      type: condition
      variable: excrete_ok
      operator: neq
      value: true
      true_next: excrete_failure
      false_next: all_healthy
    excrete_failure:
      type: return
      value:
        pipeline_health: IMPAIRED
        failing_primitive: Excrete
        adme_stage: excretion
        recommendation: Regulatory action generation failure — confirmed signals not producing actions. Check causality-to-action routing and deadline computation
        healthy_count: 3
    all_healthy:
      type: return
      value:
        pipeline_health: HEALTHY
        failing_primitive: none
        adme_stage: all
        recommendation: All ADME stages operational
        healthy_count: 4
tests:
  - name: all healthy
    input:
      absorb_ok: true
      distribute_ok: true
      metabolize_ok: true
      excrete_ok: true
    expect:
      pipeline_health: HEALTHY
      failing_primitive: none
      healthy_count: 4
  - name: absorb failure — data sources down
    input:
      absorb_ok: false
      distribute_ok: true
      metabolize_ok: true
      excrete_ok: true
    expect:
      pipeline_health: IMPAIRED
      failing_primitive: Absorb
      adme_stage: absorption
      healthy_count: 0
  - name: distribute failure — triage broken
    input:
      absorb_ok: true
      distribute_ok: false
      metabolize_ok: true
      excrete_ok: true
    expect:
      pipeline_health: IMPAIRED
      failing_primitive: Distribute
      adme_stage: distribution
      healthy_count: 1
  - name: metabolize failure — computation wrong
    input:
      absorb_ok: true
      distribute_ok: true
      metabolize_ok: false
      excrete_ok: true
    expect:
      pipeline_health: IMPAIRED
      failing_primitive: Metabolize
      adme_stage: metabolism
      healthy_count: 2
  - name: excrete failure — no actions generated
    input:
      absorb_ok: true
      distribute_ok: true
      metabolize_ok: true
      excrete_ok: false
    expect:
      pipeline_health: IMPAIRED
      failing_primitive: Excrete
      adme_stage: excretion
      healthy_count: 3
  - name: first failure wins — absorb blocks everything
    input:
      absorb_ok: false
      distribute_ok: false
      metabolize_ok: false
      excrete_ok: false
    expect:
      pipeline_health: IMPAIRED
      failing_primitive: Absorb
      healthy_count: 0
  - name: null safety — missing inputs treated as failure
    input: {}
    expect:
      pipeline_health: IMPAIRED
      failing_primitive: Absorb
      healthy_count: 0
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - pipeline_health
    - failing_primitive
    - adme_stage
    - recommendation
    - healthy_count
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
