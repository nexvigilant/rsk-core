# MICROGRAM++ (upgraded 2026-04-23)
name: psur-benefit-risk-conclusion
version: 0.1.0
description: Formulate benefit-risk conclusion for PSUR reporting
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Psur Benefit Risk Conclusion
  subtitle: Formulate benefit-risk conclusion for PSUR reporting
  icon: circle
  route: /vigilance/mg/psur-benefit-risk-conclusion
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/psur-benefit-risk-conclusion
  cli: rsk mcg run psur-benefit-risk-conclusion
  auth: none
  rate_limit: 600/min
tree:
  start: validate_br_assessment
  nodes:
    validate_br_assessment:
      type: condition
      variable: benefit_risk_assessment_complete
      operator: eq
      value: true
      true_next: check_br_balance
      false_next: conclusion_incomplete
    check_br_balance:
      type: condition
      variable: benefit_risk_status
      operator: eq
      value: favorable
      true_next: favorable_conclusion
      false_next: check_marginal
    check_marginal:
      type: condition
      variable: benefit_risk_status
      operator: eq
      value: marginal
      true_next: marginal_conclusion
      false_next: unfavorable_conclusion
    favorable_conclusion:
      type: return
      value:
        br_conclusion: benefit_risk_favorable
        recommendation: continue_marketing
        regulatory_action: none
        psur_br_compliant: true
    marginal_conclusion:
      type: return
      value:
        br_conclusion: benefit_risk_marginal
        recommendation: continue_with_restrictions
        regulatory_action: label_update
        psur_br_compliant: true
    unfavorable_conclusion:
      type: return
      value:
        br_conclusion: benefit_risk_unfavorable
        recommendation: withdraw_or_restrict
        regulatory_action: suspension_or_withdrawal
        psur_br_compliant: true
    conclusion_incomplete:
      type: return
      value:
        br_conclusion: null
        recommendation: null
        regulatory_action: null
        psur_br_compliant: false
tests:
  - input:
      benefit_risk_assessment_complete: true
      benefit_risk_status: favorable
    expect:
      br_conclusion: benefit_risk_favorable
      recommendation: continue_marketing
  - input:
      benefit_risk_assessment_complete: true
      benefit_risk_status: marginal
    expect:
      br_conclusion: benefit_risk_marginal
  - input:
      benefit_risk_assessment_complete: false
    expect:
      br_conclusion: null
      psur_br_compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
