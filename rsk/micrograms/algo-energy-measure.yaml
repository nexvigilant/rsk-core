# MICROGRAM++ (upgraded 2026-04-23)
name: algo-energy-measure
version: 0.1.0
description: "Algorithm 7 (ENERGY): Measures N(→(Δς)) — capacity for change. Scores by downstream consumers (→), state change magnitude (Δς), quantifies impact potential (N)."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: downstream_consumers
    type: integer
    required: true
    description: ""
  - name: state_change_magnitude
    type: string
    required: true
    description: ""
  - name: component_persistence
    type: string
    required: true
    description: ""
outputs:
  - name: energy_score
    type: float
  - name: energy_class
    type: string
  - name: algorithm
    type: string
interface:
  inputs:
    downstream_consumers:
      type: integer
      required: true
    state_change_magnitude:
      type: string
      required: true
      enum:
        - none
        - minor
        - moderate
        - major
        - breaking
    component_persistence:
      type: string
      required: true
      enum:
        - volatile
        - recent
        - established
        - foundational
  outputs:
    energy_score:
      type: float
    energy_class:
      type: string
    algorithm:
      type: string
ui:
  title: Algo Energy Measure
  subtitle: "Algorithm 7 (ENERGY): Measures N(→(Δς)) — capacity for change. Scores by downstream consumers (→), state change magnitude (Δς), quantifies impact potential (N)."
  icon: circle
  route: /vigilance/mg/algo-energy-measure
  steps:
    - field: downstream_consumers
      label: downstream consumers
      help: Enter downstream_consumers
      widget: number
      placeholder: null
    - field: state_change_magnitude
      label: state change magnitude
      help: Enter state_change_magnitude
      widget: text
      placeholder: null
    - field: component_persistence
      label: component persistence
      help: Enter component_persistence
      widget: text
      placeholder: null
  result:
    template: "energy_score: {{energy_score}} — energy_class: {{energy_class}} — algorithm: {{algorithm}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/algo-energy-measure
  cli: rsk mcg run algo-energy-measure
  auth: none
  rate_limit: 600/min
tree:
  start: check_state_change
  nodes:
    check_state_change:
      type: condition
      variable: state_change_magnitude
      operator: eq
      value: none
      true_next: zero_energy
      false_next: check_consumers_high
    check_consumers_high:
      type: condition
      variable: downstream_consumers
      operator: gte
      value: 10
      true_next: check_mag_major_high
      false_next: check_consumers_medium
    check_consumers_medium:
      type: condition
      variable: downstream_consumers
      operator: gte
      value: 3
      true_next: check_mag_major_med
      false_next: low_energy
    check_mag_major_high:
      type: condition
      variable: state_change_magnitude
      operator: eq
      value: major
      true_next: critical_energy
      false_next: check_mag_breaking_high
    check_mag_breaking_high:
      type: condition
      variable: state_change_magnitude
      operator: eq
      value: breaking
      true_next: critical_energy
      false_next: high_energy
    check_mag_major_med:
      type: condition
      variable: state_change_magnitude
      operator: eq
      value: major
      true_next: high_energy
      false_next: check_mag_breaking_med
    check_mag_breaking_med:
      type: condition
      variable: state_change_magnitude
      operator: eq
      value: breaking
      true_next: high_energy
      false_next: moderate_energy
    critical_energy:
      type: return
      value:
        energy_score: 1
        energy_class: critical
        algorithm: "ENERGY: N(→(Δς)) = high consumers × breaking change = maximum cascade potential"
    high_energy:
      type: return
      value:
        energy_score: 0.75
        energy_class: high
        algorithm: "ENERGY: N(→(Δς)) = significant cascade potential"
    moderate_energy:
      type: return
      value:
        energy_score: 0.5
        energy_class: moderate
        algorithm: "ENERGY: N(→(Δς)) = contained change capacity"
    low_energy:
      type: return
      value:
        energy_score: 0.25
        energy_class: low
        algorithm: "ENERGY: N(→(Δς)) = minimal cascade potential"
    zero_energy:
      type: return
      value:
        energy_score: 0
        energy_class: inert
        algorithm: "ENERGY: N(→(Δς)) = 0 — no state change capacity"
tests:
  - input:
      downstream_consumers: 40
      state_change_magnitude: breaking
      component_persistence: foundational
    expect:
      energy_score: 1
      energy_class: critical
  - input:
      downstream_consumers: 15
      state_change_magnitude: moderate
      component_persistence: established
    expect:
      energy_score: 0.75
      energy_class: high
  - input:
      downstream_consumers: 5
      state_change_magnitude: major
      component_persistence: recent
    expect:
      energy_score: 0.75
      energy_class: high
  - input:
      downstream_consumers: 1
      state_change_magnitude: minor
      component_persistence: volatile
    expect:
      energy_score: 0.25
      energy_class: low
  - input:
      downstream_consumers: 100
      state_change_magnitude: none
      component_persistence: foundational
    expect:
      energy_score: 0
      energy_class: inert
  - input:
      downstream_consumers: 5
      state_change_magnitude: breaking
      component_persistence: established
    expect:
      energy_score: 0.75
      energy_class: high
  - input:
      downstream_consumers: 4
      state_change_magnitude: minor
      component_persistence: recent
    expect:
      energy_score: 0.5
      energy_class: moderate
  - input: {}
    expect:
      energy_score: 0.25
      energy_class: low
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - energy_score
    - energy_class
    - algorithm
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
