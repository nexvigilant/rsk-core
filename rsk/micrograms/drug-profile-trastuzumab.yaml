name: drug-profile-trastuzumab
description: 'Safety triage for trastuzumab: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    signal:
      type: return
      value:
        drug: trastuzumab
        signal: true
        action: investigate
        harm_type: B
        expected_prr: 4.6
    no_signal:
      type: return
      value:
        signal: false
        expected_prr: 4.6
        action: monitor
        drug: trastuzumab
        harm_type: B
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 4.6
  expect:
    signal: false
    drug: trastuzumab
- input:
    prr: 0.5
  expect:
    signal: false
    drug: trastuzumab
- input: {}
  expect:
    drug: trastuzumab
    signal: false
- input:
    prr: 4.999
  expect:
    signal: false
    harm_type: B
    expected_prr: 4.6
    drug: trastuzumab
    action: monitor
- input:
    prr: 5.001
  expect:
    expected_prr: 4.6
    harm_type: B
    signal: true
    drug: trastuzumab
    action: investigate
interface: null
primitive_signature: null
