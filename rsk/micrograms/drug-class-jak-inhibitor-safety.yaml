# MICROGRAM++ (upgraded 2026-04-23)
name: drug-class-jak-inhibitor-safety
version: 0.1.0
description: JAK inhibitor safety assessment. Evaluates thromboembolic events, lipid elevation, infection risk, and herpes zoster.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Class Jak Inhibitor Safety
  subtitle: JAK inhibitor safety assessment. Evaluates thromboembolic events, lipid elevation, infection risk, and herpes zoster.
  icon: circle
  route: /vigilance/mg/drug-class-jak-inhibitor-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-class-jak-inhibitor-safety
  cli: rsk mcg run drug-class-jak-inhibitor-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_thrombotic_history
  nodes:
    check_thrombotic_history:
      type: condition
      variable: prior_thrombotic_event
      operator: eq
      value: true
      true_next: thrombotic_alert
      false_next: check_infection_risk
    thrombotic_alert:
      type: return
      value:
        risk_level: high
        anticoagulation_consideration: true
        message: Prior thrombotic event; JAK inhibitor increases thromboembolic risk
    check_infection_risk:
      type: condition
      variable: has_active_infection
      operator: eq
      value: true
      true_next: infection_alert
      false_next: check_lipids
    infection_alert:
      type: return
      value:
        risk_level: critical
        contraindication: true
        message: Active infection; defer JAK inhibitor until infection resolved
    check_lipids:
      type: condition
      variable: baseline_cholesterol_mg_dl
      operator: gte
      value: 240
      true_next: lipid_monitoring
      false_next: standard_dosing
    lipid_monitoring:
      type: return
      value:
        risk_level: moderate
        lipid_panel_monitoring: required
        message: Elevated cholesterol; JAK inhibitor may further elevate lipids
    standard_dosing:
      type: return
      value:
        risk_level: low
        infection_monitoring: required
        message: Standard JAK inhibitor dosing; monitor for herpes zoster
tests:
  - input:
      prior_thrombotic_event: true
      has_active_infection: false
      baseline_cholesterol_mg_dl: 200
    expect:
      risk_level: high
      anticoagulation_consideration: true
  - input:
      prior_thrombotic_event: false
      has_active_infection: true
      baseline_cholesterol_mg_dl: 200
    expect:
      risk_level: critical
      contraindication: true
  - input:
      prior_thrombotic_event: false
      has_active_infection: false
      baseline_cholesterol_mg_dl: 260
    expect:
      risk_level: moderate
      lipid_panel_monitoring: required
  - input:
      prior_thrombotic_event: false
      has_active_infection: false
      baseline_cholesterol_mg_dl: 200
    expect:
      risk_level: low
      infection_monitoring: required
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
