# MICROGRAM++ (upgraded 2026-04-23)
name: age-child
version: 0.1.0
description: Child age classifier. Identifies subjects aged 1-6 years.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Age Child
  subtitle: Child age classifier. Identifies subjects aged 1-6 years.
  icon: circle
  route: /vigilance/mg/age-child
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/age-child
  cli: rsk mcg run age-child
  auth: none
  rate_limit: 600/min
tree:
  start: check_lower_bound
  nodes:
    check_lower_bound:
      type: condition
      variable: age_years
      operator: gte
      value: 1
      true_next: check_upper_bound
      false_next: not_child
    check_upper_bound:
      type: condition
      variable: age_years
      operator: lte
      value: 6
      true_next: is_child
      false_next: not_child
    is_child:
      type: return
      value:
        age_group: child
        age_range: 1-6 years
        developmental_stage: early_childhood
        cognitive_development: emerging
    not_child:
      type: return
      value:
        age_group: other
        is_child: false
tests:
  - input:
      age_years: 3
    expect:
      age_group: child
      developmental_stage: early_childhood
  - input:
      age_years: 1
    expect:
      age_group: child
  - input:
      age_years: 6
    expect:
      age_group: child
  - input:
      age_years: 7
    expect:
      age_group: other
      is_child: false
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
