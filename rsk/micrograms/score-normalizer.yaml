name: score-normalizer
description: Normalize score to pass/fail
version: 0.1.0
interface:
  inputs:
    score:
      type: float
      required: false
  outputs:
    passed:
      type: bool
tree:
  start: check
  nodes:
    no:
      type: return
      value:
        passed: false
    check:
      type: condition
      variable: score
      operator: gte
      value: 50
      true_next: yes
      false_next: no
    yes:
      type: return
      value:
        passed: true
tests:
- input:
    score: 50
  expect:
    passed: true
- input:
    score: 51
  expect:
    passed: true
- input:
    score: 49
  expect:
    passed: false
- input:
    score: 0
  expect:
    passed: false
- input:
    score: -1
  expect:
    passed: false
- input:
    score: 5000
  expect:
    passed: true
- input: {}
  expect:
    passed: false
