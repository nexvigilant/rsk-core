name: convergence-4of4
description: All 4 methods agree
version: 0.1.0
tree:
  start: check
  nodes:
    converged:
      type: return
      value:
        action: escalate
        convergence: strong
        met: true
    check:
      type: condition
      variable: methods_positive
      operator: gte
      value: 4
      true_next: converged
      false_next: divergent
    divergent:
      type: return
      value:
        convergence: strong
        met: false
        action: investigate_discrepancy
tests:
- input:
    methods_positive: 4
  expect:
    met: true
    convergence: strong
- input: {}
  expect:
    convergence: strong
    met: false
- input:
    methods_positive: 0
  expect:
    convergence: strong
    met: false
    action: investigate_discrepancy
- input:
    methods_positive: -1
  expect:
    convergence: strong
    action: investigate_discrepancy
    met: false
- input:
    methods_positive: 3
  expect:
    convergence: strong
    met: false
    action: investigate_discrepancy
- input:
    methods_positive: 5
  expect:
    met: true
    action: escalate
    convergence: strong
- input:
    methods_positive: 400
  expect:
    met: true
    convergence: strong
    action: escalate
interface: null
primitive_signature: null
