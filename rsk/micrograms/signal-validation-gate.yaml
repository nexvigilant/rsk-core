# MICROGRAM++ (upgraded 2026-04-23)
name: signal-validation-gate
version: 0.1.0
description: "Signal validation gate: counts confirmed criteria (PRR threshold, case count, geographic spread, temporal pattern) to classify signal strength"
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: case_count_sufficient
    type: bool
    required: false
    description: ""
  - name: prr_above_threshold
    type: bool
    required: false
    description: ""
  - name: geographic_spread
    type: bool
    required: false
    description: ""
  - name: temporal_pattern
    type: bool
    required: false
    description: ""
outputs:
  - name: next_action
    type: string
  - name: confidence
    type: int
  - name: classification
    type: string
interface:
  inputs:
    case_count_sufficient:
      type: bool
      required: false
    prr_above_threshold:
      type: bool
      required: false
    geographic_spread:
      type: bool
      required: false
    temporal_pattern:
      type: bool
      required: false
  outputs:
    next_action:
      type: string
      required: false
    confidence:
      type: int
      required: false
    classification:
      type: string
      required: false
  aliases: {}
ui:
  title: Signal Validation Gate
  subtitle: "Signal validation gate: counts confirmed criteria (PRR threshold, case count, geographic spread, temporal pattern) to classify signal strength"
  icon: activity
  route: /vigilance/mg/signal-validation-gate
  steps:
    - field: case_count_sufficient
      label: case count sufficient
      help: Enter case_count_sufficient
      widget: toggle
      placeholder: null
    - field: prr_above_threshold
      label: prr above threshold
      help: Enter prr_above_threshold
      widget: toggle
      placeholder: null
    - field: geographic_spread
      label: geographic spread
      help: Enter geographic_spread
      widget: toggle
      placeholder: null
    - field: temporal_pattern
      label: temporal pattern
      help: Enter temporal_pattern
      widget: toggle
      placeholder: null
  result:
    template: "next_action: {{next_action}} — confidence: {{confidence}} — classification: {{classification}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/signal-validation-gate
  cli: rsk mcg run signal-validation-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_prr
  nodes:
    prr0c1g1_check_temporal:
      type: condition
      variable: temporal_pattern
      operator: eq
      value: true
      true_next: probable_signal
      false_next: possible_signal
    probable_signal:
      type: return
      value:
        confidence: 75
        next_action: Conduct targeted data query and expedited medical review within 30 days
        classification: PROBABLE_SIGNAL
    noise:
      type: return
      value:
        confidence: 20
        classification: NOISE
        next_action: Continue routine pharmacovigilance monitoring - no signal action required
    prr1c1g0_check_temporal:
      type: condition
      variable: temporal_pattern
      operator: eq
      value: true
      true_next: probable_signal
      false_next: possible_signal
    prr1c0_check_geo:
      type: condition
      variable: geographic_spread
      operator: eq
      value: true
      true_next: prr1c0g1_check_temporal
      false_next: prr1c0g0_check_temporal
    prr1c0g1_check_temporal:
      type: condition
      variable: temporal_pattern
      operator: eq
      value: true
      true_next: probable_signal
      false_next: possible_signal
    prr0c1_check_geo:
      type: condition
      variable: geographic_spread
      operator: eq
      value: true
      true_next: prr0c1g1_check_temporal
      false_next: prr0c1g0_check_temporal
    prr1c1_check_geo:
      type: condition
      variable: geographic_spread
      operator: eq
      value: true
      true_next: prr1c1g1_check_temporal
      false_next: prr1c1g0_check_temporal
    prr0c0g1_check_temporal:
      type: condition
      variable: temporal_pattern
      operator: eq
      value: true
      true_next: possible_signal
      false_next: noise
    possible_signal:
      type: return
      value:
        next_action: Add to signal monitoring list for continued surveillance
        classification: POSSIBLE_SIGNAL
        confidence: 50
    check_prr:
      type: condition
      variable: prr_above_threshold
      operator: eq
      value: true
      true_next: prr1_check_cases
      false_next: prr0_check_cases
    prr1_check_cases:
      type: condition
      variable: case_count_sufficient
      operator: eq
      value: true
      true_next: prr1c1_check_geo
      false_next: prr1c0_check_geo
    prr1c1g1_check_temporal:
      type: condition
      variable: temporal_pattern
      operator: eq
      value: true
      true_next: validated_signal
      false_next: probable_signal
    prr0c0_check_geo:
      type: condition
      variable: geographic_spread
      operator: eq
      value: true
      true_next: prr0c0g1_check_temporal
      false_next: prr0c0g0_check_temporal
    prr0_check_cases:
      type: condition
      variable: case_count_sufficient
      operator: eq
      value: true
      true_next: prr0c1_check_geo
      false_next: prr0c0_check_geo
    prr1c0g0_check_temporal:
      type: condition
      variable: temporal_pattern
      operator: eq
      value: true
      true_next: possible_signal
      false_next: noise
    prr0c1g0_check_temporal:
      type: condition
      variable: temporal_pattern
      operator: eq
      value: true
      true_next: possible_signal
      false_next: noise
    prr0c0g0_check_temporal:
      type: condition
      variable: temporal_pattern
      operator: eq
      value: true
      true_next: noise
      false_next: noise
    validated_signal:
      type: return
      value:
        next_action: Open formal signal investigation and convene safety review committee
        classification: VALIDATED_SIGNAL
        confidence: 95
tests:
  - input:
      geographic_spread: true
      case_count_sufficient: true
      prr_above_threshold: true
      temporal_pattern: true
    expect:
      next_action: Open formal signal investigation and convene safety review committee
      confidence: 95
      classification: VALIDATED_SIGNAL
  - input:
      temporal_pattern: false
      case_count_sufficient: true
      geographic_spread: true
      prr_above_threshold: true
    expect:
      classification: PROBABLE_SIGNAL
      confidence: 75
      next_action: Conduct targeted data query and expedited medical review within 30 days
