# MICROGRAM++ (upgraded 2026-04-23)
name: timeline-ich-psur
version: 0.1.0
description: ICH PSUR interval
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Timeline Ich Psur
  subtitle: ICH PSUR interval
  icon: circle
  route: /vigilance/mg/timeline-ich-psur
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/timeline-ich-psur
  cli: rsk mcg run timeline-ich-psur
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: months_since_psur
      operator: gte
      value: 6
      true_next: due
      false_next: not_due
    due:
      type: return
      value:
        action: submit
        report_type: psur
        jurisdiction: ICH
        due: true
    not_due:
      type: return
      value:
        due: false
        jurisdiction: ICH
        action: schedule
        report_type: psur
tests:
  - input:
      months_since_psur: 6
    expect:
      jurisdiction: ICH
      due: true
  - input: {}
    expect:
      due: false
      jurisdiction: ICH
  - input:
      months_since_psur: 0
    expect:
      report_type: psur
      action: schedule
      due: false
      jurisdiction: ICH
  - input:
      months_since_psur: -1
    expect:
      report_type: psur
      action: schedule
      jurisdiction: ICH
      due: false
  - input:
      months_since_psur: 5
    expect:
      report_type: psur
      action: schedule
      jurisdiction: ICH
      due: false
  - input:
      months_since_psur: 7
    expect:
      report_type: psur
      due: true
      jurisdiction: ICH
      action: submit
  - input:
      months_since_psur: 600
    expect:
      report_type: psur
      due: true
      jurisdiction: ICH
      action: submit
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
