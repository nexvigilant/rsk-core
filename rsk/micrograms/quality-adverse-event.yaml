name: quality-adverse-event
description: "Adverse event described"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "event_described"
      operator: "eq"
      value: true
      true_next: "pass"
      false_next: "fail"
    pass:
      type: "return"
      value:
        check: "quality-adverse-event"
        passed: true
        action: "accept"
    fail:
      type: "return"
      value:
        check: "quality-adverse-event"
        passed: false
        action: "flag_for_review"

tests:
  - input: {"event_described": true}
    expect: {"check": "quality-adverse-event", "passed": true}
  - input: {}
    expect: {"check": "quality-adverse-event", "passed": false}
