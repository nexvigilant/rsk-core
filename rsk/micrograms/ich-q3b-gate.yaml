name: ich-q3b-gate
description: "ICH Q3B compliance: Impurities — Drug Product"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "product_impurity_ok"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH Q3B"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH Q3B"
        compliant: false
        action: "remediate"
        gap: "product_impurity_ok"

tests:
  - input: {"product_impurity_ok": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
