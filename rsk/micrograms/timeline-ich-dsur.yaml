# MICROGRAM++ (upgraded 2026-04-23)
name: timeline-ich-dsur
version: 0.1.0
description: ICH DSUR interval
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Timeline Ich Dsur
  subtitle: ICH DSUR interval
  icon: circle
  route: /vigilance/mg/timeline-ich-dsur
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/timeline-ich-dsur
  cli: rsk mcg run timeline-ich-dsur
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    due:
      type: return
      value:
        action: submit
        due: true
        report_type: dsur
        jurisdiction: ICH
    check:
      type: condition
      variable: months_since_dsur
      operator: gte
      value: 12
      true_next: due
      false_next: not_due
    not_due:
      type: return
      value:
        action: schedule
        due: false
        report_type: dsur
        jurisdiction: ICH
tests:
  - input:
      months_since_dsur: 12
    expect:
      due: true
      jurisdiction: ICH
  - input: {}
    expect:
      due: false
      jurisdiction: ICH
  - input:
      months_since_dsur: 0
    expect:
      report_type: dsur
      action: schedule
      due: false
      jurisdiction: ICH
  - input:
      months_since_dsur: -1
    expect:
      report_type: dsur
      jurisdiction: ICH
      due: false
      action: schedule
  - input:
      months_since_dsur: 11
    expect:
      report_type: dsur
      jurisdiction: ICH
      due: false
      action: schedule
  - input:
      months_since_dsur: 13
    expect:
      action: submit
      due: true
      report_type: dsur
      jurisdiction: ICH
  - input:
      months_since_dsur: 1200
    expect:
      due: true
      jurisdiction: ICH
      report_type: dsur
      action: submit
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
