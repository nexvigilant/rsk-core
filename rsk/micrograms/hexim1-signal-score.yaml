- input: {}
  expect:
    verdict: NOISE
    limiting_factor: all
    priority_action: DISCARD — signal below noise threshold. Not worth investigating.
interface:
  inputs:
    temporal:
      type: number
      required: true
    signal_score:
      type: number
      required: true
    recognition:
      type: number
      required: true
    uniqueness:
      type: number
      required: true
  outputs:
    verdict:
      type: string
      required: false
    limiting_factor:
      type: string
      required: false
    priority_action:
      type: string
      required: false
  aliases: {}
