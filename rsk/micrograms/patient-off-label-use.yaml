# MICROGRAM++ (upgraded 2026-04-23)
name: patient-off-label-use
version: 0.1.0
description: Identify off-label drug use for patient safety and regulatory tracking
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Patient Off Label Use
  subtitle: Identify off-label drug use for patient safety and regulatory tracking
  icon: circle
  route: /vigilance/mg/patient-off-label-use
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/patient-off-label-use
  cli: rsk mcg run patient-off-label-use
  auth: none
  rate_limit: 600/min
tree:
  start: validate_indication
  nodes:
    validate_indication:
      type: condition
      variable: indication_used
      operator: is_not_null
      value: null
      true_next: check_approved_indication
      false_next: off_label_status_unknown
    check_approved_indication:
      type: condition
      variable: is_approved_indication
      operator: eq
      value: true
      true_next: on_label_use
      false_next: off_label_use
    off_label_use:
      type: return
      value:
        use_classification: off_label
        approved_indication_match: false
        prescriber_judgment_documented: true
        patient_safety_monitoring: enhanced
        regulatory_tracking: required
        off_label_compliant: true
    on_label_use:
      type: return
      value:
        use_classification: on_label
        approved_indication_match: true
        prescriber_judgment_documented: false
        patient_safety_monitoring: standard
        regulatory_tracking: not_required
        off_label_compliant: true
    off_label_status_unknown:
      type: return
      value:
        use_classification: unknown
        approved_indication_match: null
        prescriber_judgment_documented: null
        patient_safety_monitoring: enhanced
        regulatory_tracking: recommended
        off_label_compliant: false
tests:
  - input:
      indication_used: rheumatoid_arthritis
      is_approved_indication: false
    expect:
      use_classification: off_label
      patient_safety_monitoring: enhanced
      regulatory_tracking: required
  - input:
      indication_used: hypertension
      is_approved_indication: true
    expect:
      use_classification: on_label
      regulatory_tracking: not_required
  - input: {}
    expect:
      use_classification: unknown
      off_label_compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
