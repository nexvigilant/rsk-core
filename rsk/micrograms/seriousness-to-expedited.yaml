# MICROGRAM++ (upgraded 2026-04-23)
name: seriousness-to-expedited
version: 0.1.0
description: Routes case seriousness level to expedited reporting requirements
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: seriousness_level
    type: string
    required: true
    description: "Case seriousness classification: fatal, life_threatening, hospitalization, outpatient, unknown"
outputs:
  - name: requires_expedited
    type: boolean
  - name: reporting_window_days
    type: integer
  - name: rationale
    type: string
interface:
  inputs:
    seriousness_level:
      type: string
      required: true
      description: "Case seriousness classification: fatal, life_threatening, hospitalization, outpatient, unknown"
  outputs:
    requires_expedited:
      type: boolean
      description: Whether expedited reporting is required
    reporting_window_days:
      type: integer
      description: Number of days allowed for reporting
    rationale:
      type: string
      description: Explanation of the decision
ui:
  title: Seriousness To Expedited
  subtitle: Routes case seriousness level to expedited reporting requirements
  icon: circle
  route: /vigilance/mg/seriousness-to-expedited
  steps:
    - field: seriousness_level
      label: seriousness level
      help: "Case seriousness classification: fatal, life_threatening, hospitalization, outpatient, unknown"
      widget: text
      placeholder: null
  result:
    template: "requires_expedited: {{requires_expedited}} — reporting_window_days: {{reporting_window_days}} — rationale: {{rationale}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/seriousness-to-expedited
  cli: rsk mcg run seriousness-to-expedited
  auth: none
  rate_limit: 600/min
tree:
  start: check_seriousness
  nodes:
    check_seriousness:
      type: condition
      variable: seriousness_level
      operator: eq
      value: fatal
      true_next: fatal_path
      false_next: check_life_threatening
    fatal_path:
      type: return
      value:
        requires_expedited: true
        reporting_window_days: 7
        rationale: Fatal cases require expedited reporting within 7 days
    check_life_threatening:
      type: condition
      variable: seriousness_level
      operator: eq
      value: life_threatening
      true_next: life_threatening_path
      false_next: check_hospitalization
    life_threatening_path:
      type: return
      value:
        requires_expedited: true
        reporting_window_days: 7
        rationale: Life-threatening cases require expedited reporting within 7 days
    check_hospitalization:
      type: condition
      variable: seriousness_level
      operator: eq
      value: hospitalization
      true_next: hospitalization_path
      false_next: standard_reporting
    hospitalization_path:
      type: return
      value:
        requires_expedited: true
        reporting_window_days: 15
        rationale: Hospitalization cases require reporting within 15 days
    standard_reporting:
      type: return
      value:
        requires_expedited: false
        reporting_window_days: 90
        rationale: Non-serious cases follow standard reporting timelines of 90 days
tests:
  - input:
      seriousness_level: fatal
    expect:
      requires_expedited: true
      reporting_window_days: 7
      rationale: Fatal cases require expedited reporting within 7 days
  - input:
      seriousness_level: hospitalization
    expect:
      requires_expedited: true
      reporting_window_days: 15
      rationale: Hospitalization cases require reporting within 15 days
  - input:
      seriousness_level: outpatient
    expect:
      requires_expedited: false
      reporting_window_days: 90
      rationale: Non-serious cases follow standard reporting timelines of 90 days
  - input:
      seriousness_level: life_threatening
    expect:
      requires_expedited: true
      reporting_window_days: 7
      rationale: Life-threatening cases require expedited reporting within 7 days
  - input:
      seriousness_level: unknown
    expect:
      requires_expedited: false
      reporting_window_days: 90
      rationale: Non-serious cases follow standard reporting timelines of 90 days
  - input: {}
    expect:
      rationale: Non-serious cases follow standard reporting timelines of 90 days
      reporting_window_days: 90
      requires_expedited: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - requires_expedited
    - reporting_window_days
    - rationale
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
