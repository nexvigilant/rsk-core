# MICROGRAM++ (upgraded 2026-04-23)
name: tox-pulmonary
version: 0.1.0
description: "Pulmonary toxicity: FEV1 threshold"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Tox Pulmonary
  subtitle: "Pulmonary toxicity: FEV1 threshold"
  icon: circle
  route: /vigilance/mg/tox-pulmonary
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/tox-pulmonary
  cli: rsk mcg run tox-pulmonary
  auth: none
  rate_limit: 600/min
tree:
  start: check_severe
  nodes:
    check_severe:
      type: condition
      variable: fev1_pct
      operator: lte
      value: 50
      true_next: severe
      false_next: check_mild
    check_mild:
      type: condition
      variable: fev1_pct
      operator: lte
      value: 80
      true_next: mild
      false_next: normal
    severe:
      type: return
      value:
        organ: pulmonary
        severity: severe
        action: discontinue
    mild:
      type: return
      value:
        organ: pulmonary
        severity: mild
        action: monitor_closely
    normal:
      type: return
      value:
        organ: pulmonary
        severity: normal
        action: continue
tests:
  - input:
      fev1_pct: -50
    expect:
      severity: severe
      action: discontinue
  - input:
      fev1_pct: 80
    expect:
      severity: mild
      action: monitor_closely
  - input:
      fev1_pct: 1080
    expect:
      severity: normal
      action: continue
  - input: {}
    expect:
      severity: normal
      action: continue
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
