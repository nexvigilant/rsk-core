# MICROGRAM++ (upgraded 2026-04-23)
name: transform-expectedness-to-bool
version: 0.1.0
description: "Transform: converts expectedness-check enum (UNEXPECTED_NATURE/SEVERITY) to boolean for susar-classifier"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: expectedness
    type: string
    required: true
    description: ""
outputs:
  - name: unexpected
    type: bool
  - name: source
    type: string
interface:
  inputs:
    expectedness:
      type: string
      required: true
  outputs:
    unexpected:
      type: bool
    source:
      type: string
ui:
  title: Transform Expectedness To Bool
  subtitle: "Transform: converts expectedness-check enum (UNEXPECTED_NATURE/SEVERITY) to boolean for susar-classifier"
  icon: circle
  route: /vigilance/mg/transform-expectedness-to-bool
  steps:
    - field: expectedness
      label: expectedness
      help: Enter expectedness
      widget: text
      placeholder: null
  result:
    template: "unexpected: {{unexpected}} — source: {{source}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/transform-expectedness-to-bool
  cli: rsk mcg run transform-expectedness-to-bool
  auth: none
  rate_limit: 600/min
tree:
  start: check_unexpected_nature
  nodes:
    check_unexpected_nature:
      type: condition
      variable: expectedness
      operator: eq
      value: UNEXPECTED_NATURE
      true_next: unexpected
      false_next: check_unexpected_severity
    check_unexpected_severity:
      type: condition
      variable: expectedness
      operator: eq
      value: UNEXPECTED_SEVERITY
      true_next: unexpected
      false_next: expected
    unexpected:
      type: return
      value:
        unexpected: true
        source: expectedness-check
    expected:
      type: return
      value:
        unexpected: false
        source: expectedness-check
tests:
  - input:
      expectedness: UNEXPECTED_NATURE
    expect:
      unexpected: true
      source: expectedness-check
  - input:
      expectedness: UNEXPECTED_SEVERITY
    expect:
      unexpected: true
      source: expectedness-check
  - input:
      expectedness: EXPECTED_LISTED
    expect:
      unexpected: false
      source: expectedness-check
  - input:
      expectedness: EXPECTED_CLASS
    expect:
      unexpected: false
      source: expectedness-check
  - input: {}
    expect:
      unexpected: false
      source: expectedness-check
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - unexpected
    - source
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
