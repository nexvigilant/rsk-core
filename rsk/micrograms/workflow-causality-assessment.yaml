# MICROGRAM++ (upgraded 2026-04-23)
name: workflow-causality-assessment
version: 0.1.0
description: "Route causality assessment by evidence type: rechallenge, temporal, mechanism"
family: pv.causality
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs: []
outputs: []
ui:
  title: Workflow Causality Assessment
  subtitle: "Route causality assessment by evidence type: rechallenge, temporal, mechanism"
  icon: git-branch
  route: /vigilance/mg/workflow-causality-assessment
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/workflow-causality-assessment
  cli: rsk mcg run workflow-causality-assessment
  auth: none
  rate_limit: 600/min
tree:
  start: check_rechallenge
  nodes:
    check_rechallenge:
      type: condition
      variable: rechallenge_positive
      operator: eq
      value: true
      true_next: certain
      false_next: check_temporal
    certain:
      type: return
      value:
        causality: certain
        chain: who-umc → harm-taxonomy → fda-safety
        confidence: 0.95
    check_temporal:
      type: condition
      variable: temporal_clear
      operator: eq
      value: true
      true_next: check_mechanism
      false_next: unlikely
    check_mechanism:
      type: condition
      variable: mechanism_known
      operator: eq
      value: true
      true_next: probable
      false_next: possible
    probable:
      type: return
      value:
        causality: probable
        chain: who-umc → drugbank → calculation
        confidence: 0.8
    possible:
      type: return
      value:
        causality: possible
        chain: who-umc → meddra → epidemiology
        confidence: 0.5
    unlikely:
      type: return
      value:
        causality: unlikely
        chain: who-umc
        confidence: 0.2
tests:
  - input:
      rechallenge_positive: true
      temporal_clear: true
      mechanism_known: true
    expect:
      causality: certain
      confidence: 0.95
  - input:
      rechallenge_positive: false
      temporal_clear: true
      mechanism_known: true
    expect:
      causality: probable
      confidence: 0.8
  - input:
      rechallenge_positive: false
      temporal_clear: true
      mechanism_known: false
    expect:
      causality: possible
      confidence: 0.5
  - input:
      rechallenge_positive: false
      temporal_clear: false
      mechanism_known: false
    expect:
      causality: unlikely
      confidence: 0.2
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.causality
  log_level: info
governance:
  sop_ref: SOP-PV-002
  regulatory_ref:
    - ICH-E2A
    - WHO-UMC
  harm_types:
    - A
    - B
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - hierarchy
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
