# MICROGRAM++ (upgraded 2026-04-23)
name: e2a-data-collection-priority
version: 1.0.0
description: "ICH E2A Section IV.A: Data collection priority scorer — determines urgency and priority of follow-up data collection based on case characteristics. Scores HIGH/MEDIUM/LOW priority with specific data domains needed."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: has_minimum_criteria
    type: bool
    required: false
    description: ""
  - name: is_serious
    type: bool
    required: false
    description: ""
  - name: is_unexpected
    type: bool
    required: false
    description: ""
  - name: outcome_fatal
    type: bool
    required: false
    description: ""
  - name: report_deadline_days
    type: int
    required: false
    description: ""
outputs:
  - name: collection_priority
    type: string
  - name: data_domains_needed
    type: string
  - name: days_to_collect
    type: int
  - name: rationale
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    has_minimum_criteria:
      type: bool
      required: false
    is_serious:
      type: bool
      required: false
    is_unexpected:
      type: bool
      required: false
    outcome_fatal:
      type: bool
      required: false
    report_deadline_days:
      type: int
      required: false
  outputs:
    collection_priority:
      type: string
    data_domains_needed:
      type: string
    days_to_collect:
      type: int
    rationale:
      type: string
    regulatory_reference:
      type: string
ui:
  title: E2a Data Collection Priority
  subtitle: "ICH E2A Section IV.A: Data collection priority scorer — determines urgency and priority of follow-up data collection based on case characteristics. Scores HIGH/MEDIUM/LOW priority with specific data domains needed."
  icon: circle
  route: /vigilance/mg/e2a-data-collection-priority
  steps:
    - field: has_minimum_criteria
      label: has minimum criteria
      help: Enter has_minimum_criteria
      widget: toggle
      placeholder: null
    - field: is_serious
      label: is serious
      help: Enter is_serious
      widget: toggle
      placeholder: null
    - field: is_unexpected
      label: is unexpected
      help: Enter is_unexpected
      widget: toggle
      placeholder: null
    - field: outcome_fatal
      label: outcome fatal
      help: Enter outcome_fatal
      widget: toggle
      placeholder: null
    - field: report_deadline_days
      label: report deadline days
      help: Enter report_deadline_days
      widget: text
      placeholder: null
  result:
    template: "collection_priority: {{collection_priority}} — data_domains_needed: {{data_domains_needed}} — days_to_collect: {{days_to_collect}} — rationale: {{rationale}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2a-data-collection-priority
  cli: rsk mcg run e2a-data-collection-priority
  auth: none
  rate_limit: 600/min
tree:
  start: check_minimum_criteria
  nodes:
    check_minimum_criteria:
      type: condition
      variable: has_minimum_criteria
      operator: eq
      value: true
      true_next: check_fatal_outcome
      false_next: urgent_minimum_criteria
    check_fatal_outcome:
      type: condition
      variable: outcome_fatal
      operator: eq
      value: true
      true_next: high_priority_fatal
      false_next: check_serious
    check_serious:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: check_unexpected_serious
      false_next: check_unexpected_only
    check_unexpected_serious:
      type: condition
      variable: is_unexpected
      operator: eq
      value: true
      true_next: high_priority_susar
      false_next: medium_priority_serious_expected
    check_unexpected_only:
      type: condition
      variable: is_unexpected
      operator: eq
      value: true
      true_next: low_priority_unexpected_nonserious
      false_next: routine_priority
    urgent_minimum_criteria:
      type: return
      value:
        collection_priority: URGENT
        days_to_collect: 2
        data_domains_needed: reporter,patient,drug,event
        rationale: Minimum ICSR criteria not met — case cannot be processed. Collect 4 minimum elements within 2 days.
        regulatory_reference: ICH E2A Section III.A / IV.A - Minimum criteria collection required before processing
    high_priority_fatal:
      type: return
      value:
        collection_priority: HIGH
        days_to_collect: 3
        data_domains_needed: outcome,autopsy,cause_of_death,medical_history
        rationale: Fatal case — high priority collection of autopsy data, cause of death, and complete medical history within 3 days
        regulatory_reference: ICH E2A Section IV.A - Fatal cases require complete data collection for 7-day report
    high_priority_susar:
      type: return
      value:
        collection_priority: HIGH
        days_to_collect: 5
        data_domains_needed: event_details,drug_exposure,outcome,medical_review
        rationale: Serious unexpected reaction (SUSAR) — high priority data collection to support expedited report within 7-15 day deadline
        regulatory_reference: ICH E2A Section IV.A - SUSARs require complete data collection for expedited reporting
    medium_priority_serious_expected:
      type: return
      value:
        collection_priority: MEDIUM
        days_to_collect: 30
        data_domains_needed: event_details,outcome,drug_exposure
        rationale: Serious expected reaction — medium priority collection for periodic safety update inclusion
        regulatory_reference: ICH E2A Section IV.A - Serious expected reactions collected for periodic reporting
    low_priority_unexpected_nonserious:
      type: return
      value:
        collection_priority: LOW
        days_to_collect: 60
        data_domains_needed: event_description,outcome
        rationale: Non-serious unexpected event — low priority collection for line listing in periodic report
        regulatory_reference: ICH E2A Section IV.A - Non-serious events collected for periodic safety updates
    routine_priority:
      type: return
      value:
        collection_priority: ROUTINE
        days_to_collect: 90
        data_domains_needed: event_description
        rationale: Non-serious expected event — routine data collection for aggregate reporting
        regulatory_reference: ICH E2A Section IV.A - Expected non-serious events documented in routine periodic reports
tests:
  - input:
      has_minimum_criteria: false
      outcome_fatal: false
      is_serious: true
      is_unexpected: true
      report_deadline_days: 7
    expect:
      collection_priority: URGENT
      days_to_collect: 2
      regulatory_reference: ICH E2A Section III.A / IV.A - Minimum criteria collection required before processing
  - input:
      has_minimum_criteria: true
      outcome_fatal: true
      is_serious: true
      is_unexpected: true
      report_deadline_days: 7
    expect:
      collection_priority: HIGH
      days_to_collect: 3
      regulatory_reference: ICH E2A Section IV.A - Fatal cases require complete data collection for 7-day report
  - input:
      has_minimum_criteria: true
      outcome_fatal: false
      is_serious: true
      is_unexpected: true
      report_deadline_days: 15
    expect:
      collection_priority: HIGH
      days_to_collect: 5
      regulatory_reference: ICH E2A Section IV.A - SUSARs require complete data collection for expedited reporting
  - input:
      has_minimum_criteria: true
      outcome_fatal: false
      is_serious: true
      is_unexpected: false
      report_deadline_days: 90
    expect:
      collection_priority: MEDIUM
      days_to_collect: 30
      regulatory_reference: ICH E2A Section IV.A - Serious expected reactions collected for periodic reporting
  - input:
      has_minimum_criteria: true
      outcome_fatal: false
      is_serious: false
      is_unexpected: true
      report_deadline_days: 90
    expect:
      collection_priority: LOW
      days_to_collect: 60
      regulatory_reference: ICH E2A Section IV.A - Non-serious events collected for periodic safety updates
  - input:
      has_minimum_criteria: true
      outcome_fatal: false
      is_serious: false
      is_unexpected: false
      report_deadline_days: 90
    expect:
      collection_priority: ROUTINE
      days_to_collect: 90
      regulatory_reference: ICH E2A Section IV.A - Expected non-serious events documented in routine periodic reports
  - input: {}
    expect:
      collection_priority: URGENT
      days_to_collect: 2
      regulatory_reference: ICH E2A Section III.A / IV.A - Minimum criteria collection required before processing
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - collection_priority
    - data_domains_needed
    - days_to_collect
    - rationale
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
