# MICROGRAM++ (upgraded 2026-04-23)
name: cardiac-safety-gate
version: 0.1.0
description: "Cardiac safety classifier: maps cardiac adverse reactions to severity grades using ICH E14 QT prolongation thresholds and known cardiotoxicity signals"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reaction_pt
    type: string
    required: true
    description: MedDRA preferred term for the cardiac reaction
  - name: qtc_prolongation_ms
    type: float
    required: false
    description: QTc prolongation in milliseconds (if available)
outputs:
  - name: severity
    type: string
  - name: soc
    type: string
  - name: action
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    reaction_pt:
      type: string
      required: true
      description: MedDRA preferred term for the cardiac reaction
    qtc_prolongation_ms:
      type: float
      required: false
      description: QTc prolongation in milliseconds (if available)
  outputs:
    severity:
      type: string
      description: critical | serious | moderate | mild
    soc:
      type: string
    action:
      type: string
    regulatory_reference:
      type: string
ui:
  title: Cardiac Safety Gate
  subtitle: "Cardiac safety classifier: maps cardiac adverse reactions to severity grades using ICH E14 QT prolongation thresholds and known cardiotoxicity signals"
  icon: circle
  route: /vigilance/mg/cardiac-safety-gate
  steps:
    - field: reaction_pt
      label: reaction pt
      help: MedDRA preferred term for the cardiac reaction
      widget: text
      placeholder: null
    - field: qtc_prolongation_ms
      label: qtc prolongation ms
      help: QTc prolongation in milliseconds (if available)
      widget: text
      placeholder: null
  result:
    template: "severity: {{severity}} — soc: {{soc}} — action: {{action}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/cardiac-safety-gate
  cli: rsk mcg run cardiac-safety-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_reaction
  nodes:
    check_reaction:
      type: condition
      variable: reaction_pt
      operator: contains
      value: TORSADE
      true_next: critical
      false_next: check_mi
    check_mi:
      type: condition
      variable: reaction_pt
      operator: contains
      value: MYOCARDIAL INFARCTION
      true_next: critical
      false_next: check_arrest
    check_arrest:
      type: condition
      variable: reaction_pt
      operator: contains
      value: CARDIAC ARREST
      true_next: critical
      false_next: check_failure
    check_failure:
      type: condition
      variable: reaction_pt
      operator: contains
      value: CARDIAC FAILURE
      true_next: serious
      false_next: check_qt
    check_qt:
      type: condition
      variable: qtc_prolongation_ms
      operator: gte
      value: 60
      true_next: serious
      false_next: check_qt_moderate
    check_qt_moderate:
      type: condition
      variable: qtc_prolongation_ms
      operator: gte
      value: 30
      true_next: moderate
      false_next: check_arrhythmia
    check_arrhythmia:
      type: condition
      variable: reaction_pt
      operator: contains
      value: ARRHYTHMIA
      true_next: moderate
      false_next: mild
    critical:
      type: return
      value:
        severity: critical
        soc: Cardiac disorders
        action: immediate_expedited_report
        regulatory_reference: ICH E14
    serious:
      type: return
      value:
        severity: serious
        soc: Cardiac disorders
        action: expedited_report
        regulatory_reference: ICH E14
    moderate:
      type: return
      value:
        severity: moderate
        soc: Cardiac disorders
        action: monitor_and_assess
        regulatory_reference: ICH E14
    mild:
      type: return
      value:
        severity: mild
        soc: Cardiac disorders
        action: routine_surveillance
        regulatory_reference: ICH E2B
tests:
  - name: torsade_de_pointes
    input:
      reaction_pt: TORSADE DE POINTES
    expect:
      severity: critical
      soc: Cardiac disorders
  - name: myocardial_infarction
    input:
      reaction_pt: MYOCARDIAL INFARCTION
    expect:
      severity: critical
  - name: cardiac_failure
    input:
      reaction_pt: CARDIAC FAILURE ACUTE
    expect:
      severity: serious
  - name: qt_prolongation_high
    input:
      reaction_pt: QT PROLONGATION
      qtc_prolongation_ms: 65
    expect:
      severity: serious
  - name: qt_moderate
    input:
      reaction_pt: QT PROLONGATION
      qtc_prolongation_ms: 35
    expect:
      severity: moderate
  - name: arrhythmia
    input:
      reaction_pt: ARRHYTHMIA SUPRAVENTRICULAR
    expect:
      severity: moderate
  - name: mild_palpitations
    input:
      reaction_pt: PALPITATIONS
    expect:
      severity: mild
  - name: null_safety
    input: {}
    expect:
      severity: mild
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - severity
    - soc
    - action
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
