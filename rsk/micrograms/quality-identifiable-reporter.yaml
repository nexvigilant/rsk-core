name: quality-identifiable-reporter
description: "Reporter identifiable"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "reporter_identified"
      operator: "eq"
      value: true
      true_next: "pass"
      false_next: "fail"
    pass:
      type: "return"
      value:
        check: "quality-identifiable-reporter"
        passed: true
        action: "accept"
    fail:
      type: "return"
      value:
        check: "quality-identifiable-reporter"
        passed: false
        action: "flag_for_review"

tests:
  - input: {"reporter_identified": true}
    expect: {"check": "quality-identifiable-reporter", "passed": true}
  - input: {}
    expect: {"check": "quality-identifiable-reporter", "passed": false}
