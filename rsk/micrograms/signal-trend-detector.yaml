# MICROGRAM++ (upgraded 2026-04-23)
name: signal-trend-detector
version: 0.2.0
description: Detects signal trend direction from pre-computed change percentage. Caller computes pct_change = (current - previous) / previous * 100. Chains into signal-priority.
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: prr_current
    type: float
    required: true
    description: ""
  - name: pct_change
    type: float
    required: false
    description: ""
outputs:
  - name: monitoring_action
    type: string
  - name: trend
    type: string
  - name: velocity
    type: string
interface:
  inputs:
    prr_current:
      type: float
      required: true
    pct_change:
      type: float
      required: false
  outputs:
    monitoring_action:
      type: string
      required: false
    trend:
      type: string
      required: false
    velocity:
      type: string
      required: false
  aliases: {}
ui:
  title: Signal Trend Detector
  subtitle: Detects signal trend direction from pre-computed change percentage. Caller computes pct_change = (current - previous) / previous * 100. Chains into signal-priority.
  icon: activity
  route: /vigilance/mg/signal-trend-detector
  steps:
    - field: prr_current
      label: prr current
      help: Enter prr_current
      widget: text
      placeholder: null
    - field: pct_change
      label: pct change
      help: Enter pct_change
      widget: text
      placeholder: null
  result:
    template: "monitoring_action: {{monitoring_action}} — trend: {{trend}} — velocity: {{velocity}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/signal-trend-detector
  cli: rsk mcg run signal-trend-detector
  auth: none
  rate_limit: 600/min
tree:
  start: check_has_change
  nodes:
    stable:
      type: return
      value:
        trend: STABLE
        monitoring_action: Continue current monitoring frequency
        velocity: NONE
    strong_no_trend:
      type: return
      value:
        monitoring_action: Strong current signal — collect prior data for trend assessment
        velocity: NONE
        trend: UNKNOWN
    rapid_rise:
      type: return
      value:
        velocity: RAPID
        trend: RISING
        monitoring_action: Escalate to immediate signal validation — PRR acceleration detected
    check_declining:
      type: condition
      variable: pct_change
      operator: lt
      value: -20
      true_next: declining
      false_next: stable
    insufficient_data:
      type: return
      value:
        monitoring_action: Collect additional data points for trend assessment
        velocity: NONE
        trend: UNKNOWN
    gradual_rise:
      type: return
      value:
        trend: RISING
        velocity: GRADUAL
        monitoring_action: Schedule enhanced signal review at next detection cycle
    check_rising:
      type: condition
      variable: pct_change
      operator: gt
      value: 10
      true_next: gradual_rise
      false_next: check_declining
    declining:
      type: return
      value:
        monitoring_action: Continue routine monitoring — signal weakening
        velocity: GRADUAL
        trend: DECLINING
    check_current_for_rapid:
      type: condition
      variable: prr_current
      operator: gte
      value: 5
      true_next: rapid_rise
      false_next: gradual_rise
    check_rapid_rise:
      type: condition
      variable: pct_change
      operator: gte
      value: 50
      true_next: check_current_for_rapid
      false_next: check_rising
    check_has_change:
      type: condition
      variable: pct_change
      operator: is_not_null
      value: true
      true_next: check_rapid_rise
      false_next: check_current_strong
    check_current_strong:
      type: condition
      variable: prr_current
      operator: gte
      value: 5
      true_next: strong_no_trend
      false_next: insufficient_data
tests:
  - input:
      prr_current: 8.5
      pct_change: 165.6
    expect:
      monitoring_action: Escalate to immediate signal validation — PRR acceleration detected
      trend: RISING
      velocity: RAPID
