name: signal-trend-detector
description: Detects signal trend direction from pre-computed change percentage. Caller computes pct_change = (current - previous) / previous * 100. Chains into signal-priority.
version: 0.2.0
tree:
  start: check_has_change
  nodes:
    stable:
      type: return
      value:
        trend: STABLE
        monitoring_action: Continue current monitoring frequency
        velocity: NONE
    strong_no_trend:
      type: return
      value:
        monitoring_action: Strong current signal — collect prior data for trend assessment
        velocity: NONE
        trend: UNKNOWN
    rapid_rise:
      type: return
      value:
        velocity: RAPID
        trend: RISING
        monitoring_action: Escalate to immediate signal validation — PRR acceleration detected
    check_declining:
      type: condition
      variable: pct_change
      operator: lt
      value: -20
      true_next: declining
      false_next: stable
    insufficient_data:
      type: return
      value:
        monitoring_action: Collect additional data points for trend assessment
        velocity: NONE
        trend: UNKNOWN
    gradual_rise:
      type: return
      value:
        trend: RISING
        velocity: GRADUAL
        monitoring_action: Schedule enhanced signal review at next detection cycle
    check_rising:
      type: condition
      variable: pct_change
      operator: gt
      value: 10
      true_next: gradual_rise
      false_next: check_declining
    declining:
      type: return
      value:
        monitoring_action: Continue routine monitoring — signal weakening
        velocity: GRADUAL
        trend: DECLINING
    check_current_for_rapid:
      type: condition
      variable: prr_current
      operator: gte
      value: 5.0
      true_next: rapid_rise
      false_next: gradual_rise
    check_rapid_rise:
      type: condition
      variable: pct_change
      operator: gte
      value: 50
      true_next: check_current_for_rapid
      false_next: check_rising
    check_has_change:
      type: condition
      variable: pct_change
      operator: is_not_null
      value: true
      true_next: check_rapid_rise
      false_next: check_current_strong
    check_current_strong:
      type: condition
      variable: prr_current
      operator: gte
      value: 5.0
      true_next: strong_no_trend
      false_next: insufficient_data
primitive_signature:
  dominant: 'κ'
  expression: 'κ — measurement, comparison, or classification'
  primes: ['κ']
  arguments: []
