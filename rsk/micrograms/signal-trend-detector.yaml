      prr_current: 3.5
      pct_change: 25
    expect:
      trend: RISING
      velocity: GRADUAL
      monitoring_action: Schedule enhanced signal review at next detection cycle
  - input:
      pct_change: -52
      prr_current: 1.2
    expect:
      velocity: GRADUAL
      monitoring_action: Continue routine monitoring — signal weakening
      trend: DECLINING
