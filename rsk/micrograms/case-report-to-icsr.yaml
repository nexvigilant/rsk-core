name: case-report-to-icsr
description: Evaluates case report completeness against ICSR criteria
version: 0.1.0

interface:
  inputs:
    has_patient:
      type: boolean
      required: true
      description: Whether patient information is present
    has_reporter:
      type: boolean
      required: true
      description: Whether reporter information is present
    has_drug:
      type: boolean
      required: true
      description: Whether drug information is present
    has_event:
      type: boolean
      required: true
      description: Whether adverse event information is present
  outputs:
    meets_icsr_criteria:
      type: boolean
      description: Whether case meets minimum ICSR criteria
    missing_fields:
      type: array
      description: List of missing required fields
    completeness_score:
      type: integer
      description: "Score from 0-100 representing completeness"

tree:
  start: check_all_present
  nodes:
    check_all_present:
      type: condition
      variable: has_patient
      operator: eq
      value: true
      true_next: check_reporter_all
      false_next: patient_missing

    check_reporter_all:
      type: condition
      variable: has_reporter
      operator: eq
      value: true
      true_next: check_drug_all
      false_next: patient_ok_reporter_missing

    check_drug_all:
      type: condition
      variable: has_drug
      operator: eq
      value: true
      true_next: check_event_all
      false_next: patient_reporter_ok_drug_missing

    check_event_all:
      type: condition
      variable: has_event
      operator: eq
      value: true
      true_next: all_present
      false_next: three_present_event_missing

    all_present:
      type: return
      value:
        meets_icsr_criteria: true
        missing_fields: []
        completeness_score: 100

    three_present_event_missing:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["event"]
        completeness_score: 75

    patient_reporter_ok_drug_missing:
      type: condition
      variable: has_event
      operator: eq
      value: true
      true_next: three_present_drug_missing
      false_next: two_present_drug_event_missing

    three_present_drug_missing:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["drug"]
        completeness_score: 75

    two_present_drug_event_missing:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["drug", "event"]
        completeness_score: 50

    patient_ok_reporter_missing:
      type: condition
      variable: has_drug
      operator: eq
      value: true
      true_next: check_event_patient_drug_ok
      false_next: check_event_patient_only

    check_event_patient_drug_ok:
      type: condition
      variable: has_event
      operator: eq
      value: true
      true_next: three_present_reporter_missing
      false_next: two_present_reporter_event_missing

    three_present_reporter_missing:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["reporter"]
        completeness_score: 75

    two_present_reporter_event_missing:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["reporter", "event"]
        completeness_score: 50

    check_event_patient_only:
      type: condition
      variable: has_event
      operator: eq
      value: true
      true_next: two_present_reporter_drug_missing
      false_next: one_present_patient_only

    two_present_reporter_drug_missing:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["reporter", "drug"]
        completeness_score: 50

    one_present_patient_only:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["reporter", "drug", "event"]
        completeness_score: 25

    patient_missing:
      type: condition
      variable: has_reporter
      operator: eq
      value: true
      true_next: check_drug_reporter_ok
      false_next: check_drug_event_no_patient_no_reporter

    check_drug_reporter_ok:
      type: condition
      variable: has_drug
      operator: eq
      value: true
      true_next: check_event_reporter_drug_ok
      false_next: check_event_reporter_only

    check_event_reporter_drug_ok:
      type: condition
      variable: has_event
      operator: eq
      value: true
      true_next: three_present_patient_missing
      false_next: two_present_patient_event_missing

    three_present_patient_missing:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["patient"]
        completeness_score: 75

    two_present_patient_event_missing:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["patient", "event"]
        completeness_score: 50

    check_event_reporter_only:
      type: condition
      variable: has_event
      operator: eq
      value: true
      true_next: two_present_patient_drug_missing
      false_next: one_present_reporter_only

    two_present_patient_drug_missing:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["patient", "drug"]
        completeness_score: 50

    one_present_reporter_only:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["patient", "drug", "event"]
        completeness_score: 25

    check_drug_event_no_patient_no_reporter:
      type: condition
      variable: has_drug
      operator: eq
      value: true
      true_next: check_event_drug_only
      false_next: check_event_none

    check_event_drug_only:
      type: condition
      variable: has_event
      operator: eq
      value: true
      true_next: two_present_patient_reporter_missing
      false_next: one_present_drug_only

    two_present_patient_reporter_missing:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["patient", "reporter"]
        completeness_score: 50

    one_present_drug_only:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["patient", "reporter", "event"]
        completeness_score: 25

    check_event_none:
      type: condition
      variable: has_event
      operator: eq
      value: true
      true_next: one_present_event_only
      false_next: all_missing

    one_present_event_only:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["patient", "reporter", "drug"]
        completeness_score: 25

    all_missing:
      type: return
      value:
        meets_icsr_criteria: false
        missing_fields: ["patient", "reporter", "drug", "event"]
        completeness_score: 0

tests:
  - input: { has_patient: true, has_reporter: true, has_drug: true, has_event: true }
    expect: { meets_icsr_criteria: true, missing_fields: [], completeness_score: 100 }

  - input: { has_patient: false, has_reporter: true, has_drug: true, has_event: true }
    expect: { meets_icsr_criteria: false, missing_fields: ["patient"], completeness_score: 75 }

  - input: { has_patient: true, has_reporter: false, has_drug: true, has_event: true }
    expect: { meets_icsr_criteria: false, missing_fields: ["reporter"], completeness_score: 75 }

  - input: { has_patient: false, has_reporter: false, has_drug: false, has_event: false }
    expect: { meets_icsr_criteria: false, missing_fields: ["patient", "reporter", "drug", "event"], completeness_score: 0 }
