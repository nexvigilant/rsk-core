name: drug-profile-atezolizumab
description: 'Safety triage for atezolizumab: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        signal: true
        expected_prr: 6.8
        drug: atezolizumab
        action: investigate
        harm_type: B
    no_signal:
      type: return
      value:
        harm_type: B
        expected_prr: 6.8
        drug: atezolizumab
        action: monitor
        signal: false
tests:
- input:
    prr: 6.8
  expect:
    drug: atezolizumab
    signal: true
- input:
    prr: 0.5
  expect:
    signal: false
    drug: atezolizumab
- input: {}
  expect:
    drug: atezolizumab
    signal: false
- input:
    prr: 4.999
  expect:
    signal: false
    harm_type: B
    drug: atezolizumab
    expected_prr: 6.8
    action: monitor
- input:
    prr: 5.001
  expect:
    harm_type: B
    expected_prr: 6.8
    action: investigate
    signal: true
    drug: atezolizumab
interface: null
primitive_signature: null
