# MICROGRAM++ (upgraded 2026-04-23)
name: age-infant
version: 0.1.0
description: Infant age classifier. Identifies subjects aged 29 days to 12 months.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Age Infant
  subtitle: Infant age classifier. Identifies subjects aged 29 days to 12 months.
  icon: circle
  route: /vigilance/mg/age-infant
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/age-infant
  cli: rsk mcg run age-infant
  auth: none
  rate_limit: 600/min
tree:
  start: check_lower_bound
  nodes:
    check_lower_bound:
      type: condition
      variable: age_days
      operator: gt
      value: 28
      true_next: check_upper_bound
      false_next: not_infant
    check_upper_bound:
      type: condition
      variable: age_days
      operator: lte
      value: 365
      true_next: is_infant
      false_next: not_infant
    is_infant:
      type: return
      value:
        age_group: infant
        age_range: 29 days - 12 months
        developmental_stage: rapidly_changing
        monitoring_required: true
    not_infant:
      type: return
      value:
        age_group: other
        is_infant: false
tests:
  - input:
      age_days: 60
    expect:
      age_group: infant
      developmental_stage: rapidly_changing
  - input:
      age_days: 365
    expect:
      age_group: infant
  - input:
      age_days: 29
    expect:
      age_group: infant
  - input:
      age_days: 400
    expect:
      age_group: other
      is_infant: false
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
