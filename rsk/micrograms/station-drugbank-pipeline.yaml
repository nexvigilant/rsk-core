# MICROGRAM++ (upgraded 2026-04-23)
name: station-drugbank-pipeline
version: 0.1.0
description: "Triage DrugBank data: classify drug interactions, flag contraindications, route pharmacology insights"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Drugbank Pipeline
  subtitle: "Triage DrugBank data: classify drug interactions, flag contraindications, route pharmacology insights"
  icon: circle
  route: /vigilance/mg/station-drugbank-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-drugbank-pipeline
  cli: rsk mcg run station-drugbank-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_interaction
  nodes:
    interaction_severity:
      type: condition
      variable: interaction_severity
      operator: eq
      value: major
      true_next: major_interaction
      false_next: minor_interaction
    major_interaction:
      type: return
      value:
        action: alert
        priority: high
        reason: Major drug interaction detected — cross-reference with FAERS for AE signal
        route: interaction_signal
    check_interaction:
      type: condition
      variable: has_interaction
      operator: eq
      value: true
      true_next: interaction_severity
      false_next: check_contraindication
    check_contraindication:
      type: condition
      variable: has_contraindication
      operator: eq
      value: true
      true_next: contraindication_alert
      false_next: pharmacology_review
    contraindication_alert:
      type: return
      value:
        priority: high
        route: label_comparison
        reason: Contraindication found — verify against current labeling
        action: alert
    minor_interaction:
      type: return
      value:
        priority: low
        action: note
        route: interaction_log
        reason: Minor/moderate interaction — log for polypharmacy analysis
    pharmacology_review:
      type: return
      value:
        action: review
        reason: Clean pharmacology profile — archive for reference
        priority: low
        route: archive
tests:
  - input:
      interaction_severity: major
      has_interaction: true
    expect:
      priority: high
      action: alert
      route: interaction_signal
  - input:
      has_interaction: true
      interaction_severity: moderate
    expect:
      priority: low
      action: note
      route: interaction_log
  - input:
      has_interaction: false
      has_contraindication: true
    expect:
      route: label_comparison
      action: alert
      priority: high
  - input:
      has_interaction: false
      has_contraindication: false
    expect:
      route: archive
      action: review
      priority: low
  - input: {}
    expect:
      route: archive
      priority: low
      reason: Clean pharmacology profile — archive for reference
      action: review
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
