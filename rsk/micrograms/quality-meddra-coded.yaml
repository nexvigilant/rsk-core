name: quality-meddra-coded
description: "MedDRA coding complete"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "meddra_coded"
      operator: "eq"
      value: true
      true_next: "pass"
      false_next: "fail"
    pass:
      type: "return"
      value:
        check: "quality-meddra-coded"
        passed: true
        action: "accept"
    fail:
      type: "return"
      value:
        check: "quality-meddra-coded"
        passed: false
        action: "flag_for_review"

tests:
  - input: {"meddra_coded": true}
    expect: {"check": "quality-meddra-coded", "passed": true}
  - input: {}
    expect: {"check": "quality-meddra-coded", "passed": false}
