name: signal-consensus-to-action
description: >
  PV molecular chain: signal detection → causality assessment → regulatory action.
  Composes prr-signal, signal-to-causality, naranjo-quick, and causality-to-action
  into a single decision pipeline. Input is a 2×2 contingency table + temporal/
  dechallenge data. Output is the regulatory action recommendation.
version: 0.1.0
family: pv-pipeline
chain:
  - prr-signal
  - signal-to-causality
  - naranjo-quick
  - causality-to-action
interface:
  inputs:
    a:
      type: int
      required: true
      description: Drug-event co-occurrence count
    b:
      type: int
      required: true
      description: Drug without event count
    c:
      type: int
      required: true
      description: Event without drug count
    d:
      type: int
      required: true
      description: Neither drug nor event count
    temporal:
      type: int
      required: false
      default: 1
      description: Temporal relationship (1=yes, 0=unknown, -1=no)
    dechallenge:
      type: int
      required: false
      default: 0
      description: Dechallenge response (1=yes, 0=unknown, -1=no)
    rechallenge:
      type: int
      required: false
      default: 0
      description: Rechallenge response (1=yes, 0=unknown, -1=no)
    alternatives:
      type: int
      required: false
      default: 0
      description: Alternative causes excluded (1=yes, 0=unknown, -1=no)
    previous:
      type: int
      required: false
      default: 1
      description: Previous reports exist (1=yes, 0=unknown, -1=no)
  outputs:
    signal_detected:
      type: bool
      description: Whether a disproportionality signal was detected
    prr:
      type: float
      description: Proportional Reporting Ratio
    naranjo_score:
      type: int
      description: Naranjo causality score (-4 to 13)
    naranjo_category:
      type: string
      description: Causality category (Definite/Probable/Possible/Doubtful)
    action:
      type: string
      description: Recommended regulatory action
    deadline_days:
      type: int
      description: Reporting deadline in days
steps:
  - name: detect_signal
    microgram: prr-signal
    map:
      a: "{{ a }}"
      b: "{{ b }}"
      c: "{{ c }}"
      d: "{{ d }}"
  - name: bridge_to_causality
    microgram: signal-to-causality
    map:
      prr: "{{ detect_signal.prr }}"
      signal_detected: "{{ detect_signal.signal_detected }}"
  - name: assess_causality
    microgram: naranjo-quick
    map:
      temporal: "{{ temporal }}"
      dechallenge: "{{ dechallenge }}"
      rechallenge: "{{ rechallenge }}"
      alternatives: "{{ alternatives }}"
      previous: "{{ previous }}"
  - name: determine_action
    microgram: causality-to-action
    map:
      naranjo_score: "{{ assess_causality.score }}"
      naranjo_category: "{{ assess_causality.category }}"
      signal_detected: "{{ detect_signal.signal_detected }}"
tests:
  - name: semaglutide_pancreatitis_chain
    input:
      a: 2068
      b: 76216
      c: 75999
      d: 19852706
      temporal: 1
      dechallenge: 1
      rechallenge: 0
      alternatives: 1
      previous: 1
    expect:
      signal_detected: true
