# MICROGRAM++ (upgraded 2026-04-23)
name: timeline-pader
version: 0.1.0
description: PADER filing
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Timeline Pader
  subtitle: PADER filing
  icon: circle
  route: /vigilance/mg/timeline-pader
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/timeline-pader
  cli: rsk mcg run timeline-pader
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: months_since_pader
      operator: gte
      value: 12
      true_next: due
      false_next: not_due
    due:
      type: return
      value:
        jurisdiction: US
        due: true
        report_type: pader
        action: submit
    not_due:
      type: return
      value:
        action: schedule
        jurisdiction: US
        due: false
        report_type: pader
tests:
  - input:
      months_since_pader: 12
    expect:
      jurisdiction: US
      due: true
  - input: {}
    expect:
      due: false
      jurisdiction: US
  - input:
      months_since_pader: 0
    expect:
      report_type: pader
      action: schedule
      jurisdiction: US
      due: false
  - input:
      months_since_pader: -1
    expect:
      jurisdiction: US
      report_type: pader
      action: schedule
      due: false
  - input:
      months_since_pader: 11
    expect:
      action: schedule
      due: false
      report_type: pader
      jurisdiction: US
  - input:
      months_since_pader: 13
    expect:
      action: submit
      report_type: pader
      jurisdiction: US
      due: true
  - input:
      months_since_pader: 1200
    expect:
      due: true
      jurisdiction: US
      report_type: pader
      action: submit
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
