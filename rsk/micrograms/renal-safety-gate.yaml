# MICROGRAM++ (upgraded 2026-04-23)
name: renal-safety-gate
version: 0.1.0
description: "Renal safety classifier: maps kidney adverse reactions to severity grades using KDIGO AKI staging and nephrotoxicity signals"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reaction_pt
    type: string
    required: true
    description: MedDRA preferred term for the renal reaction
  - name: creatinine_xbaseline
    type: float
    required: false
    description: Serum creatinine as x baseline (e.g., 3.0 = 3x baseline)
outputs:
  - name: severity
    type: string
  - name: soc
    type: string
  - name: aki_stage
    type: int
  - name: action
    type: string
interface:
  inputs:
    reaction_pt:
      type: string
      required: true
      description: MedDRA preferred term for the renal reaction
    creatinine_xbaseline:
      type: float
      required: false
      description: Serum creatinine as x baseline (e.g., 3.0 = 3x baseline)
  outputs:
    severity:
      type: string
      description: critical | serious | moderate | mild
    soc:
      type: string
    aki_stage:
      type: int
      description: KDIGO AKI stage 0-3
    action:
      type: string
ui:
  title: Renal Safety Gate
  subtitle: "Renal safety classifier: maps kidney adverse reactions to severity grades using KDIGO AKI staging and nephrotoxicity signals"
  icon: circle
  route: /vigilance/mg/renal-safety-gate
  steps:
    - field: reaction_pt
      label: reaction pt
      help: MedDRA preferred term for the renal reaction
      widget: text
      placeholder: null
    - field: creatinine_xbaseline
      label: creatinine xbaseline
      help: Serum creatinine as x baseline (e.g., 3.0 = 3x baseline)
      widget: text
      placeholder: null
  result:
    template: "severity: {{severity}} — soc: {{soc}} — aki_stage: {{aki_stage}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/renal-safety-gate
  cli: rsk mcg run renal-safety-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_dialysis
  nodes:
    check_dialysis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: DIALYSIS
      true_next: critical
      false_next: check_renal_failure
    check_renal_failure:
      type: condition
      variable: reaction_pt
      operator: contains
      value: RENAL FAILURE
      true_next: critical
      false_next: check_creat_stage3
    check_creat_stage3:
      type: condition
      variable: creatinine_xbaseline
      operator: gte
      value: 3
      true_next: critical_aki3
      false_next: check_creat_stage2
    check_creat_stage2:
      type: condition
      variable: creatinine_xbaseline
      operator: gte
      value: 2
      true_next: serious_aki2
      false_next: check_creat_stage1
    check_creat_stage1:
      type: condition
      variable: creatinine_xbaseline
      operator: gte
      value: 1.5
      true_next: moderate_aki1
      false_next: check_nephritis
    check_nephritis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: NEPHRITIS
      true_next: serious_nephritis
      false_next: mild
    critical:
      type: return
      value:
        severity: critical
        soc: Renal and urinary disorders
        aki_stage: 3
        action: immediate_expedited_report
    critical_aki3:
      type: return
      value:
        severity: critical
        soc: Renal and urinary disorders
        aki_stage: 3
        action: immediate_expedited_report
    serious_aki2:
      type: return
      value:
        severity: serious
        soc: Renal and urinary disorders
        aki_stage: 2
        action: expedited_report
    moderate_aki1:
      type: return
      value:
        severity: moderate
        soc: Renal and urinary disorders
        aki_stage: 1
        action: monitor_and_assess
    serious_nephritis:
      type: return
      value:
        severity: serious
        soc: Renal and urinary disorders
        aki_stage: 0
        action: expedited_report
    mild:
      type: return
      value:
        severity: mild
        soc: Renal and urinary disorders
        aki_stage: 0
        action: routine_surveillance
tests:
  - name: dialysis_required
    input:
      reaction_pt: DIALYSIS
    expect:
      severity: critical
      aki_stage: 3
  - name: renal_failure
    input:
      reaction_pt: ACUTE RENAL FAILURE
    expect:
      severity: critical
  - name: aki_stage3
    input:
      reaction_pt: BLOOD CREATININE INCREASED
      creatinine_xbaseline: 4
    expect:
      severity: critical
      aki_stage: 3
  - name: aki_stage2
    input:
      reaction_pt: BLOOD CREATININE INCREASED
      creatinine_xbaseline: 2.5
    expect:
      severity: serious
      aki_stage: 2
  - name: aki_stage1
    input:
      reaction_pt: BLOOD CREATININE INCREASED
      creatinine_xbaseline: 1.8
    expect:
      severity: moderate
      aki_stage: 1
  - name: nephritis
    input:
      reaction_pt: INTERSTITIAL NEPHRITIS
    expect:
      severity: serious
  - name: mild_proteinuria
    input:
      reaction_pt: PROTEINURIA
    expect:
      severity: mild
  - name: null_safety
    input: {}
    expect:
      severity: mild
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - severity
    - soc
    - aki_stage
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
