name: drug-profile-amoxicillin
description: 'Safety triage for amoxicillin: PRR-based signal routing (Type A)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    signal:
      type: return
      value:
        drug: amoxicillin
        harm_type: A
        signal: true
        action: investigate
        expected_prr: 1.8
    no_signal:
      type: return
      value:
        signal: false
        drug: amoxicillin
        harm_type: A
        action: monitor
        expected_prr: 1.8
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 1.8
  expect:
    drug: amoxicillin
    signal: false
- input:
    prr: 0.5
  expect:
    drug: amoxicillin
    signal: false
- input: {}
  expect:
    drug: amoxicillin
    signal: false
- input:
    prr: 1.999
  expect:
    harm_type: A
    action: monitor
    expected_prr: 1.8
    signal: false
    drug: amoxicillin
- input:
    prr: 2.001
  expect:
    action: investigate
    harm_type: A
    signal: true
    drug: amoxicillin
    expected_prr: 1.8
interface: null
primitive_signature: null
