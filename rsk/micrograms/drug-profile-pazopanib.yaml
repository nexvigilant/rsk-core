name: drug-profile-pazopanib
description: 'Safety triage for pazopanib: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    signal:
      type: return
      value:
        action: investigate
        expected_prr: 6.3
        signal: true
        harm_type: B
        drug: pazopanib
    no_signal:
      type: return
      value:
        drug: pazopanib
        harm_type: B
        signal: false
        expected_prr: 6.3
        action: monitor
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 6.3
  expect:
    signal: true
    drug: pazopanib
- input:
    prr: 0.5
  expect:
    drug: pazopanib
    signal: false
- input: {}
  expect:
    drug: pazopanib
    signal: false
- input:
    prr: 4.999
  expect:
    signal: false
    drug: pazopanib
    harm_type: B
    expected_prr: 6.3
    action: monitor
- input:
    prr: 5.001
  expect:
    action: investigate
    harm_type: B
    drug: pazopanib
    signal: true
    expected_prr: 6.3
interface: null
primitive_signature: null
