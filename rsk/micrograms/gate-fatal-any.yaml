name: gate-fatal-any
description: Any fatal outcome present
version: 0.1.0
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: death_count
      operator: gte
      value: 1
      true_next: pass
      false_next: fail
    fail:
      type: return
      value:
        threshold: death_count
        met: false
        gate: false
    pass:
      type: return
      value:
        threshold: death_count
        gate: true
        met: true
tests:
- input:
    death_count: 1
  expect:
    met: true
    gate: true
- input: {}
  expect:
    gate: false
    met: false
- input:
    death_count: 0
  expect:
    threshold: death_count
    met: false
    gate: false
- input:
    death_count: -1
  expect:
    met: false
    gate: false
    threshold: death_count
- input:
    death_count: 0
  expect:
    gate: false
    threshold: death_count
    met: false
- input:
    death_count: 2
  expect:
    threshold: death_count
    gate: true
    met: true
- input:
    death_count: 100
  expect:
    threshold: death_count
    gate: true
    met: true
interface: null
primitive_signature: null
