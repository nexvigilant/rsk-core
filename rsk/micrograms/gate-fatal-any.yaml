# MICROGRAM++ (upgraded 2026-04-23)
name: gate-fatal-any
version: 0.1.0
description: Any fatal outcome present
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Gate Fatal Any
  subtitle: Any fatal outcome present
  icon: circle
  route: /vigilance/mg/gate-fatal-any
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-fatal-any
  cli: rsk mcg run gate-fatal-any
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: death_count
      operator: gte
      value: 1
      true_next: pass
      false_next: fail
    fail:
      type: return
      value:
        threshold: death_count
        met: false
        gate: false
    pass:
      type: return
      value:
        threshold: death_count
        gate: true
        met: true
tests:
  - input:
      death_count: 1
    expect:
      met: true
      gate: true
  - input: {}
    expect:
      gate: false
      met: false
  - input:
      death_count: 0
    expect:
      threshold: death_count
      met: false
      gate: false
  - input:
      death_count: -1
    expect:
      met: false
      gate: false
      threshold: death_count
  - input:
      death_count: 0
    expect:
      gate: false
      threshold: death_count
      met: false
  - input:
      death_count: 2
    expect:
      threshold: death_count
      gate: true
      met: true
  - input:
      death_count: 100
    expect:
      threshold: death_count
      gate: true
      met: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
