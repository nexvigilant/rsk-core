name: drug-profile-osimertinib
description: 'Safety triage for osimertinib: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
    no_signal:
      type: return
      value:
        harm_type: B
        expected_prr: 4.4
        signal: false
        action: monitor
        drug: osimertinib
    signal:
      type: return
      value:
        drug: osimertinib
        harm_type: B
        expected_prr: 4.4
        signal: true
        action: investigate
tests:
- input:
    prr: 4.4
  expect:
    drug: osimertinib
    signal: false
- input:
    prr: 0.5
  expect:
    signal: false
    drug: osimertinib
- input: {}
  expect:
    drug: osimertinib
    signal: false
- input:
    prr: 4.999
  expect:
    expected_prr: 4.4
    signal: false
    action: monitor
    drug: osimertinib
    harm_type: B
- input:
    prr: 5.001
  expect:
    harm_type: B
    signal: true
    expected_prr: 4.4
    drug: osimertinib
    action: investigate
interface: null
primitive_signature: null
