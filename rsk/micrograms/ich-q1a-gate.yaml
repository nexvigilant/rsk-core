name: ich-q1a-gate
description: "ICH Q1A compliance: Stability Testing"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "stability_done"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH Q1A"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH Q1A"
        compliant: false
        action: "remediate"
        gap: "stability_done"

tests:
  - input: {"stability_done": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
