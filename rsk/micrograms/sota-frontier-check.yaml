name: sota-frontier-check
description: 'SOTA Tracker: evaluates whether a finding represents frontier movement in a PV domain based on evidence level and authority weight'
version: 0.1.0
primitive_signature:
  dominant: boundary
  expression: "∂(comparison(finding, frontier))"
  primes: [boundary, comparison, state, threshold]
  arguments: [domain, evidence_level, authority_weight]

interface:
  inputs:
    evidence_level:
      type: int
      required: true
      description: "Strength of evidence (1=opinion, 2=case series, 3=observational, 4=RCT, 5=systematic review/meta-analysis)"
    authority_weight:
      type: int
      required: true
      description: "Threshold authority recognition (1=preprint, 2=peer-reviewed, 3=guideline-cited, 4=regulatory-adopted, 5=ICH/WHO standard)"
    novelty_score:
      type: int
      required: false
      description: "How novel vs current frontier (0=known, 25=incremental, 50=significant, 75=paradigm-adjacent, 100=paradigm-shift)"
  outputs:
    frontier_movement:
      type: string
    severity:
      type: string
    action:
      type: string
    combined_score:
      type: int

tree:
  start: check_evidence
  nodes:
    # Gate 1: Evidence must be at least observational (level 3+)
    check_evidence:
      type: condition
      variable: evidence_level
      operator: gte
      value: 3
      true_next: check_authority
      false_next: insufficient_evidence

    # Gate 2: Authority must be at least peer-reviewed (weight 2+)
    check_authority:
      type: condition
      variable: authority_weight
      operator: gte
      value: 2
      true_next: check_paradigm_shift
      false_next: unrecognized_authority

    # Branch: Paradigm shift detection (novelty >= 75 AND evidence >= 4 AND authority >= 4)
    check_paradigm_shift:
      type: condition
      variable: novelty_score
      operator: gte
      value: 75
      true_next: check_paradigm_evidence
      false_next: check_significant

    check_paradigm_evidence:
      type: condition
      variable: evidence_level
      operator: gte
      value: 4
      true_next: check_paradigm_authority
      false_next: check_significant

    check_paradigm_authority:
      type: condition
      variable: authority_weight
      operator: gte
      value: 4
      true_next: paradigm_shift
      false_next: check_significant

    # Branch: Significant frontier movement (novelty >= 50 AND evidence >= 3 AND authority >= 3)
    check_significant:
      type: condition
      variable: novelty_score
      operator: gte
      value: 50
      true_next: check_sig_authority
      false_next: check_incremental

    check_sig_authority:
      type: condition
      variable: authority_weight
      operator: gte
      value: 3
      true_next: significant_movement
      false_next: check_incremental

    # Branch: Incremental advance (novelty >= 25)
    check_incremental:
      type: condition
      variable: novelty_score
      operator: gte
      value: 25
      true_next: incremental_advance
      false_next: no_movement

    # Return nodes
    paradigm_shift:
      type: return
      value:
        frontier_movement: PARADIGM_SHIFT
        severity: P0
        action: "Immediate review — domain frontier has fundamentally moved. Update all dependent standards, retrain affected modules, notify stakeholders."
        combined_score: 100

    significant_movement:
      type: return
      value:
        frontier_movement: SIGNIFICANT
        severity: P1
        action: "Schedule frontier review within 30 days. Evaluate whether current tools/methods need updating against new standard."
        combined_score: 75

    incremental_advance:
      type: return
      value:
        frontier_movement: INCREMENTAL
        severity: P2
        action: "Log frontier advance. No immediate action required. Include in next periodic SOTA review."
        combined_score: 40

    no_movement:
      type: return
      value:
        frontier_movement: NONE
        severity: NONE
        action: "Finding is within current frontier. No SOTA drift detected."
        combined_score: 0

    insufficient_evidence:
      type: return
      value:
        frontier_movement: UNQUALIFIED
        severity: NONE
        action: "Evidence level too low to assess frontier movement. Minimum: observational study (level 3)."
        combined_score: 0

    unrecognized_authority:
      type: return
      value:
        frontier_movement: UNQUALIFIED
        severity: NONE
        action: "Finding not yet recognized by threshold authority. Monitor for peer-review acceptance."
        combined_score: 0

tests:
  # Paradigm shift: systematic review + ICH standard + paradigm-level novelty
  - input:
      evidence_level: 5
      authority_weight: 5
      novelty_score: 90
    expect:
      frontier_movement: PARADIGM_SHIFT
      severity: P0
      combined_score: 100

  # Significant: observational + guideline-cited + significant novelty
  - input:
      evidence_level: 3
      authority_weight: 3
      novelty_score: 60
    expect:
      frontier_movement: SIGNIFICANT
      severity: P1
      combined_score: 75

  # Incremental: RCT + peer-reviewed + modest novelty
  - input:
      evidence_level: 4
      authority_weight: 2
      novelty_score: 30
    expect:
      frontier_movement: INCREMENTAL
      severity: P2
      combined_score: 40

  # No movement: high evidence but no novelty
  - input:
      evidence_level: 5
      authority_weight: 5
      novelty_score: 10
    expect:
      frontier_movement: NONE
      severity: NONE
      combined_score: 0

  # Insufficient evidence: opinion piece
  - input:
      evidence_level: 1
      authority_weight: 3
      novelty_score: 80
    expect:
      frontier_movement: UNQUALIFIED
      severity: NONE
      combined_score: 0

  # Unrecognized authority: preprint with high novelty
  - input:
      evidence_level: 4
      authority_weight: 1
      novelty_score: 70
    expect:
      frontier_movement: UNQUALIFIED
      severity: NONE
      combined_score: 0

  # Null safety
  - input: {}
    expect:
      frontier_movement: UNQUALIFIED
      severity: NONE
      combined_score: 0

  # High novelty but low authority — blocks at gate 2
  - input:
      evidence_level: 5
      authority_weight: 1
      novelty_score: 95
    expect:
      frontier_movement: UNQUALIFIED
      severity: NONE
      combined_score: 0

  # Edge: exactly at paradigm thresholds
  - input:
      evidence_level: 4
      authority_weight: 4
      novelty_score: 75
    expect:
      frontier_movement: PARADIGM_SHIFT
      severity: P0
      combined_score: 100

  # Edge: novelty 50 but authority only 2 — falls to incremental
  - input:
      evidence_level: 3
      authority_weight: 2
      novelty_score: 50
    expect:
      frontier_movement: INCREMENTAL
      severity: P2
      combined_score: 40
