# MICROGRAM++ (upgraded 2026-04-23)
name: regulatory-to-labeling
version: 0.1.0
description: Routes regulatory decisions to corresponding label update actions
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: regulatory_decision
    type: string
    required: true
    description: "Regulatory action: restrict, warn, withdraw, monitor"
outputs:
  - name: labeling_action
    type: string
  - name: section_affected
    type: string
  - name: urgency_level
    type: string
interface:
  inputs:
    regulatory_decision:
      type: string
      required: true
      description: "Regulatory action: restrict, warn, withdraw, monitor"
  outputs:
    labeling_action:
      type: string
      description: Type of label update required
    section_affected:
      type: string
      description: Section of label to be updated
    urgency_level:
      type: string
      description: "Urgency: immediate, routine, deferred"
ui:
  title: Regulatory To Labeling
  subtitle: Routes regulatory decisions to corresponding label update actions
  icon: circle
  route: /vigilance/mg/regulatory-to-labeling
  steps:
    - field: regulatory_decision
      label: regulatory decision
      help: "Regulatory action: restrict, warn, withdraw, monitor"
      widget: text
      placeholder: null
  result:
    template: "labeling_action: {{labeling_action}} — section_affected: {{section_affected}} — urgency_level: {{urgency_level}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/regulatory-to-labeling
  cli: rsk mcg run regulatory-to-labeling
  auth: none
  rate_limit: 600/min
tree:
  start: check_decision
  nodes:
    check_decision:
      type: condition
      variable: regulatory_decision
      operator: eq
      value: restrict
      true_next: restrict_path
      false_next: check_warn
    restrict_path:
      type: return
      value:
        labeling_action: add_restriction
        section_affected: contraindications_and_restrictions
        urgency_level: immediate
    check_warn:
      type: condition
      variable: regulatory_decision
      operator: eq
      value: warn
      true_next: warn_path
      false_next: check_withdraw
    warn_path:
      type: return
      value:
        labeling_action: add_warning
        section_affected: warnings_and_precautions
        urgency_level: immediate
    check_withdraw:
      type: condition
      variable: regulatory_decision
      operator: eq
      value: withdraw
      true_next: withdraw_path
      false_next: monitor_path
    withdraw_path:
      type: return
      value:
        labeling_action: remove_indication
        section_affected: indications_and_usage
        urgency_level: immediate
    monitor_path:
      type: return
      value:
        labeling_action: add_monitoring_requirement
        section_affected: patient_monitoring
        urgency_level: routine
tests:
  - input:
      regulatory_decision: restrict
    expect:
      labeling_action: add_restriction
      section_affected: contraindications_and_restrictions
      urgency_level: immediate
  - input:
      regulatory_decision: warn
    expect:
      labeling_action: add_warning
      section_affected: warnings_and_precautions
      urgency_level: immediate
  - input:
      regulatory_decision: withdraw
    expect:
      labeling_action: remove_indication
      section_affected: indications_and_usage
      urgency_level: immediate
  - input:
      regulatory_decision: monitor
    expect:
      labeling_action: add_monitoring_requirement
      section_affected: patient_monitoring
      urgency_level: routine
  - input: {}
    expect:
      labeling_action: add_monitoring_requirement
      section_affected: patient_monitoring
      urgency_level: routine
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - labeling_action
    - section_affected
    - urgency_level
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
