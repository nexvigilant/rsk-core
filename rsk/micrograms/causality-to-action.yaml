# MICROGRAM++ (upgraded 2026-04-23)
name: causality-to-action
version: 0.2.0
description: "Bridge: routes causality assessment results to regulatory action with ICH E2B deadlines. Chains from naranjo-quick output."
family: pv.causality
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: causality
    type: string
    required: true
    description: ""
  - name: is_serious
    type: bool
    required: false
    description: ""
outputs:
  - name: regulatory_action
    type: string
  - name: deadline_days
    type: int
  - name: reporting_type
    type: string
  - name: reason
    type: string
interface:
  inputs:
    causality:
      type: string
      required: true
    is_serious:
      type: bool
      required: false
  outputs:
    regulatory_action:
      type: string
    deadline_days:
      type: int
    reporting_type:
      type: string
    reason:
      type: string
ui:
  title: Causality To Action
  subtitle: "Bridge: routes causality assessment results to regulatory action with ICH E2B deadlines. Chains from naranjo-quick output."
  icon: git-branch
  route: /vigilance/mg/causality-to-action
  steps:
    - field: causality
      label: causality
      help: Enter causality
      widget: text
      placeholder: null
    - field: is_serious
      label: is serious
      help: Enter is_serious
      widget: toggle
      placeholder: null
  result:
    template: "regulatory_action: {{regulatory_action}} — deadline_days: {{deadline_days}} — reporting_type: {{reporting_type}} — reason: {{reason}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/causality-to-action
  cli: rsk mcg run causality-to-action
  auth: none
  rate_limit: 600/min
tree:
  start: check_causality_present
  nodes:
    check_causality_present:
      type: condition
      variable: causality
      operator: is_null
      value: null
      true_next: reject_missing_causality
      false_next: check_definite
    reject_missing_causality:
      type: return
      value:
        regulatory_action: REJECTED
        deadline_days: 0
        reporting_type: none
        reason: "REJECTED: causality field is required. This microgram must receive output from naranjo-quick or equivalent causality assessment. Direct bypass from signal detection is not permitted."
    check_definite:
      type: condition
      variable: causality
      operator: eq
      value: DEFINITE
      true_next: definite_serious_check
      false_next: check_probable
    definite_serious_check:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: expedited_report
      false_next: standard_report
    expedited_report:
      type: return
      value:
        regulatory_action: expedited_report
        deadline_days: 7
        reporting_type: IND_safety_report
        reason: Serious case with definite causality requires 7-day expedited reporting per ICH E2B
    standard_report:
      type: return
      value:
        regulatory_action: standard_report
        deadline_days: 15
        reporting_type: 15_day_report
        reason: Definite causality warrants 15-day standard reporting
    check_probable:
      type: condition
      variable: causality
      operator: eq
      value: PROBABLE
      true_next: probable_serious_check
      false_next: check_possible
    probable_serious_check:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: probable_serious
      false_next: periodic_report
    probable_serious:
      type: return
      value:
        regulatory_action: expedited_report
        deadline_days: 15
        reporting_type: 15_day_report
        reason: Serious case with probable causality requires 15-day expedited reporting per ICH E2B
    periodic_report:
      type: return
      value:
        regulatory_action: periodic_report
        deadline_days: 90
        reporting_type: PSUR_PBRER
        reason: Probable causality in non-serious case included in periodic safety update
    check_possible:
      type: condition
      variable: causality
      operator: eq
      value: POSSIBLE
      true_next: monitor_and_document
      false_next: document_only
    monitor_and_document:
      type: return
      value:
        regulatory_action: monitor
        deadline_days: 90
        reporting_type: PSUR_PBRER
        reason: Possible causality - monitor and include in periodic reporting
    document_only:
      type: return
      value:
        regulatory_action: document
        deadline_days: 0
        reporting_type: internal_record
        reason: Doubtful or no causality - document internally for signal tracking
tests:
  - input:
      causality: DEFINITE
      is_serious: true
    expect:
      regulatory_action: expedited_report
      deadline_days: 7
      reporting_type: IND_safety_report
      reason: Serious case with definite causality requires 7-day expedited reporting per ICH E2B
  - input:
      causality: DEFINITE
      is_serious: false
    expect:
      regulatory_action: standard_report
      deadline_days: 15
      reporting_type: 15_day_report
      reason: Definite causality warrants 15-day standard reporting
  - input:
      causality: PROBABLE
      is_serious: true
    expect:
      regulatory_action: expedited_report
      deadline_days: 15
      reporting_type: 15_day_report
      reason: Serious case with probable causality requires 15-day expedited reporting per ICH E2B
  - input:
      causality: PROBABLE
      is_serious: false
    expect:
      regulatory_action: periodic_report
      deadline_days: 90
      reporting_type: PSUR_PBRER
      reason: Probable causality in non-serious case included in periodic safety update
  - input:
      causality: POSSIBLE
      is_serious: true
    expect:
      regulatory_action: monitor
      deadline_days: 90
      reporting_type: PSUR_PBRER
      reason: Possible causality - monitor and include in periodic reporting
  - input:
      causality: POSSIBLE
      is_serious: false
    expect:
      regulatory_action: monitor
      deadline_days: 90
      reporting_type: PSUR_PBRER
      reason: Possible causality - monitor and include in periodic reporting
  - input:
      causality: DOUBTFUL
      is_serious: true
    expect:
      regulatory_action: document
      deadline_days: 0
      reporting_type: internal_record
      reason: Doubtful or no causality - document internally for signal tracking
  - input:
      causality: DOUBTFUL
      is_serious: false
    expect:
      regulatory_action: document
      deadline_days: 0
      reporting_type: internal_record
      reason: Doubtful or no causality - document internally for signal tracking
  - input: {}
    expect:
      regulatory_action: REJECTED
      deadline_days: 0
      reporting_type: none
      reason: "REJECTED: causality field is required. This microgram must receive output from naranjo-quick or equivalent causality assessment. Direct bypass from signal detection is not permitted."
  - input:
      causality: DEFINITE
      is_serious: true
    expect:
      regulatory_action: expedited_report
      deadline_days: 7
      reporting_type: IND_safety_report
      reason: Serious case with definite causality requires 7-day expedited reporting per ICH E2B
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - regulatory_action
    - deadline_days
    - reporting_type
    - reason
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.causality
  log_level: info
governance:
  sop_ref: SOP-PV-002
  regulatory_ref:
    - ICH-E2A
    - WHO-UMC
  harm_types:
    - A
    - B
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - hierarchy
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
