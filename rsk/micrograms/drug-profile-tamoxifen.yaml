name: drug-profile-tamoxifen
description: 'Safety triage for tamoxifen: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        action: investigate
        signal: true
        harm_type: B
        expected_prr: 4.3
        drug: tamoxifen
    no_signal:
      type: return
      value:
        signal: false
        drug: tamoxifen
        action: monitor
        harm_type: B
        expected_prr: 4.3
tests:
- input:
    prr: 4.3
  expect:
    signal: false
    drug: tamoxifen
- input:
    prr: 0.5
  expect:
    signal: false
    drug: tamoxifen
- input: {}
  expect:
    drug: tamoxifen
    signal: false
- input:
    prr: 4.999
  expect:
    harm_type: B
    drug: tamoxifen
    expected_prr: 4.3
    signal: false
    action: monitor
- input:
    prr: 5.001
  expect:
    harm_type: B
    drug: tamoxifen
    signal: true
    expected_prr: 4.3
    action: investigate
interface: null
primitive_signature: null
