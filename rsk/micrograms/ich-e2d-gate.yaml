name: ich-e2d-gate
description: "ICH E2D compliance: Post-Approval Safety — Reporting"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "post_approval"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH E2D"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH E2D"
        compliant: false
        action: "remediate"
        gap: "post_approval"

tests:
  - input: {"post_approval": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
