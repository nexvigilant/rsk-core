# MICROGRAM++ (upgraded 2026-04-23)
name: stability-island-detect
version: 0.1.0
description: Local-maxima stability gate — classifies system state as island/shelf/sink (Module 23 port)
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: stability
    type: float
    required: true
    description: ""
  - name: max_neighbor_stability
    type: float
    required: true
    description: ""
outputs:
  - name: is_island
    type: bool
  - name: classification
    type: string
interface:
  inputs:
    stability:
      type: float
      required: true
    max_neighbor_stability:
      type: float
      required: true
  outputs:
    is_island:
      type: bool
    classification:
      type: string
ui:
  title: Stability Island Detect
  subtitle: Local-maxima stability gate — classifies system state as island/shelf/sink (Module 23 port)
  icon: circle
  route: /vigilance/mg/stability-island-detect
  steps:
    - field: stability
      label: stability
      help: Enter stability
      widget: text
      placeholder: null
    - field: max_neighbor_stability
      label: max neighbor stability
      help: Enter max_neighbor_stability
      widget: text
      placeholder: null
  result:
    template: "is_island: {{is_island}} — classification: {{classification}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/stability-island-detect
  cli: rsk mcg run stability-island-detect
  auth: none
  rate_limit: 600/min
tree:
  start: check_island
  nodes:
    check_island:
      type: condition
      variable: stability
      operator: gte
      value: 0.8
      true_next: check_local_max
      false_next: check_shelf
    check_local_max:
      type: condition
      variable: max_neighbor_stability
      operator: lt
      value: 0.8
      true_next: island
      false_next: plateau
    check_shelf:
      type: condition
      variable: stability
      operator: gte
      value: 0.5
      true_next: shelf
      false_next: sink
    island:
      type: return
      value:
        is_island: true
        classification: stable_island
    plateau:
      type: return
      value:
        is_island: false
        classification: plateau
    shelf:
      type: return
      value:
        is_island: false
        classification: metastable_shelf
    sink:
      type: return
      value:
        is_island: false
        classification: decay_sink
tests:
  - input:
      stability: 0.9
      max_neighbor_stability: 0.4
    expect:
      is_island: true
      classification: stable_island
  - input:
      stability: 0.85
      max_neighbor_stability: 0.85
    expect:
      is_island: false
      classification: plateau
  - input:
      stability: 0.6
      max_neighbor_stability: 0.3
    expect:
      is_island: false
      classification: metastable_shelf
  - input:
      stability: 0.2
      max_neighbor_stability: 0.1
    expect:
      is_island: false
      classification: decay_sink
  - input: {}
    expect:
      is_island: false
      classification: decay_sink
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - is_island
    - classification
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
