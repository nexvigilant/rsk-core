# MICROGRAM++ (upgraded 2026-04-23)
name: fda-otc-ae-reporting
version: 0.1.0
description: "FDA OTC postmarketing adverse event reporting obligations: routes by product status and seriousness per FDA Guidance 'Postmarketing AE Reporting for Nonprescription Human Drug Products Marketed Without an Approved Application' (2009) and Dietary Supplement and Nonprescription Drug Consumer Protection Act (2006)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: product_status
    type: string
    required: true
    description: "OTC product regulatory status: otc_monograph, approved_nda, unapproved_marketed, dietary_supplement"
  - name: serious
    type: bool
    required: true
    description: Whether the adverse event meets serious criteria
  - name: reporter_type
    type: string
    required: false
    description: "Who reported: consumer, healthcare_professional, manufacturer"
outputs:
  - name: reporting_required
    type: bool
  - name: report_type
    type: string
  - name: timeline_days
    type: int
  - name: submission_method
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    product_status:
      type: string
      required: true
      description: "OTC product regulatory status: otc_monograph, approved_nda, unapproved_marketed, dietary_supplement"
    serious:
      type: bool
      required: true
      description: Whether the adverse event meets serious criteria
    reporter_type:
      type: string
      required: false
      description: "Who reported: consumer, healthcare_professional, manufacturer"
  outputs:
    reporting_required:
      type: bool
    report_type:
      type: string
    timeline_days:
      type: int
    submission_method:
      type: string
    regulatory_reference:
      type: string
ui:
  title: Fda Otc Ae Reporting
  subtitle: "FDA OTC postmarketing adverse event reporting obligations: routes by product status and seriousness per FDA Guidance 'Postmarketing AE Reporting for Nonprescription Human Drug Products Marketed Without an Approved Application' (2009) and Dietary Supplement and Nonprescription Drug Consumer Protection Act (2006)"
  icon: circle
  route: /vigilance/mg/fda-otc-ae-reporting
  steps:
    - field: product_status
      label: product status
      help: "OTC product regulatory status: otc_monograph, approved_nda, unapproved_marketed, dietary_supplement"
      widget: text
      placeholder: null
    - field: serious
      label: serious
      help: Whether the adverse event meets serious criteria
      widget: toggle
      placeholder: null
    - field: reporter_type
      label: reporter type
      help: "Who reported: consumer, healthcare_professional, manufacturer"
      widget: text
      placeholder: null
  result:
    template: "reporting_required: {{reporting_required}} — report_type: {{report_type}} — timeline_days: {{timeline_days}} — submission_method: {{submission_method}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/fda-otc-ae-reporting
  cli: rsk mcg run fda-otc-ae-reporting
  auth: none
  rate_limit: 600/min
tree:
  start: check_product_status
  nodes:
    check_product_status:
      type: condition
      variable: product_status
      operator: eq
      value: approved_nda
      true_next: nda_serious_check
      false_next: check_monograph
    check_monograph:
      type: condition
      variable: product_status
      operator: eq
      value: otc_monograph
      true_next: monograph_serious_check
      false_next: check_dietary
    check_dietary:
      type: condition
      variable: product_status
      operator: eq
      value: dietary_supplement
      true_next: dietary_serious_check
      false_next: unapproved_serious_check
    nda_serious_check:
      type: condition
      variable: serious
      operator: eq
      value: true
      true_next: nda_serious
      false_next: nda_nonserious
    nda_serious:
      type: return
      value:
        reporting_required: true
        report_type: 15-DAY_EXPEDITED
        timeline_days: 15
        submission_method: E2B(R3) via FDA ESG or MedWatch 3500A
        regulatory_reference: "21 CFR 314.80(c)(1); FDA Guidance: Postmarketing AE Reporting for Nonprescription Products (2009)"
    nda_nonserious:
      type: return
      value:
        reporting_required: true
        report_type: PERIODIC
        timeline_days: 90
        submission_method: NDA Periodic Safety Report or MedWatch 3500A
        regulatory_reference: "21 CFR 314.80(c)(2); FDA Guidance: Postmarketing AE Reporting for Nonprescription Products (2009)"
    monograph_serious_check:
      type: condition
      variable: serious
      operator: eq
      value: true
      true_next: monograph_serious
      false_next: monograph_nonserious
    monograph_serious:
      type: return
      value:
        reporting_required: true
        report_type: MANDATORY_SERIOUS
        timeline_days: 15
        submission_method: MedWatch 3500A to FDA
        regulatory_reference: Dietary Supplement and Nonprescription Drug Consumer Protection Act (2006); FDA Guidance (2009), Section III.B
    monograph_nonserious:
      type: return
      value:
        reporting_required: false
        report_type: VOLUNTARY
        timeline_days: 0
        submission_method: MedWatch 3500B voluntary reporting encouraged
        regulatory_reference: "FDA Guidance: Postmarketing AE Reporting for Nonprescription Products (2009), Section III.C"
    dietary_serious_check:
      type: condition
      variable: serious
      operator: eq
      value: true
      true_next: dietary_serious
      false_next: dietary_nonserious
    dietary_serious:
      type: return
      value:
        reporting_required: true
        report_type: MANDATORY_SERIOUS
        timeline_days: 15
        submission_method: MedWatch 3500A to FDA
        regulatory_reference: Dietary Supplement and Nonprescription Drug Consumer Protection Act (2006), Section 761
    dietary_nonserious:
      type: return
      value:
        reporting_required: false
        report_type: VOLUNTARY
        timeline_days: 0
        submission_method: MedWatch 3500B voluntary reporting encouraged
        regulatory_reference: Dietary Supplement and Nonprescription Drug Consumer Protection Act (2006)
    unapproved_serious_check:
      type: condition
      variable: serious
      operator: eq
      value: true
      true_next: unapproved_serious
      false_next: unapproved_nonserious
    unapproved_serious:
      type: return
      value:
        reporting_required: true
        report_type: MANDATORY_SERIOUS
        timeline_days: 15
        submission_method: MedWatch 3500A to FDA
        regulatory_reference: Dietary Supplement and Nonprescription Drug Consumer Protection Act (2006); FDA Guidance (2009), Section IV
    unapproved_nonserious:
      type: return
      value:
        reporting_required: false
        report_type: VOLUNTARY
        timeline_days: 0
        submission_method: MedWatch 3500B voluntary reporting encouraged
        regulatory_reference: "FDA Guidance: Postmarketing AE Reporting for Nonprescription Products (2009), Section IV"
tests:
  - input:
      product_status: approved_nda
      serious: true
    expect:
      reporting_required: true
      report_type: 15-DAY_EXPEDITED
      timeline_days: 15
  - input:
      product_status: approved_nda
      serious: false
    expect:
      reporting_required: true
      report_type: PERIODIC
      timeline_days: 90
  - input:
      product_status: otc_monograph
      serious: true
    expect:
      reporting_required: true
      report_type: MANDATORY_SERIOUS
      timeline_days: 15
  - input:
      product_status: otc_monograph
      serious: false
    expect:
      reporting_required: false
      report_type: VOLUNTARY
  - input:
      product_status: dietary_supplement
      serious: true
    expect:
      reporting_required: true
      timeline_days: 15
  - input:
      product_status: dietary_supplement
      serious: false
    expect:
      reporting_required: false
      report_type: VOLUNTARY
  - input:
      product_status: unapproved_marketed
      serious: true
    expect:
      reporting_required: true
      timeline_days: 15
  - input: {}
    expect:
      reporting_required: false
      report_type: VOLUNTARY
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - reporting_required
    - report_type
    - timeline_days
    - submission_method
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
