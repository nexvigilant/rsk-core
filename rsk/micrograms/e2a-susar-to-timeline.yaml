name: e2a-susar-to-timeline
description: 'ICH E2A bridge: maps SUSAR classification output to specific reporting deadline. Chains from e2a-reporting-obligation (report_as_susar) + case-seriousness (is_fatal, is_life_threatening) to e2a-reporting-timeline.'
version: 1.0.0
interface:
  inputs:
    is_fatal:
      type: bool
      required: false
    is_life_threatening:
      type: bool
      required: false
    is_unexpected:
      type: bool
      required: false
    report_as_susar:
      type: bool
      required: false
  outputs:
    deadline_days:
      type: int
    regulatory_reference:
      type: string
    report_type:
      type: string
    timeline_category:
      type: string
tree:
  start: check_susar
  nodes:
    check_susar:
      type: condition
      variable: report_as_susar
      operator: eq
      value: true
      true_next: check_fatal_lt
      false_next: no_susar_deadline
    check_fatal_lt:
      type: condition
      variable: is_fatal
      operator: eq
      value: true
      true_next: seven_day_report
      false_next: check_life_threatening
    check_life_threatening:
      type: condition
      variable: is_life_threatening
      operator: eq
      value: true
      true_next: seven_day_report
      false_next: fifteen_day_report
    seven_day_report:
      type: return
      value:
        timeline_category: 7_DAY_EXPEDITED
        deadline_days: 7
        report_type: SUSAR_INITIAL_7DAY
        regulatory_reference: "ICH E2A Section III.B.1 - Fatal/life-threatening SUSAR: 7-day initial report required"
    fifteen_day_report:
      type: return
      value:
        timeline_category: 15_DAY_EXPEDITED
        deadline_days: 15
        report_type: SUSAR_INITIAL_15DAY
        regulatory_reference: "ICH E2A Section III.B.2 - Serious unexpected SUSAR (non-fatal/non-LT): 15-day initial report required"
    no_susar_deadline:
      type: return
      value:
        timeline_category: PERIODIC_OR_ANNUAL
        deadline_days: 90
        report_type: ANNUAL_SAFETY_REPORT
        regulatory_reference: ICH E2A Section III.B.3 - Non-SUSAR cases in annual safety reports/line listings
primitive_signature:
  dominant: '→'
  expression: '→ — SUSAR status to reporting deadline bridge'
  primes: ['→', 'σ']
  arguments: ['report_as_susar', 'is_fatal', 'is_life_threatening']
  chain_prediction: 'Bridge microgram: receives report_as_susar from e2a-reporting-obligation and seriousness flags from case-seriousness. Feeds deadline_days into workflow-router for task scheduling.'
tests:
# SUSAR + fatal = 7-day
- input:
    report_as_susar: true
    is_fatal: true
    is_life_threatening: false
    is_unexpected: true
  expect:
    timeline_category: 7_DAY_EXPEDITED
    deadline_days: 7
    report_type: SUSAR_INITIAL_7DAY
    regulatory_reference: "ICH E2A Section III.B.1 - Fatal/life-threatening SUSAR: 7-day initial report required"
# SUSAR + life-threatening = 7-day
- input:
    report_as_susar: true
    is_fatal: false
    is_life_threatening: true
    is_unexpected: true
  expect:
    timeline_category: 7_DAY_EXPEDITED
    deadline_days: 7
    report_type: SUSAR_INITIAL_7DAY
    regulatory_reference: "ICH E2A Section III.B.1 - Fatal/life-threatening SUSAR: 7-day initial report required"
# SUSAR + both fatal and LT = 7-day
- input:
    report_as_susar: true
    is_fatal: true
    is_life_threatening: true
    is_unexpected: true
  expect:
    timeline_category: 7_DAY_EXPEDITED
    deadline_days: 7
    report_type: SUSAR_INITIAL_7DAY
    regulatory_reference: "ICH E2A Section III.B.1 - Fatal/life-threatening SUSAR: 7-day initial report required"
# SUSAR + serious but not fatal/LT = 15-day
- input:
    report_as_susar: true
    is_fatal: false
    is_life_threatening: false
    is_unexpected: true
  expect:
    timeline_category: 15_DAY_EXPEDITED
    deadline_days: 15
    report_type: SUSAR_INITIAL_15DAY
    regulatory_reference: "ICH E2A Section III.B.2 - Serious unexpected SUSAR (non-fatal/non-LT): 15-day initial report required"
# Not a SUSAR = periodic
- input:
    report_as_susar: false
    is_fatal: false
    is_life_threatening: false
    is_unexpected: false
  expect:
    timeline_category: PERIODIC_OR_ANNUAL
    deadline_days: 90
    report_type: ANNUAL_SAFETY_REPORT
    regulatory_reference: ICH E2A Section III.B.3 - Non-SUSAR cases in annual safety reports/line listings
# Empty input = periodic (no SUSAR)
- input: {}
  expect:
    timeline_category: PERIODIC_OR_ANNUAL
    deadline_days: 90
    report_type: ANNUAL_SAFETY_REPORT
    regulatory_reference: ICH E2A Section III.B.3 - Non-SUSAR cases in annual safety reports/line listings
