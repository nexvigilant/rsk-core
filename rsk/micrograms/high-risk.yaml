name: high-risk
description: Critical risk threshold
version: 0.1.0
interface:
  inputs:
    score:
      type: float
      required: false
  outputs:
    result:
      type: bool
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: score
      operator: gte
      value: 90
      true_next: yes
      false_next: no
    no:
      type: return
      value:
        result: false
    yes:
      type: return
      value:
        result: true
tests:
- input:
    score: 90
  expect:
    result: true
- input:
    score: 91
  expect:
    result: true
- input:
    score: 89
  expect:
    result: false
- input:
    score: 0
  expect:
    result: false
- input:
    score: -1
  expect:
    result: false
- input:
    score: 9000
  expect:
    result: true
- input: {}
  expect:
    result: false
