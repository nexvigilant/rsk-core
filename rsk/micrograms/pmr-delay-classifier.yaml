# MICROGRAM++ (upgraded 2026-04-23)
name: pmr-delay-classifier
version: 0.1.0
description: "PMR/PMC compliance status classifier: maps status, due date, and days overdue to on_track/at_risk/delayed/critical classification with recommended action"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: status
    type: string
    required: true
    description: ""
  - name: has_due_date
    type: bool
    required: true
    description: ""
  - name: days_overdue
    type: number
    required: false
    description: ""
  - name: delay_rate
    type: number
    required: false
    description: ""
outputs:
  - name: classification
    type: string
  - name: action
    type: string
interface:
  inputs:
    status:
      type: string
      required: true
    has_due_date:
      type: bool
      required: true
    days_overdue:
      type: number
      required: false
    delay_rate:
      type: number
      required: false
  outputs:
    classification:
      type: string
    action:
      type: string
ui:
  title: Pmr Delay Classifier
  subtitle: "PMR/PMC compliance status classifier: maps status, due date, and days overdue to on_track/at_risk/delayed/critical classification with recommended action"
  icon: circle
  route: /vigilance/mg/pmr-delay-classifier
  steps:
    - field: status
      label: status
      help: Enter status
      widget: text
      placeholder: null
    - field: has_due_date
      label: has due date
      help: Enter has_due_date
      widget: toggle
      placeholder: null
    - field: days_overdue
      label: days overdue
      help: Enter days_overdue
      widget: number
      placeholder: null
    - field: delay_rate
      label: delay rate
      help: Enter delay_rate
      widget: number
      placeholder: null
  result:
    template: "classification: {{classification}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pmr-delay-classifier
  cli: rsk mcg run pmr-delay-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_fulfilled
  nodes:
    check_fulfilled:
      type: condition
      variable: status
      operator: eq
      value: Fulfilled
      true_next: on_track_fulfilled
      false_next: check_released
    check_released:
      type: condition
      variable: status
      operator: eq
      value: Released
      true_next: on_track_released
      false_next: check_terminated
    check_terminated:
      type: condition
      variable: status
      operator: eq
      value: Terminated
      true_next: on_track_terminated
      false_next: check_delayed
    check_delayed:
      type: condition
      variable: status
      operator: eq
      value: Delayed
      true_next: check_days_overdue_critical
      false_next: check_pending
    check_days_overdue_critical:
      type: condition
      variable: days_overdue
      operator: gte
      value: 180
      true_next: critical_overdue
      false_next: check_days_overdue_90
    check_days_overdue_90:
      type: condition
      variable: days_overdue
      operator: gte
      value: 90
      true_next: delayed_significant
      false_next: delayed_recent
    check_pending:
      type: condition
      variable: status
      operator: eq
      value: Pending
      true_next: check_pending_due
      false_next: check_ongoing
    check_pending_due:
      type: condition
      variable: has_due_date
      operator: eq
      value: true
      true_next: check_pending_overdue
      false_next: pending_no_date
    check_pending_overdue:
      type: condition
      variable: days_overdue
      operator: gt
      value: 0
      true_next: at_risk_pending
      false_next: on_track_pending
    check_ongoing:
      type: condition
      variable: status
      operator: eq
      value: Ongoing
      true_next: check_ongoing_due
      false_next: on_track_other
    check_ongoing_due:
      type: condition
      variable: has_due_date
      operator: eq
      value: true
      true_next: check_ongoing_overdue
      false_next: on_track_ongoing
    check_ongoing_overdue:
      type: condition
      variable: days_overdue
      operator: gt
      value: 0
      true_next: at_risk_ongoing
      false_next: on_track_ongoing
    on_track_fulfilled:
      type: return
      value:
        classification: on_track
        action: No action required — commitment fulfilled
    on_track_released:
      type: return
      value:
        classification: on_track
        action: No action required — requirement released
    on_track_terminated:
      type: return
      value:
        classification: on_track
        action: No action required — commitment terminated
    critical_overdue:
      type: return
      value:
        classification: critical
        action: Immediate escalation — overdue by 180+ days
    delayed_significant:
      type: return
      value:
        classification: delayed
        action: Submit progress report to FDA — overdue 90+ days
    delayed_recent:
      type: return
      value:
        classification: delayed
        action: Review timeline and submit updated schedule
    at_risk_pending:
      type: return
      value:
        classification: at_risk
        action: Pending commitment past due date — initiate work
    on_track_pending:
      type: return
      value:
        classification: on_track
        action: Commitment pending — monitor due date
    pending_no_date:
      type: return
      value:
        classification: on_track
        action: Pending without due date — request timeline from FDA
    at_risk_ongoing:
      type: return
      value:
        classification: at_risk
        action: Ongoing but past due — accelerate completion
    on_track_ongoing:
      type: return
      value:
        classification: on_track
        action: On track — continue per schedule
    on_track_other:
      type: return
      value:
        classification: on_track
        action: Status noted — monitor for changes
tests:
  - input:
      status: Fulfilled
      has_due_date: true
      days_overdue: 0
    expect:
      classification: on_track
      action: No action required — commitment fulfilled
  - input:
      status: Released
      has_due_date: false
      days_overdue: 0
    expect:
      classification: on_track
      action: No action required — requirement released
  - input:
      status: Delayed
      has_due_date: true
      days_overdue: 200
    expect:
      classification: critical
      action: Immediate escalation — overdue by 180+ days
  - input:
      status: Delayed
      has_due_date: true
      days_overdue: 120
    expect:
      classification: delayed
      action: Submit progress report to FDA — overdue 90+ days
  - input:
      status: Delayed
      has_due_date: true
      days_overdue: 30
    expect:
      classification: delayed
      action: Review timeline and submit updated schedule
  - input:
      status: Pending
      has_due_date: true
      days_overdue: 45
    expect:
      classification: at_risk
      action: Pending commitment past due date — initiate work
  - input:
      status: Pending
      has_due_date: true
      days_overdue: 0
    expect:
      classification: on_track
      action: Commitment pending — monitor due date
  - input:
      status: Pending
      has_due_date: false
      days_overdue: 0
    expect:
      classification: on_track
      action: Pending without due date — request timeline from FDA
  - input:
      status: Ongoing
      has_due_date: true
      days_overdue: 15
    expect:
      classification: at_risk
      action: Ongoing but past due — accelerate completion
  - input:
      status: Ongoing
      has_due_date: true
      days_overdue: 0
    expect:
      classification: on_track
      action: On track — continue per schedule
  - input:
      status: Delayed
      has_due_date: true
      days_overdue: 180
    expect:
      classification: critical
      action: Immediate escalation — overdue by 180+ days
  - input:
      status: Delayed
      has_due_date: true
      days_overdue: 90
    expect:
      classification: delayed
      action: Submit progress report to FDA — overdue 90+ days
  - input:
      status: Terminated
      has_due_date: true
      days_overdue: 0
    expect:
      classification: on_track
      action: No action required — commitment terminated
  - input:
      status: Withdrawn
      has_due_date: false
      days_overdue: 0
    expect:
      classification: on_track
      action: Status noted — monitor for changes
  - input: {}
    expect:
      action: Status noted — monitor for changes
      classification: on_track
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - classification
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
