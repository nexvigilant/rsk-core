# MICROGRAM++ (upgraded 2026-04-23)
name: e2a-followup-required
version: 0.1.0
description: "ICH E2A Section 4.3: Determines if follow-up information is required for a safety report based on seriousness, outcome, and expectedness"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: serious
    type: bool
    required: false
    description: ""
  - name: outcome
    type: string
    required: false
    description: ""
  - name: autopsy_available
    type: bool
    required: false
    description: ""
  - name: unexpected
    type: bool
    required: false
    description: ""
outputs:
  - name: followup_required
    type: bool
  - name: priority
    type: string
  - name: rationale
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    serious:
      type: bool
      required: false
    outcome:
      type: string
      required: false
    autopsy_available:
      type: bool
      required: false
    unexpected:
      type: bool
      required: false
  outputs:
    followup_required:
      type: bool
    priority:
      type: string
    rationale:
      type: string
    regulatory_reference:
      type: string
ui:
  title: E2a Followup Required
  subtitle: "ICH E2A Section 4.3: Determines if follow-up information is required for a safety report based on seriousness, outcome, and expectedness"
  icon: circle
  route: /vigilance/mg/e2a-followup-required
  steps:
    - field: serious
      label: serious
      help: Enter serious
      widget: toggle
      placeholder: null
    - field: outcome
      label: outcome
      help: Enter outcome
      widget: text
      placeholder: null
    - field: autopsy_available
      label: autopsy available
      help: Enter autopsy_available
      widget: toggle
      placeholder: null
    - field: unexpected
      label: unexpected
      help: Enter unexpected
      widget: toggle
      placeholder: null
  result:
    template: "followup_required: {{followup_required}} — priority: {{priority}} — rationale: {{rationale}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2a-followup-required
  cli: rsk mcg run e2a-followup-required
  auth: none
  rate_limit: 600/min
tree:
  start: serious_check
  nodes:
    serious_check:
      type: condition
      variable: serious
      operator: eq
      value: true
      true_next: outcome_fatal_check
      false_next: unexpected_check
    outcome_fatal_check:
      type: condition
      variable: outcome
      operator: eq
      value: fatal
      true_next: autopsy_check
      false_next: outcome_unknown_check
    autopsy_check:
      type: condition
      variable: autopsy_available
      operator: eq
      value: true
      true_next: fatal_autopsy_available
      false_next: fatal_no_autopsy
    outcome_unknown_check:
      type: condition
      variable: outcome
      operator: eq
      value: unknown
      true_next: serious_unknown_outcome
      false_next: outcome_recovered_check
    outcome_recovered_check:
      type: condition
      variable: outcome
      operator: eq
      value: recovered
      true_next: serious_recovered
      false_next: outcome_recovering_check
    outcome_recovering_check:
      type: condition
      variable: outcome
      operator: eq
      value: recovering
      true_next: serious_recovering
      false_next: serious_other_outcome
    unexpected_check:
      type: condition
      variable: unexpected
      operator: eq
      value: true
      true_next: nonserious_unexpected
      false_next: no_followup
    fatal_no_autopsy:
      type: return
      value:
        followup_required: true
        priority: urgent
        rationale: Fatal outcome without autopsy data requires urgent follow-up
        regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
    fatal_autopsy_available:
      type: return
      value:
        followup_required: false
        priority: none
        rationale: Fatal outcome with autopsy available - no additional follow-up needed
        regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
    serious_unknown_outcome:
      type: return
      value:
        followup_required: true
        priority: urgent
        rationale: Serious event with unknown outcome requires urgent follow-up
        regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
    serious_recovered:
      type: return
      value:
        followup_required: false
        priority: none
        rationale: Serious event with recovery - no additional follow-up needed
        regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
    serious_recovering:
      type: return
      value:
        followup_required: false
        priority: none
        rationale: Serious event with ongoing recovery - no additional follow-up needed
        regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
    serious_other_outcome:
      type: return
      value:
        followup_required: true
        priority: urgent
        rationale: Serious event with unresolved outcome requires follow-up
        regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
    nonserious_unexpected:
      type: return
      value:
        followup_required: true
        priority: routine
        rationale: Non-serious but unexpected event requires routine follow-up
        regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
    no_followup:
      type: return
      value:
        followup_required: false
        priority: none
        rationale: Non-serious expected event - no follow-up required
        regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
tests:
  - input:
      serious: true
      outcome: unknown
      autopsy_available: false
      unexpected: false
    expect:
      followup_required: true
      priority: urgent
      regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
  - input:
      serious: true
      outcome: fatal
      autopsy_available: false
      unexpected: false
    expect:
      followup_required: true
      priority: urgent
      regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
  - input:
      serious: true
      outcome: fatal
      autopsy_available: true
      unexpected: false
    expect:
      followup_required: false
      priority: none
      regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
  - input:
      serious: true
      outcome: recovered
      autopsy_available: false
      unexpected: false
    expect:
      followup_required: false
      priority: none
      regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
  - input:
      serious: true
      outcome: recovering
      autopsy_available: false
      unexpected: false
    expect:
      followup_required: false
      priority: none
      regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
  - input:
      serious: false
      outcome: recovered
      autopsy_available: false
      unexpected: true
    expect:
      followup_required: true
      priority: routine
      regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
  - input:
      serious: false
      outcome: recovered
      autopsy_available: false
      unexpected: false
    expect:
      followup_required: false
      priority: none
      regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
  - input: {}
    expect:
      followup_required: false
      priority: none
      regulatory_reference: ICH E2A Section 4.3 - Follow-up Reports
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - followup_required
    - priority
    - rationale
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
