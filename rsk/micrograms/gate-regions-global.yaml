# MICROGRAM++ (upgraded 2026-04-23)
name: gate-regions-global
version: 0.1.0
description: Multi-region signal (global)
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Gate Regions Global
  subtitle: Multi-region signal (global)
  icon: circle
  route: /vigilance/mg/gate-regions-global
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-regions-global
  cli: rsk mcg run gate-regions-global
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        gate: false
        threshold: region_count
        met: false
    pass:
      type: return
      value:
        gate: true
        met: true
        threshold: region_count
    check:
      type: condition
      variable: region_count
      operator: gte
      value: 4
      true_next: pass
      false_next: fail
tests:
  - input:
      region_count: 4
    expect:
      gate: true
      met: true
  - input: {}
    expect:
      gate: false
      met: false
  - input:
      region_count: 0
    expect:
      gate: false
      threshold: region_count
      met: false
  - input:
      region_count: -1
    expect:
      gate: false
      met: false
      threshold: region_count
  - input:
      region_count: 3
    expect:
      threshold: region_count
      gate: false
      met: false
  - input:
      region_count: 5
    expect:
      gate: true
      met: true
      threshold: region_count
  - input:
      region_count: 400
    expect:
      threshold: region_count
      met: true
      gate: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
