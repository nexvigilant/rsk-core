# MICROGRAM++ (upgraded 2026-04-23)
name: d01-b002-scientific-rigor-assessment
version: 0.1.0
description: "Assess if PV conclusion meets scientific rigor: evidence-based, reproducible methodology, documented, confounders addressed"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: D01 B002 Scientific Rigor Assessment
  subtitle: "Assess if PV conclusion meets scientific rigor: evidence-based, reproducible methodology, documented, confounders addressed"
  icon: circle
  route: /vigilance/mg/d01-b002-scientific-rigor-assessment
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/d01-b002-scientific-rigor-assessment
  cli: rsk mcg run d01-b002-scientific-rigor-assessment
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    yes:
      type: return
      value:
        meets_rigor: true
    check:
      type: condition
      variable: rigor_score
      operator: gte
      value: 8
      true_next: yes
      false_next: no
    no:
      type: return
      value:
        insufficient_rigor: false
tests:
  - input:
      rigor_score: 8
    expect:
      meets_rigor: true
  - input:
      rigor_score: 9
    expect:
      meets_rigor: true
  - input:
      rigor_score: 7
    expect:
      insufficient_rigor: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
