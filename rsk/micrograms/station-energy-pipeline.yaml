# MICROGRAM++ (upgraded 2026-04-23)
name: station-energy-pipeline
version: 0.1.0
description: "Route token energy budget: classify consumption regime and recommend strategy"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Energy Pipeline
  subtitle: "Route token energy budget: classify consumption regime and recommend strategy"
  icon: circle
  route: /vigilance/mg/station-energy-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-energy-pipeline
  cli: rsk mcg run station-energy-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_charge
  nodes:
    check_charge:
      type: condition
      variable: energy_charge_pct
      operator: gte
      value: 70
      true_next: high_charge
      false_next: check_low
    high_charge:
      type: return
      value:
        reason: Energy charge ≥70% — full capacity for complex work
        priority: low
        action: proceed
        route: archive
    depleted:
      type: return
      value:
        priority: critical
        action: conserve
        reason: Energy ≤20% — compress output, skip optional phases
        route: energy_conservation
    moderate:
      type: return
      value:
        action: budget
        route: energy_budgeting
        reason: Energy 20-70% — allocate tokens deliberately
        priority: moderate
    check_low:
      type: condition
      variable: energy_charge_pct
      operator: lte
      value: 20
      true_next: depleted
      false_next: moderate
tests:
  - input:
      energy_charge_pct: 85
    expect:
      route: archive
      action: proceed
      priority: low
  - input:
      energy_charge_pct: 10
    expect:
      route: energy_conservation
      action: conserve
      priority: critical
  - input:
      energy_charge_pct: 45
    expect:
      action: budget
      route: energy_budgeting
      priority: moderate
  - input:
      energy_charge_pct: 0
    expect:
      priority: critical
      reason: Energy ≤20% — compress output, skip optional phases
      action: conserve
      route: energy_conservation
  - input:
      energy_charge_pct: -1
    expect:
      reason: Energy ≤20% — compress output, skip optional phases
      priority: critical
      route: energy_conservation
      action: conserve
  - input:
      energy_charge_pct: 69
    expect:
      action: budget
      route: energy_budgeting
      reason: Energy 20-70% — allocate tokens deliberately
      priority: moderate
  - input:
      energy_charge_pct: 71
    expect:
      route: archive
      reason: Energy charge ≥70% — full capacity for complex work
      priority: low
      action: proceed
  - input:
      energy_charge_pct: 7000
    expect:
      reason: Energy charge ≥70% — full capacity for complex work
      priority: low
      route: archive
      action: proceed
  - input: {}
    expect:
      priority: moderate
      reason: Energy 20-70% — allocate tokens deliberately
      action: budget
      route: energy_budgeting
  - input:
      energy_charge_pct: 0
    expect:
      action: conserve
      reason: Energy ≤20% — compress output, skip optional phases
      route: energy_conservation
      priority: critical
  - input:
      energy_charge_pct: -1
    expect:
      route: energy_conservation
      reason: Energy ≤20% — compress output, skip optional phases
      action: conserve
      priority: critical
  - input:
      energy_charge_pct: 19
    expect:
      reason: Energy ≤20% — compress output, skip optional phases
      priority: critical
      route: energy_conservation
      action: conserve
  - input:
      energy_charge_pct: 21
    expect:
      priority: moderate
      reason: Energy 20-70% — allocate tokens deliberately
      action: budget
      route: energy_budgeting
  - input:
      energy_charge_pct: 2000
    expect:
      priority: low
      reason: Energy charge ≥70% — full capacity for complex work
      action: proceed
      route: archive
  - input: {}
    expect:
      route: energy_budgeting
      action: budget
      reason: Energy 20-70% — allocate tokens deliberately
      priority: moderate
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
