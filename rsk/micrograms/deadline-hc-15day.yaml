name: deadline-hc-15day
description: "Calculate Health Canada 15-day serious adverse event reporting deadline"
version: 0.1.0
tree:
  start: validate_event
  nodes:
    validate_event:
      type: condition
      variable: event_date
      operator: is_not_null
      value: null
      true_next: check_seriousness
      false_next: deadline_unknown
    check_seriousness:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: check_expected_status
      false_next: routine_deadline
    check_expected_status:
      type: condition
      variable: is_expected_in_labeling
      operator: eq
      value: true
      true_next: expected_deadline
      false_next: unexpected_deadline
    unexpected_deadline:
      type: return
      value:
        reporting_deadline_days: 15
        event_category: "serious_unexpected_adverse_reaction"
        regulatory_requirement: "Health_Canada_MedEffect"
        priority_level: "high"
        regulatory_compliant: true
    expected_deadline:
      type: return
      value:
        reporting_deadline_days: 30
        event_category: "serious_expected_adverse_reaction"
        regulatory_requirement: "Health_Canada_MedEffect"
        priority_level: "standard"
        regulatory_compliant: true
    routine_deadline:
      type: return
      value:
        reporting_deadline_days: 30
        event_category: "non_serious"
        regulatory_requirement: "Health_Canada_MedEffect"
        priority_level: "low"
        regulatory_compliant: true
    deadline_unknown:
      type: return
      value:
        reporting_deadline_days: null
        event_category: null
        regulatory_requirement: null
        priority_level: null
        regulatory_compliant: false
tests:
- input:
    event_date: "2024-01-15"
    is_serious: true
    is_expected_in_labeling: false
  expect:
    reporting_deadline_days: 15
    event_category: "serious_unexpected_adverse_reaction"
- input:
    event_date: "2024-01-15"
    is_serious: true
    is_expected_in_labeling: true
  expect:
    reporting_deadline_days: 30
    event_category: "serious_expected_adverse_reaction"
- input:
    event_date: "2024-01-15"
    is_serious: false
  expect:
    reporting_deadline_days: 30
    priority_level: "low"
- input: {}
  expect:
    reporting_deadline_days: null
    regulatory_compliant: false
