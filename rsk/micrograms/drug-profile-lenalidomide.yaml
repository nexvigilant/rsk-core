name: drug-profile-lenalidomide
description: 'Safety triage for lenalidomide: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    no_signal:
      type: return
      value:
        action: monitor
        signal: false
        harm_type: B
        expected_prr: 7.8
        drug: lenalidomide
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        drug: lenalidomide
        expected_prr: 7.8
        action: investigate
        signal: true
        harm_type: B
tests:
- input:
    prr: 7.8
  expect:
    drug: lenalidomide
    signal: true
- input:
    prr: 0.5
  expect:
    signal: false
    drug: lenalidomide
- input: {}
  expect:
    signal: false
    drug: lenalidomide
- input:
    prr: 4.999
  expect:
    expected_prr: 7.8
    action: monitor
    drug: lenalidomide
    signal: false
    harm_type: B
- input:
    prr: 5.001
  expect:
    harm_type: B
    expected_prr: 7.8
    signal: true
    action: investigate
    drug: lenalidomide
interface: null
primitive_signature: null
