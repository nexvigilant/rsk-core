name: drug-profile-infliximab
description: 'Safety triage for infliximab: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        drug: infliximab
        harm_type: B
        signal: true
        action: investigate
        expected_prr: 5.8
    no_signal:
      type: return
      value:
        drug: infliximab
        action: monitor
        harm_type: B
        signal: false
        expected_prr: 5.8
tests:
- input:
    prr: 5.8
  expect:
    drug: infliximab
    signal: true
- input:
    prr: 0.5
  expect:
    drug: infliximab
    signal: false
- input: {}
  expect:
    drug: infliximab
    signal: false
- input:
    prr: 4.999
  expect:
    drug: infliximab
    expected_prr: 5.8
    action: monitor
    harm_type: B
    signal: false
- input:
    prr: 5.001
  expect:
    expected_prr: 5.8
    drug: infliximab
    signal: true
    harm_type: B
    action: investigate
interface: null
primitive_signature: null
