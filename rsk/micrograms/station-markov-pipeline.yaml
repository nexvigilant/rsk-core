# MICROGRAM++ (upgraded 2026-04-23)
name: station-markov-pipeline
version: 0.1.0
description: "Route Markov chain analysis: classify state transitions by stationarity and absorption"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Markov Pipeline
  subtitle: "Route Markov chain analysis: classify state transitions by stationarity and absorption"
  icon: circle
  route: /vigilance/mg/station-markov-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-markov-pipeline
  cli: rsk mcg run station-markov-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_stationary
  nodes:
    non_stationary:
      type: return
      value:
        route: drift_monitoring
        priority: high
        action: flag
        reason: Non-stationary Markov chain — transition probabilities shifting over time
    check_stationary:
      type: condition
      variable: is_stationary
      operator: eq
      value: true
      true_next: check_absorbing
      false_next: non_stationary
    absorbing:
      type: return
      value:
        action: analyze
        priority: moderate
        route: absorption_analysis
        reason: Absorbing states present — compute absorption probabilities and expected times
    ergodic:
      type: return
      value:
        reason: Ergodic chain — compute steady-state distribution
        action: compute
        route: steady_state
        priority: low
    check_absorbing:
      type: condition
      variable: has_absorbing_state
      operator: eq
      value: true
      true_next: absorbing
      false_next: ergodic
tests:
  - input:
      has_absorbing_state: false
      is_stationary: false
    expect:
      action: flag
      priority: high
      route: drift_monitoring
  - input:
      is_stationary: true
      has_absorbing_state: true
    expect:
      action: analyze
      priority: moderate
      route: absorption_analysis
  - input:
      is_stationary: true
      has_absorbing_state: false
    expect:
      route: steady_state
      action: compute
      priority: low
  - input: {}
    expect:
      priority: high
      reason: Non-stationary Markov chain — transition probabilities shifting over time
      action: flag
      route: drift_monitoring
  - input: {}
    expect:
      action: flag
      reason: Non-stationary Markov chain — transition probabilities shifting over time
      priority: high
      route: drift_monitoring
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
