name: benefit-risk-gate
description: 'Benefit-risk decision gate for initial pharmacovigilance assessment: routes to monitoring, management, or mitigation based on benefit/risk scores and unmet need'
version: 0.1.0
interface:
  inputs:
    alternative_available:
      type: bool
      required: false
    benefit_score:
      type: int
      required: false
    risk_score:
      type: int
      required: false
    unmet_need:
      type: bool
      required: false
  outputs:
    action:
      type: string
    benefit_risk_ratio:
      type: string
    decision:
      type: string
    recommendation:
      type: string
tree:
  start: negative_check
  nodes:
    negative_check:
      type: condition
      variable: risk_score
      operator: gt
      value: 80
      true_next: negative
      false_next: unfavorable_risk_check
    unfavorable_risk_check:
      type: condition
      variable: risk_score
      operator: gt
      value: 60
      true_next: unfavorable
      false_next: favorable_benefit_check
    favorable_benefit_check:
      type: condition
      variable: benefit_score
      operator: gte
      value: 80
      true_next: favorable_risk_check
      false_next: acceptable_benefit_check
    favorable_risk_check:
      type: condition
      variable: risk_score
      operator: lte
      value: 20
      true_next: favorable
      false_next: acceptable_benefit_check
    acceptable_benefit_check:
      type: condition
      variable: benefit_score
      operator: gte
      value: 60
      true_next: acceptable_risk_check
      false_next: conditional_benefit_check
    acceptable_risk_check:
      type: condition
      variable: risk_score
      operator: lte
      value: 40
      true_next: acceptable
      false_next: conditional_benefit_check
    conditional_benefit_check:
      type: condition
      variable: benefit_score
      operator: gte
      value: 40
      true_next: conditional_risk_check
      false_next: unfavorable
    conditional_risk_check:
      type: condition
      variable: risk_score
      operator: lte
      value: 60
      true_next: conditional_unmet_check
      false_next: unfavorable
    conditional_unmet_check:
      type: condition
      variable: unmet_need
      operator: eq
      value: true
      true_next: conditional
      false_next: conditional_alt_check
    conditional_alt_check:
      type: condition
      variable: alternative_available
      operator: eq
      value: true
      true_next: unfavorable
      false_next: conditional
    negative:
      type: return
      value:
        decision: NEGATIVE
        action: consider_withdrawal
        benefit_risk_ratio: negative
        recommendation: Immediate review required; benefit no longer outweighs risk
    unfavorable:
      type: return
      value:
        decision: UNFAVORABLE
        action: risk_mitigation_required
        benefit_risk_ratio: unfavorable
        recommendation: Implement risk minimization measures before continuation
    favorable:
      type: return
      value:
        decision: FAVORABLE
        action: continue_monitoring
        benefit_risk_ratio: favorable
        recommendation: Benefit clearly outweighs risk; maintain standard surveillance
    acceptable:
      type: return
      value:
        decision: ACCEPTABLE
        action: standard_risk_management
        benefit_risk_ratio: acceptable
        recommendation: Benefit outweighs risk with standard risk management plan
    conditional:
      type: return
      value:
        decision: CONDITIONAL
        action: enhanced_monitoring_with_rmp
        benefit_risk_ratio: conditional
        recommendation: Benefit marginal; enhanced monitoring and RMP required
tests:
- input:
    benefit_score: 85
    risk_score: 15
    unmet_need: false
    alternative_available: false
  expect:
    decision: FAVORABLE
    action: continue_monitoring
    benefit_risk_ratio: favorable
- input:
    benefit_score: 90
    risk_score: 20
    unmet_need: false
    alternative_available: false
  expect:
    decision: FAVORABLE
    action: continue_monitoring
- input:
    benefit_score: 65
    risk_score: 35
    unmet_need: false
    alternative_available: false
  expect:
    decision: ACCEPTABLE
    action: standard_risk_management
    benefit_risk_ratio: acceptable
- input:
    benefit_score: 60
    risk_score: 40
    unmet_need: false
    alternative_available: false
  expect:
    decision: ACCEPTABLE
    action: standard_risk_management
- input:
    benefit_score: 45
    risk_score: 55
    unmet_need: true
    alternative_available: false
  expect:
    decision: CONDITIONAL
    action: enhanced_monitoring_with_rmp
    benefit_risk_ratio: conditional
- input:
    benefit_score: 45
    risk_score: 55
    unmet_need: false
    alternative_available: false
  expect:
    decision: CONDITIONAL
    action: enhanced_monitoring_with_rmp
- input:
    benefit_score: 45
    risk_score: 55
    unmet_need: false
    alternative_available: true
  expect:
    decision: UNFAVORABLE
    action: risk_mitigation_required
- input:
    benefit_score: 30
    risk_score: 50
    unmet_need: true
    alternative_available: false
  expect:
    decision: UNFAVORABLE
    action: risk_mitigation_required
- input:
    benefit_score: 50
    risk_score: 70
    unmet_need: true
    alternative_available: false
  expect:
    decision: UNFAVORABLE
    action: risk_mitigation_required
- input:
    benefit_score: 20
    risk_score: 85
    unmet_need: false
    alternative_available: false
  expect:
    decision: NEGATIVE
    action: consider_withdrawal
    benefit_risk_ratio: negative
- input:
    benefit_score: 60
    risk_score: 81
    unmet_need: true
    alternative_available: false
  expect:
    decision: NEGATIVE
    action: consider_withdrawal
- input: {}
  expect:
    decision: UNFAVORABLE
    action: risk_mitigation_required
