# MICROGRAM++ (upgraded 2026-04-23)
name: force-plate-stance-classifier
version: 0.1.0
description: Classify gait phase from bilateral force plate vertical forces. Detects stance, swing, double support, and airborne.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: left_force_z
    type: number
    required: true
    description: Left foot vertical ground reaction force in Newtons
  - name: right_force_z
    type: number
    required: true
    description: Right foot vertical ground reaction force in Newtons
outputs:
  - name: phase
    type: string
  - name: weight_distribution
    type: number
  - name: symmetry
    type: string
interface:
  inputs:
    left_force_z:
      type: number
      required: true
      description: Left foot vertical ground reaction force in Newtons
    right_force_z:
      type: number
      required: true
      description: Right foot vertical ground reaction force in Newtons
  outputs:
    phase:
      type: string
    weight_distribution:
      type: number
    symmetry:
      type: string
ui:
  title: Force Plate Stance Classifier
  subtitle: Classify gait phase from bilateral force plate vertical forces. Detects stance, swing, double support, and airborne.
  icon: circle
  route: /vigilance/mg/force-plate-stance-classifier
  steps:
    - field: left_force_z
      label: left force z
      help: Left foot vertical ground reaction force in Newtons
      widget: number
      placeholder: null
    - field: right_force_z
      label: right force z
      help: Right foot vertical ground reaction force in Newtons
      widget: number
      placeholder: null
  result:
    template: "phase: {{phase}} — weight_distribution: {{weight_distribution}} — symmetry: {{symmetry}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/force-plate-stance-classifier
  cli: rsk mcg run force-plate-stance-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_left
  nodes:
    check_left:
      type: condition
      variable: left_force_z
      operator: gt
      value: 20
      true_next: check_right_with_left
      false_next: check_right_no_left
    check_right_with_left:
      type: condition
      variable: right_force_z
      operator: gt
      value: 20
      true_next: double_support
      false_next: left_stance
    check_right_no_left:
      type: condition
      variable: right_force_z
      operator: gt
      value: 20
      true_next: right_stance
      false_next: airborne
    double_support:
      type: return
      value:
        phase: DOUBLE_SUPPORT
        weight_distribution: 0.5
        symmetry: BILATERAL
    left_stance:
      type: return
      value:
        phase: LEFT_STANCE
        weight_distribution: 0
        symmetry: UNILATERAL_LEFT
    right_stance:
      type: return
      value:
        phase: RIGHT_STANCE
        weight_distribution: 1
        symmetry: UNILATERAL_RIGHT
    airborne:
      type: return
      value:
        phase: AIRBORNE
        weight_distribution: 0.5
        symmetry: NONE
tests:
  - input:
      left_force_z: 400
      right_force_z: 400
    expect:
      phase: DOUBLE_SUPPORT
  - input:
      left_force_z: 700
      right_force_z: 5
    expect:
      phase: LEFT_STANCE
  - input:
      left_force_z: 5
      right_force_z: 700
    expect:
      phase: RIGHT_STANCE
  - input:
      left_force_z: 0
      right_force_z: 0
    expect:
      phase: AIRBORNE
  - input: {}
    expect:
      phase: AIRBORNE
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - phase
    - weight_distribution
    - symmetry
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
