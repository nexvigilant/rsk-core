# MICROGRAM++ (upgraded 2026-04-23)
name: autopilot-pharma-sweep
version: 0.1.0
description: |
  Autopilot decision gate for pharmaceutical company monitoring sweep. Takes company FAERS metrics and determines: alert level and action. Uses absolute thresholds (microgram trees cannot compute ratios between two variables). For delta-based detection, compute ratios upstream in the sweep script and pass as pre-computed inputs (death_ratio, report_delta_pct).
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: total_reports
    type: int
    required: true
    description: ""
  - name: death_count
    type: int
    required: false
    description: ""
  - name: new_signals
    type: int
    required: false
    description: Count of reactions with PRR > 2 AND chi2 > 4 from upstream analysis
  - name: death_ratio
    type: float
    required: false
    description: Pre-computed death_count/prior_deaths ratio from sweep script. >1.2 = spike.
  - name: report_delta_pct
    type: float
    required: false
    description: Pre-computed (total - prior) / prior * 100 from sweep script. >10 = surge.
outputs:
  - name: alert_level
    type: string
  - name: action
    type: string
  - name: reason
    type: string
interface:
  inputs:
    total_reports:
      type: int
      required: true
    death_count:
      type: int
      required: false
    new_signals:
      type: int
      required: false
      description: Count of reactions with PRR > 2 AND chi2 > 4 from upstream analysis
    death_ratio:
      type: float
      required: false
      description: Pre-computed death_count/prior_deaths ratio from sweep script. >1.2 = spike.
    report_delta_pct:
      type: float
      required: false
      description: Pre-computed (total - prior) / prior * 100 from sweep script. >10 = surge.
  outputs:
    alert_level:
      type: string
    action:
      type: string
    reason:
      type: string
ui:
  title: Autopilot Pharma Sweep
  subtitle: |
    Autopilot decision gate for pharmaceutical company monitoring sweep. Takes company FAERS metrics and determines: alert level and action. Uses absolute thresholds (microgram trees cannot compute ratios between two variables). For delta-based detection, compute ratios upstream in the sweep script and pass as pre-computed inputs (death_ratio, report_delta_pct).
  icon: circle
  route: /vigilance/mg/autopilot-pharma-sweep
  steps:
    - field: total_reports
      label: total reports
      help: Enter total_reports
      widget: text
      placeholder: null
    - field: death_count
      label: death count
      help: Enter death_count
      widget: text
      placeholder: null
    - field: new_signals
      label: new signals
      help: Count of reactions with PRR > 2 AND chi2 > 4 from upstream analysis
      widget: text
      placeholder: null
    - field: death_ratio
      label: death ratio
      help: Pre-computed death_count/prior_deaths ratio from sweep script. >1.2 = spike.
      widget: text
      placeholder: null
    - field: report_delta_pct
      label: report delta pct
      help: Pre-computed (total - prior) / prior * 100 from sweep script. >10 = surge.
      widget: text
      placeholder: null
  result:
    template: "alert_level: {{alert_level}} — action: {{action}} — reason: {{reason}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/autopilot-pharma-sweep
  cli: rsk mcg run autopilot-pharma-sweep
  auth: none
  rate_limit: 600/min
tree:
  start: check_death_ratio_spike
  nodes:
    check_death_ratio_spike:
      type: condition
      variable: death_ratio
      operator: gt
      value: 1.2
      true_next: death_spike_alert
      false_next: check_high_death_count
    death_spike_alert:
      type: return
      value:
        alert_level: CRITICAL
        action: immediate_review
        reason: Death ratio spike >20% vs prior period — immediate pharmacovigilance review required
    check_high_death_count:
      type: condition
      variable: death_count
      operator: gt
      value: 5000
      true_next: critical_death_count
      false_next: check_moderate_death_count
    critical_death_count:
      type: return
      value:
        alert_level: CRITICAL
        action: immediate_review
        reason: Death reports exceed 5000 — immediate pharmacovigilance review required
    check_moderate_death_count:
      type: condition
      variable: death_count
      operator: gt
      value: 1000
      true_next: high_death_count
      false_next: check_new_signals
    high_death_count:
      type: return
      value:
        alert_level: HIGH
        action: signal_investigation
        reason: Death reports exceed 1000 — signal investigation recommended
    check_new_signals:
      type: condition
      variable: new_signals
      operator: gt
      value: 0
      true_next: check_signal_severity
      false_next: check_report_surge
    check_signal_severity:
      type: condition
      variable: new_signals
      operator: gte
      value: 5
      true_next: many_signals_alert
      false_next: few_signals_alert
    many_signals_alert:
      type: return
      value:
        alert_level: HIGH
        action: signal_investigation
        reason: 5+ new disproportionality signals detected — initiate signal investigation
    few_signals_alert:
      type: return
      value:
        alert_level: WATCH
        action: signal_review
        reason: New disproportionality signals detected — review in next cycle
    check_report_surge:
      type: condition
      variable: report_delta_pct
      operator: gt
      value: 10
      true_next: report_surge_alert
      false_next: check_volume
    report_surge_alert:
      type: return
      value:
        alert_level: WATCH
        action: trend_analysis
        reason: Report volume increased >10% vs prior period — trend analysis warranted
    check_volume:
      type: condition
      variable: total_reports
      operator: gte
      value: 1000000
      true_next: high_volume_watch
      false_next: check_mid_volume
    high_volume_watch:
      type: return
      value:
        alert_level: WATCH
        action: continuous_monitor
        reason: High-volume company (>1M reports) — continuous monitoring active
    check_mid_volume:
      type: condition
      variable: total_reports
      operator: gte
      value: 100000
      true_next: mid_volume_routine
      false_next: low_volume_routine
    mid_volume_routine:
      type: return
      value:
        alert_level: ROUTINE
        action: periodic_check
        reason: Mid-volume company (100K-1M reports) — standard monitoring
    low_volume_routine:
      type: return
      value:
        alert_level: ROUTINE
        action: periodic_check
        reason: Low-volume company (<100K reports) — standard monitoring
tests:
  - name: critical — death ratio spike
    input:
      total_reports: 2000000
      death_count: 3600
      death_ratio: 1.5
      new_signals: 0
      company: test-pharma
    expect:
      alert_level: CRITICAL
      action: immediate_review
  - name: critical — high absolute death count
    input:
      total_reports: 2000000
      death_count: 6000
      death_ratio: 1
      new_signals: 0
    expect:
      alert_level: CRITICAL
      action: immediate_review
  - name: high — moderate death count
    input:
      total_reports: 500000
      death_count: 1500
      death_ratio: 1
      new_signals: 0
    expect:
      alert_level: HIGH
      action: signal_investigation
  - name: high — many new signals
    input:
      total_reports: 500000
      death_count: 200
      death_ratio: 0.9
      new_signals: 7
    expect:
      alert_level: HIGH
      action: signal_investigation
  - name: watch — few new signals
    input:
      total_reports: 500000
      death_count: 200
      new_signals: 2
    expect:
      alert_level: WATCH
      action: signal_review
  - name: watch — report volume surge
    input:
      total_reports: 800000
      death_count: 100
      new_signals: 0
      report_delta_pct: 15
    expect:
      alert_level: WATCH
      action: trend_analysis
  - name: watch — high volume no signals
    input:
      total_reports: 1500000
      death_count: 100
      new_signals: 0
    expect:
      alert_level: WATCH
      action: continuous_monitor
  - name: routine — moderate volume
    input:
      total_reports: 300000
      death_count: 50
      new_signals: 0
    expect:
      alert_level: ROUTINE
      action: periodic_check
  - name: routine — low volume
    input:
      total_reports: 5000
      death_count: 2
      new_signals: 0
    expect:
      alert_level: ROUTINE
      action: periodic_check
  - name: null safety — empty input
    input: {}
    expect:
      alert_level: ROUTINE
      action: periodic_check
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - alert_level
    - action
    - reason
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
