# MICROGRAM++ (upgraded 2026-04-23)
name: signal-count-classifier
version: 0.1.0
description: "Signal count to traffic level: maps the number of positive signal algorithms (0-5) to a traffic level for display"
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: signal_count
    type: number
    required: true
    description: Number of positive signal algorithms (out of PRR, ROR, IC, EBGM, Chi-square)
outputs:
  - name: traffic_level
    type: string
interface:
  inputs:
    signal_count:
      type: number
      required: true
      description: Number of positive signal algorithms (out of PRR, ROR, IC, EBGM, Chi-square)
  outputs:
    traffic_level:
      type: string
ui:
  title: Signal Count Classifier
  subtitle: "Signal count to traffic level: maps the number of positive signal algorithms (0-5) to a traffic level for display"
  icon: activity
  route: /vigilance/mg/signal-count-classifier
  steps:
    - field: signal_count
      label: signal count
      help: Number of positive signal algorithms (out of PRR, ROR, IC, EBGM, Chi-square)
      widget: number
      placeholder: null
  result:
    template: "traffic_level: {{traffic_level}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/signal-count-classifier
  cli: rsk mcg run signal-count-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_zero
  nodes:
    check_zero:
      type: condition
      variable: signal_count
      operator: eq
      value: 0
      true_next: green
      false_next: check_moderate
    check_moderate:
      type: condition
      variable: signal_count
      operator: lte
      value: 2
      true_next: yellow
      false_next: red
    green:
      type: return
      value:
        traffic_level: green
    yellow:
      type: return
      value:
        traffic_level: yellow
    red:
      type: return
      value:
        traffic_level: red
tests:
  - input:
      signal_count: 0
    expect:
      traffic_level: green
  - input:
      signal_count: 1
    expect:
      traffic_level: yellow
  - input:
      signal_count: 2
    expect:
      traffic_level: yellow
  - input:
      signal_count: 3
    expect:
      traffic_level: red
  - input:
      signal_count: 4
    expect:
      traffic_level: red
  - input:
      signal_count: 5
    expect:
      traffic_level: red
  - input: {}
    expect:
      traffic_level: red
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - traffic_level
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
