# MICROGRAM++ (upgraded 2026-04-23)
name: trend-sex-skew
version: 0.1.0
description: Sex distribution skew
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Trend Sex Skew
  subtitle: Sex distribution skew
  icon: circle
  route: /vigilance/mg/trend-sex-skew
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/trend-sex-skew
  cli: rsk mcg run trend-sex-skew
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    detected:
      type: return
      value:
        action: investigate
        pattern: sex_dependent
        detected: true
    not_detected:
      type: return
      value:
        detected: false
        action: continue_monitoring
        pattern: sex_dependent
    check:
      type: condition
      variable: sex_ratio
      operator: gte
      value: 2
      true_next: detected
      false_next: not_detected
tests:
  - input:
      sex_ratio: 2
    expect:
      pattern: sex_dependent
      detected: true
  - input: {}
    expect:
      detected: false
      pattern: sex_dependent
  - input:
      sex_ratio: 0
    expect:
      detected: false
      action: continue_monitoring
      pattern: sex_dependent
  - input:
      sex_ratio: -1
    expect:
      detected: false
      action: continue_monitoring
      pattern: sex_dependent
  - input:
      sex_ratio: 1
    expect:
      action: continue_monitoring
      detected: false
      pattern: sex_dependent
  - input:
      sex_ratio: 3
    expect:
      detected: true
      pattern: sex_dependent
      action: investigate
  - input:
      sex_ratio: 200
    expect:
      detected: true
      action: investigate
      pattern: sex_dependent
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
