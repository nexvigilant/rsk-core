# MICROGRAM++ (upgraded 2026-04-23)
name: workflow-define-validator
version: 0.1.0
description: "PVOS workflow definition: validates that a workflow definition has required steps (detect + report) and minimum length before registration"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: has_detect_step
    type: bool
    required: false
    description: ""
  - name: has_report_step
    type: bool
    required: false
    description: ""
  - name: step_count
    type: int
    required: false
    description: ""
outputs:
  - name: description
    type: string
  - name: status
    type: string
interface:
  inputs:
    has_detect_step:
      type: bool
      required: false
    has_report_step:
      type: bool
      required: false
    step_count:
      type: int
      required: false
  outputs:
    description:
      type: string
    status:
      type: string
ui:
  title: Workflow Define Validator
  subtitle: "PVOS workflow definition: validates that a workflow definition has required steps (detect + report) and minimum length before registration"
  icon: circle
  route: /vigilance/mg/workflow-define-validator
  steps:
    - field: has_detect_step
      label: has detect step
      help: Enter has_detect_step
      widget: toggle
      placeholder: null
    - field: has_report_step
      label: has report step
      help: Enter has_report_step
      widget: toggle
      placeholder: null
    - field: step_count
      label: step count
      help: Enter step_count
      widget: text
      placeholder: null
  result:
    template: "description: {{description}} — status: {{status}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/workflow-define-validator
  cli: rsk mcg run workflow-define-validator
  auth: none
  rate_limit: 600/min
tree:
  start: check_length
  nodes:
    check_length:
      type: condition
      variable: step_count
      operator: gte
      value: 2
      true_next: check_detect
      false_next: too_short
    check_detect:
      type: condition
      variable: has_detect_step
      operator: eq
      value: true
      true_next: check_report
      false_next: missing_detect
    check_report:
      type: condition
      variable: has_report_step
      operator: eq
      value: true
      true_next: valid
      false_next: missing_report
    valid:
      type: return
      value:
        status: VALID
        description: Workflow definition complete - detection and reporting steps present
    too_short:
      type: return
      value:
        status: TOO_SHORT
        description: Workflow must have at least 2 steps to be registered
    missing_detect:
      type: return
      value:
        status: MISSING_DETECT
        description: Workflow missing signal detection step - required for PV workflows
    missing_report:
      type: return
      value:
        status: MISSING_REPORT
        description: Workflow missing regulatory reporting step - required for PV workflows
tests:
  - input:
      step_count: 4
      has_detect_step: true
      has_report_step: true
    expect:
      status: VALID
      description: Workflow definition complete - detection and reporting steps present
  - input:
      step_count: 4
      has_detect_step: false
      has_report_step: true
    expect:
      status: MISSING_DETECT
      description: Workflow missing signal detection step - required for PV workflows
  - input:
      step_count: 4
      has_detect_step: true
      has_report_step: false
    expect:
      status: MISSING_REPORT
      description: Workflow missing regulatory reporting step - required for PV workflows
  - input:
      step_count: 1
      has_detect_step: true
      has_report_step: true
    expect:
      status: TOO_SHORT
      description: Workflow must have at least 2 steps to be registered
  - input:
      step_count: 0
      has_detect_step: false
      has_report_step: false
    expect:
      status: TOO_SHORT
      description: Workflow must have at least 2 steps to be registered
  - input: {}
    expect:
      description: Workflow must have at least 2 steps to be registered
      status: TOO_SHORT
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - description
    - status
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
