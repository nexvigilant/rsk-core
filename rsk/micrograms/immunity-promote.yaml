name: immunity-promote
description: Evaluate whether a pending immunity proposal should be promoted to antibody, dismissed as stale, or deferred for more evidence
version: 0.1.0
interface:
  inputs:
    age_days:
      type: int
      required: true
    severity:
      type: string
      required: true
    occurrences:
      type: int
      required: true
    has_fix:
      type: bool
      required: true
  outputs:
    decision:
      type: string
    reason:
      type: string
    confidence:
      type: int
tree:
  start: validate_age
  nodes:
    # --- Validation ---
    validate_age:
      type: condition
      variable: age_days
      operator: lt
      value: 0
      true_next: reject_invalid
      false_next: check_is_critical

    reject_invalid:
      type: return
      value:
        decision: REJECTED
        reason: "age_days must be non-negative"
        confidence: 0

    # --- Severity routing (replaces 'in' operator) ---
    check_is_critical:
      type: condition
      variable: severity
      operator: eq
      value: critical
      true_next: check_critical_age
      false_next: check_is_high

    check_is_high:
      type: condition
      variable: severity
      operator: eq
      value: high
      true_next: check_stale_high
      false_next: check_is_medium

    check_is_medium:
      type: condition
      variable: severity
      operator: eq
      value: medium
      true_next: check_stale_medium
      false_next: check_is_low

    check_is_low:
      type: condition
      variable: severity
      operator: eq
      value: low
      true_next: defer_low
      false_next: reject_bad_severity

    reject_bad_severity:
      type: return
      value:
        decision: REJECTED
        reason: "severity must be one of: critical, high, medium, low"
        confidence: 0

    # --- Critical path: 7+ days with fix → PROMOTE ---
    check_critical_age:
      type: condition
      variable: age_days
      operator: gte
      value: 7
      true_next: check_critical_fix
      false_next: defer_too_young

    check_critical_fix:
      type: condition
      variable: has_fix
      operator: eq
      value: true
      true_next: promote_critical
      false_next: defer_needs_fix

    promote_critical:
      type: return
      value:
        decision: PROMOTE
        reason: "Critical severity with fix, aged 7+ days"
        confidence: 90

    # --- High path: staleness → 14+ days, 3+ occurrences, fix → PROMOTE ---
    check_stale_high:
      type: condition
      variable: age_days
      operator: gte
      value: 45
      true_next: dismiss_stale
      false_next: check_high_age

    check_high_age:
      type: condition
      variable: age_days
      operator: gte
      value: 14
      true_next: check_high_occurrences
      false_next: defer_too_young

    check_high_occurrences:
      type: condition
      variable: occurrences
      operator: gte
      value: 3
      true_next: check_high_fix
      false_next: defer_low_evidence

    check_high_fix:
      type: condition
      variable: has_fix
      operator: eq
      value: true
      true_next: promote_high
      false_next: defer_needs_fix

    promote_high:
      type: return
      value:
        decision: PROMOTE
        reason: "High severity, 14+ days, 3+ occurrences, fix available"
        confidence: 80

    # --- Medium path: staleness → 21+ days, 5+ occurrences, fix → PROMOTE ---
    check_stale_medium:
      type: condition
      variable: age_days
      operator: gte
      value: 45
      true_next: dismiss_stale
      false_next: check_medium_age

    check_medium_age:
      type: condition
      variable: age_days
      operator: gte
      value: 21
      true_next: check_medium_occurrences
      false_next: defer_too_young

    check_medium_occurrences:
      type: condition
      variable: occurrences
      operator: gte
      value: 5
      true_next: check_medium_fix
      false_next: defer_low_evidence

    check_medium_fix:
      type: condition
      variable: has_fix
      operator: eq
      value: true
      true_next: promote_medium
      false_next: defer_needs_fix

    promote_medium:
      type: return
      value:
        decision: PROMOTE
        reason: "Medium severity, 21+ days, 5+ occurrences, fix available"
        confidence: 70

    # --- Terminal nodes ---
    dismiss_stale:
      type: return
      value:
        decision: DISMISS
        reason: "Pending 45+ days without meeting promotion criteria — stale"
        confidence: 75

    defer_low:
      type: return
      value:
        decision: DEFER
        reason: "Low severity proposals require manual promotion"
        confidence: 85

    defer_too_young:
      type: return
      value:
        decision: DEFER
        reason: "Proposal too recent — needs more observation time"
        confidence: 80

    defer_low_evidence:
      type: return
      value:
        decision: DEFER
        reason: "Insufficient occurrences — needs more evidence"
        confidence: 75

    defer_needs_fix:
      type: return
      value:
        decision: DEFER
        reason: "No fix template available — cannot promote without remediation"
        confidence: 80

tests:
  # Critical with fix, aged 7 days → PROMOTE
  - name: critical_with_fix_promotes
    input:
      age_days: 10
      severity: critical
      occurrences: 1
      has_fix: true
    expect:
      decision: PROMOTE
      confidence: 90

  # Critical without fix → DEFER
  - name: critical_without_fix_defers
    input:
      age_days: 10
      severity: critical
      occurrences: 5
      has_fix: false
    expect:
      decision: DEFER
      confidence: 80

  # Critical too young → DEFER
  - name: critical_too_young
    input:
      age_days: 3
      severity: critical
      occurrences: 10
      has_fix: true
    expect:
      decision: DEFER
      confidence: 80

  # High severity mature with evidence → PROMOTE
  - name: high_mature_promotes
    input:
      age_days: 20
      severity: high
      occurrences: 5
      has_fix: true
    expect:
      decision: PROMOTE
      confidence: 80

  # High severity low evidence → DEFER
  - name: high_low_evidence
    input:
      age_days: 20
      severity: high
      occurrences: 1
      has_fix: true
    expect:
      decision: DEFER
      confidence: 75

  # Medium mature with evidence → PROMOTE
  - name: medium_mature_promotes
    input:
      age_days: 25
      severity: medium
      occurrences: 10
      has_fix: true
    expect:
      decision: PROMOTE
      confidence: 70

  # Medium too young → DEFER
  - name: medium_too_young
    input:
      age_days: 10
      severity: medium
      occurrences: 10
      has_fix: true
    expect:
      decision: DEFER
      confidence: 80

  # Anything stale (45+ days) → DISMISS
  - name: stale_dismissed
    input:
      age_days: 50
      severity: medium
      occurrences: 2
      has_fix: false
    expect:
      decision: DISMISS
      confidence: 75

  # Low severity → always DEFER
  - name: low_always_defers
    input:
      age_days: 30
      severity: low
      occurrences: 100
      has_fix: true
    expect:
      decision: DEFER
      confidence: 85

  # Invalid severity → REJECTED
  - name: invalid_severity
    input:
      age_days: 10
      severity: extreme
      occurrences: 5
      has_fix: true
    expect:
      decision: REJECTED
      confidence: 0

  # Negative age → REJECTED
  - name: negative_age
    input:
      age_days: -1
      severity: medium
      occurrences: 5
      has_fix: true
    expect:
      decision: REJECTED
      confidence: 0

  # Boundary: exactly 7 days, critical → PROMOTE
  - name: critical_boundary_exact
    input:
      age_days: 7
      severity: critical
      occurrences: 1
      has_fix: true
    expect:
      decision: PROMOTE
      confidence: 90

  # Boundary: exactly 14 days, high, 3 occurrences → PROMOTE
  - name: high_boundary_exact
    input:
      age_days: 14
      severity: high
      occurrences: 3
      has_fix: true
    expect:
      decision: PROMOTE
      confidence: 80

  # Boundary: exactly 45 days, non-critical → DISMISS
  - name: stale_boundary_exact
    input:
      age_days: 45
      severity: high
      occurrences: 10
      has_fix: true
    expect:
      decision: DISMISS
      confidence: 75

  # Real proposal: AUTO-20260305175026 (critical, ~3 days, has fix)
  - name: real_implicit_schema_guard
    input:
      age_days: 3
      severity: critical
      occurrences: 1
      has_fix: true
    expect:
      decision: DEFER
      confidence: 80

  # Real proposal: AUTO-20260217001328 (medium, ~19 days, 102 occurrences)
  - name: real_sqlite3_pattern
    input:
      age_days: 19
      severity: medium
      occurrences: 102
      has_fix: true
    expect:
      decision: DEFER
      confidence: 80

  # Null safety: empty input
  - name: null_safety
    input: {}
    expect:
      decision: REJECTED
