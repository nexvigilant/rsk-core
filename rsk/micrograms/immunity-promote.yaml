# MICROGRAM++ (upgraded 2026-04-23)
name: immunity-promote
version: 0.1.0
description: Evaluate whether a pending immunity proposal should be promoted to antibody, dismissed as stale, or deferred for more evidence
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: age_days
    type: int
    required: true
    description: ""
  - name: severity
    type: string
    required: true
    description: ""
  - name: occurrences
    type: int
    required: true
    description: ""
  - name: has_fix
    type: bool
    required: true
    description: ""
outputs:
  - name: decision
    type: string
  - name: reason
    type: string
  - name: confidence
    type: int
interface:
  inputs:
    age_days:
      type: int
      required: true
    severity:
      type: string
      required: true
    occurrences:
      type: int
      required: true
    has_fix:
      type: bool
      required: true
  outputs:
    decision:
      type: string
    reason:
      type: string
    confidence:
      type: int
ui:
  title: Immunity Promote
  subtitle: Evaluate whether a pending immunity proposal should be promoted to antibody, dismissed as stale, or deferred for more evidence
  icon: circle
  route: /vigilance/mg/immunity-promote
  steps:
    - field: age_days
      label: age days
      help: Enter age_days
      widget: text
      placeholder: null
    - field: severity
      label: severity
      help: Enter severity
      widget: text
      placeholder: null
    - field: occurrences
      label: occurrences
      help: Enter occurrences
      widget: text
      placeholder: null
    - field: has_fix
      label: has fix
      help: Enter has_fix
      widget: toggle
      placeholder: null
  result:
    template: "decision: {{decision}} — reason: {{reason}} — confidence: {{confidence}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/immunity-promote
  cli: rsk mcg run immunity-promote
  auth: none
  rate_limit: 600/min
tree:
  start: validate_age
  nodes:
    validate_age:
      type: condition
      variable: age_days
      operator: lt
      value: 0
      true_next: reject_invalid
      false_next: check_is_critical
    reject_invalid:
      type: return
      value:
        decision: REJECTED
        reason: age_days must be non-negative
        confidence: 0
    check_is_critical:
      type: condition
      variable: severity
      operator: eq
      value: critical
      true_next: check_critical_age
      false_next: check_is_high
    check_is_high:
      type: condition
      variable: severity
      operator: eq
      value: high
      true_next: check_stale_high
      false_next: check_is_medium
    check_is_medium:
      type: condition
      variable: severity
      operator: eq
      value: medium
      true_next: check_stale_medium
      false_next: check_is_low
    check_is_low:
      type: condition
      variable: severity
      operator: eq
      value: low
      true_next: defer_low
      false_next: reject_bad_severity
    reject_bad_severity:
      type: return
      value:
        decision: REJECTED
        reason: "severity must be one of: critical, high, medium, low"
        confidence: 0
    check_critical_age:
      type: condition
      variable: age_days
      operator: gte
      value: 7
      true_next: check_critical_fix
      false_next: defer_too_young
    check_critical_fix:
      type: condition
      variable: has_fix
      operator: eq
      value: true
      true_next: promote_critical
      false_next: defer_needs_fix
    promote_critical:
      type: return
      value:
        decision: PROMOTE
        reason: Critical severity with fix, aged 7+ days
        confidence: 90
    check_stale_high:
      type: condition
      variable: age_days
      operator: gte
      value: 45
      true_next: dismiss_stale
      false_next: check_high_age
    check_high_age:
      type: condition
      variable: age_days
      operator: gte
      value: 14
      true_next: check_high_occurrences
      false_next: defer_too_young
    check_high_occurrences:
      type: condition
      variable: occurrences
      operator: gte
      value: 3
      true_next: check_high_fix
      false_next: defer_low_evidence
    check_high_fix:
      type: condition
      variable: has_fix
      operator: eq
      value: true
      true_next: promote_high
      false_next: defer_needs_fix
    promote_high:
      type: return
      value:
        decision: PROMOTE
        reason: High severity, 14+ days, 3+ occurrences, fix available
        confidence: 80
    check_stale_medium:
      type: condition
      variable: age_days
      operator: gte
      value: 45
      true_next: dismiss_stale
      false_next: check_medium_age
    check_medium_age:
      type: condition
      variable: age_days
      operator: gte
      value: 21
      true_next: check_medium_occurrences
      false_next: defer_too_young
    check_medium_occurrences:
      type: condition
      variable: occurrences
      operator: gte
      value: 5
      true_next: check_medium_fix
      false_next: defer_low_evidence
    check_medium_fix:
      type: condition
      variable: has_fix
      operator: eq
      value: true
      true_next: promote_medium
      false_next: defer_needs_fix
    promote_medium:
      type: return
      value:
        decision: PROMOTE
        reason: Medium severity, 21+ days, 5+ occurrences, fix available
        confidence: 70
    dismiss_stale:
      type: return
      value:
        decision: DISMISS
        reason: Pending 45+ days without meeting promotion criteria — stale
        confidence: 75
    defer_low:
      type: return
      value:
        decision: DEFER
        reason: Low severity proposals require manual promotion
        confidence: 85
    defer_too_young:
      type: return
      value:
        decision: DEFER
        reason: Proposal too recent — needs more observation time
        confidence: 80
    defer_low_evidence:
      type: return
      value:
        decision: DEFER
        reason: Insufficient occurrences — needs more evidence
        confidence: 75
    defer_needs_fix:
      type: return
      value:
        decision: DEFER
        reason: No fix template available — cannot promote without remediation
        confidence: 80
tests:
  - name: critical_with_fix_promotes
    input:
      age_days: 10
      severity: critical
      occurrences: 1
      has_fix: true
    expect:
      decision: PROMOTE
      confidence: 90
  - name: critical_without_fix_defers
    input:
      age_days: 10
      severity: critical
      occurrences: 5
      has_fix: false
    expect:
      decision: DEFER
      confidence: 80
  - name: critical_too_young
    input:
      age_days: 3
      severity: critical
      occurrences: 10
      has_fix: true
    expect:
      decision: DEFER
      confidence: 80
  - name: high_mature_promotes
    input:
      age_days: 20
      severity: high
      occurrences: 5
      has_fix: true
    expect:
      decision: PROMOTE
      confidence: 80
  - name: high_low_evidence
    input:
      age_days: 20
      severity: high
      occurrences: 1
      has_fix: true
    expect:
      decision: DEFER
      confidence: 75
  - name: medium_mature_promotes
    input:
      age_days: 25
      severity: medium
      occurrences: 10
      has_fix: true
    expect:
      decision: PROMOTE
      confidence: 70
  - name: medium_too_young
    input:
      age_days: 10
      severity: medium
      occurrences: 10
      has_fix: true
    expect:
      decision: DEFER
      confidence: 80
  - name: stale_dismissed
    input:
      age_days: 50
      severity: medium
      occurrences: 2
      has_fix: false
    expect:
      decision: DISMISS
      confidence: 75
  - name: low_always_defers
    input:
      age_days: 30
      severity: low
      occurrences: 100
      has_fix: true
    expect:
      decision: DEFER
      confidence: 85
  - name: invalid_severity
    input:
      age_days: 10
      severity: extreme
      occurrences: 5
      has_fix: true
    expect:
      decision: REJECTED
      confidence: 0
  - name: negative_age
    input:
      age_days: -1
      severity: medium
      occurrences: 5
      has_fix: true
    expect:
      decision: REJECTED
      confidence: 0
  - name: critical_boundary_exact
    input:
      age_days: 7
      severity: critical
      occurrences: 1
      has_fix: true
    expect:
      decision: PROMOTE
      confidence: 90
  - name: high_boundary_exact
    input:
      age_days: 14
      severity: high
      occurrences: 3
      has_fix: true
    expect:
      decision: PROMOTE
      confidence: 80
  - name: stale_boundary_exact
    input:
      age_days: 45
      severity: high
      occurrences: 10
      has_fix: true
    expect:
      decision: DISMISS
      confidence: 75
  - name: real_implicit_schema_guard
    input:
      age_days: 3
      severity: critical
      occurrences: 1
      has_fix: true
    expect:
      decision: DEFER
      confidence: 80
  - name: real_sqlite3_pattern
    input:
      age_days: 19
      severity: medium
      occurrences: 102
      has_fix: true
    expect:
      decision: DEFER
      confidence: 80
  - name: null_safety
    input: {}
    expect:
      decision: REJECTED
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - decision
    - reason
    - confidence
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
