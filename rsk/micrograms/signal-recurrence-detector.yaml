# MICROGRAM++ (upgraded 2026-04-23)
name: signal-recurrence-detector
version: 0.1.0
description: Detects recurring patterns to fill the ρ (Recursion) primitive gap. Distinguishes novel occurrences from recurring signals, recurring signals despite prior action, and systemic failures.
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs: []
outputs: []
ui:
  title: Signal Recurrence Detector
  subtitle: Detects recurring patterns to fill the ρ (Recursion) primitive gap. Distinguishes novel occurrences from recurring signals, recurring signals despite prior action, and systemic failures.
  icon: activity
  route: /vigilance/mg/signal-recurrence-detector
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/signal-recurrence-detector
  cli: rsk mcg run signal-recurrence-detector
  auth: none
  rate_limit: 600/min
tree:
  start: count_check
  nodes:
    prior_action_check_two:
      type: condition
      variable: prior_action_taken
      operator: eq
      value: true
      true_next: recurrence_despite_action_return
      false_next: recurring_return
    prior_action_check_three_plus:
      type: condition
      variable: prior_action_taken
      operator: eq
      value: true
      true_next: systemic_failure_return
      false_next: window_check
    window_check:
      type: condition
      variable: window_days
      operator: lte
      value: 30
      true_next: acute_cluster_return
      false_next: chronic_pattern_return
    fallback_return:
      type: return
      value:
        action: Unexpected input state. Verify occurrence_count and window_days are valid.
        recurrence_class: UNKNOWN
        recursion_primitive: ρ — does it contain itself; self-reference
        chemistry_analog: Unknown reaction
        escalation_required: false
    count_three_plus_check:
      type: condition
      variable: occurrence_count
      operator: gte
      value: 3
      true_next: prior_action_check_three_plus
      false_next: fallback_return
    novel_return:
      type: return
      value:
        action: Monitor for recurrence. No prior context.
        chemistry_analog: Isolated reaction (no feedback)
        recursion_primitive: ρ — does it contain itself; self-reference
        recurrence_class: NOVEL
        escalation_required: false
    recurrence_despite_action_return:
      type: return
      value:
        recurrence_class: RECURRENCE_DESPITE_ACTION
        escalation_required: true
        chemistry_analog: Chain reaction — each step triggers the next
        recursion_primitive: ρ — does it contain itself; self-reference
        action: Pattern recurred despite prior action. Action was insufficient. Escalate for deeper root cause analysis.
    systemic_failure_return:
      type: return
      value:
        action: Pattern persists despite corrective action taken previously. Root cause not addressed. Requires structural intervention.
        recurrence_class: SYSTEMIC_FAILURE
        chemistry_analog: Oscillating reaction — feedback loop sustaining the cycle
        recursion_primitive: ρ — does it contain itself; self-reference
        escalation_required: true
    acute_cluster_return:
      type: return
      value:
        recurrence_class: ACUTE_CLUSTER
        recursion_primitive: ρ — does it contain itself; self-reference
        chemistry_analog: Explosive chain reaction — rapid self-propagation
        escalation_required: true
        action: 3+ occurrences within 30 days indicates rapid recurrence. Immediate intervention required.
    count_check:
      type: condition
      variable: occurrence_count
      operator: eq
      value: 1
      true_next: novel_return
      false_next: count_two_check
    recurring_return:
      type: return
      value:
        chemistry_analog: Autocatalysis — reaction feeds itself
        escalation_required: false
        recursion_primitive: ρ — does it contain itself; self-reference
        recurrence_class: RECURRING
        action: Pattern appeared a second time without prior corrective action. Implement preventive measure.
    chronic_pattern_return:
      type: return
      value:
        recursion_primitive: ρ — does it contain itself; self-reference
        recurrence_class: CHRONIC_PATTERN
        chemistry_analog: Sustained autocatalysis — persistent but not acute
        escalation_required: true
        action: 3+ occurrences over extended period. Systemic issue requiring long-term management strategy.
    count_two_check:
      type: condition
      variable: occurrence_count
      operator: eq
      value: 2
      true_next: prior_action_check_two
      false_next: count_three_plus_check
