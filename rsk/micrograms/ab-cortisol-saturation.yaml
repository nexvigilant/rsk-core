# MICROGRAM++ (upgraded 2026-04-23)
name: ab-cortisol-saturation
version: 0.1.0
description: "Antibody: detects cortisol saturation (stem-bio burnout threshold). When cortisol > 0.8, system is in allostatic overload."
family: antibody.chemistry
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - antibody
inputs:
  - name: cortisol_level
    type: number
    required: true
    description: ""
outputs:
  - name: threat
    type: boolean
  - name: response
    type: string
interface:
  inputs:
    cortisol_level:
      type: number
      required: true
  outputs:
    threat:
      type: boolean
    response:
      type: string
ui:
  title: Cortisol Saturation
  subtitle: "Antibody: detects cortisol saturation (stem-bio burnout threshold). When cortisol > 0.8, system is in allostatic overload."
  icon: shield
  route: /vigilance/mg/ab-cortisol-saturation
  steps:
    - field: cortisol_level
      label: cortisol level
      help: Enter cortisol_level
      widget: number
      placeholder: null
  result:
    template: "threat: {{threat}} — response: {{response}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ab-cortisol-saturation
  cli: rsk mcg run ab-cortisol-saturation
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cortisol_level
      operator: gt
      value: 0.8
      true_next: overload
      false_next: check_elevated
    check_elevated:
      type: condition
      variable: cortisol_level
      operator: gt
      value: 0.6
      true_next: warn
      false_next: clean
    overload:
      type: return
      value:
        threat: true
        response: "BLOCK: cortisol > 0.8 — allostatic overload, reduce stimuli"
    warn:
      type: return
      value:
        threat: false
        response: "WARN: cortisol elevated (0.6-0.8) — approaching burnout threshold"
    clean:
      type: return
      value:
        threat: false
        response: PASS
tests:
  - input:
      cortisol_level: 0.3
    expect:
      threat: false
      response: PASS
  - input:
      cortisol_level: 0.7
    expect:
      threat: false
  - input:
      cortisol_level: 0.9
    expect:
      threat: true
  - input:
      cortisol_level: 1
    expect:
      threat: true
  - input: {}
    expect:
      response: PASS
      threat: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - threat
    - response
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: antibody.chemistry
  log_level: info
governance:
  sop_ref: SOP-CHEM-001
  regulatory_ref: []
  harm_types:
    - F
  review_cadence: quarterly
  tov_axioms:
    - conservation
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
