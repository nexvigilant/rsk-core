# MICROGRAM++ (upgraded 2026-04-23)
name: station-formula-pipeline
version: 0.1.0
description: "Route formula computations: signal strength, flywheel velocity, domain distance"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Formula Pipeline
  subtitle: "Route formula computations: signal strength, flywheel velocity, domain distance"
  icon: circle
  route: /vigilance/mg/station-formula-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-formula-pipeline
  cli: rsk mcg run station-formula-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_type
  nodes:
    signal:
      type: return
      value:
        priority: moderate
        action: route
        reason: Signal strength formula — feed to signal-theory pipeline
        route: signal_detection
    check_flywheel:
      type: condition
      variable: formula_type
      operator: eq
      value: flywheel_velocity
      true_next: flywheel
      false_next: generic
    check_type:
      type: condition
      variable: formula_type
      operator: eq
      value: signal_strength
      true_next: signal
      false_next: check_flywheel
    flywheel:
      type: return
      value:
        reason: Flywheel velocity — feed to session health metrics
        action: route
        route: session_metrics
        priority: moderate
    generic:
      type: return
      value:
        reason: Generic formula computation — return result
        priority: low
        action: compute
        route: archive
tests:
  - input:
      formula_type: signal_strength
    expect:
      priority: moderate
      route: signal_detection
      action: route
  - input:
      formula_type: flywheel_velocity
    expect:
      action: route
      priority: moderate
      route: session_metrics
  - input:
      formula_type: domain_distance
    expect:
      route: archive
      priority: low
      action: compute
  - input: {}
    expect:
      reason: Generic formula computation — return result
      priority: low
      action: compute
      route: archive
  - input: {}
    expect:
      priority: low
      action: compute
      reason: Generic formula computation — return result
      route: archive
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
