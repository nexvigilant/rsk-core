# MICROGRAM++ (upgraded 2026-04-23)
name: deploy-gate
version: 0.1.0
description: "Bridge: test verdict deploy flag + quality score ship flag → release approval. Chains from test-verdict and quality-score."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: deploy
    type: bool
    required: false
    description: ""
  - name: ship
    type: bool
    required: false
    description: ""
outputs:
  - name: blockers
    type: string
  - name: release_approved
    type: bool
  - name: status
    type: string
interface:
  inputs:
    deploy:
      type: bool
      required: false
    ship:
      type: bool
      required: false
  outputs:
    blockers:
      type: string
    release_approved:
      type: bool
    status:
      type: string
ui:
  title: Deploy Gate
  subtitle: "Bridge: test verdict deploy flag + quality score ship flag → release approval. Chains from test-verdict and quality-score."
  icon: circle
  route: /vigilance/mg/deploy-gate
  steps:
    - field: deploy
      label: deploy
      help: Enter deploy
      widget: toggle
      placeholder: null
    - field: ship
      label: ship
      help: Enter ship
      widget: toggle
      placeholder: null
  result:
    template: "blockers: {{blockers}} — release_approved: {{release_approved}} — status: {{status}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/deploy-gate
  cli: rsk mcg run deploy-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_deploy
  nodes:
    check_deploy:
      type: condition
      variable: deploy
      operator: eq
      value: true
      true_next: check_ship
      false_next: blocked
    check_ship:
      type: condition
      variable: ship
      operator: eq
      value: true
      true_next: approved
      false_next: quality_hold
    approved:
      type: return
      value:
        status: APPROVED
        blockers: none
        release_approved: true
    quality_hold:
      type: return
      value:
        blockers: quality score below threshold
        release_approved: false
        status: QUALITY_HOLD
    blocked:
      type: return
      value:
        status: TEST_BLOCKED
        release_approved: false
        blockers: test failures prevent deployment
tests:
  - input:
      ship: true
      deploy: true
    expect:
      status: APPROVED
      blockers: none
      release_approved: true
  - input:
      deploy: true
      ship: false
    expect:
      blockers: quality score below threshold
      status: QUALITY_HOLD
      release_approved: false
  - input:
      deploy: false
      ship: true
    expect:
      release_approved: false
      status: TEST_BLOCKED
      blockers: test failures prevent deployment
  - input:
      deploy: false
      ship: false
    expect:
      blockers: test failures prevent deployment
      release_approved: false
      status: TEST_BLOCKED
  - input: {}
    expect:
      status: TEST_BLOCKED
      release_approved: false
      blockers: test failures prevent deployment
  - input: {}
    expect:
      blockers: test failures prevent deployment
      status: TEST_BLOCKED
      release_approved: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - blockers
    - release_approved
    - status
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
