# MICROGRAM++ (upgraded 2026-04-23)
name: age-lactation-safety
version: 0.1.0
description: Lactation safety assessment. Evaluates transfer into breast milk and infant exposure risk.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Age Lactation Safety
  subtitle: Lactation safety assessment. Evaluates transfer into breast milk and infant exposure risk.
  icon: circle
  route: /vigilance/mg/age-lactation-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/age-lactation-safety
  cli: rsk mcg run age-lactation-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_lactation_status
  nodes:
    check_lactation_status:
      type: condition
      variable: is_breastfeeding
      operator: eq
      value: true
      true_next: check_drug_transfer
      false_next: not_breastfeeding
    check_drug_transfer:
      type: condition
      variable: high_milk_transfer
      operator: eq
      value: true
      true_next: high_transfer_alert
      false_next: moderate_transfer
    high_transfer_alert:
      type: return
      value:
        breastfeeding_status: lactating
        transfer_risk: high
        recommendation: contraindicated
        message: High milk transfer; drug contraindicated during breastfeeding
    moderate_transfer:
      type: return
      value:
        breastfeeding_status: lactating
        transfer_risk: low_to_moderate
        recommendation: compatible
        message: Low/moderate milk transfer; generally compatible with breastfeeding
    not_breastfeeding:
      type: return
      value:
        breastfeeding_status: not_breastfeeding
        transfer_risk: none
        message: Not breastfeeding; standard dosing applies
tests:
  - input:
      is_breastfeeding: true
      high_milk_transfer: true
    expect:
      breastfeeding_status: lactating
      transfer_risk: high
      recommendation: contraindicated
  - input:
      is_breastfeeding: true
      high_milk_transfer: false
    expect:
      breastfeeding_status: lactating
      transfer_risk: low_to_moderate
      recommendation: compatible
  - input:
      is_breastfeeding: false
      high_milk_transfer: false
    expect:
      breastfeeding_status: not_breastfeeding
      transfer_risk: none
  - input:
      is_breastfeeding: false
      high_milk_transfer: true
    expect:
      breastfeeding_status: not_breastfeeding
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
