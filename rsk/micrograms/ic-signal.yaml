# MICROGRAM++ (upgraded 2026-04-23)
name: ic-signal
version: 0.1.0
description: Information Component (IC) Bayesian disproportionality signal gate. Uses IC025 (lower 95% credibility interval) as the conservative threshold.
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: ic025
    type: float
    required: false
    description: ""
outputs:
  - name: confidence
    type: string
  - name: note
    type: string
  - name: signal
    type: string
  - name: signal_detected
    type: bool
interface:
  inputs:
    ic025:
      type: float
      required: false
  outputs:
    confidence:
      type: string
    note:
      type: string
    signal:
      type: string
    signal_detected:
      type: bool
ui:
  title: Ic Signal
  subtitle: Information Component (IC) Bayesian disproportionality signal gate. Uses IC025 (lower 95% credibility interval) as the conservative threshold.
  icon: activity
  route: /vigilance/mg/ic-signal
  steps:
    - field: ic025
      label: ic025
      help: Enter ic025
      widget: text
      placeholder: null
  result:
    template: "confidence: {{confidence}} — note: {{note}} — signal: {{signal}} — signal_detected: {{signal_detected}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ic-signal
  cli: rsk mcg run ic-signal
  auth: none
  rate_limit: 600/min
tree:
  start: null_guard
  nodes:
    null_guard:
      type: condition
      variable: ic025
      operator: is_null
      value: null
      true_next: unknown_return
      false_next: check_strong
    unknown_return:
      type: return
      value:
        signal: NONE
        signal_detected: false
        note: No IC data available
    check_strong:
      type: condition
      variable: ic025
      operator: gte
      value: 2
      true_next: strong_signal
      false_next: check_moderate
    check_moderate:
      type: condition
      variable: ic025
      operator: gte
      value: 1
      true_next: moderate_signal
      false_next: check_weak
    check_weak:
      type: condition
      variable: ic025
      operator: gte
      value: 0.5
      true_next: weak_signal
      false_next: check_positive
    check_positive:
      type: condition
      variable: ic025
      operator: gte
      value: 0
      true_next: no_signal_positive
      false_next: no_signal_negative
    strong_signal:
      type: return
      value:
        signal: STRONG
        confidence: HIGH
        signal_detected: true
    moderate_signal:
      type: return
      value:
        signal: MODERATE
        confidence: MODERATE
        signal_detected: true
    weak_signal:
      type: return
      value:
        signal: WEAK
        confidence: LOW
        signal_detected: true
    no_signal_positive:
      type: return
      value:
        signal: NONE
        signal_detected: false
        note: IC positive but IC025 below threshold
    no_signal_negative:
      type: return
      value:
        signal: NONE
        signal_detected: false
        note: IC negative -- no disproportionality
tests:
  - input:
      ic025: 3
    expect:
      signal: STRONG
      confidence: HIGH
      signal_detected: true
  - input:
      ic025: 2
    expect:
      signal: STRONG
      confidence: HIGH
      signal_detected: true
  - input:
      ic025: 1.9
    expect:
      signal: MODERATE
      confidence: MODERATE
      signal_detected: true
  - input:
      ic025: 1
    expect:
      signal: MODERATE
      confidence: MODERATE
      signal_detected: true
  - input:
      ic025: 0.9
    expect:
      signal: WEAK
      confidence: LOW
      signal_detected: true
  - input:
      ic025: 0.5
    expect:
      signal: WEAK
      confidence: LOW
      signal_detected: true
  - input:
      ic025: 0.4
    expect:
      signal: NONE
      signal_detected: false
      note: IC positive but IC025 below threshold
  - input:
      ic025: 0
    expect:
      signal: NONE
      signal_detected: false
      note: IC positive but IC025 below threshold
  - input:
      ic025: -0.1
    expect:
      signal: NONE
      signal_detected: false
      note: IC negative -- no disproportionality
  - input:
      ic025: -2.5
    expect:
      signal: NONE
      signal_detected: false
      note: IC negative -- no disproportionality
  - input:
      ic025: 5
    expect:
      signal: STRONG
      confidence: HIGH
      signal_detected: true
  - input: {}
    expect:
      signal: NONE
      signal_detected: false
      note: No IC data available
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - confidence
    - note
    - signal
    - signal_detected
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
