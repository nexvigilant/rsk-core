      next_action: Address weakest convergence dimension before advancing to clinical.
  - input:
      convergence_verdict: PARTIAL_CONVERGENCE
      dimensions_active: 0
      evidence_grade: ""
      has_replication_failure: false
      signal_score: 0.6
      weakest_dimension: proteomics
