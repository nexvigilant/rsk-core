  - input:
      convergence_verdict: PARTIAL_CONVERGENCE
      dimensions_active: 0
      evidence_grade: ""
      has_replication_failure: true
      signal_score: 0.6
      weakest_dimension: ""
    expect:
      development_stage: investigation
      recommendation: HOLD — resolve replication + convergence gaps
      risk_flags: replication_failure_and_incomplete_convergence
      next_action: Replicate failed experiment AND address missing omics dimension before proceeding.
      priority: P2
  - input: {}
    expect:
      development_stage: rejected
      recommendation: DISCARD
      next_action: Signal below noise threshold. Do not invest resources.
      risk_flags: noise
      priority: P5
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - recommendation
    - next_action
    - risk_flags
    - priority
    - development_stage
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
