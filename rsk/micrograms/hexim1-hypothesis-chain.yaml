name: hexim1-hypothesis-chain
description: 'End-to-end HEXIM1 hypothesis validation chain. Routes through signal scoring, convergence gating, and evidence quality to produce a final development recommendation. Integrates Campion Signal Theory with multi-omics convergence.'
version: 0.1.0
interface:
  inputs:
    signal_score:
      type: number
      required: true
      description: 'Pre-computed S = U * R * T from hexim1-signal-score (0.0-1.0)'
    convergence_verdict:
      type: string
      required: true
      description: 'Verdict from multi-omics-convergence-gate: CONVERGED, PARTIAL_CONVERGENCE, EMERGING, INSUFFICIENT, NO_DATA'
    dimensions_active:
      type: number
      required: true
      description: 'Number of active omics dimensions (0-4)'
    weakest_dimension:
      type: string
      required: true
      description: 'Weakest dimension from convergence gate'
    evidence_grade:
      type: string
      required: true
      description: 'Evidence quality: strong, moderate, weak, insufficient'
    has_replication_failure:
      type: boolean
      required: true
      description: 'Whether any replication attempt has failed'
  outputs:
    recommendation:
      type: string
    development_stage:
      type: string
    priority:
      type: string
    next_action:
      type: string
    risk_flags:
      type: string
tree:
  start: check_no_data
  nodes:
    # Gate 1: Do we have anything to work with?
    check_no_data:
      type: condition
      variable: convergence_verdict
      operator: eq
      value: NO_DATA
      true_next: halt_no_data
      false_next: check_insufficient

    check_insufficient:
      type: condition
      variable: convergence_verdict
      operator: eq
      value: INSUFFICIENT
      true_next: halt_insufficient
      false_next: check_signal_strength

    # Gate 2: Signal strength filter
    check_signal_strength:
      type: condition
      variable: signal_score
      operator: gte
      value: 0.60
      true_next: check_convergence_strong
      false_next: check_signal_moderate

    check_signal_moderate:
      type: condition
      variable: signal_score
      operator: gte
      value: 0.40
      true_next: moderate_signal_path
      false_next: check_signal_weak

    check_signal_weak:
      type: condition
      variable: signal_score
      operator: gte
      value: 0.20
      true_next: weak_signal_path
      false_next: halt_noise

    # Gate 3: Convergence + strong signal
    check_convergence_strong:
      type: condition
      variable: convergence_verdict
      operator: eq
      value: CONVERGED
      true_next: check_evidence_converged
      false_next: check_partial_strong

    check_partial_strong:
      type: condition
      variable: convergence_verdict
      operator: eq
      value: PARTIAL_CONVERGENCE
      true_next: check_replication_partial
      false_next: emerging_strong_signal

    # Strong signal + full convergence
    check_evidence_converged:
      type: condition
      variable: evidence_grade
      operator: eq
      value: strong
      true_next: check_replication_top
      false_next: develop_with_evidence_gap

    check_replication_top:
      type: condition
      variable: has_replication_failure
      operator: eq
      value: true
      true_next: develop_with_replication_risk
      false_next: fast_track

    # FAST TRACK: strong signal + converged + strong evidence + no replication failure
    fast_track:
      type: return
      value:
        recommendation: 'FAST TRACK for clinical development'
        development_stage: clinical_validation
        priority: P0
        next_action: 'Design Phase I PD endpoint study using HEXIM1 as primary biomarker'
        risk_flags: none

    develop_with_replication_risk:
      type: return
      value:
        recommendation: 'DEVELOP with replication monitoring'
        development_stage: pre_clinical_expansion
        priority: P1
        next_action: 'Replicate failed experiment with updated protocol before clinical submission'
        risk_flags: replication_failure

    develop_with_evidence_gap:
      type: return
      value:
        recommendation: 'DEVELOP — strengthen evidence base'
        development_stage: validation
        priority: P1
        next_action: 'Upgrade evidence quality through dose-response characterization and additional cell lines'
        risk_flags: evidence_quality

    # Strong signal + partial convergence
    check_replication_partial:
      type: condition
      variable: has_replication_failure
      operator: eq
      value: true
      true_next: partial_with_replication_risk
      false_next: partial_develop

    partial_develop:
      type: condition
      variable: weakest_dimension
      operator: eq
      value: proteomics
      true_next: develop_need_proteomics
      false_next: develop_need_other

    develop_need_proteomics:
      type: return
      value:
        recommendation: 'DEVELOP — proteomics validation required'
        development_stage: validation
        priority: P1
        next_action: 'Query PRIDE/ProteomeXchange for protein-level confirmation. Design targeted proteomics experiment.'
        risk_flags: missing_proteomics

    develop_need_other:
      type: return
      value:
        recommendation: 'DEVELOP — expand omics coverage'
        development_stage: validation
        priority: P2
        next_action: 'Address weakest convergence dimension before advancing to clinical.'
        risk_flags: incomplete_convergence

    partial_with_replication_risk:
      type: return
      value:
        recommendation: 'HOLD — resolve replication + convergence gaps'
        development_stage: investigation
        priority: P2
        next_action: 'Replicate failed experiment AND address missing omics dimension before proceeding.'
        risk_flags: replication_failure_and_incomplete_convergence

    # Strong signal + emerging convergence (only 2 dimensions)
    emerging_strong_signal:
      type: return
      value:
        recommendation: 'INVESTIGATE — strong signal needs broader validation'
        development_stage: discovery
        priority: P2
        next_action: 'Expand to 3+ omics dimensions. Strong signal justifies investment in evidence generation.'
        risk_flags: narrow_evidence_base

    # Moderate signal path
    moderate_signal_path:
      type: condition
      variable: convergence_verdict
      operator: eq
      value: CONVERGED
      true_next: moderate_converged
      false_next: moderate_not_converged

    moderate_converged:
      type: return
      value:
        recommendation: 'INVESTIGATE — convergence exceeds signal'
        development_stage: validation
        priority: P2
        next_action: 'Convergence is strong but signal is moderate. Publish to refresh temporal score or advance clinical stage.'
        risk_flags: moderate_signal

    moderate_not_converged:
      type: condition
      variable: dimensions_active
      operator: gte
      value: 3
      true_next: moderate_partial
      false_next: moderate_emerging

    moderate_partial:
      type: return
      value:
        recommendation: 'MONITOR — moderate signal with partial convergence'
        development_stage: discovery
        priority: P3
        next_action: 'Track for signal strengthening. Generate new data if resources available.'
        risk_flags: moderate_signal_and_incomplete_convergence

    moderate_emerging:
      type: return
      value:
        recommendation: 'MONITOR — early stage hypothesis'
        development_stage: discovery
        priority: P3
        next_action: 'Expand evidence base. Not ready for development investment.'
        risk_flags: early_stage

    # Weak signal path
    weak_signal_path:
      type: condition
      variable: convergence_verdict
      operator: eq
      value: CONVERGED
      true_next: weak_but_converged
      false_next: deprioritize

    weak_but_converged:
      type: return
      value:
        recommendation: 'MONITOR — weak signal despite convergence'
        development_stage: discovery
        priority: P3
        next_action: 'Convergence suggests mechanism is real but signal is weak. May be well-established (low novelty) or aging. Re-evaluate uniqueness and temporal.'
        risk_flags: weak_signal

    deprioritize:
      type: return
      value:
        recommendation: 'DEPRIORITIZE'
        development_stage: archived
        priority: P4
        next_action: 'Weak signal without convergence. Archive and monitor for new evidence.'
        risk_flags: weak_signal_no_convergence

    # Noise
    halt_noise:
      type: return
      value:
        recommendation: 'DISCARD'
        development_stage: rejected
        priority: P5
        next_action: 'Signal below noise threshold. Do not invest resources.'
        risk_flags: noise

    halt_no_data:
      type: return
      value:
        recommendation: 'CANNOT ASSESS'
        development_stage: pre_discovery
        priority: P5
        next_action: 'No omics data available. Generate initial evidence in at least 2 dimensions.'
        risk_flags: no_data

    halt_insufficient:
      type: return
      value:
        recommendation: 'CANNOT ASSESS'
        development_stage: pre_discovery
        priority: P5
        next_action: 'Insufficient omics dimensions. Expand to minimum required dimensions.'
        risk_flags: insufficient_dimensions

tests:
# HEXIM1 actual state: S=0.722, partial convergence (proteomics weak), 4 dims, no replication failure
- input: { signal_score: 0.722, convergence_verdict: PARTIAL_CONVERGENCE, dimensions_active: 4, weakest_dimension: proteomics, evidence_grade: strong, has_replication_failure: false }
  expect: { recommendation: 'DEVELOP — proteomics validation required', priority: P1, development_stage: validation }

# Best case: everything strong
- input: { signal_score: 0.857, convergence_verdict: CONVERGED, dimensions_active: 4, weakest_dimension: none, evidence_grade: strong, has_replication_failure: false }
  expect: { recommendation: 'FAST TRACK for clinical development', priority: P0 }

# Strong signal + converged but replication failure
- input: { signal_score: 0.722, convergence_verdict: CONVERGED, dimensions_active: 4, weakest_dimension: none, evidence_grade: strong, has_replication_failure: true }
  expect: { recommendation: 'DEVELOP with replication monitoring', priority: P1, risk_flags: replication_failure }

# No data
- input: { signal_score: 0, convergence_verdict: NO_DATA, dimensions_active: 0, weakest_dimension: all, evidence_grade: insufficient, has_replication_failure: false }
  expect: { recommendation: 'CANNOT ASSESS', priority: P5 }

# Noise signal
- input: { signal_score: 0.10, convergence_verdict: EMERGING, dimensions_active: 2, weakest_dimension: multiple, evidence_grade: weak, has_replication_failure: false }
  expect: { recommendation: 'DISCARD', priority: P5 }

# Moderate signal, converged
- input: { signal_score: 0.50, convergence_verdict: CONVERGED, dimensions_active: 4, weakest_dimension: none, evidence_grade: moderate, has_replication_failure: false }
  expect: { recommendation: 'INVESTIGATE — convergence exceeds signal', priority: P2 }

# Strong signal, only 2 dimensions
- input: { signal_score: 0.722, convergence_verdict: EMERGING, dimensions_active: 2, weakest_dimension: multiple, evidence_grade: moderate, has_replication_failure: false }
  expect: { recommendation: 'INVESTIGATE — strong signal needs broader validation', priority: P2 }

# Weak signal but converged (e.g. well-known pathway, 200+ papers)
- input: { signal_score: 0.25, convergence_verdict: CONVERGED, dimensions_active: 4, weakest_dimension: none, evidence_grade: strong, has_replication_failure: false }
  expect: { recommendation: 'MONITOR — weak signal despite convergence', priority: P3 }

# Partial convergence with replication failure
- input: { signal_score: 0.65, convergence_verdict: PARTIAL_CONVERGENCE, dimensions_active: 3, weakest_dimension: proteomics, evidence_grade: moderate, has_replication_failure: true }
  expect: { recommendation: 'HOLD — resolve replication + convergence gaps', priority: P2 }

# Moderate signal, only emerging (2 dims)
- input: { signal_score: 0.45, convergence_verdict: EMERGING, dimensions_active: 2, weakest_dimension: multiple, evidence_grade: moderate, has_replication_failure: false }
  expect: { recommendation: 'MONITOR — early stage hypothesis', priority: P3 }
