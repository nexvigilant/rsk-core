# MICROGRAM++ (upgraded 2026-04-23)
name: deadline-urgency-classifier
version: 0.1.0
description: "Dashboard deadline urgency: maps days remaining to traffic level for PV operations center display"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: days_remaining
    type: number
    required: true
    description: Days until regulatory deadline (can be negative if overdue)
outputs:
  - name: traffic_level
    type: string
interface:
  inputs:
    days_remaining:
      type: number
      required: true
      description: Days until regulatory deadline (can be negative if overdue)
  outputs:
    traffic_level:
      type: string
ui:
  title: Deadline Urgency Classifier
  subtitle: "Dashboard deadline urgency: maps days remaining to traffic level for PV operations center display"
  icon: circle
  route: /vigilance/mg/deadline-urgency-classifier
  steps:
    - field: days_remaining
      label: days remaining
      help: Days until regulatory deadline (can be negative if overdue)
      widget: number
      placeholder: null
  result:
    template: "traffic_level: {{traffic_level}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/deadline-urgency-classifier
  cli: rsk mcg run deadline-urgency-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_critical
  nodes:
    check_critical:
      type: condition
      variable: days_remaining
      operator: lte
      value: 3
      true_next: critical
      false_next: check_warning
    check_warning:
      type: condition
      variable: days_remaining
      operator: lte
      value: 7
      true_next: warning
      false_next: normal
    critical:
      type: return
      value:
        traffic_level: red
    warning:
      type: return
      value:
        traffic_level: yellow
    normal:
      type: return
      value:
        traffic_level: green
tests:
  - input:
      days_remaining: -1
    expect:
      traffic_level: red
  - input:
      days_remaining: 0
    expect:
      traffic_level: red
  - input:
      days_remaining: 1
    expect:
      traffic_level: red
  - input:
      days_remaining: 3
    expect:
      traffic_level: red
  - input:
      days_remaining: 4
    expect:
      traffic_level: yellow
  - input:
      days_remaining: 5
    expect:
      traffic_level: yellow
  - input:
      days_remaining: 7
    expect:
      traffic_level: yellow
  - input:
      days_remaining: 8
    expect:
      traffic_level: green
  - input:
      days_remaining: 30
    expect:
      traffic_level: green
  - input: {}
    expect:
      traffic_level: green
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - traffic_level
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
