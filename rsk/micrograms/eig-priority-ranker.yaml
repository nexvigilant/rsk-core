# MICROGRAM++ (upgraded 2026-04-23)
name: eig-priority-ranker
version: 0.1.0
description: "EIG Priority Ranker (ALG-2025-012): ranks which drug-event pair to investigate next. EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ). Three factors: uncertainty (σ⁻¹ — higher uncertainty = more to learn), extremity (|θ - 0.5| — how far from 50/50 = how decisive), propagation (Σw(1-σ) — how many adjacent drugs benefit from this investigation)."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: uncertainty_level
    type: string
    required: false
    description: ""
  - name: extremity_level
    type: string
    required: false
    description: ""
  - name: propagation_count
    type: integer
    required: false
    description: ""
outputs:
  - name: priority
    type: string
  - name: eig_class
    type: string
  - name: rationale
    type: string
  - name: algorithm
    type: string
interface:
  inputs:
    uncertainty_level:
      type: string
      required: false
    extremity_level:
      type: string
      required: false
    propagation_count:
      type: integer
      required: false
  outputs:
    priority:
      type: string
    eig_class:
      type: string
    rationale:
      type: string
    algorithm:
      type: string
ui:
  title: Eig Priority Ranker
  subtitle: "EIG Priority Ranker (ALG-2025-012): ranks which drug-event pair to investigate next. EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ). Three factors: uncertainty (σ⁻¹ — higher uncertainty = more to learn), extremity (|θ - 0.5| — how far from 50/50 = how decisive), propagation (Σw(1-σ) — how many adjacent drugs benefit from this investigation)."
  icon: circle
  route: /vigilance/mg/eig-priority-ranker
  steps:
    - field: uncertainty_level
      label: uncertainty level
      help: Enter uncertainty_level
      widget: text
      placeholder: null
    - field: extremity_level
      label: extremity level
      help: Enter extremity_level
      widget: text
      placeholder: null
    - field: propagation_count
      label: propagation count
      help: Enter propagation_count
      widget: number
      placeholder: null
  result:
    template: "priority: {{priority}} — eig_class: {{eig_class}} — rationale: {{rationale}} — algorithm: {{algorithm}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/eig-priority-ranker
  cli: rsk mcg run eig-priority-ranker
  auth: none
  rate_limit: 600/min
tree:
  start: check_uncertainty_null
  nodes:
    check_uncertainty_null:
      type: condition
      variable: uncertainty_level
      operator: is_null
      value: null
      true_next: defer_null
      false_next: check_very_high
    check_very_high:
      type: condition
      variable: uncertainty_level
      operator: eq
      value: very_high
      true_next: vh_check_extreme
      false_next: check_high
    vh_check_extreme:
      type: condition
      variable: extremity_level
      operator: eq
      value: extreme
      true_next: investigate_now_critical
      false_next: investigate_soon_high
    investigate_now_critical:
      type: return
      value:
        priority: INVESTIGATE_NOW
        eig_class: CRITICAL
        rationale: Maximum uncertainty with extreme evidence divergence — highest possible information gain from direct investigation
        algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); very_high uncertainty × extreme extremity → CRITICAL priority
    investigate_soon_high:
      type: return
      value:
        priority: INVESTIGATE_SOON
        eig_class: HIGH
        rationale: Very high uncertainty — substantial information gain regardless of extremity level
        algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); very_high uncertainty with non-extreme extremity → HIGH priority
    check_high:
      type: condition
      variable: uncertainty_level
      operator: eq
      value: high
      true_next: high_check_propagation
      false_next: check_moderate
    high_check_propagation:
      type: condition
      variable: propagation_count
      operator: gte
      value: 3
      true_next: investigate_now_network
      false_next: investigate_soon_high_std
    investigate_now_network:
      type: return
      value:
        priority: INVESTIGATE_NOW
        eig_class: HIGH
        rationale: High uncertainty with large network effect — investigation benefits 3+ adjacent drugs in the transbeyesian network
        algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); high uncertainty × propagation_count >= 3 → INVESTIGATE_NOW (network multiplier)
    investigate_soon_high_std:
      type: return
      value:
        priority: INVESTIGATE_SOON
        eig_class: HIGH
        rationale: High uncertainty with limited network effect — direct investigation valuable but not urgent
        algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); high uncertainty × propagation_count < 3 → INVESTIGATE_SOON
    check_moderate:
      type: condition
      variable: uncertainty_level
      operator: eq
      value: moderate
      true_next: mod_check_extremity_extreme
      false_next: defer_low
    mod_check_extremity_extreme:
      type: condition
      variable: extremity_level
      operator: eq
      value: extreme
      true_next: investigate_soon_moderate
      false_next: mod_check_extremity_high
    mod_check_extremity_high:
      type: condition
      variable: extremity_level
      operator: eq
      value: high
      true_next: investigate_soon_moderate
      false_next: queue_moderate
    investigate_soon_moderate:
      type: return
      value:
        priority: INVESTIGATE_SOON
        eig_class: MODERATE
        rationale: Moderate uncertainty but high/extreme extremity — the evidence is decisive enough to warrant prioritized investigation
        algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); moderate uncertainty × high/extreme extremity → INVESTIGATE_SOON
    queue_moderate:
      type: return
      value:
        priority: QUEUE
        eig_class: MODERATE
        rationale: Moderate uncertainty with moderate or lower extremity — standard queue position, investigate when capacity permits
        algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); moderate uncertainty × moderate/low/neutral extremity → QUEUE
    defer_low:
      type: return
      value:
        priority: DEFER
        eig_class: LOW
        rationale: Low or very low uncertainty — drug-event pair already well-characterized, minimal information gain from further investigation
        algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); low/very_low uncertainty → DEFER (σ⁻¹ ≈ 0, information gain negligible)
    defer_null:
      type: return
      value:
        priority: DEFER
        eig_class: LOW
        rationale: Missing input data — cannot compute EIG without uncertainty level
        algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); null inputs → DEFER (safe default)
tests:
  - name: very_high uncertainty with extreme extremity — maximum EIG
    input:
      uncertainty_level: very_high
      extremity_level: extreme
      propagation_count: 5
    expect:
      priority: INVESTIGATE_NOW
      eig_class: CRITICAL
      rationale: Maximum uncertainty with extreme evidence divergence — highest possible information gain from direct investigation
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); very_high uncertainty × extreme extremity → CRITICAL priority
  - name: very_high uncertainty with low extremity — still high priority due to uncertainty
    input:
      uncertainty_level: very_high
      extremity_level: low
      propagation_count: 1
    expect:
      priority: INVESTIGATE_SOON
      eig_class: HIGH
      rationale: Very high uncertainty — substantial information gain regardless of extremity level
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); very_high uncertainty with non-extreme extremity → HIGH priority
  - name: high uncertainty with large network — propagation multiplier triggers immediate investigation
    input:
      uncertainty_level: high
      extremity_level: moderate
      propagation_count: 4
    expect:
      priority: INVESTIGATE_NOW
      eig_class: HIGH
      rationale: High uncertainty with large network effect — investigation benefits 3+ adjacent drugs in the transbeyesian network
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); high uncertainty × propagation_count >= 3 → INVESTIGATE_NOW (network multiplier)
  - name: high uncertainty with small network — no propagation multiplier
    input:
      uncertainty_level: high
      extremity_level: moderate
      propagation_count: 1
    expect:
      priority: INVESTIGATE_SOON
      eig_class: HIGH
      rationale: High uncertainty with limited network effect — direct investigation valuable but not urgent
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); high uncertainty × propagation_count < 3 → INVESTIGATE_SOON
  - name: moderate uncertainty with extreme extremity — extremity lifts priority
    input:
      uncertainty_level: moderate
      extremity_level: extreme
      propagation_count: 2
    expect:
      priority: INVESTIGATE_SOON
      eig_class: MODERATE
      rationale: Moderate uncertainty but high/extreme extremity — the evidence is decisive enough to warrant prioritized investigation
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); moderate uncertainty × high/extreme extremity → INVESTIGATE_SOON
  - name: moderate uncertainty with low extremity — standard queue
    input:
      uncertainty_level: moderate
      extremity_level: low
      propagation_count: 1
    expect:
      priority: QUEUE
      eig_class: MODERATE
      rationale: Moderate uncertainty with moderate or lower extremity — standard queue position, investigate when capacity permits
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); moderate uncertainty × moderate/low/neutral extremity → QUEUE
  - name: low uncertainty with extreme extremity — well-characterized drug-event pair
    input:
      uncertainty_level: low
      extremity_level: extreme
      propagation_count: 5
    expect:
      priority: DEFER
      eig_class: LOW
      rationale: Low or very low uncertainty — drug-event pair already well-characterized, minimal information gain from further investigation
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); low/very_low uncertainty → DEFER (σ⁻¹ ≈ 0, information gain negligible)
  - name: null safety — missing inputs default to DEFER
    input: {}
    expect:
      priority: DEFER
      eig_class: LOW
      rationale: Missing input data — cannot compute EIG without uncertainty level
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); null inputs → DEFER (safe default)
  - name: very_low uncertainty — minimal information gain
    input:
      uncertainty_level: very_low
      extremity_level: high
      propagation_count: 3
    expect:
      priority: DEFER
      eig_class: LOW
      rationale: Low or very low uncertainty — drug-event pair already well-characterized, minimal information gain from further investigation
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); low/very_low uncertainty → DEFER (σ⁻¹ ≈ 0, information gain negligible)
  - name: moderate uncertainty with high extremity — extremity lifts from QUEUE to INVESTIGATE_SOON
    input:
      uncertainty_level: moderate
      extremity_level: high
      propagation_count: 0
    expect:
      priority: INVESTIGATE_SOON
      eig_class: MODERATE
      rationale: Moderate uncertainty but high/extreme extremity — the evidence is decisive enough to warrant prioritized investigation
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); moderate uncertainty × high/extreme extremity → INVESTIGATE_SOON
  - name: moderate uncertainty with neutral extremity — near 50/50, low decisiveness
    input:
      uncertainty_level: moderate
      extremity_level: neutral
      propagation_count: 2
    expect:
      priority: QUEUE
      eig_class: MODERATE
      rationale: Moderate uncertainty with moderate or lower extremity — standard queue position, investigate when capacity permits
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); moderate uncertainty × moderate/low/neutral extremity → QUEUE
  - name: high uncertainty with propagation exactly at threshold — boundary triggers network effect
    input:
      uncertainty_level: high
      extremity_level: low
      propagation_count: 3
    expect:
      priority: INVESTIGATE_NOW
      eig_class: HIGH
      rationale: High uncertainty with large network effect — investigation benefits 3+ adjacent drugs in the transbeyesian network
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); high uncertainty × propagation_count >= 3 → INVESTIGATE_NOW (network multiplier)
  - name: high uncertainty with propagation just below threshold — no network multiplier
    input:
      uncertainty_level: high
      extremity_level: high
      propagation_count: 2
    expect:
      priority: INVESTIGATE_SOON
      eig_class: HIGH
      rationale: High uncertainty with limited network effect — direct investigation valuable but not urgent
      algorithm: EIG(c) = σ⁻¹ · |θ - 0.5| · Σw(1-σ); high uncertainty × propagation_count < 3 → INVESTIGATE_SOON
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - priority
    - eig_class
    - rationale
    - algorithm
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
