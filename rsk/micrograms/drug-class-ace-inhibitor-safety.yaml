# MICROGRAM++ (upgraded 2026-04-23)
name: drug-class-ace-inhibitor-safety
version: 0.1.0
description: ACE inhibitor safety assessment. Evaluates hyperkalemia risk, persistent cough, angioedema, and renal function.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Class Ace Inhibitor Safety
  subtitle: ACE inhibitor safety assessment. Evaluates hyperkalemia risk, persistent cough, angioedema, and renal function.
  icon: circle
  route: /vigilance/mg/drug-class-ace-inhibitor-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-class-ace-inhibitor-safety
  cli: rsk mcg run drug-class-ace-inhibitor-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_potassium_level
  nodes:
    check_potassium_level:
      type: condition
      variable: serum_potassium_mmol_l
      operator: gte
      value: 5.5
      true_next: hyperkalemia_alert
      false_next: check_angioedema_history
    hyperkalemia_alert:
      type: return
      value:
        risk_level: critical
        contraindication: true
        message: Elevated potassium; ACE inhibitor contraindicated until corrected
    check_angioedema_history:
      type: condition
      variable: prior_angioedema
      operator: eq
      value: true
      true_next: angioedema_alert
      false_next: check_renal
    angioedema_alert:
      type: return
      value:
        risk_level: critical
        contraindication: true
        message: Prior angioedema; absolute contraindication to ACE inhibitor
    check_renal:
      type: condition
      variable: renal_clearance_ml_min
      operator: lt
      value: 30
      true_next: severe_renal
      false_next: standard_dosing
    severe_renal:
      type: return
      value:
        risk_level: moderate
        dose_adjustment: true
        message: Severe renal impairment; monitor creatinine and potassium closely
    standard_dosing:
      type: return
      value:
        risk_level: low
        message: Standard ACE inhibitor dosing appropriate
tests:
  - input:
      serum_potassium_mmol_l: 6.2
      renal_clearance_ml_min: 70
      prior_angioedema: false
    expect:
      risk_level: critical
      contraindication: true
  - input:
      serum_potassium_mmol_l: 5
      renal_clearance_ml_min: 70
      prior_angioedema: true
    expect:
      risk_level: critical
      contraindication: true
  - input:
      serum_potassium_mmol_l: 5
      renal_clearance_ml_min: 25
      prior_angioedema: false
    expect:
      risk_level: moderate
      dose_adjustment: true
  - input:
      serum_potassium_mmol_l: 4.5
      renal_clearance_ml_min: 80
      prior_angioedema: false
    expect:
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
