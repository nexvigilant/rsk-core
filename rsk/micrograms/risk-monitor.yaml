# MICROGRAM++ (upgraded 2026-04-23)
name: risk-monitor
version: 0.1.0
description: Establish monitoring protocol and frequency for managed risks
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Risk Monitor
  subtitle: Establish monitoring protocol and frequency for managed risks
  icon: circle
  route: /vigilance/mg/risk-monitor
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/risk-monitor
  cli: rsk mcg run risk-monitor
  auth: none
  rate_limit: 600/min
tree:
  start: validate_monitoring_plan
  nodes:
    validate_monitoring_plan:
      type: condition
      variable: risk_mitigation_active
      operator: eq
      value: true
      true_next: check_intensity_level
      false_next: monitoring_unknown
    check_intensity_level:
      type: condition
      variable: monitoring_intensity
      operator: eq
      value: intensive
      true_next: intensive_protocol
      false_next: check_standard_intensity
    check_standard_intensity:
      type: condition
      variable: monitoring_intensity
      operator: eq
      value: standard
      true_next: standard_protocol
      false_next: routine_protocol
    intensive_protocol:
      type: return
      value:
        monitoring_frequency: monthly
        monitoring_parameters: lab_values,clinical_assessment,patient_questionnaire
        reporting_requirements: case_by_case
        adverse_event_follow_up: within_7_days
        monitoring_compliant: true
    standard_protocol:
      type: return
      value:
        monitoring_frequency: quarterly
        monitoring_parameters: clinical_assessment,lab_values
        reporting_requirements: aggregate_periodic
        adverse_event_follow_up: within_14_days
        monitoring_compliant: true
    routine_protocol:
      type: return
      value:
        monitoring_frequency: annually
        monitoring_parameters: annual_safety_review
        reporting_requirements: aggregate_annual
        adverse_event_follow_up: within_30_days
        monitoring_compliant: true
    monitoring_unknown:
      type: return
      value:
        monitoring_frequency: null
        monitoring_parameters: null
        reporting_requirements: null
        adverse_event_follow_up: null
        monitoring_compliant: false
tests:
  - input:
      risk_mitigation_active: true
      monitoring_intensity: intensive
    expect:
      monitoring_frequency: monthly
      adverse_event_follow_up: within_7_days
  - input:
      risk_mitigation_active: true
      monitoring_intensity: standard
    expect:
      monitoring_frequency: quarterly
      adverse_event_follow_up: within_14_days
  - input:
      risk_mitigation_active: true
      monitoring_intensity: routine
    expect:
      monitoring_frequency: annually
  - input: {}
    expect:
      monitoring_frequency: null
      monitoring_compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
