name: drug-profile-gabapentin
description: 'Safety triage for gabapentin: PRR-based signal routing (Type C)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
    no_signal:
      type: return
      value:
        action: monitor
        drug: gabapentin
        signal: false
        harm_type: C
        expected_prr: 2.9
    signal:
      type: return
      value:
        signal: true
        action: investigate
        harm_type: C
        drug: gabapentin
        expected_prr: 2.9
tests:
- input:
    prr: 2.9
  expect:
    signal: true
    drug: gabapentin
- input:
    prr: 0.5
  expect:
    drug: gabapentin
    signal: false
- input: {}
  expect:
    signal: false
    drug: gabapentin
- input:
    prr: 1.999
  expect:
    action: monitor
    harm_type: C
    expected_prr: 2.9
    drug: gabapentin
    signal: false
- input:
    prr: 2.001
  expect:
    harm_type: C
    action: investigate
    expected_prr: 2.9
    drug: gabapentin
    signal: true
interface: null
primitive_signature: null
