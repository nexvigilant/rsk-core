# MICROGRAM++ (upgraded 2026-04-23)
name: drug-class-thiazolidinedione-safety
version: 0.1.0
description: Thiazolidinedione safety assessment. Evaluates heart failure risk, weight gain, bone loss, and bladder cancer signal.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Class Thiazolidinedione Safety
  subtitle: Thiazolidinedione safety assessment. Evaluates heart failure risk, weight gain, bone loss, and bladder cancer signal.
  icon: circle
  route: /vigilance/mg/drug-class-thiazolidinedione-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-class-thiazolidinedione-safety
  cli: rsk mcg run drug-class-thiazolidinedione-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_heart_failure
  nodes:
    check_heart_failure:
      type: condition
      variable: has_heart_failure
      operator: eq
      value: true
      true_next: hf_alert
      false_next: check_bladder_cancer
    hf_alert:
      type: return
      value:
        risk_level: high
        relative_contraindication: true
        message: Heart failure present; thiazolidinedione may worsen fluid retention and HF
    check_bladder_cancer:
      type: condition
      variable: prior_bladder_cancer
      operator: eq
      value: true
      true_next: cancer_alert
      false_next: check_duration
    cancer_alert:
      type: return
      value:
        risk_level: high
        relative_contraindication: true
        message: Prior bladder cancer; thiazolidinedione signal warrants avoidance
    check_duration:
      type: condition
      variable: tzd_duration_years
      operator: gte
      value: 3
      true_next: long_term_assessment
      false_next: standard_dosing
    long_term_assessment:
      type: return
      value:
        risk_level: moderate
        bone_density_screening: required
        weight_monitoring: required
        message: Long-term TZD use; monitor bone density and weight gain
    standard_dosing:
      type: return
      value:
        risk_level: low
        message: Standard thiazolidinedione dosing appropriate
tests:
  - input:
      has_heart_failure: true
      prior_bladder_cancer: false
      tzd_duration_years: 2
    expect:
      risk_level: high
      relative_contraindication: true
  - input:
      has_heart_failure: false
      prior_bladder_cancer: true
      tzd_duration_years: 2
    expect:
      risk_level: high
      relative_contraindication: true
  - input:
      has_heart_failure: false
      prior_bladder_cancer: false
      tzd_duration_years: 4
    expect:
      risk_level: moderate
      bone_density_screening: required
  - input:
      has_heart_failure: false
      prior_bladder_cancer: false
      tzd_duration_years: 1
    expect:
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
