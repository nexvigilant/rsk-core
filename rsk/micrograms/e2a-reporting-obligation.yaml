# MICROGRAM++ (upgraded 2026-04-23)
name: e2a-reporting-obligation
version: 1.0.0
description: "ICH E2A Section III.A: Sponsor reporting obligation gate — determines whether a case must be reported as an expedited SUSAR, combining seriousness + unexpectedness + causality in a clinical trial context"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: causality_excluded
    type: bool
    required: false
    description: ""
  - name: is_serious
    type: bool
    required: false
    description: ""
  - name: is_unexpected
    type: bool
    required: false
    description: ""
  - name: study_drug_related
    type: bool
    required: false
    description: ""
outputs:
  - name: obligation
    type: string
  - name: rationale
    type: string
  - name: regulatory_reference
    type: string
  - name: report_as_susar
    type: bool
interface:
  inputs:
    causality_excluded:
      type: bool
      required: false
    is_serious:
      type: bool
      required: false
    is_unexpected:
      type: bool
      required: false
    study_drug_related:
      type: bool
      required: false
  outputs:
    obligation:
      type: string
    rationale:
      type: string
    regulatory_reference:
      type: string
    report_as_susar:
      type: bool
ui:
  title: E2a Reporting Obligation
  subtitle: "ICH E2A Section III.A: Sponsor reporting obligation gate — determines whether a case must be reported as an expedited SUSAR, combining seriousness + unexpectedness + causality in a clinical trial context"
  icon: circle
  route: /vigilance/mg/e2a-reporting-obligation
  steps:
    - field: causality_excluded
      label: causality excluded
      help: Enter causality_excluded
      widget: toggle
      placeholder: null
    - field: is_serious
      label: is serious
      help: Enter is_serious
      widget: toggle
      placeholder: null
    - field: is_unexpected
      label: is unexpected
      help: Enter is_unexpected
      widget: toggle
      placeholder: null
    - field: study_drug_related
      label: study drug related
      help: Enter study_drug_related
      widget: toggle
      placeholder: null
  result:
    template: "obligation: {{obligation}} — rationale: {{rationale}} — regulatory_reference: {{regulatory_reference}} — report_as_susar: {{report_as_susar}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2a-reporting-obligation
  cli: rsk mcg run e2a-reporting-obligation
  auth: none
  rate_limit: 600/min
tree:
  start: check_serious
  nodes:
    check_serious:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: check_unexpected
      false_next: no_susar_not_serious
    check_unexpected:
      type: condition
      variable: is_unexpected
      operator: eq
      value: true
      true_next: check_causality_excluded
      false_next: no_susar_expected
    check_causality_excluded:
      type: condition
      variable: causality_excluded
      operator: eq
      value: true
      true_next: no_susar_causality_excluded
      false_next: check_drug_related
    check_drug_related:
      type: condition
      variable: study_drug_related
      operator: eq
      value: true
      true_next: susar_required
      false_next: susar_possible_review
    susar_required:
      type: return
      value:
        report_as_susar: true
        obligation: MANDATORY_EXPEDITED
        rationale: Serious + unexpected + study drug related — SUSAR reporting to regulatory authorities and ethics committees required
        regulatory_reference: ICH E2A Section III.A - Sponsor obligation to report SUSARs expeditiously
    susar_possible_review:
      type: return
      value:
        report_as_susar: true
        obligation: EXPEDITED_PENDING_REVIEW
        rationale: Serious + unexpected but drug relatedness not confirmed — report as SUSAR pending causality review
        regulatory_reference: ICH E2A Section III.A - When causality cannot be excluded, assume related for reporting purposes
    no_susar_expected:
      type: return
      value:
        report_as_susar: false
        obligation: PERIODIC_REPORTING
        rationale: Serious but expected reaction — not a SUSAR, include in periodic safety updates
        regulatory_reference: ICH E2A Section III.A - Expected serious reactions do not require expedited reporting
    no_susar_not_serious:
      type: return
      value:
        report_as_susar: false
        obligation: NO_EXPEDITED_REPORTING
        rationale: Non-serious adverse event — no expedited reporting obligation under E2A
        regulatory_reference: ICH E2A Section III.A - Non-serious events do not require expedited reporting
    no_susar_causality_excluded:
      type: return
      value:
        report_as_susar: false
        obligation: NO_EXPEDITED_REPORTING
        rationale: Causality to study drug definitively excluded — no SUSAR reporting obligation
        regulatory_reference: ICH E2A Section III.A - Events with excluded causality do not require SUSAR reporting
tests:
  - input:
      is_serious: true
      is_unexpected: true
      study_drug_related: true
      causality_excluded: false
    expect:
      report_as_susar: true
      obligation: MANDATORY_EXPEDITED
      regulatory_reference: ICH E2A Section III.A - Sponsor obligation to report SUSARs expeditiously
  - input:
      is_serious: true
      is_unexpected: true
      study_drug_related: false
      causality_excluded: false
    expect:
      report_as_susar: true
      obligation: EXPEDITED_PENDING_REVIEW
      regulatory_reference: ICH E2A Section III.A - When causality cannot be excluded, assume related for reporting purposes
  - input:
      is_serious: true
      is_unexpected: false
      study_drug_related: true
      causality_excluded: false
    expect:
      report_as_susar: false
      obligation: PERIODIC_REPORTING
      regulatory_reference: ICH E2A Section III.A - Expected serious reactions do not require expedited reporting
  - input:
      is_serious: false
      is_unexpected: true
      study_drug_related: true
      causality_excluded: false
    expect:
      report_as_susar: false
      obligation: NO_EXPEDITED_REPORTING
      regulatory_reference: ICH E2A Section III.A - Non-serious events do not require expedited reporting
  - input:
      is_serious: true
      is_unexpected: true
      study_drug_related: false
      causality_excluded: true
    expect:
      report_as_susar: false
      obligation: NO_EXPEDITED_REPORTING
      regulatory_reference: ICH E2A Section III.A - Events with excluded causality do not require SUSAR reporting
  - input: {}
    expect:
      report_as_susar: false
      obligation: NO_EXPEDITED_REPORTING
      regulatory_reference: ICH E2A Section III.A - Non-serious events do not require expedited reporting
  - input:
      is_serious: true
      is_unexpected: true
      study_drug_related: true
      causality_excluded: true
    expect:
      report_as_susar: false
      obligation: NO_EXPEDITED_REPORTING
      regulatory_reference: ICH E2A Section III.A - Events with excluded causality do not require SUSAR reporting
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - obligation
    - rationale
    - regulatory_reference
    - report_as_susar
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
