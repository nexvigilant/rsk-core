name: ich-e1-gate
description: "ICH E1 compliance: Population Exposure — Safety Database"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "population_adequate"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH E1"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH E1"
        compliant: false
        action: "remediate"
        gap: "population_adequate"

tests:
  - input: {"population_adequate": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
