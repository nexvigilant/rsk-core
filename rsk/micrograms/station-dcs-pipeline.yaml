# MICROGRAM++ (upgraded 2026-04-23)
name: station-dcs-pipeline
version: 0.1.0
description: Route distributed computing system tasks by load and partition tolerance
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Dcs Pipeline
  subtitle: Route distributed computing system tasks by load and partition tolerance
  icon: circle
  route: /vigilance/mg/station-dcs-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-dcs-pipeline
  cli: rsk mcg run station-dcs-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_load
  nodes:
    overloaded:
      type: return
      value:
        reason: CPU ≥80% — horizontal scaling needed
        action: scale
        route: autoscale
        priority: high
    partitioned:
      type: return
      value:
        action: failover
        reason: Network partition detected — activate failover
        route: partition_recovery
        priority: critical
    check_partition:
      type: condition
      variable: partition_detected
      operator: eq
      value: true
      true_next: partitioned
      false_next: nominal
    check_load:
      type: condition
      variable: cpu_pct
      operator: gte
      value: 80
      true_next: overloaded
      false_next: check_partition
    nominal:
      type: return
      value:
        action: proceed
        priority: low
        reason: Load normal, no partitions — nominal operation
        route: archive
tests:
  - input:
      cpu_pct: 90
      partition_detected: false
    expect:
      route: autoscale
      action: scale
      priority: high
  - input:
      partition_detected: true
      cpu_pct: 50
    expect:
      route: partition_recovery
      priority: critical
      action: failover
  - input:
      partition_detected: false
      cpu_pct: 40
    expect:
      route: archive
      priority: low
      action: proceed
  - input: {}
    expect:
      priority: low
      action: proceed
      route: archive
      reason: Load normal, no partitions — nominal operation
  - input:
      cpu_pct: 0
    expect:
      reason: Load normal, no partitions — nominal operation
      action: proceed
      priority: low
      route: archive
  - input:
      cpu_pct: -1
    expect:
      route: archive
      priority: low
      reason: Load normal, no partitions — nominal operation
      action: proceed
  - input:
      cpu_pct: 79
    expect:
      action: proceed
      reason: Load normal, no partitions — nominal operation
      priority: low
      route: archive
  - input:
      cpu_pct: 81
    expect:
      action: scale
      route: autoscale
      priority: high
      reason: CPU ≥80% — horizontal scaling needed
  - input:
      cpu_pct: 8000
    expect:
      route: autoscale
      reason: CPU ≥80% — horizontal scaling needed
      action: scale
      priority: high
  - input: {}
    expect:
      action: proceed
      reason: Load normal, no partitions — nominal operation
      priority: low
      route: archive
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
