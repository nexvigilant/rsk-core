# MICROGRAM++ (upgraded 2026-04-23)
name: prr-signal
version: 0.2.0
description: PRR signal detection threshold gate (PRR >= 2.0 = signal)
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: prr
    type: float
    required: true
    description: ""
outputs:
  - name: signal_detected
    type: bool
  - name: classification
    type: string
interface:
  inputs:
    prr:
      type: float
      required: true
  outputs:
    signal_detected:
      type: bool
    classification:
      type: string
ui:
  title: Prr Signal
  subtitle: PRR signal detection threshold gate (PRR >= 2.0 = signal)
  icon: activity
  route: /vigilance/mg/prr-signal
  steps:
    - field: prr
      label: prr
      help: Enter prr
      widget: text
      placeholder: null
  result:
    template: "signal_detected: {{signal_detected}} — classification: {{classification}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/prr-signal
  cli: rsk mcg run prr-signal
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        signal_detected: true
        classification: signal
    no_signal:
      type: return
      value:
        signal_detected: false
        classification: noise
tests:
  - input:
      prr: 3.5
    expect:
      signal_detected: true
      classification: signal
  - input:
      prr: 1.8
    expect:
      signal_detected: false
      classification: noise
  - input:
      prr: 2
    expect:
      classification: signal
      signal_detected: true
  - input:
      prr: 0.5
    expect:
      signal_detected: false
      classification: noise
  - input:
      prr: 0
    expect:
      classification: noise
      signal_detected: false
  - input:
      prr: -1
    expect:
      signal_detected: false
      classification: noise
  - input:
      prr: 1
    expect:
      classification: noise
      signal_detected: false
  - input:
      prr: 3
    expect:
      classification: signal
      signal_detected: true
  - input:
      prr: 200
    expect:
      classification: signal
      signal_detected: true
  - input: {}
    expect:
      signal_detected: false
      classification: noise
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - signal_detected
    - classification
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
