name: gate-cases-minimum
description: Minimum 3 cases (Evans criterion)
version: 0.1.0
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        gate: false
        met: false
        threshold: case_count
    check:
      type: condition
      variable: case_count
      operator: gte
      value: 3
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        gate: true
        met: true
        threshold: case_count
tests:
- input:
    case_count: 3
  expect:
    gate: true
    met: true
- input: {}
  expect:
    gate: false
    met: false
- input:
    case_count: 0
  expect:
    gate: false
    met: false
    threshold: case_count
- input:
    case_count: -1
  expect:
    gate: false
    met: false
    threshold: case_count
- input:
    case_count: 2
  expect:
    threshold: case_count
    gate: false
    met: false
- input:
    case_count: 4
  expect:
    threshold: case_count
    gate: true
    met: true
- input:
    case_count: 300
  expect:
    threshold: case_count
    met: true
    gate: true
interface: null
primitive_signature: null
