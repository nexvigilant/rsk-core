# MICROGRAM++ (upgraded 2026-04-23)
name: gate-cases-minimum
version: 0.1.0
description: Minimum 3 cases (Evans criterion)
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Gate Cases Minimum
  subtitle: Minimum 3 cases (Evans criterion)
  icon: circle
  route: /vigilance/mg/gate-cases-minimum
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-cases-minimum
  cli: rsk mcg run gate-cases-minimum
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        gate: false
        met: false
        threshold: case_count
    check:
      type: condition
      variable: case_count
      operator: gte
      value: 3
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        gate: true
        met: true
        threshold: case_count
tests:
  - input:
      case_count: 3
    expect:
      gate: true
      met: true
  - input: {}
    expect:
      gate: false
      met: false
  - input:
      case_count: 0
    expect:
      gate: false
      met: false
      threshold: case_count
  - input:
      case_count: -1
    expect:
      gate: false
      met: false
      threshold: case_count
  - input:
      case_count: 2
    expect:
      threshold: case_count
      gate: false
      met: false
  - input:
      case_count: 4
    expect:
      threshold: case_count
      gate: true
      met: true
  - input:
      case_count: 300
    expect:
      threshold: case_count
      met: true
      gate: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
