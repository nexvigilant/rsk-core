# MICROGRAM++ (upgraded 2026-04-23)
name: station-algovigilance-pipeline
version: 0.1.0
description: "Triage algorithmovigilance signals: classify AI/ML drift, bias, and performance degradation"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Algovigilance Pipeline
  subtitle: "Triage algorithmovigilance signals: classify AI/ML drift, bias, and performance degradation"
  icon: circle
  route: /vigilance/mg/station-algovigilance-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-algovigilance-pipeline
  cli: rsk mcg run station-algovigilance-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_drift
  nodes:
    bias_alert:
      type: return
      value:
        route: bias_audit
        action: investigate
        reason: Algorithmic bias detected — fairness audit required before continued use
        priority: high
    healthy:
      type: return
      value:
        reason: No drift or bias detected — algorithm performing within parameters
        route: archive
        action: certify
        priority: low
    drift_severity:
      type: condition
      variable: drift_psi
      operator: gte
      value: 0.25
      true_next: severe_drift
      false_next: mild_drift
    severe_drift:
      type: return
      value:
        route: model_retrain
        reason: PSI≥0.25 — significant distribution shift, model output unreliable
        priority: critical
        action: halt
    mild_drift:
      type: return
      value:
        action: monitor
        reason: Drift detected but PSI<0.25 — monitor for acceleration
        priority: moderate
        route: drift_monitoring
    check_bias:
      type: condition
      variable: bias_detected
      operator: eq
      value: true
      true_next: bias_alert
      false_next: healthy
    check_drift:
      type: condition
      variable: drift_detected
      operator: eq
      value: true
      true_next: drift_severity
      false_next: check_bias
tests:
  - input:
      bias_detected: false
      drift_detected: true
      drift_psi: 0.4
    expect:
      action: halt
      priority: critical
      route: model_retrain
  - input:
      bias_detected: false
      drift_detected: true
      drift_psi: 0.15
    expect:
      action: monitor
      route: drift_monitoring
      priority: moderate
  - input:
      bias_detected: true
      drift_detected: false
      drift_psi: 0
    expect:
      action: investigate
      priority: high
      route: bias_audit
  - input:
      drift_detected: false
      bias_detected: false
      drift_psi: 0
    expect:
      action: certify
      priority: low
      route: archive
  - input:
      drift_psi: 0.249
    expect:
      route: archive
      action: certify
      priority: low
      reason: No drift or bias detected — algorithm performing within parameters
  - input:
      drift_psi: 0.251
    expect:
      reason: No drift or bias detected — algorithm performing within parameters
      priority: low
      action: certify
      route: archive
  - input: {}
    expect:
      action: certify
      reason: No drift or bias detected — algorithm performing within parameters
      priority: low
      route: archive
  - input: {}
    expect:
      action: certify
      reason: No drift or bias detected — algorithm performing within parameters
      route: archive
      priority: low
  - input: {}
    expect:
      priority: low
      action: certify
      route: archive
      reason: No drift or bias detected — algorithm performing within parameters
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
