name: pop-pregnancy-t1
description: First trimester — organogenesis risk
version: 0.1.0
tree:
  start: check
  nodes:
    at_risk:
      type: return
      value:
        population: pregnancy-t1
        at_risk: true
        action: special_monitoring
        reason: First trimester — organogenesis risk
    standard:
      type: return
      value:
        action: standard_care
        population: pregnancy-t1
        at_risk: false
    check:
      type: condition
      variable: trimester
      operator: eq
      value: 1
      true_next: at_risk
      false_next: standard
tests:
- input:
    trimester: 1
  expect:
    at_risk: true
    population: pregnancy-t1
- input: {}
  expect:
    population: pregnancy-t1
    at_risk: false
- input:
    trimester: 0
  expect:
    at_risk: false
    action: standard_care
    population: pregnancy-t1
- input:
    trimester: -1
  expect:
    at_risk: false
    action: standard_care
    population: pregnancy-t1
- input:
    trimester: 0
  expect:
    population: pregnancy-t1
    at_risk: false
    action: standard_care
- input:
    trimester: 2
  expect:
    action: standard_care
    population: pregnancy-t1
    at_risk: false
- input:
    trimester: 100
  expect:
    population: pregnancy-t1
    at_risk: false
    action: standard_care
interface: null
primitive_signature: null
