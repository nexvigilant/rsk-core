# MICROGRAM++ (upgraded 2026-04-23)
name: rmp-measure-effectiveness
version: 0.1.0
description: Risk Minimization Plan (RMP) measure effectiveness assessment based on measure type, compliance rate, and outcome improvement. EMA RMP Guideline Rev 2.1.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: measure_type
    type: string
    required: true
    description: ""
  - name: compliance_rate
    type: float
    required: true
    description: ""
  - name: outcome_improved
    type: bool
    required: false
    description: ""
outputs:
  - name: effectiveness
    type: string
  - name: recommendation
    type: string
  - name: continue_measure
    type: bool
interface:
  inputs:
    measure_type:
      type: string
      required: true
    compliance_rate:
      type: float
      required: true
    outcome_improved:
      type: bool
      required: false
  outputs:
    effectiveness:
      type: string
    recommendation:
      type: string
    continue_measure:
      type: bool
ui:
  title: Rmp Measure Effectiveness
  subtitle: Risk Minimization Plan (RMP) measure effectiveness assessment based on measure type, compliance rate, and outcome improvement. EMA RMP Guideline Rev 2.1.
  icon: circle
  route: /vigilance/mg/rmp-measure-effectiveness
  steps:
    - field: measure_type
      label: measure type
      help: Enter measure_type
      widget: text
      placeholder: null
    - field: compliance_rate
      label: compliance rate
      help: Enter compliance_rate
      widget: text
      placeholder: null
    - field: outcome_improved
      label: outcome improved
      help: Enter outcome_improved
      widget: toggle
      placeholder: null
  result:
    template: "effectiveness: {{effectiveness}} — recommendation: {{recommendation}} — continue_measure: {{continue_measure}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/rmp-measure-effectiveness
  cli: rsk mcg run rmp-measure-effectiveness
  auth: none
  rate_limit: 600/min
tree:
  start: outcome_check
  nodes:
    outcome_check:
      type: condition
      variable: outcome_improved
      operator: eq
      value: true
      true_next: compliance_high_check
      false_next: outcome_not_improved
    compliance_high_check:
      type: condition
      variable: compliance_rate
      operator: gte
      value: 0.7
      true_next: effective_result
      false_next: partially_effective_low_compliance
    outcome_not_improved:
      type: condition
      variable: compliance_rate
      operator: gte
      value: 0.7
      true_next: partially_effective_no_outcome
      false_next: ineffective_result
    effective_result:
      type: return
      value:
        effectiveness: effective
        recommendation: Continue measure, monitor compliance quarterly
        continue_measure: true
    partially_effective_low_compliance:
      type: return
      value:
        effectiveness: partially_effective
        recommendation: Increase compliance interventions; consider measure refinement
        continue_measure: true
    partially_effective_no_outcome:
      type: return
      value:
        effectiveness: partially_effective
        recommendation: Assess outcome metrics; evaluate measure relevance and impact timing
        continue_measure: true
    ineffective_result:
      type: return
      value:
        effectiveness: ineffective
        recommendation: Discontinue or redesign measure; implement alternative risk control
        continue_measure: false
tests:
  - input:
      measure_type: educational
      compliance_rate: 0.85
      outcome_improved: true
    expect:
      effectiveness: effective
      recommendation: Continue measure, monitor compliance quarterly
      continue_measure: true
  - input:
      measure_type: monitoring
      compliance_rate: 0.55
      outcome_improved: true
    expect:
      effectiveness: partially_effective
      recommendation: Increase compliance interventions; consider measure refinement
      continue_measure: true
  - input:
      measure_type: access
      compliance_rate: 0.75
      outcome_improved: false
    expect:
      effectiveness: partially_effective
      recommendation: Assess outcome metrics; evaluate measure relevance and impact timing
      continue_measure: true
  - input:
      measure_type: educational
      compliance_rate: 0.45
      outcome_improved: false
    expect:
      effectiveness: ineffective
      recommendation: Discontinue or redesign measure; implement alternative risk control
      continue_measure: false
  - input:
      measure_type: monitoring
      compliance_rate: 0.7
      outcome_improved: true
    expect:
      effectiveness: effective
      recommendation: Continue measure, monitor compliance quarterly
      continue_measure: true
  - input:
      measure_type: access
      compliance_rate: 0.7
      outcome_improved: false
    expect:
      effectiveness: partially_effective
      recommendation: Assess outcome metrics; evaluate measure relevance and impact timing
      continue_measure: true
  - input:
      measure_type: educational
      compliance_rate: 0.95
      outcome_improved: true
    expect:
      effectiveness: effective
      recommendation: Continue measure, monitor compliance quarterly
      continue_measure: true
  - input:
      measure_type: monitoring
      compliance_rate: 0.2
      outcome_improved: false
    expect:
      effectiveness: ineffective
      recommendation: Discontinue or redesign measure; implement alternative risk control
      continue_measure: false
  - input:
      measure_type: access
      compliance_rate: 0
      outcome_improved: false
    expect:
      effectiveness: ineffective
      recommendation: Discontinue or redesign measure; implement alternative risk control
      continue_measure: false
  - input: {}
    expect:
      effectiveness: ineffective
      recommendation: Discontinue or redesign measure; implement alternative risk control
      continue_measure: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - effectiveness
    - recommendation
    - continue_measure
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
