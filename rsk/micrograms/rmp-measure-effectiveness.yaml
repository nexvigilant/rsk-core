name: rmp-measure-effectiveness
description: 'Risk Minimization Plan (RMP) measure effectiveness assessment based on measure type, compliance rate, and outcome improvement. EMA RMP Guideline Rev 2.1.'
version: 0.1.0
interface:
  inputs:
    measure_type:
      type: string
      required: true
    compliance_rate:
      type: float
      required: true
    outcome_improved:
      type: bool
      required: false
  outputs:
    effectiveness:
      type: string
    recommendation:
      type: string
    continue_measure:
      type: bool
tree:
  start: outcome_check
  nodes:
    outcome_check:
      type: condition
      variable: outcome_improved
      operator: eq
      value: true
      true_next: compliance_high_check
      false_next: outcome_not_improved
    compliance_high_check:
      type: condition
      variable: compliance_rate
      operator: gte
      value: 0.7
      true_next: effective_result
      false_next: partially_effective_low_compliance
    outcome_not_improved:
      type: condition
      variable: compliance_rate
      operator: gte
      value: 0.7
      true_next: partially_effective_no_outcome
      false_next: ineffective_result
    effective_result:
      type: return
      value:
        effectiveness: effective
        recommendation: Continue measure, monitor compliance quarterly
        continue_measure: true
    partially_effective_low_compliance:
      type: return
      value:
        effectiveness: partially_effective
        recommendation: Increase compliance interventions; consider measure refinement
        continue_measure: true
    partially_effective_no_outcome:
      type: return
      value:
        effectiveness: partially_effective
        recommendation: Assess outcome metrics; evaluate measure relevance and impact timing
        continue_measure: true
    ineffective_result:
      type: return
      value:
        effectiveness: ineffective
        recommendation: Discontinue or redesign measure; implement alternative risk control
        continue_measure: false
tests:
  # Outcome improved + high compliance → effective
  - input:
      measure_type: educational
      compliance_rate: 0.85
      outcome_improved: true
    expect:
      effectiveness: effective
      recommendation: Continue measure, monitor compliance quarterly
      continue_measure: true
  # Outcome improved + low compliance → partially effective
  - input:
      measure_type: monitoring
      compliance_rate: 0.55
      outcome_improved: true
    expect:
      effectiveness: partially_effective
      recommendation: Increase compliance interventions; consider measure refinement
      continue_measure: true
  # Outcome not improved + high compliance → partially effective
  - input:
      measure_type: access
      compliance_rate: 0.75
      outcome_improved: false
    expect:
      effectiveness: partially_effective
      recommendation: Assess outcome metrics; evaluate measure relevance and impact timing
      continue_measure: true
  # Outcome not improved + low compliance → ineffective
  - input:
      measure_type: educational
      compliance_rate: 0.45
      outcome_improved: false
    expect:
      effectiveness: ineffective
      recommendation: Discontinue or redesign measure; implement alternative risk control
      continue_measure: false
  # Boundary: exactly 70% compliance + outcome improved
  - input:
      measure_type: monitoring
      compliance_rate: 0.7
      outcome_improved: true
    expect:
      effectiveness: effective
      recommendation: Continue measure, monitor compliance quarterly
      continue_measure: true
  # Boundary: exactly 70% compliance + outcome not improved
  - input:
      measure_type: access
      compliance_rate: 0.7
      outcome_improved: false
    expect:
      effectiveness: partially_effective
      recommendation: Assess outcome metrics; evaluate measure relevance and impact timing
      continue_measure: true
  # High compliance, outcome improved → effective
  - input:
      measure_type: educational
      compliance_rate: 0.95
      outcome_improved: true
    expect:
      effectiveness: effective
      recommendation: Continue measure, monitor compliance quarterly
      continue_measure: true
  # Very low compliance, outcome not improved → ineffective
  - input:
      measure_type: monitoring
      compliance_rate: 0.2
      outcome_improved: false
    expect:
      effectiveness: ineffective
      recommendation: Discontinue or redesign measure; implement alternative risk control
      continue_measure: false
  # Zero compliance, outcome not improved → ineffective
  - input:
      measure_type: access
      compliance_rate: 0.0
      outcome_improved: false
    expect:
      effectiveness: ineffective
      recommendation: Discontinue or redesign measure; implement alternative risk control
      continue_measure: false
  # Empty input defaults to ineffective (no outcome, zero compliance)
  - input: {}
    expect:
      effectiveness: ineffective
      recommendation: Discontinue or redesign measure; implement alternative risk control
      continue_measure: false
