name: faers-event-classifier
description: "Classify FAERS adverse event terms into seriousness categories, estimate MedDRA SOC, and flag for followup"
version: 0.1.0

tree:
  start: check_event_term
  nodes:
    check_event_term:
      type: condition
      variable: event_term
      operator: is_not_null
      true_next: check_outcome
      false_next: missing_input

    check_outcome:
      type: condition
      variable: outcome
      operator: is_not_null
      true_next: classify_by_outcome
      false_next: missing_input

    classify_by_outcome:
      type: condition
      variable: outcome
      operator: matches
      value: "(?i)(death|fatal|died|expired)"
      true_next: serious_fatal
      false_next: check_hospitalization

    check_hospitalization:
      type: condition
      variable: outcome
      operator: matches
      value: "(?i)(hospitalized|inpatient|admission|emergency)"
      true_next: serious_hospitalized
      false_next: check_serious_keywords

    check_serious_keywords:
      type: condition
      variable: event_term
      operator: matches
      value: "(?i)(arrest|failure|infarction|stroke|hemorrhage|perforation|sepsis|cancer)"
      true_next: serious_other
      false_next: non_serious

    serious_fatal:
      type: return
      value:
        seriousness_category: "fatal"
        meddra_soc_guess: "unclassified"
        requires_followup: true

    serious_hospitalized:
      type: return
      value:
        seriousness_category: "serious_hospitalized"
        meddra_soc_guess: "system_organ_class_unspecified"
        requires_followup: true

    serious_other:
      type: return
      value:
        seriousness_category: "serious_other"
        meddra_soc_guess: "general_disorders"
        requires_followup: true

    non_serious:
      type: return
      value:
        seriousness_category: "non_serious"
        meddra_soc_guess: "general_disorders"
        requires_followup: false

    missing_input:
      type: return
      value:
        seriousness_category: "unknown"
        meddra_soc_guess: null
        requires_followup: true

tests:
  - input: { event_term: "myocardial infarction", outcome: "death" }
    expect: { seriousness_category: "fatal", meddra_soc_guess: "unclassified", requires_followup: true }

  - input: { event_term: "nausea", outcome: "patient recovered" }
    expect: { seriousness_category: "non_serious", meddra_soc_guess: "general_disorders", requires_followup: false }

  - input: { event_term: "cardiac arrest", outcome: "emergency admission" }
    expect: { seriousness_category: "serious_hospitalized", meddra_soc_guess: "system_organ_class_unspecified", requires_followup: true }

  - input: { event_term: null, outcome: "hospitalized" }
    expect: { seriousness_category: "unknown", meddra_soc_guess: null, requires_followup: true }

  - input: { event_term: "sepsis", outcome: "admitted" }
    expect: { seriousness_category: "serious_other", meddra_soc_guess: "general_disorders", requires_followup: true }
  - input: {}
    expect:
      meddra_soc_guess: null
      requires_followup: true
      seriousness_category: unknown
