# MICROGRAM++ (upgraded 2026-04-23)
name: ab-lipinski-mw
version: 0.1.0
description: "Antibody: Lipinski Rule of 5 molecular weight gate (prima-chem). MW > 500 = oral bioavailability threat."
family: antibody.chemistry
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - antibody
inputs:
  - name: molecular_weight
    type: number
    required: true
    description: ""
outputs:
  - name: threat
    type: boolean
  - name: response
    type: string
interface:
  inputs:
    molecular_weight:
      type: number
      required: true
  outputs:
    threat:
      type: boolean
    response:
      type: string
ui:
  title: Lipinski Mw
  subtitle: "Antibody: Lipinski Rule of 5 molecular weight gate (prima-chem). MW > 500 = oral bioavailability threat."
  icon: shield
  route: /vigilance/mg/ab-lipinski-mw
  steps:
    - field: molecular_weight
      label: molecular weight
      help: Enter molecular_weight
      widget: number
      placeholder: null
  result:
    template: "threat: {{threat}} — response: {{response}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ab-lipinski-mw
  cli: rsk mcg run ab-lipinski-mw
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: molecular_weight
      operator: gt
      value: 500
      true_next: violation
      false_next: clean
    violation:
      type: return
      value:
        threat: true
        response: "WARN: MW > 500 violates Lipinski Rule of 5 — poor oral bioavailability"
    clean:
      type: return
      value:
        threat: false
        response: PASS
tests:
  - input:
      molecular_weight: 300
    expect:
      threat: false
  - input:
      molecular_weight: 500
    expect:
      threat: false
  - input:
      molecular_weight: 501
    expect:
      threat: true
  - input:
      molecular_weight: 1200
    expect:
      threat: true
  - input: {}
    expect:
      response: PASS
      threat: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - threat
    - response
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: antibody.chemistry
  log_level: info
governance:
  sop_ref: SOP-CHEM-001
  regulatory_ref: []
  harm_types:
    - F
  review_cadence: quarterly
  tov_axioms:
    - conservation
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
