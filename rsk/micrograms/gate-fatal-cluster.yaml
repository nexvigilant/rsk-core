    threshold: death_count
    met: false
    gate: false
- input:
    death_count: 4
  expect:
    threshold: death_count
    met: false
    gate: false
- input:
    death_count: 6
  expect:
    met: true
    gate: true
    threshold: death_count
- input:
    death_count: 500
