name: quality-identifiable-patient
description: "Patient identifiable"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "patient_identified"
      operator: "eq"
      value: true
      true_next: "pass"
      false_next: "fail"
    pass:
      type: "return"
      value:
        check: "quality-identifiable-patient"
        passed: true
        action: "accept"
    fail:
      type: "return"
      value:
        check: "quality-identifiable-patient"
        passed: false
        action: "flag_for_review"

tests:
  - input: {"patient_identified": true}
    expect: {"check": "quality-identifiable-patient", "passed": true}
  - input: {}
    expect: {"check": "quality-identifiable-patient", "passed": false}
