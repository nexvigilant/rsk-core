# MICROGRAM++ (upgraded 2026-04-23)
name: session-breathhold
version: 0.1.0
description: Apnea — the productive hold between inhale and exhale. Measures mid-session gas exchange (context absorbed vs artifacts produced) to detect held breath (no output) or hyperventilation (too much output, no absorption)
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: tools_so_far
    type: int
    required: true
    description: Tool calls completed so far in this session
  - name: minutes_elapsed
    type: int
    required: true
    description: Minutes since session start
  - name: reads
    type: int
    required: true
    description: Read + Grep + Glob calls (O2 — absorbing context)
  - name: writes
    type: int
    required: true
    description: Edit + Write calls (CO2 — producing artifacts)
  - name: files_modified
    type: int
    required: true
    description: Unique files changed
  - name: skills_invoked
    type: int
    required: true
    description: Skills activated this session
  - name: errors_encountered
    type: int
    required: true
    description: Tool failures / errors this session
outputs:
  - name: gas_exchange
    type: string
  - name: o2_saturation
    type: string
  - name: co2_output
    type: string
  - name: respiratory_distress
    type: string
  - name: recommendation
    type: string
interface:
  inputs:
    tools_so_far:
      type: int
      required: true
      description: Tool calls completed so far in this session
    minutes_elapsed:
      type: int
      required: true
      description: Minutes since session start
    reads:
      type: int
      required: true
      description: Read + Grep + Glob calls (O2 — absorbing context)
    writes:
      type: int
      required: true
      description: Edit + Write calls (CO2 — producing artifacts)
    files_modified:
      type: int
      required: true
      description: Unique files changed
    skills_invoked:
      type: int
      required: true
      description: Skills activated this session
    errors_encountered:
      type: int
      required: true
      description: Tool failures / errors this session
  outputs:
    gas_exchange:
      type: string
      description: EFFICIENT / ABSORBING / PRODUCING / APNEA / HYPERVENTILATING
    o2_saturation:
      type: string
      description: HIGH / NORMAL / LOW / CRITICAL — context absorption level
    co2_output:
      type: string
      description: HIGH / NORMAL / LOW / NONE — artifact production level
    respiratory_distress:
      type: string
      description: NONE / MILD / MODERATE / SEVERE
    recommendation:
      type: string
      description: What to do about the breathing pattern
ui:
  title: Session Breathhold
  subtitle: Apnea — the productive hold between inhale and exhale. Measures mid-session gas exchange (context absorbed vs artifacts produced) to detect held breath (no output) or hyperventilation (too much output, no absorption)
  icon: circle
  route: /vigilance/mg/session-breathhold
  steps:
    - field: tools_so_far
      label: tools so far
      help: Tool calls completed so far in this session
      widget: text
      placeholder: null
    - field: minutes_elapsed
      label: minutes elapsed
      help: Minutes since session start
      widget: text
      placeholder: null
    - field: reads
      label: reads
      help: Read + Grep + Glob calls (O2 — absorbing context)
      widget: text
      placeholder: null
    - field: writes
      label: writes
      help: Edit + Write calls (CO2 — producing artifacts)
      widget: text
      placeholder: null
    - field: files_modified
      label: files modified
      help: Unique files changed
      widget: text
      placeholder: null
    - field: skills_invoked
      label: skills invoked
      help: Skills activated this session
      widget: text
      placeholder: null
    - field: errors_encountered
      label: errors encountered
      help: Tool failures / errors this session
      widget: text
      placeholder: null
  result:
    template: "gas_exchange: {{gas_exchange}} — o2_saturation: {{o2_saturation}} — co2_output: {{co2_output}} — respiratory_distress: {{respiratory_distress}} — recommendation: {{recommendation}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/session-breathhold
  cli: rsk mcg run session-breathhold
  auth: none
  rate_limit: 600/min
tree:
  start: check_inputs
  nodes:
    check_inputs:
      type: condition
      variable: tools_so_far
      operator: is_null
      value: null
      true_next: reject
      false_next: check_time
    check_time:
      type: condition
      variable: minutes_elapsed
      operator: is_null
      value: null
      true_next: reject
      false_next: check_apnea
    reject:
      type: return
      value:
        gas_exchange: UNKNOWN
        o2_saturation: UNKNOWN
        co2_output: UNKNOWN
        respiratory_distress: SEVERE
        recommendation: All 7 inputs required.
    check_apnea:
      type: condition
      variable: tools_so_far
      operator: lte
      value: 2
      true_next: check_apnea_duration
      false_next: check_error_rate
    check_apnea_duration:
      type: condition
      variable: minutes_elapsed
      operator: gte
      value: 5
      true_next: apnea_severe
      false_next: apnea_mild
    apnea_severe:
      type: return
      value:
        gas_exchange: APNEA
        o2_saturation: CRITICAL
        co2_output: NONE
        respiratory_distress: SEVERE
        recommendation: Session stalled. No tools for 5+ minutes. Either start working or exhale and close.
    apnea_mild:
      type: return
      value:
        gas_exchange: APNEA
        o2_saturation: LOW
        co2_output: NONE
        respiratory_distress: MILD
        recommendation: Session just started or paused. Normal if within first 2 minutes.
    check_error_rate:
      type: condition
      variable: errors_encountered
      operator: gte
      value: 3
      true_next: distress_errors
      false_next: check_reads
    distress_errors:
      type: condition
      variable: writes
      operator: lte
      value: 1
      true_next: severe_distress
      false_next: moderate_distress
    severe_distress:
      type: return
      value:
        gas_exchange: APNEA
        o2_saturation: LOW
        co2_output: NONE
        respiratory_distress: SEVERE
        recommendation: Multiple errors with no production. Invoke /capa for root cause analysis before continuing.
    moderate_distress:
      type: return
      value:
        gas_exchange: ABSORBING
        o2_saturation: NORMAL
        co2_output: LOW
        respiratory_distress: MODERATE
        recommendation: Errors but still producing. Check if errors are blocking the main task.
    check_reads:
      type: condition
      variable: reads
      operator: gte
      value: 10
      true_next: o2_high
      false_next: check_reads_low
    check_reads_low:
      type: condition
      variable: reads
      operator: lte
      value: 2
      true_next: o2_low
      false_next: o2_normal
    o2_low:
      type: condition
      variable: writes
      operator: gte
      value: 5
      true_next: hyperventilating
      false_next: low_exchange
    hyperventilating:
      type: return
      value:
        gas_exchange: HYPERVENTILATING
        o2_saturation: LOW
        co2_output: HIGH
        respiratory_distress: MODERATE
        recommendation: Writing heavily without reading. Risk of producing without understanding. Pause and read the code you are modifying.
    low_exchange:
      type: return
      value:
        gas_exchange: APNEA
        o2_saturation: LOW
        co2_output: LOW
        respiratory_distress: MILD
        recommendation: Low activity across both reads and writes. Session may be idle or in conversation mode.
    o2_normal:
      type: condition
      variable: writes
      operator: gte
      value: 3
      true_next: efficient_normal
      false_next: absorbing_normal
    efficient_normal:
      type: return
      value:
        gas_exchange: EFFICIENT
        o2_saturation: NORMAL
        co2_output: NORMAL
        respiratory_distress: NONE
        recommendation: Balanced breathing. Reading and writing in proportion. Continue.
    absorbing_normal:
      type: return
      value:
        gas_exchange: ABSORBING
        o2_saturation: NORMAL
        co2_output: LOW
        respiratory_distress: NONE
        recommendation: Absorbing context. Normal for DREAM phase or investigation.
    o2_high:
      type: condition
      variable: writes
      operator: gte
      value: 5
      true_next: efficient_high
      false_next: check_absorbing_only
    efficient_high:
      type: return
      value:
        gas_exchange: EFFICIENT
        o2_saturation: HIGH
        co2_output: HIGH
        respiratory_distress: NONE
        recommendation: High throughput. Both absorbing and producing at scale. Peak session.
    check_absorbing_only:
      type: condition
      variable: writes
      operator: lte
      value: 1
      true_next: absorbing_only
      false_next: absorbing_mostly
    absorbing_only:
      type: condition
      variable: minutes_elapsed
      operator: gte
      value: 15
      true_next: breath_held_too_long
      false_next: absorbing_early
    breath_held_too_long:
      type: return
      value:
        gas_exchange: ABSORBING
        o2_saturation: HIGH
        co2_output: NONE
        respiratory_distress: MODERATE
        recommendation: Heavy reading for 15+ minutes with no output. Holding breath too long. Start producing or exhale what you have learned.
    absorbing_early:
      type: return
      value:
        gas_exchange: ABSORBING
        o2_saturation: HIGH
        co2_output: NONE
        respiratory_distress: NONE
        recommendation: Early investigation phase. High absorption is expected. Begin producing when ready.
    absorbing_mostly:
      type: return
      value:
        gas_exchange: ABSORBING
        o2_saturation: HIGH
        co2_output: LOW
        respiratory_distress: NONE
        recommendation: Mostly reading with some writes. Transitioning from absorption to production.
tests:
  - input:
      tools_so_far: 50
      minutes_elapsed: 20
      reads: 15
      writes: 8
      files_modified: 6
      skills_invoked: 3
      errors_encountered: 0
    expect:
      gas_exchange: EFFICIENT
      o2_saturation: HIGH
      co2_output: HIGH
      respiratory_distress: NONE
  - input:
      tools_so_far: 1
      minutes_elapsed: 10
      reads: 1
      writes: 0
      files_modified: 0
      skills_invoked: 0
      errors_encountered: 0
    expect:
      gas_exchange: APNEA
      respiratory_distress: SEVERE
  - input:
      tools_so_far: 20
      minutes_elapsed: 10
      reads: 1
      writes: 12
      files_modified: 8
      skills_invoked: 1
      errors_encountered: 0
    expect:
      gas_exchange: HYPERVENTILATING
      o2_saturation: LOW
      co2_output: HIGH
      respiratory_distress: MODERATE
  - input:
      tools_so_far: 15
      minutes_elapsed: 8
      reads: 5
      writes: 0
      files_modified: 0
      skills_invoked: 1
      errors_encountered: 4
    expect:
      gas_exchange: APNEA
      respiratory_distress: SEVERE
  - input:
      tools_so_far: 25
      minutes_elapsed: 15
      reads: 8
      writes: 5
      files_modified: 3
      skills_invoked: 2
      errors_encountered: 0
    expect:
      gas_exchange: EFFICIENT
      respiratory_distress: NONE
  - input:
      tools_so_far: 30
      minutes_elapsed: 20
      reads: 25
      writes: 0
      files_modified: 0
      skills_invoked: 2
      errors_encountered: 0
    expect:
      gas_exchange: ABSORBING
      o2_saturation: HIGH
      co2_output: NONE
      respiratory_distress: MODERATE
  - input: {}
    expect:
      respiratory_distress: SEVERE
  - input:
      tools_so_far: 2
      minutes_elapsed: 1
      reads: 2
      writes: 0
      files_modified: 0
      skills_invoked: 0
      errors_encountered: 0
    expect:
      gas_exchange: APNEA
      respiratory_distress: MILD
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - gas_exchange
    - o2_saturation
    - co2_output
    - respiratory_distress
    - recommendation
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
