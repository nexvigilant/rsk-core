# MICROGRAM++ (upgraded 2026-04-23)
name: case-ingest-validator
version: 0.1.0
description: "PVOS case ingestion: validates case data completeness before ingestion - requires drug, event, and reporter to proceed"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: has_drug
    type: bool
    required: false
    description: ""
  - name: has_event
    type: bool
    required: false
    description: ""
  - name: has_reporter
    type: bool
    required: false
    description: ""
outputs:
  - name: description
    type: string
  - name: status
    type: string
interface:
  inputs:
    has_drug:
      type: bool
      required: false
    has_event:
      type: bool
      required: false
    has_reporter:
      type: bool
      required: false
  outputs:
    description:
      type: string
    status:
      type: string
ui:
  title: Case Ingest Validator
  subtitle: "PVOS case ingestion: validates case data completeness before ingestion - requires drug, event, and reporter to proceed"
  icon: circle
  route: /vigilance/mg/case-ingest-validator
  steps:
    - field: has_drug
      label: has drug
      help: Enter has_drug
      widget: toggle
      placeholder: null
    - field: has_event
      label: has event
      help: Enter has_event
      widget: toggle
      placeholder: null
    - field: has_reporter
      label: has reporter
      help: Enter has_reporter
      widget: toggle
      placeholder: null
  result:
    template: "description: {{description}} — status: {{status}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/case-ingest-validator
  cli: rsk mcg run case-ingest-validator
  auth: none
  rate_limit: 600/min
tree:
  start: check_drug
  nodes:
    check_drug:
      type: condition
      variable: has_drug
      operator: eq
      value: true
      true_next: check_event
      false_next: rejected_no_drug
    check_event:
      type: condition
      variable: has_event
      operator: eq
      value: true
      true_next: check_reporter
      false_next: incomplete_no_event
    check_reporter:
      type: condition
      variable: has_reporter
      operator: eq
      value: true
      true_next: valid
      false_next: incomplete_no_reporter
    valid:
      type: return
      value:
        status: VALID
        description: Case data complete - drug, event, and reporter all present
    incomplete_no_event:
      type: return
      value:
        status: INCOMPLETE
        description: Missing adverse event - cannot ingest without event data
    incomplete_no_reporter:
      type: return
      value:
        status: INCOMPLETE
        description: Missing reporter information - cannot ingest without reporter data
    rejected_no_drug:
      type: return
      value:
        status: REJECTED
        description: Missing drug information - case rejected without suspect drug
tests:
  - input:
      has_drug: true
      has_event: true
      has_reporter: true
    expect:
      status: VALID
      description: Case data complete - drug, event, and reporter all present
  - input:
      has_drug: true
      has_event: true
      has_reporter: false
    expect:
      status: INCOMPLETE
      description: Missing reporter information - cannot ingest without reporter data
  - input:
      has_drug: true
      has_event: false
      has_reporter: true
    expect:
      status: INCOMPLETE
      description: Missing adverse event - cannot ingest without event data
  - input:
      has_drug: false
      has_event: true
      has_reporter: true
    expect:
      status: REJECTED
      description: Missing drug information - case rejected without suspect drug
  - input:
      has_drug: false
      has_event: false
      has_reporter: false
    expect:
      status: REJECTED
      description: Missing drug information - case rejected without suspect drug
  - input: {}
    expect:
      description: Missing drug information - case rejected without suspect drug
      status: REJECTED
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - description
    - status
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
