name: pulmonary-safety-gate
description: 'Pulmonary safety classifier: maps respiratory adverse reactions to severity grades for ILD, pulmonary fibrosis, and respiratory failure'
version: 0.1.0
interface:
  inputs:
    reaction_pt:
      type: string
      required: true
      description: MedDRA preferred term for the respiratory reaction
  outputs:
    severity:
      type: string
      description: 'critical | serious | moderate | mild'
    soc:
      type: string
    action:
      type: string
tree:
  start: check_resp_failure
  nodes:
    check_resp_failure:
      type: condition
      variable: reaction_pt
      operator: contains
      value: RESPIRATORY FAILURE
      true_next: critical
      false_next: check_ards
    check_ards:
      type: condition
      variable: reaction_pt
      operator: contains
      value: ACUTE RESPIRATORY DISTRESS
      true_next: critical
      false_next: check_ild
    check_ild:
      type: condition
      variable: reaction_pt
      operator: contains
      value: INTERSTITIAL LUNG DISEASE
      true_next: serious
      false_next: check_fibrosis
    check_fibrosis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: PULMONARY FIBROSIS
      true_next: serious
      false_next: check_pneumonitis
    check_pneumonitis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: PNEUMONITIS
      true_next: serious
      false_next: check_bronchospasm
    check_bronchospasm:
      type: condition
      variable: reaction_pt
      operator: contains
      value: BRONCHOSPASM
      true_next: moderate
      false_next: mild
    critical:
      type: return
      value:
        severity: critical
        soc: Respiratory, thoracic and mediastinal disorders
        action: immediate_expedited_report
    serious:
      type: return
      value:
        severity: serious
        soc: Respiratory, thoracic and mediastinal disorders
        action: expedited_report
    moderate:
      type: return
      value:
        severity: moderate
        soc: Respiratory, thoracic and mediastinal disorders
        action: monitor_and_assess
    mild:
      type: return
      value:
        severity: mild
        soc: Respiratory, thoracic and mediastinal disorders
        action: routine_surveillance
tests:
  - name: respiratory_failure
    input:
      reaction_pt: ACUTE RESPIRATORY FAILURE
    expect:
      severity: critical
  - name: ards
    input:
      reaction_pt: ACUTE RESPIRATORY DISTRESS SYNDROME
    expect:
      severity: critical
  - name: ild
    input:
      reaction_pt: INTERSTITIAL LUNG DISEASE
    expect:
      severity: serious
  - name: fibrosis
    input:
      reaction_pt: PULMONARY FIBROSIS
    expect:
      severity: serious
  - name: pneumonitis
    input:
      reaction_pt: PNEUMONITIS
    expect:
      severity: serious
  - name: bronchospasm
    input:
      reaction_pt: BRONCHOSPASM
    expect:
      severity: moderate
  - name: cough
    input:
      reaction_pt: COUGH
    expect:
      severity: mild
  - name: null_safety
    input: {}
    expect:
      severity: mild
