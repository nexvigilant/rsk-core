# MICROGRAM++ (upgraded 2026-04-23)
name: pulmonary-safety-gate
version: 0.1.0
description: "Pulmonary safety classifier: maps respiratory adverse reactions to severity grades for ILD, pulmonary fibrosis, and respiratory failure"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reaction_pt
    type: string
    required: true
    description: MedDRA preferred term for the respiratory reaction
outputs:
  - name: severity
    type: string
  - name: soc
    type: string
  - name: action
    type: string
interface:
  inputs:
    reaction_pt:
      type: string
      required: true
      description: MedDRA preferred term for the respiratory reaction
  outputs:
    severity:
      type: string
      description: critical | serious | moderate | mild
    soc:
      type: string
    action:
      type: string
ui:
  title: Pulmonary Safety Gate
  subtitle: "Pulmonary safety classifier: maps respiratory adverse reactions to severity grades for ILD, pulmonary fibrosis, and respiratory failure"
  icon: circle
  route: /vigilance/mg/pulmonary-safety-gate
  steps:
    - field: reaction_pt
      label: reaction pt
      help: MedDRA preferred term for the respiratory reaction
      widget: text
      placeholder: null
  result:
    template: "severity: {{severity}} — soc: {{soc}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pulmonary-safety-gate
  cli: rsk mcg run pulmonary-safety-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_resp_failure
  nodes:
    check_resp_failure:
      type: condition
      variable: reaction_pt
      operator: contains
      value: RESPIRATORY FAILURE
      true_next: critical
      false_next: check_ards
    check_ards:
      type: condition
      variable: reaction_pt
      operator: contains
      value: ACUTE RESPIRATORY DISTRESS
      true_next: critical
      false_next: check_ild
    check_ild:
      type: condition
      variable: reaction_pt
      operator: contains
      value: INTERSTITIAL LUNG DISEASE
      true_next: serious
      false_next: check_fibrosis
    check_fibrosis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: PULMONARY FIBROSIS
      true_next: serious
      false_next: check_pneumonitis
    check_pneumonitis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: PNEUMONITIS
      true_next: serious
      false_next: check_bronchospasm
    check_bronchospasm:
      type: condition
      variable: reaction_pt
      operator: contains
      value: BRONCHOSPASM
      true_next: moderate
      false_next: mild
    critical:
      type: return
      value:
        severity: critical
        soc: Respiratory, thoracic and mediastinal disorders
        action: immediate_expedited_report
    serious:
      type: return
      value:
        severity: serious
        soc: Respiratory, thoracic and mediastinal disorders
        action: expedited_report
    moderate:
      type: return
      value:
        severity: moderate
        soc: Respiratory, thoracic and mediastinal disorders
        action: monitor_and_assess
    mild:
      type: return
      value:
        severity: mild
        soc: Respiratory, thoracic and mediastinal disorders
        action: routine_surveillance
tests:
  - name: respiratory_failure
    input:
      reaction_pt: ACUTE RESPIRATORY FAILURE
    expect:
      severity: critical
  - name: ards
    input:
      reaction_pt: ACUTE RESPIRATORY DISTRESS SYNDROME
    expect:
      severity: critical
  - name: ild
    input:
      reaction_pt: INTERSTITIAL LUNG DISEASE
    expect:
      severity: serious
  - name: fibrosis
    input:
      reaction_pt: PULMONARY FIBROSIS
    expect:
      severity: serious
  - name: pneumonitis
    input:
      reaction_pt: PNEUMONITIS
    expect:
      severity: serious
  - name: bronchospasm
    input:
      reaction_pt: BRONCHOSPASM
    expect:
      severity: moderate
  - name: cough
    input:
      reaction_pt: COUGH
    expect:
      severity: mild
  - name: null_safety
    input: {}
    expect:
      severity: mild
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - severity
    - soc
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
