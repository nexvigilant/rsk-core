name: class-immunotherapy
description: 'Checkpoint inhibitors class safety: Immune-related AE monitoring'
version: 0.1.0
tree:
  start: check
  nodes:
    alert:
      type: return
      value:
        concern: Immune-related AE
        action: class_effect_investigation
        alert: true
        drug_class: Checkpoint inhibitors
    safe:
      type: return
      value:
        drug_class: Checkpoint inhibitors
        action: continue
        concern: Immune-related AE
        alert: false
    check:
      type: condition
      variable: irae_grade
      operator: gte
      value: 3
      true_next: alert
      false_next: safe
tests:
- input:
    irae_grade: 3
  expect:
    drug_class: Checkpoint inhibitors
    alert: true
- input: {}
  expect:
    drug_class: Checkpoint inhibitors
    alert: false
- input:
    irae_grade: 0
  expect:
    drug_class: Checkpoint inhibitors
    concern: Immune-related AE
    alert: false
    action: continue
- input:
    irae_grade: -1
  expect:
    concern: Immune-related AE
    alert: false
    drug_class: Checkpoint inhibitors
    action: continue
- input:
    irae_grade: 2
  expect:
    concern: Immune-related AE
    action: continue
    drug_class: Checkpoint inhibitors
    alert: false
- input:
    irae_grade: 4
  expect:
    concern: Immune-related AE
    action: class_effect_investigation
    drug_class: Checkpoint inhibitors
    alert: true
- input:
    irae_grade: 300
  expect:
    alert: true
    concern: Immune-related AE
    drug_class: Checkpoint inhibitors
    action: class_effect_investigation
interface: null
primitive_signature: null
