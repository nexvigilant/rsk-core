# MICROGRAM++ (upgraded 2026-04-23)
name: class-immunotherapy
version: 0.1.0
description: "Checkpoint inhibitors class safety: Immune-related AE monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Immunotherapy
  subtitle: "Checkpoint inhibitors class safety: Immune-related AE monitoring"
  icon: circle
  route: /vigilance/mg/class-immunotherapy
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-immunotherapy
  cli: rsk mcg run class-immunotherapy
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    alert:
      type: return
      value:
        concern: Immune-related AE
        action: class_effect_investigation
        alert: true
        drug_class: Checkpoint inhibitors
    safe:
      type: return
      value:
        drug_class: Checkpoint inhibitors
        action: continue
        concern: Immune-related AE
        alert: false
    check:
      type: condition
      variable: irae_grade
      operator: gte
      value: 3
      true_next: alert
      false_next: safe
tests:
  - input:
      irae_grade: 3
    expect:
      drug_class: Checkpoint inhibitors
      alert: true
  - input: {}
    expect:
      drug_class: Checkpoint inhibitors
      alert: false
  - input:
      irae_grade: 0
    expect:
      drug_class: Checkpoint inhibitors
      concern: Immune-related AE
      alert: false
      action: continue
  - input:
      irae_grade: -1
    expect:
      concern: Immune-related AE
      alert: false
      drug_class: Checkpoint inhibitors
      action: continue
  - input:
      irae_grade: 2
    expect:
      concern: Immune-related AE
      action: continue
      drug_class: Checkpoint inhibitors
      alert: false
  - input:
      irae_grade: 4
    expect:
      concern: Immune-related AE
      action: class_effect_investigation
      drug_class: Checkpoint inhibitors
      alert: true
  - input:
      irae_grade: 300
    expect:
      alert: true
      concern: Immune-related AE
      drug_class: Checkpoint inhibitors
      action: class_effect_investigation
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
