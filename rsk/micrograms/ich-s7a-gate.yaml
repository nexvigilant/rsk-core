name: ich-s7a-gate
description: "ICH S7A compliance: Safety Pharmacology"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "safpharm_done"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH S7A"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH S7A"
        compliant: false
        action: "remediate"
        gap: "safpharm_done"

tests:
  - input: {"safpharm_done": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
