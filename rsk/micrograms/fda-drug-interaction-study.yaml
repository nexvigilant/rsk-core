# MICROGRAM++ (upgraded 2026-04-23)
name: fda-drug-interaction-study
version: 0.1.0
description: "FDA drug interaction study requirement: routes by mechanism type and exposure change per ICH M12 'Drug Interaction Studies' (2024) and FDA DDI Guidance"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: victim_narrow_ti
    type: bool
    required: false
    description: ""
  - name: auc_fold_change
    type: float
    required: true
    description: ""
  - name: mechanism
    type: string
    required: true
    description: ""
outputs:
  - name: study_requirement
    type: string
  - name: clinical_recommendation
    type: string
  - name: labeling_section
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    victim_narrow_ti:
      type: bool
      required: false
    auc_fold_change:
      type: float
      required: true
    mechanism:
      type: string
      required: true
  outputs:
    study_requirement:
      type: string
      required: false
    clinical_recommendation:
      type: string
      required: false
    labeling_section:
      type: string
      required: false
    regulatory_reference:
      type: string
      required: false
  aliases: {}
ui:
  title: Fda Drug Interaction Study
  subtitle: "FDA drug interaction study requirement: routes by mechanism type and exposure change per ICH M12 'Drug Interaction Studies' (2024) and FDA DDI Guidance"
  icon: circle
  route: /vigilance/mg/fda-drug-interaction-study
  steps:
    - field: victim_narrow_ti
      label: victim narrow ti
      help: Enter victim_narrow_ti
      widget: toggle
      placeholder: null
    - field: auc_fold_change
      label: auc fold change
      help: Enter auc_fold_change
      widget: text
      placeholder: null
    - field: mechanism
      label: mechanism
      help: Enter mechanism
      widget: text
      placeholder: null
  result:
    template: "study_requirement: {{study_requirement}} — clinical_recommendation: {{clinical_recommendation}} — labeling_section: {{labeling_section}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/fda-drug-interaction-study
  cli: rsk mcg run fda-drug-interaction-study
  auth: none
  rate_limit: 600/min
tree:
  start: check_mechanism
  nodes:
    check_transporter:
      type: condition
      variable: mechanism
      operator: eq
      value: transporter
      true_next: transporter_magnitude
      false_next: check_ph
    strong_narrow_ti:
      type: return
      value:
        labeling_section: Contraindications + Drug Interactions + Dosage
        study_requirement: CONTRAINDICATION_OR_DOSE_ADJUSTMENT
        regulatory_reference: ICH M12 (2024), Section 4.1; FDA DDI Guidance
        clinical_recommendation: Contraindicate concomitant use with narrow TI CYP substrates or require significant dose reduction with TDM
    strong_inhibitor:
      type: condition
      variable: victim_narrow_ti
      operator: eq
      value: true
      true_next: strong_narrow_ti
      false_next: strong_standard
    weak_inhibitor:
      type: return
      value:
        study_requirement: IN_VITRO_SUFFICIENT
        clinical_recommendation: Weak inhibition (AUC 1.25-2 fold) — note in labeling; no dose adjustment typically needed
        labeling_section: Clinical Pharmacology
        regulatory_reference: ICH M12 (2024), Section 4.1
    transporter_magnitude:
      type: condition
      variable: auc_fold_change
      operator: gte
      value: 2
      true_next: transporter_significant
      false_next: transporter_minor
    transporter_minor:
      type: return
      value:
        study_requirement: IN_VITRO_SUFFICIENT
        labeling_section: Clinical Pharmacology
        regulatory_reference: ICH M12 (2024), Section 5
        clinical_recommendation: Minor transporter interaction — note in Clinical Pharmacology
    check_induction:
      type: condition
      variable: mechanism
      operator: eq
      value: cyp_induction
      true_next: cyp_induction_magnitude
      false_next: check_transporter
    weak_inducer:
      type: return
      value:
        study_requirement: IN_VITRO_SUFFICIENT
        clinical_recommendation: Weak or no induction — no dose adjustment expected
        labeling_section: Clinical Pharmacology
        regulatory_reference: ICH M12 (2024), Section 4.2
    moderate_inducer:
      type: return
      value:
        labeling_section: Drug Interactions
        study_requirement: DEDICATED_DDI_STUDY_REQUIRED
        regulatory_reference: ICH M12 (2024), Section 4.2
        clinical_recommendation: Moderate induction (AUC decrease 50-80%) — dose increase may be needed for CYP substrates
    cyp_induction_magnitude:
      type: condition
      variable: auc_fold_change
      operator: lte
      value: 0.2
      true_next: strong_inducer
      false_next: cyp_ind_moderate_check
    cyp_ind_moderate_check:
      type: condition
      variable: auc_fold_change
      operator: lte
      value: 0.5
      true_next: moderate_inducer
      false_next: weak_inducer
    transporter_significant:
      type: return
      value:
        clinical_recommendation: Clinically significant transporter interaction — evaluate dose adjustment for transporter substrates
        labeling_section: Drug Interactions
        study_requirement: DEDICATED_DDI_STUDY_REQUIRED
        regulatory_reference: ICH M12 (2024), Section 5
    cyp_inh_weak_check:
      type: condition
      variable: auc_fold_change
      operator: gte
      value: 1.25
      true_next: weak_inhibitor
      false_next: no_inhibition
    check_ph:
      type: condition
      variable: mechanism
      operator: eq
      value: ph_dependent
      true_next: ph_study
      false_next: protein_binding_path
    protein_binding_path:
      type: return
      value:
        study_requirement: NO_FURTHER_STUDY
        clinical_recommendation: Protein binding displacement alone rarely clinically significant
        labeling_section: Clinical Pharmacology
        regulatory_reference: ICH M12 (2024), Section 6
    strong_inducer:
      type: return
      value:
        labeling_section: Drug Interactions + Warnings
        clinical_recommendation: Strong induction (AUC decrease >= 80%) — avoid with sensitive CYP substrates; efficacy loss expected
        study_requirement: DEDICATED_DDI_STUDY_REQUIRED
        regulatory_reference: ICH M12 (2024), Section 4.2
    cyp_inh_moderate_check:
      type: condition
      variable: auc_fold_change
      operator: gte
      value: 2
      true_next: moderate_inhibitor
      false_next: cyp_inh_weak_check
    check_mechanism:
      type: condition
      variable: mechanism
      operator: eq
      value: cyp_inhibition
      true_next: cyp_inhibition_magnitude
      false_next: check_induction
    moderate_inhibitor:
      type: return
      value:
        clinical_recommendation: Moderate inhibition (AUC 2-5 fold) — caution with CYP substrates; dose adjustment may be needed
        regulatory_reference: ICH M12 (2024), Section 4.1
        study_requirement: DEDICATED_DDI_STUDY_REQUIRED
        labeling_section: Drug Interactions
    ph_study:
      type: return
      value:
        clinical_recommendation: pH-dependent absorption — evaluate with acid-reducing agents (PPI, H2RA, antacid)
        regulatory_reference: "FDA Guidance: Evaluation of Gastric pH-Dependent Drug Interactions (2023)"
        labeling_section: Drug Interactions + Dosage
        study_requirement: DEDICATED_DDI_STUDY_REQUIRED
    strong_standard:
      type: return
      value:
        labeling_section: Drug Interactions + Dosage and Administration
        clinical_recommendation: Strong inhibition (AUC >= 5-fold) — dose adjustment or avoidance with sensitive CYP substrates
        study_requirement: DEDICATED_DDI_STUDY_REQUIRED
        regulatory_reference: ICH M12 (2024), Section 4.1; FDA DDI Guidance
    cyp_inhibition_magnitude:
      type: condition
      variable: auc_fold_change
      operator: gte
      value: 5
      true_next: strong_inhibitor
      false_next: cyp_inh_moderate_check
    no_inhibition:
      type: return
      value:
        clinical_recommendation: No clinically meaningful CYP inhibition
        regulatory_reference: ICH M12 (2024), Section 4.1
        labeling_section: Clinical Pharmacology (state negative finding)
        study_requirement: NO_FURTHER_STUDY
tests:
  - input:
      mechanism: cyp_inhibition
      auc_fold_change: 6
      victim_narrow_ti: true
    expect:
      study_requirement: CONTRAINDICATION_OR_DOSE_ADJUSTMENT
  - input:
      mechanism: cyp_inhibition
      auc_fold_change: 5.5
      victim_narrow_ti: false
    expect:
      study_requirement: DEDICATED_DDI_STUDY_REQUIRED
  - input:
      auc_fold_change: 3
      mechanism: cyp_inhibition
    expect:
      study_requirement: DEDICATED_DDI_STUDY_REQUIRED
  - input:
      mechanism: cyp_inhibition
      auc_fold_change: 1.5
    expect:
      study_requirement: IN_VITRO_SUFFICIENT
  - input:
      auc_fold_change: 1.1
      mechanism: cyp_inhibition
    expect:
      study_requirement: NO_FURTHER_STUDY
  - input:
      mechanism: cyp_induction
      auc_fold_change: 0.15
    expect:
      study_requirement: DEDICATED_DDI_STUDY_REQUIRED
  - input:
      auc_fold_change: 0.4
