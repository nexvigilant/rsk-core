      regulatory_reference: ICH M12 (2024), Section 6
      labeling_section: Clinical Pharmacology
      clinical_recommendation: Protein binding displacement alone rarely clinically significant
  - input:
      auc_fold_change: 1.249
    expect:
      study_requirement: NO_FURTHER_STUDY
