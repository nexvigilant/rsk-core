# MICROGRAM++ (test-repair)
name: vigil-policy-evaluate
version: 0.1.0
description: "Operator-Vigil policy evaluator: maps environmental sensor state to per-domain behavioral policy (voice, parallelism, verbosity, agent_eagerness, boundary_caution)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: presence
    type: string
    required: true
    description: EMPTY | NEARBY | OCCUPIED
  - name: thermal
    type: string
    required: false
    description: NORMAL | HOT
  - name: system_load
    type: float
    required: false
    description: ""
  - name: sensors_online
    type: int
    required: true
    description: ""
  - name: speech_detected
    type: bool
    required: false
    description: ""
outputs:
  - name: voice
    type: string
  - name: parallelism
    type: string
  - name: boundary_caution
    type: float
  - name: rationale
    type: string
interface:
  inputs:
    presence:
      type: string
      required: true
      description: EMPTY | NEARBY | OCCUPIED
    thermal:
      type: string
      required: false
      description: NORMAL | HOT
    system_load:
      type: float
      required: false
    sensors_online:
      type: int
      required: true
    speech_detected:
      type: bool
      required: false
  outputs:
    voice:
      type: string
      description: silent | queue | speak
    parallelism:
      type: string
      description: low | medium | high
    boundary_caution:
      type: float
    rationale:
      type: string
ui:
  title: Vigil Policy Evaluate
  subtitle: "Operator-Vigil policy evaluator: maps environmental sensor state to per-domain behavioral policy (voice, parallelism, verbosity, agent_eagerness, boundary_caution)"
  icon: circle
  route: /vigilance/mg/vigil-policy-evaluate
  steps:
    - field: presence
      label: presence
      help: EMPTY | NEARBY | OCCUPIED
      widget: text
      placeholder: null
    - field: thermal
      label: thermal
      help: NORMAL | HOT
      widget: text
      placeholder: null
    - field: system_load
      label: system load
      help: Enter system_load
      widget: text
      placeholder: null
    - field: sensors_online
      label: sensors online
      help: Enter sensors_online
      widget: text
      placeholder: null
    - field: speech_detected
      label: speech detected
      help: Enter speech_detected
      widget: toggle
      placeholder: null
  result:
    template: "voice: {{voice}} — parallelism: {{parallelism}} — boundary_caution: {{boundary_caution}} — rationale: {{rationale}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/vigil-policy-evaluate
  cli: rsk mcg run vigil-policy-evaluate
  auth: none
  rate_limit: 600/min
tree:
  start: presence_check
  nodes:
    presence_check:
      type: condition
      variable: presence
      operator: eq
      value: EMPTY
      true_next: empty_response
      false_next: speech_check
    empty_response:
      type: return
      value:
        voice: silent
        parallelism: high
        boundary_caution: 0.818
        rationale: "presence=EMPTY: no listener, raised caution"
    speech_check:
      type: condition
      variable: speech_detected
      operator: eq
      value: true
      true_next: speech_present
      false_next: thermal_check
    speech_present:
      type: return
      value:
        voice: queue
        parallelism: high
        boundary_caution: 0.718
        rationale: speech detected, defer voice to avoid interrupt
    thermal_check:
      type: condition
      variable: thermal
      operator: eq
      value: HOT
      true_next: thermal_hot
      false_next: load_check
    thermal_hot:
      type: return
      value:
        voice: speak
        parallelism: low
        boundary_caution: 0.768
        rationale: thermal=HOT, throttle parallelism, raise caution
    load_check:
      type: condition
      variable: system_load
      operator: gt
      value: 8
      true_next: load_high
      false_next: nominal
    load_high:
      type: return
      value:
        voice: speak
        parallelism: low
        boundary_caution: 0.718
        rationale: "load>8: throttle parallelism"
    nominal:
      type: return
      value:
        voice: speak
        parallelism: high
        boundary_caution: 0.718
        rationale: all nominal
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - voice
    - parallelism
    - boundary_caution
    - rationale
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
tests:
  - input: {}
    expect: {}
