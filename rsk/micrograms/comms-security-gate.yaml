name: comms-security-gate
description: "Validates communication security posture before transmitting. Gates on mTLS status, firmware signature, replay protection, and encryption. Blocks transmission if security requirements unmet for the link type."
version: 0.1.0
interface:
  inputs:
    link_type:
      type: string
      required: true
      enum: [ble_5, wifi_6e, fiveg_modem, lora_sx1276, iridium_certus, vhf_radio, adsb_out]
    mtls_active:
      type: boolean
      required: false
      description: "Whether mTLS handshake is established"
    firmware_signed:
      type: boolean
      required: false
      description: "Whether modem/radio firmware signature verified at boot"
    replay_nonce_valid:
      type: boolean
      required: false
      description: "Whether replay protection nonce counter is current"
    certificate_pinned:
      type: boolean
      required: false
      description: "Whether TLS certificate is pinned to known CA"
  outputs:
    verdict:
      type: string
    security_level:
      type: string
    missing_controls:
      type: string
    action:
      type: string
tree:
  start: check_vhf
  nodes:
    # VHF and ADS-B are unencrypted by regulation
    check_vhf:
      type: condition
      variable: link_type
      operator: eq
      value: vhf_radio
      true_next: vhf_pass
      false_next: check_adsb

    check_adsb:
      type: condition
      variable: link_type
      operator: eq
      value: adsb_out
      true_next: adsb_pass
      false_next: check_lora

    # LoRa — AES-128 payload encryption, no mTLS
    check_lora:
      type: condition
      variable: link_type
      operator: eq
      value: lora_sx1276
      true_next: check_lora_replay
      false_next: check_mtls

    check_lora_replay:
      type: condition
      variable: replay_nonce_valid
      operator: eq
      value: true
      true_next: lora_pass
      false_next: lora_warn

    # All IP-based links require mTLS
    check_mtls:
      type: condition
      variable: mtls_active
      operator: eq
      value: true
      true_next: check_firmware
      false_next: mtls_fail

    check_firmware:
      type: condition
      variable: firmware_signed
      operator: eq
      value: true
      true_next: check_replay
      false_next: firmware_fail

    check_replay:
      type: condition
      variable: replay_nonce_valid
      operator: eq
      value: true
      true_next: check_cert_pin
      false_next: replay_fail

    check_cert_pin:
      type: condition
      variable: certificate_pinned
      operator: eq
      value: true
      true_next: full_pass
      false_next: cert_warn

    # Terminal nodes
    vhf_pass:
      type: return
      value:
        verdict: pass
        security_level: "unencrypted_regulated"
        missing_controls: "none — VHF ATC is unencrypted by regulation (ICAO Annex 10)"
        action: "Transmit. Do NOT add encryption — violates aviation radio regulations."

    adsb_pass:
      type: return
      value:
        verdict: pass
        security_level: "broadcast_unencrypted"
        missing_controls: "none — ADS-B Out is unencrypted broadcast per DO-260B/ED-102A"
        action: "Transmit position, velocity, and ICAO address. Broadcast only — no encryption."

    lora_pass:
      type: return
      value:
        verdict: pass
        security_level: "encrypted_no_mtls"
        missing_controls: "no mTLS (acceptable for LoRa — no IP stack)"
        action: "Transmit telemetry with AES-128 payload encryption. Fire-and-forget."

    lora_warn:
      type: return
      value:
        verdict: warn
        security_level: "encrypted_replay_risk"
        missing_controls: "replay nonce counter stale or missing"
        action: "Resync nonce counter before transmitting. Risk: replay attack on telemetry."

    mtls_fail:
      type: return
      value:
        verdict: block
        security_level: "unencrypted"
        missing_controls: "mTLS not established — all IP links require mutual authentication"
        action: "BLOCK transmission. Establish mTLS handshake first. No cleartext on IP links."

    firmware_fail:
      type: return
      value:
        verdict: block
        security_level: "untrusted_firmware"
        missing_controls: "modem firmware signature verification failed"
        action: "BLOCK transmission. Firmware may be compromised. Power-cycle modem, re-verify signature at boot."

    replay_fail:
      type: return
      value:
        verdict: warn
        security_level: "encrypted_replay_risk"
        missing_controls: "replay protection nonce stale"
        action: "Resync nonce counter. Transmission allowed with elevated risk logging."

    cert_warn:
      type: return
      value:
        verdict: warn
        security_level: "encrypted_unpinned"
        missing_controls: "certificate not pinned — MITM risk on untrusted networks"
        action: "Transmit with caution. Pin certificate at next connection reset."

    full_pass:
      type: return
      value:
        verdict: pass
        security_level: "full_mtls_pinned"
        missing_controls: "none"
        action: "All security controls active. Transmit freely."

primitive_signature:
  dominant: '∂'
  expression: '∂(×(ς_security, ς_link)) — boundary gate on security state per link type'
  primes: ['∂', '×', 'ς']
  arguments: ['→']

tests:
- name: "VHF — always pass, unencrypted by regulation"
  input: { link_type: vhf_radio }
  expect: { verdict: pass, security_level: "unencrypted_regulated" }

- name: "ADS-B — always pass, broadcast"
  input: { link_type: adsb_out }
  expect: { verdict: pass, security_level: "broadcast_unencrypted" }

- name: "LoRa with valid nonce — pass"
  input: { link_type: lora_sx1276, replay_nonce_valid: true }
  expect: { verdict: pass, security_level: "encrypted_no_mtls" }

- name: "LoRa with stale nonce — warn"
  input: { link_type: lora_sx1276, replay_nonce_valid: false }
  expect: { verdict: warn }

- name: "5G full security — pass"
  input: { link_type: fiveg_modem, mtls_active: true, firmware_signed: true, replay_nonce_valid: true, certificate_pinned: true }
  expect: { verdict: pass, security_level: "full_mtls_pinned" }

- name: "5G no mTLS — block"
  input: { link_type: fiveg_modem, mtls_active: false }
  expect: { verdict: block, security_level: "unencrypted" }

- name: "Wi-Fi unsigned firmware — block"
  input: { link_type: wifi_6e, mtls_active: true, firmware_signed: false }
  expect: { verdict: block, security_level: "untrusted_firmware" }

- name: "BLE unpinned cert — warn"
  input: { link_type: ble_5, mtls_active: true, firmware_signed: true, replay_nonce_valid: true, certificate_pinned: false }
  expect: { verdict: warn, security_level: "encrypted_unpinned" }

- name: "Iridium full security — pass"
  input: { link_type: iridium_certus, mtls_active: true, firmware_signed: true, replay_nonce_valid: true, certificate_pinned: true }
  expect: { verdict: pass, security_level: "full_mtls_pinned" }

- name: "null safety"
  input: {}
  expect: { verdict: block }
