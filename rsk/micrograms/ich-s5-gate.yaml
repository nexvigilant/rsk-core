name: ich-s5-gate
description: "ICH S5 compliance: Reproductive Toxicology"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "repro_done"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH S5"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH S5"
        compliant: false
        action: "remediate"
        gap: "repro_done"

tests:
  - input: {"repro_done": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
