# MICROGRAM++ (upgraded 2026-04-23)
name: e2d-consumer-report-validity
version: 0.1.0
description: "ICH E2D Section 3.2: Validates whether a consumer (non-HCP) report meets minimum criteria for processing"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: identifiable_reporter
    type: bool
    required: false
    description: ""
  - name: identifiable_patient
    type: bool
    required: false
    description: ""
  - name: suspect_drug
    type: bool
    required: false
    description: ""
  - name: adverse_event
    type: bool
    required: false
    description: ""
  - name: medically_confirmed
    type: bool
    required: false
    description: ""
outputs:
  - name: valid
    type: bool
  - name: quality_level
    type: string
  - name: reason
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    identifiable_reporter:
      type: bool
      required: false
    identifiable_patient:
      type: bool
      required: false
    suspect_drug:
      type: bool
      required: false
    adverse_event:
      type: bool
      required: false
    medically_confirmed:
      type: bool
      required: false
  outputs:
    valid:
      type: bool
    quality_level:
      type: string
    reason:
      type: string
    regulatory_reference:
      type: string
ui:
  title: E2d Consumer Report Validity
  subtitle: "ICH E2D Section 3.2: Validates whether a consumer (non-HCP) report meets minimum criteria for processing"
  icon: circle
  route: /vigilance/mg/e2d-consumer-report-validity
  steps:
    - field: identifiable_reporter
      label: identifiable reporter
      help: Enter identifiable_reporter
      widget: toggle
      placeholder: null
    - field: identifiable_patient
      label: identifiable patient
      help: Enter identifiable_patient
      widget: toggle
      placeholder: null
    - field: suspect_drug
      label: suspect drug
      help: Enter suspect_drug
      widget: toggle
      placeholder: null
    - field: adverse_event
      label: adverse event
      help: Enter adverse_event
      widget: toggle
      placeholder: null
    - field: medically_confirmed
      label: medically confirmed
      help: Enter medically_confirmed
      widget: toggle
      placeholder: null
  result:
    template: "valid: {{valid}} — quality_level: {{quality_level}} — reason: {{reason}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2d-consumer-report-validity
  cli: rsk mcg run e2d-consumer-report-validity
  auth: none
  rate_limit: 600/min
tree:
  start: check_reporter
  nodes:
    check_reporter:
      type: condition
      variable: identifiable_reporter
      operator: eq
      value: true
      true_next: check_adverse_event
      false_next: return_no_reporter
    check_adverse_event:
      type: condition
      variable: adverse_event
      operator: eq
      value: true
      true_next: check_suspect_drug
      false_next: return_no_ae
    check_suspect_drug:
      type: condition
      variable: suspect_drug
      operator: eq
      value: true
      true_next: check_patient
      false_next: return_no_drug
    check_patient:
      type: condition
      variable: identifiable_patient
      operator: eq
      value: true
      true_next: check_medically_confirmed
      false_next: return_no_patient
    check_medically_confirmed:
      type: condition
      variable: medically_confirmed
      operator: eq
      value: true
      true_next: return_confirmed
      false_next: return_standard
    return_confirmed:
      type: return
      value:
        valid: true
        quality_level: confirmed
        reason: all_criteria_met_with_medical_confirmation
        regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
    return_standard:
      type: return
      value:
        valid: true
        quality_level: standard
        reason: minimum_criteria_met
        regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
    return_no_reporter:
      type: return
      value:
        valid: false
        quality_level: insufficient
        reason: no_identifiable_reporter
        regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
    return_no_ae:
      type: return
      value:
        valid: false
        quality_level: insufficient
        reason: no_adverse_event
        regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
    return_no_drug:
      type: return
      value:
        valid: false
        quality_level: insufficient
        reason: no_suspect_drug
        regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
    return_no_patient:
      type: return
      value:
        valid: false
        quality_level: insufficient
        reason: no_identifiable_patient
        regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
tests:
  - input:
      identifiable_reporter: true
      identifiable_patient: true
      suspect_drug: true
      adverse_event: true
    expect:
      valid: true
      quality_level: standard
      reason: minimum_criteria_met
      regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
  - input:
      identifiable_reporter: true
      identifiable_patient: true
      suspect_drug: true
      adverse_event: true
      medically_confirmed: true
    expect:
      valid: true
      quality_level: confirmed
      reason: all_criteria_met_with_medical_confirmation
      regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
  - input:
      identifiable_reporter: false
      identifiable_patient: true
      suspect_drug: true
      adverse_event: true
    expect:
      valid: false
      quality_level: insufficient
      reason: no_identifiable_reporter
      regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
  - input:
      identifiable_reporter: true
      identifiable_patient: true
      suspect_drug: true
      adverse_event: false
    expect:
      valid: false
      quality_level: insufficient
      reason: no_adverse_event
      regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
  - input:
      identifiable_reporter: true
      identifiable_patient: true
      suspect_drug: false
      adverse_event: true
    expect:
      valid: false
      quality_level: insufficient
      reason: no_suspect_drug
      regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
  - input:
      identifiable_reporter: true
      identifiable_patient: false
      suspect_drug: true
      adverse_event: true
    expect:
      valid: false
      quality_level: insufficient
      reason: no_identifiable_patient
      regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
  - input: {}
    expect:
      valid: false
      quality_level: insufficient
      reason: no_identifiable_reporter
      regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
  - input:
      identifiable_reporter: true
      identifiable_patient: true
      suspect_drug: true
      adverse_event: true
      medically_confirmed: false
    expect:
      valid: true
      quality_level: standard
      reason: minimum_criteria_met
      regulatory_reference: ICH E2D Section 3.2 - Consumer Reports
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - valid
    - quality_level
    - reason
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
