# MICROGRAM++ (upgraded 2026-04-23)
name: literature-to-signal
version: 0.1.0
description: Routes literature findings into signal hypothesis and recommended actions
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: finding_type
    type: string
    required: true
    description: ""
  - name: study_type
    type: string
    required: true
    description: ""
outputs:
  - name: signal_hypothesis
    type: boolean
  - name: priority
    type: string
  - name: recommended_action
    type: string
interface:
  inputs:
    finding_type:
      type: string
      required: true
    study_type:
      type: string
      required: true
  outputs:
    signal_hypothesis:
      type: boolean
      required: false
    priority:
      type: string
      required: false
    recommended_action:
      type: string
      required: false
  aliases: {}
ui:
  title: Literature To Signal
  subtitle: Routes literature findings into signal hypothesis and recommended actions
  icon: activity
  route: /vigilance/mg/literature-to-signal
  steps:
    - field: finding_type
      label: finding type
      help: Enter finding_type
      widget: text
      placeholder: null
    - field: study_type
      label: study type
      help: Enter study_type
      widget: text
      placeholder: null
  result:
    template: "signal_hypothesis: {{signal_hypothesis}} — priority: {{priority}} — recommended_action: {{recommended_action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/literature-to-signal
  cli: rsk mcg run literature-to-signal
  auth: none
  rate_limit: 600/min
tree:
  start: check_study_type
  nodes:
    check_study_type:
      type: condition
      variable: study_type
      operator: eq
      value: meta_analysis
      true_next: meta_finding
      false_next: check_rct
    check_rct:
      type: condition
      variable: study_type
      operator: eq
      value: rct
      true_next: check_rct_finding
      false_next: check_cohort
    cc_signal:
      type: return
      value:
        priority: medium
        recommended_action: confirm_with_cohort_data
        signal_hypothesis: true
    meta_finding:
      type: return
      value:
        priority: high
        recommended_action: initiate_signal_assessment
        signal_hypothesis: true
    rct_other:
      type: return
      value:
        priority: medium
        signal_hypothesis: true
        recommended_action: evaluate_mechanism
    cohort_other:
      type: return
      value:
        recommended_action: literature_monitoring
        signal_hypothesis: true
        priority: medium
    cr_new_adr:
      type: return
      value:
        recommended_action: literature_search
        priority: medium
        signal_hypothesis: true
    case_report_path:
      type: condition
      variable: finding_type
      operator: eq
      value: new_adr
      true_next: cr_new_adr
      false_next: cr_other
    rct_new_adr:
      type: return
      value:
        recommended_action: comparative_safety_analysis
        signal_hypothesis: true
        priority: high
    cr_other:
      type: return
      value:
        priority: low
        recommended_action: monitor
        signal_hypothesis: false
    check_cohort:
      type: condition
      variable: study_type
      operator: eq
      value: cohort
      true_next: check_cohort_finding
      false_next: case_control_path
    check_rct_finding:
      type: condition
      variable: finding_type
      operator: eq
      value: new_adr
      true_next: rct_new_adr
      false_next: rct_other
    check_cohort_finding:
      type: condition
      variable: finding_type
      operator: eq
      value: increased_frequency
      true_next: cohort_increased
      false_next: cohort_other
    cohort_increased:
      type: return
      value:
        recommended_action: signal_assessment
        signal_hypothesis: true
        priority: high
    case_control_path:
      type: condition
      variable: study_type
      operator: eq
      value: case_control
      true_next: cc_signal
      false_next: case_report_path
tests:
  - input:
      finding_type: ""
      study_type: ""
    expect:
      priority: low
      recommended_action: monitor
      signal_hypothesis: false
  - input:
      finding_type: ""
      study_type: case_control
    expect:
      priority: medium
      recommended_action: confirm_with_cohort_data
      signal_hypothesis: true
  - input:
      finding_type: ""
      study_type: cohort
    expect:
      recommended_action: literature_monitoring
      signal_hypothesis: true
      priority: medium
  - input:
      finding_type: ""
      study_type: meta_analysis
    expect:
      priority: high
      recommended_action: initiate_signal_assessment
      signal_hypothesis: true
  - input:
      finding_type: ""
      study_type: rct
    expect:
      priority: medium
      signal_hypothesis: true
      recommended_action: evaluate_mechanism
  - input:
      finding_type: increased_frequency
      study_type: cohort
    expect:
      recommended_action: signal_assessment
      signal_hypothesis: true
      priority: high
  - input:
      finding_type: new_adr
      study_type: ""
    expect:
      recommended_action: literature_search
      priority: medium
      signal_hypothesis: true
  - input:
      finding_type: new_adr
      study_type: rct
    expect:
      recommended_action: comparative_safety_analysis
      signal_hypothesis: true
      priority: high
  - input: {}
    expect:
      priority: low
      recommended_action: monitor
      signal_hypothesis: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - signal_hypothesis
    - priority
    - recommended_action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
