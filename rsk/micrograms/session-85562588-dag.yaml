# MICROGRAM++ (upgraded 2026-04-23)
name: session-85562588-dag
version: 1.0.0
description: Auto-generated DAG from session 85562588 fast-food prompts (3 nodes)
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: step_0_done
    type: bool
    required: false
    description: ""
  - name: step_1_done
    type: bool
    required: false
    description: ""
  - name: step_2_done
    type: bool
    required: false
    description: ""
outputs:
  - name: task
    type: string
  - name: prompt
    type: string
  - name: priority
    type: int
interface:
  inputs:
    step_0_done:
      type: bool
      required: false
    step_1_done:
      type: bool
      required: false
    step_2_done:
      type: bool
      required: false
  outputs:
    task:
      type: string
    prompt:
      type: string
    priority:
      type: int
ui:
  title: Session 85562588 Dag
  subtitle: Auto-generated DAG from session 85562588 fast-food prompts (3 nodes)
  icon: circle
  route: /vigilance/mg/session-85562588-dag
  steps:
    - field: step_0_done
      label: step 0 done
      help: Enter step_0_done
      widget: toggle
      placeholder: null
    - field: step_1_done
      label: step 1 done
      help: Enter step_1_done
      widget: toggle
      placeholder: null
    - field: step_2_done
      label: step 2 done
      help: Enter step_2_done
      widget: toggle
      placeholder: null
  result:
    template: "task: {{task}} — prompt: {{prompt}} — priority: {{priority}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/session-85562588-dag
  cli: rsk mcg run session-85562588-dag
  auth: none
  rate_limit: 600/min
tree:
  start: gate_0
  nodes:
    gate_0:
      type: condition
      variable: step_0_done
      operator: eq
      value: true
      true_next: gate_1
      false_next: node_0
    node_0:
      type: return
      value:
        task: step-0
        prompt: Wire the Causality Lab preset list to include semaglutide + muscle atrophy with the real data we just validated
        priority: 1
    gate_1:
      type: condition
      variable: step_1_done
      operator: eq
      value: true
      true_next: gate_2
      false_next: node_1
    node_1:
      type: return
      value:
        task: step-1
        prompt: Build a /chain skill that wraps the 4-step verdict chain (prr-signal → signal-to-causality → naranjo-quick → causality-to-action) with Station data input — one command from drug name to regulatory action
        priority: 2
    gate_2:
      type: condition
      variable: step_2_done
      operator: eq
      value: true
      true_next: node_2
      false_next: node_2
    node_2:
      type: return
      value:
        task: step-2
        prompt: Connect the loop-grappler auto-generated DAGs to the SessionStart brain-recall hook so the model sees its prior session decision tree on boot
        priority: 3
tests:
  - name: empty input routes to first prompt
    input: {}
    expect:
      task: step-0
      priority: 1
  - name: first done routes to second
    input:
      step_0_done: true
    expect:
      task: step-1
      priority: 2
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - task
    - prompt
    - priority
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
