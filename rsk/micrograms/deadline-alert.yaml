name: deadline-alert
description: 'Bridge: regulatory deadline + confidence actionability → alert routing. Chains from report-deadline and confidence-gate.'
version: 0.1.0
interface:
  inputs:
    actionable:
      type: bool
      required: false
    deadline_days:
      type: int
      required: false
  outputs:
    alert_level:
      type: string
    days_remaining_label:
      type: string
    response:
      type: string
tree:
  start: null_guard
  nodes:
    null_guard:
      type: condition
      variable: deadline_days
      operator: is_null
      value: null
      true_next: unknown_return
      false_next: check_urgent
    unknown_return:
      type: return
      value:
        alert_level: UNKNOWN
        days_remaining_label: unknown
        response: "Deadline data missing \u2014 cannot assess urgency"
    routine:
      type: return
      value:
        response: Within normal timeline
        alert_level: ROUTINE
        days_remaining_label: '>15'
    check_actionable_soon:
      type: condition
      variable: actionable
      operator: eq
      value: true
      true_next: action
      false_next: review
    escalate:
      type: return
      value:
        alert_level: ESCALATE
        days_remaining_label: <=7
        response: Deadline imminent but data insufficient — escalate for decision
    check_urgent:
      type: condition
      variable: deadline_days
      operator: lte
      value: 7
      true_next: check_actionable_urgent
      false_next: check_soon
    action:
      type: return
      value:
        days_remaining_label: 8-15
        alert_level: ACTION
        response: Prepare submission with available data
    check_soon:
      type: condition
      variable: deadline_days
      operator: lte
      value: 15
      true_next: check_actionable_soon
      false_next: routine
    critical:
      type: return
      value:
        alert_level: CRITICAL
        days_remaining_label: <=7
        response: Immediate submission required
    check_actionable_urgent:
      type: condition
      variable: actionable
      operator: eq
      value: true
      true_next: critical
      false_next: escalate
    review:
      type: return
      value:
        response: Approaching deadline — review data completeness
        days_remaining_label: 8-15
        alert_level: REVIEW
primitive_signature:
  dominant: 'π'
  expression: 'π — persistence, regulatory action, or alerting'
  primes: ['π']
  arguments: []
tests:
- input:
    deadline_days: 3
    actionable: true
  expect:
    days_remaining_label: <=7
    alert_level: CRITICAL
    response: Immediate submission required
- input:
    actionable: false
    deadline_days: 5
  expect:
    days_remaining_label: <=7
    response: Deadline imminent but data insufficient — escalate for decision
    alert_level: ESCALATE
- input:
    actionable: true
    deadline_days: 10
  expect:
    alert_level: ACTION
    days_remaining_label: 8-15
    response: Prepare submission with available data
- input:
    deadline_days: 12
    actionable: false
  expect:
    response: Approaching deadline — review data completeness
    alert_level: REVIEW
    days_remaining_label: 8-15
- input:
    deadline_days: 30
    actionable: true
  expect:
    alert_level: ROUTINE
    days_remaining_label: '>15'
    response: Within normal timeline
- input:
    deadline_days: 7
    actionable: true
  expect:
    alert_level: CRITICAL
    days_remaining_label: <=7
    response: Immediate submission required
- input:
    deadline_days: 15
    actionable: true
  expect:
    days_remaining_label: 8-15
    alert_level: ACTION
    response: Prepare submission with available data
- input:
    deadline_days: 16
    actionable: false
  expect:
    response: Within normal timeline
    alert_level: ROUTINE
    days_remaining_label: '>15'
- input: {}
  expect:
    alert_level: UNKNOWN
    days_remaining_label: unknown
    response: "Deadline data missing \u2014 cannot assess urgency"
- input:
    deadline_days: 0
  expect:
