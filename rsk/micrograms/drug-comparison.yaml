# MICROGRAM++ (upgraded 2026-04-23)
name: drug-comparison
version: 0.2.0
description: "Differential drug safety classification: compares two drug profiles by pre-computed signal ratio and PRR ratio to determine which has worse safety profile"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: signal_count_a
    type: number
    required: true
    description: ""
  - name: signal_count_b
    type: number
    required: true
    description: ""
  - name: signal_ratio
    type: number
    required: true
    description: signal_count_a / signal_count_b (999 if b=0 and a>0, 1.0 if both=0)
  - name: prr_ratio
    type: number
    required: true
    description: prr_max_a / prr_max_b (999 if b=0 and a>0, 1.0 if both=0)
outputs:
  - name: differential
    type: string
  - name: confidence
    type: string
  - name: reason
    type: string
interface:
  inputs:
    signal_count_a:
      type: number
      required: true
    signal_count_b:
      type: number
      required: true
    signal_ratio:
      type: number
      required: true
      description: signal_count_a / signal_count_b (999 if b=0 and a>0, 1.0 if both=0)
    prr_ratio:
      type: number
      required: true
      description: prr_max_a / prr_max_b (999 if b=0 and a>0, 1.0 if both=0)
  outputs:
    differential:
      type: string
    confidence:
      type: string
    reason:
      type: string
ui:
  title: Drug Comparison
  subtitle: "Differential drug safety classification: compares two drug profiles by pre-computed signal ratio and PRR ratio to determine which has worse safety profile"
  icon: circle
  route: /vigilance/mg/drug-comparison
  steps:
    - field: signal_count_a
      label: signal count a
      help: Enter signal_count_a
      widget: number
      placeholder: null
    - field: signal_count_b
      label: signal count b
      help: Enter signal_count_b
      widget: number
      placeholder: null
    - field: signal_ratio
      label: signal ratio
      help: signal_count_a / signal_count_b (999 if b=0 and a>0, 1.0 if both=0)
      widget: number
      placeholder: null
    - field: prr_ratio
      label: prr ratio
      help: prr_max_a / prr_max_b (999 if b=0 and a>0, 1.0 if both=0)
      widget: number
      placeholder: null
  result:
    template: "differential: {{differential}} — confidence: {{confidence}} — reason: {{reason}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-comparison
  cli: rsk mcg run drug-comparison
  auth: none
  rate_limit: 600/min
tree:
  start: check_a_zero
  nodes:
    check_a_zero:
      type: condition
      variable: signal_count_a
      operator: eq
      value: 0
      true_next: check_b_also_zero
      false_next: check_ratio_a_much_worse
    check_b_also_zero:
      type: condition
      variable: signal_count_b
      operator: eq
      value: 0
      true_next: similar_no_signals
      false_next: b_worse_a_clean
    check_ratio_a_much_worse:
      type: condition
      variable: signal_ratio
      operator: gte
      value: 2
      true_next: a_worse_signals
      false_next: check_ratio_b_much_worse
    check_ratio_b_much_worse:
      type: condition
      variable: signal_ratio
      operator: lte
      value: 0.5
      true_next: b_worse_signals
      false_next: check_prr_a_higher
    check_prr_a_higher:
      type: condition
      variable: prr_ratio
      operator: gte
      value: 1.5
      true_next: a_worse_prr
      false_next: check_prr_b_higher
    check_prr_b_higher:
      type: condition
      variable: prr_ratio
      operator: lte
      value: 0.667
      true_next: b_worse_prr
      false_next: check_a_slightly_more
    check_a_slightly_more:
      type: condition
      variable: signal_ratio
      operator: gt
      value: 1
      true_next: a_slightly_worse
      false_next: check_b_slightly_more
    check_b_slightly_more:
      type: condition
      variable: signal_ratio
      operator: lt
      value: 1
      true_next: b_slightly_worse
      false_next: similar_balanced
    similar_no_signals:
      type: return
      value:
        differential: SIMILAR
        confidence: high
        reason: Neither drug has detected signals
    b_worse_a_clean:
      type: return
      value:
        differential: B_WORSE
        confidence: high
        reason: Drug A has no signals while Drug B does
    a_worse_signals:
      type: return
      value:
        differential: A_WORSE
        confidence: high
        reason: Drug A has at least double the signal count of Drug B
    b_worse_signals:
      type: return
      value:
        differential: B_WORSE
        confidence: high
        reason: Drug B has at least double the signal count of Drug A
    a_worse_prr:
      type: return
      value:
        differential: A_WORSE
        confidence: medium
        reason: Drug A has substantially higher max PRR
    b_worse_prr:
      type: return
      value:
        differential: B_WORSE
        confidence: medium
        reason: Drug B has substantially higher max PRR
    a_slightly_worse:
      type: return
      value:
        differential: A_WORSE
        confidence: low
        reason: Drug A has more signals but difference is modest
    b_slightly_worse:
      type: return
      value:
        differential: B_WORSE
        confidence: low
        reason: Drug B has more signals but difference is modest
    similar_balanced:
      type: return
      value:
        differential: SIMILAR
        confidence: medium
        reason: Both drugs have comparable safety profiles
tests:
  - input:
      signal_count_a: 0
      signal_count_b: 0
      signal_ratio: 1
      prr_ratio: 1
    expect:
      differential: SIMILAR
      confidence: high
      reason: Neither drug has detected signals
  - input:
      signal_count_a: 0
      signal_count_b: 5
      signal_ratio: 0
      prr_ratio: 0
    expect:
      differential: B_WORSE
      confidence: high
      reason: Drug A has no signals while Drug B does
  - input:
      signal_count_a: 10
      signal_count_b: 4
      signal_ratio: 2.5
      prr_ratio: 1.2
    expect:
      differential: A_WORSE
      confidence: high
      reason: Drug A has at least double the signal count of Drug B
  - input:
      signal_count_a: 3
      signal_count_b: 8
      signal_ratio: 0.375
      prr_ratio: 0.4
    expect:
      differential: B_WORSE
      confidence: high
      reason: Drug B has at least double the signal count of Drug A
  - input:
      signal_count_a: 5
      signal_count_b: 4
      signal_ratio: 1.25
      prr_ratio: 4
    expect:
      differential: A_WORSE
      confidence: medium
      reason: Drug A has substantially higher max PRR
  - input:
      signal_count_a: 4
      signal_count_b: 5
      signal_ratio: 0.8
      prr_ratio: 0.278
    expect:
      differential: B_WORSE
      confidence: medium
      reason: Drug B has substantially higher max PRR
  - input:
      signal_count_a: 6
      signal_count_b: 5
      signal_ratio: 1.2
      prr_ratio: 1.143
    expect:
      differential: A_WORSE
      confidence: low
      reason: Drug A has more signals but difference is modest
  - input:
      signal_count_a: 5
      signal_count_b: 5
      signal_ratio: 1
      prr_ratio: 1
    expect:
      differential: SIMILAR
      confidence: medium
      reason: Both drugs have comparable safety profiles
  - input:
      signal_count_a: 4
      signal_count_b: 6
      signal_ratio: 0.667
      prr_ratio: 0.95
    expect:
      differential: B_WORSE
      confidence: low
      reason: Drug B has more signals but difference is modest
  - input:
      signal_count_a: 7
      signal_count_b: 0
      signal_ratio: 999
      prr_ratio: 999
    expect:
      differential: A_WORSE
      confidence: high
      reason: Drug A has at least double the signal count of Drug B
  - input: {}
    expect:
      confidence: medium
      differential: SIMILAR
      reason: Both drugs have comparable safety profiles
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - differential
    - confidence
    - reason
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
