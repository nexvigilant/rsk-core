name: meddra-smq-broad
description: "Determine if adverse event matches broad MedDRA Standardized MedDRA Query (SMQ)"
version: 0.1.0
tree:
  start: validate_pt
  nodes:
    validate_pt:
      type: condition
      variable: meddra_pt_code
      operator: is_not_null
      value: null
      true_next: check_broad_smq_inclusion
      false_next: smq_match_unknown
    check_broad_smq_inclusion:
      type: condition
      variable: is_smq_included_broad
      operator: eq
      value: true
      true_next: broad_smq_match_found
      false_next: broad_smq_no_match
    broad_smq_match_found:
      type: return
      value:
        smq_code: "20000001"
        smq_name: "Cardiac arrhythmias"
        smq_scope: "broad"
        included_pt: true
        hierarchical_level: "hlgt"
        smq_compliant: true
    broad_smq_no_match:
      type: return
      value:
        smq_code: null
        smq_name: null
        smq_scope: "broad"
        included_pt: false
        hierarchical_level: null
        smq_compliant: true
    smq_match_unknown:
      type: return
      value:
        smq_code: null
        smq_name: null
        smq_scope: "broad"
        included_pt: null
        hierarchical_level: null
        smq_compliant: false
tests:
- input:
    meddra_pt_code: "10007585"
    is_smq_included_broad: true
  expect:
    smq_code: "20000001"
    smq_name: "Cardiac arrhythmias"
    smq_scope: "broad"
    included_pt: true
- input:
    meddra_pt_code: "10033633"
    is_smq_included_broad: false
  expect:
    smq_code: null
    smq_scope: "broad"
    included_pt: false
- input: {}
  expect:
    smq_code: null
    smq_compliant: false
