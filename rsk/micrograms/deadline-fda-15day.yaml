# MICROGRAM++ (upgraded 2026-04-23)
name: deadline-fda-15day
version: 0.1.0
description: Calculate FDA 15-day IND safety report deadline for serious adverse events
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Deadline Fda 15day
  subtitle: Calculate FDA 15-day IND safety report deadline for serious adverse events
  icon: circle
  route: /vigilance/mg/deadline-fda-15day
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/deadline-fda-15day
  cli: rsk mcg run deadline-fda-15day
  auth: none
  rate_limit: 600/min
tree:
  start: validate_event_date
  nodes:
    validate_event_date:
      type: condition
      variable: event_date
      operator: is_not_null
      value: null
      true_next: check_event_type
      false_next: deadline_unknown
    check_event_type:
      type: condition
      variable: event_type
      operator: eq
      value: fatal_or_life_threatening
      true_next: urgent_deadline
      false_next: check_hospitalization
    check_hospitalization:
      type: condition
      variable: event_type
      operator: eq
      value: serious_hospitalization
      true_next: serious_deadline
      false_next: routine_deadline
    urgent_deadline:
      type: return
      value:
        reporting_deadline_days: 7
        event_category: fatal_or_life_threatening
        regulatory_requirement: FDA_IND_Safety_Report
        expedited_reporting: true
        regulatory_compliant: true
    serious_deadline:
      type: return
      value:
        reporting_deadline_days: 15
        event_category: serious_hospitalization
        regulatory_requirement: FDA_IND_Safety_Report
        expedited_reporting: false
        regulatory_compliant: true
    routine_deadline:
      type: return
      value:
        reporting_deadline_days: 30
        event_category: non_serious
        regulatory_requirement: FDA_IND_Safety_Report
        expedited_reporting: false
        regulatory_compliant: true
    deadline_unknown:
      type: return
      value:
        reporting_deadline_days: null
        event_category: null
        regulatory_requirement: null
        expedited_reporting: null
        regulatory_compliant: false
tests:
  - input:
      event_date: 2024-01-15
      event_type: fatal_or_life_threatening
    expect:
      reporting_deadline_days: 7
      expedited_reporting: true
  - input:
      event_date: 2024-01-15
      event_type: serious_hospitalization
    expect:
      reporting_deadline_days: 15
      expedited_reporting: false
  - input:
      event_date: 2024-01-15
      event_type: non_serious
    expect:
      reporting_deadline_days: 30
  - input: {}
    expect:
      reporting_deadline_days: null
      regulatory_compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
