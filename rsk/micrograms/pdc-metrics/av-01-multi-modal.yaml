name: av-01-multi-modal
description: "Multi-modal assessment validity ≥90%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: assessment_validity_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "av-01-multi-modal"
        category: "Assessment and Validation"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "av-01-multi-modal"
        category: "Assessment and Validation"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {assessment_validity_pct: 90}
    expect: {met: true, category: "Assessment and Validation"}
  - input: {}
    expect: {met: false, category: "Assessment and Validation"}
