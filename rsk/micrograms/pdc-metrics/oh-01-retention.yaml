name: oh-01-retention
description: "PV professional retention ≥90% at 3 years"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: retention_3yr_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "oh-01-retention"
        category: "Organizational Health"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "oh-01-retention"
        category: "Organizational Health"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {retention_3yr_pct: 90}
    expect: {met: true, category: "Organizational Health"}
  - input: {}
    expect: {met: false, category: "Organizational Health"}
