name: ci-02-complexity-management
description: "Progressive complexity management ≥85%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: complexity_success_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ci-02-complexity-management"
        category: "CPA Integration"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ci-02-complexity-management"
        category: "CPA Integration"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {complexity_success_pct: 85}
    expect: {met: true, category: "CPA Integration"}
  - input: {}
    expect: {met: false, category: "CPA Integration"}
