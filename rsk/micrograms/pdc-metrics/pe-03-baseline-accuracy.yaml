# MICROGRAM++ (upgraded 2026-04-23)
name: pe-03-baseline-accuracy
version: 0.1.0
description: APPE competency baseline accuracy ≥95%
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Pe 03 Baseline Accuracy
  subtitle: APPE competency baseline accuracy ≥95%
  icon: circle
  route: /vigilance/mg/pe-03-baseline-accuracy
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pe-03-baseline-accuracy
  cli: rsk mcg run pe-03-baseline-accuracy
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: baseline_accuracy_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: pe-03-baseline-accuracy
        category: Program Excellence
        met: true
        action: on_track
        frequency: quarterly
    fail:
      type: return
      value:
        metric: pe-03-baseline-accuracy
        category: Program Excellence
        met: false
        action: remediate
        frequency: quarterly
tests:
  - input:
      baseline_accuracy_pct: 95
    expect:
      met: true
      category: Program Excellence
  - input: {}
    expect:
      met: false
      category: Program Excellence
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
