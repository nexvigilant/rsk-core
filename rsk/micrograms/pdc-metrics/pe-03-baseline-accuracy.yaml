name: pe-03-baseline-accuracy
description: "APPE competency baseline accuracy ≥95%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: baseline_accuracy_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-03-baseline-accuracy"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pe-03-baseline-accuracy"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {baseline_accuracy_pct: 95}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
