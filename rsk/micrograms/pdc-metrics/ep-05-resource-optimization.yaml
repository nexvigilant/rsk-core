name: ep-05-resource-optimization
description: "Resource optimization index ≥0.85"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: optimization_index
      operator: gte
      value: 0.85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ep-05-resource-optimization"
        category: "Efficiency and Productivity"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ep-05-resource-optimization"
        category: "Efficiency and Productivity"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {optimization_index: 0.85}
    expect: {met: true, category: "Efficiency and Productivity"}
  - input: {}
    expect: {met: false, category: "Efficiency and Productivity"}
