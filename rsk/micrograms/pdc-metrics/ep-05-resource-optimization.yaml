# MICROGRAM++ (upgraded 2026-04-23)
name: ep-05-resource-optimization
version: 0.1.0
description: Resource optimization index ≥0.85
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Ep 05 Resource Optimization
  subtitle: Resource optimization index ≥0.85
  icon: circle
  route: /vigilance/mg/ep-05-resource-optimization
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ep-05-resource-optimization
  cli: rsk mcg run ep-05-resource-optimization
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: optimization_index
      operator: gte
      value: 0.85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: ep-05-resource-optimization
        category: Efficiency and Productivity
        met: true
        action: on_track
        frequency: weekly
    fail:
      type: return
      value:
        metric: ep-05-resource-optimization
        category: Efficiency and Productivity
        met: false
        action: remediate
        frequency: weekly
tests:
  - input:
      optimization_index: 0.85
    expect:
      met: true
      category: Efficiency and Productivity
  - input: {}
    expect:
      met: false
      category: Efficiency and Productivity
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
