name: ca-04-clinical-trial-pv
description: "Domain 5 L3+ competency ≥80% by Month 12"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: domain5_l3_plus_pct
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-04-clinical-trial-pv"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ca-04-clinical-trial-pv"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {domain5_l3_plus_pct: 80}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
