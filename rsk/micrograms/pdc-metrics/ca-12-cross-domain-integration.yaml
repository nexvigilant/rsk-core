name: ca-12-cross-domain-integration
description: "Cross-domain integration score ≥4.0/5.0"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cross_domain_score
      operator: gte
      value: 4.0
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-12-cross-domain-integration"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ca-12-cross-domain-integration"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {cross_domain_score: 4.0}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
