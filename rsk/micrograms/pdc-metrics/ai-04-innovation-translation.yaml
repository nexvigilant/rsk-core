# MICROGRAM++ (upgraded 2026-04-23)
name: ai-04-innovation-translation
version: 0.1.0
description: AI innovation to practice ≥60% within 12 months
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Ai 04 Innovation Translation
  subtitle: AI innovation to practice ≥60% within 12 months
  icon: circle
  route: /vigilance/mg/ai-04-innovation-translation
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ai-04-innovation-translation
  cli: rsk mcg run ai-04-innovation-translation
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: ai_translation_pct
      operator: gte
      value: 60
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: ai-04-innovation-translation
        category: AI and Digital Transformation
        met: true
        action: on_track
        frequency: quarterly
    fail:
      type: return
      value:
        metric: ai-04-innovation-translation
        category: AI and Digital Transformation
        met: false
        action: remediate
        frequency: quarterly
tests:
  - input:
      ai_translation_pct: 60
    expect:
      met: true
      category: AI and Digital Transformation
  - input: {}
    expect:
      met: false
      category: AI and Digital Transformation
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
