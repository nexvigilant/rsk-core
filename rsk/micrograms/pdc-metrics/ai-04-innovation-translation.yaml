name: ai-04-innovation-translation
description: "AI innovation to practice ≥60% within 12 months"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: ai_translation_pct
      operator: gte
      value: 60
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ai-04-innovation-translation"
        category: "AI and Digital Transformation"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "ai-04-innovation-translation"
        category: "AI and Digital Transformation"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {ai_translation_pct: 60}
    expect: {met: true, category: "AI and Digital Transformation"}
  - input: {}
    expect: {met: false, category: "AI and Digital Transformation"}
