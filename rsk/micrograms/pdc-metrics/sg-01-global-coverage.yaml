name: sg-01-global-coverage
description: "Global PDC implementation ≥85% coverage"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: global_coverage_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "sg-01-global-coverage"
        category: "Strategic Goals"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "sg-01-global-coverage"
        category: "Strategic Goals"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {global_coverage_pct: 85}
    expect: {met: true, category: "Strategic Goals"}
  - input: {}
    expect: {met: false, category: "Strategic Goals"}
