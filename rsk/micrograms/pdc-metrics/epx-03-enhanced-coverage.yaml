name: epx-03-enhanced-coverage
description: "Enhanced domains achieve target EPA coverage"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: enhanced_domains_met
      operator: gte
      value: 3
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-03-enhanced-coverage"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "epx-03-enhanced-coverage"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {enhanced_domains_met: 3}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
