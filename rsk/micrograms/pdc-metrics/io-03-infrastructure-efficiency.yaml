name: io-03-infrastructure-efficiency
description: "Infrastructure efficiency ≥0.80"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: infrastructure_efficiency
      operator: gte
      value: 0.8
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "io-03-infrastructure-efficiency"
        category: "Implementation and Operations"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "io-03-infrastructure-efficiency"
        category: "Implementation and Operations"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {infrastructure_efficiency: 0.8}
    expect: {met: true, category: "Implementation and Operations"}
  - input: {}
    expect: {met: false, category: "Implementation and Operations"}
