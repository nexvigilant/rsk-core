name: ir-03-resource-sustainability
description: "Resource sustainability score ≥0.85"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: sustainability_score
      operator: gte
      value: 0.85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ir-03-resource-sustainability"
        category: "Infrastructure and Resource"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "ir-03-resource-sustainability"
        category: "Infrastructure and Resource"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {sustainability_score: 0.85}
    expect: {met: true, category: "Infrastructure and Resource"}
  - input: {}
    expect: {met: false, category: "Infrastructure and Resource"}
