name: pe-07-placement-quality
description: "Fellowship placement quality ≥4.0/5.0"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: placement_quality_score
      operator: gte
      value: 4.0
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-07-placement-quality"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "annual"
    fail:
      type: return
      value:
        metric: "pe-07-placement-quality"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "annual"

tests:
  - input: {placement_quality_score: 4.0}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
