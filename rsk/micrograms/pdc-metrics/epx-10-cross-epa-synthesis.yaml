name: epx-10-cross-epa-synthesis
description: "Cross-EPA synthesis ≥80% for L3+"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cross_epa_synthesis_pct
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-10-cross-epa-synthesis"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "epx-10-cross-epa-synthesis"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {cross_epa_synthesis_pct: 80}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
