name: cq-02-assessment-validity
description: "Assessment validity coefficient ≥0.85"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: validity_coefficient
      operator: gte
      value: 0.85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "cq-02-assessment-validity"
        category: "Compliance and Quality"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "cq-02-assessment-validity"
        category: "Compliance and Quality"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {validity_coefficient: 0.85}
    expect: {met: true, category: "Compliance and Quality"}
  - input: {}
    expect: {met: false, category: "Compliance and Quality"}
