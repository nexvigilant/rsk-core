name: ci-01-cpa-epa-integration
description: "CPA-EPA integration ≥90% across all 8 CPAs"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cpa_epa_integration_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ci-01-cpa-epa-integration"
        category: "CPA Integration"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ci-01-cpa-epa-integration"
        category: "CPA Integration"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {cpa_epa_integration_pct: 90}
    expect: {met: true, category: "CPA Integration"}
  - input: {}
    expect: {met: false, category: "CPA Integration"}
