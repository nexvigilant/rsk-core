# MICROGRAM++ (upgraded 2026-04-23)
name: epx-05-cpa8-achievement
version: 0.1.0
description: CPA8 completion ≥80% with ≥50% industry recognition
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Epx 05 Cpa8 Achievement
  subtitle: CPA8 completion ≥80% with ≥50% industry recognition
  icon: circle
  route: /vigilance/mg/epx-05-cpa8-achievement
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/epx-05-cpa8-achievement
  cli: rsk mcg run epx-05-cpa8-achievement
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cpa8_completion_pct
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: epx-05-cpa8-achievement
        category: EPA Progression
        met: true
        action: on_track
        frequency: quarterly
    fail:
      type: return
      value:
        metric: epx-05-cpa8-achievement
        category: EPA Progression
        met: false
        action: remediate
        frequency: quarterly
tests:
  - input:
      cpa8_completion_pct: 80
    expect:
      met: true
      category: EPA Progression
  - input: {}
    expect:
      met: false
      category: EPA Progression
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
