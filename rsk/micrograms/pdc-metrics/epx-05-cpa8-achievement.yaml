name: epx-05-cpa8-achievement
description: "CPA8 completion ≥80% with ≥50% industry recognition"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cpa8_completion_pct
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-05-cpa8-achievement"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "epx-05-cpa8-achievement"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {cpa8_completion_pct: 80}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
