name: ca-08-signal-comm
description: "Signal-communication integration ≥85%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: signal_comm_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-08-signal-comm"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ca-08-signal-comm"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {signal_comm_pct: 85}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
