name: ps-02-error-prevention
description: "Error prevention effectiveness ≥30% reduction"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: error_reduction_pct
      operator: gte
      value: 30
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ps-02-error-prevention"
        category: "Patient Safety"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ps-02-error-prevention"
        category: "Patient Safety"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {error_reduction_pct: 30}
    expect: {met: true, category: "Patient Safety"}
  - input: {}
    expect: {met: false, category: "Patient Safety"}
