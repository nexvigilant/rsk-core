# MICROGRAM++ (upgraded 2026-04-23)
name: ps-02-error-prevention
version: 0.1.0
description: Error prevention effectiveness ≥30% reduction
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Ps 02 Error Prevention
  subtitle: Error prevention effectiveness ≥30% reduction
  icon: circle
  route: /vigilance/mg/ps-02-error-prevention
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ps-02-error-prevention
  cli: rsk mcg run ps-02-error-prevention
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: error_reduction_pct
      operator: gte
      value: 30
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: ps-02-error-prevention
        category: Patient Safety
        met: true
        action: on_track
        frequency: monthly
    fail:
      type: return
      value:
        metric: ps-02-error-prevention
        category: Patient Safety
        met: false
        action: remediate
        frequency: monthly
tests:
  - input:
      error_reduction_pct: 30
    expect:
      met: true
      category: Patient Safety
  - input: {}
    expect:
      met: false
      category: Patient Safety
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
