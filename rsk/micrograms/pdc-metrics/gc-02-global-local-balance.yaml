name: gc-02-global-local-balance
description: "Global-local balance score ≥0.80"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: global_local_score
      operator: gte
      value: 0.8
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "gc-02-global-local-balance"
        category: "Global and Cultural"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "gc-02-global-local-balance"
        category: "Global and Cultural"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {global_local_score: 0.8}
    expect: {met: true, category: "Global and Cultural"}
  - input: {}
    expect: {met: false, category: "Global and Cultural"}
