name: av-02-calibration
description: "Behavioral anchor inter-rater reliability ≥0.85"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: interrater_reliability
      operator: gte
      value: 0.85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "av-02-calibration"
        category: "Assessment and Validation"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "av-02-calibration"
        category: "Assessment and Validation"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {interrater_reliability: 0.85}
    expect: {met: true, category: "Assessment and Validation"}
  - input: {}
    expect: {met: false, category: "Assessment and Validation"}
