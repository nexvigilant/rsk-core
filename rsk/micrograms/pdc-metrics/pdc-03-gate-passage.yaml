# MICROGRAM++ (upgraded 2026-04-23)
name: pdc-03-gate-passage
version: 0.1.0
description: Gate passage success rate ≥90% first attempt
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Pdc 03 Gate Passage
  subtitle: Gate passage success rate ≥90% first attempt
  icon: circle
  route: /vigilance/mg/pdc-03-gate-passage
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pdc-03-gate-passage
  cli: rsk mcg run pdc-03-gate-passage
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: first_attempt_pass_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: pdc-03-gate-passage
        category: PDC Program Effectiveness
        met: true
        action: on_track
        frequency: quarterly
    fail:
      type: return
      value:
        metric: pdc-03-gate-passage
        category: PDC Program Effectiveness
        met: false
        action: remediate
        frequency: quarterly
tests:
  - input:
      first_attempt_pass_pct: 90
    expect:
      met: true
      category: PDC Program Effectiveness
  - input: {}
    expect:
      met: false
      category: PDC Program Effectiveness
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
