name: pdc-03-gate-passage
description: "Gate passage success rate ≥90% first attempt"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: first_attempt_pass_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pdc-03-gate-passage"
        category: "PDC Program Effectiveness"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pdc-03-gate-passage"
        category: "PDC Program Effectiveness"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {first_attempt_pass_pct: 90}
    expect: {met: true, category: "PDC Program Effectiveness"}
  - input: {}
    expect: {met: false, category: "PDC Program Effectiveness"}
