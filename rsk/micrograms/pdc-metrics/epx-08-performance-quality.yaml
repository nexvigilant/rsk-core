name: epx-08-performance-quality
description: "EPA performance quality standards ≥90%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: quality_standards_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-08-performance-quality"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "epx-08-performance-quality"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {quality_standards_pct: 90}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
