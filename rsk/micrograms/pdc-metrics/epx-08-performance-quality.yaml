# MICROGRAM++ (upgraded 2026-04-23)
name: epx-08-performance-quality
version: 0.1.0
description: EPA performance quality standards ≥90%
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Epx 08 Performance Quality
  subtitle: EPA performance quality standards ≥90%
  icon: circle
  route: /vigilance/mg/epx-08-performance-quality
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/epx-08-performance-quality
  cli: rsk mcg run epx-08-performance-quality
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: quality_standards_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: epx-08-performance-quality
        category: EPA Progression
        met: true
        action: on_track
        frequency: weekly
    fail:
      type: return
      value:
        metric: epx-08-performance-quality
        category: EPA Progression
        met: false
        action: remediate
        frequency: weekly
tests:
  - input:
      quality_standards_pct: 90
    expect:
      met: true
      category: EPA Progression
  - input: {}
    expect:
      met: false
      category: EPA Progression
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
