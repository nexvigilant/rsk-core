name: io-01-roadmap-achievement
description: "Implementation roadmap ≥90% on schedule"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: roadmap_achievement_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "io-01-roadmap-achievement"
        category: "Implementation and Operations"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "io-01-roadmap-achievement"
        category: "Implementation and Operations"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {roadmap_achievement_pct: 90}
    expect: {met: true, category: "Implementation and Operations"}
  - input: {}
    expect: {met: false, category: "Implementation and Operations"}
