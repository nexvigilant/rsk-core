name: ca-14-competency-innovation
description: "≥2 innovations per domain per year"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: innovations_per_domain
      operator: gte
      value: 2
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-14-competency-innovation"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "ca-14-competency-innovation"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {innovations_per_domain: 2}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
