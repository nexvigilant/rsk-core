name: gc-01-cultural-competency
description: "Cultural competency ≥85% with ≥90% Japan integration"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cultural_competency_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "gc-01-cultural-competency"
        category: "Global and Cultural"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "gc-01-cultural-competency"
        category: "Global and Cultural"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {cultural_competency_pct: 85}
    expect: {met: true, category: "Global and Cultural"}
  - input: {}
    expect: {met: false, category: "Global and Cultural"}
