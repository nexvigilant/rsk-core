name: epx-07-industry-transformation
description: "≥5 documented industry transformations per year"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: industry_transformations
      operator: gte
      value: 5
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-07-industry-transformation"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "annual"
    fail:
      type: return
      value:
        metric: "epx-07-industry-transformation"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "annual"

tests:
  - input: {industry_transformations: 5}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
