name: gc-03-partnership-value
description: "International partnership value ≥$3M annually"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: partnership_value_millions
      operator: gte
      value: 3
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "gc-03-partnership-value"
        category: "Global and Cultural"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "gc-03-partnership-value"
        category: "Global and Cultural"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {partnership_value_millions: 3}
    expect: {met: true, category: "Global and Cultural"}
  - input: {}
    expect: {met: false, category: "Global and Cultural"}
