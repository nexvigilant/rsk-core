name: ep-02-signal-cycle-time
description: "Signal management cycle time ≤7 days"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: signal_cycle_days
      operator: lte
      value: 7
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ep-02-signal-cycle-time"
        category: "Efficiency and Productivity"
        met: true
        action: "on_track"
        frequency: "daily"
    fail:
      type: return
      value:
        metric: "ep-02-signal-cycle-time"
        category: "Efficiency and Productivity"
        met: false
        action: "remediate"
        frequency: "daily"

tests:
  - input: {signal_cycle_days: 7}
    expect: {met: true, category: "Efficiency and Productivity"}
  - input: {}
    expect: {met: false, category: "Efficiency and Productivity"}
