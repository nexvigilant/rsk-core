name: bv-02-compliance-prediction
description: "Compliance risk prediction accuracy ≥70%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: compliance_prediction_pct
      operator: gte
      value: 70
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "bv-02-compliance-prediction"
        category: "Business Value"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "bv-02-compliance-prediction"
        category: "Business Value"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {compliance_prediction_pct: 70}
    expect: {met: true, category: "Business Value"}
  - input: {}
    expect: {met: false, category: "Business Value"}
