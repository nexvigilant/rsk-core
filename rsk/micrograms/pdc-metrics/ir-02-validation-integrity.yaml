name: ir-02-validation-integrity
description: "Validation framework integrity 100%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: validation_integrity_pct
      operator: gte
      value: 100
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ir-02-validation-integrity"
        category: "Infrastructure and Resource"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ir-02-validation-integrity"
        category: "Infrastructure and Resource"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {validation_integrity_pct: 100}
    expect: {met: true, category: "Infrastructure and Resource"}
  - input: {}
    expect: {met: false, category: "Infrastructure and Resource"}
