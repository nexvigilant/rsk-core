# MICROGRAM++ (upgraded 2026-04-23)
name: ir-02-validation-integrity
version: 0.1.0
description: Validation framework integrity 100%
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Ir 02 Validation Integrity
  subtitle: Validation framework integrity 100%
  icon: circle
  route: /vigilance/mg/ir-02-validation-integrity
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ir-02-validation-integrity
  cli: rsk mcg run ir-02-validation-integrity
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: validation_integrity_pct
      operator: gte
      value: 100
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: ir-02-validation-integrity
        category: Infrastructure and Resource
        met: true
        action: on_track
        frequency: monthly
    fail:
      type: return
      value:
        metric: ir-02-validation-integrity
        category: Infrastructure and Resource
        met: false
        action: remediate
        frequency: monthly
tests:
  - input:
      validation_integrity_pct: 100
    expect:
      met: true
      category: Infrastructure and Resource
  - input: {}
    expect:
      met: false
      category: Infrastructure and Resource
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
