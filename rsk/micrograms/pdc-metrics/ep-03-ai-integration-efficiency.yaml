name: ep-03-ai-integration-efficiency
description: "AI tool integration productivity gain ≥40%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: ai_productivity_gain_pct
      operator: gte
      value: 40
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ep-03-ai-integration-efficiency"
        category: "Efficiency and Productivity"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ep-03-ai-integration-efficiency"
        category: "Efficiency and Productivity"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {ai_productivity_gain_pct: 40}
    expect: {met: true, category: "Efficiency and Productivity"}
  - input: {}
    expect: {met: false, category: "Efficiency and Productivity"}
