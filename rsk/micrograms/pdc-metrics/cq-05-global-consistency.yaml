name: cq-05-global-consistency
description: "Global quality consistency index ≥0.90"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: consistency_index
      operator: gte
      value: 0.9
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "cq-05-global-consistency"
        category: "Compliance and Quality"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "cq-05-global-consistency"
        category: "Compliance and Quality"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {consistency_index: 0.9}
    expect: {met: true, category: "Compliance and Quality"}
  - input: {}
    expect: {met: false, category: "Compliance and Quality"}
