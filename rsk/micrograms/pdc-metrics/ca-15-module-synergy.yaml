name: ca-15-module-synergy
description: "Integrated module efficiency improvement ≥30%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: module_efficiency_gain_pct
      operator: gte
      value: 30
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-15-module-synergy"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ca-15-module-synergy"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {module_efficiency_gain_pct: 30}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
