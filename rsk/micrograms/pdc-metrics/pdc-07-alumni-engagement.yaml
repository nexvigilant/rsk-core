name: pdc-07-alumni-engagement
description: "Alumni network engagement rate ≥75%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: alumni_engagement_pct
      operator: gte
      value: 75
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pdc-07-alumni-engagement"
        category: "PDC Program Effectiveness"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "pdc-07-alumni-engagement"
        category: "PDC Program Effectiveness"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {alumni_engagement_pct: 75}
    expect: {met: true, category: "PDC Program Effectiveness"}
  - input: {}
    expect: {met: false, category: "PDC Program Effectiveness"}
