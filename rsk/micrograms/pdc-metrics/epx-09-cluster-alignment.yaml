name: epx-09-cluster-alignment
description: "EPA cluster alignment ≥85%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cluster_alignment_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-09-cluster-alignment"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "epx-09-cluster-alignment"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {cluster_alignment_pct: 85}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
