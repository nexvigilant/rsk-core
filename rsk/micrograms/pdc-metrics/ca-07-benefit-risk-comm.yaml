name: ca-07-benefit-risk-comm
description: "Benefit-risk communication integration ≥90%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: br_comm_integration_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-07-benefit-risk-comm"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ca-07-benefit-risk-comm"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {br_comm_integration_pct: 90}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
