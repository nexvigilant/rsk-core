name: ca-10-ai-integration-domains
description: "AI integration across all 15 domains = 100%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: domains_with_ai
      operator: gte
      value: 15
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-10-ai-integration-domains"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ca-10-ai-integration-domains"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {domains_with_ai: 15}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
