name: sg-03-regulatory-partnerships
description: "≥20 strong regulatory partnerships"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: partnerships_count
      operator: gte
      value: 20
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "sg-03-regulatory-partnerships"
        category: "Strategic Goals"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "sg-03-regulatory-partnerships"
        category: "Strategic Goals"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {partnerships_count: 20}
    expect: {met: true, category: "Strategic Goals"}
  - input: {}
    expect: {met: false, category: "Strategic Goals"}
