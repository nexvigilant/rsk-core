name: oh-03-engagement
description: "Employee engagement score ≥4.3/5.0"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: engagement_score
      operator: gte
      value: 4.3
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "oh-03-engagement"
        category: "Organizational Health"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "oh-03-engagement"
        category: "Organizational Health"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {engagement_score: 4.3}
    expect: {met: true, category: "Organizational Health"}
  - input: {}
    expect: {met: false, category: "Organizational Health"}
