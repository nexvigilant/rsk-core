name: ci-03-professional-versatility
description: "≥80% competent in ≥6 CPAs"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: versatility_pct
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ci-03-professional-versatility"
        category: "CPA Integration"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "ci-03-professional-versatility"
        category: "CPA Integration"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {versatility_pct: 80}
    expect: {met: true, category: "CPA Integration"}
  - input: {}
    expect: {met: false, category: "CPA Integration"}
