name: epx-02-epa-competency-integration
description: "EPA-competency integration ≥95%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: epa_integration_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-02-epa-competency-integration"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "epx-02-epa-competency-integration"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {epa_integration_pct: 95}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
