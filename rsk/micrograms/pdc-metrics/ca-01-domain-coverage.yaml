name: ca-01-domain-coverage
description: "Enhanced domain coverage 100% at ≥50% EPA"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: domains_meeting_coverage
      operator: gte
      value: 3
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-01-domain-coverage"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ca-01-domain-coverage"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {domains_meeting_coverage: 3}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
