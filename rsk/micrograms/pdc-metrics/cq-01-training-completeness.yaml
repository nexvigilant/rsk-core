name: cq-01-training-completeness
description: "Training record completeness ≥98%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: record_completeness_pct
      operator: gte
      value: 98
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "cq-01-training-completeness"
        category: "Compliance and Quality"
        met: true
        action: "on_track"
        frequency: "daily"
    fail:
      type: return
      value:
        metric: "cq-01-training-completeness"
        category: "Compliance and Quality"
        met: false
        action: "remediate"
        frequency: "daily"

tests:
  - input: {record_completeness_pct: 98}
    expect: {met: true, category: "Compliance and Quality"}
  - input: {}
    expect: {met: false, category: "Compliance and Quality"}
