name: oh-04-vacancy-duration
description: "Critical PV role vacancy ≤45 days"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: vacancy_days
      operator: lte
      value: 45
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "oh-04-vacancy-duration"
        category: "Organizational Health"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "oh-04-vacancy-duration"
        category: "Organizational Health"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {vacancy_days: 45}
    expect: {met: true, category: "Organizational Health"}
  - input: {}
    expect: {met: false, category: "Organizational Health"}
