name: pe-04-fellowship-gate-success
description: "Fellowship Gate 1 success ≥95%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: gate1_success_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-04-fellowship-gate-success"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pe-04-fellowship-gate-success"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {gate1_success_pct: 95}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
