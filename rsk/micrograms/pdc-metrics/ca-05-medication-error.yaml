name: ca-05-medication-error
description: "Domain 6 medication error prevention ≥90%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: error_prevention_achievement_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-05-medication-error"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ca-05-medication-error"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {error_prevention_achievement_pct: 90}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
