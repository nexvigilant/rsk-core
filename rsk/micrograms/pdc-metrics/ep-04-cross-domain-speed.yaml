name: ep-04-cross-domain-speed
description: "Cross-domain integration ≤2 months"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: integration_months
      operator: lte
      value: 2
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ep-04-cross-domain-speed"
        category: "Efficiency and Productivity"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ep-04-cross-domain-speed"
        category: "Efficiency and Productivity"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {integration_months: 2}
    expect: {met: true, category: "Efficiency and Productivity"}
  - input: {}
    expect: {met: false, category: "Efficiency and Productivity"}
