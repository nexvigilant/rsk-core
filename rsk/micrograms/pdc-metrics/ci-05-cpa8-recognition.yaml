name: ci-05-cpa8-recognition
description: "CPA8 industry recognition ≥50% within 2 years"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cpa8_recognition_pct
      operator: gte
      value: 50
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ci-05-cpa8-recognition"
        category: "CPA Integration"
        met: true
        action: "on_track"
        frequency: "annual"
    fail:
      type: return
      value:
        metric: "ci-05-cpa8-recognition"
        category: "CPA Integration"
        met: false
        action: "remediate"
        frequency: "annual"

tests:
  - input: {cpa8_recognition_pct: 50}
    expect: {met: true, category: "CPA Integration"}
  - input: {}
    expect: {met: false, category: "CPA Integration"}
