name: ca-06-adr-recognition
description: "Domain 3 ADR recognition mastery ≥95%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: adr_recognition_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-06-adr-recognition"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "daily"
    fail:
      type: return
      value:
        metric: "ca-06-adr-recognition"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "daily"

tests:
  - input: {adr_recognition_pct: 95}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
