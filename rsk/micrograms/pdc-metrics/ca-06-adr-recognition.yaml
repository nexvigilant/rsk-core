# MICROGRAM++ (upgraded 2026-04-23)
name: ca-06-adr-recognition
version: 0.1.0
description: Domain 3 ADR recognition mastery ≥95%
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Ca 06 Adr Recognition
  subtitle: Domain 3 ADR recognition mastery ≥95%
  icon: circle
  route: /vigilance/mg/ca-06-adr-recognition
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ca-06-adr-recognition
  cli: rsk mcg run ca-06-adr-recognition
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: adr_recognition_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: ca-06-adr-recognition
        category: Competency Architecture
        met: true
        action: on_track
        frequency: daily
    fail:
      type: return
      value:
        metric: ca-06-adr-recognition
        category: Competency Architecture
        met: false
        action: remediate
        frequency: daily
tests:
  - input:
      adr_recognition_pct: 95
    expect:
      met: true
      category: Competency Architecture
  - input: {}
    expect:
      met: false
      category: Competency Architecture
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
