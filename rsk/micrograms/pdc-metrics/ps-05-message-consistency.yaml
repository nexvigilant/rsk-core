name: ps-05-message-consistency
description: "Safety message consistency ≥0.90 correlation"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: message_consistency
      operator: gte
      value: 0.9
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ps-05-message-consistency"
        category: "Patient Safety"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ps-05-message-consistency"
        category: "Patient Safety"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {message_consistency: 0.9}
    expect: {met: true, category: "Patient Safety"}
  - input: {}
    expect: {met: false, category: "Patient Safety"}
