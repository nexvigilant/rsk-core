name: io-02-change-management
description: "Change management effectiveness ≥85%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: change_success_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "io-02-change-management"
        category: "Implementation and Operations"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "io-02-change-management"
        category: "Implementation and Operations"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {change_success_pct: 85}
    expect: {met: true, category: "Implementation and Operations"}
  - input: {}
    expect: {met: false, category: "Implementation and Operations"}
