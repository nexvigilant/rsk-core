# MICROGRAM++ (upgraded 2026-04-23)
name: ep-01-epa-velocity
version: 0.1.0
description: EPA completion velocity ≥1.5 per participant per month
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Ep 01 Epa Velocity
  subtitle: EPA completion velocity ≥1.5 per participant per month
  icon: circle
  route: /vigilance/mg/ep-01-epa-velocity
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ep-01-epa-velocity
  cli: rsk mcg run ep-01-epa-velocity
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: epa_per_month
      operator: gte
      value: 1.5
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: ep-01-epa-velocity
        category: Efficiency and Productivity
        met: true
        action: on_track
        frequency: weekly
    fail:
      type: return
      value:
        metric: ep-01-epa-velocity
        category: Efficiency and Productivity
        met: false
        action: remediate
        frequency: weekly
tests:
  - input:
      epa_per_month: 1.5
    expect:
      met: true
      category: Efficiency and Productivity
  - input: {}
    expect:
      met: false
      category: Efficiency and Productivity
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
