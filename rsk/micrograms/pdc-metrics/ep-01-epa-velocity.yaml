name: ep-01-epa-velocity
description: "EPA completion velocity ≥1.5 per participant per month"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: epa_per_month
      operator: gte
      value: 1.5
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ep-01-epa-velocity"
        category: "Efficiency and Productivity"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ep-01-epa-velocity"
        category: "Efficiency and Productivity"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {epa_per_month: 1.5}
    expect: {met: true, category: "Efficiency and Productivity"}
  - input: {}
    expect: {met: false, category: "Efficiency and Productivity"}
