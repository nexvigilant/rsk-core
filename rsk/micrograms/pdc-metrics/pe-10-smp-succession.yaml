name: pe-10-smp-succession
description: "SMP executive succession ≥40% within 5 years"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: succession_pct
      operator: gte
      value: 40
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-10-smp-succession"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "annual"
    fail:
      type: return
      value:
        metric: "pe-10-smp-succession"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "annual"

tests:
  - input: {succession_pct: 40}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
