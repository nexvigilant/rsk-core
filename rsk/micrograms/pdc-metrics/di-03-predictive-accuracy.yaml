name: di-03-predictive-accuracy
description: "Predictive signal detection accuracy ≥75%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: prediction_accuracy_pct
      operator: gte
      value: 75
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "di-03-predictive-accuracy"
        category: "Digital Innovation"
        met: true
        action: "on_track"
        frequency: "daily"
    fail:
      type: return
      value:
        metric: "di-03-predictive-accuracy"
        category: "Digital Innovation"
        met: false
        action: "remediate"
        frequency: "daily"

tests:
  - input: {prediction_accuracy_pct: 75}
    expect: {met: true, category: "Digital Innovation"}
  - input: {}
    expect: {met: false, category: "Digital Innovation"}
