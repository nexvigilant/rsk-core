name: di-04-tech-roi
description: "Technology ROI ≥250%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: tech_roi_pct
      operator: gte
      value: 250
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "di-04-tech-roi"
        category: "Digital Innovation"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "di-04-tech-roi"
        category: "Digital Innovation"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {tech_roi_pct: 250}
    expect: {met: true, category: "Digital Innovation"}
  - input: {}
    expect: {met: false, category: "Digital Innovation"}
