name: pe-02-appe-fellowship-transition
description: "APPE-to-Fellowship transition ≥95%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: appe_transition_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-02-appe-fellowship-transition"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pe-02-appe-fellowship-transition"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {appe_transition_pct: 95}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
