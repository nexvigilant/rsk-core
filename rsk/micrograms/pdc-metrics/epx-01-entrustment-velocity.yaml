name: epx-01-entrustment-velocity
description: "EPA L1→L2 ≤2 months average"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: l1_to_l2_months
      operator: lte
      value: 2
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-01-entrustment-velocity"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "epx-01-entrustment-velocity"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {l1_to_l2_months: 2}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
