# MICROGRAM++ (upgraded 2026-04-23)
name: av-04-development-loop
version: 0.1.0
description: Assessment-to-development loop closure ≥85%
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Av 04 Development Loop
  subtitle: Assessment-to-development loop closure ≥85%
  icon: circle
  route: /vigilance/mg/av-04-development-loop
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/av-04-development-loop
  cli: rsk mcg run av-04-development-loop
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: loop_closure_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: av-04-development-loop
        category: Assessment and Validation
        met: true
        action: on_track
        frequency: monthly
    fail:
      type: return
      value:
        metric: av-04-development-loop
        category: Assessment and Validation
        met: false
        action: remediate
        frequency: monthly
tests:
  - input:
      loop_closure_pct: 85
    expect:
      met: true
      category: Assessment and Validation
  - input: {}
    expect:
      met: false
      category: Assessment and Validation
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
