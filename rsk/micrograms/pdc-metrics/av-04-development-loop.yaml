name: av-04-development-loop
description: "Assessment-to-development loop closure ≥85%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: loop_closure_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "av-04-development-loop"
        category: "Assessment and Validation"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "av-04-development-loop"
        category: "Assessment and Validation"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {loop_closure_pct: 85}
    expect: {met: true, category: "Assessment and Validation"}
  - input: {}
    expect: {met: false, category: "Assessment and Validation"}
