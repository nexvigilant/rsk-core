name: ca-13-l5-leadership
description: "L5+ leadership development ≥25% within 5 years"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: l5_plus_pct
      operator: gte
      value: 25
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-13-l5-leadership"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "annual"
    fail:
      type: return
      value:
        metric: "ca-13-l5-leadership"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "annual"

tests:
  - input: {l5_plus_pct: 25}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
