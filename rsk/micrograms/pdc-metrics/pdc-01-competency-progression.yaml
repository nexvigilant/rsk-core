name: pdc-01-competency-progression
description: "Competency progression rate ≥85% across all 15 domains"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: progression_rate_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pdc-01-competency-progression"
        category: "PDC Program Effectiveness"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "pdc-01-competency-progression"
        category: "PDC Program Effectiveness"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {progression_rate_pct: 85}
    expect: {met: true, category: "PDC Program Effectiveness"}
  - input: {}
    expect: {met: false, category: "PDC Program Effectiveness"}
