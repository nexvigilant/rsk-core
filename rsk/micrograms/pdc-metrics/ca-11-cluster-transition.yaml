name: ca-11-cluster-transition
description: "Cluster transition success ≥95%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: transition_success_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-11-cluster-transition"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "ca-11-cluster-transition"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {transition_success_pct: 95}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
