name: io-04-quality-maturation
description: "Quality maturity Level 4 within 3 years"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: quality_maturity_level
      operator: gte
      value: 4
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "io-04-quality-maturation"
        category: "Implementation and Operations"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "io-04-quality-maturation"
        category: "Implementation and Operations"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {quality_maturity_level: 4}
    expect: {met: true, category: "Implementation and Operations"}
  - input: {}
    expect: {met: false, category: "Implementation and Operations"}
