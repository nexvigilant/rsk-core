name: epx-11-epa-improvement-rate
description: "EPA improvement implementation ≥75% within 6 months"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: improvement_rate_pct
      operator: gte
      value: 75
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-11-epa-improvement-rate"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "epx-11-epa-improvement-rate"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {improvement_rate_pct: 75}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
