name: pdc-02-epa-timeline
description: "EPA achievement timeline variance ≤10%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: timeline_variance_pct
      operator: lte
      value: 10
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pdc-02-epa-timeline"
        category: "PDC Program Effectiveness"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "pdc-02-epa-timeline"
        category: "PDC Program Effectiveness"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {timeline_variance_pct: 10}
    expect: {met: true, category: "PDC Program Effectiveness"}
  - input: {}
    expect: {met: false, category: "PDC Program Effectiveness"}
