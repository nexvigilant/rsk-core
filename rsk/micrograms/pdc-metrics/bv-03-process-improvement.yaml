name: bv-03-process-improvement
description: "PV process improvement value ≥$2M per 100 participants"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: process_value_millions
      operator: gte
      value: 2
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "bv-03-process-improvement"
        category: "Business Value"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "bv-03-process-improvement"
        category: "Business Value"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {process_value_millions: 2}
    expect: {met: true, category: "Business Value"}
  - input: {}
    expect: {met: false, category: "Business Value"}
