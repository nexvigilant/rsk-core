name: ps-03-signal-accuracy
description: "Signal detection accuracy ≥80% with ≤10% FPR"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: signal_accuracy_pct
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ps-03-signal-accuracy"
        category: "Patient Safety"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ps-03-signal-accuracy"
        category: "Patient Safety"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {signal_accuracy_pct: 80}
    expect: {met: true, category: "Patient Safety"}
  - input: {}
    expect: {met: false, category: "Patient Safety"}
