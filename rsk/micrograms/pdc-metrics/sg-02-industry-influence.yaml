name: sg-02-industry-influence
description: "Top 3 industry influence ranking"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: influence_rank
      operator: lte
      value: 3
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "sg-02-industry-influence"
        category: "Strategic Goals"
        met: true
        action: "on_track"
        frequency: "annual"
    fail:
      type: return
      value:
        metric: "sg-02-industry-influence"
        category: "Strategic Goals"
        met: false
        action: "remediate"
        frequency: "annual"

tests:
  - input: {influence_rank: 3}
    expect: {met: true, category: "Strategic Goals"}
  - input: {}
    expect: {met: false, category: "Strategic Goals"}
