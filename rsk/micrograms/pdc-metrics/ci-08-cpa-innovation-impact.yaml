name: ci-08-cpa-innovation-impact
description: "CPA innovation organizational impact ≥60%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cpa_innovation_impact_pct
      operator: gte
      value: 60
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ci-08-cpa-innovation-impact"
        category: "CPA Integration"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "ci-08-cpa-innovation-impact"
        category: "CPA Integration"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {cpa_innovation_impact_pct: 60}
    expect: {met: true, category: "CPA Integration"}
  - input: {}
    expect: {met: false, category: "CPA Integration"}
