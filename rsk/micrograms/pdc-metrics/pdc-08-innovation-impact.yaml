name: pdc-08-innovation-impact
description: "≥50 significant innovations annually with ≥20% adoption"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: innovations_annual
      operator: gte
      value: 50
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pdc-08-innovation-impact"
        category: "PDC Program Effectiveness"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pdc-08-innovation-impact"
        category: "PDC Program Effectiveness"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {innovations_annual: 50}
    expect: {met: true, category: "PDC Program Effectiveness"}
  - input: {}
    expect: {met: false, category: "PDC Program Effectiveness"}
