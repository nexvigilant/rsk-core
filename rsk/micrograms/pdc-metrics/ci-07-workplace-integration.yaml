name: ci-07-workplace-integration
description: "CPA workplace integration satisfaction ≥85%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: workplace_satisfaction_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ci-07-workplace-integration"
        category: "CPA Integration"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "ci-07-workplace-integration"
        category: "CPA Integration"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {workplace_satisfaction_pct: 85}
    expect: {met: true, category: "CPA Integration"}
  - input: {}
    expect: {met: false, category: "CPA Integration"}
