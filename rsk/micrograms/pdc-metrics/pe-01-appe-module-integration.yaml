name: pe-01-appe-module-integration
description: "APPE Foundation-Communication module ≥90%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: appe_module_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-01-appe-module-integration"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "pe-01-appe-module-integration"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {appe_module_pct: 90}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
