name: ir-01-toolkit-utilization
description: "Implementation toolkit utilization ≥90%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: toolkit_utilization_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ir-01-toolkit-utilization"
        category: "Infrastructure and Resource"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ir-01-toolkit-utilization"
        category: "Infrastructure and Resource"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {toolkit_utilization_pct: 90}
    expect: {met: true, category: "Infrastructure and Resource"}
  - input: {}
    expect: {met: false, category: "Infrastructure and Resource"}
