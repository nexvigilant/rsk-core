name: pe-05-duration-optimization
description: "Fellowship competency achievement ≥80% all tracks"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: duration_achievement_pct
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-05-duration-optimization"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pe-05-duration-optimization"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {duration_achievement_pct: 80}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
