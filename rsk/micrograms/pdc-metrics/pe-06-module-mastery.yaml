name: pe-06-module-mastery
description: "Fellowship module mastery ≥85%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: module_mastery_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-06-module-mastery"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "pe-06-module-mastery"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {module_mastery_pct: 85}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
