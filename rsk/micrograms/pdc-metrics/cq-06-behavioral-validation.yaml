name: cq-06-behavioral-validation
description: "Behavioral anchor validation rate ≥90%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: validation_rate_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "cq-06-behavioral-validation"
        category: "Compliance and Quality"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "cq-06-behavioral-validation"
        category: "Compliance and Quality"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {validation_rate_pct: 90}
    expect: {met: true, category: "Compliance and Quality"}
  - input: {}
    expect: {met: false, category: "Compliance and Quality"}
