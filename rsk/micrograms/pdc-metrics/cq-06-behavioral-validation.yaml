# MICROGRAM++ (upgraded 2026-04-23)
name: cq-06-behavioral-validation
version: 0.1.0
description: Behavioral anchor validation rate ≥90%
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Cq 06 Behavioral Validation
  subtitle: Behavioral anchor validation rate ≥90%
  icon: circle
  route: /vigilance/mg/cq-06-behavioral-validation
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/cq-06-behavioral-validation
  cli: rsk mcg run cq-06-behavioral-validation
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: validation_rate_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: cq-06-behavioral-validation
        category: Compliance and Quality
        met: true
        action: on_track
        frequency: weekly
    fail:
      type: return
      value:
        metric: cq-06-behavioral-validation
        category: Compliance and Quality
        met: false
        action: remediate
        frequency: weekly
tests:
  - input:
      validation_rate_pct: 90
    expect:
      met: true
      category: Compliance and Quality
  - input: {}
    expect:
      met: false
      category: Compliance and Quality
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
