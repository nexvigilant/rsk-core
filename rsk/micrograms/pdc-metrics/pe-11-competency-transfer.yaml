name: pe-11-competency-transfer
description: "Inter-program competency transfer ≥90%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: transfer_efficiency_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-11-competency-transfer"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pe-11-competency-transfer"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {transfer_efficiency_pct: 90}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
