name: cq-03-documentation-accuracy
description: "Competency documentation accuracy ≥95%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: documentation_accuracy_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "cq-03-documentation-accuracy"
        category: "Compliance and Quality"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "cq-03-documentation-accuracy"
        category: "Compliance and Quality"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {documentation_accuracy_pct: 95}
    expect: {met: true, category: "Compliance and Quality"}
  - input: {}
    expect: {met: false, category: "Compliance and Quality"}
