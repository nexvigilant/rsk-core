name: epx-06-executive-epa-readiness
description: "Executive EPA readiness ≥70% of L4+ participants"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: exec_epa_readiness_pct
      operator: gte
      value: 70
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-06-executive-epa-readiness"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "annual"
    fail:
      type: return
      value:
        metric: "epx-06-executive-epa-readiness"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "annual"

tests:
  - input: {exec_epa_readiness_pct: 70}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
