name: pe-09-smp-global-leadership
description: "SMP global leadership ≥80% with ≥70% Japan integration"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: global_leadership_pct
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-09-smp-global-leadership"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pe-09-smp-global-leadership"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {global_leadership_pct: 80}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
