name: ps-01-safety-knowledge
description: "Safety knowledge application rate ≥95%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: safety_application_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ps-01-safety-knowledge"
        category: "Patient Safety"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ps-01-safety-knowledge"
        category: "Patient Safety"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {safety_application_pct: 95}
    expect: {met: true, category: "Patient Safety"}
  - input: {}
    expect: {met: false, category: "Patient Safety"}
