name: di-02-digital-utilization
description: "Digital channel utilization ≥80%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: digital_utilization_pct
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "di-02-digital-utilization"
        category: "Digital Innovation"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "di-02-digital-utilization"
        category: "Digital Innovation"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {digital_utilization_pct: 80}
    expect: {met: true, category: "Digital Innovation"}
  - input: {}
    expect: {met: false, category: "Digital Innovation"}
