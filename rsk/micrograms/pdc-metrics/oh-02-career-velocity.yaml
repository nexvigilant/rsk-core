name: oh-02-career-velocity
description: "Career advancement 25% faster than traditional"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: advancement_premium_pct
      operator: gte
      value: 25
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "oh-02-career-velocity"
        category: "Organizational Health"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "oh-02-career-velocity"
        category: "Organizational Health"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {advancement_premium_pct: 25}
    expect: {met: true, category: "Organizational Health"}
  - input: {}
    expect: {met: false, category: "Organizational Health"}
