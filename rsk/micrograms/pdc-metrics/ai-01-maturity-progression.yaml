name: ai-01-maturity-progression
description: "AI maturity Phase 1 ≥90% achievement"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: ai_phase1_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ai-01-maturity-progression"
        category: "AI and Digital Transformation"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ai-01-maturity-progression"
        category: "AI and Digital Transformation"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {ai_phase1_pct: 90}
    expect: {met: true, category: "AI and Digital Transformation"}
  - input: {}
    expect: {met: false, category: "AI and Digital Transformation"}
