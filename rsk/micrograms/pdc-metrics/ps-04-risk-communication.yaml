name: ps-04-risk-communication
description: "Risk communication effectiveness ≥4.2/5.0"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: comm_effectiveness_score
      operator: gte
      value: 4.2
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ps-04-risk-communication"
        category: "Patient Safety"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ps-04-risk-communication"
        category: "Patient Safety"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {comm_effectiveness_score: 4.2}
    expect: {met: true, category: "Patient Safety"}
  - input: {}
    expect: {met: false, category: "Patient Safety"}
