name: pe-08-smp-track-effectiveness
description: "SMP four-track effectiveness ≥85%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: smp_track_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-08-smp-track-effectiveness"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "pe-08-smp-track-effectiveness"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {smp_track_pct: 85}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
