name: ca-02-foundation-comm-integration
description: "Foundation-Communication module integration ≥85%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: integration_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-02-foundation-comm-integration"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "biweekly"
    fail:
      type: return
      value:
        metric: "ca-02-foundation-comm-integration"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "biweekly"

tests:
  - input: {integration_pct: 85}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
