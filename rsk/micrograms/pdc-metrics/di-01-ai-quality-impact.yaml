      value:
        metric: di-01-ai-quality-impact
        category: Digital Innovation
        met: true
        action: on_track
        frequency: monthly
    fail:
      type: return
      value:
        metric: di-01-ai-quality-impact
        category: Digital Innovation
        met: false
        action: remediate
        frequency: monthly
tests:
  - input:
      ai_quality_improvement_pct: 35
    expect:
      met: true
      category: Digital Innovation
  - input: {}
    expect:
      met: false
      category: Digital Innovation
