name: pe-12-industry-standards-impact
description: "≥5 innovations adopted by external orgs annually"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: external_adoptions
      operator: gte
      value: 5
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pe-12-industry-standards-impact"
        category: "Program Excellence"
        met: true
        action: "on_track"
        frequency: "annual"
    fail:
      type: return
      value:
        metric: "pe-12-industry-standards-impact"
        category: "Program Excellence"
        met: false
        action: "remediate"
        frequency: "annual"

tests:
  - input: {external_adoptions: 5}
    expect: {met: true, category: "Program Excellence"}
  - input: {}
    expect: {met: false, category: "Program Excellence"}
