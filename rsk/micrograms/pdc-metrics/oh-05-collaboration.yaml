        metric: oh-05-collaboration
        category: Organizational Health
        met: true
        action: on_track
        frequency: quarterly
    fail:
      type: return
      value:
        metric: oh-05-collaboration
        category: Organizational Health
        met: false
        action: remediate
        frequency: quarterly
tests:
  - input:
      collaboration_index: 4
    expect:
      met: true
      category: Organizational Health
  - input: {}
    expect:
      met: false
      category: Organizational Health
