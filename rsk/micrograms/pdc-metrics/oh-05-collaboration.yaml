# MICROGRAM++ (upgraded 2026-04-23)
name: oh-05-collaboration
version: 0.1.0
description: Cross-functional collaboration index ≥4.0/5.0
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
