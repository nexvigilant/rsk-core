name: oh-05-collaboration
description: "Cross-functional collaboration index ≥4.0/5.0"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: collaboration_index
      operator: gte
      value: 4.0
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "oh-05-collaboration"
        category: "Organizational Health"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "oh-05-collaboration"
        category: "Organizational Health"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {collaboration_index: 4.0}
    expect: {met: true, category: "Organizational Health"}
  - input: {}
    expect: {met: false, category: "Organizational Health"}
