name: epx-12-global-epa-consistency
description: "Global EPA consistency ≥90% with ≥80% cultural adaptation"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: global_epa_consistency_pct
      operator: gte
      value: 90
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-12-global-epa-consistency"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "epx-12-global-epa-consistency"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {global_epa_consistency_pct: 90}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
