name: pdc-05-performance-premium
description: "PDC graduate performance premium ≥25% over traditional"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: performance_premium_pct
      operator: gte
      value: 25
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pdc-05-performance-premium"
        category: "PDC Program Effectiveness"
        met: true
        action: "on_track"
        frequency: "annual"
    fail:
      type: return
      value:
        metric: "pdc-05-performance-premium"
        category: "PDC Program Effectiveness"
        met: false
        action: "remediate"
        frequency: "annual"

tests:
  - input: {performance_premium_pct: 25}
    expect: {met: true, category: "PDC Program Effectiveness"}
  - input: {}
    expect: {met: false, category: "PDC Program Effectiveness"}
