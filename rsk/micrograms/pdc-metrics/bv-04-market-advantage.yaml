name: bv-04-market-advantage
description: "Market advantage index ≥1.3 vs baseline"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: market_advantage_index
      operator: gte
      value: 1.3
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "bv-04-market-advantage"
        category: "Business Value"
        met: true
        action: "on_track"
        frequency: "annual"
    fail:
      type: return
      value:
        metric: "bv-04-market-advantage"
        category: "Business Value"
        met: false
        action: "remediate"
        frequency: "annual"

tests:
  - input: {market_advantage_index: 1.3}
    expect: {met: true, category: "Business Value"}
  - input: {}
    expect: {met: false, category: "Business Value"}
