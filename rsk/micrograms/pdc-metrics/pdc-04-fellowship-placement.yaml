name: pdc-04-fellowship-placement
description: "Fellowship-to-professional placement ≥95% within 6 months"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: placement_rate_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pdc-04-fellowship-placement"
        category: "PDC Program Effectiveness"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pdc-04-fellowship-placement"
        category: "PDC Program Effectiveness"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {placement_rate_pct: 95}
    expect: {met: true, category: "PDC Program Effectiveness"}
  - input: {}
    expect: {met: false, category: "PDC Program Effectiveness"}
