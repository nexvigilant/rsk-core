name: epx-04-ai-gateway
description: "EPA 10 AI Gateway Phase 1 ≥95% success"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: ai_gateway_phase1_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "epx-04-ai-gateway"
        category: "EPA Progression"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "epx-04-ai-gateway"
        category: "EPA Progression"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {ai_gateway_phase1_pct: 95}
    expect: {met: true, category: "EPA Progression"}
  - input: {}
    expect: {met: false, category: "EPA Progression"}
