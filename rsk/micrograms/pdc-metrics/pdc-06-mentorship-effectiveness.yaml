name: pdc-06-mentorship-effectiveness
description: "Mentorship effectiveness score ≥4.5/5.0"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: mentorship_score
      operator: gte
      value: 4.5
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pdc-06-mentorship-effectiveness"
        category: "PDC Program Effectiveness"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pdc-06-mentorship-effectiveness"
        category: "PDC Program Effectiveness"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {mentorship_score: 4.5}
    expect: {met: true, category: "PDC Program Effectiveness"}
  - input: {}
    expect: {met: false, category: "PDC Program Effectiveness"}
