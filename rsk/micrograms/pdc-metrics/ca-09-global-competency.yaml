name: ca-09-global-competency
description: "Global competency achievement ≥85%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: global_competency_pct
      operator: gte
      value: 85
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-09-global-competency"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ca-09-global-competency"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {global_competency_pct: 85}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
