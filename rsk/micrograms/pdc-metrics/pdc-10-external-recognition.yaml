name: pdc-10-external-recognition
description: "≥10 significant external recognitions annually"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: recognitions_annual
      operator: gte
      value: 10
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pdc-10-external-recognition"
        category: "PDC Program Effectiveness"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pdc-10-external-recognition"
        category: "PDC Program Effectiveness"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {recognitions_annual: 10}
    expect: {met: true, category: "PDC Program Effectiveness"}
  - input: {}
    expect: {met: false, category: "PDC Program Effectiveness"}
