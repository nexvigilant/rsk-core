name: pdc-09-roi
description: "ROI on PDC investment ≥300% within 3 years"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: roi_pct
      operator: gte
      value: 300
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "pdc-09-roi"
        category: "PDC Program Effectiveness"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "pdc-09-roi"
        category: "PDC Program Effectiveness"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {roi_pct: 300}
    expect: {met: true, category: "PDC Program Effectiveness"}
  - input: {}
    expect: {met: false, category: "PDC Program Effectiveness"}
