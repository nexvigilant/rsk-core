name: ai-02-platform-engagement
description: "Digital platform engagement ≥75% with ≥85% satisfaction"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: platform_engagement_pct
      operator: gte
      value: 75
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ai-02-platform-engagement"
        category: "AI and Digital Transformation"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ai-02-platform-engagement"
        category: "AI and Digital Transformation"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {platform_engagement_pct: 75}
    expect: {met: true, category: "AI and Digital Transformation"}
  - input: {}
    expect: {met: false, category: "AI and Digital Transformation"}
