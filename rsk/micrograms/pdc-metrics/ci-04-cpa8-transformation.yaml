name: ci-04-cpa8-transformation
description: "CPA8 transformation project success ≥75%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: transformation_success_pct
      operator: gte
      value: 75
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ci-04-cpa8-transformation"
        category: "CPA Integration"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "ci-04-cpa8-transformation"
        category: "CPA Integration"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {transformation_success_pct: 75}
    expect: {met: true, category: "CPA Integration"}
  - input: {}
    expect: {met: false, category: "CPA Integration"}
