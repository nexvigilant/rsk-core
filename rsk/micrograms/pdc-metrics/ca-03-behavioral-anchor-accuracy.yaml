name: ca-03-behavioral-anchor-accuracy
description: "Behavioral anchor progression accuracy ≥95%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: anchor_accuracy_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ca-03-behavioral-anchor-accuracy"
        category: "Competency Architecture"
        met: true
        action: "on_track"
        frequency: "weekly"
    fail:
      type: return
      value:
        metric: "ca-03-behavioral-anchor-accuracy"
        category: "Competency Architecture"
        met: false
        action: "remediate"
        frequency: "weekly"

tests:
  - input: {anchor_accuracy_pct: 95}
    expect: {met: true, category: "Competency Architecture"}
  - input: {}
    expect: {met: false, category: "Competency Architecture"}
