# MICROGRAM++ (upgraded 2026-04-23)
name: cq-04-audit-recurrence
version: 0.1.0
description: PV audit finding recurrence rate ≤5%
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Cq 04 Audit Recurrence
  subtitle: PV audit finding recurrence rate ≤5%
  icon: circle
  route: /vigilance/mg/cq-04-audit-recurrence
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/cq-04-audit-recurrence
  cli: rsk mcg run cq-04-audit-recurrence
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: recurrence_rate_pct
      operator: lte
      value: 5
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: cq-04-audit-recurrence
        category: Compliance and Quality
        met: true
        action: on_track
        frequency: quarterly
    fail:
      type: return
      value:
        metric: cq-04-audit-recurrence
        category: Compliance and Quality
        met: false
        action: remediate
        frequency: quarterly
tests:
  - input:
      recurrence_rate_pct: 5
    expect:
      met: true
      category: Compliance and Quality
  - input: {}
    expect:
      met: false
      category: Compliance and Quality
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
