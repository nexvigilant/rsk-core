name: cq-04-audit-recurrence
description: "PV audit finding recurrence rate ≤5%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: recurrence_rate_pct
      operator: lte
      value: 5
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "cq-04-audit-recurrence"
        category: "Compliance and Quality"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "cq-04-audit-recurrence"
        category: "Compliance and Quality"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {recurrence_rate_pct: 5}
    expect: {met: true, category: "Compliance and Quality"}
  - input: {}
    expect: {met: false, category: "Compliance and Quality"}
