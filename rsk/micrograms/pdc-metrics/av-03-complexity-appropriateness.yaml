name: av-03-complexity-appropriateness
description: "Assessment complexity appropriateness ≥95%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: complexity_appropriate_pct
      operator: gte
      value: 95
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "av-03-complexity-appropriateness"
        category: "Assessment and Validation"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "av-03-complexity-appropriateness"
        category: "Assessment and Validation"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {complexity_appropriate_pct: 95}
    expect: {met: true, category: "Assessment and Validation"}
  - input: {}
    expect: {met: false, category: "Assessment and Validation"}
