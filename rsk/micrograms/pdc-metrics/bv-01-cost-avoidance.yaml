name: bv-01-cost-avoidance
description: "PV cost avoidance ≥$5M per 100 graduates"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cost_avoidance_millions
      operator: gte
      value: 5
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "bv-01-cost-avoidance"
        category: "Business Value"
        met: true
        action: "on_track"
        frequency: "quarterly"
    fail:
      type: return
      value:
        metric: "bv-01-cost-avoidance"
        category: "Business Value"
        met: false
        action: "remediate"
        frequency: "quarterly"

tests:
  - input: {cost_avoidance_millions: 5}
    expect: {met: true, category: "Business Value"}
  - input: {}
    expect: {met: false, category: "Business Value"}
