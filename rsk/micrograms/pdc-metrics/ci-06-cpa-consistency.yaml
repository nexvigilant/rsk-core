name: ci-06-cpa-consistency
description: "CPA performance variation ≤15%"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: condition
      variable: cpa_variation_pct
      operator: lte
      value: 15
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        metric: "ci-06-cpa-consistency"
        category: "CPA Integration"
        met: true
        action: "on_track"
        frequency: "monthly"
    fail:
      type: return
      value:
        metric: "ci-06-cpa-consistency"
        category: "CPA Integration"
        met: false
        action: "remediate"
        frequency: "monthly"

tests:
  - input: {cpa_variation_pct: 15}
    expect: {met: true, category: "CPA Integration"}
  - input: {}
    expect: {met: false, category: "CPA Integration"}
