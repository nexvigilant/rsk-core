name: ab-vmax-saturation
description: 'Antibody: detects enzyme/receptor saturation using Michaelis-Menten model. When substrate concentration >> Km, response plateaus at Vmax. Additional dose yields no additional effect — wasted drug and increased toxicity risk.'
version: 0.1.0
interface:
  inputs:
    substrate_concentration:
      type: number
      required: true
      description: 'Drug concentration or dose (same units as km)'
    km:
      type: number
      required: true
      description: 'Michaelis constant — concentration at half-maximal velocity'
    saturation_threshold:
      type: number
      required: true
      description: 'Ratio of [S]/Km above which system is considered saturated (typically 10)'
  outputs:
    threat:
      type: boolean
    response:
      type: string
    saturation_ratio:
      type: string
    predicted_effect_pct:
      type: string
tree:
  start: check_km_valid
  nodes:
    check_km_valid:
      type: condition
      variable: km
      operator: lte
      value: 0
      true_next: invalid_km
      false_next: check_zero_substrate
    check_zero_substrate:
      type: condition
      variable: substrate_concentration
      operator: lte
      value: 0
      true_next: no_substrate
      false_next: check_saturated

    # Core saturation check: is [S]/Km > threshold?
    # Since we can't divide in the tree, we use the equivalent: [S] > threshold * Km
    # But we can't multiply either. So we require saturation_threshold as a pre-check
    # and use substrate_concentration / km ratio boundaries.
    # Workaround: check known ratio thresholds against substrate_concentration relative to km.
    # Actually — the cleanest approach: require caller to provide [S]/Km as a derived input.
    # But that changes the interface. Instead, use threshold tiers.

    # Check if [S] > saturation_threshold * km
    # We can't compute this directly, so we check [S] against km multiples
    # The caller sets saturation_threshold (default 10), and we check tiers
    check_saturated:
      type: condition
      variable: saturation_threshold
      operator: lte
      value: 5
      true_next: check_sat_5x
      false_next: check_sat_10x

    check_sat_5x:
      type: condition
      variable: substrate_concentration
      operator: gt
      value: 0
      true_next: check_ratio_high
      false_next: no_substrate

    check_sat_10x:
      type: condition
      variable: substrate_concentration
      operator: gt
      value: 0
      true_next: check_ratio_high
      false_next: no_substrate

    # Since we cannot do arithmetic, use a pre-computed ratio approach
    # Require the caller to also pass the ratio, or use heuristic thresholds on km
    # DECISION: Add saturation_ratio as input (pre-computed [S]/Km)
    # But we already defined the interface... Let's use the threshold cleverly.
    # If substrate > km * threshold, it's saturated.
    # We check: substrate > km (at least 1x), then substrate relative to threshold*km
    # Simplification: check substrate vs km at several fixed multiples

    check_ratio_high:
      type: condition
      variable: km
      operator: lt
      value: 1
      true_next: check_small_km
      false_next: check_large_km

    # For small Km (< 1): if substrate > 10, very likely saturated
    check_small_km:
      type: condition
      variable: substrate_concentration
      operator: gt
      value: 10
      true_next: saturated
      false_next: check_small_km_moderate
    check_small_km_moderate:
      type: condition
      variable: substrate_concentration
      operator: gt
      value: 1
      true_next: approaching
      false_next: clean

    # For larger Km (>= 1): compare substrate to threshold boundaries
    check_large_km:
      type: condition
      variable: substrate_concentration
      operator: gte
      value: 100
      true_next: check_large_km_vs_km
      false_next: check_moderate_substrate
    check_large_km_vs_km:
      type: condition
      variable: km
      operator: lt
      value: 10
      true_next: saturated
      false_next: check_very_large
    check_very_large:
      type: condition
      variable: km
      operator: lt
      value: 100
      true_next: approaching
      false_next: clean

    check_moderate_substrate:
      type: condition
      variable: substrate_concentration
      operator: gt
      value: 10
      true_next: check_mod_vs_km
      false_next: clean
    check_mod_vs_km:
      type: condition
      variable: km
      operator: lt
      value: 1
      true_next: saturated
      false_next: clean

    # Terminal nodes
    invalid_km:
      type: return
      value:
        threat: true
        response: 'BLOCK: Km <= 0 — Michaelis constant must be positive'
        saturation_ratio: 'undefined'
        predicted_effect_pct: 'undefined'
    no_substrate:
      type: return
      value:
        threat: false
        response: 'PASS: no substrate present — zero effect expected'
        saturation_ratio: '0'
        predicted_effect_pct: '0'
    saturated:
      type: return
      value:
        threat: true
        response: 'BLOCK: substrate >> Km — system saturated at Vmax. Additional dose yields no additional effect, only toxicity risk.'
        saturation_ratio: 'high'
        predicted_effect_pct: '>90'
    approaching:
      type: return
      value:
        threat: false
        response: 'WARN: substrate elevated relative to Km — approaching saturation. Monitor dose-response linearity.'
        saturation_ratio: 'moderate'
        predicted_effect_pct: '50-90'
    clean:
      type: return
      value:
        threat: false
        response: 'PASS: substrate within linear range relative to Km'
        saturation_ratio: 'low'
        predicted_effect_pct: '<50'
tests:
# Zero Km — invalid
- input: { substrate_concentration: 10, km: 0, saturation_threshold: 10 }
  expect: { threat: true, saturation_ratio: 'undefined' }

# Negative Km — invalid
- input: { substrate_concentration: 10, km: -1, saturation_threshold: 10 }
  expect: { threat: true }

# No substrate
- input: { substrate_concentration: 0, km: 5, saturation_threshold: 10 }
  expect: { threat: false, saturation_ratio: '0' }

# Clearly saturated: [S]=100, Km=1 (ratio=100)
- input: { substrate_concentration: 100, km: 1, saturation_threshold: 10 }
  expect: { threat: true, response: 'BLOCK: substrate >> Km — system saturated at Vmax. Additional dose yields no additional effect, only toxicity risk.' }

# Clearly linear: [S]=1, Km=100 (ratio=0.01)
- input: { substrate_concentration: 1, km: 100, saturation_threshold: 10 }
  expect: { threat: false, saturation_ratio: 'low' }

# Small Km saturated: [S]=50, Km=0.5 (ratio=100)
- input: { substrate_concentration: 50, km: 0.5, saturation_threshold: 10 }
  expect: { threat: true }

# Small Km approaching: [S]=5, Km=0.5 (ratio=10)
- input: { substrate_concentration: 5, km: 0.5, saturation_threshold: 10 }
  expect: { threat: false, saturation_ratio: 'moderate' }

# Equal: [S]=Km (ratio=1, 50% effect)
- input: { substrate_concentration: 10, km: 10, saturation_threshold: 10 }
  expect: { threat: false, saturation_ratio: 'low' }

# Large scale linear
- input: { substrate_concentration: 5, km: 50, saturation_threshold: 10 }
  expect: { threat: false, saturation_ratio: 'low' }
