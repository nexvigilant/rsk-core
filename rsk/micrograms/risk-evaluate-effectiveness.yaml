# MICROGRAM++ (upgraded 2026-04-23)
name: risk-evaluate-effectiveness
version: 0.1.0
description: Evaluate effectiveness of implemented risk mitigation measures
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Risk Evaluate Effectiveness
  subtitle: Evaluate effectiveness of implemented risk mitigation measures
  icon: circle
  route: /vigilance/mg/risk-evaluate-effectiveness
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/risk-evaluate-effectiveness
  cli: rsk mcg run risk-evaluate-effectiveness
  auth: none
  rate_limit: 600/min
tree:
  start: validate_monitoring_data
  nodes:
    validate_monitoring_data:
      type: condition
      variable: monitoring_data_collected
      operator: eq
      value: true
      true_next: check_effectiveness_metrics
      false_next: evaluation_unknown
    check_effectiveness_metrics:
      type: condition
      variable: adverse_event_reduction_percent
      operator: gte
      value: 50
      true_next: highly_effective
      false_next: check_moderate_effectiveness
    check_moderate_effectiveness:
      type: condition
      variable: adverse_event_reduction_percent
      operator: gte
      value: 20
      true_next: moderately_effective
      false_next: minimally_effective
    highly_effective:
      type: return
      value:
        effectiveness_rating: high
        risk_reduction_achieved: true
        continue_current_plan: true
        plan_modification_needed: false
        evaluation_compliant: true
    moderately_effective:
      type: return
      value:
        effectiveness_rating: moderate
        risk_reduction_achieved: true
        continue_current_plan: true
        plan_modification_needed: true
        evaluation_compliant: true
    minimally_effective:
      type: return
      value:
        effectiveness_rating: low
        risk_reduction_achieved: false
        continue_current_plan: false
        plan_modification_needed: true
        evaluation_compliant: true
    evaluation_unknown:
      type: return
      value:
        effectiveness_rating: null
        risk_reduction_achieved: null
        continue_current_plan: null
        plan_modification_needed: null
        evaluation_compliant: false
tests:
  - input:
      monitoring_data_collected: true
      adverse_event_reduction_percent: 75
    expect:
      effectiveness_rating: high
      risk_reduction_achieved: true
      plan_modification_needed: false
  - input:
      monitoring_data_collected: true
      adverse_event_reduction_percent: 35
    expect:
      effectiveness_rating: moderate
      plan_modification_needed: true
  - input:
      monitoring_data_collected: true
      adverse_event_reduction_percent: 10
    expect:
      effectiveness_rating: low
      risk_reduction_achieved: false
  - input: {}
    expect:
      effectiveness_rating: null
      evaluation_compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
