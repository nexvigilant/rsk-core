# MICROGRAM++ (upgraded 2026-04-23)
name: d02-s003-severity-grading
version: 0.1.0
description: "Grade ADR severity: Grade 1 mild, Grade 2 moderate, Grade 3 severe, Grade 4 life-threatening, Grade 5 fatal"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: D02 S003 Severity Grading
  subtitle: "Grade ADR severity: Grade 1 mild, Grade 2 moderate, Grade 3 severe, Grade 4 life-threatening, Grade 5 fatal"
  icon: circle
  route: /vigilance/mg/d02-s003-severity-grading
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/d02-s003-severity-grading
  cli: rsk mcg run d02-s003-severity-grading
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    yes:
      type: return
      value:
        severe_or_higher: true
    no:
      type: return
      value:
        mild_or_moderate: false
    check:
      type: condition
      variable: severity_grade
      operator: gte
      value: 3
      true_next: yes
      false_next: no
tests:
  - input:
      severity_grade: 3
    expect:
      severe_or_higher: true
  - input:
      severity_grade: 4
    expect:
      severe_or_higher: true
  - input:
      severity_grade: 2
    expect:
      mild_or_moderate: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
