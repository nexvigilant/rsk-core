# MICROGRAM++ (upgraded 2026-04-23)
name: session-scorecard
version: 0.1.0
description: "Product Chain Scorecard: scores a session (or any work unit) on how far it advanced through the T1 primitive product chain. L0=Void identified, L1=State measured, L2=Compared, L3=Acted, L4=Persisted, L5=Shipped. Self-similar across scales: session, chain, directive, strategy."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: void_identified
    type: bool
    required: false
    description: "L0: Did the work identify what is missing? (∅)"
  - name: state_measured
    type: bool
    required: false
    description: "L1: Did the work measure current observed state? (ς)"
  - name: compared_to_goal
    type: bool
    required: false
    description: "L2: Did the work compare measured state to expected/goal? (κ)"
  - name: action_taken
    type: bool
    required: false
    description: "L3: Did the work change code, config, or system state? (→)"
  - name: change_persisted
    type: bool
    required: false
    description: "L4: Was the change committed, saved, or artifact-persisted? (π)"
  - name: change_shipped
    type: bool
    required: false
    description: "L5: Was the change deployed, published, or made irreversible? (∝)"
outputs:
  - name: level
    type: int
  - name: level_name
    type: string
  - name: primitive
    type: string
  - name: chain
    type: string
  - name: verdict
    type: string
  - name: scorecard_note
    type: string
interface:
  inputs:
    void_identified:
      type: bool
      required: false
      description: "L0: Did the work identify what is missing? (∅)"
    state_measured:
      type: bool
      required: false
      description: "L1: Did the work measure current observed state? (ς)"
    compared_to_goal:
      type: bool
      required: false
      description: "L2: Did the work compare measured state to expected/goal? (κ)"
    action_taken:
      type: bool
      required: false
      description: "L3: Did the work change code, config, or system state? (→)"
    change_persisted:
      type: bool
      required: false
      description: "L4: Was the change committed, saved, or artifact-persisted? (π)"
    change_shipped:
      type: bool
      required: false
      description: "L5: Was the change deployed, published, or made irreversible? (∝)"
  outputs:
    level:
      type: int
      description: Product chain depth reached (0-5)
    level_name:
      type: string
      description: Primitive name at the reached level
    primitive:
      type: string
      description: T1 symbol at the reached level
    chain:
      type: string
      description: Full product chain expression up to reached level
    verdict:
      type: string
      description: Golf-edict aligned verdict
    scorecard_note:
      type: string
      description: What the score means at this level
ui:
  title: Session Scorecard
  subtitle: "Product Chain Scorecard: scores a session (or any work unit) on how far it advanced through the T1 primitive product chain. L0=Void identified, L1=State measured, L2=Compared, L3=Acted, L4=Persisted, L5=Shipped. Self-similar across scales: session, chain, directive, strategy."
  icon: circle
  route: /vigilance/mg/session-scorecard
  steps:
    - field: void_identified
      label: void identified
      help: "L0: Did the work identify what is missing? (∅)"
      widget: toggle
      placeholder: null
    - field: state_measured
      label: state measured
      help: "L1: Did the work measure current observed state? (ς)"
      widget: toggle
      placeholder: null
    - field: compared_to_goal
      label: compared to goal
      help: "L2: Did the work compare measured state to expected/goal? (κ)"
      widget: toggle
      placeholder: null
    - field: action_taken
      label: action taken
      help: "L3: Did the work change code, config, or system state? (→)"
      widget: toggle
      placeholder: null
    - field: change_persisted
      label: change persisted
      help: "L4: Was the change committed, saved, or artifact-persisted? (π)"
      widget: toggle
      placeholder: null
    - field: change_shipped
      label: change shipped
      help: "L5: Was the change deployed, published, or made irreversible? (∝)"
      widget: toggle
      placeholder: null
  result:
    template: "level: {{level}} — level_name: {{level_name}} — primitive: {{primitive}} — chain: {{chain}} — verdict: {{verdict}} — scorecard_note: {{scorecard_note}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/session-scorecard
  cli: rsk mcg run session-scorecard
  auth: none
  rate_limit: 600/min
tree:
  start: check_void
  nodes:
    check_void:
      type: condition
      variable: void_identified
      operator: eq
      value: true
      true_next: check_state
      false_next: level_minus1
    level_minus1:
      type: return
      value:
        level: -1
        level_name: BLANK
        primitive: "-"
        chain: (empty)
        verdict: no_scorecard
        scorecard_note: "No work detected. The session produced nothing — not even an observation. DQ: failure to return a scorecard."
    check_state:
      type: condition
      variable: state_measured
      operator: eq
      value: true
      true_next: check_compare
      false_next: level_0
    level_0:
      type: return
      value:
        level: 0
        level_name: VOID
        primitive: ∅
        chain: ∅
        verdict: void_only
        scorecard_note: Gap identified but not measured. The void was named but state was not observed. Like reading the course map without walking the holes.
    check_compare:
      type: condition
      variable: compared_to_goal
      operator: eq
      value: true
      true_next: check_action
      false_next: level_1
    level_1:
      type: return
      value:
        level: 1
        level_name: STATE
        primitive: ς
        chain: ς(∅)
        verdict: observed
        scorecard_note: State measured honestly. G1 satisfied — the ball was played as it lies. But no comparison to goal means no direction. A practice swing.
    check_action:
      type: condition
      variable: action_taken
      operator: eq
      value: true
      true_next: check_persist
      false_next: level_2
    level_2:
      type: return
      value:
        level: 2
        level_name: COMPARE
        primitive: κ
        chain: κ(ς(∅))
        verdict: audit_complete
        scorecard_note: Measured and compared. Valid audit. The lie was assessed and the target identified. No stroke taken — observation IS the deliverable if this was an audit session.
    check_persist:
      type: condition
      variable: change_persisted
      operator: eq
      value: true
      true_next: check_ship
      false_next: level_3
    level_3:
      type: return
      value:
        level: 3
        level_name: ACT
        primitive: →
        chain: →(κ(ς(∅)))
        verdict: spark
        scorecard_note: "Action taken but not persisted. Energy without persistence — a spark. The stroke was taken but not recorded on the scorecard. G1+ρ violation: strokes exist that the scorecard does not reflect."
    check_ship:
      type: condition
      variable: change_shipped
      operator: eq
      value: true
      true_next: level_5
      false_next: level_4
    level_4:
      type: return
      value:
        level: 4
        level_name: PERSIST
        primitive: π
        chain: π(→(κ(ς(∅))))
        verdict: committed
        scorecard_note: Changed and committed. The scorecard is signed. Full internal round complete. Ready for deployment but not yet irreversible — the score is posted but the tournament is not over.
    level_5:
      type: return
      value:
        level: 5
        level_name: SHIP
        primitive: ∝
        chain: ∝(π(→(κ(ς(∅)))))
        verdict: shipped
        scorecard_note: Deployed and irreversible. Full product chain complete. The round is in the books. ∝ means it cannot be taken back — published to hub, merged to main, released to production.
tests:
  - input:
      void_identified: true
      state_measured: true
      compared_to_goal: true
      action_taken: true
      change_persisted: true
      change_shipped: true
    expect:
      level: 5
      level_name: SHIP
      primitive: ∝
      verdict: shipped
  - input:
      void_identified: true
      state_measured: true
      compared_to_goal: true
      action_taken: true
      change_persisted: false
      change_shipped: false
    expect:
      level: 3
      level_name: ACT
      primitive: →
      verdict: spark
  - input:
      void_identified: true
      state_measured: true
      compared_to_goal: true
      action_taken: false
      change_persisted: false
      change_shipped: false
    expect:
      level: 2
      level_name: COMPARE
      primitive: κ
      verdict: audit_complete
  - input:
      void_identified: true
      state_measured: true
      compared_to_goal: true
      action_taken: true
      change_persisted: true
      change_shipped: false
    expect:
      level: 4
      level_name: PERSIST
      primitive: π
      verdict: committed
  - input:
      void_identified: true
      state_measured: false
    expect:
      level: 0
      level_name: VOID
      primitive: ∅
      verdict: void_only
  - input:
      void_identified: false
    expect:
      level: -1
      level_name: BLANK
      primitive: "-"
      verdict: no_scorecard
  - input: {}
    expect:
      level: -1
      level_name: BLANK
      primitive: "-"
      verdict: no_scorecard
  - input:
      void_identified: true
      state_measured: true
      compared_to_goal: false
    expect:
      level: 1
      level_name: STATE
      primitive: ς
      verdict: observed
  - input:
      void_identified: true
      state_measured: true
      compared_to_goal: true
      action_taken: false
      change_persisted: true
      change_shipped: false
    expect:
      level: 2
      level_name: COMPARE
      primitive: κ
      verdict: audit_complete
  - input:
      void_identified: true
      state_measured: true
      compared_to_goal: true
      action_taken: true
      change_persisted: false
      change_shipped: true
    expect:
      level: 3
      level_name: ACT
      primitive: →
      verdict: spark
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - level
    - level_name
    - primitive
    - chain
    - verdict
    - scorecard_note
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
