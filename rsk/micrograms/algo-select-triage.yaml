# MICROGRAM++ (upgraded 2026-04-23)
name: algo-select-triage
version: 0.1.0
description: "Algorithm 12 (SELECT): Differential survival. Applies fitness boundary, measures recurrence frequency (ν), returns persist/watch/decay verdict."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: recurrence_count
    type: integer
    required: true
    description: ""
  - name: total_opportunities
    type: integer
    required: true
    description: ""
  - name: fitness_threshold
    type: float
    required: true
    description: ""
  - name: produces_correct_output
    type: boolean
    required: true
    description: ""
outputs:
  - name: verdict
    type: string
  - name: algorithm
    type: string
interface:
  inputs:
    recurrence_count:
      type: integer
      required: true
    total_opportunities:
      type: integer
      required: true
    fitness_threshold:
      type: float
      required: true
    produces_correct_output:
      type: boolean
      required: true
  outputs:
    verdict:
      type: string
    algorithm:
      type: string
ui:
  title: Algo Select Triage
  subtitle: "Algorithm 12 (SELECT): Differential survival. Applies fitness boundary, measures recurrence frequency (ν), returns persist/watch/decay verdict."
  icon: circle
  route: /vigilance/mg/algo-select-triage
  steps:
    - field: recurrence_count
      label: recurrence count
      help: Enter recurrence_count
      widget: number
      placeholder: null
    - field: total_opportunities
      label: total opportunities
      help: Enter total_opportunities
      widget: number
      placeholder: null
    - field: fitness_threshold
      label: fitness threshold
      help: Enter fitness_threshold
      widget: text
      placeholder: null
    - field: produces_correct_output
      label: produces correct output
      help: Enter produces_correct_output
      widget: toggle
      placeholder: null
  result:
    template: "verdict: {{verdict}} — algorithm: {{algorithm}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/algo-select-triage
  cli: rsk mcg run algo-select-triage
  auth: none
  rate_limit: 600/min
tree:
  start: check_correctness
  nodes:
    check_correctness:
      type: condition
      variable: produces_correct_output
      operator: eq
      value: false
      true_next: decay_broken
      false_next: check_opportunities
    check_opportunities:
      type: condition
      variable: total_opportunities
      operator: lte
      value: 0
      true_next: decay_no_data
      false_next: check_high_frequency
    check_high_frequency:
      type: condition
      variable: recurrence_count
      operator: gte
      value: 50
      true_next: check_high_against_threshold
      false_next: check_mid_frequency
    check_high_against_threshold:
      type: condition
      variable: fitness_threshold
      operator: lte
      value: 0.5
      true_next: persist
      false_next: check_very_high
    check_very_high:
      type: condition
      variable: recurrence_count
      operator: gte
      value: 80
      true_next: persist
      false_next: watch
    check_mid_frequency:
      type: condition
      variable: recurrence_count
      operator: gte
      value: 40
      true_next: watch
      false_next: check_low
    check_low:
      type: condition
      variable: recurrence_count
      operator: gte
      value: 10
      true_next: check_lenient_threshold
      false_next: decay
    check_lenient_threshold:
      type: condition
      variable: fitness_threshold
      operator: lte
      value: 0.1
      true_next: persist
      false_next: decay
    persist:
      type: return
      value:
        verdict: persist
        algorithm: "SELECT: ν(∃ at ∂_fitness) → π — frequency above threshold, item persists"
    watch:
      type: return
      value:
        verdict: watch
        algorithm: "SELECT: ν near ∂_fitness — within margin of threshold, monitor next generation"
    decay:
      type: return
      value:
        verdict: decay
        algorithm: "SELECT: ν(∃ at ∂_fitness) → ∅ — frequency below threshold, item decays"
    decay_broken:
      type: return
      value:
        verdict: decay
        algorithm: "SELECT: κ(output, expected) fails — incorrect output, immediate decay"
    decay_no_data:
      type: return
      value:
        verdict: decay
        algorithm: "SELECT: N(opportunities) = 0 — no data to measure ν"
tests:
  - input:
      recurrence_count: 80
      total_opportunities: 100
      fitness_threshold: 0.5
      produces_correct_output: true
    expect:
      verdict: persist
  - input:
      recurrence_count: 5
      total_opportunities: 100
      fitness_threshold: 0.5
      produces_correct_output: true
    expect:
      verdict: decay
  - input:
      recurrence_count: 42
      total_opportunities: 100
      fitness_threshold: 0.5
      produces_correct_output: true
    expect:
      verdict: watch
  - input:
      recurrence_count: 90
      total_opportunities: 100
      fitness_threshold: 0.1
      produces_correct_output: false
    expect:
      verdict: decay
  - input:
      recurrence_count: 0
      total_opportunities: 0
      fitness_threshold: 0.5
      produces_correct_output: true
    expect:
      verdict: decay
  - input:
      recurrence_count: 50
      total_opportunities: 100
      fitness_threshold: 0.5
      produces_correct_output: true
    expect:
      verdict: persist
  - input:
      recurrence_count: 15
      total_opportunities: 100
      fitness_threshold: 0.05
      produces_correct_output: true
    expect:
      verdict: persist
  - input: {}
    expect:
      verdict: decay
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - verdict
    - algorithm
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
