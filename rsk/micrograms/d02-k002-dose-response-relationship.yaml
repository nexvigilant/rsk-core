  route: /vigilance/mg/d02-k002-dose-response-relationship
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/d02-k002-dose-response-relationship
  cli: rsk mcg run d02-k002-dose-response-relationship
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    yes:
      type: return
      value:
        dose_dependent: true
    no:
      type: return
      value:
        dose_independent: false
    check:
      type: condition
      variable: dose_correlation
      operator: gte
      value: 1
      true_next: yes
      false_next: no
tests:
  - input:
      dose_correlation: 1
    expect:
      dose_dependent: true
  - input:
      dose_correlation: 2
    expect:
      dose_dependent: true
  - input:
      dose_correlation: 0
    expect:
      dose_independent: false
