# MICROGRAM++ (upgraded 2026-04-23)
name: d02-k002-dose-response-relationship
version: 0.1.0
description: Determine if an ADR follows a dose-response relationship (Type A) or is idiosyncratic (Type B)
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: D02 K002 Dose Response Relationship
  subtitle: Determine if an ADR follows a dose-response relationship (Type A) or is idiosyncratic (Type B)
