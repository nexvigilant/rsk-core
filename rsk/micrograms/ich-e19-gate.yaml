name: ich-e19-gate
description: "ICH E19 compliance: Selective Safety Data"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "safety_subset"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH E19"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH E19"
        compliant: false
        action: "remediate"
        gap: "safety_subset"

tests:
  - input: {"safety_subset": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
