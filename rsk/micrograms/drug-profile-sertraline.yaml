name: drug-profile-sertraline
description: 'Safety triage for sertraline: PRR-based signal routing (Type C)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    signal:
      type: return
      value:
        signal: true
        action: investigate
        harm_type: C
        expected_prr: 3.3
        drug: sertraline
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
    no_signal:
      type: return
      value:
        action: monitor
        harm_type: C
        drug: sertraline
        expected_prr: 3.3
        signal: false
tests:
- input:
    prr: 3.3
  expect:
    drug: sertraline
    signal: true
- input:
    prr: 0.5
  expect:
    drug: sertraline
    signal: false
- input: {}
  expect:
    drug: sertraline
    signal: false
- input:
    prr: 1.999
  expect:
    expected_prr: 3.3
    action: monitor
    signal: false
    drug: sertraline
    harm_type: C
- input:
    prr: 2.001
  expect:
    harm_type: C
    signal: true
    expected_prr: 3.3
    drug: sertraline
    action: investigate
interface: null
primitive_signature: null
