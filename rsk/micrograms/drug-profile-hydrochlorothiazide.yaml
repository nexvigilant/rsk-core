name: drug-profile-hydrochlorothiazide
description: 'Safety triage for hydrochlorothiazide: PRR-based signal routing (Type A)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        expected_prr: 1.6
        drug: hydrochlorothiazide
        signal: true
        harm_type: A
        action: investigate
    no_signal:
      type: return
      value:
        drug: hydrochlorothiazide
        signal: false
        harm_type: A
        expected_prr: 1.6
        action: monitor
tests:
- input:
    prr: 1.6
  expect:
    drug: hydrochlorothiazide
    signal: false
- input:
    prr: 0.5
  expect:
    drug: hydrochlorothiazide
    signal: false
- input: {}
  expect:
    drug: hydrochlorothiazide
    signal: false
- input:
    prr: 1.999
  expect:
    drug: hydrochlorothiazide
    harm_type: A
    signal: false
    expected_prr: 1.6
    action: monitor
- input:
    prr: 2.001
  expect:
    harm_type: A
    signal: true
    action: investigate
    expected_prr: 1.6
    drug: hydrochlorothiazide
interface: null
primitive_signature: null
