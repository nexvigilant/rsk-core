# MICROGRAM++ (upgraded 2026-04-23)
name: drug-profile-hydrochlorothiazide
version: 0.1.0
description: "Safety triage for hydrochlorothiazide: PRR-based signal routing (Type A)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Profile Hydrochlorothiazide
  subtitle: "Safety triage for hydrochlorothiazide: PRR-based signal routing (Type A)"
  icon: circle
  route: /vigilance/mg/drug-profile-hydrochlorothiazide
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-profile-hydrochlorothiazide
  cli: rsk mcg run drug-profile-hydrochlorothiazide
  auth: none
  rate_limit: 600/min
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        expected_prr: 1.6
        drug: hydrochlorothiazide
        signal: true
        harm_type: A
        action: investigate
    no_signal:
      type: return
      value:
        drug: hydrochlorothiazide
        signal: false
        harm_type: A
        expected_prr: 1.6
        action: monitor
tests:
  - input:
      prr: 1.6
    expect:
      drug: hydrochlorothiazide
      signal: false
  - input:
      prr: 0.5
    expect:
      drug: hydrochlorothiazide
      signal: false
  - input: {}
    expect:
      drug: hydrochlorothiazide
      signal: false
  - input:
      prr: 1.999
    expect:
      drug: hydrochlorothiazide
      harm_type: A
      signal: false
      expected_prr: 1.6
      action: monitor
  - input:
      prr: 2.001
    expect:
      harm_type: A
      signal: true
      action: investigate
      expected_prr: 1.6
      drug: hydrochlorothiazide
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
