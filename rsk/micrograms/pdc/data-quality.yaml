name: data-quality
description: "Domain 7: Assess data quality dimension and route to appropriate validation action — completeness, accuracy, consistency, timeliness, integrity."
version: 0.1.0
interface:
  inputs:
    quality_dimension:
      type: string
      required: false
  outputs:
    action_if_low:
      type: string
    ai_assist:
      type: string
    composite_target:
      type: string
    definition:
      type: string
    dimension:
      type: string
    framework:
      type: string
    metric:
      type: string
    target:
      type: string
    validation:
      type: string
tree:
  start: check_dimension
  nodes:
    check_dimension:
      type: condition
      variable: quality_dimension
      operator: eq
      value: completeness
      true_next: completeness
      false_next: check_accuracy
    check_accuracy:
      type: condition
      variable: quality_dimension
      operator: eq
      value: accuracy
      true_next: accuracy
      false_next: check_consistency
    check_consistency:
      type: condition
      variable: quality_dimension
      operator: eq
      value: consistency
      true_next: consistency
      false_next: check_timeliness
    check_timeliness:
      type: condition
      variable: quality_dimension
      operator: eq
      value: timeliness
      true_next: timeliness
      false_next: check_integrity
    check_integrity:
      type: condition
      variable: quality_dimension
      operator: eq
      value: integrity
      true_next: integrity
      false_next: all_dimensions
    completeness:
      type: return
      value:
        dimension: COMPLETENESS
        definition: "all required and relevant data fields populated"
        validation: "mandatory field checks, optional field optimization, follow-up triggers"
        metric: "percent of required fields populated per case"
        target: ">95% core fields, 100% regulatory minimum"
        ai_assist: "auto-detection of missing fields, predictive follow-up prioritization, data enrichment"
        action_if_low: "targeted follow-up request, source re-review, data enrichment pipeline"
    accuracy:
      type: return
      value:
        dimension: ACCURACY
        definition: "data correctly represents source information and clinical reality"
        validation: "source verification, clinical review, coding verification, expert audit"
        metric: "error rate per 100 data elements"
        target: "<2% error rate across all data elements"
        ai_assist: "NLP source-to-field verification, coding accuracy scoring, anomaly detection"
        action_if_low: "source re-verification, coding review, assessor calibration"
    consistency:
      type: return
      value:
        dimension: CONSISTENCY
        definition: "data internally coherent and consistent across related fields and systems"
        validation: "cross-field checks, temporal logic, coding hierarchy validation, cross-system comparison"
        metric: "inconsistency rate per case"
        target: "<1% cross-field inconsistency rate"
        ai_assist: "automated consistency rules, cross-reference validation, duplicate detection"
        action_if_low: "systematic rule review, data reconciliation, system harmonization"
    timeliness:
      type: return
      value:
        dimension: TIMELINESS
        definition: "data processed and submitted within regulatory and organizational timelines"
        validation: "deadline tracking, processing time monitoring, bottleneck identification"
        metric: "percent of cases meeting regulatory deadlines"
        target: "100% regulatory deadline compliance"
        ai_assist: "predictive deadline alerts, workflow optimization, resource allocation"
        action_if_low: "process bottleneck analysis, resource reallocation, workflow redesign"
    integrity:
      type: return
      value:
        dimension: INTEGRITY
        definition: "data protected from unauthorized modification, corruption, or loss"
        validation: "audit trails, access controls, backup verification, encryption checks"
        metric: "zero unauthorized modifications, 100% backup success"
        target: "zero integrity violations"
        ai_assist: "anomalous access detection, corruption monitoring, backup verification"
        action_if_low: "security audit, access review, backup protocol review, incident investigation"
    all_dimensions:
      type: return
      value:
        dimension: ALL
        framework: "completeness, accuracy, consistency, timeliness, integrity"
        composite_target: "quality score combining all 5 dimensions"
        ai_assist: "comprehensive quality dashboard, predictive quality modeling, trend analysis"
tests:
- input:
    quality_dimension: completeness
  expect:
    dimension: COMPLETENESS
    target: ">95% core fields, 100% regulatory minimum"
- input:
    quality_dimension: accuracy
  expect:
    dimension: ACCURACY
    target: "<2% error rate across all data elements"
- input:
    quality_dimension: consistency
  expect:
    dimension: CONSISTENCY
- input:
    quality_dimension: timeliness
  expect:
    dimension: TIMELINESS
    target: "100% regulatory deadline compliance"
- input:
    quality_dimension: integrity
  expect:
    dimension: INTEGRITY
    target: "zero integrity violations"
- input: {}
  expect:
    dimension: ALL
