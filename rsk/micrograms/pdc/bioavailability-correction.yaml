name: bioavailability-correction
description: "Estimate true adverse event count by applying underreporting correction factor. ADME Bioavailability (F) analog — fraction of real events that survive intake to reach the signal detection pipeline. FDA estimates F = 1-10% for spontaneous reporting."
version: 0.1.0
primitive_signature:
  dominant: frequency
  expression: "ν(observed) / F = ν(estimated_true)"
  primes: [frequency, quantity, boundary]
  arguments:
    - observed_count
    - reporting_fraction
interface:
  inputs:
    observed_count:
      type: int
      required: true
      description: "Number of adverse event reports observed in database"
    reporting_fraction:
      type: float
      required: false
      description: "Estimated reporting fraction (default 0.05 = 5%, FDA midpoint estimate)"
    source_type:
      type: string
      required: false
      description: "Report source: spontaneous, clinical_trial, literature, registry"
  outputs:
    reporting_fraction_used:
      type: float
    correction_factor:
      type: float
    confidence:
      type: string
    source_adjustment:
      type: string
tree:
  start: check_source
  nodes:
    check_source:
      type: condition
      variable: source_type
      operator: eq
      value: clinical_trial
      true_next: clinical_trial_source
      false_next: check_registry

    clinical_trial_source:
      type: return
      value:
        reporting_fraction_used: 0.90
        correction_factor: 1.11
        confidence: HIGH
        source_adjustment: "Clinical trial — near-complete reporting (F=90%)"

    check_registry:
      type: condition
      variable: source_type
      operator: eq
      value: registry
      true_next: registry_source
      false_next: check_literature

    registry_source:
      type: return
      value:
        reporting_fraction_used: 0.50
        correction_factor: 2.0
        confidence: MODERATE
        source_adjustment: "Patient registry — moderate completeness (F=50%)"

    check_literature:
      type: condition
      variable: source_type
      operator: eq
      value: literature
      true_next: literature_source
      false_next: check_custom_fraction

    literature_source:
      type: return
      value:
        reporting_fraction_used: 0.02
        correction_factor: 50.0
        confidence: LOW
        source_adjustment: "Literature case reports — severe underreporting (F=2%)"

    check_custom_fraction:
      type: condition
      variable: reporting_fraction
      operator: is_not_null
      value: null
      true_next: use_custom
      false_next: use_default

    use_custom:
      type: return
      value:
        confidence: MODERATE
        source_adjustment: "Custom reporting fraction provided"

    use_default:
      type: return
      value:
        reporting_fraction_used: 0.05
        correction_factor: 20.0
        confidence: LOW
        source_adjustment: "Default spontaneous reporting (F=5%, FDA midpoint)"

tests:
- name: spontaneous reporting default — 150 observed at 5% F
  input:
    observed_count: 150
  expect:
    reporting_fraction_used: 0.05
    correction_factor: 20.0
    confidence: LOW

- name: clinical trial — near-complete capture
  input:
    observed_count: 50
    source_type: clinical_trial
  expect:
    reporting_fraction_used: 0.90
    correction_factor: 1.11
    confidence: HIGH

- name: literature — severe underreporting
  input:
    observed_count: 3
    source_type: literature
  expect:
    reporting_fraction_used: 0.02
    correction_factor: 50.0
    confidence: LOW

- name: patient registry
  input:
    observed_count: 200
    source_type: registry
  expect:
    reporting_fraction_used: 0.50
    correction_factor: 2.0
    confidence: MODERATE

- name: custom reporting fraction
  input:
    observed_count: 100
    reporting_fraction: 0.08
  expect:
    confidence: MODERATE

- name: null safety
  input: {}
  expect:
    reporting_fraction_used: 0.05
    correction_factor: 20.0
