# MICROGRAM++ (upgraded 2026-04-23)
name: ps-02-safety
version: 0.1.0
description: Patient Safety metric PS-02 metric CQ-01
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: rate_pct
    type: int
    required: false
    description: ""
outputs:
  - name: compliance
    type: string
  - name: action
    type: string
interface:
  inputs:
    rate_pct:
      type: int
      required: false
  outputs:
    compliance:
      type: string
    action:
      type: string
ui:
  title: Ps 02 Safety
  subtitle: Patient Safety metric PS-02 metric CQ-01
  icon: circle
  route: /vigilance/mg/ps-02-safety
  steps:
    - field: rate_pct
      label: rate pct
      help: Enter rate_pct
      widget: text
      placeholder: null
  result:
    template: "compliance: {{compliance}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ps-02-safety
  cli: rsk mcg run ps-02-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_compliant
  nodes:
    check_compliant:
      type: condition
      variable: rate_pct
      operator: gte
      value: 95
      true_next: compliant
      false_next: check_partial
    check_partial:
      type: condition
      variable: rate_pct
      operator: gte
      value: 80
      true_next: partial
      false_next: non_compliant
    compliant:
      type: return
      value:
        compliance: COMPLIANT
        action: maintain
    partial:
      type: return
      value:
        compliance: PARTIAL
        action: remediate
    non_compliant:
      type: return
      value:
        compliance: NON_COMPLIANT
        action: escalate
tests:
  - input:
      rate_pct: 98
    expect:
      compliance: COMPLIANT
      action: maintain
  - input:
      rate_pct: 87
    expect:
      compliance: PARTIAL
      action: remediate
  - input:
      rate_pct: 50
    expect:
      compliance: NON_COMPLIANT
      action: escalate
  - input:
      rate_pct: 0
    expect:
      compliance: NON_COMPLIANT
      action: escalate
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - compliance
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
