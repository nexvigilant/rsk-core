name: integration-d14
description: "Domain 14 cross-domain integration — communication amplifies every other domain. Three integrated learning modules."
version: 0.1.0
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    assessment:
      type: string
    epas:
      type: string
    integration_type:
      type: string
    learning_module:
      type: bool
    module:
      type: string
    synergy:
      type: string
    three_modules:
      type: string
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 1
      true_next: d14_d1
      false_next: check_d10
    check_d10:
      type: condition
      variable: target_domain
      operator: eq
      value: 10
      true_next: d14_d10
      false_next: check_d8
    check_d8:
      type: condition
      variable: target_domain
      operator: eq
      value: 8
      true_next: d14_d8
      false_next: check_d13
    check_d13:
      type: condition
      variable: target_domain
      operator: eq
      value: 13
      true_next: d14_d13
      false_next: check_d11
    check_d11:
      type: condition
      variable: target_domain
      operator: eq
      value: 11
      true_next: d14_d11
      false_next: check_d12
    check_d12:
      type: condition
      variable: target_domain
      operator: eq
      value: 12
      true_next: d14_d12
      false_next: general
    d14_d1:
      type: return
      value:
        integration_type: PRIMARY
        module: "Foundation-Communication Integration Module"
        learning_module: true
        epas: "EPA3, EPA8, EPA10"
        synergy: "technical accuracy + clear communication = effective stakeholder engagement"
        assessment: "presentations requiring both technical accuracy and communication effectiveness"
    d14_d10:
      type: return
      value:
        integration_type: PRIMARY
        module: "Benefit-Risk-Communication Integration Module"
        learning_module: true
        epas: "EPA3, EPA5, EPA8"
        synergy: "complex B/R analysis + stakeholder-appropriate communication = informed decisions"
        assessment: "live presentations of complex assessments with stakeholder comprehension testing"
    d14_d8:
      type: return
      value:
        integration_type: PRIMARY
        module: "Signal-Communication Integration Module"
        learning_module: true
        epas: "EPA2, EPA5, EPA8"
        synergy: "technical signal analysis + accessible presentation = actionable safety intelligence"
        assessment: "signal detection accuracy combined with communication effectiveness measurement"
    d14_d13:
      type: return
      value:
        integration_type: PRIMARY
        module: "Communication-Global Integration"
        synergy: "cross-cultural communication enables global PV coordination"
        epas: "EPA18, EPA19"
    d14_d11:
      type: return
      value:
        integration_type: PRIMARY
        module: "Communication-Risk Management"
        synergy: "effective communication is essential for risk intervention success"
        epas: "EPA7"
    d14_d12:
      type: return
      value:
        integration_type: PRIMARY
        module: "Communication-Regulatory"
        synergy: "communication skills critical for regulatory authority engagement"
        epas: "EPA6, EPA14"
    general:
      type: return
      value:
        integration_type: UNIVERSAL
        module: "Communication Amplifier"
        synergy: "communication is the universal multiplier — it amplifies impact of every other domain"
        three_modules: "Foundation-Comm (D1+D14), B/R-Comm (D10+D14), Signal-Comm (D8+D14)"
tests:
- input:
    target_domain: 1
  expect:
    integration_type: PRIMARY
    module: "Foundation-Communication Integration Module"
    learning_module: true
- input:
    target_domain: 10
  expect:
    integration_type: PRIMARY
    module: "Benefit-Risk-Communication Integration Module"
    learning_module: true
- input:
    target_domain: 8
  expect:
    integration_type: PRIMARY
    module: "Signal-Communication Integration Module"
    learning_module: true
- input:
    target_domain: 13
  expect:
    integration_type: PRIMARY
- input:
    target_domain: 11
  expect:
    integration_type: PRIMARY
- input:
    target_domain: 12
  expect:
    integration_type: PRIMARY
- input:
    target_domain: 2
  expect:
    integration_type: UNIVERSAL
    module: "Communication Amplifier"
- input: {}
  expect:
    integration_type: UNIVERSAL
