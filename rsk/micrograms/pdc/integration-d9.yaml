# MICROGRAM++ (upgraded 2026-04-23)
name: integration-d9
version: 0.1.0
description: Domain 9 cross-domain integration — post-authorization research connects to signal detection, databases, clinical trials, and benefit-risk.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: target_domain
    type: int
    required: false
    description: ""
outputs:
  - name: epas
    type: string
  - name: integration_type
    type: string
  - name: module
    type: string
  - name: synergy
    type: string
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    epas:
      type: string
    integration_type:
      type: string
    module:
      type: string
    synergy:
      type: string
ui:
  title: Integration D9
  subtitle: Domain 9 cross-domain integration — post-authorization research connects to signal detection, databases, clinical trials, and benefit-risk.
  icon: circle
  route: /vigilance/mg/integration-d9
  steps:
    - field: target_domain
      label: target domain
      help: Enter target_domain
      widget: text
      placeholder: null
  result:
    template: "epas: {{epas}} — integration_type: {{integration_type}} — module: {{module}} — synergy: {{synergy}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/integration-d9
  cli: rsk mcg run integration-d9
  auth: none
  rate_limit: 600/min
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 8
      true_next: d9_d8
      false_next: check_d7
    check_d7:
      type: condition
      variable: target_domain
      operator: eq
      value: 7
      true_next: d9_d7
      false_next: check_d5
    check_d5:
      type: condition
      variable: target_domain
      operator: eq
      value: 5
      true_next: d9_d5
      false_next: check_d2
    check_d2:
      type: condition
      variable: target_domain
      operator: eq
      value: 2
      true_next: d9_d2
      false_next: check_d10
    check_d10:
      type: condition
      variable: target_domain
      operator: eq
      value: 10
      true_next: d9_d10
      false_next: check_d15
    check_d15:
      type: condition
      variable: target_domain
      operator: eq
      value: 15
      true_next: d9_d15
      false_next: general
    d9_d8:
      type: return
      value:
        integration_type: PRIMARY
        module: Research-Signal Integration
        synergy: signal detection generates hypotheses, research generates evidence for validation
        epas: EPA4, EPA5
    d9_d7:
      type: return
      value:
        integration_type: PRIMARY
        module: Research-Database Integration
        synergy: spontaneous reporting databases are primary data sources for safety research
        epas: EPA4
    d9_d5:
      type: return
      value:
        integration_type: SUPPORTING
        module: Research-Trial Continuity
        synergy: post-authorization research extends clinical trial safety monitoring into real-world use
    d9_d2:
      type: return
      value:
        integration_type: SUPPORTING
        module: Research-Clinical Assessment
        synergy: clinical knowledge essential for outcome definition, confounding assessment, result interpretation
    d9_d10:
      type: return
      value:
        integration_type: PRIMARY
        module: Research-Benefit-Risk
        synergy: research generates evidence that feeds quantitative benefit-risk assessment
        epas: EPA5, EPA8
    d9_d15:
      type: return
      value:
        integration_type: SUPPORTING
        module: Research-Information Integration
        synergy: literature and information management skills essential for evidence synthesis
    general:
      type: return
      value:
        integration_type: GENERAL
        module: Universal Research Foundation
        synergy: research methodology enhances evidence-based decision making across all domains
tests:
  - input:
      target_domain: 8
    expect:
      integration_type: PRIMARY
      module: Research-Signal Integration
  - input:
      target_domain: 7
    expect:
      integration_type: PRIMARY
  - input:
      target_domain: 10
    expect:
      integration_type: PRIMARY
      module: Research-Benefit-Risk
  - input:
      target_domain: 5
    expect:
      integration_type: SUPPORTING
  - input:
      target_domain: 2
    expect:
      integration_type: SUPPORTING
  - input:
      target_domain: 15
    expect:
      integration_type: SUPPORTING
  - input:
      target_domain: 1
    expect:
      integration_type: GENERAL
  - input: {}
    expect:
      integration_type: GENERAL
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - epas
    - integration_type
    - module
    - synergy
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
