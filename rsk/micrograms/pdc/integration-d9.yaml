name: integration-d9
description: "Domain 9 cross-domain integration — post-authorization research connects to signal detection, databases, clinical trials, and benefit-risk."
version: 0.1.0
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    epas:
      type: string
    integration_type:
      type: string
    module:
      type: string
    synergy:
      type: string
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 8
      true_next: d9_d8
      false_next: check_d7
    check_d7:
      type: condition
      variable: target_domain
      operator: eq
      value: 7
      true_next: d9_d7
      false_next: check_d5
    check_d5:
      type: condition
      variable: target_domain
      operator: eq
      value: 5
      true_next: d9_d5
      false_next: check_d2
    check_d2:
      type: condition
      variable: target_domain
      operator: eq
      value: 2
      true_next: d9_d2
      false_next: check_d10
    check_d10:
      type: condition
      variable: target_domain
      operator: eq
      value: 10
      true_next: d9_d10
      false_next: check_d15
    check_d15:
      type: condition
      variable: target_domain
      operator: eq
      value: 15
      true_next: d9_d15
      false_next: general
    d9_d8:
      type: return
      value:
        integration_type: PRIMARY
        module: "Research-Signal Integration"
        synergy: "signal detection generates hypotheses, research generates evidence for validation"
        epas: "EPA4, EPA5"
    d9_d7:
      type: return
      value:
        integration_type: PRIMARY
        module: "Research-Database Integration"
        synergy: "spontaneous reporting databases are primary data sources for safety research"
        epas: "EPA4"
    d9_d5:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Research-Trial Continuity"
        synergy: "post-authorization research extends clinical trial safety monitoring into real-world use"
    d9_d2:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Research-Clinical Assessment"
        synergy: "clinical knowledge essential for outcome definition, confounding assessment, result interpretation"
    d9_d10:
      type: return
      value:
        integration_type: PRIMARY
        module: "Research-Benefit-Risk"
        synergy: "research generates evidence that feeds quantitative benefit-risk assessment"
        epas: "EPA5, EPA8"
    d9_d15:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Research-Information Integration"
        synergy: "literature and information management skills essential for evidence synthesis"
    general:
      type: return
      value:
        integration_type: GENERAL
        module: "Universal Research Foundation"
        synergy: "research methodology enhances evidence-based decision making across all domains"
tests:
- input:
    target_domain: 8
  expect:
    integration_type: PRIMARY
    module: "Research-Signal Integration"
- input:
    target_domain: 7
  expect:
    integration_type: PRIMARY
- input:
    target_domain: 10
  expect:
    integration_type: PRIMARY
    module: "Research-Benefit-Risk"
- input:
    target_domain: 5
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 2
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 15
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 1
  expect:
    integration_type: GENERAL
- input: {}
  expect:
    integration_type: GENERAL
