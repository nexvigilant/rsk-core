# MICROGRAM++ (upgraded 2026-04-23)
name: epa5-signal-detect
version: 0.1.0
description: "EPA 5: Detect and validate safety signals — routes by signal strength, evidence quality, and clinical significance."
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: case_count
    type: int
    required: false
    description: ""
  - name: chi_squared
    type: float
    required: false
    description: ""
  - name: clinical_significance
    type: string
    required: false
    description: ""
  - name: has_biological_plausibility
    type: bool
    required: false
    description: ""
  - name: has_literature_support
    type: bool
    required: false
    description: ""
  - name: prr
    type: float
    required: false
    description: ""
outputs:
  - name: action
    type: string
  - name: evidence_level
    type: string
  - name: methods_used
    type: string
  - name: next_steps
    type: string
  - name: outcome
    type: string
interface:
  inputs:
    case_count:
      type: int
      required: false
    chi_squared:
      type: float
      required: false
    clinical_significance:
      type: string
      required: false
    has_biological_plausibility:
      type: bool
      required: false
    has_literature_support:
      type: bool
      required: false
    prr:
      type: float
      required: false
  outputs:
    action:
      type: string
    evidence_level:
      type: string
    methods_used:
      type: string
    next_steps:
      type: string
    outcome:
      type: string
ui:
  title: Epa5 Signal Detect
  subtitle: "EPA 5: Detect and validate safety signals — routes by signal strength, evidence quality, and clinical significance."
  icon: activity
  route: /vigilance/mg/epa5-signal-detect
  steps:
    - field: case_count
      label: case count
      help: Enter case_count
      widget: text
      placeholder: null
    - field: chi_squared
      label: chi squared
      help: Enter chi_squared
      widget: text
      placeholder: null
    - field: clinical_significance
      label: clinical significance
      help: Enter clinical_significance
      widget: text
      placeholder: null
    - field: has_biological_plausibility
      label: has biological plausibility
      help: Enter has_biological_plausibility
      widget: toggle
      placeholder: null
    - field: has_literature_support
      label: has literature support
      help: Enter has_literature_support
      widget: toggle
      placeholder: null
    - field: prr
      label: prr
      help: Enter prr
      widget: text
      placeholder: null
  result:
    template: "action: {{action}} — evidence_level: {{evidence_level}} — methods_used: {{methods_used}} — next_steps: {{next_steps}} — outcome: {{outcome}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/epa5-signal-detect
  cli: rsk mcg run epa5-signal-detect
  auth: none
  rate_limit: 600/min
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: check_chi2
      false_next: check_qualitative
    check_chi2:
      type: condition
      variable: chi_squared
      operator: gte
      value: 4
      true_next: check_case_count
      false_next: weak_statistical
    check_case_count:
      type: condition
      variable: case_count
      operator: gte
      value: 3
      true_next: statistical_signal
      false_next: insufficient_cases
    check_qualitative:
      type: condition
      variable: has_literature_support
      operator: eq
      value: true
      true_next: qualitative_signal
      false_next: check_mechanism
    check_mechanism:
      type: condition
      variable: has_biological_plausibility
      operator: eq
      value: true
      true_next: hypothesis_signal
      false_next: no_signal
    statistical_signal:
      type: condition
      variable: clinical_significance
      operator: eq
      value: high
      true_next: validated_signal
      false_next: signal_for_review
    validated_signal:
      type: return
      value:
        outcome: VALIDATED_SIGNAL
        action: escalate to safety committee, prepare signal assessment report
        evidence_level: strong
        next_steps: benefit-risk update, risk management review, regulatory notification
        methods_used: PRR + chi-squared + clinical review
    signal_for_review:
      type: return
      value:
        outcome: SIGNAL_FOR_REVIEW
        action: schedule clinical review, gather additional evidence
        evidence_level: moderate
        next_steps: expanded analysis, literature review, expert consultation
        methods_used: PRR + chi-squared, clinical significance pending
    weak_statistical:
      type: return
      value:
        outcome: WEAK_STATISTICAL
        action: monitor, reanalyze next quarter with accumulated data
        evidence_level: weak
        next_steps: continued monitoring, data accumulation
    insufficient_cases:
      type: return
      value:
        outcome: INSUFFICIENT_CASES
        action: flag for monitoring, await additional reports
        evidence_level: preliminary
        next_steps: active surveillance, case series development
    qualitative_signal:
      type: return
      value:
        outcome: QUALITATIVE_SIGNAL
        action: literature-supported concern, initiate formal signal evaluation
        evidence_level: moderate
        next_steps: systematic review, quantitative analysis, signal assessment
    hypothesis_signal:
      type: return
      value:
        outcome: HYPOTHESIS
        action: biological plausibility noted, design targeted study
        evidence_level: theoretical
        next_steps: hypothesis testing, targeted data collection
    no_signal:
      type: return
      value:
        outcome: NO_SIGNAL
        action: document review, continue routine monitoring
        evidence_level: none
        next_steps: routine surveillance
tests:
  - input:
      prr: 3.5
      chi_squared: 8.2
      case_count: 12
      clinical_significance: high
    expect:
      outcome: VALIDATED_SIGNAL
      evidence_level: strong
  - input:
      prr: 2.5
      chi_squared: 5
      case_count: 5
      clinical_significance: low
    expect:
      outcome: SIGNAL_FOR_REVIEW
      evidence_level: moderate
  - input:
      prr: 2.1
      chi_squared: 3
    expect:
      outcome: WEAK_STATISTICAL
  - input:
      prr: 2.5
      chi_squared: 6
      case_count: 2
    expect:
      outcome: INSUFFICIENT_CASES
  - input:
      prr: 1.5
      has_literature_support: true
    expect:
      outcome: QUALITATIVE_SIGNAL
  - input:
      prr: 1
      has_biological_plausibility: true
    expect:
      outcome: HYPOTHESIS
  - input:
      prr: 0.8
    expect:
      outcome: NO_SIGNAL
  - input: {}
    expect:
      outcome: NO_SIGNAL
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - action
    - evidence_level
    - methods_used
    - next_steps
    - outcome
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
