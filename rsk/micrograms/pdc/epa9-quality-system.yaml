# MICROGRAM++ (upgraded 2026-04-23)
name: epa9-quality-system
version: 0.1.0
description: "EPA 9: Quality and compliance — routes by finding type, severity, and CAPA requirements."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: finding_severity
    type: string
    required: false
    description: ""
outputs:
  - name: actions
    type: string
  - name: capa_required
    type: bool
  - name: classification
    type: string
  - name: escalation
    type: string
  - name: monitoring
    type: string
  - name: response_days
    type: int
interface:
  inputs:
    finding_severity:
      type: string
      required: false
  outputs:
    actions:
      type: string
    capa_required:
      type: bool
    classification:
      type: string
    escalation:
      type: string
    monitoring:
      type: string
    response_days:
      type: int
ui:
  title: Epa9 Quality System
  subtitle: "EPA 9: Quality and compliance — routes by finding type, severity, and CAPA requirements."
  icon: circle
  route: /vigilance/mg/epa9-quality-system
  steps:
    - field: finding_severity
      label: finding severity
      help: Enter finding_severity
      widget: text
      placeholder: null
  result:
    template: "actions: {{actions}} — capa_required: {{capa_required}} — classification: {{classification}} — escalation: {{escalation}} — monitoring: {{monitoring}} — response_days: {{response_days}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/epa9-quality-system
  cli: rsk mcg run epa9-quality-system
  auth: none
  rate_limit: 600/min
tree:
  start: check_critical
  nodes:
    check_critical:
      type: condition
      variable: finding_severity
      operator: eq
      value: critical
      true_next: critical_finding
      false_next: check_major
    check_major:
      type: condition
      variable: finding_severity
      operator: eq
      value: major
      true_next: major_finding
      false_next: check_minor
    check_minor:
      type: condition
      variable: finding_severity
      operator: eq
      value: minor
      true_next: minor_finding
      false_next: check_observation
    check_observation:
      type: condition
      variable: finding_severity
      operator: eq
      value: observation
      true_next: observation_finding
      false_next: no_finding
    critical_finding:
      type: return
      value:
        classification: CRITICAL
        capa_required: true
        response_days: 5
        escalation: executive oversight, regulatory notification may be required
        actions: immediate corrective action, root cause analysis, preventive measures
        monitoring: daily progress tracking until closure
    major_finding:
      type: return
      value:
        classification: MAJOR
        capa_required: true
        response_days: 15
        escalation: program management review
        actions: corrective action plan, root cause investigation, process improvement
        monitoring: weekly progress tracking
    minor_finding:
      type: return
      value:
        classification: MINOR
        capa_required: false
        response_days: 30
        escalation: functional team review
        actions: process adjustment, documentation update, training if needed
        monitoring: monthly tracking
    observation_finding:
      type: return
      value:
        classification: OBSERVATION
        capa_required: false
        response_days: 90
        escalation: none
        actions: note for improvement, consider in next review cycle
        monitoring: quarterly review
    no_finding:
      type: return
      value:
        classification: COMPLIANT
        capa_required: false
        response_days: 0
        actions: document compliance, continue standard operations
tests:
  - input:
      finding_severity: critical
    expect:
      classification: CRITICAL
      capa_required: true
      response_days: 5
  - input:
      finding_severity: major
    expect:
      classification: MAJOR
      capa_required: true
      response_days: 15
  - input:
      finding_severity: minor
    expect:
      classification: MINOR
      capa_required: false
  - input:
      finding_severity: observation
    expect:
      classification: OBSERVATION
      response_days: 90
  - input:
      finding_severity: none
    expect:
      classification: COMPLIANT
  - input: {}
    expect:
      classification: COMPLIANT
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - actions
    - capa_required
    - classification
    - escalation
    - monitoring
    - response_days
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
