# MICROGRAM++ (upgraded 2026-04-23)
name: inspection-readiness
version: 0.1.0
description: "Domain 12: Assess inspection readiness and route to preparation action by finding risk level and timeline."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: has_critical_gaps
    type: bool
    required: false
    description: ""
  - name: inspection_imminent
    type: bool
    required: false
    description: ""
  - name: months_since_last_inspection
    type: int
    required: false
    description: ""
  - name: readiness_score_pct
    type: int
    required: false
    description: ""
outputs:
  - name: action
    type: string
  - name: ai_assist
    type: string
  - name: escalation
    type: string
  - name: focus
    type: string
  - name: status
    type: string
  - name: timeline
    type: string
interface:
  inputs:
    has_critical_gaps:
      type: bool
      required: false
    inspection_imminent:
      type: bool
      required: false
    months_since_last_inspection:
      type: int
      required: false
    readiness_score_pct:
      type: int
      required: false
  outputs:
    action:
      type: string
    ai_assist:
      type: string
    escalation:
      type: string
    focus:
      type: string
    status:
      type: string
    timeline:
      type: string
ui:
  title: Inspection Readiness
  subtitle: "Domain 12: Assess inspection readiness and route to preparation action by finding risk level and timeline."
  icon: circle
  route: /vigilance/mg/inspection-readiness
  steps:
    - field: has_critical_gaps
      label: has critical gaps
      help: Enter has_critical_gaps
      widget: toggle
      placeholder: null
    - field: inspection_imminent
      label: inspection imminent
      help: Enter inspection_imminent
      widget: toggle
      placeholder: null
    - field: months_since_last_inspection
      label: months since last inspection
      help: Enter months_since_last_inspection
      widget: text
      placeholder: null
    - field: readiness_score_pct
      label: readiness score pct
      help: Enter readiness_score_pct
      widget: text
      placeholder: null
  result:
    template: "action: {{action}} — ai_assist: {{ai_assist}} — escalation: {{escalation}} — focus: {{focus}} — status: {{status}} — timeline: {{timeline}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/inspection-readiness
  cli: rsk mcg run inspection-readiness
  auth: none
  rate_limit: 600/min
tree:
  start: check_imminent
  nodes:
    check_imminent:
      type: condition
      variable: inspection_imminent
      operator: eq
      value: true
      true_next: check_readiness_score
      false_next: check_routine
    check_readiness_score:
      type: condition
      variable: readiness_score_pct
      operator: gte
      value: 80
      true_next: ready
      false_next: check_critical_gaps
    check_critical_gaps:
      type: condition
      variable: has_critical_gaps
      operator: eq
      value: true
      true_next: critical_remediation
      false_next: gap_remediation
    check_routine:
      type: condition
      variable: months_since_last_inspection
      operator: gte
      value: 24
      true_next: proactive_preparation
      false_next: maintenance_mode
    ready:
      type: return
      value:
        status: READY
        action: final review of back room, SME preparation, document accessibility verification
        timeline: 1-2 days final preparation
        focus: SME confidence, document retrieval speed, front/back room coordination
        ai_assist: automated document retrieval, gap scan, SME briefing generation
    critical_remediation:
      type: return
      value:
        status: CRITICAL_GAPS
        action: immediate CAPA for critical findings, resource reallocation, executive escalation
        timeline: 7-14 days intensive remediation
        focus: critical compliance gaps, data integrity issues, systemic process failures
        ai_assist: gap prioritization, CAPA tracking, compliance risk modeling
        escalation: executive oversight required, regulatory counsel engagement
    gap_remediation:
      type: return
      value:
        status: GAPS_IDENTIFIED
        action: targeted remediation plan, training refresh, document update
        timeline: 14-30 days focused preparation
        focus: non-critical gaps, documentation completeness, staff training
        ai_assist: training needs analysis, document completeness check, mock inspection
    proactive_preparation:
      type: return
      value:
        status: PROACTIVE
        action: self-inspection program, mock inspection, compliance health check
        timeline: 60-90 days comprehensive preparation
        focus: systematic readiness assessment, continuous improvement, culture reinforcement
        ai_assist: predictive risk assessment, trend analysis, best practice benchmarking
    maintenance_mode:
      type: return
      value:
        status: MAINTENANCE
        action: routine compliance monitoring, quarterly self-assessment, continuous training
        timeline: ongoing
        focus: compliance culture maintenance, proactive monitoring, continuous improvement
        ai_assist: automated compliance monitoring, deviation trending, training optimization
tests:
  - input:
      inspection_imminent: true
      readiness_score_pct: 90
    expect:
      status: READY
  - input:
      inspection_imminent: true
      readiness_score_pct: 60
      has_critical_gaps: true
    expect:
      status: CRITICAL_GAPS
      escalation: executive oversight required, regulatory counsel engagement
  - input:
      inspection_imminent: true
      readiness_score_pct: 70
      has_critical_gaps: false
    expect:
      status: GAPS_IDENTIFIED
  - input:
      inspection_imminent: false
      months_since_last_inspection: 30
    expect:
      status: PROACTIVE
  - input:
      inspection_imminent: false
      months_since_last_inspection: 12
    expect:
      status: MAINTENANCE
  - input: {}
    expect:
      status: MAINTENANCE
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - action
    - ai_assist
    - escalation
    - focus
    - status
    - timeline
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
