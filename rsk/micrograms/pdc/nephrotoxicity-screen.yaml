# MICROGRAM++ (upgraded 2026-04-23)
name: nephrotoxicity-screen
version: 0.1.0
description: "Clinical safety: nephrotoxicity-screen"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: risk_score
    type: int
    required: false
    description: ""
  - name: evidence_level
    type: string
    required: false
    description: ""
outputs:
  - name: classification
    type: string
  - name: action
    type: string
interface:
  inputs:
    risk_score:
      type: int
      required: false
    evidence_level:
      type: string
      required: false
  outputs:
    classification:
      type: string
    action:
      type: string
ui:
  title: Nephrotoxicity Screen
  subtitle: "Clinical safety: nephrotoxicity-screen"
  icon: circle
  route: /vigilance/mg/nephrotoxicity-screen
  steps:
    - field: risk_score
      label: risk score
      help: Enter risk_score
      widget: text
      placeholder: null
    - field: evidence_level
      label: evidence level
      help: Enter evidence_level
      widget: text
      placeholder: null
  result:
    template: "classification: {{classification}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/nephrotoxicity-screen
  cli: rsk mcg run nephrotoxicity-screen
  auth: none
  rate_limit: 600/min
tree:
  start: check_high_risk
  nodes:
    check_high_risk:
      type: condition
      variable: risk_score
      operator: gte
      value: 80
      true_next: high_risk
      false_next: check_moderate
    check_moderate:
      type: condition
      variable: risk_score
      operator: gte
      value: 40
      true_next: moderate_risk
      false_next: low_risk
    high_risk:
      type: return
      value:
        classification: HIGH_RISK
        action: contraindicate_or_monitor
    moderate_risk:
      type: return
      value:
        classification: MODERATE_RISK
        action: monitor_closely
    low_risk:
      type: return
      value:
        classification: LOW_RISK
        action: standard_care
tests:
  - input:
      risk_score: 90
      evidence_level: strong
    expect:
      classification: HIGH_RISK
      action: contraindicate_or_monitor
  - input:
      risk_score: 50
      evidence_level: moderate
    expect:
      classification: MODERATE_RISK
      action: monitor_closely
  - input:
      risk_score: 20
      evidence_level: weak
    expect:
      classification: LOW_RISK
      action: standard_care
  - input: {}
    expect:
      classification: LOW_RISK
      action: standard_care
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - classification
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
