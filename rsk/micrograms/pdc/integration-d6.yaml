name: integration-d6
description: "Domain 6 cross-domain integration — enhanced coverage domain completing the triad (D3+D5+D6). Error prevention connects to quality, risk, case processing."
version: 0.1.0
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    enhanced_domain:
      type: string
    enhanced_pair:
      type: bool
    enhancement_status:
      type: string
    epas:
      type: string
    integration_type:
      type: string
    min_epa_coverage:
      type: string
    module:
      type: string
    synergy:
      type: string
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 3
      true_next: d6_d3
      false_next: check_d5
    check_d5:
      type: condition
      variable: target_domain
      operator: eq
      value: 5
      true_next: d6_d5
      false_next: check_d9_quality
    check_d9_quality:
      type: condition
      variable: target_domain
      operator: eq
      value: 9
      true_next: d6_d9
      false_next: check_d4
    check_d4:
      type: condition
      variable: target_domain
      operator: eq
      value: 4
      true_next: d6_d4
      false_next: check_d8
    check_d8:
      type: condition
      variable: target_domain
      operator: eq
      value: 8
      true_next: d6_d8
      false_next: check_d11
    check_d11:
      type: condition
      variable: target_domain
      operator: eq
      value: 11
      true_next: d6_d11
      false_next: check_d1
    check_d1:
      type: condition
      variable: target_domain
      operator: eq
      value: 1
      true_next: d6_d1
      false_next: general
    d6_d3:
      type: return
      value:
        integration_type: ENHANCED_COVERAGE
        module: "Enhanced Domain Triad (D3+D5+D6)"
        synergy: "ADR vs error differentiation — overlapping presentations, distinct causation and response"
        enhanced_pair: true
        min_epa_coverage: "50%"
        epas: "EPA1, EPA7"
    d6_d5:
      type: return
      value:
        integration_type: ENHANCED_COVERAGE
        module: "Enhanced Domain Triad (D3+D5+D6)"
        synergy: "medication error detection in clinical trial protocol deviations and dosing errors"
        enhanced_pair: true
        min_epa_coverage: "50%"
        epas: "EPA1, EPA7, EPA9"
    d6_d9:
      type: return
      value:
        integration_type: PRIMARY
        module: "Error-Quality Integration"
        synergy: "error prevention expertise + quality systems = comprehensive safety management"
        epas: "EPA9"
    d6_d4:
      type: return
      value:
        integration_type: PRIMARY
        module: "Error-Case Processing"
        synergy: "case processing methods apply to error documentation and analysis"
        epas: "EPA1"
    d6_d8:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Error-Signal Detection"
        synergy: "error patterns feed signal detection, signal methods detect error trends"
    d6_d11:
      type: return
      value:
        integration_type: PRIMARY
        module: "Error-Risk Management"
        synergy: "error prevention is risk management — shared tools, shared goals"
        epas: "EPA7"
    d6_d1:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Error-Ethical Foundation"
        synergy: "just culture principles rooted in foundational ethics, patient safety primacy"
    general:
      type: return
      value:
        integration_type: GENERAL
        module: "Universal Error Prevention"
        synergy: "error prevention expertise enhances safety across all domains"
        enhanced_domain: true
        enhancement_status: "third of 3 enhanced coverage domains (D3, D5, D6) — triad complete"
tests:
- input:
    target_domain: 3
  expect:
    integration_type: ENHANCED_COVERAGE
    enhanced_pair: true
- input:
    target_domain: 5
  expect:
    integration_type: ENHANCED_COVERAGE
    module: "Enhanced Domain Triad (D3+D5+D6)"
- input:
    target_domain: 9
  expect:
    integration_type: PRIMARY
    module: "Error-Quality Integration"
- input:
    target_domain: 11
  expect:
    integration_type: PRIMARY
    module: "Error-Risk Management"
- input:
    target_domain: 4
  expect:
    integration_type: PRIMARY
- input:
    target_domain: 8
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 1
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 15
  expect:
    integration_type: GENERAL
    enhancement_status: "third of 3 enhanced coverage domains (D3, D5, D6) — triad complete"
- input: {}
  expect:
    integration_type: GENERAL
