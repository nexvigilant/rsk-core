name: integration-d11
description: "Domain 11 cross-domain integration — risk management connects to benefit-risk, communication, error prevention, signal detection, and regulatory."
version: 0.1.0
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    epas:
      type: string
    integration_type:
      type: string
    module:
      type: string
    synergy:
      type: string
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 10
      true_next: d11_d10
      false_next: check_d14
    check_d14:
      type: condition
      variable: target_domain
      operator: eq
      value: 14
      true_next: d11_d14
      false_next: check_d6
    check_d6:
      type: condition
      variable: target_domain
      operator: eq
      value: 6
      true_next: d11_d6
      false_next: check_d8
    check_d8:
      type: condition
      variable: target_domain
      operator: eq
      value: 8
      true_next: d11_d8
      false_next: check_d12
    check_d12:
      type: condition
      variable: target_domain
      operator: eq
      value: 12
      true_next: d11_d12
      false_next: check_d13
    check_d13:
      type: condition
      variable: target_domain
      operator: eq
      value: 13
      true_next: d11_d13
      false_next: general
    d11_d10:
      type: return
      value:
        integration_type: PRIMARY
        module: "Risk Management-Assessment Integration"
        synergy: "B/R assessment defines risk magnitude, risk management defines the response"
        epas: "EPA7, EPA8, EPA11"
    d11_d14:
      type: return
      value:
        integration_type: PRIMARY
        module: "Risk Management-Communication"
        synergy: "intervention success depends on effective stakeholder communication and engagement"
        epas: "EPA7, EPA3"
    d11_d6:
      type: return
      value:
        integration_type: PRIMARY
        module: "Risk Management-Error Prevention"
        synergy: "error prevention IS risk management — shared tools, behavioral science, system redesign"
        epas: "EPA7, EPA9"
    d11_d8:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Risk Management-Signal"
        synergy: "signals inform risk management priorities and intervention targeting"
    d11_d12:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Risk Management-Regulatory"
        synergy: "regulatory knowledge essential for REMS/RMP compliance and authority engagement"
    d11_d13:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Risk Management-Global"
        synergy: "global perspective critical for international intervention coordination and cultural adaptation"
    general:
      type: return
      value:
        integration_type: GENERAL
        module: "Universal Risk Management"
        synergy: "risk management principles enhance proactive safety approach across all domains"
tests:
- input:
    target_domain: 10
  expect:
    integration_type: PRIMARY
    module: "Risk Management-Assessment Integration"
- input:
    target_domain: 14
  expect:
    integration_type: PRIMARY
    module: "Risk Management-Communication"
- input:
    target_domain: 6
  expect:
    integration_type: PRIMARY
    module: "Risk Management-Error Prevention"
- input:
    target_domain: 8
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 12
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 13
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 1
  expect:
    integration_type: GENERAL
- input: {}
  expect:
    integration_type: GENERAL
