# MICROGRAM++ (upgraded 2026-04-23)
name: hepatic-impairment-pk
version: 0.1.0
description: "Pharmacokinetics: hepatic-impairment-pk assessment"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: value
    type: int
    required: false
    description: ""
  - name: threshold
    type: int
    required: false
    description: ""
outputs:
  - name: assessment
    type: string
  - name: action
    type: string
interface:
  inputs:
    value:
      type: int
      required: false
    threshold:
      type: int
      required: false
  outputs:
    assessment:
      type: string
    action:
      type: string
ui:
  title: Hepatic Impairment Pk
  subtitle: "Pharmacokinetics: hepatic-impairment-pk assessment"
  icon: circle
  route: /vigilance/mg/hepatic-impairment-pk
  steps:
    - field: value
      label: value
      help: Enter value
      widget: text
      placeholder: null
    - field: threshold
      label: threshold
      help: Enter threshold
      widget: text
      placeholder: null
  result:
    template: "assessment: {{assessment}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/hepatic-impairment-pk
  cli: rsk mcg run hepatic-impairment-pk
  auth: none
  rate_limit: 600/min
tree:
  start: check_high
  nodes:
    check_high:
      type: condition
      variable: value
      operator: gte
      value: 70
      true_next: high
      false_next: check_moderate
    check_moderate:
      type: condition
      variable: value
      operator: gte
      value: 30
      true_next: moderate
      false_next: low
    high:
      type: return
      value:
        assessment: HIGH
        action: monitor
    moderate:
      type: return
      value:
        assessment: MODERATE
        action: standard
    low:
      type: return
      value:
        assessment: LOW
        action: investigate
tests:
  - input:
      value: 80
      threshold: 50
    expect:
      assessment: HIGH
      action: monitor
  - input:
      value: 50
      threshold: 50
    expect:
      assessment: MODERATE
      action: standard
  - input:
      value: 10
      threshold: 50
    expect:
      assessment: LOW
      action: investigate
  - input:
      value: 0
      threshold: 0
    expect:
      assessment: LOW
      action: investigate
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - assessment
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
