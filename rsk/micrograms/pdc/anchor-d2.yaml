name: anchor-d2
description: "PDC: Domain 2 (Clinical ADRs) behavioral anchors by level — 7 anchors per level, 49 total"
version: 0.1.0
interface:
  inputs:
    level:
      type: string
      required: false
  outputs:
    a1:
      type: string
    a2:
      type: string
    a3:
      type: string
    a4:
      type: string
    a5:
      type: string
    a6:
      type: string
    a7:
      type: string
    anchor_count:
      type: int
    bloom_tier:
      type: int
    domain:
      type: int
    domain_name:
      type: string
    error:
      type: string
    has_quantitative_metrics:
      type: bool
    level:
      type: string
tree:
  start: check_l1
  nodes:
    check_l1:
      type: condition
      variable: level
      operator: lte
      value: 1
      true_next: l1_anchors
      false_next: check_l2
    check_l2:
      type: condition
      variable: level
      operator: eq
      value: 2
      true_next: l2_anchors
      false_next: check_l3
    check_l3:
      type: condition
      variable: level
      operator: eq
      value: 3
      true_next: l3_anchors
      false_next: check_l4
    check_l4:
      type: condition
      variable: level
      operator: eq
      value: 4
      true_next: l4_anchors
      false_next: check_l5
    check_l5:
      type: condition
      variable: level
      operator: eq
      value: 5
      true_next: l5_anchors
      false_next: check_l5p
    check_l5p:
      type: condition
      variable: level
      operator: eq
      value: 6
      true_next: l5p_anchors
      false_next: check_l5pp
    check_l5pp:
      type: condition
      variable: level
      operator: eq
      value: 7
      true_next: l5pp_anchors
      false_next: invalid
    l1_anchors:
      type: return
      value:
        domain: 2
        domain_name: "Clinical Aspects of ADRs with AI-Enhanced Analysis"
        level: L1
        anchor_count: 7
        a1: "Correctly identifies basic ADR types (Type A vs Type B reactions)"
        a2: "Recognizes common temporal patterns in adverse event descriptions"
        a3: "Uses standard causality assessment terms appropriately in discussions"
        a4: "Documents basic patient demographics and medical history accurately"
        a5: "Observes AI-powered clinical analysis tools and asks appropriate questions"
        a6: "Identifies when clinical expertise is needed for case evaluation"
        a7: "Follows established procedures for gathering clinical information"
        bloom_tier: 1
    l2_anchors:
      type: return
      value:
        domain: 2
        domain_name: "Clinical Aspects of ADRs with AI-Enhanced Analysis"
        level: L2
        anchor_count: 7
        a1: "Applies causality assessment criteria consistently to straightforward cases"
        a2: "Recognizes drug-drug interaction patterns in routine case reviews"
        a3: "Identifies common risk factors for specific types of ADRs"
        a4: "Uses AI clinical decision support tools with appropriate supervision"
        a5: "Explains clinical reasoning for basic causality assessments"
        a6: "Differentiates between adverse events and disease progression in simple cases"
        a7: "Documents clinical rationale clearly in case narratives"
        bloom_tier: 2
    l3_anchors:
      type: return
      value:
        domain: 2
        domain_name: "Clinical Aspects of ADRs with AI-Enhanced Analysis"
        level: L3
        anchor_count: 7
        a1: "Conducts comprehensive clinical evaluations independently for complex cases"
        a2: "Integrates pharmacokinetic and pharmacodynamic principles in assessments"
        a3: "Utilizes AI pattern recognition tools to identify subtle clinical associations"
        a4: "Applies advanced causality methods (Bradford Hill criteria) appropriately"
        a5: "Recognizes and evaluates ADRs in special populations (elderly, pregnant)"
        a6: "Consults with clinical specialists when appropriate for complex evaluations"
        a7: "Validates AI-generated clinical insights against medical literature"
        bloom_tier: 3
    l4_anchors:
      type: return
      value:
        domain: 2
        domain_name: "Clinical Aspects of ADRs with AI-Enhanced Analysis"
        level: L4
        anchor_count: 7
        a1: "Develops new approaches to complex clinical assessment challenges"
        a2: "Optimizes AI algorithms for improved clinical pattern recognition"
        a3: "Leads clinical review committees for challenging causality determinations"
        a4: "Mentors others in advanced clinical evaluation techniques"
        a5: "Integrates emerging biomarker data into traditional clinical assessments"
        a6: "Publishes on innovative clinical assessment methodologies"
        a7: "Influences organizational standards for clinical evaluation practices"
        bloom_tier: 4
    l5_anchors:
      type: return
      value:
        domain: 2
        domain_name: "Clinical Aspects of ADRs with AI-Enhanced Analysis"
        level: L5
        anchor_count: 7
        a1: "Creates new frameworks for clinical assessment that gain industry adoption"
        a2: "Pioneers use of AI in clinical pharmacovigilance with demonstrated outcomes"
        a3: "Shapes regulatory expectations for clinical assessment standards"
        a4: "Develops training programs for advanced clinical evaluation that become models"
        a5: "Contributes to scientific understanding through original research publications"
        a6: "Serves as external expert for regulatory advisory committees"
        a7: "Influences international guidelines for clinical assessment practices"
        bloom_tier: 5
    l5p_anchors:
      type: return
      value:
        domain: 2
        domain_name: "Clinical Aspects of ADRs with AI-Enhanced Analysis"
        level: L5+
        anchor_count: 7
        a1: "Transforms organizational approach to clinical safety assessment (accuracy >25%)"
        a2: "Establishes new scientific paradigms for ADR mechanisms (>10 peer-reviewed articles)"
        a3: "Develops industry-wide standards for AI-enhanced clinical evaluation (>5 orgs adopt)"
        a4: "Creates academic-industry partnerships advancing clinical PV science (>2 collaborations)"
        a5: "Influences global regulatory policy on clinical assessment (advisory role >2 agencies)"
        a6: "Develops next-generation clinical PV leaders through mentoring (>20 mentees in leadership)"
        a7: "Shapes future research directions through scientific leadership (chairing >3 committees)"
        bloom_tier: 6
        has_quantitative_metrics: true
    l5pp_anchors:
      type: return
      value:
        domain: 2
        domain_name: "Clinical Aspects of ADRs with AI-Enhanced Analysis"
        level: L5++
        anchor_count: 7
        a1: "Revolutionizes global understanding of drug safety through clinical innovation (>10 countries)"
        a2: "Influences international regulatory frameworks for clinical assessment (>5 ICH guidelines)"
        a3: "Creates new fields of study at intersection of AI and clinical PV (new academic programs)"
        a4: "Establishes global networks of clinical PV excellence (leading >5 international initiatives)"
        a5: "Shapes pharma industry approach to clinical safety evaluation (>20 companies influenced)"
        a6: "Leaves lasting impact on clinical practice through transformational leadership (>15 years)"
        a7: "Influences healthcare system design to optimize safety monitoring (multiple health systems)"
        bloom_tier: 7
        has_quantitative_metrics: true
    invalid:
      type: return
      value:
        domain: 2
        level: INVALID
        error: "Level must be 1-7"
tests:
- input:
    level: 1
  expect:
    domain: 2
    level: L1
    anchor_count: 7
- input:
    level: 3
  expect:
    level: L3
    bloom_tier: 3
- input:
    level: 5
  expect:
    level: L5
- input:
    level: 6
  expect:
    level: L5+
    has_quantitative_metrics: true
- input:
    level: 7
  expect:
    level: L5++
    has_quantitative_metrics: true
- input:
    level: 8
  expect:
    level: INVALID
- input:
    level: 2
  expect:
    level: L2
    anchor_count: 7
    bloom_tier: 2
- input:
    level: 4
  expect:
    level: L4
    anchor_count: 7
    bloom_tier: 4
- input: {}
  expect:
    domain: 2
    error: Level must be 1-7
    level: INVALID
