name: integration-d8
description: "Domain 8 cross-domain integration — signal detection connects to databases, literature, clinical assessment, benefit-risk, and global PV."
version: 0.1.0
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    epas:
      type: string
    integration_type:
      type: string
    module:
      type: string
    nexcore:
      type: string
    nexcore_crates:
      type: string
    synergy:
      type: string
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 7
      true_next: d8_d7
      false_next: check_d15
    check_d15:
      type: condition
      variable: target_domain
      operator: eq
      value: 15
      true_next: d8_d15
      false_next: check_d2
    check_d2:
      type: condition
      variable: target_domain
      operator: eq
      value: 2
      true_next: d8_d2
      false_next: check_d9
    check_d9:
      type: condition
      variable: target_domain
      operator: eq
      value: 9
      true_next: d8_d9
      false_next: check_d10
    check_d10:
      type: condition
      variable: target_domain
      operator: eq
      value: 10
      true_next: d8_d10
      false_next: check_d13
    check_d13:
      type: condition
      variable: target_domain
      operator: eq
      value: 13
      true_next: d8_d13
      false_next: general
    d8_d7:
      type: return
      value:
        integration_type: PRIMARY
        module: "Signal-Database Integration"
        synergy: "spontaneous reporting data is the primary input for statistical signal detection"
        epas: "EPA4, EPA5"
        nexcore: "nexcore-faers-etl feeds nexcore-pv-core feeds nexcore-signal-pipeline"
    d8_d15:
      type: return
      value:
        integration_type: PRIMARY
        module: "Signal-Literature Integration"
        synergy: "literature evidence validates and contextualizes statistical signals"
        epas: "EPA2, EPA5"
    d8_d2:
      type: return
      value:
        integration_type: PRIMARY
        module: "Signal-Clinical Integration"
        synergy: "clinical knowledge essential for signal validation, causality, biological plausibility"
        epas: "EPA5, EPA8"
    d8_d9:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Signal-Study Integration"
        synergy: "observational study design supports signal investigation and validation"
    d8_d10:
      type: return
      value:
        integration_type: PRIMARY
        module: "Signal-Benefit-Risk Integration"
        synergy: "signal characterization feeds benefit-risk assessment and risk management decisions"
        epas: "EPA5, EPA8"
    d8_d13:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Signal-Global Integration"
        synergy: "global perspective critical for international signal harmonization"
    general:
      type: return
      value:
        integration_type: GENERAL
        module: "Universal Signal Foundation"
        synergy: "signal detection expertise enhances safety surveillance across all domains"
        nexcore_crates: "nexcore-pv-core, nexcore-signal-pipeline, nexcore-faers-etl"
tests:
- input:
    target_domain: 7
  expect:
    integration_type: PRIMARY
    module: "Signal-Database Integration"
- input:
    target_domain: 15
  expect:
    integration_type: PRIMARY
    module: "Signal-Literature Integration"
- input:
    target_domain: 2
  expect:
    integration_type: PRIMARY
    module: "Signal-Clinical Integration"
- input:
    target_domain: 10
  expect:
    integration_type: PRIMARY
    module: "Signal-Benefit-Risk Integration"
- input:
    target_domain: 9
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 13
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 1
  expect:
    integration_type: GENERAL
- input: {}
  expect:
    integration_type: GENERAL
