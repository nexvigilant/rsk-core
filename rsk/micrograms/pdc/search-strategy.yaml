# MICROGRAM++ (upgraded 2026-04-23)
name: search-strategy
version: 0.1.0
description: "Domain 15: Route to search strategy approach by urgency, comprehensiveness requirement, and available resources."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: is_ongoing_monitoring
    type: bool
    required: false
    description: ""
  - name: is_urgent
    type: bool
    required: false
    description: ""
  - name: requires_systematic
    type: bool
    required: false
    description: ""
outputs:
  - name: ai_assist
    type: string
  - name: approach
    type: string
  - name: databases
    type: string
  - name: documentation
    type: string
  - name: strategy
    type: string
  - name: timeline
    type: string
  - name: use_for
    type: string
interface:
  inputs:
    is_ongoing_monitoring:
      type: bool
      required: false
    is_urgent:
      type: bool
      required: false
    requires_systematic:
      type: bool
      required: false
  outputs:
    ai_assist:
      type: string
    approach:
      type: string
    databases:
      type: string
    documentation:
      type: string
    strategy:
      type: string
    timeline:
      type: string
    use_for:
      type: string
ui:
  title: Search Strategy
  subtitle: "Domain 15: Route to search strategy approach by urgency, comprehensiveness requirement, and available resources."
  icon: circle
  route: /vigilance/mg/search-strategy
  steps:
    - field: is_ongoing_monitoring
      label: is ongoing monitoring
      help: Enter is_ongoing_monitoring
      widget: toggle
      placeholder: null
    - field: is_urgent
      label: is urgent
      help: Enter is_urgent
      widget: toggle
      placeholder: null
    - field: requires_systematic
      label: requires systematic
      help: Enter requires_systematic
      widget: toggle
      placeholder: null
  result:
    template: "ai_assist: {{ai_assist}} — approach: {{approach}} — databases: {{databases}} — documentation: {{documentation}} — strategy: {{strategy}} — timeline: {{timeline}} — use_for: {{use_for}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/search-strategy
  cli: rsk mcg run search-strategy
  auth: none
  rate_limit: 600/min
tree:
  start: check_urgency
  nodes:
    check_urgency:
      type: condition
      variable: is_urgent
      operator: eq
      value: true
      true_next: rapid_search
      false_next: check_systematic
    check_systematic:
      type: condition
      variable: requires_systematic
      operator: eq
      value: true
      true_next: systematic_review
      false_next: check_monitoring
    check_monitoring:
      type: condition
      variable: is_ongoing_monitoring
      operator: eq
      value: true
      true_next: continuous_monitoring
      false_next: targeted_search
    rapid_search:
      type: return
      value:
        strategy: RAPID
        timeline: hours to 1-2 days
        approach: focused search of key databases, AI-assisted relevance ranking
        databases: PubMed (clinical queries filter), FAERS quick search, known expert consultation
        documentation: brief search log, results summary, limitations acknowledged
        ai_assist: real-time relevance scoring, automated extraction, rapid summarization
        use_for: safety emergencies, urgent regulatory queries, crisis response
    systematic_review:
      type: return
      value:
        strategy: SYSTEMATIC
        timeline: weeks to months
        approach: comprehensive, pre-specified protocol, reproducible, bias-minimized
        databases: PubMed + Embase + Cochrane + grey literature + trial registries
        documentation: PRISMA flow, registered protocol, full search strategy, quality assessment
        ai_assist: automated screening, data extraction, quality scoring, meta-analysis support
        use_for: regulatory submissions, PSUR/PBRER, signal validation, evidence-based decisions
    continuous_monitoring:
      type: return
      value:
        strategy: CONTINUOUS
        timeline: ongoing, automated
        approach: AI-powered surveillance with human review of flagged items
        databases: all relevant databases with automated alerts and RSS feeds
        documentation: monitoring log, alert review records, escalation documentation
        ai_assist: automated alerts, trend detection, relevance filtering, priority ranking
        use_for: routine pharmacovigilance, signal detection, regulatory intelligence
    targeted_search:
      type: return
      value:
        strategy: TARGETED
        timeline: days to weeks
        approach: focused search addressing specific safety question with defined scope
        databases: selected based on question type — clinical, regulatory, epidemiological
        documentation: search strategy, database selection rationale, results summary
        ai_assist: semantic search, citation networking, automated summarization
        use_for: specific safety questions, case-level literature, topic reviews
tests:
  - input:
      is_urgent: true
    expect:
      strategy: RAPID
      timeline: hours to 1-2 days
  - input:
      requires_systematic: true
      is_urgent: false
    expect:
      strategy: SYSTEMATIC
      timeline: weeks to months
  - input:
      is_ongoing_monitoring: true
      is_urgent: false
      requires_systematic: false
    expect:
      strategy: CONTINUOUS
      timeline: ongoing, automated
  - input:
      is_urgent: false
      requires_systematic: false
      is_ongoing_monitoring: false
    expect:
      strategy: TARGETED
  - input: {}
    expect:
      strategy: TARGETED
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - ai_assist
    - approach
    - databases
    - documentation
    - strategy
    - timeline
    - use_for
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
