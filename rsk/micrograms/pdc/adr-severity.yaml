name: adr-severity
description: "Domain 3: Grade ADR severity and determine response urgency — maps to CTCAE-style grading with clinical action."
version: 0.1.0
interface:
  inputs:
    is_fatal:
      type: bool
      required: false
    is_life_threatening:
      type: bool
      required: false
    requires_hospitalization:
      type: bool
      required: false
    requires_medical_intervention:
      type: bool
      required: false
  outputs:
    action:
      type: string
    ai_priority:
      type: string
    clinical:
      type: string
    escalate:
      type: bool
    grade:
      type: int
    priority:
      type: string
    reporting:
      type: string
    severity:
      type: string
tree:
  start: check_fatal
  nodes:
    check_fatal:
      type: condition
      variable: is_fatal
      operator: eq
      value: true
      true_next: grade_5
      false_next: check_life_threatening
    check_life_threatening:
      type: condition
      variable: is_life_threatening
      operator: eq
      value: true
      true_next: grade_4
      false_next: check_hospitalization
    check_hospitalization:
      type: condition
      variable: requires_hospitalization
      operator: eq
      value: true
      true_next: grade_3
      false_next: check_intervention
    check_intervention:
      type: condition
      variable: requires_medical_intervention
      operator: eq
      value: true
      true_next: grade_2
      false_next: grade_1
    grade_5:
      type: return
      value:
        grade: 5
        severity: FATAL
        action: "immediate root cause analysis, expedited regulatory report (7 days)"
        clinical: "post-mortem review if available, comprehensive case documentation"
        reporting: EXPEDITED_FATAL
        ai_priority: critical
        escalate: true
        priority: 1
    grade_4:
      type: return
      value:
        grade: 4
        severity: LIFE_THREATENING
        action: "immediate drug discontinuation review, ICU-level monitoring"
        clinical: "specialist consultation, aggressive supportive care, consider antidote"
        reporting: EXPEDITED_SERIOUS
        ai_priority: high
        escalate: true
        priority: 1
    grade_3:
      type: return
      value:
        grade: 3
        severity: SEVERE
        action: "drug discontinuation or dose modification, inpatient monitoring"
        clinical: "specialist referral, diagnostic workup, treatment plan"
        reporting: EXPEDITED_SERIOUS
        ai_priority: high
        escalate: true
        priority: 2
    grade_2:
      type: return
      value:
        grade: 2
        severity: MODERATE
        action: "dose modification considered, outpatient monitoring, follow-up scheduled"
        clinical: "symptomatic treatment, monitoring plan, patient education"
        reporting: STANDARD
        ai_priority: medium
        escalate: false
        priority: 3
    grade_1:
      type: return
      value:
        grade: 1
        severity: MILD
        action: "continue treatment with monitoring, document and track"
        clinical: "observation, reassurance, symptom management if needed"
        reporting: STANDARD
        ai_priority: low
        escalate: false
        priority: 4
primitive_signature:
  dominant: 'κ'
  expression: 'κ — measurement, comparison, or classification'
  primes: ['κ']
  arguments: []
tests:
- input:
    is_fatal: true
  expect:
    grade: 5
    severity: FATAL
    reporting: EXPEDITED_FATAL
    escalate: true
    priority: 1
- input:
    is_life_threatening: true
    is_fatal: false
  expect:
    grade: 4
    severity: LIFE_THREATENING
    escalate: true
    priority: 1
- input:
    requires_hospitalization: true
    is_life_threatening: false
    is_fatal: false
  expect:
    grade: 3
    severity: SEVERE
    escalate: true
    priority: 2
- input:
    requires_medical_intervention: true
    requires_hospitalization: false
  expect:
    grade: 2
    severity: MODERATE
    escalate: false
    priority: 3
- input:
    requires_medical_intervention: false
  expect:
    grade: 1
    severity: MILD
    escalate: false
    priority: 4
- input: {}
  expect:
    grade: 1
    severity: MILD
    escalate: false
    priority: 4
