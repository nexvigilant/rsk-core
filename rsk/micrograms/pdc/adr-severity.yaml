# MICROGRAM++ (upgraded 2026-04-23)
name: adr-severity
version: 0.1.0
description: "Domain 3: Grade ADR severity and determine response urgency — maps to CTCAE-style grading with clinical action."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: is_fatal
    type: bool
    required: false
    description: ""
  - name: is_life_threatening
    type: bool
    required: false
    description: ""
  - name: requires_hospitalization
    type: bool
    required: false
    description: ""
  - name: requires_medical_intervention
    type: bool
    required: false
    description: ""
outputs:
  - name: action
    type: string
  - name: ai_priority
    type: string
  - name: clinical
    type: string
  - name: escalate
    type: bool
  - name: grade
    type: int
  - name: priority
    type: int
  - name: reporting
    type: string
  - name: severity
    type: string
interface:
  inputs:
    is_fatal:
      type: bool
      required: false
    is_life_threatening:
      type: bool
      required: false
    requires_hospitalization:
      type: bool
      required: false
    requires_medical_intervention:
      type: bool
      required: false
  outputs:
    action:
      type: string
    ai_priority:
      type: string
    clinical:
      type: string
    escalate:
      type: bool
    grade:
      type: int
    priority:
      type: int
    reporting:
      type: string
    severity:
      type: string
ui:
  title: Adr Severity
  subtitle: "Domain 3: Grade ADR severity and determine response urgency — maps to CTCAE-style grading with clinical action."
  icon: circle
  route: /vigilance/mg/adr-severity
  steps:
    - field: is_fatal
      label: is fatal
      help: Enter is_fatal
      widget: toggle
      placeholder: null
    - field: is_life_threatening
      label: is life threatening
      help: Enter is_life_threatening
      widget: toggle
      placeholder: null
    - field: requires_hospitalization
      label: requires hospitalization
      help: Enter requires_hospitalization
      widget: toggle
      placeholder: null
    - field: requires_medical_intervention
      label: requires medical intervention
      help: Enter requires_medical_intervention
      widget: toggle
      placeholder: null
  result:
    template: "action: {{action}} — ai_priority: {{ai_priority}} — clinical: {{clinical}} — escalate: {{escalate}} — grade: {{grade}} — priority: {{priority}} — reporting: {{reporting}} — severity: {{severity}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/adr-severity
  cli: rsk mcg run adr-severity
  auth: none
  rate_limit: 600/min
tree:
  start: check_fatal
  nodes:
    check_fatal:
      type: condition
      variable: is_fatal
      operator: eq
      value: true
      true_next: grade_5
      false_next: check_life_threatening
    check_life_threatening:
      type: condition
      variable: is_life_threatening
      operator: eq
      value: true
      true_next: grade_4
      false_next: check_hospitalization
    check_hospitalization:
      type: condition
      variable: requires_hospitalization
      operator: eq
      value: true
      true_next: grade_3
      false_next: check_intervention
    check_intervention:
      type: condition
      variable: requires_medical_intervention
      operator: eq
      value: true
      true_next: grade_2
      false_next: grade_1
    grade_5:
      type: return
      value:
        grade: 5
        severity: FATAL
        action: immediate root cause analysis, expedited regulatory report (7 days)
        clinical: post-mortem review if available, comprehensive case documentation
        reporting: EXPEDITED_FATAL
        ai_priority: critical
        escalate: true
        priority: 1
    grade_4:
      type: return
      value:
        grade: 4
        severity: LIFE_THREATENING
        action: immediate drug discontinuation review, ICU-level monitoring
        clinical: specialist consultation, aggressive supportive care, consider antidote
        reporting: EXPEDITED_SERIOUS
        ai_priority: high
        escalate: true
        priority: 1
    grade_3:
      type: return
      value:
        grade: 3
        severity: SEVERE
        action: drug discontinuation or dose modification, inpatient monitoring
        clinical: specialist referral, diagnostic workup, treatment plan
        reporting: EXPEDITED_SERIOUS
        ai_priority: high
        escalate: true
        priority: 2
    grade_2:
      type: return
      value:
        grade: 2
        severity: MODERATE
        action: dose modification considered, outpatient monitoring, follow-up scheduled
        clinical: symptomatic treatment, monitoring plan, patient education
        reporting: STANDARD
        ai_priority: medium
        escalate: false
        priority: 3
    grade_1:
      type: return
      value:
        grade: 1
        severity: MILD
        action: continue treatment with monitoring, document and track
        clinical: observation, reassurance, symptom management if needed
        reporting: STANDARD
        ai_priority: low
        escalate: false
        priority: 4
tests:
  - input:
      is_fatal: true
    expect:
      grade: 5
      severity: FATAL
      reporting: EXPEDITED_FATAL
      escalate: true
      priority: 1
  - input:
      is_life_threatening: true
      is_fatal: false
    expect:
      grade: 4
      severity: LIFE_THREATENING
      escalate: true
      priority: 1
  - input:
      requires_hospitalization: true
      is_life_threatening: false
      is_fatal: false
    expect:
      grade: 3
      severity: SEVERE
      escalate: true
      priority: 2
  - input:
      requires_medical_intervention: true
      requires_hospitalization: false
    expect:
      grade: 2
      severity: MODERATE
      escalate: false
      priority: 3
  - input:
      requires_medical_intervention: false
    expect:
      grade: 1
      severity: MILD
      escalate: false
      priority: 4
  - input: {}
    expect:
      grade: 1
      severity: MILD
      escalate: false
      priority: 4
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - action
    - ai_priority
    - clinical
    - escalate
    - grade
    - priority
    - reporting
    - severity
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
