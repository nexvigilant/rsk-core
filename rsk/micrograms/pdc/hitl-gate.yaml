# MICROGRAM++ (upgraded 2026-04-23)
name: hitl-gate
version: 0.1.0
description: "PDC: Human-in-the-Loop gate — classify actions as AUTO (agent decides), REVIEW (human reviews output), APPROVE (human must pre-approve)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: affects_patient_safety
    type: bool
    required: false
    description: ""
  - name: affects_regulatory_compliance
    type: bool
    required: false
    description: ""
  - name: crosses_cpa_boundary
    type: bool
    required: false
    description: ""
  - name: is_ai_autonomous_decision
    type: bool
    required: false
    description: ""
  - name: is_irreversible
    type: bool
    required: false
    description: ""
  - name: scope
    type: string
    required: false
    description: ""
outputs:
  - name: audit_required
    type: bool
  - name: flywheel_tier
    type: string
  - name: gate
    type: string
  - name: governance_tier_min
    type: int
  - name: human_action
    type: string
  - name: rationale
    type: string
interface:
  inputs:
    affects_patient_safety:
      type: bool
      required: false
    affects_regulatory_compliance:
      type: bool
      required: false
    crosses_cpa_boundary:
      type: bool
      required: false
    is_ai_autonomous_decision:
      type: bool
      required: false
    is_irreversible:
      type: bool
      required: false
    scope:
      type: string
      required: false
  outputs:
    audit_required:
      type: bool
    flywheel_tier:
      type: string
    gate:
      type: string
    governance_tier_min:
      type: int
    human_action:
      type: string
    rationale:
      type: string
ui:
  title: Hitl Gate
  subtitle: "PDC: Human-in-the-Loop gate — classify actions as AUTO (agent decides), REVIEW (human reviews output), APPROVE (human must pre-approve)"
  icon: circle
  route: /vigilance/mg/hitl-gate
  steps:
    - field: affects_patient_safety
      label: affects patient safety
      help: Enter affects_patient_safety
      widget: toggle
      placeholder: null
    - field: affects_regulatory_compliance
      label: affects regulatory compliance
      help: Enter affects_regulatory_compliance
      widget: toggle
      placeholder: null
    - field: crosses_cpa_boundary
      label: crosses cpa boundary
      help: Enter crosses_cpa_boundary
      widget: toggle
      placeholder: null
    - field: is_ai_autonomous_decision
      label: is ai autonomous decision
      help: Enter is_ai_autonomous_decision
      widget: toggle
      placeholder: null
    - field: is_irreversible
      label: is irreversible
      help: Enter is_irreversible
      widget: toggle
      placeholder: null
    - field: scope
      label: scope
      help: Enter scope
      widget: text
      placeholder: null
  result:
    template: "audit_required: {{audit_required}} — flywheel_tier: {{flywheel_tier}} — gate: {{gate}} — governance_tier_min: {{governance_tier_min}} — human_action: {{human_action}} — rationale: {{rationale}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/hitl-gate
  cli: rsk mcg run hitl-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_irreversible
  nodes:
    check_irreversible:
      type: condition
      variable: is_irreversible
      operator: eq
      value: true
      true_next: human_approve
      false_next: check_patient_safety
    check_patient_safety:
      type: condition
      variable: affects_patient_safety
      operator: eq
      value: true
      true_next: human_approve
      false_next: check_regulatory
    check_regulatory:
      type: condition
      variable: affects_regulatory_compliance
      operator: eq
      value: true
      true_next: human_review
      false_next: check_scope
    check_scope:
      type: condition
      variable: scope
      operator: eq
      value: enterprise
      true_next: human_review
      false_next: check_scope_org
    check_scope_org:
      type: condition
      variable: scope
      operator: eq
      value: organizational
      true_next: human_review
      false_next: check_cross_cpa
    check_cross_cpa:
      type: condition
      variable: crosses_cpa_boundary
      operator: eq
      value: true
      true_next: human_review
      false_next: check_ai_decision
    check_ai_decision:
      type: condition
      variable: is_ai_autonomous_decision
      operator: eq
      value: true
      true_next: human_review
      false_next: auto_approve
    human_approve:
      type: return
      value:
        gate: APPROVE
        human_action: pre-approve before execution
        flywheel_tier: DRAFT
        rationale: irreversible or patient-safety-affecting actions require human authorization
        audit_required: true
        governance_tier_min: 1
    human_review:
      type: return
      value:
        gate: REVIEW
        human_action: review output before promotion to Live
        flywheel_tier: STAGING
        rationale: regulatory, organizational, cross-CPA, or AI decisions require human oversight
        audit_required: true
        governance_tier_min: 2
    auto_approve:
      type: return
      value:
        gate: AUTO
        human_action: none — agent proceeds autonomously
        flywheel_tier: LIVE
        rationale: reversible, single-CPA, non-safety action within agent scope
        audit_required: false
        governance_tier_min: 3
tests:
  - input:
      is_irreversible: true
    expect:
      gate: APPROVE
      flywheel_tier: DRAFT
      audit_required: true
  - input:
      affects_patient_safety: true
      is_irreversible: false
    expect:
      gate: APPROVE
      governance_tier_min: 1
  - input:
      affects_regulatory_compliance: true
      is_irreversible: false
      affects_patient_safety: false
    expect:
      gate: REVIEW
      flywheel_tier: STAGING
  - input:
      scope: enterprise
      is_irreversible: false
      affects_patient_safety: false
      affects_regulatory_compliance: false
    expect:
      gate: REVIEW
  - input:
      scope: organizational
      is_irreversible: false
      affects_patient_safety: false
      affects_regulatory_compliance: false
    expect:
      gate: REVIEW
  - input:
      crosses_cpa_boundary: true
      scope: team
      is_irreversible: false
      affects_patient_safety: false
      affects_regulatory_compliance: false
    expect:
      gate: REVIEW
  - input:
      is_ai_autonomous_decision: true
      crosses_cpa_boundary: false
      scope: team
      is_irreversible: false
      affects_patient_safety: false
      affects_regulatory_compliance: false
    expect:
      gate: REVIEW
      rationale: regulatory, organizational, cross-CPA, or AI decisions require human oversight
  - input:
      is_irreversible: false
      affects_patient_safety: false
      affects_regulatory_compliance: false
      scope: team
      crosses_cpa_boundary: false
      is_ai_autonomous_decision: false
    expect:
      gate: AUTO
      flywheel_tier: LIVE
      audit_required: false
  - input: {}
    expect:
      gate: AUTO
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - audit_required
    - flywheel_tier
    - gate
    - governance_tier_min
    - human_action
    - rationale
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
