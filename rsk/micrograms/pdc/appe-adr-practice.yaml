# MICROGRAM++ (upgraded 2026-04-23)
name: appe-adr-practice
version: 0.1.0
description: "APPE Ch7.2 Domain 2: ADR classification practice — maps reaction characteristics to DoTS/WHO type (A/B/C) with confidence and teaching points."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: dose_dependent
    type: bool
    required: false
    description: ""
  - name: immunological
    type: bool
    required: false
    description: ""
  - name: mechanism_known
    type: bool
    required: false
    description: ""
  - name: onset_days
    type: int
    required: false
    description: ""
  - name: reaction_predictable
    type: bool
    required: false
    description: ""
outputs:
  - name: adr_type
    type: string
  - name: classification
    type: string
  - name: confidence
    type: string
  - name: explanation
    type: string
  - name: needs_review
    type: bool
  - name: teaching_point
    type: string
interface:
  inputs:
    dose_dependent:
      type: bool
      required: false
    immunological:
      type: bool
      required: false
    mechanism_known:
      type: bool
      required: false
    onset_days:
      type: int
      required: false
    reaction_predictable:
      type: bool
      required: false
  outputs:
    adr_type:
      type: string
    classification:
      type: string
    confidence:
      type: string
    explanation:
      type: string
    needs_review:
      type: bool
    teaching_point:
      type: string
ui:
  title: Appe Adr Practice
  subtitle: "APPE Ch7.2 Domain 2: ADR classification practice — maps reaction characteristics to DoTS/WHO type (A/B/C) with confidence and teaching points."
  icon: circle
  route: /vigilance/mg/appe-adr-practice
  steps:
    - field: dose_dependent
      label: dose dependent
      help: Enter dose_dependent
      widget: toggle
      placeholder: null
    - field: immunological
      label: immunological
      help: Enter immunological
      widget: toggle
      placeholder: null
    - field: mechanism_known
      label: mechanism known
      help: Enter mechanism_known
      widget: toggle
      placeholder: null
    - field: onset_days
      label: onset days
      help: Enter onset_days
      widget: text
      placeholder: null
    - field: reaction_predictable
      label: reaction predictable
      help: Enter reaction_predictable
      widget: toggle
      placeholder: null
  result:
    template: "adr_type: {{adr_type}} — classification: {{classification}} — confidence: {{confidence}} — explanation: {{explanation}} — needs_review: {{needs_review}} — teaching_point: {{teaching_point}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/appe-adr-practice
  cli: rsk mcg run appe-adr-practice
  auth: none
  rate_limit: 600/min
tree:
  start: check_type_a
  nodes:
    check_type_a:
      type: condition
      variable: reaction_predictable
      operator: eq
      value: true
      true_next: check_type_a_dose
      false_next: check_type_b
    check_type_a_dose:
      type: condition
      variable: dose_dependent
      operator: eq
      value: true
      true_next: check_type_a_mechanism
      false_next: check_type_b
    check_type_a_mechanism:
      type: condition
      variable: mechanism_known
      operator: eq
      value: true
      true_next: type_a_high
      false_next: check_type_b
    check_type_b:
      type: condition
      variable: immunological
      operator: eq
      value: true
      true_next: check_type_b_not_dose
      false_next: check_type_c
    check_type_b_not_dose:
      type: condition
      variable: dose_dependent
      operator: eq
      value: false
      true_next: type_b_high
      false_next: check_type_c
    check_type_c:
      type: condition
      variable: onset_days
      operator: gt
      value: 365
      true_next: type_c_moderate
      false_next: check_type_a_delayed
    check_type_a_delayed:
      type: condition
      variable: onset_days
      operator: gt
      value: 30
      true_next: check_delayed_not_immune
      false_next: ambiguous
    check_delayed_not_immune:
      type: condition
      variable: immunological
      operator: eq
      value: false
      true_next: type_a_delayed_moderate
      false_next: ambiguous
    type_a_high:
      type: return
      value:
        adr_type: A
        classification: Augmented
        confidence: HIGH
        explanation: Predictable, dose-dependent, mechanism-known reaction. Occurs due to exaggerated but normal pharmacological effect.
        teaching_point: "Type A ADRs are most common (>80% of all ADRs). They are dose-dependent and predictable from the drug's pharmacology. Management: dose reduction or discontinuation."
    type_b_high:
      type: return
      value:
        adr_type: B
        classification: Bizarre
        confidence: HIGH
        explanation: Immunological reaction, not dose-dependent. Unrelated to the drug's primary pharmacological action.
        teaching_point: Type B ADRs are idiosyncratic and unpredictable. Immune-mediated reactions (e.g., anaphylaxis, SJS) often require immediate discontinuation with no rechallenge.
    type_c_moderate:
      type: return
      value:
        adr_type: C
        classification: Chronic/Delayed
        confidence: MODERATE
        explanation: Long latency (>365 days) suggests cumulative or adaptive change rather than acute pharmacological effect.
        teaching_point: Type C ADRs result from prolonged drug exposure (e.g., analgesic nephropathy, tardive dyskinesia). Often dose-cumulative rather than dose-rate dependent.
    type_a_delayed_moderate:
      type: return
      value:
        adr_type: A
        classification: Augmented (Delayed)
        confidence: MODERATE
        explanation: Onset 30-365 days, non-immunological. Consistent with delayed manifestation of pharmacological mechanism.
        teaching_point: Some Type A ADRs have delayed onset due to cumulative tissue effects or slow pharmacokinetic accumulation. Re-evaluate dose and duration of treatment.
    ambiguous:
      type: return
      value:
        adr_type: UNKNOWN
        classification: Ambiguous
        confidence: LOW
        needs_review: true
        explanation: Reaction characteristics do not clearly map to Type A, B, or C. Further clinical and mechanistic data needed.
        teaching_point: When classification is unclear, document all features (onset, dose relationship, immunological markers, rechallenge) and seek expert causality assessment. Consider Naranjo or WHO-UMC scoring.
tests:
  - input:
      reaction_predictable: true
      dose_dependent: true
      mechanism_known: true
      immunological: false
      onset_days: 2
    expect:
      adr_type: A
      classification: Augmented
      confidence: HIGH
  - input:
      reaction_predictable: false
      dose_dependent: false
      mechanism_known: false
      immunological: true
      onset_days: 5
    expect:
      adr_type: B
      classification: Bizarre
      confidence: HIGH
  - input:
      reaction_predictable: false
      dose_dependent: false
      mechanism_known: false
      immunological: false
      onset_days: 400
    expect:
      adr_type: C
      classification: Chronic/Delayed
      confidence: MODERATE
  - input:
      reaction_predictable: false
      dose_dependent: false
      mechanism_known: false
      immunological: false
      onset_days: 60
    expect:
      adr_type: A
      classification: Augmented (Delayed)
      confidence: MODERATE
  - input:
      reaction_predictable: false
      dose_dependent: true
      mechanism_known: false
      immunological: true
      onset_days: 10
    expect:
      adr_type: UNKNOWN
      needs_review: true
      confidence: LOW
  - input:
      reaction_predictable: false
      dose_dependent: false
      mechanism_known: false
      immunological: false
      onset_days: 10
    expect:
      adr_type: UNKNOWN
      needs_review: true
  - input:
      reaction_predictable: true
      dose_dependent: true
      mechanism_known: false
      immunological: false
      onset_days: 10
    expect:
      adr_type: UNKNOWN
      confidence: LOW
  - input:
      reaction_predictable: false
      dose_dependent: true
      mechanism_known: false
      immunological: true
      onset_days: 5
    expect:
      adr_type: UNKNOWN
      confidence: LOW
  - input:
      reaction_predictable: false
      dose_dependent: false
      mechanism_known: false
      immunological: false
      onset_days: 365
    expect:
      adr_type: A
      classification: Augmented (Delayed)
      confidence: MODERATE
  - input:
      reaction_predictable: false
      dose_dependent: false
      mechanism_known: false
      immunological: false
      onset_days: 30
    expect:
      adr_type: UNKNOWN
      confidence: LOW
  - input: {}
    expect:
      adr_type: UNKNOWN
      classification: Ambiguous
      confidence: LOW
      explanation: Reaction characteristics do not clearly map to Type A, B, or C. Further clinical and mechanistic data needed.
      needs_review: true
      teaching_point: When classification is unclear, document all features (onset, dose relationship, immunological markers, rechallenge) and seek expert causality assessment. Consider Naranjo or WHO-UMC scoring.
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - adr_type
    - classification
    - confidence
    - explanation
    - needs_review
    - teaching_point
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
