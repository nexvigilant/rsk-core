# MICROGRAM++ (upgraded 2026-04-23)
name: integration-d10
version: 0.1.0
description: Domain 10 cross-domain integration — benefit-risk assessment connects to communication, signal detection, risk management, and research.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: target_domain
    type: int
    required: false
    description: ""
outputs:
  - name: epas
    type: string
  - name: integration_type
    type: string
  - name: module
    type: string
  - name: nexcore
    type: string
  - name: synergy
    type: string
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    epas:
      type: string
    integration_type:
      type: string
    module:
      type: string
    nexcore:
      type: string
    synergy:
      type: string
ui:
  title: Integration D10
  subtitle: Domain 10 cross-domain integration — benefit-risk assessment connects to communication, signal detection, risk management, and research.
  icon: circle
  route: /vigilance/mg/integration-d10
  steps:
    - field: target_domain
      label: target domain
      help: Enter target_domain
      widget: text
      placeholder: null
  result:
    template: "epas: {{epas}} — integration_type: {{integration_type}} — module: {{module}} — nexcore: {{nexcore}} — synergy: {{synergy}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/integration-d10
  cli: rsk mcg run integration-d10
  auth: none
  rate_limit: 600/min
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 14
      true_next: d10_d14
      false_next: check_d8
    check_d8:
      type: condition
      variable: target_domain
      operator: eq
      value: 8
      true_next: d10_d8
      false_next: check_d11
    check_d11:
      type: condition
      variable: target_domain
      operator: eq
      value: 11
      true_next: d10_d11
      false_next: check_d9
    check_d9:
      type: condition
      variable: target_domain
      operator: eq
      value: 9
      true_next: d10_d9
      false_next: check_d2
    check_d2:
      type: condition
      variable: target_domain
      operator: eq
      value: 2
      true_next: d10_d2
      false_next: check_d15
    check_d15:
      type: condition
      variable: target_domain
      operator: eq
      value: 15
      true_next: d10_d15
      false_next: general
    d10_d14:
      type: return
      value:
        integration_type: PRIMARY
        module: Assessment-Communication Integration
        synergy: B/R assessment produces decisions, communication delivers them to stakeholders
        epas: EPA3, EPA8
        nexcore: nexcore-qbr outputs feed communication workflows
    d10_d8:
      type: return
      value:
        integration_type: PRIMARY
        module: Assessment-Signal Integration
        synergy: signal detection generates safety questions, B/R assessment evaluates their impact
        epas: EPA5, EPA8
    d10_d11:
      type: return
      value:
        integration_type: PRIMARY
        module: Assessment-Risk Management
        synergy: B/R assessment defines risk magnitude, risk management defines response
        epas: EPA7, EPA11
    d10_d9:
      type: return
      value:
        integration_type: PRIMARY
        module: Assessment-Research
        synergy: research generates evidence, assessment synthesizes it into decisions
        epas: EPA4, EPA5
    d10_d2:
      type: return
      value:
        integration_type: SUPPORTING
        module: Assessment-Clinical
        synergy: clinical knowledge essential for outcome interpretation and significance evaluation
    d10_d15:
      type: return
      value:
        integration_type: SUPPORTING
        module: Assessment-Information
        synergy: information management critical for evidence synthesis and stakeholder engagement
    general:
      type: return
      value:
        integration_type: GENERAL
        module: Universal Assessment Foundation
        synergy: B/R assessment underpins all strategic PV decisions from signal to regulatory action
tests:
  - input:
      target_domain: 14
    expect:
      integration_type: PRIMARY
      module: Assessment-Communication Integration
  - input:
      target_domain: 8
    expect:
      integration_type: PRIMARY
      module: Assessment-Signal Integration
  - input:
      target_domain: 11
    expect:
      integration_type: PRIMARY
      module: Assessment-Risk Management
  - input:
      target_domain: 9
    expect:
      integration_type: PRIMARY
  - input:
      target_domain: 2
    expect:
      integration_type: SUPPORTING
  - input:
      target_domain: 15
    expect:
      integration_type: SUPPORTING
  - input:
      target_domain: 1
    expect:
      integration_type: GENERAL
  - input: {}
    expect:
      integration_type: GENERAL
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - epas
    - integration_type
    - module
    - nexcore
    - synergy
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
