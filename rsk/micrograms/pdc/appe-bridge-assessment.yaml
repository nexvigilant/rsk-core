# MICROGRAM++ (upgraded 2026-04-23)
name: appe-bridge-assessment
version: 0.1.0
description: "APPE Ch7.6: APPE-to-Fellowship bridge assessment. Routes to Fellowship, Industry, or ContinuingEd. Chains from appe-integration-scorer and level-gate."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: d1_level
    type: int
    required: false
    description: ""
  - name: d2_level
    type: float
    required: false
    description: ""
  - name: d3_level
    type: int
    required: false
    description: ""
  - name: growth_evidence_score
    type: float
    required: false
    description: ""
  - name: integration_score
    type: int
    required: false
    description: ""
  - name: learning_agility_score
    type: float
    required: false
    description: ""
outputs:
  - name: alternative
    type: string
  - name: application_strength
    type: string
  - name: career_plan
    type: object
  - name: confidence
    type: string
  - name: development_area
    type: string
  - name: fellowship_ready
    type: bool
  - name: pathway
    type: string
  - name: plan
    type: object
  - name: pre_fellowship_plan
    type: object
  - name: recommendation
    type: string
  - name: strengths
    type: string
interface:
  inputs:
    d1_level:
      type: int
      required: false
    d2_level:
      type: float
      required: false
    d3_level:
      type: int
      required: false
    growth_evidence_score:
      type: float
      required: false
    integration_score:
      type: int
      required: false
    learning_agility_score:
      type: float
      required: false
  outputs:
    alternative:
      type: string
    application_strength:
      type: string
    career_plan:
      type: object
    confidence:
      type: string
    development_area:
      type: string
    fellowship_ready:
      type: bool
    pathway:
      type: string
    plan:
      type: object
    pre_fellowship_plan:
      type: object
    recommendation:
      type: string
    strengths:
      type: string
ui:
  title: Appe Bridge Assessment
  subtitle: "APPE Ch7.6: APPE-to-Fellowship bridge assessment. Routes to Fellowship, Industry, or ContinuingEd. Chains from appe-integration-scorer and level-gate."
  icon: circle
  route: /vigilance/mg/appe-bridge-assessment
  steps:
    - field: d1_level
      label: d1 level
      help: Enter d1_level
      widget: text
      placeholder: null
    - field: d2_level
      label: d2 level
      help: Enter d2_level
      widget: text
      placeholder: null
    - field: d3_level
      label: d3 level
      help: Enter d3_level
      widget: text
      placeholder: null
    - field: growth_evidence_score
      label: growth evidence score
      help: Enter growth_evidence_score
      widget: text
      placeholder: null
    - field: integration_score
      label: integration score
      help: Enter integration_score
      widget: text
      placeholder: null
    - field: learning_agility_score
      label: learning agility score
      help: Enter learning_agility_score
      widget: text
      placeholder: null
  result:
    template: "alternative: {{alternative}} — application_strength: {{application_strength}} — career_plan: {{career_plan}} — confidence: {{confidence}} — development_area: {{development_area}} — fellowship_ready: {{fellowship_ready}} — pathway: {{pathway}} — plan: {{plan}} — pre_fellowship_plan: {{pre_fellowship_plan}} — recommendation: {{recommendation}} — strengths: {{strengths}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/appe-bridge-assessment
  cli: rsk mcg run appe-bridge-assessment
  auth: none
  rate_limit: 600/min
tree:
  start: check_d1
  nodes:
    check_d1:
      type: condition
      variable: d1_level
      operator: gte
      value: 2
      true_next: check_d2
      false_next: not_ready_domains
    check_d2:
      type: condition
      variable: d2_level
      operator: gte
      value: 2
      true_next: check_d3
      false_next: not_ready_domains
    check_d3:
      type: condition
      variable: d3_level
      operator: gte
      value: 2
      true_next: check_integration
      false_next: not_ready_domains
    check_integration:
      type: condition
      variable: integration_score
      operator: gte
      value: 3
      true_next: check_agility
      false_next: check_integration_partial
    check_integration_partial:
      type: condition
      variable: integration_score
      operator: gte
      value: 2
      true_next: industry_ready
      false_next: continuing_ed
    check_agility:
      type: condition
      variable: learning_agility_score
      operator: gte
      value: 3.5
      true_next: check_growth
      false_next: check_agility_mid
    check_agility_mid:
      type: condition
      variable: learning_agility_score
      operator: gte
      value: 2.5
      true_next: fellowship_possible
      false_next: industry_ready
    check_growth:
      type: condition
      variable: growth_evidence_score
      operator: gte
      value: 3.5
      true_next: fellowship_strong
      false_next: fellowship_ready
    fellowship_strong:
      type: return
      value:
        pathway: FELLOWSHIP
        confidence: HIGH
        fellowship_ready: true
        recommendation: Strong Fellowship candidate. Meets all L2 anchors, exemplary integration, high agility.
        pre_fellowship_plan:
          months_1_3: Advanced PV reading + professional organization involvement
          months_4_6: Epidemiology/biostatistics coursework + conference presentation
        application_strength: Behavioral evidence portfolio, Foundation-Communication mastery, growth trajectory
        alternative: Could also excel in direct industry entry at advanced level
    fellowship_ready:
      type: return
      value:
        pathway: FELLOWSHIP
        confidence: MODERATE
        fellowship_ready: true
        recommendation: Fellowship-ready with development areas. Strong domains, good integration, growth evidence developing.
        pre_fellowship_plan:
          months_1_3: Leadership development + mentorship relationship building
          months_4_6: Research collaboration + portfolio enhancement
        application_strength: Domain mastery demonstrated, communication integration
        development_area: Strengthen growth mindset evidence through additional challenges
    fellowship_possible:
      type: return
      value:
        pathway: FELLOWSHIP_OR_INDUSTRY
        confidence: LOW
        fellowship_ready: false
        recommendation: Consider 6-12 month industry experience before Fellowship application.
        pre_fellowship_plan:
          months_1_6: Industry entry-level role building practical experience
          months_7_12: Reassess Fellowship readiness with expanded portfolio
        development_area: Learning agility needs strengthening through diverse challenge exposure
        alternative: Direct industry entry is equally valid — not a lesser path
    industry_ready:
      type: return
      value:
        pathway: INDUSTRY
        confidence: HIGH
        fellowship_ready: false
        recommendation: Well-prepared for direct industry entry. Solid foundational competencies.
        career_plan:
          immediate: Job search with competency-based portfolio
          year_1: Entry-level PV role with mentorship
          year_3: Reassess Fellowship interest with experience base
        strengths: Domain 1-3 at L2, practical workflow experience
        development_area: Build integration score and agility through workplace learning
    continuing_ed:
      type: return
      value:
        pathway: CONTINUING_EDUCATION
        confidence: MODERATE
        fellowship_ready: false
        recommendation: Foundation-Communication integration needs development. Continue structured learning.
        plan:
          immediate: Advanced coursework in PV communication
          months_3_6: Structured integration exercises with mentor
          months_6_12: Reassess pathway with enhanced integration evidence
        development_area: Integration module score below 2 — both technical and communication need parallel development
    not_ready_domains:
      type: return
      value:
        pathway: EXTENDED_APPE
        confidence: LOW
        fellowship_ready: false
        recommendation: One or more foundational domains below L2. Extended rotation or targeted remediation needed.
        plan:
          immediate: Identify specific domain gaps via anchor assessment
          weeks_1_4: Targeted remediation in gap domains
          reassessment: Re-evaluate after remediation completion
        development_area: Domain mastery prerequisite not met for any post-APPE pathway
tests:
  - input:
      d1_level: 2
      d2_level: 2.5
      d3_level: 2
      integration_score: 4
      learning_agility_score: 4
      growth_evidence_score: 4
    expect:
      pathway: FELLOWSHIP
      confidence: HIGH
      fellowship_ready: true
  - input:
      d1_level: 2
      d2_level: 2
      d3_level: 2
      integration_score: 3
      learning_agility_score: 3.5
      growth_evidence_score: 3
    expect:
      pathway: FELLOWSHIP
      confidence: MODERATE
      fellowship_ready: true
  - input:
      d1_level: 2
      d2_level: 2
      d3_level: 2
      integration_score: 3
      learning_agility_score: 3
      growth_evidence_score: 3
    expect:
      pathway: FELLOWSHIP_OR_INDUSTRY
      confidence: LOW
      fellowship_ready: false
  - input:
      d1_level: 2
      d2_level: 2
      d3_level: 2
      integration_score: 3
      learning_agility_score: 2
      growth_evidence_score: 2
    expect:
      pathway: INDUSTRY
      confidence: HIGH
      fellowship_ready: false
  - input:
      d1_level: 2
      d2_level: 2
      d3_level: 2
      integration_score: 2.5
      learning_agility_score: 3
      growth_evidence_score: 3
    expect:
      pathway: INDUSTRY
      confidence: HIGH
      fellowship_ready: false
  - input:
      d1_level: 2
      d2_level: 2
      d3_level: 2
      integration_score: 1.5
      learning_agility_score: 3
      growth_evidence_score: 3
    expect:
      pathway: CONTINUING_EDUCATION
      fellowship_ready: false
  - input:
      d1_level: 1.5
      d2_level: 2
      d3_level: 2
      integration_score: 3
      learning_agility_score: 4
      growth_evidence_score: 4
    expect:
      pathway: EXTENDED_APPE
      fellowship_ready: false
  - input:
      d1_level: 2
      d2_level: 2
      d3_level: 1.5
      integration_score: 3
      learning_agility_score: 4
      growth_evidence_score: 4
    expect:
      pathway: EXTENDED_APPE
      fellowship_ready: false
  - input:
      d1_level: 0
      d2_level: 0
      d3_level: 0
      integration_score: 0
      learning_agility_score: 0
      growth_evidence_score: 0
    expect:
      pathway: EXTENDED_APPE
      fellowship_ready: false
  - input: {}
    expect:
      pathway: EXTENDED_APPE
      fellowship_ready: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - alternative
    - application_strength
    - career_plan
    - confidence
    - development_area
    - fellowship_ready
    - pathway
    - plan
    - pre_fellowship_plan
    - recommendation
    - strengths
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
