# MICROGRAM++ (upgraded 2026-04-23)
name: epa1-case-process
version: 0.1.0
description: "EPA 1: Process ICSR — triage, collect, assess, code, narrate, submit. Routes by case seriousness and completeness."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: involves_death
    type: bool
    required: false
    description: ""
  - name: involves_hospitalization
    type: bool
    required: false
    description: ""
  - name: is_reportable
    type: bool
    required: false
    description: ""
  - name: is_serious
    type: bool
    required: false
    description: ""
  - name: life_threatening
    type: bool
    required: false
    description: ""
outputs:
  - name: ai_assist
    type: string
  - name: deadline_days
    type: int
  - name: priority
    type: string
  - name: requires_followup
    type: bool
  - name: seriousness
    type: string
  - name: steps
    type: string
  - name: workflow
    type: string
interface:
  inputs:
    involves_death:
      type: bool
      required: false
    involves_hospitalization:
      type: bool
      required: false
    is_reportable:
      type: bool
      required: false
    is_serious:
      type: bool
      required: false
    life_threatening:
      type: bool
      required: false
  outputs:
    ai_assist:
      type: string
    deadline_days:
      type: int
    priority:
      type: string
    requires_followup:
      type: bool
    seriousness:
      type: string
    steps:
      type: string
    workflow:
      type: string
ui:
  title: Epa1 Case Process
  subtitle: "EPA 1: Process ICSR — triage, collect, assess, code, narrate, submit. Routes by case seriousness and completeness."
  icon: circle
  route: /vigilance/mg/epa1-case-process
  steps:
    - field: involves_death
      label: involves death
      help: Enter involves_death
      widget: toggle
      placeholder: null
    - field: involves_hospitalization
      label: involves hospitalization
      help: Enter involves_hospitalization
      widget: toggle
      placeholder: null
    - field: is_reportable
      label: is reportable
      help: Enter is_reportable
      widget: toggle
      placeholder: null
    - field: is_serious
      label: is serious
      help: Enter is_serious
      widget: toggle
      placeholder: null
    - field: life_threatening
      label: life threatening
      help: Enter life_threatening
      widget: toggle
      placeholder: null
  result:
    template: "ai_assist: {{ai_assist}} — deadline_days: {{deadline_days}} — priority: {{priority}} — requires_followup: {{requires_followup}} — seriousness: {{seriousness}} — steps: {{steps}} — workflow: {{workflow}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/epa1-case-process
  cli: rsk mcg run epa1-case-process
  auth: none
  rate_limit: 600/min
tree:
  start: check_reportable
  nodes:
    check_reportable:
      type: condition
      variable: is_reportable
      operator: eq
      value: true
      true_next: check_serious
      false_next: not_reportable
    check_serious:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: check_death
      false_next: routine_case
    check_death:
      type: condition
      variable: involves_death
      operator: eq
      value: true
      true_next: expedited_fatal
      false_next: check_hospitalization
    check_hospitalization:
      type: condition
      variable: involves_hospitalization
      operator: eq
      value: true
      true_next: expedited_serious
      false_next: check_life_threatening
    check_life_threatening:
      type: condition
      variable: life_threatening
      operator: eq
      value: true
      true_next: expedited_serious
      false_next: serious_non_expedited
    expedited_fatal:
      type: return
      value:
        workflow: EXPEDITED
        priority: CRITICAL
        deadline_days: 7
        steps: triage -> collect -> medical_assess -> code -> narrate -> qc -> submit_expedited
        seriousness: fatal
        requires_followup: true
        ai_assist: auto-triage, coding suggestions, narrative draft, duplicate check
    expedited_serious:
      type: return
      value:
        workflow: EXPEDITED
        priority: HIGH
        deadline_days: 15
        steps: triage -> collect -> medical_assess -> code -> narrate -> qc -> submit_expedited
        seriousness: serious
        requires_followup: true
        ai_assist: auto-triage, coding suggestions, narrative draft
    serious_non_expedited:
      type: return
      value:
        workflow: STANDARD
        priority: MEDIUM
        deadline_days: 90
        steps: triage -> collect -> medical_assess -> code -> narrate -> qc -> submit_periodic
        seriousness: serious_other
        requires_followup: true
    routine_case:
      type: return
      value:
        workflow: STANDARD
        priority: NORMAL
        deadline_days: 90
        steps: triage -> collect -> assess -> code -> narrate -> qc -> submit_periodic
        seriousness: non_serious
        requires_followup: false
        ai_assist: auto-code, quality check
    not_reportable:
      type: return
      value:
        workflow: ARCHIVE
        priority: LOW
        deadline_days: 0
        steps: document -> archive
        seriousness: not_applicable
tests:
  - input:
      is_reportable: true
      is_serious: true
      involves_death: true
    expect:
      workflow: EXPEDITED
      priority: CRITICAL
      deadline_days: 7
  - input:
      is_reportable: true
      is_serious: true
      involves_hospitalization: true
      involves_death: false
    expect:
      workflow: EXPEDITED
      deadline_days: 15
  - input:
      is_reportable: true
      is_serious: true
      life_threatening: true
      involves_death: false
      involves_hospitalization: false
    expect:
      priority: HIGH
  - input:
      is_reportable: true
      is_serious: false
    expect:
      workflow: STANDARD
      priority: NORMAL
      deadline_days: 90
  - input:
      is_reportable: false
    expect:
      workflow: ARCHIVE
  - input: {}
    expect:
      workflow: ARCHIVE
  - input:
      is_reportable: true
      is_serious: true
      involves_death: false
      involves_hospitalization: false
      life_threatening: false
    expect:
      workflow: STANDARD
      priority: MEDIUM
      deadline_days: 90
      seriousness: serious_other
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - ai_assist
    - deadline_days
    - priority
    - requires_followup
    - seriousness
    - steps
    - workflow
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
