name: integration-d7
description: "Domain 7 cross-domain integration — spontaneous reporting systems connect to signal detection, case processing, literature, and global PV."
version: 0.1.0
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    epas:
      type: string
    integration_type:
      type: string
    module:
      type: string
    nexcore:
      type: string
    synergy:
      type: string
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 8
      true_next: d7_d8
      false_next: check_d15
    check_d15:
      type: condition
      variable: target_domain
      operator: eq
      value: 15
      true_next: d7_d15
      false_next: check_d4
    check_d4:
      type: condition
      variable: target_domain
      operator: eq
      value: 4
      true_next: d7_d4
      false_next: check_d9
    check_d9:
      type: condition
      variable: target_domain
      operator: eq
      value: 9
      true_next: d7_d9
      false_next: check_d12
    check_d12:
      type: condition
      variable: target_domain
      operator: eq
      value: 12
      true_next: d7_d12
      false_next: check_d13
    check_d13:
      type: condition
      variable: target_domain
      operator: eq
      value: 13
      true_next: d7_d13
      false_next: general
    d7_d8:
      type: return
      value:
        integration_type: PRIMARY
        module: "Data-Signal Integration"
        synergy: "spontaneous reporting data is the primary input for statistical signal detection"
        epas: "EPA4, EPA5"
        nexcore: "nexcore-faers-etl -> nexcore-pv-core -> nexcore-signal-pipeline"
    d7_d15:
      type: return
      value:
        integration_type: PRIMARY
        module: "Database-Literature Integration"
        synergy: "structured reporting data + unstructured literature = comprehensive safety intelligence"
        epas: "EPA2, EPA4"
    d7_d4:
      type: return
      value:
        integration_type: PRIMARY
        module: "Database-Case Processing"
        synergy: "case processing feeds database, database quality depends on case quality"
        epas: "EPA1, EPA4"
    d7_d9:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Database-Study Integration"
        synergy: "spontaneous reports contextualize observational study findings"
    d7_d12:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Database-Regulatory"
        synergy: "regulatory knowledge essential for database compliance and submission management"
    d7_d13:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Database-Global PV"
        synergy: "global perspective critical for international database integration and harmonization"
    general:
      type: return
      value:
        integration_type: GENERAL
        module: "Universal Data Foundation"
        synergy: "database management expertise underpins all analytical and intelligence activities"
tests:
- input:
    target_domain: 8
  expect:
    integration_type: PRIMARY
    module: "Data-Signal Integration"
- input:
    target_domain: 15
  expect:
    integration_type: PRIMARY
    module: "Database-Literature Integration"
- input:
    target_domain: 4
  expect:
    integration_type: PRIMARY
- input:
    target_domain: 9
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 12
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 13
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 2
  expect:
    integration_type: GENERAL
- input: {}
  expect:
    integration_type: GENERAL
