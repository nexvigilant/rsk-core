name: anchor-d1
description: "PDC: Domain 1 (Foundations of PV) behavioral anchors by level — 7 anchors per level, 49 total"
version: 0.1.0
interface:
  inputs:
    level:
      type: string
      required: false
  outputs:
    a1:
      type: string
    a2:
      type: string
    a3:
      type: string
    a4:
      type: string
    a5:
      type: string
    a6:
      type: string
    a7:
      type: string
    anchor_count:
      type: int
    bloom_tier:
      type: int
    domain:
      type: int
    domain_name:
      type: string
    error:
      type: string
    has_quantitative_metrics:
      type: bool
    level:
      type: string
tree:
  start: check_l1
  nodes:
    check_l1:
      type: condition
      variable: level
      operator: lte
      value: 1
      true_next: l1_anchors
      false_next: check_l2
    check_l2:
      type: condition
      variable: level
      operator: eq
      value: 2
      true_next: l2_anchors
      false_next: check_l3
    check_l3:
      type: condition
      variable: level
      operator: eq
      value: 3
      true_next: l3_anchors
      false_next: check_l4
    check_l4:
      type: condition
      variable: level
      operator: eq
      value: 4
      true_next: l4_anchors
      false_next: check_l5
    check_l5:
      type: condition
      variable: level
      operator: eq
      value: 5
      true_next: l5_anchors
      false_next: check_l5p
    check_l5p:
      type: condition
      variable: level
      operator: eq
      value: 6
      true_next: l5p_anchors
      false_next: check_l5pp
    check_l5pp:
      type: condition
      variable: level
      operator: eq
      value: 7
      true_next: l5pp_anchors
      false_next: invalid
    l1_anchors:
      type: return
      value:
        domain: 1
        domain_name: "Foundations of PV in AI Era"
        level: L1
        anchor_count: 7
        a1: "Correctly uses basic PV terminology (drug safety, adverse event, serious AE) in documentation"
        a2: "Identifies the major regulatory authorities (FDA, EMA, PMDA, Health Canada)"
        a3: "Describes the basic purpose of pharmacovigilance in protecting patient safety"
        a4: "Lists common data sources for safety information (clinical trials, spontaneous reports)"
        a5: "Recognizes when AI is being used in PV processes and workflows"
        a6: "Explains the historical importance of thalidomide in PV development"
        a7: "States the basic ethical principle of first do no harm in safety monitoring"
        bloom_tier: 1
    l2_anchors:
      type: return
      value:
        domain: 1
        domain_name: "Foundations of PV in AI Era"
        level: L2
        anchor_count: 7
        a1: "Explains the evolution of major PV regulations (GVP, FDA guidelines) to colleagues"
        a2: "Compares different regulatory requirements accurately across regions"
        a3: "Applies basic ethical principles to simple case processing decisions"
        a4: "Identifies appropriate AI tools for specific routine PV tasks"
        a5: "Documents the rationale for basic PV decisions clearly"
        a6: "Describes the relationship between pre-market and post-market safety monitoring"
        a7: "Recognizes the public health impact of major safety issues"
        bloom_tier: 2
    l3_anchors:
      type: return
      value:
        domain: 1
        domain_name: "Foundations of PV in AI Era"
        level: L3
        anchor_count: 7
        a1: "Analyzes regulatory changes for operational impact on daily activities"
        a2: "Integrates ethical considerations naturally in all work decisions"
        a3: "Proposes AI solutions for workflow improvements in team meetings"
        a4: "Teaches foundational PV concepts to new team members effectively"
        a5: "Anticipates regulatory questions and prepares comprehensive responses"
        a6: "Applies historical safety lessons to contemporary situations"
        a7: "Balances patient access needs with safety monitoring requirements"
        bloom_tier: 3
    l4_anchors:
      type: return
      value:
        domain: 1
        domain_name: "Foundations of PV in AI Era"
        level: L4
        anchor_count: 7
        a1: "Influences regulatory interpretation discussions within organization"
        a2: "Develops innovative approaches to complex ethical challenges"
        a3: "Designs comprehensive AI integration strategies for teams/departments"
        a4: "Mentors others in advanced PV concepts and career development"
        a5: "Contributes substantively to regulatory guidance development processes"
        a6: "Creates new frameworks that advance PV practice"
        a7: "Leads cross-functional teams in addressing complex safety issues"
        bloom_tier: 4
    l5_anchors:
      type: return
      value:
        domain: 1
        domain_name: "Foundations of PV in AI Era"
        level: L5
        anchor_count: 7
        a1: "Shapes organizational PV philosophy and strategic approach"
        a2: "Publishes peer-reviewed articles on PV evolution and future directions"
        a3: "Pioneers new AI applications in pharmacovigilance with industry adoption"
        a4: "Advises regulatory bodies on policy development and implementation"
        a5: "Creates frameworks and standards adopted by other organizations"
        a6: "Transforms industry understanding of safety monitoring principles"
        a7: "Establishes thought leadership through speaking at major conferences"
        bloom_tier: 5
    l5p_anchors:
      type: return
      value:
        domain: 1
        domain_name: "Foundations of PV in AI Era"
        level: L5+
        anchor_count: 7
        a1: "Influences entire organizational culture around patient safety priorities (500+ professionals impacted)"
        a2: "Shapes industry-wide standards through leadership in professional societies"
        a3: "Pioneers paradigm shifts in how PV integrates with broader healthcare"
        a4: "Develops next-generation leaders who become industry experts (min 15 mentees at expert level)"
        a5: "Creates lasting institutional capabilities that persist beyond tenure (org improvement >5 years)"
        a6: "Influences global regulatory policy through advisory roles (formal advisor to >2 bodies)"
        a7: "Establishes multi-organizational collaborations (leading >3 inter-org initiatives)"
        bloom_tier: 6
        has_quantitative_metrics: true
    l5pp_anchors:
      type: return
      value:
        domain: 1
        domain_name: "Foundations of PV in AI Era"
        level: L5++
        anchor_count: 7
        a1: "Transforms global approach to medication safety monitoring (policy across >5 countries)"
        a2: "Influences international policy development at WHO/ICH level (formal committee participation)"
        a3: "Creates new academic-industry partnerships that reshape PV education (>3 university partnerships)"
        a4: "Develops global frameworks adopted across multiple industries (>10 organizations globally)"
        a5: "Shapes future of healthcare safety through visionary leadership (keynote >5 conferences/year)"
        a6: "Leaves lasting legacy through institutional and policy transformations (>10 years sustained impact)"
        a7: "Influences regulatory evolution at highest international levels (>10 international guidance docs)"
        bloom_tier: 7
        has_quantitative_metrics: true
    invalid:
      type: return
      value:
        domain: 1
        level: INVALID
        error: "Level must be 1-7"
tests:
- input:
    level: 1
  expect:
    domain: 1
    level: L1
    anchor_count: 7
    bloom_tier: 1
- input:
    level: 3
  expect:
    level: L3
    bloom_tier: 3
- input:
    level: 5
  expect:
    level: L5
    bloom_tier: 5
- input:
    level: 6
  expect:
    level: L5+
    has_quantitative_metrics: true
- input:
    level: 7
  expect:
    level: L5++
    has_quantitative_metrics: true
- input:
    level: 8
  expect:
    level: INVALID
- input:
    level: 2
  expect:
    level: L2
    anchor_count: 7
    bloom_tier: 2
- input:
    level: 4
  expect:
    level: L4
    anchor_count: 7
    bloom_tier: 4
- input: {}
  expect:
    domain: 1
    error: Level must be 1-7
    level: INVALID
