# MICROGRAM++ (upgraded 2026-04-23)
name: cpa-lookup
version: 0.1.0
description: "PDC: Return full CPA specification by ID — primary/supporting domains, EPA mappings, AI components, integration modules, agent routing"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: cpa_id
    type: int
    required: false
    description: ""
outputs:
  - name: agent
    type: string
  - name: ai_component
    type: string
  - name: ai_gateway_connection
    type: bool
  - name: career_stage
    type: string
  - name: error
    type: string
  - name: function
    type: string
  - name: integration_module
    type: string
  - name: is_capstone
    type: bool
  - name: key_epas
    type: string
  - name: metrics
    type: string
  - name: name
    type: string
  - name: prerequisites
    type: string
  - name: primary_domains
    type: string
  - name: requires_epa10_l4
    type: bool
  - name: roi_target_pct
    type: int
  - name: supporting_domains
    type: string
interface:
  inputs:
    cpa_id:
      type: int
      required: false
  outputs:
    agent:
      type: string
    ai_component:
      type: string
    ai_gateway_connection:
      type: bool
    career_stage:
      type: string
    error:
      type: string
    function:
      type: string
    integration_module:
      type: string
    is_capstone:
      type: bool
    key_epas:
      type: string
    metrics:
      type: string
    name:
      type: string
    prerequisites:
      type: string
    primary_domains:
      type: string
    requires_epa10_l4:
      type: bool
    roi_target_pct:
      type: int
    supporting_domains:
      type: string
ui:
  title: Cpa Lookup
  subtitle: "PDC: Return full CPA specification by ID — primary/supporting domains, EPA mappings, AI components, integration modules, agent routing"
  icon: circle
  route: /vigilance/mg/cpa-lookup
  steps:
    - field: cpa_id
      label: cpa id
      help: Enter cpa_id
      widget: text
      placeholder: null
  result:
    template: "agent: {{agent}} — ai_component: {{ai_component}} — ai_gateway_connection: {{ai_gateway_connection}} — career_stage: {{career_stage}} — error: {{error}} — function: {{function}} — integration_module: {{integration_module}} — is_capstone: {{is_capstone}} — key_epas: {{key_epas}} — metrics: {{metrics}} — name: {{name}} — prerequisites: {{prerequisites}} — primary_domains: {{primary_domains}} — requires_epa10_l4: {{requires_epa10_l4}} — roi_target_pct: {{roi_target_pct}} — supporting_domains: {{supporting_domains}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/cpa-lookup
  cli: rsk mcg run cpa-lookup
  auth: none
  rate_limit: 600/min
tree:
  start: check_c1
  nodes:
    check_c1:
      type: condition
      variable: cpa_id
      operator: eq
      value: 1
      true_next: c1
      false_next: check_c2
    check_c2:
      type: condition
      variable: cpa_id
      operator: eq
      value: 2
      true_next: c2
      false_next: check_c3
    check_c3:
      type: condition
      variable: cpa_id
      operator: eq
      value: 3
      true_next: c3
      false_next: check_c4
    check_c4:
      type: condition
      variable: cpa_id
      operator: eq
      value: 4
      true_next: c4
      false_next: check_c5
    check_c5:
      type: condition
      variable: cpa_id
      operator: eq
      value: 5
      true_next: c5
      false_next: check_c6
    check_c6:
      type: condition
      variable: cpa_id
      operator: eq
      value: 6
      true_next: c6
      false_next: check_c7
    check_c7:
      type: condition
      variable: cpa_id
      operator: eq
      value: 7
      true_next: c7
      false_next: check_c8
    check_c8:
      type: condition
      variable: cpa_id
      operator: eq
      value: 8
      true_next: c8
      false_next: invalid
    c1:
      type: return
      value:
        name: Case Management Activities
        function: CASE_MANAGEMENT
        primary_domains: D2, D3, D4, D14
        supporting_domains: D1, D6
        key_epas: EPA1, EPA2, EPA3
        integration_module: Foundation-Communication
        ai_component: pattern recognition, NLP, quality validation
        agent: pdc-case-dev
        career_stage: Foundation-Advanced
        metrics: accuracy>98%, ADR_id=100%, timeline=100%
    c2:
      type: return
      value:
        name: Signal Management Activities
        function: SIGNAL_MANAGEMENT
        primary_domains: D8, D9, D10, D15
        supporting_domains: D2, D5, D14
        key_epas: EPA5, EPA6, EPA2
        integration_module: Signal-Communication
        ai_component: ML detection, predictive analytics, automated validation
        agent: pdc-signal-dev
        career_stage: Foundation-Advanced
    c3:
      type: return
      value:
        name: Risk Management Activities
        function: RISK_MANAGEMENT
        primary_domains: D11, D13, D14, D6
        supporting_domains: D10, D3
        key_epas: EPA7, EPA8, EPA6
        integration_module: All modules
        ai_component: predictive modeling, effectiveness monitoring, behavioral analytics
        agent: pdc-risk-dev
        career_stage: Foundation-Advanced
    c4:
      type: return
      value:
        name: Quality and Compliance Activities
        function: QUALITY_COMPLIANCE
        primary_domains: D12, D1, D11
        supporting_domains: D4, D5, D6, D7
        key_epas: EPA9, EPA10, EPA1
        integration_module: Foundation-Communication
        ai_component: compliance automation, regulatory intelligence
        agent: pdc-compliance-dev
        career_stage: Foundation-Advanced
    c5:
      type: return
      value:
        name: Data and Technology Activities
        function: DATA_TECHNOLOGY
        primary_domains: D7, D15, AllAI
        supporting_domains: D1, D8, D12
        key_epas: EPA10, EPA4, EPA2
        integration_module: EPA10 Gateway
        ai_component: digital transformation, analytics, automation
        agent: pdc-data-dev
        career_stage: Foundation-Advanced
        ai_gateway_connection: true
    c6:
      type: return
      value:
        name: Communication and Stakeholder Activities
        function: COMMUNICATION_STAKEHOLDER
        primary_domains: D13, D14, D15, D10
        supporting_domains: D1, D8
        key_epas: EPA3, EPA8, EPA19
        integration_module: All modules
        ai_component: enhanced communication, NLG, sentiment analysis
        agent: pdc-comms-dev
        career_stage: Foundation-Advanced
    c7:
      type: return
      value:
        name: Research and Development Activities
        function: RESEARCH_DEVELOPMENT
        primary_domains: D5, D9, D8, D15
        supporting_domains: D2, D13
        key_epas: EPA4, EPA5, EPA15
        integration_module: Signal-Communication
        ai_component: research innovation, AI-enhanced analytics
        agent: pdc-research-dev
        career_stage: Foundation-Advanced
    c8:
      type: return
      value:
        name: AI-Enhanced Pharmacovigilance Activities
        function: AI_ENHANCED_PV
        primary_domains: All 15 domains
        supporting_domains: All EPAs
        key_epas: EPA10, EPA12, EPA20
        integration_module: All modules
        ai_component: complete integration — transformation leadership
        agent: pdc-ai-dev
        career_stage: Advanced-Executive
        is_capstone: true
        requires_epa10_l4: true
        roi_target_pct: 300
        prerequisites: EPA10 L4+, cross-functional experience, innovation portfolio
    invalid:
      type: return
      value:
        name: INVALID
        error: CPA ID must be 1-8
tests:
  - input:
      cpa_id: 1
    expect:
      function: CASE_MANAGEMENT
      agent: pdc-case-dev
      primary_domains: D2, D3, D4, D14
  - input:
      cpa_id: 2
    expect:
      function: SIGNAL_MANAGEMENT
      agent: pdc-signal-dev
  - input:
      cpa_id: 3
    expect:
      function: RISK_MANAGEMENT
      agent: pdc-risk-dev
  - input:
      cpa_id: 4
    expect:
      function: QUALITY_COMPLIANCE
      agent: pdc-compliance-dev
  - input:
      cpa_id: 5
    expect:
      function: DATA_TECHNOLOGY
      agent: pdc-data-dev
      ai_gateway_connection: true
  - input:
      cpa_id: 6
    expect:
      function: COMMUNICATION_STAKEHOLDER
      agent: pdc-comms-dev
  - input:
      cpa_id: 7
    expect:
      function: RESEARCH_DEVELOPMENT
      agent: pdc-research-dev
  - input:
      cpa_id: 8
    expect:
      function: AI_ENHANCED_PV
      agent: pdc-ai-dev
      is_capstone: true
      requires_epa10_l4: true
      roi_target_pct: 300
  - input:
      cpa_id: 0
    expect:
      name: INVALID
  - input: {}
    expect:
      name: INVALID
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - agent
    - ai_component
    - ai_gateway_connection
    - career_stage
    - error
    - function
    - integration_module
    - is_capstone
    - key_epas
    - metrics
    - name
    - prerequisites
    - primary_domains
    - requires_epa10_l4
    - roi_target_pct
    - supporting_domains
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
