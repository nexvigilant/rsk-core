name: integration-d13
description: "Domain 13 cross-domain integration — global PV connects to communication, risk management, regulatory, and information sources."
version: 0.1.0
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    epas:
      type: string
    integration_type:
      type: string
    module:
      type: string
    synergy:
      type: string
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 14
      true_next: d13_d14
      false_next: check_d11
    check_d11:
      type: condition
      variable: target_domain
      operator: eq
      value: 11
      true_next: d13_d11
      false_next: check_d12
    check_d12:
      type: condition
      variable: target_domain
      operator: eq
      value: 12
      true_next: d13_d12
      false_next: check_d10
    check_d10:
      type: condition
      variable: target_domain
      operator: eq
      value: 10
      true_next: d13_d10
      false_next: check_d15
    check_d15:
      type: condition
      variable: target_domain
      operator: eq
      value: 15
      true_next: d13_d15
      false_next: general
    d13_d14:
      type: return
      value:
        integration_type: PRIMARY
        module: "Global-Communication Integration"
        synergy: "global perspective shapes culturally appropriate stakeholder communication across markets"
        epas: "EPA3, EPA18, EPA19"
    d13_d11:
      type: return
      value:
        integration_type: PRIMARY
        module: "Global-Risk Management"
        synergy: "global perspective enables culturally appropriate risk interventions across populations"
        epas: "EPA7, EPA16"
    d13_d12:
      type: return
      value:
        integration_type: PRIMARY
        module: "Global-Regulatory"
        synergy: "global knowledge essential for multi-jurisdictional regulatory coordination"
        epas: "EPA11, EPA14"
    d13_d10:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Global-Assessment"
        synergy: "global perspective enriches benefit-risk assessment with diverse population data"
    d13_d15:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Global-Information"
        synergy: "global information management supports international intelligence coordination"
    general:
      type: return
      value:
        integration_type: GENERAL
        module: "Universal Global Foundation"
        synergy: "global and cultural perspective enhances effectiveness across all PV domains"
tests:
- input:
    target_domain: 14
  expect:
    integration_type: PRIMARY
    module: "Global-Communication Integration"
- input:
    target_domain: 11
  expect:
    integration_type: PRIMARY
- input:
    target_domain: 12
  expect:
    integration_type: PRIMARY
- input:
    target_domain: 10
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 15
  expect:
    integration_type: SUPPORTING
- input:
    target_domain: 1
  expect:
    integration_type: GENERAL
- input: {}
  expect:
    integration_type: GENERAL
