# MICROGRAM++ (upgraded 2026-04-23)
name: integration-d4
version: 0.1.0
description: Domain 4 cross-domain integration — ICSR processing enhances case quality, signal detection, compliance, and AI development.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: target_domain
    type: int
    required: false
    description: ""
outputs:
  - name: epas
    type: string
  - name: integration_type
    type: string
  - name: module
    type: string
  - name: synergy
    type: string
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    epas:
      type: string
    integration_type:
      type: string
    module:
      type: string
    synergy:
      type: string
ui:
  title: Integration D4
  subtitle: Domain 4 cross-domain integration — ICSR processing enhances case quality, signal detection, compliance, and AI development.
  icon: circle
  route: /vigilance/mg/integration-d4
  steps:
    - field: target_domain
      label: target domain
      help: Enter target_domain
      widget: text
      placeholder: null
  result:
    template: "epas: {{epas}} — integration_type: {{integration_type}} — module: {{module}} — synergy: {{synergy}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/integration-d4
  cli: rsk mcg run integration-d4
  auth: none
  rate_limit: 600/min
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 14
      true_next: d4_d14
      false_next: check_d1
    check_d1:
      type: condition
      variable: target_domain
      operator: eq
      value: 1
      true_next: d4_d1
      false_next: check_d2
    check_d2:
      type: condition
      variable: target_domain
      operator: eq
      value: 2
      true_next: d4_d2
      false_next: check_d3
    check_d3:
      type: condition
      variable: target_domain
      operator: eq
      value: 3
      true_next: d4_d3
      false_next: check_d7
    check_d7:
      type: condition
      variable: target_domain
      operator: eq
      value: 7
      true_next: d4_d7
      false_next: check_d5
    check_d5:
      type: condition
      variable: target_domain
      operator: eq
      value: 5
      true_next: d4_d5
      false_next: check_d6
    check_d6:
      type: condition
      variable: target_domain
      operator: eq
      value: 6
      true_next: d4_d6
      false_next: general
    d4_d14:
      type: return
      value:
        integration_type: PRIMARY
        module: Case-Communication
        synergy: case processing expertise enhances stakeholder communication and reporter engagement
        epas: EPA1, EPA3
    d4_d1:
      type: return
      value:
        integration_type: SUPPORTING
        module: Regulatory Foundation
        synergy: foundational knowledge provides regulatory context for case processing decisions
    d4_d2:
      type: return
      value:
        integration_type: PRIMARY
        module: Clinical-Case Processing
        synergy: clinical assessment skills directly enhance case processing quality and narratives
        epas: EPA1
    d4_d3:
      type: return
      value:
        integration_type: PRIMARY
        module: Recognition-Case Quality
        synergy: ADR pattern recognition improves case assessment accuracy and completeness
        epas: EPA1, EPA5
    d4_d7:
      type: return
      value:
        integration_type: PRIMARY
        module: Case-Database Integration
        synergy: individual case processing feeds spontaneous reporting database management
        epas: EPA1, EPA4
    d4_d5:
      type: return
      value:
        integration_type: ENHANCEMENT
        module: Case-Trial Safety
        synergy: case processing skills directly applicable to clinical trial safety management
    d4_d6:
      type: return
      value:
        integration_type: ENHANCEMENT
        module: Case-Error Documentation
        synergy: case processing methods applicable to medication error documentation and analysis
    general:
      type: return
      value:
        integration_type: GENERAL
        module: Universal Case Foundation
        synergy: case processing mastery provides operational foundation for all PV activities
tests:
  - input:
      target_domain: 14
    expect:
      integration_type: PRIMARY
      module: Case-Communication
  - input:
      target_domain: 2
    expect:
      integration_type: PRIMARY
      module: Clinical-Case Processing
  - input:
      target_domain: 3
    expect:
      integration_type: PRIMARY
  - input:
      target_domain: 7
    expect:
      integration_type: PRIMARY
      module: Case-Database Integration
  - input:
      target_domain: 5
    expect:
      integration_type: ENHANCEMENT
  - input:
      target_domain: 6
    expect:
      integration_type: ENHANCEMENT
  - input:
      target_domain: 9
    expect:
      integration_type: GENERAL
  - input: {}
    expect:
      integration_type: GENERAL
  - input:
      target_domain: 1
    expect:
      integration_type: SUPPORTING
      module: Regulatory Foundation
      synergy: foundational knowledge provides regulatory context for case processing decisions
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - epas
    - integration_type
    - module
    - synergy
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
