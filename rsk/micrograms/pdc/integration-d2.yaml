name: integration-d2
description: "Domain 2 cross-domain integration — clinical ADR expertise enhances which domains, EPA connections, CPA support."
version: 0.1.0
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    epas:
      type: string
    integration_type:
      type: string
    module:
      type: string
    synergy:
      type: string
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 14
      true_next: d2_d14
      false_next: check_d1
    check_d1:
      type: condition
      variable: target_domain
      operator: eq
      value: 1
      true_next: d2_d1
      false_next: check_d3
    check_d3:
      type: condition
      variable: target_domain
      operator: eq
      value: 3
      true_next: d2_d3
      false_next: check_d4
    check_d4:
      type: condition
      variable: target_domain
      operator: eq
      value: 4
      true_next: d2_d4
      false_next: check_d5
    check_d5:
      type: condition
      variable: target_domain
      operator: eq
      value: 5
      true_next: d2_d5
      false_next: check_d6
    check_d6:
      type: condition
      variable: target_domain
      operator: eq
      value: 6
      true_next: d2_d6
      false_next: check_d10
    check_d10:
      type: condition
      variable: target_domain
      operator: eq
      value: 10
      true_next: d2_d10
      false_next: general
    d2_d14:
      type: return
      value:
        integration_type: PRIMARY
        module: "Clinical-Communication"
        synergy: "clinical credibility enhances communication effectiveness"
        epas: "EPA3, EPA8"
    d2_d1:
      type: return
      value:
        integration_type: SUPPORTING
        module: "Clinical Foundation"
        synergy: "foundations provide context for clinical assessment decisions"
    d2_d3:
      type: return
      value:
        integration_type: PRIMARY
        module: "Clinical-ADR Recognition"
        synergy: "clinical expertise essential for recognizing organ-specific ADR patterns"
        epas: "EPA1, EPA5"
    d2_d4:
      type: return
      value:
        integration_type: PRIMARY
        module: "Clinical-Case Processing"
        synergy: "clinical assessment directly applied to ICSR processing and narratives"
        epas: "EPA1"
    d2_d5:
      type: return
      value:
        integration_type: ENHANCEMENT
        module: "Clinical-Trial Safety"
        synergy: "clinical expertise essential for trial safety monitoring and assessment"
    d2_d6:
      type: return
      value:
        integration_type: ENHANCEMENT
        module: "Clinical-Error Assessment"
        synergy: "clinical understanding supports error impact assessment and prevention"
    d2_d10:
      type: return
      value:
        integration_type: PRIMARY
        module: "Clinical-Benefit-Risk"
        synergy: "clinical understanding crucial for balanced benefit-risk assessment"
        epas: "EPA5, EPA8"
    general:
      type: return
      value:
        integration_type: GENERAL
        module: "Universal Clinical Foundation"
        synergy: "clinical expertise enhances assessment quality across all domains"
tests:
- input:
    target_domain: 14
  expect:
    integration_type: PRIMARY
    module: "Clinical-Communication"
- input:
    target_domain: 3
  expect:
    integration_type: PRIMARY
    module: "Clinical-ADR Recognition"
- input:
    target_domain: 4
  expect:
    integration_type: PRIMARY
- input:
    target_domain: 10
  expect:
    integration_type: PRIMARY
    module: "Clinical-Benefit-Risk"
- input:
    target_domain: 5
  expect:
    integration_type: ENHANCEMENT
- input:
    target_domain: 6
  expect:
    integration_type: ENHANCEMENT
- input:
    target_domain: 7
  expect:
    integration_type: GENERAL
- input: {}
  expect:
    integration_type: GENERAL
- input:
    target_domain: 1
  expect:
    integration_type: SUPPORTING
    module: Clinical Foundation
    synergy: foundations provide context for clinical assessment decisions
