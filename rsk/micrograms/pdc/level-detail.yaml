name: level-detail
description: "PDC: Return full level characteristics — knowledge state, skill application, behavioral indicators, AI integration, assessment method"
version: 0.1.0
interface:
  inputs:
    level:
      type: string
      required: false
  outputs:
    ai_level:
      type: string
    assessment:
      type: string
    behavior:
      type: string
    characteristics:
      type: string
    error:
      type: string
    impact_thresholds:
      type: string
    knowledge:
      type: string
    level_name:
      type: string
    skill:
      type: string
tree:
  start: null_guard
  nodes:
    null_guard:
      type: condition
      variable: level
      operator: is_null
      value: null
      true_next: l1_detail
      false_next: check_l1
    check_l1:
      type: condition
      variable: level
      operator: lte
      value: 1
      true_next: l1_detail
      false_next: check_l2
    check_l2:
      type: condition
      variable: level
      operator: eq
      value: 2
      true_next: l2_detail
      false_next: check_l3
    check_l3:
      type: condition
      variable: level
      operator: eq
      value: 3
      true_next: l3_detail
      false_next: check_l4
    check_l4:
      type: condition
      variable: level
      operator: eq
      value: 4
      true_next: l4_detail
      false_next: check_l5
    check_l5:
      type: condition
      variable: level
      operator: eq
      value: 5
      true_next: l5_detail
      false_next: check_l5p
    check_l5p:
      type: condition
      variable: level
      operator: eq
      value: 6
      true_next: l5p_detail
      false_next: check_l5pp
    check_l5pp:
      type: condition
      variable: level
      operator: eq
      value: 7
      true_next: l5pp_detail
      false_next: invalid
    l1_detail:
      type: return
      value:
        level_name: "L1 Novice"
        knowledge: "basic terminology, fundamental concepts, standard procedures, regulatory awareness"
        skill: "step-by-step instructions, simple routine tasks, basic system features, direct supervision"
        behavior: "asks clarifying questions, seeks approval, documents per templates, task-focused, anxious with variations"
        ai_level: "observes AI usage, understands basic concepts, recognizes applications, follows AI workflows"
        assessment: "direct observation, structured checklists, skills-based testing, supervised practice"
        characteristics: "relies on rules, limited situational perception, requires constant guidance"
    l2_detail:
      type: return
      value:
        level_name: "L2 Advanced Beginner"
        knowledge: "domain interactions, multiple procedures, recognizes exceptions, best practices"
        skill: "handles routine variations, integrated tasks, advanced features, judgment in simple cases, reactive supervision"
        behavior: "identifies when to seek help, suggests improvements, adapts documentation, considers broader impact"
        ai_level: "uses AI with supervision, validates outputs, recognizes limitations, suggests applications"
        assessment: "portfolio development, peer feedback, self-assessment with supervisor validation"
        characteristics: "recognizes situational aspects, develops pattern awareness, requires periodic guidance"
    l3_detail:
      type: return
      value:
        level_name: "L3 Competent"
        knowledge: "integrates across domains, theoretical basis, organizational context, industry trends, all tools"
        skill: "handles complex cases, manages priorities, troubleshoots, trains others in basics, minimal supervision"
        behavior: "takes ownership, identifies improvements, adapts approaches, mentors newcomers, professional confidence"
        ai_level: "independently uses AI, designs AI workflows, evaluates new AI apps, trains others, contributes to validation"
        assessment: "performance-based evaluation, 360-degree feedback, portfolio review, competency interviews"
        characteristics: "sees actions in context, plans effectively, works independently, manages complexity"
    l4_detail:
      type: return
      value:
        level_name: "L4 Proficient"
        knowledge: "masters theoretical foundations, cutting-edge developments, cross-industry, future directions"
        skill: "handles novel situations, develops new approaches, leads complex projects, teaches advanced, autonomous"
        behavior: "shapes team practices, innovates solutions, guides strategic decisions, develops expertise, thought leadership"
        ai_level: "optimizes AI implementations, develops AI strategies, validates innovations, leads transformations, publishes"
        assessment: "leadership evaluation, innovation assessment, peer recognition, industry contribution metrics"
        characteristics: "perceives holistically, responds intuitively, anticipates challenges, drives improvements"
    l5_detail:
      type: return
      value:
        level_name: "L5 Expert"
        knowledge: "advances theoretical understanding, creates frameworks, influences regulatory thinking, masters emerging tech"
        skill: "solves unprecedented challenges, develops breakthrough methods, leads transformation, teaches thought leaders"
        behavior: "publishes influential work, speaks at major forums, advises regulatory bodies, builds leader pipeline"
        ai_level: "pioneers AI applications, shapes AI governance, influences AI standards, develops frameworks, leads ethics"
        assessment: "external recognition, publication impact, industry influence metrics, regulatory advisory participation"
        characteristics: "transcends rules, creates new knowledge, shapes field development, drives industry standards"
    l5p_detail:
      type: return
      value:
        level_name: "L5+ Senior Expert"
        knowledge: "strategic organizational design, cross-industry influence, regulatory policy shaping, global standard setting"
        skill: "transforms organizations, influences industry direction, builds institutional capability, creates lasting systems"
        behavior: "leads enterprise initiatives, builds high-performing orgs, creates industry collaborations, succession pipeline"
        ai_level: "executive AI leadership, pioneers with industry adoption, influences regulatory guidance, governance frameworks"
        assessment: "organizational impact, industry recognition, transformation project evaluation, succession planning"
        characteristics: "transforms organizations, influences industry, builds capability, develops expert networks"
        impact_thresholds: "org_improvement>20%, orgs_adopting>3, mentees>50, value>$10M, countries>3"
    l5pp_detail:
      type: return
      value:
        level_name: "L5++ Executive Expert"
        knowledge: "C-suite leadership, board-level influence, global policy development, industry transformation"
        skill: "shapes industry future, influences global policy, builds multi-org alliances, creates new paradigms"
        behavior: "leads industry transformation, influences regulatory evolution, creates global initiatives, visionary leadership"
        ai_level: "shapes global AI policy, establishes multi-org AI governance, influences international AI standards"
        assessment: "global impact, policy influence documentation, legacy project evaluation, industry transformation metrics"
        characteristics: "shapes industry future, influences global policy, creates paradigms, leaves lasting legacy"
        impact_thresholds: "orgs_leading>5, regulatory_roles>2, value>$100M, mentees>200, guidances>5, publications>10"
    invalid:
      type: return
      value:
        level_name: INVALID
        error: "Level must be 1-7"
tests:
- input:
    level: 1
  expect:
    level_name: "L1 Novice"
    characteristics: "relies on rules, limited situational perception, requires constant guidance"
- input:
    level: 2
  expect:
    level_name: "L2 Advanced Beginner"
- input:
    level: 3
  expect:
    level_name: "L3 Competent"
    characteristics: "sees actions in context, plans effectively, works independently, manages complexity"
- input:
    level: 4
  expect:
    level_name: "L4 Proficient"
- input:
    level: 5
  expect:
    level_name: "L5 Expert"
    characteristics: "transcends rules, creates new knowledge, shapes field development, drives industry standards"
- input:
    level: 6
  expect:
    level_name: "L5+ Senior Expert"
- input:
    level: 7
  expect:
    level_name: "L5++ Executive Expert"
- input:
    level: 8
  expect:
    level_name: INVALID
- input: {}
  expect:
    level_name: "L1 Novice"
