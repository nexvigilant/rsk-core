# MICROGRAM++ (upgraded 2026-04-23)
name: integration-d5
version: 0.1.0
description: Domain 5 cross-domain integration — enhanced coverage domain, clinical trial safety connects to regulatory, signal detection, benefit-risk.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: target_domain
    type: int
    required: false
    description: ""
outputs:
  - name: enhanced_domain
    type: bool
  - name: enhanced_pair
    type: bool
  - name: enhancement_status
    type: string
  - name: epas
    type: string
  - name: integration_type
    type: string
  - name: min_epa_coverage
    type: string
  - name: module
    type: string
  - name: synergy
    type: string
interface:
  inputs:
    target_domain:
      type: int
      required: false
  outputs:
    enhanced_domain:
      type: bool
    enhanced_pair:
      type: bool
    enhancement_status:
      type: string
    epas:
      type: string
    integration_type:
      type: string
    min_epa_coverage:
      type: string
    module:
      type: string
    synergy:
      type: string
ui:
  title: Integration D5
  subtitle: Domain 5 cross-domain integration — enhanced coverage domain, clinical trial safety connects to regulatory, signal detection, benefit-risk.
  icon: circle
  route: /vigilance/mg/integration-d5
  steps:
    - field: target_domain
      label: target domain
      help: Enter target_domain
      widget: text
      placeholder: null
  result:
    template: "enhanced_domain: {{enhanced_domain}} — enhanced_pair: {{enhanced_pair}} — enhancement_status: {{enhancement_status}} — epas: {{epas}} — integration_type: {{integration_type}} — min_epa_coverage: {{min_epa_coverage}} — module: {{module}} — synergy: {{synergy}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/integration-d5
  cli: rsk mcg run integration-d5
  auth: none
  rate_limit: 600/min
tree:
  start: check_target
  nodes:
    check_target:
      type: condition
      variable: target_domain
      operator: eq
      value: 3
      true_next: d5_d3
      false_next: check_d6
    check_d6:
      type: condition
      variable: target_domain
      operator: eq
      value: 6
      true_next: d5_d6
      false_next: check_d12
    check_d12:
      type: condition
      variable: target_domain
      operator: eq
      value: 12
      true_next: d5_d12
      false_next: check_d2
    check_d2:
      type: condition
      variable: target_domain
      operator: eq
      value: 2
      true_next: d5_d2
      false_next: check_d8
    check_d8:
      type: condition
      variable: target_domain
      operator: eq
      value: 8
      true_next: d5_d8
      false_next: check_d10
    check_d10:
      type: condition
      variable: target_domain
      operator: eq
      value: 10
      true_next: d5_d10
      false_next: check_d4
    check_d4:
      type: condition
      variable: target_domain
      operator: eq
      value: 4
      true_next: d5_d4
      false_next: general
    d5_d3:
      type: return
      value:
        integration_type: ENHANCED_COVERAGE
        module: Enhanced Domain Triad (D3+D5+D6)
        synergy: ADR recognition in clinical trial context — DSMB support, safety endpoint evaluation
        enhanced_pair: true
        min_epa_coverage: 50%
        epas: EPA4, EPA5, EPA8
    d5_d6:
      type: return
      value:
        integration_type: ENHANCED_COVERAGE
        module: Enhanced Domain Triad (D3+D5+D6)
        synergy: medication error detection in clinical trial protocol deviations and dosing errors
        enhanced_pair: true
        min_epa_coverage: 50%
        epas: EPA1, EPA7, EPA9
    d5_d12:
      type: return
      value:
        integration_type: PRIMARY
        module: Clinical-Regulatory Integration
        synergy: trial safety requirements + regulatory compliance = inspection readiness
        epas: EPA6, EPA9, EPA14
    d5_d2:
      type: return
      value:
        integration_type: PRIMARY
        module: Clinical Assessment-Trial Safety
        synergy: clinical expertise enhances trial safety monitoring and AE evaluation
        epas: EPA1, EPA5
    d5_d8:
      type: return
      value:
        integration_type: PRIMARY
        module: Signal Detection-Trial Safety
        synergy: signal detection in trial populations, interim analysis, DSMB data
        epas: EPA5, EPA8
    d5_d10:
      type: return
      value:
        integration_type: PRIMARY
        module: Benefit-Risk-Trial Safety
        synergy: dynamic B/R assessment throughout trial, DSMB decision support
        epas: EPA5, EPA8, EPA11
    d5_d4:
      type: return
      value:
        integration_type: SUPPORTING
        module: Case Processing-Trial Safety
        synergy: ICSR processing skills applicable to SAE reporting in clinical trials
    general:
      type: return
      value:
        integration_type: GENERAL
        module: Universal Trial Safety
        synergy: clinical trial safety expertise enhances post-marketing transition and lifecycle safety
        enhanced_domain: true
        enhancement_status: one of 3 enhanced coverage domains (D3, D5, D6)
tests:
  - input:
      target_domain: 3
    expect:
      integration_type: ENHANCED_COVERAGE
      enhanced_pair: true
      min_epa_coverage: 50%
  - input:
      target_domain: 6
    expect:
      integration_type: ENHANCED_COVERAGE
      module: Enhanced Domain Triad (D3+D5+D6)
  - input:
      target_domain: 12
    expect:
      integration_type: PRIMARY
      module: Clinical-Regulatory Integration
  - input:
      target_domain: 8
    expect:
      integration_type: PRIMARY
  - input:
      target_domain: 10
    expect:
      integration_type: PRIMARY
      module: Benefit-Risk-Trial Safety
  - input:
      target_domain: 4
    expect:
      integration_type: SUPPORTING
  - input:
      target_domain: 15
    expect:
      integration_type: GENERAL
      enhanced_domain: true
  - input: {}
    expect:
      integration_type: GENERAL
  - input:
      target_domain: 2
    expect:
      integration_type: PRIMARY
      module: Clinical Assessment-Trial Safety
      synergy: clinical expertise enhances trial safety monitoring and AE evaluation
      epas: EPA1, EPA5
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - enhanced_domain
    - enhanced_pair
    - enhancement_status
    - epas
    - integration_type
    - min_epa_coverage
    - module
    - synergy
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
