name: br-framework
description: "Domain 10: Route to benefit-risk assessment framework by complexity, stakeholder needs, and quantitative requirement."
version: 0.1.0
interface:
  inputs:
    complexity:
      type: string
      required: false
    is_regulatory_submission:
      type: bool
      required: false
    multiple_criteria:
      type: bool
      required: false
    needs_economic:
      type: bool
      required: false
    needs_quantitative:
      type: bool
      required: false
  outputs:
    ai_assist:
      type: string
    approach:
      type: string
    best_for:
      type: string
    framework:
      type: string
    limitations:
      type: string
    method:
      type: string
    metrics:
      type: string
    name:
      type: string
    nexcore_tool:
      type: string
    steps:
      type: string
    strengths:
      type: string
tree:
  start: check_quantitative
  nodes:
    check_quantitative:
      type: condition
      variable: needs_quantitative
      operator: eq
      value: true
      true_next: check_multi_criteria
      false_next: check_structured
    check_multi_criteria:
      type: condition
      variable: multiple_criteria
      operator: eq
      value: true
      true_next: mcda
      false_next: check_economic
    check_economic:
      type: condition
      variable: needs_economic
      operator: eq
      value: true
      true_next: health_economic
      false_next: nnt_nnh
    check_structured:
      type: condition
      variable: complexity
      operator: eq
      value: high
      true_next: brat
      false_next: check_regulatory
    check_regulatory:
      type: condition
      variable: is_regulatory_submission
      operator: eq
      value: true
      true_next: proact_url
      false_next: simple_framework
    mcda:
      type: return
      value:
        framework: MCDA
        name: "Multi-Criteria Decision Analysis"
        approach: quantitative
        method: "weight criteria, score options, calculate weighted sums, sensitivity analysis"
        strengths: "transparent weighting, stakeholder preferences explicit, handles multiple outcomes"
        best_for: "complex decisions with multiple benefits and risks, diverse stakeholder priorities"
        ai_assist: "preference elicitation optimization, sensitivity analysis automation, visualization"
        nexcore_tool: "nexcore-qbr MCDA module"
    health_economic:
      type: return
      value:
        framework: HEALTH_ECONOMIC
        name: "Health Economic Assessment (QALY/DALY/ICER)"
        approach: quantitative
        method: "calculate QALYs gained vs lost, determine ICER, compare to willingness-to-pay threshold"
        metrics: "QALY, DALY, NNT, NNH, ICER"
        strengths: "standardized metrics, policy-relevant, comparability across interventions"
        best_for: "formulary decisions, HTA submissions, payer negotiations"
        ai_assist: "Markov modeling, Monte Carlo simulation, budget impact automation"
    nnt_nnh:
      type: return
      value:
        framework: NNT_NNH
        name: "Number Needed to Treat / Number Needed to Harm"
        approach: quantitative
        method: "NNT = 1/ARR, NNH = 1/ARI — simple ratio of benefit vs harm probability"
        strengths: "intuitive, clinician-friendly, directly interpretable"
        limitations: "single outcome only, doesn't weight severity, time-dependent"
        best_for: "clinical communication, single benefit vs single risk comparison"
        ai_assist: "automated calculation from trial data, confidence interval computation"
        nexcore_tool: "epi_nnt_nnh"
    brat:
      type: return
      value:
        framework: BRAT
        name: "Benefit-Risk Action Team Framework"
        approach: structured_qualitative
        steps: "define decision context -> identify outcomes -> source data -> customize framework -> assess trade-offs -> interpret and communicate"
        strengths: "comprehensive, systematic, regulatory-accepted, visual outputs"
        best_for: "complex regulatory assessments, product lifecycle decisions"
        ai_assist: "evidence synthesis, outcome identification, forest plot generation"
    proact_url:
      type: return
      value:
        framework: PROACT_URL
        name: "PrOACT-URL Decision Analysis"
        approach: structured_qualitative
        steps: "Problem -> Objectives -> Alternatives -> Consequences -> Trade-offs -> Uncertainty -> Risk tolerance -> Linked decisions"
        strengths: "systematic, handles uncertainty explicitly, links related decisions"
        best_for: "regulatory submissions, complex therapeutic decisions with uncertainty"
        ai_assist: "decision tree construction, scenario modeling, sensitivity analysis"
    simple_framework:
      type: return
      value:
        framework: SIMPLE_BR
        name: "Descriptive Benefit-Risk Summary"
        approach: qualitative
        method: "tabulate benefits vs risks, clinical judgment, narrative assessment"
        strengths: "quick, low resource, appropriate for clear decisions"
        best_for: "routine assessments, PSUR/PBRER sections, clear benefit-risk balance"
tests:
- input:
    needs_quantitative: true
    multiple_criteria: true
  expect:
    framework: MCDA
    approach: quantitative
- input:
    needs_quantitative: true
    multiple_criteria: false
    needs_economic: true
  expect:
    framework: HEALTH_ECONOMIC
    approach: quantitative
- input:
    needs_quantitative: true
    multiple_criteria: false
    needs_economic: false
  expect:
    framework: NNT_NNH
- input:
    needs_quantitative: false
    complexity: high
  expect:
    framework: BRAT
    approach: structured_qualitative
- input:
    needs_quantitative: false
    complexity: low
    is_regulatory_submission: true
  expect:
    framework: PROACT_URL
- input:
    needs_quantitative: false
    complexity: low
    is_regulatory_submission: false
  expect:
    framework: SIMPLE_BR
    approach: qualitative
- input: {}
  expect:
    framework: SIMPLE_BR
