# MICROGRAM++ (upgraded 2026-04-23)
name: epa-classifier
version: 0.1.0
description: "PDC: Classify EPA (1-20) into Core/Executive tier with AI gateway detection"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: epa_id
    type: int
    required: false
    description: ""
outputs:
  - name: classification
    type: string
  - name: description
    type: string
  - name: error
    type: string
  - name: is_gateway
    type: bool
  - name: min_level_for_cpa8
    type: int
  - name: phases
    type: string
  - name: tier
    type: string
  - name: unlocks_cpa8
    type: bool
interface:
  inputs:
    epa_id:
      type: int
      required: false
  outputs:
    classification:
      type: string
    description:
      type: string
    error:
      type: string
    is_gateway:
      type: bool
    min_level_for_cpa8:
      type: int
    phases:
      type: string
    tier:
      type: string
    unlocks_cpa8:
      type: bool
ui:
  title: Epa Classifier
  subtitle: "PDC: Classify EPA (1-20) into Core/Executive tier with AI gateway detection"
  icon: circle
  route: /vigilance/mg/epa-classifier
  steps:
    - field: epa_id
      label: epa id
      help: Enter epa_id
      widget: text
      placeholder: null
  result:
    template: "classification: {{classification}} — description: {{description}} — error: {{error}} — is_gateway: {{is_gateway}} — min_level_for_cpa8: {{min_level_for_cpa8}} — phases: {{phases}} — tier: {{tier}} — unlocks_cpa8: {{unlocks_cpa8}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/epa-classifier
  cli: rsk mcg run epa-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_valid
  nodes:
    check_valid:
      type: condition
      variable: epa_id
      operator: gte
      value: 1
      true_next: check_upper
      false_next: invalid_epa
    check_upper:
      type: condition
      variable: epa_id
      operator: lte
      value: 20
      true_next: check_ai_gateway
      false_next: invalid_epa
    check_ai_gateway:
      type: condition
      variable: epa_id
      operator: eq
      value: 10
      true_next: ai_gateway
      false_next: check_core
    check_core:
      type: condition
      variable: epa_id
      operator: lte
      value: 10
      true_next: core_epa
      false_next: executive_epa
    ai_gateway:
      type: return
      value:
        tier: CORE
        classification: AI_GATEWAY
        is_gateway: true
        unlocks_cpa8: true
        min_level_for_cpa8: 4
        description: Implement and Validate AI Tools for Pharmacovigilance
        phases: Foundation, Application, Integration, Innovation
    core_epa:
      type: return
      value:
        tier: CORE
        classification: PRACTICE
        is_gateway: false
        unlocks_cpa8: false
    executive_epa:
      type: return
      value:
        tier: EXECUTIVE
        classification: LEADERSHIP
        is_gateway: false
        unlocks_cpa8: false
    invalid_epa:
      type: return
      value:
        tier: INVALID
        classification: UNKNOWN
        error: EPA ID must be 1-20
tests:
  - input:
      epa_id: 1
    expect:
      tier: CORE
      classification: PRACTICE
      is_gateway: false
  - input:
      epa_id: 9
    expect:
      tier: CORE
      classification: PRACTICE
      is_gateway: false
  - input:
      epa_id: 10
    expect:
      tier: CORE
      classification: AI_GATEWAY
      is_gateway: true
      unlocks_cpa8: true
      min_level_for_cpa8: 4
  - input:
      epa_id: 11
    expect:
      tier: EXECUTIVE
      classification: LEADERSHIP
  - input:
      epa_id: 20
    expect:
      tier: EXECUTIVE
      classification: LEADERSHIP
  - input:
      epa_id: 0
    expect:
      tier: INVALID
  - input:
      epa_id: 21
    expect:
      tier: INVALID
  - input: {}
    expect:
      tier: INVALID
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - classification
    - description
    - error
    - is_gateway
    - min_level_for_cpa8
    - phases
    - tier
    - unlocks_cpa8
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
