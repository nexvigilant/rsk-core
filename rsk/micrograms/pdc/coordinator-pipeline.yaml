# MICROGRAM++ (upgraded 2026-04-23)
name: coordinator-pipeline
version: 0.1.0
description: "PDC: Full coordinator pipeline — classify task scope, determine HITL level, identify domain, route to CPA agent"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: affects_patient_safety
    type: bool
    required: false
    description: ""
  - name: affects_regulatory
    type: bool
    required: false
    description: ""
  - name: cpa_count
    type: int
    required: false
    description: ""
  - name: is_irreversible
    type: bool
    required: false
    description: ""
  - name: primary_cpa
    type: int
    required: false
    description: ""
outputs:
  - name: action
    type: string
  - name: agent
    type: string
  - name: audit
    type: bool
  - name: cpa
    type: int
  - name: domains
    type: string
  - name: escalation
    type: string
  - name: governance_min
    type: int
  - name: hitl
    type: string
  - name: nexcore_targets
    type: string
  - name: reason
    type: string
  - name: tier
    type: string
interface:
  inputs:
    affects_patient_safety:
      type: bool
      required: false
    affects_regulatory:
      type: bool
      required: false
    cpa_count:
      type: int
      required: false
    is_irreversible:
      type: bool
      required: false
    primary_cpa:
      type: int
      required: false
  outputs:
    action:
      type: string
    agent:
      type: string
    audit:
      type: bool
    cpa:
      type: int
    domains:
      type: string
    escalation:
      type: string
    governance_min:
      type: int
    hitl:
      type: string
    nexcore_targets:
      type: string
    reason:
      type: string
    tier:
      type: string
ui:
  title: Coordinator Pipeline
  subtitle: "PDC: Full coordinator pipeline — classify task scope, determine HITL level, identify domain, route to CPA agent"
  icon: circle
  route: /vigilance/mg/coordinator-pipeline
  steps:
    - field: affects_patient_safety
      label: affects patient safety
      help: Enter affects_patient_safety
      widget: toggle
      placeholder: null
    - field: affects_regulatory
      label: affects regulatory
      help: Enter affects_regulatory
      widget: toggle
      placeholder: null
    - field: cpa_count
      label: cpa count
      help: Enter cpa_count
      widget: text
      placeholder: null
    - field: is_irreversible
      label: is irreversible
      help: Enter is_irreversible
      widget: toggle
      placeholder: null
    - field: primary_cpa
      label: primary cpa
      help: Enter primary_cpa
      widget: text
      placeholder: null
  result:
    template: "action: {{action}} — agent: {{agent}} — audit: {{audit}} — cpa: {{cpa}} — domains: {{domains}} — escalation: {{escalation}} — governance_min: {{governance_min}} — hitl: {{hitl}} — nexcore_targets: {{nexcore_targets}} — reason: {{reason}} — tier: {{tier}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/coordinator-pipeline
  cli: rsk mcg run coordinator-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_safety
  nodes:
    check_safety:
      type: condition
      variable: affects_patient_safety
      operator: eq
      value: true
      true_next: safety_critical
      false_next: check_irreversible
    check_irreversible:
      type: condition
      variable: is_irreversible
      operator: eq
      value: true
      true_next: safety_critical
      false_next: check_regulatory
    check_regulatory:
      type: condition
      variable: affects_regulatory
      operator: eq
      value: true
      true_next: regulatory_scope
      false_next: check_multi_cpa
    check_multi_cpa:
      type: condition
      variable: cpa_count
      operator: gte
      value: 2
      true_next: cross_cpa_scope
      false_next: cpa_null_guard
    cpa_null_guard:
      type: condition
      variable: primary_cpa
      operator: is_null
      value: null
      true_next: cpa_unknown_return
      false_next: check_cpa_id
    cpa_unknown_return:
      type: return
      value:
        hitl: MANUAL
        agent: pdc-coordinator
        reason: CPA unknown — manual triage required
    check_cpa_id:
      type: condition
      variable: primary_cpa
      operator: lte
      value: 4
      true_next: check_cpa_low
      false_next: check_cpa_high
    check_cpa_low:
      type: condition
      variable: primary_cpa
      operator: lte
      value: 2
      true_next: check_cpa_1_or_2
      false_next: check_cpa_3_or_4
    check_cpa_high:
      type: condition
      variable: primary_cpa
      operator: lte
      value: 6
      true_next: check_cpa_5_or_6
      false_next: check_cpa_7_or_8
    check_cpa_1_or_2:
      type: condition
      variable: primary_cpa
      operator: eq
      value: 1
      true_next: route_case
      false_next: route_signal
    check_cpa_3_or_4:
      type: condition
      variable: primary_cpa
      operator: eq
      value: 3
      true_next: route_risk
      false_next: route_compliance
    check_cpa_5_or_6:
      type: condition
      variable: primary_cpa
      operator: eq
      value: 5
      true_next: route_data
      false_next: route_comms
    check_cpa_7_or_8:
      type: condition
      variable: primary_cpa
      operator: eq
      value: 7
      true_next: route_research
      false_next: route_ai
    safety_critical:
      type: return
      value:
        hitl: APPROVE
        tier: DRAFT
        action: STOP — present plan to Matthew, await explicit authorization
        audit: true
        governance_min: 1
        escalation: patient safety or irreversible action detected
    regulatory_scope:
      type: return
      value:
        hitl: REVIEW
        tier: STAGING
        action: agent executes, output reviewed by Matthew before merge
        audit: true
        governance_min: 2
        agent: pdc-compliance-dev
        escalation: regulatory compliance scope
    cross_cpa_scope:
      type: return
      value:
        hitl: REVIEW
        tier: STAGING
        action: spawn multiple agents, all outputs reviewed before merge
        audit: true
        governance_min: 2
        agent: pdc-coordinator (multi-agent)
        escalation: cross-CPA boundary — coordination required
    route_case:
      type: return
      value:
        hitl: AUTO
        tier: LIVE
        agent: pdc-case-dev
        cpa: 1
        domains: D2, D3, D4, D14
        nexcore_targets: nexcore-vigilance (ICSR modules)
    route_signal:
      type: return
      value:
        hitl: AUTO
        tier: LIVE
        agent: pdc-signal-dev
        cpa: 2
        domains: D8, D9, D10, D15
        nexcore_targets: nexcore-pv-core, nexcore-signal-pipeline
    route_risk:
      type: return
      value:
        hitl: AUTO
        tier: LIVE
        agent: pdc-risk-dev
        cpa: 3
        domains: D11, D13, D14, D6
        nexcore_targets: nexcore-qbr, nexcore-vigilance (risk)
    route_compliance:
      type: return
      value:
        hitl: AUTO
        tier: LIVE
        agent: pdc-compliance-dev
        cpa: 4
        domains: D12, D1, D11
        nexcore_targets: nexcore-vigilance (regulatory)
    route_data:
      type: return
      value:
        hitl: AUTO
        tier: LIVE
        agent: pdc-data-dev
        cpa: 5
        domains: D7, D15, AI
        nexcore_targets: nexcore-faers-etl, nexcore-dataframe
    route_comms:
      type: return
      value:
        hitl: AUTO
        tier: LIVE
        agent: pdc-comms-dev
        cpa: 6
        domains: D13, D14, D15, D10
        nexcore_targets: Nucleus pages, nexcore-api
    route_research:
      type: return
      value:
        hitl: AUTO
        tier: LIVE
        agent: pdc-research-dev
        cpa: 7
        domains: D5, D9, D8, D15
        nexcore_targets: nexcore-pvdsl, nexcore-vigilance (methodology)
    route_ai:
      type: return
      value:
        hitl: AUTO
        tier: LIVE
        agent: pdc-ai-dev
        cpa: 8
        domains: All 15
        nexcore_targets: nexcore-dtree, all crates (AI integration)
tests:
  - input:
      affects_patient_safety: true
      primary_cpa: 2
    expect:
      hitl: APPROVE
      tier: DRAFT
      audit: true
  - input:
      is_irreversible: true
      primary_cpa: 5
    expect:
      hitl: APPROVE
      tier: DRAFT
  - input:
      affects_regulatory: true
      primary_cpa: 4
    expect:
      hitl: REVIEW
      agent: pdc-compliance-dev
  - input:
      cpa_count: 3
      primary_cpa: 2
    expect:
      hitl: REVIEW
      tier: STAGING
  - input:
      primary_cpa: 1
      cpa_count: 1
    expect:
      hitl: AUTO
      agent: pdc-case-dev
      cpa: 1
  - input:
      primary_cpa: 2
      cpa_count: 1
    expect:
      agent: pdc-signal-dev
      cpa: 2
  - input:
      primary_cpa: 3
      cpa_count: 1
    expect:
      agent: pdc-risk-dev
  - input:
      primary_cpa: 4
      cpa_count: 1
    expect:
      agent: pdc-compliance-dev
  - input:
      primary_cpa: 5
      cpa_count: 1
    expect:
      agent: pdc-data-dev
  - input:
      primary_cpa: 6
      cpa_count: 1
    expect:
      agent: pdc-comms-dev
  - input:
      primary_cpa: 7
      cpa_count: 1
    expect:
      agent: pdc-research-dev
  - input:
      primary_cpa: 8
      cpa_count: 1
    expect:
      agent: pdc-ai-dev
      cpa: 8
  - input: {}
    expect:
      hitl: MANUAL
      agent: pdc-coordinator
      reason: CPA unknown — manual triage required
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - action
    - agent
    - audit
    - cpa
    - domains
    - escalation
    - governance_min
    - hitl
    - nexcore_targets
    - reason
    - tier
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
