name: appe-week-gate
description: "APPE Ch7: Gate week progression based on behavioral anchor scores across Domains 1-3 and 14. Chains from anchor-d1/d2 outputs."
version: 0.1.0
tree:
  start: check_week
  nodes:
    check_week:
      type: condition
      variable: current_week
      operator: lte
      value: 2
      true_next: gate_phase1
      false_next: check_mid
    check_mid:
      type: condition
      variable: current_week
      operator: lte
      value: 4
      true_next: gate_phase2
      false_next: check_late
    check_late:
      type: condition
      variable: current_week
      operator: lte
      value: 6
      true_next: gate_phase3
      false_next: invalid_week

    # Phase 1 (W1-2): D1 + D14 at L1 minimum
    gate_phase1:
      type: condition
      variable: d1_score
      operator: gte
      value: 1
      true_next: gate_phase1_d14
      false_next: fail_phase1_d1
    gate_phase1_d14:
      type: condition
      variable: d14_score
      operator: gte
      value: 1
      true_next: pass_phase1
      false_next: fail_phase1_d14

    # Phase 2 (W3-4): D1+D14 at L1+, D2+D3 at L1
    gate_phase2:
      type: condition
      variable: d1_score
      operator: gte
      value: 1.5
      true_next: gate_phase2_d2
      false_next: fail_phase2_d1
    gate_phase2_d2:
      type: condition
      variable: d2_score
      operator: gte
      value: 1
      true_next: gate_phase2_d3
      false_next: fail_phase2_d2
    gate_phase2_d3:
      type: condition
      variable: d3_score
      operator: gte
      value: 1
      true_next: gate_phase2_d14
      false_next: fail_phase2_d3
    gate_phase2_d14:
      type: condition
      variable: d14_score
      operator: gte
      value: 1.5
      true_next: pass_phase2
      false_next: fail_phase2_d14

    # Phase 3 (W5-6): All domains at L2
    gate_phase3:
      type: condition
      variable: d1_score
      operator: gte
      value: 2
      true_next: gate_phase3_d2
      false_next: fail_phase3_d1
    gate_phase3_d2:
      type: condition
      variable: d2_score
      operator: gte
      value: 2
      true_next: gate_phase3_d3
      false_next: fail_phase3_d2
    gate_phase3_d3:
      type: condition
      variable: d3_score
      operator: gte
      value: 2
      true_next: gate_phase3_d14
      false_next: fail_phase3_d3
    gate_phase3_d14:
      type: condition
      variable: d14_score
      operator: gte
      value: 2
      true_next: pass_phase3
      false_next: fail_phase3_d14

    # Pass nodes
    pass_phase1:
      type: return
      value:
        advance: true
        phase: "FOUNDATION"
        next_week: 3
        status: PASS
        message: "D1+D14 at L1. Ready for clinical foundations."
        next_focus: "Domains 2, 3 — ADR classification and pattern recognition"
    pass_phase2:
      type: return
      value:
        advance: true
        phase: "APPLICATION"
        next_week: 5
        status: PASS
        message: "D1-3+D14 at L1+. Ready for advanced applications."
        next_focus: "Domains 8, 10 — signal concepts, benefit-risk, AI awareness"
    pass_phase3:
      type: return
      value:
        advance: true
        phase: "SYNTHESIS"
        next_week: 0
        status: COMPLETE
        message: "All foundational domains at L2. APPE rotation complete."
        next_focus: "Bridge assessment — Fellowship or industry pathway"

    # Fail nodes with specific gaps
    fail_phase1_d1:
      type: return
      value:
        advance: false
        phase: "FOUNDATION"
        status: GAP
        gap_domain: "D1"
        message: "PV terminology and foundations below L1. Extend orientation."
        remediation: "Intensive terminology workshops, documentation practice"
    fail_phase1_d14:
      type: return
      value:
        advance: false
        phase: "FOUNDATION"
        status: GAP
        gap_domain: "D14"
        message: "Communication basics below L1. Extend foundation-communication module."
        remediation: "Audience identification exercises, basic presentation practice"
    fail_phase2_d1:
      type: return
      value:
        advance: false
        phase: "APPLICATION"
        status: GAP
        gap_domain: "D1"
        message: "Foundational knowledge not at L1+. Review regulatory frameworks."
        remediation: "Regulatory comparison exercises, AI workflow observation"
    fail_phase2_d2:
      type: return
      value:
        advance: false
        phase: "APPLICATION"
        status: GAP
        gap_domain: "D2"
        message: "ADR clinical aspects below L1. Extend classification exercises."
        remediation: "Type A/B classification drills, temporal pattern exercises"
    fail_phase2_d3:
      type: return
      value:
        advance: false
        phase: "APPLICATION"
        status: GAP
        gap_domain: "D3"
        message: "Important ADR recognition below L1. More organ system mapping."
        remediation: "Organ system ADR correlation, terminology drills"
    fail_phase2_d14:
      type: return
      value:
        advance: false
        phase: "APPLICATION"
        status: GAP
        gap_domain: "D14"
        message: "Communication not at L1+. Extend audience adaptation practice."
        remediation: "Stakeholder mapping, documentation standards practice"
    fail_phase3_d1:
      type: return
      value:
        advance: false
        phase: "SYNTHESIS"
        status: GAP
        gap_domain: "D1"
        message: "D1 below L2. Cannot explain regulatory evolution to colleagues."
        remediation: "Peer teaching exercises, historical case analysis"
    fail_phase3_d2:
      type: return
      value:
        advance: false
        phase: "SYNTHESIS"
        status: GAP
        gap_domain: "D2"
        message: "D2 below L2. Causality assessment inconsistent."
        remediation: "Structured causality practice with validated methods"
    fail_phase3_d3:
      type: return
      value:
        advance: false
        phase: "SYNTHESIS"
        status: GAP
        gap_domain: "D3"
        message: "D3 below L2. Pattern recognition for expedited processing insufficient."
        remediation: "Advanced pattern recognition with mechanistic understanding"
    fail_phase3_d14:
      type: return
      value:
        advance: false
        phase: "SYNTHESIS"
        status: GAP
        gap_domain: "D14"
        message: "D14 below L2. Cannot adapt communication across audiences."
        remediation: "Cross-functional communication project, teaching demonstration"

    invalid_week:
      type: return
      value:
        advance: false
        status: INVALID
        message: "APPE rotation is weeks 1-6"

tests:
# Phase 1 pass
- input: { current_week: 2, d1_score: 1, d14_score: 1 }
  expect: { advance: true, phase: "FOUNDATION", status: PASS, next_week: 3 }
# Phase 1 fail D1
- input: { current_week: 1, d1_score: 0.5, d14_score: 1 }
  expect: { advance: false, gap_domain: "D1" }
# Phase 1 fail D14
- input: { current_week: 2, d1_score: 1, d14_score: 0.5 }
  expect: { advance: false, gap_domain: "D14" }
# Phase 2 pass
- input: { current_week: 4, d1_score: 1.5, d2_score: 1, d3_score: 1, d14_score: 1.5 }
  expect: { advance: true, phase: "APPLICATION", status: PASS, next_week: 5 }
# Phase 2 fail D2
- input: { current_week: 3, d1_score: 1.5, d2_score: 0.5, d3_score: 1, d14_score: 1.5 }
  expect: { advance: false, gap_domain: "D2" }
# Phase 2 fail D3
- input: { current_week: 4, d1_score: 1.5, d2_score: 1, d3_score: 0.5, d14_score: 1.5 }
  expect: { advance: false, gap_domain: "D3" }
# Phase 3 pass — rotation complete
- input: { current_week: 6, d1_score: 2, d2_score: 2, d3_score: 2, d14_score: 2 }
  expect: { advance: true, phase: "SYNTHESIS", status: COMPLETE, next_week: 0 }
# Phase 3 fail D2
- input: { current_week: 6, d1_score: 2, d2_score: 1.5, d3_score: 2, d14_score: 2 }
  expect: { advance: false, gap_domain: "D2" }
# Edge: week 0
- input: { current_week: 0, d1_score: 1, d14_score: 1 }
  expect: { advance: true, status: PASS }
# Edge: week 7
- input: { current_week: 7 }
  expect: { advance: false, status: INVALID }
