name: appe-week-gate
description: 'APPE Ch7: Gate week progression based on behavioral anchor scores across Domains 1-3 and 14. Chains from anchor-d1/d2 outputs.'
version: 0.1.0
tree:
  start: check_week
  nodes:
    gate_phase1:
      type: condition
      variable: d1_score
      operator: gte
      value: 1
      true_next: gate_phase1_d14
      false_next: fail_phase1_d1
    fail_phase2_d14:
      type: return
      value:
        status: GAP
        message: Communication not at L1+. Extend audience adaptation practice.
        phase: APPLICATION
        advance: false
        remediation: Stakeholder mapping, documentation standards practice
        gap_domain: D14
    check_late:
      type: condition
      variable: current_week
      operator: lte
      value: 6
      true_next: gate_phase3
      false_next: invalid_week
    pass_phase3:
      type: return
      value:
        next_focus: Bridge assessment — Fellowship or industry pathway
        advance: true
        phase: SYNTHESIS
        next_week: 0
        status: COMPLETE
        message: All foundational domains at L2. APPE rotation complete.
    pass_phase1:
      type: return
      value:
        next_week: 3
        phase: FOUNDATION
        status: PASS
        message: D1+D14 at L1. Ready for clinical foundations.
        advance: true
        next_focus: Domains 2, 3 — ADR classification and pattern recognition
    fail_phase3_d1:
      type: return
      value:
        message: D1 below L2. Cannot explain regulatory evolution to colleagues.
        remediation: Peer teaching exercises, historical case analysis
        advance: false
        status: GAP
        phase: SYNTHESIS
        gap_domain: D1
    fail_phase3_d2:
      type: return
      value:
        phase: SYNTHESIS
        remediation: Structured causality practice with validated methods
        advance: false
        status: GAP
        gap_domain: D2
        message: D2 below L2. Causality assessment inconsistent.
    fail_phase3_d14:
      type: return
      value:
        advance: false
        gap_domain: D14
        remediation: Cross-functional communication project, teaching demonstration
        phase: SYNTHESIS
        status: GAP
        message: D14 below L2. Cannot adapt communication across audiences.
    invalid_week:
      type: return
      value:
        message: APPE rotation is weeks 1-6
        advance: false
        status: INVALID
    check_mid:
      type: condition
      variable: current_week
      operator: lte
      value: 4
      true_next: gate_phase2
      false_next: check_late
    gate_phase1_d14:
      type: condition
      variable: d14_score
      operator: gte
      value: 1
      true_next: pass_phase1
      false_next: fail_phase1_d14
    gate_phase2_d14:
      type: condition
      variable: d14_score
      operator: gte
      value: 1.5
      true_next: pass_phase2
      false_next: fail_phase2_d14
    fail_phase2_d1:
      type: return
      value:
        gap_domain: D1
        phase: APPLICATION
        status: GAP
        advance: false
        message: Foundational knowledge not at L1+. Review regulatory frameworks.
        remediation: Regulatory comparison exercises, AI workflow observation
    check_week:
      type: condition
      variable: current_week
      operator: lte
      value: 2
      true_next: gate_phase1
      false_next: check_mid
    fail_phase3_d3:
      type: return
      value:
        status: GAP
        advance: false
        gap_domain: D3
        phase: SYNTHESIS
        message: D3 below L2. Pattern recognition for expedited processing insufficient.
        remediation: Advanced pattern recognition with mechanistic understanding
    pass_phase2:
      type: return
      value:
        advance: true
        next_week: 5
        status: PASS
        message: D1-3+D14 at L1+. Ready for advanced applications.
        phase: APPLICATION
        next_focus: Domains 8, 10 — signal concepts, benefit-risk, AI awareness
    fail_phase2_d2:
      type: return
      value:
        message: ADR clinical aspects below L1. Extend classification exercises.
        gap_domain: D2
        advance: false
        status: GAP
        remediation: Type A/B classification drills, temporal pattern exercises
        phase: APPLICATION
    gate_phase3_d3:
      type: condition
      variable: d3_score
      operator: gte
      value: 2
      true_next: gate_phase3_d14
      false_next: fail_phase3_d3
    fail_phase1_d14:
      type: return
      value:
        phase: FOUNDATION
        advance: false
        gap_domain: D14
        status: GAP
        remediation: Audience identification exercises, basic presentation practice
        message: Communication basics below L1. Extend foundation-communication module.
    gate_phase3_d14:
      type: condition
      variable: d14_score
      operator: gte
      value: 2
      true_next: pass_phase3
      false_next: fail_phase3_d14
    gate_phase2:
      type: condition
      variable: d1_score
      operator: gte
      value: 1.5
      true_next: gate_phase2_d2
      false_next: fail_phase2_d1
    gate_phase3:
      type: condition
      variable: d1_score
      operator: gte
      value: 2
      true_next: gate_phase3_d2
      false_next: fail_phase3_d1
    gate_phase3_d2:
      type: condition
      variable: d2_score
      operator: gte
      value: 2
      true_next: gate_phase3_d3
      false_next: fail_phase3_d2
    fail_phase1_d1:
      type: return
      value:
        advance: false
        phase: FOUNDATION
        status: GAP
        gap_domain: D1
        message: PV terminology and foundations below L1. Extend orientation.
        remediation: Intensive terminology workshops, documentation practice
    gate_phase2_d3:
      type: condition
      variable: d3_score
      operator: gte
      value: 1
      true_next: gate_phase2_d14
      false_next: fail_phase2_d3
    gate_phase2_d2:
      type: condition
      variable: d2_score
      operator: gte
      value: 1
      true_next: gate_phase2_d3
      false_next: fail_phase2_d2
    fail_phase2_d3:
      type: return
      value:
        status: GAP
        remediation: Organ system ADR correlation, terminology drills
        advance: false
        message: Important ADR recognition below L1. More organ system mapping.
        gap_domain: D3
        phase: APPLICATION
