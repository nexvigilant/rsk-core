name: level-gate
description: "PDC: Gate competency level (1-7) into progression tier with behavioral anchor requirements"
version: 0.1.0
interface:
  inputs:
    level:
      type: string
      required: false
  outputs:
    anchor_type:
      type: string
    autonomy:
      type: string
    error:
      type: string
    flywheel_tier:
      type: string
    programs:
      type: string
    supervision:
      type: string
    tier:
      type: string
tree:
  start: null_guard
  nodes:
    null_guard:
      type: condition
      variable: level
      operator: is_null
      value: null
      true_next: foundation_tier
      false_next: check_foundation
    check_foundation:
      type: condition
      variable: level
      operator: lte
      value: 2
      true_next: foundation_tier
      false_next: check_independent
    check_independent:
      type: condition
      variable: level
      operator: eq
      value: 3
      true_next: independent_tier
      false_next: check_advanced
    check_advanced:
      type: condition
      variable: level
      operator: eq
      value: 4
      true_next: advanced_tier
      false_next: check_expert
    check_expert:
      type: condition
      variable: level
      operator: eq
      value: 5
      true_next: expert_tier
      false_next: check_exec
    check_exec:
      type: condition
      variable: level
      operator: lte
      value: 7
      true_next: executive_tier
      false_next: invalid_level
    foundation_tier:
      type: return
      value:
        tier: FOUNDATION
        supervision: extensive
        autonomy: guided_practice
        flywheel_tier: DRAFT
        anchor_type: "observable_basics"
        programs: "APPE, Fellowship_12mo"
    independent_tier:
      type: return
      value:
        tier: INDEPENDENT
        supervision: available_consultation
        autonomy: routine_autonomous
        flywheel_tier: STAGING
        anchor_type: "comprehensive_independent"
        programs: "Fellowship_12mo, Fellowship_18mo"
    advanced_tier:
      type: return
      value:
        tier: ADVANCED
        supervision: minimal_oversight
        autonomy: complex_problem_solving
        flywheel_tier: STAGING
        anchor_type: "innovation_development"
        programs: "Fellowship_18mo, Fellowship_24mo"
    expert_tier:
      type: return
      value:
        tier: EXPERT
        supervision: complete_autonomy
        autonomy: strategic_leadership
        flywheel_tier: LIVE
        anchor_type: "field_advancement"
        programs: "SMP"
    executive_tier:
      type: return
      value:
        tier: EXECUTIVE
        supervision: none
        autonomy: organizational_transformation
        flywheel_tier: LIVE
        anchor_type: "industry_influence"
        programs: "SMP_Executive"
    invalid_level:
      type: return
      value:
        tier: INVALID
        error: "Level must be 1-7 (1=L1, 2=L2, 3=L3, 4=L4, 5=L5, 6=L5+, 7=L5++)"
tests:
- input:
    level: 1
  expect:
    tier: FOUNDATION
    supervision: extensive
    flywheel_tier: DRAFT
- input:
    level: 2
  expect:
    tier: FOUNDATION
    supervision: extensive
    flywheel_tier: DRAFT
- input:
    level: 3
  expect:
    tier: INDEPENDENT
    supervision: available_consultation
    flywheel_tier: STAGING
- input:
    level: 4
  expect:
    tier: ADVANCED
    supervision: minimal_oversight
    flywheel_tier: STAGING
- input:
    level: 5
  expect:
    tier: EXPERT
    supervision: complete_autonomy
    flywheel_tier: LIVE
- input:
    level: 6
  expect:
    tier: EXECUTIVE
    supervision: none
    flywheel_tier: LIVE
- input:
    level: 7
  expect:
    tier: EXECUTIVE
    supervision: none
    flywheel_tier: LIVE
- input:
    level: 8
  expect:
    tier: INVALID
- input:
    level: 0
  expect:
    tier: FOUNDATION
    flywheel_tier: DRAFT
- input: {}
  expect:
    tier: FOUNDATION
    flywheel_tier: DRAFT
