# MICROGRAM++ (upgraded 2026-04-23)
name: appe-temporal-pattern
version: 0.1.0
description: "APPE Ch7.2 Domain 2 L1: Temporal pattern recognition for adverse event causality — classifies onset pattern and strengthens/weakens signal via dechallenge/rechallenge evidence."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: drug_started_days_ago
    type: float
    required: false
    description: ""
  - name: onset_hours
    type: float
    required: false
    description: ""
outputs:
  - name: causality_signal
    type: string
  - name: dechallenge
    type: string
  - name: pattern
    type: string
  - name: rechallenge
    type: string
  - name: teaching_point
    type: string
  - name: temporal_plausibility
    type: string
interface:
  inputs:
    drug_started_days_ago:
      type: float
      required: false
    onset_hours:
      type: float
      required: false
  outputs:
    causality_signal:
      type: string
    dechallenge:
      type: string
    pattern:
      type: string
    rechallenge:
      type: string
    teaching_point:
      type: string
    temporal_plausibility:
      type: string
ui:
  title: Appe Temporal Pattern
  subtitle: "APPE Ch7.2 Domain 2 L1: Temporal pattern recognition for adverse event causality — classifies onset pattern and strengthens/weakens signal via dechallenge/rechallenge evidence."
  icon: circle
  route: /vigilance/mg/appe-temporal-pattern
  steps:
    - field: drug_started_days_ago
      label: drug started days ago
      help: Enter drug_started_days_ago
      widget: text
      placeholder: null
    - field: onset_hours
      label: onset hours
      help: Enter onset_hours
      widget: text
      placeholder: null
  result:
    template: "causality_signal: {{causality_signal}} — dechallenge: {{dechallenge}} — pattern: {{pattern}} — rechallenge: {{rechallenge}} — teaching_point: {{teaching_point}} — temporal_plausibility: {{temporal_plausibility}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/appe-temporal-pattern
  cli: rsk mcg run appe-temporal-pattern
  auth: none
  rate_limit: 600/min
tree:
  start: check_immediate
  nodes:
    check_immediate:
      type: condition
      variable: onset_hours
      operator: lt
      value: 1
      true_next: check_immediate_drug_start
      false_next: check_acute
    check_immediate_drug_start:
      type: condition
      variable: drug_started_days_ago
      operator: lt
      value: 1
      true_next: immediate_strong
      false_next: check_acute
    check_acute:
      type: condition
      variable: onset_hours
      operator: lt
      value: 24
      true_next: check_acute_drug_start
      false_next: check_subacute
    check_acute_drug_start:
      type: condition
      variable: drug_started_days_ago
      operator: lte
      value: 7
      true_next: acute_moderate
      false_next: check_subacute
    check_subacute:
      type: condition
      variable: drug_started_days_ago
      operator: gt
      value: 7
      true_next: check_subacute_upper
      false_next: check_delayed
    check_subacute_upper:
      type: condition
      variable: drug_started_days_ago
      operator: lte
      value: 90
      true_next: subacute_moderate
      false_next: check_delayed
    check_delayed:
      type: condition
      variable: drug_started_days_ago
      operator: gt
      value: 90
      true_next: delayed_weak
      false_next: temporal_unclear
    immediate_strong:
      type: return
      value:
        pattern: IMMEDIATE
        causality_signal: STRONG
        dechallenge: NOT_ASSESSED
        rechallenge: NOT_ASSESSED
        temporal_plausibility: HIGH
        teaching_point: Immediate reactions (anaphylaxis, angioedema) within 1 hour of first dose have the strongest temporal plausibility. Dechallenge is automatic; rechallenge is contraindicated for Type B reactions.
    acute_moderate:
      type: return
      value:
        pattern: ACUTE
        causality_signal: MODERATE
        dechallenge: NOT_ASSESSED
        rechallenge: NOT_ASSESSED
        temporal_plausibility: MODERATE
        teaching_point: "Acute reactions within 24h of a drug started in the last week are temporally plausible. Confirm with dechallenge: resolution on stopping strengthens the signal to STRONG."
    subacute_moderate:
      type: return
      value:
        pattern: SUBACUTE
        causality_signal: MODERATE
        dechallenge: NOT_ASSESSED
        rechallenge: NOT_ASSESSED
        temporal_plausibility: MODERATE
        teaching_point: Subacute onset (drug 7-90 days ago) is consistent with delayed pharmacological effects or immune sensitisation. Dechallenge and rechallenge data are critical to upgrade causality signal.
    delayed_weak:
      type: return
      value:
        pattern: DELAYED
        causality_signal: WEAK
        dechallenge: NOT_ASSESSED
        rechallenge: NOT_ASSESSED
        temporal_plausibility: LOW
        teaching_point: Delayed reactions (drug started >90 days ago) have weak temporal plausibility without additional evidence. Consider Type C (chronic) ADR. Drug-induced organ toxicity may present late.
    temporal_unclear:
      type: return
      value:
        pattern: UNCLEAR
        causality_signal: WEAK
        dechallenge: NOT_ASSESSED
        rechallenge: NOT_ASSESSED
        temporal_plausibility: LOW
        teaching_point: Temporal relationship is unclear. Collect precise drug start date and event onset time. Without these, causality assessment cannot proceed reliably.
tests:
  - input:
      onset_hours: 0.5
      drug_started_days_ago: 0.5
      drug_stopped: false
      resolved_after_stop: false
      rechallenge_positive: false
    expect:
      pattern: IMMEDIATE
      causality_signal: STRONG
      temporal_plausibility: HIGH
  - input:
      onset_hours: 12
      drug_started_days_ago: 5
      drug_stopped: false
      resolved_after_stop: false
      rechallenge_positive: false
    expect:
      pattern: ACUTE
      causality_signal: MODERATE
  - input:
      onset_hours: 48
      drug_started_days_ago: 30
      drug_stopped: false
      resolved_after_stop: false
      rechallenge_positive: false
    expect:
      pattern: SUBACUTE
      causality_signal: MODERATE
  - input:
      onset_hours: 72
      drug_started_days_ago: 120
      drug_stopped: false
      resolved_after_stop: false
      rechallenge_positive: false
    expect:
      pattern: DELAYED
      causality_signal: WEAK
  - input:
      onset_hours: 0
      drug_started_days_ago: 0
      drug_stopped: true
      resolved_after_stop: true
      rechallenge_positive: false
    expect:
      pattern: IMMEDIATE
      causality_signal: STRONG
  - input:
      onset_hours: 6
      drug_started_days_ago: 3
      drug_stopped: true
      resolved_after_stop: true
      rechallenge_positive: false
    expect:
      pattern: ACUTE
      causality_signal: MODERATE
  - input:
      onset_hours: 96
      drug_started_days_ago: 45
      drug_stopped: true
      resolved_after_stop: true
      rechallenge_positive: true
    expect:
      pattern: SUBACUTE
      causality_signal: MODERATE
  - input:
      onset_hours: 0.5
      drug_started_days_ago: 2
      drug_stopped: false
      resolved_after_stop: false
      rechallenge_positive: false
    expect:
      pattern: ACUTE
      causality_signal: MODERATE
  - input:
      onset_hours: 168
      drug_started_days_ago: 91
      drug_stopped: false
      resolved_after_stop: false
      rechallenge_positive: false
    expect:
      pattern: DELAYED
      causality_signal: WEAK
  - input:
      onset_hours: 24
      drug_started_days_ago: 5
      drug_stopped: false
      resolved_after_stop: false
      rechallenge_positive: false
    expect:
      pattern: UNCLEAR
      causality_signal: WEAK
  - input:
      onset_hours: 48
      drug_started_days_ago: 7
      drug_stopped: false
      resolved_after_stop: false
      rechallenge_positive: false
    expect:
      pattern: UNCLEAR
      causality_signal: WEAK
  - input:
      onset_hours: 48
      drug_started_days_ago: 90
      drug_stopped: false
      resolved_after_stop: false
      rechallenge_positive: false
    expect:
      pattern: SUBACUTE
      causality_signal: MODERATE
  - input: {}
    expect:
      causality_signal: WEAK
      dechallenge: NOT_ASSESSED
      pattern: UNCLEAR
      rechallenge: NOT_ASSESSED
      teaching_point: Temporal relationship is unclear. Collect precise drug start date and event onset time. Without these, causality assessment cannot proceed reliably.
      temporal_plausibility: LOW
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - causality_signal
    - dechallenge
    - pattern
    - rechallenge
    - teaching_point
    - temporal_plausibility
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
