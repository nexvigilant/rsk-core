# MICROGRAM++ (upgraded 2026-04-23)
name: anchor-validator
version: 0.1.0
description: "PDC: Validate behavioral anchor verb against expected competency level (Bloom's taxonomy mapping)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: expected_level
    type: int
    required: false
    description: ""
  - name: verb_tier
    type: int
    required: false
    description: ""
outputs:
  - name: alignment
    type: bool
  - name: message
    type: string
  - name: reason
    type: string
  - name: verdict
    type: string
interface:
  inputs:
    expected_level:
      type: int
      required: false
    verb_tier:
      type: int
      required: false
  outputs:
    alignment:
      type: bool
    message:
      type: string
    reason:
      type: string
    verdict:
      type: string
ui:
  title: Anchor Validator
  subtitle: "PDC: Validate behavioral anchor verb against expected competency level (Bloom's taxonomy mapping)"
  icon: circle
  route: /vigilance/mg/anchor-validator
  steps:
    - field: expected_level
      label: expected level
      help: Enter expected_level
      widget: text
      placeholder: null
    - field: verb_tier
      label: verb tier
      help: Enter verb_tier
      widget: text
      placeholder: null
  result:
    template: "alignment: {{alignment}} — message: {{message}} — reason: {{reason}} — verdict: {{verdict}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/anchor-validator
  cli: rsk mcg run anchor-validator
  auth: none
  rate_limit: 600/min
tree:
  start: null_guard
  nodes:
    null_guard:
      type: condition
      variable: verb_tier
      operator: is_null
      value: null
      true_next: unknown_return
      false_next: check_verb_tier
    unknown_return:
      type: return
      value:
        verdict: INVALID
        reason: Verb tier required for validation
    check_verb_tier:
      type: condition
      variable: verb_tier
      operator: lte
      value: 1
      true_next: check_level_recall
      false_next: check_tier_2
    check_tier_2:
      type: condition
      variable: verb_tier
      operator: eq
      value: 2
      true_next: check_level_comprehension
      false_next: check_tier_3
    check_tier_3:
      type: condition
      variable: verb_tier
      operator: eq
      value: 3
      true_next: check_level_application
      false_next: check_tier_4
    check_tier_4:
      type: condition
      variable: verb_tier
      operator: eq
      value: 4
      true_next: check_level_creation
      false_next: check_tier_5
    check_tier_5:
      type: condition
      variable: verb_tier
      operator: eq
      value: 5
      true_next: check_level_synthesis
      false_next: check_tier_6
    check_tier_6:
      type: condition
      variable: verb_tier
      operator: eq
      value: 6
      true_next: check_level_institutional
      false_next: global_tier
    check_level_recall:
      type: condition
      variable: expected_level
      operator: lte
      value: 1
      true_next: anchor_match
      false_next: anchor_below
    check_level_comprehension:
      type: condition
      variable: expected_level
      operator: eq
      value: 2
      true_next: anchor_match
      false_next: check_comp_above
    check_comp_above:
      type: condition
      variable: expected_level
      operator: lte
      value: 1
      true_next: anchor_above
      false_next: anchor_below
    check_level_application:
      type: condition
      variable: expected_level
      operator: eq
      value: 3
      true_next: anchor_match
      false_next: check_app_above
    check_app_above:
      type: condition
      variable: expected_level
      operator: lte
      value: 2
      true_next: anchor_above
      false_next: anchor_below
    check_level_creation:
      type: condition
      variable: expected_level
      operator: eq
      value: 4
      true_next: anchor_match
      false_next: check_create_above
    check_create_above:
      type: condition
      variable: expected_level
      operator: lte
      value: 3
      true_next: anchor_above
      false_next: anchor_below
    check_level_synthesis:
      type: condition
      variable: expected_level
      operator: eq
      value: 5
      true_next: anchor_match
      false_next: check_synth_above
    check_synth_above:
      type: condition
      variable: expected_level
      operator: lte
      value: 4
      true_next: anchor_above
      false_next: anchor_below
    check_level_institutional:
      type: condition
      variable: expected_level
      operator: eq
      value: 6
      true_next: anchor_match
      false_next: check_inst_above
    check_inst_above:
      type: condition
      variable: expected_level
      operator: lte
      value: 5
      true_next: anchor_above
      false_next: anchor_below
    global_tier:
      type: condition
      variable: expected_level
      operator: gte
      value: 7
      true_next: anchor_match
      false_next: anchor_above
    anchor_match:
      type: return
      value:
        verdict: MATCH
        alignment: true
        message: Behavioral verb matches expected competency level
    anchor_above:
      type: return
      value:
        verdict: ABOVE_LEVEL
        alignment: false
        message: Behavioral verb exceeds expected level — evidence of advancement
    anchor_below:
      type: return
      value:
        verdict: BELOW_LEVEL
        alignment: false
        message: Behavioral verb below expected level — development gap identified
tests:
  - input:
      verb_tier: 1
      expected_level: 1
    expect:
      verdict: MATCH
      alignment: true
  - input:
      verb_tier: 3
      expected_level: 3
    expect:
      verdict: MATCH
      alignment: true
  - input:
      verb_tier: 5
      expected_level: 5
    expect:
      verdict: MATCH
      alignment: true
  - input:
      verb_tier: 7
      expected_level: 7
    expect:
      verdict: MATCH
      alignment: true
  - input:
      verb_tier: 1
      expected_level: 3
    expect:
      verdict: BELOW_LEVEL
      alignment: false
  - input:
      verb_tier: 4
      expected_level: 2
    expect:
      verdict: ABOVE_LEVEL
      alignment: false
  - input:
      verb_tier: 6
      expected_level: 6
    expect:
      verdict: MATCH
      alignment: true
  - input:
      verb_tier: 2
      expected_level: 5
    expect:
      verdict: BELOW_LEVEL
  - input: {}
    expect:
      verdict: INVALID
      reason: Verb tier required for validation
  - input:
      verb_tier: 3
      expected_level: 5
    expect:
      verdict: BELOW_LEVEL
      alignment: false
  - input:
      verb_tier: 5
      expected_level: 3
    expect:
      verdict: ABOVE_LEVEL
      alignment: false
  - input:
      verb_tier: 6
      expected_level: 4
    expect:
      verdict: ABOVE_LEVEL
      alignment: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - alignment
    - message
    - reason
    - verdict
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
