# MICROGRAM++ (upgraded 2026-04-23)
name: d02-s002-differential-diagnosis-gate
version: 0.1.0
description: Determine if clinical event is drug-related (ADR) or disease-related based on temporal and clinical features
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: D02 S002 Differential Diagnosis Gate
  subtitle: Determine if clinical event is drug-related (ADR) or disease-related based on temporal and clinical features
  icon: circle
  route: /vigilance/mg/d02-s002-differential-diagnosis-gate
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/d02-s002-differential-diagnosis-gate
  cli: rsk mcg run d02-s002-differential-diagnosis-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: drug_related_score
      operator: gte
      value: 1
      true_next: yes
      false_next: no
    yes:
      type: return
      value:
        likely_drug_related: true
    no:
      type: return
      value:
        likely_disease_related: false
tests:
  - input:
      drug_related_score: 1
    expect:
      likely_drug_related: true
  - input:
      drug_related_score: 2
    expect:
      likely_drug_related: true
  - input:
      drug_related_score: 0
    expect:
      likely_disease_related: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
