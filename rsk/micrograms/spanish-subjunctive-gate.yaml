# MICROGRAM++ (upgraded 2026-04-23)
name: spanish-subjunctive-gate
version: 0.1.0
description: Decides whether the subjunctive mood is required based on sentence semantics using the WEIRDO mnemonic
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: expresses_doubt
    type: bool
    required: false
    description: ""
  - name: expresses_desire
    type: bool
    required: false
    description: ""
  - name: expresses_emotion
    type: bool
    required: false
    description: ""
  - name: is_command
    type: bool
    required: false
    description: ""
  - name: is_factual
    type: bool
    required: false
    description: ""
outputs:
  - name: mood
    type: string
  - name: reason
    type: string
  - name: mnemonic
    type: string
interface:
  inputs:
    expresses_doubt:
      type: bool
      required: false
    expresses_desire:
      type: bool
      required: false
    expresses_emotion:
      type: bool
      required: false
    is_command:
      type: bool
      required: false
    is_factual:
      type: bool
      required: false
  outputs:
    mood:
      type: string
    reason:
      type: string
    mnemonic:
      type: string
ui:
  title: Spanish Subjunctive Gate
  subtitle: Decides whether the subjunctive mood is required based on sentence semantics using the WEIRDO mnemonic
  icon: circle
  route: /vigilance/mg/spanish-subjunctive-gate
  steps:
    - field: expresses_doubt
      label: expresses doubt
      help: Enter expresses_doubt
      widget: toggle
      placeholder: null
    - field: expresses_desire
      label: expresses desire
      help: Enter expresses_desire
      widget: toggle
      placeholder: null
    - field: expresses_emotion
      label: expresses emotion
      help: Enter expresses_emotion
      widget: toggle
      placeholder: null
    - field: is_command
      label: is command
      help: Enter is_command
      widget: toggle
      placeholder: null
    - field: is_factual
      label: is factual
      help: Enter is_factual
      widget: toggle
      placeholder: null
  result:
    template: "mood: {{mood}} — reason: {{reason}} — mnemonic: {{mnemonic}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/spanish-subjunctive-gate
  cli: rsk mcg run spanish-subjunctive-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_factual_present
  nodes:
    check_factual_present:
      type: condition
      variable: is_factual
      operator: is_null
      value: null
      true_next: reject_missing
      false_next: check_factual
    reject_missing:
      type: return
      value:
        mood: REJECTED
        reason: "REJECTED: is_factual is required"
        mnemonic: N/A
    check_factual:
      type: condition
      variable: is_factual
      operator: eq
      value: true
      true_next: indicative
      false_next: check_doubt
    check_doubt:
      type: condition
      variable: expresses_doubt
      operator: eq
      value: true
      true_next: subjunctive_doubt
      false_next: check_desire
    check_desire:
      type: condition
      variable: expresses_desire
      operator: eq
      value: true
      true_next: subjunctive_desire
      false_next: check_emotion
    check_emotion:
      type: condition
      variable: expresses_emotion
      operator: eq
      value: true
      true_next: subjunctive_emotion
      false_next: check_command
    check_command:
      type: condition
      variable: is_command
      operator: eq
      value: true
      true_next: subjunctive_command
      false_next: indicative_default
    indicative:
      type: return
      value:
        mood: indicative
        reason: Factual statement — use indicative
        mnemonic: WEIRDO does not apply to facts
    indicative_default:
      type: return
      value:
        mood: indicative
        reason: No subjunctive trigger detected — default to indicative
        mnemonic: "WEIRDO: Wishes, Emotions, Impersonal, Recommendations, Doubt, Ojala"
    subjunctive_doubt:
      type: return
      value:
        mood: subjunctive
        reason: Expresses doubt — subjunctive required
        mnemonic: "WEIRDO: D = Doubt"
    subjunctive_desire:
      type: return
      value:
        mood: subjunctive
        reason: Expresses desire — subjunctive required
        mnemonic: "WEIRDO: W = Wishes"
    subjunctive_emotion:
      type: return
      value:
        mood: subjunctive
        reason: Expresses emotion — subjunctive required
        mnemonic: "WEIRDO: E = Emotions"
    subjunctive_command:
      type: return
      value:
        mood: subjunctive
        reason: Command or recommendation — subjunctive required
        mnemonic: "WEIRDO: R = Recommendations"
tests:
  - input:
      expresses_doubt: true
      expresses_desire: false
      expresses_emotion: false
      is_command: false
      is_factual: false
    expect:
      mood: subjunctive
      reason: Expresses doubt — subjunctive required
      mnemonic: "WEIRDO: D = Doubt"
  - input:
      expresses_doubt: false
      expresses_desire: true
      expresses_emotion: false
      is_command: false
      is_factual: false
    expect:
      mood: subjunctive
      reason: Expresses desire — subjunctive required
      mnemonic: "WEIRDO: W = Wishes"
  - input:
      expresses_doubt: false
      expresses_desire: false
      expresses_emotion: true
      is_command: false
      is_factual: false
    expect:
      mood: subjunctive
      reason: Expresses emotion — subjunctive required
      mnemonic: "WEIRDO: E = Emotions"
  - input:
      expresses_doubt: false
      expresses_desire: false
      expresses_emotion: false
      is_command: true
      is_factual: false
    expect:
      mood: subjunctive
      reason: Command or recommendation — subjunctive required
      mnemonic: "WEIRDO: R = Recommendations"
  - input:
      expresses_doubt: false
      expresses_desire: false
      expresses_emotion: false
      is_command: false
      is_factual: true
    expect:
      mood: indicative
      reason: Factual statement — use indicative
      mnemonic: WEIRDO does not apply to facts
  - input: {}
    expect:
      mood: REJECTED
      reason: "REJECTED: is_factual is required"
      mnemonic: N/A
  - input:
      expresses_doubt: true
      expresses_desire: true
      expresses_emotion: false
      is_command: false
      is_factual: false
    expect:
      mood: subjunctive
      reason: Expresses doubt — subjunctive required
      mnemonic: "WEIRDO: D = Doubt"
  - input:
      expresses_doubt: false
      expresses_desire: false
      expresses_emotion: false
      is_command: false
      is_factual: false
    expect:
      mood: indicative
      reason: No subjunctive trigger detected — default to indicative
      mnemonic: "WEIRDO: Wishes, Emotions, Impersonal, Recommendations, Doubt, Ojala"
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - mood
    - reason
    - mnemonic
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
