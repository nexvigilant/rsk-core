# MICROGRAM++ (upgraded 2026-04-23)
name: additional-monitoring-flag
version: 0.1.0
description: Determine if drug requires additional monitoring (black triangle symbol) based on regulatory status, market tenure, and conditions. EMA Additional Monitoring Guidance.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: is_new_substance
    type: bool
    required: false
    description: ""
  - name: years_on_market
    type: int
    required: false
    description: ""
  - name: has_conditional_approval
    type: bool
    required: false
    description: ""
  - name: has_rmp_condition
    type: bool
    required: false
    description: ""
outputs:
  - name: requires_monitoring
    type: bool
  - name: symbol
    type: string
  - name: rationale
    type: string
interface:
  inputs:
    is_new_substance:
      type: bool
      required: false
    years_on_market:
      type: int
      required: false
    has_conditional_approval:
      type: bool
      required: false
    has_rmp_condition:
      type: bool
      required: false
  outputs:
    requires_monitoring:
      type: bool
    symbol:
      type: string
    rationale:
      type: string
ui:
  title: Additional Monitoring Flag
  subtitle: Determine if drug requires additional monitoring (black triangle symbol) based on regulatory status, market tenure, and conditions. EMA Additional Monitoring Guidance.
  icon: circle
  route: /vigilance/mg/additional-monitoring-flag
  steps:
    - field: is_new_substance
      label: is new substance
      help: Enter is_new_substance
      widget: toggle
      placeholder: null
    - field: years_on_market
      label: years on market
      help: Enter years_on_market
      widget: text
      placeholder: null
    - field: has_conditional_approval
      label: has conditional approval
      help: Enter has_conditional_approval
      widget: toggle
      placeholder: null
    - field: has_rmp_condition
      label: has rmp condition
      help: Enter has_rmp_condition
      widget: toggle
      placeholder: null
  result:
    template: "requires_monitoring: {{requires_monitoring}} — symbol: {{symbol}} — rationale: {{rationale}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/additional-monitoring-flag
  cli: rsk mcg run additional-monitoring-flag
  auth: none
  rate_limit: 600/min
tree:
  start: new_substance_check
  nodes:
    new_substance_check:
      type: condition
      variable: is_new_substance
      operator: eq
      value: true
      true_next: new_substance_tenure_check
      false_next: conditional_approval_check
    new_substance_tenure_check:
      type: condition
      variable: years_on_market
      operator: lt
      value: 5
      true_next: monitoring_required_new
      false_next: conditional_approval_check
    conditional_approval_check:
      type: condition
      variable: has_conditional_approval
      operator: eq
      value: true
      true_next: monitoring_required_conditional
      false_next: rmp_condition_check
    rmp_condition_check:
      type: condition
      variable: has_rmp_condition
      operator: eq
      value: true
      true_next: monitoring_required_rmp
      false_next: no_monitoring_required
    monitoring_required_new:
      type: return
      value:
        requires_monitoring: true
        symbol: black_triangle
        rationale: New active substance within 5 years of approval - Enhanced pharmacovigilance required
    monitoring_required_conditional:
      type: return
      value:
        requires_monitoring: true
        symbol: black_triangle
        rationale: Conditional approval - Additional monitoring a condition of marketing authorization
    monitoring_required_rmp:
      type: return
      value:
        requires_monitoring: true
        symbol: black_triangle
        rationale: Risk Minimization Plan condition - Additional monitoring required to support RMP objectives
    no_monitoring_required:
      type: return
      value:
        requires_monitoring: false
        symbol: none
        rationale: Established safety profile - Standard pharmacovigilance sufficient
tests:
  - input:
      is_new_substance: true
      years_on_market: 2
      has_conditional_approval: false
      has_rmp_condition: false
    expect:
      requires_monitoring: true
      symbol: black_triangle
      rationale: New active substance within 5 years of approval - Enhanced pharmacovigilance required
  - input:
      is_new_substance: true
      years_on_market: 7
      has_conditional_approval: false
      has_rmp_condition: false
    expect:
      requires_monitoring: false
      symbol: none
      rationale: Established safety profile - Standard pharmacovigilance sufficient
  - input:
      is_new_substance: false
      years_on_market: 10
      has_conditional_approval: true
      has_rmp_condition: false
    expect:
      requires_monitoring: true
      symbol: black_triangle
      rationale: Conditional approval - Additional monitoring a condition of marketing authorization
  - input:
      is_new_substance: false
      years_on_market: 15
      has_conditional_approval: false
      has_rmp_condition: true
    expect:
      requires_monitoring: true
      symbol: black_triangle
      rationale: Risk Minimization Plan condition - Additional monitoring required to support RMP objectives
  - input:
      is_new_substance: false
      years_on_market: 20
      has_conditional_approval: false
      has_rmp_condition: false
    expect:
      requires_monitoring: false
      symbol: none
      rationale: Established safety profile - Standard pharmacovigilance sufficient
  - input:
      is_new_substance: true
      years_on_market: 5
      has_conditional_approval: false
      has_rmp_condition: false
    expect:
      requires_monitoring: false
      symbol: none
      rationale: Established safety profile - Standard pharmacovigilance sufficient
  - input:
      is_new_substance: true
      years_on_market: 4
      has_conditional_approval: false
      has_rmp_condition: false
    expect:
      requires_monitoring: true
      symbol: black_triangle
      rationale: New active substance within 5 years of approval - Enhanced pharmacovigilance required
  - input:
      is_new_substance: true
      years_on_market: 2
      has_conditional_approval: true
      has_rmp_condition: false
    expect:
      requires_monitoring: true
      symbol: black_triangle
      rationale: New active substance within 5 years of approval - Enhanced pharmacovigilance required
  - input:
      is_new_substance: false
      years_on_market: 10
      has_conditional_approval: true
      has_rmp_condition: true
    expect:
      requires_monitoring: true
      symbol: black_triangle
      rationale: Conditional approval - Additional monitoring a condition of marketing authorization
  - input: {}
    expect:
      requires_monitoring: false
      symbol: none
      rationale: Established safety profile - Standard pharmacovigilance sufficient
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - requires_monitoring
    - symbol
    - rationale
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
