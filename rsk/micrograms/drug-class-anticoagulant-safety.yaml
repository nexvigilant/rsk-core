# MICROGRAM++ (upgraded 2026-04-23)
name: drug-class-anticoagulant-safety
version: 0.1.0
description: Anticoagulant safety assessment. Evaluates bleeding risk, drug interactions, and renal clearance requirements.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Class Anticoagulant Safety
  subtitle: Anticoagulant safety assessment. Evaluates bleeding risk, drug interactions, and renal clearance requirements.
  icon: circle
  route: /vigilance/mg/drug-class-anticoagulant-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-class-anticoagulant-safety
  cli: rsk mcg run drug-class-anticoagulant-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_bleeding_risk
  nodes:
    check_bleeding_risk:
      type: condition
      variable: has_active_bleeding
      operator: eq
      value: true
      true_next: bleeding_alert
      false_next: check_renal
    bleeding_alert:
      type: return
      value:
        risk_level: critical
        contraindication: true
        message: Active bleeding; anticoagulation contraindicated
    check_renal:
      type: condition
      variable: renal_clearance_ml_min
      operator: lt
      value: 30
      true_next: severe_renal_impairment
      false_next: check_interactions
    severe_renal_impairment:
      type: return
      value:
        risk_level: high
        dose_adjustment: required
        message: Severe renal impairment; adjust anticoagulant dose per DOAC guidance
    check_interactions:
      type: condition
      variable: concurrent_strong_inhibitor
      operator: eq
      value: true
      true_next: interaction_alert
      false_next: standard_dosing
    interaction_alert:
      type: return
      value:
        risk_level: moderate
        drug_interaction: true
        message: Strong CYP3A4/transporter inhibitor; assess dose adjustment
    standard_dosing:
      type: return
      value:
        risk_level: low
        message: Standard anticoagulation dosing appropriate
tests:
  - input:
      has_active_bleeding: true
      renal_clearance_ml_min: 60
      concurrent_strong_inhibitor: false
    expect:
      risk_level: critical
      contraindication: true
  - input:
      has_active_bleeding: false
      renal_clearance_ml_min: 20
      concurrent_strong_inhibitor: false
    expect:
      risk_level: high
      dose_adjustment: required
  - input:
      has_active_bleeding: false
      renal_clearance_ml_min: 50
      concurrent_strong_inhibitor: true
    expect:
      risk_level: moderate
      drug_interaction: true
  - input:
      has_active_bleeding: false
      renal_clearance_ml_min: 70
      concurrent_strong_inhibitor: false
    expect:
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
