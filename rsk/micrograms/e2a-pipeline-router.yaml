# MICROGRAM++ (upgraded 2026-04-23)
name: e2a-pipeline-router
version: 1.0.0
description: "ICH E2A orchestration router: routes an incoming case through the correct E2A assessment pipeline based on case type and available data. Entry point for the full E2A microservice chain."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: case_type
    type: string
    required: false
    description: ""
  - name: has_minimum_data
    type: bool
    required: false
    description: ""
  - name: is_clinical_trial
    type: bool
    required: false
    description: ""
  - name: is_serious
    type: bool
    required: false
    description: ""
outputs:
  - name: next_assessment
    type: string
  - name: pipeline_path
    type: string
  - name: rationale
    type: string
  - name: regulatory_reference
    type: string
  - name: start_with
    type: string
interface:
  inputs:
    case_type:
      type: string
      required: false
    has_minimum_data:
      type: bool
      required: false
    is_clinical_trial:
      type: bool
      required: false
    is_serious:
      type: bool
      required: false
  outputs:
    next_assessment:
      type: string
    pipeline_path:
      type: string
    rationale:
      type: string
    regulatory_reference:
      type: string
    start_with:
      type: string
ui:
  title: E2a Pipeline Router
  subtitle: "ICH E2A orchestration router: routes an incoming case through the correct E2A assessment pipeline based on case type and available data. Entry point for the full E2A microservice chain."
  icon: circle
  route: /vigilance/mg/e2a-pipeline-router
  steps:
    - field: case_type
      label: case type
      help: Enter case_type
      widget: text
      placeholder: null
    - field: has_minimum_data
      label: has minimum data
      help: Enter has_minimum_data
      widget: toggle
      placeholder: null
    - field: is_clinical_trial
      label: is clinical trial
      help: Enter is_clinical_trial
      widget: toggle
      placeholder: null
    - field: is_serious
      label: is serious
      help: Enter is_serious
      widget: toggle
      placeholder: null
  result:
    template: "next_assessment: {{next_assessment}} — pipeline_path: {{pipeline_path}} — rationale: {{rationale}} — regulatory_reference: {{regulatory_reference}} — start_with: {{start_with}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2a-pipeline-router
  cli: rsk mcg run e2a-pipeline-router
  auth: none
  rate_limit: 600/min
tree:
  start: check_minimum_data
  nodes:
    check_minimum_data:
      type: condition
      variable: has_minimum_data
      operator: eq
      value: true
      true_next: check_clinical_trial
      false_next: collect_minimum_first
    check_clinical_trial:
      type: condition
      variable: is_clinical_trial
      operator: eq
      value: true
      true_next: trial_pipeline
      false_next: postmarket_pipeline
    trial_pipeline:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: trial_serious_path
      false_next: trial_nonserious_path
    postmarket_pipeline:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: postmarket_serious_path
      false_next: postmarket_nonserious_path
    collect_minimum_first:
      type: return
      value:
        pipeline_path: DATA_COLLECTION
        start_with: e2a-minimum-criteria
        next_assessment: e2a-data-collection-priority
        rationale: Minimum ICSR criteria not met — collect 4 required data elements before proceeding
        regulatory_reference: ICH E2A Section III.A - Minimum criteria required before case processing
    trial_serious_path:
      type: return
      value:
        pipeline_path: TRIAL_SERIOUS_SUSAR
        start_with: e2a-expectedness-check
        next_assessment: e2a-reporting-obligation
        rationale: Clinical trial serious case — assess expectedness then determine SUSAR status and reporting obligation
        regulatory_reference: ICH E2A Section III.A-B - Clinical trial SUSAR pathway
    trial_nonserious_path:
      type: return
      value:
        pipeline_path: TRIAL_NONSERIOUS
        start_with: e2a-outcome-classifier
        next_assessment: e2a-data-collection-priority
        rationale: Clinical trial non-serious case — classify outcome and assign to periodic line listing
        regulatory_reference: ICH E2A Section III.B.3 - Non-serious trial events in annual reports
    postmarket_serious_path:
      type: return
      value:
        pipeline_path: POSTMARKET_SERIOUS
        start_with: e2a-expectedness-check
        next_assessment: e2a-reporting-timeline
        rationale: Post-marketing serious case — assess expectedness for 15-day vs periodic reporting determination
        regulatory_reference: ICH E2A Section III.B - Post-marketing serious unexpected = 15-day expedited
    postmarket_nonserious_path:
      type: return
      value:
        pipeline_path: POSTMARKET_NONSERIOUS
        start_with: e2a-outcome-classifier
        next_assessment: e2a-data-collection-priority
        rationale: Post-marketing non-serious case — classify outcome for aggregate periodic reporting
        regulatory_reference: ICH E2A Section III.B.3 - Non-serious post-marketing events in PSURs
tests:
  - input:
      has_minimum_data: false
      is_clinical_trial: true
      is_serious: true
      case_type: spontaneous
    expect:
      pipeline_path: DATA_COLLECTION
      start_with: e2a-minimum-criteria
      next_assessment: e2a-data-collection-priority
      regulatory_reference: ICH E2A Section III.A - Minimum criteria required before case processing
  - input:
      has_minimum_data: true
      is_clinical_trial: true
      is_serious: true
      case_type: clinical_trial
    expect:
      pipeline_path: TRIAL_SERIOUS_SUSAR
      start_with: e2a-expectedness-check
      next_assessment: e2a-reporting-obligation
      regulatory_reference: ICH E2A Section III.A-B - Clinical trial SUSAR pathway
  - input:
      has_minimum_data: true
      is_clinical_trial: true
      is_serious: false
      case_type: clinical_trial
    expect:
      pipeline_path: TRIAL_NONSERIOUS
      start_with: e2a-outcome-classifier
      next_assessment: e2a-data-collection-priority
      regulatory_reference: ICH E2A Section III.B.3 - Non-serious trial events in annual reports
  - input:
      has_minimum_data: true
      is_clinical_trial: false
      is_serious: true
      case_type: spontaneous
    expect:
      pipeline_path: POSTMARKET_SERIOUS
      start_with: e2a-expectedness-check
      next_assessment: e2a-reporting-timeline
      regulatory_reference: ICH E2A Section III.B - Post-marketing serious unexpected = 15-day expedited
  - input:
      has_minimum_data: true
      is_clinical_trial: false
      is_serious: false
      case_type: spontaneous
    expect:
      pipeline_path: POSTMARKET_NONSERIOUS
      start_with: e2a-outcome-classifier
      next_assessment: e2a-data-collection-priority
      regulatory_reference: ICH E2A Section III.B.3 - Non-serious post-marketing events in PSURs
  - input: {}
    expect:
      pipeline_path: DATA_COLLECTION
      start_with: e2a-minimum-criteria
      next_assessment: e2a-data-collection-priority
      regulatory_reference: ICH E2A Section III.A - Minimum criteria required before case processing
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - next_assessment
    - pipeline_path
    - rationale
    - regulatory_reference
    - start_with
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
