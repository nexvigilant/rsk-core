# MICROGRAM++ (upgraded 2026-04-23)
name: workflow-benefit-risk-review
version: 0.1.0
description: Select benefit-risk assessment depth by product lifecycle stage
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Workflow Benefit Risk Review
  subtitle: Select benefit-risk assessment depth by product lifecycle stage
  icon: circle
  route: /vigilance/mg/workflow-benefit-risk-review
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/workflow-benefit-risk-review
  cli: rsk mcg run workflow-benefit-risk-review
  auth: none
  rate_limit: 600/min
tree:
  start: check_stage
  nodes:
    check_stage:
      type: condition
      variable: lifecycle_stage
      operator: eq
      value: approval
      true_next: full_review
      false_next: check_psur
    full_review:
      type: return
      value:
        depth: comprehensive
        chain: benefit-risk → epidemiology → compliance → ema
        assessors: 4
    check_psur:
      type: condition
      variable: lifecycle_stage
      operator: eq
      value: psur
      true_next: periodic_review
      false_next: ongoing
    periodic_review:
      type: return
      value:
        depth: periodic
        chain: benefit-risk → ema → compliance
        assessors: 3
    ongoing:
      type: return
      value:
        depth: signal_triggered
        chain: benefit-risk → vigilance
        assessors: 2
tests:
  - input:
      lifecycle_stage: approval
    expect:
      depth: comprehensive
      assessors: 4
  - input:
      lifecycle_stage: psur
    expect:
      depth: periodic
      assessors: 3
  - input:
      lifecycle_stage: post_market
    expect:
      depth: signal_triggered
      assessors: 2
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
