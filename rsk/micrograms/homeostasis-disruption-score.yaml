# MICROGRAM++ (upgraded 2026-04-23)
name: homeostasis-disruption-score
version: 0.1.0
description: "Multi-organ homeostasis disruption scorer: aggregates organ system involvement count to detect multi-organ failure patterns"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: cardiac_involved
    type: bool
    required: false
    description: ""
  - name: hepatic_involved
    type: bool
    required: false
    description: ""
  - name: renal_involved
    type: bool
    required: false
    description: ""
  - name: respiratory_involved
    type: bool
    required: false
    description: ""
  - name: neurological_involved
    type: bool
    required: false
    description: ""
  - name: haematological_involved
    type: bool
    required: false
    description: ""
outputs:
  - name: severity
    type: string
  - name: organ_count
    type: int
  - name: action
    type: string
  - name: multi_organ_failure
    type: bool
interface:
  inputs:
    cardiac_involved:
      type: bool
      required: false
    hepatic_involved:
      type: bool
      required: false
    renal_involved:
      type: bool
      required: false
    respiratory_involved:
      type: bool
      required: false
    neurological_involved:
      type: bool
      required: false
    haematological_involved:
      type: bool
      required: false
  outputs:
    severity:
      type: string
      description: critical | serious | moderate | mild
    organ_count:
      type: int
    action:
      type: string
    multi_organ_failure:
      type: bool
ui:
  title: Homeostasis Disruption Score
  subtitle: "Multi-organ homeostasis disruption scorer: aggregates organ system involvement count to detect multi-organ failure patterns"
  icon: circle
  route: /vigilance/mg/homeostasis-disruption-score
  steps:
    - field: cardiac_involved
      label: cardiac involved
      help: Enter cardiac_involved
      widget: toggle
      placeholder: null
    - field: hepatic_involved
      label: hepatic involved
      help: Enter hepatic_involved
      widget: toggle
      placeholder: null
    - field: renal_involved
      label: renal involved
      help: Enter renal_involved
      widget: toggle
      placeholder: null
    - field: respiratory_involved
      label: respiratory involved
      help: Enter respiratory_involved
      widget: toggle
      placeholder: null
    - field: neurological_involved
      label: neurological involved
      help: Enter neurological_involved
      widget: toggle
      placeholder: null
    - field: haematological_involved
      label: haematological involved
      help: Enter haematological_involved
      widget: toggle
      placeholder: null
  result:
    template: "severity: {{severity}} — organ_count: {{organ_count}} — action: {{action}} — multi_organ_failure: {{multi_organ_failure}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/homeostasis-disruption-score
  cli: rsk mcg run homeostasis-disruption-score
  auth: none
  rate_limit: 600/min
tree:
  start: check_cardiac
  nodes:
    check_cardiac:
      type: condition
      variable: cardiac_involved
      operator: eq
      value: true
      true_next: c1_hepatic
      false_next: c0_hepatic
    c1_hepatic:
      type: condition
      variable: hepatic_involved
      operator: eq
      value: true
      true_next: c2_renal
      false_next: c1_renal
    c0_hepatic:
      type: condition
      variable: hepatic_involved
      operator: eq
      value: true
      true_next: c1_renal
      false_next: c0_renal
    c2_renal:
      type: condition
      variable: renal_involved
      operator: eq
      value: true
      true_next: critical_3plus
      false_next: c2_respiratory
    c1_renal:
      type: condition
      variable: renal_involved
      operator: eq
      value: true
      true_next: c2_respiratory
      false_next: c1_respiratory
    c0_renal:
      type: condition
      variable: renal_involved
      operator: eq
      value: true
      true_next: c1_respiratory
      false_next: c0_respiratory
    c2_respiratory:
      type: condition
      variable: respiratory_involved
      operator: eq
      value: true
      true_next: critical_3plus
      false_next: serious_2
    c1_respiratory:
      type: condition
      variable: respiratory_involved
      operator: eq
      value: true
      true_next: serious_2
      false_next: moderate_1
    c0_respiratory:
      type: condition
      variable: respiratory_involved
      operator: eq
      value: true
      true_next: moderate_1
      false_next: mild_0
    critical_3plus:
      type: return
      value:
        severity: critical
        organ_count: 3
        action: immediate_expedited_report
        multi_organ_failure: true
    serious_2:
      type: return
      value:
        severity: serious
        organ_count: 2
        action: expedited_report
        multi_organ_failure: false
    moderate_1:
      type: return
      value:
        severity: moderate
        organ_count: 1
        action: monitor_and_assess
        multi_organ_failure: false
    mild_0:
      type: return
      value:
        severity: mild
        organ_count: 0
        action: routine_surveillance
        multi_organ_failure: false
tests:
  - name: three_organs
    input:
      cardiac_involved: true
      hepatic_involved: true
      renal_involved: true
    expect:
      severity: critical
      organ_count: 3
      multi_organ_failure: true
  - name: two_organs
    input:
      cardiac_involved: true
      renal_involved: true
    expect:
      severity: serious
      organ_count: 2
  - name: one_organ
    input:
      hepatic_involved: true
    expect:
      severity: moderate
      organ_count: 1
  - name: no_organs
    input:
      cardiac_involved: false
    expect:
      severity: mild
      organ_count: 0
  - name: null_safety
    input: {}
    expect:
      severity: mild
      organ_count: 0
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - severity
    - organ_count
    - action
    - multi_organ_failure
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
