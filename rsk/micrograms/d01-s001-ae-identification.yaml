# MICROGRAM++ (upgraded 2026-04-23)
name: d01-s001-ae-identification
version: 0.1.0
description: Determine if a medical event qualifies as an adverse event per ICH E2A definition
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: D01 S001 Ae Identification
  subtitle: Determine if a medical event qualifies as an adverse event per ICH E2A definition
  icon: circle
  route: /vigilance/mg/d01-s001-ae-identification
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/d01-s001-ae-identification
  cli: rsk mcg run d01-s001-ae-identification
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    yes:
      type: return
      value:
        is_adverse_event: true
    no:
      type: return
      value:
        not_adverse_event: false
    check:
      type: condition
      variable: event_severity
      operator: gte
      value: 1
      true_next: yes
      false_next: no
tests:
  - input:
      event_severity: 1
    expect:
      is_adverse_event: true
  - input:
      event_severity: 2
    expect:
      is_adverse_event: true
  - input:
      event_severity: 0
    expect:
      not_adverse_event: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
