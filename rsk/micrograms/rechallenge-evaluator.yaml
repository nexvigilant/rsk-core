# MICROGRAM++ (upgraded 2026-04-23)
name: rechallenge-evaluator
version: 0.1.0
description: "Rechallenge rate evaluator using cross-variable comparison: compares baseline_rate, first_exposure_rate, and rechallenge_rate to assess Bradford Hill experiment criterion. Uses cross-variable template resolution to directly compare rates against each other."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: baseline_rate
    type: float
    required: true
    description: Adverse event rate at baseline (events per 1000 patients)
  - name: first_exposure_rate
    type: float
    required: true
    description: Adverse event rate during first exposure
  - name: rechallenge_rate
    type: float
    required: true
    description: Adverse event rate during rechallenge (re-exposure)
outputs:
  - name: pattern
    type: string
  - name: experiment_criterion_met
    type: string
  - name: confidence
    type: string
  - name: interpretation
    type: string
interface:
  inputs:
    baseline_rate:
      type: float
      required: true
      description: Adverse event rate at baseline (events per 1000 patients)
    first_exposure_rate:
      type: float
      required: true
      description: Adverse event rate during first exposure
    rechallenge_rate:
      type: float
      required: true
      description: Adverse event rate during rechallenge (re-exposure)
  outputs:
    pattern:
      type: string
      description: CLASSIC_RECHALLENGE, SENSITIZATION, TOLERANCE, INCONSISTENT, NO_EFFECT
    experiment_criterion_met:
      type: string
      description: yes/no — Bradford Hill experiment criterion satisfied
    confidence:
      type: string
      description: HIGH, MEDIUM, LOW confidence in the assessment
    interpretation:
      type: string
      description: Plain English explanation of rechallenge pattern
ui:
  title: Rechallenge Evaluator
  subtitle: "Rechallenge rate evaluator using cross-variable comparison: compares baseline_rate, first_exposure_rate, and rechallenge_rate to assess Bradford Hill experiment criterion. Uses cross-variable template resolution to directly compare rates against each other."
  icon: circle
  route: /vigilance/mg/rechallenge-evaluator
  steps:
    - field: baseline_rate
      label: baseline rate
      help: Adverse event rate at baseline (events per 1000 patients)
      widget: text
      placeholder: null
    - field: first_exposure_rate
      label: first exposure rate
      help: Adverse event rate during first exposure
      widget: text
      placeholder: null
    - field: rechallenge_rate
      label: rechallenge rate
      help: Adverse event rate during rechallenge (re-exposure)
      widget: text
      placeholder: null
  result:
    template: "pattern: {{pattern}} — experiment_criterion_met: {{experiment_criterion_met}} — confidence: {{confidence}} — interpretation: {{interpretation}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/rechallenge-evaluator
  cli: rsk mcg run rechallenge-evaluator
  auth: none
  rate_limit: 600/min
tree:
  start: check_first_vs_baseline
  nodes:
    check_first_vs_baseline:
      type: condition
      variable: first_exposure_rate
      operator: gt
      value: "{{baseline_rate}}"
      true_next: first_elevated_check_rechallenge
      false_next: first_not_elevated_check_rechallenge
    first_elevated_check_rechallenge:
      type: condition
      variable: rechallenge_rate
      operator: gt
      value: "{{baseline_rate}}"
      true_next: rechallenge_elevated_check_vs_first
      false_next: tolerance_pattern
    rechallenge_elevated_check_vs_first:
      type: condition
      variable: rechallenge_rate
      operator: gt
      value: "{{first_exposure_rate}}"
      true_next: sensitization
      false_next: check_rechallenge_eq_first
    check_rechallenge_eq_first:
      type: condition
      variable: rechallenge_rate
      operator: eq
      value: "{{first_exposure_rate}}"
      true_next: classic_rechallenge_equal
      false_next: classic_rechallenge_lower
    first_not_elevated_check_rechallenge:
      type: condition
      variable: rechallenge_rate
      operator: gt
      value: "{{baseline_rate}}"
      true_next: inconsistent_delayed
      false_next: no_effect
    classic_rechallenge_equal:
      type: return
      value:
        pattern: CLASSIC_RECHALLENGE
        experiment_criterion_met: yes
        confidence: HIGH
        interpretation: Classic rechallenge — rate elevated during both exposures at equal level. Strong Bradford Hill experiment criterion support.
    classic_rechallenge_lower:
      type: return
      value:
        pattern: CLASSIC_RECHALLENGE
        experiment_criterion_met: yes
        confidence: MEDIUM
        interpretation: Rechallenge positive but at lower rate than first exposure. Partial tolerance may be developing. Still supports experiment criterion.
    sensitization:
      type: return
      value:
        pattern: SENSITIZATION
        experiment_criterion_met: yes
        confidence: HIGH
        interpretation: Sensitization — rechallenge rate exceeds first exposure. Immune-mediated or cumulative mechanism suspected. Strong experiment criterion with dose-escalation concern.
    tolerance_pattern:
      type: return
      value:
        pattern: TOLERANCE
        experiment_criterion_met: no
        confidence: MEDIUM
        interpretation: First exposure elevated but rechallenge normal. Suggests tolerance development or adaptation. Experiment criterion not met — effect is not reproducible.
    inconsistent_delayed:
      type: return
      value:
        pattern: INCONSISTENT
        experiment_criterion_met: no
        confidence: LOW
        interpretation: First exposure normal but rechallenge elevated. Delayed onset or coincidental. Experiment criterion not cleanly met — investigate confounders.
    no_effect:
      type: return
      value:
        pattern: NO_EFFECT
        experiment_criterion_met: no
        confidence: HIGH
        interpretation: No elevation at either exposure. No evidence of drug-event relationship via experiment criterion.
tests:
  - input:
      baseline_rate: 5
      first_exposure_rate: 20
      rechallenge_rate: 20
    expect:
      pattern: CLASSIC_RECHALLENGE
      experiment_criterion_met: yes
      confidence: HIGH
  - input:
      baseline_rate: 5
      first_exposure_rate: 25
      rechallenge_rate: 18
    expect:
      pattern: CLASSIC_RECHALLENGE
      experiment_criterion_met: yes
      confidence: MEDIUM
  - input:
      baseline_rate: 5
      first_exposure_rate: 15
      rechallenge_rate: 30
    expect:
      pattern: SENSITIZATION
      experiment_criterion_met: yes
      confidence: HIGH
  - input:
      baseline_rate: 10
      first_exposure_rate: 25
      rechallenge_rate: 8
    expect:
      pattern: TOLERANCE
      experiment_criterion_met: no
      confidence: MEDIUM
  - input:
      baseline_rate: 10
      first_exposure_rate: 10
      rechallenge_rate: 25
    expect:
      pattern: INCONSISTENT
      experiment_criterion_met: no
      confidence: LOW
  - input:
      baseline_rate: 10
      first_exposure_rate: 8
      rechallenge_rate: 9
    expect:
      pattern: NO_EFFECT
      experiment_criterion_met: no
      confidence: HIGH
  - input: {}
    expect:
      pattern: NO_EFFECT
      experiment_criterion_met: no
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - pattern
    - experiment_criterion_met
    - confidence
    - interpretation
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
