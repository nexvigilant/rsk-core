# MICROGRAM++ (upgraded 2026-04-23)
name: e2d-report-source
version: 0.1.0
description: "ICH E2D Section 3: Classifies the source type of a post-approval safety report and determines reportability"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: source
    type: string
    required: false
    description: ""
  - name: solicited
    type: bool
    required: false
    description: ""
  - name: study_type
    type: string
    required: false
    description: ""
outputs:
  - name: source_type
    type: string
  - name: reportable
    type: bool
  - name: regulatory_reference
    type: string
interface:
  inputs:
    source:
      type: string
      required: false
    solicited:
      type: bool
      required: false
    study_type:
      type: string
      required: false
  outputs:
    source_type:
      type: string
    reportable:
      type: bool
    regulatory_reference:
      type: string
ui:
  title: E2d Report Source
  subtitle: "ICH E2D Section 3: Classifies the source type of a post-approval safety report and determines reportability"
  icon: circle
  route: /vigilance/mg/e2d-report-source
  steps:
    - field: source
      label: source
      help: Enter source
      widget: text
      placeholder: null
    - field: solicited
      label: solicited
      help: Enter solicited
      widget: toggle
      placeholder: null
    - field: study_type
      label: study type
      help: Enter study_type
      widget: text
      placeholder: null
  result:
    template: "source_type: {{source_type}} — reportable: {{reportable}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2d-report-source
  cli: rsk mcg run e2d-report-source
  auth: none
  rate_limit: 600/min
tree:
  start: check_source_unknown
  nodes:
    check_source_unknown:
      type: condition
      variable: source
      operator: eq
      value: unknown
      true_next: return_unknown
      false_next: check_source_null
    check_source_null:
      type: condition
      variable: source
      operator: is_null
      value: null
      true_next: return_unknown
      false_next: check_source_regulatory
    check_source_regulatory:
      type: condition
      variable: source
      operator: eq
      value: regulatory_authority
      true_next: return_regulatory
      false_next: check_source_literature
    check_source_literature:
      type: condition
      variable: source
      operator: eq
      value: literature
      true_next: return_literature
      false_next: check_source_study
    check_source_study:
      type: condition
      variable: source
      operator: eq
      value: study
      true_next: check_study_type
      false_next: check_source_consumer
    check_study_type:
      type: condition
      variable: study_type
      operator: eq
      value: interventional
      true_next: return_study
      false_next: return_solicited
    check_source_consumer:
      type: condition
      variable: source
      operator: eq
      value: consumer
      true_next: check_consumer_solicited
      false_next: check_hcp_solicited
    check_consumer_solicited:
      type: condition
      variable: solicited
      operator: eq
      value: false
      true_next: return_spontaneous_consumer
      false_next: return_solicited
    check_hcp_solicited:
      type: condition
      variable: source
      operator: eq
      value: healthcare_professional
      true_next: check_hcp_unsolicited
      false_next: return_unknown
    check_hcp_unsolicited:
      type: condition
      variable: solicited
      operator: eq
      value: false
      true_next: return_spontaneous
      false_next: return_solicited
    return_spontaneous:
      type: return
      value:
        source_type: SPONTANEOUS
        reportable: true
        regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
    return_spontaneous_consumer:
      type: return
      value:
        source_type: SPONTANEOUS_CONSUMER
        reportable: true
        regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
    return_study:
      type: return
      value:
        source_type: STUDY
        reportable: true
        regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
    return_solicited:
      type: return
      value:
        source_type: SOLICITED
        reportable: true
        regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
    return_literature:
      type: return
      value:
        source_type: LITERATURE
        reportable: true
        regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
    return_regulatory:
      type: return
      value:
        source_type: REGULATORY
        reportable: true
        regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
    return_unknown:
      type: return
      value:
        source_type: UNKNOWN
        reportable: false
        regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
tests:
  - input:
      source: healthcare_professional
      solicited: false
    expect:
      source_type: SPONTANEOUS
      reportable: true
      regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
  - input:
      source: consumer
      solicited: false
    expect:
      source_type: SPONTANEOUS_CONSUMER
      reportable: true
      regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
  - input:
      source: study
      study_type: interventional
    expect:
      source_type: STUDY
      reportable: true
      regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
  - input:
      source: study
      study_type: observational
    expect:
      source_type: SOLICITED
      reportable: true
      regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
  - input:
      source: literature
    expect:
      source_type: LITERATURE
      reportable: true
      regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
  - input:
      source: regulatory_authority
    expect:
      source_type: REGULATORY
      reportable: true
      regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
  - input:
      source: unknown
    expect:
      source_type: UNKNOWN
      reportable: false
      regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
  - input: {}
    expect:
      source_type: UNKNOWN
      reportable: false
      regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
  - input:
      source: healthcare_professional
      solicited: true
    expect:
      source_type: SOLICITED
      reportable: true
      regulatory_reference: ICH E2D Section 3 - Sources of Individual Case Safety Reports
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - source_type
    - reportable
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
