# MICROGRAM++ (upgraded 2026-04-23)
name: e2a-ae-vs-adr
version: 0.1.0
description: "ICH E2A Section 2: Classify whether an event is an Adverse Event (AE) or Adverse Drug Reaction (ADR) based on causal relationship and temporal association"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reasonable_causal_relationship
    type: string
    required: false
    description: ""
  - name: occurred_during_study
    type: bool
    required: false
    description: ""
  - name: temporal_association
    type: bool
    required: false
    description: ""
outputs:
  - name: classification
    type: string
  - name: definition
    type: string
  - name: reportable
    type: bool
  - name: regulatory_reference
    type: string
interface:
  inputs:
    reasonable_causal_relationship:
      type: string
      required: false
    occurred_during_study:
      type: bool
      required: false
    temporal_association:
      type: bool
      required: false
  outputs:
    classification:
      type: string
    definition:
      type: string
    reportable:
      type: bool
    regulatory_reference:
      type: string
ui:
  title: E2a Ae Vs Adr
  subtitle: "ICH E2A Section 2: Classify whether an event is an Adverse Event (AE) or Adverse Drug Reaction (ADR) based on causal relationship and temporal association"
  icon: circle
  route: /vigilance/mg/e2a-ae-vs-adr
  steps:
    - field: reasonable_causal_relationship
      label: reasonable causal relationship
      help: Enter reasonable_causal_relationship
      widget: text
      placeholder: null
    - field: occurred_during_study
      label: occurred during study
      help: Enter occurred_during_study
      widget: toggle
      placeholder: null
    - field: temporal_association
      label: temporal association
      help: Enter temporal_association
      widget: toggle
      placeholder: null
  result:
    template: "classification: {{classification}} — definition: {{definition}} — reportable: {{reportable}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2a-ae-vs-adr
  cli: rsk mcg run e2a-ae-vs-adr
  auth: none
  rate_limit: 600/min
tree:
  start: causal_check
  nodes:
    causal_check:
      type: condition
      variable: reasonable_causal_relationship
      operator: eq
      value: "true"
      true_next: classify_adr
      false_next: causal_false_check
    causal_false_check:
      type: condition
      variable: reasonable_causal_relationship
      operator: eq
      value: "false"
      true_next: study_check
      false_next: causal_unknown_check
    causal_unknown_check:
      type: condition
      variable: reasonable_causal_relationship
      operator: eq
      value: unknown
      true_next: temporal_check
      false_next: default_ae
    study_check:
      type: condition
      variable: occurred_during_study
      operator: eq
      value: true
      true_next: classify_ae
      false_next: classify_not_related
    temporal_check:
      type: condition
      variable: temporal_association
      operator: eq
      value: true
      true_next: classify_ae_suspect
      false_next: classify_ae_unlikely
    classify_adr:
      type: return
      value:
        classification: ADR
        definition: Adverse Drug Reaction - noxious and unintended response at doses normally used
        reportable: true
        regulatory_reference: ICH E2A Section 2 - Definitions
    classify_ae:
      type: return
      value:
        classification: AE
        definition: Adverse Event - untoward medical occurrence during study without causal relationship
        reportable: true
        regulatory_reference: ICH E2A Section 2 - Definitions
    classify_ae_suspect:
      type: return
      value:
        classification: AE_SUSPECT
        definition: Adverse Event with unknown causality but temporal association present
        reportable: true
        regulatory_reference: ICH E2A Section 2 - Definitions
    classify_ae_unlikely:
      type: return
      value:
        classification: AE_UNLIKELY
        definition: Adverse Event with unknown causality and no temporal association
        reportable: false
        regulatory_reference: ICH E2A Section 2 - Definitions
    classify_not_related:
      type: return
      value:
        classification: NOT_RELATED
        definition: Event occurred outside study context with no causal relationship
        reportable: false
        regulatory_reference: ICH E2A Section 2 - Definitions
    default_ae:
      type: return
      value:
        classification: AE
        definition: Adverse Event - default classification when causality not assessed
        reportable: true
        regulatory_reference: ICH E2A Section 2 - Definitions
tests:
  - input:
      reasonable_causal_relationship: "true"
      occurred_during_study: true
      temporal_association: true
    expect:
      classification: ADR
      reportable: true
      regulatory_reference: ICH E2A Section 2 - Definitions
  - input:
      reasonable_causal_relationship: "false"
      occurred_during_study: true
      temporal_association: false
    expect:
      classification: AE
      reportable: true
      regulatory_reference: ICH E2A Section 2 - Definitions
  - input:
      reasonable_causal_relationship: "false"
      occurred_during_study: false
      temporal_association: false
    expect:
      classification: NOT_RELATED
      reportable: false
      regulatory_reference: ICH E2A Section 2 - Definitions
  - input:
      reasonable_causal_relationship: unknown
      occurred_during_study: true
      temporal_association: true
    expect:
      classification: AE_SUSPECT
      reportable: true
      regulatory_reference: ICH E2A Section 2 - Definitions
  - input:
      reasonable_causal_relationship: unknown
      occurred_during_study: false
      temporal_association: false
    expect:
      classification: AE_UNLIKELY
      reportable: false
      regulatory_reference: ICH E2A Section 2 - Definitions
  - input: {}
    expect:
      classification: AE
      reportable: true
      regulatory_reference: ICH E2A Section 2 - Definitions
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - classification
    - definition
    - reportable
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
