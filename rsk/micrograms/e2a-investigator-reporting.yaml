# MICROGRAM++ (upgraded 2026-04-23)
name: e2a-investigator-reporting
version: 0.1.0
description: "ICH E2A investigator urgency gate: determines reporting urgency based on SAE awareness and severity"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: fatal
    type: bool
    required: false
    description: ""
  - name: investigator_aware_of_sae
    type: bool
    required: false
    description: ""
  - name: life_threatening
    type: bool
    required: false
    description: ""
outputs:
  - name: description
    type: string
  - name: regulatory_reference
    type: string
  - name: urgency
    type: string
interface:
  inputs:
    fatal:
      type: bool
      required: false
    investigator_aware_of_sae:
      type: bool
      required: false
    life_threatening:
      type: bool
      required: false
  outputs:
    description:
      type: string
    regulatory_reference:
      type: string
    urgency:
      type: string
ui:
  title: E2a Investigator Reporting
  subtitle: "ICH E2A investigator urgency gate: determines reporting urgency based on SAE awareness and severity"
  icon: circle
  route: /vigilance/mg/e2a-investigator-reporting
  steps:
    - field: fatal
      label: fatal
      help: Enter fatal
      widget: toggle
      placeholder: null
    - field: investigator_aware_of_sae
      label: investigator aware of sae
      help: Enter investigator_aware_of_sae
      widget: toggle
      placeholder: null
    - field: life_threatening
      label: life threatening
      help: Enter life_threatening
      widget: toggle
      placeholder: null
  result:
    template: "description: {{description}} — regulatory_reference: {{regulatory_reference}} — urgency: {{urgency}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2a-investigator-reporting
  cli: rsk mcg run e2a-investigator-reporting
  auth: none
  rate_limit: 600/min
tree:
  start: check_aware
  nodes:
    check_aware:
      type: condition
      variable: investigator_aware_of_sae
      operator: eq
      value: true
      true_next: check_fatal
      false_next: not_applicable
    check_fatal:
      type: condition
      variable: fatal
      operator: eq
      value: true
      true_next: immediate
      false_next: check_life_threatening
    check_life_threatening:
      type: condition
      variable: life_threatening
      operator: eq
      value: true
      true_next: immediate
      false_next: prompt
    immediate:
      type: return
      value:
        urgency: IMMEDIATE_24H
        description: Fatal or life-threatening SAE requires immediate reporting within 24 hours
        regulatory_reference: ICH E2A Section III.A
    prompt:
      type: return
      value:
        urgency: PROMPT
        description: Serious but not fatal/life-threatening SAE requires prompt reporting to sponsor
        regulatory_reference: ICH E2A Section III.A
    not_applicable:
      type: return
      value:
        urgency: NOT_APPLICABLE
        description: Investigator not yet aware of SAE - reporting obligation not triggered
        regulatory_reference: ICH E2A Section III.A
tests:
  - input:
      investigator_aware_of_sae: true
      fatal: true
      life_threatening: false
    expect:
      urgency: IMMEDIATE_24H
      description: Fatal or life-threatening SAE requires immediate reporting within 24 hours
      regulatory_reference: ICH E2A Section III.A
  - input:
      investigator_aware_of_sae: true
      fatal: false
      life_threatening: true
    expect:
      urgency: IMMEDIATE_24H
      description: Fatal or life-threatening SAE requires immediate reporting within 24 hours
      regulatory_reference: ICH E2A Section III.A
  - input:
      investigator_aware_of_sae: true
      fatal: true
      life_threatening: true
    expect:
      urgency: IMMEDIATE_24H
      description: Fatal or life-threatening SAE requires immediate reporting within 24 hours
      regulatory_reference: ICH E2A Section III.A
  - input:
      investigator_aware_of_sae: true
      fatal: false
      life_threatening: false
    expect:
      urgency: PROMPT
      description: Serious but not fatal/life-threatening SAE requires prompt reporting to sponsor
      regulatory_reference: ICH E2A Section III.A
  - input:
      investigator_aware_of_sae: false
      fatal: true
      life_threatening: true
    expect:
      urgency: NOT_APPLICABLE
      description: Investigator not yet aware of SAE - reporting obligation not triggered
      regulatory_reference: ICH E2A Section III.A
  - input: {}
    expect:
      urgency: NOT_APPLICABLE
      description: Investigator not yet aware of SAE - reporting obligation not triggered
      regulatory_reference: ICH E2A Section III.A
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - description
    - regulatory_reference
    - urgency
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
