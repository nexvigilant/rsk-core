# MICROGRAM++ (upgraded 2026-04-23)
name: e2d-seriousness-to-postmarket-action
version: 0.1.0
description: "Bridge: E2A seriousness outputs (is_serious, is_fatal, is_life_threatening) to E2D post-marketing action. Chains from seriousness-to-deadline into postmarket reporting workflow."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: deadline_type
    type: string
    required: false
    description: ""
  - name: deadline_days
    type: int
    required: false
    description: ""
  - name: report_category
    type: string
    required: false
    description: ""
  - name: regulatory_basis
    type: string
    required: false
    description: ""
outputs:
  - name: postmarket_action
    type: string
  - name: e2d_pathway
    type: string
  - name: requires_mah_submission
    type: bool
  - name: reporting_window
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    deadline_type:
      type: string
      required: false
    deadline_days:
      type: int
      required: false
    report_category:
      type: string
      required: false
    regulatory_basis:
      type: string
      required: false
  outputs:
    postmarket_action:
      type: string
    e2d_pathway:
      type: string
    requires_mah_submission:
      type: bool
    reporting_window:
      type: string
    regulatory_reference:
      type: string
ui:
  title: E2d Seriousness To Postmarket Action
  subtitle: "Bridge: E2A seriousness outputs (is_serious, is_fatal, is_life_threatening) to E2D post-marketing action. Chains from seriousness-to-deadline into postmarket reporting workflow."
  icon: circle
  route: /vigilance/mg/e2d-seriousness-to-postmarket-action
  steps:
    - field: deadline_type
      label: deadline type
      help: Enter deadline_type
      widget: text
      placeholder: null
    - field: deadline_days
      label: deadline days
      help: Enter deadline_days
      widget: text
      placeholder: null
    - field: report_category
      label: report category
      help: Enter report_category
      widget: text
      placeholder: null
    - field: regulatory_basis
      label: regulatory basis
      help: Enter regulatory_basis
      widget: text
      placeholder: null
  result:
    template: "postmarket_action: {{postmarket_action}} — e2d_pathway: {{e2d_pathway}} — requires_mah_submission: {{requires_mah_submission}} — reporting_window: {{reporting_window}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2d-seriousness-to-postmarket-action
  cli: rsk mcg run e2d-seriousness-to-postmarket-action
  auth: none
  rate_limit: 600/min
tree:
  start: check_deadline_7_day
  nodes:
    check_deadline_7_day:
      type: condition
      variable: deadline_type
      operator: eq
      value: 7_DAY_EXPEDITED
      true_next: return_7_day_postmarket
      false_next: check_deadline_15_day
    check_deadline_15_day:
      type: condition
      variable: deadline_type
      operator: eq
      value: 15_DAY_EXPEDITED
      true_next: return_15_day_postmarket
      false_next: check_periodic_psur
    check_periodic_psur:
      type: condition
      variable: deadline_type
      operator: eq
      value: PERIODIC_PSUR
      true_next: return_psur_postmarket
      false_next: check_periodic_standard
    check_periodic_standard:
      type: condition
      variable: deadline_type
      operator: eq
      value: PERIODIC_STANDARD
      true_next: return_standard_postmarket
      false_next: return_default
    return_7_day_postmarket:
      type: return
      value:
        postmarket_action: EXPEDITED_7_DAY_ICSR
        e2d_pathway: SECTION_4_1_FATAL_LT_UNEXPECTED
        requires_mah_submission: true
        reporting_window: 7_CALENDAR_DAYS
        regulatory_reference: ICH E2D Section 4.1 / ICH E2A
    return_15_day_postmarket:
      type: return
      value:
        postmarket_action: EXPEDITED_15_DAY_ICSR
        e2d_pathway: SECTION_4_1_SERIOUS_UNEXPECTED
        requires_mah_submission: true
        reporting_window: 15_CALENDAR_DAYS
        regulatory_reference: ICH E2D Section 4.1 / ICH E2A
    return_psur_postmarket:
      type: return
      value:
        postmarket_action: INCLUDE_IN_PSUR_PBRER
        e2d_pathway: SECTION_6_PERIODIC
        requires_mah_submission: false
        reporting_window: NEXT_PSUR_CYCLE
        regulatory_reference: ICH E2D Section 6 / ICH E2C(R2)
    return_standard_postmarket:
      type: return
      value:
        postmarket_action: AGGREGATE_LINE_LISTING
        e2d_pathway: SECTION_6_PERIODIC_NON_SERIOUS
        requires_mah_submission: false
        reporting_window: PERIODIC_180_DAY
        regulatory_reference: ICH E2D Section 6 / ICH E2C(R2)
    return_default:
      type: return
      value:
        postmarket_action: ROUTINE_MONITORING
        e2d_pathway: SECTION_6_DEFAULT
        requires_mah_submission: false
        reporting_window: PERIODIC_180_DAY
        regulatory_reference: ICH E2D Section 6 - Periodic Safety Update Reports
tests:
  - input:
      deadline_type: 7_DAY_EXPEDITED
      deadline_days: 7
      report_category: expedited
      regulatory_basis: ICH E2B - fatal/life-threatening unexpected reaction requires 7-day expedited report
    expect:
      postmarket_action: EXPEDITED_7_DAY_ICSR
      e2d_pathway: SECTION_4_1_FATAL_LT_UNEXPECTED
      requires_mah_submission: true
      reporting_window: 7_CALENDAR_DAYS
      regulatory_reference: ICH E2D Section 4.1 / ICH E2A
  - input:
      deadline_type: 15_DAY_EXPEDITED
      deadline_days: 15
      report_category: expedited
      regulatory_basis: ICH E2B - serious unexpected reaction requires 15-day expedited report
    expect:
      postmarket_action: EXPEDITED_15_DAY_ICSR
      e2d_pathway: SECTION_4_1_SERIOUS_UNEXPECTED
      requires_mah_submission: true
      reporting_window: 15_CALENDAR_DAYS
      regulatory_reference: ICH E2D Section 4.1 / ICH E2A
  - input:
      deadline_type: PERIODIC_PSUR
      deadline_days: 90
      report_category: periodic
      regulatory_basis: ICH E2B - serious expected reaction included in PSUR/PBRER cycle
    expect:
      postmarket_action: INCLUDE_IN_PSUR_PBRER
      e2d_pathway: SECTION_6_PERIODIC
      requires_mah_submission: false
      reporting_window: NEXT_PSUR_CYCLE
      regulatory_reference: ICH E2D Section 6 / ICH E2C(R2)
  - input:
      deadline_type: PERIODIC_STANDARD
      deadline_days: 180
      report_category: periodic
      regulatory_basis: ICH E2B - non-serious reaction included in standard periodic reporting
    expect:
      postmarket_action: AGGREGATE_LINE_LISTING
      e2d_pathway: SECTION_6_PERIODIC_NON_SERIOUS
      requires_mah_submission: false
      reporting_window: PERIODIC_180_DAY
      regulatory_reference: ICH E2D Section 6 / ICH E2C(R2)
  - input: {}
    expect:
      postmarket_action: ROUTINE_MONITORING
      e2d_pathway: SECTION_6_DEFAULT
      requires_mah_submission: false
      reporting_window: PERIODIC_180_DAY
      regulatory_reference: ICH E2D Section 6 - Periodic Safety Update Reports
  - input:
      deadline_type: UNKNOWN
      deadline_days: 0
      report_category: unknown
    expect:
      postmarket_action: ROUTINE_MONITORING
      e2d_pathway: SECTION_6_DEFAULT
      requires_mah_submission: false
      reporting_window: PERIODIC_180_DAY
      regulatory_reference: ICH E2D Section 6 - Periodic Safety Update Reports
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - postmarket_action
    - e2d_pathway
    - requires_mah_submission
    - reporting_window
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
