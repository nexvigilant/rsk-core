# MICROGRAM++ (upgraded 2026-04-23)
name: drug-profile-semaglutide
version: 0.1.0
description: "Safety triage for semaglutide: PRR-based signal routing (Type A)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Profile Semaglutide
  subtitle: "Safety triage for semaglutide: PRR-based signal routing (Type A)"
  icon: circle
  route: /vigilance/mg/drug-profile-semaglutide
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-profile-semaglutide
  cli: rsk mcg run drug-profile-semaglutide
  auth: none
  rate_limit: 600/min
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        signal: true
        action: investigate
        drug: semaglutide
        expected_prr: 6.9
        harm_type: A
    no_signal:
      type: return
      value:
        expected_prr: 6.9
        harm_type: A
        signal: false
        action: monitor
        drug: semaglutide
tests:
  - input:
      prr: 6.9
    expect:
      drug: semaglutide
      signal: true
  - input:
      prr: 0.5
    expect:
      drug: semaglutide
      signal: false
  - input: {}
    expect:
      signal: false
      drug: semaglutide
  - input:
      prr: 1.999
    expect:
      signal: false
      action: monitor
      harm_type: A
      drug: semaglutide
      expected_prr: 6.9
  - input:
      prr: 2.001
    expect:
      signal: true
      drug: semaglutide
      expected_prr: 6.9
      action: investigate
      harm_type: A
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
