# MICROGRAM++ (upgraded 2026-04-23)
name: ror-signal
version: 0.1.0
description: Reporting Odds Ratio (ROR) signal detection threshold gate. Input ror as pre-computed (a*d)/(b*c).
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: ror
    type: float
    required: false
    description: ""
outputs:
  - name: action
    type: string
  - name: note
    type: string
  - name: signal
    type: string
  - name: signal_detected
    type: bool
interface:
  inputs:
    ror:
      type: float
      required: false
  outputs:
    action:
      type: string
    note:
      type: string
    signal:
      type: string
    signal_detected:
      type: bool
ui:
  title: Ror Signal
  subtitle: Reporting Odds Ratio (ROR) signal detection threshold gate. Input ror as pre-computed (a*d)/(b*c).
  icon: activity
  route: /vigilance/mg/ror-signal
  steps:
    - field: ror
      label: ror
      help: Enter ror
      widget: text
      placeholder: null
  result:
    template: "action: {{action}} — note: {{note}} — signal: {{signal}} — signal_detected: {{signal_detected}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ror-signal
  cli: rsk mcg run ror-signal
  auth: none
  rate_limit: 600/min
tree:
  start: check_strong
  nodes:
    check_strong:
      type: condition
      variable: ror
      operator: gte
      value: 4
      true_next: strong_signal
      false_next: check_moderate
    check_moderate:
      type: condition
      variable: ror
      operator: gte
      value: 2
      true_next: moderate_signal
      false_next: check_weak
    check_weak:
      type: condition
      variable: ror
      operator: gte
      value: 1.5
      true_next: weak_signal
      false_next: check_none
    check_none:
      type: condition
      variable: ror
      operator: gte
      value: 1
      true_next: no_signal
      false_next: protective_signal
    strong_signal:
      type: return
      value:
        signal: STRONG
        action: immediate_review
        signal_detected: true
    moderate_signal:
      type: return
      value:
        signal: MODERATE
        action: standard_review
        signal_detected: true
    weak_signal:
      type: return
      value:
        signal: WEAK
        action: monitor
        signal_detected: true
    no_signal:
      type: return
      value:
        signal: NONE
        action: no_action
        signal_detected: false
        note: ROR >= 1 but below threshold
    protective_signal:
      type: return
      value:
        signal: PROTECTIVE
        action: investigate_protective
        signal_detected: false
tests:
  - input:
      ror: 5
    expect:
      signal: STRONG
      action: immediate_review
      signal_detected: true
  - input:
      ror: 4
    expect:
      signal: STRONG
      action: immediate_review
      signal_detected: true
  - input:
      ror: 3.9
    expect:
      signal: MODERATE
      action: standard_review
      signal_detected: true
  - input:
      ror: 2
    expect:
      signal: MODERATE
      action: standard_review
      signal_detected: true
  - input:
      ror: 1.9
    expect:
      signal: WEAK
      action: monitor
      signal_detected: true
  - input:
      ror: 1.5
    expect:
      signal: WEAK
      action: monitor
      signal_detected: true
  - input:
      ror: 1.4
    expect:
      signal: NONE
      action: no_action
      signal_detected: false
      note: ROR >= 1 but below threshold
  - input:
      ror: 1
    expect:
      signal: NONE
      action: no_action
      signal_detected: false
      note: ROR >= 1 but below threshold
  - input:
      ror: 0.5
    expect:
      signal: PROTECTIVE
      action: investigate_protective
      signal_detected: false
  - input:
      ror: 0
    expect:
      signal: PROTECTIVE
      action: investigate_protective
      signal_detected: false
  - input:
      ror: 10
    expect:
      signal: STRONG
      action: immediate_review
      signal_detected: true
  - input: {}
    expect:
      signal: PROTECTIVE
      action: investigate_protective
      signal_detected: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - action
    - note
    - signal
    - signal_detected
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
