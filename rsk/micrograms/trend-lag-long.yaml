name: trend-lag-long
description: Long onset latency
version: 0.1.0
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: median_onset_days
      operator: gte
      value: 90
      true_next: detected
      false_next: not_detected
    detected:
      type: return
      value:
        detected: true
        pattern: chronic
        action: investigate
    not_detected:
      type: return
      value:
        pattern: chronic
        action: continue_monitoring
        detected: false
tests:
- input:
    median_onset_days: 90
  expect:
    detected: true
    pattern: chronic
- input: {}
  expect:
    detected: false
    pattern: chronic
- input:
    median_onset_days: 0
  expect:
    pattern: chronic
    action: continue_monitoring
    detected: false
- input:
    median_onset_days: -1
  expect:
    action: continue_monitoring
    detected: false
    pattern: chronic
- input:
    median_onset_days: 89
  expect:
    pattern: chronic
    action: continue_monitoring
    detected: false
- input:
    median_onset_days: 91
  expect:
    action: investigate
    detected: true
    pattern: chronic
- input:
    median_onset_days: 9000
  expect:
    detected: true
    action: investigate
    pattern: chronic
interface: null
primitive_signature: null
