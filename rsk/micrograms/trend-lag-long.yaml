# MICROGRAM++ (upgraded 2026-04-23)
name: trend-lag-long
version: 0.1.0
description: Long onset latency
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Trend Lag Long
  subtitle: Long onset latency
  icon: circle
  route: /vigilance/mg/trend-lag-long
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/trend-lag-long
  cli: rsk mcg run trend-lag-long
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: median_onset_days
      operator: gte
      value: 90
      true_next: detected
      false_next: not_detected
    detected:
      type: return
      value:
        detected: true
        pattern: chronic
        action: investigate
    not_detected:
      type: return
      value:
        pattern: chronic
        action: continue_monitoring
        detected: false
tests:
  - input:
      median_onset_days: 90
    expect:
      detected: true
      pattern: chronic
  - input: {}
    expect:
      detected: false
      pattern: chronic
  - input:
      median_onset_days: 0
    expect:
      pattern: chronic
      action: continue_monitoring
      detected: false
  - input:
      median_onset_days: -1
    expect:
      action: continue_monitoring
      detected: false
      pattern: chronic
  - input:
      median_onset_days: 89
    expect:
      pattern: chronic
      action: continue_monitoring
      detected: false
  - input:
      median_onset_days: 91
    expect:
      action: investigate
      detected: true
      pattern: chronic
  - input:
      median_onset_days: 9000
    expect:
      detected: true
      action: investigate
      pattern: chronic
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
