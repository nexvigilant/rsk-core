# MICROGRAM++ (upgraded 2026-04-23)
name: smm-integration-disposition
version: 0.1.0
description: Terminal node in SMM chain. Combines study type, integration weight, and fatal status into a final disposition for K-state integration. Fatal overrides first, then weight-based routing.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: study_type
    type: string
    required: false
    description: ""
  - name: integration_weight
    type: string
    required: false
    description: ""
  - name: has_fatal_violation
    type: bool
    required: false
    description: ""
  - name: score_band
    type: string
    required: false
    description: ""
outputs:
  - name: disposition
    type: string
  - name: weight_in_synthesis
    type: string
  - name: required_action
    type: string
  - name: can_cite
    type: bool
  - name: requires_sensitivity_analysis
    type: bool
interface:
  inputs:
    study_type:
      type: string
      required: false
    integration_weight:
      type: string
      required: false
    has_fatal_violation:
      type: bool
      required: false
    score_band:
      type: string
      required: false
  outputs:
    disposition:
      type: string
    weight_in_synthesis:
      type: string
    required_action:
      type: string
    can_cite:
      type: bool
    requires_sensitivity_analysis:
      type: bool
ui:
  title: Smm Integration Disposition
  subtitle: Terminal node in SMM chain. Combines study type, integration weight, and fatal status into a final disposition for K-state integration. Fatal overrides first, then weight-based routing.
  icon: circle
  route: /vigilance/mg/smm-integration-disposition
  steps:
    - field: study_type
      label: study type
      help: Enter study_type
      widget: text
      placeholder: null
    - field: integration_weight
      label: integration weight
      help: Enter integration_weight
      widget: text
      placeholder: null
    - field: has_fatal_violation
      label: has fatal violation
      help: Enter has_fatal_violation
      widget: toggle
      placeholder: null
    - field: score_band
      label: score band
      help: Enter score_band
      widget: text
      placeholder: null
  result:
    template: "disposition: {{disposition}} — weight_in_synthesis: {{weight_in_synthesis}} — required_action: {{required_action}} — can_cite: {{can_cite}} — requires_sensitivity_analysis: {{requires_sensitivity_analysis}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/smm-integration-disposition
  cli: rsk mcg run smm-integration-disposition
  auth: none
  rate_limit: 600/min
tree:
  start: check_fatal
  nodes:
    check_fatal:
      type: condition
      variable: has_fatal_violation
      operator: eq
      value: true
      true_next: check_fatal_type
      false_next: check_weight_full
    check_fatal_type:
      type: condition
      variable: study_type
      operator: eq
      value: empirical
      true_next: fatal_empirical_disposition
      false_next: fatal_pre_empirical_disposition
    fatal_empirical_disposition:
      type: return
      value:
        disposition: EXCLUDE
        weight_in_synthesis: "0.00"
        required_action: Initiate CAPA. Qualified review required before reconsideration. Evidence SUSPENDED.
        can_cite: false
        requires_sensitivity_analysis: false
    fatal_pre_empirical_disposition:
      type: return
      value:
        disposition: FLAG_FOR_REVIEW
        weight_in_synthesis: "0.05"
        required_action: Return to workshop. Framework requires maturation before protocol development. May cite as emerging concept only.
        can_cite: true
        requires_sensitivity_analysis: true
    check_weight_full:
      type: condition
      variable: integration_weight
      operator: eq
      value: full
      true_next: include_full
      false_next: check_weight_high
    check_weight_high:
      type: condition
      variable: integration_weight
      operator: eq
      value: high
      true_next: include_with_caveats
      false_next: check_weight_conditional
    check_weight_conditional:
      type: condition
      variable: integration_weight
      operator: eq
      value: conditional
      true_next: include_conditional
      false_next: check_weight_low
    check_weight_low:
      type: condition
      variable: integration_weight
      operator: eq
      value: low
      true_next: flag_for_review
      false_next: exclude_disposition
    include_full:
      type: return
      value:
        disposition: INCLUDE
        weight_in_synthesis: "1.00"
        required_action: Integrate at full weight. No additional review required.
        can_cite: true
        requires_sensitivity_analysis: false
    include_with_caveats:
      type: return
      value:
        disposition: INCLUDE_WITH_CAVEATS
        weight_in_synthesis: "0.80"
        required_action: Integrate with advisory notes. Minor limitations documented.
        can_cite: true
        requires_sensitivity_analysis: false
    include_conditional:
      type: return
      value:
        disposition: INCLUDE_CONDITIONAL
        weight_in_synthesis: "0.60"
        required_action: Integrate at reduced weight. Include in sensitivity analysis. Violation summary appended.
        can_cite: true
        requires_sensitivity_analysis: true
    flag_for_review:
      type: return
      value:
        disposition: FLAG_FOR_REVIEW
        weight_in_synthesis: "0.25"
        required_action: Low-weight integration. Requires corroboration from independent sources. Mandatory sensitivity analysis.
        can_cite: true
        requires_sensitivity_analysis: true
    exclude_disposition:
      type: return
      value:
        disposition: EXCLUDE
        weight_in_synthesis: "0.00"
        required_action: Exclude from synthesis. Structural integrity insufficient.
        can_cite: false
        requires_sensitivity_analysis: false
tests:
  - input:
      study_type: empirical
      has_fatal_violation: true
      integration_weight: full
      score_band: FATAL_ZERO
    expect:
      disposition: EXCLUDE
      weight_in_synthesis: "0.00"
      can_cite: false
      requires_sensitivity_analysis: false
  - input:
      study_type: pre_empirical
      has_fatal_violation: true
      integration_weight: low
      score_band: FATAL_FLOOR
    expect:
      disposition: FLAG_FOR_REVIEW
      weight_in_synthesis: "0.05"
      can_cite: true
      requires_sensitivity_analysis: true
  - input:
      study_type: empirical
      integration_weight: full
      has_fatal_violation: false
      score_band: CLEAN
    expect:
      disposition: INCLUDE
      weight_in_synthesis: "1.00"
      can_cite: true
      requires_sensitivity_analysis: false
  - input:
      study_type: empirical
      integration_weight: high
      has_fatal_violation: false
    expect:
      disposition: INCLUDE_WITH_CAVEATS
      weight_in_synthesis: "0.80"
      can_cite: true
  - input:
      study_type: pre_empirical
      integration_weight: conditional
      has_fatal_violation: false
    expect:
      disposition: INCLUDE_CONDITIONAL
      weight_in_synthesis: "0.60"
      can_cite: true
      requires_sensitivity_analysis: true
  - input:
      study_type: empirical
      integration_weight: low
      has_fatal_violation: false
    expect:
      disposition: FLAG_FOR_REVIEW
      weight_in_synthesis: "0.25"
      requires_sensitivity_analysis: true
  - input:
      study_type: empirical
      integration_weight: exclude
      has_fatal_violation: false
    expect:
      disposition: EXCLUDE
      weight_in_synthesis: "0.00"
      can_cite: false
  - input:
      study_type: pre_empirical
      has_fatal_violation: true
      integration_weight: exclude
      score_band: FATAL_FLOOR
    expect:
      disposition: FLAG_FOR_REVIEW
      weight_in_synthesis: "0.05"
      can_cite: true
      requires_sensitivity_analysis: true
  - input:
      study_type: pre_empirical
      has_fatal_violation: false
      integration_weight: exclude
      score_band: CLEAN
    expect:
      disposition: EXCLUDE
      weight_in_synthesis: "0.00"
      can_cite: false
  - input: {}
    expect:
      disposition: EXCLUDE
      weight_in_synthesis: "0.00"
      can_cite: false
  - input:
      study_type: empirical
      has_fatal_violation: true
      integration_weight: full
    expect:
      disposition: EXCLUDE
      weight_in_synthesis: "0.00"
      can_cite: false
  - input:
      study_type: pre_empirical
      integration_weight: full
      has_fatal_violation: false
    expect:
      disposition: INCLUDE
      weight_in_synthesis: "1.00"
      can_cite: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - disposition
    - weight_in_synthesis
    - required_action
    - can_cite
    - requires_sensitivity_analysis
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
