# MICROGRAM++ (upgraded 2026-04-23)
name: case-follow-up-need
version: 0.1.0
description: Determine if adverse event case requires follow-up information gathering
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Case Follow Up Need
  subtitle: Determine if adverse event case requires follow-up information gathering
  icon: circle
  route: /vigilance/mg/case-follow-up-need
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/case-follow-up-need
  cli: rsk mcg run case-follow-up-need
  auth: none
  rate_limit: 600/min
tree:
  start: validate_case_data
  nodes:
    validate_case_data:
      type: condition
      variable: case_received
      operator: eq
      value: true
      true_next: check_completeness_level
      false_next: follow_up_unknown
    check_completeness_level:
      type: condition
      variable: data_completeness_percent
      operator: gte
      value: 90
      true_next: no_follow_up
      false_next: check_moderate_completeness
    check_moderate_completeness:
      type: condition
      variable: data_completeness_percent
      operator: gte
      value: 70
      true_next: limited_follow_up
      false_next: comprehensive_follow_up
    no_follow_up:
      type: return
      value:
        follow_up_required: false
        follow_up_type: null
        follow_up_timeline_days: 0
        priority_level: none
        follow_up_compliant: true
    limited_follow_up:
      type: return
      value:
        follow_up_required: true
        follow_up_type: targeted_questions
        follow_up_timeline_days: 30
        priority_level: routine
        follow_up_compliant: true
    comprehensive_follow_up:
      type: return
      value:
        follow_up_required: true
        follow_up_type: comprehensive_clarification
        follow_up_timeline_days: 14
        priority_level: urgent
        follow_up_compliant: true
    follow_up_unknown:
      type: return
      value:
        follow_up_required: null
        follow_up_type: null
        follow_up_timeline_days: null
        priority_level: null
        follow_up_compliant: false
tests:
  - input:
      case_received: true
      data_completeness_percent: 95
    expect:
      follow_up_required: false
      follow_up_type: null
  - input:
      case_received: true
      data_completeness_percent: 80
    expect:
      follow_up_required: true
      follow_up_type: targeted_questions
      follow_up_timeline_days: 30
  - input:
      case_received: true
      data_completeness_percent: 50
    expect:
      follow_up_required: true
      follow_up_type: comprehensive_clarification
      follow_up_timeline_days: 14
  - input: {}
    expect:
      follow_up_required: null
      follow_up_compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
