# MICROGRAM++ (upgraded 2026-04-23)
name: convergence-dose-signal
version: 0.1.0
description: Signal + dose response
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs: []
outputs: []
ui:
  title: Convergence Dose Signal
  subtitle: Signal + dose response
  icon: activity
  route: /vigilance/mg/convergence-dose-signal
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/convergence-dose-signal
  cli: rsk mcg run convergence-dose-signal
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: dose_response_present
      operator: eq
      value: true
      true_next: converged
      false_next: divergent
    converged:
      type: return
      value:
        convergence: mechanistic
        met: true
        action: escalate
    divergent:
      type: return
      value:
        convergence: mechanistic
        met: false
        action: investigate_discrepancy
tests:
  - input:
      dose_response_present: true
    expect:
      convergence: mechanistic
      met: true
  - input: {}
    expect:
      convergence: mechanistic
      met: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
