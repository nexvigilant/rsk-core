# MICROGRAM++ (upgraded 2026-04-23)
name: event-aggregate-classifier
version: 0.1.0
description: "Event aggregate traffic level: classifies overall safety status from counts of red and yellow events in a drug profile"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: red_count
    type: number
    required: true
    description: Number of events at red (strong signal) traffic level
  - name: yellow_count
    type: number
    required: true
    description: Number of events at yellow (moderate signal) traffic level
outputs:
  - name: traffic_level
    type: string
interface:
  inputs:
    red_count:
      type: number
      required: true
      description: Number of events at red (strong signal) traffic level
    yellow_count:
      type: number
      required: true
      description: Number of events at yellow (moderate signal) traffic level
  outputs:
    traffic_level:
      type: string
ui:
  title: Event Aggregate Classifier
  subtitle: "Event aggregate traffic level: classifies overall safety status from counts of red and yellow events in a drug profile"
  icon: circle
  route: /vigilance/mg/event-aggregate-classifier
  steps:
    - field: red_count
      label: red count
      help: Number of events at red (strong signal) traffic level
      widget: number
      placeholder: null
    - field: yellow_count
      label: yellow count
      help: Number of events at yellow (moderate signal) traffic level
      widget: number
      placeholder: null
  result:
    template: "traffic_level: {{traffic_level}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/event-aggregate-classifier
  cli: rsk mcg run event-aggregate-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_many_red
  nodes:
    check_many_red:
      type: condition
      variable: red_count
      operator: gte
      value: 3
      true_next: red
      false_next: check_any_red
    check_any_red:
      type: condition
      variable: red_count
      operator: gte
      value: 1
      true_next: yellow
      false_next: check_many_yellow
    check_many_yellow:
      type: condition
      variable: yellow_count
      operator: gte
      value: 3
      true_next: yellow
      false_next: green
    red:
      type: return
      value:
        traffic_level: red
    yellow:
      type: return
      value:
        traffic_level: yellow
    green:
      type: return
      value:
        traffic_level: green
tests:
  - input:
      red_count: 0
      yellow_count: 0
    expect:
      traffic_level: green
  - input:
      red_count: 0
      yellow_count: 2
    expect:
      traffic_level: green
  - input:
      red_count: 0
      yellow_count: 3
    expect:
      traffic_level: yellow
  - input:
      red_count: 1
      yellow_count: 0
    expect:
      traffic_level: yellow
  - input:
      red_count: 2
      yellow_count: 0
    expect:
      traffic_level: yellow
  - input:
      red_count: 3
      yellow_count: 0
    expect:
      traffic_level: red
  - input:
      red_count: 5
      yellow_count: 2
    expect:
      traffic_level: red
  - input:
      red_count: 1
      yellow_count: 5
    expect:
      traffic_level: yellow
  - input: {}
    expect:
      traffic_level: green
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - traffic_level
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
