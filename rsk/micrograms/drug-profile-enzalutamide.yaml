name: drug-profile-enzalutamide
description: 'Safety triage for enzalutamide: PRR-based signal routing (Type A)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
    no_signal:
      type: return
      value:
        action: monitor
        expected_prr: 3.6
        drug: enzalutamide
        signal: false
        harm_type: A
    signal:
      type: return
      value:
        harm_type: A
        drug: enzalutamide
        signal: true
        action: investigate
        expected_prr: 3.6
tests:
- input:
    prr: 3.6
  expect:
    drug: enzalutamide
    signal: true
- input:
    prr: 0.5
  expect:
    drug: enzalutamide
    signal: false
- input: {}
  expect:
    signal: false
    drug: enzalutamide
- input:
    prr: 1.999
  expect:
    harm_type: A
    expected_prr: 3.6
    signal: false
    action: monitor
    drug: enzalutamide
- input:
    prr: 2.001
  expect:
    drug: enzalutamide
    action: investigate
    signal: true
    harm_type: A
    expected_prr: 3.6
interface: null
primitive_signature: null
