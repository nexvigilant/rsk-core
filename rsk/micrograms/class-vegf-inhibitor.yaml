name: class-vegf-inhibitor
description: 'VEGF inhibitors class safety: Hypertension monitoring'
version: 0.1.0
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: hypertension_grade
      operator: gte
      value: 2
      true_next: alert
      false_next: safe
    alert:
      type: return
      value:
        action: class_effect_investigation
        alert: true
        concern: Hypertension
        drug_class: VEGF inhibitors
    safe:
      type: return
      value:
        alert: false
        drug_class: VEGF inhibitors
        action: continue
        concern: Hypertension
tests:
- input:
    hypertension_grade: 2
  expect:
    alert: true
    drug_class: VEGF inhibitors
- input: {}
  expect:
    alert: false
    drug_class: VEGF inhibitors
- input:
    hypertension_grade: 0
  expect:
    alert: false
    drug_class: VEGF inhibitors
    action: continue
    concern: Hypertension
- input:
    hypertension_grade: -1
  expect:
    action: continue
    concern: Hypertension
    alert: false
    drug_class: VEGF inhibitors
- input:
    hypertension_grade: 1
  expect:
    drug_class: VEGF inhibitors
    concern: Hypertension
    alert: false
    action: continue
- input:
    hypertension_grade: 3
  expect:
    drug_class: VEGF inhibitors
    alert: true
    action: class_effect_investigation
    concern: Hypertension
- input:
    hypertension_grade: 200
  expect:
    concern: Hypertension
    drug_class: VEGF inhibitors
    alert: true
    action: class_effect_investigation
interface: null
primitive_signature: null
