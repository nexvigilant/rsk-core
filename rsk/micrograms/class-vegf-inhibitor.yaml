# MICROGRAM++ (upgraded 2026-04-23)
name: class-vegf-inhibitor
version: 0.1.0
description: "VEGF inhibitors class safety: Hypertension monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Vegf Inhibitor
  subtitle: "VEGF inhibitors class safety: Hypertension monitoring"
  icon: circle
  route: /vigilance/mg/class-vegf-inhibitor
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-vegf-inhibitor
  cli: rsk mcg run class-vegf-inhibitor
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: hypertension_grade
      operator: gte
      value: 2
      true_next: alert
      false_next: safe
    alert:
      type: return
      value:
        action: class_effect_investigation
        alert: true
        concern: Hypertension
        drug_class: VEGF inhibitors
    safe:
      type: return
      value:
        alert: false
        drug_class: VEGF inhibitors
        action: continue
        concern: Hypertension
tests:
  - input:
      hypertension_grade: 2
    expect:
      alert: true
      drug_class: VEGF inhibitors
  - input: {}
    expect:
      alert: false
      drug_class: VEGF inhibitors
  - input:
      hypertension_grade: 0
    expect:
      alert: false
      drug_class: VEGF inhibitors
      action: continue
      concern: Hypertension
  - input:
      hypertension_grade: -1
    expect:
      action: continue
      concern: Hypertension
      alert: false
      drug_class: VEGF inhibitors
  - input:
      hypertension_grade: 1
    expect:
      drug_class: VEGF inhibitors
      concern: Hypertension
      alert: false
      action: continue
  - input:
      hypertension_grade: 3
    expect:
      drug_class: VEGF inhibitors
      alert: true
      action: class_effect_investigation
      concern: Hypertension
  - input:
      hypertension_grade: 200
    expect:
      concern: Hypertension
      drug_class: VEGF inhibitors
      alert: true
      action: class_effect_investigation
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
