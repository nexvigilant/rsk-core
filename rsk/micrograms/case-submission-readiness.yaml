# MICROGRAM++ (upgraded 2026-04-23)
name: case-submission-readiness
version: 0.1.0
description: Assess case readiness for regulatory submission or reporting
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Case Submission Readiness
  subtitle: Assess case readiness for regulatory submission or reporting
  icon: circle
  route: /vigilance/mg/case-submission-readiness
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/case-submission-readiness
  cli: rsk mcg run case-submission-readiness
  auth: none
  rate_limit: 600/min
tree:
  start: validate_case_completeness
  nodes:
    validate_case_completeness:
      type: condition
      variable: all_required_fields_filled
      operator: eq
      value: true
      true_next: check_data_quality
      false_next: not_ready
    check_data_quality:
      type: condition
      variable: data_quality_score
      operator: gte
      value: 90
      true_next: check_coding
      false_next: not_ready
    check_coding:
      type: condition
      variable: coding_verified
      operator: eq
      value: true
      true_next: check_medical_review
      false_next: not_ready
    check_medical_review:
      type: condition
      variable: medical_review_completed
      operator: eq
      value: true
      true_next: ready_for_submission
      false_next: not_ready
    ready_for_submission:
      type: return
      value:
        submission_ready: true
        submission_status: approved
        submission_timeline_days: 0
        submission_compliant: true
    not_ready:
      type: return
      value:
        submission_ready: false
        submission_status: pending_corrections
        submission_timeline_days: 0
        submission_compliant: false
tests:
  - input:
      all_required_fields_filled: true
      data_quality_score: 95
      coding_verified: true
      medical_review_completed: true
    expect:
      submission_ready: true
      submission_status: approved
  - input:
      all_required_fields_filled: false
    expect:
      submission_ready: false
      submission_status: pending_corrections
  - input:
      all_required_fields_filled: true
      data_quality_score: 85
    expect:
      submission_ready: false
  - input: {}
    expect:
      submission_ready: false
      submission_compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
