# MICROGRAM++ (upgraded 2026-04-23)
name: trend-increasing
version: 0.1.0
description: Signal reports increasing
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Trend Increasing
  subtitle: Signal reports increasing
  icon: circle
  route: /vigilance/mg/trend-increasing
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/trend-increasing
  cli: rsk mcg run trend-increasing
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    detected:
      type: return
      value:
        action: investigate
        detected: true
        pattern: increasing
    not_detected:
      type: return
      value:
        action: continue_monitoring
        detected: false
        pattern: increasing
    check:
      type: condition
      variable: trend_slope
      operator: gt
      value: 0
      true_next: detected
      false_next: not_detected
tests:
  - input:
      trend_slope: 1
    expect:
      detected: true
      pattern: increasing
  - input: {}
    expect:
      detected: false
      pattern: increasing
  - input:
      trend_slope: 0
    expect:
      action: continue_monitoring
      detected: false
      pattern: increasing
  - input:
      trend_slope: -1
    expect:
      detected: false
      action: continue_monitoring
      pattern: increasing
  - input:
      trend_slope: -1
    expect:
      pattern: increasing
      detected: false
      action: continue_monitoring
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
