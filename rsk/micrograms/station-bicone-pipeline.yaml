# MICROGRAM++ (upgraded 2026-04-23)
name: station-bicone-pipeline
version: 0.1.0
description: Route bicone geometry analysis for Hill response curve characterization
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Bicone Pipeline
  subtitle: Route bicone geometry analysis for Hill response curve characterization
  icon: circle
  route: /vigilance/mg/station-bicone-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-bicone-pipeline
  cli: rsk mcg run station-bicone-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_hill
  nodes:
    ultrasensitive:
      type: return
      value:
        route: therapeutic_window_analysis
        reason: Hill coefficient ≥4 — ultrasensitive response, narrow therapeutic window likely
        action: flag
        priority: high
    subsensitive:
      type: return
      value:
        priority: moderate
        route: mechanism_review
        action: investigate
        reason: Hill coefficient ≤0.5 — negative cooperativity or subsensitive response
    normal:
      type: return
      value:
        route: archive
        priority: low
        reason: Hill coefficient 0.5-4 — normal dose-response range
        action: pass
    check_low:
      type: condition
      variable: hill_coefficient
      operator: lte
      value: 0.5
      true_next: subsensitive
      false_next: normal
    check_hill:
      type: condition
      variable: hill_coefficient
      operator: gte
      value: 4
      true_next: ultrasensitive
      false_next: check_low
tests:
  - input:
      hill_coefficient: 6
    expect:
      priority: high
      route: therapeutic_window_analysis
      action: flag
  - input:
      hill_coefficient: 0.3
    expect:
      action: investigate
      priority: moderate
      route: mechanism_review
  - input:
      hill_coefficient: 1.5
    expect:
      priority: low
      route: archive
      action: pass
  - input:
      hill_coefficient: 0.499
    expect:
      route: mechanism_review
      priority: moderate
      action: investigate
      reason: Hill coefficient ≤0.5 — negative cooperativity or subsensitive response
  - input:
      hill_coefficient: 0.501
    expect:
      reason: Hill coefficient 0.5-4 — normal dose-response range
      priority: low
      route: archive
      action: pass
  - input: {}
    expect:
      priority: low
      route: archive
      reason: Hill coefficient 0.5-4 — normal dose-response range
      action: pass
  - input:
      hill_coefficient: 3.999
    expect:
      action: pass
      reason: Hill coefficient 0.5-4 — normal dose-response range
      route: archive
      priority: low
  - input:
      hill_coefficient: 4.001
    expect:
      priority: high
      action: flag
      reason: Hill coefficient ≥4 — ultrasensitive response, narrow therapeutic window likely
      route: therapeutic_window_analysis
  - input: {}
    expect:
      priority: low
      reason: Hill coefficient 0.5-4 — normal dose-response range
      route: archive
      action: pass
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
