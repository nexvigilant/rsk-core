# MICROGRAM++ (upgraded 2026-04-23)
name: timeline-rmp-update
version: 0.1.0
description: RMP update trigger
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Timeline Rmp Update
  subtitle: RMP update trigger
  icon: circle
  route: /vigilance/mg/timeline-rmp-update
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/timeline-rmp-update
  cli: rsk mcg run timeline-rmp-update
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: new_safety_info
      operator: eq
      value: true
      true_next: due
      false_next: not_due
    due:
      type: return
      value:
        jurisdiction: EU
        report_type: rmp
        due: true
        action: submit
    not_due:
      type: return
      value:
        jurisdiction: EU
        report_type: rmp
        due: false
        action: schedule
tests:
  - input:
      new_safety_info: true
    expect:
      jurisdiction: EU
      due: true
  - input: {}
    expect:
      jurisdiction: EU
      due: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
