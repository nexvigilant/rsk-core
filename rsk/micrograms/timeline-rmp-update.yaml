name: timeline-rmp-update
description: "RMP update trigger"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "new_safety_info"
      operator: "eq"
      value: true
      true_next: "due"
      false_next: "not_due"
    due:
      type: "return"
      value:
        jurisdiction: "EU"
        report_type: "rmp"
        due: true
        action: "submit"
    not_due:
      type: "return"
      value:
        jurisdiction: "EU"
        report_type: "rmp"
        due: false
        action: "schedule"

tests:
  - input: {"new_safety_info": true}
    expect: {"jurisdiction": "EU", "due": true}
  - input: {}
    expect: {"jurisdiction": "EU", "due": false}
