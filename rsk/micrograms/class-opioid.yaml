# MICROGRAM++ (upgraded 2026-04-23)
name: class-opioid
version: 0.1.0
description: "Opioids class safety: Respiratory depression monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Opioid
  subtitle: "Opioids class safety: Respiratory depression monitoring"
  icon: circle
  route: /vigilance/mg/class-opioid
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-opioid
  cli: rsk mcg run class-opioid
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    alert:
      type: return
      value:
        alert: true
        action: class_effect_investigation
        concern: Respiratory depression
        drug_class: Opioids
    check:
      type: condition
      variable: respiratory_depression_risk
      operator: gte
      value: 3
      true_next: alert
      false_next: safe
    safe:
      type: return
      value:
        action: continue
        alert: false
        drug_class: Opioids
        concern: Respiratory depression
tests:
  - input:
      respiratory_depression_risk: 3
    expect:
      alert: true
      drug_class: Opioids
  - input: {}
    expect:
      drug_class: Opioids
      alert: false
  - input:
      respiratory_depression_risk: 0
    expect:
      action: continue
      drug_class: Opioids
      concern: Respiratory depression
      alert: false
  - input:
      respiratory_depression_risk: -1
    expect:
      alert: false
      concern: Respiratory depression
      drug_class: Opioids
      action: continue
  - input:
      respiratory_depression_risk: 2
    expect:
      drug_class: Opioids
      action: continue
      concern: Respiratory depression
      alert: false
  - input:
      respiratory_depression_risk: 4
    expect:
      alert: true
      drug_class: Opioids
      action: class_effect_investigation
      concern: Respiratory depression
  - input:
      respiratory_depression_risk: 300
    expect:
      alert: true
      drug_class: Opioids
      action: class_effect_investigation
      concern: Respiratory depression
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
