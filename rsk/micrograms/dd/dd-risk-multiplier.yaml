# MICROGRAM++ (upgraded 2026-04-23)
name: dd-risk-multiplier
version: 0.1.0
description: "Classify DD risk multiplier severity from count and type of active multipliers. Multiplier values: Hys Law 2.0, TdP 1.8, PML 2.0, SJS/TEN 1.7, Fraud 1.8, Death 2.0, Regulatory 1.5, Recall 1.6, Hold 1.5, REMS 1.4. Source: Youssef & Hammad, Drug Safety (Dec 2025)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: has_fatal_multiplier
    type: bool
    required: false
    description: ""
  - name: multiplier_product
    type: float
    required: false
    description: ""
  - name: multipliers_active
    type: int
    required: false
    description: ""
outputs:
  - name: escalation
    type: string
  - name: severity
    type: string
interface:
  inputs:
    has_fatal_multiplier:
      type: bool
      required: false
    multiplier_product:
      type: float
      required: false
    multipliers_active:
      type: int
      required: false
  outputs:
    escalation:
      type: string
      required: false
    severity:
      type: string
      required: false
  aliases: {}
ui:
  title: Dd Risk Multiplier
  subtitle: "Classify DD risk multiplier severity from count and type of active multipliers. Multiplier values: Hys Law 2.0, TdP 1.8, PML 2.0, SJS/TEN 1.7, Fraud 1.8, Death 2.0, Regulatory 1.5, Recall 1.6, Hold 1.5, REMS 1.4. Source: Youssef & Hammad, Drug Safety (Dec 2025)"
  icon: circle
  route: /vigilance/mg/dd-risk-multiplier
  steps:
    - field: has_fatal_multiplier
      label: has fatal multiplier
      help: Enter has_fatal_multiplier
      widget: toggle
      placeholder: null
    - field: multiplier_product
      label: multiplier product
      help: Enter multiplier_product
      widget: text
      placeholder: null
    - field: multipliers_active
      label: multipliers active
      help: Enter multipliers_active
      widget: text
      placeholder: null
  result:
    template: "escalation: {{escalation}} — severity: {{severity}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/dd-risk-multiplier
  cli: rsk mcg run dd-risk-multiplier
  auth: none
  rate_limit: 600/min
tree:
  start: check_null
  nodes:
    none_active:
      type: return
      value:
        severity: none
        escalation: standard
    check_multiple_fatal:
      type: condition
      variable: multipliers_active
      operator: gt
      value: 1
      true_next: catastrophic
      false_next: severe
    check_any:
      type: condition
      variable: multipliers_active
      operator: eq
      value: 0
      true_next: none_active
      false_next: check_fatal
    catastrophic:
      type: return
      value:
        severity: catastrophic
        escalation: board_level
    high:
      type: return
      value:
        escalation: executive
        severity: high
    check_elevated:
      type: condition
      variable: multipliers_active
      operator: gt
      value: 0
      true_next: elevated
      false_next: none_active
    elevated:
      type: return
      value:
        severity: elevated
        escalation: management
    severe:
      type: return
      value:
        escalation: executive
        severity: severe
    check_multiple:
      type: condition
      variable: multipliers_active
      operator: gt
      value: 2
      true_next: high
      false_next: check_elevated
    check_fatal:
      type: condition
      variable: has_fatal_multiplier
      operator: eq
      value: true
      true_next: check_multiple_fatal
      false_next: check_multiple
    check_null:
      type: condition
      variable: multipliers_active
      operator: is_null
      value: null
      true_next: none_active
      false_next: check_any
tests:
  - input:
      multipliers_active: 0
      has_fatal_multiplier: false
      multiplier_product: 1
    expect:
      severity: none
      escalation: standard
  - input:
      multipliers_active: 1
      has_fatal_multiplier: false
      multiplier_product: 1.4
    expect:
      severity: elevated
      escalation: management
  - input:
      multipliers_active: 1
      multiplier_product: 2
      has_fatal_multiplier: true
    expect:
      severity: severe
      escalation: executive
  - input:
      multiplier_product: 3.6
      multipliers_active: 2
      has_fatal_multiplier: true
    expect:
      escalation: board_level
      severity: catastrophic
  - input:
      has_fatal_multiplier: false
      multiplier_product: 3.36
      multipliers_active: 3
    expect:
      escalation: executive
      severity: high
  - input: {}
    expect:
      severity: none
      escalation: standard
  - input:
      multipliers_active: -1
    expect:
      severity: none
      escalation: standard
  - input:
      multipliers_active: 100
    expect:
      escalation: executive
      severity: high
  - input:
      multipliers_active: -1
    expect:
      escalation: standard
      severity: none
  - input:
      multipliers_active: -1
    expect:
      severity: none
      escalation: standard
  - input:
      multipliers_active: -1
    expect:
      severity: none
      escalation: standard
  - input:
      multipliers_active: -1
    expect:
      severity: none
      escalation: standard
  - input:
      multipliers_active: -1
    expect:
      escalation: standard
      severity: none
  - input:
      multipliers_active: 200
    expect:
      escalation: executive
      severity: high
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - escalation
    - severity
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
