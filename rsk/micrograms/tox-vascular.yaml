# MICROGRAM++ (upgraded 2026-04-23)
name: tox-vascular
version: 0.1.0
description: "Vascular toxicity gate: thrombosis_risk thresholds for vessel"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Tox Vascular
  subtitle: "Vascular toxicity gate: thrombosis_risk thresholds for vessel"
  icon: circle
  route: /vigilance/mg/tox-vascular
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/tox-vascular
  cli: rsk mcg run tox-vascular
  auth: none
  rate_limit: 600/min
tree:
  start: check_severe
  nodes:
    check_mild:
      type: condition
      variable: thrombosis_risk
      operator: gte
      value: 2
      true_next: mild
      false_next: normal
    check_severe:
      type: condition
      variable: thrombosis_risk
      operator: gte
      value: 5
      true_next: severe
      false_next: check_mild
    normal:
      type: return
      value:
        severity: normal
        organ: vascular
        action: continue
        target: vessel
    severe:
      type: return
      value:
        action: discontinue
        organ: vascular
        severity: severe
        target: vessel
    mild:
      type: return
      value:
        organ: vascular
        severity: mild
        action: monitor_closely
        target: vessel
tests:
  - input:
      thrombosis_risk: 6
    expect:
      severity: severe
      organ: vascular
  - input:
      thrombosis_risk: 2
    expect:
      severity: mild
      organ: vascular
  - input:
      thrombosis_risk: 0
    expect:
      organ: vascular
      severity: normal
  - input: {}
    expect:
      organ: vascular
      severity: normal
  - input:
      thrombosis_risk: -1
    expect:
      severity: normal
      action: continue
      organ: vascular
      target: vessel
  - input:
      thrombosis_risk: 1
    expect:
      severity: normal
      organ: vascular
      target: vessel
      action: continue
  - input:
      thrombosis_risk: 3
    expect:
      target: vessel
      organ: vascular
      action: monitor_closely
      severity: mild
  - input:
      thrombosis_risk: 200
    expect:
      action: discontinue
      target: vessel
      organ: vascular
      severity: severe
  - input:
      thrombosis_risk: -1
    expect:
      action: continue
      organ: vascular
      severity: normal
      target: vessel
  - input:
      thrombosis_risk: 4
    expect:
      target: vessel
      severity: mild
      organ: vascular
      action: monitor_closely
  - input:
      thrombosis_risk: 500
    expect:
      target: vessel
      organ: vascular
      action: discontinue
      severity: severe
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
