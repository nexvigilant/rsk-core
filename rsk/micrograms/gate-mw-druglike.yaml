# MICROGRAM++ (upgraded 2026-04-23)
name: gate-mw-druglike
version: 0.1.0
description: Lipinski MW cutoff
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Gate Mw Druglike
  subtitle: Lipinski MW cutoff
  icon: circle
  route: /vigilance/mg/gate-mw-druglike
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-mw-druglike
  cli: rsk mcg run gate-mw-druglike
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        met: false
        threshold: molecular_weight
        gate: false
    pass:
      type: return
      value:
        gate: true
        met: true
        threshold: molecular_weight
    check:
      type: condition
      variable: molecular_weight
      operator: lte
      value: 500
      true_next: pass
      false_next: fail
tests:
  - input:
      molecular_weight: 500
    expect:
      gate: true
      met: true
  - input: {}
    expect:
      met: false
      gate: false
  - input:
      molecular_weight: 0
    expect:
      gate: true
      met: true
      threshold: molecular_weight
  - input:
      molecular_weight: -1
    expect:
      met: true
      gate: true
      threshold: molecular_weight
  - input:
      molecular_weight: 499
    expect:
      met: true
      gate: true
      threshold: molecular_weight
  - input:
      molecular_weight: 501
    expect:
      met: false
      gate: false
      threshold: molecular_weight
  - input:
      molecular_weight: 50000
    expect:
      met: false
      threshold: molecular_weight
      gate: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
