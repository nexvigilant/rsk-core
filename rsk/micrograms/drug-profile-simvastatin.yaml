name: drug-profile-simvastatin
description: 'Safety triage for simvastatin: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    no_signal:
      type: return
      value:
        signal: false
        harm_type: B
        expected_prr: 4.1
        drug: simvastatin
        action: monitor
    signal:
      type: return
      value:
        drug: simvastatin
        harm_type: B
        action: investigate
        signal: true
        expected_prr: 4.1
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 4.1
  expect:
    drug: simvastatin
    signal: false
- input:
    prr: 0.5
  expect:
    signal: false
    drug: simvastatin
- input: {}
  expect:
    signal: false
    drug: simvastatin
- input:
    prr: 4.999
  expect:
    harm_type: B
    drug: simvastatin
    expected_prr: 4.1
    action: monitor
    signal: false
- input:
    prr: 5.001
  expect:
    drug: simvastatin
    action: investigate
    signal: true
    harm_type: B
    expected_prr: 4.1
interface: null
primitive_signature: null
