# MICROGRAM++ (upgraded 2026-04-23)
name: e2e-pv-action-type
version: 0.1.0
description: "ICH E2E Section 4: Determines the type of pharmacovigilance action needed for a safety concern based on risk category, seriousness, frequency, and plausibility"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: risk_category
    type: string
    required: true
    description: ""
  - name: serious
    type: bool
    required: false
    description: ""
  - name: frequency
    type: string
    required: false
    description: ""
  - name: plausibility
    type: string
    required: false
    description: ""
outputs:
  - name: action_type
    type: string
  - name: additional
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    risk_category:
      type: string
      required: true
    serious:
      type: bool
      required: false
    frequency:
      type: string
      required: false
    plausibility:
      type: string
      required: false
  outputs:
    action_type:
      type: string
    additional:
      type: string
    regulatory_reference:
      type: string
ui:
  title: E2e Pv Action Type
  subtitle: "ICH E2E Section 4: Determines the type of pharmacovigilance action needed for a safety concern based on risk category, seriousness, frequency, and plausibility"
  icon: circle
  route: /vigilance/mg/e2e-pv-action-type
  steps:
    - field: risk_category
      label: risk category
      help: Enter risk_category
      widget: text
      placeholder: null
    - field: serious
      label: serious
      help: Enter serious
      widget: toggle
      placeholder: null
    - field: frequency
      label: frequency
      help: Enter frequency
      widget: text
      placeholder: null
    - field: plausibility
      label: plausibility
      help: Enter plausibility
      widget: text
      placeholder: null
  result:
    template: "action_type: {{action_type}} — additional: {{additional}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2e-pv-action-type
  cli: rsk mcg run e2e-pv-action-type
  auth: none
  rate_limit: 600/min
tree:
  start: check_identified
  nodes:
    check_identified:
      type: condition
      variable: risk_category
      operator: eq
      value: IDENTIFIED_RISK
      true_next: check_serious
      false_next: check_potential
    check_serious:
      type: condition
      variable: serious
      operator: eq
      value: true
      true_next: check_frequency
      false_next: result_routine_identified
    check_frequency:
      type: condition
      variable: frequency
      operator: eq
      value: common
      true_next: result_risk_minimization
      false_next: result_targeted_followup
    check_potential:
      type: condition
      variable: risk_category
      operator: eq
      value: POTENTIAL_RISK
      true_next: check_plausibility
      false_next: check_missing
    check_plausibility:
      type: condition
      variable: plausibility
      operator: eq
      value: high
      true_next: result_active_surveillance
      false_next: result_routine_potential
    check_missing:
      type: condition
      variable: risk_category
      operator: eq
      value: MISSING_INFORMATION
      true_next: result_collect_data
      false_next: result_routine_default
    result_risk_minimization:
      type: return
      value:
        action_type: ROUTINE_PV_PLUS_ADDITIONAL
        additional: risk_minimization
        regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
    result_targeted_followup:
      type: return
      value:
        action_type: ROUTINE_PV_PLUS_ADDITIONAL
        additional: targeted_followup
        regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
    result_routine_identified:
      type: return
      value:
        action_type: ROUTINE_PV
        additional: none
        regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
    result_active_surveillance:
      type: return
      value:
        action_type: ROUTINE_PV_PLUS_ADDITIONAL
        additional: active_surveillance
        regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
    result_routine_potential:
      type: return
      value:
        action_type: ROUTINE_PV
        additional: none
        regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
    result_collect_data:
      type: return
      value:
        action_type: ROUTINE_PV_PLUS_ADDITIONAL
        additional: collect_data
        regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
    result_routine_default:
      type: return
      value:
        action_type: ROUTINE_PV
        additional: none
        regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
tests:
  - input:
      risk_category: IDENTIFIED_RISK
      serious: true
      frequency: common
      plausibility: high
    expect:
      action_type: ROUTINE_PV_PLUS_ADDITIONAL
      additional: risk_minimization
      regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
  - input:
      risk_category: IDENTIFIED_RISK
      serious: true
      frequency: rare
      plausibility: high
    expect:
      action_type: ROUTINE_PV_PLUS_ADDITIONAL
      additional: targeted_followup
      regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
  - input:
      risk_category: IDENTIFIED_RISK
      serious: false
      frequency: common
      plausibility: high
    expect:
      action_type: ROUTINE_PV
      additional: none
      regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
  - input:
      risk_category: POTENTIAL_RISK
      serious: false
      frequency: rare
      plausibility: high
    expect:
      action_type: ROUTINE_PV_PLUS_ADDITIONAL
      additional: active_surveillance
      regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
  - input:
      risk_category: POTENTIAL_RISK
      serious: false
      frequency: rare
      plausibility: low
    expect:
      action_type: ROUTINE_PV
      additional: none
      regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
  - input:
      risk_category: MISSING_INFORMATION
      serious: false
      frequency: rare
      plausibility: low
    expect:
      action_type: ROUTINE_PV_PLUS_ADDITIONAL
      additional: collect_data
      regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
  - input:
      risk_category: NONE
      serious: false
      frequency: rare
      plausibility: low
    expect:
      action_type: ROUTINE_PV
      additional: none
      regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
  - input: {}
    expect:
      action_type: ROUTINE_PV
      additional: none
      regulatory_reference: ICH E2E Section 4 - Pharmacovigilance Plan
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - action_type
    - additional
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
