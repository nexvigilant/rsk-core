name: drug-profile-lisinopril
description: 'Safety triage for lisinopril: PRR-based signal routing (Type A)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        expected_prr: 2.3
        action: investigate
        drug: lisinopril
        harm_type: A
        signal: true
    no_signal:
      type: return
      value:
        signal: false
        action: monitor
        expected_prr: 2.3
        drug: lisinopril
        harm_type: A
tests:
- input:
    prr: 2.3
  expect:
    drug: lisinopril
    signal: true
- input:
    prr: 0.5
  expect:
    signal: false
    drug: lisinopril
- input: {}
  expect:
    drug: lisinopril
    signal: false
- input:
    prr: 1.999
  expect:
    signal: false
    drug: lisinopril
    action: monitor
    expected_prr: 2.3
    harm_type: A
- input:
    prr: 2.001
  expect:
    harm_type: A
    action: investigate
    signal: true
    drug: lisinopril
    expected_prr: 2.3
interface: null
primitive_signature: null
