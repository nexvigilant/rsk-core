# MICROGRAM++ (upgraded 2026-04-23)
name: gate-compliance-pass
version: 0.1.0
description: Compliance passing
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Gate Compliance Pass
  subtitle: Compliance passing
  icon: circle
  route: /vigilance/mg/gate-compliance-pass
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-compliance-pass
  cli: rsk mcg run gate-compliance-pass
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: compliance_score
      operator: gte
      value: 80
      true_next: pass
      false_next: fail
    fail:
      type: return
      value:
        threshold: compliance_score
        met: false
        gate: false
    pass:
      type: return
      value:
        gate: true
        met: true
        threshold: compliance_score
tests:
  - input:
      compliance_score: 80
    expect:
      met: true
      gate: true
  - input: {}
    expect:
      gate: false
      met: false
  - input:
      compliance_score: 0
    expect:
      met: false
      threshold: compliance_score
      gate: false
  - input:
      compliance_score: -1
    expect:
      threshold: compliance_score
      gate: false
      met: false
  - input:
      compliance_score: 79
    expect:
      threshold: compliance_score
      met: false
      gate: false
  - input:
      compliance_score: 81
    expect:
      threshold: compliance_score
      gate: true
      met: true
  - input:
      compliance_score: 8000
    expect:
      gate: true
      met: true
      threshold: compliance_score
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
