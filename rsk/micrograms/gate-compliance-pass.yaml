    threshold: compliance_score
    gate: false
    met: false
- input:
    compliance_score: 79
  expect:
    threshold: compliance_score
    met: false
    gate: false
- input:
    compliance_score: 81
  expect:
    threshold: compliance_score
    gate: true
    met: true
- input:
    compliance_score: 8000
