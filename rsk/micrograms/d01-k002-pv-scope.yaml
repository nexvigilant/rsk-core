# MICROGRAM++ (upgraded 2026-04-23)
name: d01-k002-pv-scope
version: 0.1.0
description: Classify if activity falls within pharmacovigilance scope (detection, assessment, understanding, prevention per WHO definition)
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: D01 K002 Pv Scope
  subtitle: Classify if activity falls within pharmacovigilance scope (detection, assessment, understanding, prevention per WHO definition)
  icon: circle
  route: /vigilance/mg/d01-k002-pv-scope
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/d01-k002-pv-scope
  cli: rsk mcg run d01-k002-pv-scope
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    no:
      type: return
      value:
        out_of_scope: false
    check:
      type: condition
      variable: medicine_involved
      operator: eq
      value: 1
      true_next: yes
      false_next: no
    yes:
      type: return
      value:
        in_scope: true
tests:
  - input:
      medicine_involved: 1
    expect:
      in_scope: true
  - input:
      medicine_involved: 2
    expect:
      out_of_scope: false
  - input:
      medicine_involved: 0
    expect:
      out_of_scope: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
