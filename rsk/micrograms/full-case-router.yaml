# MICROGRAM++ (upgraded 2026-04-23)
name: full-case-router
version: 0.1.0
description: "Master case processor: routes new cases through the complete PV workflow based on seriousness criteria, signal status, and causality state."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: causality_assessed
    type: bool
    required: false
    description: ""
  - name: has_death
    type: bool
    required: false
    description: ""
  - name: has_disability
    type: bool
    required: false
    description: ""
  - name: has_hospitalization
    type: bool
    required: false
    description: ""
  - name: signal_detected
    type: bool
    required: false
    description: ""
outputs:
  - name: next_action
    type: string
  - name: priority
    type: string
  - name: reason
    type: string
  - name: tool_path
    type: string
interface:
  inputs:
    causality_assessed:
      type: bool
      required: false
    has_death:
      type: bool
      required: false
    has_disability:
      type: bool
      required: false
    has_hospitalization:
      type: bool
      required: false
    signal_detected:
      type: bool
      required: false
  outputs:
    next_action:
      type: string
    priority:
      type: string
    reason:
      type: string
    tool_path:
      type: string
ui:
  title: Full Case Router
  subtitle: "Master case processor: routes new cases through the complete PV workflow based on seriousness criteria, signal status, and causality state."
  icon: circle
  route: /vigilance/mg/full-case-router
  steps:
    - field: causality_assessed
      label: causality assessed
      help: Enter causality_assessed
      widget: toggle
      placeholder: null
    - field: has_death
      label: has death
      help: Enter has_death
      widget: toggle
      placeholder: null
    - field: has_disability
      label: has disability
      help: Enter has_disability
      widget: toggle
      placeholder: null
    - field: has_hospitalization
      label: has hospitalization
      help: Enter has_hospitalization
      widget: toggle
      placeholder: null
    - field: signal_detected
      label: signal detected
      help: Enter signal_detected
      widget: toggle
      placeholder: null
  result:
    template: "next_action: {{next_action}} — priority: {{priority}} — reason: {{reason}} — tool_path: {{tool_path}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/full-case-router
  cli: rsk mcg run full-case-router
  auth: none
  rate_limit: 600/min
tree:
  start: check_death
  nodes:
    check_death:
      type: condition
      variable: has_death
      operator: eq
      value: true
      true_next: serious_causality_check
      false_next: check_hospitalization
    check_hospitalization:
      type: condition
      variable: has_hospitalization
      operator: eq
      value: true
      true_next: serious_causality_check
      false_next: check_disability
    check_disability:
      type: condition
      variable: has_disability
      operator: eq
      value: true
      true_next: serious_causality_check
      false_next: check_signal_non_serious
    serious_causality_check:
      type: condition
      variable: causality_assessed
      operator: eq
      value: true
      true_next: file_expedited
      false_next: assess_urgent
    assess_urgent:
      type: return
      value:
        next_action: ASSESS_CAUSALITY_URGENT
        priority: P0
        tool_path: /vigilance/causality
        reason: Serious case criteria met - immediate causality assessment required before expedited filing
    file_expedited:
      type: return
      value:
        next_action: FILE_EXPEDITED_REPORT
        priority: P1
        tool_path: /vigilance/reporting
        reason: Serious case with causality assessed - proceed to expedited regulatory filing
    check_signal_non_serious:
      type: condition
      variable: signal_detected
      operator: eq
      value: true
      true_next: assess_routine
      false_next: routine_monitoring
    assess_routine:
      type: return
      value:
        next_action: ASSESS_CAUSALITY_ROUTINE
        priority: P2
        tool_path: /vigilance/causality
        reason: Signal detected in non-serious case - routine causality assessment recommended
    routine_monitoring:
      type: return
      value:
        next_action: ROUTINE_MONITORING
        priority: P3
        tool_path: /vigilance/signals
        reason: No serious criteria and no signal - continue routine pharmacovigilance monitoring
tests:
  - input:
      has_death: true
      has_hospitalization: false
      has_disability: false
      signal_detected: false
      causality_assessed: false
    expect:
      next_action: ASSESS_CAUSALITY_URGENT
      priority: P0
      tool_path: /vigilance/causality
      reason: Serious case criteria met - immediate causality assessment required before expedited filing
  - input:
      has_death: true
      has_hospitalization: false
      has_disability: false
      signal_detected: false
      causality_assessed: true
    expect:
      next_action: FILE_EXPEDITED_REPORT
      priority: P1
      tool_path: /vigilance/reporting
      reason: Serious case with causality assessed - proceed to expedited regulatory filing
  - input:
      has_death: false
      has_hospitalization: true
      has_disability: false
      signal_detected: false
      causality_assessed: false
    expect:
      next_action: ASSESS_CAUSALITY_URGENT
      priority: P0
      tool_path: /vigilance/causality
      reason: Serious case criteria met - immediate causality assessment required before expedited filing
  - input:
      has_death: false
      has_hospitalization: true
      has_disability: false
      signal_detected: true
      causality_assessed: true
    expect:
      next_action: FILE_EXPEDITED_REPORT
      priority: P1
      tool_path: /vigilance/reporting
      reason: Serious case with causality assessed - proceed to expedited regulatory filing
  - input:
      has_death: false
      has_hospitalization: false
      has_disability: true
      signal_detected: false
      causality_assessed: false
    expect:
      next_action: ASSESS_CAUSALITY_URGENT
      priority: P0
      tool_path: /vigilance/causality
      reason: Serious case criteria met - immediate causality assessment required before expedited filing
  - input:
      has_death: false
      has_hospitalization: false
      has_disability: false
      signal_detected: true
      causality_assessed: false
    expect:
      next_action: ASSESS_CAUSALITY_ROUTINE
      priority: P2
      tool_path: /vigilance/causality
      reason: Signal detected in non-serious case - routine causality assessment recommended
  - input:
      has_death: false
      has_hospitalization: false
      has_disability: false
      signal_detected: false
      causality_assessed: false
    expect:
      next_action: ROUTINE_MONITORING
      priority: P3
      tool_path: /vigilance/signals
      reason: No serious criteria and no signal - continue routine pharmacovigilance monitoring
  - input:
      has_death: true
      has_hospitalization: true
      has_disability: true
      signal_detected: true
      causality_assessed: true
    expect:
      next_action: FILE_EXPEDITED_REPORT
      priority: P1
      tool_path: /vigilance/reporting
      reason: Serious case with causality assessed - proceed to expedited regulatory filing
  - input: {}
    expect:
      next_action: ROUTINE_MONITORING
      priority: P3
      reason: No serious criteria and no signal - continue routine pharmacovigilance monitoring
      tool_path: /vigilance/signals
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - next_action
    - priority
    - reason
    - tool_path
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
