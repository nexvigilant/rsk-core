# MICROGRAM++ (upgraded 2026-04-23)
name: pop-hepatic-impaired
version: 0.1.0
description: Moderate hepatic impairment
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Pop Hepatic Impaired
  subtitle: Moderate hepatic impairment
  icon: circle
  route: /vigilance/mg/pop-hepatic-impaired
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pop-hepatic-impaired
  cli: rsk mcg run pop-hepatic-impaired
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    at_risk:
      type: return
      value:
        reason: Moderate hepatic impairment
        action: special_monitoring
        population: hepatic-impaired
        at_risk: true
    standard:
      type: return
      value:
        population: hepatic-impaired
        action: standard_care
        at_risk: false
    check:
      type: condition
      variable: child_pugh
      operator: gte
      value: 7
      true_next: at_risk
      false_next: standard
tests:
  - input:
      child_pugh: 7
    expect:
      at_risk: true
      population: hepatic-impaired
  - input: {}
    expect:
      population: hepatic-impaired
      at_risk: false
  - input:
      child_pugh: 0
    expect:
      action: standard_care
      population: hepatic-impaired
      at_risk: false
  - input:
      child_pugh: -1
    expect:
      at_risk: false
      action: standard_care
      population: hepatic-impaired
  - input:
      child_pugh: 6
    expect:
      action: standard_care
      population: hepatic-impaired
      at_risk: false
  - input:
      child_pugh: 8
    expect:
      at_risk: true
      population: hepatic-impaired
      action: special_monitoring
      reason: Moderate hepatic impairment
  - input:
      child_pugh: 700
    expect:
      action: special_monitoring
      population: hepatic-impaired
      at_risk: true
      reason: Moderate hepatic impairment
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
