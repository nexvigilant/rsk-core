name: deadline-pmda-15day
description: "Calculate PMDA (Japan) 15-day serious adverse event reporting deadline"
version: 0.1.0
tree:
  start: validate_event
  nodes:
    validate_event:
      type: condition
      variable: event_date
      operator: is_not_null
      value: null
      true_next: check_seriousness
      false_next: deadline_unknown
    check_seriousness:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: check_unexpected
      false_next: routine_deadline
    check_unexpected:
      type: condition
      variable: is_unexpected
      operator: eq
      value: true
      true_next: urgent_deadline
      false_next: standard_deadline
    urgent_deadline:
      type: return
      value:
        reporting_deadline_days: 7
        event_category: "serious_unexpected_adverse_reaction"
        regulatory_requirement: "PMDA_CTD_Japan"
        expedited_required: true
        regulatory_compliant: true
    standard_deadline:
      type: return
      value:
        reporting_deadline_days: 15
        event_category: "serious_expected_adverse_reaction"
        regulatory_requirement: "PMDA_CTD_Japan"
        expedited_required: false
        regulatory_compliant: true
    routine_deadline:
      type: return
      value:
        reporting_deadline_days: 30
        event_category: "non_serious"
        regulatory_requirement: "PMDA_CTD_Japan"
        expedited_required: false
        regulatory_compliant: true
    deadline_unknown:
      type: return
      value:
        reporting_deadline_days: null
        event_category: null
        regulatory_requirement: null
        expedited_required: null
        regulatory_compliant: false
tests:
- input:
    event_date: "2024-01-15"
    is_serious: true
    is_unexpected: true
  expect:
    reporting_deadline_days: 7
    expedited_required: true
- input:
    event_date: "2024-01-15"
    is_serious: true
    is_unexpected: false
  expect:
    reporting_deadline_days: 15
    event_category: "serious_expected_adverse_reaction"
- input:
    event_date: "2024-01-15"
    is_serious: false
  expect:
    reporting_deadline_days: 30
- input: {}
  expect:
    reporting_deadline_days: null
    regulatory_compliant: false
