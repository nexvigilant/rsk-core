# MICROGRAM++ (upgraded 2026-04-23)
name: gate-ic-positive
version: 0.1.0
description: IC025 positive (Bayesian signal)
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Gate Ic Positive
  subtitle: IC025 positive (Bayesian signal)
  icon: circle
  route: /vigilance/mg/gate-ic-positive
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-ic-positive
  cli: rsk mcg run gate-ic-positive
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        gate: false
        met: false
        threshold: ic025
    pass:
      type: return
      value:
        met: true
        gate: true
        threshold: ic025
    check:
      type: condition
      variable: ic025
      operator: gte
      value: 0
      true_next: pass
      false_next: fail
tests:
  - input:
      ic025: 0
    expect:
      met: true
      gate: true
  - input: {}
    expect:
      met: false
      gate: false
  - input:
      ic025: -0.001
    expect:
      met: false
      gate: false
      threshold: ic025
  - input:
      ic025: 0.001
    expect:
      met: true
      threshold: ic025
      gate: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
