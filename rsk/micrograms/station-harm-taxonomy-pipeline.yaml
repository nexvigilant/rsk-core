# MICROGRAM++ (upgraded 2026-04-23)
name: station-harm-taxonomy-pipeline
version: 0.1.0
description: Route harm classifications through the A-H taxonomy to appropriate response pathways
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Harm Taxonomy Pipeline
  subtitle: Route harm classifications through the A-H taxonomy to appropriate response pathways
  icon: circle
  route: /vigilance/mg/station-harm-taxonomy-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-harm-taxonomy-pipeline
  cli: rsk mcg run station-harm-taxonomy-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_type
  nodes:
    check_type:
      type: condition
      variable: harm_type
      operator: eq
      value: A
      true_next: type_a
      false_next: check_b_d
    type_b:
      type: return
      value:
        reason: Type B (bizarre/idiosyncratic) — unpredictable, potentially fatal, needs genetic workup
        priority: high
        action: investigate
        route: causality_assessment
    check_c:
      type: condition
      variable: harm_type
      operator: eq
      value: C
      true_next: type_c
      false_next: other_type
    other_type:
      type: return
      value:
        action: classify
        reason: Type D-H harm — delayed/end-of-use/failure/genetic/hypersensitivity
        route: specialist_review
        priority: moderate
    check_b_d:
      type: condition
      variable: harm_type
      operator: eq
      value: B
      true_next: type_b
      false_next: check_c
    type_a:
      type: return
      value:
        action: escalate
        priority: critical
        reason: Type A (augmented pharmacology) — dose-dependent, predictable, high incidence
        route: dose_adjustment
    type_c:
      type: return
      value:
        reason: Type C (chronic/cumulative) — long-term exposure effect, monitor over time
        route: long_term_monitoring
        action: monitor
        priority: moderate
tests:
  - input:
      harm_type: A
    expect:
      route: dose_adjustment
      priority: critical
      action: escalate
  - input:
      harm_type: B
    expect:
      action: investigate
      priority: high
      route: causality_assessment
  - input:
      harm_type: C
    expect:
      action: monitor
      priority: moderate
      route: long_term_monitoring
  - input:
      harm_type: D
    expect:
      action: classify
      route: specialist_review
      priority: moderate
  - input: {}
    expect:
      route: specialist_review
      action: classify
      reason: Type D-H harm — delayed/end-of-use/failure/genetic/hypersensitivity
      priority: moderate
  - input: {}
    expect:
      priority: moderate
      action: classify
      reason: Type D-H harm — delayed/end-of-use/failure/genetic/hypersensitivity
      route: specialist_review
  - input: {}
    expect:
      reason: Type D-H harm — delayed/end-of-use/failure/genetic/hypersensitivity
      route: specialist_review
      priority: moderate
      action: classify
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
