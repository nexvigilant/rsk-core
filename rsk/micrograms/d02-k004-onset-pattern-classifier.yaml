      type: return
      value:
        acute_onset: true
    no:
      type: return
      value:
        delayed_onset: false
tests:
  - input:
      onset_hours: 24
    expect:
      acute_onset: true
  - input:
      onset_hours: 24
    expect:
      acute_onset: true
  - input:
      onset_hours: 25
