# MICROGRAM++ (upgraded 2026-04-23)
name: pop-geriatric-80
version: 0.1.0
description: Very elderly — frailty and fall risk
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Pop Geriatric 80
  subtitle: Very elderly — frailty and fall risk
  icon: circle
  route: /vigilance/mg/pop-geriatric-80
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pop-geriatric-80
  cli: rsk mcg run pop-geriatric-80
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    standard:
      type: return
      value:
        at_risk: false
        action: standard_care
        population: geriatric-80
    check:
      type: condition
      variable: age_years
      operator: gte
      value: 80
      true_next: at_risk
      false_next: standard
    at_risk:
      type: return
      value:
        population: geriatric-80
        at_risk: true
        action: special_monitoring
        reason: Very elderly — frailty and fall risk
tests:
  - input:
      age_years: 80
    expect:
      at_risk: true
      population: geriatric-80
  - input: {}
    expect:
      population: geriatric-80
      at_risk: false
  - input:
      age_years: 0
    expect:
      at_risk: false
      action: standard_care
      population: geriatric-80
  - input:
      age_years: -1
    expect:
      population: geriatric-80
      at_risk: false
      action: standard_care
  - input:
      age_years: 79
    expect:
      population: geriatric-80
      at_risk: false
      action: standard_care
  - input:
      age_years: 81
    expect:
      population: geriatric-80
      action: special_monitoring
      at_risk: true
      reason: Very elderly — frailty and fall risk
  - input:
      age_years: 8000
    expect:
      at_risk: true
      reason: Very elderly — frailty and fall risk
      action: special_monitoring
      population: geriatric-80
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
