# MICROGRAM++ (upgraded 2026-04-23)
name: deadline-tga-15day
version: 0.1.0
description: Calculate TGA (Australia) 15-day serious adverse event reporting deadline
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Deadline Tga 15day
  subtitle: Calculate TGA (Australia) 15-day serious adverse event reporting deadline
  icon: circle
  route: /vigilance/mg/deadline-tga-15day
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/deadline-tga-15day
  cli: rsk mcg run deadline-tga-15day
  auth: none
  rate_limit: 600/min
tree:
  start: validate_event
  nodes:
    validate_event:
      type: condition
      variable: event_date
      operator: is_not_null
      value: null
      true_next: check_seriousness
      false_next: deadline_unknown
    check_seriousness:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: check_unexpectedness
      false_next: routine_deadline
    check_unexpectedness:
      type: condition
      variable: is_unexpected
      operator: eq
      value: true
      true_next: serious_unexpected_deadline
      false_next: serious_expected_deadline
    serious_unexpected_deadline:
      type: return
      value:
        reporting_deadline_days: 15
        event_category: serious_unexpected_adverse_reaction
        regulatory_requirement: TGA_Australia
        urgent_notification_required: true
        regulatory_compliant: true
    serious_expected_deadline:
      type: return
      value:
        reporting_deadline_days: 30
        event_category: serious_expected_adverse_reaction
        regulatory_requirement: TGA_Australia
        urgent_notification_required: false
        regulatory_compliant: true
    routine_deadline:
      type: return
      value:
        reporting_deadline_days: 30
        event_category: non_serious
        regulatory_requirement: TGA_Australia
        urgent_notification_required: false
        regulatory_compliant: true
    deadline_unknown:
      type: return
      value:
        reporting_deadline_days: null
        event_category: null
        regulatory_requirement: null
        urgent_notification_required: null
        regulatory_compliant: false
tests:
  - input:
      event_date: 2024-01-15
      is_serious: true
      is_unexpected: true
    expect:
      reporting_deadline_days: 15
      urgent_notification_required: true
  - input:
      event_date: 2024-01-15
      is_serious: true
      is_unexpected: false
    expect:
      reporting_deadline_days: 30
      event_category: serious_expected_adverse_reaction
  - input:
      event_date: 2024-01-15
      is_serious: false
    expect:
      reporting_deadline_days: 30
  - input: {}
    expect:
      reporting_deadline_days: null
      regulatory_compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
