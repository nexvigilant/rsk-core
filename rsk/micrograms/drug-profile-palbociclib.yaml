name: drug-profile-palbociclib
description: 'Safety triage for palbociclib: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        drug: palbociclib
        signal: true
        expected_prr: 4.8
        harm_type: B
        action: investigate
    no_signal:
      type: return
      value:
        action: monitor
        harm_type: B
        drug: palbociclib
        signal: false
        expected_prr: 4.8
tests:
- input:
    prr: 4.8
  expect:
    signal: false
    drug: palbociclib
- input:
    prr: 0.5
  expect:
    signal: false
    drug: palbociclib
- input: {}
  expect:
    drug: palbociclib
    signal: false
- input:
    prr: 4.999
  expect:
    drug: palbociclib
    signal: false
    expected_prr: 4.8
    action: monitor
    harm_type: B
- input:
    prr: 5.001
  expect:
    expected_prr: 4.8
    action: investigate
    drug: palbociclib
    signal: true
    harm_type: B
interface: null
primitive_signature: null
