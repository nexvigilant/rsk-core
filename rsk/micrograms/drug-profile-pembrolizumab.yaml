name: drug-profile-pembrolizumab
description: 'Safety triage for pembrolizumab: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    signal:
      type: return
      value:
        action: investigate
        signal: true
        expected_prr: 8.1
        harm_type: B
        drug: pembrolizumab
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
    no_signal:
      type: return
      value:
        drug: pembrolizumab
        signal: false
        expected_prr: 8.1
        harm_type: B
        action: monitor
tests:
- input:
    prr: 8.1
  expect:
    signal: true
    drug: pembrolizumab
- input:
    prr: 0.5
  expect:
    drug: pembrolizumab
    signal: false
- input: {}
  expect:
    signal: false
    drug: pembrolizumab
- input:
    prr: 4.999
  expect:
    signal: false
    action: monitor
    drug: pembrolizumab
    expected_prr: 8.1
    harm_type: B
- input:
    prr: 5.001
  expect:
    harm_type: B
    drug: pembrolizumab
    signal: true
    action: investigate
    expected_prr: 8.1
interface: null
primitive_signature: null
