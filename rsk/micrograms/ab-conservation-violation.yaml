# MICROGRAM++ (upgraded 2026-04-23)
name: ab-conservation-violation
version: 0.1.0
description: "Antibody: detects quantity conservation violations (stem-phys Preserve trait). Inputs are pre-computed delta and tolerance."
family: antibody.chemistry
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - antibody
inputs:
  - name: absolute_delta
    type: number
    required: true
    description: abs(quantity_before - quantity_after), pre-computed
  - name: tolerance
    type: number
    required: true
    description: ""
outputs:
  - name: threat
    type: boolean
  - name: response
    type: string
interface:
  inputs:
    absolute_delta:
      type: number
      required: true
      description: abs(quantity_before - quantity_after), pre-computed
    tolerance:
      type: number
      required: true
  outputs:
    threat:
      type: boolean
    response:
      type: string
ui:
  title: Conservation Violation
  subtitle: "Antibody: detects quantity conservation violations (stem-phys Preserve trait). Inputs are pre-computed delta and tolerance."
  icon: shield
  route: /vigilance/mg/ab-conservation-violation
  steps:
    - field: absolute_delta
      label: absolute delta
      help: abs(quantity_before - quantity_after), pre-computed
      widget: number
      placeholder: null
    - field: tolerance
      label: tolerance
      help: Enter tolerance
      widget: number
      placeholder: null
  result:
    template: "threat: {{threat}} — response: {{response}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ab-conservation-violation
  cli: rsk mcg run ab-conservation-violation
  auth: none
  rate_limit: 600/min
tree:
  start: check_zero
  nodes:
    check_zero:
      type: condition
      variable: absolute_delta
      operator: eq
      value: 0
      true_next: clean
      false_next: check_small
    check_small:
      type: condition
      variable: absolute_delta
      operator: lte
      value: 0.01
      true_next: clean
      false_next: check_medium
    check_medium:
      type: condition
      variable: absolute_delta
      operator: lte
      value: 1
      true_next: warn
      false_next: violation
    violation:
      type: return
      value:
        threat: true
        response: "BLOCK: conservation violated — delta > 1.0"
    warn:
      type: return
      value:
        threat: false
        response: "WARN: conservation drift detected — delta between 0.01 and 1.0"
    clean:
      type: return
      value:
        threat: false
        response: PASS
tests:
  - input:
      absolute_delta: 0
      tolerance: 0.01
    expect:
      threat: false
  - input:
      absolute_delta: 0.001
      tolerance: 0.01
    expect:
      threat: false
  - input:
      absolute_delta: 0.5
      tolerance: 0.01
    expect:
      threat: false
  - input:
      absolute_delta: 5
      tolerance: 0.01
    expect:
      threat: true
  - input: {}
    expect:
      response: "BLOCK: conservation violated — delta > 1.0"
      threat: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - threat
    - response
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: antibody.chemistry
  log_level: info
governance:
  sop_ref: SOP-CHEM-001
  regulatory_ref: []
  harm_types:
    - F
  review_cadence: quarterly
  tov_axioms:
    - conservation
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
