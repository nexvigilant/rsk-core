name: class-ssri
description: 'SSRIs class safety: Serotonin syndrome monitoring'
version: 0.1.0
tree:
  start: check
  nodes:
    alert:
      type: return
      value:
        drug_class: SSRIs
        alert: true
        action: class_effect_investigation
        concern: Serotonin syndrome
    check:
      type: condition
      variable: serotonin_syndrome_risk
      operator: gte
      value: 3
      true_next: alert
      false_next: safe
    safe:
      type: return
      value:
        drug_class: SSRIs
        alert: false
        action: continue
        concern: Serotonin syndrome
tests:
- input:
    serotonin_syndrome_risk: 3
  expect:
    drug_class: SSRIs
    alert: true
- input: {}
  expect:
    alert: false
    drug_class: SSRIs
- input:
    serotonin_syndrome_risk: 0
  expect:
    alert: false
    drug_class: SSRIs
    action: continue
    concern: Serotonin syndrome
- input:
    serotonin_syndrome_risk: -1
  expect:
    alert: false
    action: continue
    concern: Serotonin syndrome
    drug_class: SSRIs
- input:
    serotonin_syndrome_risk: 2
  expect:
    concern: Serotonin syndrome
    alert: false
    drug_class: SSRIs
    action: continue
- input:
    serotonin_syndrome_risk: 4
  expect:
    drug_class: SSRIs
    action: class_effect_investigation
    alert: true
    concern: Serotonin syndrome
- input:
    serotonin_syndrome_risk: 300
  expect:
    alert: true
    drug_class: SSRIs
    concern: Serotonin syndrome
    action: class_effect_investigation
interface: null
primitive_signature: null
