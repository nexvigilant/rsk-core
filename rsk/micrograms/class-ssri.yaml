# MICROGRAM++ (upgraded 2026-04-23)
name: class-ssri
version: 0.1.0
description: "SSRIs class safety: Serotonin syndrome monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Ssri
  subtitle: "SSRIs class safety: Serotonin syndrome monitoring"
  icon: circle
  route: /vigilance/mg/class-ssri
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-ssri
  cli: rsk mcg run class-ssri
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    alert:
      type: return
      value:
        drug_class: SSRIs
        alert: true
        action: class_effect_investigation
        concern: Serotonin syndrome
    check:
      type: condition
      variable: serotonin_syndrome_risk
      operator: gte
      value: 3
      true_next: alert
      false_next: safe
    safe:
      type: return
      value:
        drug_class: SSRIs
        alert: false
        action: continue
        concern: Serotonin syndrome
tests:
  - input:
      serotonin_syndrome_risk: 3
    expect:
      drug_class: SSRIs
      alert: true
  - input: {}
    expect:
      alert: false
      drug_class: SSRIs
  - input:
      serotonin_syndrome_risk: 0
    expect:
      alert: false
      drug_class: SSRIs
      action: continue
      concern: Serotonin syndrome
  - input:
      serotonin_syndrome_risk: -1
    expect:
      alert: false
      action: continue
      concern: Serotonin syndrome
      drug_class: SSRIs
  - input:
      serotonin_syndrome_risk: 2
    expect:
      concern: Serotonin syndrome
      alert: false
      drug_class: SSRIs
      action: continue
  - input:
      serotonin_syndrome_risk: 4
    expect:
      drug_class: SSRIs
      action: class_effect_investigation
      alert: true
      concern: Serotonin syndrome
  - input:
      serotonin_syndrome_risk: 300
    expect:
      alert: true
      drug_class: SSRIs
      concern: Serotonin syndrome
      action: class_effect_investigation
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
