# MICROGRAM++ (upgraded 2026-04-23)
name: trend-dose-response
version: 0.1.0
description: Dose-response relationship
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Trend Dose Response
  subtitle: Dose-response relationship
  icon: circle
  route: /vigilance/mg/trend-dose-response
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/trend-dose-response
  cli: rsk mcg run trend-dose-response
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    detected:
      type: return
      value:
        action: investigate
        pattern: dose_related
        detected: true
    not_detected:
      type: return
      value:
        action: continue_monitoring
        pattern: dose_related
        detected: false
    check:
      type: condition
      variable: dose_correlation
      operator: gte
      value: 0
      true_next: detected
      false_next: not_detected
tests:
  - input:
      dose_correlation: 0
    expect:
      pattern: dose_related
      detected: true
  - input: {}
    expect:
      pattern: dose_related
      detected: false
  - input:
      dose_correlation: -1
    expect:
      detected: false
      pattern: dose_related
      action: continue_monitoring
  - input:
      dose_correlation: -1
    expect:
      pattern: dose_related
      detected: false
      action: continue_monitoring
  - input:
      dose_correlation: 1
    expect:
      action: investigate
      pattern: dose_related
      detected: true
  - input:
      dose_correlation: 0
    expect:
      action: investigate
      pattern: dose_related
      detected: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
