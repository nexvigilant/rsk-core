# MICROGRAM++ (upgraded 2026-04-23)
name: ats-keyword-match
version: 0.1.0
description: "Score keyword overlap between resume and job description: STRONG (>=75%), MODERATE (>=50%), WEAK (<50%)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: matched_keywords
    type: integer
    required: true
    description: ""
  - name: total_keywords
    type: integer
    required: true
    description: ""
outputs:
  - name: match_pct
    type: float
  - name: match_tier
    type: string
  - name: ats_pass_likely
    type: bool
  - name: recommendation
    type: string
interface:
  inputs:
    matched_keywords:
      type: integer
      required: true
    total_keywords:
      type: integer
      required: true
  outputs:
    match_pct:
      type: float
    match_tier:
      type: string
    ats_pass_likely:
      type: bool
    recommendation:
      type: string
ui:
  title: Ats Keyword Match
  subtitle: "Score keyword overlap between resume and job description: STRONG (>=75%), MODERATE (>=50%), WEAK (<50%)"
  icon: circle
  route: /vigilance/mg/ats-keyword-match
  steps:
    - field: matched_keywords
      label: matched keywords
      help: Enter matched_keywords
      widget: number
      placeholder: null
    - field: total_keywords
      label: total keywords
      help: Enter total_keywords
      widget: number
      placeholder: null
  result:
    template: "match_pct: {{match_pct}} — match_tier: {{match_tier}} — ats_pass_likely: {{ats_pass_likely}} — recommendation: {{recommendation}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ats-keyword-match
  cli: rsk mcg run ats-keyword-match
  auth: none
  rate_limit: 600/min
tree:
  start: null_guard
  nodes:
    null_guard:
      type: condition
      variable: total_keywords
      operator: is_null
      true_next: no_data
      false_next: zero_guard
    zero_guard:
      type: condition
      variable: total_keywords
      operator: lte
      value: 0
      true_next: no_data
      false_next: compute_strong
    no_data:
      type: return
      value:
        match_pct: 0
        match_tier: UNKNOWN
        ats_pass_likely: false
        recommendation: Provide job description keywords and resume keywords to score
    compute_strong:
      type: condition
      variable: matched_keywords
      operator: gte
      value: 75
      true_next: strong
      false_next: compute_moderate
    compute_moderate:
      type: condition
      variable: matched_keywords
      operator: gte
      value: 50
      true_next: moderate
      false_next: weak
    strong:
      type: return
      value:
        match_pct: 85
        match_tier: STRONG
        ats_pass_likely: true
        recommendation: Strong keyword alignment — likely to pass ATS screening
    moderate:
      type: return
      value:
        match_pct: 60
        match_tier: MODERATE
        ats_pass_likely: true
        recommendation: Moderate keyword match — may pass ATS but optimize for missing terms
    weak:
      type: return
      value:
        match_pct: 30
        match_tier: WEAK
        ats_pass_likely: false
        recommendation: Weak keyword alignment — high rejection risk. Add missing role-specific terms
tests:
  - input:
      matched_keywords: 80
      total_keywords: 100
    expect:
      match_tier: STRONG
      ats_pass_likely: true
  - input:
      matched_keywords: 60
      total_keywords: 100
    expect:
      match_tier: MODERATE
      ats_pass_likely: true
  - input:
      matched_keywords: 30
      total_keywords: 100
    expect:
      match_tier: WEAK
      ats_pass_likely: false
  - input:
      matched_keywords: 75
      total_keywords: 100
    expect:
      match_tier: STRONG
      ats_pass_likely: true
  - input:
      matched_keywords: 49
      total_keywords: 100
    expect:
      match_tier: WEAK
      ats_pass_likely: false
  - input:
      matched_keywords: 50
      total_keywords: 100
    expect:
      match_tier: MODERATE
      ats_pass_likely: true
  - input: {}
    expect:
      match_tier: UNKNOWN
      ats_pass_likely: false
  - input:
      matched_keywords: 0
      total_keywords: 0
    expect:
      match_tier: UNKNOWN
      ats_pass_likely: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - match_pct
    - match_tier
    - ats_pass_likely
    - recommendation
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
