# MICROGRAM++ (test-repair)
name: vigil-stress-escalation
version: 0.1.0
description: "Operator-Vigil patient_safety escalation: maps biometric and perception signals to ToV strictness level (standard | elevated | strict)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: hr_bpm
    type: float
    required: false
    description: ""
  - name: sensors_online
    type: int
    required: true
    description: ""
  - name: listener_avg_confidence
    type: float
    required: false
    description: ""
  - name: hr_hrv_rmssd
    type: float
    required: false
    description: ""
outputs:
  - name: patient_safety
    type: string
  - name: rationale
    type: string
  - name: boundary_caution_bump
    type: float
interface:
  inputs:
    hr_bpm:
      type: float
      required: false
    sensors_online:
      type: int
      required: true
    listener_avg_confidence:
      type: float
      required: false
    hr_hrv_rmssd:
      type: float
      required: false
  outputs:
    patient_safety:
      type: string
      description: standard | elevated | strict
    rationale:
      type: string
    boundary_caution_bump:
      type: float
ui:
  title: Vigil Stress Escalation
  subtitle: "Operator-Vigil patient_safety escalation: maps biometric and perception signals to ToV strictness level (standard | elevated | strict)"
  icon: circle
  route: /vigilance/mg/vigil-stress-escalation
  steps:
    - field: hr_bpm
      label: hr bpm
      help: Enter hr_bpm
      widget: text
      placeholder: null
    - field: sensors_online
      label: sensors online
      help: Enter sensors_online
      widget: text
      placeholder: null
    - field: listener_avg_confidence
      label: listener avg confidence
      help: Enter listener_avg_confidence
      widget: text
      placeholder: null
    - field: hr_hrv_rmssd
      label: hr hrv rmssd
      help: Enter hr_hrv_rmssd
      widget: text
      placeholder: null
  result:
    template: "patient_safety: {{patient_safety}} — rationale: {{rationale}} — boundary_caution_bump: {{boundary_caution_bump}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/vigil-stress-escalation
  cli: rsk mcg run vigil-stress-escalation
  auth: none
  rate_limit: 600/min
tree:
  start: hr_critical_check
  nodes:
    hr_critical_check:
      type: condition
      variable: hr_bpm
      operator: gt
      value: 130
      true_next: hr_critical
      false_next: hr_high_check
    hr_critical:
      type: return
      value:
        patient_safety: strict
        rationale: "HR>130: severe physiological stress, raise ToV strictness, bump caution"
        boundary_caution_bump: 0.05
    hr_high_check:
      type: condition
      variable: hr_bpm
      operator: gt
      value: 110
      true_next: hr_high
      false_next: sensors_check
    hr_high:
      type: return
      value:
        patient_safety: strict
        rationale: "HR>110: stress signal, raise ToV strictness"
        boundary_caution_bump: 0
    sensors_check:
      type: condition
      variable: sensors_online
      operator: lt
      value: 3
      true_next: sensors_degraded
      false_next: confidence_check
    sensors_degraded:
      type: return
      value:
        patient_safety: elevated
        rationale: "sensor coverage degraded: cannot perceive operator state, raise ToV"
        boundary_caution_bump: 0
    confidence_check:
      type: condition
      variable: listener_avg_confidence
      operator: lt
      value: 0
      true_next: confidence_negative
      false_next: nominal
    confidence_negative:
      type: return
      value:
        patient_safety: elevated
        rationale: "voice listener avg_confidence<0: voice channel unreliable"
        boundary_caution_bump: 0
    nominal:
      type: return
      value:
        patient_safety: standard
        rationale: all biometric and perception signals nominal
        boundary_caution_bump: 0
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - patient_safety
    - rationale
    - boundary_caution_bump
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
tests:
  - input: {}
    expect: {}
