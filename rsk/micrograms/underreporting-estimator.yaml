# MICROGRAM++ (upgraded 2026-04-23)
name: underreporting-estimator
version: 0.1.0
description: "PVOS underreporting estimation: categorizes reporting completeness based on reported-to-expected case ratio"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reporting_ratio
    type: float
    required: false
    description: ""
outputs:
  - name: category
    type: string
  - name: description
    type: string
  - name: estimated_reporting_pct
    type: string
  - name: recommendation
    type: string
interface:
  inputs:
    reporting_ratio:
      type: float
      required: false
  outputs:
    category:
      type: string
    description:
      type: string
    estimated_reporting_pct:
      type: string
    recommendation:
      type: string
ui:
  title: Underreporting Estimator
  subtitle: "PVOS underreporting estimation: categorizes reporting completeness based on reported-to-expected case ratio"
  icon: circle
  route: /vigilance/mg/underreporting-estimator
  steps:
    - field: reporting_ratio
      label: reporting ratio
      help: Enter reporting_ratio
      widget: text
      placeholder: null
  result:
    template: "category: {{category}} — description: {{description}} — estimated_reporting_pct: {{estimated_reporting_pct}} — recommendation: {{recommendation}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/underreporting-estimator
  cli: rsk mcg run underreporting-estimator
  auth: none
  rate_limit: 600/min
tree:
  start: check_severe
  nodes:
    check_severe:
      type: condition
      variable: reporting_ratio
      operator: lt
      value: 0.01
      true_next: severe_underreporting
      false_next: check_significant
    check_significant:
      type: condition
      variable: reporting_ratio
      operator: lt
      value: 0.05
      true_next: significant_underreporting
      false_next: check_moderate
    check_moderate:
      type: condition
      variable: reporting_ratio
      operator: lt
      value: 0.1
      true_next: moderate_underreporting
      false_next: acceptable_reporting
    severe_underreporting:
      type: return
      value:
        category: SEVERE_UNDERREPORTING
        estimated_reporting_pct: 1-10%
        description: Severe underreporting detected - estimated 1-10% of cases reported
        recommendation: Initiate active surveillance and reporting system audit
    significant_underreporting:
      type: return
      value:
        category: SIGNIFICANT_UNDERREPORTING
        estimated_reporting_pct: 5-10%
        description: Significant underreporting detected - estimated 5-10% of cases reported
        recommendation: Enhance passive surveillance and educate reporters
    moderate_underreporting:
      type: return
      value:
        category: MODERATE_UNDERREPORTING
        estimated_reporting_pct: 10%
        description: Moderate underreporting detected - estimated ~10% of cases reported
        recommendation: Monitor reporting trends and apply adjustment factors
    acceptable_reporting:
      type: return
      value:
        category: ACCEPTABLE_REPORTING
        estimated_reporting_pct: ">10%"
        description: Reporting rate within acceptable range for spontaneous reporting systems
        recommendation: Continue routine monitoring
tests:
  - input:
      reporting_ratio: 0.005
      data_source: spontaneous
    expect:
      category: SEVERE_UNDERREPORTING
      estimated_reporting_pct: 1-10%
      description: Severe underreporting detected - estimated 1-10% of cases reported
      recommendation: Initiate active surveillance and reporting system audit
  - input:
      reporting_ratio: 0.03
      data_source: spontaneous
    expect:
      category: SIGNIFICANT_UNDERREPORTING
      estimated_reporting_pct: 5-10%
      description: Significant underreporting detected - estimated 5-10% of cases reported
      recommendation: Enhance passive surveillance and educate reporters
  - input:
      reporting_ratio: 0.08
      data_source: registry
    expect:
      category: MODERATE_UNDERREPORTING
      estimated_reporting_pct: 10%
      description: Moderate underreporting detected - estimated ~10% of cases reported
      recommendation: Monitor reporting trends and apply adjustment factors
  - input:
      reporting_ratio: 0.15
      data_source: clinical_trial
    expect:
      category: ACCEPTABLE_REPORTING
      estimated_reporting_pct: ">10%"
      description: Reporting rate within acceptable range for spontaneous reporting systems
      recommendation: Continue routine monitoring
  - input:
      reporting_ratio: 0.1
      data_source: spontaneous
    expect:
      category: ACCEPTABLE_REPORTING
      estimated_reporting_pct: ">10%"
      description: Reporting rate within acceptable range for spontaneous reporting systems
      recommendation: Continue routine monitoring
  - input: {}
    expect:
      category: ACCEPTABLE_REPORTING
      description: Reporting rate within acceptable range for spontaneous reporting systems
      estimated_reporting_pct: ">10%"
      recommendation: Continue routine monitoring
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - category
    - description
    - estimated_reporting_pct
    - recommendation
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
