# MICROGRAM++ (upgraded 2026-04-23)
name: drug-class-ssri-safety
version: 0.1.0
description: Gate for SSRI (selective serotonin reuptake inhibitor) safety assessment. Evaluates risk based on drug, patient age, concurrent medications, and renal function.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Class Ssri Safety
  subtitle: Gate for SSRI (selective serotonin reuptake inhibitor) safety assessment. Evaluates risk based on drug, patient age, concurrent medications, and renal function.
  icon: circle
  route: /vigilance/mg/drug-class-ssri-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-class-ssri-safety
  cli: rsk mcg run drug-class-ssri-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_serotonin_syndrome_risk
  nodes:
    check_serotonin_syndrome_risk:
      type: condition
      variable: concurrent_maoi
      operator: eq
      value: true
      true_next: serotonin_syndrome_alert
      false_next: check_age_group
    serotonin_syndrome_alert:
      type: return
      value:
        risk_level: critical
        contraindication: true
        message: "Serotonin syndrome risk: MAOI contraindicated within 14 days of SSRI discontinuation"
    check_age_group:
      type: condition
      variable: age_years
      operator: lt
      value: 18
      true_next: pediatric_assessment
      false_next: adult_assessment
    pediatric_assessment:
      type: return
      value:
        risk_level: high
        age_group: pediatric
        monitoring_required: true
        message: Increased suicidality risk in pediatric populations; black box warning applies
    adult_assessment:
      type: condition
      variable: renal_clearance_ml_min
      operator: lt
      value: 30
      true_next: renal_impairment_dosing
      false_next: standard_dosing
    renal_impairment_dosing:
      type: return
      value:
        risk_level: moderate
        renal_adjustment: true
        dose_adjustment_percent: 50
        message: Reduced renal clearance; recommend 50% dose reduction
    standard_dosing:
      type: return
      value:
        risk_level: low
        renal_adjustment: false
        message: Standard SSRI dosing appropriate for age and renal function
tests:
  - input:
      concurrent_maoi: true
      age_years: 35
      renal_clearance_ml_min: 80
    expect:
      risk_level: critical
      contraindication: true
  - input:
      concurrent_maoi: false
      age_years: 16
      renal_clearance_ml_min: 90
    expect:
      risk_level: high
      age_group: pediatric
      monitoring_required: true
  - input:
      concurrent_maoi: false
      age_years: 55
      renal_clearance_ml_min: 20
    expect:
      risk_level: moderate
      renal_adjustment: true
  - input:
      concurrent_maoi: false
      age_years: 45
      renal_clearance_ml_min: 75
    expect:
      risk_level: low
      renal_adjustment: false
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
