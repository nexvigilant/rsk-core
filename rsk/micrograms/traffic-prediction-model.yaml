# MICROGRAM++ (test-repair)
name: traffic-prediction-model
version: 0.1.0
description: |
  Predicts next-action priority for NexVigilant external traffic growth. Measures current state across 7 dimensions, classifies the bottleneck, and returns the highest-leverage action. Run weekly or before strategy sessions.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: repo_public
    type: bool
    required: true
    description: Is the Station source repo publicly accessible on GitHub?
  - name: descriptions_current
    type: bool
    required: true
    description: Do all public repo descriptions match actual tool count (1958)?
  - name: directory_listings
    type: int
    required: true
    description: Number of MCP directories where Station is listed
  - name: hop_default
    type: bool
    required: true
    description: Does chart_course recommend hop engine as primary onboarding path?
  - name: example_published
    type: bool
    required: true
    description: Is a public worked example with real unlabeled signal finding live?
  - name: calls_per_day
    type: float
    required: true
    description: Average daily external tool calls (not internal sessions)
  - name: framework_count
    type: int
    required: true
    description: Number of agent frameworks with NexVigilant integration examples
outputs:
  - name: bottleneck
    type: string
  - name: phase
    type: string
  - name: action
    type: string
  - name: priority
    type: string
  - name: prediction
    type: string
  - name: leverage
    type: float
interface:
  inputs:
    repo_public:
      type: bool
      required: true
      description: Is the Station source repo publicly accessible on GitHub?
    descriptions_current:
      type: bool
      required: true
      description: Do all public repo descriptions match actual tool count (1958)?
    directory_listings:
      type: int
      required: true
      description: Number of MCP directories where Station is listed
    hop_default:
      type: bool
      required: true
      description: Does chart_course recommend hop engine as primary onboarding path?
    example_published:
      type: bool
      required: true
      description: Is a public worked example with real unlabeled signal finding live?
    calls_per_day:
      type: float
      required: true
      description: Average daily external tool calls (not internal sessions)
    framework_count:
      type: int
      required: true
      description: Number of agent frameworks with NexVigilant integration examples
  outputs:
    bottleneck:
      type: string
    phase:
      type: string
    action:
      type: string
    priority:
      type: string
    prediction:
      type: string
    leverage:
      type: float
ui:
  title: Traffic Prediction Model
  subtitle: |
    Predicts next-action priority for NexVigilant external traffic growth. Measures current state across 7 dimensions, classifies the bottleneck, and returns the highest-leverage action. Run weekly or before strategy sessions.
  icon: circle
  route: /vigilance/mg/traffic-prediction-model
  steps:
    - field: repo_public
      label: repo public
      help: Is the Station source repo publicly accessible on GitHub?
      widget: toggle
      placeholder: null
    - field: descriptions_current
      label: descriptions current
      help: Do all public repo descriptions match actual tool count (1958)?
      widget: toggle
      placeholder: null
    - field: directory_listings
      label: directory listings
      help: Number of MCP directories where Station is listed
      widget: text
      placeholder: null
    - field: hop_default
      label: hop default
      help: Does chart_course recommend hop engine as primary onboarding path?
      widget: toggle
      placeholder: null
    - field: example_published
      label: example published
      help: Is a public worked example with real unlabeled signal finding live?
      widget: toggle
      placeholder: null
    - field: calls_per_day
      label: calls per day
      help: Average daily external tool calls (not internal sessions)
      widget: text
      placeholder: null
    - field: framework_count
      label: framework count
      help: Number of agent frameworks with NexVigilant integration examples
      widget: text
      placeholder: null
  result:
    template: "bottleneck: {{bottleneck}} — phase: {{phase}} — action: {{action}} — priority: {{priority}} — prediction: {{prediction}} — leverage: {{leverage}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/traffic-prediction-model
  cli: rsk mcg run traffic-prediction-model
  auth: none
  rate_limit: 600/min
tree:
  start: check_repo
  nodes:
    check_repo:
      type: condition
      variable: repo_public
      operator: eq
      value: true
      true_next: check_descriptions
      false_next: blocked_visibility
    blocked_visibility:
      type: return
      value:
        bottleneck: visibility
        phase: blocked
        action: Make ferroforge public OR update nexvigilant-station repo with current source and README
        priority: P0
        prediction: Zero external traffic possible until repo is accessible. All directory submissions point to it.
        leverage: 1
    check_descriptions:
      type: condition
      variable: descriptions_current
      operator: eq
      value: true
      true_next: check_directories
      false_next: blocked_credibility
    blocked_credibility:
      type: return
      value:
        bottleneck: credibility
        phase: blocked
        action: Update all stale GitHub repo descriptions — 151/347 must become 1958
        priority: P0
        prediction: Inconsistent counts signal neglect. Developers check repos before integrating.
        leverage: 0.9
    check_directories:
      type: condition
      variable: directory_listings
      operator: gt
      value: 0
      true_next: check_hop
      false_next: pre_launch
    pre_launch:
      type: return
      value:
        bottleneck: discovery
        phase: pre_launch
        action: Submit to Smithery + 5 web directories. Copy-paste kit ready.
        priority: P1
        prediction: First external call within 3-14 days. Expect 10-50 calls/day within 30 days.
        leverage: 0.8
    check_hop:
      type: condition
      variable: hop_default
      operator: eq
      value: true
      true_next: check_example
      false_next: optimize_onboarding
    optimize_onboarding:
      type: return
      value:
        bottleneck: onboarding_friction
        phase: pre_optimization
        action: Make hop engine the first recommendation in chart_course response
        priority: P1
        prediction: Bounce rate >80% with manual 6-step chain. <40% with single hop returning full result.
        leverage: 0.85
    check_example:
      type: condition
      variable: example_published
      operator: eq
      value: true
      true_next: check_volume
      false_next: pre_viral
    pre_viral:
      type: return
      value:
        bottleneck: proof
        phase: pre_viral
        action: Publish semaglutide muscle atrophy signal as worked example — unlabeled, ROR=2.39, trending drug
        priority: P2
        prediction: Worked examples drive 10x more adoption than tool listings. Emerging unlabeled signal = shareable story.
        leverage: 0.95
    check_volume:
      type: condition
      variable: calls_per_day
      operator: gte
      value: 500
      true_next: revenue
      false_next: scaling
    scaling:
      type: return
      value:
        bottleneck: volume
        phase: scaling
        action: Publish framework integration examples (CrewAI, LangChain). Launch competitive intel product.
        priority: P2
        prediction: 500 calls/day = breakeven. Each framework integration = new user segment.
        leverage: 0.7
    revenue:
      type: return
      value:
        bottleneck: none
        phase: revenue
        action: Enable toll billing, add premium tiers, measure conversion rates
        priority: P3
        prediction: Revenue phase. Shift from growth to monetization and retention.
        leverage: 0.5
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - bottleneck
    - phase
    - action
    - priority
    - prediction
    - leverage
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
tests:
  - input: {}
    expect: {}
