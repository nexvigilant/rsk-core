# MICROGRAM++ (upgraded 2026-04-23)
name: convergence-3of4
version: 0.1.0
description: 3 of 4 methods agree
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Convergence 3of4
  subtitle: 3 of 4 methods agree
  icon: circle
  route: /vigilance/mg/convergence-3of4
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/convergence-3of4
  cli: rsk mcg run convergence-3of4
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: methods_positive
      operator: gte
      value: 3
      true_next: converged
      false_next: divergent
    converged:
      type: return
      value:
        met: true
        action: escalate
        convergence: moderate
    divergent:
      type: return
      value:
        met: false
        convergence: moderate
        action: investigate_discrepancy
tests:
  - input:
      methods_positive: 3
    expect:
      met: true
      convergence: moderate
  - input: {}
    expect:
      convergence: moderate
      met: false
  - input:
      methods_positive: 0
    expect:
      convergence: moderate
      met: false
      action: investigate_discrepancy
  - input:
      methods_positive: -1
    expect:
      convergence: moderate
      action: investigate_discrepancy
      met: false
  - input:
      methods_positive: 2
    expect:
      met: false
      convergence: moderate
      action: investigate_discrepancy
  - input:
      methods_positive: 4
    expect:
      met: true
      action: escalate
      convergence: moderate
  - input:
      methods_positive: 300
    expect:
      convergence: moderate
      action: escalate
      met: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
