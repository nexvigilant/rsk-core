name: drug-profile-ciprofloxacin
description: 'Safety triage for ciprofloxacin: PRR-based signal routing (Type B)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    signal:
      type: return
      value:
        drug: ciprofloxacin
        action: investigate
        signal: true
        expected_prr: 25.4
        harm_type: B
    no_signal:
      type: return
      value:
        signal: false
        expected_prr: 25.4
        action: monitor
        harm_type: B
        drug: ciprofloxacin
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 5.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 25.4
  expect:
    drug: ciprofloxacin
    signal: true
- input:
    prr: 0.5
  expect:
    signal: false
    drug: ciprofloxacin
- input: {}
  expect:
    signal: false
    drug: ciprofloxacin
- input:
    prr: 4.999
  expect:
    signal: false
    harm_type: B
    drug: ciprofloxacin
    expected_prr: 25.4
    action: monitor
- input:
    prr: 5.001
  expect:
    signal: true
    expected_prr: 25.4
    drug: ciprofloxacin
    harm_type: B
    action: investigate
interface: null
primitive_signature: null
