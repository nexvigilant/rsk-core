# MICROGRAM++ (upgraded 2026-04-23)
name: risk-action-tracker
version: 0.1.0
description: Track risk management action items and completion status
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Risk Action Tracker
  subtitle: Track risk management action items and completion status
  icon: circle
  route: /vigilance/mg/risk-action-tracker
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/risk-action-tracker
  cli: rsk mcg run risk-action-tracker
  auth: none
  rate_limit: 600/min
tree:
  start: validate_actions
  nodes:
    validate_actions:
      type: condition
      variable: action_list
      operator: is_not_null
      value: null
      true_next: check_completion_status
      false_next: tracking_unknown
    check_completion_status:
      type: condition
      variable: percent_complete
      operator: gte
      value: 100
      true_next: all_actions_complete
      false_next: check_in_progress
    check_in_progress:
      type: condition
      variable: percent_complete
      operator: gte
      value: 50
      true_next: actions_in_progress
      false_next: actions_not_started
    all_actions_complete:
      type: return
      value:
        tracking_status: closed
        action_status: all_complete
        overdue_actions: 0
        review_required: true
        tracking_compliant: true
    actions_in_progress:
      type: return
      value:
        tracking_status: active
        action_status: in_progress
        overdue_actions: 0
        review_required: false
        tracking_compliant: true
    actions_not_started:
      type: return
      value:
        tracking_status: open
        action_status: pending
        overdue_actions: 0
        review_required: false
        tracking_compliant: true
    tracking_unknown:
      type: return
      value:
        tracking_status: null
        action_status: null
        overdue_actions: null
        review_required: null
        tracking_compliant: false
tests:
  - input:
      action_list:
        - action1
        - action2
      percent_complete: 100
    expect:
      tracking_status: closed
      action_status: all_complete
      overdue_actions: 0
  - input:
      action_list:
        - action1
        - action2
      percent_complete: 75
    expect:
      tracking_status: active
      action_status: in_progress
  - input:
      action_list:
        - action1
        - action2
      percent_complete: 25
    expect:
      tracking_status: open
      action_status: pending
  - input: {}
    expect:
      tracking_status: null
      tracking_compliant: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
