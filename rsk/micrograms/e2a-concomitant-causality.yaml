# MICROGRAM++ (upgraded 2026-04-23)
name: e2a-concomitant-causality
version: 1.0.0
description: "ICH E2A Section II.D: Concomitant medication causality gate — determines whether a concomitant (non-suspect) drug may be contributing to the adverse event, affecting causality attribution and reporting requirements"
family: pv.causality
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: concomitant_drug_present
    type: bool
    required: false
    description: ""
  - name: known_interaction
    type: bool
    required: false
    description: ""
  - name: other_cause_identified
    type: bool
    required: false
    description: ""
  - name: suspect_drug_temporal_fit
    type: bool
    required: false
    description: ""
  - name: temporal_fit_concomitant
    type: bool
    required: false
    description: ""
outputs:
  - name: attribution
    type: string
  - name: causality_confounded
    type: bool
  - name: investigation_needed
    type: bool
  - name: rationale
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    concomitant_drug_present:
      type: bool
      required: false
    known_interaction:
      type: bool
      required: false
    other_cause_identified:
      type: bool
      required: false
    suspect_drug_temporal_fit:
      type: bool
      required: false
    temporal_fit_concomitant:
      type: bool
      required: false
  outputs:
    attribution:
      type: string
    causality_confounded:
      type: bool
    investigation_needed:
      type: bool
    rationale:
      type: string
    regulatory_reference:
      type: string
ui:
  title: E2a Concomitant Causality
  subtitle: "ICH E2A Section II.D: Concomitant medication causality gate — determines whether a concomitant (non-suspect) drug may be contributing to the adverse event, affecting causality attribution and reporting requirements"
  icon: git-branch
  route: /vigilance/mg/e2a-concomitant-causality
  steps:
    - field: concomitant_drug_present
      label: concomitant drug present
      help: Enter concomitant_drug_present
      widget: toggle
      placeholder: null
    - field: known_interaction
      label: known interaction
      help: Enter known_interaction
      widget: toggle
      placeholder: null
    - field: other_cause_identified
      label: other cause identified
      help: Enter other_cause_identified
      widget: toggle
      placeholder: null
    - field: suspect_drug_temporal_fit
      label: suspect drug temporal fit
      help: Enter suspect_drug_temporal_fit
      widget: toggle
      placeholder: null
    - field: temporal_fit_concomitant
      label: temporal fit concomitant
      help: Enter temporal_fit_concomitant
      widget: toggle
      placeholder: null
  result:
    template: "attribution: {{attribution}} — causality_confounded: {{causality_confounded}} — investigation_needed: {{investigation_needed}} — rationale: {{rationale}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2a-concomitant-causality
  cli: rsk mcg run e2a-concomitant-causality
  auth: none
  rate_limit: 600/min
tree:
  start: check_concomitant_present
  nodes:
    check_concomitant_present:
      type: condition
      variable: concomitant_drug_present
      operator: eq
      value: true
      true_next: check_known_interaction
      false_next: no_concomitant
    check_known_interaction:
      type: condition
      variable: known_interaction
      operator: eq
      value: true
      true_next: confounded_known_interaction
      false_next: check_temporal_fit
    check_temporal_fit:
      type: condition
      variable: temporal_fit_concomitant
      operator: eq
      value: true
      true_next: check_suspect_temporal
      false_next: concomitant_unlikely
    check_suspect_temporal:
      type: condition
      variable: suspect_drug_temporal_fit
      operator: eq
      value: true
      true_next: confounded_dual_temporal
      false_next: concomitant_possible_cause
    confounded_known_interaction:
      type: return
      value:
        causality_confounded: true
        attribution: CONCOMITANT_INTERACTION
        investigation_needed: true
        rationale: Known drug-drug interaction between suspect and concomitant — causality attribution requires medical review
        regulatory_reference: ICH E2A Section II.D - Concomitant medication with known interaction confounds causality
    confounded_dual_temporal:
      type: return
      value:
        causality_confounded: true
        attribution: DUAL_TEMPORAL_FIT
        investigation_needed: true
        rationale: Both suspect and concomitant drug have temporal fit — causality confounded, additional investigation required
        regulatory_reference: ICH E2A Section II.D - Multiple drugs with temporal association require careful attribution
    concomitant_possible_cause:
      type: return
      value:
        causality_confounded: false
        attribution: CONCOMITANT_POSSIBLE
        investigation_needed: true
        rationale: Concomitant drug fits temporally but suspect drug does not — concomitant may be primary cause
        regulatory_reference: ICH E2A Section II.D - Concomitant temporal fit without suspect fit suggests concomitant causality
    concomitant_unlikely:
      type: return
      value:
        causality_confounded: false
        attribution: SUSPECT_PRIMARY
        investigation_needed: false
        rationale: Concomitant drug does not fit temporally — suspect drug remains primary attribution
        regulatory_reference: ICH E2A Section II.D - Concomitant without temporal fit does not confound causality
    no_concomitant:
      type: return
      value:
        causality_confounded: false
        attribution: SUSPECT_ONLY
        investigation_needed: false
        rationale: No concomitant medication — causality attributed to suspect drug only
        regulatory_reference: ICH E2A Section II.D - No concomitant medication to consider
tests:
  - input:
      concomitant_drug_present: false
      known_interaction: false
      temporal_fit_concomitant: false
      suspect_drug_temporal_fit: true
      other_cause_identified: false
    expect:
      causality_confounded: false
      attribution: SUSPECT_ONLY
      investigation_needed: false
      regulatory_reference: ICH E2A Section II.D - No concomitant medication to consider
  - input:
      concomitant_drug_present: true
      known_interaction: true
      temporal_fit_concomitant: true
      suspect_drug_temporal_fit: true
      other_cause_identified: false
    expect:
      causality_confounded: true
      attribution: CONCOMITANT_INTERACTION
      investigation_needed: true
      regulatory_reference: ICH E2A Section II.D - Concomitant medication with known interaction confounds causality
  - input:
      concomitant_drug_present: true
      known_interaction: false
      temporal_fit_concomitant: true
      suspect_drug_temporal_fit: true
      other_cause_identified: false
    expect:
      causality_confounded: true
      attribution: DUAL_TEMPORAL_FIT
      investigation_needed: true
      regulatory_reference: ICH E2A Section II.D - Multiple drugs with temporal association require careful attribution
  - input:
      concomitant_drug_present: true
      known_interaction: false
      temporal_fit_concomitant: true
      suspect_drug_temporal_fit: false
      other_cause_identified: false
    expect:
      causality_confounded: false
      attribution: CONCOMITANT_POSSIBLE
      investigation_needed: true
      regulatory_reference: ICH E2A Section II.D - Concomitant temporal fit without suspect fit suggests concomitant causality
  - input:
      concomitant_drug_present: true
      known_interaction: false
      temporal_fit_concomitant: false
      suspect_drug_temporal_fit: true
      other_cause_identified: false
    expect:
      causality_confounded: false
      attribution: SUSPECT_PRIMARY
      investigation_needed: false
      regulatory_reference: ICH E2A Section II.D - Concomitant without temporal fit does not confound causality
  - input: {}
    expect:
      causality_confounded: false
      attribution: SUSPECT_ONLY
      investigation_needed: false
      regulatory_reference: ICH E2A Section II.D - No concomitant medication to consider
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - attribution
    - causality_confounded
    - investigation_needed
    - rationale
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.causality
  log_level: info
governance:
  sop_ref: SOP-PV-002
  regulatory_ref:
    - ICH-E2A
    - WHO-UMC
  harm_types:
    - A
    - B
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - hierarchy
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
