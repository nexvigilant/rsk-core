name: ich-q1b-gate
description: "ICH Q1B compliance: Photostability"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "photo_tested"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH Q1B"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH Q1B"
        compliant: false
        action: "remediate"
        gap: "photo_tested"

tests:
  - input: {"photo_tested": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
