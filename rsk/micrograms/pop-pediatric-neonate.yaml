# MICROGRAM++ (upgraded 2026-04-23)
name: pop-pediatric-neonate
version: 0.1.0
description: Neonatal safety — immature metabolism
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Pop Pediatric Neonate
  subtitle: Neonatal safety — immature metabolism
  icon: circle
  route: /vigilance/mg/pop-pediatric-neonate
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pop-pediatric-neonate
  cli: rsk mcg run pop-pediatric-neonate
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: age_days
      operator: lte
      value: 28
      true_next: at_risk
      false_next: standard
    at_risk:
      type: return
      value:
        action: special_monitoring
        at_risk: true
        reason: Neonatal safety — immature metabolism
        population: pediatric-neonate
    standard:
      type: return
      value:
        at_risk: false
        population: pediatric-neonate
        action: standard_care
tests:
  - input:
      age_days: 28
    expect:
      population: pediatric-neonate
      at_risk: true
  - input: {}
    expect:
      at_risk: false
      population: pediatric-neonate
  - input:
      age_days: 0
    expect:
      reason: Neonatal safety — immature metabolism
      action: special_monitoring
      at_risk: true
      population: pediatric-neonate
  - input:
      age_days: -1
    expect:
      population: pediatric-neonate
      at_risk: true
      reason: Neonatal safety — immature metabolism
      action: special_monitoring
  - input:
      age_days: 27
    expect:
      population: pediatric-neonate
      at_risk: true
      action: special_monitoring
      reason: Neonatal safety — immature metabolism
  - input:
      age_days: 29
    expect:
      population: pediatric-neonate
      at_risk: false
      action: standard_care
  - input:
      age_days: 2800
    expect:
      at_risk: false
      population: pediatric-neonate
      action: standard_care
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
