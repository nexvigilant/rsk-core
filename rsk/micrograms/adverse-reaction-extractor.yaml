name: adverse-reaction-extractor
description: Extract frequency category and numeric range from adverse reaction text
  in DailyMed labels
version: 0.1.0
tree:
  start: check_reaction_text
  nodes:
    classify_frequency:
      type: condition
      variable: frequency_text
      operator: matches
      value: (?i)(very common|>=10%|≥10|>=10)
      true_next: frequency_very_common
      false_next: check_common
    frequency_very_common:
      type: return
      value:
        numeric_range: '>=10%'
        frequency_category: very_common
    check_very_rare:
      type: condition
      variable: frequency_text
      operator: matches
      value: (?i)(very rare|<0.01%)
      true_next: frequency_very_rare
      false_next: check_rare
    frequency_uncommon:
      type: return
      value:
        frequency_category: uncommon
        numeric_range: 0.1-1%
    frequency_common:
      type: return
      value:
        numeric_range: 1-10%
        frequency_category: common
    frequency_rare:
      type: return
      value:
        frequency_category: rare
        numeric_range: 0.01-0.1%
    check_rare:
      type: condition
      variable: frequency_text
      operator: matches
      value: (?i)(^rare|0.01.*0.1%|0.01-0.1)
      true_next: frequency_rare
      false_next: frequency_unknown
    missing_input:
      type: return
      value:
        frequency_category: unknown
        numeric_range: null
    frequency_very_rare:
      type: return
      value:
        frequency_category: very_rare
        numeric_range: <0.01%
    check_common:
      type: condition
      variable: frequency_text
      operator: matches
      value: (?i)^common|1.*9%|1-10|≥1%
      true_next: frequency_common
      false_next: check_uncommon
    frequency_unknown:
      type: return
      value:
        numeric_range: null
        frequency_category: unknown
    check_uncommon:
      type: condition
      variable: frequency_text
      operator: matches
      value: (?i)(uncommon|0.1.*1%|0.1-1)
      true_next: frequency_uncommon
      false_next: check_very_rare
    check_reaction_text:
      type: condition
      variable: reaction_text
      operator: is_not_null
      value: null
      true_next: check_frequency_text
      false_next: missing_input
    check_frequency_text:
      type: condition
      variable: frequency_text
      operator: is_not_null
      value: null
      true_next: classify_frequency
      false_next: frequency_unknown
tests:
- input:
    frequency_text: ZZZZZ_NO_MATCH
    reaction_text: ZZZZZ_NO_MATCH
  expect:
    numeric_range: null
    frequency_category: unknown
- input:
    frequency_text: ZZZZZ_NO_MATCH
  expect:
    frequency_category: unknown
    numeric_range: null
- input:
    frequency_text: common
    reaction_text: ZZZZZ_NO_MATCH
  expect:
    numeric_range: 1-10%
    frequency_category: common
- input:
    frequency_text: uncommon
    reaction_text: ZZZZZ_NO_MATCH
  expect:
    frequency_category: uncommon
    numeric_range: 0.1-1%
- input:
    frequency_text: very common
    reaction_text: ZZZZZ_NO_MATCH
  expect:
    numeric_range: '>=10%'
    frequency_category: very_common
- input:
    frequency_text: very rare
    reaction_text: ZZZZZ_NO_MATCH
  expect:
    frequency_category: very_rare
    numeric_range: <0.01%
- input:
    reaction_text: ZZZZZ_NO_MATCH
  expect:
    numeric_range: null
    frequency_category: unknown
- input:
    reaction_text: nausea
    frequency_text: "rare (0.01-0.1%)"
  expect:
    frequency_category: rare
    numeric_range: 0.01-0.1%
- input: {}
  expect:
    frequency_category: unknown
    numeric_range: null
interface: null
