# MICROGRAM++ (upgraded 2026-04-23)
name: station-relay-pipeline
version: 0.1.0
description: "Route relay fidelity checks: classify pipeline health by hop count and loss"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Relay Pipeline
  subtitle: "Route relay fidelity checks: classify pipeline health by hop count and loss"
  icon: circle
  route: /vigilance/mg/station-relay-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-relay-pipeline
  cli: rsk mcg run station-relay-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_fidelity
  nodes:
    check_fidelity:
      type: condition
      variable: total_fidelity
      operator: gte
      value: 0.9
      true_next: high_fidelity
      false_next: check_hops
    long_chain:
      type: return
      value:
        route: relay_optimization
        priority: high
        reason: 5+ hops with fidelity <90% — remove dead relays or merge stages
        action: optimize
    check_hops:
      type: condition
      variable: hop_count
      operator: gte
      value: 5
      true_next: long_chain
      false_next: short_degraded
    short_degraded:
      type: return
      value:
        action: diagnose
        reason: Short chain with low fidelity — identify the lossy hop
        priority: moderate
        route: relay_diagnosis
    high_fidelity:
      type: return
      value:
        action: certify
        reason: Relay fidelity ≥90% — pipeline operating within tolerance
        route: archive
        priority: low
tests:
  - input:
      total_fidelity: 0.95
      hop_count: 3
    expect:
      route: archive
      action: certify
      priority: low
  - input:
      total_fidelity: 0.7
      hop_count: 8
    expect:
      priority: high
      action: optimize
      route: relay_optimization
  - input:
      hop_count: 3
      total_fidelity: 0.6
    expect:
      priority: moderate
      action: diagnose
      route: relay_diagnosis
  - input:
      total_fidelity: 0.899
    expect:
      action: diagnose
      priority: moderate
      route: relay_diagnosis
      reason: Short chain with low fidelity — identify the lossy hop
  - input:
      total_fidelity: 0.901
    expect:
      priority: low
      action: certify
      route: archive
      reason: Relay fidelity ≥90% — pipeline operating within tolerance
  - input: {}
    expect:
      route: relay_diagnosis
      action: diagnose
      priority: moderate
      reason: Short chain with low fidelity — identify the lossy hop
  - input:
      hop_count: 0
    expect:
      reason: Short chain with low fidelity — identify the lossy hop
      action: diagnose
      priority: moderate
      route: relay_diagnosis
  - input:
      hop_count: -1
    expect:
      action: diagnose
      route: relay_diagnosis
      reason: Short chain with low fidelity — identify the lossy hop
      priority: moderate
  - input:
      hop_count: 4
    expect:
      route: relay_diagnosis
      action: diagnose
      priority: moderate
      reason: Short chain with low fidelity — identify the lossy hop
  - input:
      hop_count: 6
    expect:
      action: optimize
      reason: 5+ hops with fidelity <90% — remove dead relays or merge stages
      priority: high
      route: relay_optimization
  - input:
      hop_count: 500
    expect:
      route: relay_optimization
      priority: high
      reason: 5+ hops with fidelity <90% — remove dead relays or merge stages
      action: optimize
  - input: {}
    expect:
      priority: moderate
      action: diagnose
      reason: Short chain with low fidelity — identify the lossy hop
      route: relay_diagnosis
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
