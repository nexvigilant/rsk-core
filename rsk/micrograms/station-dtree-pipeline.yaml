  expect:
    action: tune
    route: model_tuning
    priority: moderate
- input:
    train_test_gap: 0.099
  expect:
    route: model_tuning
    reason: Accuracy 60-95% — acceptable, hyperparameter tuning may improve
    priority: moderate
    action: tune
- input:
