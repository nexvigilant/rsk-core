# MICROGRAM++ (upgraded 2026-04-23)
name: ksb-benchmark-scorer
version: 0.1.0
description: "Scores an agent answer against a single KSB competency for NVG-ARP-BMK-001. Inputs: rubric-matched flag, citation count, structural completeness score. Outputs verdict pass/partial/fail + reason. Runs per (agent, competency) pair over the 1,796 KSB competencies."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: rubric_match
    type: string
    required: true
    description: full | substantial | partial | absent
  - name: citation_count
    type: integer
    required: true
    description: Number of authoritative citations the answer carries
  - name: structure_score
    type: integer
    required: true
    description: 0-100 structural completeness (method stated, evidence presented, limits acknowledged)
  - name: tier
    type: string
    required: true
    description: "KSB competency tier: foundational | intermediate | advanced | expert"
outputs:
  - name: verdict
    type: string
  - name: reason
    type: string
interface:
  inputs:
    rubric_match:
      type: string
      required: true
      description: full | substantial | partial | absent
    citation_count:
      type: integer
      required: true
      description: Number of authoritative citations the answer carries
    structure_score:
      type: integer
      required: true
      description: 0-100 structural completeness (method stated, evidence presented, limits acknowledged)
    tier:
      type: string
      required: true
      description: "KSB competency tier: foundational | intermediate | advanced | expert"
  outputs:
    verdict:
      type: string
    reason:
      type: string
ui:
  title: Ksb Benchmark Scorer
  subtitle: "Scores an agent answer against a single KSB competency for NVG-ARP-BMK-001. Inputs: rubric-matched flag, citation count, structural completeness score. Outputs verdict pass/partial/fail + reason. Runs per (agent, competency) pair over the 1,796 KSB competencies."
  icon: circle
  route: /vigilance/mg/ksb-benchmark-scorer
  steps:
    - field: rubric_match
      label: rubric match
      help: full | substantial | partial | absent
      widget: text
      placeholder: null
    - field: citation_count
      label: citation count
      help: Number of authoritative citations the answer carries
      widget: number
      placeholder: null
    - field: structure_score
      label: structure score
      help: 0-100 structural completeness (method stated, evidence presented, limits acknowledged)
      widget: number
      placeholder: null
    - field: tier
      label: tier
      help: "KSB competency tier: foundational | intermediate | advanced | expert"
      widget: text
      placeholder: null
  result:
    template: "verdict: {{verdict}} — reason: {{reason}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ksb-benchmark-scorer
  cli: rsk mcg run ksb-benchmark-scorer
  auth: none
  rate_limit: 600/min
tree:
  start: check_rubric
  nodes:
    check_rubric:
      type: condition
      variable: rubric_match
      operator: eq
      value: absent
      true_next: fail_absent
      false_next: check_partial_rubric
    check_partial_rubric:
      type: condition
      variable: rubric_match
      operator: eq
      value: partial
      true_next: check_partial_structure
      false_next: check_substantial
    check_substantial:
      type: condition
      variable: rubric_match
      operator: eq
      value: substantial
      true_next: check_substantial_floor
      false_next: check_full_match
    check_full_match:
      type: condition
      variable: rubric_match
      operator: eq
      value: full
      true_next: check_full_citations
      false_next: fail_bad_rubric_label
    check_full_citations:
      type: condition
      variable: citation_count
      operator: gte
      value: 2
      true_next: check_full_structure
      false_next: check_full_one_citation
    check_full_one_citation:
      type: condition
      variable: citation_count
      operator: eq
      value: 1
      true_next: check_full_structure_minimal
      false_next: fail_full_no_cite
    check_full_structure:
      type: condition
      variable: structure_score
      operator: gte
      value: 70
      true_next: pass_full
      false_next: partial_weak_structure
    check_full_structure_minimal:
      type: condition
      variable: structure_score
      operator: gte
      value: 80
      true_next: check_tier_gate_expert
      false_next: partial_one_citation_weak
    check_tier_gate_expert:
      type: condition
      variable: tier
      operator: eq
      value: expert
      true_next: partial_expert_needs_two
      false_next: pass_full
    check_substantial_floor:
      type: condition
      variable: citation_count
      operator: gte
      value: 1
      true_next: check_substantial_structure
      false_next: fail_substantial_no_cite
    check_substantial_structure:
      type: condition
      variable: structure_score
      operator: gte
      value: 60
      true_next: check_tier_partial_vs_pass
      false_next: partial_substantial_weak
    check_tier_partial_vs_pass:
      type: condition
      variable: tier
      operator: eq
      value: foundational
      true_next: pass_substantial_foundational
      false_next: partial_substantial_adv
    check_partial_structure:
      type: condition
      variable: structure_score
      operator: gte
      value: 40
      true_next: partial_rubric_ok_structure
      false_next: fail_partial_weak
    pass_full:
      type: return
      value:
        verdict: pass
        reason: full-rubric-sufficient-cites-strong-structure
    pass_substantial_foundational:
      type: return
      value:
        verdict: pass
        reason: substantial-rubric-foundational-tier
    partial_weak_structure:
      type: return
      value:
        verdict: partial
        reason: full-rubric-weak-structure
    partial_one_citation_weak:
      type: return
      value:
        verdict: partial
        reason: full-rubric-single-citation-weak-structure
    partial_expert_needs_two:
      type: return
      value:
        verdict: partial
        reason: expert-tier-requires-two-citations
    partial_substantial_adv:
      type: return
      value:
        verdict: partial
        reason: substantial-rubric-non-foundational-tier
    partial_substantial_weak:
      type: return
      value:
        verdict: partial
        reason: substantial-rubric-weak-structure
    partial_rubric_ok_structure:
      type: return
      value:
        verdict: partial
        reason: partial-rubric-ok-structure
    fail_absent:
      type: return
      value:
        verdict: fail
        reason: no-rubric-match
    fail_bad_rubric_label:
      type: return
      value:
        verdict: fail
        reason: unrecognized-rubric-label
    fail_full_no_cite:
      type: return
      value:
        verdict: fail
        reason: full-rubric-zero-citations
    fail_substantial_no_cite:
      type: return
      value:
        verdict: fail
        reason: substantial-rubric-zero-citations
    fail_partial_weak:
      type: return
      value:
        verdict: fail
        reason: partial-rubric-weak-structure
tests:
  - name: full_match_expert_two_cites_strong_structure_pass
    input:
      rubric_match: full
      citation_count: 2
      structure_score: 90
      tier: expert
    expect:
      verdict: pass
      reason: full-rubric-sufficient-cites-strong-structure
  - name: full_match_intermediate_one_cite_strong_structure_pass
    input:
      rubric_match: full
      citation_count: 1
      structure_score: 85
      tier: intermediate
    expect:
      verdict: pass
      reason: full-rubric-sufficient-cites-strong-structure
  - name: full_match_expert_one_cite_partial_due_to_tier
    input:
      rubric_match: full
      citation_count: 1
      structure_score: 90
      tier: expert
    expect:
      verdict: partial
      reason: expert-tier-requires-two-citations
  - name: full_match_weak_structure_partial
    input:
      rubric_match: full
      citation_count: 3
      structure_score: 55
      tier: advanced
    expect:
      verdict: partial
      reason: full-rubric-weak-structure
  - name: full_match_no_cite_fail
    input:
      rubric_match: full
      citation_count: 0
      structure_score: 90
      tier: advanced
    expect:
      verdict: fail
      reason: full-rubric-zero-citations
  - name: full_match_one_cite_weak_structure_partial
    input:
      rubric_match: full
      citation_count: 1
      structure_score: 70
      tier: intermediate
    expect:
      verdict: partial
      reason: full-rubric-single-citation-weak-structure
  - name: substantial_foundational_one_cite_pass
    input:
      rubric_match: substantial
      citation_count: 1
      structure_score: 70
      tier: foundational
    expect:
      verdict: pass
      reason: substantial-rubric-foundational-tier
  - name: substantial_advanced_one_cite_partial
    input:
      rubric_match: substantial
      citation_count: 1
      structure_score: 70
      tier: advanced
    expect:
      verdict: partial
      reason: substantial-rubric-non-foundational-tier
  - name: substantial_no_cite_fail
    input:
      rubric_match: substantial
      citation_count: 0
      structure_score: 90
      tier: foundational
    expect:
      verdict: fail
      reason: substantial-rubric-zero-citations
  - name: substantial_weak_structure_partial
    input:
      rubric_match: substantial
      citation_count: 2
      structure_score: 40
      tier: intermediate
    expect:
      verdict: partial
      reason: substantial-rubric-weak-structure
  - name: partial_rubric_ok_structure
    input:
      rubric_match: partial
      citation_count: 0
      structure_score: 50
      tier: foundational
    expect:
      verdict: partial
      reason: partial-rubric-ok-structure
  - name: partial_rubric_weak_structure_fail
    input:
      rubric_match: partial
      citation_count: 0
      structure_score: 20
      tier: foundational
    expect:
      verdict: fail
      reason: partial-rubric-weak-structure
  - name: absent_rubric_fail_regardless
    input:
      rubric_match: absent
      citation_count: 10
      structure_score: 100
      tier: expert
    expect:
      verdict: fail
      reason: no-rubric-match
  - name: unrecognized_rubric_label_fails
    input:
      rubric_match: unknown
      citation_count: 1
      structure_score: 80
      tier: foundational
    expect:
      verdict: fail
      reason: unrecognized-rubric-label
  - name: full_foundational_two_cites_pass
    input:
      rubric_match: full
      citation_count: 2
      structure_score: 75
      tier: foundational
    expect:
      verdict: pass
      reason: full-rubric-sufficient-cites-strong-structure
  - name: substantial_expert_two_cites_partial
    input:
      rubric_match: substantial
      citation_count: 2
      structure_score: 80
      tier: expert
    expect:
      verdict: partial
      reason: substantial-rubric-non-foundational-tier
  - name: partial_rubric_zero_structure_fail
    input:
      rubric_match: partial
      citation_count: 3
      structure_score: 10
      tier: advanced
    expect:
      verdict: fail
      reason: partial-rubric-weak-structure
  - name: boundary_full_structure_exactly_70_pass
    input:
      rubric_match: full
      citation_count: 2
      structure_score: 70
      tier: advanced
    expect:
      verdict: pass
      reason: full-rubric-sufficient-cites-strong-structure
  - name: boundary_full_one_cite_structure_80_intermediate_pass
    input:
      rubric_match: full
      citation_count: 1
      structure_score: 80
      tier: intermediate
    expect:
      verdict: pass
      reason: full-rubric-sufficient-cites-strong-structure
  - name: boundary_substantial_structure_exactly_60_foundational_pass
    input:
      rubric_match: substantial
      citation_count: 1
      structure_score: 60
      tier: foundational
    expect:
      verdict: pass
      reason: substantial-rubric-foundational-tier
  - name: boundary_partial_structure_exactly_40_partial
    input:
      rubric_match: partial
      citation_count: 0
      structure_score: 40
      tier: intermediate
    expect:
      verdict: partial
      reason: partial-rubric-ok-structure
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - verdict
    - reason
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
