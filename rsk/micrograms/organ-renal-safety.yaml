# MICROGRAM++ (upgraded 2026-04-23)
name: organ-renal-safety
version: 0.1.0
description: Renal (kidney) safety assessment. Evaluates nephrotoxic drug risk based on GFR and serum creatinine.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Organ Renal Safety
  subtitle: Renal (kidney) safety assessment. Evaluates nephrotoxic drug risk based on GFR and serum creatinine.
  icon: circle
  route: /vigilance/mg/organ-renal-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/organ-renal-safety
  cli: rsk mcg run organ-renal-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_baseline_creatinine
  nodes:
    check_baseline_creatinine:
      type: condition
      variable: baseline_creatinine_mg_dl
      operator: gte
      value: 3
      true_next: severe_renal_impairment
      false_next: check_egfr
    severe_renal_impairment:
      type: return
      value:
        organ: kidney
        risk_level: critical
        contraindication: true
        message: Severe renal failure; nephrotoxic drugs contraindicated
    check_egfr:
      type: condition
      variable: egfr_ml_min
      operator: lt
      value: 30
      true_next: moderate_renal_impairment
      false_next: mild_renal_impairment
    moderate_renal_impairment:
      type: return
      value:
        organ: kidney
        risk_level: high
        dose_adjustment: required
        message: eGFR 15-29; significant dose reduction required
    mild_renal_impairment:
      type: return
      value:
        organ: kidney
        risk_level: moderate
        dose_adjustment: may_be_needed
        message: eGFR 30-60; monitor and consider dose adjustment
tests:
  - input:
      baseline_creatinine_mg_dl: 3.5
      egfr_ml_min: 10
    expect:
      organ: kidney
      risk_level: critical
      contraindication: true
  - input:
      baseline_creatinine_mg_dl: 2
      egfr_ml_min: 25
    expect:
      organ: kidney
      risk_level: high
      dose_adjustment: required
  - input:
      baseline_creatinine_mg_dl: 1.2
      egfr_ml_min: 50
    expect:
      organ: kidney
      risk_level: moderate
  - input:
      baseline_creatinine_mg_dl: 0.9
      egfr_ml_min: 100
    expect:
      organ: kidney
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
