# MICROGRAM++ (upgraded 2026-04-23)
name: station-stoichiometry-pipeline
version: 0.1.0
description: "Route stoichiometric analysis: balance verification and isomer detection"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Stoichiometry Pipeline
  subtitle: "Route stoichiometric analysis: balance verification and isomer detection"
  icon: circle
  route: /vigilance/mg/station-stoichiometry-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-stoichiometry-pipeline
  cli: rsk mcg run station-stoichiometry-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_balanced
  nodes:
    check_isomer:
      type: condition
      variable: has_isomers
      operator: eq
      value: true
      true_next: isomer_alert
      false_next: clean
    check_balanced:
      type: condition
      variable: is_balanced
      operator: eq
      value: true
      true_next: check_isomer
      false_next: unbalanced
    unbalanced:
      type: return
      value:
        route: chemistry_review
        reason: Unbalanced formula — stoichiometric error in reaction
        action: reject
        priority: high
    clean:
      type: return
      value:
        priority: low
        route: archive
        action: pass
        reason: Balanced, no isomer ambiguity — proceed
    isomer_alert:
      type: return
      value:
        route: isomer_review
        priority: moderate
        action: flag
        reason: Isomers detected — verify correct stereoisomer for safety profile
tests:
  - input:
      has_isomers: false
      is_balanced: false
    expect:
      action: reject
      priority: high
      route: chemistry_review
  - input:
      has_isomers: true
      is_balanced: true
    expect:
      action: flag
      priority: moderate
      route: isomer_review
  - input:
      has_isomers: false
      is_balanced: true
    expect:
      priority: low
      route: archive
      action: pass
  - input: {}
    expect:
      route: chemistry_review
      reason: Unbalanced formula — stoichiometric error in reaction
      action: reject
      priority: high
  - input: {}
    expect:
      priority: high
      route: chemistry_review
      reason: Unbalanced formula — stoichiometric error in reaction
      action: reject
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
