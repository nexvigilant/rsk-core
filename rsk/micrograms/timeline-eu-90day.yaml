# MICROGRAM++ (upgraded 2026-04-23)
name: timeline-eu-90day
version: 0.1.0
description: EU 90-day periodic
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Timeline Eu 90day
  subtitle: EU 90-day periodic
  icon: circle
  route: /vigilance/mg/timeline-eu-90day
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/timeline-eu-90day
  cli: rsk mcg run timeline-eu-90day
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    not_due:
      type: return
      value:
        report_type: periodic
        jurisdiction: EU
        due: false
        action: schedule
    check:
      type: condition
      variable: days_to_deadline
      operator: lte
      value: 90
      true_next: due
      false_next: not_due
    due:
      type: return
      value:
        report_type: periodic
        jurisdiction: EU
        due: true
        action: submit
tests:
  - input:
      days_to_deadline: 90
    expect:
      due: true
      jurisdiction: EU
  - input: {}
    expect:
      due: false
      jurisdiction: EU
  - input:
      days_to_deadline: 0
    expect:
      jurisdiction: EU
      due: true
      report_type: periodic
      action: submit
  - input:
      days_to_deadline: -1
    expect:
      report_type: periodic
      due: true
      action: submit
      jurisdiction: EU
  - input:
      days_to_deadline: 89
    expect:
      due: true
      action: submit
      report_type: periodic
      jurisdiction: EU
  - input:
      days_to_deadline: 91
    expect:
      due: false
      jurisdiction: EU
      action: schedule
      report_type: periodic
  - input:
      days_to_deadline: 9000
    expect:
      action: schedule
      jurisdiction: EU
      report_type: periodic
      due: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
