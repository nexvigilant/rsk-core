# MICROGRAM++ (upgraded 2026-04-23)
name: pharma-competitive-rank
version: 0.1.0
description: Classifies a company's competitive position in FAERS relative to a named competitor. Accepts a pre-computed relative_ratio (total_reports / competitor_total_reports) and applies threshold comparisons to assign dominant, peer, or minor reporter status.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: total_reports
    type: int
    required: false
    description: ""
  - name: competitor_total_reports
    type: int
    required: false
    description: ""
  - name: relative_ratio
    type: float
    required: false
    description: ""
outputs:
  - name: competitive_position
    type: string
  - name: interpretation
    type: string
interface:
  inputs:
    total_reports:
      type: int
      required: false
    competitor_total_reports:
      type: int
      required: false
    relative_ratio:
      type: float
      required: false
  outputs:
    competitive_position:
      type: string
    interpretation:
      type: string
ui:
  title: Pharma Competitive Rank
  subtitle: Classifies a company's competitive position in FAERS relative to a named competitor. Accepts a pre-computed relative_ratio (total_reports / competitor_total_reports) and applies threshold comparisons to assign dominant, peer, or minor reporter status.
  icon: circle
  route: /vigilance/mg/pharma-competitive-rank
  steps:
    - field: total_reports
      label: total reports
      help: Enter total_reports
      widget: text
      placeholder: null
    - field: competitor_total_reports
      label: competitor total reports
      help: Enter competitor_total_reports
      widget: text
      placeholder: null
    - field: relative_ratio
      label: relative ratio
      help: Enter relative_ratio
      widget: text
      placeholder: null
  result:
    template: "competitive_position: {{competitive_position}} — interpretation: {{interpretation}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pharma-competitive-rank
  cli: rsk mcg run pharma-competitive-rank
  auth: none
  rate_limit: 600/min
tree:
  start: check_dominant
  nodes:
    check_dominant:
      type: condition
      variable: relative_ratio
      operator: gte
      value: 3
      true_next: return_dominant
      false_next: check_peer
    check_peer:
      type: condition
      variable: relative_ratio
      operator: gte
      value: 1
      true_next: return_peer
      false_next: return_minor
    return_dominant:
      type: return
      value:
        competitive_position: dominant_reporter
        interpretation: Company has 3x or more FAERS reports than the named competitor — likely reflects greater market share, longer product history, or broader indication coverage.
    return_peer:
      type: return
      value:
        competitive_position: peer_reporter
        interpretation: Company reports at comparable or higher volume than the competitor — similar safety data density, warranting head-to-head signal comparison.
    return_minor:
      type: return
      value:
        competitive_position: minor_reporter
        interpretation: Company reports at lower volume than the competitor — may reflect smaller market share, newer products, or under-reporting relative to competitor baseline.
tests:
  - name: Dominant reporter — 5x competitor volume
    input:
      total_reports: 500000
      competitor_total_reports: 100000
      relative_ratio: 5
    expect:
      competitive_position: dominant_reporter
  - name: Dominant reporter — exactly 3x
    input:
      total_reports: 300000
      competitor_total_reports: 100000
      relative_ratio: 3
    expect:
      competitive_position: dominant_reporter
  - name: Peer reporter — exactly 1x (equal volume)
    input:
      total_reports: 100000
      competitor_total_reports: 100000
      relative_ratio: 1
    expect:
      competitive_position: peer_reporter
  - name: Peer reporter — 2x competitor
    input:
      total_reports: 200000
      competitor_total_reports: 100000
      relative_ratio: 2
    expect:
      competitive_position: peer_reporter
  - name: Minor reporter — below competitor volume
    input:
      total_reports: 40000
      competitor_total_reports: 100000
      relative_ratio: 0.4
    expect:
      competitive_position: minor_reporter
  - name: Minor reporter — just below 1x threshold
    input:
      total_reports: 99000
      competitor_total_reports: 100000
      relative_ratio: 0.99
    expect:
      competitive_position: minor_reporter
  - name: Null input safety — defaults to minor reporter
    input: {}
    expect:
      competitive_position: minor_reporter
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - competitive_position
    - interpretation
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
