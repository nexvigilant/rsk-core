# MICROGRAM++ (upgraded 2026-04-23)
name: fda-qtc-risk-classification
version: 0.1.0
description: "FDA QTc prolongation risk classification: routes by QTc change magnitude to risk category and labeling action per ICH E14 (2017 R3) and FDA Guidance 'QTc Information in Prescription Drug Labeling' (2025)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: qtc_change_ms
    type: int
    required: true
    description: Mean QTc change from baseline in milliseconds
  - name: upper_ci_exceeds_10
    type: bool
    required: false
    description: Whether the upper bound of 90% CI exceeds 10 ms
  - name: torsade_observed
    type: bool
    required: false
    description: Whether Torsade de Pointes has been observed
  - name: concentration_response
    type: bool
    required: false
    description: Whether concentration-response analysis was performed per E14 R3
outputs:
  - name: risk_category
    type: string
  - name: labeling_action
    type: string
  - name: thorough_qt_required
    type: bool
  - name: regulatory_reference
    type: string
interface:
  inputs:
    qtc_change_ms:
      type: int
      required: true
      description: Mean QTc change from baseline in milliseconds
    upper_ci_exceeds_10:
      type: bool
      required: false
      description: Whether the upper bound of 90% CI exceeds 10 ms
    torsade_observed:
      type: bool
      required: false
      description: Whether Torsade de Pointes has been observed
    concentration_response:
      type: bool
      required: false
      description: Whether concentration-response analysis was performed per E14 R3
  outputs:
    risk_category:
      type: string
    labeling_action:
      type: string
    thorough_qt_required:
      type: bool
    regulatory_reference:
      type: string
ui:
  title: Fda Qtc Risk Classification
  subtitle: "FDA QTc prolongation risk classification: routes by QTc change magnitude to risk category and labeling action per ICH E14 (2017 R3) and FDA Guidance 'QTc Information in Prescription Drug Labeling' (2025)"
  icon: circle
  route: /vigilance/mg/fda-qtc-risk-classification
  steps:
    - field: qtc_change_ms
      label: qtc change ms
      help: Mean QTc change from baseline in milliseconds
      widget: text
      placeholder: null
    - field: upper_ci_exceeds_10
      label: upper ci exceeds 10
      help: Whether the upper bound of 90% CI exceeds 10 ms
      widget: toggle
      placeholder: null
    - field: torsade_observed
      label: torsade observed
      help: Whether Torsade de Pointes has been observed
      widget: toggle
      placeholder: null
    - field: concentration_response
      label: concentration response
      help: Whether concentration-response analysis was performed per E14 R3
      widget: toggle
      placeholder: null
  result:
    template: "risk_category: {{risk_category}} — labeling_action: {{labeling_action}} — thorough_qt_required: {{thorough_qt_required}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/fda-qtc-risk-classification
  cli: rsk mcg run fda-qtc-risk-classification
  auth: none
  rate_limit: 600/min
tree:
  start: check_torsade
  nodes:
    check_torsade:
      type: condition
      variable: torsade_observed
      operator: eq
      value: true
      true_next: torsade_positive
      false_next: check_qtc_high
    check_qtc_high:
      type: condition
      variable: qtc_change_ms
      operator: gte
      value: 20
      true_next: high_risk
      false_next: check_qtc_moderate
    check_qtc_moderate:
      type: condition
      variable: qtc_change_ms
      operator: gte
      value: 10
      true_next: moderate_risk
      false_next: check_qtc_borderline
    check_qtc_borderline:
      type: condition
      variable: qtc_change_ms
      operator: gte
      value: 5
      true_next: check_ci_borderline
      false_next: check_negative
    check_ci_borderline:
      type: condition
      variable: upper_ci_exceeds_10
      operator: eq
      value: true
      true_next: borderline_positive
      false_next: borderline_negative
    check_negative:
      type: condition
      variable: qtc_change_ms
      operator: lt
      value: 5
      true_next: negative_study
      false_next: borderline_negative
    torsade_positive:
      type: return
      value:
        risk_category: HIGH_PROARRHYTHMIC_RISK
        labeling_action: Boxed warning for QTc prolongation and Torsade de Pointes; contraindication with other QT-prolonging drugs; ECG monitoring required
        thorough_qt_required: false
        regulatory_reference: ICH E14 R3 (2017); FDA QTc Labeling Guidance (2025); 21 CFR 201.57(c)(1)
    high_risk:
      type: return
      value:
        risk_category: HIGH_QTC_RISK
        labeling_action: "Warnings and Precautions: QTc prolongation >20 ms; contraindication with strong QT prolongers; ECG monitoring recommended; avoid in patients with congenital long QT"
        thorough_qt_required: false
        regulatory_reference: ICH E14 R3 (2017), Section 2.2; FDA QTc Labeling Guidance (2025)
    moderate_risk:
      type: return
      value:
        risk_category: MODERATE_QTC_RISK
        labeling_action: "Warnings and Precautions: clinically relevant QTc prolongation; caution with concomitant QT-prolonging drugs; correct electrolytes before use"
        thorough_qt_required: false
        regulatory_reference: ICH E14 R3 (2017), Section 2.2; FDA QTc Labeling Guidance (2025)
    borderline_positive:
      type: return
      value:
        risk_category: BORDERLINE_QTC_RISK
        labeling_action: "Clinical Pharmacology section: QTc effect noted; Warnings if other risk factors present; concentration-response analysis recommended"
        thorough_qt_required: true
        regulatory_reference: ICH E14 R3 (2017), Section 3; FDA QTc Labeling Guidance (2025)
    borderline_negative:
      type: return
      value:
        risk_category: LOW_QTC_RISK
        labeling_action: "Clinical Pharmacology section: state QTc effect; no Warnings section language required"
        thorough_qt_required: false
        regulatory_reference: ICH E14 R3 (2017), Section 3; FDA QTc Labeling Guidance (2025)
    negative_study:
      type: return
      value:
        risk_category: NEGATIVE_QTC_STUDY
        labeling_action: "Clinical Pharmacology: state negative TQT result; no QTc-related warnings"
        thorough_qt_required: false
        regulatory_reference: ICH E14 R3 (2017), Section 2.1; FDA QTc Labeling Guidance (2025)
tests:
  - input:
      qtc_change_ms: 15
      torsade_observed: true
    expect:
      risk_category: HIGH_PROARRHYTHMIC_RISK
  - input:
      qtc_change_ms: 25
      torsade_observed: false
    expect:
      risk_category: HIGH_QTC_RISK
  - input:
      qtc_change_ms: 12
      torsade_observed: false
    expect:
      risk_category: MODERATE_QTC_RISK
  - input:
      qtc_change_ms: 7
      upper_ci_exceeds_10: true
      torsade_observed: false
    expect:
      risk_category: BORDERLINE_QTC_RISK
      thorough_qt_required: true
  - input:
      qtc_change_ms: 6
      upper_ci_exceeds_10: false
      torsade_observed: false
    expect:
      risk_category: LOW_QTC_RISK
  - input:
      qtc_change_ms: 3
      torsade_observed: false
    expect:
      risk_category: NEGATIVE_QTC_STUDY
  - input:
      qtc_change_ms: 10
      torsade_observed: false
    expect:
      risk_category: MODERATE_QTC_RISK
  - input:
      qtc_change_ms: 20
      torsade_observed: false
    expect:
      risk_category: HIGH_QTC_RISK
  - input: {}
    expect:
      risk_category: LOW_QTC_RISK
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - risk_category
    - labeling_action
    - thorough_qt_required
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
