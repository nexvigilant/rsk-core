interface:
  inputs:
    headroom_pct:
      type: int
      required: true
    prune_cache:
      type: bool
      required: false
  outputs:
    score:
      type: int
      required: true
    resource_action:
      type: string
      required: true
    status:
      type: string
      required: true
    severity:
      type: string
      required: true
  aliases: {}
