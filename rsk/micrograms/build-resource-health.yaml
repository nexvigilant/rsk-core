name: build-resource-health
description: Translates build resource metrics (headroom, cache state) into system health status and severity. Bridges build-memory-gate and build-flywheel-chain outputs into health-traffic-classifier and severity-tier inputs.
version: 0.1.0
tree:
  start: check_headroom_critical
  nodes:
    healthy_needs_maintenance:
      type: return
      value:
        severity: LOW
        status: GREEN
        score: 75
        resource_action: Resources adequate but cache prune recommended
    healthy_resources:
      type: return
      value:
        severity: LOW
        resource_action: Resources healthy — full parallel build capacity available
        status: GREEN
        score: 90
    moderate_resources:
      type: return
      value:
        status: YELLOW
        severity: MODERATE
        score: 55
        resource_action: Monitor memory usage — consider sequential builds for heavy crates
    low_with_prune:
      type: return
      value:
        score: 25
        resource_action: Prune build cache and reduce parallel jobs immediately
        status: RED
        severity: HIGH
    check_prune_needed:
      type: condition
      variable: prune_cache
      operator: eq
      value: true
      true_next: low_with_prune
      false_next: low_resources
    check_headroom_low:
      type: condition
      variable: headroom_pct
      operator: lt
      value: 25
      true_next: check_prune_needed
      false_next: check_headroom_moderate
    check_headroom_critical:
      type: condition
      variable: headroom_pct
      operator: lt
      value: 10
      true_next: critical_resources
      false_next: check_headroom_low
    critical_resources:
      type: return
      value:
        severity: CRITICAL
        score: 10
        status: RED
        resource_action: Halt non-essential builds — memory critically low
    check_headroom_moderate:
      type: condition
      variable: headroom_pct
      operator: lt
      value: 50
      true_next: moderate_resources
      false_next: check_healthy_prune
    low_resources:
      type: return
      value:
        severity: HIGH
        score: 30
        status: YELLOW
        resource_action: Reduce build parallelism — approaching memory limits
    check_healthy_prune:
      type: condition
      variable: prune_cache
      operator: eq
      value: true
      true_next: healthy_needs_maintenance
      false_next: healthy_resources
tests:
- input:
    headroom_pct: 5
    prune_cache: false
  expect:
    severity: CRITICAL
    status: RED
    score: 10
- input:
    headroom_pct: 15
    prune_cache: true
  expect:
    status: RED
    severity: HIGH
    score: 25
- input:
    prune_cache: false
    headroom_pct: 20
  expect:
    status: YELLOW
    severity: HIGH
    score: 30
- input:
    prune_cache: false
    headroom_pct: 40
  expect:
    severity: MODERATE
    status: YELLOW
    score: 55
- input:
    prune_cache: true
    headroom_pct: 60
  expect:
    score: 75
    severity: LOW
    status: GREEN
- input:
    prune_cache: false
    headroom_pct: 80
  expect:
    severity: LOW
    status: GREEN
    score: 90
- input:
    headroom_pct: 0
    prune_cache: true
  expect:
    severity: CRITICAL
    status: RED
    score: 10
- input:
    headroom_pct: 100
    prune_cache: false
  expect:
    status: GREEN
    severity: LOW
    score: 90
- input: {}
  expect:
    resource_action: Resources healthy — full parallel build capacity available
    status: GREEN
    severity: LOW
    score: 90
- input:
    headroom_pct: -1
  expect:
    score: 10
    status: RED
    resource_action: Halt non-essential builds — memory critically low
    severity: CRITICAL
- input:
    headroom_pct: 24
  expect:
    status: YELLOW
    severity: HIGH
    resource_action: Reduce build parallelism — approaching memory limits
    score: 30
- input:
    headroom_pct: 26
  expect:
    score: 55
    status: YELLOW
    severity: MODERATE
    resource_action: Monitor memory usage — consider sequential builds for heavy crates
- input:
    headroom_pct: 2500
  expect:
    severity: LOW
    score: 90
    resource_action: Resources healthy — full parallel build capacity available
    status: GREEN
- input: {}
  expect:
    severity: LOW
    status: GREEN
    score: 90
    resource_action: Resources healthy — full parallel build capacity available
- input:
    headroom_pct: -1
  expect:
    score: 10
    severity: CRITICAL
    resource_action: Halt non-essential builds — memory critically low
    status: RED
- input:
    headroom_pct: 9
  expect:
    score: 10
    resource_action: Halt non-essential builds — memory critically low
    severity: CRITICAL
    status: RED
- input:
    headroom_pct: 11
  expect:
    status: YELLOW
    severity: HIGH
    score: 30
    resource_action: Reduce build parallelism — approaching memory limits
- input:
    headroom_pct: 1000
  expect:
    severity: LOW
    score: 90
    resource_action: Resources healthy — full parallel build capacity available
    status: GREEN
- input: {}
  expect:
    resource_action: Resources healthy — full parallel build capacity available
    severity: LOW
    score: 90
    status: GREEN
- input:
    headroom_pct: -1
  expect:
    severity: CRITICAL
    resource_action: Halt non-essential builds — memory critically low
    score: 10
    status: RED
- input:
    headroom_pct: 49
  expect:
    score: 55
    status: YELLOW
    resource_action: Monitor memory usage — consider sequential builds for heavy crates
    severity: MODERATE
- input:
    headroom_pct: 51
  expect:
    resource_action: Resources healthy — full parallel build capacity available
    status: GREEN
    severity: LOW
    score: 90
- input:
    headroom_pct: 5000
  expect:
