# MICROGRAM++ (upgraded 2026-04-23)
name: e2e-risk-categorization
version: 0.1.0
description: "ICH E2E Section 3: Categorizes safety concerns into the three E2E risk categories — identified risk, potential risk, or missing information"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: evidence_level
    type: string
    required: true
    description: ""
  - name: cases
    type: integer
    required: false
    description: ""
  - name: population_exposed
    type: bool
    required: false
    description: ""
outputs:
  - name: risk_category
    type: string
  - name: action
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    evidence_level:
      type: string
      required: true
    cases:
      type: integer
      required: false
    population_exposed:
      type: bool
      required: false
  outputs:
    risk_category:
      type: string
    action:
      type: string
    regulatory_reference:
      type: string
ui:
  title: E2e Risk Categorization
  subtitle: "ICH E2E Section 3: Categorizes safety concerns into the three E2E risk categories — identified risk, potential risk, or missing information"
  icon: circle
  route: /vigilance/mg/e2e-risk-categorization
  steps:
    - field: evidence_level
      label: evidence level
      help: Enter evidence_level
      widget: text
      placeholder: null
    - field: cases
      label: cases
      help: Enter cases
      widget: number
      placeholder: null
    - field: population_exposed
      label: population exposed
      help: Enter population_exposed
      widget: toggle
      placeholder: null
  result:
    template: "risk_category: {{risk_category}} — action: {{action}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/e2e-risk-categorization
  cli: rsk mcg run e2e-risk-categorization
  auth: none
  rate_limit: 600/min
tree:
  start: check_refuted
  nodes:
    check_refuted:
      type: condition
      variable: evidence_level
      operator: eq
      value: refuted
      true_next: result_none
      false_next: check_confirmed
    check_confirmed:
      type: condition
      variable: evidence_level
      operator: eq
      value: confirmed
      true_next: check_cases
      false_next: check_theoretical
    check_cases:
      type: condition
      variable: cases
      operator: gt
      value: 0
      true_next: result_identified
      false_next: result_identified_no_cases
    check_theoretical:
      type: condition
      variable: evidence_level
      operator: eq
      value: theoretical
      true_next: result_potential
      false_next: check_nonclinical
    check_nonclinical:
      type: condition
      variable: evidence_level
      operator: eq
      value: nonclinical_signal
      true_next: result_potential
      false_next: check_no_data
    check_no_data:
      type: condition
      variable: evidence_level
      operator: eq
      value: no_data
      true_next: check_population_exposed
      false_next: result_unknown
    check_population_exposed:
      type: condition
      variable: population_exposed
      operator: eq
      value: true
      true_next: result_missing_collect
      false_next: result_missing_plan
    result_none:
      type: return
      value:
        risk_category: NONE
        action: close_signal
        regulatory_reference: ICH E2E Section 3 - Safety Specification
    result_identified:
      type: return
      value:
        risk_category: IDENTIFIED_RISK
        action: characterize_and_minimize
        regulatory_reference: ICH E2E Section 3 - Safety Specification
    result_identified_no_cases:
      type: return
      value:
        risk_category: IDENTIFIED_RISK
        action: characterize_and_minimize
        regulatory_reference: ICH E2E Section 3 - Safety Specification
    result_potential:
      type: return
      value:
        risk_category: POTENTIAL_RISK
        action: investigate_further
        regulatory_reference: ICH E2E Section 3 - Safety Specification
    result_missing_collect:
      type: return
      value:
        risk_category: MISSING_INFORMATION
        action: collect_data
        regulatory_reference: ICH E2E Section 3 - Safety Specification
    result_missing_plan:
      type: return
      value:
        risk_category: MISSING_INFORMATION
        action: plan_study
        regulatory_reference: ICH E2E Section 3 - Safety Specification
    result_unknown:
      type: return
      value:
        risk_category: NONE
        action: close_signal
        regulatory_reference: ICH E2E Section 3 - Safety Specification
tests:
  - input:
      evidence_level: confirmed
      cases: 15
      population_exposed: true
    expect:
      risk_category: IDENTIFIED_RISK
      action: characterize_and_minimize
      regulatory_reference: ICH E2E Section 3 - Safety Specification
  - input:
      evidence_level: confirmed
      cases: 0
      population_exposed: true
    expect:
      risk_category: IDENTIFIED_RISK
      action: characterize_and_minimize
      regulatory_reference: ICH E2E Section 3 - Safety Specification
  - input:
      evidence_level: theoretical
      cases: 0
      population_exposed: false
    expect:
      risk_category: POTENTIAL_RISK
      action: investigate_further
      regulatory_reference: ICH E2E Section 3 - Safety Specification
  - input:
      evidence_level: nonclinical_signal
      cases: 0
      population_exposed: false
    expect:
      risk_category: POTENTIAL_RISK
      action: investigate_further
      regulatory_reference: ICH E2E Section 3 - Safety Specification
  - input:
      evidence_level: no_data
      cases: 0
      population_exposed: true
    expect:
      risk_category: MISSING_INFORMATION
      action: collect_data
      regulatory_reference: ICH E2E Section 3 - Safety Specification
  - input:
      evidence_level: no_data
      cases: 0
      population_exposed: false
    expect:
      risk_category: MISSING_INFORMATION
      action: plan_study
      regulatory_reference: ICH E2E Section 3 - Safety Specification
  - input:
      evidence_level: refuted
      cases: 5
      population_exposed: true
    expect:
      risk_category: NONE
      action: close_signal
      regulatory_reference: ICH E2E Section 3 - Safety Specification
  - input: {}
    expect:
      risk_category: NONE
      action: close_signal
      regulatory_reference: ICH E2E Section 3 - Safety Specification
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - risk_category
    - action
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
