# MICROGRAM++ (upgraded 2026-04-23)
name: fda-postmarket-study-type
version: 0.1.0
description: "FDA postmarketing study obligation router: classifies PMR vs PMC and determines study type per FDA Guidance 'Annual Status Report for PMRs and PMCs' (2023) and 21 CFR 314.81"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: obligation_type
    type: string
    required: true
    description: "Type of obligation: pmr_safety, pmr_efficacy, pmr_clinical_pharmacology, pmc_safety, pmc_other"
  - name: study_status
    type: string
    required: true
    description: "Current status: pending, ongoing, submitted, fulfilled, released, delayed"
  - name: overdue
    type: bool
    required: false
    description: Whether the study is past its agreed-upon milestone date
outputs:
  - name: report_form
    type: string
  - name: enforcement_action
    type: string
  - name: status_code
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    obligation_type:
      type: string
      required: true
      description: "Type of obligation: pmr_safety, pmr_efficacy, pmr_clinical_pharmacology, pmc_safety, pmc_other"
    study_status:
      type: string
      required: true
      description: "Current status: pending, ongoing, submitted, fulfilled, released, delayed"
    overdue:
      type: bool
      required: false
      description: Whether the study is past its agreed-upon milestone date
  outputs:
    report_form:
      type: string
    enforcement_action:
      type: string
    status_code:
      type: string
    regulatory_reference:
      type: string
ui:
  title: Fda Postmarket Study Type
  subtitle: "FDA postmarketing study obligation router: classifies PMR vs PMC and determines study type per FDA Guidance 'Annual Status Report for PMRs and PMCs' (2023) and 21 CFR 314.81"
  icon: circle
  route: /vigilance/mg/fda-postmarket-study-type
  steps:
    - field: obligation_type
      label: obligation type
      help: "Type of obligation: pmr_safety, pmr_efficacy, pmr_clinical_pharmacology, pmc_safety, pmc_other"
      widget: text
      placeholder: null
    - field: study_status
      label: study status
      help: "Current status: pending, ongoing, submitted, fulfilled, released, delayed"
      widget: text
      placeholder: null
    - field: overdue
      label: overdue
      help: Whether the study is past its agreed-upon milestone date
      widget: toggle
      placeholder: null
  result:
    template: "report_form: {{report_form}} — enforcement_action: {{enforcement_action}} — status_code: {{status_code}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/fda-postmarket-study-type
  cli: rsk mcg run fda-postmarket-study-type
  auth: none
  rate_limit: 600/min
tree:
  start: check_obligation
  nodes:
    check_obligation:
      type: condition
      variable: obligation_type
      operator: eq
      value: pmr_safety
      true_next: pmr_status_check
      false_next: check_pmr_efficacy
    check_pmr_efficacy:
      type: condition
      variable: obligation_type
      operator: eq
      value: pmr_efficacy
      true_next: pmr_status_check
      false_next: check_pmr_cp
    check_pmr_cp:
      type: condition
      variable: obligation_type
      operator: eq
      value: pmr_clinical_pharmacology
      true_next: pmr_status_check
      false_next: pmc_status_check
    pmr_status_check:
      type: condition
      variable: study_status
      operator: eq
      value: fulfilled
      true_next: pmr_fulfilled
      false_next: pmr_check_submitted
    pmr_check_submitted:
      type: condition
      variable: study_status
      operator: eq
      value: submitted
      true_next: pmr_submitted
      false_next: pmr_check_ongoing
    pmr_check_ongoing:
      type: condition
      variable: study_status
      operator: eq
      value: ongoing
      true_next: pmr_check_overdue
      false_next: pmr_check_delayed
    pmr_check_delayed:
      type: condition
      variable: study_status
      operator: eq
      value: delayed
      true_next: pmr_delayed
      false_next: pmr_pending
    pmr_check_overdue:
      type: condition
      variable: overdue
      operator: eq
      value: true
      true_next: pmr_overdue
      false_next: pmr_on_track
    pmr_fulfilled:
      type: return
      value:
        report_form: FDA Form 3988 — Final Status Report
        enforcement_action: NONE — obligation complete
        status_code: F
        regulatory_reference: FDA PMR/PMC Annual Status Report Guidance (2023), Section III.B; 21 CFR 314.81(b)(2)(vii)
    pmr_submitted:
      type: return
      value:
        report_form: FDA Form 3988 — Study Report Submitted
        enforcement_action: Awaiting FDA review. No enforcement action.
        status_code: S
        regulatory_reference: FDA PMR/PMC Annual Status Report Guidance (2023), Section III.B
    pmr_on_track:
      type: return
      value:
        report_form: FDA Form 3988 — Annual Progress Report
        enforcement_action: NONE — PMR on schedule
        status_code: P
        regulatory_reference: FDA PMR/PMC Annual Status Report Guidance (2023), Section III.A
    pmr_overdue:
      type: return
      value:
        report_form: FDA Form 3988 — Annual Progress Report with milestone justification
        enforcement_action: FDA may issue untitled letter, require meeting, or deem PMR not met. Potential misbranding under FD&C Act 505(o)(3)(E).
        status_code: P (overdue)
        regulatory_reference: FDA PMR/PMC Annual Status Report Guidance (2023), Section IV; FD&C Act 505(o)(3)
    pmr_delayed:
      type: return
      value:
        report_form: FDA Form 3988 — Delay notification with revised schedule
        enforcement_action: FDA reviews justification. May accept revised timeline or escalate to enforcement. Possible civil money penalties under FDAAA.
        status_code: D
        regulatory_reference: FDA PMR/PMC Annual Status Report Guidance (2023), Section IV; FDAAA 2007 Section 902
    pmr_pending:
      type: return
      value:
        report_form: FDA Form 3988 — Not yet initiated
        enforcement_action: Must provide timeline for initiation. FDA monitors for progress.
        status_code: R
        regulatory_reference: FDA PMR/PMC Annual Status Report Guidance (2023), Section III.A
    pmc_status_check:
      type: condition
      variable: study_status
      operator: eq
      value: fulfilled
      true_next: pmc_fulfilled
      false_next: pmc_check_released
    pmc_check_released:
      type: condition
      variable: study_status
      operator: eq
      value: released
      true_next: pmc_released
      false_next: pmc_ongoing
    pmc_fulfilled:
      type: return
      value:
        report_form: FDA Form 3989 — Final Status Report
        enforcement_action: NONE — commitment fulfilled
        status_code: F
        regulatory_reference: FDA PMR/PMC Annual Status Report Guidance (2023), Section V
    pmc_released:
      type: return
      value:
        report_form: FDA Form 3989 — Released from commitment
        enforcement_action: NONE — FDA has released sponsor from this commitment
        status_code: X
        regulatory_reference: FDA PMR/PMC Annual Status Report Guidance (2023), Section V
    pmc_ongoing:
      type: return
      value:
        report_form: FDA Form 3989 — Annual Status Report
        enforcement_action: Voluntary commitment. FDA may reclassify as PMR if safety concern arises.
        status_code: P
        regulatory_reference: FDA PMR/PMC Annual Status Report Guidance (2023), Section V
tests:
  - input:
      obligation_type: pmr_safety
      study_status: fulfilled
    expect:
      status_code: F
  - input:
      obligation_type: pmr_efficacy
      study_status: ongoing
      overdue: false
    expect:
      status_code: P
  - input:
      obligation_type: pmr_safety
      study_status: ongoing
      overdue: true
    expect:
      status_code: P (overdue)
  - input:
      obligation_type: pmr_clinical_pharmacology
      study_status: delayed
    expect:
      status_code: D
  - input:
      obligation_type: pmc_safety
      study_status: fulfilled
    expect:
      status_code: F
  - input:
      obligation_type: pmc_other
      study_status: released
    expect:
      status_code: X
  - input:
      obligation_type: pmc_safety
      study_status: ongoing
    expect:
      status_code: P
  - input:
      obligation_type: pmr_safety
      study_status: submitted
    expect:
      status_code: S
  - input:
      obligation_type: pmr_efficacy
      study_status: pending
    expect:
      status_code: R
  - input: {}
    expect:
      status_code: P
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - report_form
    - enforcement_action
    - status_code
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
