        predicted_addition: frequency
        addition_symbol: ν
        revolution_class: SURVEILLANCE
        composition_type: COMPOSITION
        successor_formula: '→ × ν'
        confidence: HIGH
        evidence_count: 1
        law_reference: 'Law of Primitive Succession — SignalDetection→PreemptivePV (→+ν predictive monitoring)'

    predict_caus_plus_state:
      type: return
      value:
        predicted_addition: state
        addition_symbol: ς
        revolution_class: MEMORY
        composition_type: COMPOSITION
        successor_formula: '→ × ς'
