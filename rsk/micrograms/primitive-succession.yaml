name: primitive-succession
description: 'Law of Primitive Succession: identify dominant primitive of a system and predict its successor. S_next = S + P_new where P_new is the highest-value missing primitive. Validated across 19 transitions (computing, science, math, PV).'
version: 0.1.0
interface:
  inputs:
    dominant:
      type: string
      required: true
      description: 'Dominant primitive of the system: boundary, state, void, causality, frequency, quantity, comparison, sequence, location, existence'
    has_boundary:
      type: bool
      required: false
      description: 'System has boundary primitive (∂) — typed interfaces, membranes, separation'
    has_state:
      type: bool
      required: false
      description: 'System has state primitive (ς) — observable, cumulative, persistent'
    has_void:
      type: bool
      required: false
      description: 'System has void primitive (∅) — absence-awareness, nothing as structure'
    has_causality:
      type: bool
      required: false
      description: 'System has causality primitive (→) — traceable cause-effect chains'
    has_frequency:
      type: bool
      required: false
      description: 'System has frequency primitive (ν) — periodic, rhythmic, scheduled'
    has_quantity:
      type: bool
      required: false
      description: 'System has quantity primitive (N) — measured amounts, conservation'
    has_comparison:
      type: bool
      required: false
      description: 'System has comparison primitive (κ) — symmetric difference, negotiation'
    has_sequence:
      type: bool
      required: false
      description: 'System has sequence primitive (σ) — ordered steps, dependency chains'
  outputs:
    predicted_addition:
      type: string
    addition_symbol:
      type: string
    revolution_class:
      type: string
    composition_type:
      type: string
    successor_formula:
      type: string
    confidence:
      type: string
    evidence_count:
      type: int
    law_reference:
      type: string
tree:
  start: check_dominant_frequency
  nodes:
    # ═══════════════════════════════════════════
    # FREQUENCY-DOMINANT (ν) — cron, schedulers
    # ═══════════════════════════════════════════
    check_dominant_frequency:
      type: condition
      variable: dominant
      operator: eq
      value: frequency
      true_next: freq_missing_state
      false_next: check_dominant_boundary

    freq_missing_state:
      type: condition
      variable: has_state
      operator: eq
      value: false
      true_next: predict_freq_plus_state
      false_next: freq_missing_causality

    freq_missing_causality:
      type: condition
      variable: has_causality
      operator: eq
      value: false
      true_next: predict_freq_plus_causality
      false_next: freq_missing_boundary

    freq_missing_boundary:
      type: condition
      variable: has_boundary
      operator: eq
      value: false
      true_next: predict_freq_plus_boundary
      false_next: predict_freq_plus_void

    predict_freq_plus_state:
      type: return
      value:
        predicted_addition: state
        addition_symbol: ς
        revolution_class: MEMORY
        composition_type: COMPOSITION
        successor_formula: 'ν × ς'
        confidence: HIGH
        evidence_count: 2
        law_reference: 'Law of Primitive Succession — cron→systemd (ν+ς), Euclidean→NonEuclidean (∂+ς)'

    predict_freq_plus_causality:
      type: return
      value:
        predicted_addition: causality
        addition_symbol: →
        revolution_class: EXPLANATORY
        composition_type: DETHRONE_POSSIBLE
        successor_formula: '→ dominant (ν demoted to input)'
        confidence: HIGH
        evidence_count: 1
        law_reference: 'Law of Primitive Succession — cron→/schedule (ν→→ dethrone)'

    predict_freq_plus_boundary:
      type: return
      value:
        predicted_addition: boundary
        addition_symbol: ∂
        revolution_class: PRECISION
        composition_type: COMPOSITION
        successor_formula: 'ν × ∂'
        confidence: HIGH
        evidence_count: 1
        law_reference: 'Law of Primitive Succession — cron→PSUR (ν+∂_regulatory)'

    predict_freq_plus_void:
      type: return
      value:
        predicted_addition: void
        addition_symbol: ∅
        revolution_class: ONTOLOGICAL
        composition_type: COMPOSITION
        successor_formula: 'ν × ∅'
        confidence: MEDIUM
        evidence_count: 0
        law_reference: 'Law of Primitive Succession — predicted (dead man switch = ν+∅)'

    # ═══════════════════════════════════════════
    # BOUNDARY-DOMINANT (∂) — configs, APIs, SQL
    # ═══════════════════════════════════════════
    check_dominant_boundary:
      type: condition
      variable: dominant
      operator: eq
      value: boundary
      true_next: bnd_missing_comparison
      false_next: check_dominant_causality

    bnd_missing_comparison:
      type: condition
      variable: has_comparison
      operator: eq
      value: false
      true_next: predict_bnd_plus_comparison
      false_next: bnd_missing_void

    bnd_missing_void:
      type: condition
      variable: has_void
      operator: eq
      value: false
      true_next: predict_bnd_plus_void
      false_next: bnd_missing_state

    bnd_missing_state:
      type: condition
      variable: has_state
      operator: eq
      value: false
      true_next: predict_bnd_plus_state
      false_next: predict_bnd_plus_causality

    predict_bnd_plus_comparison:
      type: return
      value:
        predicted_addition: comparison
        addition_symbol: κ
        revolution_class: NEGOTIATION
        composition_type: COMPOSITION
        successor_formula: '∂ × κ'
        confidence: HIGH
        evidence_count: 1
        law_reference: 'Law of Primitive Succession — REST→GraphQL (∂+κ client negotiation)'

    predict_bnd_plus_void:
      type: return
      value:
        predicted_addition: void
        addition_symbol: ∅
        revolution_class: ONTOLOGICAL
        composition_type: COMPOSITION
        successor_formula: '∂ × ∅'
        confidence: HIGH
        evidence_count: 1
        law_reference: 'Law of Primitive Succession — SQL→NoSQL (∂+∅ absence tolerance)'

    predict_bnd_plus_state:
      type: return
      value:
        predicted_addition: state
        addition_symbol: ς
        revolution_class: MEMORY
        composition_type: COMPOSITION
        successor_formula: '∂ × ς'
        confidence: HIGH
        evidence_count: 2
        law_reference: 'Law of Primitive Succession — config→chart_course (∂+ς), Euclidean→NonEuclidean (∂+ς)'

    predict_bnd_plus_causality:
      type: return
      value:
        predicted_addition: causality
        addition_symbol: →
        revolution_class: EXPLANATORY
        composition_type: COMPOSITION
        successor_formula: '∂ × →'
        confidence: MEDIUM
        evidence_count: 0
        law_reference: 'Law of Primitive Succession — predicted (∂ system with all nearby primitives present)'

    # ═══════════════════════════════════════════
    # CAUSALITY-DOMINANT (→) — Newton, Darwin, PV
    # ═══════════════════════════════════════════
    check_dominant_causality:
      type: condition
      variable: dominant
      operator: eq
