        law_reference: 'Law of Primitive Succession — predicted (→ system with ∂, N, ∅, ν all present)'

    # ═══════════════════════════════════════════
    # STATE-DOMINANT (ς) — Classical mechanics, Humoral medicine
    # ═══════════════════════════════════════════
