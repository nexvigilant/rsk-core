        law_reference: 'Law of Primitive Succession — Phlogiston→Lavoisier (→+N dethrone, weighing reversed →)'

    predict_caus_plus_void:
      type: return
      value:
        predicted_addition: void
        addition_symbol: ∅
        revolution_class: ONTOLOGICAL
        composition_type: COMPOSITION
        successor_formula: '→ × ∅'
        confidence: HIGH
        evidence_count: 1
        law_reference: 'Law of Primitive Succession — PV→PV+1 (→+∅ absence-aware surveillance, predicted)'

    predict_caus_plus_frequency:
      type: return
