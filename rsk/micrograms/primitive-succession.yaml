      variable: has_boundary
      operator: eq
      value: false
      true_next: predict_caus_plus_boundary
      false_next: caus_missing_quantity

    caus_missing_quantity:
      type: condition
      variable: has_quantity
      operator: eq
      value: false
      true_next: predict_caus_plus_quantity
      false_next: caus_missing_void

    caus_missing_void:
      type: condition
      variable: has_void
      operator: eq
      value: false
      true_next: predict_caus_plus_void
      false_next: caus_missing_frequency

    caus_missing_frequency:
