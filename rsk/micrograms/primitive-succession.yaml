# MICROGRAM++ (upgraded 2026-04-23)
name: primitive-succession
version: 0.1.0
description: "Law of Primitive Succession: identify dominant primitive of a system and predict its successor. S_next = S + P_new where P_new is the highest-value missing primitive. Validated across 19 transitions (computing, science, math, PV)."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: dominant
    type: string
    required: true
    description: "Dominant primitive of the system: boundary, state, void, causality, frequency, quantity, comparison, sequence, location, existence"
  - name: has_boundary
    type: bool
    required: false
    description: System has boundary primitive (∂) — typed interfaces, membranes, separation
  - name: has_state
    type: bool
    required: false
    description: System has state primitive (ς) — observable, cumulative, persistent
  - name: has_void
    type: bool
    required: false
    description: System has void primitive (∅) — absence-awareness, nothing as structure
  - name: has_causality
    type: bool
    required: false
    description: System has causality primitive (→) — traceable cause-effect chains
  - name: has_frequency
    type: bool
    required: false
    description: System has frequency primitive (ν) — periodic, rhythmic, scheduled
  - name: has_quantity
    type: bool
    required: false
    description: System has quantity primitive (N) — measured amounts, conservation
  - name: has_comparison
    type: bool
    required: false
    description: System has comparison primitive (κ) — symmetric difference, negotiation
  - name: has_sequence
    type: bool
    required: false
    description: System has sequence primitive (σ) — ordered steps, dependency chains
outputs:
  - name: predicted_addition
    type: string
  - name: addition_symbol
    type: string
  - name: revolution_class
    type: string
  - name: composition_type
    type: string
  - name: successor_formula
    type: string
  - name: confidence
    type: string
  - name: evidence_count
    type: int
  - name: law_reference
    type: string
interface:
  inputs:
    dominant:
      type: string
      required: true
      description: "Dominant primitive of the system: boundary, state, void, causality, frequency, quantity, comparison, sequence, location, existence"
    has_boundary:
      type: bool
      required: false
      description: System has boundary primitive (∂) — typed interfaces, membranes, separation
    has_state:
      type: bool
      required: false
      description: System has state primitive (ς) — observable, cumulative, persistent
    has_void:
      type: bool
      required: false
      description: System has void primitive (∅) — absence-awareness, nothing as structure
    has_causality:
      type: bool
      required: false
      description: System has causality primitive (→) — traceable cause-effect chains
    has_frequency:
      type: bool
      required: false
      description: System has frequency primitive (ν) — periodic, rhythmic, scheduled
    has_quantity:
      type: bool
      required: false
      description: System has quantity primitive (N) — measured amounts, conservation
    has_comparison:
      type: bool
      required: false
      description: System has comparison primitive (κ) — symmetric difference, negotiation
    has_sequence:
      type: bool
      required: false
      description: System has sequence primitive (σ) — ordered steps, dependency chains
  outputs:
    predicted_addition:
      type: string
    addition_symbol:
      type: string
    revolution_class:
      type: string
    composition_type:
      type: string
    successor_formula:
      type: string
    confidence:
      type: string
    evidence_count:
      type: int
    law_reference:
      type: string
ui:
  title: Primitive Succession
  subtitle: "Law of Primitive Succession: identify dominant primitive of a system and predict its successor. S_next = S + P_new where P_new is the highest-value missing primitive. Validated across 19 transitions (computing, science, math, PV)."
  icon: circle
  route: /vigilance/mg/primitive-succession
  steps:
    - field: dominant
      label: dominant
      help: "Dominant primitive of the system: boundary, state, void, causality, frequency, quantity, comparison, sequence, location, existence"
      widget: text
      placeholder: null
    - field: has_boundary
      label: has boundary
      help: System has boundary primitive (∂) — typed interfaces, membranes, separation
      widget: toggle
      placeholder: null
    - field: has_state
      label: has state
      help: System has state primitive (ς) — observable, cumulative, persistent
      widget: toggle
      placeholder: null
    - field: has_void
      label: has void
      help: System has void primitive (∅) — absence-awareness, nothing as structure
      widget: toggle
      placeholder: null
    - field: has_causality
      label: has causality
      help: System has causality primitive (→) — traceable cause-effect chains
      widget: toggle
      placeholder: null
    - field: has_frequency
      label: has frequency
      help: System has frequency primitive (ν) — periodic, rhythmic, scheduled
      widget: toggle
      placeholder: null
    - field: has_quantity
      label: has quantity
      help: System has quantity primitive (N) — measured amounts, conservation
      widget: toggle
      placeholder: null
    - field: has_comparison
      label: has comparison
      help: System has comparison primitive (κ) — symmetric difference, negotiation
      widget: toggle
      placeholder: null
    - field: has_sequence
      label: has sequence
      help: System has sequence primitive (σ) — ordered steps, dependency chains
      widget: toggle
      placeholder: null
  result:
    template: "predicted_addition: {{predicted_addition}} — addition_symbol: {{addition_symbol}} — revolution_class: {{revolution_class}} — composition_type: {{composition_type}} — successor_formula: {{successor_formula}} — confidence: {{confidence}} — evidence_count: {{evidence_count}} — law_reference: {{law_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/primitive-succession
  cli: rsk mcg run primitive-succession
  auth: none
  rate_limit: 600/min
tree:
  start: check_dominant_frequency
  nodes:
    check_dominant_frequency:
      type: condition
      variable: dominant
      operator: eq
      value: frequency
      true_next: freq_missing_state
      false_next: check_dominant_boundary
    freq_missing_state:
      type: condition
      variable: has_state
      operator: eq
      value: false
      true_next: predict_freq_plus_state
      false_next: freq_missing_causality
    freq_missing_causality:
      type: condition
      variable: has_causality
      operator: eq
      value: false
      true_next: predict_freq_plus_causality
      false_next: freq_missing_boundary
    freq_missing_boundary:
      type: condition
      variable: has_boundary
      operator: eq
      value: false
      true_next: predict_freq_plus_boundary
      false_next: predict_freq_plus_void
    predict_freq_plus_state:
      type: return
      value:
        predicted_addition: state
        addition_symbol: ς
        revolution_class: MEMORY
        composition_type: COMPOSITION
        successor_formula: ν × ς
        confidence: HIGH
        evidence_count: 2
        law_reference: Law of Primitive Succession — cron→systemd (ν+ς), Euclidean→NonEuclidean (∂+ς)
    predict_freq_plus_causality:
      type: return
      value:
        predicted_addition: causality
        addition_symbol: →
        revolution_class: EXPLANATORY
        composition_type: DETHRONE_POSSIBLE
        successor_formula: → dominant (ν demoted to input)
        confidence: HIGH
        evidence_count: 1
        law_reference: Law of Primitive Succession — cron→/schedule (ν→→ dethrone)
    predict_freq_plus_boundary:
      type: return
      value:
        predicted_addition: boundary
        addition_symbol: ∂
        revolution_class: PRECISION
        composition_type: COMPOSITION
        successor_formula: ν × ∂
        confidence: HIGH
