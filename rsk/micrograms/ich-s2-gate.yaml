name: ich-s2-gate
description: "ICH S2 compliance: Genotoxicity Testing"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "genotox_done"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH S2"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH S2"
        compliant: false
        action: "remediate"
        gap: "genotox_done"

tests:
  - input: {"genotox_done": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
