name: interaction-severity-classifier
description: "Classify drug-drug interactions by severity based on type and mechanism"
version: 0.1.0

tree:
  start: check_interaction_type
  nodes:
    check_interaction_type:
      type: condition
      variable: interaction_type
      operator: is_not_null
      true_next: check_mechanism
      false_next: missing_input

    check_mechanism:
      type: condition
      variable: mechanism
      operator: is_not_null
      true_next: classify_severity
      false_next: missing_mechanism

    classify_severity:
      type: condition
      variable: interaction_type
      operator: matches
      value: "(?i)(contraindicated|contraindication)"
      true_next: severity_major
      false_next: check_significant

    check_significant:
      type: condition
      variable: mechanism
      operator: matches
      value: "(?i)(cyp3a4|metabolism|hepatic|renal|clearance|elimination)"
      true_next: check_potent
      false_next: severity_moderate

    check_potent:
      type: condition
      variable: mechanism
      operator: matches
      value: "(?i)(potent|strong|inhibitor|inducer)"
      true_next: severity_major
      false_next: severity_moderate

    severity_major:
      type: return
      value:
        severity: "major"
        clinical_significance: "significant_risk"
        action_required: true

    severity_moderate:
      type: return
      value:
        severity: "moderate"
        clinical_significance: "monitor_recommended"
        action_required: true

    severity_minor:
      type: return
      value:
        severity: "minor"
        clinical_significance: "minimal_risk"
        action_required: false

    missing_input:
      type: return
      value:
        severity: "unknown"
        clinical_significance: null
        action_required: true

    missing_mechanism:
      type: return
      value:
        severity: "unknown"
        clinical_significance: null
        action_required: true

tests:
  - input: { interaction_type: "contraindication", mechanism: "cyp3a4 inhibition" }
    expect: { severity: "major", clinical_significance: "significant_risk", action_required: true }

  - input: { interaction_type: "moderate", mechanism: "potent cyp3a4 inducer" }
    expect: { severity: "major", clinical_significance: "significant_risk", action_required: true }

  - input: { interaction_type: "interaction", mechanism: "protein binding displacement" }
    expect: { severity: "moderate", clinical_significance: "monitor_recommended", action_required: true }

  - input: { interaction_type: null, mechanism: "hepatic metabolism" }
    expect: { severity: "unknown", clinical_significance: null, action_required: true }

  - input: { interaction_type: "minor", mechanism: "mild interaction" }
    expect: { severity: "moderate", clinical_significance: "monitor_recommended", action_required: true }
