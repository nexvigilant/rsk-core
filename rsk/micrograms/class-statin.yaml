# MICROGRAM++ (upgraded 2026-04-23)
name: class-statin
version: 0.1.0
description: "Statins class safety: Rhabdomyolysis monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Statin
  subtitle: "Statins class safety: Rhabdomyolysis monitoring"
  icon: circle
  route: /vigilance/mg/class-statin
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-statin
  cli: rsk mcg run class-statin
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    safe:
      type: return
      value:
        concern: Rhabdomyolysis
        alert: false
        drug_class: Statins
        action: continue
    alert:
      type: return
      value:
        action: class_effect_investigation
        alert: true
        drug_class: Statins
        concern: Rhabdomyolysis
    check:
      type: condition
      variable: cpk_elevation
      operator: gte
      value: 5
      true_next: alert
      false_next: safe
tests:
  - input:
      cpk_elevation: 5
    expect:
      drug_class: Statins
      alert: true
  - input: {}
    expect:
      alert: false
      drug_class: Statins
  - input:
      cpk_elevation: 0
    expect:
      alert: false
      concern: Rhabdomyolysis
      action: continue
      drug_class: Statins
  - input:
      cpk_elevation: -1
    expect:
      concern: Rhabdomyolysis
      drug_class: Statins
      action: continue
      alert: false
  - input:
      cpk_elevation: 4
    expect:
      concern: Rhabdomyolysis
      action: continue
      drug_class: Statins
      alert: false
  - input:
      cpk_elevation: 6
    expect:
      action: class_effect_investigation
      drug_class: Statins
      alert: true
      concern: Rhabdomyolysis
  - input:
      cpk_elevation: 500
    expect:
      concern: Rhabdomyolysis
      alert: true
      action: class_effect_investigation
      drug_class: Statins
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
