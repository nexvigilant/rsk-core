# MICROGRAM++ (upgraded 2026-04-23)
name: ab-valence-overflow
version: 0.1.0
description: "Antibody: detects valence overflow (prima-chem Bond invariant). Input is pre-computed valence_excess = bond_valence_sum - max_valence."
family: antibody.chemistry
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - antibody
inputs:
  - name: valence_excess
    type: number
    required: true
    description: bond_valence_sum - max_valence (positive = overflow)
outputs:
  - name: threat
    type: boolean
  - name: response
    type: string
interface:
  inputs:
    valence_excess:
      type: number
      required: true
      description: bond_valence_sum - max_valence (positive = overflow)
  outputs:
    threat:
      type: boolean
    response:
      type: string
ui:
  title: Valence Overflow
  subtitle: "Antibody: detects valence overflow (prima-chem Bond invariant). Input is pre-computed valence_excess = bond_valence_sum - max_valence."
  icon: shield
  route: /vigilance/mg/ab-valence-overflow
  steps:
    - field: valence_excess
      label: valence excess
      help: bond_valence_sum - max_valence (positive = overflow)
      widget: number
      placeholder: null
  result:
    template: "threat: {{threat}} — response: {{response}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ab-valence-overflow
  cli: rsk mcg run ab-valence-overflow
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: valence_excess
      operator: gt
      value: 0
      true_next: violation
      false_next: clean
    violation:
      type: return
      value:
        threat: true
        response: "BLOCK: bond valence exceeds element max — impossible bonding"
    clean:
      type: return
      value:
        threat: false
        response: PASS
tests:
  - input:
      valence_excess: 0
    expect:
      threat: false
  - input:
      valence_excess: 1
    expect:
      threat: true
  - input:
      valence_excess: -1
    expect:
      threat: false
  - input:
      valence_excess: 3
    expect:
      threat: true
  - input: {}
    expect:
      response: PASS
      threat: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - threat
    - response
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: antibody.chemistry
  log_level: info
governance:
  sop_ref: SOP-CHEM-001
  regulatory_ref: []
  harm_types:
    - F
  review_cadence: quarterly
  tov_axioms:
    - conservation
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
