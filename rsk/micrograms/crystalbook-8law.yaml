transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/crystalbook-8law
  cli: rsk mcg run crystalbook-8law
  auth: none
  rate_limit: 600/min
tree:
  start: check_law_i_violated
  nodes:
    check_law_i_violated:
      type: condition
      variable: humility_score
      operator: lt
      value: 4
      true_next: law_i_violated
      false_next: check_law_i_satisfied
    check_law_i_satisfied:
      type: condition
      variable: humility_score
      operator: gte
      value: 7
      true_next: law_i_satisfied
      false_next: law_i_at_risk
    law_i_violated:
      type: condition
      variable: charity_score
      operator: lt
      value: 4
      true_next: law_i_v_law_ii_v
      false_next: check_law_ii_sat_after_i_v
    law_i_at_risk:
      type: condition
      variable: charity_score
      operator: lt
      value: 4
      true_next: law_i_r_law_ii_v
      false_next: check_law_ii_sat_after_i_r
    law_i_satisfied:
      type: condition
      variable: charity_score
      operator: lt
      value: 4
      true_next: law_i_s_law_ii_v
      false_next: check_law_ii_sat_after_i_s
    law_i_v_law_ii_v:
      type: return
      value:
        law_i_status: VIOLATED
        law_ii_status: VIOLATED
        law_iii_status: UNASSESSED
