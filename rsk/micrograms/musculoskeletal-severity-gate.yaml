# MICROGRAM++ (upgraded 2026-04-23)
name: musculoskeletal-severity-gate
version: 0.1.0
description: "Musculoskeletal safety classifier: maps muscular adverse reactions to severity grades for rhabdomyolysis, myopathy, and tendon disorders"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reaction_pt
    type: string
    required: true
    description: MedDRA preferred term for the musculoskeletal reaction
  - name: ck_xuln
    type: float
    required: false
    description: Creatine kinase as x ULN
outputs:
  - name: severity
    type: string
  - name: soc
    type: string
  - name: action
    type: string
interface:
  inputs:
    reaction_pt:
      type: string
      required: true
      description: MedDRA preferred term for the musculoskeletal reaction
    ck_xuln:
      type: float
      required: false
      description: Creatine kinase as x ULN
  outputs:
    severity:
      type: string
      description: critical | serious | moderate | mild
    soc:
      type: string
    action:
      type: string
ui:
  title: Musculoskeletal Severity Gate
  subtitle: "Musculoskeletal safety classifier: maps muscular adverse reactions to severity grades for rhabdomyolysis, myopathy, and tendon disorders"
  icon: circle
  route: /vigilance/mg/musculoskeletal-severity-gate
  steps:
    - field: reaction_pt
      label: reaction pt
      help: MedDRA preferred term for the musculoskeletal reaction
      widget: text
      placeholder: null
    - field: ck_xuln
      label: ck xuln
      help: Creatine kinase as x ULN
      widget: text
      placeholder: null
  result:
    template: "severity: {{severity}} — soc: {{soc}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/musculoskeletal-severity-gate
  cli: rsk mcg run musculoskeletal-severity-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_rhabdo
  nodes:
    check_rhabdo:
      type: condition
      variable: reaction_pt
      operator: contains
      value: RHABDOMYOLYSIS
      true_next: critical
      false_next: check_ck_critical
    check_ck_critical:
      type: condition
      variable: ck_xuln
      operator: gte
      value: 10
      true_next: critical
      false_next: check_myopathy
    check_myopathy:
      type: condition
      variable: reaction_pt
      operator: contains
      value: MYOPATHY
      true_next: serious
      false_next: check_tendon_rupture
    check_tendon_rupture:
      type: condition
      variable: reaction_pt
      operator: contains
      value: TENDON RUPTURE
      true_next: serious
      false_next: check_ck_moderate
    check_ck_moderate:
      type: condition
      variable: ck_xuln
      operator: gte
      value: 5
      true_next: moderate
      false_next: check_myalgia
    check_myalgia:
      type: condition
      variable: reaction_pt
      operator: contains
      value: MYALGIA
      true_next: mild
      false_next: mild
    critical:
      type: return
      value:
        severity: critical
        soc: Musculoskeletal and connective tissue disorders
        action: immediate_expedited_report
    serious:
      type: return
      value:
        severity: serious
        soc: Musculoskeletal and connective tissue disorders
        action: expedited_report
    moderate:
      type: return
      value:
        severity: moderate
        soc: Musculoskeletal and connective tissue disorders
        action: monitor_and_assess
    mild:
      type: return
      value:
        severity: mild
        soc: Musculoskeletal and connective tissue disorders
        action: routine_surveillance
tests:
  - name: rhabdomyolysis
    input:
      reaction_pt: RHABDOMYOLYSIS
    expect:
      severity: critical
  - name: ck_very_high
    input:
      reaction_pt: BLOOD CREATINE PHOSPHOKINASE INCREASED
      ck_xuln: 15
    expect:
      severity: critical
  - name: myopathy
    input:
      reaction_pt: MYOPATHY TOXIC
    expect:
      severity: serious
  - name: tendon_rupture
    input:
      reaction_pt: ACHILLES TENDON RUPTURE
    expect:
      severity: serious
  - name: ck_moderate
    input:
      reaction_pt: BLOOD CREATINE PHOSPHOKINASE INCREASED
      ck_xuln: 7
    expect:
      severity: moderate
  - name: myalgia
    input:
      reaction_pt: MYALGIA
    expect:
      severity: mild
  - name: null_safety
    input: {}
    expect:
      severity: mild
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - severity
    - soc
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
