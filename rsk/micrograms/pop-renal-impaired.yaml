      reason: Severe renal impairment — dose adjustment
      population: renal-impaired
      action: special_monitoring
  - input:
      egfr: 29
    expect:
      action: special_monitoring
      population: renal-impaired
      at_risk: true
      reason: Severe renal impairment — dose adjustment
  - input:
      egfr: 31
    expect:
      population: renal-impaired
      at_risk: false
      action: standard_care
  - input:
      egfr: 3000
    expect:
      action: standard_care
      population: renal-impaired
      at_risk: false
