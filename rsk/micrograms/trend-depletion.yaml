# MICROGRAM++ (upgraded 2026-04-23)
name: trend-depletion
version: 0.1.0
description: Depletion of susceptibles
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Trend Depletion
  subtitle: Depletion of susceptibles
  icon: circle
  route: /vigilance/mg/trend-depletion
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/trend-depletion
  cli: rsk mcg run trend-depletion
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: incidence_declining
      operator: eq
      value: true
      true_next: detected
      false_next: not_detected
    detected:
      type: return
      value:
        pattern: depleted
        detected: true
        action: investigate
    not_detected:
      type: return
      value:
        pattern: depleted
        detected: false
        action: continue_monitoring
tests:
  - input:
      incidence_declining: true
    expect:
      pattern: depleted
      detected: true
  - input: {}
    expect:
      pattern: depleted
      detected: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
