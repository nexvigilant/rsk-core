name: gate-prr-extreme
description: PRR extreme signal (>10x expected)
version: 0.1.0
tree:
  start: check
  nodes:
    pass:
      type: return
      value:
        gate: true
        threshold: prr
        met: true
    check:
      type: condition
      variable: prr
      operator: gte
      value: 10.0
      true_next: pass
      false_next: fail
    fail:
      type: return
      value:
        gate: false
        met: false
        threshold: prr
tests:
- input:
    prr: 10.0
  expect:
    gate: true
    met: true
- input: {}
  expect:
    gate: false
    met: false
- input:
    prr: 9.999
  expect:
    gate: false
    met: false
    threshold: prr
- input:
    prr: 10.001
  expect:
    gate: true
    met: true
    threshold: prr
interface: null
primitive_signature: null
