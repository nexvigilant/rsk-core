name: drug-profile-warfarin
description: 'Safety triage for warfarin: PRR-based signal routing (Type A)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    signal:
      type: return
      value:
        drug: warfarin
        harm_type: A
        signal: true
        action: investigate
        expected_prr: 5.0
    no_signal:
      type: return
      value:
        action: monitor
        expected_prr: 5.0
        drug: warfarin
        harm_type: A
        signal: false
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
tests:
- input:
    prr: 5.0
  expect:
    drug: warfarin
    signal: true
- input:
    prr: 0.5
  expect:
    signal: false
    drug: warfarin
- input: {}
  expect:
    drug: warfarin
    signal: false
- input:
    prr: 1.999
  expect:
    expected_prr: 5.0
    harm_type: A
    action: monitor
    drug: warfarin
    signal: false
- input:
    prr: 2.001
  expect:
    harm_type: A
    expected_prr: 5.0
    action: investigate
    signal: true
    drug: warfarin
interface: null
primitive_signature: null
