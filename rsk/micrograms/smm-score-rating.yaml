# MICROGRAM++ (upgraded 2026-04-23)
name: smm-score-rating
version: 0.1.0
description: "NVG-SMM-001 Section 5.2: Map Credibility Score to rating and integration disposition. Chemistry analog: Arrhenius threshold gating — score must exceed activation energy to achieve each integration tier."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: cs
    type: float
    required: true
    description: ""
  - name: suspended
    type: bool
    required: true
    description: ""
outputs:
  - name: rating
    type: string
  - name: disposition
    type: string
  - name: weight
    type: float
  - name: action
    type: string
  - name: chemistry_analog
    type: string
interface:
  inputs:
    cs:
      type: float
      required: true
    suspended:
      type: bool
      required: true
  outputs:
    rating:
      type: string
    disposition:
      type: string
    weight:
      type: float
    action:
      type: string
    chemistry_analog:
      type: string
ui:
  title: Smm Score Rating
  subtitle: "NVG-SMM-001 Section 5.2: Map Credibility Score to rating and integration disposition. Chemistry analog: Arrhenius threshold gating — score must exceed activation energy to achieve each integration tier."
  icon: circle
  route: /vigilance/mg/smm-score-rating
  steps:
    - field: cs
      label: cs
      help: Enter cs
      widget: text
      placeholder: null
    - field: suspended
      label: suspended
      help: Enter suspended
      widget: toggle
      placeholder: null
  result:
    template: "rating: {{rating}} — disposition: {{disposition}} — weight: {{weight}} — action: {{action}} — chemistry_analog: {{chemistry_analog}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/smm-score-rating
  cli: rsk mcg run smm-score-rating
  auth: none
  rate_limit: 600/min
tree:
  start: check_suspended
  nodes:
    check_suspended:
      type: condition
      variable: suspended
      operator: eq
      value: true
      true_next: fatal_rating
      false_next: check_red
    check_red:
      type: condition
      variable: cs
      operator: lt
      value: 0.6
      true_next: red_rating
      false_next: check_amber
    check_amber:
      type: condition
      variable: cs
      operator: lt
      value: 0.8
      true_next: amber_rating
      false_next: green_rating
    fatal_rating:
      type: return
      value:
        rating: SUSPENDED
        disposition: Excluded pending qualified review
        weight: 0
        action: Mandatory PV scientist review; CAPA initiated
        chemistry_analog: Ea = infinity; k = 0; no reaction proceeds
    red_rating:
      type: return
      value:
        rating: RED
        disposition: Integrated at 0.25x weight; high-scrutiny flag
        weight: 0.25
        action: Signal assessments require supporting corroboration
        chemistry_analog: Below activation threshold; trace product only
    amber_rating:
      type: return
      value:
        rating: AMBER
        disposition: Integrated at 0.60x weight; advisory flag
        weight: 0.6
        action: Violation summary appended to evidence record
        chemistry_analog: Partial activation; reduced yield
    green_rating:
      type: return
      value:
        rating: GREEN
        disposition: Integrated at full weight
        weight: 1
        action: Minor violations annotated; no workflow impact
        chemistry_analog: Full activation; quantitative yield
tests:
  - input:
      cs: 0
      suspended: true
    expect:
      rating: SUSPENDED
      weight: 0
  - input:
      cs: 0.45
      suspended: false
    expect:
      rating: RED
      weight: 0.25
  - input:
      cs: 0.7
      suspended: false
    expect:
      rating: AMBER
      weight: 0.6
  - input:
      cs: 0.95
      suspended: false
    expect:
      rating: GREEN
      weight: 1
  - input:
      cs: 0.8
      suspended: false
    expect:
      rating: GREEN
      weight: 1
  - input:
      cs: 0.59
      suspended: false
    expect:
      rating: RED
      weight: 0.25
  - input:
      cs: 0.6
      suspended: false
    expect:
      rating: AMBER
      weight: 0.6
  - input: {}
    expect:
      action: Minor violations annotated; no workflow impact
      chemistry_analog: Full activation; quantitative yield
      disposition: Integrated at full weight
      rating: GREEN
      weight: 1
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - rating
    - disposition
    - weight
    - action
    - chemistry_analog
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
