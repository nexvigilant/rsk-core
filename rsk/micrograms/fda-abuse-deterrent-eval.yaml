name: fda-abuse-deterrent-eval
description: "FDA abuse-deterrent opioid evaluation: routes by formulation properties and abuse pathway per FDA Guidance 'Abuse-Deterrent Opioids - Evaluation and Labeling' (2015)"
version: 0.1.0
interface:
  inputs:
    abuse_pathway:
      type: string
      required: true
      description: "Route of abuse: oral_excessive, intranasal, injection, smoking, combined"
    formulation_category:
      type: string
      required: true
      description: "Abuse-deterrent category: physical_chemical_barrier, agonist_antagonist, aversion, delivery_system, prodrug, combination"
    in_vitro_result:
      type: string
      required: false
      description: "In vitro manipulation study result: resistant, partially_resistant, not_resistant"
    clinical_abuse_study:
      type: bool
      required: false
      description: "Whether clinical abuse potential study (Category 3) has been completed"
  outputs:
    evaluation_category:
      type: string
    labeling_claim:
      type: string
    study_requirements:
      type: string
    regulatory_reference:
      type: string
tree:
  start: check_in_vitro
  nodes:
    check_in_vitro:
      type: condition
      variable: in_vitro_result
      operator: eq
      value: "resistant"
      true_next: check_clinical_study
      false_next: check_partial

    check_partial:
      type: condition
      variable: in_vitro_result
      operator: eq
      value: "partially_resistant"
      true_next: partial_resistant_path
      false_next: not_resistant_path

    # IN VITRO RESISTANT — check clinical
    check_clinical_study:
      type: condition
      variable: clinical_abuse_study
      operator: eq
      value: true
      true_next: full_evaluation
      false_next: in_vitro_only

    full_evaluation:
      type: return
      value:
        evaluation_category: "CATEGORY_1_2_3"
        labeling_claim: "Labeling may describe abuse-deterrent properties with Categories 1-3 data. Include specific abuse pathways tested and limitations."
        study_requirements: "Complete: In vitro manipulation (Cat 1), PK (Cat 2), Clinical abuse potential (Cat 3). Category 4 (postmarket) studies recommended."
        regulatory_reference: "FDA Guidance: Abuse-Deterrent Opioids - Evaluation and Labeling (2015), Sections III-IV"

    in_vitro_only:
      type: return
      value:
        evaluation_category: "CATEGORY_1_2_ONLY"
        labeling_claim: "Labeling may describe physical/chemical properties but cannot claim reduced abuse without clinical (Cat 3) data"
        study_requirements: "Category 3 clinical abuse potential study needed to support abuse-deterrent labeling claim"
        regulatory_reference: "FDA Guidance: Abuse-Deterrent Opioids (2015), Section III.C"

    # PARTIALLY RESISTANT
    partial_resistant_path:
      type: return
      value:
        evaluation_category: "PARTIAL_DETERRENCE"
        labeling_claim: "Labeling may describe partial resistance to specific manipulation pathways. Must specify which pathways are and are not deterred."
        study_requirements: "Category 1-2 data supports partial claim. Category 3 clinical study recommended for the specific abuse pathway."
        regulatory_reference: "FDA Guidance: Abuse-Deterrent Opioids (2015), Section III.B"

    # NOT RESISTANT
    not_resistant_path:
      type: return
      value:
        evaluation_category: "NO_DETERRENT_CLAIM"
        labeling_claim: "No abuse-deterrent labeling claim supportable. Product may still be approved as standard opioid formulation."
        study_requirements: "Standard NDA requirements apply. Consider REMS with ETASS for opioid products."
        regulatory_reference: "FDA Guidance: Abuse-Deterrent Opioids (2015), Section II; Opioid REMS"

primitive_signature:
  dominant: 'κ'
  expression: 'κ(∂, ∃) — abuse deterrence classification by manipulation resistance boundary and clinical evidence existence'
  primes: ['κ', '∂', '∃']
  arguments: ['in_vitro_result', 'clinical_abuse_study', 'abuse_pathway']

tests:
- input: { abuse_pathway: "intranasal", formulation_category: "physical_chemical_barrier", in_vitro_result: "resistant", clinical_abuse_study: true }
  expect: { evaluation_category: "CATEGORY_1_2_3" }
- input: { abuse_pathway: "injection", formulation_category: "agonist_antagonist", in_vitro_result: "resistant", clinical_abuse_study: false }
  expect: { evaluation_category: "CATEGORY_1_2_ONLY" }
- input: { abuse_pathway: "oral_excessive", formulation_category: "aversion", in_vitro_result: "partially_resistant" }
  expect: { evaluation_category: "PARTIAL_DETERRENCE" }
- input: { abuse_pathway: "smoking", formulation_category: "delivery_system", in_vitro_result: "not_resistant" }
  expect: { evaluation_category: "NO_DETERRENT_CLAIM" }
- input: {}
  expect: { evaluation_category: "NO_DETERRENT_CLAIM" }
