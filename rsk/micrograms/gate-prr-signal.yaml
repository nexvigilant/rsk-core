# MICROGRAM++ (upgraded 2026-04-23)
name: gate-prr-signal
version: 0.1.0
description: PRR signal threshold (Evans criterion)
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs: []
outputs: []
ui:
  title: Gate Prr Signal
  subtitle: PRR signal threshold (Evans criterion)
  icon: activity
  route: /vigilance/mg/gate-prr-signal
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-prr-signal
  cli: rsk mcg run gate-prr-signal
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        gate: false
        threshold: prr
        met: false
    pass:
      type: return
      value:
        met: true
        threshold: prr
        gate: true
    check:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: pass
      false_next: fail
tests:
  - input:
      prr: 2
    expect:
      met: true
      gate: true
  - input: {}
    expect:
      gate: false
      met: false
  - input:
      prr: 1.999
    expect:
      gate: false
      threshold: prr
      met: false
  - input:
      prr: 2.001
    expect:
      met: true
      threshold: prr
      gate: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
