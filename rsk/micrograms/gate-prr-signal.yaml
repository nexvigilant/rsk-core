name: gate-prr-signal
description: PRR signal threshold (Evans criterion)
version: 0.1.0
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        gate: false
        threshold: prr
        met: false
    pass:
      type: return
      value:
        met: true
        threshold: prr
        gate: true
    check:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: pass
      false_next: fail
tests:
- input:
    prr: 2.0
  expect:
    met: true
    gate: true
- input: {}
  expect:
    gate: false
    met: false
- input:
    prr: 1.999
  expect:
    gate: false
    threshold: prr
    met: false
- input:
    prr: 2.001
  expect:
    met: true
    threshold: prr
    gate: true
interface: null
primitive_signature: null
