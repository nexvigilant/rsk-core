# MICROGRAM++ (upgraded 2026-04-23)
name: bridge-calculation-to-vigilance
version: 0.1.0
description: "Bridge: converts calculation pipeline signal verdict into Guardian risk score input"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Bridge Calculation To Vigilance
  subtitle: "Bridge: converts calculation pipeline signal verdict into Guardian risk score input"
  icon: circle
  route: /vigilance/mg/bridge-calculation-to-vigilance
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/bridge-calculation-to-vigilance
  cli: rsk mcg run bridge-calculation-to-vigilance
  auth: none
  rate_limit: 600/min
tree:
  start: check_action
  nodes:
    archive_input:
      type: return
      value:
        source_priority: low
        risk_score: 2
        bridge: calculation-to-vigilance
    check_action:
      type: condition
      variable: action
      operator: eq
      value: investigate
      true_next: check_priority
      false_next: archive_input
    check_priority:
      type: condition
      variable: priority
      operator: eq
      value: critical
      true_next: critical_score
      false_next: high_score
    critical_score:
      type: return
      value:
        risk_score: 9
        bridge: calculation-to-vigilance
        source_priority: critical
    high_score:
      type: return
      value:
        source_priority: high
        risk_score: 7
        bridge: calculation-to-vigilance
tests:
  - input:
      priority: critical
      action: investigate
    expect:
      bridge: calculation-to-vigilance
      source_priority: critical
      risk_score: 9
  - input:
      action: investigate
      priority: high
    expect:
      risk_score: 7
      bridge: calculation-to-vigilance
      source_priority: high
  - input:
      priority: low
      action: archive
    expect:
      bridge: calculation-to-vigilance
      source_priority: low
      risk_score: 2
  - input: {}
    expect:
      source_priority: low
      risk_score: 2
      bridge: calculation-to-vigilance
  - input: {}
    expect:
      bridge: calculation-to-vigilance
      source_priority: low
      risk_score: 2
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
