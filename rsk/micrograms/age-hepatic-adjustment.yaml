# MICROGRAM++ (upgraded 2026-04-23)
name: age-hepatic-adjustment
version: 0.1.0
description: Age-based hepatic clearance adjustment. Accounts for reduced hepatic metabolism in elderly.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Age Hepatic Adjustment
  subtitle: Age-based hepatic clearance adjustment. Accounts for reduced hepatic metabolism in elderly.
  icon: circle
  route: /vigilance/mg/age-hepatic-adjustment
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/age-hepatic-adjustment
  cli: rsk mcg run age-hepatic-adjustment
  auth: none
  rate_limit: 600/min
tree:
  start: check_age_category
  nodes:
    check_age_category:
      type: condition
      variable: age_years
      operator: gte
      value: 65
      true_next: elderly_hepatic_adjustment
      false_next: adult_hepatic
    elderly_hepatic_adjustment:
      type: return
      value:
        age_group: elderly
        adjustment_needed: true
        dose_reduction_percent: 25
        notes: Reduce initial dose by 25-50% for hepatically-metabolized drugs in elderly
    adult_hepatic:
      type: return
      value:
        age_group: adult
        adjustment_needed: false
        notes: Standard hepatic clearance assumptions apply
tests:
  - input:
      age_years: 75
    expect:
      age_group: elderly
      adjustment_needed: true
      dose_reduction_percent: 25
  - input:
      age_years: 65
    expect:
      age_group: elderly
      adjustment_needed: true
  - input:
      age_years: 50
    expect:
      age_group: adult
      adjustment_needed: false
  - input:
      age_years: 40
    expect:
      age_group: adult
      adjustment_needed: false
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
