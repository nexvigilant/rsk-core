# MICROGRAM++ (upgraded 2026-04-23)
name: ab-mass-negative
version: 0.1.0
description: "Antibody: detects negative mass values (stem-phys Mass invariant). Mass must be non-negative — single boolean gate."
family: antibody.chemistry
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - antibody
inputs:
  - name: mass_value
    type: number
    required: true
    description: ""
outputs:
  - name: threat
    type: boolean
  - name: response
    type: string
interface:
  inputs:
    mass_value:
      type: number
      required: true
  outputs:
    threat:
      type: boolean
    response:
      type: string
ui:
  title: Mass Negative
  subtitle: "Antibody: detects negative mass values (stem-phys Mass invariant). Mass must be non-negative — single boolean gate."
  icon: shield
  route: /vigilance/mg/ab-mass-negative
  steps:
    - field: mass_value
      label: mass value
      help: Enter mass_value
      widget: number
      placeholder: null
  result:
    template: "threat: {{threat}} — response: {{response}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ab-mass-negative
  cli: rsk mcg run ab-mass-negative
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: mass_value
      operator: lt
      value: 0
      true_next: violation
      false_next: clean
    violation:
      type: return
      value:
        threat: true
        response: "BLOCK: negative mass violates stem-phys invariant — clamp to 0"
    clean:
      type: return
      value:
        threat: false
        response: PASS
tests:
  - input:
      mass_value: 70
    expect:
      threat: false
      response: PASS
  - input:
      mass_value: 0
    expect:
      threat: false
      response: PASS
  - input:
      mass_value: -5
    expect:
      threat: true
  - input: {}
    expect:
      response: PASS
      threat: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - threat
    - response
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: antibody.chemistry
  log_level: info
governance:
  sop_ref: SOP-CHEM-001
  regulatory_ref: []
  harm_types:
    - F
  review_cadence: quarterly
  tov_axioms:
    - conservation
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
