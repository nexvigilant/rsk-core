# MICROGRAM++ (upgraded 2026-04-23)
name: ml-vs-statistical-comparator
version: 0.1.0
description: Classify ML vs PRR agreement for a drug-event pair. Returns BOTH_SIGNAL, BOTH_NOISE, ML_ONLY, or PRR_ONLY with action routing.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: prr
    type: float
    required: true
    description: ""
  - name: ml_probability
    type: float
    required: true
    description: ""
outputs:
  - name: agreement
    type: string
  - name: action
    type: string
interface:
  inputs:
    prr:
      type: float
      required: true
    ml_probability:
      type: float
      required: true
  outputs:
    agreement:
      type: string
    action:
      type: string
ui:
  title: Ml Vs Statistical Comparator
  subtitle: Classify ML vs PRR agreement for a drug-event pair. Returns BOTH_SIGNAL, BOTH_NOISE, ML_ONLY, or PRR_ONLY with action routing.
  icon: circle
  route: /vigilance/mg/ml-vs-statistical-comparator
  steps:
    - field: prr
      label: prr
      help: Enter prr
      widget: text
      placeholder: null
    - field: ml_probability
      label: ml probability
      help: Enter ml_probability
      widget: text
      placeholder: null
  result:
    template: "agreement: {{agreement}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ml-vs-statistical-comparator
  cli: rsk mcg run ml-vs-statistical-comparator
  auth: none
  rate_limit: 600/min
tree:
  start: check_prr
  nodes:
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: prr_positive
      false_next: prr_negative
    prr_positive:
      type: condition
      variable: ml_probability
      operator: gt
      value: 0.5
      true_next: both_signal
      false_next: prr_only
    prr_negative:
      type: condition
      variable: ml_probability
      operator: gt
      value: 0.5
      true_next: ml_only
      false_next: both_noise
    both_signal:
      type: return
      value:
        agreement: BOTH_SIGNAL
        action: escalate
        confidence: high
    both_noise:
      type: return
      value:
        agreement: BOTH_NOISE
        action: archive
        confidence: high
    ml_only:
      type: return
      value:
        agreement: ML_ONLY
        action: review
        confidence: medium
    prr_only:
      type: return
      value:
        agreement: PRR_ONLY
        action: deprioritize
        confidence: medium
tests:
  - name: both signal — metformin lactic acidosis
    input:
      prr: 71.6
      ml_probability: 0.96
    expect:
      agreement: BOTH_SIGNAL
      action: escalate
  - name: both noise — metformin nausea
    input:
      prr: 1.85
      ml_probability: 0.07
    expect:
      agreement: BOTH_NOISE
      action: archive
  - name: prr only — semaglutide nausea
    input:
      prr: 3.95
      ml_probability: 0.43
    expect:
      agreement: PRR_ONLY
      action: deprioritize
  - name: ml only — borderline case
    input:
      prr: 1.5
      ml_probability: 0.72
    expect:
      agreement: ML_ONLY
      action: review
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - agreement
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
