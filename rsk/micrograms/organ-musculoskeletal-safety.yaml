# MICROGRAM++ (upgraded 2026-04-23)
name: organ-musculoskeletal-safety
version: 0.1.0
description: Musculoskeletal safety assessment. Evaluates myopathy, tendon rupture, and bone loss risks.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Organ Musculoskeletal Safety
  subtitle: Musculoskeletal safety assessment. Evaluates myopathy, tendon rupture, and bone loss risks.
  icon: circle
  route: /vigilance/mg/organ-musculoskeletal-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/organ-musculoskeletal-safety
  cli: rsk mcg run organ-musculoskeletal-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_myopathy_history
  nodes:
    check_myopathy_history:
      type: condition
      variable: has_neuromuscular_disease
      operator: eq
      value: true
      true_next: myopathy_alert
      false_next: check_creatine_kinase
    myopathy_alert:
      type: return
      value:
        organ: musculoskeletal
        risk_level: high
        myotoxicity_risk: true
        monitoring: required
        message: Neuromuscular disease present; myotoxic drugs require caution
    check_creatine_kinase:
      type: condition
      variable: baseline_creatine_kinase_iu_l
      operator: gte
      value: 1000
      true_next: elevated_ck
      false_next: check_tendon_disease
    elevated_ck:
      type: return
      value:
        organ: musculoskeletal
        risk_level: high
        rhabdomyolysis_risk: true
        message: Elevated baseline CK; myotoxic drugs contraindicated
    check_tendon_disease:
      type: condition
      variable: history_tendon_rupture
      operator: eq
      value: true
      true_next: tendon_alert
      false_next: standard_dosing
    tendon_alert:
      type: return
      value:
        organ: musculoskeletal
        risk_level: high
        tendinopathy_risk: true
        message: Prior tendon rupture; fluoroquinolones and certain drugs contraindicated
    standard_dosing:
      type: return
      value:
        organ: musculoskeletal
        risk_level: low
tests:
  - input:
      has_neuromuscular_disease: true
      baseline_creatine_kinase_iu_l: 500
      history_tendon_rupture: false
    expect:
      organ: musculoskeletal
      risk_level: high
      myotoxicity_risk: true
  - input:
      has_neuromuscular_disease: false
      baseline_creatine_kinase_iu_l: 1200
      history_tendon_rupture: false
    expect:
      organ: musculoskeletal
      risk_level: high
      rhabdomyolysis_risk: true
  - input:
      has_neuromuscular_disease: false
      baseline_creatine_kinase_iu_l: 500
      history_tendon_rupture: true
    expect:
      organ: musculoskeletal
      risk_level: high
      tendinopathy_risk: true
  - input:
      has_neuromuscular_disease: false
      baseline_creatine_kinase_iu_l: 500
      history_tendon_rupture: false
    expect:
      organ: musculoskeletal
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
