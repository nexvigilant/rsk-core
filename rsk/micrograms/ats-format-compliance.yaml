# MICROGRAM++ (upgraded 2026-04-23)
name: ats-format-compliance
version: 0.1.0
description: Check resume format for ATS parser compatibility — headers, file type, encoding, structure
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: has_standard_headers
    type: bool
    required: false
    description: ""
  - name: uses_simple_formatting
    type: bool
    required: false
    description: ""
  - name: file_type_compatible
    type: bool
    required: false
    description: ""
  - name: has_contact_info
    type: bool
    required: false
    description: ""
  - name: sections_detected
    type: integer
    required: false
    description: ""
outputs:
  - name: format_score
    type: integer
  - name: format_verdict
    type: string
  - name: parseable
    type: bool
  - name: issues
    type: string
interface:
  inputs:
    has_standard_headers:
      type: bool
      required: false
    uses_simple_formatting:
      type: bool
      required: false
    file_type_compatible:
      type: bool
      required: false
    has_contact_info:
      type: bool
      required: false
    sections_detected:
      type: integer
      required: false
  outputs:
    format_score:
      type: integer
    format_verdict:
      type: string
    parseable:
      type: bool
    issues:
      type: string
ui:
  title: Ats Format Compliance
  subtitle: Check resume format for ATS parser compatibility — headers, file type, encoding, structure
  icon: circle
  route: /vigilance/mg/ats-format-compliance
  steps:
    - field: has_standard_headers
      label: has standard headers
      help: Enter has_standard_headers
      widget: toggle
      placeholder: null
    - field: uses_simple_formatting
      label: uses simple formatting
      help: Enter uses_simple_formatting
      widget: toggle
      placeholder: null
    - field: file_type_compatible
      label: file type compatible
      help: Enter file_type_compatible
      widget: toggle
      placeholder: null
    - field: has_contact_info
      label: has contact info
      help: Enter has_contact_info
      widget: toggle
      placeholder: null
    - field: sections_detected
      label: sections detected
      help: Enter sections_detected
      widget: number
      placeholder: null
  result:
    template: "format_score: {{format_score}} — format_verdict: {{format_verdict}} — parseable: {{parseable}} — issues: {{issues}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/ats-format-compliance
  cli: rsk mcg run ats-format-compliance
  auth: none
  rate_limit: 600/min
tree:
  start: file_type_check
  nodes:
    file_type_check:
      type: condition
      variable: file_type_compatible
      operator: eq
      value: false
      true_next: format_fail
      false_next: headers_check
    headers_check:
      type: condition
      variable: has_standard_headers
      operator: eq
      value: false
      true_next: headers_missing
      false_next: formatting_check
    formatting_check:
      type: condition
      variable: uses_simple_formatting
      operator: eq
      value: false
      true_next: complex_format
      false_next: contact_check
    contact_check:
      type: condition
      variable: has_contact_info
      operator: eq
      value: false
      true_next: no_contact
      false_next: sections_check
    sections_check:
      type: condition
      variable: sections_detected
      operator: gte
      value: 3
      true_next: format_pass
      false_next: few_sections
    format_fail:
      type: return
      value:
        format_score: 10
        format_verdict: FAIL
        parseable: false
        issues: Incompatible file type — use .docx or .pdf. Avoid images, infographics, or non-standard formats
    headers_missing:
      type: return
      value:
        format_score: 40
        format_verdict: WARN
        parseable: true
        issues: Missing standard section headers (Experience, Education, Skills). ATS uses headers to parse sections
    complex_format:
      type: return
      value:
        format_score: 50
        format_verdict: WARN
        parseable: true
        issues: Complex formatting detected (tables, columns, text boxes, headers/footers). Simplify to single-column layout
    no_contact:
      type: return
      value:
        format_score: 60
        format_verdict: WARN
        parseable: true
        issues: Contact information not detected at top. Place name, email, phone in plain text at document start
    few_sections:
      type: return
      value:
        format_score: 65
        format_verdict: WARN
        parseable: true
        issues: "Fewer than 3 sections detected. Standard: Summary, Experience, Education, Skills (minimum)"
    format_pass:
      type: return
      value:
        format_score: 90
        format_verdict: PASS
        parseable: true
        issues: Format is ATS-compatible
tests:
  - input:
      file_type_compatible: false
      has_standard_headers: true
      uses_simple_formatting: true
      has_contact_info: true
      sections_detected: 4
    expect:
      format_verdict: FAIL
      parseable: false
  - input:
      file_type_compatible: true
      has_standard_headers: true
      uses_simple_formatting: true
      has_contact_info: true
      sections_detected: 4
    expect:
      format_verdict: PASS
      parseable: true
      format_score: 90
  - input:
      file_type_compatible: true
      has_standard_headers: false
      uses_simple_formatting: true
      has_contact_info: true
      sections_detected: 4
    expect:
      format_verdict: WARN
      format_score: 40
  - input:
      file_type_compatible: true
      has_standard_headers: true
      uses_simple_formatting: false
      has_contact_info: true
      sections_detected: 4
    expect:
      format_verdict: WARN
      format_score: 50
  - input:
      file_type_compatible: true
      has_standard_headers: true
      uses_simple_formatting: true
      has_contact_info: false
      sections_detected: 4
    expect:
      format_verdict: WARN
      format_score: 60
  - input:
      file_type_compatible: true
      has_standard_headers: true
      uses_simple_formatting: true
      has_contact_info: true
      sections_detected: 2
    expect:
      format_verdict: WARN
      format_score: 65
  - input: {}
    expect:
      format_verdict: WARN
      parseable: true
      format_score: 65
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - format_score
    - format_verdict
    - parseable
    - issues
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
