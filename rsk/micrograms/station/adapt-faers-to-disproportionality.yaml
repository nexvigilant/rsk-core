# MICROGRAM++ (upgraded 2026-04-23)
name: adapt-faers-to-disproportionality
version: 0.1.0
description: |
  Adapter: transforms openFDA FAERS drug_event counts into the input shape needed by PRR/disproportionality computation. Takes raw FAERS counts (drug_event, drug_total, event_total, all_total) and classifies whether there is sufficient data to compute PRR, plus passes through for calculation.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: drug_event_count
    type: int
    required: true
    description: Count of reports with both the drug AND the event (cell A in 2x2 table)
  - name: drug_total
    type: int
    required: true
    description: Total reports for the drug (A+B)
  - name: event_total
    type: int
    required: true
    description: Total reports for the event (A+C)
  - name: all_total
    type: int
    required: true
    description: Total reports in database (A+B+C+D)
outputs:
  - name: sufficient_data
    type: bool
  - name: action
    type: string
  - name: a
    type: int
  - name: b
    type: int
  - name: c
    type: int
  - name: d
    type: int
interface:
  inputs:
    drug_event_count:
      type: int
      required: true
      description: Count of reports with both the drug AND the event (cell A in 2x2 table)
    drug_total:
      type: int
      required: true
      description: Total reports for the drug (A+B)
    event_total:
      type: int
      required: true
      description: Total reports for the event (A+C)
    all_total:
      type: int
      required: true
      description: Total reports in database (A+B+C+D)
  outputs:
    sufficient_data:
      type: bool
    action:
      type: string
    a:
      type: int
      description: 2x2 cell A (drug+event) — passthrough for PRR computation
    b:
      type: int
      description: 2x2 cell B (drug+no_event)
    c:
      type: int
      description: 2x2 cell C (no_drug+event)
    d:
      type: int
      description: 2x2 cell D (no_drug+no_event)
ui:
  title: Adapt Faers To Disproportionality
  subtitle: |
    Adapter: transforms openFDA FAERS drug_event counts into the input shape needed by PRR/disproportionality computation. Takes raw FAERS counts (drug_event, drug_total, event_total, all_total) and classifies whether there is sufficient data to compute PRR, plus passes through for calculation.
  icon: circle
  route: /vigilance/mg/adapt-faers-to-disproportionality
  steps:
    - field: drug_event_count
      label: drug event count
      help: Count of reports with both the drug AND the event (cell A in 2x2 table)
      widget: text
      placeholder: null
    - field: drug_total
      label: drug total
      help: Total reports for the drug (A+B)
      widget: text
      placeholder: null
    - field: event_total
      label: event total
      help: Total reports for the event (A+C)
      widget: text
      placeholder: null
    - field: all_total
      label: all total
      help: Total reports in database (A+B+C+D)
      widget: text
      placeholder: null
  result:
    template: "sufficient_data: {{sufficient_data}} — action: {{action}} — a: {{a}} — b: {{b}} — c: {{c}} — d: {{d}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/adapt-faers-to-disproportionality
  cli: rsk mcg run adapt-faers-to-disproportionality
  auth: none
  rate_limit: 600/min
tree:
  start: check_drug_event_present
  nodes:
    check_drug_event_present:
      type: condition
      variable: drug_event_count
      operator: is_null
      value: null
      true_next: reject
      false_next: check_minimum_cases
    reject:
      type: return
      value:
        sufficient_data: false
        action: "REJECTED: drug_event_count is required"
        a: 0
        b: 0
        c: 0
        d: 0
    check_minimum_cases:
      type: condition
      variable: drug_event_count
      operator: gte
      value: 3
      true_next: sufficient
      false_next: insufficient
    insufficient:
      type: return
      value:
        sufficient_data: false
        action: "ACCUMULATE: fewer than 3 reports — insufficient for disproportionality"
        a: 0
        b: 0
        c: 0
        d: 0
    sufficient:
      type: return
      value:
        sufficient_data: true
        action: "COMPUTE: sufficient data for PRR/ROR calculation"
        a: 0
        b: 0
        c: 0
        d: 0
tests:
  - input:
      drug_event_count: 50
      drug_total: 5000
      event_total: 200
      all_total: 1000000
    expect:
      sufficient_data: true
  - input:
      drug_event_count: 2
      drug_total: 100
      event_total: 50
      all_total: 500000
    expect:
      sufficient_data: false
  - input:
      drug_event_count: 3
      drug_total: 200
      event_total: 100
      all_total: 800000
    expect:
      sufficient_data: true
  - input: {}
    expect:
      sufficient_data: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - sufficient_data
    - action
    - a
    - b
    - c
    - d
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
