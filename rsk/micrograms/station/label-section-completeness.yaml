# MICROGRAM++ (upgraded 2026-04-23)
name: label-section-completeness
version: 0.1.0
description: Evaluates drug label completeness for safety assessment. Gates on presence of critical safety information sections.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: has_adverse_reactions
    type: bool
    required: false
    description: ""
  - name: has_contraindications
    type: bool
    required: false
    description: ""
  - name: has_warnings
    type: bool
    required: false
    description: ""
  - name: has_interactions
    type: bool
    required: false
    description: ""
outputs:
  - name: completeness
    type: string
  - name: safety_assessable
    type: bool
interface:
  inputs:
    has_adverse_reactions:
      type: bool
      required: false
    has_contraindications:
      type: bool
      required: false
    has_warnings:
      type: bool
      required: false
    has_interactions:
      type: bool
      required: false
  outputs:
    completeness:
      type: string
    safety_assessable:
      type: bool
ui:
  title: Label Section Completeness
  subtitle: Evaluates drug label completeness for safety assessment. Gates on presence of critical safety information sections.
  icon: circle
  route: /vigilance/mg/label-section-completeness
  steps:
    - field: has_adverse_reactions
      label: has adverse reactions
      help: Enter has_adverse_reactions
      widget: toggle
      placeholder: null
    - field: has_contraindications
      label: has contraindications
      help: Enter has_contraindications
      widget: toggle
      placeholder: null
    - field: has_warnings
      label: has warnings
      help: Enter has_warnings
      widget: toggle
      placeholder: null
    - field: has_interactions
      label: has interactions
      help: Enter has_interactions
      widget: toggle
      placeholder: null
  result:
    template: "completeness: {{completeness}} — safety_assessable: {{safety_assessable}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/label-section-completeness
  cli: rsk mcg run label-section-completeness
  auth: none
  rate_limit: 600/min
tree:
  start: count_sections
  nodes:
    count_sections:
      type: condition
      variable: has_adverse_reactions
      operator: eq
      value: true
      true_next: check_contraindications
      false_next: incomplete_baseline
    check_contraindications:
      type: condition
      variable: has_contraindications
      operator: eq
      value: true
      true_next: check_warnings
      false_next: partial_check
    check_warnings:
      type: condition
      variable: has_warnings
      operator: eq
      value: true
      true_next: check_interactions
      false_next: partial_check
    check_interactions:
      type: condition
      variable: has_interactions
      operator: eq
      value: true
      true_next: complete
      false_next: partial_check
    partial_check:
      type: condition
      variable: has_adverse_reactions
      operator: eq
      value: true
      true_next: partial
      false_next: incomplete_baseline
    complete:
      type: return
      value:
        completeness: complete
        safety_assessable: true
    partial:
      type: return
      value:
        completeness: partial
        safety_assessable: true
    incomplete_baseline:
      type: return
      value:
        completeness: minimal
        safety_assessable: false
tests:
  - input:
      has_adverse_reactions: true
      has_contraindications: true
      has_warnings: true
      has_interactions: true
    expect:
      completeness: complete
      safety_assessable: true
  - input:
      has_adverse_reactions: true
      has_contraindications: true
      has_warnings: true
      has_interactions: false
    expect:
      completeness: partial
      safety_assessable: true
  - input:
      has_adverse_reactions: true
      has_contraindications: false
      has_warnings: true
      has_interactions: false
    expect:
      completeness: partial
      safety_assessable: true
  - input:
      has_adverse_reactions: false
      has_contraindications: true
      has_warnings: true
      has_interactions: true
    expect:
      completeness: minimal
      safety_assessable: false
  - input:
      has_adverse_reactions: true
      has_contraindications: true
      has_warnings: false
      has_interactions: true
    expect:
      completeness: partial
      safety_assessable: true
  - input: {}
    expect:
      completeness: minimal
      safety_assessable: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - completeness
    - safety_assessable
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
