# MICROGRAM++ (upgraded 2026-04-23)
name: expedited-reporting-gate
version: 0.1.0
description: Determines if an adverse event requires expedited reporting (ICH E2A). Evaluates seriousness, unexpectedness, relatedness, and fatality to classify reporting timeline and type.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: is_serious
    type: bool
    required: false
    description: ""
  - name: is_unexpected
    type: bool
    required: false
    description: ""
  - name: is_related
    type: bool
    required: false
    description: ""
  - name: is_fatal
    type: bool
    required: false
    description: ""
outputs:
  - name: expedited
    type: bool
  - name: timeline_days
    type: int
  - name: report_type
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    is_serious:
      type: bool
      required: false
    is_unexpected:
      type: bool
      required: false
    is_related:
      type: bool
      required: false
    is_fatal:
      type: bool
      required: false
  outputs:
    expedited:
      type: bool
    timeline_days:
      type: int
    report_type:
      type: string
    regulatory_reference:
      type: string
ui:
  title: Expedited Reporting Gate
  subtitle: Determines if an adverse event requires expedited reporting (ICH E2A). Evaluates seriousness, unexpectedness, relatedness, and fatality to classify reporting timeline and type.
  icon: circle
  route: /vigilance/mg/expedited-reporting-gate
  steps:
    - field: is_serious
      label: is serious
      help: Enter is_serious
      widget: toggle
      placeholder: null
    - field: is_unexpected
      label: is unexpected
      help: Enter is_unexpected
      widget: toggle
      placeholder: null
    - field: is_related
      label: is related
      help: Enter is_related
      widget: toggle
      placeholder: null
    - field: is_fatal
      label: is fatal
      help: Enter is_fatal
      widget: toggle
      placeholder: null
  result:
    template: "expedited: {{expedited}} — timeline_days: {{timeline_days}} — report_type: {{report_type}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/expedited-reporting-gate
  cli: rsk mcg run expedited-reporting-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_fatal
  nodes:
    check_fatal:
      type: condition
      variable: is_fatal
      operator: eq
      value: true
      true_next: fatal_case
      false_next: check_serious
    fatal_case:
      type: return
      value:
        expedited: true
        timeline_days: 7
        report_type: 15day_urgent
        regulatory_reference: ICH_E2A_fatal
    check_serious:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: serious_check_unexpected
      false_next: non_serious
    serious_check_unexpected:
      type: condition
      variable: is_unexpected
      operator: eq
      value: true
      true_next: serious_unexpected_check_related
      false_next: serious_expected
    serious_unexpected_check_related:
      type: condition
      variable: is_related
      operator: eq
      value: true
      true_next: serious_unexpected_related
      false_next: serious_unexpected_unrelated
    serious_unexpected_related:
      type: return
      value:
        expedited: true
        timeline_days: 15
        report_type: 15day
        regulatory_reference: ICH_E2A_serious_unexpected_related
    serious_unexpected_unrelated:
      type: return
      value:
        expedited: false
        timeline_days: 30
        report_type: periodic
        regulatory_reference: ICH_E2A_serious_unexpected_unrelated
    serious_expected:
      type: return
      value:
        expedited: false
        timeline_days: 30
        report_type: periodic
        regulatory_reference: ICH_E2A_serious_expected
    non_serious:
      type: return
      value:
        expedited: false
        timeline_days: 0
        report_type: none
        regulatory_reference: ICH_E2A_non_serious
tests:
  - input:
      is_fatal: true
      is_serious: true
      is_unexpected: true
      is_related: true
    expect:
      expedited: true
      timeline_days: 7
      report_type: 15day_urgent
      regulatory_reference: ICH_E2A_fatal
  - input:
      is_fatal: false
      is_serious: true
      is_unexpected: true
      is_related: true
    expect:
      expedited: true
      timeline_days: 15
      report_type: 15day
      regulatory_reference: ICH_E2A_serious_unexpected_related
  - input:
      is_fatal: false
      is_serious: true
      is_unexpected: true
      is_related: false
    expect:
      expedited: false
      timeline_days: 30
      report_type: periodic
      regulatory_reference: ICH_E2A_serious_unexpected_unrelated
  - input:
      is_fatal: false
      is_serious: true
      is_unexpected: false
      is_related: true
    expect:
      expedited: false
      timeline_days: 30
      report_type: periodic
      regulatory_reference: ICH_E2A_serious_expected
  - input:
      is_fatal: false
      is_serious: false
      is_unexpected: true
      is_related: true
    expect:
      expedited: false
      timeline_days: 0
      report_type: none
      regulatory_reference: ICH_E2A_non_serious
  - input: {}
    expect:
      expedited: false
      timeline_days: 0
      report_type: none
      regulatory_reference: ICH_E2A_non_serious
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - expedited
    - timeline_days
    - report_type
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
