# MICROGRAM++ (upgraded 2026-04-23)
name: config-fda-recall-severity
version: 0.1.0
description: Classify FDA recall severity from accessdata search-recalls output. Routes by recall class and voluntary/mandatory status.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: recall_class
    type: string
    required: false
    description: "FDA recall classification: I, II, III"
  - name: is_ongoing
    type: bool
    required: false
    description: Recall is currently active
  - name: distribution_scope
    type: string
    required: false
    description: nationwide, statewide, local, international
  - name: product_quantity
    type: int
    required: false
    description: Quantity of product affected
outputs:
  - name: urgency
    type: string
  - name: patient_impact
    type: string
  - name: requires_notification
    type: bool
interface:
  inputs:
    recall_class:
      type: string
      required: false
      description: "FDA recall classification: I, II, III"
    is_ongoing:
      type: bool
      required: false
      description: Recall is currently active
    distribution_scope:
      type: string
      required: false
      description: nationwide, statewide, local, international
    product_quantity:
      type: int
      required: false
      description: Quantity of product affected
  outputs:
    urgency:
      type: string
      description: critical, high, moderate, low, informational
    patient_impact:
      type: string
    requires_notification:
      type: bool
ui:
  title: Config Fda Recall Severity
  subtitle: Classify FDA recall severity from accessdata search-recalls output. Routes by recall class and voluntary/mandatory status.
  icon: circle
  route: /vigilance/mg/config-fda-recall-severity
  steps:
    - field: recall_class
      label: recall class
      help: "FDA recall classification: I, II, III"
      widget: text
      placeholder: null
    - field: is_ongoing
      label: is ongoing
      help: Recall is currently active
      widget: toggle
      placeholder: null
    - field: distribution_scope
      label: distribution scope
      help: nationwide, statewide, local, international
      widget: text
      placeholder: null
    - field: product_quantity
      label: product quantity
      help: Quantity of product affected
      widget: text
      placeholder: null
  result:
    template: "urgency: {{urgency}} — patient_impact: {{patient_impact}} — requires_notification: {{requires_notification}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/config-fda-recall-severity
  cli: rsk mcg run config-fda-recall-severity
  auth: none
  rate_limit: 600/min
tree:
  start: check_class
  nodes:
    check_class:
      type: condition
      variable: recall_class
      operator: is_null
      true_next: informational
      false_next: check_class_i
    check_class_i:
      type: condition
      variable: recall_class
      operator: eq
      value: I
      true_next: check_class_i_scope
      false_next: check_class_ii
    check_class_i_scope:
      type: condition
      variable: distribution_scope
      operator: is_null
      true_next: critical_default
      false_next: check_international
    check_international:
      type: condition
      variable: distribution_scope
      operator: eq
      value: international
      true_next: critical_international
      false_next: check_nationwide
    check_nationwide:
      type: condition
      variable: distribution_scope
      operator: eq
      value: nationwide
      true_next: critical_nationwide
      false_next: critical_default
    check_class_ii:
      type: condition
      variable: recall_class
      operator: eq
      value: II
      true_next: check_class_ii_ongoing
      false_next: check_class_iii
    check_class_ii_ongoing:
      type: condition
      variable: is_ongoing
      operator: eq
      value: true
      true_next: high_ongoing
      false_next: moderate_resolved
    check_class_iii:
      type: condition
      variable: recall_class
      operator: eq
      value: III
      true_next: low_class_iii
      false_next: informational
    critical_international:
      type: return
      value:
        urgency: critical
        patient_impact: serious_harm_or_death
        requires_notification: true
    critical_nationwide:
      type: return
      value:
        urgency: critical
        patient_impact: serious_harm_or_death
        requires_notification: true
    critical_default:
      type: return
      value:
        urgency: critical
        patient_impact: serious_harm_or_death
        requires_notification: true
    high_ongoing:
      type: return
      value:
        urgency: high
        patient_impact: temporary_or_reversible
        requires_notification: true
    moderate_resolved:
      type: return
      value:
        urgency: moderate
        patient_impact: temporary_or_reversible
        requires_notification: false
    low_class_iii:
      type: return
      value:
        urgency: low
        patient_impact: unlikely_adverse_health
        requires_notification: false
    informational:
      type: return
      value:
        urgency: informational
        patient_impact: unknown
        requires_notification: false
tests:
  - input:
      recall_class: I
      is_ongoing: true
      distribution_scope: international
      product_quantity: 50000
    expect:
      urgency: critical
      patient_impact: serious_harm_or_death
      requires_notification: true
  - input:
      recall_class: I
      is_ongoing: true
      distribution_scope: nationwide
    expect:
      urgency: critical
      patient_impact: serious_harm_or_death
      requires_notification: true
  - input:
      recall_class: I
      is_ongoing: true
      distribution_scope: local
    expect:
      urgency: critical
      patient_impact: serious_harm_or_death
      requires_notification: true
  - input:
      recall_class: II
      is_ongoing: true
      distribution_scope: nationwide
    expect:
      urgency: high
      patient_impact: temporary_or_reversible
      requires_notification: true
  - input:
      recall_class: II
      is_ongoing: false
      distribution_scope: statewide
    expect:
      urgency: moderate
      patient_impact: temporary_or_reversible
      requires_notification: false
  - input:
      recall_class: III
      is_ongoing: false
    expect:
      urgency: low
      patient_impact: unlikely_adverse_health
      requires_notification: false
  - input: {}
    expect:
      urgency: informational
      patient_impact: unknown
      requires_notification: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - urgency
    - patient_impact
    - requires_notification
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
