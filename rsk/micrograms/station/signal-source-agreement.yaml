name: signal-source-agreement
description: "Determines if multiple data sources agree on a safety signal and quantifies agreement strength"
version: 0.1.0

interface:
  inputs:
    faers_signal:
      type: boolean
      description: "Whether FAERS data indicates a safety signal"
    literature_signal:
      type: boolean
      description: "Whether literature/published studies indicate a safety signal"
    trial_signal:
      type: boolean
      description: "Whether clinical trial data indicate a safety signal"
    label_mentions:
      type: boolean
      description: "Whether the adverse event is mentioned in drug label"
  outputs:
    agreement_level:
      type: string
      description: "Strength of source agreement: strong/moderate/weak/none"
    source_count:
      type: integer
      description: "Number of sources reporting the signal"
    confidence:
      type: string
      description: "Confidence in signal agreement: high/medium/low"

tree:
  start: check_any_signal
  nodes:
    check_any_signal:
      type: condition
      variable: faers_signal
      operator: eq
      value: false
      true_next: check_literature
      false_next: count_with_faers

    check_literature:
      type: condition
      variable: literature_signal
      operator: eq
      value: false
      true_next: check_trial
      false_next: count_without_faers

    check_trial:
      type: condition
      variable: trial_signal
      operator: eq
      value: false
      true_next: check_label_only
      false_next: trial_with_label

    check_label_only:
      type: condition
      variable: label_mentions
      operator: eq
      value: true
      true_next: one_signal
      false_next: no_signal

    trial_with_label:
      type: condition
      variable: label_mentions
      operator: eq
      value: true
      true_next: two_sources
      false_next: one_signal

    # FAERS is true
    count_with_faers:
      type: condition
      variable: literature_signal
      operator: eq
      value: true
      true_next: check_more_with_faers_lit
      false_next: check_trial_with_faers

    check_more_with_faers_lit:
      type: condition
      variable: trial_signal
      operator: eq
      value: true
      true_next: check_label_with_three
      false_next: check_label_with_two_faers_lit

    check_label_with_three:
      type: condition
      variable: label_mentions
      operator: eq
      value: true
      true_next: four_sources
      false_next: three_sources

    check_label_with_two_faers_lit:
      type: condition
      variable: label_mentions
      operator: eq
      value: true
      true_next: three_sources
      false_next: two_sources

    check_trial_with_faers:
      type: condition
      variable: trial_signal
      operator: eq
      value: true
      true_next: check_label_with_faers_trial
      false_next: check_label_with_faers_only

    check_label_with_faers_trial:
      type: condition
      variable: label_mentions
      operator: eq
      value: true
      true_next: three_sources
      false_next: two_sources

    check_label_with_faers_only:
      type: condition
      variable: label_mentions
      operator: eq
      value: true
      true_next: two_sources
      false_next: one_signal

    # Literature without FAERS
    count_without_faers:
      type: condition
      variable: trial_signal
      operator: eq
      value: true
      true_next: check_label_without_faers
      false_next: check_label_lit_only

    check_label_without_faers:
      type: condition
      variable: label_mentions
      operator: eq
      value: true
      true_next: three_sources
      false_next: two_sources

    check_label_lit_only:
      type: condition
      variable: label_mentions
      operator: eq
      value: true
      true_next: two_sources
      false_next: one_signal

    # Return nodes
    no_signal:
      type: return
      value:
        agreement_level: none
        source_count: 0
        confidence: low

    one_signal:
      type: return
      value:
        agreement_level: weak
        source_count: 1
        confidence: low

    two_sources:
      type: return
      value:
        agreement_level: moderate
        source_count: 2
        confidence: medium

    three_sources:
      type: return
      value:
        agreement_level: strong
        source_count: 3
        confidence: high

    four_sources:
      type: return
      value:
        agreement_level: strong
        source_count: 4
        confidence: high

tests:
  - name: "All sources agree"
    input:
      faers_signal: true
      literature_signal: true
      trial_signal: true
      label_mentions: true
    expect:
      agreement_level: strong
      source_count: 4
      confidence: high

  - name: "Three sources agree"
    input:
      faers_signal: true
      literature_signal: true
      trial_signal: true
      label_mentions: false
    expect:
      agreement_level: strong
      source_count: 3
      confidence: high

  - name: "Two sources agree"
    input:
      faers_signal: true
      literature_signal: true
      trial_signal: false
      label_mentions: false
    expect:
      agreement_level: moderate
      source_count: 2
      confidence: medium

  - name: "One source only"
    input:
      faers_signal: true
      literature_signal: false
      trial_signal: false
      label_mentions: false
    expect:
      agreement_level: weak
      source_count: 1
      confidence: low

  - name: "No sources agree"
    input:
      faers_signal: false
      literature_signal: false
      trial_signal: false
      label_mentions: false
    expect:
      agreement_level: none
      source_count: 0
      confidence: low

  - name: "Label and trial only"
    input:
      faers_signal: false
      literature_signal: false
      trial_signal: true
      label_mentions: true
    expect:
      agreement_level: moderate
      source_count: 2
      confidence: medium
