interface:
  inputs:
    question_type:
      type: string
      required: false
    requires_interaction_check:
      type: bool
      required: false
    drug_count:
      type: integer
      required: false
  outputs:
    multi_source:
      type: bool
      required: false
    domains:
      type: string
      required: false
    reason:
      type: string
      required: false
  aliases: {}
