name: station-multi-source-gate
description: "Gate: should this query hit multiple domains simultaneously?"
version: 0.1.0

interface:
  inputs:
    question_type:
      type: string
      description: "Type of question (drug_safety, drug_interaction, labeling, etc.)"
    drug_count:
      type: integer
      description: "Number of drugs in the query (1+)"
    requires_interaction_check:
      type: bool
      description: "True if query explicitly asks about drug-drug interactions"
  outputs:
    multi_source:
      type: bool
      description: "Whether to query multiple sources in parallel"
    domains:
      type: string
      description: "Comma-separated list of domains to hit (empty if single-source)"
    reason:
      type: string
      description: "Rationale for multi/single source decision"

tree:
  start: check_interaction_explicit
  nodes:
    check_interaction_explicit:
      type: condition
      variable: requires_interaction_check
      operator: eq
      value: true
      true_next: return_multi_interaction
      false_next: check_drug_count

    return_multi_interaction:
      type: return
      value:
        multi_source: true
        domains: "api.fda.gov,rxnav.nlm.nih.gov,pubmed.ncbi.nlm.nih.gov"
        reason: "Explicit drug-drug interaction check requires FAERS signals + RxNav interactions + literature review"

    check_drug_count:
      type: condition
      variable: drug_count
      operator: gte
      value: 2
      true_next: check_multi_drug_question_type
      false_next: check_single_drug_question_type

    check_multi_drug_question_type:
      type: condition
      variable: question_type
      operator: eq
      value: "drug_safety"
      true_next: return_multi_safety
      false_next: check_multi_interaction

    return_multi_safety:
      type: return
      value:
        multi_source: true
        domains: "api.fda.gov,pubmed.ncbi.nlm.nih.gov,eudravigilance.ema.europa.eu"
        reason: "Multiple drugs with safety question: FAERS + literature + EU surveillance for comprehensive signal coverage"

    check_multi_interaction:
      type: condition
      variable: question_type
      operator: eq
      value: "drug_interaction"
      true_next: return_multi_interaction_gate
      false_next: check_multi_labeling

    return_multi_interaction_gate:
      type: return
      value:
        multi_source: true
        domains: "rxnav.nlm.nih.gov,pubmed.ncbi.nlm.nih.gov,drugbank.com"
        reason: "Multiple drugs with interaction query: RxNav + literature + DrugBank comparison for thorough DDI assessment"

    check_multi_labeling:
      type: condition
      variable: question_type
      operator: eq
      value: "labeling"
      true_next: return_multi_labeling
      false_next: return_single_source_multi_drug

    return_multi_labeling:
      type: return
      value:
        multi_source: true
        domains: "dailymed.nlm.nih.gov,pubmed.ncbi.nlm.nih.gov"
        reason: "Multiple drugs with labeling inquiry: DailyMed + literature for comprehensive product information coverage"

    return_single_source_multi_drug:
      type: return
      value:
        multi_source: false
        domains: ""
        reason: "Multiple drugs but question type does not require multi-source validation"

    check_single_drug_question_type:
      type: condition
      variable: question_type
      operator: eq
      value: "drug_safety"
      true_next: return_safety_geo_gate
      false_next: check_single_interaction

    return_safety_geo_gate:
      type: return
      value:
        multi_source: true
        domains: "api.fda.gov,eudravigilance.ema.europa.eu,vigiaccess.org"
        reason: "Single drug safety query: FAERS (US) + EudraVigilance (EU) + VigiAccess (global) for geographic signal triangulation"

    check_single_interaction:
      type: condition
      variable: question_type
      operator: eq
      value: "drug_interaction"
      true_next: return_single_interaction
      false_next: check_single_literature

    return_single_interaction:
      type: return
      value:
        multi_source: false
        domains: ""
        reason: "Single drug, drug-interaction question: RxNav suffices (primary DDI database)"

    check_single_literature:
      type: condition
      variable: question_type
      operator: eq
      value: "literature"
      true_next: return_single_literature
      false_next: check_single_labeling

    return_single_literature:
      type: return
      value:
        multi_source: false
        domains: ""
        reason: "Literature search is inherently cross-source via PubMed aggregation"

    check_single_labeling:
      type: condition
      variable: question_type
      operator: eq
      value: "labeling"
      true_next: return_single_labeling
      false_next: return_default_single

    return_single_labeling:
      type: return
      value:
        multi_source: false
        domains: ""
        reason: "Single drug labeling: DailyMed is primary source"

    return_default_single:
      type: return
      value:
        multi_source: false
        domains: ""
        reason: "Default: single-source lookup for standard question types"

tests:
  - input: { question_type: "drug_interaction", drug_count: 2, requires_interaction_check: true }
    expect: { multi_source: true, domains: "api.fda.gov,rxnav.nlm.nih.gov,pubmed.ncbi.nlm.nih.gov", reason: "Explicit drug-drug interaction check requires FAERS signals + RxNav interactions + literature review" }

  - input: { question_type: "drug_safety", drug_count: 2, requires_interaction_check: false }
    expect: { multi_source: true, domains: "api.fda.gov,pubmed.ncbi.nlm.nih.gov,eudravigilance.ema.europa.eu", reason: "Multiple drugs with safety question: FAERS + literature + EU surveillance for comprehensive signal coverage" }

  - input: { question_type: "drug_interaction", drug_count: 2, requires_interaction_check: false }
    expect: { multi_source: true, domains: "rxnav.nlm.nih.gov,pubmed.ncbi.nlm.nih.gov,drugbank.com", reason: "Multiple drugs with interaction query: RxNav + literature + DrugBank comparison for thorough DDI assessment" }

  - input: { question_type: "labeling", drug_count: 2, requires_interaction_check: false }
    expect: { multi_source: true, domains: "dailymed.nlm.nih.gov,pubmed.ncbi.nlm.nih.gov", reason: "Multiple drugs with labeling inquiry: DailyMed + literature for comprehensive product information coverage" }

  - input: { question_type: "drug_safety", drug_count: 1, requires_interaction_check: false }
    expect: { multi_source: true, domains: "api.fda.gov,eudravigilance.ema.europa.eu,vigiaccess.org", reason: "Single drug safety query: FAERS (US) + EudraVigilance (EU) + VigiAccess (global) for geographic signal triangulation" }

  - input: { question_type: "drug_interaction", drug_count: 1, requires_interaction_check: false }
    expect: { multi_source: false, domains: "", reason: "Single drug, drug-interaction question: RxNav suffices (primary DDI database)" }

  - input: { question_type: "literature", drug_count: 1, requires_interaction_check: false }
    expect: { multi_source: false, domains: "", reason: "Literature search is inherently cross-source via PubMed aggregation" }

  - input: { question_type: "labeling", drug_count: 1, requires_interaction_check: false }
    expect: { multi_source: false, domains: "", reason: "Single drug labeling: DailyMed is primary source" }

  - input: { question_type: "nomenclature", drug_count: 1, requires_interaction_check: false }
    expect: { multi_source: false, domains: "", reason: "Default: single-source lookup for standard question types" }

  - input: { question_type: "unknown_type", drug_count: 0, requires_interaction_check: false }
    expect: { multi_source: false, domains: "", reason: "Default: single-source lookup for standard question types" }

  - input: { question_type: "", drug_count: 0, requires_interaction_check: false }
    expect: { multi_source: false, domains: "", reason: "Default: single-source lookup for standard question types" }
