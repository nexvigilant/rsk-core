# MICROGRAM++ (upgraded 2026-04-23)
name: benefit-risk-balance
version: 0.1.0
description: Simple benefit-risk assessment gate determining product balance and regulatory action recommendation. Evaluates efficacy, serious risks, alternatives, and risk minimization feasibility.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: efficacy_demonstrated
    type: bool
    required: false
    description: ""
  - name: serious_risk_identified
    type: bool
    required: false
    description: ""
  - name: alternative_exists
    type: bool
    required: false
    description: ""
  - name: risk_minimizable
    type: bool
    required: false
    description: ""
outputs:
  - name: balance
    type: string
  - name: action
    type: string
interface:
  inputs:
    efficacy_demonstrated:
      type: bool
      required: false
    serious_risk_identified:
      type: bool
      required: false
    alternative_exists:
      type: bool
      required: false
    risk_minimizable:
      type: bool
      required: false
  outputs:
    balance:
      type: string
    action:
      type: string
ui:
  title: Benefit Risk Balance
  subtitle: Simple benefit-risk assessment gate determining product balance and regulatory action recommendation. Evaluates efficacy, serious risks, alternatives, and risk minimization feasibility.
  icon: circle
  route: /vigilance/mg/benefit-risk-balance
  steps:
    - field: efficacy_demonstrated
      label: efficacy demonstrated
      help: Enter efficacy_demonstrated
      widget: toggle
      placeholder: null
    - field: serious_risk_identified
      label: serious risk identified
      help: Enter serious_risk_identified
      widget: toggle
      placeholder: null
    - field: alternative_exists
      label: alternative exists
      help: Enter alternative_exists
      widget: toggle
      placeholder: null
    - field: risk_minimizable
      label: risk minimizable
      help: Enter risk_minimizable
      widget: toggle
      placeholder: null
  result:
    template: "balance: {{balance}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/benefit-risk-balance
  cli: rsk mcg run benefit-risk-balance
  auth: none
  rate_limit: 600/min
tree:
  start: check_efficacy
  nodes:
    check_efficacy:
      type: condition
      variable: efficacy_demonstrated
      operator: eq
      value: true
      true_next: check_serious_risk
      false_next: no_efficacy
    no_efficacy:
      type: return
      value:
        balance: unfavorable
        action: withdraw
    check_serious_risk:
      type: condition
      variable: serious_risk_identified
      operator: eq
      value: true
      true_next: check_risk_minimizable
      false_next: favorable_balance
    favorable_balance:
      type: return
      value:
        balance: favorable
        action: continue
    check_risk_minimizable:
      type: condition
      variable: risk_minimizable
      operator: eq
      value: true
      true_next: check_alternative
      false_next: unmitigatable_risk
    unmitigatable_risk:
      type: return
      value:
        balance: unfavorable
        action: withdraw
    check_alternative:
      type: condition
      variable: alternative_exists
      operator: eq
      value: true
      true_next: alternative_available
      false_next: critical_indication
    alternative_available:
      type: return
      value:
        balance: unfavorable
        action: restrict
    critical_indication:
      type: return
      value:
        balance: uncertain
        action: investigate
tests:
  - input:
      efficacy_demonstrated: true
      serious_risk_identified: false
      alternative_exists: false
      risk_minimizable: false
    expect:
      balance: favorable
      action: continue
  - input:
      efficacy_demonstrated: false
      serious_risk_identified: true
      alternative_exists: true
      risk_minimizable: false
    expect:
      balance: unfavorable
      action: withdraw
  - input:
      efficacy_demonstrated: true
      serious_risk_identified: true
      alternative_exists: true
      risk_minimizable: true
    expect:
      balance: unfavorable
      action: restrict
  - input:
      efficacy_demonstrated: true
      serious_risk_identified: true
      alternative_exists: false
      risk_minimizable: true
    expect:
      balance: uncertain
      action: investigate
  - input:
      efficacy_demonstrated: true
      serious_risk_identified: true
      alternative_exists: false
      risk_minimizable: false
    expect:
      balance: unfavorable
      action: withdraw
  - input: {}
    expect:
      balance: unfavorable
      action: withdraw
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - balance
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
