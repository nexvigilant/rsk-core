# MICROGRAM++ (upgraded 2026-04-23)
name: response-completeness-gate
version: 0.1.0
description: Gates API response based on result count and error status. Determines if response is complete enough for use.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: result_count
    type: int
    required: false
    description: ""
  - name: min_threshold
    type: int
    required: false
    description: ""
  - name: has_error
    type: bool
    required: false
    description: ""
outputs:
  - name: quality
    type: string
  - name: usable
    type: bool
interface:
  inputs:
    result_count:
      type: int
      required: false
    min_threshold:
      type: int
      required: false
    has_error:
      type: bool
      required: false
  outputs:
    quality:
      type: string
    usable:
      type: bool
ui:
  title: Response Completeness Gate
  subtitle: Gates API response based on result count and error status. Determines if response is complete enough for use.
  icon: circle
  route: /vigilance/mg/response-completeness-gate
  steps:
    - field: result_count
      label: result count
      help: Enter result_count
      widget: text
      placeholder: null
    - field: min_threshold
      label: min threshold
      help: Enter min_threshold
      widget: text
      placeholder: null
    - field: has_error
      label: has error
      help: Enter has_error
      widget: toggle
      placeholder: null
  result:
    template: "quality: {{quality}} — usable: {{usable}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/response-completeness-gate
  cli: rsk mcg run response-completeness-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_error
  nodes:
    check_error:
      type: condition
      variable: has_error
      operator: eq
      value: true
      true_next: return_error
      false_next: check_null_count
    check_null_count:
      type: condition
      variable: result_count
      operator: is_null
      true_next: return_empty
      false_next: check_zero
    check_zero:
      type: condition
      variable: result_count
      operator: eq
      value: 0
      true_next: return_empty
      false_next: check_threshold
    check_threshold:
      type: condition
      variable: result_count
      operator: gte
      value: 5
      true_next: return_complete
      false_next: return_partial
    return_error:
      type: return
      value:
        quality: error
        usable: false
    return_empty:
      type: return
      value:
        quality: empty
        usable: false
    return_partial:
      type: return
      value:
        quality: partial
        usable: true
    return_complete:
      type: return
      value:
        quality: complete
        usable: true
tests:
  - input:
      result_count: 10
      min_threshold: 5
      has_error: false
    expect:
      quality: complete
      usable: true
  - input:
      result_count: 3
      min_threshold: 5
      has_error: false
    expect:
      quality: partial
      usable: true
  - input:
      result_count: 0
      min_threshold: 5
      has_error: false
    expect:
      quality: empty
      usable: false
  - input:
      result_count: 8
      min_threshold: 5
      has_error: true
    expect:
      quality: error
      usable: false
  - input:
      result_count: 5
      min_threshold: 5
      has_error: false
    expect:
      quality: complete
      usable: true
  - input: {}
    expect:
      quality: empty
      usable: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - quality
    - usable
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
