# MICROGRAM++ (upgraded 2026-04-23)
name: pubmed-relevance-gate
version: 0.1.0
description: Filters PubMed articles for pharmacovigilance relevance. Gates on article type, MeSH tags, and publication recency.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: article_type
    type: string
    required: false
    description: ""
  - name: has_adverse_event_mesh
    type: bool
    required: false
    description: ""
  - name: publication_year
    type: int
    required: false
    description: ""
  - name: is_case_report
    type: bool
    required: false
    description: ""
outputs:
  - name: pv_relevance
    type: string
  - name: include_in_analysis
    type: bool
interface:
  inputs:
    article_type:
      type: string
      required: false
    has_adverse_event_mesh:
      type: bool
      required: false
    publication_year:
      type: int
      required: false
    is_case_report:
      type: bool
      required: false
  outputs:
    pv_relevance:
      type: string
    include_in_analysis:
      type: bool
ui:
  title: Pubmed Relevance Gate
  subtitle: Filters PubMed articles for pharmacovigilance relevance. Gates on article type, MeSH tags, and publication recency.
  icon: circle
  route: /vigilance/mg/pubmed-relevance-gate
  steps:
    - field: article_type
      label: article type
      help: Enter article_type
      widget: text
      placeholder: null
    - field: has_adverse_event_mesh
      label: has adverse event mesh
      help: Enter has_adverse_event_mesh
      widget: toggle
      placeholder: null
    - field: publication_year
      label: publication year
      help: Enter publication_year
      widget: text
      placeholder: null
    - field: is_case_report
      label: is case report
      help: Enter is_case_report
      widget: toggle
      placeholder: null
  result:
    template: "pv_relevance: {{pv_relevance}} — include_in_analysis: {{include_in_analysis}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pubmed-relevance-gate
  cli: rsk mcg run pubmed-relevance-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_type
  nodes:
    check_type:
      type: condition
      variable: article_type
      operator: is_null
      true_next: check_mesh_only
      false_next: check_case_report
    check_case_report:
      type: condition
      variable: is_case_report
      operator: eq
      value: true
      true_next: check_mesh
      false_next: check_mesh
    check_mesh_only:
      type: condition
      variable: has_adverse_event_mesh
      operator: eq
      value: true
      true_next: medium_relevance
      false_next: return_none
    check_mesh:
      type: condition
      variable: has_adverse_event_mesh
      operator: eq
      value: true
      true_next: high_relevance
      false_next: check_year
    check_year:
      type: condition
      variable: publication_year
      operator: gte
      value: 2020
      true_next: medium_relevance
      false_next: return_low
    high_relevance:
      type: return
      value:
        pv_relevance: high
        include_in_analysis: true
    medium_relevance:
      type: return
      value:
        pv_relevance: medium
        include_in_analysis: true
    return_low:
      type: return
      value:
        pv_relevance: low
        include_in_analysis: false
    return_none:
      type: return
      value:
        pv_relevance: none
        include_in_analysis: false
tests:
  - input:
      article_type: Case Report
      has_adverse_event_mesh: true
      publication_year: 2024
      is_case_report: true
    expect:
      pv_relevance: high
      include_in_analysis: true
  - input:
      article_type: Review
      has_adverse_event_mesh: true
      publication_year: 2023
      is_case_report: false
    expect:
      pv_relevance: high
      include_in_analysis: true
  - input:
      article_type: Research Article
      has_adverse_event_mesh: false
      publication_year: 2024
      is_case_report: false
    expect:
      pv_relevance: medium
      include_in_analysis: true
  - input:
      article_type: Editorial
      has_adverse_event_mesh: false
      publication_year: 2015
      is_case_report: false
    expect:
      pv_relevance: low
      include_in_analysis: false
  - input:
      article_type: Clinical Trial
      has_adverse_event_mesh: true
      publication_year: 2022
      is_case_report: false
    expect:
      pv_relevance: high
      include_in_analysis: true
  - input: {}
    expect:
      pv_relevance: none
      include_in_analysis: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - pv_relevance
    - include_in_analysis
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
