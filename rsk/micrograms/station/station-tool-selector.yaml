name: station-tool-selector
description: "Select specific tool name from domain and intent"
version: 0.1.0

interface:
  inputs:
    domain:
      type: string
      description: "Domain prefix (faers, clinical_trials, pubmed, dailymed, rxnav, fda_regulatory)"
    intent:
      type: string
      description: "Query intent: search, get_detail, get_safety, compare, get_interactions"
  outputs:
    tool_name:
      type: string
      description: "Full tool name to invoke"
    requires_id:
      type: bool
      description: "Whether tool requires an ID parameter (vs search term)"

tree:
  start: route_by_domain
  nodes:
    route_by_domain:
      type: condition
      variable: domain
      operator: eq
      value: "faers"
      true_next: faers_intent
      false_next: check_rxnav

    faers_intent:
      type: condition
      variable: intent
      operator: eq
      value: "search"
      true_next: return_faers_search
      false_next: check_faers_detail

    return_faers_search:
      type: return
      value:
        tool_name: "faers_search_reports"
        requires_id: false

    check_faers_detail:
      type: condition
      variable: intent
      operator: eq
      value: "get_detail"
      true_next: return_faers_detail
      false_next: check_faers_safety

    return_faers_detail:
      type: return
      value:
        tool_name: "faers_get_report"
        requires_id: true

    check_faers_safety:
      type: condition
      variable: intent
      operator: eq
      value: "get_safety"
      true_next: return_faers_safety
      false_next: return_faers_default

    return_faers_safety:
      type: return
      value:
        tool_name: "faers_signal_detection"
        requires_id: false

    return_faers_default:
      type: return
      value:
        tool_name: "faers_search_reports"
        requires_id: false

    check_rxnav:
      type: condition
      variable: domain
      operator: eq
      value: "rxnav"
      true_next: rxnav_intent
      false_next: check_pubmed

    rxnav_intent:
      type: condition
      variable: intent
      operator: eq
      value: "get_interactions"
      true_next: return_rxnav_interactions
      false_next: check_rxnav_search

    return_rxnav_interactions:
      type: return
      value:
        tool_name: "rxnav_get_interactions"
        requires_id: true

    check_rxnav_search:
      type: condition
      variable: intent
      operator: eq
      value: "search"
      true_next: return_rxnav_search
      false_next: return_rxnav_default

    return_rxnav_search:
      type: return
      value:
        tool_name: "rxnav_search_drugs"
        requires_id: false

    return_rxnav_default:
      type: return
      value:
        tool_name: "rxnav_search_drugs"
        requires_id: false

    check_pubmed:
      type: condition
      variable: domain
      operator: eq
      value: "pubmed"
      true_next: pubmed_intent
      false_next: check_dailymed

    pubmed_intent:
      type: condition
      variable: intent
      operator: eq
      value: "search"
      true_next: return_pubmed_search
      false_next: check_pubmed_detail

    return_pubmed_search:
      type: return
      value:
        tool_name: "pubmed_search_articles"
        requires_id: false

    check_pubmed_detail:
      type: condition
      variable: intent
      operator: eq
      value: "get_detail"
      true_next: return_pubmed_detail
      false_next: return_pubmed_default

    return_pubmed_detail:
      type: return
      value:
        tool_name: "pubmed_get_abstract"
        requires_id: true

    return_pubmed_default:
      type: return
      value:
        tool_name: "pubmed_search_articles"
        requires_id: false

    check_dailymed:
      type: condition
      variable: domain
      operator: eq
      value: "dailymed"
      true_next: dailymed_intent
      false_next: check_clinical_trials

    dailymed_intent:
      type: condition
      variable: intent
      operator: eq
      value: "search"
      true_next: return_dailymed_search
      false_next: check_dailymed_detail

    return_dailymed_search:
      type: return
      value:
        tool_name: "dailymed_search_drugs"
        requires_id: false

    check_dailymed_detail:
      type: condition
      variable: intent
      operator: eq
      value: "get_detail"
      true_next: return_dailymed_detail
      false_next: return_dailymed_default

    return_dailymed_detail:
      type: return
      value:
        tool_name: "dailymed_get_label"
        requires_id: true

    return_dailymed_default:
      type: return
      value:
        tool_name: "dailymed_search_drugs"
        requires_id: false

    check_clinical_trials:
      type: condition
      variable: domain
      operator: eq
      value: "clinical_trials"
      true_next: trials_intent
      false_next: return_unknown_tool

    trials_intent:
      type: condition
      variable: intent
      operator: eq
      value: "search"
      true_next: return_trials_search
      false_next: check_trials_detail

    return_trials_search:
      type: return
      value:
        tool_name: "clinical_trials_search"
        requires_id: false

    check_trials_detail:
      type: condition
      variable: intent
      operator: eq
      value: "get_detail"
      true_next: return_trials_detail
      false_next: return_trials_default

    return_trials_detail:
      type: return
      value:
        tool_name: "clinical_trials_get_study"
        requires_id: true

    return_trials_default:
      type: return
      value:
        tool_name: "clinical_trials_search"
        requires_id: false

    return_unknown_tool:
      type: return
      value:
        tool_name: "unknown"
        requires_id: false

tests:
  - input: { domain: "faers", intent: "search" }
    expect: { tool_name: "faers_search_reports", requires_id: false }

  - input: { domain: "faers", intent: "get_detail" }
    expect: { tool_name: "faers_get_report", requires_id: true }

  - input: { domain: "faers", intent: "get_safety" }
    expect: { tool_name: "faers_signal_detection", requires_id: false }

  - input: { domain: "rxnav", intent: "get_interactions" }
    expect: { tool_name: "rxnav_get_interactions", requires_id: true }

  - input: { domain: "rxnav", intent: "search" }
    expect: { tool_name: "rxnav_search_drugs", requires_id: false }

  - input: { domain: "pubmed", intent: "search" }
    expect: { tool_name: "pubmed_search_articles", requires_id: false }

  - input: { domain: "pubmed", intent: "get_detail" }
    expect: { tool_name: "pubmed_get_abstract", requires_id: true }

  - input: { domain: "dailymed", intent: "search" }
    expect: { tool_name: "dailymed_search_drugs", requires_id: false }

  - input: { domain: "dailymed", intent: "get_detail" }
    expect: { tool_name: "dailymed_get_label", requires_id: true }

  - input: { domain: "clinical_trials", intent: "search" }
    expect: { tool_name: "clinical_trials_search", requires_id: false }

  - input: { domain: "clinical_trials", intent: "get_detail" }
    expect: { tool_name: "clinical_trials_get_study", requires_id: true }

  - input: { domain: "unknown_domain", intent: "search" }
    expect: { tool_name: "unknown", requires_id: false }

  - input: { domain: "", intent: "" }
    expect: { tool_name: "unknown", requires_id: false }
