name: ich-e2e-periodicity
description: Determines PBRER/PSUR reporting period based on ICH E2E guideline. Assigns reporting type and interval based on years since approval, safety concerns, and NME status.
version: 0.1.0
interface:
  inputs:
    years_since_approval:
      type: int
      required: false
    has_safety_concern:
      type: bool
      required: false
    is_new_molecular_entity:
      type: bool
      required: false
  outputs:
    report_type:
      type: string
    period_months:
      type: int
    next_due:
      type: string
tree:
  start: check_approval_period
  nodes:
    check_approval_period:
      type: condition
      variable: years_since_approval
      operator: lt
      value: 2
      true_next: early_phase
      false_next: check_nme_status
    early_phase:
      type: return
      value:
        report_type: PBRER
        period_months: 6
        next_due: in_6_months
    check_nme_status:
      type: condition
      variable: is_new_molecular_entity
      operator: eq
      value: true
      true_next: nme_check_safety
      false_next: established_check_safety
    nme_check_safety:
      type: condition
      variable: has_safety_concern
      operator: eq
      value: true
      true_next: nme_with_concern
      false_next: nme_routine
    nme_with_concern:
      type: return
      value:
        report_type: PBRER
        period_months: 6
        next_due: in_6_months
    nme_routine:
      type: return
      value:
        report_type: PBRER
        period_months: 12
        next_due: in_12_months
    established_check_safety:
      type: condition
      variable: has_safety_concern
      operator: eq
      value: true
      true_next: established_with_concern
      false_next: established_routine
    established_with_concern:
      type: return
      value:
        report_type: PSUR
        period_months: 12
        next_due: in_12_months
    established_routine:
      type: return
      value:
        report_type: PSUR
        period_months: 24
        next_due: in_24_months
tests:
  - input:
      years_since_approval: 1
      has_safety_concern: true
      is_new_molecular_entity: true
    expect:
      report_type: PBRER
      period_months: 6
      next_due: in_6_months
  - input:
      years_since_approval: 3
      has_safety_concern: false
      is_new_molecular_entity: true
    expect:
      report_type: PBRER
      period_months: 12
      next_due: in_12_months
  - input:
      years_since_approval: 3
      has_safety_concern: true
      is_new_molecular_entity: false
    expect:
      report_type: PSUR
      period_months: 12
      next_due: in_12_months
  - input:
      years_since_approval: 5
      has_safety_concern: false
      is_new_molecular_entity: false
    expect:
      report_type: PSUR
      period_months: 24
      next_due: in_24_months
  - input:
      years_since_approval: 10
      has_safety_concern: false
      is_new_molecular_entity: false
    expect:
      report_type: PSUR
      period_months: 24
      next_due: in_24_months
  - input: {}
    expect:
      report_type: PSUR
      period_months: 24
      next_due: in_24_months
