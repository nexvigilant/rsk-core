name: investigation-start-gate
description: "Determines if an AI agent should initiate a formal safety investigation based on signal detection and case seriousness"
version: 0.1.0

interface:
  inputs:
    signal_detected:
      type: bool
      description: "Whether a signal has been detected in the data"
    report_count:
      type: int
      description: "Number of related adverse event reports"
    seriousness:
      type: string
      description: "Severity level: fatal, serious, moderate, mild"
    is_labeled:
      type: bool
      description: "Whether the adverse event is on the product label"
  outputs:
    investigate:
      type: bool
      description: "Whether to initiate investigation"
    priority:
      type: string
      description: "Priority level: immediate, routine, monitor, skip"
    reason:
      type: string
      description: "Justification for the decision"

tree:
  start: check_signal_detected
  nodes:
    check_signal_detected:
      type: condition
      variable: signal_detected
      operator: eq
      value: false
      true_next: return_no_signal
      false_next: check_seriousness

    return_no_signal:
      type: return
      value:
        investigate: false
        priority: skip
        reason: "No signal detected"

    check_seriousness:
      type: condition
      variable: seriousness
      operator: eq
      value: "fatal"
      true_next: check_fatal_labeled
      false_next: check_serious

    check_fatal_labeled:
      type: condition
      variable: is_labeled
      operator: eq
      value: true
      true_next: return_immediate_fatal
      false_next: return_immediate_fatal_unlabeled

    return_immediate_fatal:
      type: return
      value:
        investigate: true
        priority: immediate
        reason: "Fatal outcome, labeled on product information"

    return_immediate_fatal_unlabeled:
      type: return
      value:
        investigate: true
        priority: immediate
        reason: "Fatal outcome, not labeled on product information"

    check_serious:
      type: condition
      variable: seriousness
      operator: eq
      value: "serious"
      true_next: check_serious_report_count
      false_next: check_moderate

    check_serious_report_count:
      type: condition
      variable: report_count
      operator: gte
      value: 3
      true_next: check_serious_labeled
      false_next: return_routine_serious

    check_serious_labeled:
      type: condition
      variable: is_labeled
      operator: eq
      value: true
      true_next: return_routine_serious_labeled
      false_next: return_routine_serious_unlabeled

    return_routine_serious_labeled:
      type: return
      value:
        investigate: true
        priority: routine
        reason: "Serious outcome, labeled, 3+ reports"

    return_routine_serious_unlabeled:
      type: return
      value:
        investigate: true
        priority: routine
        reason: "Serious outcome, unlabeled, 3+ reports"

    return_routine_serious:
      type: return
      value:
        investigate: false
        priority: monitor
        reason: "Serious outcome but insufficient report count"

    check_moderate:
      type: condition
      variable: seriousness
      operator: eq
      value: "moderate"
      true_next: check_moderate_report_count
      false_next: return_skip_mild

    check_moderate_report_count:
      type: condition
      variable: report_count
      operator: gte
      value: 5
      true_next: return_routine_moderate
      false_next: return_skip_moderate

    return_routine_moderate:
      type: return
      value:
        investigate: true
        priority: routine
        reason: "Moderate outcome, 5+ reports suggesting potential signal"

    return_skip_moderate:
      type: return
      value:
        investigate: false
        priority: monitor
        reason: "Moderate outcome with insufficient report clustering"

    return_skip_mild:
      type: return
      value:
        investigate: false
        priority: skip
        reason: "Mild outcome, insufficient evidence for investigation"

tests:
  - input: { signal_detected: false, report_count: 10, seriousness: "serious", is_labeled: false }
    expect: { investigate: false, priority: skip, reason: "No signal detected" }

  - input: { signal_detected: true, report_count: 1, seriousness: "fatal", is_labeled: true }
    expect: { investigate: true, priority: immediate, reason: "Fatal outcome, labeled on product information" }

  - input: { signal_detected: true, report_count: 1, seriousness: "fatal", is_labeled: false }
    expect: { investigate: true, priority: immediate, reason: "Fatal outcome, not labeled on product information" }

  - input: { signal_detected: true, report_count: 5, seriousness: "serious", is_labeled: true }
    expect: { investigate: true, priority: routine, reason: "Serious outcome, labeled, 3+ reports" }

  - input: { signal_detected: true, report_count: 2, seriousness: "serious", is_labeled: false }
    expect: { investigate: false, priority: monitor, reason: "Serious outcome but insufficient report count" }

  - input: { signal_detected: true, report_count: 10, seriousness: "moderate", is_labeled: false }
    expect: { investigate: true, priority: routine, reason: "Moderate outcome, 5+ reports suggesting potential signal" }

  - input: { signal_detected: true, report_count: 2, seriousness: "moderate", is_labeled: true }
    expect: { investigate: false, priority: monitor, reason: "Moderate outcome with insufficient report clustering" }

  - input: { signal_detected: true, report_count: 1, seriousness: "mild", is_labeled: false }
    expect: { investigate: false, priority: skip, reason: "Mild outcome, insufficient evidence for investigation" }

  - input: { signal_detected: false }
    expect: { investigate: false, priority: skip, reason: "No signal detected" }
