name: config-openvigil-triage
description: "Triage OpenVigil disproportionality output. Takes PRR/ROR/IC from compute-disproportionality and classifies signal strength with recommended action."
version: 0.1.0

interface:
  inputs:
    prr:
      type: float
      required: false
      description: "Proportional Reporting Ratio"
    prr_ci_lower:
      type: float
      required: false
      description: "PRR lower 95% confidence interval"
    ror:
      type: float
      required: false
      description: "Reporting Odds Ratio"
    ror_ci_lower:
      type: float
      required: false
      description: "ROR lower 95% confidence interval"
    ic:
      type: float
      required: false
      description: "Information Component (Bayesian)"
    case_count:
      type: int
      required: false
      description: "Number of cases in the drug-event combination"
  outputs:
    signal_strength:
      type: string
      description: "none, weak, moderate, strong"
    action:
      type: string
    priority:
      type: int
    evidence_quality:
      type: string

tree:
  start: check_case_count
  nodes:
    check_case_count:
      type: condition
      variable: case_count
      operator: is_null
      true_next: check_prr_only
      false_next: check_minimum_cases

    check_minimum_cases:
      type: condition
      variable: case_count
      operator: lt
      value: 3
      true_next: insufficient_data
      false_next: check_strong_signal

    check_prr_only:
      type: condition
      variable: prr
      operator: is_null
      true_next: no_data
      false_next: check_strong_signal

    check_strong_signal:
      type: condition
      variable: prr_ci_lower
      operator: is_null
      true_next: check_prr_threshold
      false_next: check_prr_ci_strong

    check_prr_ci_strong:
      type: condition
      variable: prr_ci_lower
      operator: gte
      value: 2.0
      true_next: check_ror_confirms_strong
      false_next: check_prr_ci_moderate

    check_ror_confirms_strong:
      type: condition
      variable: ror_ci_lower
      operator: is_null
      true_next: strong_signal
      false_next: check_ror_strong

    check_ror_strong:
      type: condition
      variable: ror_ci_lower
      operator: gte
      value: 2.0
      true_next: strong_signal
      false_next: moderate_signal

    check_prr_ci_moderate:
      type: condition
      variable: prr_ci_lower
      operator: gte
      value: 1.0
      true_next: moderate_signal
      false_next: check_ic_rescue

    check_ic_rescue:
      type: condition
      variable: ic
      operator: is_null
      true_next: weak_signal
      false_next: check_ic_threshold

    check_ic_threshold:
      type: condition
      variable: ic
      operator: gte
      value: 0.5
      true_next: weak_signal
      false_next: no_signal

    check_prr_threshold:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: moderate_signal_no_ci
      false_next: check_prr_weak

    check_prr_weak:
      type: condition
      variable: prr
      operator: gte
      value: 1.0
      true_next: weak_signal
      false_next: no_signal

    strong_signal:
      type: return
      value:
        signal_strength: strong
        action: immediate_safety_review
        priority: 1
        evidence_quality: high

    moderate_signal:
      type: return
      value:
        signal_strength: moderate
        action: detailed_case_review
        priority: 2
        evidence_quality: high

    moderate_signal_no_ci:
      type: return
      value:
        signal_strength: moderate
        action: detailed_case_review
        priority: 2
        evidence_quality: low

    weak_signal:
      type: return
      value:
        signal_strength: weak
        action: add_to_watchlist
        priority: 3
        evidence_quality: medium

    no_signal:
      type: return
      value:
        signal_strength: none
        action: routine_monitoring
        priority: 4
        evidence_quality: medium

    insufficient_data:
      type: return
      value:
        signal_strength: none
        action: accumulate_data
        priority: 5
        evidence_quality: insufficient

    no_data:
      type: return
      value:
        signal_strength: none
        action: query_failed
        priority: 5
        evidence_quality: none

tests:
  - input:
      prr: 4.5
      prr_ci_lower: 3.1
      ror: 5.2
      ror_ci_lower: 3.5
      ic: 2.1
      case_count: 85
    expect:
      signal_strength: strong
      action: immediate_safety_review
      priority: 1
      evidence_quality: high

  - input:
      prr: 3.0
      prr_ci_lower: 2.5
      ror: 3.2
      ror_ci_lower: 1.8
      ic: 1.5
      case_count: 40
    expect:
      signal_strength: moderate
      action: detailed_case_review
      priority: 2
      evidence_quality: high

  - input:
      prr: 2.1
      prr_ci_lower: 1.3
      ror: 2.0
      ror_ci_lower: 1.1
      ic: 0.8
      case_count: 20
    expect:
      signal_strength: moderate
      action: detailed_case_review
      priority: 2
      evidence_quality: high

  - input:
      prr: 1.5
      prr_ci_lower: 0.8
      ror: 1.6
      ror_ci_lower: 0.9
      ic: 0.6
      case_count: 15
    expect:
      signal_strength: weak
      action: add_to_watchlist
      priority: 3
      evidence_quality: medium

  - input:
      prr: 0.8
      prr_ci_lower: 0.4
      ror: 0.9
      ror_ci_lower: 0.5
      ic: -0.2
      case_count: 30
    expect:
      signal_strength: none
      action: routine_monitoring
      priority: 4
      evidence_quality: medium

  - input:
      prr: 1.2
      prr_ci_lower: 0.3
      ror: 1.1
      ic: 0.1
      case_count: 2
    expect:
      signal_strength: none
      action: accumulate_data
      priority: 5
      evidence_quality: insufficient

  - input: {}
    expect:
      signal_strength: none
      action: query_failed
      priority: 5
      evidence_quality: none

  - input:
      prr: 5.0
      case_count: 50
    expect:
      signal_strength: moderate
      action: detailed_case_review
      priority: 2
      evidence_quality: low
