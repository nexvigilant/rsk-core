# MICROGRAM++ (upgraded 2026-04-23)
name: config-ich-applicability
version: 0.1.0
description: Gate ICH guideline applicability by code series and step
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: guideline_code
    type: string
    required: false
    description: "ICH code: E2A, E2B, E2C, E2D, E2E, M1, S series"
  - name: current_step
    type: int
    required: false
    description: ICH step 1-5 (5 = implemented)
  - name: is_pv_relevant
    type: bool
    required: false
    description: ""
outputs:
  - name: applicability
    type: string
  - name: action
    type: string
  - name: binding
    type: bool
interface:
  inputs:
    guideline_code:
      type: string
      required: false
      description: "ICH code: E2A, E2B, E2C, E2D, E2E, M1, S series"
    current_step:
      type: int
      required: false
      description: ICH step 1-5 (5 = implemented)
    is_pv_relevant:
      type: bool
      required: false
  outputs:
    applicability:
      type: string
    action:
      type: string
    binding:
      type: bool
ui:
  title: Config Ich Applicability
  subtitle: Gate ICH guideline applicability by code series and step
  icon: circle
  route: /vigilance/mg/config-ich-applicability
  steps:
    - field: guideline_code
      label: guideline code
      help: "ICH code: E2A, E2B, E2C, E2D, E2E, M1, S series"
      widget: text
      placeholder: null
    - field: current_step
      label: current step
      help: ICH step 1-5 (5 = implemented)
      widget: text
      placeholder: null
    - field: is_pv_relevant
      label: is pv relevant
      help: Enter is_pv_relevant
      widget: toggle
      placeholder: null
  result:
    template: "applicability: {{applicability}} — action: {{action}} — binding: {{binding}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/config-ich-applicability
  cli: rsk mcg run config-ich-applicability
  auth: none
  rate_limit: 600/min
tree:
  start: check_code
  nodes:
    check_code:
      type: condition
      variable: guideline_code
      operator: is_null
      true_next: not_applicable
      false_next: check_pv
    check_pv:
      type: condition
      variable: is_pv_relevant
      operator: eq
      value: true
      true_next: check_step
      false_next: reference_only
    check_step:
      type: condition
      variable: current_step
      operator: is_null
      true_next: applicable_unknown
      false_next: check_implemented
    check_implemented:
      type: condition
      variable: current_step
      operator: gte
      value: 4
      true_next: binding_guideline
      false_next: check_draft
    check_draft:
      type: condition
      variable: current_step
      operator: gte
      value: 2
      true_next: emerging_guideline
      false_next: early_stage
    binding_guideline:
      type: return
      value:
        applicability: binding
        action: comply
        binding: true
    emerging_guideline:
      type: return
      value:
        applicability: emerging
        action: prepare
        binding: false
    early_stage:
      type: return
      value:
        applicability: early
        action: monitor
        binding: false
    applicable_unknown:
      type: return
      value:
        applicability: unknown_step
        action: verify
        binding: false
    reference_only:
      type: return
      value:
        applicability: reference
        action: note
        binding: false
    not_applicable:
      type: return
      value:
        applicability: none
        action: skip
        binding: false
tests:
  - input:
      guideline_code: E2B
      is_pv_relevant: true
      current_step: 5
    expect:
      applicability: binding
      action: comply
      binding: true
  - input:
      guideline_code: E2E
      is_pv_relevant: true
      current_step: 4
    expect:
      applicability: binding
      action: comply
      binding: true
  - input:
      guideline_code: E2C
      is_pv_relevant: true
      current_step: 3
    expect:
      applicability: emerging
      action: prepare
      binding: false
  - input:
      guideline_code: S7A
      is_pv_relevant: true
      current_step: 1
    expect:
      applicability: early
      action: monitor
      binding: false
  - input:
      guideline_code: Q3D
      is_pv_relevant: false
      current_step: 5
    expect:
      applicability: reference
      action: note
      binding: false
  - input:
      guideline_code: E2A
      is_pv_relevant: true
    expect:
      applicability: unknown_step
      action: verify
      binding: false
  - input: {}
    expect:
      applicability: none
      action: skip
      binding: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - applicability
    - action
    - binding
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
