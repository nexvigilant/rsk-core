name: evidence-hierarchy-classifier
description: "Classifies evidence level based on study type and design characteristics"
version: 0.1.0

interface:
  inputs:
    source_type:
      type: string
      description: "Type of evidence source: rct/cohort/case_report/spontaneous/label"
    sample_size:
      type: integer
      description: "Number of subjects in the study"
    is_controlled:
      type: boolean
      description: "Whether the study has a control group"
  outputs:
    evidence_level:
      type: string
      description: "Evidence level on Levels of Evidence scale: I/II/III/IV/V"
    weight:
      type: string
      description: "Weight assigned to this evidence: high/medium/low"

tree:
  start: classify_by_source
  nodes:
    classify_by_source:
      type: condition
      variable: source_type
      operator: eq
      value: rct
      true_next: check_rct_size
      false_next: check_cohort

    check_rct_size:
      type: condition
      variable: sample_size
      operator: gte
      value: 100
      true_next: level_i_high
      false_next: level_ii_high

    check_cohort:
      type: condition
      variable: source_type
      operator: eq
      value: cohort
      true_next: check_cohort_size
      false_next: check_case_report

    check_cohort_size:
      type: condition
      variable: sample_size
      operator: gte
      value: 50
      true_next: level_ii_medium
      false_next: level_iii_medium

    check_case_report:
      type: condition
      variable: source_type
      operator: eq
      value: case_report
      true_next: level_iv_low
      false_next: check_spontaneous

    check_spontaneous:
      type: condition
      variable: source_type
      operator: eq
      value: spontaneous
      true_next: check_spontaneous_controlled
      false_next: check_label

    check_spontaneous_controlled:
      type: condition
      variable: is_controlled
      operator: eq
      value: true
      true_next: level_iii_medium
      false_next: level_iv_low

    check_label:
      type: condition
      variable: source_type
      operator: eq
      value: label
      true_next: level_v_medium
      false_next: level_v_low

    level_i_high:
      type: return
      value:
        evidence_level: I
        weight: high

    level_ii_high:
      type: return
      value:
        evidence_level: II
        weight: high

    level_ii_medium:
      type: return
      value:
        evidence_level: II
        weight: medium

    level_iii_medium:
      type: return
      value:
        evidence_level: III
        weight: medium

    level_iv_low:
      type: return
      value:
        evidence_level: IV
        weight: low

    level_v_medium:
      type: return
      value:
        evidence_level: V
        weight: medium

    level_v_low:
      type: return
      value:
        evidence_level: V
        weight: low

tests:
  - name: "Large RCT - highest evidence"
    input:
      source_type: rct
      sample_size: 500
      is_controlled: true
    expect:
      evidence_level: I
      weight: high

  - name: "Small RCT - still Level I"
    input:
      source_type: rct
      sample_size: 50
      is_controlled: true
    expect:
      evidence_level: II
      weight: high

  - name: "Large cohort study"
    input:
      source_type: cohort
      sample_size: 200
      is_controlled: false
    expect:
      evidence_level: II
      weight: medium

  - name: "Small case report"
    input:
      source_type: case_report
      sample_size: 1
      is_controlled: false
    expect:
      evidence_level: IV
      weight: low

  - name: "Controlled spontaneous data"
    input:
      source_type: spontaneous
      sample_size: 1000
      is_controlled: true
    expect:
      evidence_level: III
      weight: medium

  - name: "Drug label information"
    input:
      source_type: label
      sample_size: 0
      is_controlled: false
    expect:
      evidence_level: V
      weight: medium
