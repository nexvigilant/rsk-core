# MICROGRAM++ (upgraded 2026-04-23)
name: faers-report-quality
version: 0.1.0
description: Assesses FAERS adverse event report quality. Evaluates presence of critical fields and seriousness to determine reportability.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: has_drug_name
    type: bool
    required: false
    description: ""
  - name: has_reaction
    type: bool
    required: false
    description: ""
  - name: has_outcome
    type: bool
    required: false
    description: ""
  - name: has_reporter
    type: bool
    required: false
    description: ""
  - name: is_serious
    type: bool
    required: false
    description: ""
outputs:
  - name: quality_score
    type: string
  - name: missing_fields
    type: string
  - name: reportable
    type: bool
interface:
  inputs:
    has_drug_name:
      type: bool
      required: false
    has_reaction:
      type: bool
      required: false
    has_outcome:
      type: bool
      required: false
    has_reporter:
      type: bool
      required: false
    is_serious:
      type: bool
      required: false
  outputs:
    quality_score:
      type: string
    missing_fields:
      type: string
    reportable:
      type: bool
ui:
  title: Faers Report Quality
  subtitle: Assesses FAERS adverse event report quality. Evaluates presence of critical fields and seriousness to determine reportability.
  icon: circle
  route: /vigilance/mg/faers-report-quality
  steps:
    - field: has_drug_name
      label: has drug name
      help: Enter has_drug_name
      widget: toggle
      placeholder: null
    - field: has_reaction
      label: has reaction
      help: Enter has_reaction
      widget: toggle
      placeholder: null
    - field: has_outcome
      label: has outcome
      help: Enter has_outcome
      widget: toggle
      placeholder: null
    - field: has_reporter
      label: has reporter
      help: Enter has_reporter
      widget: toggle
      placeholder: null
    - field: is_serious
      label: is serious
      help: Enter is_serious
      widget: toggle
      placeholder: null
  result:
    template: "quality_score: {{quality_score}} — missing_fields: {{missing_fields}} — reportable: {{reportable}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/faers-report-quality
  cli: rsk mcg run faers-report-quality
  auth: none
  rate_limit: 600/min
tree:
  start: check_drug
  nodes:
    check_drug:
      type: condition
      variable: has_drug_name
      operator: eq
      value: true
      true_next: check_reaction
      false_next: missing_drug
    check_reaction:
      type: condition
      variable: has_reaction
      operator: eq
      value: true
      true_next: check_outcome
      false_next: missing_reaction
    check_outcome:
      type: condition
      variable: has_outcome
      operator: eq
      value: true
      true_next: check_reporter
      false_next: missing_outcome
    check_reporter:
      type: condition
      variable: has_reporter
      operator: eq
      value: true
      true_next: check_seriousness
      false_next: missing_reporter
    check_seriousness:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: high_quality
      false_next: medium_quality
    missing_drug:
      type: return
      value:
        quality_score: low
        missing_fields: drug_name
        reportable: false
    missing_reaction:
      type: return
      value:
        quality_score: low
        missing_fields: reaction
        reportable: false
    missing_outcome:
      type: return
      value:
        quality_score: medium
        missing_fields: outcome
        reportable: true
    missing_reporter:
      type: return
      value:
        quality_score: medium
        missing_fields: reporter
        reportable: true
    high_quality:
      type: return
      value:
        quality_score: high
        missing_fields: none
        reportable: true
    medium_quality:
      type: return
      value:
        quality_score: medium
        missing_fields: none
        reportable: true
tests:
  - input:
      has_drug_name: false
      has_outcome: false
      has_reaction: false
      has_reporter: false
      is_serious: false
    expect:
      quality_score: low
      missing_fields: drug_name
      reportable: false
  - input:
      has_drug_name: true
      has_outcome: false
      has_reaction: false
      has_reporter: false
      is_serious: false
    expect:
      quality_score: low
      missing_fields: reaction
      reportable: false
  - input:
      has_drug_name: true
      has_outcome: false
      has_reaction: true
      has_reporter: false
      is_serious: false
    expect:
      quality_score: medium
      missing_fields: outcome
      reportable: true
  - input:
      has_drug_name: true
      has_outcome: true
      has_reaction: true
      has_reporter: false
      is_serious: false
    expect:
      quality_score: medium
      missing_fields: reporter
      reportable: true
  - input:
      has_drug_name: true
      has_outcome: true
      has_reaction: true
      has_reporter: true
      is_serious: false
    expect:
      quality_score: medium
      missing_fields: none
      reportable: true
  - input:
      has_drug_name: true
      has_outcome: true
      has_reaction: true
      has_reporter: true
      is_serious: true
    expect:
      quality_score: high
      missing_fields: none
      reportable: true
  - input: {}
    expect:
      quality_score: low
      missing_fields: drug_name
      reportable: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - quality_score
    - missing_fields
    - reportable
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
