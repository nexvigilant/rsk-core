# MICROGRAM++ (upgraded 2026-04-23)
name: clinical-trial-maturity
version: 0.1.0
description: Evaluates clinical trial maturity and safety data availability. Routes based on trial phase and result status.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: status
    type: string
    required: false
    description: ""
  - name: phase
    type: string
    required: false
    description: ""
  - name: has_results
    type: bool
    required: false
    description: ""
  - name: enrollment
    type: int
    required: false
    description: ""
outputs:
  - name: maturity
    type: string
  - name: has_safety_data
    type: bool
interface:
  inputs:
    status:
      type: string
      required: false
    phase:
      type: string
      required: false
    has_results:
      type: bool
      required: false
    enrollment:
      type: int
      required: false
  outputs:
    maturity:
      type: string
    has_safety_data:
      type: bool
ui:
  title: Clinical Trial Maturity
  subtitle: Evaluates clinical trial maturity and safety data availability. Routes based on trial phase and result status.
  icon: circle
  route: /vigilance/mg/clinical-trial-maturity
  steps:
    - field: status
      label: status
      help: Enter status
      widget: text
      placeholder: null
    - field: phase
      label: phase
      help: Enter phase
      widget: text
      placeholder: null
    - field: has_results
      label: has results
      help: Enter has_results
      widget: toggle
      placeholder: null
    - field: enrollment
      label: enrollment
      help: Enter enrollment
      widget: text
      placeholder: null
  result:
    template: "maturity: {{maturity}} — has_safety_data: {{has_safety_data}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/clinical-trial-maturity
  cli: rsk mcg run clinical-trial-maturity
  auth: none
  rate_limit: 600/min
tree:
  start: check_status
  nodes:
    check_status:
      type: condition
      variable: status
      operator: is_null
      true_next: return_unusable
      false_next: check_phase
    check_phase:
      type: condition
      variable: phase
      operator: is_null
      true_next: return_unusable
      false_next: evaluate_results
    evaluate_results:
      type: condition
      variable: has_results
      operator: eq
      value: true
      true_next: return_mature
      false_next: check_enrollment
    check_enrollment:
      type: condition
      variable: enrollment
      operator: lte
      value: 50
      true_next: return_early
      false_next: check_phase_level
    check_phase_level:
      type: condition
      variable: phase
      operator: contains
      value: "4"
      true_next: return_mature
      false_next: return_developing
    return_early:
      type: return
      value:
        maturity: early
        has_safety_data: false
    return_developing:
      type: return
      value:
        maturity: developing
        has_safety_data: false
    return_mature:
      type: return
      value:
        maturity: mature
        has_safety_data: true
    return_unusable:
      type: return
      value:
        maturity: unusable
        has_safety_data: false
tests:
  - input:
      status: Completed
      phase: Phase 4
      has_results: true
      enrollment: 1000
    expect:
      maturity: mature
      has_safety_data: true
  - input:
      status: Active, not recruiting
      phase: Phase 3
      has_results: true
      enrollment: 500
    expect:
      maturity: mature
      has_safety_data: true
  - input:
      status: Recruiting
      phase: Phase 2
      has_results: false
      enrollment: 200
    expect:
      maturity: developing
      has_safety_data: false
  - input:
      status: Not yet recruiting
      phase: Phase 1
      has_results: false
      enrollment: 50
    expect:
      maturity: early
      has_safety_data: false
  - input:
      status: Completed
      phase: Phase 4
      has_results: true
      enrollment: 5000
    expect:
      maturity: mature
      has_safety_data: true
  - input: {}
    expect:
      maturity: unusable
      has_safety_data: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - maturity
    - has_safety_data
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
