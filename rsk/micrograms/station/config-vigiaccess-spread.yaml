interface:
  inputs:
    total_reports:
      type: int
      required: false
    regions_reporting:
      type: int
      required: false
    has_pediatric_reports:
      type: bool
      required: false
    top_region_pct:
      type: int
      required: false
  outputs:
    investigation_scope:
      type: string
      required: false
    spread_class:
      type: string
      required: false
    geographic_signal:
      type: bool
      required: false
  aliases: {}
