# MICROGRAM++ (upgraded 2026-04-23)
name: quality-narrative
version: 0.1.0
description: Narrative adequate
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Quality Narrative
  subtitle: Narrative adequate
  icon: circle
  route: /vigilance/mg/quality-narrative
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/quality-narrative
  cli: rsk mcg run quality-narrative
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        check: quality-narrative
        passed: false
        action: flag_for_review
    pass:
      type: return
      value:
        check: quality-narrative
        passed: true
        action: accept
    check:
      type: condition
      variable: narrative_length
      operator: gte
      value: 50
      true_next: pass
      false_next: fail
tests:
  - input:
      narrative_length: 50
    expect:
      passed: true
      check: quality-narrative
  - input: {}
    expect:
      passed: false
      check: quality-narrative
  - input:
      narrative_length: 0
    expect:
      passed: false
      action: flag_for_review
      check: quality-narrative
  - input:
      narrative_length: -1
    expect:
      passed: false
      action: flag_for_review
      check: quality-narrative
  - input:
      narrative_length: 49
    expect:
      action: flag_for_review
      check: quality-narrative
      passed: false
  - input:
      narrative_length: 51
    expect:
      check: quality-narrative
      action: accept
      passed: true
  - input:
      narrative_length: 5000
    expect:
      passed: true
      action: accept
      check: quality-narrative
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
