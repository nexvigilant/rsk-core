name: is-even
description: Check if a number is even
version: 0.1.0
interface:
  inputs:
    n:
      type: int
      required: false
  outputs:
    even:
      type: bool
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: n
      operator: eq
      value: 0
      true_next: yes
      false_next: check-mod
    yes:
      type: return
      value:
        even: true
    no:
      type: return
      value:
        even: false
    check-mod:
      type: condition
      variable: n
      operator: gt
      value: 0
      true_next: yes
      false_next: no
tests:
- input:
    n: 0
  expect:
    even: true
- input:
    n: 4
  expect:
    even: true
- input:
    n: -1
  expect:
    even: false
- input:
    n: -1
  expect:
    even: false
- input:
    n: 1
  expect:
    even: true
- input: {}
  expect:
    even: false
- input:
    n: -1
  expect:
    even: false
- input:
    n: -1
  expect:
    even: false
- input:
    n: 1
  expect:
    even: true
- input: {}
  expect:
    even: false
