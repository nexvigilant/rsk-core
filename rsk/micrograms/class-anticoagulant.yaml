name: class-anticoagulant
description: 'Anticoagulants class safety: Major bleeding monitoring'
version: 0.1.0
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: inr
      operator: gte
      value: 4
      true_next: alert
      false_next: safe
    alert:
      type: return
      value:
        drug_class: Anticoagulants
        alert: true
        concern: Major bleeding
        action: class_effect_investigation
    safe:
      type: return
      value:
        drug_class: Anticoagulants
        concern: Major bleeding
        alert: false
        action: continue
