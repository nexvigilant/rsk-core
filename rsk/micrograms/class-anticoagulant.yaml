    drug_class: Anticoagulants
    alert: false
- input:
    inr: 0
  expect:
    concern: Major bleeding
    drug_class: Anticoagulants
    alert: false
    action: continue
- input:
    inr: -1
  expect:
    concern: Major bleeding
    drug_class: Anticoagulants
    alert: false
    action: continue
- input:
    inr: 3
  expect:
    drug_class: Anticoagulants
    concern: Major bleeding
    action: continue
    alert: false
- input:
    inr: 5
  expect:
    concern: Major bleeding
    alert: true
    drug_class: Anticoagulants
    action: class_effect_investigation
- input:
    inr: 400
