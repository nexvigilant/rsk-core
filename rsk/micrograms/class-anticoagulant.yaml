# MICROGRAM++ (upgraded 2026-04-23)
name: class-anticoagulant
version: 0.1.0
description: "Anticoagulants class safety: Major bleeding monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Anticoagulant
  subtitle: "Anticoagulants class safety: Major bleeding monitoring"
  icon: circle
  route: /vigilance/mg/class-anticoagulant
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-anticoagulant
  cli: rsk mcg run class-anticoagulant
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: inr
      operator: gte
      value: 4
      true_next: alert
      false_next: safe
    alert:
      type: return
      value:
        drug_class: Anticoagulants
        alert: true
        concern: Major bleeding
        action: class_effect_investigation
    safe:
      type: return
      value:
        drug_class: Anticoagulants
        concern: Major bleeding
        alert: false
        action: continue
tests:
  - input:
      inr: 4
    expect:
      drug_class: Anticoagulants
      alert: true
  - input: {}
    expect:
      drug_class: Anticoagulants
      alert: false
  - input:
      inr: 0
    expect:
      concern: Major bleeding
      drug_class: Anticoagulants
      alert: false
      action: continue
  - input:
      inr: -1
    expect:
      concern: Major bleeding
      drug_class: Anticoagulants
      alert: false
      action: continue
  - input:
      inr: 3
    expect:
      drug_class: Anticoagulants
      concern: Major bleeding
      action: continue
      alert: false
  - input:
      inr: 5
    expect:
      concern: Major bleeding
      alert: true
      drug_class: Anticoagulants
      action: class_effect_investigation
  - input:
      inr: 400
    expect:
      action: class_effect_investigation
      concern: Major bleeding
      drug_class: Anticoagulants
      alert: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
