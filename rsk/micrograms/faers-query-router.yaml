# MICROGRAM++ (upgraded 2026-04-23)
name: faers-query-router
version: 0.1.0
description: Routes FAERS queries to the appropriate endpoint strategy based on query type (drug, event, date_range, combination)
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: query_type
    type: string
    required: false
    description: ""
  - name: drug_name
    type: string
    required: false
    description: ""
  - name: event_term
    type: string
    required: false
    description: ""
outputs:
  - name: endpoint
    type: string
  - name: query_strategy
    type: string
  - name: requires_pagination
    type: bool
  - name: confidence
    type: string
interface:
  inputs:
    query_type:
      type: string
      required: false
    drug_name:
      type: string
      required: false
    event_term:
      type: string
      required: false
  outputs:
    endpoint:
      type: string
    query_strategy:
      type: string
    requires_pagination:
      type: bool
    confidence:
      type: string
ui:
  title: Faers Query Router
  subtitle: Routes FAERS queries to the appropriate endpoint strategy based on query type (drug, event, date_range, combination)
  icon: circle
  route: /vigilance/mg/faers-query-router
  steps:
    - field: query_type
      label: query type
      help: Enter query_type
      widget: text
      placeholder: null
    - field: drug_name
      label: drug name
      help: Enter drug_name
      widget: text
      placeholder: null
    - field: event_term
      label: event term
      help: Enter event_term
      widget: text
      placeholder: null
  result:
    template: "endpoint: {{endpoint}} — query_strategy: {{query_strategy}} — requires_pagination: {{requires_pagination}} — confidence: {{confidence}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/faers-query-router
  cli: rsk mcg run faers-query-router
  auth: none
  rate_limit: 600/min
tree:
  start: check_type
  nodes:
    check_type:
      type: condition
      variable: query_type
      operator: eq
      value: drug
      true_next: drug_route
      false_next: check_event
    check_event:
      type: condition
      variable: query_type
      operator: eq
      value: event
      true_next: event_route
      false_next: check_date
    check_date:
      type: condition
      variable: query_type
      operator: eq
      value: date_range
      true_next: date_route
      false_next: check_combo
    check_combo:
      type: condition
      variable: query_type
      operator: eq
      value: combination
      true_next: combo_route
      false_next: unknown_route
    drug_route:
      type: return
      value:
        endpoint: /drug/event.json
        query_strategy: search_by_drug_name
        requires_pagination: true
        confidence: high
    event_route:
      type: return
      value:
        endpoint: /drug/event.json
        query_strategy: search_by_reaction_term
        requires_pagination: true
        confidence: high
    date_route:
      type: return
      value:
        endpoint: /drug/event.json
        query_strategy: search_by_date_range
        requires_pagination: true
        confidence: medium
    combo_route:
      type: return
      value:
        endpoint: /drug/event.json
        query_strategy: cross_query_drug_and_event
        requires_pagination: true
        confidence: high
    unknown_route:
      type: return
      value:
        endpoint: /drug/event.json
        query_strategy: general_search
        requires_pagination: false
        confidence: low
tests:
  - input:
      query_type: drug
      drug_name: metformin
    expect:
      endpoint: /drug/event.json
      query_strategy: search_by_drug_name
      requires_pagination: true
      confidence: high
  - input:
      query_type: event
      event_term: rhabdomyolysis
    expect:
      endpoint: /drug/event.json
      query_strategy: search_by_reaction_term
      requires_pagination: true
      confidence: high
  - input:
      query_type: date_range
    expect:
      endpoint: /drug/event.json
      query_strategy: search_by_date_range
      requires_pagination: true
      confidence: medium
  - input:
      query_type: combination
      drug_name: atorvastatin
      event_term: myalgia
    expect:
      endpoint: /drug/event.json
      query_strategy: cross_query_drug_and_event
      requires_pagination: true
      confidence: high
  - input:
      query_type: unknown_value
    expect:
      endpoint: /drug/event.json
      query_strategy: general_search
      requires_pagination: false
      confidence: low
  - input: {}
    expect:
      endpoint: /drug/event.json
      query_strategy: general_search
      requires_pagination: false
      confidence: low
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - endpoint
    - query_strategy
    - requires_pagination
    - confidence
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
