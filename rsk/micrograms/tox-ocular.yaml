# MICROGRAM++ (upgraded 2026-04-23)
name: tox-ocular
version: 0.1.0
description: "Ocular toxicity gate: vision_change_grade thresholds for eye"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Tox Ocular
  subtitle: "Ocular toxicity gate: vision_change_grade thresholds for eye"
  icon: circle
  route: /vigilance/mg/tox-ocular
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/tox-ocular
  cli: rsk mcg run tox-ocular
  auth: none
  rate_limit: 600/min
tree:
  start: check_severe
  nodes:
    check_severe:
      type: condition
      variable: vision_change_grade
      operator: gte
      value: 3
      true_next: severe
      false_next: check_mild
    severe:
      type: return
      value:
        action: discontinue
        organ: ocular
        severity: severe
        target: eye
    normal:
      type: return
      value:
        target: eye
        organ: ocular
        action: continue
        severity: normal
    mild:
      type: return
      value:
        organ: ocular
        severity: mild
        target: eye
        action: monitor_closely
    check_mild:
      type: condition
      variable: vision_change_grade
      operator: gte
      value: 1
      true_next: mild
      false_next: normal
tests:
  - input:
      vision_change_grade: 4
    expect:
      severity: severe
      organ: ocular
  - input:
      vision_change_grade: 1
    expect:
      severity: mild
      organ: ocular
  - input:
      vision_change_grade: 0
    expect:
      organ: ocular
      severity: normal
  - input: {}
    expect:
      severity: normal
      organ: ocular
  - input:
      vision_change_grade: -1
    expect:
      severity: normal
      organ: ocular
      action: continue
      target: eye
  - input:
      vision_change_grade: 2
    expect:
      organ: ocular
      action: monitor_closely
      severity: mild
      target: eye
  - input:
      vision_change_grade: 300
    expect:
      severity: severe
      organ: ocular
      target: eye
      action: discontinue
  - input:
      vision_change_grade: -1
    expect:
      organ: ocular
      action: continue
      target: eye
      severity: normal
  - input:
      vision_change_grade: 2
    expect:
      action: monitor_closely
      target: eye
      severity: mild
      organ: ocular
  - input:
      vision_change_grade: 100
    expect:
      target: eye
      severity: severe
      action: discontinue
      organ: ocular
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
