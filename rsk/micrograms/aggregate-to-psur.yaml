name: aggregate-to-psur
description: Routes aggregate data assessment to PSUR section assignment and prioritization
version: 0.1.0

interface:
  inputs:
    data_type:
      type: string
      required: true
      description: "Type of data: cumulative, interval, both"
    has_new_signal:
      type: boolean
      required: true
      description: Whether new safety signals have been identified
  outputs:
    psur_section:
      type: string
      description: Primary PSUR section for discussion
    priority_flag:
      type: boolean
      description: Whether update requires priority handling
    rationale:
      type: string
      description: Justification for assignment

tree:
  start: check_data_type
  nodes:
    check_data_type:
      type: condition
      variable: data_type
      operator: eq
      value: "cumulative"
      true_next: check_new_signal_cumulative
      false_next: check_interval

    check_new_signal_cumulative:
      type: condition
      variable: has_new_signal
      operator: eq
      value: true
      true_next: cumulative_new_signal
      false_next: cumulative_no_new_signal

    cumulative_new_signal:
      type: return
      value:
        psur_section: "safety_update"
        priority_flag: true
        rationale: "Cumulative data with new signals requires priority review in safety update section"

    cumulative_no_new_signal:
      type: return
      value:
        psur_section: "periodic_safety_update"
        priority_flag: false
        rationale: "Cumulative data without new signals follows routine periodic update section"

    check_interval:
      type: condition
      variable: data_type
      operator: eq
      value: "interval"
      true_next: check_new_signal_interval
      false_next: both_data_type

    check_new_signal_interval:
      type: condition
      variable: has_new_signal
      operator: eq
      value: true
      true_next: interval_new_signal
      false_next: interval_no_new_signal

    interval_new_signal:
      type: return
      value:
        psur_section: "safety_specification"
        priority_flag: true
        rationale: "Interval data with new signals requires priority discussion in safety specification section"

    interval_no_new_signal:
      type: return
      value:
        psur_section: "periodic_update"
        priority_flag: false
        rationale: "Interval data without new signals assigned to routine periodic update section"

    both_data_type:
      type: condition
      variable: has_new_signal
      operator: eq
      value: true
      true_next: both_new_signal
      false_next: both_no_new_signal

    both_new_signal:
      type: return
      value:
        psur_section: "comprehensive_safety_review"
        priority_flag: true
        rationale: "Both cumulative and interval data with new signals require comprehensive priority review"

    both_no_new_signal:
      type: return
      value:
        psur_section: "routine_update"
        priority_flag: false
        rationale: "Both data types without new signals follow routine update procedures"

tests:
  - input: { data_type: "cumulative", has_new_signal: true }
    expect: { psur_section: "safety_update", priority_flag: true, rationale: "Cumulative data with new signals requires priority review in safety update section" }

  - input: { data_type: "interval", has_new_signal: true }
    expect: { psur_section: "safety_specification", priority_flag: true, rationale: "Interval data with new signals requires priority discussion in safety specification section" }

  - input: { data_type: "both", has_new_signal: false }
    expect: { psur_section: "routine_update", priority_flag: false, rationale: "Both data types without new signals follow routine update procedures" }

  - input: { data_type: "cumulative", has_new_signal: false }
    expect: { psur_section: "periodic_safety_update", priority_flag: false, rationale: "Cumulative data without new signals follows routine periodic update section" }
