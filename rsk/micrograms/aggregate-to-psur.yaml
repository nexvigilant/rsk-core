# MICROGRAM++ (upgraded 2026-04-23)
name: aggregate-to-psur
version: 0.1.0
description: Routes aggregate data assessment to PSUR section assignment and prioritization
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: data_type
    type: string
    required: true
    description: ""
  - name: has_new_signal
    type: boolean
    required: true
    description: ""
outputs:
  - name: rationale
    type: string
  - name: psur_section
    type: string
  - name: priority_flag
    type: boolean
interface:
  inputs:
    data_type:
      type: string
      required: true
    has_new_signal:
      type: boolean
      required: true
  outputs:
    rationale:
      type: string
      required: false
    psur_section:
      type: string
      required: false
    priority_flag:
      type: boolean
      required: false
  aliases: {}
ui:
  title: Aggregate To Psur
  subtitle: Routes aggregate data assessment to PSUR section assignment and prioritization
  icon: circle
  route: /vigilance/mg/aggregate-to-psur
  steps:
    - field: data_type
      label: data type
      help: Enter data_type
      widget: text
      placeholder: null
    - field: has_new_signal
      label: has new signal
      help: Enter has_new_signal
      widget: toggle
      placeholder: null
  result:
    template: "rationale: {{rationale}} — psur_section: {{psur_section}} — priority_flag: {{priority_flag}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/aggregate-to-psur
  cli: rsk mcg run aggregate-to-psur
  auth: none
  rate_limit: 600/min
tree:
  start: check_data_type
  nodes:
    check_interval:
      type: condition
      variable: data_type
      operator: eq
      value: interval
      true_next: check_new_signal_interval
      false_next: both_data_type
    interval_no_new_signal:
      type: return
      value:
        psur_section: periodic_update
        priority_flag: false
        rationale: Interval data without new signals assigned to routine periodic update section
    check_data_type:
      type: condition
      variable: data_type
      operator: eq
      value: cumulative
      true_next: check_new_signal_cumulative
      false_next: check_interval
    both_new_signal:
      type: return
      value:
        priority_flag: true
        psur_section: comprehensive_safety_review
        rationale: Both cumulative and interval data with new signals require comprehensive priority review
    cumulative_no_new_signal:
      type: return
      value:
        rationale: Cumulative data without new signals follows routine periodic update section
        priority_flag: false
        psur_section: periodic_safety_update
    both_data_type:
      type: condition
      variable: has_new_signal
      operator: eq
      value: true
      true_next: both_new_signal
      false_next: both_no_new_signal
    both_no_new_signal:
      type: return
      value:
        rationale: Both data types without new signals follow routine update procedures
        priority_flag: false
        psur_section: routine_update
    interval_new_signal:
      type: return
      value:
        priority_flag: true
        psur_section: safety_specification
        rationale: Interval data with new signals requires priority discussion in safety specification section
    check_new_signal_cumulative:
      type: condition
      variable: has_new_signal
      operator: eq
      value: true
      true_next: cumulative_new_signal
      false_next: cumulative_no_new_signal
    check_new_signal_interval:
      type: condition
      variable: has_new_signal
      operator: eq
      value: true
      true_next: interval_new_signal
      false_next: interval_no_new_signal
    cumulative_new_signal:
      type: return
      value:
        psur_section: safety_update
        priority_flag: true
        rationale: Cumulative data with new signals requires priority review in safety update section
tests:
  - input:
      data_type: ""
      has_new_signal: false
    expect:
      rationale: Both data types without new signals follow routine update procedures
      priority_flag: false
      psur_section: routine_update
  - input:
      data_type: ""
      has_new_signal: true
    expect:
      priority_flag: true
      psur_section: comprehensive_safety_review
      rationale: Both cumulative and interval data with new signals require comprehensive priority review
  - input:
      data_type: cumulative
      has_new_signal: false
    expect:
      rationale: Cumulative data without new signals follows routine periodic update section
      priority_flag: false
      psur_section: periodic_safety_update
  - input:
      data_type: cumulative
      has_new_signal: true
    expect:
      psur_section: safety_update
      priority_flag: true
      rationale: Cumulative data with new signals requires priority review in safety update section
  - input:
      data_type: interval
      has_new_signal: false
    expect:
      psur_section: periodic_update
      priority_flag: false
      rationale: Interval data without new signals assigned to routine periodic update section
  - input:
      data_type: interval
      has_new_signal: true
    expect:
      priority_flag: true
      psur_section: safety_specification
      rationale: Interval data with new signals requires priority discussion in safety specification section
  - input: {}
    expect:
      rationale: Both data types without new signals follow routine update procedures
      priority_flag: false
      psur_section: routine_update
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - rationale
    - psur_section
    - priority_flag
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
