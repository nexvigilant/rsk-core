# MICROGRAM++ (upgraded 2026-04-23)
name: pregnancy-exposure-gate
version: 0.1.0
description: "Pregnancy exposure and teratogenicity classifier: maps reproductive adverse reactions to severity grades per FDA pregnancy categories and ICH S5(R3)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reaction_pt
    type: string
    required: true
    description: MedDRA preferred term for the reproductive/teratogenic reaction
  - name: trimester
    type: int
    required: false
    description: Trimester of exposure (1, 2, or 3)
outputs:
  - name: severity
    type: string
  - name: soc
    type: string
  - name: action
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    reaction_pt:
      type: string
      required: true
      description: MedDRA preferred term for the reproductive/teratogenic reaction
    trimester:
      type: int
      required: false
      description: Trimester of exposure (1, 2, or 3)
  outputs:
    severity:
      type: string
      description: critical | serious | moderate | mild
    soc:
      type: string
    action:
      type: string
    regulatory_reference:
      type: string
ui:
  title: Pregnancy Exposure Gate
  subtitle: "Pregnancy exposure and teratogenicity classifier: maps reproductive adverse reactions to severity grades per FDA pregnancy categories and ICH S5(R3)"
  icon: circle
  route: /vigilance/mg/pregnancy-exposure-gate
  steps:
    - field: reaction_pt
      label: reaction pt
      help: MedDRA preferred term for the reproductive/teratogenic reaction
      widget: text
      placeholder: null
    - field: trimester
      label: trimester
      help: Trimester of exposure (1, 2, or 3)
      widget: text
      placeholder: null
  result:
    template: "severity: {{severity}} — soc: {{soc}} — action: {{action}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pregnancy-exposure-gate
  cli: rsk mcg run pregnancy-exposure-gate
  auth: none
  rate_limit: 600/min
tree:
  start: check_congenital
  nodes:
    check_congenital:
      type: condition
      variable: reaction_pt
      operator: contains
      value: CONGENITAL
      true_next: critical
      false_next: check_foetal_death
    check_foetal_death:
      type: condition
      variable: reaction_pt
      operator: contains
      value: FOETAL DEATH
      true_next: critical
      false_next: check_spontaneous_abortion
    check_spontaneous_abortion:
      type: condition
      variable: reaction_pt
      operator: contains
      value: ABORTION SPONTANEOUS
      true_next: serious
      false_next: check_trimester1
    check_trimester1:
      type: condition
      variable: trimester
      operator: eq
      value: 1
      true_next: serious_t1
      false_next: check_foetal
    check_foetal:
      type: condition
      variable: reaction_pt
      operator: contains
      value: FOETAL
      true_next: serious_foetal
      false_next: check_fertility
    check_fertility:
      type: condition
      variable: reaction_pt
      operator: contains
      value: FERTILITY
      true_next: moderate
      false_next: mild
    critical:
      type: return
      value:
        severity: critical
        soc: Congenital, familial and genetic disorders
        action: immediate_expedited_report
        regulatory_reference: ICH S5(R3)
    serious:
      type: return
      value:
        severity: serious
        soc: Pregnancy, puerperium and perinatal conditions
        action: expedited_report
        regulatory_reference: ICH S5(R3)
    serious_t1:
      type: return
      value:
        severity: serious
        soc: Pregnancy, puerperium and perinatal conditions
        action: expedited_report
        regulatory_reference: ICH S5(R3)
    serious_foetal:
      type: return
      value:
        severity: serious
        soc: Pregnancy, puerperium and perinatal conditions
        action: expedited_report
        regulatory_reference: ICH S5(R3)
    moderate:
      type: return
      value:
        severity: moderate
        soc: Reproductive system and breast disorders
        action: monitor_and_assess
        regulatory_reference: ICH S5(R3)
    mild:
      type: return
      value:
        severity: mild
        soc: Reproductive system and breast disorders
        action: routine_surveillance
        regulatory_reference: ICH S5(R3)
tests:
  - name: congenital_anomaly
    input:
      reaction_pt: CONGENITAL HEART DISEASE
    expect:
      severity: critical
  - name: foetal_death
    input:
      reaction_pt: FOETAL DEATH
    expect:
      severity: critical
  - name: spontaneous_abortion
    input:
      reaction_pt: ABORTION SPONTANEOUS
    expect:
      severity: serious
  - name: first_trimester_exposure
    input:
      reaction_pt: DRUG EXPOSURE DURING PREGNANCY
      trimester: 1
    expect:
      severity: serious
  - name: foetal_distress
    input:
      reaction_pt: FOETAL DISTRESS SYNDROME
    expect:
      severity: serious
  - name: fertility_issue
    input:
      reaction_pt: MALE FERTILITY DECREASED
    expect:
      severity: moderate
  - name: mild_menstrual
    input:
      reaction_pt: MENSTRUAL DISORDER
    expect:
      severity: mild
  - name: null_safety
    input: {}
    expect:
      severity: mild
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - severity
    - soc
    - action
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
