# MICROGRAM++ (upgraded 2026-04-23)
name: meddra-router
version: 1.0.0
description: "MedDRA coding level selector: determines which hierarchy level (LLT/PT/HLT/HLGT/SOC) to use based on coding purpose and context"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: coding_purpose
    type: string
    required: false
    description: ""
  - name: multiple_terms
    type: bool
    required: false
    description: ""
  - name: specificity_available
    type: bool
    required: false
    description: ""
outputs:
  - name: coding_guidance
    type: string
  - name: description
    type: string
  - name: level
    type: string
  - name: meddra_hierarchy_position
    type: int
interface:
  inputs:
    coding_purpose:
      type: string
      required: false
    multiple_terms:
      type: bool
      required: false
    specificity_available:
      type: bool
      required: false
  outputs:
    coding_guidance:
      type: string
    description:
      type: string
    level:
      type: string
    meddra_hierarchy_position:
      type: int
ui:
  title: Meddra Router
  subtitle: "MedDRA coding level selector: determines which hierarchy level (LLT/PT/HLT/HLGT/SOC) to use based on coding purpose and context"
  icon: circle
  route: /vigilance/mg/meddra-router
  steps:
    - field: coding_purpose
      label: coding purpose
      help: Enter coding_purpose
      widget: text
      placeholder: null
    - field: multiple_terms
      label: multiple terms
      help: Enter multiple_terms
      widget: toggle
      placeholder: null
    - field: specificity_available
      label: specificity available
      help: Enter specificity_available
      widget: toggle
      placeholder: null
  result:
    template: "coding_guidance: {{coding_guidance}} — description: {{description}} — level: {{level}} — meddra_hierarchy_position: {{meddra_hierarchy_position}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/meddra-router
  cli: rsk mcg run meddra-router
  auth: none
  rate_limit: 600/min
tree:
  start: check_case_coding
  nodes:
    check_case_coding:
      type: condition
      variable: coding_purpose
      operator: eq
      value: case_coding
      true_next: check_specificity
      false_next: check_signal_detection
    check_specificity:
      type: condition
      variable: specificity_available
      operator: eq
      value: true
      true_next: return_pt_case
      false_next: return_llt
    check_signal_detection:
      type: condition
      variable: coding_purpose
      operator: eq
      value: signal_detection
      true_next: return_pt_signal
      false_next: check_labeling
    check_labeling:
      type: condition
      variable: coding_purpose
      operator: eq
      value: labeling
      true_next: check_multiple_terms
      false_next: check_aggregate
    check_multiple_terms:
      type: condition
      variable: multiple_terms
      operator: eq
      value: true
      true_next: return_hlgt
      false_next: return_hlt
    check_aggregate:
      type: condition
      variable: coding_purpose
      operator: eq
      value: aggregate_analysis
      true_next: return_soc
      false_next: return_pt_default
    return_pt_case:
      type: return
      value:
        level: PT
        description: Preferred Term — most specific for individual case coding
        meddra_hierarchy_position: 3
        coding_guidance: Use the most clinically specific PT that captures the verbatim term
    return_llt:
      type: return
      value:
        level: LLT
        description: Lowest Level Term — verbatim mapping when PT unclear
        meddra_hierarchy_position: 1
        coding_guidance: Map verbatim term to LLT first, then link to parent PT for reporting
    return_pt_signal:
      type: return
      value:
        level: PT
        description: Preferred Term — standard for disproportionality analysis
        meddra_hierarchy_position: 3
        coding_guidance: PRR and other disproportionality methods operate at PT level per ICH E2B
    return_hlgt:
      type: return
      value:
        level: HLGT
        description: High Level Group Term — aggregate for product labeling
        meddra_hierarchy_position: 4
        coding_guidance: Group related PTs under HLGT for labeling sections covering multiple terms
    return_hlt:
      type: return
      value:
        level: HLT
        description: High Level Term — single-concept labeling
        meddra_hierarchy_position: 3
        coding_guidance: Use HLT when labeling addresses a single clinical concept across related PTs
    return_soc:
      type: return
      value:
        level: SOC
        description: System Organ Class — broadest level for trend analysis
        meddra_hierarchy_position: 5
        coding_guidance: Aggregate by body system for periodic reports and population-level trend analysis
    return_pt_default:
      type: return
      value:
        level: PT
        description: Preferred Term — default when purpose unclear
        meddra_hierarchy_position: 3
        coding_guidance: PT is the standard reporting level; consult Medical Dictionary for Drug Regulatory Activities guidance
tests:
  - input:
      coding_purpose: case_coding
      specificity_available: true
      multiple_terms: false
    expect:
      level: PT
      description: Preferred Term — most specific for individual case coding
      meddra_hierarchy_position: 3
  - input:
      coding_purpose: case_coding
      specificity_available: false
      multiple_terms: false
    expect:
      level: LLT
      description: Lowest Level Term — verbatim mapping when PT unclear
      meddra_hierarchy_position: 1
  - input:
      coding_purpose: signal_detection
      specificity_available: true
      multiple_terms: false
    expect:
      level: PT
      description: Preferred Term — standard for disproportionality analysis
      meddra_hierarchy_position: 3
  - input:
      coding_purpose: signal_detection
      specificity_available: false
      multiple_terms: true
    expect:
      level: PT
      description: Preferred Term — standard for disproportionality analysis
      meddra_hierarchy_position: 3
  - input:
      coding_purpose: labeling
      multiple_terms: true
      specificity_available: true
    expect:
      level: HLGT
      description: High Level Group Term — aggregate for product labeling
      meddra_hierarchy_position: 4
  - input:
      coding_purpose: labeling
      multiple_terms: false
      specificity_available: true
    expect:
      level: HLT
      description: High Level Term — single-concept labeling
      meddra_hierarchy_position: 3
  - input:
      coding_purpose: aggregate_analysis
      specificity_available: true
      multiple_terms: true
    expect:
      level: SOC
      description: System Organ Class — broadest level for trend analysis
      meddra_hierarchy_position: 5
  - input:
      coding_purpose: aggregate_analysis
      specificity_available: false
      multiple_terms: false
    expect:
      level: SOC
      description: System Organ Class — broadest level for trend analysis
      meddra_hierarchy_position: 5
  - input:
      coding_purpose: unknown_purpose
      specificity_available: true
      multiple_terms: false
    expect:
      level: PT
      description: Preferred Term — default when purpose unclear
      meddra_hierarchy_position: 3
  - input: {}
    expect:
      level: PT
      description: Preferred Term — default when purpose unclear
      meddra_hierarchy_position: 3
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - coding_guidance
    - description
    - level
    - meddra_hierarchy_position
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
