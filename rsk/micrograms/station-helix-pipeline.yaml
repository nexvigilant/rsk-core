# MICROGRAM++ (upgraded 2026-04-23)
name: station-helix-pipeline
version: 0.1.0
description: Route helix knowledge encoding through 5-turn verification
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Helix Pipeline
  subtitle: Route helix knowledge encoding through 5-turn verification
  icon: circle
  route: /vigilance/mg/station-helix-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-helix-pipeline
  cli: rsk mcg run station-helix-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_turns
  nodes:
    complete:
      type: return
      value:
        route: archive
        action: certify
        reason: 5-turn helix complete with mutualism — knowledge encoded
        priority: low
    check_turns:
      type: condition
      variable: turns_completed
      operator: gte
      value: 5
      true_next: check_mutualism
      false_next: incomplete
    check_mutualism:
      type: condition
      variable: mutualism_pass
      operator: eq
      value: true
      true_next: complete
      false_next: mutualism_fail
    mutualism_fail:
      type: return
      value:
        reason: Helix complete but mutualism test failed — knowledge serves self only
        route: mutualism_revision
        action: revise
        priority: high
    incomplete:
      type: return
      value:
        route: helix_continuation
        action: continue
        priority: moderate
        reason: Helix encoding incomplete — fewer than 5 turns
tests:
  - input:
      mutualism_pass: true
      turns_completed: 3
    expect:
      route: helix_continuation
      action: continue
      priority: moderate
  - input:
      turns_completed: 5
      mutualism_pass: true
    expect:
      action: certify
      priority: low
      route: archive
  - input:
      mutualism_pass: false
      turns_completed: 5
    expect:
      route: mutualism_revision
      action: revise
      priority: high
  - input:
      turns_completed: 0
    expect:
      action: continue
      reason: Helix encoding incomplete — fewer than 5 turns
      priority: moderate
      route: helix_continuation
  - input:
      turns_completed: -1
    expect:
      action: continue
      route: helix_continuation
      reason: Helix encoding incomplete — fewer than 5 turns
      priority: moderate
  - input:
      turns_completed: 4
    expect:
      route: helix_continuation
      action: continue
      priority: moderate
      reason: Helix encoding incomplete — fewer than 5 turns
  - input:
      turns_completed: 6
    expect:
      action: revise
      reason: Helix complete but mutualism test failed — knowledge serves self only
      priority: high
      route: mutualism_revision
  - input:
      turns_completed: 500
    expect:
      reason: Helix complete but mutualism test failed — knowledge serves self only
      route: mutualism_revision
      action: revise
      priority: high
  - input: {}
    expect:
      route: helix_continuation
      priority: moderate
      reason: Helix encoding incomplete — fewer than 5 turns
      action: continue
  - input: {}
    expect:
      action: continue
      reason: Helix encoding incomplete — fewer than 5 turns
      route: helix_continuation
      priority: moderate
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
