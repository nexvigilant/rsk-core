# MICROGRAM++ (upgraded 2026-04-23)
name: soc-general-and-administration-sit
version: 0.1.0
description: Classify General and administration site disorders by seriousness
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Soc General And Administration Sit
  subtitle: Classify General and administration site disorders by seriousness
  icon: circle
  route: /vigilance/mg/soc-general-and-administration-sit
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/soc-general-and-administration-sit
  cli: rsk mcg run soc-general-and-administration-sit
  auth: none
  rate_limit: 600/min
tree:
  start: check_serious
  nodes:
    check_serious:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: check_fatal
      false_next: non_serious
    check_fatal:
      type: condition
      variable: is_fatal
      operator: eq
      value: true
      true_next: fatal
      false_next: serious
    fatal:
      type: return
      value:
        soc: General and administration site
        severity: fatal
        priority: critical
        route: causality_assessment
    serious:
      type: return
      value:
        soc: General and administration site
        severity: serious
        priority: high
        route: signal_investigation
    non_serious:
      type: return
      value:
        soc: General and administration site
        severity: non_serious
        priority: low
        route: periodic_review
tests:
  - input:
      is_serious: true
      is_fatal: true
    expect:
      soc: General and administration site
      severity: fatal
  - input:
      is_serious: true
      is_fatal: false
    expect:
      soc: General and administration site
      severity: serious
  - input:
      is_serious: false
      is_fatal: false
    expect:
      soc: General and administration site
      severity: non_serious
  - input: {}
    expect:
      soc: General and administration site
      severity: non_serious
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
