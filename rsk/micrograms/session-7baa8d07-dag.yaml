name: session-7baa8d07-dag
version: "1.0.0"
description: "Auto-generated DAG from session 7baa8d07 fast-food prompts (3 nodes)"

interface:
  inputs:
    step_0_done:
      type: bool
      required: false
    step_1_done:
      type: bool
      required: false
    step_2_done:
      type: bool
      required: false
  outputs:
    task:
      type: string
    prompt:
      type: string
    priority:
      type: int

tree:
  start: gate_0
  nodes:
    gate_0:
      type: condition
      variable: step_0_done
      operator: eq
      value: true
      true_next: gate_1
      false_next: node_0
    node_0:
      type: return
      value:
        task: "step-0"
        prompt: "Test NUCLEUS.md by spawning nucleus-pv-dev from home directory"
        priority: 1
    gate_1:
      type: condition
      variable: step_1_done
      operator: eq
      value: true
      true_next: gate_2
      false_next: node_1
    node_1:
      type: return
      value:
        task: "step-1"
        prompt: "Wire session-prompt-dag into loop-grappler for auto-DAG generation"
        priority: 2
    gate_2:
      type: condition
      variable: step_2_done
      operator: eq
      value: true
      true_next: node_2
      false_next: node_2
    node_2:
      type: return
      value:
        task: "step-2"
        prompt: "Run Causality Lab via moltbrowser-mcp for end-to-end browser validation"
        priority: 3

tests:
  - name: "empty input routes to first prompt"
    input: {}
    expect:
      task: "step-0"
      priority: 1
  - name: "first done routes to second"
    input:
      step_0_done: true
    expect:
      task: "step-1"
      priority: 2
