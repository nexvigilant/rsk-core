# MICROGRAM++ (upgraded 2026-04-23)
name: neuro-safety-classifier
version: 0.1.0
description: "Neurological safety classifier: maps nervous system adverse reactions to severity grades including PML, seizures, and neuropathy"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: reaction_pt
    type: string
    required: true
    description: MedDRA preferred term for the neurological reaction
outputs:
  - name: severity
    type: string
  - name: soc
    type: string
  - name: action
    type: string
interface:
  inputs:
    reaction_pt:
      type: string
      required: true
      description: MedDRA preferred term for the neurological reaction
  outputs:
    severity:
      type: string
      description: critical | serious | moderate | mild
    soc:
      type: string
    action:
      type: string
ui:
  title: Neuro Safety Classifier
  subtitle: "Neurological safety classifier: maps nervous system adverse reactions to severity grades including PML, seizures, and neuropathy"
  icon: circle
  route: /vigilance/mg/neuro-safety-classifier
  steps:
    - field: reaction_pt
      label: reaction pt
      help: MedDRA preferred term for the neurological reaction
      widget: text
      placeholder: null
  result:
    template: "severity: {{severity}} — soc: {{soc}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/neuro-safety-classifier
  cli: rsk mcg run neuro-safety-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_pml
  nodes:
    check_pml:
      type: condition
      variable: reaction_pt
      operator: contains
      value: PROGRESSIVE MULTIFOCAL LEUKOENCEPHALOPATHY
      true_next: critical
      false_next: check_seizure
    check_seizure:
      type: condition
      variable: reaction_pt
      operator: contains
      value: SEIZURE
      true_next: serious
      false_next: check_encephalitis
    check_encephalitis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: ENCEPHALITIS
      true_next: critical
      false_next: check_gbs
    check_gbs:
      type: condition
      variable: reaction_pt
      operator: contains
      value: GUILLAIN-BARRE
      true_next: critical
      false_next: check_neuropathy
    check_neuropathy:
      type: condition
      variable: reaction_pt
      operator: contains
      value: NEUROPATHY
      true_next: moderate
      false_next: check_syncope
    check_syncope:
      type: condition
      variable: reaction_pt
      operator: contains
      value: SYNCOPE
      true_next: moderate
      false_next: mild
    critical:
      type: return
      value:
        severity: critical
        soc: Nervous system disorders
        action: immediate_expedited_report
    serious:
      type: return
      value:
        severity: serious
        soc: Nervous system disorders
        action: expedited_report
    moderate:
      type: return
      value:
        severity: moderate
        soc: Nervous system disorders
        action: monitor_and_assess
    mild:
      type: return
      value:
        severity: mild
        soc: Nervous system disorders
        action: routine_surveillance
tests:
  - name: pml
    input:
      reaction_pt: PROGRESSIVE MULTIFOCAL LEUKOENCEPHALOPATHY
    expect:
      severity: critical
  - name: seizure
    input:
      reaction_pt: GENERALISED TONIC-CLONIC SEIZURE
    expect:
      severity: serious
  - name: encephalitis
    input:
      reaction_pt: AUTOIMMUNE ENCEPHALITIS
    expect:
      severity: critical
  - name: gbs
    input:
      reaction_pt: GUILLAIN-BARRE SYNDROME
    expect:
      severity: critical
  - name: neuropathy
    input:
      reaction_pt: PERIPHERAL NEUROPATHY
    expect:
      severity: moderate
  - name: headache
    input:
      reaction_pt: HEADACHE
    expect:
      severity: mild
  - name: null_safety
    input: {}
    expect:
      severity: mild
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - severity
    - soc
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
