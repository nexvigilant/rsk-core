name: neuro-safety-classifier
description: 'Neurological safety classifier: maps nervous system adverse reactions to severity grades including PML, seizures, and neuropathy'
version: 0.1.0
interface:
  inputs:
    reaction_pt:
      type: string
      required: true
      description: MedDRA preferred term for the neurological reaction
  outputs:
    severity:
      type: string
      description: 'critical | serious | moderate | mild'
    soc:
      type: string
    action:
      type: string
tree:
  start: check_pml
  nodes:
    check_pml:
      type: condition
      variable: reaction_pt
      operator: contains
      value: PROGRESSIVE MULTIFOCAL LEUKOENCEPHALOPATHY
      true_next: critical
      false_next: check_seizure
    check_seizure:
      type: condition
      variable: reaction_pt
      operator: contains
      value: SEIZURE
      true_next: serious
      false_next: check_encephalitis
    check_encephalitis:
      type: condition
      variable: reaction_pt
      operator: contains
      value: ENCEPHALITIS
      true_next: critical
      false_next: check_gbs
    check_gbs:
      type: condition
      variable: reaction_pt
      operator: contains
      value: GUILLAIN-BARRE
      true_next: critical
      false_next: check_neuropathy
    check_neuropathy:
      type: condition
      variable: reaction_pt
      operator: contains
      value: NEUROPATHY
      true_next: moderate
      false_next: check_syncope
    check_syncope:
      type: condition
      variable: reaction_pt
      operator: contains
      value: SYNCOPE
      true_next: moderate
      false_next: mild
    critical:
      type: return
      value:
        severity: critical
        soc: Nervous system disorders
        action: immediate_expedited_report
    serious:
      type: return
      value:
        severity: serious
        soc: Nervous system disorders
        action: expedited_report
    moderate:
      type: return
      value:
        severity: moderate
        soc: Nervous system disorders
        action: monitor_and_assess
    mild:
      type: return
      value:
        severity: mild
        soc: Nervous system disorders
        action: routine_surveillance
tests:
  - name: pml
    input:
      reaction_pt: PROGRESSIVE MULTIFOCAL LEUKOENCEPHALOPATHY
    expect:
      severity: critical
  - name: seizure
    input:
      reaction_pt: GENERALISED TONIC-CLONIC SEIZURE
    expect:
      severity: serious
  - name: encephalitis
    input:
      reaction_pt: AUTOIMMUNE ENCEPHALITIS
    expect:
      severity: critical
  - name: gbs
    input:
      reaction_pt: GUILLAIN-BARRE SYNDROME
    expect:
      severity: critical
  - name: neuropathy
    input:
      reaction_pt: PERIPHERAL NEUROPATHY
    expect:
      severity: moderate
  - name: headache
    input:
      reaction_pt: HEADACHE
    expect:
      severity: mild
  - name: null_safety
    input: {}
    expect:
      severity: mild
