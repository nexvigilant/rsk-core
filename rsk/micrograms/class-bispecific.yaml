# MICROGRAM++ (upgraded 2026-04-23)
name: class-bispecific
version: 0.1.0
description: "Bispecific antibodies class safety: Neurotoxicity monitoring"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Class Bispecific
  subtitle: "Bispecific antibodies class safety: Neurotoxicity monitoring"
  icon: circle
  route: /vigilance/mg/class-bispecific
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/class-bispecific
  cli: rsk mcg run class-bispecific
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: neurotox_grade
      operator: gte
      value: 2
      true_next: alert
      false_next: safe
    alert:
      type: return
      value:
        action: class_effect_investigation
        drug_class: Bispecific antibodies
        concern: Neurotoxicity
        alert: true
    safe:
      type: return
      value:
        action: continue
        concern: Neurotoxicity
        drug_class: Bispecific antibodies
        alert: false
tests:
  - input:
      neurotox_grade: 2
    expect:
      drug_class: Bispecific antibodies
      alert: true
  - input: {}
    expect:
      drug_class: Bispecific antibodies
      alert: false
  - input:
      neurotox_grade: 0
    expect:
      action: continue
      concern: Neurotoxicity
      alert: false
      drug_class: Bispecific antibodies
  - input:
      neurotox_grade: -1
    expect:
      drug_class: Bispecific antibodies
      action: continue
      concern: Neurotoxicity
      alert: false
  - input:
      neurotox_grade: 1
    expect:
      drug_class: Bispecific antibodies
      concern: Neurotoxicity
      alert: false
      action: continue
  - input:
      neurotox_grade: 3
    expect:
      action: class_effect_investigation
      drug_class: Bispecific antibodies
      concern: Neurotoxicity
      alert: true
  - input:
      neurotox_grade: 200
    expect:
      concern: Neurotoxicity
      alert: true
      drug_class: Bispecific antibodies
      action: class_effect_investigation
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
