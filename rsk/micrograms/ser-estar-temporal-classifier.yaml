name: ser-estar-temporal-classifier
description: >
  Clasifica sûÙntomas clûÙnicos en espaûÝol por temporalidad usando la distinciû°n
  gramatical ser/estar. Estar-codificado = estado transitorio (posible RAM).
  Ser-codificado = condiciû°n permanente/identidad (posible preexistente).
  Classifies Spanish clinical symptoms by temporality using the ser/estar
  grammatical distinction ã a compulsory causality signal English lacks.
version: 0.1.0
primitive_signature:
  dominant: 'ü'
  expression: 'ü(ã + ã) ã distinguishes transient state (estar) from identity (ser), restoring temporal boundary for causality'
  primes: ['ü', 'ã', 'ã', 'type']
  arguments: ['verbo', 'sintoma']
  chain_prediction: >
    Spanish grammar forces speakers to commit: estar = transient ü (state change,
    possible drug-induced), ser = identity/type (permanent, likely pre-existing).
    This is a FREE Naranjo Q3 signal ã temporal ordering encoded in morphology.
    Feeds ã causality-to-action via temporal_classification output.
interface:
  inputs:
    verbo:
      type: string
      required: true
      description: >
        Forma verbal espaûÝola: "ser" o "estar" (o conjugaciones: es/estûÀ/fue/estuvo/era/estaba/siendo/estando).
        Spanish verb form indicating ser or estar usage.
    sintoma:
      type: string
      required: false
      description: >
        Descripciû°n del sûÙntoma clûÙnico en espaûÝol. Optional clinical symptom description.
  outputs:
    clasificacion_temporal:
      type: string
      description: "TRANSITORIO (estar) | PERMANENTE (ser) | AMBIGUO | RECHAZADO"
    temporalidad:
      type: string
      description: "English equivalent: TRANSIENT | PERMANENT | AMBIGUOUS | REJECTED"
    relevancia_causalidad:
      type: int
      description: >
        Peso de relevancia causal 0-100. Estar (transitorio) = alta relevancia
        para RAM. Ser (permanente) = baja relevancia para RAM.
    accion:
      type: string
      description: "Acciû°n recomendada / Recommended action"
    razon:
      type: string
      description: "Explicaciû°n gramatical / Grammatical rationale"
tree:
  start: check_verbo_present
  nodes:
    check_verbo_present:
      type: condition
      variable: verbo
      operator: is_null
      value: null
      true_next: reject_missing
      false_next: normalize_verbo

    reject_missing:
      type: return
      value:
        clasificacion_temporal: RECHAZADO
        temporalidad: REJECTED
        relevancia_causalidad: 0
        accion: "RECHAZADO: verbo es obligatorio / verb is required"
        razon: "Sin verbo no hay clasificaciû°n temporal posible"

    normalize_verbo:
      type: condition
      variable: verbo
      operator: matches
      value: "^(estar|estûÀ|estûÀn|estaba|estaban|estuvo|estuvieron|estando|estuve|estûÀs|estûÀbamos|estarûÙa|estarûÙan|estûˋ|estûˋn)$"
      true_next: classify_estar
      false_next: check_ser

    check_ser:
      type: condition
      variable: verbo
      operator: matches
      value: "^(ser|es|son|era|eran|fue|fueron|siendo|soy|eres|somos|serûÙa|serûÙan|sea|sean)$"
      true_next: classify_ser
      false_next: classify_ambiguous

    classify_estar:
      type: return
      value:
        clasificacion_temporal: TRANSITORIO
        temporalidad: TRANSIENT
        relevancia_causalidad: 80
        accion: "INVESTIGAR: estado transitorio sugiere posible reacciû°n adversa al medicamento"
        razon: >
          Estar codifica estado transitorio en gramûÀtica espaûÝola.
          "El paciente ESTû mareado" implica cambio de estado ã el mareo comenzû°
          en algû¤n momento, posiblemente correlacionado con exposiciû°n al fûÀrmaco.
          Equivale a seûÝal positiva en Naranjo Q3 (ô¢apareciû° la RAM despuûˋs del fûÀrmaco?).

    classify_ser:
      type: return
      value:
        clasificacion_temporal: PERMANENTE
        temporalidad: PERMANENT
        relevancia_causalidad: 20
        accion: "DOCUMENTAR: condiciû°n permanente sugiere preexistencia, no reacciû°n adversa"
        razon: >
          Ser codifica identidad/esencia en gramûÀtica espaûÝola.
          "El paciente ES diabûˋtico" implica condiciû°n permanente ã parte de la
          identidad del paciente, no un cambio de estado inducido por fûÀrmaco.
          Baja probabilidad de ser RAM a menos que el fûÀrmaco cause condiciû°n crû°nica nueva.

    classify_ambiguous:
      type: return
      value:
        clasificacion_temporal: AMBIGUO
        temporalidad: AMBIGUOUS
        relevancia_causalidad: 50
        accion: "REVISAR: verbo no reconocido como ser/estar ã requiere clasificaciû°n manual"
        razon: >
          El verbo proporcionado no es forma reconocida de ser ni estar.
          Posibilidades: otro verbo copulativo (parecer, resultar), error tipogrûÀfico,
          o texto en idioma diferente. Requiere revisiû°n humana.

