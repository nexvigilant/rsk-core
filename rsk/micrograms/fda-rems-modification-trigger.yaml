name: fda-rems-modification-trigger
description: "FDA REMS modification decision tree: determines when a REMS requires modification based on safety signal type and evidence strength per FDA Guidance 'REMS Modifications and Revisions' (2019)"
version: 0.1.0
interface:
  inputs:
    signal_type:
      type: string
      required: true
      description: "Type of safety signal: new_risk, increased_frequency, new_population, reduced_risk, ineffective_rems"
    evidence_strength:
      type: string
      required: true
      description: "Strength of evidence: confirmed, probable, possible"
    current_rems_elements:
      type: string
      required: false
      description: "Current REMS elements: medication_guide, communication_plan, etass, all"
  outputs:
    action_required:
      type: string
    modification_type:
      type: string
    submission_type:
      type: string
    timeline:
      type: string
    regulatory_reference:
      type: string
tree:
  start: check_signal_type
  nodes:
    check_signal_type:
      type: condition
      variable: signal_type
      operator: eq
      value: "new_risk"
      true_next: new_risk_evidence
      false_next: check_increased_freq

    check_increased_freq:
      type: condition
      variable: signal_type
      operator: eq
      value: "increased_frequency"
      true_next: increased_freq_evidence
      false_next: check_new_population

    check_new_population:
      type: condition
      variable: signal_type
      operator: eq
      value: "new_population"
      true_next: new_population_evidence
      false_next: check_reduced_risk

    check_reduced_risk:
      type: condition
      variable: signal_type
      operator: eq
      value: "reduced_risk"
      true_next: reduced_risk_action
      false_next: check_ineffective

    check_ineffective:
      type: condition
      variable: signal_type
      operator: eq
      value: "ineffective_rems"
      true_next: ineffective_evidence
      false_next: no_action

    # NEW RISK PATH
    new_risk_evidence:
      type: condition
      variable: evidence_strength
      operator: eq
      value: "confirmed"
      true_next: new_risk_confirmed
      false_next: new_risk_not_confirmed

    new_risk_not_confirmed:
      type: condition
      variable: evidence_strength
      operator: eq
      value: "probable"
      true_next: new_risk_probable
      false_next: new_risk_possible

    new_risk_confirmed:
      type: return
      value:
        action_required: MAJOR_MODIFICATION
        modification_type: "Add/strengthen REMS elements - new ETASS or communication plan"
        submission_type: "Prior Approval Supplement (PAS)"
        timeline: "Submit within 30 days of confirmation"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019), Section IV.A"

    new_risk_probable:
      type: return
      value:
        action_required: MODERATE_MODIFICATION
        modification_type: "Update Medication Guide and communication plan"
        submission_type: "Changes Being Effected (CBE-30)"
        timeline: "Submit within 30 days; may implement before approval"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019), Section IV.B"

    new_risk_possible:
      type: return
      value:
        action_required: MONITOR_AND_ASSESS
        modification_type: "Increase monitoring; prepare contingency modification"
        submission_type: "Annual REMS Assessment"
        timeline: "Include in next REMS assessment report"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019), Section V"

    # INCREASED FREQUENCY PATH
    increased_freq_evidence:
      type: condition
      variable: evidence_strength
      operator: eq
      value: "confirmed"
      true_next: increased_confirmed
      false_next: increased_not_confirmed

    increased_not_confirmed:
      type: condition
      variable: evidence_strength
      operator: eq
      value: "possible"
      true_next: increased_possible
      false_next: increased_probable

    increased_confirmed:
      type: return
      value:
        action_required: MODERATE_MODIFICATION
        modification_type: "Strengthen existing REMS elements; consider adding ETASS"
        submission_type: "Changes Being Effected (CBE-30)"
        timeline: "Submit within 30 days"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019), Section IV.B"

    increased_probable:
      type: return
      value:
        action_required: MINOR_MODIFICATION
        modification_type: "Update Medication Guide frequency/severity language"
        submission_type: "Changes Being Effected (CBE-0)"
        timeline: "Implement immediately; notify FDA"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019), Section IV.C"

    increased_possible:
      type: return
      value:
        action_required: MONITOR_AND_ASSESS
        modification_type: "Enhanced surveillance; no REMS change yet"
        submission_type: "Annual REMS Assessment"
        timeline: "Include in next REMS assessment report"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019), Section V"

    # NEW POPULATION PATH
    new_population_evidence:
      type: condition
      variable: evidence_strength
      operator: eq
      value: "confirmed"
      true_next: new_pop_confirmed
      false_next: new_pop_monitor

    new_pop_confirmed:
      type: return
      value:
        action_required: MAJOR_MODIFICATION
        modification_type: "Extend REMS to cover new population; update ETASS if applicable"
        submission_type: "Prior Approval Supplement (PAS)"
        timeline: "Submit within 30 days of confirmation"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019), Section IV.A"

    new_pop_monitor:
      type: return
      value:
        action_required: MONITOR_AND_ASSESS
        modification_type: "Targeted surveillance for new population; assess at next review"
        submission_type: "Annual REMS Assessment"
        timeline: "Include in next REMS assessment report"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019), Section V"

    # REDUCED RISK PATH
    reduced_risk_action:
      type: return
      value:
        action_required: SIMPLIFICATION
        modification_type: "Remove or reduce REMS elements no longer necessary"
        submission_type: "Prior Approval Supplement (PAS)"
        timeline: "Submit at next REMS assessment or when data supports"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019), Section VI"

    # INEFFECTIVE REMS PATH
    ineffective_evidence:
      type: condition
      variable: evidence_strength
      operator: eq
      value: "confirmed"
      true_next: ineffective_confirmed
      false_next: ineffective_monitor

    ineffective_confirmed:
      type: return
      value:
        action_required: MAJOR_MODIFICATION
        modification_type: "Redesign REMS; current elements failing to meet safety goals"
        submission_type: "Prior Approval Supplement (PAS)"
        timeline: "Submit within 30 days; FDA may require meeting"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019), Section IV.A"

    ineffective_monitor:
      type: return
      value:
        action_required: MINOR_MODIFICATION
        modification_type: "Adjust implementation; increase compliance monitoring"
        submission_type: "Changes Being Effected (CBE-30)"
        timeline: "Submit within 30 days"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019), Section IV.C"

    no_action:
      type: return
      value:
        action_required: NO_ACTION
        modification_type: "No REMS modification indicated"
        submission_type: "N/A"
        timeline: "Continue routine REMS assessment"
        regulatory_reference: "FDA Guidance: REMS Modifications and Revisions (2019)"

primitive_signature:
  dominant: 'σ'
  expression: 'σ(→) — regulatory action routing by signal causality strength'
  primes: ['σ', '→', 'κ']
  arguments: ['signal_type', 'evidence_strength']

tests:
# New confirmed risk -> major modification
- input:
    signal_type: "new_risk"
    evidence_strength: "confirmed"
  expect:
    action_required: MAJOR_MODIFICATION
    submission_type: "Prior Approval Supplement (PAS)"

# New probable risk -> moderate modification
- input:
    signal_type: "new_risk"
    evidence_strength: "probable"
  expect:
    action_required: MODERATE_MODIFICATION
    submission_type: "Changes Being Effected (CBE-30)"

# New possible risk -> monitor
- input:
    signal_type: "new_risk"
    evidence_strength: "possible"
  expect:
    action_required: MONITOR_AND_ASSESS

# Increased frequency confirmed
- input:
    signal_type: "increased_frequency"
    evidence_strength: "confirmed"
  expect:
    action_required: MODERATE_MODIFICATION

# Reduced risk -> simplification
- input:
    signal_type: "reduced_risk"
    evidence_strength: "confirmed"
  expect:
    action_required: SIMPLIFICATION

# Ineffective REMS confirmed -> redesign
- input:
    signal_type: "ineffective_rems"
    evidence_strength: "confirmed"
  expect:
    action_required: MAJOR_MODIFICATION

# New population confirmed
- input:
    signal_type: "new_population"
    evidence_strength: "confirmed"
  expect:
    action_required: MAJOR_MODIFICATION

# New population, not confirmed -> monitor
- input:
    signal_type: "new_population"
    evidence_strength: "possible"
  expect:
    action_required: MONITOR_AND_ASSESS

# Increased frequency, probable -> minor modification
- input:
    signal_type: "increased_frequency"
    evidence_strength: "probable"
  expect:
    action_required: MINOR_MODIFICATION

# Increased frequency, possible -> monitor
- input:
    signal_type: "increased_frequency"
    evidence_strength: "possible"
  expect:
    action_required: MONITOR_AND_ASSESS

# Ineffective REMS, not confirmed -> minor modification
- input:
    signal_type: "ineffective_rems"
    evidence_strength: "probable"
  expect:
    action_required: MINOR_MODIFICATION

# Unknown signal type -> no action
- input:
    signal_type: "other"
    evidence_strength: "confirmed"
  expect:
    action_required: NO_ACTION

# Empty input
- input: {}
  expect:
    action_required: NO_ACTION
