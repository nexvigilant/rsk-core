# MICROGRAM++ (upgraded 2026-04-23)
name: station-tov-pipeline
version: 0.1.0
description: Route Theory of Vigilance stability shell and epistemic trust checks
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Tov Pipeline
  subtitle: Route Theory of Vigilance stability shell and epistemic trust checks
  icon: circle
  route: /vigilance/mg/station-tov-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-tov-pipeline
  cli: rsk mcg run station-tov-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_stable
  nodes:
    shell_broken:
      type: return
      value:
        action: halt
        reason: ToV stability shell breached — safety manifold compromised
        route: system_halt
        priority: critical
    check_trust:
      type: condition
      variable: epistemic_trust
      operator: gte
      value: 0.7
      true_next: trusted
      false_next: low_trust
    check_stable:
      type: condition
      variable: stability_shell_intact
      operator: eq
      value: true
      true_next: check_trust
      false_next: shell_broken
    trusted:
      type: return
      value:
        priority: low
        route: archive
        reason: ToV stable, epistemic trust ≥0.7 — operations nominal
        action: proceed
    low_trust:
      type: return
      value:
        action: validate
        priority: moderate
        reason: Epistemic trust <0.7 — increase evidence before acting on signals
        route: evidence_gathering
tests:
  - input:
      stability_shell_intact: false
      epistemic_trust: 0.5
    expect:
      action: halt
      priority: critical
      route: system_halt
  - input:
      epistemic_trust: 0.9
      stability_shell_intact: true
    expect:
      priority: low
      action: proceed
      route: archive
  - input:
      stability_shell_intact: true
      epistemic_trust: 0.4
    expect:
      route: evidence_gathering
      priority: moderate
      action: validate
  - input:
      epistemic_trust: 0.699
    expect:
      reason: ToV stability shell breached — safety manifold compromised
      action: halt
      priority: critical
      route: system_halt
  - input:
      epistemic_trust: 0.701
    expect:
      action: halt
      priority: critical
      route: system_halt
      reason: ToV stability shell breached — safety manifold compromised
  - input: {}
    expect:
      reason: ToV stability shell breached — safety manifold compromised
      route: system_halt
      priority: critical
      action: halt
  - input: {}
    expect:
      reason: ToV stability shell breached — safety manifold compromised
      route: system_halt
      priority: critical
      action: halt
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
