# MICROGRAM++ (upgraded 2026-04-23)
name: strain-gauge-yield-alarm
version: 0.1.0
description: Classify structural strain severity against yield and fatigue thresholds. Gates suit structural health.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: microstrain_abs
    type: number
    required: true
    description: "Absolute measured strain in microstrain (µε). Pre-computed: abs(raw_microstrain)."
outputs:
  - name: severity
    type: string
  - name: action
    type: string
  - name: margin_pct
    type: number
interface:
  inputs:
    microstrain_abs:
      type: number
      required: true
      description: "Absolute measured strain in microstrain (µε). Pre-computed: abs(raw_microstrain)."
  outputs:
    severity:
      type: string
    action:
      type: string
    margin_pct:
      type: number
ui:
  title: Strain Gauge Yield Alarm
  subtitle: Classify structural strain severity against yield and fatigue thresholds. Gates suit structural health.
  icon: circle
  route: /vigilance/mg/strain-gauge-yield-alarm
  steps:
    - field: microstrain_abs
      label: microstrain abs
      help: "Absolute measured strain in microstrain (µε). Pre-computed: abs(raw_microstrain)."
      widget: number
      placeholder: null
  result:
    template: "severity: {{severity}} — action: {{action}} — margin_pct: {{margin_pct}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/strain-gauge-yield-alarm
  cli: rsk mcg run strain-gauge-yield-alarm
  auth: none
  rate_limit: 600/min
tree:
  start: check_yield
  nodes:
    check_yield:
      type: condition
      variable: microstrain_abs
      operator: gt
      value: 2000
      true_next: yield_exceeded
      false_next: check_fatigue
    check_fatigue:
      type: condition
      variable: microstrain_abs
      operator: gt
      value: 800
      true_next: fatigue_zone
      false_next: nominal
    yield_exceeded:
      type: return
      value:
        severity: CRITICAL
        action: ABORT — structural yield exceeded. Inspect for plastic deformation.
        margin_pct: 0
    fatigue_zone:
      type: return
      value:
        severity: WARNING
        action: Log cycle count — operating in fatigue-sensitive range
        margin_pct: 50
    nominal:
      type: return
      value:
        severity: NOMINAL
        action: Continue — strain within elastic range
        margin_pct: 100
tests:
  - input:
      microstrain_abs: 500
    expect:
      severity: NOMINAL
  - input:
      microstrain_abs: 1200
    expect:
      severity: WARNING
  - input:
      microstrain_abs: 2500
    expect:
      severity: CRITICAL
  - input:
      microstrain_abs: 2100
    expect:
      severity: CRITICAL
  - input:
      microstrain_abs: 900
    expect:
      severity: WARNING
  - input: {}
    expect:
      severity: NOMINAL
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - severity
    - action
    - margin_pct
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
