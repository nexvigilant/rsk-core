# MICROGRAM++ (upgraded 2026-04-23)
name: trend-cluster-geographic
version: 0.1.0
description: Geographic case cluster
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Trend Cluster Geographic
  subtitle: Geographic case cluster
  icon: circle
  route: /vigilance/mg/trend-cluster-geographic
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/trend-cluster-geographic
  cli: rsk mcg run trend-cluster-geographic
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: geo_concentration
      operator: gte
      value: 50
      true_next: detected
      false_next: not_detected
    not_detected:
      type: return
      value:
        action: continue_monitoring
        pattern: geo_cluster
        detected: false
    detected:
      type: return
      value:
        detected: true
        action: investigate
        pattern: geo_cluster
tests:
  - input:
      geo_concentration: 50
    expect:
      detected: true
      pattern: geo_cluster
  - input: {}
    expect:
      pattern: geo_cluster
      detected: false
  - input:
      geo_concentration: 0
    expect:
      action: continue_monitoring
      pattern: geo_cluster
      detected: false
  - input:
      geo_concentration: -1
    expect:
      pattern: geo_cluster
      detected: false
      action: continue_monitoring
  - input:
      geo_concentration: 49
    expect:
      action: continue_monitoring
      pattern: geo_cluster
      detected: false
  - input:
      geo_concentration: 51
    expect:
      action: investigate
      detected: true
      pattern: geo_cluster
  - input:
      geo_concentration: 5000
    expect:
      pattern: geo_cluster
      detected: true
      action: investigate
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
