name: trend-seasonal
description: Seasonal pattern detected
version: 0.1.0
tree:
  start: check
  nodes:
    not_detected:
      type: return
      value:
        pattern: seasonal
        detected: false
        action: continue_monitoring
    detected:
      type: return
      value:
        pattern: seasonal
        action: investigate
        detected: true
    check:
      type: condition
      variable: seasonal_pvalue
      operator: lte
      value: 0
      true_next: detected
      false_next: not_detected
tests:
- input:
    seasonal_pvalue: 0
  expect:
    pattern: seasonal
    detected: true
- input: {}
  expect:
    pattern: seasonal
    detected: false
- input:
    seasonal_pvalue: -1
  expect:
    pattern: seasonal
    action: investigate
    detected: true
- input:
    seasonal_pvalue: -1
  expect:
    pattern: seasonal
    action: investigate
    detected: true
- input:
    seasonal_pvalue: 1
  expect:
    pattern: seasonal
    detected: false
    action: continue_monitoring
- input:
    seasonal_pvalue: 0
  expect:
    detected: true
    pattern: seasonal
    action: investigate
interface: null
primitive_signature: null
