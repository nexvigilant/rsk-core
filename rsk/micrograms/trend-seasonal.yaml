# MICROGRAM++ (upgraded 2026-04-23)
name: trend-seasonal
version: 0.1.0
description: Seasonal pattern detected
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Trend Seasonal
  subtitle: Seasonal pattern detected
  icon: circle
  route: /vigilance/mg/trend-seasonal
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/trend-seasonal
  cli: rsk mcg run trend-seasonal
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    not_detected:
      type: return
      value:
        pattern: seasonal
        detected: false
        action: continue_monitoring
    detected:
      type: return
      value:
        pattern: seasonal
        action: investigate
        detected: true
    check:
      type: condition
      variable: seasonal_pvalue
      operator: lte
      value: 0
      true_next: detected
      false_next: not_detected
tests:
  - input:
      seasonal_pvalue: 0
    expect:
      pattern: seasonal
      detected: true
  - input: {}
    expect:
      pattern: seasonal
      detected: false
  - input:
      seasonal_pvalue: -1
    expect:
      pattern: seasonal
      action: investigate
      detected: true
  - input:
      seasonal_pvalue: -1
    expect:
      pattern: seasonal
      action: investigate
      detected: true
  - input:
      seasonal_pvalue: 1
    expect:
      pattern: seasonal
      detected: false
      action: continue_monitoring
  - input:
      seasonal_pvalue: 0
    expect:
      detected: true
      pattern: seasonal
      action: investigate
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
