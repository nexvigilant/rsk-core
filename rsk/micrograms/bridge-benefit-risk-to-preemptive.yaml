# MICROGRAM++ (upgraded 2026-04-23)
name: bridge-benefit-risk-to-preemptive
version: 0.1.0
description: "Bridge: converts B/R assessment into preemptive PV trajectory input"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Bridge Benefit Risk To Preemptive
  subtitle: "Bridge: converts B/R assessment into preemptive PV trajectory input"
  icon: circle
  route: /vigilance/mg/bridge-benefit-risk-to-preemptive
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/bridge-benefit-risk-to-preemptive
  cli: rsk mcg run bridge-benefit-risk-to-preemptive
  auth: none
  rate_limit: 600/min
tree:
  start: check_action
  nodes:
    safe_trajectory:
      type: return
      value:
        intervention_window_days: 90
        trajectory_severity: low
        bridge: benefit-risk-to-preemptive
    moderate_trajectory:
      type: return
      value:
        trajectory_severity: moderate
        intervention_window_days: 14
        bridge: benefit-risk-to-preemptive
    critical_trajectory:
      type: return
      value:
        intervention_window_days: 3
        bridge: benefit-risk-to-preemptive
        trajectory_severity: critical
    check_action:
      type: condition
      variable: action
      operator: eq
      value: escalate
      true_next: critical_trajectory
      false_next: check_review
    check_review:
      type: condition
      variable: action
      operator: eq
      value: review
      true_next: moderate_trajectory
      false_next: safe_trajectory
tests:
  - input:
      priority: critical
      action: escalate
    expect:
      trajectory_severity: critical
      bridge: benefit-risk-to-preemptive
      intervention_window_days: 3
  - input:
      priority: moderate
      action: review
    expect:
      trajectory_severity: moderate
      bridge: benefit-risk-to-preemptive
      intervention_window_days: 14
  - input:
      priority: low
      action: approve
    expect:
      intervention_window_days: 90
      bridge: benefit-risk-to-preemptive
      trajectory_severity: low
  - input: {}
    expect:
      trajectory_severity: low
      intervention_window_days: 90
      bridge: benefit-risk-to-preemptive
  - input: {}
    expect:
      trajectory_severity: low
      bridge: benefit-risk-to-preemptive
      intervention_window_days: 90
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
