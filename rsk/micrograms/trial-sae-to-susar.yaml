name: trial-sae-to-susar
description: Routes serious adverse event classification to SUSAR determination and
  reporting timeline
version: 0.1.0
tree:
  start: check_seriousness
  nodes:
    not_serious:
      type: condition
      variable: is_unexpected
      operator: eq
      value: true
      true_next: check_related_not_serious
      false_next: not_serious_expected
    check_related_not_serious:
      type: condition
      variable: is_related
      operator: eq
      value: true
      true_next: non_serious_unexpected_related
      false_next: non_serious_unexpected_unrelated
    susar_true:
      type: return
      value:
        rationale: Serious, unexpected, and related event qualifies as SUSAR - report
          within 7 days
        is_susar: true
        reporting_timeline_days: 7
    non_serious_unexpected_related:
      type: return
      value:
        is_susar: false
        reporting_timeline_days: 60
        rationale: Non-serious but unexpected and related event - report within 60
          days
    check_seriousness:
      type: condition
      variable: is_serious
      operator: eq
      value: true
      true_next: check_unexpected
      false_next: not_serious
    check_related:
      type: condition
      variable: is_related
      operator: eq
      value: true
      true_next: susar_true
      false_next: serious_unexpected_unrelated
    serious_unexpected_unrelated:
      type: return
      value:
        rationale: Serious unexpected but unrelated event - standard reporting within
          30 days
        is_susar: false
        reporting_timeline_days: 30
    check_unexpected:
      type: condition
      variable: is_unexpected
      operator: eq
      value: true
      true_next: check_related
      false_next: serious_expected
    not_serious_expected:
      type: return
      value:
        is_susar: false
        rationale: Non-serious expected event - routine reporting within 90 days
        reporting_timeline_days: 90
    serious_expected:
      type: return
      value:
        reporting_timeline_days: 30
        rationale: Serious expected event - standard reporting within 30 days
        is_susar: false
    non_serious_unexpected_unrelated:
      type: return
      value:
        is_susar: false
        reporting_timeline_days: 60
        rationale: Non-serious unexpected unrelated event - report within 60 days
tests:
- input:
    is_related: false
    is_serious: false
    is_unexpected: false
  expect:
    is_susar: false
    rationale: Non-serious expected event - routine reporting within 90 days
    reporting_timeline_days: 90
- input:
    is_related: false
    is_serious: false
    is_unexpected: true
  expect:
    is_susar: false
    reporting_timeline_days: 60
    rationale: Non-serious unexpected unrelated event - report within 60 days
- input:
    is_related: false
    is_serious: true
    is_unexpected: false
  expect:
    reporting_timeline_days: 30
    rationale: Serious expected event - standard reporting within 30 days
    is_susar: false
- input:
    is_related: false
    is_serious: true
    is_unexpected: true
  expect:
    rationale: Serious unexpected but unrelated event - standard reporting within
      30 days
    is_susar: false
    reporting_timeline_days: 30
- input:
    is_related: true
    is_serious: false
    is_unexpected: true
  expect:
    is_susar: false
    reporting_timeline_days: 60
    rationale: Non-serious but unexpected and related event - report within 60 days
- input:
    is_related: true
    is_serious: true
    is_unexpected: true
  expect:
    rationale: Serious, unexpected, and related event qualifies as SUSAR - report
      within 7 days
    is_susar: true
    reporting_timeline_days: 7
- input: {}
  expect:
    is_susar: false
    rationale: Non-serious expected event - routine reporting within 90 days
    reporting_timeline_days: 90
interface:
  inputs:
    is_unexpected:
      type: boolean
      required: true
    is_serious:
      type: boolean
      required: true
    is_related:
      type: boolean
      required: true
  outputs:
    rationale:
      type: string
      required: false
    is_susar:
      type: boolean
      required: false
    reporting_timeline_days:
      type: integer
      required: false
  aliases: {}
