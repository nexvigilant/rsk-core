name: gate-qbri-favorable
description: Favorable benefit-risk
version: 0.1.0
tree:
  start: check
  nodes:
    pass:
      type: return
      value:
        gate: true
        threshold: qbri_score
        met: true
    fail:
      type: return
      value:
        threshold: qbri_score
        met: false
        gate: false
    check:
      type: condition
      variable: qbri_score
      operator: gte
      value: 1.0
      true_next: pass
      false_next: fail
tests:
- input:
    qbri_score: 1.0
  expect:
    met: true
    gate: true
- input: {}
  expect:
    met: false
    gate: false
- input:
    qbri_score: 0.999
  expect:
    threshold: qbri_score
    gate: false
    met: false
- input:
    qbri_score: 1.001
  expect:
    gate: true
    met: true
    threshold: qbri_score
interface: null
primitive_signature: null
