# MICROGRAM++ (upgraded 2026-04-23)
name: gate-ror-significant
version: 0.1.0
description: ROR lower CI excludes 1.0
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Gate Ror Significant
  subtitle: ROR lower CI excludes 1.0
  icon: circle
  route: /vigilance/mg/gate-ror-significant
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/gate-ror-significant
  cli: rsk mcg run gate-ror-significant
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    fail:
      type: return
      value:
        gate: false
        met: false
        threshold: ror_lower_ci
    check:
      type: condition
      variable: ror_lower_ci
      operator: gte
      value: 1
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        threshold: ror_lower_ci
        gate: true
        met: true
tests:
  - input:
      ror_lower_ci: 1
    expect:
      met: true
      gate: true
  - input: {}
    expect:
      met: false
      gate: false
  - input:
      ror_lower_ci: 0.999
    expect:
      threshold: ror_lower_ci
      met: false
      gate: false
  - input:
      ror_lower_ci: 1.001
    expect:
      met: true
      threshold: ror_lower_ci
      gate: true
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
