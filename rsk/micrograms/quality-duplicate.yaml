name: quality-duplicate
description: "Duplicate case detection"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "is_duplicate"
      operator: "eq"
      value: false
      true_next: "pass"
      false_next: "fail"
    pass:
      type: "return"
      value:
        check: "quality-duplicate"
        passed: true
        action: "accept"
    fail:
      type: "return"
      value:
        check: "quality-duplicate"
        passed: false
        action: "flag_for_review"

tests:
  - input: {"is_duplicate": false}
    expect: {"check": "quality-duplicate", "passed": true}
  - input: {}
    expect: {"check": "quality-duplicate", "passed": false}
