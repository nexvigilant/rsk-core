# MICROGRAM++ (upgraded 2026-04-23)
name: naranjo-quick
version: 0.2.0
description: Quick Naranjo causality classification from total score
family: pv.causality
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: naranjo_score
    type: int
    required: true
    description: ""
outputs:
  - name: causality
    type: string
  - name: confidence
    type: int
  - name: action
    type: string
interface:
  inputs:
    naranjo_score:
      type: int
      required: true
  outputs:
    causality:
      type: string
    confidence:
      type: int
    action:
      type: string
ui:
  title: Naranjo Quick
  subtitle: Quick Naranjo causality classification from total score
  icon: git-branch
  route: /vigilance/mg/naranjo-quick
  steps:
    - field: naranjo_score
      label: naranjo score
      help: Enter naranjo_score
      widget: text
      placeholder: null
  result:
    template: "causality: {{causality}} — confidence: {{confidence}} — action: {{action}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/naranjo-quick
  cli: rsk mcg run naranjo-quick
  auth: none
  rate_limit: 600/min
tree:
  start: check_score_present
  nodes:
    check_score_present:
      type: condition
      variable: naranjo_score
      operator: is_null
      value: null
      true_next: reject_missing
      false_next: check_upper_bound
    reject_missing:
      type: return
      value:
        causality: REJECTED
        confidence: 0
        action: "REJECTED: naranjo_score is required"
    check_upper_bound:
      type: condition
      variable: naranjo_score
      operator: gt
      value: 13
      true_next: reject_out_of_range
      false_next: check_lower_bound
    check_lower_bound:
      type: condition
      variable: naranjo_score
      operator: lt
      value: -4
      true_next: reject_out_of_range
      false_next: definite_check
    reject_out_of_range:
      type: return
      value:
        causality: REJECTED
        confidence: 0
        action: "REJECTED: naranjo_score must be in range [-4, 13]. Values outside this range indicate input error (possible PRR or other statistical value used instead of Naranjo score)."
    probable_check:
      type: condition
      variable: naranjo_score
      operator: gte
      value: 5
      true_next: probable
      false_next: possible_check
    definite:
      type: return
      value:
        confidence: 95
        causality: DEFINITE
        action: withdraw_drug
    doubtful:
      type: return
      value:
        causality: DOUBTFUL
        confidence: 20
        action: document
    possible:
      type: return
      value:
        causality: POSSIBLE
        confidence: 50
        action: monitor
    possible_check:
      type: condition
      variable: naranjo_score
      operator: gte
      value: 1
      true_next: possible
      false_next: doubtful
    definite_check:
      type: condition
      variable: naranjo_score
      operator: gte
      value: 9
      true_next: definite
      false_next: probable_check
    probable:
      type: return
      value:
        confidence: 75
        causality: PROBABLE
        action: investigate
tests:
  - input:
      naranjo_score: 10
    expect:
      confidence: 95
      action: withdraw_drug
      causality: DEFINITE
  - input:
      naranjo_score: 7
    expect:
      confidence: 75
      causality: PROBABLE
      action: investigate
  - input:
      naranjo_score: 3
    expect:
      causality: POSSIBLE
      confidence: 50
      action: monitor
  - input:
      naranjo_score: 0
    expect:
      causality: DOUBTFUL
      confidence: 20
      action: document
  - input:
      naranjo_score: 9
    expect:
      confidence: 95
      action: withdraw_drug
      causality: DEFINITE
  - input:
      naranjo_score: 5
    expect:
      confidence: 75
      causality: PROBABLE
      action: investigate
  - input:
      naranjo_score: 1
    expect:
      action: monitor
      causality: POSSIBLE
      confidence: 50
  - input:
      naranjo_score: -1
    expect:
      confidence: 20
      causality: DOUBTFUL
      action: document
  - input:
      naranjo_score: 4
    expect:
      causality: POSSIBLE
      action: monitor
      confidence: 50
  - input:
      naranjo_score: 6
    expect:
      action: investigate
      causality: PROBABLE
      confidence: 75
  - input:
      naranjo_score: 500
    expect:
      confidence: 0
      causality: REJECTED
      action: "REJECTED: naranjo_score must be in range [-4, 13]. Values outside this range indicate input error (possible PRR or other statistical value used instead of Naranjo score)."
  - input: {}
    expect:
      causality: REJECTED
      action: "REJECTED: naranjo_score is required"
      confidence: 0
  - input:
      naranjo_score: -1
    expect:
      causality: DOUBTFUL
      confidence: 20
      action: document
  - input:
      naranjo_score: 2
    expect:
      action: monitor
      causality: POSSIBLE
      confidence: 50
  - input:
      naranjo_score: 100
    expect:
      action: "REJECTED: naranjo_score must be in range [-4, 13]. Values outside this range indicate input error (possible PRR or other statistical value used instead of Naranjo score)."
      causality: REJECTED
      confidence: 0
  - input: {}
    expect:
      confidence: 0
      action: "REJECTED: naranjo_score is required"
      causality: REJECTED
  - input:
      naranjo_score: -1
    expect:
      confidence: 20
      causality: DOUBTFUL
      action: document
  - input:
      naranjo_score: 8
    expect:
      action: investigate
      confidence: 75
      causality: PROBABLE
  - input:
      naranjo_score: 900
    expect:
      action: "REJECTED: naranjo_score must be in range [-4, 13]. Values outside this range indicate input error (possible PRR or other statistical value used instead of Naranjo score)."
      causality: REJECTED
      confidence: 0
  - input:
      naranjo_score: -5
    expect:
      action: "REJECTED: naranjo_score must be in range [-4, 13]. Values outside this range indicate input error (possible PRR or other statistical value used instead of Naranjo score)."
      causality: REJECTED
      confidence: 0
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - causality
    - confidence
    - action
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.causality
  log_level: info
governance:
  sop_ref: SOP-PV-002
  regulatory_ref:
    - ICH-E2A
    - WHO-UMC
  harm_types:
    - A
    - B
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - hierarchy
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
