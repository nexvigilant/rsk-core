# MICROGRAM++ (upgraded 2026-04-23)
name: quality-suspect-drug
version: 0.1.0
description: Suspect drug identified
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Quality Suspect Drug
  subtitle: Suspect drug identified
  icon: circle
  route: /vigilance/mg/quality-suspect-drug
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/quality-suspect-drug
  cli: rsk mcg run quality-suspect-drug
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: suspect_drug_named
      operator: eq
      value: true
      true_next: pass
      false_next: fail
    pass:
      type: return
      value:
        check: quality-suspect-drug
        passed: true
        action: accept
    fail:
      type: return
      value:
        check: quality-suspect-drug
        passed: false
        action: flag_for_review
tests:
  - input:
      suspect_drug_named: true
    expect:
      check: quality-suspect-drug
      passed: true
  - input: {}
    expect:
      check: quality-suspect-drug
      passed: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
