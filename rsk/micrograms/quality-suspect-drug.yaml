name: quality-suspect-drug
description: "Suspect drug identified"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "suspect_drug_named"
      operator: "eq"
      value: true
      true_next: "pass"
      false_next: "fail"
    pass:
      type: "return"
      value:
        check: "quality-suspect-drug"
        passed: true
        action: "accept"
    fail:
      type: "return"
      value:
        check: "quality-suspect-drug"
        passed: false
        action: "flag_for_review"

tests:
  - input: {"suspect_drug_named": true}
    expect: {"check": "quality-suspect-drug", "passed": true}
  - input: {}
    expect: {"check": "quality-suspect-drug", "passed": false}
