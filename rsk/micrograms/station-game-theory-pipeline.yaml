# MICROGRAM++ (upgraded 2026-04-23)
name: station-game-theory-pipeline
version: 0.1.0
description: Route Nash equilibrium and payoff analysis for competitive PV strategy
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Game Theory Pipeline
  subtitle: Route Nash equilibrium and payoff analysis for competitive PV strategy
  icon: circle
  route: /vigilance/mg/station-game-theory-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-game-theory-pipeline
  cli: rsk mcg run station-game-theory-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_equilibrium
  nodes:
    check_dominant:
      type: condition
      variable: dominant_strategy_exists
      operator: eq
      value: true
      true_next: dominant
      false_next: mixed
    check_equilibrium:
      type: condition
      variable: has_nash
      operator: eq
      value: true
      true_next: check_dominant
      false_next: no_equilibrium
    dominant:
      type: return
      value:
        priority: high
        reason: Dominant strategy exists — clear competitive advantage path
        route: strategy_execution
        action: execute
    mixed:
      type: return
      value:
        action: analyze
        priority: moderate
        route: strategy_analysis
        reason: Nash exists but no dominance — analyze mixed strategy probabilities
    no_equilibrium:
      type: return
      value:
        route: strategy_simulation
        reason: No Nash equilibrium — mixed strategy needed, run simulation
        priority: moderate
        action: simulate
tests:
  - input:
      has_nash: false
      dominant_strategy_exists: false
    expect:
      priority: moderate
      route: strategy_simulation
      action: simulate
  - input:
      dominant_strategy_exists: true
      has_nash: true
    expect:
      action: execute
      route: strategy_execution
      priority: high
  - input:
      has_nash: true
      dominant_strategy_exists: false
    expect:
      action: analyze
      priority: moderate
      route: strategy_analysis
  - input: {}
    expect:
      priority: moderate
      reason: No Nash equilibrium — mixed strategy needed, run simulation
      action: simulate
      route: strategy_simulation
  - input: {}
    expect:
      route: strategy_simulation
      priority: moderate
      action: simulate
      reason: No Nash equilibrium — mixed strategy needed, run simulation
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
