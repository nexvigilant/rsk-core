# MICROGRAM++ (upgraded 2026-04-23)
name: trend-spike
version: 0.1.0
description: Sudden report spike
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Trend Spike
  subtitle: Sudden report spike
  icon: circle
  route: /vigilance/mg/trend-spike
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/trend-spike
  cli: rsk mcg run trend-spike
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: spike_ratio
      operator: gte
      value: 3
      true_next: detected
      false_next: not_detected
    detected:
      type: return
      value:
        action: investigate
        detected: true
        pattern: spike
    not_detected:
      type: return
      value:
        action: continue_monitoring
        detected: false
        pattern: spike
tests:
  - input:
      spike_ratio: 3
    expect:
      pattern: spike
      detected: true
  - input: {}
    expect:
      pattern: spike
      detected: false
  - input:
      spike_ratio: 0
    expect:
      detected: false
      action: continue_monitoring
      pattern: spike
  - input:
      spike_ratio: -1
    expect:
      action: continue_monitoring
      pattern: spike
      detected: false
  - input:
      spike_ratio: 2
    expect:
      pattern: spike
      detected: false
      action: continue_monitoring
  - input:
      spike_ratio: 4
    expect:
      pattern: spike
      action: investigate
      detected: true
  - input:
      spike_ratio: 300
    expect:
      detected: true
      pattern: spike
      action: investigate
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
