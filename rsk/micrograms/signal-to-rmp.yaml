# MICROGRAM++ (upgraded 2026-04-23)
name: signal-to-rmp
version: 0.1.0
description: Routes signal detection results to Risk Minimization Plan update decisions
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: confirmed
    type: boolean
    required: true
    description: ""
  - name: signal_strength
    type: string
    required: true
    description: ""
outputs:
  - name: rmp_update_needed
    type: boolean
  - name: measure_type
    type: string
  - name: rationale
    type: string
interface:
  inputs:
    confirmed:
      type: boolean
      required: true
    signal_strength:
      type: string
      required: true
  outputs:
    rmp_update_needed:
      type: boolean
      required: false
    measure_type:
      type: string
      required: false
    rationale:
      type: string
      required: false
  aliases: {}
ui:
  title: Signal To Rmp
  subtitle: Routes signal detection results to Risk Minimization Plan update decisions
  icon: activity
  route: /vigilance/mg/signal-to-rmp
  steps:
    - field: confirmed
      label: confirmed
      help: Enter confirmed
      widget: toggle
      placeholder: null
    - field: signal_strength
      label: signal strength
      help: Enter signal_strength
      widget: text
      placeholder: null
  result:
    template: "rmp_update_needed: {{rmp_update_needed}} — measure_type: {{measure_type}} — rationale: {{rationale}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/signal-to-rmp
  cli: rsk mcg run signal-to-rmp
  auth: none
  rate_limit: 600/min
tree:
  start: check_strength
  nodes:
    moderate_unconfirmed:
      type: return
      value:
        rationale: Moderate unconfirmed signal requires further evaluation before RMP update
        measure_type: further_evaluation
        rmp_update_needed: false
    check_confirmed_strong:
      type: condition
      variable: confirmed
      operator: eq
      value: true
      true_next: strong_confirmed
      false_next: strong_unconfirmed
    weak_signal:
      type: return
      value:
        rationale: Weak signal maintained under routine surveillance, no RMP update needed
        rmp_update_needed: false
        measure_type: surveillance
    strong_confirmed:
      type: return
      value:
        measure_type: restrictive_distribution
        rationale: Strong confirmed signal requires immediate RMP update with restrictive measures
        rmp_update_needed: true
    check_moderate:
      type: condition
      variable: signal_strength
      operator: eq
      value: moderate
      true_next: check_confirmed_moderate
      false_next: weak_signal
    check_strength:
      type: condition
      variable: signal_strength
      operator: eq
      value: strong
      true_next: check_confirmed_strong
      false_next: check_moderate
    strong_unconfirmed:
      type: return
      value:
        rationale: Strong signal even if unconfirmed requires RMP enhancement with education
        rmp_update_needed: true
        measure_type: educational_material
    check_confirmed_moderate:
      type: condition
      variable: confirmed
      operator: eq
      value: true
      true_next: moderate_confirmed
      false_next: moderate_unconfirmed
    moderate_confirmed:
      type: return
      value:
        measure_type: enhanced_monitoring
        rationale: Moderate confirmed signal requires enhanced monitoring in RMP
        rmp_update_needed: true
tests:
  - input:
      confirmed: false
      signal_strength: ""
    expect:
      rationale: Weak signal maintained under routine surveillance, no RMP update needed
      rmp_update_needed: false
      measure_type: surveillance
  - input:
      confirmed: false
      signal_strength: moderate
    expect:
      rationale: Moderate unconfirmed signal requires further evaluation before RMP update
      measure_type: further_evaluation
      rmp_update_needed: false
  - input:
      confirmed: false
      signal_strength: strong
    expect:
      rationale: Strong signal even if unconfirmed requires RMP enhancement with education
      rmp_update_needed: true
      measure_type: educational_material
  - input:
      confirmed: true
      signal_strength: moderate
    expect:
      measure_type: enhanced_monitoring
      rationale: Moderate confirmed signal requires enhanced monitoring in RMP
      rmp_update_needed: true
  - input:
      confirmed: true
      signal_strength: strong
    expect:
      measure_type: restrictive_distribution
      rationale: Strong confirmed signal requires immediate RMP update with restrictive measures
      rmp_update_needed: true
  - input: {}
    expect:
      rationale: Weak signal maintained under routine surveillance, no RMP update needed
      rmp_update_needed: false
      measure_type: surveillance
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - rmp_update_needed
    - measure_type
    - rationale
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
