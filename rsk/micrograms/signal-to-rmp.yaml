name: signal-to-rmp
description: Routes signal detection results to Risk Minimization Plan update decisions
version: 0.1.0

interface:
  inputs:
    signal_strength:
      type: string
      required: true
      description: "Signal strength classification: strong, moderate, weak"
    confirmed:
      type: boolean
      required: true
      description: Whether signal is confirmed by independent methods
  outputs:
    rmp_update_needed:
      type: boolean
      description: Whether RMP update is required
    measure_type:
      type: string
      description: Type of minimization measure
    rationale:
      type: string
      description: Justification for the decision

tree:
  start: check_strength
  nodes:
    check_strength:
      type: condition
      variable: signal_strength
      operator: eq
      value: "strong"
      true_next: check_confirmed_strong
      false_next: check_moderate

    check_confirmed_strong:
      type: condition
      variable: confirmed
      operator: eq
      value: true
      true_next: strong_confirmed
      false_next: strong_unconfirmed

    strong_confirmed:
      type: return
      value:
        rmp_update_needed: true
        measure_type: "restrictive_distribution"
        rationale: "Strong confirmed signal requires immediate RMP update with restrictive measures"

    strong_unconfirmed:
      type: return
      value:
        rmp_update_needed: true
        measure_type: "educational_material"
        rationale: "Strong signal even if unconfirmed requires RMP enhancement with education"

    check_moderate:
      type: condition
      variable: signal_strength
      operator: eq
      value: "moderate"
      true_next: check_confirmed_moderate
      false_next: weak_signal

    check_confirmed_moderate:
      type: condition
      variable: confirmed
      operator: eq
      value: true
      true_next: moderate_confirmed
      false_next: moderate_unconfirmed

    moderate_confirmed:
      type: return
      value:
        rmp_update_needed: true
        measure_type: "enhanced_monitoring"
        rationale: "Moderate confirmed signal requires enhanced monitoring in RMP"

    moderate_unconfirmed:
      type: return
      value:
        rmp_update_needed: false
        measure_type: "further_evaluation"
        rationale: "Moderate unconfirmed signal requires further evaluation before RMP update"

    weak_signal:
      type: return
      value:
        rmp_update_needed: false
        measure_type: "surveillance"
        rationale: "Weak signal maintained under routine surveillance, no RMP update needed"

tests:
  - input: { signal_strength: "strong", confirmed: true }
    expect: { rmp_update_needed: true, measure_type: "restrictive_distribution", rationale: "Strong confirmed signal requires immediate RMP update with restrictive measures" }

  - input: { signal_strength: "moderate", confirmed: true }
    expect: { rmp_update_needed: true, measure_type: "enhanced_monitoring", rationale: "Moderate confirmed signal requires enhanced monitoring in RMP" }

  - input: { signal_strength: "weak", confirmed: false }
    expect: { rmp_update_needed: false, measure_type: "surveillance", rationale: "Weak signal maintained under routine surveillance, no RMP update needed" }

  - input: { signal_strength: "strong", confirmed: false }
    expect: { rmp_update_needed: true, measure_type: "educational_material", rationale: "Strong signal even if unconfirmed requires RMP enhancement with education" }
