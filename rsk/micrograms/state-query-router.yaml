# MICROGRAM++ (upgraded 2026-04-23)
name: state-query-router
version: 0.1.0
description: "PVOS state queries: routes FSM state queries to the correct entity repository (case/signal/workflow/alert)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: entity_type
    type: string
    required: false
    description: ""
outputs:
  - name: description
    type: string
  - name: repository
    type: string
interface:
  inputs:
    entity_type:
      type: string
      required: false
  outputs:
    description:
      type: string
    repository:
      type: string
ui:
  title: State Query Router
  subtitle: "PVOS state queries: routes FSM state queries to the correct entity repository (case/signal/workflow/alert)"
  icon: circle
  route: /vigilance/mg/state-query-router
  steps:
    - field: entity_type
      label: entity type
      help: Enter entity_type
      widget: text
      placeholder: null
  result:
    template: "description: {{description}} — repository: {{repository}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/state-query-router
  cli: rsk mcg run state-query-router
  auth: none
  rate_limit: 600/min
tree:
  start: check_case
  nodes:
    check_case:
      type: condition
      variable: entity_type
      operator: eq
      value: case
      true_next: route_case
      false_next: check_signal
    check_signal:
      type: condition
      variable: entity_type
      operator: eq
      value: signal
      true_next: route_signal
      false_next: check_workflow
    check_workflow:
      type: condition
      variable: entity_type
      operator: eq
      value: workflow
      true_next: route_workflow
      false_next: check_alert
    check_alert:
      type: condition
      variable: entity_type
      operator: eq
      value: alert
      true_next: route_alert
      false_next: unknown_entity
    route_case:
      type: return
      value:
        repository: case_fsm
        description: Route to case state machine repository - tracks case lifecycle states
    route_signal:
      type: return
      value:
        repository: signal_fsm
        description: Route to signal state machine repository - tracks signal triage states
    route_workflow:
      type: return
      value:
        repository: workflow_fsm
        description: Route to workflow state machine repository - tracks workflow execution states
    route_alert:
      type: return
      value:
        repository: alert_fsm
        description: Route to alert state machine repository - tracks alert acknowledgment states
    unknown_entity:
      type: return
      value:
        repository: error
        description: Unknown entity type - choose case/signal/workflow/alert
tests:
  - input:
      entity_type: case
    expect:
      repository: case_fsm
      description: Route to case state machine repository - tracks case lifecycle states
  - input:
      entity_type: signal
    expect:
      repository: signal_fsm
      description: Route to signal state machine repository - tracks signal triage states
  - input:
      entity_type: workflow
    expect:
      repository: workflow_fsm
      description: Route to workflow state machine repository - tracks workflow execution states
  - input:
      entity_type: alert
    expect:
      repository: alert_fsm
      description: Route to alert state machine repository - tracks alert acknowledgment states
  - input:
      entity_type: unknown
    expect:
      repository: error
      description: Unknown entity type - choose case/signal/workflow/alert
  - input: {}
    expect:
      description: Unknown entity type - choose case/signal/workflow/alert
      repository: error
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - description
    - repository
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
