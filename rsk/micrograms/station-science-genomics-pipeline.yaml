# MICROGRAM++ (upgraded 2026-04-23)
name: station-science-genomics-pipeline
version: 0.1.0
description: Route genomics data through expression analysis and variant classification
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Science Genomics Pipeline
  subtitle: Route genomics data through expression analysis and variant classification
  icon: circle
  route: /vigilance/mg/station-science-genomics-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-science-genomics-pipeline
  cli: rsk mcg run station-science-genomics-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_significance
  nodes:
    strong_de:
      type: return
      value:
        action: investigate
        route: pathway_analysis
        reason: Significant DE with fold change ≥2 — strong differential expression
        priority: high
    check_fold:
      type: condition
      variable: fold_change
      operator: gte
      value: 2
      true_next: strong_de
      false_next: mild_de
    mild_de:
      type: return
      value:
        action: note
        reason: Significant but mild DE — may need larger sample
        priority: moderate
        route: validation_cohort
    not_significant:
      type: return
      value:
        priority: low
        reason: Adjusted p-value >0.05 — not statistically significant
        action: archive
        route: archive
    check_significance:
      type: condition
      variable: adj_pvalue
      operator: lte
      value: 0.05
      true_next: check_fold
      false_next: not_significant
tests:
  - input:
      fold_change: 3
      adj_pvalue: 0.1
    expect:
      action: archive
      route: archive
      priority: low
  - input:
      adj_pvalue: 0.01
      fold_change: 4
    expect:
      route: pathway_analysis
      action: investigate
      priority: high
  - input:
      fold_change: 1.5
      adj_pvalue: 0.03
    expect:
      action: note
      priority: moderate
      route: validation_cohort
  - input:
      fold_change: 1.999
    expect:
      priority: low
      action: archive
      reason: Adjusted p-value >0.05 — not statistically significant
      route: archive
  - input:
      fold_change: 2.001
    expect:
      priority: low
      action: archive
      reason: Adjusted p-value >0.05 — not statistically significant
      route: archive
  - input: {}
    expect:
      action: archive
      reason: Adjusted p-value >0.05 — not statistically significant
      route: archive
      priority: low
  - input:
      adj_pvalue: 0.049
    expect:
      route: validation_cohort
      action: note
      reason: Significant but mild DE — may need larger sample
      priority: moderate
  - input:
      adj_pvalue: 0.051000000000000004
    expect:
      route: archive
      reason: Adjusted p-value >0.05 — not statistically significant
      priority: low
      action: archive
  - input: {}
    expect:
      route: archive
      priority: low
      reason: Adjusted p-value >0.05 — not statistically significant
      action: archive
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
