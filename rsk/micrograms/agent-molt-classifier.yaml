# MICROGRAM++ (upgraded 2026-04-23)
name: agent-molt-classifier
version: 0.1.0
description: "Classify an agent molt stage M0..M5 from its lifecycle signals. Inputs: verdict_count (measured autopsy rows), bond_count (hooks+agents referencing it), user_invocable (bool), regression_flag (bool), academy_passed (bool). Returns molt stage + next gate hint."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: verdict_count
    type: integer
    required: true
    description: Count of non-unmeasured autopsy verdicts for this agent
  - name: bond_count
    type: integer
    required: true
    description: Hook references + agent cross-references + user invocations last 7d
  - name: user_invocable
    type: bool
    required: true
    description: ""
  - name: regression_flag
    type: bool
    required: false
    description: True if recent verdicts show regression (vapor/silent-exit streak)
  - name: academy_passed
    type: bool
    required: false
    description: Has passed the 5-teacher academy gauntlet
outputs:
  - name: molt_stage
    type: string
  - name: next_gate
    type: string
interface:
  inputs:
    verdict_count:
      type: integer
      required: true
      description: Count of non-unmeasured autopsy verdicts for this agent
    bond_count:
      type: integer
      required: true
      description: Hook references + agent cross-references + user invocations last 7d
    user_invocable:
      type: bool
      required: true
    regression_flag:
      type: bool
      required: false
      description: True if recent verdicts show regression (vapor/silent-exit streak)
    academy_passed:
      type: bool
      required: false
      description: Has passed the 5-teacher academy gauntlet
  outputs:
    molt_stage:
      type: string
    next_gate:
      type: string
ui:
  title: Agent Molt Classifier
  subtitle: "Classify an agent molt stage M0..M5 from its lifecycle signals. Inputs: verdict_count (measured autopsy rows), bond_count (hooks+agents referencing it), user_invocable (bool), regression_flag (bool), academy_passed (bool). Returns molt stage + next gate hint."
  icon: circle
  route: /vigilance/mg/agent-molt-classifier
  steps:
    - field: verdict_count
      label: verdict count
      help: Count of non-unmeasured autopsy verdicts for this agent
      widget: number
      placeholder: null
    - field: bond_count
      label: bond count
      help: Hook references + agent cross-references + user invocations last 7d
      widget: number
      placeholder: null
    - field: user_invocable
      label: user invocable
      help: Enter user_invocable
      widget: toggle
      placeholder: null
    - field: regression_flag
      label: regression flag
      help: True if recent verdicts show regression (vapor/silent-exit streak)
      widget: toggle
      placeholder: null
    - field: academy_passed
      label: academy passed
      help: Has passed the 5-teacher academy gauntlet
      widget: toggle
      placeholder: null
  result:
    template: "molt_stage: {{molt_stage}} — next_gate: {{next_gate}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/agent-molt-classifier
  cli: rsk mcg run agent-molt-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_regression
  nodes:
    check_regression:
      type: condition
      variable: regression_flag
      operator: eq
      value: true
      true_next: regressed_to_m2
      false_next: check_m4
    check_m4:
      type: condition
      variable: bond_count
      operator: gte
      value: 2
      true_next: check_m4_verdicts
      false_next: check_m3
    check_m4_verdicts:
      type: condition
      variable: verdict_count
      operator: gte
      value: 3
      true_next: m4_compounding
      false_next: check_m3
    check_m3:
      type: condition
      variable: verdict_count
      operator: gte
      value: 3
      true_next: m3_operational
      false_next: check_m2
    check_m2:
      type: condition
      variable: user_invocable
      operator: eq
      value: true
      true_next: m2_wired
      false_next: check_m1
    check_m1:
      type: condition
      variable: academy_passed
      operator: eq
      value: true
      true_next: m1_literate
      false_next: m0_candidate
    m0_candidate:
      type: return
      value:
        molt_stage: M0
        next_gate: pass tri-layer wiring check
    m1_literate:
      type: return
      value:
        molt_stage: M1
        next_gate: wire as user-invocable or hook-referenced
    m2_wired:
      type: return
      value:
        molt_stage: M2
        next_gate: accumulate >=3 measured verdicts
    m3_operational:
      type: return
      value:
        molt_stage: M3
        next_gate: get referenced by >=1 hook or agent
    m4_compounding:
      type: return
      value:
        molt_stage: M4
        next_gate: practitioner decision — retire to M5 when obsolete
    regressed_to_m2:
      type: return
      value:
        molt_stage: M2
        next_gate: diagnose vapor streak before advancing
tests:
  - name: fresh_candidate
    input:
      verdict_count: 0
      bond_count: 0
      user_invocable: false
      regression_flag: false
      academy_passed: false
    expect:
      molt_stage: M0
      next_gate: pass tri-layer wiring check
  - name: literate_not_wired
    input:
      verdict_count: 0
      bond_count: 0
      user_invocable: false
      regression_flag: false
      academy_passed: true
    expect:
      molt_stage: M1
      next_gate: wire as user-invocable or hook-referenced
  - name: wired_no_measurements
    input:
      verdict_count: 1
      bond_count: 0
      user_invocable: true
      regression_flag: false
      academy_passed: true
    expect:
      molt_stage: M2
      next_gate: accumulate >=3 measured verdicts
  - name: operational_but_isolated
    input:
      verdict_count: 5
      bond_count: 0
      user_invocable: true
      regression_flag: false
      academy_passed: true
    expect:
      molt_stage: M3
      next_gate: get referenced by >=1 hook or agent
  - name: compounding_fully_wired
    input:
      verdict_count: 10
      bond_count: 4
      user_invocable: true
      regression_flag: false
      academy_passed: true
    expect:
      molt_stage: M4
      next_gate: practitioner decision — retire to M5 when obsolete
  - name: regression_drops_to_m2
    input:
      verdict_count: 10
      bond_count: 5
      user_invocable: true
      regression_flag: true
      academy_passed: true
    expect:
      molt_stage: M2
      next_gate: diagnose vapor streak before advancing
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - molt_stage
    - next_gate
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
