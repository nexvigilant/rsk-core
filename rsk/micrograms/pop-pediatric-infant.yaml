# MICROGRAM++ (upgraded 2026-04-23)
name: pop-pediatric-infant
version: 0.1.0
description: Infant safety — developing organs
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Pop Pediatric Infant
  subtitle: Infant safety — developing organs
  icon: circle
  route: /vigilance/mg/pop-pediatric-infant
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/pop-pediatric-infant
  cli: rsk mcg run pop-pediatric-infant
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: age_months
      operator: lte
      value: 12
      true_next: at_risk
      false_next: standard
    at_risk:
      type: return
      value:
        at_risk: true
        action: special_monitoring
        reason: Infant safety — developing organs
        population: pediatric-infant
    standard:
      type: return
      value:
        action: standard_care
        population: pediatric-infant
        at_risk: false
tests:
  - input:
      age_months: 12
    expect:
      population: pediatric-infant
      at_risk: true
  - input: {}
    expect:
      at_risk: false
      population: pediatric-infant
  - input:
      age_months: 0
    expect:
      population: pediatric-infant
      at_risk: true
      reason: Infant safety — developing organs
      action: special_monitoring
  - input:
      age_months: -1
    expect:
      reason: Infant safety — developing organs
      at_risk: true
      action: special_monitoring
      population: pediatric-infant
  - input:
      age_months: 11
    expect:
      action: special_monitoring
      population: pediatric-infant
      at_risk: true
      reason: Infant safety — developing organs
  - input:
      age_months: 13
    expect:
      at_risk: false
      action: standard_care
      population: pediatric-infant
  - input:
      age_months: 1200
    expect:
      at_risk: false
      action: standard_care
      population: pediatric-infant
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
