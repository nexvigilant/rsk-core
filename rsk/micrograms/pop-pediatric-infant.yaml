name: pop-pediatric-infant
description: Infant safety — developing organs
version: 0.1.0
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: age_months
      operator: lte
      value: 12
      true_next: at_risk
      false_next: standard
    at_risk:
      type: return
      value:
        at_risk: true
        action: special_monitoring
        reason: Infant safety — developing organs
        population: pediatric-infant
    standard:
      type: return
      value:
        action: standard_care
        population: pediatric-infant
        at_risk: false
