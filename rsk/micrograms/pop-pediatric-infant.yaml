    at_risk: false
    population: pediatric-infant
- input:
    age_months: 0
  expect:
    population: pediatric-infant
    at_risk: true
    reason: Infant safety — developing organs
    action: special_monitoring
- input:
    age_months: -1
  expect:
    reason: Infant safety — developing organs
    at_risk: true
    action: special_monitoring
    population: pediatric-infant
- input:
    age_months: 11
  expect:
    action: special_monitoring
    population: pediatric-infant
    at_risk: true
    reason: Infant safety — developing organs
- input:
    age_months: 13
  expect:
    at_risk: false
    action: standard_care
    population: pediatric-infant
- input:
    age_months: 1200
  expect:
    at_risk: false
    action: standard_care
    population: pediatric-infant
interface: null
primitive_signature: null
