# MICROGRAM++ (upgraded 2026-04-23)
name: trial-to-signal
version: 0.1.0
description: Routes clinical trial safety data to signal detection and threshold evaluation
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: trial_phase
    type: string
    required: true
    description: ""
  - name: sample_size
    type: integer
    required: true
    description: ""
  - name: sae_count
    type: integer
    required: true
    description: ""
outputs:
  - name: sae_rate
    type: number
  - name: threshold_exceeded
    type: boolean
  - name: signal_flag
    type: boolean
interface:
  inputs:
    trial_phase:
      type: string
      required: true
    sample_size:
      type: integer
      required: true
    sae_count:
      type: integer
      required: true
  outputs:
    sae_rate:
      type: number
      required: false
    threshold_exceeded:
      type: boolean
      required: false
    signal_flag:
      type: boolean
      required: false
  aliases: {}
ui:
  title: Trial To Signal
  subtitle: Routes clinical trial safety data to signal detection and threshold evaluation
  icon: activity
  route: /vigilance/mg/trial-to-signal
  steps:
    - field: trial_phase
      label: trial phase
      help: Enter trial_phase
      widget: text
      placeholder: null
    - field: sample_size
      label: sample size
      help: Enter sample_size
      widget: number
      placeholder: null
    - field: sae_count
      label: sae count
      help: Enter sae_count
      widget: number
      placeholder: null
  result:
    template: "sae_rate: {{sae_rate}} — threshold_exceeded: {{threshold_exceeded}} — signal_flag: {{signal_flag}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/trial-to-signal
  cli: rsk mcg run trial-to-signal
  auth: none
  rate_limit: 600/min
tree:
  start: check_phase
  nodes:
    phase2_signal:
      type: return
      value:
        signal_flag: true
        sae_rate: 5
        threshold_exceeded: true
    phase1_signal:
      type: return
      value:
        signal_flag: true
        sae_rate: 5
        threshold_exceeded: true
    phase3_check:
      type: condition
      variable: sae_count
      operator: gte
      value: 15
      true_next: phase3_signal
      false_next: phase3_no_signal
    phase3_signal:
      type: return
      value:
        sae_rate: 3
        signal_flag: true
        threshold_exceeded: true
    phase4_path:
      type: condition
      variable: sae_count
      operator: gte
      value: 20
      true_next: phase4_signal
      false_next: phase4_no_signal
    phase4_signal:
      type: return
      value:
        signal_flag: true
        threshold_exceeded: true
        sae_rate: 2.5
    check_phase2:
      type: condition
      variable: trial_phase
      operator: eq
      value: phase2
      true_next: phase2_check
      false_next: check_phase3
    phase1_no_signal:
      type: return
      value:
        signal_flag: false
        sae_rate: 1
        threshold_exceeded: false
    phase2_check:
      type: condition
      variable: sae_count
      operator: gte
      value: 10
      true_next: phase2_signal
      false_next: phase2_no_signal
    phase2_no_signal:
      type: return
      value:
        sae_rate: 2
        signal_flag: false
        threshold_exceeded: false
    check_phase3:
      type: condition
      variable: trial_phase
      operator: eq
      value: phase3
      true_next: phase3_check
      false_next: phase4_path
    phase1_check:
      type: condition
      variable: sae_count
      operator: gte
      value: 5
      true_next: phase1_signal
      false_next: phase1_no_signal
    check_phase:
      type: condition
      variable: trial_phase
      operator: eq
      value: phase1
      true_next: phase1_check
      false_next: check_phase2
    phase4_no_signal:
      type: return
      value:
        threshold_exceeded: false
        sae_rate: 1
        signal_flag: false
    phase3_no_signal:
      type: return
      value:
        sae_rate: 1.6
        signal_flag: false
        threshold_exceeded: false
tests:
  - input:
      sae_count: 0
      trial_phase: ""
    expect:
      threshold_exceeded: false
      sae_rate: 1
      signal_flag: false
  - input:
      sae_count: 0
      trial_phase: phase1
    expect:
      signal_flag: false
      sae_rate: 1
      threshold_exceeded: false
  - input:
      sae_count: 0
      trial_phase: phase2
    expect:
      sae_rate: 2
      signal_flag: false
      threshold_exceeded: false
  - input:
      sae_count: 0
      trial_phase: phase3
    expect:
      sae_rate: 1.6
      signal_flag: false
      threshold_exceeded: false
  - input:
      sae_count: 10
      trial_phase: phase1
    expect:
      signal_flag: true
      sae_rate: 5
      threshold_exceeded: true
  - input:
      sae_count: 10
      trial_phase: phase2
    expect:
      signal_flag: true
      sae_rate: 5
      threshold_exceeded: true
  - input:
      sae_count: 15
      trial_phase: phase3
    expect:
      sae_rate: 3
      signal_flag: true
      threshold_exceeded: true
  - input:
      sae_count: 20
      trial_phase: ""
    expect:
      signal_flag: true
      threshold_exceeded: true
      sae_rate: 2.5
  - input: {}
    expect:
      threshold_exceeded: false
      sae_rate: 1
      signal_flag: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - sae_rate
    - threshold_exceeded
    - signal_flag
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
