name: trial-to-signal
description: Routes clinical trial safety data to signal detection and threshold evaluation
version: 0.1.0

interface:
  inputs:
    trial_phase:
      type: string
      required: true
      description: "Trial phase: phase1, phase2, phase3, phase4"
    sae_count:
      type: integer
      required: true
      description: Number of serious adverse events observed
    sample_size:
      type: integer
      required: true
      description: Number of participants in the trial
  outputs:
    signal_flag:
      type: boolean
      description: Whether safety signal is suggested
    sae_rate:
      type: number
      description: SAE rate per 100 participants
    threshold_exceeded:
      type: boolean
      description: Whether SAE rate exceeds expected threshold for phase

tree:
  start: check_phase
  nodes:
    check_phase:
      type: condition
      variable: trial_phase
      operator: eq
      value: "phase1"
      true_next: phase1_check
      false_next: check_phase2

    phase1_check:
      type: condition
      variable: sae_count
      operator: gte
      value: 5
      true_next: phase1_signal
      false_next: phase1_no_signal

    phase1_signal:
      type: return
      value:
        signal_flag: true
        sae_rate: 5
        threshold_exceeded: true

    phase1_no_signal:
      type: return
      value:
        signal_flag: false
        sae_rate: 1
        threshold_exceeded: false

    check_phase2:
      type: condition
      variable: trial_phase
      operator: eq
      value: "phase2"
      true_next: phase2_check
      false_next: check_phase3

    phase2_check:
      type: condition
      variable: sae_count
      operator: gte
      value: 10
      true_next: phase2_signal
      false_next: phase2_no_signal

    phase2_signal:
      type: return
      value:
        signal_flag: true
        sae_rate: 5
        threshold_exceeded: true

    phase2_no_signal:
      type: return
      value:
        signal_flag: false
        sae_rate: 2
        threshold_exceeded: false

    check_phase3:
      type: condition
      variable: trial_phase
      operator: eq
      value: "phase3"
      true_next: phase3_check
      false_next: phase4_path

    phase3_check:
      type: condition
      variable: sae_count
      operator: gte
      value: 15
      true_next: phase3_signal
      false_next: phase3_no_signal

    phase3_signal:
      type: return
      value:
        signal_flag: true
        sae_rate: 3
        threshold_exceeded: true

    phase3_no_signal:
      type: return
      value:
        signal_flag: false
        sae_rate: 1.6
        threshold_exceeded: false

    phase4_path:
      type: condition
      variable: sae_count
      operator: gte
      value: 20
      true_next: phase4_signal
      false_next: phase4_no_signal

    phase4_signal:
      type: return
      value:
        signal_flag: true
        sae_rate: 2.5
        threshold_exceeded: true

    phase4_no_signal:
      type: return
      value:
        signal_flag: false
        sae_rate: 1
        threshold_exceeded: false

tests:
  - input: { trial_phase: "phase1", sae_count: 5, sample_size: 100 }
    expect: { signal_flag: true, sae_rate: 5, threshold_exceeded: true }

  - input: { trial_phase: "phase2", sae_count: 10, sample_size: 200 }
    expect: { signal_flag: true, sae_rate: 5, threshold_exceeded: true }

  - input: { trial_phase: "phase3", sae_count: 8, sample_size: 500 }
    expect: { signal_flag: false, sae_rate: 1.6, threshold_exceeded: false }

  - input: { trial_phase: "phase4", sae_count: 25, sample_size: 1000 }
    expect: { signal_flag: true, sae_rate: 2.5, threshold_exceeded: true }
