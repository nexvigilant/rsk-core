# MICROGRAM++ (upgraded 2026-04-23)
name: audit-query-router
version: 0.1.0
description: "PVOS audit subsystem: routes audit log queries to the correct operation scope (ingest/detect/triage/report/all)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: operation
    type: string
    required: false
    description: ""
outputs:
  - name: description
    type: string
  - name: scope
    type: string
  - name: table
    type: string
interface:
  inputs:
    operation:
      type: string
      required: false
  outputs:
    description:
      type: string
    scope:
      type: string
    table:
      type: string
ui:
  title: Audit Query Router
  subtitle: "PVOS audit subsystem: routes audit log queries to the correct operation scope (ingest/detect/triage/report/all)"
  icon: circle
  route: /vigilance/mg/audit-query-router
  steps:
    - field: operation
      label: operation
      help: Enter operation
      widget: text
      placeholder: null
  result:
    template: "description: {{description}} — scope: {{scope}} — table: {{table}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/audit-query-router
  cli: rsk mcg run audit-query-router
  auth: none
  rate_limit: 600/min
tree:
  start: check_all
  nodes:
    check_all:
      type: condition
      variable: operation
      operator: eq
      value: all
      true_next: route_all
      false_next: check_ingest
    check_ingest:
      type: condition
      variable: operation
      operator: eq
      value: ingest
      true_next: route_ingest
      false_next: check_detect
    check_detect:
      type: condition
      variable: operation
      operator: eq
      value: detect
      true_next: route_detect
      false_next: check_triage
    check_triage:
      type: condition
      variable: operation
      operator: eq
      value: triage
      true_next: route_triage
      false_next: check_report
    check_report:
      type: condition
      variable: operation
      operator: eq
      value: report
      true_next: route_report
      false_next: unknown_operation
    route_all:
      type: return
      value:
        scope: all
        table: audit_log
        description: Full audit trail - query all operations across the PVOS lifecycle
    route_ingest:
      type: return
      value:
        scope: ingest
        table: audit_log
        description: Ingest audit - query case ingestion and validation events
    route_detect:
      type: return
      value:
        scope: detect
        table: audit_log
        description: Detection audit - query signal detection algorithm runs and results
    route_triage:
      type: return
      value:
        scope: triage
        table: audit_log
        description: Triage audit - query signal triage decisions and reviewer actions
    route_report:
      type: return
      value:
        scope: report
        table: audit_log
        description: Report audit - query regulatory submission events and deadlines
    unknown_operation:
      type: return
      value:
        scope: error
        table: none
        description: Unknown operation type - choose ingest/detect/triage/report/all
tests:
  - input:
      operation: all
    expect:
      scope: all
      table: audit_log
      description: Full audit trail - query all operations across the PVOS lifecycle
  - input:
      operation: ingest
    expect:
      scope: ingest
      table: audit_log
      description: Ingest audit - query case ingestion and validation events
  - input:
      operation: detect
    expect:
      scope: detect
      table: audit_log
      description: Detection audit - query signal detection algorithm runs and results
  - input:
      operation: triage
    expect:
      scope: triage
      table: audit_log
      description: Triage audit - query signal triage decisions and reviewer actions
  - input:
      operation: report
    expect:
      scope: report
      table: audit_log
      description: Report audit - query regulatory submission events and deadlines
  - input:
      operation: unknown_op
    expect:
      scope: error
      table: none
      description: Unknown operation type - choose ingest/detect/triage/report/all
  - input: {}
    expect:
      description: Unknown operation type - choose ingest/detect/triage/report/all
      scope: error
      table: none
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - description
    - scope
    - table
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
