# MICROGRAM++ (upgraded 2026-04-23)
name: station-wikipedia-pipeline
version: 0.1.0
description: Route Wikipedia article data for PV knowledge extraction
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Station Wikipedia Pipeline
  subtitle: Route Wikipedia article data for PV knowledge extraction
  icon: circle
  route: /vigilance/mg/station-wikipedia-pipeline
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/station-wikipedia-pipeline
  cli: rsk mcg run station-wikipedia-pipeline
  auth: none
  rate_limit: 600/min
tree:
  start: check_drug
  nodes:
    no_safety:
      type: return
      value:
        route: archive
        action: flag
        priority: low
        reason: Drug article missing safety section — gap in public knowledge
    check_safety_section:
      type: condition
      variable: has_safety_section
      operator: eq
      value: true
      true_next: extract_safety
      false_next: no_safety
    check_drug:
      type: condition
      variable: is_drug_article
      operator: eq
      value: true
      true_next: check_safety_section
      false_next: non_drug
    extract_safety:
      type: return
      value:
        action: extract
        reason: Drug article with safety section — extract ADRs for cross-reference
        priority: moderate
        route: knowledge_extraction
    non_drug:
      type: return
      value:
        priority: low
        reason: Non-drug Wikipedia article — reference only
        action: archive
        route: archive
tests:
  - input:
      has_safety_section: false
      is_drug_article: false
    expect:
      route: archive
      action: archive
      priority: low
  - input:
      is_drug_article: true
      has_safety_section: true
    expect:
      route: knowledge_extraction
      priority: moderate
      action: extract
  - input:
      is_drug_article: true
      has_safety_section: false
    expect:
      route: archive
      priority: low
      action: flag
  - input: {}
    expect:
      route: archive
      reason: Non-drug Wikipedia article — reference only
      action: archive
      priority: low
  - input: {}
    expect:
      reason: Non-drug Wikipedia article — reference only
      action: archive
      route: archive
      priority: low
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
