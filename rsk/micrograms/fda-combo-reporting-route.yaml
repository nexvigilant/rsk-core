# MICROGRAM++ (upgraded 2026-04-23)
name: fda-combo-reporting-route
version: 0.1.0
description: "FDA combination product postmarketing safety reporting pathway: routes by product type and lead center per FDA Guidance 'Postmarketing Safety Reporting for Combination Products' (2019)"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: product_type
    type: string
    required: true
    description: "Combination product type: drug-device, drug-biologic, device-biologic, drug-device-biologic"
  - name: lead_center
    type: string
    required: true
    description: "FDA lead center: CDER, CBER, CDRH"
  - name: serious
    type: bool
    required: true
    description: Whether the adverse event is serious
  - name: unexpected
    type: bool
    required: false
    description: Whether the event is unexpected/unlabeled
outputs:
  - name: reporting_pathway
    type: string
  - name: reporting_form
    type: string
  - name: timeline_days
    type: int
  - name: additional_report
    type: string
  - name: regulatory_reference
    type: string
interface:
  inputs:
    product_type:
      type: string
      required: true
      description: "Combination product type: drug-device, drug-biologic, device-biologic, drug-device-biologic"
    lead_center:
      type: string
      required: true
      description: "FDA lead center: CDER, CBER, CDRH"
    serious:
      type: bool
      required: true
      description: Whether the adverse event is serious
    unexpected:
      type: bool
      required: false
      description: Whether the event is unexpected/unlabeled
  outputs:
    reporting_pathway:
      type: string
    reporting_form:
      type: string
    timeline_days:
      type: int
    additional_report:
      type: string
    regulatory_reference:
      type: string
ui:
  title: Fda Combo Reporting Route
  subtitle: "FDA combination product postmarketing safety reporting pathway: routes by product type and lead center per FDA Guidance 'Postmarketing Safety Reporting for Combination Products' (2019)"
  icon: circle
  route: /vigilance/mg/fda-combo-reporting-route
  steps:
    - field: product_type
      label: product type
      help: "Combination product type: drug-device, drug-biologic, device-biologic, drug-device-biologic"
      widget: text
      placeholder: null
    - field: lead_center
      label: lead center
      help: "FDA lead center: CDER, CBER, CDRH"
      widget: text
      placeholder: null
    - field: serious
      label: serious
      help: Whether the adverse event is serious
      widget: toggle
      placeholder: null
    - field: unexpected
      label: unexpected
      help: Whether the event is unexpected/unlabeled
      widget: toggle
      placeholder: null
  result:
    template: "reporting_pathway: {{reporting_pathway}} — reporting_form: {{reporting_form}} — timeline_days: {{timeline_days}} — additional_report: {{additional_report}} — regulatory_reference: {{regulatory_reference}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/fda-combo-reporting-route
  cli: rsk mcg run fda-combo-reporting-route
  auth: none
  rate_limit: 600/min
tree:
  start: check_lead_center
  nodes:
    check_lead_center:
      type: condition
      variable: lead_center
      operator: eq
      value: CDER
      true_next: cder_serious_check
      false_next: check_cber
    check_cber:
      type: condition
      variable: lead_center
      operator: eq
      value: CBER
      true_next: cber_serious_check
      false_next: cdrh_serious_check
    cder_serious_check:
      type: condition
      variable: serious
      operator: eq
      value: true
      true_next: cder_unexpected_check
      false_next: cder_periodic
    cder_unexpected_check:
      type: condition
      variable: unexpected
      operator: eq
      value: true
      true_next: cder_expedited_15
      false_next: cder_serious_periodic
    cder_expedited_15:
      type: return
      value:
        reporting_pathway: NDA_FIELD_ALERT
        reporting_form: MedWatch 3500A + Device Problem Report
        timeline_days: 15
        additional_report: Submit parallel MDR to CDRH for device constituent if device-related
        regulatory_reference: "FDA Guidance: Postmarketing Safety Reporting for Combination Products (2019), 21 CFR 314.80"
    cder_serious_periodic:
      type: return
      value:
        reporting_pathway: NDA_PERIODIC
        reporting_form: MedWatch 3500A
        timeline_days: 90
        additional_report: Include in PSUR/PBRER; parallel MDR if device-related failure
        regulatory_reference: "FDA Guidance: Postmarketing Safety Reporting for Combination Products (2019), 21 CFR 314.80"
    cder_periodic:
      type: return
      value:
        reporting_pathway: NDA_PERIODIC
        reporting_form: MedWatch 3500A
        timeline_days: 90
        additional_report: None required for non-serious events
        regulatory_reference: "FDA Guidance: Postmarketing Safety Reporting for Combination Products (2019), 21 CFR 314.80"
    cber_serious_check:
      type: condition
      variable: serious
      operator: eq
      value: true
      true_next: cber_unexpected_check
      false_next: cber_periodic
    cber_unexpected_check:
      type: condition
      variable: unexpected
      operator: eq
      value: true
      true_next: cber_expedited_15
      false_next: cber_serious_periodic
    cber_expedited_15:
      type: return
      value:
        reporting_pathway: BLA_15DAY_ALERT
        reporting_form: MedWatch 3500A + VAERS (if vaccine)
        timeline_days: 15
        additional_report: Submit parallel MDR to CDRH for device constituent if device-related
        regulatory_reference: "FDA Guidance: Postmarketing Safety Reporting for Combination Products (2019), 21 CFR 600.80"
    cber_serious_periodic:
      type: return
      value:
        reporting_pathway: BLA_PERIODIC
        reporting_form: MedWatch 3500A
        timeline_days: 90
        additional_report: Include in PSUR/PBRER
        regulatory_reference: "FDA Guidance: Postmarketing Safety Reporting for Combination Products (2019), 21 CFR 600.80"
    cber_periodic:
      type: return
      value:
        reporting_pathway: BLA_PERIODIC
        reporting_form: MedWatch 3500A
        timeline_days: 90
        additional_report: None required for non-serious events
        regulatory_reference: "FDA Guidance: Postmarketing Safety Reporting for Combination Products (2019), 21 CFR 600.80"
    cdrh_serious_check:
      type: condition
      variable: serious
      operator: eq
      value: true
      true_next: cdrh_expedited
      false_next: cdrh_periodic
    cdrh_expedited:
      type: return
      value:
        reporting_pathway: MDR_30DAY
        reporting_form: FDA Form 3500A (MDR)
        timeline_days: 30
        additional_report: Submit parallel NDA/BLA report to CDER/CBER for drug/biologic constituent
        regulatory_reference: "FDA Guidance: Postmarketing Safety Reporting for Combination Products (2019), 21 CFR 803"
    cdrh_periodic:
      type: return
      value:
        reporting_pathway: MDR_ANNUAL
        reporting_form: FDA Form 3500A (MDR)
        timeline_days: 365
        additional_report: None required for non-serious events
        regulatory_reference: "FDA Guidance: Postmarketing Safety Reporting for Combination Products (2019), 21 CFR 803"
tests:
  - input:
      product_type: drug-device
      lead_center: CDER
      serious: true
      unexpected: true
    expect:
      reporting_pathway: NDA_FIELD_ALERT
      timeline_days: 15
  - input:
      product_type: drug-device
      lead_center: CDER
      serious: true
      unexpected: false
    expect:
      reporting_pathway: NDA_PERIODIC
      timeline_days: 90
  - input:
      product_type: drug-device
      lead_center: CDER
      serious: false
      unexpected: false
    expect:
      reporting_pathway: NDA_PERIODIC
      timeline_days: 90
  - input:
      product_type: drug-biologic
      lead_center: CBER
      serious: true
      unexpected: true
    expect:
      reporting_pathway: BLA_15DAY_ALERT
      timeline_days: 15
  - input:
      product_type: device-biologic
      lead_center: CBER
      serious: false
    expect:
      reporting_pathway: BLA_PERIODIC
      timeline_days: 90
  - input:
      product_type: drug-device
      lead_center: CDRH
      serious: true
      unexpected: true
    expect:
      reporting_pathway: MDR_30DAY
      timeline_days: 30
  - input:
      product_type: drug-device
      lead_center: CDRH
      serious: false
    expect:
      reporting_pathway: MDR_ANNUAL
      timeline_days: 365
  - input:
      product_type: drug-biologic
      lead_center: CBER
      serious: true
      unexpected: false
    expect:
      reporting_pathway: BLA_PERIODIC
      timeline_days: 90
  - input: {}
    expect:
      reporting_pathway: MDR_ANNUAL
      timeline_days: 365
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - reporting_pathway
    - reporting_form
    - timeline_days
    - additional_report
    - regulatory_reference
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
