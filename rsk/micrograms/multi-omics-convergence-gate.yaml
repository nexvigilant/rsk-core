interface:
  inputs:
    min_dimensions_required:
      type: number
      required: true
    literature_score:
      type: number
      required: true
    transcriptomics_score:
      type: number
      required: true
    genomics_score:
      type: number
      required: true
    proteomics_score:
      type: number
      required: true
  outputs:
    dimensions_active:
      type: number
      required: false
    convergence_score:
      type: number
      required: false
    recommendation:
      type: string
      required: false
    verdict:
      type: string
      required: false
    weakest_dimension:
      type: string
      required: false
  aliases: {}
