name: multi-omics-convergence-gate
description: 'Multi-omics convergence gate for biomarker validation. Scores weighted convergence across transcriptomics, genomics, literature, and proteomics dimensions. Designed for HEXIM1/P-TEFb but applicable to any convergent biomarker hypothesis.'
version: 0.1.0
interface:
  inputs:
    transcriptomics_score:
      type: number
      required: true
      description: 'Transcriptomics evidence score (0.0-1.0). From GEO expression data.'
    genomics_score:
      type: number
      required: true
      description: 'Genomics evidence score (0.0-1.0). From CUT&RUN, ChIP-seq binding data.'
    literature_score:
      type: number
      required: true
      description: 'Literature evidence score (0.0-1.0). From systematic review convergence.'
    proteomics_score:
      type: number
      required: true
      description: 'Proteomics evidence score (0.0-1.0). From PRIDE/mass-spec validation.'
    min_dimensions_required:
      type: number
      required: true
      description: 'Minimum number of dimensions with score > 0 to pass gate (typically 3)'
  outputs:
    convergence_score:
      type: number
    verdict:
      type: string
    dimensions_active:
      type: number
    weakest_dimension:
      type: string
    recommendation:
      type: string
tree:
  start: count_active
  nodes:
    # Count active dimensions (score > 0)
    count_active:
      type: condition
      variable: transcriptomics_score
      operator: gt
      value: 0
      true_next: count_g_t1
      false_next: count_g_t0
    count_g_t1:
      type: condition
      variable: genomics_score
      operator: gt
      value: 0
      true_next: count_l_t1g1
      false_next: count_l_t1g0
    count_g_t0:
      type: condition
      variable: genomics_score
      operator: gt
      value: 0
      true_next: count_l_t0g1
      false_next: count_l_t0g0

    # t=1, g=1
    count_l_t1g1:
      type: condition
      variable: literature_score
      operator: gt
      value: 0
      true_next: count_p_3
      false_next: count_p_2a
    count_p_3:
      type: condition
      variable: proteomics_score
      operator: gt
      value: 0
      true_next: active_4
      false_next: active_3a

    # t=1, g=0
    count_l_t1g0:
      type: condition
      variable: literature_score
      operator: gt
      value: 0
      true_next: count_p_2b
      false_next: count_p_1a
    count_p_2b:
      type: condition
      variable: proteomics_score
      operator: gt
      value: 0
      true_next: active_3b
      false_next: active_2a

    # t=0, g=1
    count_l_t0g1:
      type: condition
      variable: literature_score
      operator: gt
      value: 0
      true_next: count_p_2c
      false_next: count_p_1b
    count_p_2c:
      type: condition
      variable: proteomics_score
      operator: gt
      value: 0
      true_next: active_3c
      false_next: active_2b

    # t=0, g=0
    count_l_t0g0:
      type: condition
      variable: literature_score
      operator: gt
      value: 0
      true_next: count_p_1c
      false_next: count_p_0
    count_p_1c:
      type: condition
      variable: proteomics_score
      operator: gt
      value: 0
      true_next: active_2c
      false_next: active_1a
    count_p_0:
      type: condition
      variable: proteomics_score
      operator: gt
      value: 0
      true_next: active_1b
      false_next: active_0

    # Remaining intermediate counters
    count_p_2a:
      type: condition
      variable: proteomics_score
      operator: gt
      value: 0
      true_next: active_3d
      false_next: active_2d
    count_p_1a:
      type: condition
      variable: proteomics_score
      operator: gt
      value: 0
      true_next: active_2e
      false_next: active_1c
    count_p_1b:
      type: condition
      variable: proteomics_score
      operator: gt
      value: 0
      true_next: active_2f
      false_next: active_1d

    # === GATE CHECK: active dims vs required ===
    # 4 active dimensions
    active_4:
      type: condition
      variable: min_dimensions_required
      operator: lte
      value: 4
      true_next: score_4dim
      false_next: insufficient_dims

    # 3 active dimensions (multiple paths converge)
    active_3a:
      type: condition
      variable: min_dimensions_required
      operator: lte
      value: 3
      true_next: score_3dim_no_prot
      false_next: insufficient_dims
    active_3b:
      type: condition
      variable: min_dimensions_required
      operator: lte
      value: 3
      true_next: score_3dim_no_gen
      false_next: insufficient_dims
    active_3c:
      type: condition
      variable: min_dimensions_required
      operator: lte
      value: 3
      true_next: score_3dim_no_trans
      false_next: insufficient_dims
    active_3d:
      type: condition
      variable: min_dimensions_required
      operator: lte
      value: 3
      true_next: score_3dim_no_lit
      false_next: insufficient_dims

    # 2 active
    active_2a:
      type: condition
      variable: min_dimensions_required
      operator: lte
      value: 2
      true_next: partial_2
      false_next: insufficient_dims
    active_2b:
      type: condition
      variable: min_dimensions_required
      operator: lte
      value: 2
      true_next: partial_2
      false_next: insufficient_dims
    active_2c:
      type: condition
      variable: min_dimensions_required
      operator: lte
      value: 2
      true_next: partial_2
      false_next: insufficient_dims
    active_2d:
      type: condition
      variable: min_dimensions_required
      operator: lte
      value: 2
      true_next: partial_2
      false_next: insufficient_dims
    active_2e:
      type: condition
      variable: min_dimensions_required
      operator: lte
      value: 2
      true_next: partial_2
      false_next: insufficient_dims
    active_2f:
      type: condition
      variable: min_dimensions_required
      operator: lte
      value: 2
      true_next: partial_2
      false_next: insufficient_dims

    # 1 or 0 active
    active_1a:
      type: return
      value: { convergence_score: 0, verdict: INSUFFICIENT, dimensions_active: 1, weakest_dimension: multiple, recommendation: 'Only 1 dimension active. Need multi-omics evidence for convergence.' }
    active_1b:
      type: return
      value: { convergence_score: 0, verdict: INSUFFICIENT, dimensions_active: 1, weakest_dimension: multiple, recommendation: 'Only 1 dimension active. Need multi-omics evidence for convergence.' }
    active_1c:
      type: return
      value: { convergence_score: 0, verdict: INSUFFICIENT, dimensions_active: 1, weakest_dimension: multiple, recommendation: 'Only 1 dimension active. Need multi-omics evidence for convergence.' }
    active_1d:
      type: return
      value: { convergence_score: 0, verdict: INSUFFICIENT, dimensions_active: 1, weakest_dimension: multiple, recommendation: 'Only 1 dimension active. Need multi-omics evidence for convergence.' }
    active_0:
      type: return
      value: { convergence_score: 0, verdict: NO_DATA, dimensions_active: 0, weakest_dimension: all, recommendation: 'No evidence in any dimension. Cannot assess convergence.' }

    insufficient_dims:
      type: return
      value: { convergence_score: 0, verdict: INSUFFICIENT, dimensions_active: 0, weakest_dimension: multiple, recommendation: 'Active dimensions below minimum required. Expand evidence base.' }

    # === SCORING: 4 dimensions active ===
    # Weighted: T=0.30, G=0.25, L=0.25, P=0.20
    # Pre-compute not possible in tree, so use threshold-based classification
    # HEXIM1 reference: T=1.0, G=1.0, L=0.85, P=0.50 => 0.30+0.25+0.2125+0.10 = 0.8625
    score_4dim:
      type: condition
      variable: proteomics_score
      operator: gte
      value: 0.70
      true_next: score_4dim_prot_strong
      false_next: score_4dim_prot_weak

    score_4dim_prot_strong:
      type: condition
      variable: literature_score
      operator: gte
      value: 0.70
      true_next: converged_strong
      false_next: converged_moderate
    score_4dim_prot_weak:
      type: condition
      variable: literature_score
      operator: gte
      value: 0.70
      true_next: converged_partial_prot
      false_next: converged_weak_multi

    converged_strong:
      type: return
      value: { verdict: CONVERGED, dimensions_active: 4, weakest_dimension: none, recommendation: 'Full convergence across all 4 omics dimensions. Ready for clinical development.' }
    converged_moderate:
      type: return
      value: { verdict: CONVERGED, dimensions_active: 4, weakest_dimension: literature, recommendation: 'Strong convergence. Strengthen literature evidence for complete validation.' }
    converged_partial_prot:
      type: return
      value: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 4, weakest_dimension: proteomics, recommendation: 'Proteomics evidence incomplete. Prioritize mass-spec validation (PRIDE datasets).' }
    converged_weak_multi:
      type: return
      value: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 4, weakest_dimension: proteomics_and_literature, recommendation: 'Both proteomics and literature weak. Strengthen evidence base before development.' }

    # 3 dimensions — missing proteomics
    score_3dim_no_prot:
      type: condition
      variable: transcriptomics_score
      operator: gte
      value: 0.80
      true_next: three_dim_strong_no_prot
      false_next: three_dim_moderate_no_prot
    three_dim_strong_no_prot:
      type: return
      value: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 3, weakest_dimension: proteomics, recommendation: 'Strong 3-way convergence. Proteomics data needed to complete validation. Query PRIDE/ProteomeXchange.' }
    three_dim_moderate_no_prot:
      type: return
      value: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 3, weakest_dimension: proteomics, recommendation: '3-way convergence with moderate transcriptomics. Prioritize protein-level confirmation.' }

    # 3 dimensions — missing genomics
    score_3dim_no_gen:
      type: return
      value: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 3, weakest_dimension: genomics, recommendation: '3-way convergence without genomic binding data. CUT&RUN or ChIP-seq recommended.' }

    # 3 dimensions — missing transcriptomics
    score_3dim_no_trans:
      type: return
      value: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 3, weakest_dimension: transcriptomics, recommendation: '3-way convergence without expression data. Mine GEO for treatment expression datasets.' }

    # 3 dimensions — missing literature
    score_3dim_no_lit:
      type: return
      value: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 3, weakest_dimension: literature, recommendation: '3-way convergence without literature support. Systematic review needed.' }

    # 2 dimensions
    partial_2:
      type: return
      value: { verdict: EMERGING, dimensions_active: 2, weakest_dimension: multiple, recommendation: 'Only 2 dimensions active. Expand to 3+ for convergence assessment.' }

tests:
# HEXIM1 reference case: T=1.0, G=1.0, L=0.85, P=0.50, min=3
- input: { transcriptomics_score: 1.0, genomics_score: 1.0, literature_score: 0.85, proteomics_score: 0.50, min_dimensions_required: 3 }
  expect: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 4, weakest_dimension: proteomics }

# Full convergence: all strong
- input: { transcriptomics_score: 0.95, genomics_score: 0.90, literature_score: 0.85, proteomics_score: 0.80, min_dimensions_required: 3 }
  expect: { verdict: CONVERGED, dimensions_active: 4 }

# No proteomics data
- input: { transcriptomics_score: 1.0, genomics_score: 1.0, literature_score: 0.85, proteomics_score: 0, min_dimensions_required: 3 }
  expect: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 3, weakest_dimension: proteomics }

# Only transcriptomics
- input: { transcriptomics_score: 1.0, genomics_score: 0, literature_score: 0, proteomics_score: 0, min_dimensions_required: 3 }
  expect: { verdict: INSUFFICIENT, dimensions_active: 1 }

# No data at all
- input: { transcriptomics_score: 0, genomics_score: 0, literature_score: 0, proteomics_score: 0, min_dimensions_required: 3 }
  expect: { verdict: NO_DATA, dimensions_active: 0 }

# Two dimensions only, min=2 (passes gate)
- input: { transcriptomics_score: 0.90, genomics_score: 0.85, literature_score: 0, proteomics_score: 0, min_dimensions_required: 2 }
  expect: { verdict: EMERGING, dimensions_active: 2 }

# Two dimensions only, min=3 (fails gate)
- input: { transcriptomics_score: 0.90, genomics_score: 0.85, literature_score: 0, proteomics_score: 0, min_dimensions_required: 3 }
  expect: { verdict: INSUFFICIENT }

# Weak proteomics + weak literature
- input: { transcriptomics_score: 0.95, genomics_score: 0.90, literature_score: 0.40, proteomics_score: 0.30, min_dimensions_required: 3 }
  expect: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 4, weakest_dimension: proteomics_and_literature }

# Missing genomics specifically
- input: { transcriptomics_score: 0.90, genomics_score: 0, literature_score: 0.80, proteomics_score: 0.70, min_dimensions_required: 3 }
  expect: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 3, weakest_dimension: genomics }

# Missing transcriptomics specifically
- input: { transcriptomics_score: 0, genomics_score: 0.90, literature_score: 0.80, proteomics_score: 0.70, min_dimensions_required: 3 }
  expect: { verdict: PARTIAL_CONVERGENCE, dimensions_active: 3, weakest_dimension: transcriptomics }
