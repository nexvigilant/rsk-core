name: timeline-anda-safety
description: "ANDA safety update"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "new_safety_concern"
      operator: "eq"
      value: true
      true_next: "due"
      false_next: "not_due"
    due:
      type: "return"
      value:
        jurisdiction: "US"
        report_type: "anda"
        due: true
        action: "submit"
    not_due:
      type: "return"
      value:
        jurisdiction: "US"
        report_type: "anda"
        due: false
        action: "schedule"

tests:
  - input: {"new_safety_concern": true}
    expect: {"jurisdiction": "US", "due": true}
  - input: {}
    expect: {"jurisdiction": "US", "due": false}
