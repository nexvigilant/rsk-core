# MICROGRAM++ (upgraded 2026-04-23)
name: report-deadline
version: 0.1.0
description: Determine regulatory reporting deadline based on seriousness and expectedness
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: expedited
    type: bool
    required: false
    description: ""
  - name: seriousness
    type: string
    required: false
    description: ""
outputs:
  - name: deadline_days
    type: int
  - name: regulatory_basis
    type: string
  - name: report_type
    type: string
interface:
  inputs:
    expedited:
      type: bool
      required: false
    seriousness:
      type: string
      required: false
  outputs:
    deadline_days:
      type: int
    regulatory_basis:
      type: string
    report_type:
      type: string
ui:
  title: Report Deadline
  subtitle: Determine regulatory reporting deadline based on seriousness and expectedness
  icon: circle
  route: /vigilance/mg/report-deadline
  steps:
    - field: expedited
      label: expedited
      help: Enter expedited
      widget: toggle
      placeholder: null
    - field: seriousness
      label: seriousness
      help: Enter seriousness
      widget: text
      placeholder: null
  result:
    template: "deadline_days: {{deadline_days}} — regulatory_basis: {{regulatory_basis}} — report_type: {{report_type}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/report-deadline
  cli: rsk mcg run report-deadline
  auth: none
  rate_limit: 600/min
tree:
  start: expedited_check
  nodes:
    day7:
      type: return
      value:
        deadline_days: 7
        regulatory_basis: ICH E2A fatal/life-threatening
        report_type: 7-day
    day15:
      type: return
      value:
        report_type: 15-day
        deadline_days: 15
        regulatory_basis: ICH E2A serious unexpected
    periodic:
      type: return
      value:
        regulatory_basis: ICH E2A non-serious
        report_type: periodic
        deadline_days: 90
    expedited_check:
      type: condition
      variable: expedited
      operator: eq
      value: true
      true_next: fatal_check
      false_next: periodic
    fatal_check:
      type: condition
      variable: seriousness
      operator: eq
      value: SERIOUS
      true_next: day7
      false_next: day15
tests:
  - input:
      expedited: true
      seriousness: SERIOUS
    expect:
      report_type: 7-day
      deadline_days: 7
  - input:
      expedited: true
      seriousness: NON-SERIOUS
    expect:
      deadline_days: 15
      report_type: 15-day
  - input:
      seriousness: SERIOUS
      expedited: false
    expect:
      report_type: periodic
      deadline_days: 90
  - input:
      seriousness: NON-SERIOUS
      expedited: false
    expect:
      deadline_days: 90
      report_type: periodic
  - input: {}
    expect:
      regulatory_basis: ICH E2A non-serious
      deadline_days: 90
      report_type: periodic
  - input: {}
    expect:
      deadline_days: 90
      regulatory_basis: ICH E2A non-serious
      report_type: periodic
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - deadline_days
    - regulatory_basis
    - report_type
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
