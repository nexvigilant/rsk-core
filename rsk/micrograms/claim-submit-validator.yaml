# MICROGRAM++ (upgraded 2026-04-23)
name: claim-submit-validator
version: 0.1.0
description: "Validate an ARP claim submission for structural completeness. Inputs: counts of required fields. Returns validity verdict + rejection reason. Used by /api/arp/claims POST before insert."
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: claim_text_len
    type: integer
    required: true
    description: Character count of the claim statement
  - name: evidence_refs_count
    type: integer
    required: true
    description: ""
  - name: method_len
    type: integer
    required: true
    description: ""
  - name: data_sources_count
    type: integer
    required: true
    description: ""
  - name: falsifiers_count
    type: integer
    required: true
    description: ""
outputs:
  - name: verdict
    type: string
  - name: reason
    type: string
interface:
  inputs:
    claim_text_len:
      type: integer
      required: true
      description: Character count of the claim statement
    evidence_refs_count:
      type: integer
      required: true
    method_len:
      type: integer
      required: true
    data_sources_count:
      type: integer
      required: true
    falsifiers_count:
      type: integer
      required: true
  outputs:
    verdict:
      type: string
    reason:
      type: string
ui:
  title: Claim Submit Validator
  subtitle: "Validate an ARP claim submission for structural completeness. Inputs: counts of required fields. Returns validity verdict + rejection reason. Used by /api/arp/claims POST before insert."
  icon: circle
  route: /vigilance/mg/claim-submit-validator
  steps:
    - field: claim_text_len
      label: claim text len
      help: Character count of the claim statement
      widget: number
      placeholder: null
    - field: evidence_refs_count
      label: evidence refs count
      help: Enter evidence_refs_count
      widget: number
      placeholder: null
    - field: method_len
      label: method len
      help: Enter method_len
      widget: number
      placeholder: null
    - field: data_sources_count
      label: data sources count
      help: Enter data_sources_count
      widget: number
      placeholder: null
    - field: falsifiers_count
      label: falsifiers count
      help: Enter falsifiers_count
      widget: number
      placeholder: null
  result:
    template: "verdict: {{verdict}} — reason: {{reason}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/claim-submit-validator
  cli: rsk mcg run claim-submit-validator
  auth: none
  rate_limit: 600/min
tree:
  start: check_claim
  nodes:
    check_claim:
      type: condition
      variable: claim_text_len
      operator: lt
      value: 20
      true_next: reject_claim_too_short
      false_next: check_claim_max
    check_claim_max:
      type: condition
      variable: claim_text_len
      operator: gt
      value: 2000
      true_next: reject_claim_too_long
      false_next: check_evidence
    check_evidence:
      type: condition
      variable: evidence_refs_count
      operator: lt
      value: 1
      true_next: reject_no_evidence
      false_next: check_method
    check_method:
      type: condition
      variable: method_len
      operator: lt
      value: 50
      true_next: reject_method_too_thin
      false_next: check_data_sources
    check_data_sources:
      type: condition
      variable: data_sources_count
      operator: lt
      value: 1
      true_next: reject_no_data_sources
      false_next: check_falsifiers
    check_falsifiers:
      type: condition
      variable: falsifiers_count
      operator: lt
      value: 1
      true_next: reject_no_falsifiers
      false_next: valid
    valid:
      type: return
      value:
        verdict: valid
        reason: all-required-fields-present
    reject_claim_too_short:
      type: return
      value:
        verdict: invalid
        reason: claim-text-under-20-chars
    reject_claim_too_long:
      type: return
      value:
        verdict: invalid
        reason: claim-text-over-2000-chars
    reject_no_evidence:
      type: return
      value:
        verdict: invalid
        reason: no-evidence-refs
    reject_method_too_thin:
      type: return
      value:
        verdict: invalid
        reason: method-under-50-chars
    reject_no_data_sources:
      type: return
      value:
        verdict: invalid
        reason: no-data-sources
    reject_no_falsifiers:
      type: return
      value:
        verdict: invalid
        reason: no-falsifiers
tests:
  - name: fully_valid_claim
    input:
      claim_text_len: 120
      evidence_refs_count: 3
      method_len: 200
      data_sources_count: 2
      falsifiers_count: 2
    expect:
      verdict: valid
      reason: all-required-fields-present
  - name: claim_too_short
    input:
      claim_text_len: 10
      evidence_refs_count: 1
      method_len: 100
      data_sources_count: 1
      falsifiers_count: 1
    expect:
      verdict: invalid
      reason: claim-text-under-20-chars
  - name: claim_too_long
    input:
      claim_text_len: 5000
      evidence_refs_count: 1
      method_len: 100
      data_sources_count: 1
      falsifiers_count: 1
    expect:
      verdict: invalid
      reason: claim-text-over-2000-chars
  - name: no_evidence
    input:
      claim_text_len: 100
      evidence_refs_count: 0
      method_len: 100
      data_sources_count: 1
      falsifiers_count: 1
    expect:
      verdict: invalid
      reason: no-evidence-refs
  - name: method_too_thin
    input:
      claim_text_len: 100
      evidence_refs_count: 1
      method_len: 20
      data_sources_count: 1
      falsifiers_count: 1
    expect:
      verdict: invalid
      reason: method-under-50-chars
  - name: no_data_sources
    input:
      claim_text_len: 100
      evidence_refs_count: 1
      method_len: 100
      data_sources_count: 0
      falsifiers_count: 1
    expect:
      verdict: invalid
      reason: no-data-sources
  - name: no_falsifiers
    input:
      claim_text_len: 100
      evidence_refs_count: 1
      method_len: 100
      data_sources_count: 1
      falsifiers_count: 0
    expect:
      verdict: invalid
      reason: no-falsifiers
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - verdict
    - reason
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
