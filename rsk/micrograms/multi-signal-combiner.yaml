# MICROGRAM++ (upgraded 2026-04-23)
name: multi-signal-combiner
version: 0.1.0
description: Combines PRR, ROR, IC, and EBGM signal classifications into an overall pharmacovigilance signal assessment. Two or more STRONG signals yield CONFIRMED; one STRONG yields PROBABLE; MODERATE counts determine POSSIBLE/SUGGESTIVE.
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: ebgm_signal
    type: string
    required: false
    description: ""
  - name: ic_signal
    type: string
    required: false
    description: ""
  - name: prr_signal
    type: string
    required: false
    description: ""
  - name: ror_signal
    type: string
    required: false
    description: ""
outputs:
  - name: overall
    type: string
  - name: priority
    type: string
  - name: signal_detected
    type: bool
interface:
  inputs:
    ebgm_signal:
      type: string
      required: false
    ic_signal:
      type: string
      required: false
    prr_signal:
      type: string
      required: false
    ror_signal:
      type: string
      required: false
  outputs:
    overall:
      type: string
    priority:
      type: string
    signal_detected:
      type: bool
ui:
  title: Multi Signal Combiner
  subtitle: Combines PRR, ROR, IC, and EBGM signal classifications into an overall pharmacovigilance signal assessment. Two or more STRONG signals yield CONFIRMED; one STRONG yields PROBABLE; MODERATE counts determine POSSIBLE/SUGGESTIVE.
  icon: activity
  route: /vigilance/mg/multi-signal-combiner
  steps:
    - field: ebgm_signal
      label: ebgm signal
      help: Enter ebgm_signal
      widget: text
      placeholder: null
    - field: ic_signal
      label: ic signal
      help: Enter ic_signal
      widget: text
      placeholder: null
    - field: prr_signal
      label: prr signal
      help: Enter prr_signal
      widget: text
      placeholder: null
    - field: ror_signal
      label: ror signal
      help: Enter ror_signal
      widget: text
      placeholder: null
  result:
    template: "overall: {{overall}} — priority: {{priority}} — signal_detected: {{signal_detected}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/multi-signal-combiner
  cli: rsk mcg run multi-signal-combiner
  auth: none
  rate_limit: 600/min
tree:
  start: check_prr_strong
  nodes:
    check_prr_strong:
      type: condition
      variable: prr_signal
      operator: eq
      value: STRONG
      true_next: prr_strong_check_ror
      false_next: prr_not_strong_check_ror
    prr_strong_check_ror:
      type: condition
      variable: ror_signal
      operator: eq
      value: STRONG
      true_next: confirmed
      false_next: prr_strong_check_ic
    prr_strong_check_ic:
      type: condition
      variable: ic_signal
      operator: eq
      value: STRONG
      true_next: confirmed
      false_next: prr_strong_check_ebgm
    prr_strong_check_ebgm:
      type: condition
      variable: ebgm_signal
      operator: eq
      value: STRONG
      true_next: confirmed
      false_next: probable_one_strong
    prr_not_strong_check_ror:
      type: condition
      variable: ror_signal
      operator: eq
      value: STRONG
      true_next: ror_strong_check_ic
      false_next: no_strong_check_ic
    ror_strong_check_ic:
      type: condition
      variable: ic_signal
      operator: eq
      value: STRONG
      true_next: confirmed
      false_next: ror_strong_check_ebgm
    ror_strong_check_ebgm:
      type: condition
      variable: ebgm_signal
      operator: eq
      value: STRONG
      true_next: confirmed
      false_next: probable_one_strong
    no_strong_check_ic:
      type: condition
      variable: ic_signal
      operator: eq
      value: STRONG
      true_next: ic_strong_check_ebgm
      false_next: no_strong_check_ebgm
    ic_strong_check_ebgm:
      type: condition
      variable: ebgm_signal
      operator: eq
      value: STRONG
      true_next: confirmed
      false_next: probable_one_strong
    no_strong_check_ebgm:
      type: condition
      variable: ebgm_signal
      operator: eq
      value: STRONG
      true_next: probable_one_strong
      false_next: count_moderate_prr
    count_moderate_prr:
      type: condition
      variable: prr_signal
      operator: eq
      value: MODERATE
      true_next: prr_mod_check_ror
      false_next: prr_none_check_ror
    prr_mod_check_ror:
      type: condition
      variable: ror_signal
      operator: eq
      value: MODERATE
      true_next: prr_ror_mod_check_ic
      false_next: prr_mod_ror_none_check_ic
    prr_ror_mod_check_ic:
      type: condition
      variable: ic_signal
      operator: eq
      value: MODERATE
      true_next: probable_three_moderate
      false_next: prr_ror_mod_check_ebgm
    prr_ror_mod_check_ebgm:
      type: condition
      variable: ebgm_signal
      operator: eq
      value: MODERATE
      true_next: probable_three_moderate
      false_next: possible_two_moderate
    prr_mod_ror_none_check_ic:
      type: condition
      variable: ic_signal
      operator: eq
      value: MODERATE
      true_next: prr_ic_mod_check_ebgm
      false_next: prr_mod_only_check_ebgm
    prr_ic_mod_check_ebgm:
      type: condition
      variable: ebgm_signal
      operator: eq
      value: MODERATE
      true_next: probable_three_moderate
      false_next: possible_two_moderate
    prr_mod_only_check_ebgm:
      type: condition
      variable: ebgm_signal
      operator: eq
      value: MODERATE
      true_next: possible_two_moderate
      false_next: suggestive_one_moderate
    prr_none_check_ror:
      type: condition
      variable: ror_signal
      operator: eq
      value: MODERATE
      true_next: ror_mod_check_ic
      false_next: ror_none_check_ic
    ror_mod_check_ic:
      type: condition
      variable: ic_signal
      operator: eq
      value: MODERATE
      true_next: ror_ic_mod_check_ebgm
      false_next: ror_mod_only_check_ic_false
    ror_ic_mod_check_ebgm:
      type: condition
      variable: ebgm_signal
      operator: eq
      value: MODERATE
      true_next: probable_three_moderate
      false_next: possible_two_moderate
    ror_mod_only_check_ic_false:
      type: condition
      variable: ebgm_signal
      operator: eq
      value: MODERATE
      true_next: possible_two_moderate
      false_next: suggestive_one_moderate
    ror_none_check_ic:
      type: condition
      variable: ic_signal
      operator: eq
      value: MODERATE
      true_next: ic_mod_check_ebgm
      false_next: ic_none_check_ebgm
    ic_mod_check_ebgm:
      type: condition
      variable: ebgm_signal
      operator: eq
      value: MODERATE
      true_next: possible_two_moderate
      false_next: suggestive_one_moderate
    ic_none_check_ebgm:
      type: condition
      variable: ebgm_signal
      operator: eq
      value: MODERATE
      true_next: suggestive_one_moderate
      false_next: no_signal
    confirmed:
      type: return
      value:
        overall: CONFIRMED
        priority: CRITICAL
        signal_detected: true
    probable_one_strong:
      type: return
      value:
        overall: PROBABLE
        priority: HIGH
        signal_detected: true
    probable_three_moderate:
      type: return
      value:
        overall: PROBABLE
        priority: HIGH
        signal_detected: true
    possible_two_moderate:
      type: return
      value:
        overall: POSSIBLE
        priority: MEDIUM
        signal_detected: true
    suggestive_one_moderate:
      type: return
      value:
        overall: SUGGESTIVE
        priority: LOW
        signal_detected: true
    no_signal:
      type: return
      value:
        overall: NO_SIGNAL
        priority: NONE
        signal_detected: false
tests:
  - input:
      prr_signal: STRONG
      ror_signal: STRONG
      ic_signal: MODERATE
      ebgm_signal: NONE
    expect:
      overall: CONFIRMED
      priority: CRITICAL
      signal_detected: true
  - input:
      prr_signal: STRONG
      ror_signal: NONE
      ic_signal: STRONG
      ebgm_signal: NONE
