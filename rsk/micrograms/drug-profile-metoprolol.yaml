name: drug-profile-metoprolol
description: 'Safety triage for metoprolol: PRR-based signal routing (Type A)'
version: 0.1.0
tree:
  start: check_prr
  nodes:
    no_signal:
      type: return
      value:
        harm_type: A
        signal: false
        expected_prr: 1.9
        action: monitor
        drug: metoprolol
    check_prr:
      type: condition
      variable: prr
      operator: gte
      value: 2.0
      true_next: signal
      false_next: no_signal
    signal:
      type: return
      value:
        drug: metoprolol
        harm_type: A
        signal: true
        expected_prr: 1.9
        action: investigate
tests:
- input:
    prr: 1.9
  expect:
    drug: metoprolol
    signal: false
- input:
    prr: 0.5
  expect:
    signal: false
    drug: metoprolol
- input: {}
  expect:
    signal: false
    drug: metoprolol
- input:
    prr: 1.999
  expect:
    harm_type: A
    signal: false
    drug: metoprolol
    action: monitor
    expected_prr: 1.9
- input:
    prr: 2.001
  expect:
    action: investigate
    drug: metoprolol
    harm_type: A
    signal: true
    expected_prr: 1.9
interface: null
primitive_signature: null
