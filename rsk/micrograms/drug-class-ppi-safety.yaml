# MICROGRAM++ (upgraded 2026-04-23)
name: drug-class-ppi-safety
version: 0.1.0
description: Proton pump inhibitor safety. Monitors hypomagnesemia, vitamin B12 malabsorption, and osteoporosis risk.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Drug Class Ppi Safety
  subtitle: Proton pump inhibitor safety. Monitors hypomagnesemia, vitamin B12 malabsorption, and osteoporosis risk.
  icon: circle
  route: /vigilance/mg/drug-class-ppi-safety
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/drug-class-ppi-safety
  cli: rsk mcg run drug-class-ppi-safety
  auth: none
  rate_limit: 600/min
tree:
  start: check_duration
  nodes:
    check_duration:
      type: condition
      variable: ppi_duration_months
      operator: gte
      value: 12
      true_next: long_term_assessment
      false_next: check_magnesium
    long_term_assessment:
      type: return
      value:
        risk_level: moderate
        magnesium_monitoring: required
        bone_density_screening: required
        message: Long-term PPI use; monitor magnesium, vitamin B12, and bone health
    check_magnesium:
      type: condition
      variable: serum_magnesium_mg_dl
      operator: lt
      value: 1.7
      true_next: hypomagnesemia
      false_next: check_b12
    hypomagnesemia:
      type: return
      value:
        risk_level: high
        supplementation: required
        message: Hypomagnesemia detected; magnesium supplementation recommended
    check_b12:
      type: condition
      variable: vitamin_b12_pg_ml
      operator: lt
      value: 200
      true_next: b12_deficiency
      false_next: standard_dosing
    b12_deficiency:
      type: return
      value:
        risk_level: moderate
        supplementation: required
        message: B12 deficiency detected; supplementation recommended
    standard_dosing:
      type: return
      value:
        risk_level: low
        message: Standard PPI dosing appropriate
tests:
  - input:
      ppi_duration_months: 24
      serum_magnesium_mg_dl: 2
      vitamin_b12_pg_ml: 250
    expect:
      risk_level: moderate
      magnesium_monitoring: required
  - input:
      ppi_duration_months: 6
      serum_magnesium_mg_dl: 1.5
      vitamin_b12_pg_ml: 250
    expect:
      risk_level: high
      supplementation: required
  - input:
      ppi_duration_months: 6
      serum_magnesium_mg_dl: 2
      vitamin_b12_pg_ml: 180
    expect:
      risk_level: moderate
      supplementation: required
  - input:
      ppi_duration_months: 3
      serum_magnesium_mg_dl: 2.2
      vitamin_b12_pg_ml: 300
    expect:
      risk_level: low
  - input: {}
    expect: {}
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
