name: abstract-pv-relevance
description: "Assess PubMed abstract relevance to pharmacovigilance based on title and keywords"
version: 0.1.0

tree:
  start: validate_title
  nodes:
    validate_title:
      type: condition
      variable: title
      operator: is_not_null
      true_next: validate_keywords
      false_next: missing_input

    validate_keywords:
      type: condition
      variable: has_adverse_keyword
      operator: is_not_null
      true_next: validate_study_type
      false_next: missing_input

    validate_study_type:
      type: condition
      variable: study_type
      operator: is_not_null
      true_next: check_pv_keywords
      false_next: missing_input

    check_pv_keywords:
      type: condition
      variable: title
      operator: matches
      value: "(?i)(adverse|safety|toxicity|side effect|pharmacovigilance|signal|pharmacoepidemiology)"
      true_next: high_relevance
      false_next: check_clinical_study

    check_clinical_study:
      type: condition
      variable: study_type
      operator: matches
      value: "(?i)(trial|observational|cohort|case.report)"
      true_next: medium_relevance
      false_next: low_relevance

    high_relevance:
      type: return
      value:
        pv_relevant: true
        relevance_score: 9
        recommended_action: "prioritize_review"

    medium_relevance:
      type: return
      value:
        pv_relevant: true
        relevance_score: 6
        recommended_action: "standard_review"

    low_relevance:
      type: return
      value:
        pv_relevant: false
        relevance_score: 3
        recommended_action: "defer_or_skip"

    missing_input:
      type: return
      value:
        pv_relevant: false
        relevance_score: 0
        recommended_action: "request_complete_data"

tests:
  - input: { title: "Adverse events and toxicity profile of new drug X", has_adverse_keyword: true, study_type: "case_report" }
    expect: { pv_relevant: true, relevance_score: 9, recommended_action: "prioritize_review" }

  - input: { title: "A clinical trial of drug Y in hypertension", has_adverse_keyword: true, study_type: "trial" }
    expect: { pv_relevant: true, relevance_score: 6, recommended_action: "standard_review" }

  - input: { title: "Efficacy of drug Z in diabetes management", has_adverse_keyword: false, study_type: "observational" }
    expect: { pv_relevant: true, relevance_score: 6, recommended_action: "standard_review" }

  - input: { title: "Pharmacovigilance signal detection methodology", has_adverse_keyword: true, study_type: "cohort" }
    expect: { pv_relevant: true, relevance_score: 9, recommended_action: "prioritize_review" }

  - input: { title: null, has_adverse_keyword: true, study_type: "case_report" }
    expect: { pv_relevant: false, relevance_score: 0, recommended_action: "request_complete_data" }
