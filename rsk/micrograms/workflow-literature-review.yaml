# MICROGRAM++ (upgraded 2026-04-23)
name: workflow-literature-review
version: 0.1.0
description: Route literature search strategy by question type
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Workflow Literature Review
  subtitle: Route literature search strategy by question type
  icon: circle
  route: /vigilance/mg/workflow-literature-review
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/workflow-literature-review
  cli: rsk mcg run workflow-literature-review
  auth: none
  rate_limit: 600/min
tree:
  start: check_type
  nodes:
    check_type:
      type: condition
      variable: question_type
      operator: eq
      value: case_report
      true_next: case_chain
      false_next: check_systematic
    case_chain:
      type: return
      value:
        strategy: case_report_mining
        chain: pubmed → meddra → who-umc
        query_type: case_report
    check_systematic:
      type: condition
      variable: question_type
      operator: eq
      value: systematic
      true_next: systematic_chain
      false_next: exploratory_chain
    systematic_chain:
      type: return
      value:
        strategy: systematic_review
        chain: pubmed → clinicaltrials → epidemiology → ich
        query_type: review
    exploratory_chain:
      type: return
      value:
        strategy: exploratory_search
        chain: pubmed → wikipedia → drugbank
        query_type: broad
tests:
  - input:
      question_type: case_report
    expect:
      strategy: case_report_mining
      query_type: case_report
  - input:
      question_type: systematic
    expect:
      strategy: systematic_review
      query_type: review
  - input:
      question_type: exploratory
    expect:
      strategy: exploratory_search
      query_type: broad
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
