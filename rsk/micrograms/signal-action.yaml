# MICROGRAM++ (upgraded 2026-04-23)
name: signal-action
version: 0.1.0
description: "Bridge: PRR signal + Naranjo causality → action urgency. Chains from prr-signal and naranjo-quick."
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: causality
    type: string
    required: false
    description: ""
  - name: signal_detected
    type: bool
    required: false
    description: ""
outputs:
  - name: action_required
    type: bool
  - name: rationale
    type: string
  - name: urgency
    type: string
interface:
  inputs:
    causality:
      type: string
      required: false
    signal_detected:
      type: bool
      required: false
  outputs:
    action_required:
      type: bool
    rationale:
      type: string
    urgency:
      type: string
ui:
  title: Signal Action
  subtitle: "Bridge: PRR signal + Naranjo causality → action urgency. Chains from prr-signal and naranjo-quick."
  icon: activity
  route: /vigilance/mg/signal-action
  steps:
    - field: causality
      label: causality
      help: Enter causality
      widget: text
      placeholder: null
    - field: signal_detected
      label: signal detected
      help: Enter signal_detected
      widget: toggle
      placeholder: null
  result:
    template: "action_required: {{action_required}} — rationale: {{rationale}} — urgency: {{urgency}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/signal-action
  cli: rsk mcg run signal-action
  auth: none
  rate_limit: 600/min
tree:
  start: check_signal
  nodes:
    check_signal:
      type: condition
      variable: signal_detected
      operator: eq
      value: true
      true_next: check_causality
      false_next: monitor
    monitor:
      type: return
      value:
        rationale: No signal or low causality
        action_required: false
        urgency: MONITOR
    urgent:
      type: return
      value:
        action_required: true
        urgency: URGENT
        rationale: Signal detected with definite causality
    check_probable:
      type: condition
      variable: causality
      operator: eq
      value: probable
      true_next: investigate
      false_next: monitor
    investigate:
      type: return
      value:
        urgency: INVESTIGATE
        rationale: Signal detected with probable causality
        action_required: true
    check_causality:
      type: condition
      variable: causality
      operator: eq
      value: definite
      true_next: urgent
      false_next: check_probable
tests:
  - input:
      causality: definite
      signal_detected: true
    expect:
      rationale: Signal detected with definite causality
      action_required: true
      urgency: URGENT
  - input:
      causality: probable
      signal_detected: true
    expect:
      rationale: Signal detected with probable causality
      action_required: true
      urgency: INVESTIGATE
  - input:
      signal_detected: true
      causality: possible
    expect:
      rationale: No signal or low causality
      urgency: MONITOR
      action_required: false
  - input:
      causality: definite
      signal_detected: false
    expect:
      rationale: No signal or low causality
      action_required: false
      urgency: MONITOR
  - input:
      signal_detected: false
      causality: possible
    expect:
      action_required: false
      urgency: MONITOR
      rationale: No signal or low causality
  - input: {}
    expect:
      urgency: MONITOR
      rationale: No signal or low causality
      action_required: false
  - input: {}
    expect:
      rationale: No signal or low causality
      urgency: MONITOR
      action_required: false
  - input: {}
    expect:
      rationale: No signal or low causality
      urgency: MONITOR
      action_required: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - action_required
    - rationale
    - urgency
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
