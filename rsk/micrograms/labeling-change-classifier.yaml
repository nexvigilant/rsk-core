name: labeling-change-classifier
description: "Classify FDA drug labeling changes by type and assess regulatory impact"
version: 0.1.0

tree:
  start: validate_change_type
  nodes:
    validate_change_type:
      type: condition
      variable: change_type
      operator: is_not_null
      true_next: classify_change
      false_next: missing_input

    classify_change:
      type: condition
      variable: change_type
      operator: matches
      value: "(?i)^boxed_warning$"
      true_next: change_boxed_warning
      false_next: check_contraindication

    check_contraindication:
      type: condition
      variable: change_type
      operator: matches
      value: "(?i)^contraindication$"
      true_next: change_contraindication
      false_next: check_warning

    check_warning:
      type: condition
      variable: change_type
      operator: matches
      value: "(?i)^warning$"
      true_next: change_warning
      false_next: check_precaution

    check_precaution:
      type: condition
      variable: change_type
      operator: matches
      value: "(?i)^precaution$"
      true_next: change_precaution
      false_next: check_adverse_reaction

    check_adverse_reaction:
      type: condition
      variable: change_type
      operator: matches
      value: "(?i)^adverse_reaction$"
      true_next: change_adverse_reaction
      false_next: unknown_type

    change_boxed_warning:
      type: return
      value:
        severity_rank: 5
        requires_dhpc: true
        regulatory_action: "black_box_warning_addition"

    change_contraindication:
      type: return
      value:
        severity_rank: 5
        requires_dhpc: true
        regulatory_action: "contraindication_addition"

    change_warning:
      type: return
      value:
        severity_rank: 4
        requires_dhpc: true
        regulatory_action: "warning_addition"

    change_precaution:
      type: return
      value:
        severity_rank: 2
        requires_dhpc: false
        regulatory_action: "precaution_update"

    change_adverse_reaction:
      type: return
      value:
        severity_rank: 3
        requires_dhpc: false
        regulatory_action: "adverse_reaction_update"

    unknown_type:
      type: return
      value:
        severity_rank: null
        requires_dhpc: false
        regulatory_action: null

    missing_input:
      type: return
      value:
        severity_rank: null
        requires_dhpc: false
        regulatory_action: null

tests:
  - input: { change_type: "boxed_warning" }
    expect: { severity_rank: 5, requires_dhpc: true, regulatory_action: "black_box_warning_addition" }

  - input: { change_type: "contraindication" }
    expect: { severity_rank: 5, requires_dhpc: true, regulatory_action: "contraindication_addition" }

  - input: { change_type: "warning" }
    expect: { severity_rank: 4, requires_dhpc: true, regulatory_action: "warning_addition" }

  - input: { change_type: "precaution" }
    expect: { severity_rank: 2, requires_dhpc: false, regulatory_action: "precaution_update" }

  - input: { change_type: "adverse_reaction" }
    expect: { severity_rank: 3, requires_dhpc: false, regulatory_action: "adverse_reaction_update" }

  - input: { change_type: null }
    expect: { severity_rank: null, requires_dhpc: false, regulatory_action: null }
