# MICROGRAM++ (upgraded 2026-04-23)
name: prr-strength-classifier
version: 0.1.0
description: "PRR signal strength: classifies PRR value into strength tier for drug safety assessment display"
family: pv.signal
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - pv
inputs:
  - name: prr
    type: number
    required: true
    description: Proportional Reporting Ratio value
outputs:
  - name: strength
    type: string
interface:
  inputs:
    prr:
      type: number
      required: true
      description: Proportional Reporting Ratio value
  outputs:
    strength:
      type: string
ui:
  title: Prr Strength Classifier
  subtitle: "PRR signal strength: classifies PRR value into strength tier for drug safety assessment display"
  icon: activity
  route: /vigilance/mg/prr-strength-classifier
  steps:
    - field: prr
      label: prr
      help: Proportional Reporting Ratio value
      widget: number
      placeholder: null
  result:
    template: "strength: {{strength}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/prr-strength-classifier
  cli: rsk mcg run prr-strength-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check_critical
  nodes:
    check_critical:
      type: condition
      variable: prr
      operator: gte
      value: 10
      true_next: critical
      false_next: check_signal
    check_signal:
      type: condition
      variable: prr
      operator: gte
      value: 2
      true_next: signal
      false_next: subthreshold
    critical:
      type: return
      value:
        strength: critical
    signal:
      type: return
      value:
        strength: signal
    subthreshold:
      type: return
      value:
        strength: subthreshold
tests:
  - input:
      prr: 0
    expect:
      strength: subthreshold
  - input:
      prr: 1.5
    expect:
      strength: subthreshold
  - input:
      prr: 2
    expect:
      strength: signal
  - input:
      prr: 5
    expect:
      strength: signal
  - input:
      prr: 9.99
    expect:
      strength: signal
  - input:
      prr: 10
    expect:
      strength: critical
  - input:
      prr: 16.553
    expect:
      strength: critical
  - input: {}
    expect:
      strength: subthreshold
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - strength
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: pv.signal
  log_level: info
governance:
  sop_ref: SOP-PV-001
  regulatory_ref:
    - ICH-E2E
    - 21CFR314.80
  harm_types:
    - A
    - F
  review_cadence: quarterly
  tov_axioms:
    - decomposition
    - conservation
    - safety_manifold
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
