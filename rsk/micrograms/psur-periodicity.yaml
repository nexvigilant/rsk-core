# MICROGRAM++ (upgraded 2026-04-23)
name: psur-periodicity
version: 0.1.0
description: Periodic Safety Update Report (PSUR) submission interval based on post-approval duration and special conditions. EMA CTD Module 1.2.5.
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs:
  - name: years_since_approval
    type: int
    required: true
    description: ""
  - name: has_special_condition
    type: bool
    required: false
    description: ""
outputs:
  - name: periodicity
    type: string
  - name: next_due_months
    type: int
  - name: rationale
    type: string
interface:
  inputs:
    years_since_approval:
      type: int
      required: true
    has_special_condition:
      type: bool
      required: false
  outputs:
    periodicity:
      type: string
    next_due_months:
      type: int
    rationale:
      type: string
ui:
  title: Psur Periodicity
  subtitle: Periodic Safety Update Report (PSUR) submission interval based on post-approval duration and special conditions. EMA CTD Module 1.2.5.
  icon: circle
  route: /vigilance/mg/psur-periodicity
  steps:
    - field: years_since_approval
      label: years since approval
      help: Enter years_since_approval
      widget: text
      placeholder: null
    - field: has_special_condition
      label: has special condition
      help: Enter has_special_condition
      widget: toggle
      placeholder: null
  result:
    template: "periodicity: {{periodicity}} — next_due_months: {{next_due_months}} — rationale: {{rationale}}"
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/psur-periodicity
  cli: rsk mcg run psur-periodicity
  auth: none
  rate_limit: 600/min
tree:
  start: special_condition_check
  nodes:
    special_condition_check:
      type: condition
      variable: has_special_condition
      operator: eq
      value: true
      true_next: special_condition_six_monthly
      false_next: years_zero_to_two
    years_zero_to_two:
      type: condition
      variable: years_since_approval
      operator: lt
      value: 2
      true_next: six_monthly_result
      false_next: years_two_to_five
    years_two_to_five:
      type: condition
      variable: years_since_approval
      operator: lt
      value: 5
      true_next: annual_result
      false_next: years_five_to_ten
    years_five_to_ten:
      type: condition
      variable: years_since_approval
      operator: lt
      value: 10
      true_next: triennial_result
      false_next: as_requested_result
    special_condition_six_monthly:
      type: return
      value:
        periodicity: six_monthly
        next_due_months: 6
        rationale: Special condition override - Enhanced safety monitoring required
    six_monthly_result:
      type: return
      value:
        periodicity: six_monthly
        next_due_months: 6
        rationale: Initial post-approval period (0-2 years) - Enhanced safety monitoring required
    annual_result:
      type: return
      value:
        periodicity: annual
        next_due_months: 12
        rationale: Early post-approval phase (2-5 years) - Annual PSUR required
    triennial_result:
      type: return
      value:
        periodicity: triennial
        next_due_months: 36
        rationale: Established safety profile (5-10 years) - Triennial PSUR required
    as_requested_result:
      type: return
      value:
        periodicity: as_requested
        next_due_months: 0
        rationale: Mature post-approval phase (>10 years) - PSUR only on request unless risk identified
tests:
  - input:
      years_since_approval: 0
      has_special_condition: false
    expect:
      periodicity: six_monthly
      next_due_months: 6
      rationale: Initial post-approval period (0-2 years) - Enhanced safety monitoring required
  - input:
      years_since_approval: 1
      has_special_condition: false
    expect:
      periodicity: six_monthly
      next_due_months: 6
      rationale: Initial post-approval period (0-2 years) - Enhanced safety monitoring required
  - input:
      years_since_approval: 3
      has_special_condition: false
    expect:
      periodicity: annual
      next_due_months: 12
      rationale: Early post-approval phase (2-5 years) - Annual PSUR required
  - input:
      years_since_approval: 7
      has_special_condition: false
    expect:
      periodicity: triennial
      next_due_months: 36
      rationale: Established safety profile (5-10 years) - Triennial PSUR required
  - input:
      years_since_approval: 15
      has_special_condition: false
    expect:
      periodicity: as_requested
      next_due_months: 0
      rationale: Mature post-approval phase (>10 years) - PSUR only on request unless risk identified
  - input:
      years_since_approval: 1
      has_special_condition: true
    expect:
      periodicity: six_monthly
      next_due_months: 6
      rationale: Special condition override - Enhanced safety monitoring required
  - input:
      years_since_approval: 15
      has_special_condition: true
    expect:
      periodicity: six_monthly
      next_due_months: 6
      rationale: Special condition override - Enhanced safety monitoring required
  - input:
      years_since_approval: 2
      has_special_condition: false
    expect:
      periodicity: annual
      next_due_months: 12
      rationale: Early post-approval phase (2-5 years) - Annual PSUR required
  - input:
      years_since_approval: 5
      has_special_condition: false
    expect:
      periodicity: triennial
      next_due_months: 36
      rationale: Established safety profile (5-10 years) - Triennial PSUR required
  - input: {}
    expect:
      periodicity: as_requested
      next_due_months: 0
      rationale: Mature post-approval phase (>10 years) - PSUR only on request unless risk identified
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - periodicity
    - next_due_months
    - rationale
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
