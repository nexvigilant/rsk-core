# MICROGRAM++ (upgraded 2026-04-23)
name: d01-k006-pv-stakeholder-classifier
version: 0.1.0
description: "Classify PV stakeholder type: MAH, QPPV, regulator, healthcare professional, patient, CRO, or academic"
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: D01 K006 Pv Stakeholder Classifier
  subtitle: "Classify PV stakeholder type: MAH, QPPV, regulator, healthcare professional, patient, CRO, or academic"
  icon: circle
  route: /vigilance/mg/d01-k006-pv-stakeholder-classifier
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/d01-k006-pv-stakeholder-classifier
  cli: rsk mcg run d01-k006-pv-stakeholder-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: check
  nodes:
    check:
      type: condition
      variable: stakeholder_category
      operator: matches
      value: 0
      true_next: yes
      false_next: no
    no:
      type: return
      value:
        invalid_stakeholder: false
    yes:
      type: return
      value:
        valid_stakeholder: true
tests:
  - input:
      stakeholder_category: 0
    expect:
      invalid_stakeholder: false
  - input:
      stakeholder_category: 1
    expect:
      invalid_stakeholder: false
  - input:
      stakeholder_category: -1
    expect:
      invalid_stakeholder: false
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
