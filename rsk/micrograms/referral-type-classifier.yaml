# MICROGRAM++ (upgraded 2026-04-23)
name: referral-type-classifier
version: 0.1.0
description: Classify EMA referral procedures by reason and determine article type and timeline
family: microgram.generic
author: matthew@camp-corp.com
created_at: 2026-04-23
primitives:
  - →
  - ∂
  - ς
tags:
  - microgram
inputs: []
outputs: []
ui:
  title: Referral Type Classifier
  subtitle: Classify EMA referral procedures by reason and determine article type and timeline
  icon: circle
  route: /vigilance/mg/referral-type-classifier
  steps: []
  result:
    template: ""
    show_explanation: true
    show_tree_path: true
    next_actions: []
transport:
  mcp_tool: mcg_run
  http_route: POST /api/mg/referral-type-classifier
  cli: rsk mcg run referral-type-classifier
  auth: none
  rate_limit: 600/min
tree:
  start: validate_reason
  nodes:
    validate_reason:
      type: condition
      variable: reason
      operator: is_not_null
      true_next: classify_reason
      false_next: missing_input
    classify_reason:
      type: condition
      variable: reason
      operator: matches
      value: (?i)^safety$
      true_next: referral_safety
      false_next: check_efficacy
    check_efficacy:
      type: condition
      variable: reason
      operator: matches
      value: (?i)^efficacy$
      true_next: referral_efficacy
      false_next: check_pv
    check_pv:
      type: condition
      variable: reason
      operator: matches
      value: (?i)^pharmacovigilance$
      true_next: referral_pv
      false_next: referral_other
    referral_safety:
      type: return
      value:
        article_type: art31
        procedure_type: safety_signal_assessment
        typical_timeline_months: 6
    referral_efficacy:
      type: return
      value:
        article_type: art20
        procedure_type: efficacy_reassessment
        typical_timeline_months: 12
    referral_pv:
      type: return
      value:
        article_type: art107i
        procedure_type: pharmacovigilance_procedure
        typical_timeline_months: 4
    referral_other:
      type: return
      value:
        article_type: other
        procedure_type: special_procedure
        typical_timeline_months: 9
    missing_input:
      type: return
      value:
        article_type: null
        procedure_type: null
        typical_timeline_months: null
tests:
  - input:
      reason: safety
    expect:
      article_type: art31
      procedure_type: safety_signal_assessment
      typical_timeline_months: 6
  - input:
      reason: efficacy
    expect:
      article_type: art20
      procedure_type: efficacy_reassessment
      typical_timeline_months: 12
  - input:
      reason: pharmacovigilance
    expect:
      article_type: art107i
      procedure_type: pharmacovigilance_procedure
      typical_timeline_months: 4
  - input:
      reason: quality
    expect:
      article_type: other
      procedure_type: special_procedure
      typical_timeline_months: 9
  - input:
      reason: null
    expect:
      article_type: null
      procedure_type: null
      typical_timeline_months: null
  - input: {}
    expect:
      article_type: null
      procedure_type: null
      typical_timeline_months: null
persistence:
  save_to: brain.artifacts
  artifact_type: microgram_run
  retention_days: 90
  pii_scrub: true
  fields_persisted:
    - inputs
    - latency_ms
telemetry:
  emit:
    - invocation
    - verdict
    - latency_ms
    - error
  guardian_signal_on:
    - error
  cytokine_family: microgram.generic
  log_level: info
governance:
  sop_ref: null
  regulatory_ref: []
  harm_types: []
  review_cadence: quarterly
  tov_axioms:
    - decomposition
  approved_by: null
  approved_at: null
chain:
  upstream: []
  downstream: []
  parallel_safe: true
  idempotent: true
