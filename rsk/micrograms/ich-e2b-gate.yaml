name: ich-e2b-gate
description: "ICH E2B compliance: Electronic Transmission — E2B(R3)"
version: 0.1.0

tree:
  start: check
  nodes:
    check:
      type: "condition"
      variable: "e2b_compliant"
      operator: "eq"
      value: true
      true_next: "compliant"
      false_next: "gap"
    compliant:
      type: "return"
      value:
        guideline: "ICH E2B"
        compliant: true
        action: "proceed"
    gap:
      type: "return"
      value:
        guideline: "ICH E2B"
        compliant: false
        action: "remediate"
        gap: "e2b_compliant"

tests:
  - input: {"e2b_compliant": true}
    expect: {"compliant": true}
  - input: {}
    expect: {"compliant": false}
