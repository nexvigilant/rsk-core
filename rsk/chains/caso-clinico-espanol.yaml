name: caso-clinico-espanol
description: >
  Pipeline completo de evaluación de caso clínico en español.
  Fase 1: Desambiguación gramatical (presente → indicativo/subjuntivo).
  Fase 2: Clasificación temporal (ser/estar → transitorio/permanente).
  Fase 3: Ponderación epistémica (indicativo/subjuntivo → confianza).
  Fase 4: Evaluación de caso estándar (seriousness + expectedness).
  Full Spanish clinical case pipeline: grammar disambiguation →
  temporal classification → epistemic weighting → standard case assessment.
  Accumulate mode preserves all upstream Spanish enrichment fields
  alongside standard ICSR assessment outputs.
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - presente-desambiguacion
  - ser-estar-temporal-classifier
  - subjuntivo-confianza-epistemica
  - case-seriousness
  - transform-seriousness-to-bool
  - expectedness-check
  - transform-expectedness-to-bool
tests:
- name: "estar + indicativo + fatal inesperado — señal fuerte de RAM"
  input:
    # Spanish grammar inputs
    forma_verbal: "presenta"
    verbo: "está"
    sintoma: "con insuficiencia hepática aguda"
    modo_verbal: "indicativo"
    # Case assessment inputs
    death: true
    hospitalization: true
    disability: false
    life_threatening: true
    congenital_anomaly: false
    medically_important: true
    event_in_label: false
    event_class_in_label: false
  expect:
    # Spanish enrichment preserved via accumulate
    modo_resuelto: INDICATIVO
    clasificacion_temporal: TRANSITORIO
    confianza_epistemica: ALTA
    # Standard case assessment
    serious: true
    fatal: true
    unexpected: true
    expectedness: UNEXPECTED_NATURE

- name: "ser + subjuntivo + no grave esperado — señal débil, preexistente"
  input:
    forma_verbal: "presente"
    verbo_contexto: "dudo"
    verbo: "es"
    sintoma: "diabético"
    modo_verbal: "subjuntivo"
    death: false
    hospitalization: false
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: true
    severity_in_label: true
  expect:
    modo_resuelto: SUBJUNTIVO
    clasificacion_temporal: PERMANENTE
    confianza_epistemica: BAJA
    serious: false
    fatal: false
    unexpected: false
    expectedness: EXPECTED_LISTED

- name: "estar + duda + hospitalización — señal moderada con incertidumbre"
  input:
    forma_verbal: "cause"
    verbo_contexto: "espera"
    verbo: "estaba"
    sintoma: "con náuseas severas"
    modo_verbal: "padezca"
    death: false
    hospitalization: true
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: true
    event_class_in_label: true
  expect:
    modo_resuelto: SUBJUNTIVO
    clasificacion_temporal: TRANSITORIO
    confianza_epistemica: BAJA
    serious: true
    fatal: false
    unexpected: true
    expectedness: UNEXPECTED_SEVERITY
