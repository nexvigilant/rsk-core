name: suit-nervous-system
description: 'Full cross-subsystem chain: battery state → power routing → thermal management → comms link → security gate. The complete suit nervous system in one pipeline — sensor data flows through 5 decision trees in <50μs.'
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - soc-estimator
  - power-load-router
  - thermal-management-router
  - comms-link-router
  - comms-security-gate
tests:
- name: nominal operation — EKF fused, main bus, nominal thermal, 5G comms, full security
  input:
    voltage_v: 3.7
    current_a: 15
    temperature_c: 30
    previous_soc: 0.7
    load_state: moderate_load
    demand_kw: 5.0
    duration_s: 60
    locality: distributed
    zone: motor_controller
    range_km: 10
    data_rate_required: medium_bandwidth
    primary_5g_status: connected
    link_type: fiveg_modem
    mtls_active: true
    firmware_signed: true
    replay_nonce_valid: true
    certificate_pinned: true
  expect:
    method_used: ekf_fused
    source_tier: main_bus
    action: nominal
    selected_link: fiveg_modem
    verdict: pass
- name: emergency cascade — thermal critical forces aux power, satcom comms
  input:
    voltage_v: 3.8
    current_a: 5
    temperature_c: 65
    previous_soc: 0.8
    load_state: light_load
    demand_kw: 1.0
    duration_s: 10
    main_bus_status: failed
    zone: battery_pack
    range_km: 100
    data_rate_required: telemetry_only
    criticality: emergency
    airborne: true
    primary_5g_status: unavailable
    link_type: iridium_certus
    mtls_active: true
    firmware_signed: true
    replay_nonce_valid: true
    certificate_pinned: true
  expect:
    method_used: thermal_override
    source_tier: aux_lfp
    selected_link: iridium_certus
    verdict: pass
