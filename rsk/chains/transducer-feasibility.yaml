name: transducer-feasibility
description: 'Transducer classification → Casimir energy calculation → vacuum energy discrepancy context. Full physics pipeline from energy domain mapping through extraction feasibility to the 10^120 problem.'
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - transducer-classifier
  - casimir-energy-calculator
  - vacuum-energy-discrepancy
tests:
- name: piezoelectric through full chain
  input:
    input_energy: mechanical
    output_energy: electrical
    gap_nm: 50
    area_cm2: 1.0
    framework: casimir
  expect:
    transducer_class: piezoelectric
    feasibility_class: measurable_not_useful
    status: "CONFIRMS_FLUCTUATIONS_NOT_DENSITY"
- name: photovoltaic with QFT context
  input:
    input_energy: optical
    output_energy: electrical
    gap_nm: 1.0
    area_cm2: 1.0
    framework: qft
    cutoff_scale: planck
  expect:
    transducer_class: photovoltaic
    feasibility_class: enormous_but_one_shot
    discrepancy_orders: 122
