name: crystalbook-diagnostic-chain
description: 'Crystalbook diagnostic chain: 4-primitive conservation check → 8-law risk matrix. Accumulates outputs so the final result contains both primitive statuses and law statuses.'
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - crystalbook-4primitive
  - crystalbook-8law
tests:
- name: fully healthy system — all primitives present, all virtues high
  input:
    existence_evidence: 'Running process observed'
    boundary_description: 'Clear scope boundary'
    state_observation: 'Measured and current'
    void_identification: 'Known gaps documented'
    humility_score: 9
    charity_score: 8
  expect:
    conservation_holds: true
    degraded_count: 0
    diagnosis: CONSERVING
    law_i_status: SATISFIED
    law_ii_status: SATISFIED
    overall_health: HEALTHY

- name: non-existent system with zero scores — worst case
  input:
    humility_score: 0
    charity_score: 0
  expect:
    conservation_holds: false
    degraded_count: 4
    diagnosis: NON_EXISTENT
    law_i_status: VIOLATED
    law_ii_status: VIOLATED
    overall_health: CRITICAL

- name: stressed conservation with guarded laws
  input:
    existence_evidence: 'File exists'
    boundary_description: 'Module boundary'
    humility_score: 5
    charity_score: 6
  expect:
    conservation_holds: false
    degraded_count: 2
    diagnosis: LOSING_COHERENCE
    law_i_status: AT_RISK
    law_ii_status: AT_RISK
    overall_health: GUARDED
