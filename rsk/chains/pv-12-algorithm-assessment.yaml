name: pv-12-algorithm-assessment
description: "Full 12-algorithm PV signal assessment. Core chain (Algorithms 1-6: DEFINE→COMPARE→COMPOSE) + enrichment layer (Algorithms 7-12: ENERGY→CONVERGE→LOCATE→SEAL→SELECT). Accumulate mode preserves all outputs across steps."
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  # ── Core Signal Detection (Algorithms 1-6) ──
  - prr-signal                    # Alg 2 COMPARE: κ(observed, expected) → signal/noise
  - signal-to-causality           # Bridge: signal strength → causality input
  - naranjo-quick                 # Alg 6 COMPOSE: causality assessment
  - causality-to-action           # Alg 6 COMPOSE: regulatory action routing
  # ── Enrichment Layer (Algorithms 7-12) ──
  - algo-energy-measure           # Alg 7 ENERGY: N(→(Δς)) cascade potential
  - algo-converge-signal          # Alg 8 CONVERGE: fixpoint stability check
  - algo-void-scan                # Alg 9 VOID: κ(ς, ∅) gap detection
  - algo-locate-root-cause        # Alg 10 LOCATE: mechanism pathway narrowing
  - algo-seal-commitment          # Alg 11 SEAL: commitment readiness gate
  - algo-select-triage            # Alg 12 SELECT: differential survival verdict
tests:
- name: semaglutide_pancreatitis_full_assessment
  input:
    # Core chain inputs
    prr: 6.93
    naranjo_score: 4
    is_serious: true
    # Algo 7 ENERGY inputs
    downstream_consumers: 20
    state_change_magnitude: major
    component_persistence: established
    # Algo 8 CONVERGE inputs
    delta: 0.16
    tolerance_met: false
    iteration_count: 1
    max_iterations: 20
    # Algo 10 LOCATE inputs
    failure_layer: domain
    error_reproducible: true
    error_in_tests: true
    recent_change: false
    # Algo 11 SEAL inputs
    decision_defined: true
    perspectives_checked: 3
    evidence_sufficient: true
    reversibility_cost: expensive
    # Algo 9 VOID inputs
    has_disproportionality: true
    has_clinical_trial_data: true
    has_labeling_acknowledgment: true
    has_rechallenge_data: false
    has_dose_response: false
    has_time_to_onset: false
    has_class_comparison: false
    # Algo 12 SELECT inputs
    recurrence_count: 2068
    total_opportunities: 78284
    fitness_threshold: 0.01
    produces_correct_output: true
  expect:
    # Core chain outputs
    signal_detected: true
    causality: POSSIBLE
    regulatory_action: monitor
    deadline_days: 90
    # Enrichment outputs
    energy_class: critical
    gap_count: 4
    completeness: incomplete
    highest_value_gap: rechallenge_data
    seal_verdict: SEAL
    verdict: persist

- name: weak_signal_low_energy
  input:
    prr: 1.5
    naranjo_score: 0
    is_serious: false
    downstream_consumers: 2
    state_change_magnitude: minor
    component_persistence: volatile
    delta: 0.01
    tolerance_met: true
    iteration_count: 5
    max_iterations: 20
    failure_layer: unknown
    error_reproducible: false
    error_in_tests: false
    recent_change: false
    decision_defined: false
    perspectives_checked: 0
    evidence_sufficient: false
    reversibility_cost: trivial
    has_disproportionality: false
    has_clinical_trial_data: false
    has_labeling_acknowledgment: false
    has_rechallenge_data: false
    has_dose_response: false
    has_time_to_onset: false
    has_class_comparison: false
    recurrence_count: 3
    total_opportunities: 10000
    fitness_threshold: 0.01
    produces_correct_output: true
  expect:
    signal_detected: false
    regulatory_action: document
    energy_class: low
    gap_count: 4
    seal_verdict: BLOCK

- name: strong_converged_signal
  input:
    prr: 4.2
    naranjo_score: 7
    is_serious: true
    downstream_consumers: 15
    state_change_magnitude: major
    component_persistence: foundational
    delta: 0.02
    tolerance_met: true
    iteration_count: 8
    max_iterations: 20
    failure_layer: domain
    error_reproducible: true
    error_in_tests: true
    recent_change: true
    decision_defined: true
    perspectives_checked: 2
    evidence_sufficient: true
    reversibility_cost: impossible
    has_disproportionality: true
    has_clinical_trial_data: true
    has_labeling_acknowledgment: true
    has_rechallenge_data: true
    has_dose_response: true
    has_time_to_onset: true
    has_class_comparison: true
    recurrence_count: 500
    total_opportunities: 5000
    fitness_threshold: 0.05
    produces_correct_output: true
  expect:
    signal_detected: true
    causality: PROBABLE
    regulatory_action: expedited_report
    energy_class: critical
    gap_count: 0
    completeness: complete
    seal_verdict: SEAL
    verdict: persist
