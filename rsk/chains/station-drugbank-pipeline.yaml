name: station-drugbank-pipeline
description: "DrugBank DDI data → risk gate → causality routing. From get-interactions output to prescribing caution decision."
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - config-drugbank-ddi-gate
  - adapt-interaction-severity
  - signal-to-causality
tests:
- name: narrow therapeutic index drug → urgent causality
  input:
    interaction_count: 15
    cyp_inhibition: true
    narrow_ti_involved: true
  expect:
    risk_class: high_risk
    signal_detected: true
    priority: URGENT
    next_step: causality_assessment
- name: CYP inhibitor high density → urgent causality
  input:
    interaction_count: 25
    cyp_inhibition: true
    narrow_ti_involved: false
  expect:
    risk_class: high_risk
    signal_detected: true
    priority: URGENT
    next_step: causality_assessment
- name: minimal interactions → continue monitoring
  input:
    interaction_count: 3
  expect:
    risk_class: minimal
    signal_detected: false
    priority: LOW
    next_step: continue_monitoring
