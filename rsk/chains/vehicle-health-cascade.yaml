name: vehicle-health-cascade
description: "Vehicle health cascade: engine primitive classifier → organ signal adapter → anatomy bus output. Translates a chain boundary error into a health signal for the Anatomy system. The Observability layer of the vehicle architecture."
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - primitive-failure-classifier
  - rsk-organ-signal
tests:
- name: seal failure at step 2 — impaired organ signal
  input:
    error_type: ingress
    error_message: "Step 2 (signal-to-causality): ingress: Missing required input 'signal_strength' (expected: float)"
    step_index: 2
    ratio: 0.08
  expect:
    primitive: Seal
    mode: intake
    organ: rsk-engine
    organ_status: impaired
    signal_strength: 0.5

- name: convert failure — minor stress
  input:
    error_type: egress
    error_message: "Step 3 (naranjo-quick): egress: Missing required output 'causality_score'"
    step_index: 3
    ratio: 0.02
  expect:
    primitive: Convert
    mode: incomplete_conversion
    organ: rsk-engine
    organ_status: minor_stress
    signal_strength: 0.8

- name: clean engine — healthy signal
  input:
    error_type: ingress
    error_message: "Step 0: ingress: Missing required input 'prr'"
    step_index: 0
    ratio: 0
  expect:
    primitive: Seal
    organ: rsk-engine
    organ_status: healthy
    signal_strength: 1.0

- name: critical failure rate
  input:
    error_type: execution
    error_message: "evaluation failed"
    step_index: 1
    ratio: 0.25
  expect:
    primitive: Convert
    organ: rsk-engine
    organ_status: critical
    signal_strength: 0.2
