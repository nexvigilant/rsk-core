name: full-compliance-pipeline
description: 'End-to-end FDA/ICH compliance pipeline: ICSR validation -> case assessment -> signal-to-action -> Guardian bridge -> evidence mapping. Wires Layer 2 decision logic through Layer 3 Guardian integration to Layer 4 compliance tracking.'
version: 0.2.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - e2a-minimum-criteria
  - case-seriousness
  - transform-seriousness-to-bool
  - expectedness-check
  - transform-expectedness-to-bool
  - expedited-reporting
  - guardian-signal-bridge
  - compliance-evidence-mapper
tests:
- name: fatal unexpected premarket case - full pipeline critical path
  input:
    identifiable_reporter: true
    identifiable_patient: true
    suspected_drug: true
    adverse_event: true
    death: true
    hospitalization: false
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: false
    event_class_in_label: false
    study_type: premarket
  expect:
    valid_icsr: true
    serious: true
    fatal: true
    unexpected: true
    timeline: 7_CALENDAR_DAYS
    report_type: IND_SAFETY
    regulatory_reference: 21 CFR 312.32(c)(2)
    days_from_awareness: 7
    guardian_source: pv
    guardian_pattern: expedited_critical
    guardian_severity: 0.95
    control_id: ICH-E2A-2
    compliance_status: implemented
- name: serious unexpected postmarket case - 15-day expedited
  input:
    identifiable_reporter: true
    identifiable_patient: true
    suspected_drug: true
    adverse_event: true
    death: false
    hospitalization: true
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: false
    event_class_in_label: false
    study_type: postmarket
  expect:
    valid_icsr: true
    serious: true
    unexpected: true
    timeline: 15_CALENDAR_DAYS
    report_type: FIELD_ALERT
    regulatory_reference: 21 CFR 314.80
    days_from_awareness: 15
    guardian_source: pv
    guardian_pattern: expedited_high
    guardian_severity: 0.80
    control_id: ICH-E2A-2
    compliance_status: implemented
- name: non-serious expected case - periodic line listing
  input:
    identifiable_reporter: true
    identifiable_patient: true
    suspected_drug: true
    adverse_event: true
    death: false
    hospitalization: false
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: true
    severity_in_label: true
    study_type: postmarket
  expect:
    valid_icsr: true
    serious: false
    unexpected: false
    timeline: PERIODIC
    report_type: LINE_LISTING
    days_from_awareness: 90
    guardian_source: pv
    guardian_pattern: document_only
    guardian_severity: 0.15
    control_id: ICH-E2A-3
    compliance_status: partial
- name: invalid ICSR - missing reporter blocks pipeline
  input:
    identifiable_reporter: false
    identifiable_patient: true
    suspected_drug: true
    adverse_event: true
    death: true
    hospitalization: false
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: false
    study_type: premarket
  expect:
    valid_icsr: false
    missing_elements: IDENTIFIABLE_REPORTER
