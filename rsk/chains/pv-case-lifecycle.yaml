name: pv-case-lifecycle
description: "Case seriousness → reporting deadline → workflow routing. The case management molecular chain."
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - case-seriousness
  - seriousness-to-deadline
  - full-case-router
tests:
  - name: serious_hospitalization
    input:
      death: false
      life_threatening: false
      hospitalization: true
      disability: false
      congenital_anomaly: false
      medically_important: false
    expect:
      is_serious: true
  - name: non_serious
    input:
      death: false
      life_threatening: false
      hospitalization: false
      disability: false
      congenital_anomaly: false
      medically_important: false
    expect:
      is_serious: false
