name: spanglish-clinical-pipeline
description: >
  Pipeline de evaluación clínica Spanglish. Detecta cambios de código,
  extrae la señal temporal del verbo español, y evalúa seriedad/expectedness.
  Step 1: Detect code-switch pattern and extract Spanish verb frame.
  Step 2: Classify temporal signal from extracted verb.
  Step 3: Weight epistemic confidence from verb mood.
  Step 4-7: Standard ICH E2A case assessment.
  The code-switch confidence_boost carries through accumulate —
  Spanglish estar-frame signals get +20 relevance over pure English.
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - spanglish-code-switch-detector
  - ser-estar-temporal-classifier
  - subjuntivo-confianza-epistemica
  - case-seriousness
  - transform-seriousness-to-bool
  - expectedness-check
  - transform-expectedness-to-bool
tests:
- name: "estar Spanglish + serious + unexpected → full escalation with confidence boost"
  input:
    text_fragment: "Está feeling very dizzy and confused"
    verbo: "está"
    modo_verbal: "tiene"
    death: false
    hospitalization: true
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: true
    event_in_label: false
    event_class_in_label: false
  expect:
    pattern: ESTAR_FRAME
    temporal_signal: TRANSIENT
    confidence_boost: 20
    clasificacion_temporal: TRANSITORIO
    confianza_epistemica: ALTA
    serious: true
    unexpected: true

- name: "ser Spanglish + not serious + expected → no escalation"
  input:
    text_fragment: "Patient es diabetic"
    verbo: "es"
    modo_verbal: "indicativo"
    death: false
    hospitalization: false
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: true
    severity_in_label: true
  expect:
    pattern: SER_FRAME
    temporal_signal: PERMANENT
    confidence_boost: 0
    clasificacion_temporal: PERMANENTE
    serious: false

- name: "pure English + serious → no grammar boost"
  input:
    text_fragment: "Patient reported severe hepatotoxicity"
    verbo: "está"
    modo_verbal: "indicativo"
    death: false
    hospitalization: true
    disability: false
    life_threatening: true
    congenital_anomaly: false
    medically_important: true
    event_in_label: false
    event_class_in_label: false
  expect:
    pattern: ENGLISH_ONLY
    confidence_boost: 0
    serious: true
    unexpected: true
