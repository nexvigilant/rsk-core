name: helix-system-health
description: 'Full helix system health chain: heligram conservation check → crystalbook 4-primitive → crystalbook 8-law. Produces conservation scores, primitive health, law compliance, and helix advancement gate in one pass.'
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - heligram
  - crystalbook-4primitive
  - crystalbook-8law
tests:
- name: strong system with all primitives
  input:
    boundary: 0.9
    state: 0.8
    void: 0.7
    existence_evidence: 'Measured and verified'
    boundary_description: 'Sharp boundary'
    state_observation: 'Rich state'
    void_identification: 'Clear void'
    humility_score: 9
    charity_score: 8
  expect:
    existence_class: strong
    can_advance_to_1: true
    conservation_holds: true

- name: weak state collapses
  input:
    boundary: 0.95
    state: 0.05
    void: 0.6
    humility_score: 3
    charity_score: 3
  expect:
    existence_class: collapsing
    can_advance_to_1: false
