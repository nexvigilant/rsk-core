name: drug-tirzepatide-pipeline
description: "Full signal pipeline for tirzepatide: profile → signal detection → causality routing"
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - drug-profile-tirzepatide
  - prr-signal
  - signal-to-causality
tests:
  - name: signal detected
    input:
      prr: 4.0
      case_count: 100
      serious_pct: 0.6
    expect:
      risk_level: HIGH
      signal_detected: true
      next_step: causality_assessment
