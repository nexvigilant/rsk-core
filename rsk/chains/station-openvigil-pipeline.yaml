name: station-openvigil-pipeline
description: "OpenVigil disproportionality → signal triage → causality routing. Full pipeline from compute-disproportionality output to causality assessment decision."
version: 0.1.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - config-openvigil-triage
  - adapt-signal-strength
  - signal-to-causality
tests:
- name: strong signal (PRR CI > 2, ROR CI > 2) → urgent causality
  input:
    prr: 4.5
    prr_ci_lower: 3.1
    ror: 5.2
    ror_ci_lower: 3.5
    ic: 2.1
    case_count: 85
  expect:
    signal_strength: strong
    signal_detected: true
    priority: URGENT
    next_step: causality_assessment
- name: moderate signal (PRR CI > 1) → standard causality
  input:
    prr: 2.1
    prr_ci_lower: 1.3
    ror: 2.0
    ror_ci_lower: 1.1
    ic: 0.8
    case_count: 20
  expect:
    signal_strength: moderate
    signal_detected: true
    priority: STANDARD
    next_step: causality_assessment
- name: no signal (PRR < 1) → continue monitoring
  input:
    prr: 0.8
    prr_ci_lower: 0.4
    ror: 0.9
    ror_ci_lower: 0.5
    ic: -0.2
    case_count: 30
  expect:
    signal_strength: none
    signal_detected: false
    priority: LOW
    next_step: continue_monitoring
- name: insufficient data (< 3 cases) → continue monitoring
  input:
    prr: 1.2
    prr_ci_lower: 0.3
    case_count: 2
  expect:
    signal_strength: none
    signal_detected: false
    priority: LOW
    next_step: continue_monitoring
