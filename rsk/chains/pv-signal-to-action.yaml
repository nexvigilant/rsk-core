name: pv-signal-to-action
description: 'Core PV workflow: PRR signal detection → causality bridge → Naranjo assessment → regulatory action routing. Uses accumulate mode to preserve is_serious through mid-chain steps.'
version: 0.2.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - prr-signal
  - signal-to-causality
  - naranjo-quick
  - causality-to-action
tests:
- name: serious case with probable causality — expedited 15-day report
  input:
    prr: 8.5
    naranjo_score: 7
    is_serious: true
  expect:
    regulatory_action: expedited_report
    deadline_days: 15
    causality: PROBABLE
- name: serious case with definite causality — 7-day expedited
  input:
    prr: 3.0
    naranjo_score: 10
    is_serious: true
  expect:
    regulatory_action: expedited_report
    deadline_days: 7
    causality: DEFINITE
- name: non-serious with possible causality — periodic report
  input:
    prr: 2.5
    naranjo_score: 3
    is_serious: false
  expect:
    causality: POSSIBLE
    regulatory_action: monitor
    deadline_days: 90
- name: weak signal below PRR threshold — document only
  input:
    prr: 1.5
    naranjo_score: 0
  expect:
    regulatory_action: document
    deadline_days: 0
