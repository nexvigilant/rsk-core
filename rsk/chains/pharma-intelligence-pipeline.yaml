name: pharma-intelligence-pipeline
description: "Full pharma competitive intelligence chain: portfolio triage → safety signal classification → competitive rank. Produces portfolio tier, monitoring frequency, and competitive position in a single pass."
version: "1.0"
micrograms_dir: ../micrograms
accumulate: true
steps:
  - pharma-portfolio-triage
  - pharma-safety-signal
  - pharma-competitive-rank
tests:
  - name: "Large pharma dominant competitor — deep continuous monitoring"
    input:
      company_key: "pfizer"
      portfolio_size: 80
      total_faers_reports: 3000000
      top_reaction_count: 200000
      relative_ratio: 4.5
    expect:
      portfolio_tier: "large_portfolio"
      recommended_depth: "deep"
      signal_tier: "high_signal_volume"
      monitoring_frequency: "continuous"
      competitive_position: "dominant_reporter"
  - name: "Mid pharma peer competitor — standard weekly monitoring"
    input:
      company_key: "jazz-pharma"
      portfolio_size: 30
      total_faers_reports: 250000
      top_reaction_count: 15000
      relative_ratio: 1.8
    expect:
      portfolio_tier: "mid_portfolio"
      recommended_depth: "standard"
      signal_tier: "moderate_signal_volume"
      monitoring_frequency: "weekly"
      competitive_position: "peer_reporter"
  - name: "Niche pharma minor reporter — focused monthly monitoring"
    input:
      company_key: "ultragenyx"
      portfolio_size: 6
      total_faers_reports: 8000
      top_reaction_count: 400
      relative_ratio: 0.3
    expect:
      portfolio_tier: "niche_portfolio"
      recommended_depth: "focused"
      signal_tier: "low_signal_volume"
      monitoring_frequency: "monthly"
      competitive_position: "minor_reporter"
