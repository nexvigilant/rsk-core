name: confidence-deadline
description: 'Confidence gating → deadline alert routing. Routes from assessment confidence level to reporting urgency classification.'
version: 0.2.0
micrograms_dir: ../micrograms
accumulate: true
steps:
  - confidence-gate
  - deadline-alert
tests:
- name: high confidence with 15-day deadline — action required
  input:
    confidence: 90
    deadline_days: 15
  expect:
    actionable: true
    confidence_level: HIGH
    alert_level: ACTION
- name: low confidence with 90-day deadline — routine
  input:
    confidence: 30
    deadline_days: 90
  expect:
    actionable: false
    confidence_level: LOW
    alert_level: ROUTINE
