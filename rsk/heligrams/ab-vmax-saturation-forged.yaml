name: ab-vmax-saturation-helix
description: 'Forged from microgram ''ab-vmax-saturation''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    threat: falsified
sense:
  tree:
    start: check_km_valid
    nodes:
      clean:
        type: return
        value:
          threat: false
          response: 'PASS: substrate within linear range relative to Km'
          saturation_ratio: low
          predicted_effect_pct: <50
      check_very_large:
        type: condition
        variable: km
        operator: lt
        value: 100
        true_next: approaching
        false_next: clean
      approaching:
        type: return
        value:
          threat: false
          saturation_ratio: moderate
          predicted_effect_pct: 50-90
          response: 'WARN: substrate elevated relative to Km — approaching saturation. Monitor dose-response linearity.'
      saturated:
        type: return
        value:
          response: 'BLOCK: substrate >> Km — system saturated at Vmax. Additional dose yields no additional effect, only toxicity risk.'
          predicted_effect_pct: '>90'
          saturation_ratio: high
          threat: true
      check_large_km_vs_km:
        type: condition
        variable: km
        operator: lt
        value: 10
        true_next: saturated
        false_next: check_very_large
      check_sat_10x:
        type: condition
        variable: substrate_concentration
        operator: gt
        value: 0
        true_next: check_ratio_high
        false_next: no_substrate
      check_small_km_moderate:
        type: condition
        variable: substrate_concentration
        operator: gt
        value: 1
        true_next: approaching
        false_next: clean
      no_substrate:
        type: return
        value:
          response: 'PASS: no substrate present — zero effect expected'
          predicted_effect_pct: '0'
          threat: false
          saturation_ratio: '0'
      check_mod_vs_km:
        type: condition
        variable: km
        operator: lt
        value: 1
        true_next: saturated
        false_next: clean
      check_zero_substrate:
        type: condition
        variable: substrate_concentration
        operator: lte
        value: 0
        true_next: no_substrate
        false_next: check_saturated
      check_km_valid:
        type: condition
        variable: km
        operator: lte
        value: 0
        true_next: invalid_km
        false_next: check_zero_substrate
      check_saturated:
        type: condition
        variable: saturation_threshold
        operator: lte
        value: 5
        true_next: check_sat_5x
        false_next: check_sat_10x
      check_moderate_substrate:
        type: condition
        variable: substrate_concentration
        operator: gt
        value: 10
        true_next: check_mod_vs_km
        false_next: clean
      invalid_km:
        type: return
        value:
          threat: true
          response: 'BLOCK: Km <= 0 — Michaelis constant must be positive'
          saturation_ratio: undefined
          predicted_effect_pct: undefined
      check_small_km:
        type: condition
        variable: substrate_concentration
        operator: gt
        value: 10
        true_next: saturated
        false_next: check_small_km_moderate
      check_ratio_high:
        type: condition
        variable: km
        operator: lt
        value: 1
        true_next: check_small_km
        false_next: check_large_km
      check_large_km:
        type: condition
        variable: substrate_concentration
        operator: gte
        value: 100
        true_next: check_large_km_vs_km
        false_next: check_moderate_substrate
      check_sat_5x:
        type: condition
        variable: substrate_concentration
        operator: gt
        value: 0
        true_next: check_ratio_high
        false_next: no_substrate
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: km
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: km
        operator: gt
        value: 0
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      threat: true
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      threat: true
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when:
      threat: false
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: absent
      confidence: high
  - when:
      threat: false
      falsified: true
    default: null
    emit:
      confidence: medium
      confidence_score: 0.42
      verdict: refuted
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      saturation_threshold:
        type: number
        required: true
      km:
        type: number
        required: true
      substrate_concentration:
        type: number
        required: true
    outputs:
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      threat:
        type: boolean
        required: false
      response:
        type: string
        required: false
      predicted_effect_pct:
        type: string
        required: false
      saturation_ratio:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    substrate_concentration: 10
    km: null
    saturation_threshold: 10
  expect:
    confidence: high
    verdict: absent
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    substrate_concentration: 10
    km: 0
    saturation_threshold: 10
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
