name: station-helix-pipeline-helix
description: 'Forged from microgram ''station-helix-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    reason: falsified
sense:
  tree:
    start: check_turns
    nodes:
      check_turns:
        type: condition
        variable: turns_completed
        operator: gte
        value: 5
        true_next: check_mutualism
        false_next: incomplete
      incomplete:
        type: return
        value:
          reason: Helix encoding incomplete — fewer than 5 turns
          route: helix_continuation
          action: continue
          priority: moderate
      check_mutualism:
        type: condition
        variable: mutualism_pass
        operator: eq
        value: true
        true_next: complete
        false_next: mutualism_fail
      complete:
        type: return
        value:
          action: certify
          route: archive
          priority: low
          reason: 5-turn helix complete with mutualism — knowledge encoded
      mutualism_fail:
        type: return
        value:
          reason: Helix complete but mutualism test failed — knowledge serves self only
          route: mutualism_revision
          action: revise
          priority: high
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: turns_completed
        operator: lt
        value: 5
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: turns_completed
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      turns_completed:
        type: integer
        required: false
    outputs:
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    mutualism_pass: true
    turns_completed: 15
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    mutualism_pass: true
    turns_completed: 4
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
