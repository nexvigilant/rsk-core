name: trend-lag-long-helix
description: 'Forged from microgram ''trend-lag-long''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    detected: falsified
sense:
  tree:
    start: check
    nodes:
      detected:
        type: return
        value:
          detected: true
          pattern: chronic
          action: investigate
      check:
        type: condition
        variable: median_onset_days
        operator: gte
        value: 90
        true_next: detected
        false_next: not_detected
      not_detected:
        type: return
        value:
          action: continue_monitoring
          pattern: chronic
          detected: false
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: median_onset_days
        operator: lt
        value: 90
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_negation:
        type: condition
        variable: median_onset_days
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      detected: true
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      detected: true
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when:
      falsified: false
      detected: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: absent
      confidence: high
  - when:
      detected: false
      falsified: true
    default: null
    emit:
      confidence: medium
      verdict: refuted
      confidence_score: 0.42
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      median_onset_days:
        type: integer
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    median_onset_days: null
  expect:
    confidence: high
    verdict: absent
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    median_onset_days: 90
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
