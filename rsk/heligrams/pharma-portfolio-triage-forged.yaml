name: pharma-portfolio-triage-helix
description: 'Forged from microgram ''pharma-portfolio-triage''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    recommended_depth: falsified
sense:
  tree:
    start: check_large
    nodes:
      return_large:
        type: return
        value:
          recommended_depth: deep
          portfolio_tier: large_portfolio
      check_large:
        type: condition
        variable: portfolio_size
        operator: gte
        value: 50
        true_next: return_large
        false_next: check_mid
      check_mid:
        type: condition
        variable: portfolio_size
        operator: gte
        value: 20
        true_next: return_mid
        false_next: return_niche
      return_mid:
        type: return
        value:
          portfolio_tier: mid_portfolio
          recommended_depth: standard
      return_niche:
        type: return
        value:
          recommended_depth: focused
          portfolio_tier: niche_portfolio
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: portfolio_size
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: portfolio_size
        operator: lt
        value: 50
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      portfolio_size:
        type: int
        required: false
      company_key:
        type: string
        required: false
    outputs:
      recommended_depth:
        type: string
        required: false
      verdict:
        type: string
        required: false
      portfolio_tier:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    company_key: pfizer
    portfolio_size: 60
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    company_key: pfizer
    portfolio_size: 49
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
