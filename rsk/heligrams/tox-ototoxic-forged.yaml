name: tox-ototoxic-helix
description: 'Forged from microgram ''tox-ototoxic''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    organ: falsified
sense:
  tree:
    start: check_severe
    nodes:
      check_mild:
        type: condition
        variable: hearing_loss_db
        operator: gte
        value: 15
        true_next: mild
        false_next: normal
      normal:
        type: return
        value:
          organ: ototoxic
          target: ear
          action: continue
          severity: normal
      severe:
        type: return
        value:
          severity: severe
          organ: ototoxic
          action: discontinue
          target: ear
      mild:
        type: return
        value:
          severity: mild
          organ: ototoxic
          target: ear
          action: monitor_closely
      check_severe:
        type: condition
        variable: hearing_loss_db
        operator: gte
        value: 25
        true_next: severe
        false_next: check_mild
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: hearing_loss_db
        operator: lt
        value: 25
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: hearing_loss_db
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      hearing_loss_db:
        type: integer
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    hearing_loss_db: 35
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    hearing_loss_db: 24
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
