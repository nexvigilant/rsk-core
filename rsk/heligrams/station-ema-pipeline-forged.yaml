name: station-ema-pipeline-helix
description: 'Forged from microgram ''station-ema-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    reason: falsified
sense:
  tree:
    start: check_source
    nodes:
      signal_path:
        type: condition
        variable: signal_confirmed
        operator: eq
        value: true
        true_next: confirmed_signal
        false_next: unconfirmed_signal
      unconfirmed_signal:
        type: return
        value:
          reason: EMA unconfirmed signal — run disproportionality analysis
          action: validate
          priority: moderate
          route: signal_validation
      check_source:
        type: condition
        variable: source_type
        operator: eq
        value: signal
        true_next: signal_path
        false_next: check_psur
      confirmed_signal:
        type: return
        value:
          reason: EMA confirmed signal — cross-reference with FAERS and VigiBase
          action: investigate
          priority: high
          route: signal_investigation
      psur_routine:
        type: return
        value:
          priority: low
          reason: PSUR routine — no benefit-risk change detected
          action: review
          route: periodic_review
      psur_path:
        type: condition
        variable: benefit_risk_changed
        operator: eq
        value: true
        true_next: psur_urgent
        false_next: psur_routine
      check_psur:
        type: condition
        variable: source_type
        operator: eq
        value: psur
        true_next: psur_path
        false_next: epar_path
      epar_path:
        type: return
        value:
          route: label_comparison
          action: review
          priority: low
          reason: EPAR data — extract safety section for baseline comparison
      psur_urgent:
        type: return
        value:
          reason: PSUR shows changed benefit-risk — immediate regulatory review
          priority: critical
          route: benefit_risk_assessment
          action: escalate
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: signal_confirmed
        operator: neq
        value: signal
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_negation:
        type: condition
        variable: signal_confirmed
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      signal_confirmed:
        type: string
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    source_type: signal
    signal_confirmed: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    source_type: signal
    signal_confirmed: __negated__
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
