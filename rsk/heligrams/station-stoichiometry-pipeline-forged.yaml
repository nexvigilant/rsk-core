name: station-stoichiometry-pipeline-helix
description: 'Forged from microgram ''station-stoichiometry-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    route: falsified
sense:
  tree:
    start: check_balanced
    nodes:
      clean:
        type: return
        value:
          route: archive
          reason: Balanced, no isomer ambiguity — proceed
          action: pass
          priority: low
      check_isomer:
        type: condition
        variable: has_isomers
        operator: eq
        value: true
        true_next: isomer_alert
        false_next: clean
      unbalanced:
        type: return
        value:
          reason: Unbalanced formula — stoichiometric error in reaction
          action: reject
          priority: high
          route: chemistry_review
      isomer_alert:
        type: return
        value:
          route: isomer_review
          priority: moderate
          action: flag
          reason: Isomers detected — verify correct stereoisomer for safety profile
      check_balanced:
        type: condition
        variable: is_balanced
        operator: eq
        value: true
        true_next: check_isomer
        false_next: unbalanced
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: has_isomers
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: has_isomers
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      has_isomers:
        type: bool
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    has_isomers: null
    is_balanced: false
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    has_isomers: false
    is_balanced: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
