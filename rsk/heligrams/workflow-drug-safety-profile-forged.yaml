name: workflow-drug-safety-profile-helix
description: 'Forged from microgram ''workflow-drug-safety-profile''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    chain: falsified
sense:
  tree:
    start: check_marketed
    nodes:
      premarket_path:
        type: condition
        variable: has_trials
        operator: eq
        value: true
        true_next: trial_path
        false_next: preclinical_path
      marketed_path:
        type: return
        value:
          chain: openfda → drugbank → dailymed → eudravigilance → vigiaccess → calculation
          sources: 6
          profile: post_market
      trial_path:
        type: return
        value:
          profile: clinical_trial
          chain: clinicaltrials → chemivigilance → molecular-weight → benefit-risk
          sources: 4
      check_marketed:
        type: condition
        variable: is_marketed
        operator: eq
        value: true
        true_next: marketed_path
        false_next: premarket_path
      preclinical_path:
        type: return
        value:
          sources: 4
          chain: chemivigilance → molecular-weight → bicone → drugbank
          profile: preclinical
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: has_trials
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: has_trials
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      has_trials:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    has_trials: null
    is_marketed: false
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    has_trials: false
    is_marketed: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
