name: lifecycle-status-classifier-helix
description: 'Forged from microgram ''lifecycle-status-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    description: falsified
sense:
  tree:
    start: check_new
    nodes:
      check_archived:
        type: condition
        variable: current_state
        operator: eq
        value: archived
        true_next: action_audit
        false_next: action_unknown
      check_suspended:
        type: condition
        variable: current_state
        operator: eq
        value: suspended
        true_next: action_review
        false_next: check_archived
      action_initialize:
        type: return
        value:
          description: New entity - run initialization and validation before activating
          action: INITIALIZE
      action_audit:
        type: return
        value:
          action: AUDIT_ONLY
          description: Archived entity - read-only access for audit and compliance purposes
      check_active:
        type: condition
        variable: current_state
        operator: eq
        value: active
        true_next: action_process
        false_next: check_suspended
      action_review:
        type: return
        value:
          description: Suspended entity - requires manual review before reactivation or archiving
          action: REVIEW
      check_new:
        type: condition
        variable: current_state
        operator: eq
        value: new
        true_next: action_initialize
        false_next: check_active
      action_process:
        type: return
        value:
          description: Active entity - process normally through standard workflow
          action: PROCESS
      action_unknown:
        type: return
        value:
          action: ERROR
          description: Unknown lifecycle state - manual intervention required
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: current_state
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: current_state
        operator: neq
        value: new
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      current_state:
        type: string
        required: false
    outputs:
      description:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      action:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    current_state: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    current_state: __negated__
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
