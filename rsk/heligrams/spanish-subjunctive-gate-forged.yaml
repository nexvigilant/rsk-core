name: spanish-subjunctive-gate-helix
description: 'Forged from microgram ''spanish-subjunctive-gate''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    reason: falsified
sense:
  tree:
    start: check_factual_present
    nodes:
      check_emotion:
        type: condition
        variable: expresses_emotion
        operator: eq
        value: true
        true_next: subjunctive_emotion
        false_next: check_command
      check_factual_present:
        type: condition
        variable: is_factual
        operator: is_null
        value: null
        true_next: reject_missing
        false_next: check_factual
      check_factual:
        type: condition
        variable: is_factual
        operator: eq
        value: true
        true_next: indicative
        false_next: check_doubt
      subjunctive_command:
        type: return
        value:
          reason: Command or recommendation — subjunctive required
          mnemonic: 'WEIRDO: R = Recommendations'
          mood: subjunctive
      check_doubt:
        type: condition
        variable: expresses_doubt
        operator: eq
        value: true
        true_next: subjunctive_doubt
        false_next: check_desire
      reject_missing:
        type: return
        value:
          mood: REJECTED
          mnemonic: N/A
          reason: 'REJECTED: is_factual is required'
      check_desire:
        type: condition
        variable: expresses_desire
        operator: eq
        value: true
        true_next: subjunctive_desire
        false_next: check_emotion
      subjunctive_doubt:
        type: return
        value:
          mood: subjunctive
          reason: Expresses doubt — subjunctive required
          mnemonic: 'WEIRDO: D = Doubt'
      check_command:
        type: condition
        variable: is_command
        operator: eq
        value: true
        true_next: subjunctive_command
        false_next: indicative_default
      indicative_default:
        type: return
        value:
          reason: No subjunctive trigger detected — default to indicative
          mnemonic: 'WEIRDO: Wishes, Emotions, Impersonal, Recommendations, Doubt, Ojala'
          mood: indicative
      subjunctive_desire:
        type: return
        value:
          mnemonic: 'WEIRDO: W = Wishes'
          mood: subjunctive
          reason: Expresses desire — subjunctive required
      indicative:
        type: return
        value:
          reason: Factual statement — use indicative
          mood: indicative
          mnemonic: WEIRDO does not apply to facts
      subjunctive_emotion:
        type: return
        value:
          mood: subjunctive
          reason: Expresses emotion — subjunctive required
          mnemonic: 'WEIRDO: E = Emotions'
antisense:
  tree:
    start: check_negation
    nodes:
      check_negation:
        type: condition
        variable: expresses_emotion
        operator: is_not_null
        value: null
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      expresses_emotion:
        type: bool
        required: false
      expresses_desire:
        type: bool
        required: false
      expresses_doubt:
        type: bool
        required: false
      is_command:
        type: bool
        required: false
      is_factual:
        type: bool
        required: false
    outputs:
      mnemonic:
        type: string
        required: false
      verdict:
        type: string
        required: false
      reason:
        type: string
        required: false
      confidence:
        type: string
        required: false
      mood:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    is_factual: false
    is_command: false
    expresses_emotion: null
    expresses_doubt: true
    expresses_desire: false
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    is_factual: false
    is_command: false
    expresses_emotion: null
    expresses_doubt: true
    expresses_desire: false
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
