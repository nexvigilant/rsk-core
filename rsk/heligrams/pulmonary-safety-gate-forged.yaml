name: pulmonary-safety-gate-helix
description: 'Forged from microgram ''pulmonary-safety-gate''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    severity: falsified
sense:
  tree:
    start: check_resp_failure
    nodes:
      check_bronchospasm:
        type: condition
        variable: reaction_pt
        operator: contains
        value: BRONCHOSPASM
        true_next: moderate
        false_next: mild
      check_ild:
        type: condition
        variable: reaction_pt
        operator: contains
        value: INTERSTITIAL LUNG DISEASE
        true_next: serious
        false_next: check_fibrosis
      critical:
        type: return
        value:
          severity: critical
          soc: Respiratory, thoracic and mediastinal disorders
          action: immediate_expedited_report
      check_ards:
        type: condition
        variable: reaction_pt
        operator: contains
        value: ACUTE RESPIRATORY DISTRESS
        true_next: critical
        false_next: check_ild
      serious:
        type: return
        value:
          severity: serious
          action: expedited_report
          soc: Respiratory, thoracic and mediastinal disorders
      check_resp_failure:
        type: condition
        variable: reaction_pt
        operator: contains
        value: RESPIRATORY FAILURE
        true_next: critical
        false_next: check_ards
      check_fibrosis:
        type: condition
        variable: reaction_pt
        operator: contains
        value: PULMONARY FIBROSIS
        true_next: serious
        false_next: check_pneumonitis
      mild:
        type: return
        value:
          soc: Respiratory, thoracic and mediastinal disorders
          severity: mild
          action: routine_surveillance
      moderate:
        type: return
        value:
          severity: moderate
          soc: Respiratory, thoracic and mediastinal disorders
          action: monitor_and_assess
      check_pneumonitis:
        type: condition
        variable: reaction_pt
        operator: contains
        value: PNEUMONITIS
        true_next: serious
        false_next: check_bronchospasm
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: reaction_pt
        operator: not_contains
        value: RESPIRATORY FAILURE
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: reaction_pt
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      reaction_pt:
        type: string
        required: true
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      soc:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      action:
        type: string
        required: false
      severity:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    reaction_pt: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
