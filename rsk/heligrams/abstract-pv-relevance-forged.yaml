name: abstract-pv-relevance-helix
description: 'Forged from microgram ''abstract-pv-relevance''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    pv_relevant: falsified
sense:
  tree:
    start: validate_title
    nodes:
      validate_study_type:
        type: condition
        variable: study_type
        operator: is_not_null
        value: null
        true_next: check_pv_keywords
        false_next: missing_input
      high_relevance:
        type: return
        value:
          pv_relevant: true
          recommended_action: prioritize_review
          relevance_score: 9
      missing_input:
        type: return
        value:
          pv_relevant: false
          relevance_score: 0
          recommended_action: request_complete_data
      check_pv_keywords:
        type: condition
        variable: title
        operator: matches
        value: (?i)(adverse|safety|toxicity|side effect|pharmacovigilance|signal|pharmacoepidemiology)
        true_next: high_relevance
        false_next: check_clinical_study
      low_relevance:
        type: return
        value:
          pv_relevant: false
          recommended_action: defer_or_skip
          relevance_score: 3
      validate_keywords:
        type: condition
        variable: has_adverse_keyword
        operator: is_not_null
        value: null
        true_next: validate_study_type
        false_next: missing_input
      check_clinical_study:
        type: condition
        variable: study_type
        operator: matches
        value: (?i)(trial|observational|cohort|case.report)
        true_next: medium_relevance
        false_next: low_relevance
      medium_relevance:
        type: return
        value:
          pv_relevant: true
          recommended_action: standard_review
          relevance_score: 6
      validate_title:
        type: condition
        variable: title
        operator: is_not_null
        value: null
        true_next: validate_keywords
        false_next: missing_input
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: study_type
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: study_type
        operator: is_null
        value: null
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      pv_relevant: true
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      pv_relevant: true
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when:
      pv_relevant: false
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: absent
  - when:
      pv_relevant: false
      falsified: true
    default: null
    emit:
      confidence_score: 0.42
      verdict: refuted
      confidence: medium
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      study_type:
        type: any
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    title: adverse
    has_adverse_keyword: ZZZZZ_NO_MATCH
    study_type: null
  expect:
    verdict: absent
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    has_adverse_keyword: ZZZZZ_NO_MATCH
    study_type: ZZZZZ_NO_MATCH
    title: adverse
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
