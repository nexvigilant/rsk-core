name: ab-cortisol-saturation-helix
description: 'Forged from microgram ''ab-cortisol-saturation''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    threat: falsified
sense:
  tree:
    start: check
    nodes:
      check:
        type: condition
        variable: cortisol_level
        operator: gt
        value: 0.8
        true_next: overload
        false_next: check_elevated
      warn:
        type: return
        value:
          threat: false
          response: 'WARN: cortisol elevated (0.6-0.8) — approaching burnout threshold'
      check_elevated:
        type: condition
        variable: cortisol_level
        operator: gt
        value: 0.6
        true_next: warn
        false_next: clean
      clean:
        type: return
        value:
          response: PASS
          threat: false
      overload:
        type: return
        value:
          threat: true
          response: 'BLOCK: cortisol > 0.8 — allostatic overload, reduce stimuli'
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: cortisol_level
        operator: lte
        value: 0.8
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: cortisol_level
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      threat: true
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
      threat: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when:
      falsified: false
      threat: false
    default: null
    emit:
      confidence: high
      verdict: absent
      confidence_score: 0.7
  - when:
      falsified: true
      threat: false
    default: null
    emit:
      confidence: medium
      confidence_score: 0.42
      verdict: refuted
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      cortisol_level:
        type: number
        required: true
    outputs:
      confidence_score:
        type: float
        required: false
      threat:
        type: boolean
        required: false
      response:
        type: string
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    cortisol_level: null
  expect:
    confidence: high
    verdict: absent
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    cortisol_level: 0.9
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
