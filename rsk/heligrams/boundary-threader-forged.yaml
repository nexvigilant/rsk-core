name: boundary-threader-helix
description: 'Forged from microgram ''boundary-threader''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    threading_status: falsified
sense:
  tree:
    start: check_streams
    nodes:
      check_streams:
        type: condition
        variable: stream_count
        operator: gte
        value: 1
        true_next: check_boundary
        false_next: no_streams
      pharmacy_boundary:
        type: return
        value:
          threading_status: atomic_resolved
          denominator_type: counted
          precision_tier: ground_node
          warning: none
          verification_level: maximum
          analytical_capability: Individual pharmacy incidence, ground-truth denominator, maximum resolution, upward reconciliation through all levels
      check_boundary:
        type: condition
        variable: boundary_type
        operator: eq
        value: national
        true_next: national_boundary
        false_next: check_state
      check_zip:
        type: condition
        variable: boundary_type
        operator: eq
        value: zip
        true_next: zip_boundary
        false_next: check_pharmacy
      custom_temporal:
        type: return
        value:
          denominator_type: estimated
          precision_tier: custom
          analytical_capability: Custom boundary with temporal windowing, Weber effect detection, drift analysis
          warning: Custom boundaries require manual reconciliation with standard hierarchy levels.
          threading_status: custom_threaded
          verification_level: moderate
      check_state:
        type: condition
        variable: boundary_type
        operator: eq
        value: state
        true_next: state_boundary
        false_next: check_chain
      zip_npi:
        type: return
        value:
          threading_status: npi_resolved
          denominator_type: counted
          warning: none
          precision_tier: catchment
          analytical_capability: Catchment-level incidence, Voronoi tessellation, spatial signal clustering, pharmacy-resolved denominators
          verification_level: high
      zip_aggregate:
        type: return
        value:
          denominator_type: estimated
          analytical_capability: ZIP-level aggregate rates, spatial clustering without pharmacy resolution
          threading_status: aggregate_only
          verification_level: moderate
          precision_tier: catchment
          warning: Without NPI resolution, pharmacy-level reconciliation is not possible within this ZIP.
      state_single:
        type: return
        value:
          analytical_capability: State aggregate rates, no cross-stream verification
          warning: Single stream cannot self-verify. Reconciliation with national boundary not possible.
          verification_level: moderate
          precision_tier: jurisdiction
          threading_status: single_stream
          denominator_type: estimated
      check_pharmacy:
        type: condition
        variable: boundary_type
        operator: eq
        value: pharmacy
        true_next: pharmacy_boundary
        false_next: custom_boundary
      national_boundary:
        type: condition
        variable: stream_count
        operator: gte
        value: 3
        true_next: national_multi
        false_next: national_single
      check_chain:
        type: condition
        variable: boundary_type
        operator: eq
        value: chain
        true_next: chain_boundary
        false_next: check_zip
      custom_static:
        type: return
        value:
          precision_tier: custom
          threading_status: custom_unwindowed
          denominator_type: estimated
          warning: No temporal window. Add time boundary for drift detection and trend analysis.
          analytical_capability: Custom boundary without temporal context, limited to point-in-time analysis
          verification_level: low
      chain_boundary:
        type: return
        value:
          warning: none
          threading_status: chain_threaded
          verification_level: high
          analytical_capability: Chain-specific utilization, distribution channel analysis, chain-to-chain comparison
          precision_tier: distribution
          denominator_type: counted
      zip_boundary:
        type: condition
        variable: has_npi_resolution
        operator: eq
        value: true
        true_next: zip_npi
        false_next: zip_aggregate
      no_streams:
        type: return
        value:
          warning: No data streams available. NexCore requires at least 1 stream to thread.
          threading_status: no_streams
          analytical_capability: none
          verification_level: none
          denominator_type: absent
          precision_tier: unusable
      state_boundary:
        type: condition
        variable: stream_count
        operator: gte
        value: 2
        true_next: state_verified
        false_next: state_single
      national_single:
        type: return
        value:
          warning: Single stream at national level lacks cross-verification. Add streams to confirm denominator.
          verification_level: moderate
          precision_tier: population
          threading_status: single_stream
          denominator_type: estimated
          analytical_capability: National aggregate rates, limited reconciliation
      state_verified:
        type: return
        value:
          warning: none
          verification_level: high
          precision_tier: jurisdiction
          threading_status: multi_stream_threaded
          analytical_capability: State-level incidence rates, regulatory jurisdiction alignment, upward reconciliation to national
          denominator_type: counted
      custom_boundary:
        type: condition
        variable: has_temporal_window
        operator: eq
        value: true
        true_next: custom_temporal
        false_next: custom_static
      national_multi:
        type: return
        value:
          verification_level: high
          threading_status: multi_stream_threaded
          denominator_type: counted
          analytical_capability: National incidence rates, cross-stream reconciliation, population-level signal detection
          warning: none
          precision_tier: population
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: stream_count
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: stream_count
        operator: lt
        value: 1
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      boundary_type:
        type: string
        required: true
      denominator_source:
        type: string
        required: false
      geographic_level:
        type: string
        required: false
      has_temporal_window:
        type: bool
        required: false
      has_npi_resolution:
        type: bool
        required: false
      stream_count:
        type: int
        required: true
    outputs:
      verification_level:
        type: string
        required: false
      analytical_capability:
        type: string
        required: false
      threading_status:
        type: string
        required: false
      denominator_type:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      precision_tier:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      warning:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    stream_count: 11
    boundary_type: pharmacy
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    stream_count: 0
    boundary_type: pharmacy
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
