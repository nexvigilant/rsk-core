name: station-microgram-pipeline-helix
description: 'Forged from microgram ''station-microgram-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    reason: falsified
sense:
  tree:
    start: check_failures
    nodes:
      check_failures:
        type: condition
        variable: failure_count
        operator: gte
        value: 1
        true_next: has_failures
        false_next: check_coverage
      has_failures:
        type: return
        value:
          reason: Microgram test failures detected — decision logic may be wrong
          route: microgram_repair
          priority: critical
          action: fix
      check_coverage:
        type: condition
        variable: path_coverage_pct
        operator: gte
        value: 80
        true_next: healthy
        false_next: low_coverage
      low_coverage:
        type: return
        value:
          priority: moderate
          reason: Path coverage <80% — untested decision branches exist
          action: evolve
          route: microgram_evolve
      healthy:
        type: return
        value:
          action: certify
          priority: low
          reason: All tests pass, coverage ≥80% — ecosystem healthy
          route: archive
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: failure_count
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: failure_count
        operator: lt
        value: 1
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      failure_count:
        type: integer
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    failure_count: 11
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    failure_count: 0
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
