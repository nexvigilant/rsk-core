name: hormone-stimulus-router-helix
description: 'Forged from microgram ''hormone-stimulus-router''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    behavioral_shift: falsified
sense:
  tree:
    start: route_stimulus
    nodes:
      stress_moderate:
        type: return
        value:
          behavioral_shift: alert
          primary_hormone: adrenaline
          risk_tolerance_direction: stable
          hormone_delta: 0.2
      stress_burnout:
        type: return
        value:
          risk_tolerance_direction: decrease
          hormone_delta: 0.1
          behavioral_shift: protective
          primary_hormone: cortisol
      reward_high:
        type: return
        value:
          risk_tolerance_direction: increase
          hormone_delta: 0.2
          behavioral_shift: explorative
          primary_hormone: dopamine
      social_check_cortisol:
        type: condition
        variable: current_cortisol
        operator: gt
        value: 0.5
        true_next: social_stressed
        false_next: social_low
      temporal_path:
        type: condition
        variable: intensity
        operator: gt
        value: 0.5
        true_next: temporal_high
        false_next: temporal_check_cortisol
      reward_path:
        type: condition
        variable: intensity
        operator: gt
        value: 0.5
        true_next: reward_high
        false_next: reward_low
      temporal_high:
        type: return
        value:
          risk_tolerance_direction: decrease
          primary_hormone: melatonin
          behavioral_shift: decay
          hormone_delta: 0.3
      stress_high:
        type: return
        value:
          primary_hormone: cortisol
          behavioral_shift: conservative
          risk_tolerance_direction: decrease
          hormone_delta: 0.3
      social_path:
        type: condition
        variable: intensity
        operator: gt
        value: 0.6
        true_next: social_high
        false_next: social_check_cortisol
      reward_low:
        type: return
        value:
          primary_hormone: serotonin
          risk_tolerance_direction: stable
          hormone_delta: 0.1
          behavioral_shift: satisfied
      stress_check_cortisol:
        type: condition
        variable: current_cortisol
        operator: gt
        value: 0.6
        true_next: stress_burnout
        false_next: stress_moderate
      check_social:
        type: condition
        variable: stimulus_category
        operator: eq
        value: social
        true_next: social_path
        false_next: check_urgency
      route_stimulus:
        type: condition
        variable: stimulus_category
        operator: eq
        value: stress
        true_next: stress_path
        false_next: check_reward
      urgency_path:
        type: condition
        variable: intensity
        operator: gt
        value: 0.8
        true_next: urgency_critical
        false_next: urgency_elevated
      social_high:
        type: return
        value:
          risk_tolerance_direction: increase
          behavioral_shift: collaborative
          hormone_delta: 0.35
          primary_hormone: oxytocin
      urgency_elevated:
        type: return
        value:
          risk_tolerance_direction: stable
          behavioral_shift: focused
          primary_hormone: adrenaline
          hormone_delta: 0.2
      check_urgency:
        type: condition
        variable: stimulus_category
        operator: eq
        value: urgency
        true_next: urgency_path
        false_next: temporal_path
      check_reward:
        type: condition
        variable: stimulus_category
        operator: eq
        value: reward
        true_next: reward_path
        false_next: check_social
      temporal_check_cortisol:
        type: condition
        variable: current_cortisol
        operator: gt
        value: 0.6
        true_next: temporal_exhausted
        false_next: temporal_low
      stress_path:
        type: condition
        variable: intensity
        operator: gt
        value: 0.7
        true_next: stress_high
        false_next: stress_check_cortisol
      urgency_critical:
        type: return
        value:
          hormone_delta: 0.4
          primary_hormone: adrenaline
          behavioral_shift: fight_or_flight
          risk_tolerance_direction: increase
      social_stressed:
        type: return
        value:
          hormone_delta: 0.15
          behavioral_shift: satisfied
          primary_hormone: serotonin
          risk_tolerance_direction: stable
      social_low:
        type: return
        value:
          risk_tolerance_direction: stable
          hormone_delta: 0.1
          primary_hormone: oxytocin
          behavioral_shift: collaborative
      temporal_low:
        type: return
        value:
          hormone_delta: 0.1
          risk_tolerance_direction: stable
          primary_hormone: melatonin
          behavioral_shift: focused
      temporal_exhausted:
        type: return
        value:
          hormone_delta: 0.2
          risk_tolerance_direction: decrease
          primary_hormone: cortisol
          behavioral_shift: protective
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_negation:
        type: condition
        variable: current_cortisol
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: current_cortisol
        operator: neq
        value: stress
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      current_cortisol:
        type: number
        required: true
      stimulus_category:
        type: string
        required: true
      intensity:
        type: number
        required: true
    outputs:
      confidence_score:
        type: float
        required: false
      hormone_delta:
        type: number
        required: false
      primary_hormone:
        type: string
        required: false
      risk_tolerance_direction:
        type: string
        required: false
      confidence:
        type: string
        required: false
      behavioral_shift:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    current_cortisol: null
    stimulus_category: stress
    intensity: 0.9
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    current_cortisol: __negated__
    stimulus_category: stress
    intensity: 0.9
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
