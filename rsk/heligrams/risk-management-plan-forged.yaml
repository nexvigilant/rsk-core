name: risk-management-plan-helix
description: 'Forged from microgram ''risk-management-plan''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    rmp_compliant: falsified
sense:
  tree:
    start: validate_risks
    nodes:
      rmp_update:
        type: return
        value:
          submission_timeline_days: 60
          rmp_compliant: true
          rmp_action: update_existing_rmp
          requires_regulatory_approval: false
          rmp_content: add_identified_risks,update_mitigation_strategies
      rmp_not_required:
        type: return
        value:
          requires_regulatory_approval: false
          rmp_content: null
          submission_timeline_days: 0
          rmp_action: no_rmp_required
          rmp_compliant: true
      rmp_new:
        type: return
        value:
          submission_timeline_days: 30
          rmp_action: create_new_rmp
          rmp_content: safety_summary,pharmacovigilance_plan,risk_minimization_plan
          requires_regulatory_approval: true
          rmp_compliant: true
      validate_risks:
        type: condition
        variable: safety_concerns_identified
        operator: eq
        value: true
        true_next: check_rmp_exists
        false_next: rmp_not_required
      check_rmp_exists:
        type: condition
        variable: rmp_previously_submitted
        operator: eq
        value: true
        true_next: rmp_update
        false_next: rmp_new
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: safety_concerns_identified
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: safety_concerns_identified
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
resolution:
  mode: base_pair
  rules:
  - when:
      rmp_compliant: true
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      rmp_compliant: true
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when:
      falsified: false
      rmp_compliant: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: absent
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      safety_concerns_identified:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    safety_concerns_identified: null
    rmp_previously_submitted: false
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    safety_concerns_identified: false
    rmp_previously_submitted: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
