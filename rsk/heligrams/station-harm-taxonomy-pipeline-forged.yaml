name: station-harm-taxonomy-pipeline-helix
description: 'Forged from microgram ''station-harm-taxonomy-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    reason: falsified
sense:
  tree:
    start: check_type
    nodes:
      type_b:
        type: return
        value:
          reason: Type B (bizarre/idiosyncratic) — unpredictable, potentially fatal, needs genetic workup
          action: investigate
          route: causality_assessment
          priority: high
      check_c:
        type: condition
        variable: harm_type
        operator: eq
        value: C
        true_next: type_c
        false_next: other_type
      check_type:
        type: condition
        variable: harm_type
        operator: eq
        value: A
        true_next: type_a
        false_next: check_b_d
      type_a:
        type: return
        value:
          reason: Type A (augmented pharmacology) — dose-dependent, predictable, high incidence
          action: escalate
          route: dose_adjustment
          priority: critical
      check_b_d:
        type: condition
        variable: harm_type
        operator: eq
        value: B
        true_next: type_b
        false_next: check_c
      other_type:
        type: return
        value:
          action: classify
          route: specialist_review
          priority: moderate
          reason: Type D-H harm — delayed/end-of-use/failure/genetic/hypersensitivity
      type_c:
        type: return
        value:
          action: monitor
          priority: moderate
          reason: Type C (chronic/cumulative) — long-term exposure effect, monitor over time
          route: long_term_monitoring
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: harm_type
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: harm_type
        operator: neq
        value: A
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      harm_type:
        type: string
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    harm_type: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    harm_type: __negated__
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
