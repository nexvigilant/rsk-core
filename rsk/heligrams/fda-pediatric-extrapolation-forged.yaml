name: fda-pediatric-extrapolation-helix
description: 'Forged from microgram ''fda-pediatric-extrapolation''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    efficacy_trial_needed: falsified
sense:
  tree:
    start: check_disease_similarity
    nodes:
      partial_extrapolation_trial:
        type: return
        value:
          efficacy_trial_needed: true
          extrapolation_approach: PARTIAL_EXTRAPOLATION
          study_requirement: Conduct PK study plus reduced efficacy trial (fewer patients, modified endpoints). Exposure-response analysis to bridge remaining uncertainty.
          pk_study_needed: true
          regulatory_reference: ICH E11A (2024), Section 3.3 — Partial Extrapolation with Exposure-Response
      no_extrapolation:
        type: return
        value:
          pk_study_needed: true
          study_requirement: Disease progression differs between adults and pediatrics. Full independent efficacy and safety program required.
          efficacy_trial_needed: true
          extrapolation_approach: NO_EXTRAPOLATION
          regulatory_reference: ICH E11A (2024), Section 2 — Extrapolation Not Justified
      neonate_full_trial:
        type: return
        value:
          regulatory_reference: ICH E11A (2024), Section 4 — Special Considerations for Neonates
          study_requirement: Neonates with uncertain drug response require full efficacy and safety trials. Maturational physiology differences preclude extrapolation.
          pk_study_needed: true
          efficacy_trial_needed: true
          extrapolation_approach: NO_EXTRAPOLATION_NEONATAL
      full_extrapolation:
        type: return
        value:
          efficacy_trial_needed: false
          regulatory_reference: ICH E11A (2024), Section 3.1 — Full Extrapolation Framework
          pk_study_needed: false
          extrapolation_approach: FULL_EXTRAPOLATION
          study_requirement: PK bridging study to confirm exposure. No separate efficacy trial required. Safety data from PK study.
      check_response_similarity:
        type: condition
        variable: response_similar_adults
        operator: eq
        value: true
        true_next: check_pk_data
        false_next: partial_extrapolation
      check_disease_similarity:
        type: condition
        variable: disease_similar_adults
        operator: eq
        value: true
        true_next: check_response_similarity
        false_next: no_extrapolation
      check_pk_data:
        type: condition
        variable: pk_data_available
        operator: eq
        value: true
        true_next: full_extrapolation
        false_next: pk_study_needed
      pk_study_needed:
        type: return
        value:
          regulatory_reference: ICH E11A (2024), Section 3.2 — PK Bridging
          extrapolation_approach: FULL_EXTRAPOLATION_WITH_PK
          study_requirement: Conduct PK study in target pediatric population to establish dose. Efficacy extrapolated from adult data.
          efficacy_trial_needed: false
          pk_study_needed: true
      partial_extrapolation:
        type: condition
        variable: age_group
        operator: eq
        value: neonate
        true_next: neonate_full_trial
        false_next: partial_extrapolation_trial
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: response_similar_adults
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: response_similar_adults
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      efficacy_trial_needed: true
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      efficacy_trial_needed: true
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when:
      efficacy_trial_needed: false
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: absent
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      age_group:
        type: string
        required: false
      response_similar_adults:
        type: bool
        required: true
      disease_similar_adults:
        type: bool
        required: true
      pk_data_available:
        type: bool
        required: false
    outputs:
      regulatory_reference:
        type: string
        required: false
      pk_study_needed:
        type: bool
        required: false
      study_requirement:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      extrapolation_approach:
        type: string
        required: false
      efficacy_trial_needed:
        type: bool
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    response_similar_adults: null
    disease_similar_adults: true
    pk_data_available: false
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    response_similar_adults: false
    disease_similar_adults: true
    pk_data_available: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - disease_similar_adults
  - response_similar_adults
  - pk_data_available
  - age_group
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
