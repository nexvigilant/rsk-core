name: station-vigiaccess-pipeline-helix
description: 'Forged from microgram ''station-vigiaccess-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    action: falsified
sense:
  tree:
    start: check_total
    nodes:
      check_total:
        type: condition
        variable: total_reports
        operator: gte
        value: 200
        true_next: check_regions
        false_next: low_vol
      regional_signal:
        type: return
        value:
          action: investigate
          reason: 200+ reports in limited regions — possible reporting bias
          priority: moderate
          route: signal_validation
      check_regions:
        type: condition
        variable: region_count
        operator: gte
        value: 4
        true_next: global_signal
        false_next: regional_signal
      global_signal:
        type: return
        value:
          action: escalate
          priority: critical
          reason: 200+ reports across 4+ WHO regions — global safety signal
          route: signal_detection
      low_vol:
        type: return
        value:
          route: periodic_review
          action: monitor
          reason: Under 200 global VigiBase reports — insufficient for analysis
          priority: low
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: total_reports
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: total_reports
        operator: lt
        value: 200
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      total_reports:
        type: integer
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    region_count: 2
    total_reports: 210
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    region_count: 2
    total_reports: 199
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
