name: organ-endocrine-safety-helix
description: 'Forged from microgram ''organ-endocrine-safety''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    risk_level: falsified
sense:
  tree:
    start: check_baseline_glucose
    nodes:
      check_thyroid:
        type: condition
        variable: abnormal_tsh
        operator: eq
        value: true
        true_next: thyroid_alert
        false_next: standard_dosing
      thyroid_alert:
        type: return
        value:
          risk_level: moderate
          organ: endocrine
          thyroid_monitoring: required
          message: Abnormal baseline TSH; monitor thyroid function
      severe_hyperglycemia:
        type: return
        value:
          glucose_monitoring: required
          organ: endocrine
          risk_level: high
          message: Severe hyperglycemia; glucose-elevating drugs contraindicated
      diabetes_alert:
        type: return
        value:
          organ: endocrine
          message: Diabetic patient; monitor for hyperglycemia or hypoglycemia
          risk_level: moderate
          glucose_monitoring: required
      standard_dosing:
        type: return
        value:
          risk_level: low
          organ: endocrine
      check_diabetes:
        type: condition
        variable: has_type2_diabetes
        operator: eq
        value: true
        true_next: diabetes_alert
        false_next: check_thyroid
      check_baseline_glucose:
        type: condition
        variable: baseline_fasting_glucose_mg_dl
        operator: gte
        value: 300
        true_next: severe_hyperglycemia
        false_next: check_diabetes
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: abnormal_tsh
        operator: lt
        value: 300
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: abnormal_tsh
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      abnormal_tsh:
        type: integer
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    baseline_fasting_glucose_mg_dl: 350
    abnormal_tsh: 310
    has_type2_diabetes: false
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    baseline_fasting_glucose_mg_dl: 350
    abnormal_tsh: 299
    has_type2_diabetes: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
