name: faers-result-classifier-helix
description: 'Forged from microgram ''faers-result-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    action: falsified
sense:
  tree:
    start: check_high_volume_serious
    nodes:
      monitor:
        type: return
        value:
          action: add_to_watchlist
          category: MONITOR
          priority: 3
      routine:
        type: return
        value:
          priority: 4
          category: ROUTINE
          action: periodic_review
      investigate:
        type: return
        value:
          category: INVESTIGATE
          action: detailed_case_review
          priority: 2
      check_serious_pct_high:
        type: condition
        variable: serious_pct
        operator: gte
        value: 50
        true_next: high_alert
        false_next: investigate
      check_high_serious_pct:
        type: condition
        variable: serious_pct
        operator: gte
        value: 70
        true_next: investigate
        false_next: check_low_volume
      check_low_volume:
        type: condition
        variable: report_count
        operator: gte
        value: 10
        true_next: monitor
        false_next: routine
      high_alert:
        type: return
        value:
          action: immediate_safety_review
          priority: 1
          category: HIGH_ALERT
      check_moderate_volume:
        type: condition
        variable: report_count
        operator: gte
        value: 50
        true_next: investigate
        false_next: check_high_serious_pct
      check_high_volume_serious:
        type: condition
        variable: report_count
        operator: gte
        value: 100
        true_next: check_serious_pct_high
        false_next: check_moderate_volume
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: serious_pct
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: serious_pct
        operator: lt
        value: 100
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      report_count:
        type: int
        required: false
      serious_pct:
        type: int
        required: false
    outputs:
      confidence:
        type: string
        required: false
      priority:
        type: int
        required: false
      category:
        type: string
        required: false
      action:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    serious_pct: 110
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    serious_pct: 99
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
