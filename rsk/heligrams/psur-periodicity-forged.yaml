name: psur-periodicity-helix
description: 'Forged from microgram ''psur-periodicity''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    rationale: falsified
sense:
  tree:
    start: special_condition_check
    nodes:
      special_condition_six_monthly:
        type: return
        value:
          rationale: Special condition override - Enhanced safety monitoring required
          periodicity: six_monthly
          next_due_months: 6
      special_condition_check:
        type: condition
        variable: has_special_condition
        operator: eq
        value: true
        true_next: special_condition_six_monthly
        false_next: years_zero_to_two
      years_two_to_five:
        type: condition
        variable: years_since_approval
        operator: lt
        value: 5
        true_next: annual_result
        false_next: years_five_to_ten
      triennial_result:
        type: return
        value:
          next_due_months: 36
          periodicity: triennial
          rationale: Established safety profile (5-10 years) - Triennial PSUR required
      six_monthly_result:
        type: return
        value:
          periodicity: six_monthly
          next_due_months: 6
          rationale: Initial post-approval period (0-2 years) - Enhanced safety monitoring required
      years_five_to_ten:
        type: condition
        variable: years_since_approval
        operator: lt
        value: 10
        true_next: triennial_result
        false_next: as_requested_result
      as_requested_result:
        type: return
        value:
          next_due_months: 0
          periodicity: as_requested
          rationale: Mature post-approval phase (>10 years) - PSUR only on request unless risk identified
      annual_result:
        type: return
        value:
          rationale: Early post-approval phase (2-5 years) - Annual PSUR required
          periodicity: annual
          next_due_months: 12
      years_zero_to_two:
        type: condition
        variable: years_since_approval
        operator: lt
        value: 2
        true_next: six_monthly_result
        false_next: years_two_to_five
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: has_special_condition
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: has_special_condition
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      has_special_condition:
        type: bool
        required: false
      years_since_approval:
        type: int
        required: true
    outputs:
      rationale:
        type: string
        required: false
      next_due_months:
        type: int
        required: false
      confidence_score:
        type: float
        required: false
      periodicity:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    years_since_approval: 0
    has_special_condition: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    years_since_approval: 0
    has_special_condition: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
