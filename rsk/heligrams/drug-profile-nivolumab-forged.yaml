name: drug-profile-nivolumab-helix
description: 'Forged from microgram ''drug-profile-nivolumab''. Domain: SignalDetection. 4 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    signal: falsified
sense:
  tree:
    start: check_prr
    nodes:
      signal:
        type: return
        value:
          expected_prr: 7.3
          signal: true
          action: investigate
          harm_type: B
          drug: nivolumab
      check_prr:
        type: condition
        variable: prr
        operator: gte
        value: 5.0
        true_next: signal
        false_next: no_signal
      no_signal:
        type: return
        value:
          action: monitor
          harm_type: B
          signal: false
          drug: nivolumab
          expected_prr: 7.3
antisense:
  tree:
    start: check_insufficient_n
    nodes:
      check_weber_effect:
        type: condition
        variable: years_on_market
        operator: gt
        value: 5
        true_next: falsified
        false_next: check_channeling_bias
      check_channeling_bias:
        type: condition
        variable: channeling_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_insufficient_n:
        type: condition
        variable: case_count
        operator: lt
        value: 3
        true_next: falsified
        false_next: check_notoriety_bias
      check_notoriety_bias:
        type: condition
        variable: notoriety_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: check_weber_effect
resolution:
  mode: base_pair
  rules:
  - when:
      signal: true
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7000000000000001
      confidence: high
  - when:
      signal: true
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.28
  - when:
      signal: false
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7000000000000001
      verdict: absent
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      case_count:
        type: integer
        required: false
      channeling_bias:
        type: bool
        required: false
      years_on_market:
        type: integer
        required: false
      notoriety_bias:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    prr: 7.3
    channeling_bias: false
    case_count: 13
    years_on_market: 0
    notoriety_bias: false
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, insufficient_n active'
  input:
    prr: 7.3
    case_count: 2
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — signal-detection with 4 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: signal-detection. Chains as dual-strand verifier before downstream consumers.'
