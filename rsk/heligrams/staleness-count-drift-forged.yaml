name: staleness-count-drift-helix
description: 'Forged from microgram ''staleness-count-drift''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    status: falsified
sense:
  tree:
    start: check_exceeded_present
    nodes:
      check_exceeded_present:
        type: condition
        variable: exceeded
        operator: is_null
        value: null
        true_next: reject_missing
        false_next: check_drifted
      reject_missing:
        type: return
        value:
          status: REJECTED
          action: 'REJECTED: exceeded is required (bool: did drift exceed threshold?)'
      check_drifted:
        type: condition
        variable: exceeded
        operator: eq
        value: true
        true_next: drifted
        false_next: ok
      drifted:
        type: return
        value:
          action: Count drift exceeds threshold — update MEMORY.md or investigate
          status: DRIFTED
      ok:
        type: return
        value:
          action: Count within threshold — no update needed
          status: OK
antisense:
  tree:
    start: check_negation
    nodes:
      check_negation:
        type: condition
        variable: exceeded
        operator: is_not_null
        value: null
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      surface_name:
        type: string
        required: false
      exceeded:
        type: bool
        required: true
    outputs:
      action:
        type: string
        required: false
      verdict:
        type: string
        required: false
      status:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    exceeded: null
    surface_name: skills
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    exceeded: null
    surface_name: skills
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - exceeded
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
