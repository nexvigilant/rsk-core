name: station-benefit-risk-pipeline-helix
description: 'Forged from microgram ''station-benefit-risk-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    reason: falsified
sense:
  tree:
    start: check_qbri
    nodes:
      check_marginal:
        type: condition
        variable: qbri_score
        operator: gte
        value: 0.5
        true_next: marginal
        false_next: unfavorable
      marginal:
        type: return
        value:
          reason: QBRI 0.5-1.0 — marginal benefit-risk, additional risk minimization needed
          priority: moderate
          action: review
          route: rmp_update
      favorable:
        type: return
        value:
          action: approve
          route: archive
          reason: QBRI≥1.0 — benefits outweigh risks, favorable profile
          priority: low
      unfavorable:
        type: return
        value:
          route: regulatory_referral
          reason: QBRI<0.5 — unfavorable benefit-risk, regulatory action required
          priority: critical
          action: escalate
      check_qbri:
        type: condition
        variable: qbri_score
        operator: gte
        value: 1.0
        true_next: favorable
        false_next: check_marginal
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: qbri_score
        operator: lt
        value: 1.0
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: qbri_score
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      qbri_score:
        type: float
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    qbri_score: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
