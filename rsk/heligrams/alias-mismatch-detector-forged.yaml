name: alias-mismatch-detector-helix
description: 'Forged from microgram ''alias-mismatch-detector''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    health: falsified
sense:
  tree:
    start: check_conflicts
    nodes:
      green:
        type: return
        value:
          health: GREEN
          action: none
      red:
        type: return
        value:
          action: resolve_alias_conflicts
          health: RED
      check_suggested:
        type: condition
        variable: suggested_aliases
        operator: gt
        value: 0
        true_next: yellow
        false_next: green
      yellow:
        type: return
        value:
          health: YELLOW
          action: add_suggested_aliases
      check_conflicts:
        type: condition
        variable: alias_conflicts
        operator: gt
        value: 0
        true_next: red
        false_next: check_suggested
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: suggested_aliases
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: suggested_aliases
        operator: lte
        value: 0
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      alias_conflicts:
        type: int
        required: false
      orphan_outputs:
        type: int
        required: false
      suggested_aliases:
        type: int
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      action:
        type: string
        required: false
      verdict:
        type: string
        required: false
      health:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    suggested_aliases: 10
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    suggested_aliases: 0
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
