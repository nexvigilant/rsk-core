name: age-pregnancy-category-helix
description: 'Forged from microgram ''age-pregnancy-category''. Domain: SystemHealth. 2 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    pregnancy_status: falsified
sense:
  tree:
    start: check_pregnancy_status
    nodes:
      check_pregnancy_status:
        type: condition
        variable: is_pregnant
        operator: eq
        value: true
        true_next: check_trimester
        false_next: not_pregnant
      check_trimester:
        type: condition
        variable: trimester
        operator: eq
        value: 1
        true_next: first_trimester
        false_next: check_second_trimester
      first_trimester:
        type: return
        value:
          pregnancy_status: pregnant
          message: 'First trimester: highest teratogenic risk; most medications contraindicated'
          risk_level: highest
          trimester: 1
      second_trimester:
        type: return
        value:
          risk_level: moderate
          pregnancy_status: pregnant
          message: 'Second trimester: organ formation complete; some medications safer'
          trimester: 2
      third_trimester:
        type: return
        value:
          trimester: 3
          pregnancy_status: pregnant
          message: 'Third trimester: fetal/maternal effects possible near delivery'
          risk_level: delivery_related
      check_second_trimester:
        type: condition
        variable: trimester
        operator: eq
        value: 2
        true_next: second_trimester
        false_next: third_trimester
      not_pregnant:
        type: return
        value:
          pregnancy_status: not_pregnant
          risk_level: none
antisense:
  tree:
    start: null_guard_measurement_stale
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_single_source:
        type: condition
        variable: probe_count
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_single_source
      check_single_source:
        type: condition
        variable: probe_count
        operator: lt
        value: 2
        true_next: falsified
        false_next: not_falsified
      null_guard_measurement_stale:
        type: condition
        variable: measurement_age_minutes
        operator: is_null
        value: null
        true_next: null_guard_single_source
        false_next: check_measurement_stale
      check_measurement_stale:
        type: condition
        variable: measurement_age_minutes
        operator: gt
        value: 60
        true_next: falsified
        false_next: null_guard_single_source
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      probe_count:
        type: integer
        required: false
      measurement_age_minutes:
        type: integer
        required: false
    outputs:
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    measurement_age_minutes: 50
    probe_count: 12
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, measurement_stale active'
  input:
    measurement_age_minutes: 61
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — system-health with 2 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: system-health. Chains as dual-strand verifier before downstream consumers.'
