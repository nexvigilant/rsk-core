name: risk-to-regulatory-helix
description: 'Forged from microgram ''risk-to-regulatory''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    next_mg: falsified
sense:
  tree:
    start: check_withdrawal
    nodes:
      check_conditional_br:
        type: condition
        variable: benefit_risk_decision
        operator: eq
        value: CONDITIONAL
        true_next: rmp_update
        false_next: no_regulatory_action
      check_labeling:
        type: condition
        variable: labeling_update_needed
        operator: eq
        value: true
        true_next: labeling_update
        false_next: check_conditional_br
      rmp_update:
        type: return
        value:
          next_mg: benefit-risk-gate
          submission_type: rmp
          regulatory_filing: RMP_variation
          route: RMP_UPDATE
          timeline: 120_days
      no_regulatory_action:
        type: return
        value:
          submission_type: none
          next_mg: report-deadline
          route: NO_REGULATORY_ACTION
          regulatory_filing: none
          timeline: periodic
      market_withdrawal:
        type: return
        value:
          submission_type: withdrawal
          timeline: immediate
          next_mg: expedited-reporting
          regulatory_filing: FDA_Form_3580
          route: MARKET_WITHDRAWAL
      rems_submission:
        type: return
        value:
          submission_type: rems
          next_mg: rems-classifier
          route: REMS_SUBMISSION
          regulatory_filing: REMS_modification
          timeline: 60_days
      labeling_update:
        type: return
        value:
          route: LABELING_UPDATE
          regulatory_filing: CBE_supplement
          timeline: 90_days
          submission_type: labeling
          next_mg: cioms-frequency
      market_restriction:
        type: return
        value:
          route: MARKET_RESTRICTION
          submission_type: safety_supplement
          timeline: 30_days
          next_mg: rems-classifier
          regulatory_filing: sNDA_safety
      check_rems:
        type: condition
        variable: rems_required
        operator: eq
        value: true
        true_next: rems_submission
        false_next: check_labeling
      safety_review:
        type: return
        value:
          submission_type: variation
          next_mg: expedited-reporting
          route: SAFETY_REVIEW
          timeline: urgent
          regulatory_filing: Type_II_Variation
      check_withdrawal:
        type: condition
        variable: market_action
        operator: eq
        value: withdrawal
        true_next: market_withdrawal
        false_next: check_restriction
      check_negative_br:
        type: condition
        variable: benefit_risk_decision
        operator: eq
        value: NEGATIVE
        true_next: safety_review
        false_next: check_rems
      check_restriction:
        type: condition
        variable: market_action
        operator: eq
        value: restriction
        true_next: market_restriction
        false_next: check_negative_br
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: benefit_risk_decision
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: benefit_risk_decision
        operator: neq
        value: withdrawal
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      benefit_risk_decision:
        type: string
        required: false
      market_action:
        type: string
        required: false
      labeling_update_needed:
        type: bool
        required: false
      rems_required:
        type: bool
        required: false
    outputs:
      submission_type:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      next_mg:
        type: string
        required: false
      route:
        type: string
        required: false
      confidence:
        type: string
        required: false
      regulatory_filing:
        type: string
        required: false
      timeline:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    market_action: withdrawal
    labeling_update_needed: false
    rems_required: false
    benefit_risk_decision: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    market_action: withdrawal
    labeling_update_needed: false
    rems_required: false
    benefit_risk_decision: __negated__
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
