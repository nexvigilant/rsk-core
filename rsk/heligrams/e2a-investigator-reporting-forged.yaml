name: e2a-investigator-reporting-helix
description: 'Forged from microgram ''e2a-investigator-reporting''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    description: falsified
sense:
  tree:
    start: check_aware
    nodes:
      check_aware:
        type: condition
        variable: investigator_aware_of_sae
        operator: eq
        value: true
        true_next: check_fatal
        false_next: not_applicable
      not_applicable:
        type: return
        value:
          description: Investigator not yet aware of SAE - reporting obligation not triggered
          regulatory_reference: ICH E2A Section III.A
          urgency: NOT_APPLICABLE
      prompt:
        type: return
        value:
          description: Serious but not fatal/life-threatening SAE requires prompt reporting to sponsor
          regulatory_reference: ICH E2A Section III.A
          urgency: PROMPT
      check_fatal:
        type: condition
        variable: fatal
        operator: eq
        value: true
        true_next: immediate
        false_next: check_life_threatening
      immediate:
        type: return
        value:
          regulatory_reference: ICH E2A Section III.A
          description: Fatal or life-threatening SAE requires immediate reporting within 24 hours
          urgency: IMMEDIATE_24H
      check_life_threatening:
        type: condition
        variable: life_threatening
        operator: eq
        value: true
        true_next: immediate
        false_next: prompt
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: investigator_aware_of_sae
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: investigator_aware_of_sae
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      life_threatening:
        type: bool
        required: false
      investigator_aware_of_sae:
        type: bool
        required: false
      fatal:
        type: bool
        required: false
    outputs:
      urgency:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      description:
        type: string
        required: false
      regulatory_reference:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    investigator_aware_of_sae: null
    fatal: true
    life_threatening: false
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    investigator_aware_of_sae: false
    fatal: true
    life_threatening: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
