name: trend-to-communication-helix
description: 'Forged from microgram ''trend-to-communication''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    communication_level: falsified
sense:
  tree:
    start: check_direction
    nodes:
      stable_large:
        type: return
        value:
          communication_level: routine
          urgency: 90_days
      decreasing_large:
        type: return
        value:
          communication_level: none
          urgency: deferred
      stable_other:
        type: return
        value:
          urgency: deferred
          communication_level: routine
      check_magnitude_inc_moderate:
        type: condition
        variable: magnitude
        operator: eq
        value: moderate
        true_next: increasing_moderate
        false_next: increasing_small
      check_magnitude_stable:
        type: condition
        variable: magnitude
        operator: eq
        value: large
        true_next: stable_large
        false_next: stable_other
      decreasing_other:
        type: return
        value:
          urgency: deferred
          communication_level: none
      check_direction:
        type: condition
        variable: trend_direction
        operator: eq
        value: increasing
        true_next: check_magnitude_increasing
        false_next: check_stable
      increasing_moderate:
        type: return
        value:
          communication_level: label_update
          urgency: 30_days
      check_stable:
        type: condition
        variable: trend_direction
        operator: eq
        value: stable
        true_next: check_magnitude_stable
        false_next: decreasing_path
      increasing_small:
        type: return
        value:
          communication_level: routine
          urgency: 90_days
      decreasing_path:
        type: condition
        variable: magnitude
        operator: eq
        value: large
        true_next: decreasing_large
        false_next: decreasing_other
      check_magnitude_increasing:
        type: condition
        variable: magnitude
        operator: eq
        value: large
        true_next: increasing_large
        false_next: check_magnitude_inc_moderate
      increasing_large:
        type: return
        value:
          communication_level: dhpc
          urgency: immediate
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: magnitude
        operator: neq
        value: increasing
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: magnitude
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      trend_direction:
        type: string
        required: true
      magnitude:
        type: string
        required: true
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      communication_level:
        type: string
        required: false
      urgency:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    trend_direction: ''
    magnitude: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    trend_direction: ''
    magnitude: __negated__
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
