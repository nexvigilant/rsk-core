name: e2a-data-collection-priority-helix
description: 'Forged from microgram ''e2a-data-collection-priority''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    rationale: falsified
sense:
  tree:
    start: check_minimum_criteria
    nodes:
      high_priority_fatal:
        type: return
        value:
          rationale: Fatal case — high priority collection of autopsy data, cause of death, and complete medical history within 3 days
          regulatory_reference: ICH E2A Section IV.A - Fatal cases require complete data collection for 7-day report
          collection_priority: HIGH
          data_domains_needed: outcome,autopsy,cause_of_death,medical_history
          days_to_collect: 3
      check_fatal_outcome:
        type: condition
        variable: outcome_fatal
        operator: eq
        value: true
        true_next: high_priority_fatal
        false_next: check_serious
      check_serious:
        type: condition
        variable: is_serious
        operator: eq
        value: true
        true_next: check_unexpected_serious
        false_next: check_unexpected_only
      check_unexpected_only:
        type: condition
        variable: is_unexpected
        operator: eq
        value: true
        true_next: low_priority_unexpected_nonserious
        false_next: routine_priority
      high_priority_susar:
        type: return
        value:
          regulatory_reference: ICH E2A Section IV.A - SUSARs require complete data collection for expedited reporting
          rationale: Serious unexpected reaction (SUSAR) — high priority data collection to support expedited report within 7-15 day deadline
          days_to_collect: 5
          collection_priority: HIGH
          data_domains_needed: event_details,drug_exposure,outcome,medical_review
      check_unexpected_serious:
        type: condition
        variable: is_unexpected
        operator: eq
        value: true
        true_next: high_priority_susar
        false_next: medium_priority_serious_expected
      medium_priority_serious_expected:
        type: return
        value:
          days_to_collect: 30
          rationale: Serious expected reaction — medium priority collection for periodic safety update inclusion
          data_domains_needed: event_details,outcome,drug_exposure
          regulatory_reference: ICH E2A Section IV.A - Serious expected reactions collected for periodic reporting
          collection_priority: MEDIUM
      low_priority_unexpected_nonserious:
        type: return
        value:
          collection_priority: LOW
          days_to_collect: 60
          data_domains_needed: event_description,outcome
          regulatory_reference: ICH E2A Section IV.A - Non-serious events collected for periodic safety updates
          rationale: Non-serious unexpected event — low priority collection for line listing in periodic report
      routine_priority:
        type: return
        value:
          rationale: Non-serious expected event — routine data collection for aggregate reporting
          data_domains_needed: event_description
          regulatory_reference: ICH E2A Section IV.A - Expected non-serious events documented in routine periodic reports
          collection_priority: ROUTINE
          days_to_collect: 90
      urgent_minimum_criteria:
        type: return
        value:
          data_domains_needed: reporter,patient,drug,event
          days_to_collect: 2
          regulatory_reference: ICH E2A Section III.A / IV.A - Minimum criteria collection required before processing
          collection_priority: URGENT
          rationale: Minimum ICSR criteria not met — case cannot be processed. Collect 4 minimum elements within 2 days.
      check_minimum_criteria:
        type: condition
        variable: has_minimum_criteria
        operator: eq
        value: true
        true_next: check_fatal_outcome
        false_next: urgent_minimum_criteria
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_negation:
        type: condition
        variable: outcome_fatal
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: outcome_fatal
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      has_minimum_criteria:
        type: bool
        required: false
      is_unexpected:
        type: bool
        required: false
      report_deadline_days:
        type: int
        required: false
      is_serious:
        type: bool
        required: false
      outcome_fatal:
        type: bool
        required: false
    outputs:
      days_to_collect:
        type: int
        required: false
      regulatory_reference:
        type: string
        required: false
      collection_priority:
        type: string
        required: false
      verdict:
        type: string
        required: false
      rationale:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      data_domains_needed:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    is_serious: true
    is_unexpected: true
    has_minimum_criteria: false
    report_deadline_days: 7
    outcome_fatal: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    is_serious: true
    is_unexpected: true
    has_minimum_criteria: false
    report_deadline_days: 7
    outcome_fatal: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - has_minimum_criteria
  - outcome_fatal
  - is_serious
  - is_unexpected
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
