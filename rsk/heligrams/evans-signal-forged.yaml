name: evans-signal-helix
description: 'Forged from microgram ''evans-signal''. Domain: SignalDetection. 4 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    evans_signal: falsified
sense:
  tree:
    start: check_prr
    nodes:
      check_n:
        type: condition
        variable: n_cases
        operator: gte
        value: 3
        true_next: signal
        false_next: insufficient
      check_chi:
        type: condition
        variable: chi_square
        operator: gte
        value: 3.841
        true_next: check_n
        false_next: no_signal
      signal:
        type: return
        value:
          classification: SIGNAL
          guideline: EMA GVP Module IX
          criteria_met: PRR>=2 AND chi2>=3.841 AND N>=3
          evans_signal: true
      check_prr:
        type: condition
        variable: prr
        operator: gte
        value: 2.0
        true_next: check_chi
        false_next: no_signal
      insufficient:
        type: return
        value:
          evans_signal: false
          guideline: EMA GVP Module IX
          classification: INSUFFICIENT
          criteria_met: PRR and chi2 met but N<3
      no_signal:
        type: return
        value:
          guideline: EMA GVP Module IX
          criteria_met: none
          classification: NO_SIGNAL
          evans_signal: false
antisense:
  tree:
    start: check_insufficient_n
    nodes:
      check_channeling_bias:
        type: condition
        variable: channeling_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_notoriety_bias:
        type: condition
        variable: notoriety_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: check_weber_effect
      check_insufficient_n:
        type: condition
        variable: case_count
        operator: lt
        value: 3
        true_next: falsified
        false_next: check_notoriety_bias
      check_weber_effect:
        type: condition
        variable: years_on_market
        operator: gt
        value: 5
        true_next: falsified
        false_next: check_channeling_bias
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      evans_signal: true
    default: null
    emit:
      confidence_score: 0.7000000000000001
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
      evans_signal: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.28
      verdict: contested
  - when:
      evans_signal: false
      falsified: false
    default: null
    emit:
      verdict: absent
      confidence: high
      confidence_score: 0.7000000000000001
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      n_cases:
        type: int
        required: false
      chi_square:
        type: float
        required: false
      case_count:
        type: integer
        required: false
      prr:
        type: float
        required: false
      notoriety_bias:
        type: bool
        required: false
      years_on_market:
        type: integer
        required: false
      channeling_bias:
        type: bool
        required: false
    outputs:
      guideline:
        type: string
        required: false
      classification:
        type: string
        required: false
      criteria_met:
        type: string
        required: false
      evans_signal:
        type: bool
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    prr: 9.9
    chi_square: 45.2
    case_count: 13
    n_cases: 10
    years_on_market: 0
    channeling_bias: false
    notoriety_bias: false
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, insufficient_n active'
  input:
    prr: 9.9
    chi_square: 45.2
    case_count: 2
    n_cases: 10
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — signal-detection with 4 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: signal-detection. Chains as dual-strand verifier before downstream consumers.'
