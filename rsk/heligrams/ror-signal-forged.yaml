name: ror-signal-helix
description: 'Forged from microgram ''ror-signal''. Domain: SignalDetection. 4 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    signal_detected: falsified
sense:
  tree:
    start: check_strong
    nodes:
      protective_signal:
        type: return
        value:
          action: investigate_protective
          signal: PROTECTIVE
          signal_detected: false
      check_strong:
        type: condition
        variable: ror
        operator: gte
        value: 4.0
        true_next: strong_signal
        false_next: check_moderate
      weak_signal:
        type: return
        value:
          signal_detected: true
          signal: WEAK
          action: monitor
      check_none:
        type: condition
        variable: ror
        operator: gte
        value: 1.0
        true_next: no_signal
        false_next: protective_signal
      strong_signal:
        type: return
        value:
          action: immediate_review
          signal: STRONG
          signal_detected: true
      check_weak:
        type: condition
        variable: ror
        operator: gte
        value: 1.5
        true_next: weak_signal
        false_next: check_none
      moderate_signal:
        type: return
        value:
          action: standard_review
          signal_detected: true
          signal: MODERATE
      check_moderate:
        type: condition
        variable: ror
        operator: gte
        value: 2.0
        true_next: moderate_signal
        false_next: check_weak
      no_signal:
        type: return
        value:
          action: no_action
          note: ROR >= 1 but below threshold
          signal: NONE
          signal_detected: false
antisense:
  tree:
    start: null_guard_insufficient_n
    nodes:
      null_guard_insufficient_n:
        type: condition
        variable: case_count
        operator: is_null
        value: null
        true_next: null_guard_notoriety_bias
        false_next: check_insufficient_n
      check_insufficient_n:
        type: condition
        variable: case_count
        operator: lt
        value: 3
        true_next: falsified
        false_next: null_guard_notoriety_bias
      check_weber_effect:
        type: condition
        variable: years_on_market
        operator: gt
        value: 5
        true_next: falsified
        false_next: null_guard_channeling_bias
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_notoriety_bias:
        type: condition
        variable: notoriety_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: null_guard_weber_effect
      check_channeling_bias:
        type: condition
        variable: channeling_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: not_falsified
      null_guard_notoriety_bias:
        type: condition
        variable: notoriety_bias
        operator: is_null
        value: null
        true_next: null_guard_weber_effect
        false_next: check_notoriety_bias
      null_guard_channeling_bias:
        type: condition
        variable: channeling_bias
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_channeling_bias
      null_guard_weber_effect:
        type: condition
        variable: years_on_market
        operator: is_null
        value: null
        true_next: null_guard_channeling_bias
        false_next: check_weber_effect
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      signal_detected: true
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7000000000000001
  - when:
      signal_detected: true
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.28
  - when:
      falsified: false
      signal_detected: false
    default: null
    emit:
      verdict: absent
      confidence: high
      confidence_score: 0.7000000000000001
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      case_count:
        type: integer
        required: false
      notoriety_bias:
        type: bool
        required: false
      ror:
        type: float
        required: false
      years_on_market:
        type: integer
        required: false
      channeling_bias:
        type: bool
        required: false
    outputs:
      note:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      signal:
        type: string
        required: false
      confidence:
        type: string
        required: false
      action:
        type: string
        required: false
      signal_detected:
        type: bool
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    ror: 5.0
    case_count: 13
    notoriety_bias: false
    years_on_market: 0
    channeling_bias: false
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, insufficient_n active'
  input:
    ror: 5.0
    case_count: 2
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — signal-detection with 4 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: signal-detection. Chains as dual-strand verifier before downstream consumers.'
