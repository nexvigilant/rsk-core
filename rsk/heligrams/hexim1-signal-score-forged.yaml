name: hexim1-signal-score-helix
description: 'Forged from microgram ''hexim1-signal-score''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    limiting_factor: falsified
sense:
  tree:
    start: check_prime
    nodes:
      moderate_limit_r:
        type: return
        value:
          limiting_factor: recognition
          priority_action: INVESTIGATE — needs clinical advancement to strengthen signal.
          verdict: MODERATE_SIGNAL
      weak_limit_u:
        type: return
        value:
          priority_action: DEPRIORITIZE — well-trodden territory with weak overall signal.
          verdict: WEAK_SIGNAL
          limiting_factor: uniqueness
      prime_limit_u:
        type: return
        value:
          verdict: PRIME_SIGNAL
          priority_action: FILE PATENT — novel finding with strong validation. Uniqueness is lowest component.
          limiting_factor: uniqueness
      find_limit_moderate_r:
        type: condition
        variable: recognition
        operator: lte
        value: 0.6
        true_next: moderate_limit_r
        false_next: find_limit_moderate_t
      strong_balanced:
        type: return
        value:
          limiting_factor: balanced
          verdict: STRONG_SIGNAL
          priority_action: PRIORITIZE — solid signal across all dimensions. Ready for development.
      weak_limit_t:
        type: return
        value:
          verdict: WEAK_SIGNAL
          limiting_factor: temporal
          priority_action: DEPRIORITIZE — stale finding. Re-evaluate only if new data emerges.
      find_limit_strong_t:
        type: condition
        variable: temporal
        operator: lte
        value: 0.6
        true_next: strong_limit_t
        false_next: strong_balanced
      find_limit_weak_t:
        type: condition
        variable: temporal
        operator: lte
        value: 0.6
        true_next: weak_limit_t
        false_next: weak_balanced
      find_limit_prime_r:
        type: condition
        variable: recognition
        operator: lte
        value: 0.8
        true_next: prime_limit_r
        false_next: find_limit_prime_t
      find_limit_prime:
        type: condition
        variable: uniqueness
        operator: lte
        value: 0.8
        true_next: prime_limit_u
        false_next: find_limit_prime_r
      strong_limit_t:
        type: return
        value:
          verdict: STRONG_SIGNAL
          limiting_factor: temporal
          priority_action: PRIORITIZE — generate new data to refresh temporal score.
      find_limit_prime_t:
        type: condition
        variable: temporal
        operator: lte
        value: 0.8
        true_next: prime_limit_t
        false_next: prime_balanced
      moderate_balanced:
        type: return
        value:
          limiting_factor: balanced
          verdict: MODERATE_SIGNAL
          priority_action: INVESTIGATE — moderate across board. Identify one dimension to boost.
      check_weak:
        type: condition
        variable: signal_score
        operator: gte
        value: 0.2
        true_next: find_limit_weak
        false_next: noise
      check_strong:
        type: condition
        variable: signal_score
        operator: gte
        value: 0.6
        true_next: find_limit_strong
        false_next: check_moderate
      weak_balanced:
        type: return
        value:
          verdict: WEAK_SIGNAL
          priority_action: DEPRIORITIZE — weak across all dimensions. Not actionable.
          limiting_factor: balanced
      prime_balanced:
        type: return
        value:
          verdict: PRIME_SIGNAL
          priority_action: FILE PATENT — all components strong. Maximum signal.
          limiting_factor: balanced
      prime_limit_r:
        type: return
        value:
          limiting_factor: recognition
          verdict: PRIME_SIGNAL
          priority_action: FILE PATENT — advance to next clinical stage to strengthen recognition.
      find_limit_moderate_t:
        type: condition
        variable: temporal
        operator: lte
        value: 0.6
        true_next: moderate_limit_t
        false_next: moderate_balanced
      find_limit_weak_r:
        type: condition
        variable: recognition
        operator: lte
        value: 0.6
        true_next: weak_limit_r
        false_next: find_limit_weak_t
      moderate_limit_u:
        type: return
        value:
          priority_action: INVESTIGATE — crowded space reduces novelty. Find differentiating angle.
          limiting_factor: uniqueness
          verdict: MODERATE_SIGNAL
      moderate_limit_t:
        type: return
        value:
          limiting_factor: temporal
          priority_action: INVESTIGATE — aging data. Generate fresh evidence or deprioritize.
          verdict: MODERATE_SIGNAL
      find_limit_moderate:
        type: condition
        variable: uniqueness
        operator: lte
        value: 0.6
        true_next: moderate_limit_u
        false_next: find_limit_moderate_r
      check_moderate:
        type: condition
        variable: signal_score
        operator: gte
        value: 0.4
        true_next: find_limit_moderate
        false_next: check_weak
      noise:
        type: return
        value:
          verdict: NOISE
          limiting_factor: all
          priority_action: DISCARD — signal below noise threshold. Not worth investigating.
      strong_limit_u:
        type: return
        value:
          priority_action: PRIORITIZE — strong signal but novelty eroding. Publish before competition.
          limiting_factor: uniqueness
          verdict: STRONG_SIGNAL
      find_limit_strong:
        type: condition
        variable: uniqueness
        operator: lte
        value: 0.6
        true_next: strong_limit_u
        false_next: find_limit_strong_r
      strong_limit_r:
        type: return
        value:
          verdict: STRONG_SIGNAL
          priority_action: PRIORITIZE — advance clinical validation to unlock full potential.
          limiting_factor: recognition
      find_limit_strong_r:
        type: condition
        variable: recognition
        operator: lte
        value: 0.6
        true_next: strong_limit_r
        false_next: find_limit_strong_t
      find_limit_weak:
        type: condition
        variable: uniqueness
        operator: lte
        value: 0.6
        true_next: weak_limit_u
        false_next: find_limit_weak_r
      check_prime:
        type: condition
        variable: signal_score
        operator: gte
        value: 0.8
        true_next: find_limit_prime
        false_next: check_strong
      weak_limit_r:
        type: return
        value:
          limiting_factor: recognition
          verdict: WEAK_SIGNAL
          priority_action: DEPRIORITIZE — insufficient clinical validation. Monitor only.
      prime_limit_t:
        type: return
        value:
          verdict: PRIME_SIGNAL
          priority_action: FILE PATENT — publish updated results to refresh temporal score.
          limiting_factor: temporal
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: recognition
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: recognition
        operator: lt
        value: 0.8
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      temporal:
        type: number
        required: true
      recognition:
        type: number
        required: true
      uniqueness:
        type: number
        required: true
      signal_score:
        type: number
        required: true
    outputs:
      verdict:
        type: string
        required: false
      priority_action:
        type: string
        required: false
      limiting_factor:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    recognition: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
