name: station-who-umc-pipeline-helix
description: 'Forged from microgram ''station-who-umc-pipeline''. Domain: CausalityAssessment. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    priority: falsified
sense:
  tree:
    start: check_causality
    nodes:
      check_probable:
        type: condition
        variable: causality_category
        operator: eq
        value: probable
        true_next: probable
        false_next: check_possible
      check_possible:
        type: condition
        variable: causality_category
        operator: eq
        value: possible
        true_next: possible
        false_next: unlikely
      probable:
        type: return
        value:
          priority: high
          action: investigate
          route: causality_assessment
          reason: WHO-UMC Probable — likely causal, needs rechallenge or mechanism
      unlikely:
        type: return
        value:
          reason: WHO-UMC Unlikely/Unclassifiable — insufficient evidence for causality
          priority: low
          action: archive
          route: archive
      possible:
        type: return
        value:
          action: validate
          route: signal_validation
          priority: moderate
          reason: WHO-UMC Possible — temporal but alternative explanations exist
      certain:
        type: return
        value:
          route: regulatory_action
          priority: critical
          reason: WHO-UMC Certain — causal relationship established
          action: confirm
      check_causality:
        type: condition
        variable: causality_category
        operator: eq
        value: certain
        true_next: certain
        false_next: check_probable
antisense:
  tree:
    start: null_guard_alternative_cause
    nodes:
      null_guard_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: is_null
        value: null
        true_next: null_guard_no_dechallenge
        false_next: check_temporal_implausible
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_no_dechallenge
      null_guard_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: is_null
        value: null
        true_next: null_guard_temporal_implausible
        false_next: check_alternative_cause
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: eq
        value: false
        true_next: falsified
        false_next: null_guard_no_dechallenge
      check_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: eq
        value: likely
        true_next: falsified
        false_next: null_guard_temporal_implausible
      check_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      temporal_plausible:
        type: bool
        required: false
      dechallenge_positive:
        type: bool
        required: false
      alternative_causes:
        type: string
        required: false
    outputs:
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    alternative_causes: none
    temporal_plausible: true
    dechallenge_positive: true
    causality_category: certain
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, alternative_cause active'
  input:
    causality_category: certain
    alternative_causes: likely
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — causality-assessment with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: causality-assessment. Chains as dual-strand verifier before downstream consumers.'
