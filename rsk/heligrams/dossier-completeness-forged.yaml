name: dossier-completeness-helix
description: 'Forged from microgram ''dossier-completeness''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    completeness: falsified
sense:
  tree:
    start: check_faers
    nodes:
      minimal_faers_only:
        type: return
        value:
          completeness: minimal
          score: 35
          gaps: Regulatory guidelines and competitive data
      adequate_all:
        type: return
        value:
          completeness: adequate
          gaps: Low FAERS report volume
          score: 75
      check_competitors:
        type: condition
        variable: competitor_count
        operator: gt
        value: 0
        true_next: all_three_sections
        false_next: faers_and_guidelines
      check_faers:
        type: condition
        variable: has_faers
        operator: eq
        value: true
        true_next: check_guidelines
        false_next: check_any_data
      adequate_faers_strong:
        type: return
        value:
          score: 55
          gaps: Regulatory guidelines and competitive data
          completeness: adequate
      minimal_guidelines_only:
        type: return
        value:
          completeness: minimal
          score: 25
          gaps: FAERS safety data and competitive landscape
      faers_and_guidelines:
        type: return
        value:
          completeness: adequate
          gaps: Competitive landscape data
          score: 65
      all_three_sections:
        type: condition
        variable: faers_report_count
        operator: gte
        value: 1000
        true_next: comprehensive
        false_next: adequate_all
      check_competitors_only:
        type: condition
        variable: competitor_count
        operator: gt
        value: 0
        true_next: minimal_competitors_only
        false_next: empty_dossier
      check_guidelines:
        type: condition
        variable: guideline_hits
        operator: gt
        value: 0
        true_next: check_competitors
        false_next: check_faers_only_quality
      empty_dossier:
        type: return
        value:
          completeness: empty
          score: 0
          gaps: All sections — FAERS, guidelines, and competitors
      check_faers_only_quality:
        type: condition
        variable: faers_report_count
        operator: gte
        value: 5000
        true_next: adequate_faers_strong
        false_next: minimal_faers_only
      comprehensive:
        type: return
        value:
          completeness: comprehensive
          score: 95
          gaps: none
      check_any_data:
        type: condition
        variable: guideline_hits
        operator: gt
        value: 0
        true_next: minimal_guidelines_only
        false_next: check_competitors_only
      minimal_competitors_only:
        type: return
        value:
          score: 20
          gaps: FAERS safety data and regulatory guidelines
          completeness: minimal
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: competitor_count
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: competitor_count
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      guideline_hits:
        type: float
        required: true
      signal_count:
        type: float
        required: true
      faers_report_count:
        type: float
        required: true
      has_faers:
        type: bool
        required: true
      competitor_count:
        type: float
        required: true
    outputs:
      score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      gaps:
        type: string
        required: false
      completeness:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    faers_report_count: 50000
    guideline_hits: 8
    competitor_count: null
    has_faers: true
    signal_count: 5
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    faers_report_count: 50000
    guideline_hits: 8
    competitor_count: false
    has_faers: true
    signal_count: 5
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
