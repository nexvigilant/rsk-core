name: case-ingest-validator-helix
description: 'Forged from microgram ''case-ingest-validator''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    status: falsified
sense:
  tree:
    start: check_drug
    nodes:
      check_reporter:
        type: condition
        variable: has_reporter
        operator: eq
        value: true
        true_next: valid
        false_next: incomplete_no_reporter
      incomplete_no_reporter:
        type: return
        value:
          status: INCOMPLETE
          description: Missing reporter information - cannot ingest without reporter data
      rejected_no_drug:
        type: return
        value:
          description: Missing drug information - case rejected without suspect drug
          status: REJECTED
      check_drug:
        type: condition
        variable: has_drug
        operator: eq
        value: true
        true_next: check_event
        false_next: rejected_no_drug
      valid:
        type: return
        value:
          description: Case data complete - drug, event, and reporter all present
          status: VALID
      incomplete_no_event:
        type: return
        value:
          status: INCOMPLETE
          description: Missing adverse event - cannot ingest without event data
      check_event:
        type: condition
        variable: has_event
        operator: eq
        value: true
        true_next: check_reporter
        false_next: incomplete_no_event
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: has_reporter
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: has_reporter
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when: null
    default:
      confidence_score: 0.5
      confidence: medium
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      has_drug:
        type: bool
        required: false
      has_event:
        type: bool
        required: false
      has_reporter:
        type: bool
        required: false
    outputs:
      description:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      status:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    has_event: true
    has_drug: true
    has_reporter: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    has_event: true
    has_drug: true
    has_reporter: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
