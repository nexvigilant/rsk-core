name: pmr-delay-classifier-helix
description: 'Forged from microgram ''pmr-delay-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    action: falsified
sense:
  tree:
    start: check_fulfilled
    nodes:
      check_days_overdue_critical:
        type: condition
        variable: days_overdue
        operator: gte
        value: 180
        true_next: critical_overdue
        false_next: check_days_overdue_90
      check_terminated:
        type: condition
        variable: status
        operator: eq
        value: Terminated
        true_next: on_track_terminated
        false_next: check_delayed
      check_ongoing:
        type: condition
        variable: status
        operator: eq
        value: Ongoing
        true_next: check_ongoing_due
        false_next: on_track_other
      on_track_terminated:
        type: return
        value:
          action: No action required — commitment terminated
          classification: on_track
      at_risk_pending:
        type: return
        value:
          classification: at_risk
          action: Pending commitment past due date — initiate work
      delayed_significant:
        type: return
        value:
          classification: delayed
          action: Submit progress report to FDA — overdue 90+ days
      check_fulfilled:
        type: condition
        variable: status
        operator: eq
        value: Fulfilled
        true_next: on_track_fulfilled
        false_next: check_released
      delayed_recent:
        type: return
        value:
          action: Review timeline and submit updated schedule
          classification: delayed
      on_track_pending:
        type: return
        value:
          action: Commitment pending — monitor due date
          classification: on_track
      on_track_ongoing:
        type: return
        value:
          action: On track — continue per schedule
          classification: on_track
      critical_overdue:
        type: return
        value:
          action: Immediate escalation — overdue by 180+ days
          classification: critical
      on_track_other:
        type: return
        value:
          classification: on_track
          action: Status noted — monitor for changes
      on_track_fulfilled:
        type: return
        value:
          action: No action required — commitment fulfilled
          classification: on_track
      check_pending_due:
        type: condition
        variable: has_due_date
        operator: eq
        value: true
        true_next: check_pending_overdue
        false_next: pending_no_date
      check_released:
        type: condition
        variable: status
        operator: eq
        value: Released
        true_next: on_track_released
        false_next: check_terminated
      pending_no_date:
        type: return
        value:
          action: Pending without due date — request timeline from FDA
          classification: on_track
      check_ongoing_overdue:
        type: condition
        variable: days_overdue
        operator: gt
        value: 0
        true_next: at_risk_ongoing
        false_next: on_track_ongoing
      at_risk_ongoing:
        type: return
        value:
          classification: at_risk
          action: Ongoing but past due — accelerate completion
      check_delayed:
        type: condition
        variable: status
        operator: eq
        value: Delayed
        true_next: check_days_overdue_critical
        false_next: check_pending
      check_pending_overdue:
        type: condition
        variable: days_overdue
        operator: gt
        value: 0
        true_next: at_risk_pending
        false_next: on_track_pending
      check_pending:
        type: condition
        variable: status
        operator: eq
        value: Pending
        true_next: check_pending_due
        false_next: check_ongoing
      check_days_overdue_90:
        type: condition
        variable: days_overdue
        operator: gte
        value: 90
        true_next: delayed_significant
        false_next: delayed_recent
      check_ongoing_due:
        type: condition
        variable: has_due_date
        operator: eq
        value: true
        true_next: check_ongoing_overdue
        false_next: on_track_ongoing
      on_track_released:
        type: return
        value:
          classification: on_track
          action: No action required — requirement released
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: days_overdue
        operator: neq
        value: Fulfilled
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_negation:
        type: condition
        variable: days_overdue
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      days_overdue:
        type: number
        required: false
      status:
        type: string
        required: true
      has_due_date:
        type: bool
        required: true
      delay_rate:
        type: number
        required: false
    outputs:
      action:
        type: string
        required: false
      verdict:
        type: string
        required: false
      classification:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    status: Fulfilled
    days_overdue: null
    has_due_date: true
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    status: Fulfilled
    days_overdue: __negated__
    has_due_date: true
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
