name: naranjo-quick-helix
description: 'Forged from microgram ''naranjo-quick''. Domain: CausalityAssessment. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    causality: falsified
sense:
  tree:
    start: check_score_present
    nodes:
      check_score_present:
        type: condition
        variable: naranjo_score
        operator: is_null
        value: null
        true_next: reject_missing
        false_next: check_upper_bound
      probable_check:
        type: condition
        variable: naranjo_score
        operator: gte
        value: 5
        true_next: probable
        false_next: possible_check
      definite:
        type: return
        value:
          causality: DEFINITE
          confidence: 95
          action: withdraw_drug
      definite_check:
        type: condition
        variable: naranjo_score
        operator: gte
        value: 9
        true_next: definite
        false_next: probable_check
      probable:
        type: return
        value:
          confidence: 75
          causality: PROBABLE
          action: investigate
      doubtful:
        type: return
        value:
          confidence: 20
          action: document
          causality: DOUBTFUL
      reject_missing:
        type: return
        value:
          confidence: 0
          action: 'REJECTED: naranjo_score is required'
          causality: REJECTED
      reject_out_of_range:
        type: return
        value:
          action: 'REJECTED: naranjo_score must be in range [-4, 13]. Values outside this range indicate input error (possible PRR or other statistical value used instead of Naranjo score).'
          causality: REJECTED
          confidence: 0
      possible:
        type: return
        value:
          action: monitor
          causality: POSSIBLE
          confidence: 50
      possible_check:
        type: condition
        variable: naranjo_score
        operator: gte
        value: 1
        true_next: possible
        false_next: doubtful
      check_upper_bound:
        type: condition
        variable: naranjo_score
        operator: gt
        value: 13
        true_next: reject_out_of_range
        false_next: check_lower_bound
      check_lower_bound:
        type: condition
        variable: naranjo_score
        operator: lt
        value: -4
        true_next: reject_out_of_range
        false_next: definite_check
antisense:
  tree:
    start: null_guard_alternative_cause
    nodes:
      check_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: eq
        value: false
        true_next: falsified
        false_next: null_guard_no_dechallenge
      check_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      null_guard_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_no_dechallenge
      check_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: eq
        value: likely
        true_next: falsified
        false_next: null_guard_temporal_implausible
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: is_null
        value: null
        true_next: null_guard_temporal_implausible
        false_next: check_alternative_cause
      null_guard_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: is_null
        value: null
        true_next: null_guard_no_dechallenge
        false_next: check_temporal_implausible
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      dechallenge_positive:
        type: bool
        required: false
      alternative_causes:
        type: string
        required: false
      naranjo_score:
        type: int
        required: true
      temporal_plausible:
        type: bool
        required: false
    outputs:
      causality:
        type: string
        required: false
      action:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    alternative_causes: none
    dechallenge_positive: true
    temporal_plausible: true
    naranjo_score: 10
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, alternative_cause active'
  input:
    alternative_causes: likely
    naranjo_score: 10
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — causality-assessment with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - naranjo_score
  chain_prediction: 'Forged heligram. Domain: causality-assessment. Chains as dual-strand verifier before downstream consumers.'
