name: who-umc-quick-helix
description: 'Forged from microgram ''who-umc-quick''. Domain: CausalityAssessment. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    causality: falsified
sense:
  tree:
    start: time_plausible_check
    nodes:
      certain:
        type: return
        value:
          causality: CERTAIN
          regulatory_use: Highest confidence for regulatory action
          who_score: 6
          description: All criteria met including positive rechallenge
      known_reaction_check:
        type: condition
        variable: known_reaction
        operator: eq
        value: true
        true_next: no_alternative_check
        false_next: unlikely
      unclassified:
        type: return
        value:
          who_score: 1
          regulatory_use: Collect more information before assessment
          causality: UNCLASSIFIED
          description: Temporal relationship not established or insufficient information
      time_plausible_check:
        type: condition
        variable: time_plausible
        operator: eq
        value: true
        true_next: known_reaction_check
        false_next: unclassified
      no_alternative_check:
        type: condition
        variable: no_alternative_explanation
        operator: eq
        value: true
        true_next: dechallenge_check
        false_next: possible_low
      rechallenge_check:
        type: condition
        variable: rechallenge_positive
        operator: eq
        value: true
        true_next: certain
        false_next: probable
      probable:
        type: return
        value:
          who_score: 5
          causality: PROBABLE
          description: Plausible time, known reaction, no alternative, positive dechallenge
          regulatory_use: Strong signal for further investigation
      dechallenge_check:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: true
        true_next: rechallenge_check
        false_next: probable
      unlikely:
        type: return
        value:
          who_score: 2
          causality: UNLIKELY
          description: Plausible time but reaction not previously known to drug
          regulatory_use: Low priority for regulatory action
      possible_low:
        type: return
        value:
          description: Plausible time and known reaction but alternative explanations exist
          who_score: 3
          causality: POSSIBLE
          regulatory_use: Monitor and collect additional information
antisense:
  tree:
    start: null_guard_alternative_cause
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: is_null
        value: null
        true_next: null_guard_temporal_implausible
        false_next: check_alternative_cause
      null_guard_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_no_dechallenge
      check_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: eq
        value: false
        true_next: falsified
        false_next: null_guard_no_dechallenge
      check_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: eq
        value: likely
        true_next: falsified
        false_next: null_guard_temporal_implausible
      null_guard_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: is_null
        value: null
        true_next: null_guard_no_dechallenge
        false_next: check_temporal_implausible
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      time_plausible:
        type: bool
        required: false
      known_reaction:
        type: bool
        required: false
      rechallenge_positive:
        type: bool
        required: false
      temporal_plausible:
        type: bool
        required: false
      no_alternative_explanation:
        type: bool
        required: false
      alternative_causes:
        type: string
        required: false
      dechallenge_positive:
        type: bool
        required: false
    outputs:
      confidence:
        type: string
        required: false
      description:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      who_score:
        type: int
        required: false
      regulatory_use:
        type: string
        required: false
      causality:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    known_reaction: true
    dechallenge_positive: true
    rechallenge_positive: true
    temporal_plausible: true
    alternative_causes: none
    no_alternative_explanation: true
    time_plausible: true
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, alternative_cause active'
  input:
    alternative_causes: likely
    known_reaction: true
    no_alternative_explanation: true
    dechallenge_positive: true
    time_plausible: true
    rechallenge_positive: true
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — causality-assessment with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - time_plausible
  - known_reaction
  - no_alternative_explanation
  - dechallenge_positive
  - rechallenge_positive
  chain_prediction: 'Forged heligram. Domain: causality-assessment. Chains as dual-strand verifier before downstream consumers.'
