name: who-umc-quick-helix
description: 'Forged from microgram ''who-umc-quick''. Domain: CausalityAssessment. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    regulatory_use: falsified
sense:
  tree:
    start: time_plausible_check
    nodes:
      certain:
        type: return
        value:
          regulatory_use: Highest confidence for regulatory action
          description: All criteria met including positive rechallenge
          who_score: 6
          causality: CERTAIN
      dechallenge_check:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: true
        true_next: rechallenge_check
        false_next: probable
      possible_low:
        type: return
        value:
          causality: POSSIBLE
          description: Plausible time and known reaction but alternative explanations exist
          who_score: 3
          regulatory_use: Monitor and collect additional information
      time_plausible_check:
        type: condition
        variable: time_plausible
        operator: eq
        value: true
        true_next: known_reaction_check
        false_next: unclassified
      probable:
        type: return
        value:
          regulatory_use: Strong signal for further investigation
          causality: PROBABLE
          description: Plausible time, known reaction, no alternative, positive dechallenge
          who_score: 5
      rechallenge_check:
        type: condition
        variable: rechallenge_positive
        operator: eq
        value: true
        true_next: certain
        false_next: probable
      unlikely:
        type: return
        value:
          regulatory_use: Low priority for regulatory action
          causality: UNLIKELY
          who_score: 2
          description: Plausible time but reaction not previously known to drug
      known_reaction_check:
        type: condition
        variable: known_reaction
        operator: eq
        value: true
        true_next: no_alternative_check
        false_next: unlikely
      no_alternative_check:
        type: condition
        variable: no_alternative_explanation
        operator: eq
        value: true
        true_next: dechallenge_check
        false_next: possible_low
      unclassified:
        type: return
        value:
          regulatory_use: Collect more information before assessment
          description: Temporal relationship not established or insufficient information
          causality: UNCLASSIFIED
          who_score: 1
antisense:
  tree:
    start: check_alternative_cause
    nodes:
      check_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      check_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: eq
        value: false
        true_next: falsified
        false_next: check_no_dechallenge
      check_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: eq
        value: likely
        true_next: falsified
        false_next: check_temporal_implausible
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      no_alternative_explanation:
        type: bool
        required: false
      alternative_causes:
        type: string
        required: false
      known_reaction:
        type: bool
        required: false
      rechallenge_positive:
        type: bool
        required: false
      temporal_plausible:
        type: bool
        required: false
      dechallenge_positive:
        type: bool
        required: false
      time_plausible:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      causality:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      who_score:
        type: int
        required: false
      description:
        type: string
        required: false
      regulatory_use:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    alternative_causes: none
    time_plausible: true
    rechallenge_positive: true
    no_alternative_explanation: true
    dechallenge_positive: true
    known_reaction: true
    temporal_plausible: true
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, alternative_cause active'
  input:
    known_reaction: true
    alternative_causes: likely
    time_plausible: true
    rechallenge_positive: true
    no_alternative_explanation: true
    dechallenge_positive: true
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — causality-assessment with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - time_plausible
  - known_reaction
  - no_alternative_explanation
  - dechallenge_positive
  - rechallenge_positive
  chain_prediction: 'Forged heligram. Domain: causality-assessment. Chains as dual-strand verifier before downstream consumers.'
