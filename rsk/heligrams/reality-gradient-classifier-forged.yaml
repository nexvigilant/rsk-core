name: reality-gradient-classifier-helix
description: 'Forged from microgram ''reality-gradient-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    executable: falsified
sense:
  tree:
    start: check_production
    nodes:
      safety_validated:
        type: return
        value:
          executable: true
          description: Safety baseline met — efficacy evidence needed
          rating: safety_validated
      production_ready:
        type: return
        value:
          rating: production_ready
          description: All evidence strong — production deployment approved
          executable: true
      check_safety:
        type: condition
        variable: score
        operator: gte
        value: 0.2
        true_next: safety_validated
        false_next: testing_theater
      check_production:
        type: condition
        variable: score
        operator: gte
        value: 0.95
        true_next: production_ready
        false_next: check_scale
      efficacy_demonstrated:
        type: return
        value:
          description: Core efficacy demonstrated — scale testing required
          rating: efficacy_demonstrated
          executable: true
      scale_confirmed:
        type: return
        value:
          executable: true
          rating: scale_confirmed
          description: Scale evidence confirmed — final validation pending
      check_scale:
        type: condition
        variable: score
        operator: gte
        value: 0.8
        true_next: scale_confirmed
        false_next: check_efficacy
      testing_theater:
        type: return
        value:
          rating: testing_theater
          description: Insufficient evidence — testing theater risk
          executable: false
      check_efficacy:
        type: condition
        variable: score
        operator: gte
        value: 0.5
        true_next: efficacy_demonstrated
        false_next: check_safety
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: score
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: score
        operator: lt
        value: 0.95
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      executable: true
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
      executable: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when:
      executable: false
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: absent
      confidence_score: 0.7
  - when:
      executable: false
      falsified: true
    default: null
    emit:
      verdict: refuted
      confidence: medium
      confidence_score: 0.42
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      score:
        type: float
        required: false
    outputs:
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    score: null
  expect:
    verdict: absent
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    score: 0.98
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
