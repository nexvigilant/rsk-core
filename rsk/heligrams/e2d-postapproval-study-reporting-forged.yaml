name: e2d-postapproval-study-reporting-helix
description: 'Forged from microgram ''e2d-postapproval-study-reporting''. Domain: SeriousnessClassification. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    expedited_required: falsified
sense:
  tree:
    start: check_interventional
    nodes:
      return_periodic_obs:
        type: return
        value:
          expedited_required: false
          regulatory_reference: ICH E2D Section 6 / ICH E2C(R2)
          reporting_pathway: PSUR_AGGREGATE
          deadline_days: 90
      return_aggregate_obs:
        type: return
        value:
          reporting_pathway: AGGREGATE_LINE_LISTING
          deadline_days: 90
          expedited_required: false
          regulatory_reference: ICH E2D Section 6 - Periodic Safety Update Reports
      return_registry_protocol:
        type: return
        value:
          reporting_pathway: REGISTRY_PROTOCOL_DEFINED
          deadline_days: 15
          regulatory_reference: ICH E2D Section 4.3 - Post-Approval Study Safety Reporting
          expedited_required: true
      check_registry:
        type: condition
        variable: study_type
        operator: eq
        value: registry
        true_next: check_protocol_registry
        false_next: return_standard_periodic
      return_standard_periodic:
        type: return
        value:
          regulatory_reference: ICH E2D Section 6 - Periodic Safety Update Reports
          reporting_pathway: STANDARD_PERIODIC
          expedited_required: false
          deadline_days: 90
      check_unexpected_obs:
        type: condition
        variable: is_unexpected
        operator: eq
        value: true
        true_next: return_expedited_obs
        false_next: return_periodic_obs
      check_serious_interventional:
        type: condition
        variable: is_serious
        operator: eq
        value: true
        true_next: check_unexpected_interventional
        false_next: return_periodic_interventional
      check_protocol_registry:
        type: condition
        variable: protocol_defined
        operator: eq
        value: true
        true_next: return_registry_protocol
        false_next: return_aggregate_obs
      check_interventional:
        type: condition
        variable: is_interventional
        operator: eq
        value: true
        true_next: check_serious_interventional
        false_next: check_study_type_obs
      check_unexpected_interventional:
        type: condition
        variable: is_unexpected
        operator: eq
        value: true
        true_next: return_expedited_interventional
        false_next: return_periodic_interventional
      return_expedited_interventional:
        type: return
        value:
          expedited_required: true
          deadline_days: 15
          regulatory_reference: ICH E2D Section 4.3 - Post-Approval Study Safety Reporting
          reporting_pathway: IND_EQUIVALENT_EXPEDITED
      check_study_type_obs:
        type: condition
        variable: study_type
        operator: eq
        value: observational
        true_next: check_serious_obs
        false_next: check_registry
      return_expedited_obs:
        type: return
        value:
          reporting_pathway: SPONTANEOUS_EQUIVALENT_EXPEDITED
          regulatory_reference: ICH E2D Section 4.3 - Post-Approval Study Safety Reporting
          expedited_required: true
          deadline_days: 15
      check_serious_obs:
        type: condition
        variable: is_serious
        operator: eq
        value: true
        true_next: check_unexpected_obs
        false_next: return_aggregate_obs
      return_periodic_interventional:
        type: return
        value:
          reporting_pathway: DSUR_PERIODIC
          regulatory_reference: ICH E2D Section 4.3 / ICH E2F DSUR
          deadline_days: 365
          expedited_required: false
antisense:
  tree:
    start: check_incomplete_info
    nodes:
      check_incomplete_info:
        type: condition
        variable: follow_up_complete
        operator: eq
        value: false
        true_next: falsified
        false_next: check_comorbidity_confound
      check_comorbidity_confound:
        type: condition
        variable: comorbidity_explains
        operator: eq
        value: true
        true_next: falsified
        false_next: check_coding_error
      check_coding_error:
        type: condition
        variable: coding_verified
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      expedited_required: true
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      expedited_required: true
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when:
      falsified: false
      expedited_required: false
    default: null
    emit:
      verdict: absent
      confidence_score: 0.7
      confidence: high
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      study_type:
        type: string
        required: false
      comorbidity_explains:
        type: bool
        required: false
      is_unexpected:
        type: bool
        required: false
      coding_verified:
        type: bool
        required: false
      follow_up_complete:
        type: bool
        required: false
      is_serious:
        type: bool
        required: false
      protocol_defined:
        type: bool
        required: false
      is_interventional:
        type: bool
        required: false
    outputs:
      deadline_days:
        type: int
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      regulatory_reference:
        type: string
        required: false
      reporting_pathway:
        type: string
        required: false
      expedited_required:
        type: bool
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    is_interventional: true
    study_type: interventional
    comorbidity_explains: false
    coding_verified: true
    follow_up_complete: true
    is_serious: true
    is_unexpected: true
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, incomplete_info active'
  input:
    is_interventional: true
    study_type: interventional
    follow_up_complete: false
    is_serious: true
    is_unexpected: true
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — seriousness-classification with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - study_type
  - is_interventional
  - is_serious
  - is_unexpected
  - protocol_defined
  chain_prediction: 'Forged heligram. Domain: seriousness-classification. Chains as dual-strand verifier before downstream consumers.'
