name: drug-name-resolver-helix
description: 'Forged from microgram ''drug-name-resolver''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    needs_resolution: falsified
sense:
  tree:
    start: check_generic
    nodes:
      check_inn:
        type: condition
        variable: name_type
        operator: eq
        value: inn
        true_next: inn_route
        false_next: unknown_route
      generic_route:
        type: return
        value:
          normalized_name: generic
          resolution_source: rxnorm
          needs_resolution: false
          confidence: high
      inn_route:
        type: return
        value:
          resolution_source: who_dd
          needs_resolution: false
          normalized_name: inn
          confidence: high
      check_generic:
        type: condition
        variable: name_type
        operator: eq
        value: generic
        true_next: generic_route
        false_next: check_brand
      check_brand:
        type: condition
        variable: name_type
        operator: eq
        value: brand
        true_next: brand_route
        false_next: check_inn
      brand_route:
        type: return
        value:
          resolution_source: dailymed
          needs_resolution: false
          confidence: high
          normalized_name: brand
      unknown_route:
        type: return
        value:
          confidence: low
          resolution_source: multi_source
          needs_resolution: true
          normalized_name: unknown
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: name_type
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: name_type
        operator: neq
        value: generic
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      needs_resolution: true
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
      needs_resolution: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when:
      needs_resolution: false
      falsified: false
    default: null
    emit:
      verdict: absent
      confidence_score: 0.7
      confidence: high
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      name_type:
        type: string
        required: false
      drug_name:
        type: string
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      needs_resolution:
        type: bool
        required: false
      normalized_name:
        type: string
        required: false
      confidence:
        type: string
        required: false
      resolution_source:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    name_type: null
    drug_name: metformin
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    name_type: __negated__
    drug_name: metformin
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
