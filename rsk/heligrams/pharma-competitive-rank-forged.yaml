name: pharma-competitive-rank-helix
description: 'Forged from microgram ''pharma-competitive-rank''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    interpretation: falsified
sense:
  tree:
    start: check_dominant
    nodes:
      check_dominant:
        type: condition
        variable: relative_ratio
        operator: gte
        value: 3.0
        true_next: return_dominant
        false_next: check_peer
      check_peer:
        type: condition
        variable: relative_ratio
        operator: gte
        value: 1.0
        true_next: return_peer
        false_next: return_minor
      return_peer:
        type: return
        value:
          interpretation: Company reports at comparable or higher volume than the competitor — similar safety data density, warranting head-to-head signal comparison.
          competitive_position: peer_reporter
      return_minor:
        type: return
        value:
          competitive_position: minor_reporter
          interpretation: Company reports at lower volume than the competitor — may reflect smaller market share, newer products, or under-reporting relative to competitor baseline.
      return_dominant:
        type: return
        value:
          interpretation: Company has 3x or more FAERS reports than the named competitor — likely reflects greater market share, longer product history, or broader indication coverage.
          competitive_position: dominant_reporter
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_negation:
        type: condition
        variable: relative_ratio
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: relative_ratio
        operator: lt
        value: 3.0
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      relative_ratio:
        type: float
        required: false
      total_reports:
        type: int
        required: false
      competitor_total_reports:
        type: int
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      competitive_position:
        type: string
        required: false
      verdict:
        type: string
        required: false
      interpretation:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    relative_ratio: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
