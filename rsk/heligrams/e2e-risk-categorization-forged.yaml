name: e2e-risk-categorization-helix
description: 'Forged from microgram ''e2e-risk-categorization''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    action: falsified
sense:
  tree:
    start: check_refuted
    nodes:
      result_missing_collect:
        type: return
        value:
          action: collect_data
          regulatory_reference: ICH E2E Section 3 - Safety Specification
          risk_category: MISSING_INFORMATION
      check_population_exposed:
        type: condition
        variable: population_exposed
        operator: eq
        value: true
        true_next: result_missing_collect
        false_next: result_missing_plan
      check_confirmed:
        type: condition
        variable: evidence_level
        operator: eq
        value: confirmed
        true_next: check_cases
        false_next: check_theoretical
      result_none:
        type: return
        value:
          action: close_signal
          regulatory_reference: ICH E2E Section 3 - Safety Specification
          risk_category: NONE
      check_nonclinical:
        type: condition
        variable: evidence_level
        operator: eq
        value: nonclinical_signal
        true_next: result_potential
        false_next: check_no_data
      result_missing_plan:
        type: return
        value:
          risk_category: MISSING_INFORMATION
          action: plan_study
          regulatory_reference: ICH E2E Section 3 - Safety Specification
      result_identified:
        type: return
        value:
          regulatory_reference: ICH E2E Section 3 - Safety Specification
          risk_category: IDENTIFIED_RISK
          action: characterize_and_minimize
      result_unknown:
        type: return
        value:
          risk_category: NONE
          action: close_signal
          regulatory_reference: ICH E2E Section 3 - Safety Specification
      result_potential:
        type: return
        value:
          risk_category: POTENTIAL_RISK
          action: investigate_further
          regulatory_reference: ICH E2E Section 3 - Safety Specification
      check_refuted:
        type: condition
        variable: evidence_level
        operator: eq
        value: refuted
        true_next: result_none
        false_next: check_confirmed
      check_cases:
        type: condition
        variable: cases
        operator: gt
        value: 0
        true_next: result_identified
        false_next: result_identified_no_cases
      check_no_data:
        type: condition
        variable: evidence_level
        operator: eq
        value: no_data
        true_next: check_population_exposed
        false_next: result_unknown
      result_identified_no_cases:
        type: return
        value:
          regulatory_reference: ICH E2E Section 3 - Safety Specification
          risk_category: IDENTIFIED_RISK
          action: characterize_and_minimize
      check_theoretical:
        type: condition
        variable: evidence_level
        operator: eq
        value: theoretical
        true_next: result_potential
        false_next: check_nonclinical
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: population_exposed
        operator: neq
        value: refuted
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: population_exposed
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      evidence_level:
        type: string
        required: true
      cases:
        type: integer
        required: false
      population_exposed:
        type: bool
        required: false
    outputs:
      regulatory_reference:
        type: string
        required: false
      action:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      risk_category:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    population_exposed: null
    cases: 15
    evidence_level: confirmed
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    population_exposed: __negated__
    cases: 15
    evidence_level: confirmed
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
