name: e2a-disability-classifier-helix
description: 'Forged from microgram ''e2a-disability-classifier''. Domain: SeriousnessClassification. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    disability_criterion_met: falsified
sense:
  tree:
    start: check_disability_present
    nodes:
      check_significant:
        type: condition
        variable: significant_disruption
        operator: eq
        value: true
        true_next: check_duration
        false_next: check_daily_activities
      permanent_disability:
        type: return
        value:
          regulatory_reference: ICH E2A Section II.B - Significant, persistent or permanent incapacity/disability
          rationale: Permanent significant disability causing substantial disruption to normal life — seriousness criterion met
          disability_criterion_met: true
          seriousness_basis: DISABILITY
          disability_type: PERMANENT_SIGNIFICANT
      significant_disability:
        type: return
        value:
          seriousness_basis: DISABILITY
          rationale: Prolonged significant disability substantially disrupting normal life functioning — seriousness criterion met
          regulatory_reference: ICH E2A Section II.B - Significant, persistent or permanent incapacity/disability
          disability_criterion_met: true
          disability_type: SIGNIFICANT_PROLONGED
      check_daily_activities:
        type: condition
        variable: daily_activities_impaired
        operator: eq
        value: true
        true_next: check_duration
        false_next: minor_impairment
      check_pre_existing:
        type: condition
        variable: pre_existing_disability
        operator: eq
        value: true
        true_next: pre_existing_not_criterion
        false_next: check_significant
      check_duration:
        type: condition
        variable: disability_duration
        operator: eq
        value: permanent
        true_next: permanent_disability
        false_next: check_prolonged
      temporary_impairment:
        type: return
        value:
          disability_type: TEMPORARY_IMPAIRMENT
          rationale: Temporary impairment without significant or persistent disruption — does not meet disability seriousness criterion
          regulatory_reference: 'ICH E2A Section II.B - Note: temporary impairment without significant disruption is not a seriousness criterion'
          seriousness_basis: NONE
          disability_criterion_met: false
      pre_existing_not_criterion:
        type: return
        value:
          disability_criterion_met: false
          regulatory_reference: ICH E2A Section II.B - Pre-existing disability not attributable to the adverse event
          seriousness_basis: NONE
          disability_type: PRE_EXISTING
          rationale: Disability was pre-existing before the adverse event — not attributable to the event, criterion not met
      no_disability:
        type: return
        value:
          regulatory_reference: ICH E2A Section II.B - Disability criterion not applicable
          disability_type: NONE
          disability_criterion_met: false
          seriousness_basis: NONE
          rationale: No disability or incapacity reported — criterion not applicable
      check_disability_present:
        type: condition
        variable: disability_present
        operator: eq
        value: true
        true_next: check_pre_existing
        false_next: no_disability
      check_temporary:
        type: condition
        variable: disability_duration
        operator: eq
        value: temporary
        true_next: temporary_impairment
        false_next: significant_disability
      check_prolonged:
        type: condition
        variable: disability_duration
        operator: eq
        value: prolonged
        true_next: significant_disability
        false_next: check_temporary
      minor_impairment:
        type: return
        value:
          disability_criterion_met: false
          rationale: Minor impairment without significant daily activity impact — does not meet disability seriousness criterion
          regulatory_reference: 'ICH E2A Section II.B - Note: minor impairment without significant disruption is not a seriousness criterion'
          seriousness_basis: NONE
          disability_type: MINOR_IMPAIRMENT
antisense:
  tree:
    start: null_guard_incomplete_info
    nodes:
      check_comorbidity_confound:
        type: condition
        variable: comorbidity_explains
        operator: eq
        value: true
        true_next: falsified
        false_next: null_guard_coding_error
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_coding_error:
        type: condition
        variable: coding_verified
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_coding_error
      check_coding_error:
        type: condition
        variable: coding_verified
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      null_guard_incomplete_info:
        type: condition
        variable: follow_up_complete
        operator: is_null
        value: null
        true_next: null_guard_comorbidity_confound
        false_next: check_incomplete_info
      check_incomplete_info:
        type: condition
        variable: follow_up_complete
        operator: eq
        value: false
        true_next: falsified
        false_next: null_guard_comorbidity_confound
      null_guard_comorbidity_confound:
        type: condition
        variable: comorbidity_explains
        operator: is_null
        value: null
        true_next: null_guard_coding_error
        false_next: check_comorbidity_confound
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      disability_criterion_met: true
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      disability_criterion_met: true
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when:
      disability_criterion_met: false
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: absent
      confidence_score: 0.7
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      daily_activities_impaired:
        type: bool
        required: false
      pre_existing_disability:
        type: bool
        required: false
      disability_present:
        type: bool
        required: false
      comorbidity_explains:
        type: bool
        required: false
      follow_up_complete:
        type: bool
        required: false
      significant_disruption:
        type: bool
        required: false
      disability_duration:
        type: string
        required: false
      coding_verified:
        type: bool
        required: false
    outputs:
      rationale:
        type: string
        required: false
      regulatory_reference:
        type: string
        required: false
      seriousness_basis:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      disability_criterion_met:
        type: bool
        required: false
      confidence:
        type: string
        required: false
      disability_type:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    disability_present: true
    coding_verified: true
    significant_disruption: true
    pre_existing_disability: false
    daily_activities_impaired: true
    comorbidity_explains: false
    disability_duration: permanent
    follow_up_complete: true
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, incomplete_info active'
  input:
    disability_duration: permanent
    daily_activities_impaired: true
    disability_present: true
    follow_up_complete: false
    significant_disruption: true
    pre_existing_disability: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — seriousness-classification with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - disability_present
  - pre_existing_disability
  - significant_disruption
  - daily_activities_impaired
  - disability_duration
  chain_prediction: 'Forged heligram. Domain: seriousness-classification. Chains as dual-strand verifier before downstream consumers.'
