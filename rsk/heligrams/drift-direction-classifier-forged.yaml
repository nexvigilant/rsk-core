name: drift-direction-classifier-helix
description: 'Forged from microgram ''drift-direction-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    direction: falsified
sense:
  tree:
    start: check_rising
    nodes:
      check_rising:
        type: condition
        variable: change_pct
        operator: gt
        value: 5
        true_next: rising
        false_next: check_falling
      stable:
        type: return
        value:
          direction: stable
          traffic_level: green
      check_falling:
        type: condition
        variable: change_pct
        operator: lt
        value: -5
        true_next: falling
        false_next: stable
      rising:
        type: return
        value:
          traffic_level: red
          direction: rising
      falling:
        type: return
        value:
          traffic_level: green
          direction: falling
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: change_pct
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: change_pct
        operator: lte
        value: 5
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      change_pct:
        type: number
        required: true
    outputs:
      verdict:
        type: string
        required: false
      direction:
        type: string
        required: false
      confidence:
        type: string
        required: false
      traffic_level:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    change_pct: 15
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    change_pct: 5
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
