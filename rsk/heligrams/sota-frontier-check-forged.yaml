name: sota-frontier-check-helix
description: 'Forged from microgram ''sota-frontier-check''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    combined_score: falsified
sense:
  tree:
    start: check_evidence
    nodes:
      check_significant:
        type: condition
        variable: novelty_score
        operator: gte
        value: 50
        true_next: check_sig_authority
        false_next: check_incremental
      paradigm_shift:
        type: return
        value:
          combined_score: 100
          severity: P0
          frontier_movement: PARADIGM_SHIFT
          action: Immediate review — domain frontier has fundamentally moved. Update all dependent standards, retrain affected modules, notify stakeholders.
      check_evidence:
        type: condition
        variable: evidence_level
        operator: gte
        value: 3
        true_next: check_authority
        false_next: insufficient_evidence
      check_sig_authority:
        type: condition
        variable: authority_weight
        operator: gte
        value: 3
        true_next: significant_movement
        false_next: check_incremental
      check_incremental:
        type: condition
        variable: novelty_score
        operator: gte
        value: 25
        true_next: incremental_advance
        false_next: no_movement
      no_movement:
        type: return
        value:
          severity: NONE
          action: Finding is within current frontier. No SOTA drift detected.
          combined_score: 0
          frontier_movement: NONE
      insufficient_evidence:
        type: return
        value:
          frontier_movement: UNQUALIFIED
          severity: NONE
          action: 'Evidence level too low to assess frontier movement. Minimum: observational study (level 3).'
          combined_score: 0
      unrecognized_authority:
        type: return
        value:
          severity: NONE
          frontier_movement: UNQUALIFIED
          action: Finding not yet recognized by threshold authority. Monitor for peer-review acceptance.
          combined_score: 0
      check_paradigm_evidence:
        type: condition
        variable: evidence_level
        operator: gte
        value: 4
        true_next: check_paradigm_authority
        false_next: check_significant
      check_paradigm_shift:
        type: condition
        variable: novelty_score
        operator: gte
        value: 75
        true_next: check_paradigm_evidence
        false_next: check_significant
      check_authority:
        type: condition
        variable: authority_weight
        operator: gte
        value: 2
        true_next: check_paradigm_shift
        false_next: unrecognized_authority
      significant_movement:
        type: return
        value:
          severity: P1
          combined_score: 75
          action: Schedule frontier review within 30 days. Evaluate whether current tools/methods need updating against new standard.
          frontier_movement: SIGNIFICANT
      incremental_advance:
        type: return
        value:
          severity: P2
          action: Log frontier advance. No immediate action required. Include in next periodic SOTA review.
          combined_score: 40
          frontier_movement: INCREMENTAL
      check_paradigm_authority:
        type: condition
        variable: authority_weight
        operator: gte
        value: 4
        true_next: paradigm_shift
        false_next: check_significant
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: novelty_score
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: novelty_score
        operator: lt
        value: 3
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      authority_weight:
        type: int
        required: true
      novelty_score:
        type: int
        required: false
      evidence_level:
        type: int
        required: true
    outputs:
      confidence:
        type: string
        required: false
      combined_score:
        type: int
        required: false
      frontier_movement:
        type: string
        required: false
      action:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      severity:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    evidence_level: 5
    novelty_score: 13
    authority_weight: 5
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    evidence_level: 5
    novelty_score: 2
    authority_weight: 5
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - domain
  - evidence_level
  - authority_weight
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
