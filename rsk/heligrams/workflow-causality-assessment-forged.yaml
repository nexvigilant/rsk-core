name: workflow-causality-assessment-helix
description: 'Forged from microgram ''workflow-causality-assessment''. Domain: CausalityAssessment. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    causality: falsified
sense:
  tree:
    start: check_rechallenge
    nodes:
      check_temporal:
        type: condition
        variable: temporal_clear
        operator: eq
        value: true
        true_next: check_mechanism
        false_next: unlikely
      possible:
        type: return
        value:
          causality: possible
          chain: who-umc → meddra → epidemiology
          confidence: 0.5
      probable:
        type: return
        value:
          chain: who-umc → drugbank → calculation
          causality: probable
          confidence: 0.8
      check_rechallenge:
        type: condition
        variable: rechallenge_positive
        operator: eq
        value: true
        true_next: certain
        false_next: check_temporal
      check_mechanism:
        type: condition
        variable: mechanism_known
        operator: eq
        value: true
        true_next: probable
        false_next: possible
      certain:
        type: return
        value:
          chain: who-umc → harm-taxonomy → fda-safety
          causality: certain
          confidence: 0.95
      unlikely:
        type: return
        value:
          causality: unlikely
          chain: who-umc
          confidence: 0.2
antisense:
  tree:
    start: null_guard_alternative_cause
    nodes:
      null_guard_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: is_null
        value: null
        true_next: null_guard_temporal_implausible
        false_next: check_alternative_cause
      check_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: eq
        value: likely
        true_next: falsified
        false_next: null_guard_temporal_implausible
      check_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      null_guard_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: is_null
        value: null
        true_next: null_guard_no_dechallenge
        false_next: check_temporal_implausible
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: eq
        value: false
        true_next: falsified
        false_next: null_guard_no_dechallenge
      null_guard_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_no_dechallenge
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      temporal_plausible:
        type: bool
        required: false
      dechallenge_positive:
        type: bool
        required: false
      alternative_causes:
        type: string
        required: false
    outputs:
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    alternative_causes: none
    rechallenge_positive: false
    temporal_clear: false
    dechallenge_positive: true
    temporal_plausible: true
    mechanism_known: false
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, alternative_cause active'
  input:
    alternative_causes: likely
    rechallenge_positive: false
    temporal_clear: false
    mechanism_known: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — causality-assessment with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: causality-assessment. Chains as dual-strand verifier before downstream consumers.'
