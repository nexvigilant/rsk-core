name: smm-credibility-gate-helix
description: 'Forged from microgram ''smm-credibility-gate''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    review_action: falsified
sense:
  tree:
    start: check_exemplary
    nodes:
      not_credible:
        type: return
        value:
          review_action: Exclude from K-state. Structural integrity insufficient for evidence integration.
          cs_range: 0.00-0.29
          credibility_level: NOT_CREDIBLE
          integration_weight: exclude
      weak:
        type: return
        value:
          credibility_level: WEAK
          integration_weight: low
          cs_range: 0.30-0.59
          review_action: Integrate at 0.25x weight. Requires supporting corroboration from independent sources.
      check_high:
        type: condition
        variable: severity_band
        operator: eq
        value: HIGH
        true_next: credible
        false_next: check_moderate
      check_exemplary:
        type: condition
        variable: severity_band
        operator: eq
        value: EXEMPLARY
        true_next: authoritative
        false_next: check_high
      check_low:
        type: condition
        variable: severity_band
        operator: eq
        value: LOW
        true_next: weak
        false_next: not_credible
      credible:
        type: return
        value:
          credibility_level: CREDIBLE
          review_action: Integrate at high weight. Advisory flags for minor gaps.
          cs_range: 0.80-0.89
          integration_weight: high
      authoritative:
        type: return
        value:
          credibility_level: AUTHORITATIVE
          integration_weight: full
          review_action: Integrate at full weight. Minor violations annotated.
          cs_range: 0.90-1.00
      check_moderate:
        type: condition
        variable: severity_band
        operator: eq
        value: MODERATE
        true_next: conditional
        false_next: check_low
      conditional:
        type: return
        value:
          credibility_level: CONDITIONAL
          integration_weight: conditional
          review_action: Integrate at 0.60x weight. Violation summary appended. Remediation recommended.
          cs_range: 0.60-0.79
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: severity_band
        operator: neq
        value: EXEMPLARY
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_negation:
        type: condition
        variable: severity_band
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when: null
    default:
      confidence_score: 0.5
      confidence: medium
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      severity_band:
        type: string
        required: false
    outputs:
      verdict:
        type: string
        required: false
      integration_weight:
        type: string
        required: false
      credibility_level:
        type: string
        required: false
      review_action:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      cs_range:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    severity_band: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    severity_band: __negated__
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
