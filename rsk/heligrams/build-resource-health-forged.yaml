name: build-resource-health-helix
description: 'Forged from microgram ''build-resource-health''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    status: falsified
sense:
  tree:
    start: check_headroom_critical
    nodes:
      healthy_needs_maintenance:
        type: return
        value:
          status: GREEN
          severity: LOW
          resource_action: Resources adequate but cache prune recommended
          score: 75
      check_prune_needed:
        type: condition
        variable: prune_cache
        operator: eq
        value: true
        true_next: low_with_prune
        false_next: low_resources
      low_resources:
        type: return
        value:
          severity: HIGH
          score: 30
          resource_action: Reduce build parallelism — approaching memory limits
          status: YELLOW
      moderate_resources:
        type: return
        value:
          resource_action: Monitor memory usage — consider sequential builds for heavy crates
          severity: MODERATE
          status: YELLOW
          score: 55
      healthy_resources:
        type: return
        value:
          status: GREEN
          severity: LOW
          score: 90
          resource_action: Resources healthy — full parallel build capacity available
      critical_resources:
        type: return
        value:
          score: 10
          status: RED
          resource_action: Halt non-essential builds — memory critically low
          severity: CRITICAL
      check_healthy_prune:
        type: condition
        variable: prune_cache
        operator: eq
        value: true
        true_next: healthy_needs_maintenance
        false_next: healthy_resources
      low_with_prune:
        type: return
        value:
          status: RED
          severity: HIGH
          resource_action: Prune build cache and reduce parallel jobs immediately
          score: 25
      check_headroom_low:
        type: condition
        variable: headroom_pct
        operator: lt
        value: 25
        true_next: check_prune_needed
        false_next: check_headroom_moderate
      check_headroom_moderate:
        type: condition
        variable: headroom_pct
        operator: lt
        value: 50
        true_next: moderate_resources
        false_next: check_healthy_prune
      check_headroom_critical:
        type: condition
        variable: headroom_pct
        operator: lt
        value: 10
        true_next: critical_resources
        false_next: check_headroom_low
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: prune_cache
        operator: gte
        value: 10
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: prune_cache
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      headroom_pct:
        type: int
        required: true
      prune_cache:
        type: bool
        required: false
    outputs:
      resource_action:
        type: string
        required: true
      status:
        type: string
        required: true
      score:
        type: int
        required: true
      verdict:
        type: string
        required: false
      severity:
        type: string
        required: true
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    prune_cache: 0
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    prune_cache: 10
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
