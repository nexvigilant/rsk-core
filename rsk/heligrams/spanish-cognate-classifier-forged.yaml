name: spanish-cognate-classifier-helix
description: 'Forged from microgram ''spanish-cognate-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    cognate_confidence: falsified
sense:
  tree:
    start: check_latin_root_present
    nodes:
      high_confidence:
        type: return
        value:
          cognate_confidence: high
          learning_strategy: transfer
      moderate_confidence:
        type: return
        value:
          learning_strategy: pattern_match
          cognate_confidence: moderate
      check_tion:
        type: condition
        variable: ends_in_tion
        operator: eq
        value: true
        true_next: high_confidence
        false_next: check_al
      low_confidence:
        type: return
        value:
          learning_strategy: memorize
          cognate_confidence: low
      check_al:
        type: condition
        variable: ends_in_al
        operator: eq
        value: true
        true_next: high_confidence
        false_next: moderate_confidence
      check_latin_root:
        type: condition
        variable: latin_root
        operator: eq
        value: true
        true_next: check_tion
        false_next: low_confidence
      check_latin_root_present:
        type: condition
        variable: latin_root
        operator: is_null
        value: null
        true_next: reject_missing
        false_next: check_latin_root
      reject_missing:
        type: return
        value:
          cognate_confidence: REJECTED
          learning_strategy: 'REJECTED: latin_root is required'
antisense:
  tree:
    start: check_negation
    nodes:
      check_negation:
        type: condition
        variable: ends_in_tion
        operator: is_not_null
        value: null
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      latin_root:
        type: bool
        required: false
      ends_in_tion:
        type: bool
        required: false
      syllable_count:
        type: int
        required: false
      ends_in_al:
        type: bool
        required: false
    outputs:
      confidence:
        type: string
        required: false
      cognate_confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      learning_strategy:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    latin_root: true
    ends_in_tion: null
    ends_in_al: false
    syllable_count: 3
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    latin_root: true
    ends_in_tion: null
    ends_in_al: false
    syllable_count: 3
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
