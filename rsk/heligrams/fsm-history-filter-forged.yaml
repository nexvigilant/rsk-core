name: fsm-history-filter-helix
description: 'Forged from microgram ''fsm-history-filter''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    relevance: falsified
sense:
  tree:
    start: check_active
    nodes:
      active:
        type: return
        value:
          relevance: ACTIVE
          description: Recent FSM activity within 7 days - history is current and actionable
      stale:
        type: return
        value:
          relevance: STALE
          description: FSM last updated 8-30 days ago - history may need refresh or follow-up
      archived:
        type: return
        value:
          description: FSM inactive for more than 30 days - history archived for audit purposes
          relevance: ARCHIVED
      check_active:
        type: condition
        variable: days_since_last
        operator: lte
        value: 7
        true_next: active
        false_next: check_stale
      check_stale:
        type: condition
        variable: days_since_last
        operator: lte
        value: 30
        true_next: check_stale_count
        false_next: archived
      check_stale_count:
        type: condition
        variable: transitions_count
        operator: gte
        value: 1
        true_next: stale
        false_next: archived
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: days_since_last
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: days_since_last
        operator: gt
        value: 7
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when: null
    default:
      confidence_score: 0.5
      confidence: medium
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      days_since_last:
        type: int
        required: false
      transitions_count:
        type: int
        required: false
    outputs:
      relevance:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      description:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    days_since_last: 0
    transitions_count: 5
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    days_since_last: 8
    transitions_count: 5
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
