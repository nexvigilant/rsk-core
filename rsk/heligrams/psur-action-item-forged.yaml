name: psur-action-item-helix
description: 'Forged from microgram ''psur-action-item''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    psur_action_compliant: falsified
sense:
  tree:
    start: validate_psur_conclusion
    nodes:
      other_action:
        type: return
        value:
          psur_action_compliant: true
          responsible_party: marketing_authorization_holder
          action_item: other_regulatory_action
          priority: routine
          implementation_timeline_days: 90
      no_action_items:
        type: return
        value:
          psur_action_compliant: true
          action_item: continue_routine_monitoring
          responsible_party: null
          priority: none
          implementation_timeline_days: 0
      label_action:
        type: return
        value:
          responsible_party: marketing_authorization_holder
          implementation_timeline_days: 30
          action_item: update_product_label
          priority: high
          psur_action_compliant: true
      rmp_action:
        type: return
        value:
          responsible_party: marketing_authorization_holder
          action_item: update_risk_management_plan
          priority: high
          psur_action_compliant: true
          implementation_timeline_days: 60
      validate_psur_conclusion:
        type: condition
        variable: regulatory_action_required
        operator: eq
        value: true
        true_next: check_action_type
        false_next: no_action_items
      check_action_type:
        type: condition
        variable: action_category
        operator: eq
        value: label_update
        true_next: label_action
        false_next: check_risk_mitigation
      check_risk_mitigation:
        type: condition
        variable: action_category
        operator: eq
        value: risk_minimization
        true_next: rmp_action
        false_next: other_action
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: regulatory_action_required
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: regulatory_action_required
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      psur_action_compliant: true
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
      psur_action_compliant: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when:
      falsified: false
      psur_action_compliant: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: absent
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      regulatory_action_required:
        type: bool
        required: false
    outputs:
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    regulatory_action_required: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    regulatory_action_required: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
