name: confidence-gate-helix
description: 'Forged from microgram ''confidence-gate''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    actionable: falsified
sense:
  tree:
    start: high_check
    nodes:
      high:
        type: return
        value:
          actionable: true
          confidence_level: HIGH
      low:
        type: return
        value:
          actionable: false
          confidence_level: LOW
      high_check:
        type: condition
        variable: confidence
        operator: gte
        value: 80
        true_next: high
        false_next: medium_check
      medium:
        type: return
        value:
          confidence_level: MEDIUM
          actionable: true
      medium_check:
        type: condition
        variable: confidence
        operator: gte
        value: 50
        true_next: medium
        false_next: low
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: confidence
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_negation:
        type: condition
        variable: confidence
        operator: lt
        value: 80
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      actionable: true
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      actionable: true
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when:
      falsified: false
      actionable: false
    default: null
    emit:
      verdict: absent
      confidence: high
      confidence_score: 0.7
  - when:
      actionable: false
      falsified: true
    default: null
    emit:
      confidence: medium
      confidence_score: 0.42
      verdict: refuted
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      confidence:
        type: string
        required: false
    outputs:
      confidence_level:
        type: string
        required: false
      actionable:
        type: bool
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    confidence: null
  expect:
    confidence: high
    verdict: absent
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    confidence: 90
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
