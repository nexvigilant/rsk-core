name: station-cioms-pipeline-helix
description: 'Forged from microgram ''station-cioms-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    priority: falsified
sense:
  tree:
    start: check_form
    nodes:
      standard_report:
        type: return
        value:
          priority: moderate
          route: case_submission
          reason: CIOMS I form within deadline — standard submission workflow
          action: submit
      cioms_ii:
        type: return
        value:
          priority: moderate
          action: review
          reason: CIOMS II periodic safety report — aggregate analysis
          route: periodic_review
      check_form_ii:
        type: condition
        variable: form_type
        operator: eq
        value: II
        true_next: cioms_ii
        false_next: other_form
      other_form:
        type: return
        value:
          reason: CIOMS working group reference — informational
          route: archive
          priority: low
          action: reference
      check_form:
        type: condition
        variable: form_type
        operator: eq
        value: I
        true_next: cioms_i
        false_next: check_form_ii
      cioms_i:
        type: condition
        variable: days_to_deadline
        operator: lte
        value: 3
        true_next: urgent_report
        false_next: standard_report
      urgent_report:
        type: return
        value:
          reason: CIOMS I form with ≤3 days to deadline — expedited submission required
          priority: critical
          route: expedited_reporting
          action: expedite
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: form_type
        operator: neq
        value: I
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: form_type
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      form_type:
        type: string
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    form_type: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    form_type: __negated__
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
