name: compliance-state-tracker-helix
description: 'Forged from microgram ''compliance-state-tracker''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    ich_control: falsified
sense:
  tree:
    start: check_state
    nodes:
      report_gate:
        type: condition
        variable: reported
        operator: eq
        value: true
        true_next: advance_to_reported
        false_next: blocked_reporting
      check_validated:
        type: condition
        variable: current_state
        operator: eq
        value: VALIDATED
        true_next: assess_gate
        false_next: check_assessed
      initial_state:
        type: return
        value:
          ich_control: ICH-E2A-1
          compliance_state: RECEIVED
          next_state: RECEIVED
          action_required: run_e2a_minimum_criteria
      blocked_assessment:
        type: return
        value:
          compliance_state: VALIDATED
          next_state: VALIDATED
          ich_control: ICH-E2C-2
          action_required: complete_seriousness_causality_assessment
      advance_to_reported:
        type: return
        value:
          action_required: monitor_for_followup
          next_state: REPORTED
          compliance_state: ASSESSED
          ich_control: ICH-E2A-2
      advance_to_assessed:
        type: return
        value:
          next_state: ASSESSED
          action_required: run_expedited_reporting_decision
          compliance_state: VALIDATED
          ich_control: ICH-E2A-2
      blocked_reporting:
        type: return
        value:
          compliance_state: ASSESSED
          next_state: ASSESSED
          ich_control: ICH-E2A-2
          action_required: submit_regulatory_report
      check_state:
        type: condition
        variable: current_state
        operator: eq
        value: RECEIVED
        true_next: validate_gate
        false_next: check_validated
      check_reported:
        type: condition
        variable: current_state
        operator: eq
        value: REPORTED
        true_next: close_gate
        false_next: initial_state
      check_assessed:
        type: condition
        variable: current_state
        operator: eq
        value: ASSESSED
        true_next: report_gate
        false_next: check_reported
      advance_to_validated:
        type: return
        value:
          compliance_state: RECEIVED
          next_state: VALIDATED
          action_required: run_case_assessment_pipeline
          ich_control: ICH-E2A-1
      close_gate:
        type: return
        value:
          compliance_state: REPORTED
          ich_control: ICH-E2A-1
          next_state: CLOSED
          action_required: archive_case
      validate_gate:
        type: condition
        variable: valid_icsr
        operator: eq
        value: true
        true_next: advance_to_validated
        false_next: blocked_validation
      assess_gate:
        type: condition
        variable: assessed
        operator: eq
        value: true
        true_next: advance_to_assessed
        false_next: blocked_assessment
      blocked_validation:
        type: return
        value:
          ich_control: ICH-E2A-1
          next_state: RECEIVED
          compliance_state: RECEIVED
          action_required: collect_missing_icsr_elements
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: reported
        operator: neq
        value: RECEIVED
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: reported
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      valid_icsr:
        type: bool
        required: false
      assessed:
        type: bool
        required: false
      reported:
        type: bool
        required: false
      current_state:
        type: string
        required: false
    outputs:
      action_required:
        type: string
        required: false
      next_state:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      ich_control:
        type: string
        required: false
      verdict:
        type: string
        required: false
      compliance_state:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    valid_icsr: false
    reported: null
    current_state: RECEIVED
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    valid_icsr: false
    reported: __negated__
    current_state: RECEIVED
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
