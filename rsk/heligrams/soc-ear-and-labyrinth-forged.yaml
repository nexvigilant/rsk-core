name: soc-ear-and-labyrinth-helix
description: 'Forged from microgram ''soc-ear-and-labyrinth''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    soc: falsified
sense:
  tree:
    start: check_serious
    nodes:
      check_fatal:
        type: condition
        variable: is_fatal
        operator: eq
        value: true
        true_next: fatal
        false_next: serious
      serious:
        type: return
        value:
          soc: Ear and labyrinth
          severity: serious
          route: signal_investigation
          priority: high
      fatal:
        type: return
        value:
          route: causality_assessment
          soc: Ear and labyrinth
          severity: fatal
          priority: critical
      non_serious:
        type: return
        value:
          soc: Ear and labyrinth
          priority: low
          severity: non_serious
          route: periodic_review
      check_serious:
        type: condition
        variable: is_serious
        operator: eq
        value: true
        true_next: check_fatal
        false_next: non_serious
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: is_fatal
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: is_fatal
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      is_fatal:
        type: bool
        required: false
    outputs:
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    is_fatal: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    is_fatal: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
