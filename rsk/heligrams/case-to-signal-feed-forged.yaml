name: case-to-signal-feed-helix
description: 'Forged from microgram ''case-to-signal-feed''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    signal_feed_record: falsified
sense:
  tree:
    start: validate_drug
    nodes:
      check_age:
        type: condition
        variable: patient_age
        operator: is_not_null
        value: null
        true_next: with_age
        false_next: without_age
      with_age:
        type: return
        value:
          signal_feed_record:
            outcome: '{{ outcome }}'
            event: '{{ event_term }}'
            age_group: adult
            drug: '{{ drug_name }}'
            data_quality: high
            complete: true
      without_age:
        type: return
        value:
          signal_feed_record:
            complete: false
            event: '{{ event_term }}'
            data_quality: medium
            age_group: unknown
            outcome: '{{ outcome }}'
            drug: '{{ drug_name }}'
      missing_drug:
        type: return
        value:
          signal_feed_record:
            age_group: null
            complete: false
            data_quality: low
            event: '{{ event_term }}'
            drug: null
            outcome: '{{ outcome }}'
      missing_event:
        type: return
        value:
          signal_feed_record:
            outcome: '{{ outcome }}'
            data_quality: low
            drug: '{{ drug_name }}'
            age_group: null
            event: null
            complete: false
      validate_drug:
        type: condition
        variable: drug_name
        operator: is_not_null
        value: null
        true_next: validate_event
        false_next: missing_drug
      validate_event:
        type: condition
        variable: event_term
        operator: is_not_null
        value: null
        true_next: check_age
        false_next: missing_event
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: patient_age
        operator: is_null
        value: null
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_negation:
        type: condition
        variable: patient_age
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      patient_age:
        type: integer
        required: false
      drug_name:
        type: string
        required: true
      event_term:
        type: string
        required: true
      outcome:
        type: string
        required: false
    outputs:
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      signal_feed_record:
        type: object
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    patient_age: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
