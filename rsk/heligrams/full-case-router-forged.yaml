name: full-case-router-helix
description: 'Forged from microgram ''full-case-router''. Domain: CausalityAssessment. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    priority: falsified
sense:
  tree:
    start: check_death
    nodes:
      serious_causality_check:
        type: condition
        variable: causality_assessed
        operator: eq
        value: true
        true_next: file_expedited
        false_next: assess_urgent
      check_death:
        type: condition
        variable: has_death
        operator: eq
        value: true
        true_next: serious_causality_check
        false_next: check_hospitalization
      check_signal_non_serious:
        type: condition
        variable: signal_detected
        operator: eq
        value: true
        true_next: assess_routine
        false_next: routine_monitoring
      file_expedited:
        type: return
        value:
          priority: P1
          next_action: FILE_EXPEDITED_REPORT
          tool_path: /vigilance/reporting
          reason: Serious case with causality assessed - proceed to expedited regulatory filing
      check_hospitalization:
        type: condition
        variable: has_hospitalization
        operator: eq
        value: true
        true_next: serious_causality_check
        false_next: check_disability
      assess_routine:
        type: return
        value:
          tool_path: /vigilance/causality
          next_action: ASSESS_CAUSALITY_ROUTINE
          priority: P2
          reason: Signal detected in non-serious case - routine causality assessment recommended
      routine_monitoring:
        type: return
        value:
          next_action: ROUTINE_MONITORING
          priority: P3
          reason: No serious criteria and no signal - continue routine pharmacovigilance monitoring
          tool_path: /vigilance/signals
      check_disability:
        type: condition
        variable: has_disability
        operator: eq
        value: true
        true_next: serious_causality_check
        false_next: check_signal_non_serious
      assess_urgent:
        type: return
        value:
          priority: P0
          tool_path: /vigilance/causality
          reason: Serious case criteria met - immediate causality assessment required before expedited filing
          next_action: ASSESS_CAUSALITY_URGENT
antisense:
  tree:
    start: null_guard_alternative_cause
    nodes:
      check_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: eq
        value: false
        true_next: falsified
        false_next: null_guard_no_dechallenge
      null_guard_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: is_null
        value: null
        true_next: null_guard_no_dechallenge
        false_next: check_temporal_implausible
      check_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      null_guard_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: is_null
        value: null
        true_next: null_guard_temporal_implausible
        false_next: check_alternative_cause
      check_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: eq
        value: likely
        true_next: falsified
        false_next: null_guard_temporal_implausible
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_no_dechallenge
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      has_hospitalization:
        type: bool
        required: false
      signal_detected:
        type: bool
        required: false
      temporal_plausible:
        type: bool
        required: false
      has_disability:
        type: bool
        required: false
      causality_assessed:
        type: bool
        required: false
      alternative_causes:
        type: string
        required: false
      has_death:
        type: bool
        required: false
      dechallenge_positive:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      next_action:
        type: string
        required: false
      tool_path:
        type: string
        required: false
      priority:
        type: string
        required: false
      verdict:
        type: string
        required: false
      reason:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    dechallenge_positive: true
    alternative_causes: none
    temporal_plausible: true
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, alternative_cause active'
  input:
    alternative_causes: likely
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — causality-assessment with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: causality-assessment. Chains as dual-strand verifier before downstream consumers.'
