name: underreporting-estimator-helix
description: 'Forged from microgram ''underreporting-estimator''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    estimated_reporting_pct: falsified
sense:
  tree:
    start: check_severe
    nodes:
      severe_underreporting:
        type: return
        value:
          estimated_reporting_pct: 1-10%
          category: SEVERE_UNDERREPORTING
          description: Severe underreporting detected - estimated 1-10% of cases reported
          recommendation: Initiate active surveillance and reporting system audit
      moderate_underreporting:
        type: return
        value:
          category: MODERATE_UNDERREPORTING
          estimated_reporting_pct: 10%
          recommendation: Monitor reporting trends and apply adjustment factors
          description: Moderate underreporting detected - estimated ~10% of cases reported
      check_significant:
        type: condition
        variable: reporting_ratio
        operator: lt
        value: 0.05
        true_next: significant_underreporting
        false_next: check_moderate
      acceptable_reporting:
        type: return
        value:
          estimated_reporting_pct: '>10%'
          recommendation: Continue routine monitoring
          description: Reporting rate within acceptable range for spontaneous reporting systems
          category: ACCEPTABLE_REPORTING
      check_severe:
        type: condition
        variable: reporting_ratio
        operator: lt
        value: 0.01
        true_next: severe_underreporting
        false_next: check_significant
      significant_underreporting:
        type: return
        value:
          estimated_reporting_pct: 5-10%
          category: SIGNIFICANT_UNDERREPORTING
          recommendation: Enhance passive surveillance and educate reporters
          description: Significant underreporting detected - estimated 5-10% of cases reported
      check_moderate:
        type: condition
        variable: reporting_ratio
        operator: lt
        value: 0.1
        true_next: moderate_underreporting
        false_next: acceptable_reporting
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: reporting_ratio
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: reporting_ratio
        operator: gte
        value: 0.01
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      reporting_ratio:
        type: float
        required: false
    outputs:
      confidence:
        type: string
        required: false
      description:
        type: string
        required: false
      estimated_reporting_pct:
        type: string
        required: false
      recommendation:
        type: string
        required: false
      category:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    data_source: spontaneous
    reporting_ratio: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    data_source: spontaneous
    reporting_ratio: 0.01
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
