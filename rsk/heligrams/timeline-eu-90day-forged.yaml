name: timeline-eu-90day-helix
description: 'Forged from microgram ''timeline-eu-90day''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    due: falsified
sense:
  tree:
    start: check
    nodes:
      check:
        type: condition
        variable: days_to_deadline
        operator: lte
        value: 90
        true_next: due
        false_next: not_due
      due:
        type: return
        value:
          action: submit
          report_type: periodic
          jurisdiction: EU
          due: true
      not_due:
        type: return
        value:
          jurisdiction: EU
          due: false
          action: schedule
          report_type: periodic
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: days_to_deadline
        operator: gt
        value: 90
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: days_to_deadline
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      due: true
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      due: true
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when:
      falsified: false
      due: false
    default: null
    emit:
      confidence: high
      verdict: absent
      confidence_score: 0.7
  - when:
      due: false
      falsified: true
    default: null
    emit:
      verdict: refuted
      confidence_score: 0.42
      confidence: medium
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      days_to_deadline:
        type: integer
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    days_to_deadline: null
  expect:
    confidence: high
    verdict: absent
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    days_to_deadline: 90
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
