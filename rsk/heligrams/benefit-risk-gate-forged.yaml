name: benefit-risk-gate-helix
description: 'Forged from microgram ''benefit-risk-gate''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    benefit_risk_ratio: falsified
sense:
  tree:
    start: negative_check
    nodes:
      favorable_benefit_check:
        type: condition
        variable: benefit_score
        operator: gte
        value: 80
        true_next: favorable_risk_check
        false_next: acceptable_benefit_check
      acceptable_risk_check:
        type: condition
        variable: risk_score
        operator: lte
        value: 40
        true_next: acceptable
        false_next: conditional_benefit_check
      conditional_unmet_check:
        type: condition
        variable: unmet_need
        operator: eq
        value: true
        true_next: conditional
        false_next: conditional_alt_check
      conditional_alt_check:
        type: condition
        variable: alternative_available
        operator: eq
        value: true
        true_next: unfavorable
        false_next: conditional
      acceptable_benefit_check:
        type: condition
        variable: benefit_score
        operator: gte
        value: 60
        true_next: acceptable_risk_check
        false_next: conditional_benefit_check
      favorable_risk_check:
        type: condition
        variable: risk_score
        operator: lte
        value: 20
        true_next: favorable
        false_next: acceptable_benefit_check
      acceptable:
        type: return
        value:
          benefit_risk_ratio: acceptable
          decision: ACCEPTABLE
          action: standard_risk_management
          recommendation: Benefit outweighs risk with standard risk management plan
      conditional_risk_check:
        type: condition
        variable: risk_score
        operator: lte
        value: 60
        true_next: conditional_unmet_check
        false_next: unfavorable
      unfavorable:
        type: return
        value:
          action: risk_mitigation_required
          decision: UNFAVORABLE
          benefit_risk_ratio: unfavorable
          recommendation: Implement risk minimization measures before continuation
      negative_check:
        type: condition
        variable: risk_score
        operator: gt
        value: 80
        true_next: negative
        false_next: unfavorable_risk_check
      unfavorable_risk_check:
        type: condition
        variable: risk_score
        operator: gt
        value: 60
        true_next: unfavorable
        false_next: favorable_benefit_check
      favorable:
        type: return
        value:
          decision: FAVORABLE
          action: continue_monitoring
          benefit_risk_ratio: favorable
          recommendation: Benefit clearly outweighs risk; maintain standard surveillance
      negative:
        type: return
        value:
          decision: NEGATIVE
          action: consider_withdrawal
          benefit_risk_ratio: negative
          recommendation: Immediate review required; benefit no longer outweighs risk
      conditional_benefit_check:
        type: condition
        variable: benefit_score
        operator: gte
        value: 40
        true_next: conditional_risk_check
        false_next: unfavorable
      conditional:
        type: return
        value:
          benefit_risk_ratio: conditional
          action: enhanced_monitoring_with_rmp
          decision: CONDITIONAL
          recommendation: Benefit marginal; enhanced monitoring and RMP required
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: benefit_score
        operator: lte
        value: 80
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: benefit_score
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      unmet_need:
        type: bool
        required: false
      alternative_available:
        type: bool
        required: false
      benefit_score:
        type: int
        required: false
      risk_score:
        type: int
        required: false
    outputs:
      benefit_risk_ratio:
        type: string
        required: false
      action:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      decision:
        type: string
        required: false
      recommendation:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    alternative_available: false
    risk_score: 15
    benefit_score: 90
    unmet_need: false
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    alternative_available: false
    risk_score: 15
    benefit_score: 80
    unmet_need: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
