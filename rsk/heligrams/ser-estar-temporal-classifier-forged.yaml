name: ser-estar-temporal-classifier-helix
description: 'Forged from microgram ''ser-estar-temporal-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    relevancia_causalidad: falsified
sense:
  tree:
    start: check_verbo_present
    nodes:
      normalize_verbo:
        type: condition
        variable: verbo
        operator: matches
        value: ^(estar|está|están|estaba|estaban|estuvo|estuvieron|estando|estuve|estás|estábamos|estaría|estarían|esté|estén)$
        true_next: classify_estar
        false_next: check_ser
      check_ser:
        type: condition
        variable: verbo
        operator: matches
        value: ^(ser|es|son|era|eran|fue|fueron|siendo|soy|eres|somos|sería|serían|sea|sean)$
        true_next: classify_ser
        false_next: classify_ambiguous
      check_verbo_present:
        type: condition
        variable: verbo
        operator: is_null
        value: null
        true_next: reject_missing
        false_next: normalize_verbo
      reject_missing:
        type: return
        value:
          relevancia_causalidad: 0
          accion: 'RECHAZADO: verbo es obligatorio / verb is required'
          clasificacion_temporal: RECHAZADO
          razon: Sin verbo no hay clasificación temporal posible
          temporalidad: REJECTED
      classify_ambiguous:
        type: return
        value:
          clasificacion_temporal: AMBIGUO
          relevancia_causalidad: 50
          razon: |
            El verbo proporcionado no es forma reconocida de ser ni estar. Posibilidades: otro verbo copulativo (parecer, resultar), error tipográfico, o texto en idioma diferente. Requiere revisión humana.
          temporalidad: AMBIGUOUS
          accion: 'REVISAR: verbo no reconocido como ser/estar — requiere clasificación manual'
      classify_estar:
        type: return
        value:
          relevancia_causalidad: 80
          temporalidad: TRANSIENT
          razon: |
            Estar codifica estado transitorio en gramática española. "El paciente ESTÁ mareado" implica cambio de estado — el mareo comenzó en algún momento, posiblemente correlacionado con exposición al fármaco. Equivale a señal positiva en Naranjo Q3 (¿apareció la RAM después del fármaco?).
          clasificacion_temporal: TRANSITORIO
          accion: 'INVESTIGAR: estado transitorio sugiere posible reacción adversa al medicamento'
      classify_ser:
        type: return
        value:
          clasificacion_temporal: PERMANENTE
          razon: |
            Ser codifica identidad/esencia en gramática española. "El paciente ES diabético" implica condición permanente — parte de la identidad del paciente, no un cambio de estado inducido por fármaco. Baja probabilidad de ser RAM a menos que el fármaco cause condición crónica nueva.
          temporalidad: PERMANENT
          accion: 'DOCUMENTAR: condición permanente sugiere preexistencia, no reacción adversa'
          relevancia_causalidad: 20
antisense:
  tree:
    start: check_negation
    nodes:
      check_negation:
        type: condition
        variable: verbo
        operator: is_not_null
        value: null
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      verbo:
        type: string
        required: true
      sintoma:
        type: string
        required: false
    outputs:
      temporalidad:
        type: string
        required: false
      relevancia_causalidad:
        type: int
        required: false
      razon:
        type: string
        required: false
      clasificacion_temporal:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      accion:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    sintoma: mareado
    verbo: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    sintoma: mareado
    verbo: null
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - verbo
  - sintoma
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
