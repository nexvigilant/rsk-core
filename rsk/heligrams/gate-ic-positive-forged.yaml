name: gate-ic-positive-helix
description: 'Forged from microgram ''gate-ic-positive''. Domain: SignalDetection. 4 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    met: falsified
sense:
  tree:
    start: check
    nodes:
      check:
        type: condition
        variable: ic025
        operator: gte
        value: 0.0
        true_next: pass
        false_next: fail
      fail:
        type: return
        value:
          met: false
          gate: false
          threshold: ic025
      pass:
        type: return
        value:
          gate: true
          met: true
          threshold: ic025
antisense:
  tree:
    start: check_insufficient_n
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_insufficient_n:
        type: condition
        variable: case_count
        operator: lt
        value: 3
        true_next: falsified
        false_next: check_notoriety_bias
      check_notoriety_bias:
        type: condition
        variable: notoriety_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: check_weber_effect
      check_weber_effect:
        type: condition
        variable: years_on_market
        operator: gt
        value: 5
        true_next: falsified
        false_next: check_channeling_bias
      check_channeling_bias:
        type: condition
        variable: channeling_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      met: true
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7000000000000001
      verdict: confirmed
  - when:
      met: true
      falsified: true
    default: null
    emit:
      confidence_score: 0.28
      verdict: contested
      confidence: low
  - when:
      met: false
      falsified: false
    default: null
    emit:
      verdict: absent
      confidence_score: 0.7000000000000001
      confidence: high
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      case_count:
        type: integer
        required: false
      notoriety_bias:
        type: bool
        required: false
      years_on_market:
        type: integer
        required: false
      channeling_bias:
        type: bool
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    case_count: 13
    channeling_bias: false
    years_on_market: 0
    notoriety_bias: false
    ic025: 0.0
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, insufficient_n active'
  input:
    ic025: 0.0
    case_count: 2
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — signal-detection with 4 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: signal-detection. Chains as dual-strand verifier before downstream consumers.'
