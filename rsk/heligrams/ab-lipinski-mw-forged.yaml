name: ab-lipinski-mw-helix
description: 'Forged from microgram ''ab-lipinski-mw''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    threat: falsified
sense:
  tree:
    start: check
    nodes:
      violation:
        type: return
        value:
          threat: true
          response: 'WARN: MW > 500 violates Lipinski Rule of 5 — poor oral bioavailability'
      check:
        type: condition
        variable: molecular_weight
        operator: gt
        value: 500
        true_next: violation
        false_next: clean
      clean:
        type: return
        value:
          response: PASS
          threat: false
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_negation:
        type: condition
        variable: molecular_weight
        operator: lte
        value: 500
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: molecular_weight
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      threat: true
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
      threat: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when:
      threat: false
      falsified: false
    default: null
    emit:
      verdict: absent
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
      threat: false
    default: null
    emit:
      verdict: refuted
      confidence_score: 0.42
      confidence: medium
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      molecular_weight:
        type: number
        required: true
    outputs:
      threat:
        type: boolean
        required: false
      response:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    molecular_weight: null
  expect:
    verdict: absent
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    molecular_weight: 501
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
