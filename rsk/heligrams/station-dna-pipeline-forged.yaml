name: station-dna-pipeline-helix
description: 'Forged from microgram ''station-dna-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    route: falsified
sense:
  tree:
    start: check_valid
    nodes:
      certified:
        type: return
        value:
          route: archive
          action: certify
          priority: low
          reason: Bijective DNA encoding verified — lossless round-trip
      check_valid:
        type: condition
        variable: encoding_valid
        operator: eq
        value: true
        true_next: check_bijective
        false_next: invalid
      lossy:
        type: return
        value:
          reason: Encoding valid but not bijective — information loss on decode
          action: flag
          route: encoding_review
          priority: moderate
      invalid:
        type: return
        value:
          priority: high
          reason: Invalid DNA encoding — non-ACGT characters or length mismatch
          action: reject
          route: encoding_repair
      check_bijective:
        type: condition
        variable: is_bijective
        operator: eq
        value: true
        true_next: certified
        false_next: lossy
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: encoding_valid
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_negation:
        type: condition
        variable: encoding_valid
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      encoding_valid:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    encoding_valid: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    encoding_valid: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
