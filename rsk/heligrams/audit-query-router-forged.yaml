name: audit-query-router-helix
description: 'Forged from microgram ''audit-query-router''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    description: falsified
sense:
  tree:
    start: check_all
    nodes:
      check_detect:
        type: condition
        variable: operation
        operator: eq
        value: detect
        true_next: route_detect
        false_next: check_triage
      route_detect:
        type: return
        value:
          description: Detection audit - query signal detection algorithm runs and results
          scope: detect
          table: audit_log
      check_triage:
        type: condition
        variable: operation
        operator: eq
        value: triage
        true_next: route_triage
        false_next: check_report
      route_all:
        type: return
        value:
          description: Full audit trail - query all operations across the PVOS lifecycle
          table: audit_log
          scope: all
      check_ingest:
        type: condition
        variable: operation
        operator: eq
        value: ingest
        true_next: route_ingest
        false_next: check_detect
      check_report:
        type: condition
        variable: operation
        operator: eq
        value: report
        true_next: route_report
        false_next: unknown_operation
      route_triage:
        type: return
        value:
          table: audit_log
          scope: triage
          description: Triage audit - query signal triage decisions and reviewer actions
      unknown_operation:
        type: return
        value:
          table: none
          scope: error
          description: Unknown operation type - choose ingest/detect/triage/report/all
      route_ingest:
        type: return
        value:
          scope: ingest
          table: audit_log
          description: Ingest audit - query case ingestion and validation events
      route_report:
        type: return
        value:
          scope: report
          description: Report audit - query regulatory submission events and deadlines
          table: audit_log
      check_all:
        type: condition
        variable: operation
        operator: eq
        value: all
        true_next: route_all
        false_next: check_ingest
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: operation
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: operation
        operator: neq
        value: all
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      operation:
        type: string
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      table:
        type: string
        required: false
      scope:
        type: string
        required: false
      description:
        type: string
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    operation: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    operation: __negated__
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
