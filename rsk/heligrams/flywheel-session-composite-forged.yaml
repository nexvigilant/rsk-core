name: flywheel-session-composite-helix
description: 'Forged from microgram ''flywheel-session-composite''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    flywheel_assessment: falsified
sense:
  tree:
    start: check_verdict
    nodes:
      high_velocity_low_momentum:
        type: return
        value:
          flywheel_assessment: High output but momentum below critical — sustain pace to build inertia
          status: GREEN
          velocity: FAST
      degraded_session:
        type: return
        value:
          status: YELLOW
          velocity: SLOW
          flywheel_assessment: Reality gate warning with low output — flywheel losing momentum
      check_above_critical:
        type: condition
        variable: above_critical
        operator: eq
        value: true
        true_next: low_band_good_momentum
        false_next: stalled_session
      check_momentum_high:
        type: condition
        variable: above_critical
        operator: eq
        value: true
        true_next: optimal_session
        false_next: high_velocity_low_momentum
      moderate_session:
        type: return
        value:
          velocity: MODERATE
          status: GREEN
          flywheel_assessment: Moderate velocity with approved reality gate — steady progress
      warn_but_productive:
        type: return
        value:
          status: YELLOW
          flywheel_assessment: Reality gate warning but high output — address gate issues to sustain velocity
          velocity: MODERATE
      optimal_session:
        type: return
        value:
          status: GREEN
          velocity: FAST
          flywheel_assessment: High velocity with strong momentum — flywheel fully engaged
      stalled_session:
        type: return
        value:
          velocity: STALLED
          flywheel_assessment: Low output and momentum below critical — flywheel stalling
          status: RED
      check_verdict:
        type: condition
        variable: verdict
        operator: eq
        value: BLOCKED
        true_next: blocked_session
        false_next: check_verdict_warn
      check_band_moderate:
        type: condition
        variable: session_band
        operator: eq
        value: MODERATE
        true_next: moderate_session
        false_next: check_above_critical
      check_band_high:
        type: condition
        variable: session_band
        operator: eq
        value: HIGH
        true_next: check_momentum_high
        false_next: check_band_moderate
      low_band_good_momentum:
        type: return
        value:
          flywheel_assessment: Low session output but momentum preserved — temporary slowdown
          status: YELLOW
          velocity: SLOW
      check_band_warn:
        type: condition
        variable: session_band
        operator: eq
        value: HIGH
        true_next: warn_but_productive
        false_next: degraded_session
      blocked_session:
        type: return
        value:
          flywheel_assessment: Session blocked by reality gate — no forward progress possible
          status: RED
          velocity: STALLED
      check_verdict_warn:
        type: condition
        variable: verdict
        operator: eq
        value: WARN
        true_next: check_band_warn
        false_next: check_band_high
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_negation:
        type: condition
        variable: above_critical
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: above_critical
        operator: neq
        value: BLOCKED
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      verdict:
        type: string
        required: false
      above_critical:
        type: bool
        required: false
      session_band:
        type: string
        required: false
    outputs:
      verdict:
        type: string
        required: false
      velocity:
        type: string
        required: true
      confidence_score:
        type: float
        required: false
      status:
        type: string
        required: true
      flywheel_assessment:
        type: string
        required: true
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    session_band: HIGH
    above_critical: null
    verdict: BLOCKED
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    session_band: HIGH
    above_critical: __negated__
    verdict: BLOCKED
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
