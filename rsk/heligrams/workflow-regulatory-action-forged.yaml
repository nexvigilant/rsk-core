name: workflow-regulatory-action-helix
description: 'Forged from microgram ''workflow-regulatory-action''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    timeline_days: falsified
sense:
  tree:
    start: check_severity
    nodes:
      check_moderate:
        type: condition
        variable: signal_severity
        operator: eq
        value: high
        true_next: labeling
        false_next: monitor
      check_severity:
        type: condition
        variable: signal_severity
        operator: eq
        value: critical
        true_next: check_jurisdiction_critical
        false_next: check_moderate
      check_jurisdiction_critical:
        type: condition
        variable: jurisdiction
        operator: eq
        value: US
        true_next: us_critical
        false_next: eu_critical
      labeling:
        type: return
        value:
          timeline_days: 90
          action: labeling_change
          chain: fda-safety → dailymed → compliance
      monitor:
        type: return
        value:
          action: enhanced_monitoring
          chain: vigilance → preemptive-pv → epidemiology
          timeline_days: 180
      us_critical:
        type: return
        value:
          chain: fda-safety → fda-accessdata → compliance
          timeline_days: 30
          action: boxed_warning
      eu_critical:
        type: return
        value:
          timeline_days: 60
          action: referral
          chain: ema → compliance → benefit-risk
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: signal_severity
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: signal_severity
        operator: neq
        value: critical
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      signal_severity:
        type: string
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    jurisdiction: US
    signal_severity: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    jurisdiction: US
    signal_severity: __negated__
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
