name: high-risk-helix
description: 'Forged from microgram ''high-risk''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    result: falsified
sense:
  tree:
    start: check
    nodes:
      no:
        type: return
        value:
          result: false
      check:
        type: condition
        variable: score
        operator: gte
        value: 90
        true_next: yes
        false_next: no
      yes:
        type: return
        value:
          result: true
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: score
        operator: lt
        value: 90
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: score
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      result: true
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      result: true
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when:
      falsified: false
      result: false
    default: null
    emit:
      verdict: absent
      confidence_score: 0.7
      confidence: high
  - when:
      result: false
      falsified: true
    default: null
    emit:
      confidence_score: 0.42
      verdict: refuted
      confidence: medium
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      score:
        type: float
        required: false
    outputs:
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      result:
        type: bool
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    score: null
  expect:
    confidence: high
    verdict: absent
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    score: 90
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
