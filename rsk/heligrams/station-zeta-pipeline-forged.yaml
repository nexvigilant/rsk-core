name: station-zeta-pipeline-helix
description: 'Forged from microgram ''station-zeta-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    reason: falsified
sense:
  tree:
    start: check_zeros
    nodes:
      rh_violation:
        type: return
        value:
          reason: Zero NOT on critical line — RH counterexample candidate (verify precision)
          priority: critical
          action: alert
          route: precision_verification
      rh_consistent:
        type: condition
        variable: imaginary_part
        operator: gte
        value: 1000
        true_next: high_zero
        false_next: low_zero
      check_zeros:
        type: condition
        variable: on_critical_line
        operator: eq
        value: true
        true_next: rh_consistent
        false_next: rh_violation
      high_zero:
        type: return
        value:
          route: zero_catalog
          priority: moderate
          reason: High zero on critical line — add to catalog for distribution analysis
          action: catalog
      low_zero:
        type: return
        value:
          route: archive
          priority: low
          action: verify
          reason: Known low zero — verify against Odlyzko tables
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: imaginary_part
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: imaginary_part
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      imaginary_part:
        type: bool
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    imaginary_part: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    imaginary_part: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
