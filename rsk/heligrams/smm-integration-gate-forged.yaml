name: smm-integration-gate-helix
description: 'Forged from microgram ''smm-integration-gate''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    integrated: falsified
sense:
  tree:
    start: check_suspended
    nodes:
      check_suspended:
        type: condition
        variable: rating
        operator: eq
        value: SUSPENDED
        true_next: exclude
        false_next: check_replication
      replication_downgrade:
        type: return
        value:
          action: Integrated at 0.60x regardless of CS; replication needed
          effective_rating: AMBER
          k_bias_flag: Replication gap — AMBER floor applied per Section 6.2
          weight: 0.6
          chemistry_analog: K_eq downgraded — insufficient equilibrium data for confident K
          integrated: true
      amber_integrate:
        type: return
        value:
          effective_rating: AMBER
          integrated: true
          k_bias_flag: none
          action: Reduced weight integration. Violation summary appended.
          weight: 0.6
          chemistry_analog: Mixed equilibrium — partial yield
      apply_replication_floor:
        type: condition
        variable: rating
        operator: eq
        value: GREEN
        true_next: replication_downgrade
        false_next: check_citation_asymmetry
      check_amber:
        type: condition
        variable: rating
        operator: eq
        value: AMBER
        true_next: amber_integrate
        false_next: red_integrate
      citation_elevated:
        type: return
        value:
          chemistry_analog: Le Chatelier shift — equilibrium pushed by one-sided input
          effective_rating: AMBER
          k_bias_flag: Citation asymmetry (>80% positive) — elevated scrutiny
          action: Violation summary + citation asymmetry flag appended
          integrated: true
          weight: 0.6
      integrate_normal:
        type: condition
        variable: rating
        operator: eq
        value: GREEN
        true_next: green_integrate
        false_next: check_amber
      exclude:
        type: return
        value:
          integrated: false
          effective_rating: SUSPENDED
          weight: 0.0
          k_bias_flag: FATAL violation — excluded from K
          action: Mandatory PV scientist review. CAPA initiated.
          chemistry_analog: No reaction — activation energy not met
      citation_flag:
        type: condition
        variable: rating
        operator: eq
        value: RED
        true_next: citation_red
        false_next: citation_elevated
      red_integrate:
        type: return
        value:
          effective_rating: RED
          integrated: true
          action: High-scrutiny integration. Corroboration required.
          k_bias_flag: none
          weight: 0.25
          chemistry_analog: Equilibrium favors substrate — trace product only
      citation_red:
        type: return
        value:
          action: Corroboration required; K-bias surveillance triggered
          weight: 0.25
          integrated: true
          effective_rating: RED
          k_bias_flag: Citation asymmetry (>80% positive) + RED score — high K-bias risk
          chemistry_analog: Catalyst poisoning suspected — reaction selectivity compromised
      green_integrate:
        type: return
        value:
          k_bias_flag: none
          integrated: true
          action: Full weight integration. Minor violations annotated.
          chemistry_analog: Equilibrium favors product — full yield integration
          weight: 1.0
          effective_rating: GREEN
      check_citation_asymmetry:
        type: condition
        variable: positive_citation_pct
        operator: gt
        value: 80
        true_next: citation_flag
        false_next: integrate_normal
      check_replication:
        type: condition
        variable: has_independent_replication
        operator: eq
        value: false
        true_next: apply_replication_floor
        false_next: check_citation_asymmetry
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: rating
        operator: neq
        value: SUSPENDED
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: rating
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      integrated: true
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      integrated: true
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when:
      integrated: false
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: absent
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      has_independent_replication:
        type: bool
        required: true
      rating:
        type: string
        required: true
      positive_citation_pct:
        type: int
        required: true
    outputs:
      integrated:
        type: bool
        required: false
      confidence:
        type: string
        required: false
      k_bias_flag:
        type: string
        required: false
      action:
        type: string
        required: false
      verdict:
        type: string
        required: false
      chemistry_analog:
        type: string
        required: false
      effective_rating:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      weight:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    rating: null
    has_independent_replication: false
    positive_citation_pct: 50
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    rating: __negated__
    has_independent_replication: false
    positive_citation_pct: 50
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
