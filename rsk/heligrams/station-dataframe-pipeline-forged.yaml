name: station-dataframe-pipeline-helix
description: 'Forged from microgram ''station-dataframe-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    action: falsified
sense:
  tree:
    start: check_rows
    nodes:
      wide:
        type: return
        value:
          action: select
          reason: 50+ columns — column selection needed before joins
          route: column_pruning
          priority: moderate
      check_rows:
        type: condition
        variable: row_count
        operator: gte
        value: 100000
        true_next: large
        false_next: check_cols
      large:
        type: return
        value:
          route: batch_processing
          action: partition
          priority: high
          reason: 100K+ rows — partition before analysis to prevent OOM
      check_cols:
        type: condition
        variable: column_count
        operator: gte
        value: 50
        true_next: wide
        false_next: normal
      normal:
        type: return
        value:
          route: archive
          priority: low
          reason: Standard dataframe — direct processing
          action: process
antisense:
  tree:
    start: check_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: row_count
        operator: lt
        value: 100000
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      row_count:
        type: integer
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    column_count: 20
    row_count: 100010
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    column_count: 20
    row_count: 99999
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
