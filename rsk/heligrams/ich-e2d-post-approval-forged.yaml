name: ich-e2d-post-approval-helix
description: 'Forged from microgram ''ich-e2d-post-approval''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    requires_follow_up_studies: falsified
sense:
  tree:
    start: validate_safety_concern
    nodes:
      validate_safety_concern:
        type: condition
        variable: safety_concern
        operator: is_not_null
        value: null
        true_next: check_concern_type
        false_next: no_requirement
      check_severity:
        type: condition
        variable: concern_severity
        operator: eq
        value: serious
        true_next: intensive_monitoring
        false_next: standard_monitoring
      intensive_monitoring:
        type: return
        value:
          requires_follow_up_studies: true
          requires_risk_minimization: true
          monitoring_category: intensive
          action_level: urgent
          ich_e2d_compliant: true
      check_potential_concern:
        type: condition
        variable: safety_concern
        operator: eq
        value: potential
        true_next: potential_requirement
        false_next: no_requirement
      check_concern_type:
        type: condition
        variable: safety_concern
        operator: eq
        value: identified
        true_next: check_severity
        false_next: check_potential_concern
      standard_monitoring:
        type: return
        value:
          requires_follow_up_studies: false
          requires_risk_minimization: true
          monitoring_category: standard
          action_level: routine
          ich_e2d_compliant: true
      no_requirement:
        type: return
        value:
          ich_e2d_compliant: true
          requires_risk_minimization: false
          requires_follow_up_studies: false
          monitoring_category: none
          action_level: none
      potential_requirement:
        type: return
        value:
          monitoring_category: preventive
          requires_risk_minimization: true
          action_level: precautionary
          ich_e2d_compliant: true
          requires_follow_up_studies: false
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: safety_concern
        operator: is_null
        value: null
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: safety_concern
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      requires_follow_up_studies: true
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      requires_follow_up_studies: true
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when:
      requires_follow_up_studies: false
      falsified: false
    default: null
    emit:
      verdict: absent
      confidence: high
      confidence_score: 0.7
  - when:
      requires_follow_up_studies: false
      falsified: true
    default: null
    emit:
      confidence: medium
      confidence_score: 0.42
      verdict: refuted
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      safety_concern:
        type: any
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    safety_concern: null
    concern_severity: serious
  expect:
    verdict: absent
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    safety_concern: identified
    concern_severity: serious
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
