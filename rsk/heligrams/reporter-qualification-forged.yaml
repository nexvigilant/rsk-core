name: reporter-qualification-helix
description: 'Forged from microgram ''reporter-qualification''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    can_submit_medwatch: falsified
sense:
  tree:
    start: type_check
    nodes:
      consumer_check:
        type: condition
        variable: reporter_type
        operator: eq
        value: consumer
        true_next: consumer_result
        false_next: lawyer_check
      lawyer_check:
        type: condition
        variable: reporter_type
        operator: eq
        value: lawyer
        true_next: other_result
        false_next: other_result
      type_check:
        type: condition
        variable: reporter_type
        operator: eq
        value: physician
        true_next: healthcare_professional_result
        false_next: pharmacist_check
      nurse_check:
        type: condition
        variable: reporter_type
        operator: eq
        value: nurse
        true_next: healthcare_professional_result
        false_next: consumer_check
      other_result:
        type: return
        value:
          weight_in_causality: 0.3
          qualification_level: other
          can_submit_medwatch: true
          regulatory_reference: ICH E2A Section III.A.1 (Other)
      consumer_result:
        type: return
        value:
          qualification_level: consumer
          weight_in_causality: 0.5
          can_submit_medwatch: true
          regulatory_reference: ICH E2A Section III.A.1 (Consumer)
      pharmacist_check:
        type: condition
        variable: reporter_type
        operator: eq
        value: pharmacist
        true_next: healthcare_professional_result
        false_next: nurse_check
      healthcare_professional_result:
        type: return
        value:
          can_submit_medwatch: true
          qualification_level: healthcare_professional
          regulatory_reference: ICH E2A Section III.A.1 (Healthcare Professional)
          weight_in_causality: 1.0
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_negation:
        type: condition
        variable: reporter_type
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: reporter_type
        operator: neq
        value: physician
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      can_submit_medwatch: true
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
      can_submit_medwatch: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when:
      falsified: false
      can_submit_medwatch: false
    default: null
    emit:
      verdict: absent
      confidence: high
      confidence_score: 0.7
  - when: null
    default:
      confidence_score: 0.5
      confidence: medium
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      reporter_type:
        type: string
        required: true
    outputs:
      can_submit_medwatch:
        type: bool
        required: false
      weight_in_causality:
        type: float
        required: false
      qualification_level:
        type: string
        required: false
      regulatory_reference:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    reporter_type: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    reporter_type: __negated__
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
