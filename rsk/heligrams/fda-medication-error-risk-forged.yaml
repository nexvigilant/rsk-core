name: fda-medication-error-risk-helix
description: 'Forged from microgram ''fda-medication-error-risk''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    mitigation_strategy: falsified
sense:
  tree:
    start: check_severity
    nodes:
      serious_designable:
        type: return
        value:
          mitigation_strategy: 'Implement design controls: differentiated packaging, prominent strength display, auxiliary labels, oral syringe for liquids. Conduct simulated use study.'
          risk_level: HIGH
          labeling_action: Update container labels and carton labeling per FDA container labeling guidance. Add prominent warnings.
          regulatory_reference: 'FDA Guidance: Safety Considerations for Product Design (2016), Section IV; Container Labels Guidance (2022), Section III'
      check_mild:
        type: condition
        variable: severity_outcome
        operator: eq
        value: mild_harm
        true_next: mild_error
        false_next: no_harm_error
      serious_designable_check:
        type: condition
        variable: preventable_by_design
        operator: eq
        value: true
        true_next: serious_designable
        false_next: serious_not_designable
      moderate_error:
        type: return
        value:
          regulatory_reference: 'FDA Guidance: Safety Considerations for Product Design (2016), Section IV'
          mitigation_strategy: Evaluate packaging differentiation, label clarity improvements, and dosing device accuracy. Conduct label comprehension study.
          risk_level: MODERATE
          labeling_action: Review and improve label design per FDA readability guidelines.
      serious_not_designable:
        type: return
        value:
          regulatory_reference: 'FDA Guidance: Safety Considerations for Product Design (2016), Section V'
          labeling_action: Mandatory Medication Guide distribution. Consider communication plan to prescribers.
          risk_level: HIGH
          mitigation_strategy: 'Implement administrative controls: Medication Guide, Patient Instructions for Use, healthcare provider communication plan.'
      check_serious:
        type: condition
        variable: severity_outcome
        operator: eq
        value: serious_harm
        true_next: serious_designable_check
        false_next: check_moderate
      no_harm_error:
        type: return
        value:
          regulatory_reference: 'FDA Guidance: Safety Considerations for Product Design (2016), Section VI'
          labeling_action: No labeling changes required.
          risk_level: MINIMAL
          mitigation_strategy: Monitor through routine pharmacovigilance. No design changes required unless frequency increases.
      fatal_error:
        type: return
        value:
          risk_level: CRITICAL
          mitigation_strategy: 'Mandatory product redesign: unique container shape, tall-man lettering, barcode verification, distinct color coding. Consider restricted distribution.'
          labeling_action: Boxed warning for medication error risk. REMS with ETASS may be required.
          regulatory_reference: 'FDA Guidance: Safety Considerations for Product Design to Minimize Medication Errors (2016), Section III; Container Labels Guidance (2022)'
      check_moderate:
        type: condition
        variable: severity_outcome
        operator: eq
        value: moderate_harm
        true_next: moderate_error
        false_next: check_mild
      mild_error:
        type: return
        value:
          regulatory_reference: 'FDA Guidance: Safety Considerations for Product Design (2016), Section VI'
          risk_level: LOW
          labeling_action: Include medication error prevention language in Patient Information.
          mitigation_strategy: Standard label improvements and monitoring of error reports through MedWatch.
      check_severity:
        type: condition
        variable: severity_outcome
        operator: eq
        value: fatal
        true_next: fatal_error
        false_next: check_serious
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: severity_outcome
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: severity_outcome
        operator: neq
        value: fatal
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      preventable_by_design:
        type: bool
        required: false
      error_type:
        type: string
        required: true
      severity_outcome:
        type: string
        required: true
    outputs:
      risk_level:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      labeling_action:
        type: string
        required: false
      mitigation_strategy:
        type: string
        required: false
      confidence:
        type: string
        required: false
      regulatory_reference:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    error_type: wrong_dose
    severity_outcome: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    error_type: wrong_dose
    severity_outcome: __negated__
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - severity_outcome
  - error_type
  - preventable_by_design
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
