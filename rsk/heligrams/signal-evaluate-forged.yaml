name: signal-evaluate-helix
description: 'Forged from microgram ''signal-evaluate''. Domain: CausalityAssessment. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    evaluation_compliant: falsified
sense:
  tree:
    start: validate_signal
    nodes:
      evaluation_unknown:
        type: return
        value:
          regulatory_action_warranted: null
          evaluation_compliant: false
          further_evaluation_needed: null
          causality_category: null
          evidence_quality: null
      validate_signal:
        type: condition
        variable: naranjo_score
        operator: is_not_null
        value: null
        true_next: check_causality_strength
        false_next: evaluation_unknown
      check_causality_strength:
        type: condition
        variable: naranjo_score
        operator: gte
        value: 8
        true_next: probable_probable
        false_next: check_moderate_causality
      probable_causality:
        type: return
        value:
          further_evaluation_needed: true
          evidence_quality: moderate
          regulatory_action_warranted: true
          evaluation_compliant: true
          causality_category: probable
      check_moderate_causality:
        type: condition
        variable: naranjo_score
        operator: gte
        value: 5
        true_next: probable_causality
        false_next: possible_causality
      possible_causality:
        type: return
        value:
          causality_category: possible
          evidence_quality: weak
          evaluation_compliant: true
          regulatory_action_warranted: false
          further_evaluation_needed: true
      probable_probable:
        type: return
        value:
          evaluation_compliant: true
          further_evaluation_needed: false
          causality_category: probable
          evidence_quality: strong
          regulatory_action_warranted: true
antisense:
  tree:
    start: null_guard_alternative_cause
    nodes:
      check_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      null_guard_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: is_null
        value: null
        true_next: null_guard_temporal_implausible
        false_next: check_alternative_cause
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: is_null
        value: null
        true_next: null_guard_no_dechallenge
        false_next: check_temporal_implausible
      check_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: eq
        value: likely
        true_next: falsified
        false_next: null_guard_temporal_implausible
      null_guard_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_no_dechallenge
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: eq
        value: false
        true_next: falsified
        false_next: null_guard_no_dechallenge
resolution:
  mode: base_pair
  rules:
  - when:
      evaluation_compliant: true
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      evaluation_compliant: true
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when:
      falsified: false
      evaluation_compliant: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: absent
  - when:
      falsified: true
      evaluation_compliant: false
    default: null
    emit:
      confidence: medium
      confidence_score: 0.42
      verdict: refuted
  - when: null
    default:
      confidence_score: 0.5
      confidence: medium
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      dechallenge_positive:
        type: bool
        required: false
      alternative_causes:
        type: string
        required: false
      temporal_plausible:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    naranjo_score: 9
    alternative_causes: none
    dechallenge_positive: true
    temporal_plausible: true
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, alternative_cause active'
  input:
    naranjo_score: 9
    alternative_causes: likely
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — causality-assessment with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: causality-assessment. Chains as dual-strand verifier before downstream consumers.'
