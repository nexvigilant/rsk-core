name: station-signal-theory-pipeline-helix
description: 'Forged from microgram ''station-signal-theory-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    route: falsified
sense:
  tree:
    start: check_detected
    nodes:
      check_detected:
        type: condition
        variable: signal_detected
        operator: eq
        value: true
        true_next: check_axiom_pass
        false_next: no_signal
      no_signal:
        type: return
        value:
          route: archive
          reason: No signal detected by theory axioms — noise
          action: archive
          priority: low
      check_axiom_pass:
        type: condition
        variable: axioms_satisfied
        operator: gte
        value: 4
        true_next: strong_theory
        false_next: weak_theory
      strong_theory:
        type: return
        value:
          priority: high
          action: investigate
          reason: Signal satisfies 4+ axioms — theoretically grounded, investigate
          route: signal_investigation
      weak_theory:
        type: return
        value:
          priority: moderate
          reason: Signal detected but <4 axioms satisfied — needs strengthening
          route: signal_validation
          action: validate
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: signal_detected
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: signal_detected
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      signal_detected:
        type: bool
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    axioms_satisfied: 0
    signal_detected: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    axioms_satisfied: 0
    signal_detected: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
