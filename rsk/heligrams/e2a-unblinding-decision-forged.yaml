name: e2a-unblinding-decision-helix
description: 'Forged from microgram ''e2a-unblinding-decision''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    not_applicable: falsified
sense:
  tree:
    start: check_blinded
    nodes:
      check_blinded:
        type: condition
        variable: study_blinded
        operator: eq
        value: true
        true_next: check_serious
        false_next: not_applicable
      no_unblinding:
        type: return
        value:
          not_applicable: false
          regulatory_reference: ICH E2A Section III.B.2
          unblinding_recommended: false
          description: Unblinding not recommended - case does not meet expedited reporting criteria
          scope: NONE
      unblinding_recommended:
        type: return
        value:
          unblinding_recommended: true
          description: Unblinding recommended for the specific patient to fulfill expedited reporting obligations
          regulatory_reference: ICH E2A Section III.B.2
          scope: PATIENT_ONLY
      check_expedited:
        type: condition
        variable: expedited_reporting_required
        operator: eq
        value: true
        true_next: unblinding_recommended
        false_next: no_unblinding
      not_applicable:
        type: return
        value:
          unblinding_recommended: false
          not_applicable: true
          scope: NONE
          description: Study is not blinded - unblinding decision not applicable
          regulatory_reference: ICH E2A Section III.B.2
      check_serious:
        type: condition
        variable: serious_ae
        operator: eq
        value: true
        true_next: check_expedited
        false_next: no_unblinding
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: study_blinded
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: study_blinded
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      not_applicable: true
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
      not_applicable: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when:
      not_applicable: false
      falsified: false
    default: null
    emit:
      verdict: absent
      confidence: high
      confidence_score: 0.7
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      serious_ae:
        type: bool
        required: false
      expedited_reporting_required:
        type: bool
        required: false
      study_blinded:
        type: bool
        required: false
    outputs:
      verdict:
        type: string
        required: false
      unblinding_recommended:
        type: bool
        required: false
      regulatory_reference:
        type: string
        required: false
      not_applicable:
        type: bool
        required: false
      description:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      scope:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    study_blinded: null
    expedited_reporting_required: true
    serious_ae: true
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    study_blinded: false
    expedited_reporting_required: true
    serious_ae: true
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
