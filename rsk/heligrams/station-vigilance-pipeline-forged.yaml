name: station-vigilance-pipeline-helix
description: 'Forged from microgram ''station-vigilance-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    reason: falsified
sense:
  tree:
    start: check_score
    nodes:
      check_moderate:
        type: condition
        variable: risk_score
        operator: gte
        value: 4.0
        true_next: moderate
        false_next: low
      moderate:
        type: return
        value:
          reason: Guardian risk score 4-6 (moderate) — enhanced monitoring
          priority: moderate
          route: periodic_review
          action: monitor
      low:
        type: return
        value:
          route: archive
          reason: Guardian risk score <4 (low/minimal) — routine monitoring
          action: archive
          priority: low
      high:
        type: return
        value:
          priority: high
          reason: Guardian risk score 6-8 (high) — prioritized signal investigation
          action: investigate
          route: signal_investigation
      check_score:
        type: condition
        variable: risk_score
        operator: gte
        value: 8.0
        true_next: critical
        false_next: check_high
      critical:
        type: return
        value:
          route: causality_assessment
          reason: Guardian risk score ≥8 (critical) — immediate safety review
          action: escalate
          priority: critical
      check_high:
        type: condition
        variable: risk_score
        operator: gte
        value: 6.0
        true_next: high
        false_next: check_moderate
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: risk_score
        operator: lt
        value: 8.0
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: risk_score
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      risk_score:
        type: float
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    risk_score: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
