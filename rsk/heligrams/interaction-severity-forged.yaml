name: interaction-severity-helix
description: 'Forged from microgram ''interaction-severity''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    interaction_compliant: falsified
sense:
  tree:
    start: validate_drugs
    nodes:
      validate_drugs:
        type: condition
        variable: drug1_name
        operator: is_not_null
        value: null
        true_next: check_contraindication
        false_next: severity_unknown
      major_interaction:
        type: return
        value:
          clinical_significance: significant_clinical_effect
          interaction_compliant: true
          severity_category: major
          severity_score: 3
          action_required: true
      check_contraindication:
        type: condition
        variable: is_contraindicated
        operator: eq
        value: true
        true_next: contraindicated
        false_next: check_major
      check_major:
        type: condition
        variable: interaction_severity_level
        operator: eq
        value: major
        true_next: major_interaction
        false_next: check_moderate
      contraindicated:
        type: return
        value:
          severity_category: contraindicated
          clinical_significance: contraindicated_combination
          interaction_compliant: true
          action_required: true
          severity_score: 4
      severity_unknown:
        type: return
        value:
          action_required: null
          clinical_significance: null
          severity_category: unknown
          interaction_compliant: false
          severity_score: null
      moderate_interaction:
        type: return
        value:
          action_required: false
          clinical_significance: moderate_clinical_effect
          interaction_compliant: true
          severity_category: moderate
          severity_score: 2
      check_moderate:
        type: condition
        variable: interaction_severity_level
        operator: eq
        value: moderate
        true_next: moderate_interaction
        false_next: minor_interaction
      minor_interaction:
        type: return
        value:
          action_required: false
          clinical_significance: minimal_clinical_effect
          severity_score: 1
          severity_category: minor
          interaction_compliant: true
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: drug1_name
        operator: is_null
        value: null
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: drug1_name
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
resolution:
  mode: base_pair
  rules:
  - when:
      interaction_compliant: true
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
      interaction_compliant: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when:
      falsified: false
      interaction_compliant: false
    default: null
    emit:
      confidence: high
      verdict: absent
      confidence_score: 0.7
  - when:
      interaction_compliant: false
      falsified: true
    default: null
    emit:
      verdict: refuted
      confidence_score: 0.42
      confidence: medium
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      drug1_name:
        type: any
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    is_contraindicated: true
    drug1_name: null
  expect:
    confidence: high
    verdict: absent
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    is_contraindicated: true
    drug1_name: warfarin
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
