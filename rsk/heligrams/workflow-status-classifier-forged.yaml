name: workflow-status-classifier-helix
description: 'Forged from microgram ''workflow-status-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    description: falsified
sense:
  tree:
    start: check_failure
    nodes:
      check_complete:
        type: condition
        variable: is_complete
        operator: eq
        value: true
        true_next: completed
        false_next: in_progress
      check_failure:
        type: condition
        variable: has_failure
        operator: eq
        value: true
        true_next: failed
        false_next: check_started
      in_progress:
        type: return
        value:
          description: Workflow is executing - some steps complete, more remaining
          status: IN_PROGRESS
      check_started:
        type: condition
        variable: steps_completed
        operator: gt
        value: 0
        true_next: check_complete
        false_next: not_started
      completed:
        type: return
        value:
          description: All steps completed successfully - workflow is done
          status: COMPLETED
      not_started:
        type: return
        value:
          description: No steps completed - workflow has not begun execution
          status: NOT_STARTED
      failed:
        type: return
        value:
          description: Workflow has a failed step - requires investigation and remediation
          status: FAILED
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: is_complete
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: is_complete
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      is_complete:
        type: bool
        required: false
      steps_completed:
        type: int
        required: false
      has_failure:
        type: bool
        required: false
    outputs:
      status:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      description:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    steps_total: 5
    steps_completed: 0
    is_complete: null
    has_failure: false
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    steps_total: 5
    steps_completed: 0
    is_complete: false
    has_failure: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
