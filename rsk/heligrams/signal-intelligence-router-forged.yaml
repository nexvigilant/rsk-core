name: signal-intelligence-router-helix
description: 'Forged from microgram ''signal-intelligence-router''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    recursion_depth: falsified
sense:
  tree:
    start: check_signals
    nodes:
      check_unassessed:
        type: condition
        variable: unassessed_count
        operator: gte
        value: 5
        true_next: triage_backlog
        false_next: check_class_effect
      standard_accumulation:
        type: return
        value:
          recursion_depth: accumulating
          action: continue_accumulation
          reason: Active signals present but no escalation triggers met. Continue accumulation cycle.
          recommended_tool: signal_detection
          priority: STANDARD
      check_insight_maturity:
        type: condition
        variable: insight_count
        operator: gte
        value: 3
        true_next: insight_synthesis
        false_next: standard_accumulation
      insight_synthesis:
        type: return
        value:
          recommended_tool: reporting
          action: synthesize_insights
          reason: 3+ insights accumulated. Synthesize into safety intelligence report.
          priority: STANDARD
          recursion_depth: synthesis
      cross_drug_review:
        type: return
        value:
          priority: HIGH
          reason: 3+ signals span multiple drugs. Cross-drug analysis may reveal shared mechanism.
          recursion_depth: cross_reference
          action: cross_drug_analysis
          recommended_tool: drug_comparator
      check_class_effect:
        type: condition
        variable: has_class_effect
        operator: eq
        value: true
        true_next: class_effect_escalation
        false_next: check_cross_drug
      check_cross_drug:
        type: condition
        variable: cross_drug_signals
        operator: gte
        value: 3
        true_next: cross_drug_review
        false_next: check_insight_maturity
      class_effect_escalation:
        type: return
        value:
          action: class_effect_review
          reason: Class effect detected across multiple drugs. Cross-drug comparison required.
          priority: URGENT
          recommended_tool: drug_comparator
          recursion_depth: pattern_detected
      check_signals:
        type: condition
        variable: active_signal_count
        operator: gte
        value: 1
        true_next: check_unassessed
        false_next: no_signals
      triage_backlog:
        type: return
        value:
          recursion_depth: accumulation_overflow
          reason: 5+ unassessed signals accumulated. Triage backlog before further accumulation.
          action: triage_unassessed
          priority: URGENT
          recommended_tool: causality_assessment
      no_signals:
        type: return
        value:
          recursion_depth: base_case
          priority: LOW
          action: continue_monitoring
          reason: No active signals in intelligence state. Continue routine signal detection.
          recommended_tool: signal_detection
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_negation:
        type: condition
        variable: unassessed_count
        operator: lt
        value: 1
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: unassessed_count
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      active_signal_count:
        type: int
        required: true
      has_class_effect:
        type: bool
        required: false
      unassessed_count:
        type: int
        required: false
      insight_count:
        type: int
        required: false
      cross_drug_signals:
        type: int
        required: false
    outputs:
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      reason:
        type: string
        required: false
      recommended_tool:
        type: string
        required: false
      verdict:
        type: string
        required: false
      priority:
        type: string
        required: false
      recursion_depth:
        type: string
        required: false
      action:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    unassessed_count: 11
    active_signal_count: 0
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    unassessed_count: 0
    active_signal_count: 0
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
