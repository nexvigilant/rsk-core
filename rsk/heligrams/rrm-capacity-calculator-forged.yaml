name: rrm-capacity-calculator-helix
description: 'Forged from microgram ''rrm-capacity-calculator''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    trains_per_hour: falsified
sense:
  tree:
    start: check_direct_headway
    nodes:
      compute_from_components:
        type: condition
        variable: braking_distance_seconds
        operator: gt
        value: 0
        true_next: check_braking_dominant
        false_next: no_input
      check_components:
        type: condition
        variable: braking_distance_seconds
        operator: is_not_null
        value: true
        true_next: compute_from_components
        false_next: check_monitoring_only
      moderate_capacity_direct:
        type: return
        value:
          trains_per_hour: 30.0
          capacity_class: Moderate
          headway_seconds: 120
          bottleneck: Standard headway — balanced braking and block length
          pv_interpretation: 30 cases/hour — structured ICSR processing with automated pre-screening
      estimate_etcs_2:
        type: condition
        variable: etcs_level
        operator: gte
        value: 2
        true_next: level_2_capacity
        false_next: estimate_etcs_1
      very_low_capacity:
        type: return
        value:
          headway_seconds: 360
          capacity_class: Very Low
          bottleneck: Excessive headway — time-interval operation
          trains_per_hour: 10.0
          pv_interpretation: Less than 10 cases/hour — manual review with no automation, spontaneous reporting only
      low_capacity_direct:
        type: return
        value:
          headway_seconds: 240
          capacity_class: Low
          bottleneck: Long headway — limited by sighting or safety margin
          trains_per_hour: 15.0
          pv_interpretation: 15 cases/hour — periodic batch review with basic triage
      moderate_headway:
        type: return
        value:
          capacity_class: Moderate
          headway_seconds: 150
          trains_per_hour: 24.0
          bottleneck: Braking distance significant but manageable
          pv_interpretation: 24 cases/hour — standard ICSR processing with automated seriousness classification
      low_headway:
        type: return
        value:
          headway_seconds: 90
          capacity_class: High
          pv_interpretation: 40 cases/hour — rapid triage with ML-assisted coding
          trains_per_hour: 40.0
          bottleneck: Short braking distance — light vehicles or flat terrain
      level_1_capacity:
        type: return
        value:
          capacity_class: Moderate
          pv_interpretation: 20 cases/hour — periodic PSUR/PBRER review at regulatory intervals
          headway_seconds: 180
          trains_per_hour: 20.0
          bottleneck: Spot transmission — state updates only at discrete points
      level_0_capacity:
        type: return
        value:
          capacity_class: Very Low
          trains_per_hour: 10.0
          headway_seconds: 360
          pv_interpretation: 10 cases/hour — spontaneous reporting only, no systematic monitoring
          bottleneck: Time interval — no track state knowledge
      no_input:
        type: return
        value:
          headway_seconds: 0
          trains_per_hour: 0
          bottleneck: Insufficient input — provide headway_seconds, braking components, or monitoring_level
          pv_interpretation: Cannot compute — need headway data or monitoring level
          capacity_class: Unknown
      estimate_from_etcs:
        type: condition
        variable: etcs_level
        operator: gte
        value: 3
        true_next: level_3_capacity
        false_next: estimate_etcs_2
      classify_direct:
        type: condition
        variable: headway_seconds
        operator: gt
        value: 300
        true_next: very_low_capacity
        false_next: classify_direct_2
      estimate_from_level:
        type: condition
        variable: monitoring_level
        operator: gte
        value: 3
        true_next: level_3_capacity
        false_next: estimate_level_2
      check_direct_headway:
        type: condition
        variable: headway_seconds
        operator: gt
        value: 0
        true_next: classify_direct
        false_next: check_components
      estimate_level_2:
        type: condition
        variable: monitoring_level
        operator: gte
        value: 2
        true_next: level_2_capacity
        false_next: estimate_level_1
      high_capacity_direct:
        type: return
        value:
          headway_seconds: 90
          capacity_class: High
          pv_interpretation: 40+ cases/hour — real-time streaming with automated signal detection
          bottleneck: Short headway — requires continuous supervision
          trains_per_hour: 40.0
      level_2_capacity:
        type: return
        value:
          bottleneck: Continuous supervision — fixed blocks with real-time updates
          trains_per_hour: 40.0
          pv_interpretation: 40 cases/hour — real-time FAERS monitoring with continuous signal detection
          headway_seconds: 90
          capacity_class: High
      classify_direct_3:
        type: condition
        variable: headway_seconds
        operator: gt
        value: 90
        true_next: moderate_capacity_direct
        false_next: high_capacity_direct
      high_headway:
        type: return
        value:
          pv_interpretation: 12 cases/hour — complex cases requiring extended causality assessment (Naranjo full)
          headway_seconds: 300
          trains_per_hour: 12.0
          bottleneck: Braking distance dominates — heavy trains or steep gradients
          capacity_class: Low
      check_braking_dominant:
        type: condition
        variable: braking_distance_seconds
        operator: gte
        value: 120
        true_next: high_headway
        false_next: check_moderate_braking
      classify_direct_2:
        type: condition
        variable: headway_seconds
        operator: gt
        value: 180
        true_next: low_capacity_direct
        false_next: classify_direct_3
      estimate_level_1:
        type: condition
        variable: monitoring_level
        operator: gte
        value: 1
        true_next: level_1_capacity
        false_next: level_0_capacity
      level_3_capacity:
        type: return
        value:
          pv_interpretation: 60+ cases/hour — predictive PV with dynamic thresholds, no fixed review intervals
          trains_per_hour: 60.0
          headway_seconds: 60
          bottleneck: Moving block — headway shrinks to braking distance
          capacity_class: Maximum
      check_moderate_braking:
        type: condition
        variable: braking_distance_seconds
        operator: gte
        value: 60
        true_next: moderate_headway
        false_next: low_headway
      check_etcs_level:
        type: condition
        variable: etcs_level
        operator: is_not_null
        value: true
        true_next: estimate_from_etcs
        false_next: no_input
      estimate_etcs_1:
        type: condition
        variable: etcs_level
        operator: gte
        value: 1
        true_next: level_1_capacity
        false_next: level_0_capacity
      check_monitoring_only:
        type: condition
        variable: monitoring_level
        operator: is_not_null
        value: true
        true_next: estimate_from_level
        false_next: check_etcs_level
antisense:
  tree:
    start: check_negation
    nodes:
      check_negation:
        type: condition
        variable: braking_distance_seconds
        operator: lte
        value: 0
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      headway_seconds:
        type: float
        required: false
      etcs_level:
        type: int
        required: false
      safety_margin_seconds:
        type: float
        required: false
      sighting_distance_seconds:
        type: float
        required: false
      monitoring_level:
        type: int
        required: false
      block_length_seconds:
        type: float
        required: false
      braking_distance_seconds:
        type: float
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      capacity_class:
        type: string
        required: false
      bottleneck:
        type: string
        required: false
      trains_per_hour:
        type: float
        required: false
      pv_interpretation:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      headway_seconds:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    headway_seconds: 120
    braking_distance_seconds: 10
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    headway_seconds: 120
    braking_distance_seconds: 0
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
