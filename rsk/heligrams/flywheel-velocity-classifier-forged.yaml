name: flywheel-velocity-classifier-helix
description: 'Forged from microgram ''flywheel-velocity-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    classification: falsified
sense:
  tree:
    start: check_exceptional
    nodes:
      slow:
        type: return
        value:
          classification: slow
          description: Repair time exceeds 72 hours — slow velocity
      target:
        type: return
        value:
          classification: target
          description: Repair time under 24 hours — target velocity
      check_acceptable:
        type: condition
        variable: avg_repair_ms
        operator: lt
        value: 259200000
        true_next: acceptable
        false_next: slow
      acceptable:
        type: return
        value:
          classification: acceptable
          description: Repair time under 72 hours — acceptable velocity
      check_target:
        type: condition
        variable: avg_repair_ms
        operator: lt
        value: 86400000
        true_next: target
        false_next: check_acceptable
      exceptional:
        type: return
        value:
          description: Repair time under 4 hours — exceptional velocity
          classification: exceptional
      check_exceptional:
        type: condition
        variable: avg_repair_ms
        operator: lt
        value: 14400000
        true_next: exceptional
        false_next: check_target
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: avg_repair_ms
        operator: gte
        value: 14400000
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: avg_repair_ms
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      avg_repair_ms:
        type: integer
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    avg_repair_ms: 14399990
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    avg_repair_ms: 14400000
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
