name: workflow-risk-management-helix
description: 'Forged from microgram ''workflow-risk-management''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    chain: falsified
sense:
  tree:
    start: check_category
    nodes:
      potential_risk:
        type: return
        value:
          chain: preemptive-pv → vigilance → epidemiology
          approach: additional_monitoring
          actions:
          - PASS
          - registry
          - study
      identified_risk:
        type: return
        value:
          chain: compliance → benefit-risk → ema
          actions:
          - labeling
          - PIL
          - training
          approach: routine_minimization
      check_potential:
        type: condition
        variable: risk_category
        operator: eq
        value: potential
        true_next: potential_risk
        false_next: missing_info
      check_category:
        type: condition
        variable: risk_category
        operator: eq
        value: identified
        true_next: identified_risk
        false_next: check_potential
      missing_info:
        type: return
        value:
          chain: pubmed → clinicaltrials → epidemiology
          actions:
          - literature_review
          - observational_study
          approach: information_gathering
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_negation:
        type: condition
        variable: risk_category
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: risk_category
        operator: neq
        value: identified
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      risk_category:
        type: string
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    risk_category: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    risk_category: __negated__
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
