name: interaction-management-helix
description: 'Forged from microgram ''interaction-management''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    management_compliant: falsified
sense:
  tree:
    start: validate_interaction
    nodes:
      check_moderate_severity:
        type: condition
        variable: interaction_severity
        operator: eq
        value: moderate
        true_next: recommend_monitor
        false_next: recommend_observe
      management_unknown:
        type: return
        value:
          alternative_drug_suggested: null
          monitoring_required: null
          management_strategy: unknown
          management_compliant: false
          action_type: null
      validate_interaction:
        type: condition
        variable: interaction_severity
        operator: is_not_null
        value: null
        true_next: check_severity_level
        false_next: management_unknown
      recommend_avoid:
        type: return
        value:
          action_type: contraindication
          management_strategy: avoid_combination
          alternative_drug_suggested: true
          monitoring_required: false
          management_compliant: true
      check_severity_level:
        type: condition
        variable: interaction_severity
        operator: eq
        value: contraindicated
        true_next: recommend_avoid
        false_next: check_major_severity
      check_major_severity:
        type: condition
        variable: interaction_severity
        operator: eq
        value: major
        true_next: recommend_manage
        false_next: check_moderate_severity
      recommend_manage:
        type: return
        value:
          monitoring_required: true
          management_strategy: manage_with_caution
          alternative_drug_suggested: true
          management_compliant: true
          action_type: dose_adjustment
      recommend_monitor:
        type: return
        value:
          action_type: clinical_monitoring
          management_strategy: monitor
          monitoring_required: true
          management_compliant: true
          alternative_drug_suggested: false
      recommend_observe:
        type: return
        value:
          management_strategy: observe
          action_type: patient_counseling
          monitoring_required: false
          alternative_drug_suggested: false
          management_compliant: true
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: interaction_severity
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: interaction_severity
        operator: is_null
        value: null
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      management_compliant: true
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
      management_compliant: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when:
      management_compliant: false
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: absent
      confidence: high
  - when:
      management_compliant: false
      falsified: true
    default: null
    emit:
      confidence_score: 0.42
      confidence: medium
      verdict: refuted
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      interaction_severity:
        type: any
        required: false
    outputs:
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    interaction_severity: null
  expect:
    confidence: high
    verdict: absent
- name: 'Q2: confirmed — positive sense, negation inactive'
  input:
    interaction_severity: major
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
