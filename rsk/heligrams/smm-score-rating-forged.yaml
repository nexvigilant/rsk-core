name: smm-score-rating-helix
description: 'Forged from microgram ''smm-score-rating''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    rating: falsified
sense:
  tree:
    start: check_suspended
    nodes:
      fatal_rating:
        type: return
        value:
          rating: SUSPENDED
          weight: 0.0
          disposition: Excluded pending qualified review
          action: Mandatory PV scientist review; CAPA initiated
          chemistry_analog: Ea = infinity; k = 0; no reaction proceeds
      red_rating:
        type: return
        value:
          action: Signal assessments require supporting corroboration
          chemistry_analog: Below activation threshold; trace product only
          disposition: Integrated at 0.25x weight; high-scrutiny flag
          rating: RED
          weight: 0.25
      check_amber:
        type: condition
        variable: cs
        operator: lt
        value: 0.8
        true_next: amber_rating
        false_next: green_rating
      check_red:
        type: condition
        variable: cs
        operator: lt
        value: 0.6
        true_next: red_rating
        false_next: check_amber
      amber_rating:
        type: return
        value:
          chemistry_analog: Partial activation; reduced yield
          disposition: Integrated at 0.60x weight; advisory flag
          weight: 0.6
          rating: AMBER
          action: Violation summary appended to evidence record
      green_rating:
        type: return
        value:
          weight: 1.0
          action: Minor violations annotated; no workflow impact
          rating: GREEN
          chemistry_analog: Full activation; quantitative yield
          disposition: Integrated at full weight
      check_suspended:
        type: condition
        variable: suspended
        operator: eq
        value: true
        true_next: fatal_rating
        false_next: check_red
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: cs
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_negation:
        type: condition
        variable: cs
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      suspended:
        type: bool
        required: true
      cs:
        type: float
        required: true
    outputs:
      chemistry_analog:
        type: string
        required: false
      weight:
        type: float
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      rating:
        type: string
        required: false
      disposition:
        type: string
        required: false
      verdict:
        type: string
        required: false
      action:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    cs: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    cs: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
