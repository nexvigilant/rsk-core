name: smm-score-rating-helix
description: 'Forged from microgram ''smm-score-rating''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    weight: falsified
sense:
  tree:
    start: check_suspended
    nodes:
      check_suspended:
        type: condition
        variable: suspended
        operator: eq
        value: true
        true_next: fatal_rating
        false_next: check_red
      check_red:
        type: condition
        variable: cs
        operator: lt
        value: 0.6
        true_next: red_rating
        false_next: check_amber
      fatal_rating:
        type: return
        value:
          weight: 0.0
          disposition: Excluded pending qualified review
          action: Mandatory PV scientist review; CAPA initiated
          chemistry_analog: Ea = infinity; k = 0; no reaction proceeds
          rating: SUSPENDED
      red_rating:
        type: return
        value:
          weight: 0.25
          disposition: Integrated at 0.25x weight; high-scrutiny flag
          rating: RED
          action: Signal assessments require supporting corroboration
          chemistry_analog: Below activation threshold; trace product only
      check_amber:
        type: condition
        variable: cs
        operator: lt
        value: 0.8
        true_next: amber_rating
        false_next: green_rating
      amber_rating:
        type: return
        value:
          rating: AMBER
          action: Violation summary appended to evidence record
          weight: 0.6
          disposition: Integrated at 0.60x weight; advisory flag
          chemistry_analog: Partial activation; reduced yield
      green_rating:
        type: return
        value:
          action: Minor violations annotated; no workflow impact
          weight: 1.0
          disposition: Integrated at full weight
          rating: GREEN
          chemistry_analog: Full activation; quantitative yield
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: suspended
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: suspended
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      cs:
        type: float
        required: true
      suspended:
        type: bool
        required: true
    outputs:
      chemistry_analog:
        type: string
        required: false
      action:
        type: string
        required: false
      confidence:
        type: string
        required: false
      rating:
        type: string
        required: false
      disposition:
        type: string
        required: false
      verdict:
        type: string
        required: false
      weight:
        type: float
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    cs: 0.0
    suspended: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    cs: 0.0
    suspended: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
