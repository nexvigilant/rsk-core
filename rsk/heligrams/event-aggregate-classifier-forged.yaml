name: event-aggregate-classifier-helix
description: 'Forged from microgram ''event-aggregate-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    traffic_level: falsified
sense:
  tree:
    start: check_many_red
    nodes:
      check_any_red:
        type: condition
        variable: red_count
        operator: gte
        value: 1
        true_next: yellow
        false_next: check_many_yellow
      check_many_yellow:
        type: condition
        variable: yellow_count
        operator: gte
        value: 3
        true_next: yellow
        false_next: green
      check_many_red:
        type: condition
        variable: red_count
        operator: gte
        value: 3
        true_next: red
        false_next: check_any_red
      red:
        type: return
        value:
          traffic_level: red
      yellow:
        type: return
        value:
          traffic_level: yellow
      green:
        type: return
        value:
          traffic_level: green
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_negation:
        type: condition
        variable: red_count
        operator: lt
        value: 3
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: red_count
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      red_count:
        type: number
        required: true
      yellow_count:
        type: number
        required: true
    outputs:
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      traffic_level:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    red_count: 13
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    red_count: 2
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
