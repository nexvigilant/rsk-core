name: dechallenge-rechallenge-helix
description: 'Forged from microgram ''dechallenge-rechallenge''. Domain: CausalityAssessment. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    causality_support: falsified
sense:
  tree:
    start: check_dechallenge_done
    nodes:
      check_dechallenge_done:
        type: condition
        variable: dechallenge_performed
        operator: eq
        value: true
        true_next: check_dechallenge_result
        false_next: no_dechallenge
      check_dechallenge_result:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: true
        true_next: check_rechallenge_done
        false_next: negative_dechallenge
      positive_dechallenge_only:
        type: return
        value:
          causality_support: Supports causal relationship — rechallenge data would strengthen
          recommendation: Classify as possible or probable causality
          evidence_strength: MODERATE
          naranjo_points: 2
      mixed_evidence:
        type: return
        value:
          causality_support: Positive dechallenge but negative rechallenge — conflicting evidence
          naranjo_points: 1
          evidence_strength: CONFLICTING
          recommendation: Expert review needed — consider confounding factors
      both_positive:
        type: return
        value:
          evidence_strength: STRONG
          causality_support: Strongly supports causal relationship
          naranjo_points: 5
          recommendation: Classify as probable or definite causality
      check_rechallenge_done:
        type: condition
        variable: rechallenge_performed
        operator: eq
        value: true
        true_next: check_rechallenge_result
        false_next: positive_dechallenge_only
      check_rechallenge_result:
        type: condition
        variable: rechallenge_positive
        operator: eq
        value: true
        true_next: both_positive
        false_next: mixed_evidence
      negative_dechallenge:
        type: return
        value:
          recommendation: Evaluate alternative causes and temporal relationship
          evidence_strength: WEAK
          naranjo_points: 0
          causality_support: Does not support causal relationship via dechallenge
      no_dechallenge:
        type: return
        value:
          naranjo_points: 0
          causality_support: No dechallenge data available
          evidence_strength: INSUFFICIENT
          recommendation: Rely on temporal relationship and alternative cause assessment
antisense:
  tree:
    start: null_guard_alternative_cause
    nodes:
      null_guard_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_no_dechallenge
      check_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: eq
        value: likely
        true_next: falsified
        false_next: null_guard_temporal_implausible
      null_guard_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: is_null
        value: null
        true_next: null_guard_temporal_implausible
        false_next: check_alternative_cause
      check_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: eq
        value: false
        true_next: falsified
        false_next: null_guard_no_dechallenge
      null_guard_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: is_null
        value: null
        true_next: null_guard_no_dechallenge
        false_next: check_temporal_implausible
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      rechallenge_performed:
        type: bool
        required: false
      alternative_causes:
        type: string
        required: false
      rechallenge_positive:
        type: bool
        required: false
      dechallenge_positive:
        type: bool
        required: false
      temporal_plausible:
        type: bool
        required: false
      dechallenge_performed:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      evidence_strength:
        type: string
        required: false
      causality_support:
        type: string
        required: false
      verdict:
        type: string
        required: false
      naranjo_points:
        type: int
        required: false
      recommendation:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    temporal_plausible: true
    alternative_causes: none
    dechallenge_positive: true
    dechallenge_performed: true
    rechallenge_performed: true
    rechallenge_positive: true
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, alternative_cause active'
  input:
    alternative_causes: likely
    dechallenge_positive: true
    dechallenge_performed: true
    rechallenge_performed: true
    rechallenge_positive: true
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — causality-assessment with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: causality-assessment. Chains as dual-strand verifier before downstream consumers.'
