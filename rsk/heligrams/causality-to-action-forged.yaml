name: causality-to-action-helix
description: 'Forged from microgram ''causality-to-action''. Domain: CausalityAssessment. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    reporting_type: falsified
sense:
  tree:
    start: check_causality_present
    nodes:
      check_possible:
        type: condition
        variable: causality
        operator: eq
        value: POSSIBLE
        true_next: monitor_and_document
        false_next: document_only
      probable_serious:
        type: return
        value:
          reporting_type: 15_day_report
          deadline_days: 15
          regulatory_action: expedited_report
          reason: Serious case with probable causality requires 15-day expedited reporting per ICH E2B
      probable_serious_check:
        type: condition
        variable: is_serious
        operator: eq
        value: true
        true_next: probable_serious
        false_next: periodic_report
      check_definite:
        type: condition
        variable: causality
        operator: eq
        value: DEFINITE
        true_next: definite_serious_check
        false_next: check_probable
      monitor_and_document:
        type: return
        value:
          reporting_type: PSUR_PBRER
          reason: Possible causality - monitor and include in periodic reporting
          regulatory_action: monitor
          deadline_days: 90
      document_only:
        type: return
        value:
          deadline_days: 0
          reporting_type: internal_record
          regulatory_action: document
          reason: Doubtful or no causality - document internally for signal tracking
      reject_missing_causality:
        type: return
        value:
          deadline_days: 0
          regulatory_action: REJECTED
          reason: 'REJECTED: causality field is required. This microgram must receive output from naranjo-quick or equivalent causality assessment. Direct bypass from signal detection is not permitted.'
          reporting_type: none
      standard_report:
        type: return
        value:
          regulatory_action: standard_report
          deadline_days: 15
          reporting_type: 15_day_report
          reason: Definite causality warrants 15-day standard reporting
      definite_serious_check:
        type: condition
        variable: is_serious
        operator: eq
        value: true
        true_next: expedited_report
        false_next: standard_report
      expedited_report:
        type: return
        value:
          regulatory_action: expedited_report
          deadline_days: 7
          reason: Serious case with definite causality requires 7-day expedited reporting per ICH E2B
          reporting_type: IND_safety_report
      check_probable:
        type: condition
        variable: causality
        operator: eq
        value: PROBABLE
        true_next: probable_serious_check
        false_next: check_possible
      periodic_report:
        type: return
        value:
          reporting_type: PSUR_PBRER
          reason: Probable causality in non-serious case included in periodic safety update
          regulatory_action: periodic_report
          deadline_days: 90
      check_causality_present:
        type: condition
        variable: causality
        operator: is_null
        value: null
        true_next: reject_missing_causality
        false_next: check_definite
antisense:
  tree:
    start: null_guard_alternative_cause
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: eq
        value: likely
        true_next: falsified
        false_next: null_guard_temporal_implausible
      check_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      null_guard_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: is_null
        value: null
        true_next: null_guard_no_dechallenge
        false_next: check_temporal_implausible
      null_guard_alternative_cause:
        type: condition
        variable: alternative_causes
        operator: is_null
        value: null
        true_next: null_guard_temporal_implausible
        false_next: check_alternative_cause
      check_temporal_implausible:
        type: condition
        variable: temporal_plausible
        operator: eq
        value: false
        true_next: falsified
        false_next: null_guard_no_dechallenge
      null_guard_no_dechallenge:
        type: condition
        variable: dechallenge_positive
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_no_dechallenge
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      is_serious:
        type: bool
        required: false
      causality:
        type: string
        required: true
      temporal_plausible:
        type: bool
        required: false
      dechallenge_positive:
        type: bool
        required: false
      alternative_causes:
        type: string
        required: false
    outputs:
      regulatory_action:
        type: string
        required: false
      reporting_type:
        type: string
        required: false
      reason:
        type: string
        required: false
      deadline_days:
        type: int
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    alternative_causes: none
    causality: DEFINITE
    dechallenge_positive: true
    temporal_plausible: true
    is_serious: true
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, alternative_cause active'
  input:
    alternative_causes: likely
    causality: DEFINITE
    is_serious: true
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — causality-assessment with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - causality
  - is_serious
  chain_prediction: 'Forged heligram. Domain: causality-assessment. Chains as dual-strand verifier before downstream consumers.'
