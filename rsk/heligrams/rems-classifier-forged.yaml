name: rems-classifier-helix
description: 'Forged from microgram ''rems-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    elements: falsified
sense:
  tree:
    start: restricted_dist_check
    nodes:
      medguide_check:
        type: condition
        variable: medication_guide_only
        operator: eq
        value: true
        true_next: medguide_only
        false_next: no_rems
      patient_enrollment_check:
        type: condition
        variable: patient_enrollment
        operator: eq
        value: true
        true_next: etasu_rems
        false_next: prescriber_or_monitoring_check
      prescriber_or_monitoring_check:
        type: condition
        variable: prescriber_certification
        operator: eq
        value: true
        true_next: etasu_lite
        false_next: monitoring_check
      no_rems:
        type: return
        value:
          elements: ''
          complexity: NONE
          rems_type: NO_REMS
          regulatory_reference: 21 CFR 314.520
      restricted_dist_check:
        type: condition
        variable: restricted_distribution
        operator: eq
        value: true
        true_next: full_rems
        false_next: prescriber_and_patient_check
      etasu_lite:
        type: return
        value:
          complexity: MODERATE
          rems_type: ETASU_LITE
          elements: ETASU
          regulatory_reference: 21 CFR 314.520
      monitoring_check:
        type: condition
        variable: monitoring_required
        operator: eq
        value: true
        true_next: etasu_lite
        false_next: medguide_check
      medguide_only:
        type: return
        value:
          elements: MedGuide
          rems_type: MEDGUIDE_ONLY
          complexity: LOW
          regulatory_reference: 21 CFR 314.520
      etasu_rems:
        type: return
        value:
          elements: ETASU,MedGuide
          rems_type: ETASU_REMS
          complexity: HIGH
          regulatory_reference: 21 CFR 314.520
      full_rems:
        type: return
        value:
          rems_type: FULL_REMS
          complexity: HIGH
          regulatory_reference: 21 CFR 314.520
          elements: ETASU,MedGuide,CommPlan
      prescriber_and_patient_check:
        type: condition
        variable: prescriber_certification
        operator: eq
        value: true
        true_next: patient_enrollment_check
        false_next: prescriber_or_monitoring_check
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_negation:
        type: condition
        variable: medication_guide_only
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: medication_guide_only
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence_score: 0.5
      confidence: medium
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      prescriber_certification:
        type: bool
        required: false
      monitoring_required:
        type: bool
        required: false
      patient_enrollment:
        type: bool
        required: false
      medication_guide_only:
        type: bool
        required: false
      restricted_distribution:
        type: bool
        required: false
    outputs:
      regulatory_reference:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      complexity:
        type: string
        required: false
      elements:
        type: string
        required: false
      rems_type:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    patient_enrollment: false
    monitoring_required: false
    restricted_distribution: true
    medication_guide_only: null
    prescriber_certification: false
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    patient_enrollment: false
    monitoring_required: false
    restricted_distribution: true
    medication_guide_only: false
    prescriber_certification: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
