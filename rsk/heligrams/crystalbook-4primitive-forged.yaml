name: crystalbook-4primitive-helix
description: 'Forged from microgram ''crystalbook-4primitive''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    conservation_holds: falsified
sense:
  tree:
    start: check_existence
    nodes:
      check_void:
        type: condition
        variable: void_identification
        operator: is_not_null
        value: null
        true_next: all_conserved
        false_next: void_unnamed
      state_absent:
        type: condition
        variable: void_identification
        operator: is_not_null
        value: null
        true_next: state_absent_void_present
        false_next: state_and_void_absent
      state_absent_void_present:
        type: return
        value:
          conservation_holds: false
          source: 'Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))'
          state_status: INFERRED
          degraded_count: 1
          diagnosis: STRESSED
          existence_status: PRESENT
          void_status: NAMED
          boundary_status: CLEAR
      check_state:
        type: condition
        variable: state_observation
        operator: is_not_null
        value: null
        true_next: check_void
        false_next: state_absent
      boundary_absent_state_present:
        type: condition
        variable: void_identification
        operator: is_not_null
        value: null
        true_next: boundary_absent_rest_present
        false_next: boundary_and_void_absent
      boundary_absent:
        type: condition
        variable: state_observation
        operator: is_not_null
        value: null
        true_next: boundary_absent_state_present
        false_next: boundary_and_state_absent
      state_and_void_absent:
        type: return
        value:
          conservation_holds: false
          diagnosis: LOSING_COHERENCE
          source: 'Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))'
          void_status: UNNAMED
          existence_status: PRESENT
          boundary_status: CLEAR
          degraded_count: 2
          state_status: INFERRED
      boundary_and_state_absent:
        type: return
        value:
          degraded_count: 3
          void_status: UNNAMED
          state_status: INFERRED
          diagnosis: LOSING_COHERENCE
          source: 'Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))'
          conservation_holds: false
          boundary_status: AMBIGUOUS
          existence_status: PRESENT
      boundary_absent_rest_present:
        type: return
        value:
          source: 'Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))'
          diagnosis: STRESSED
          void_status: NAMED
          state_status: OBSERVED
          conservation_holds: false
          existence_status: PRESENT
          boundary_status: AMBIGUOUS
          degraded_count: 1
      boundary_present_no_existence:
        type: return
        value:
          diagnosis: LOSING_COHERENCE
          degraded_count: 3
          source: 'Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))'
          existence_status: ABSENT
          void_status: UNNAMED
          boundary_status: CLEAR
          state_status: INFERRED
          conservation_holds: false
      existence_absent:
        type: condition
        variable: boundary_description
        operator: is_not_null
        value: null
        true_next: boundary_present_no_existence
        false_next: all_absent
      all_absent:
        type: return
        value:
          existence_status: ABSENT
          diagnosis: NON_EXISTENT
          state_status: STALE
          conservation_holds: false
          degraded_count: 4
          boundary_status: DISSOLVED
          void_status: IGNORED
          source: 'Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))'
      boundary_and_void_absent:
        type: return
        value:
          conservation_holds: false
          diagnosis: LOSING_COHERENCE
          existence_status: PRESENT
          degraded_count: 2
          boundary_status: AMBIGUOUS
          state_status: OBSERVED
          source: 'Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))'
          void_status: UNNAMED
      void_unnamed:
        type: return
        value:
          void_status: UNNAMED
          conservation_holds: false
          state_status: OBSERVED
          existence_status: PRESENT
          boundary_status: CLEAR
          diagnosis: STRESSED
          source: 'Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))'
          degraded_count: 1
      check_existence:
        type: condition
        variable: existence_evidence
        operator: is_not_null
        value: null
        true_next: check_boundary
        false_next: existence_absent
      all_conserved:
        type: return
        value:
          state_status: OBSERVED
          conservation_holds: true
          void_status: NAMED
          diagnosis: CONSERVING
          degraded_count: 0
          existence_status: PRESENT
          boundary_status: CLEAR
          source: 'Crystalbook v2.0 — Conservation Law: ∃ = ∂(×(ς, ∅))'
      check_boundary:
        type: condition
        variable: boundary_description
        operator: is_not_null
        value: null
        true_next: check_state
        false_next: boundary_absent
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: void_identification
        operator: is_null
        value: null
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_negation:
        type: condition
        variable: void_identification
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      conservation_holds: true
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
      conservation_holds: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when:
      conservation_holds: false
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: absent
      confidence_score: 0.7
  - when:
      falsified: true
      conservation_holds: false
    default: null
    emit:
      confidence: medium
      confidence_score: 0.42
      verdict: refuted
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      existence_evidence:
        type: string
        required: false
      state_observation:
        type: string
        required: false
      void_identification:
        type: string
        required: false
      boundary_description:
        type: string
        required: false
    outputs:
      boundary_status:
        type: string
        required: false
      confidence:
        type: string
        required: false
      conservation_holds:
        type: bool
        required: false
      degraded_count:
        type: integer
        required: false
      existence_status:
        type: string
        required: false
      verdict:
        type: string
        required: false
      state_status:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      diagnosis:
        type: string
        required: false
      source:
        type: string
        required: false
      void_status:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    state_observation: All 8 laws loaded, diagnostic functional
    boundary_description: Scope limited to crystalbook plugin directory
    void_identification: null
    existence_evidence: Running process observed at pid 1234
  expect:
    verdict: absent
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    state_observation: All 8 laws loaded, diagnostic functional
    boundary_description: Scope limited to crystalbook plugin directory
    void_identification: No hooks wired, no MCP tools exposed
    existence_evidence: Running process observed at pid 1234
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
