name: workflow-router-helix
description: 'Forged from microgram ''workflow-router''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    first_tool: falsified
sense:
  tree:
    start: check_task
    nodes:
      check_case_task:
        type: condition
        variable: task_type
        operator: eq
        value: case_review
        true_next: case_path
        false_next: check_has_data
      case_path:
        type: return
        value:
          first_tool: case_seriousness
          next_steps: After classification, check reporting deadlines
          description: Evaluate the seriousness of an individual case report using ICH E2A criteria
          start_with: case_review
      check_causality_task:
        type: condition
        variable: task_type
        operator: eq
        value: causality_assessment
        true_next: causality_path
        false_next: check_case_task
      check_has_data:
        type: condition
        variable: has_drug_event_data
        operator: eq
        value: true
        true_next: signal_path
        false_next: getting_started
      getting_started:
        type: return
        value:
          next_steps: Once you have data, return and select signal detection
          first_tool: none
          start_with: data_collection
          description: You need drug-event data to begin. Collect adverse event reports or FAERS data first
      causality_path:
        type: return
        value:
          description: Score the likelihood that a drug caused an adverse event using Naranjo algorithm
          start_with: causality_assessment
          next_steps: After scoring, review recommended regulatory action
          first_tool: naranjo_scale
      signal_path:
        type: return
        value:
          start_with: signal_detection
          description: Analyze drug-event pair frequencies to detect safety signals using PRR
          first_tool: prr_calculator
          next_steps: If signal found, proceed to causality assessment
      check_task:
        type: condition
        variable: task_type
        operator: eq
        value: signal_detection
        true_next: signal_path
        false_next: check_causality_task
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: task_type
        operator: neq
        value: signal_detection
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: task_type
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      has_drug_event_data:
        type: bool
        required: false
      task_type:
        type: string
        required: false
    outputs:
      description:
        type: string
        required: false
      start_with:
        type: string
        required: false
      verdict:
        type: string
        required: false
      first_tool:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      next_steps:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    has_drug_event_data: false
    task_type: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    has_drug_event_data: false
    task_type: __negated__
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
