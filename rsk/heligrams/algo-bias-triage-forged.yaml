name: algo-bias-triage-helix
description: 'Forged from microgram ''algo-bias-triage''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    observer_visible: falsified
sense:
  tree:
    start: check_disparity_high
    nodes:
      check_disparity_minor:
        type: condition
        variable: disparity_ratio
        operator: gt
        value: 1.1
        true_next: minor_bias
        false_next: no_bias
      check_disparity_high:
        type: condition
        variable: disparity_ratio
        operator: gt
        value: 2.0
        true_next: check_population_large_critical
        false_next: check_disparity_moderate
      serious_bias:
        type: return
        value:
          review_deadline_days: 7
          action: expedited_review
          observer_visible: true
          triage_level: SERIOUS
      check_disparity_moderate:
        type: condition
        variable: disparity_ratio
        operator: gt
        value: 1.5
        true_next: check_population_moderate
        false_next: check_disparity_minor
      no_bias:
        type: return
        value:
          triage_level: NONE
          observer_visible: false
          action: no_action
          review_deadline_days: 90
      check_population_large_critical:
        type: condition
        variable: affected_population_pct
        operator: gt
        value: 10.0
        true_next: critical_bias
        false_next: serious_bias
      check_population_moderate:
        type: condition
        variable: affected_population_pct
        operator: gt
        value: 5.0
        true_next: moderate_bias
        false_next: minor_bias
      critical_bias:
        type: return
        value:
          triage_level: CRITICAL
          review_deadline_days: 3
          action: quarantine_and_audit
          observer_visible: true
      moderate_bias:
        type: return
        value:
          triage_level: MODERATE
          review_deadline_days: 14
          action: schedule_fairness_audit
          observer_visible: true
      minor_bias:
        type: return
        value:
          observer_visible: true
          triage_level: MINOR
          action: add_to_monitoring
          review_deadline_days: 30
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: disparity_ratio
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: disparity_ratio
        operator: lte
        value: 2.0
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      observer_visible: true
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
      observer_visible: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when:
      falsified: false
      observer_visible: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: absent
  - when:
      observer_visible: false
      falsified: true
    default: null
    emit:
      verdict: refuted
      confidence: medium
      confidence_score: 0.42
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      protected_attribute:
        type: string
        required: false
      affected_population_pct:
        type: float
        required: false
      disparity_ratio:
        type: float
        required: false
    outputs:
      confidence:
        type: string
        required: false
      triage_level:
        type: string
        required: false
      observer_visible:
        type: bool
        required: false
      review_deadline_days:
        type: int
        required: false
      action:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    affected_population_pct: 25.0
    disparity_ratio: null
    protected_attribute: race
  expect:
    verdict: absent
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input:
    affected_population_pct: 25.0
    disparity_ratio: 3.5
    protected_attribute: race
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
