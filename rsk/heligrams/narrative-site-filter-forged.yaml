name: narrative-site-filter-helix
description: 'Forged from microgram ''narrative-site-filter''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    gate_pass: falsified
sense:
  tree:
    start: check_blinded
    nodes:
      low_irb:
        type: return
        value:
          action: REVIEW — IRB identifier may enable site identification
          detected_categories: irb_id
          gate_pass: false
          risk_level: LOW
          site_id_detected: true
      open_site_check:
        type: condition
        variable: has_site_number
        operator: eq
        value: true
        true_next: check_investigator_with_site
        false_next: check_institution_open
      check_irb:
        type: condition
        variable: has_irb_identifier
        operator: eq
        value: true
        true_next: low_irb
        false_next: check_protocol
      check_institution_open:
        type: condition
        variable: has_institution_name
        operator: eq
        value: true
        true_next: check_investigator_with_institution
        false_next: check_investigator_alone
      check_investigator_with_institution:
        type: condition
        variable: has_investigator_name
        operator: eq
        value: true
        true_next: high_site_exposure
        false_next: moderate_institution
      check_protocol:
        type: condition
        variable: has_protocol_number
        operator: eq
        value: true
        true_next: low_protocol
        false_next: no_site_ids
      critical_unblinding:
        type: return
        value:
          detected_categories: unblinding_risk
          gate_pass: false
          risk_level: CRITICAL
          site_id_detected: true
          action: BLOCK — site identifier in blinded study risks unblinding
      low_protocol:
        type: return
        value:
          site_id_detected: true
          risk_level: LOW
          action: PASS with note — protocol numbers are generally acceptable in regulatory submissions
          detected_categories: protocol_number
          gate_pass: true
      check_investigator_with_site:
        type: condition
        variable: has_investigator_name
        operator: eq
        value: true
        true_next: high_site_exposure
        false_next: moderate_site_number
      moderate_investigator:
        type: return
        value:
          detected_categories: investigator
          gate_pass: false
          site_id_detected: true
          risk_level: MODERATE
          action: BLOCK — investigator name present, remove
      blinded_institution_check:
        type: condition
        variable: has_institution_name
        operator: eq
        value: true
        true_next: critical_unblinding
        false_next: blinded_investigator_check
      check_blinded:
        type: condition
        variable: is_blinded_study
        operator: eq
        value: true
        true_next: blinded_site_check
        false_next: open_site_check
      blinded_investigator_check:
        type: condition
        variable: has_investigator_name
        operator: eq
        value: true
        true_next: critical_unblinding
        false_next: check_irb
      moderate_site_number:
        type: return
        value:
          detected_categories: site_number
          action: BLOCK — site number present, replace with generic identifier
          risk_level: MODERATE
          site_id_detected: true
          gate_pass: false
      no_site_ids:
        type: return
        value:
          detected_categories: none
          gate_pass: true
          action: PASS — no site identifiers detected
          site_id_detected: false
          risk_level: NONE
      blinded_site_check:
        type: condition
        variable: has_site_number
        operator: eq
        value: true
        true_next: critical_unblinding
        false_next: blinded_institution_check
      moderate_institution:
        type: return
        value:
          site_id_detected: true
          action: BLOCK — institution name present, generalize to region
          gate_pass: false
          risk_level: MODERATE
          detected_categories: institution
      check_investigator_alone:
        type: condition
        variable: has_investigator_name
        operator: eq
        value: true
        true_next: moderate_investigator
        false_next: check_irb
      high_site_exposure:
        type: return
        value:
          gate_pass: false
          action: BLOCK — site + investigator combination enables site identification
          detected_categories: site_investigator_pair
          site_id_detected: true
          risk_level: HIGH
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_negation:
        type: condition
        variable: has_site_number
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: has_site_number
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      gate_pass: true
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      gate_pass: true
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when:
      falsified: false
      gate_pass: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: absent
      confidence: high
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      has_irb_identifier:
        type: bool
        required: false
      has_institution_name:
        type: bool
        required: false
      has_site_number:
        type: bool
        required: false
      has_investigator_name:
        type: bool
        required: false
      has_protocol_number:
        type: bool
        required: false
      is_blinded_study:
        type: bool
        required: false
    outputs:
      confidence:
        type: string
        required: false
      site_id_detected:
        type: bool
        required: false
      confidence_score:
        type: float
        required: false
      gate_pass:
        type: bool
        required: false
      detected_categories:
        type: string
        required: false
      action:
        type: string
        required: false
      risk_level:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    is_blinded_study: true
    has_site_number: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    is_blinded_study: true
    has_site_number: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
