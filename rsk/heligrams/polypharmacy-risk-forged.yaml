name: polypharmacy-risk-helix
description: 'Forged from microgram ''polypharmacy-risk''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    recommendation: falsified
sense:
  tree:
    start: check_high_drug_count
    nodes:
      moderate_risk_elderly:
        type: return
        value:
          recommendation: Geriatric medication review using Beers Criteria within 72 hours
          risk_level: MODERATE_RISK
          monitoring_frequency: Weekly monitoring for adverse drug reactions
      high_risk:
        type: return
        value:
          risk_level: HIGH_RISK
          recommendation: Immediate medication review by clinical pharmacist and prescriber
          monitoring_frequency: Daily clinical monitoring required
      check_elderly_moderate:
        type: condition
        variable: patient_age_over_65
        operator: eq
        value: true
        true_next: moderate_risk_elderly
        false_next: low_risk
      moderate_risk_interaction:
        type: return
        value:
          recommendation: Pharmacist review of drug interactions within 48 hours
          monitoring_frequency: Weekly monitoring for adverse drug reactions
          risk_level: MODERATE_RISK
      check_high_drug_count:
        type: condition
        variable: drug_count
        operator: gt
        value: 5
        true_next: check_interaction_high
        false_next: check_moderate_drug_count
      check_elderly_high:
        type: condition
        variable: patient_age_over_65
        operator: eq
        value: true
        true_next: high_risk
        false_next: moderate_risk_interaction
      check_moderate_drug_count:
        type: condition
        variable: drug_count
        operator: gt
        value: 3
        true_next: check_elderly_moderate
        false_next: low_risk
      check_interaction_high:
        type: condition
        variable: has_known_interaction
        operator: eq
        value: true
        true_next: check_elderly_high
        false_next: check_moderate_drug_count
      low_risk:
        type: return
        value:
          recommendation: Routine medication reconciliation at next scheduled visit
          monitoring_frequency: Standard monitoring per disease management protocol
          risk_level: LOW_RISK
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: patient_age_over_65
        operator: lte
        value: 5
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: patient_age_over_65
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      patient_age_over_65:
        type: bool
        required: false
      has_known_interaction:
        type: bool
        required: false
      drug_count:
        type: int
        required: false
    outputs:
      monitoring_frequency:
        type: string
        required: false
      risk_level:
        type: string
        required: false
      recommendation:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    drug_count: 6
    has_known_interaction: true
    patient_age_over_65: 15
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    drug_count: 6
    has_known_interaction: true
    patient_age_over_65: 5
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
