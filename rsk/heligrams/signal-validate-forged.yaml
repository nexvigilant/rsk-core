name: signal-validate-helix
description: 'Forged from microgram ''signal-validate''. Domain: SignalDetection. 4 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    validation_compliant: falsified
sense:
  tree:
    start: validate_signal_data
    nodes:
      check_prr_threshold:
        type: condition
        variable: prr_value
        operator: gte
        value: 2
        true_next: check_case_count
        false_next: validation_failed
      signal_validated:
        type: return
        value:
          validation_status: valid_signal
          validation_compliant: true
          signal_strength: confirmed
          requires_further_investigation: true
      check_confidence:
        type: condition
        variable: lower_ci_95
        operator: gte
        value: 1
        true_next: signal_validated
        false_next: validation_failed
      validation_failed:
        type: return
        value:
          signal_strength: weak
          requires_further_investigation: false
          validation_status: signal_not_validated
          validation_compliant: true
      validate_signal_data:
        type: condition
        variable: prr_value
        operator: is_not_null
        value: null
        true_next: check_prr_threshold
        false_next: validation_unknown
      validation_unknown:
        type: return
        value:
          requires_further_investigation: null
          validation_compliant: false
          signal_strength: null
          validation_status: validation_inconclusive
      check_case_count:
        type: condition
        variable: case_count
        operator: gte
        value: 3
        true_next: check_confidence
        false_next: validation_failed
antisense:
  tree:
    start: null_guard_insufficient_n
    nodes:
      null_guard_notoriety_bias:
        type: condition
        variable: notoriety_bias
        operator: is_null
        value: null
        true_next: null_guard_weber_effect
        false_next: check_notoriety_bias
      check_insufficient_n:
        type: condition
        variable: case_count
        operator: lt
        value: 3
        true_next: falsified
        false_next: null_guard_notoriety_bias
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_weber_effect:
        type: condition
        variable: years_on_market
        operator: is_null
        value: null
        true_next: null_guard_channeling_bias
        false_next: check_weber_effect
      check_notoriety_bias:
        type: condition
        variable: notoriety_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: null_guard_weber_effect
      null_guard_channeling_bias:
        type: condition
        variable: channeling_bias
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_channeling_bias
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_channeling_bias:
        type: condition
        variable: channeling_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: not_falsified
      check_weber_effect:
        type: condition
        variable: years_on_market
        operator: gt
        value: 5
        true_next: falsified
        false_next: null_guard_channeling_bias
      null_guard_insufficient_n:
        type: condition
        variable: case_count
        operator: is_null
        value: null
        true_next: null_guard_notoriety_bias
        false_next: check_insufficient_n
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      validation_compliant: true
    default: null
    emit:
      confidence: high
      confidence_score: 0.7000000000000001
      verdict: confirmed
  - when:
      validation_compliant: true
      falsified: true
    default: null
    emit:
      confidence_score: 0.28
      verdict: contested
      confidence: low
  - when:
      falsified: false
      validation_compliant: false
    default: null
    emit:
      confidence: high
      verdict: absent
      confidence_score: 0.7000000000000001
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      channeling_bias:
        type: bool
        required: false
      notoriety_bias:
        type: bool
        required: false
      case_count:
        type: integer
        required: false
      years_on_market:
        type: integer
        required: false
    outputs:
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    notoriety_bias: false
    case_count: 13
    channeling_bias: false
    prr_value: 3.5
    years_on_market: 0
    lower_ci_95: 1.2
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, insufficient_n active'
  input:
    case_count: 2
    prr_value: 3.5
    lower_ci_95: 1.2
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — signal-detection with 4 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: signal-detection. Chains as dual-strand verifier before downstream consumers.'
