name: musculoskeletal-severity-gate-helix
description: 'Forged from microgram ''musculoskeletal-severity-gate''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    soc: falsified
sense:
  tree:
    start: check_rhabdo
    nodes:
      serious:
        type: return
        value:
          soc: Musculoskeletal and connective tissue disorders
          severity: serious
          action: expedited_report
      check_ck_critical:
        type: condition
        variable: ck_xuln
        operator: gte
        value: 10
        true_next: critical
        false_next: check_myopathy
      check_myalgia:
        type: condition
        variable: reaction_pt
        operator: contains
        value: MYALGIA
        true_next: mild
        false_next: mild
      mild:
        type: return
        value:
          severity: mild
          soc: Musculoskeletal and connective tissue disorders
          action: routine_surveillance
      check_myopathy:
        type: condition
        variable: reaction_pt
        operator: contains
        value: MYOPATHY
        true_next: serious
        false_next: check_tendon_rupture
      critical:
        type: return
        value:
          severity: critical
          soc: Musculoskeletal and connective tissue disorders
          action: immediate_expedited_report
      check_tendon_rupture:
        type: condition
        variable: reaction_pt
        operator: contains
        value: TENDON RUPTURE
        true_next: serious
        false_next: check_ck_moderate
      moderate:
        type: return
        value:
          action: monitor_and_assess
          severity: moderate
          soc: Musculoskeletal and connective tissue disorders
      check_rhabdo:
        type: condition
        variable: reaction_pt
        operator: contains
        value: RHABDOMYOLYSIS
        true_next: critical
        false_next: check_ck_critical
      check_ck_moderate:
        type: condition
        variable: ck_xuln
        operator: gte
        value: 5
        true_next: moderate
        false_next: check_myalgia
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: ck_xuln
        operator: not_contains
        value: RHABDOMYOLYSIS
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: ck_xuln
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
