        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      soc:
        type: string
        required: false
      severity:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    ck_xuln: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
