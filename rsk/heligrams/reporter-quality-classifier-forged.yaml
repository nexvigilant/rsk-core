name: reporter-quality-classifier-helix
description: 'Forged from microgram ''reporter-quality-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    quality_tier: falsified
sense:
  tree:
    start: check_batch_mode
    nodes:
      batch_mixed:
        type: return
        value:
          quality_tier: BATCH_MIXED
          weight: 0.7
          rationale: Mixed reporter pool — moderate signal quality
      missing_batch:
        type: return
        value:
          quality_tier: null
          rationale: Missing total_count for batch classification
          weight: 0.5
      tier_physician:
        type: return
        value:
          weight: 1.0
          rationale: Physician report — highest evidentiary weight for causality assessment
          quality_tier: TIER_1
      batch_low_quality:
        type: return
        value:
          quality_tier: BATCH_LOW
          weight: 0.5
          rationale: No HCP reporters — lower evidentiary weight for batch
      tier_consumer:
        type: return
        value:
          weight: 0.6
          rationale: Consumer report — valuable signal but may lack clinical detail
          quality_tier: TIER_3
      check_lawyer:
        type: condition
        variable: reporter_type
        operator: matches
        value: (?i)^(4|lawyer|attorney)$
        true_next: tier_lawyer
        false_next: unknown_reporter
      check_total:
        type: condition
        variable: total_count
        operator: is_not_null
        value: null
        true_next: check_hcp_dominant
        false_next: missing_batch
      check_physician:
        type: condition
        variable: reporter_type
        operator: matches
        value: (?i)^(1|physician|md)$
        true_next: tier_physician
        false_next: check_pharmacist
      tier_pharmacist:
        type: return
        value:
          quality_tier: TIER_1
          weight: 1.0
          rationale: Pharmacist report — clinical expertise in drug-event assessment
      check_pharmacist:
        type: condition
        variable: reporter_type
        operator: matches
        value: (?i)^(2|pharmacist|pharmd|rph)$
        true_next: tier_pharmacist
        false_next: check_other_hcp
      tier_lawyer:
        type: return
        value:
          quality_tier: TIER_4
          rationale: Lawyer report — potential litigation bias reduces evidentiary weight
          weight: 0.3
      check_reporter:
        type: condition
        variable: reporter_type
        operator: is_not_null
        value: null
        true_next: check_physician
        false_next: unknown_reporter
      batch_high_quality:
        type: return
        value:
          quality_tier: BATCH_HIGH
          weight: 0.9
          rationale: Majority HCP reporters — high-quality signal batch
      check_batch_mode:
        type: condition
        variable: hcp_count
        operator: is_not_null
        value: null
        true_next: check_total
        false_next: check_reporter
      check_hcp_pct_high:
        type: condition
        variable: total_count
        operator: lte
        value: 100
        true_next: batch_high_quality
        false_next: batch_mixed
      check_hcp_any:
        type: condition
        variable: hcp_count
        operator: gte
        value: 1
        true_next: batch_mixed
        false_next: batch_low_quality
      check_other_hcp:
        type: condition
        variable: reporter_type
        operator: matches
        value: (?i)^(3|other_hcp|nurse|rn|np|pa)$
        true_next: tier_other_hcp
        false_next: check_consumer
      check_hcp_dominant:
        type: condition
        variable: hcp_count
        operator: gte
        value: 50
        true_next: check_hcp_pct_high
        false_next: check_hcp_any
      check_consumer:
        type: condition
        variable: reporter_type
        operator: matches
        value: (?i)^(5|consumer|patient)$
        true_next: tier_consumer
        false_next: check_lawyer
      tier_other_hcp:
        type: return
        value:
          quality_tier: TIER_2
          weight: 0.85
          rationale: Other HCP report — clinical context available but may lack prescribing expertise
      unknown_reporter:
        type: return
        value:
          quality_tier: TIER_3
          weight: 0.5
          rationale: Unknown reporter type — default to conservative weight
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: reporter_type
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: reporter_type
        operator: is_null
        value: null
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      hcp_count:
        type: int
        required: false
      reporter_type:
        type: string
        required: false
      total_count:
        type: int
        required: false
    outputs:
      rationale:
        type: string
        required: false
      quality_tier:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      weight:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    reporter_type: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
