name: renal-safety-gate-helix
description: 'Forged from microgram ''renal-safety-gate''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    action: falsified
sense:
  tree:
    start: check_dialysis
    nodes:
      check_renal_failure:
        type: condition
        variable: reaction_pt
        operator: contains
        value: RENAL FAILURE
        true_next: critical
        false_next: check_creat_stage3
      serious_nephritis:
        type: return
        value:
          action: expedited_report
          soc: Renal and urinary disorders
          severity: serious
          aki_stage: 0
      check_creat_stage3:
        type: condition
        variable: creatinine_xbaseline
        operator: gte
        value: 3.0
        true_next: critical_aki3
        false_next: check_creat_stage2
      check_nephritis:
        type: condition
        variable: reaction_pt
        operator: contains
        value: NEPHRITIS
        true_next: serious_nephritis
        false_next: mild
      moderate_aki1:
        type: return
        value:
          soc: Renal and urinary disorders
          aki_stage: 1
          action: monitor_and_assess
          severity: moderate
      critical_aki3:
        type: return
        value:
          severity: critical
          aki_stage: 3
          soc: Renal and urinary disorders
          action: immediate_expedited_report
      check_dialysis:
        type: condition
        variable: reaction_pt
        operator: contains
        value: DIALYSIS
        true_next: critical
        false_next: check_renal_failure
      critical:
        type: return
        value:
          soc: Renal and urinary disorders
          action: immediate_expedited_report
          severity: critical
          aki_stage: 3
      mild:
        type: return
        value:
          action: routine_surveillance
          aki_stage: 0
          severity: mild
          soc: Renal and urinary disorders
      check_creat_stage1:
        type: condition
        variable: creatinine_xbaseline
        operator: gte
        value: 1.5
        true_next: moderate_aki1
        false_next: check_nephritis
      check_creat_stage2:
        type: condition
        variable: creatinine_xbaseline
        operator: gte
        value: 2.0
        true_next: serious_aki2
        false_next: check_creat_stage1
      serious_aki2:
        type: return
        value:
          action: expedited_report
          aki_stage: 2
          severity: serious
          soc: Renal and urinary disorders
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: reaction_pt
        operator: not_contains
        value: DIALYSIS
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: reaction_pt
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      reaction_pt:
        type: string
        required: true
      creatinine_xbaseline:
        type: float
        required: false
    outputs:
      severity:
        type: string
        required: false
      aki_stage:
        type: int
        required: false
      action:
        type: string
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      soc:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    reaction_pt: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
