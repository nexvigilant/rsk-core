name: gate-mw-druglike-helix
description: 'Forged from microgram ''gate-mw-druglike''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    gate: falsified
sense:
  tree:
    start: check
    nodes:
      fail:
        type: return
        value:
          threshold: molecular_weight
          gate: false
          met: false
      pass:
        type: return
        value:
          gate: true
          met: true
          threshold: molecular_weight
      check:
        type: condition
        variable: molecular_weight
        operator: lte
        value: 500
        true_next: pass
        false_next: fail
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_negation:
        type: condition
        variable: molecular_weight
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: molecular_weight
        operator: gt
        value: 500
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      gate: true
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      gate: true
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when:
      falsified: false
      gate: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: absent
      confidence: high
  - when:
      falsified: true
      gate: false
    default: null
    emit:
      confidence_score: 0.42
      confidence: medium
      verdict: refuted
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      molecular_weight:
        type: integer
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    molecular_weight: null
  expect:
    verdict: absent
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    molecular_weight: 500
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
