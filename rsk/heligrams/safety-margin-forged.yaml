name: safety-margin-helix
description: 'Forged from microgram ''safety-margin''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    score_min: falsified
sense:
  tree:
    start: check_danger
    nodes:
      caution:
        type: return
        value:
          score_min: 33
          score_max: 66
          zone: CAUTION
          color: yellow
      safe:
        type: return
        value:
          score_max: 100
          zone: SAFE
          score_min: 66
          color: green
      danger:
        type: return
        value:
          score_max: 33
          color: red
          score_min: 0
          zone: DANGER
      check_caution:
        type: condition
        variable: d
        operator: lte
        value: 1
        true_next: caution
        false_next: safe
      check_danger:
        type: condition
        variable: d
        operator: lte
        value: 0
        true_next: danger
        false_next: check_caution
antisense:
  tree:
    start: check_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: d
        operator: gt
        value: 0
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence_score: 0.5
      confidence: medium
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      d:
        type: float
        required: true
    outputs:
      verdict:
        type: string
        required: false
      score_max:
        type: int
        required: false
      confidence:
        type: string
        required: false
      score_min:
        type: int
        required: false
      zone:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      color:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    d: 0
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    d: 1
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
