name: fda-nitrosamine-limit-helix
description: 'Forged from microgram ''fda-nitrosamine-limit''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    regulatory_reference: falsified
sense:
  tree:
    start: check_compound
    nodes:
      ndma_limit:
        type: return
        value:
          regulatory_reference: 'FDA Guidance: Nitrosamine AI Limits (2023), Table 1; ICH M7(R2)'
          compound_name: N-Nitrosodimethylamine (NDMA)
          ai_limit_ng_per_day: 96
          action_if_exceeded: Immediate batch recall. Root cause investigation. Reformulate or implement process controls.
      check_ndea:
        type: condition
        variable: nitrosamine_type
        operator: eq
        value: ndea
        true_next: ndea_limit
        false_next: check_nmba
      check_nipea:
        type: condition
        variable: nitrosamine_type
        operator: eq
        value: nipea
        true_next: nipea_limit
        false_next: check_ndipa
      check_compound:
        type: condition
        variable: nitrosamine_type
        operator: eq
        value: ndma
        true_next: ndma_limit
        false_next: check_ndea
      nmpa_limit:
        type: return
        value:
          action_if_exceeded: Batch recall. Assess manufacturing process for amine + nitrite contact.
          compound_name: N-Nitroso-N-methyl-phenylamine (NMPA)
          ai_limit_ng_per_day: 26
          regulatory_reference: 'FDA Guidance: Nitrosamine AI Limits (2023), Table 1'
      ndipa_limit:
        type: return
        value:
          ai_limit_ng_per_day: 26
          compound_name: N-Nitrosodiisopropylamine (NDIPA)
          regulatory_reference: 'FDA Guidance: Nitrosamine AI Limits (2023), Table 1'
          action_if_exceeded: Batch recall. Investigate solvent and reagent contamination.
      nipea_limit:
        type: return
        value:
          ai_limit_ng_per_day: 26
          action_if_exceeded: Batch recall. Review synthesis and degradation pathways.
          compound_name: N-Nitrosoisopropylethylamine (NIPEA)
          regulatory_reference: 'FDA Guidance: Nitrosamine AI Limits (2023), Table 1'
      nmba_limit:
        type: return
        value:
          action_if_exceeded: Batch recall if exceeds limit. Investigate synthesis pathway for nitrosation sources.
          ai_limit_ng_per_day: 96
          regulatory_reference: 'FDA Guidance: Nitrosamine AI Limits (2023), Table 1'
          compound_name: N-Nitroso-N-methyl-4-aminobutyric acid (NMBA)
      ndba_limit:
        type: return
        value:
          ai_limit_ng_per_day: 26
          regulatory_reference: 'FDA Guidance: Nitrosamine AI Limits (2023), Table 1'
          compound_name: N-Nitrosodibutylamine (NDBA)
          action_if_exceeded: Batch recall. Assess rubber stopper and packaging contact.
      check_nmba:
        type: condition
        variable: nitrosamine_type
        operator: eq
        value: nmba
        true_next: nmba_limit
        false_next: check_nmpa
      ndsri_default:
        type: return
        value:
          compound_name: Generic NDSRI (drug substance-related nitrosamine)
          ai_limit_ng_per_day: 18
          regulatory_reference: 'FDA Guidance: NDSRI AI Limits (2023), Section III — Default AI for NDSRIs; ICH M7(R2) TTC'
          action_if_exceeded: Apply default 18 ng/day AI for uncharacterized NDSRIs. Conduct Ames mutagenicity test. Derive compound-specific AI if negative.
      check_ndba:
        type: condition
        variable: nitrosamine_type
        operator: eq
        value: ndba
        true_next: ndba_limit
        false_next: check_mni
      check_ndipa:
        type: condition
        variable: nitrosamine_type
        operator: eq
        value: ndipa
        true_next: ndipa_limit
        false_next: check_ndba
      check_nmpa:
        type: condition
        variable: nitrosamine_type
        operator: eq
        value: nmpa
        true_next: nmpa_limit
        false_next: check_nipea
      check_mni:
        type: condition
        variable: nitrosamine_type
        operator: eq
        value: mni
        true_next: mni_limit
        false_next: ndsri_default
      mni_limit:
        type: return
        value:
          action_if_exceeded: Batch recall. Evaluate piperazine-containing API synthesis.
          compound_name: 1-Methyl-4-nitrosopiperazine (MNI)
          regulatory_reference: 'FDA Guidance: Nitrosamine AI Limits (2023), Table 1'
          ai_limit_ng_per_day: 26
      ndea_limit:
        type: return
        value:
          action_if_exceeded: Immediate batch recall. More potent carcinogen than NDMA — lower limit.
          regulatory_reference: 'FDA Guidance: Nitrosamine AI Limits (2023), Table 1; ICH M7(R2)'
          compound_name: N-Nitrosodiethylamine (NDEA)
          ai_limit_ng_per_day: 26
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_negation:
        type: condition
        variable: nitrosamine_type
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: nitrosamine_type
        operator: neq
        value: ndma
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      nitrosamine_type:
        type: string
        required: true
      product_type:
        type: string
        required: false
      duration_of_use:
        type: string
        required: false
    outputs:
      action_if_exceeded:
        type: string
        required: false
      regulatory_reference:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      ai_limit_ng_per_day:
        type: int
        required: false
      compound_name:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    nitrosamine_type: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    nitrosamine_type: __negated__
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - nitrosamine_type
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
