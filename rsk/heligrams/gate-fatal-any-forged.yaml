name: gate-fatal-any-helix
description: 'Forged from microgram ''gate-fatal-any''. Domain: SeriousnessClassification. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    met: falsified
sense:
  tree:
    start: check
    nodes:
      check:
        type: condition
        variable: death_count
        operator: gte
        value: 1
        true_next: pass
        false_next: fail
      fail:
        type: return
        value:
          threshold: death_count
          met: false
          gate: false
      pass:
        type: return
        value:
          gate: true
          threshold: death_count
          met: true
antisense:
  tree:
    start: null_guard_incomplete_info
    nodes:
      null_guard_incomplete_info:
        type: condition
        variable: follow_up_complete
        operator: is_null
        value: null
        true_next: null_guard_comorbidity_confound
        false_next: check_incomplete_info
      check_incomplete_info:
        type: condition
        variable: follow_up_complete
        operator: eq
        value: false
        true_next: falsified
        false_next: null_guard_comorbidity_confound
      check_coding_error:
        type: condition
        variable: coding_verified
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      check_comorbidity_confound:
        type: condition
        variable: comorbidity_explains
        operator: eq
        value: true
        true_next: falsified
        false_next: null_guard_coding_error
      null_guard_coding_error:
        type: condition
        variable: coding_verified
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_coding_error
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_comorbidity_confound:
        type: condition
        variable: comorbidity_explains
        operator: is_null
        value: null
        true_next: null_guard_coding_error
        false_next: check_comorbidity_confound
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      met: true
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      met: true
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when:
      falsified: false
      met: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: absent
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      coding_verified:
        type: bool
        required: false
      follow_up_complete:
        type: bool
        required: false
      comorbidity_explains:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    death_count: 1
    coding_verified: true
    follow_up_complete: true
    comorbidity_explains: false
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, incomplete_info active'
  input:
    follow_up_complete: false
    death_count: 1
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — seriousness-classification with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: seriousness-classification. Chains as dual-strand verifier before downstream consumers.'
