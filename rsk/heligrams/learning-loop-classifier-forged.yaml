name: learning-loop-classifier-helix
description: 'Forged from microgram ''learning-loop-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    loop_type: falsified
sense:
  tree:
    start: check_triple
    nodes:
      triple:
        type: return
        value:
          loop_type: triple
          action: Question the loop model itself — are loop weights and evidence grading still appropriate?
      single:
        type: return
        value:
          action: Fix execution errors — identify and correct the most recent failure
          loop_type: single
      check_double:
        type: condition
        variable: failure_rate
        operator: gt
        value: 20
        true_next: double
        false_next: single
      check_triple:
        type: condition
        variable: is_fifth_eval
        operator: eq
        value: true
        true_next: triple
        false_next: check_double
      double:
        type: return
        value:
          action: Question thresholds — failure rate exceeds 20%, thresholds may be miscalibrated
          loop_type: double
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: failure_rate
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: failure_rate
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      failure_rate:
        type: bool
        required: false
    outputs:
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    failure_rate: null
    is_fifth_eval: true
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    failure_rate: false
    is_fifth_eval: true
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
