name: lymphatic-risk-classifier-helix
description: 'Forged from microgram ''lymphatic-risk-classifier''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    severity: falsified
sense:
  tree:
    start: check_lymphoma
    nodes:
      check_neutropenia:
        type: condition
        variable: reaction_pt
        operator: contains
        value: NEUTROPENIA
        true_next: moderate
        false_next: check_lymphopenia
      serious:
        type: return
        value:
          severity: serious
          soc: Blood and lymphatic system disorders
          action: expedited_report
      moderate:
        type: return
        value:
          severity: moderate
          action: monitor_and_assess
          soc: Blood and lymphatic system disorders
      mild:
        type: return
        value:
          soc: Blood and lymphatic system disorders
          severity: mild
          action: routine_surveillance
      check_lymphopenia:
        type: condition
        variable: reaction_pt
        operator: contains
        value: LYMPHOPENIA
        true_next: moderate
        false_next: mild
      critical:
        type: return
        value:
          soc: Blood and lymphatic system disorders
          action: immediate_expedited_report
          severity: critical
      check_leukaemia:
        type: condition
        variable: reaction_pt
        operator: contains
        value: LEUKAEMIA
        true_next: critical
        false_next: check_pancytopenia
      check_agranulocytosis:
        type: condition
        variable: reaction_pt
        operator: contains
        value: AGRANULOCYTOSIS
        true_next: serious
        false_next: check_neutropenia
      check_lymphoma:
        type: condition
        variable: reaction_pt
        operator: contains
        value: LYMPHOMA
        true_next: critical
        false_next: check_leukaemia
      check_pancytopenia:
        type: condition
        variable: reaction_pt
        operator: contains
        value: PANCYTOPENIA
        true_next: serious
        false_next: check_agranulocytosis
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      null_guard_negation:
        type: condition
        variable: reaction_pt
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: reaction_pt
        operator: not_contains
        value: LYMPHOMA
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence_score: 0.5
      confidence: medium
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      reaction_pt:
        type: string
        required: true
    outputs:
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      action:
        type: string
        required: false
      soc:
        type: string
        required: false
      verdict:
        type: string
        required: false
      severity:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    reaction_pt: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
