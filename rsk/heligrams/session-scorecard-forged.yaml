name: session-scorecard-helix
description: 'Forged from microgram ''session-scorecard''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    scorecard_note: falsified
sense:
  tree:
    start: check_void
    nodes:
      level_minus1:
        type: return
        value:
          scorecard_note: 'No work detected. The session produced nothing — not even an observation. DQ: failure to return a scorecard.'
          primitive: '-'
          chain: (empty)
          verdict: no_scorecard
          level: -1
          level_name: BLANK
      check_persist:
        type: condition
        variable: change_persisted
        operator: eq
        value: true
        true_next: check_ship
        false_next: level_3
      check_state:
        type: condition
        variable: state_measured
        operator: eq
        value: true
        true_next: check_compare
        false_next: level_0
      level_2:
        type: return
        value:
          scorecard_note: Measured and compared. Valid audit. The lie was assessed and the target identified. No stroke taken — observation IS the deliverable if this was an audit session.
          level: 2
          level_name: COMPARE
          primitive: κ
          chain: κ(ς(∅))
          verdict: audit_complete
      level_3:
        type: return
        value:
          level_name: ACT
          scorecard_note: 'Action taken but not persisted. Energy without persistence — a spark. The stroke was taken but not recorded on the scorecard. G1+ρ violation: strokes exist that the scorecard does not reflect.'
          level: 3
          primitive: →
          chain: →(κ(ς(∅)))
          verdict: spark
      level_4:
        type: return
        value:
          scorecard_note: Changed and committed. The scorecard is signed. Full internal round complete. Ready for deployment but not yet irreversible — the score is posted but the tournament is not over.
          level: 4
          chain: π(→(κ(ς(∅))))
          primitive: π
          level_name: PERSIST
          verdict: committed
      check_action:
        type: condition
        variable: action_taken
        operator: eq
        value: true
        true_next: check_persist
        false_next: level_2
      level_1:
        type: return
        value:
          scorecard_note: State measured honestly. G1 satisfied — the ball was played as it lies. But no comparison to goal means no direction. A practice swing.
          chain: ς(∅)
          level_name: STATE
          primitive: ς
          level: 1
          verdict: observed
      level_0:
        type: return
        value:
          verdict: void_only
          primitive: ∅
          level_name: VOID
          level: 0
          chain: ∅
          scorecard_note: Gap identified but not measured. The void was named but state was not observed. Like reading the course map without walking the holes.
      level_5:
        type: return
        value:
          level_name: SHIP
          verdict: shipped
          primitive: ∝
          scorecard_note: Deployed and irreversible. Full product chain complete. The round is in the books. ∝ means it cannot be taken back — published to hub, merged to main, released to production.
          chain: ∝(π(→(κ(ς(∅)))))
          level: 5
      check_ship:
        type: condition
        variable: change_shipped
        operator: eq
        value: true
        true_next: level_5
        false_next: level_4
      check_void:
        type: condition
        variable: void_identified
        operator: eq
        value: true
        true_next: check_state
        false_next: level_minus1
      check_compare:
        type: condition
        variable: compared_to_goal
        operator: eq
        value: true
        true_next: check_action
        false_next: level_1
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_negation:
        type: condition
        variable: change_persisted
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: change_persisted
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      compared_to_goal:
        type: bool
        required: false
      change_shipped:
        type: bool
        required: false
      state_measured:
        type: bool
        required: false
      change_persisted:
        type: bool
        required: false
      void_identified:
        type: bool
        required: false
      action_taken:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      scorecard_note:
        type: string
        required: false
      level:
        type: int
        required: false
      level_name:
        type: string
        required: false
      chain:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      primitive:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    action_taken: true
    state_measured: true
    change_shipped: true
    void_identified: true
    compared_to_goal: true
    change_persisted: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    action_taken: true
    state_measured: true
    change_shipped: true
    void_identified: true
    compared_to_goal: true
    change_persisted: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - ∅
  - ς
  - κ
  - →
  - π
  - ∝
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
