name: age-pediatric-dose-helix
description: 'Forged from microgram ''age-pediatric-dose''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    message: falsified
sense:
  tree:
    start: check_age_years
    nodes:
      weight_based_calculation:
        type: return
        value:
          message: 'Pediatric dosing: use weight-based dosing'
          adjustment_factor: mg/kg dosing recommended
          dosing_method: weight_based
      age_based_calculation:
        type: return
        value:
          dosing_method: age_based
          message: Use age-based adjustment if weight unavailable
          adjustment_factor: Young's rule or Clark's rule
      check_weight_based:
        type: condition
        variable: weight_kg
        operator: gt
        value: 0
        true_next: weight_based_calculation
        false_next: age_based_calculation
      check_age_years:
        type: condition
        variable: age_years
        operator: lt
        value: 18
        true_next: check_weight_based
        false_next: adult_dosing
      adult_dosing:
        type: return
        value:
          dosing_method: adult
          adjustment_factor: 1.0
          message: 'Age 18+: use standard adult dosing'
antisense:
  tree:
    start: check_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: weight_kg
        operator: gte
        value: 18
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      weight_kg:
        type: integer
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    age_years: 8
    weight_kg: 8
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    age_years: 8
    weight_kg: 18
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
