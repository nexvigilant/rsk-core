name: guardian-signal-bridge-helix
description: 'Forged from microgram ''guardian-signal-bridge''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    guardian_severity: falsified
sense:
  tree:
    start: check_timeline
    nodes:
      document_severity:
        type: return
        value:
          guardian_severity: 0.15
          guardian_source: pv
          guardian_pattern: document_only
          guardian_context: Non-serious case - line listing periodic report
      critical_risk:
        type: return
        value:
          guardian_source: pv
          guardian_context: Critical risk score from signal detection pipeline
          guardian_pattern: risk_critical
          guardian_severity: 0.9
      check_timeline:
        type: condition
        variable: timeline
        operator: eq
        value: 7_CALENDAR_DAYS
        true_next: critical_signal
        false_next: check_15day
      check_risk_score:
        type: condition
        variable: risk_score
        operator: gte
        value: 80
        true_next: critical_risk
        false_next: default_severity
      check_15day:
        type: condition
        variable: timeline
        operator: eq
        value: 15_CALENDAR_DAYS
        true_next: high_signal
        false_next: check_periodic
      check_periodic:
        type: condition
        variable: timeline
        operator: eq
        value: PERIODIC
        true_next: check_serious_periodic
        false_next: check_risk_score
      monitor_serious:
        type: return
        value:
          guardian_pattern: monitor_serious
          guardian_severity: 0.55
          guardian_context: Serious expected case - periodic PSUR/DSUR reporting
          guardian_source: pv
      default_severity:
        type: return
        value:
          guardian_context: Routine case - no elevated risk indicators
          guardian_pattern: routine
          guardian_severity: 0.1
          guardian_source: pv
      check_serious_periodic:
        type: condition
        variable: serious
        operator: eq
        value: true
        true_next: monitor_serious
        false_next: document_severity
      critical_signal:
        type: return
        value:
          guardian_severity: 0.95
          guardian_source: pv
          guardian_pattern: expedited_critical
          guardian_context: Expedited 7-day report required - fatal/life-threatening SUSAR
      high_signal:
        type: return
        value:
          guardian_severity: 0.8
          guardian_context: Expedited 15-day report required - serious unexpected ADR
          guardian_source: pv
          guardian_pattern: expedited_high
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: timeline
        operator: neq
        value: 7_CALENDAR_DAYS
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: timeline
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      report_type:
        type: string
        required: false
      risk_score:
        type: float
        required: false
      timeline:
        type: string
        required: false
      serious:
        type: bool
        required: false
      days_from_awareness:
        type: int
        required: false
    outputs:
      guardian_severity:
        type: float
        required: false
      guardian_context:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      guardian_pattern:
        type: string
        required: false
      confidence:
        type: string
        required: false
      guardian_source:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    timeline: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    timeline: __negated__
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
