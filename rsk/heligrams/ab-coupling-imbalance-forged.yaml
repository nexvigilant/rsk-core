name: ab-coupling-imbalance-helix
description: 'Forged from microgram ''ab-coupling-imbalance''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    threat: falsified
sense:
  tree:
    start: check_zero
    nodes:
      clean:
        type: return
        value:
          threat: false
          response: PASS
      check_tolerance:
        type: condition
        variable: magnitude_delta
        operator: lte
        value: 0.01
        true_next: clean
        false_next: violation
      check_zero:
        type: condition
        variable: magnitude_delta
        operator: eq
        value: 0
        true_next: clean
        false_next: check_tolerance
      violation:
        type: return
        value:
          threat: true
          response: 'BLOCK: action-reaction imbalance — Newton third law violated'
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: magnitude_delta
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: magnitude_delta
        operator: neq
        value: 0
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      threat: true
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
      threat: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when:
      threat: false
      falsified: false
    default: null
    emit:
      verdict: absent
      confidence_score: 0.7
      confidence: high
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      tolerance:
        type: number
        required: true
      magnitude_delta:
        type: number
        required: true
    outputs:
      confidence_score:
        type: float
        required: false
      threat:
        type: boolean
        required: false
      verdict:
        type: string
        required: false
      response:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    tolerance: 0.01
    magnitude_delta: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    tolerance: 0.01
    magnitude_delta: 1
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
