name: station-drugbank-pipeline-helix
description: 'Forged from microgram ''station-drugbank-pipeline''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    route: falsified
sense:
  tree:
    start: check_interaction
    nodes:
      check_contraindication:
        type: condition
        variable: has_contraindication
        operator: eq
        value: true
        true_next: contraindication_alert
        false_next: pharmacology_review
      major_interaction:
        type: return
        value:
          route: interaction_signal
          priority: high
          action: alert
          reason: Major drug interaction detected — cross-reference with FAERS for AE signal
      contraindication_alert:
        type: return
        value:
          priority: high
          reason: Contraindication found — verify against current labeling
          route: label_comparison
          action: alert
      pharmacology_review:
        type: return
        value:
          action: review
          priority: low
          route: archive
          reason: Clean pharmacology profile — archive for reference
      interaction_severity:
        type: condition
        variable: interaction_severity
        operator: eq
        value: major
        true_next: major_interaction
        false_next: minor_interaction
      minor_interaction:
        type: return
        value:
          reason: Minor/moderate interaction — log for polypharmacy analysis
          priority: low
          action: note
          route: interaction_log
      check_interaction:
        type: condition
        variable: has_interaction
        operator: eq
        value: true
        true_next: interaction_severity
        false_next: check_contraindication
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_negation:
        type: condition
        variable: has_contraindication
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: has_contraindication
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      has_contraindication:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    interaction_severity: major
    has_interaction: true
    has_contraindication: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    interaction_severity: major
    has_interaction: true
    has_contraindication: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
