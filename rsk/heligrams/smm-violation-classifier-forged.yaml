name: smm-violation-classifier-helix
description: 'Forged from microgram ''smm-violation-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    class: falsified
sense:
  tree:
    start: check_fatal
    nodes:
      check_undoc_deviation:
        type: condition
        variable: undocumented_deviation
        operator: eq
        value: true
        true_next: fatal
        false_next: check_post_hoc_criteria
      check_no_power:
        type: condition
        variable: missing_power_calculation
        operator: eq
        value: true
        true_next: major
        false_next: check_imprecise_sig
      fatal:
        type: return
        value:
          class: F
          cs_effect: CS suspended (0.00)
          label: FATAL
          description: Integrity of knowledge state threatened. Evidence excluded pending review.
          chemistry_analog: Activation energy infinite — reaction impossible
      critical:
        type: return
        value:
          label: CRITICAL
          chemistry_analog: Inhibition — reaction rate reduced by competitive binding
          description: Significant structural deficiency introducing directional bias.
          cs_effect: CS reduced by 0.20 per violation (floor 0.10)
          class: C
      major:
        type: return
        value:
          description: Methodological or vocabulary violation impairing reproducibility.
          class: M
          label: MAJOR
          cs_effect: CS reduced by 0.07 per violation (floor 0.50)
          chemistry_analog: Side reaction — product yield reduced
      minor:
        type: return
        value:
          label: MINOR
          description: Presentational deficiency with limited epistemological impact.
          cs_effect: CS reduced by 0.02 per violation (floor 0.85)
          class: m
          chemistry_analog: Thermal noise — negligible perturbation
      compliant:
        type: return
        value:
          label: COMPLIANT
          chemistry_analog: Clean reaction — full yield
          class: none
          cs_effect: CS = 1.00
          description: No violations detected.
      check_missing_negative:
        type: condition
        variable: missing_negative_results
        operator: eq
        value: true
        true_next: critical
        false_next: check_coi
      check_criterion_drift:
        type: condition
        variable: criterion_drift
        operator: eq
        value: true
        true_next: critical
        false_next: check_overclaim
      check_imprecise_sig:
        type: condition
        variable: imprecise_significant
        operator: eq
        value: true
        true_next: major
        false_next: check_minor
      check_fatal:
        type: condition
        variable: post_hoc_endpoint
        operator: eq
        value: true
        true_next: fatal
        false_next: check_suppressed
      check_suppressed:
        type: condition
        variable: suppressed_hypothesis
        operator: eq
        value: true
        true_next: fatal
        false_next: check_fabricated
      check_coi:
        type: condition
        variable: undisclosed_coi
        operator: eq
        value: true
        true_next: critical
        false_next: check_criterion_drift
      check_post_hoc_criteria:
        type: condition
        variable: post_hoc_analysis_criteria
        operator: eq
        value: true
        true_next: fatal
        false_next: check_missing_negative
      check_minor:
        type: condition
        variable: has_minor_deficiency
        operator: eq
        value: true
        true_next: minor
        false_next: compliant
      check_fabricated:
        type: condition
        variable: fabricated_data
        operator: eq
        value: true
        true_next: fatal
        false_next: check_undoc_deviation
      check_overclaim:
        type: condition
        variable: uses_proves_confirms
        operator: eq
        value: true
        true_next: major
        false_next: check_no_power
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: undocumented_deviation
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: undocumented_deviation
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      fabricated_data:
        type: bool
        required: true
      uses_proves_confirms:
        type: bool
        required: true
      undocumented_deviation:
        type: bool
        required: true
      post_hoc_endpoint:
        type: bool
        required: true
      post_hoc_analysis_criteria:
        type: bool
        required: true
      missing_power_calculation:
        type: bool
        required: true
      missing_negative_results:
        type: bool
        required: true
      imprecise_significant:
        type: bool
        required: true
      criterion_drift:
        type: bool
        required: true
      suppressed_hypothesis:
        type: bool
        required: true
      undisclosed_coi:
        type: bool
        required: true
      has_minor_deficiency:
        type: bool
        required: true
    outputs:
      chemistry_analog:
        type: string
        required: false
      cs_effect:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      description:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      class:
        type: string
        required: false
      label:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    missing_negative_results: false
    post_hoc_endpoint: true
    suppressed_hypothesis: false
    undisclosed_coi: false
    missing_power_calculation: false
    has_minor_deficiency: false
    criterion_drift: false
    fabricated_data: false
    post_hoc_analysis_criteria: false
    uses_proves_confirms: false
    undocumented_deviation: null
    imprecise_significant: false
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    missing_negative_results: false
    post_hoc_endpoint: true
    suppressed_hypothesis: false
    undisclosed_coi: false
    missing_power_calculation: false
    has_minor_deficiency: false
    criterion_drift: false
    fabricated_data: false
    post_hoc_analysis_criteria: false
    uses_proves_confirms: false
    undocumented_deviation: false
    imprecise_significant: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
