        value: within_3_months
        true_next: dp_refrigerator_sig_early
        false_next: dp_refrigerator_sig_late
      dp_refrigerator_sig_early:
        type: return
        value:
          guideline: ICH Q1A(R2) §2.2.7.4
          storage_type: refrigerator
          accelerated_min_duration_months: 3
