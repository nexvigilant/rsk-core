name: ic-signal-helix
description: 'Forged from microgram ''ic-signal''. Domain: SignalDetection. 4 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    signal_detected: falsified
sense:
  tree:
    start: null_guard
    nodes:
      check_positive:
        type: condition
        variable: ic025
        operator: gte
        value: 0.0
        true_next: no_signal_positive
        false_next: no_signal_negative
      check_strong:
        type: condition
        variable: ic025
        operator: gte
        value: 2.0
        true_next: strong_signal
        false_next: check_moderate
      strong_signal:
        type: return
        value:
          signal: STRONG
          signal_detected: true
          confidence: HIGH
      check_moderate:
        type: condition
        variable: ic025
        operator: gte
        value: 1.0
        true_next: moderate_signal
        false_next: check_weak
      unknown_return:
        type: return
        value:
          signal_detected: false
          note: No IC data available
          signal: NONE
      weak_signal:
        type: return
        value:
          confidence: LOW
          signal_detected: true
          signal: WEAK
      moderate_signal:
        type: return
        value:
          signal_detected: true
          signal: MODERATE
          confidence: MODERATE
      check_weak:
        type: condition
        variable: ic025
        operator: gte
        value: 0.5
        true_next: weak_signal
        false_next: check_positive
      no_signal_positive:
        type: return
        value:
          signal_detected: false
          signal: NONE
          note: IC positive but IC025 below threshold
      no_signal_negative:
        type: return
        value:
          signal_detected: false
          signal: NONE
          note: IC negative -- no disproportionality
      null_guard:
        type: condition
        variable: ic025
        operator: is_null
        value: null
        true_next: unknown_return
        false_next: check_strong
antisense:
  tree:
    start: null_guard_insufficient_n
    nodes:
      null_guard_weber_effect:
        type: condition
        variable: years_on_market
        operator: is_null
        value: null
        true_next: null_guard_channeling_bias
        false_next: check_weber_effect
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_channeling_bias:
        type: condition
        variable: channeling_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_channeling_bias:
        type: condition
        variable: channeling_bias
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_channeling_bias
      null_guard_notoriety_bias:
        type: condition
        variable: notoriety_bias
        operator: is_null
        value: null
        true_next: null_guard_weber_effect
        false_next: check_notoriety_bias
      null_guard_insufficient_n:
        type: condition
        variable: case_count
        operator: is_null
        value: null
        true_next: null_guard_notoriety_bias
        false_next: check_insufficient_n
      check_notoriety_bias:
        type: condition
        variable: notoriety_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: null_guard_weber_effect
      check_weber_effect:
        type: condition
        variable: years_on_market
        operator: gt
        value: 5
        true_next: falsified
        false_next: null_guard_channeling_bias
      check_insufficient_n:
        type: condition
        variable: case_count
        operator: lt
        value: 3
        true_next: falsified
        false_next: null_guard_notoriety_bias
resolution:
  mode: base_pair
  rules:
  - when:
      signal_detected: true
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7000000000000001
  - when:
      signal_detected: true
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.28
      verdict: contested
  - when:
      falsified: false
      signal_detected: false
    default: null
    emit:
      confidence_score: 0.7000000000000001
      verdict: absent
      confidence: high
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      ic025:
        type: float
        required: false
      notoriety_bias:
        type: bool
        required: false
      years_on_market:
        type: integer
        required: false
      case_count:
        type: integer
        required: false
      channeling_bias:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      signal_detected:
        type: bool
        required: false
      note:
        type: string
        required: false
      signal:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    ic025: 3.0
    years_on_market: 0
    case_count: 13
    notoriety_bias: false
    channeling_bias: false
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, insufficient_n active'
  input:
    ic025: 3.0
    case_count: 2
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — signal-detection with 4 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: signal-detection. Chains as dual-strand verifier before downstream consumers.'
