name: bridge-benefit-risk-to-preemptive-helix
description: 'Forged from microgram ''bridge-benefit-risk-to-preemptive''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    trajectory_severity: falsified
sense:
  tree:
    start: check_action
    nodes:
      critical_trajectory:
        type: return
        value:
          trajectory_severity: critical
          intervention_window_days: 3
          bridge: benefit-risk-to-preemptive
      check_review:
        type: condition
        variable: action
        operator: eq
        value: review
        true_next: moderate_trajectory
        false_next: safe_trajectory
      safe_trajectory:
        type: return
        value:
          intervention_window_days: 90
          trajectory_severity: low
          bridge: benefit-risk-to-preemptive
      moderate_trajectory:
        type: return
        value:
          intervention_window_days: 14
          trajectory_severity: moderate
          bridge: benefit-risk-to-preemptive
      check_action:
        type: condition
        variable: action
        operator: eq
        value: escalate
        true_next: critical_trajectory
        false_next: check_review
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: action
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_negation:
        type: condition
        variable: action
        operator: neq
        value: escalate
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      action:
        type: string
        required: false
    outputs:
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    action: null
    priority: critical
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    action: __negated__
    priority: critical
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
