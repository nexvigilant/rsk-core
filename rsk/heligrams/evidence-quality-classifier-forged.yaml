name: evidence-quality-classifier-helix
description: 'Forged from microgram ''evidence-quality-classifier''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    achieved_target: falsified
sense:
  tree:
    start: check_default
    nodes:
      check_failure_stalled:
        type: condition
        variable: state
        operator: eq
        value: stalled
        true_next: strong_failure
        false_next: check_failure_gimbal
      check_failure_gimbal:
        type: condition
        variable: state
        operator: eq
        value: gimbal_lock
        true_next: strong_failure
        false_next: check_failure_fatigue
      none:
        type: return
        value:
          achieved_target: false
          score: 0
          quality: none
      check_margin_strong:
        type: condition
        variable: margin_ratio
        operator: gte
        value: 50
        true_next: strong_healthy
        false_next: check_margin_moderate
      check_margin_moderate:
        type: condition
        variable: margin_ratio
        operator: gte
        value: 10
        true_next: moderate_healthy
        false_next: weak_healthy
      check_failure_disintegrated:
        type: condition
        variable: state
        operator: eq
        value: disintegrated
        true_next: strong_failure
        false_next: check_failure_stalled
      strong_failure:
        type: return
        value:
          score: 1.0
          quality: strong
          achieved_target: false
      check_warning:
        type: condition
        variable: state
        operator: eq
        value: warning
        true_next: moderate
        false_next: check_margin_strong
      moderate:
        type: return
        value:
          score: 0.66
          achieved_target: true
          quality: moderate
      strong_healthy:
        type: return
        value:
          score: 1.0
          achieved_target: true
          quality: strong
      check_weak_critical:
        type: condition
        variable: state
        operator: eq
        value: critical
        true_next: weak
        false_next: check_weak_low
      weak:
        type: return
        value:
          quality: weak
          score: 0.33
          achieved_target: false
      weak_healthy:
        type: return
        value:
          quality: weak
          achieved_target: true
          score: 0.33
      check_weak_nostability:
        type: condition
        variable: state
        operator: eq
        value: no_stability
        true_next: weak
        false_next: check_warning
      check_failure_fatigue:
        type: condition
        variable: state
        operator: eq
        value: fatigue_failure_imminent
        true_next: strong_failure
        false_next: check_weak_critical
      check_weak_low:
        type: condition
        variable: state
        operator: eq
        value: low
        true_next: weak
        false_next: check_weak_nostability
      moderate_healthy:
        type: return
        value:
          score: 0.66
          quality: moderate
          achieved_target: true
      check_default:
        type: condition
        variable: state
        operator: eq
        value: default
        true_next: none
        false_next: check_failure_disintegrated
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_negation:
        type: condition
        variable: state
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: state
        operator: neq
        value: default
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      achieved_target: true
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
      achieved_target: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when:
      achieved_target: false
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: absent
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      state:
        type: string
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    margin_ratio: 0
    state: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    margin_ratio: 0
    state: __negated__
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
