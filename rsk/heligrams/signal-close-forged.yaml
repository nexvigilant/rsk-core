name: signal-close-helix
description: 'Forged from microgram ''signal-close''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    requires_further_monitoring: falsified
sense:
  tree:
    start: validate_closure_readiness
    nodes:
      check_resolution:
        type: condition
        variable: resolution_status
        operator: is_not_null
        value: null
        true_next: closure_approved
        false_next: resolution_pending
      validate_closure_readiness:
        type: condition
        variable: investigation_complete
        operator: eq
        value: true
        true_next: check_documentation
        false_next: not_ready_for_closure
      check_documentation:
        type: condition
        variable: documentation_complete
        operator: eq
        value: true
        true_next: check_resolution
        false_next: documentation_incomplete
      closure_approved:
        type: return
        value:
          requires_further_monitoring: false
          signal_status: resolved
          closure_compliant: true
          closure_status: approved
      not_ready_for_closure:
        type: return
        value:
          closure_compliant: true
          closure_status: not_ready
          signal_status: investigation_ongoing
          requires_further_monitoring: true
      documentation_incomplete:
        type: return
        value:
          closure_status: deferred
          signal_status: pending_documentation
          requires_further_monitoring: true
          closure_compliant: false
      resolution_pending:
        type: return
        value:
          closure_status: pending
          signal_status: awaiting_resolution
          closure_compliant: true
          requires_further_monitoring: true
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_negation:
        type: condition
        variable: resolution_status
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_negation:
        type: condition
        variable: resolution_status
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      requires_further_monitoring: true
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
      requires_further_monitoring: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when:
      falsified: false
      requires_further_monitoring: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: absent
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      resolution_status:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    resolution_status: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    resolution_status: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
