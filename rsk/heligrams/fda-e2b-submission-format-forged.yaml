name: fda-e2b-submission-format-helix
description: 'Forged from microgram ''fda-e2b-submission-format''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    acknowledgment_expected: falsified
sense:
  tree:
    start: check_report_type
    nodes:
      annual_format:
        type: return
        value:
          required_format: eCTD or paper (NDA/BLA dependent)
          submission_gateway: FDA ESG via eCTD or paper to CDER/CBER
          message_type: ectd
          regulatory_reference: 21 CFR 314.81(b)(2) (NDA) / 21 CFR 601.70 (BLA)
          acknowledgment_expected: true
      check_annual:
        type: condition
        variable: report_type
        operator: eq
        value: annual_report
        true_next: annual_format
        false_next: check_field_alert
      check_report_type:
        type: condition
        variable: report_type
        operator: eq
        value: expedited_15day
        true_next: expedited_product_check
        false_next: check_periodic
      check_periodic:
        type: condition
        variable: report_type
        operator: eq
        value: periodic_psur
        true_next: periodic_format
        false_next: check_annual
      standard_expedited:
        type: return
        value:
          message_type: ichicsr
          regulatory_reference: 'FDA Guidance: Providing Submissions in Electronic Format - Postmarketing Safety Reports (2022); E2B(R3) Regional Implementation Guide (2024)'
          submission_gateway: FDA Electronic Submissions Gateway (ESG)
          required_format: E2B(R3) ICH ICSR XML
          acknowledgment_expected: true
      vaccine_expedited:
        type: return
        value:
          submission_gateway: FDA ESG for E2B(R3) + VAERS online portal
          required_format: E2B(R3) ICH ICSR XML + VAERS
          acknowledgment_expected: true
          regulatory_reference: FDA Guidance (2022); 21 CFR 600.80; VAERS reporting per National Childhood Vaccine Injury Act
          message_type: ichicsr
      vaccine_format:
        type: return
        value:
          submission_gateway: VAERS portal (vaers.hhs.gov) + FDA ESG
          acknowledgment_expected: true
          message_type: vaers
          required_format: VAERS online form + E2B(R3)
          regulatory_reference: National Childhood Vaccine Injury Act; 21 CFR 600.80
      expedited_product_check:
        type: condition
        variable: product_type
        operator: eq
        value: vaccine
        true_next: vaccine_expedited
        false_next: standard_expedited
      check_field_alert:
        type: condition
        variable: report_type
        operator: eq
        value: field_alert
        true_next: field_alert_format
        false_next: check_vaccine
      default_format:
        type: return
        value:
          submission_gateway: FDA Electronic Submissions Gateway (ESG)
          acknowledgment_expected: true
          regulatory_reference: 'FDA Guidance: Providing Submissions in Electronic Format - Postmarketing Safety Reports (2022)'
          message_type: ichicsr
          required_format: E2B(R3) ICH ICSR XML
      check_vaccine:
        type: condition
        variable: report_type
        operator: eq
        value: vaccine_ae
        true_next: vaccine_format
        false_next: default_format
      periodic_format:
        type: return
        value:
          regulatory_reference: 'FDA Guidance: Providing Postmarket Periodic Safety Reports in ICH E2C(R2) Format (2016)'
          submission_gateway: FDA ESG via eCTD submission
          required_format: eCTD Module 2.7.4 / E2C(R2) format
          acknowledgment_expected: true
          message_type: ectd
      field_alert_format:
        type: return
        value:
          regulatory_reference: 21 CFR 314.81(b)(1); FDA Guidance (2022)
          required_format: FDA Form 3331 + E2B(R3) if ICSR
          submission_gateway: FDA ESG or direct submission to district office
          message_type: field_alert
          acknowledgment_expected: false
antisense:
  tree:
    start: null_guard_negation
    nodes:
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_negation:
        type: condition
        variable: report_type
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: report_type
        operator: neq
        value: expedited_15day
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      acknowledgment_expected: true
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      acknowledgment_expected: true
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when:
      acknowledgment_expected: false
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: absent
      confidence: high
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      submission_format:
        type: string
        required: false
      report_type:
        type: string
        required: true
      product_type:
        type: string
        required: true
    outputs:
      acknowledgment_expected:
        type: bool
        required: false
      regulatory_reference:
        type: string
        required: false
      required_format:
        type: string
        required: false
      message_type:
        type: string
        required: false
      confidence:
        type: string
        required: false
      submission_gateway:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    report_type: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    report_type: __negated__
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - report_type
  - product_type
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
