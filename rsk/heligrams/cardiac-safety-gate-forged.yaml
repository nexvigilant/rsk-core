name: cardiac-safety-gate-helix
description: 'Forged from microgram ''cardiac-safety-gate''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    severity: falsified
sense:
  tree:
    start: check_reaction
    nodes:
      check_mi:
        type: condition
        variable: reaction_pt
        operator: contains
        value: MYOCARDIAL INFARCTION
        true_next: critical
        false_next: check_arrest
      serious:
        type: return
        value:
          severity: serious
          soc: Cardiac disorders
          regulatory_reference: ICH E14
          action: expedited_report
      check_failure:
        type: condition
        variable: reaction_pt
        operator: contains
        value: CARDIAC FAILURE
        true_next: serious
        false_next: check_qt
      check_qt:
        type: condition
        variable: qtc_prolongation_ms
        operator: gte
        value: 60
        true_next: serious
        false_next: check_qt_moderate
      check_qt_moderate:
        type: condition
        variable: qtc_prolongation_ms
        operator: gte
        value: 30
        true_next: moderate
        false_next: check_arrhythmia
      critical:
        type: return
        value:
          regulatory_reference: ICH E14
          action: immediate_expedited_report
          soc: Cardiac disorders
          severity: critical
      moderate:
        type: return
        value:
          regulatory_reference: ICH E14
          soc: Cardiac disorders
          severity: moderate
          action: monitor_and_assess
      check_arrest:
        type: condition
        variable: reaction_pt
        operator: contains
        value: CARDIAC ARREST
        true_next: critical
        false_next: check_failure
      check_arrhythmia:
        type: condition
        variable: reaction_pt
        operator: contains
        value: ARRHYTHMIA
        true_next: moderate
        false_next: mild
      check_reaction:
        type: condition
        variable: reaction_pt
        operator: contains
        value: TORSADE
        true_next: critical
        false_next: check_mi
      mild:
        type: return
        value:
          regulatory_reference: ICH E2B
          action: routine_surveillance
          severity: mild
          soc: Cardiac disorders
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: reaction_pt
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: reaction_pt
        operator: not_contains
        value: TORSADE
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      reaction_pt:
        type: string
        required: true
      qtc_prolongation_ms:
        type: float
        required: false
    outputs:
      confidence:
        type: string
        required: false
      soc:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      action:
        type: string
        required: false
      regulatory_reference:
        type: string
        required: false
      severity:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    reaction_pt: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
