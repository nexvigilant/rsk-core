name: candidate-urgency-score-helix
description: 'Forged from microgram ''candidate-urgency-score''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    action: falsified
sense:
  tree:
    start: check_source_present
    nodes:
      check_carry_forward:
        type: condition
        variable: source
        operator: eq
        value: carry-forward
        true_next: score_carry_forward
        false_next: check_autopsy
      reject:
        type: return
        value:
          action: Missing source or urgency
          priority: REJECTED
          composite: 0.0
      check_conservation:
        type: condition
        variable: source
        operator: eq
        value: conservation
        true_next: score_conservation
        false_next: score_default
      check_autopsy:
        type: condition
        variable: source
        operator: eq
        value: autopsy
        true_next: score_autopsy
        false_next: check_todo
      check_source_present:
        type: condition
        variable: source
        operator: is_null
        value: null
        true_next: reject
        false_next: check_urgency_present
      score_git:
        type: return
        value:
          action: Uncommitted work — commit or stash
          priority: MEDIUM
          composite: 0.5
      check_urgency_present:
        type: condition
        variable: urgency
        operator: is_null
        value: null
        true_next: reject
        false_next: check_verdict_loop
      check_verdict_loop:
        type: condition
        variable: source
        operator: eq
        value: verdict-loop
        true_next: score_verdict_loop
        false_next: check_carry_forward
      check_todo:
        type: condition
        variable: source
        operator: eq
        value: todo
        true_next: score_todo
        false_next: check_git
      score_default:
        type: return
        value:
          composite: 0.35
          priority: LOW
          action: Background task — address when queue is clear
      score_autopsy:
        type: return
        value:
          composite: 0.7
          priority: MEDIUM
          action: Prior failure — diagnose root cause before retry
      check_git:
        type: condition
        variable: source
        operator: eq
        value: git
        true_next: score_git
        false_next: check_conservation
      score_carry_forward:
        type: return
        value:
          priority: HIGH
          action: Unfinished chain — complete for permanence
          composite: 0.78
      score_conservation:
        type: return
        value:
          priority: LOW
          action: Conservation gap — improve sigma measurement
          composite: 0.4
      score_todo:
        type: return
        value:
          composite: 0.55
          action: TODO item — check scope before starting
          priority: MEDIUM
      score_verdict_loop:
        type: return
        value:
          action: Last session failed — retry with adjusted approach
          priority: HIGH
          composite: 0.85
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: source
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: source
        operator: is_not_null
        value: null
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      source:
        type: string
        required: true
      urgency:
        type: float
        required: true
    outputs:
      priority:
        type: string
        required: false
      composite:
        type: float
        required: false
      action:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    source: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - source
  - urgency
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
