name: endocrine-disruption-classifier-helix
description: 'Forged from microgram ''endocrine-disruption-classifier''. Domain: WorkflowRouting. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 5
  base_pairs:
    action: falsified
sense:
  tree:
    start: check_adrenal_crisis
    nodes:
      check_adrenal_insuff:
        type: condition
        variable: reaction_pt
        operator: contains
        value: ADRENAL INSUFFICIENCY
        true_next: serious
        false_next: check_hypothyroidism
      moderate:
        type: return
        value:
          action: monitor_and_assess
          soc: Endocrine disorders
          severity: moderate
      mild:
        type: return
        value:
          action: routine_surveillance
          soc: Endocrine disorders
          severity: mild
      check_thyroid_storm:
        type: condition
        variable: reaction_pt
        operator: contains
        value: THYROID STORM
        true_next: critical
        false_next: check_adrenal_insuff
      check_adrenal_crisis:
        type: condition
        variable: reaction_pt
        operator: contains
        value: ADRENAL CRISIS
        true_next: critical
        false_next: check_dka
      critical:
        type: return
        value:
          soc: Endocrine disorders
          action: immediate_expedited_report
          severity: critical
      check_hypothyroidism:
        type: condition
        variable: reaction_pt
        operator: contains
        value: HYPOTHYROIDISM
        true_next: moderate
        false_next: check_hyperglycaemia
      serious:
        type: return
        value:
          severity: serious
          soc: Endocrine disorders
          action: expedited_report
      check_dka:
        type: condition
        variable: reaction_pt
        operator: contains
        value: DIABETIC KETOACIDOSIS
        true_next: critical
        false_next: check_thyroid_storm
      check_hyperglycaemia:
        type: condition
        variable: reaction_pt
        operator: contains
        value: HYPERGLYCAEMIA
        true_next: moderate
        false_next: mild
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: reaction_pt
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: reaction_pt
        operator: not_contains
        value: ADRENAL CRISIS
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      reaction_pt:
        type: string
        required: true
    outputs:
      severity:
        type: string
        required: false
      soc:
        type: string
        required: false
      action:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    reaction_pt: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — workflow-routing with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: workflow-routing. Chains as dual-strand verifier before downstream consumers.'
