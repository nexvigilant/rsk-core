name: gate-prr-signal-helix
description: 'Forged from microgram ''gate-prr-signal''. Domain: SignalDetection. 4 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    met: falsified
sense:
  tree:
    start: check
    nodes:
      fail:
        type: return
        value:
          met: false
          threshold: prr
          gate: false
      pass:
        type: return
        value:
          gate: true
          threshold: prr
          met: true
      check:
        type: condition
        variable: prr
        operator: gte
        value: 2.0
        true_next: pass
        false_next: fail
antisense:
  tree:
    start: null_guard_insufficient_n
    nodes:
      check_weber_effect:
        type: condition
        variable: years_on_market
        operator: gt
        value: 5
        true_next: falsified
        false_next: null_guard_channeling_bias
      check_notoriety_bias:
        type: condition
        variable: notoriety_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: null_guard_weber_effect
      check_channeling_bias:
        type: condition
        variable: channeling_bias
        operator: eq
        value: true
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_insufficient_n:
        type: condition
        variable: case_count
        operator: lt
        value: 3
        true_next: falsified
        false_next: null_guard_notoriety_bias
      null_guard_insufficient_n:
        type: condition
        variable: case_count
        operator: is_null
        value: null
        true_next: null_guard_notoriety_bias
        false_next: check_insufficient_n
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      null_guard_weber_effect:
        type: condition
        variable: years_on_market
        operator: is_null
        value: null
        true_next: null_guard_channeling_bias
        false_next: check_weber_effect
      null_guard_channeling_bias:
        type: condition
        variable: channeling_bias
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_channeling_bias
      null_guard_notoriety_bias:
        type: condition
        variable: notoriety_bias
        operator: is_null
        value: null
        true_next: null_guard_weber_effect
        false_next: check_notoriety_bias
resolution:
  mode: base_pair
  rules:
  - when:
      met: true
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7000000000000001
  - when:
      falsified: true
      met: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.28
      confidence: low
  - when:
      falsified: false
      met: false
    default: null
    emit:
      confidence_score: 0.7000000000000001
      verdict: absent
      confidence: high
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      case_count:
        type: integer
        required: false
      notoriety_bias:
        type: bool
        required: false
      years_on_market:
        type: integer
        required: false
      channeling_bias:
        type: bool
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    years_on_market: 0
    notoriety_bias: false
    case_count: 13
    prr: 2.0
    channeling_bias: false
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, insufficient_n active'
  input:
    case_count: 2
    prr: 2.0
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — signal-detection with 4 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: signal-detection. Chains as dual-strand verifier before downstream consumers.'
