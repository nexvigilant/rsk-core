name: station-entropy-pipeline-helix
description: 'Forged from microgram ''station-entropy-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    reason: falsified
sense:
  tree:
    start: check_entropy
    nodes:
      normal:
        type: return
        value:
          reason: Normal entropy range — expected information content
          priority: low
          route: archive
          action: pass
      check_entropy:
        type: condition
        variable: entropy_bits
        operator: gte
        value: 3.0
        true_next: high_entropy
        false_next: check_low
      low_entropy:
        type: return
        value:
          action: flag
          route: bias_check
          reason: Very low entropy (≤0.5 bits) — near-deterministic, possible reporting bias
          priority: high
      high_entropy:
        type: return
        value:
          reason: High entropy (≥3 bits) — significant disorder/diversity in distribution
          route: distribution_analysis
          action: investigate
          priority: moderate
      check_low:
        type: condition
        variable: entropy_bits
        operator: lte
        value: 0.5
        true_next: low_entropy
        false_next: normal
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: entropy_bits
        operator: lt
        value: 3.0
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: entropy_bits
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      verdict: contested
      confidence: low
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      entropy_bits:
        type: float
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    entropy_bits: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
