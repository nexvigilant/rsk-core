name: ab-hormone-out-of-range-helix
description: 'Forged from microgram ''ab-hormone-out-of-range''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    threat: falsified
sense:
  tree:
    start: check_high
    nodes:
      clean:
        type: return
        value:
          response: PASS
          threat: false
      violation_high:
        type: return
        value:
          threat: true
          response: 'BLOCK: hormone level > 1.0 — clamp to 1.0'
      check_low:
        type: condition
        variable: hormone_level
        operator: lt
        value: 0
        true_next: violation_low
        false_next: clean
      check_high:
        type: condition
        variable: hormone_level
        operator: gt
        value: 1.0
        true_next: violation_high
        false_next: check_low
      violation_low:
        type: return
        value:
          threat: true
          response: 'BLOCK: hormone level < 0 — clamp to 0.0'
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: hormone_level
        operator: lte
        value: 1.0
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: hormone_level
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      threat: true
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      threat: true
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when:
      falsified: false
      threat: false
    default: null
    emit:
      confidence: high
      verdict: absent
      confidence_score: 0.7
  - when:
      falsified: true
      threat: false
    default: null
    emit:
      confidence_score: 0.42
      verdict: refuted
      confidence: medium
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      hormone_level:
        type: number
        required: true
    outputs:
      threat:
        type: boolean
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      response:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: absent — null sense, no confounders'
  input:
    hormone_level: null
  expect:
    verdict: absent
    confidence: high
- name: 'Q2: confirmed — positive sense, negation inactive (mutually exclusive)'
  input:
    hormone_level: 1.5
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
