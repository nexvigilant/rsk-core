name: fsm-snapshot-gate-helix
description: 'Forged from microgram ''fsm-snapshot-gate''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    decision: falsified
sense:
  tree:
    start: check_state_changed
    nodes:
      check_time_elapsed:
        type: condition
        variable: minutes_since_last_snapshot
        operator: gte
        value: 60
        true_next: snapshot
        false_next: skip
      check_state_changed:
        type: condition
        variable: state_changed
        operator: eq
        value: true
        true_next: snapshot
        false_next: check_time_elapsed
      snapshot:
        type: return
        value:
          decision: SNAPSHOT
          description: State changed or 60+ minutes elapsed - create FSM snapshot
      skip:
        type: return
        value:
          decision: SKIP
          description: State unchanged and snapshot recent - skip redundant snapshot
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: minutes_since_last_snapshot
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_negation:
        type: condition
        variable: minutes_since_last_snapshot
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      minutes_since_last_snapshot:
        type: int
        required: false
      state_changed:
        type: bool
        required: false
    outputs:
      confidence:
        type: string
        required: false
      description:
        type: string
        required: false
      decision:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    minutes_since_last_snapshot: null
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    minutes_since_last_snapshot: false
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
