name: case-archival-gate-helix
description: 'Forged from microgram ''case-archival-gate''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    archival_compliant: falsified
sense:
  tree:
    start: validate_case_closure
    nodes:
      check_retention_period:
        type: condition
        variable: years_since_report
        operator: gte
        value: 2
        true_next: check_documentation
        false_next: not_ready_for_archival
      ready_for_archival:
        type: return
        value:
          accessibility_level: retrievable_upon_request
          archival_status: approved_for_archival
          archival_compliant: true
          retention_years: 10
      check_documentation:
        type: condition
        variable: complete_case_file
        operator: eq
        value: true
        true_next: ready_for_archival
        false_next: incomplete_documentation
      not_ready_for_archival:
        type: return
        value:
          archival_status: pending
          accessibility_level: active_file
          archival_compliant: true
          retention_years: null
      validate_case_closure:
        type: condition
        variable: case_processing_complete
        operator: eq
        value: true
        true_next: check_retention_period
        false_next: not_ready_for_archival
      incomplete_documentation:
        type: return
        value:
          archival_compliant: false
          archival_status: deferred
          accessibility_level: active_file
          retention_years: null
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
      check_negation:
        type: condition
        variable: years_since_report
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: years_since_report
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      archival_compliant: true
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      archival_compliant: true
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when:
      archival_compliant: false
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: absent
      confidence: high
  - when: null
    default:
      confidence: medium
      verdict: indeterminate
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      years_since_report:
        type: bool
        required: false
    outputs:
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    years_since_report: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    years_since_report: false
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
