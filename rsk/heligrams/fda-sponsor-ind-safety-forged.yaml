name: fda-sponsor-ind-safety-helix
description: 'Forged from microgram ''fda-sponsor-ind-safety''. Domain: SeriousnessClassification. 3 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 2
  base_pairs:
    reporting_required: falsified
sense:
  tree:
    start: check_sar
    nodes:
      check_sar:
        type: condition
        variable: suspected_adverse_reaction
        operator: eq
        value: true
        true_next: sar_serious_check
        false_next: not_sar
      serious_unexpected_check:
        type: condition
        variable: unexpected
        operator: eq
        value: true
        true_next: susar_fatal_check
        false_next: serious_expected
      susar_15day:
        type: return
        value:
          reporting_required: true
          timeline_days: 15
          notification_recipients: FDA + all participating investigators + IRBs
          regulatory_reference: '21 CFR 312.32(c)(1); FDA Guidance: Sponsor Responsibilities (2025), Section IV.B'
          report_type: IND_SAFETY_15DAY
      not_sar:
        type: return
        value:
          regulatory_reference: 21 CFR 312.32(c) - only suspected adverse reactions require IND safety reports
          reporting_required: false
          report_type: NONE
          timeline_days: 0
          notification_recipients: N/A
      serious_expected:
        type: return
        value:
          report_type: ANNUAL_REPORT
          notification_recipients: Include in IND Annual Report; update IB if frequency changes
          regulatory_reference: 21 CFR 312.32(c) - serious expected SARs reported in annual report; FDA Guidance (2025), Section III.B
          timeline_days: 365
          reporting_required: false
      susar_ba_be_exempt:
        type: return
        value:
          report_type: BA_BE_EXEMPT_SAFETY
          notification_recipients: FDA via ESG electronic submission
          reporting_required: true
          timeline_days: 15
          regulatory_reference: 'FDA Guidance: Electronic Submission of Expedited Safety Reports From IND-Exempt BA/BE Studies (2024)'
      nonserious_sar:
        type: return
        value:
          timeline_days: 365
          notification_recipients: Include in IND Annual Report (21 CFR 312.33)
          report_type: ANNUAL_REPORT
          reporting_required: false
          regulatory_reference: '21 CFR 312.33; FDA Guidance: Sponsor Responsibilities (2025), Section III.A'
      susar_study_type_check:
        type: condition
        variable: study_type
        operator: eq
        value: ba_be_ind_exempt
        true_next: susar_ba_be_exempt
        false_next: susar_15day
      sar_serious_check:
        type: condition
        variable: serious
        operator: eq
        value: true
        true_next: serious_unexpected_check
        false_next: nonserious_sar
      susar_fatal_check:
        type: condition
        variable: fatal_or_life_threatening
        operator: eq
        value: true
        true_next: susar_7day
        false_next: susar_study_type_check
      susar_7day:
        type: return
        value:
          regulatory_reference: '21 CFR 312.32(c)(2); FDA Guidance: Sponsor Responsibilities (2025), Section IV.A'
          reporting_required: true
          report_type: IND_SAFETY_7DAY
          notification_recipients: FDA + all participating investigators + IRBs
          timeline_days: 7
antisense:
  tree:
    start: check_incomplete_info
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      check_coding_error:
        type: condition
        variable: coding_verified
        operator: eq
        value: false
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_incomplete_info:
        type: condition
        variable: follow_up_complete
        operator: eq
        value: false
        true_next: falsified
        false_next: check_comorbidity_confound
      check_comorbidity_confound:
        type: condition
        variable: comorbidity_explains
        operator: eq
        value: true
        true_next: falsified
        false_next: check_coding_error
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
      reporting_required: true
    default: null
    emit:
      confidence: high
      confidence_score: 0.7
      verdict: confirmed
  - when:
      falsified: true
      reporting_required: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when:
      reporting_required: false
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: absent
      confidence: high
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      suspected_adverse_reaction:
        type: bool
        required: true
      comorbidity_explains:
        type: bool
        required: false
      study_type:
        type: string
        required: false
      coding_verified:
        type: bool
        required: false
      serious:
        type: bool
        required: true
      unexpected:
        type: bool
        required: true
      fatal_or_life_threatening:
        type: bool
        required: false
      follow_up_complete:
        type: bool
        required: false
    outputs:
      timeline_days:
        type: int
        required: false
      confidence:
        type: string
        required: false
      report_type:
        type: string
        required: false
      verdict:
        type: string
        required: false
      reporting_required:
        type: bool
        required: false
      notification_recipients:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      regulatory_reference:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    study_type: ind
    unexpected: true
    coding_verified: true
    follow_up_complete: true
    fatal_or_life_threatening: true
    suspected_adverse_reaction: true
    serious: true
    comorbidity_explains: false
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, incomplete_info active'
  input:
    study_type: ind
    unexpected: true
    suspected_adverse_reaction: true
    serious: true
    follow_up_complete: false
    fatal_or_life_threatening: true
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: absent
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — seriousness-classification with 3 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments:
  - suspected_adverse_reaction
  - serious
  - unexpected
  - fatal_or_life_threatening
  chain_prediction: 'Forged heligram. Domain: seriousness-classification. Chains as dual-strand verifier before downstream consumers.'
