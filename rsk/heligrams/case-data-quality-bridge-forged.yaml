name: case-data-quality-bridge-helix
description: 'Forged from microgram ''case-data-quality-bridge''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    meets_minimum: falsified
sense:
  tree:
    start: check_enrichment
    nodes:
      check_rare_complete:
        type: condition
        variable: cioms_category
        operator: eq
        value: RARE
        true_next: complete_rare
        false_next: complete_standard
      check_cioms_enrichment:
        type: condition
        variable: cioms_category
        operator: eq
        value: VERY_COMMON
        true_next: enrichment_high_frequency
        false_next: check_cioms_common_enrichment
      complete_standard:
        type: return
        value:
          quality_tier: HIGH
          completeness_pct: 87
          meets_minimum: true
          quality_assessment: Complete data — standard quality tier
      complete_moderate_frequency:
        type: return
        value:
          quality_assessment: Complete data for common event — high quality case
          quality_tier: HIGH
          meets_minimum: true
          completeness_pct: 87
      check_enrichment:
        type: condition
        variable: needs_enrichment
        operator: eq
        value: true
        true_next: check_cioms_enrichment
        false_next: check_cioms_complete
      check_cioms_common_enrichment:
        type: condition
        variable: cioms_category
        operator: eq
        value: COMMON
        true_next: enrichment_moderate_frequency
        false_next: enrichment_low_frequency
      enrichment_low_frequency:
        type: return
        value:
          meets_minimum: true
          completeness_pct: 50
          quality_tier: MINIMUM
          quality_assessment: Incomplete data for rare event — every case matters, request enrichment
      enrichment_moderate_frequency:
        type: return
        value:
          quality_tier: MINIMUM
          quality_assessment: Data needs enrichment for common-frequency event — standard follow-up
          completeness_pct: 50
          meets_minimum: true
      enrichment_high_frequency:
        type: return
        value:
          quality_tier: GOOD
          quality_assessment: Data incomplete but high-frequency event — prioritize enrichment
          meets_minimum: true
          completeness_pct: 75
      check_cioms_common_complete:
        type: condition
        variable: cioms_category
        operator: eq
        value: COMMON
        true_next: complete_moderate_frequency
        false_next: check_rare_complete
      complete_rare:
        type: return
        value:
          quality_tier: EXCELLENT
          completeness_pct: 100
          quality_assessment: Complete data for rare event — high-value case for signal detection
          meets_minimum: true
      complete_high_frequency:
        type: return
        value:
          quality_tier: EXCELLENT
          meets_minimum: true
          quality_assessment: Complete data for very common event — ready for automated processing
          completeness_pct: 100
      check_cioms_complete:
        type: condition
        variable: cioms_category
        operator: eq
        value: VERY_COMMON
        true_next: complete_high_frequency
        false_next: check_cioms_common_complete
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: cioms_category
        operator: neq
        value: true
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: cioms_category
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      meets_minimum: true
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      meets_minimum: true
      falsified: true
    default: null
    emit:
      confidence: low
      confidence_score: 0.27999999999999997
      verdict: contested
  - when:
      meets_minimum: false
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: absent
      confidence: high
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      needs_enrichment:
        type: bool
        required: true
      cioms_category:
        type: string
        required: false
    outputs:
      verdict:
        type: string
        required: false
      meets_minimum:
        type: bool
        required: true
      confidence_score:
        type: float
        required: false
      quality_assessment:
        type: string
        required: true
      confidence:
        type: string
        required: false
      quality_tier:
        type: string
        required: true
      completeness_pct:
        type: int
        required: true
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    cioms_category: null
    needs_enrichment: true
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    cioms_category: false
    needs_enrichment: true
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
