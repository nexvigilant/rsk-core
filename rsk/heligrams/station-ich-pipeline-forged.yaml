name: station-ich-pipeline-helix
description: 'Forged from microgram ''station-ich-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    reason: falsified
sense:
  tree:
    start: check_topic
    nodes:
      check_topic:
        type: condition
        variable: guideline_prefix
        operator: eq
        value: E
        true_next: efficacy_route
        false_next: check_quality
      efficacy_route:
        type: condition
        variable: pv_relevant
        operator: eq
        value: true
        true_next: pv_guideline
        false_next: clinical_guideline
      pv_guideline:
        type: return
        value:
          reason: ICH E-series PV guideline — directly applicable to signal management
          route: compliance_check
          action: apply
          priority: high
      clinical_guideline:
        type: return
        value:
          route: archive
          reason: ICH E-series clinical guideline — reference for trial safety context
          priority: low
          action: reference
      check_quality:
        type: condition
        variable: guideline_prefix
        operator: eq
        value: Q
        true_next: quality_route
        false_next: safety_route
      quality_route:
        type: return
        value:
          reason: ICH Q-series quality guideline — CMC/manufacturing context
          route: archive
          action: reference
          priority: low
      safety_route:
        type: return
        value:
          route: compliance_check
          action: apply
          reason: ICH S/M-series — nonclinical safety or multidisciplinary, check PV implications
          priority: moderate
antisense:
  tree:
    start: null_guard_negation
    nodes:
      null_guard_negation:
        type: condition
        variable: guideline_prefix
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_negation:
        type: condition
        variable: guideline_prefix
        operator: neq
        value: E
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      confidence: high
      verdict: confirmed
  - when:
      falsified: true
    default: null
    emit:
      confidence: low
      verdict: contested
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence_score: 0.5
      verdict: indeterminate
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      guideline_prefix:
        type: string
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    guideline_prefix: null
    pv_relevant: true
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, negation active'
  input:
    guideline_prefix: __negated__
    pv_relevant: true
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
