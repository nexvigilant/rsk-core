name: workflow-literature-review-helix
description: 'Forged from microgram ''workflow-literature-review''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    chain: falsified
sense:
  tree:
    start: check_type
    nodes:
      check_type:
        type: condition
        variable: question_type
        operator: eq
        value: case_report
        true_next: case_chain
        false_next: check_systematic
      check_systematic:
        type: condition
        variable: question_type
        operator: eq
        value: systematic
        true_next: systematic_chain
        false_next: exploratory_chain
      case_chain:
        type: return
        value:
          chain: pubmed → meddra → who-umc
          query_type: case_report
          strategy: case_report_mining
      exploratory_chain:
        type: return
        value:
          query_type: broad
          strategy: exploratory_search
          chain: pubmed → wikipedia → drugbank
      systematic_chain:
        type: return
        value:
          strategy: systematic_review
          chain: pubmed → clinicaltrials → epidemiology → ich
          query_type: review
antisense:
  tree:
    start: null_guard_negation
    nodes:
      check_negation:
        type: condition
        variable: question_type
        operator: neq
        value: case_report
        true_next: falsified
        false_next: not_falsified
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      null_guard_negation:
        type: condition
        variable: question_type
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence: high
      verdict: confirmed
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when: null
    default:
      confidence_score: 0.5
      confidence: medium
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      question_type:
        type: string
        required: false
    outputs:
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    question_type: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    question_type: __negated__
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
