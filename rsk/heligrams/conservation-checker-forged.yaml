name: conservation-checker-helix
description: 'Forged from microgram ''conservation-checker''. Domain: SystemHealth. 2 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    missing_terms: falsified
sense:
  tree:
    start: check_existence
    nodes:
      missing_existence:
        type: return
        value:
          missing_terms: ∃ (Existence)
          recommendation: Add an existence-producing primitive. Without ∃, ∂(×(ς, ∅)) has no output.
          conservation_status: VIOLATED
          verdict: Conservation law violated — no existence term. The composition produces nothing.
          completeness: incomplete
      check_void:
        type: condition
        variable: has_void
        operator: eq
        value: true
        true_next: check_tier
        false_next: missing_void
      check_existence:
        type: condition
        variable: has_existence
        operator: eq
        value: true
        true_next: check_boundary
        false_next: missing_existence
      missing_boundary:
        type: return
        value:
          completeness: incomplete
          conservation_status: VIOLATED
          verdict: Conservation law violated — no boundary. The composition has no identity function.
          missing_terms: ∂ (Boundary)
          recommendation: Add a boundary primitive. ∂ is the function that creates identity from ×(ς, ∅).
      check_boundary:
        type: condition
        variable: has_boundary
        operator: eq
        value: true
        true_next: check_state
        false_next: missing_boundary
      missing_void:
        type: return
        value:
          recommendation: Add a void primitive. ×(ς, ∅) requires ∅ as the absence that defines presence.
          completeness: incomplete
          missing_terms: ∅ (Void)
          conservation_status: VIOLATED
          verdict: Conservation law violated — no void. Without ∅, state has no contrast.
      check_tier:
        type: condition
        variable: primitive_count
        operator: gte
        value: 8
        true_next: full_conservation
        false_next: minimal_conservation
      full_conservation:
        type: return
        value:
          conservation_status: CONSERVED
          recommendation: Composition is conservation-complete and expressively rich. Ready for deployment.
          missing_terms: none
          verdict: Conservation law satisfied with rich composition. All four terms present with 8+ primitives.
          completeness: rich
      check_state:
        type: condition
        variable: has_state
        operator: eq
        value: true
        true_next: check_void
        false_next: missing_state
      minimal_conservation:
        type: return
        value:
          conservation_status: CONSERVED
          missing_terms: none
          verdict: Conservation law satisfied. All four terms present.
          recommendation: Composition conserves identity. Consider adding more primitives for expressive power.
          completeness: minimal
      missing_state:
        type: return
        value:
          verdict: Conservation law violated — no state. Nothing changes, so nothing can exist.
          conservation_status: VIOLATED
          missing_terms: ς (State)
          recommendation: Add a state primitive. ×(ς, ∅) requires ς as the variable that ∂ fixes.
          completeness: incomplete
antisense:
  tree:
    start: check_measurement_stale
    nodes:
      check_measurement_stale:
        type: condition
        variable: measurement_age_minutes
        operator: gt
        value: 60
        true_next: falsified
        false_next: check_single_source
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
      check_single_source:
        type: condition
        variable: probe_count
        operator: lt
        value: 2
        true_next: falsified
        false_next: not_falsified
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      confidence_score: 0.7
      verdict: confirmed
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      confidence_score: 0.27999999999999997
      confidence: low
      verdict: contested
  - when: null
    default:
      verdict: indeterminate
      confidence_score: 0.5
      confidence: medium
    emit: null
interface:
  major_groove:
    inputs:
      measurement_age_minutes:
        type: integer
        required: false
      composition_tier:
        type: string
        required: false
      primitive_count:
        type: int
        required: false
      has_boundary:
        type: bool
        required: true
      has_void:
        type: bool
        required: true
      has_state:
        type: bool
        required: true
      probe_count:
        type: integer
        required: false
      has_existence:
        type: bool
        required: true
    outputs:
      confidence:
        type: string
        required: false
      conservation_status:
        type: string
        required: false
      completeness:
        type: string
        required: false
      verdict:
        type: string
        required: false
      missing_terms:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
      recommendation:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    probe_count: 12
    primitive_count: 10
    has_void: true
    has_boundary: true
    has_existence: true
    measurement_age_minutes: 50
    has_state: true
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q2: contested — positive sense, measurement_stale active'
  input:
    primitive_count: 10
    has_void: true
    has_boundary: true
    has_existence: true
    measurement_age_minutes: 61
    has_state: true
  expect:
    verdict: contested
    confidence: low
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — system-health with 2 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: system-health. Chains as dual-strand verifier before downstream consumers.'
