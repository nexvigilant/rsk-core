name: station-science-drug-targets-pipeline-helix
description: 'Forged from microgram ''station-science-drug-targets-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    route: falsified
sense:
  tree:
    start: check_druggable
    nodes:
      check_druggable:
        type: condition
        variable: druggability_score
        operator: gte
        value: 0.7
        true_next: druggable
        false_next: check_novel
      druggable:
        type: return
        value:
          route: target_development
          action: prioritize
          reason: Druggability ≥0.7 — viable target for drug development
          priority: high
      check_novel:
        type: condition
        variable: is_novel_target
        operator: eq
        value: true
        true_next: novel
        false_next: undruggable
      novel:
        type: return
        value:
          action: research
          priority: moderate
          route: target_research
          reason: Novel target, low druggability — needs structural biology work
      undruggable:
        type: return
        value:
          reason: Known undruggable target — deprioritize
          route: archive
          priority: low
          action: archive
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          falsified: true
          confounder_count: 1
      check_negation:
        type: condition
        variable: druggability_score
        operator: lt
        value: 0.7
        true_next: falsified
        false_next: not_falsified
      null_guard_negation:
        type: condition
        variable: druggability_score
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      not_falsified:
        type: return
        value:
          confounder_count: 0
          falsified: false
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence: high
      confidence_score: 0.7
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence_score: 0.27999999999999997
      confidence: low
  - when: null
    default:
      verdict: indeterminate
      confidence: medium
      confidence_score: 0.5
    emit: null
interface:
  major_groove:
    inputs:
      druggability_score:
        type: float
        required: false
    outputs:
      confidence_score:
        type: float
        required: false
      verdict:
        type: string
        required: false
      confidence:
        type: string
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — null sense, no confounders'
  input:
    druggability_score: null
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: confirmed — positive sense, negation inactive'
  input: {}
  expect:
    verdict: confirmed
    confidence: high
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
