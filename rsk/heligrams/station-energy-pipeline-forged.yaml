name: station-energy-pipeline-helix
description: 'Forged from microgram ''station-energy-pipeline''. Domain: Generic. 1 confounders. Confidence-weighted resolution.'
version: 0.1.0
type: heligram
helix:
  twist_rate: 3
  base_pairs:
    route: falsified
sense:
  tree:
    start: check_charge
    nodes:
      high_charge:
        type: return
        value:
          route: archive
          reason: Energy charge ≥70% — full capacity for complex work
          action: proceed
          priority: low
      check_low:
        type: condition
        variable: energy_charge_pct
        operator: lte
        value: 20
        true_next: depleted
        false_next: moderate
      moderate:
        type: return
        value:
          priority: moderate
          action: budget
          reason: Energy 20-70% — allocate tokens deliberately
          route: energy_budgeting
      depleted:
        type: return
        value:
          reason: Energy ≤20% — compress output, skip optional phases
          priority: critical
          action: conserve
          route: energy_conservation
      check_charge:
        type: condition
        variable: energy_charge_pct
        operator: gte
        value: 70
        true_next: high_charge
        false_next: check_low
antisense:
  tree:
    start: null_guard_negation
    nodes:
      falsified:
        type: return
        value:
          confounder_count: 1
          falsified: true
      null_guard_negation:
        type: condition
        variable: energy_charge_pct
        operator: is_null
        value: null
        true_next: not_falsified
        false_next: check_negation
      check_negation:
        type: condition
        variable: energy_charge_pct
        operator: lt
        value: 70
        true_next: falsified
        false_next: not_falsified
      not_falsified:
        type: return
        value:
          falsified: false
          confounder_count: 0
resolution:
  mode: base_pair
  rules:
  - when:
      falsified: false
    default: null
    emit:
      verdict: confirmed
      confidence_score: 0.7
      confidence: high
  - when:
      falsified: true
    default: null
    emit:
      verdict: contested
      confidence: low
      confidence_score: 0.27999999999999997
  - when: null
    default:
      confidence: medium
      confidence_score: 0.5
      verdict: indeterminate
    emit: null
interface:
  major_groove:
    inputs:
      energy_charge_pct:
        type: integer
        required: false
    outputs:
      confidence:
        type: string
        required: false
      verdict:
        type: string
        required: false
      confidence_score:
        type: float
        required: false
    aliases: {}
  minor_groove: null
tests:
- name: 'Q1: confirmed — positive sense, no confounders'
  input:
    energy_charge_pct: 80
  expect:
    confidence: high
    verdict: confirmed
- name: 'Q2: contested — positive sense, negation active'
  input:
    energy_charge_pct: 69
  expect:
    confidence: low
    verdict: contested
- name: 'Q3: default — empty input, no confounders'
  input: {}
  expect:
    verdict: confirmed
- name: 'Q4: null safety — graceful degradation'
  input: {}
  expect:
    confidence: high
primitive_signature:
  dominant: ∂
  expression: ∂(×(κ_sense, →_antisense)) — generic with 1 confounders
  primes:
  - ∂
  - κ
  - →
  - ς
  - ×
  arguments: []
  chain_prediction: 'Forged heligram. Domain: generic. Chains as dual-strand verifier before downstream consumers.'
