name: compliance-gate
description: 'Governed compliance assessment loop: runs case-seriousness → seriousness-to-deadline → reporting-compliance, then loop-governor decides whether accumulated evidence warrants HALT or CONTINUE. Models the regulatory decision loop where incomplete evidence triggers re-assessment.'
version: 0.1.0
micrograms_dir: ../micrograms

steps:
  - case-seriousness
  - seriousness-to-deadline
  - reporting-compliance

governor: loop-governor
max_iterations: 4
detect_convergence: true
accumulate: true
trajectory: true

primitive_signature:
  dominant: 'ρ'
  expression: 'ρ(∂(seriousness) → N(deadline) → κ(compliance)) at ∂(governor) — looped compliance check with governor boundary'
  primes: ['ρ', '∂', 'N', 'κ', '→']
  arguments: ['event_outcome', 'requires_hospitalization', 'is_fatal', 'days_since_event', 'report_submitted']
  chain_prediction: 'π(ρ(...)) → compliance audit trail with governor-controlled iteration'

tests:
# Test 1: Fatal event, report submitted → compliant, converges
- name: fatal event compliant converges
  input:
    event_outcome: fatal
    requires_hospitalization: true
    is_fatal: true
    days_since_event: 3
    report_submitted: true
    scale: chain
    session_levels: "5,5,4,5"
  expect:
    seriousness: serious
    compliance_status: compliant
  expect_halt: Convergence

# Test 2: Hospitalization, no report → non-compliant, converges
- name: hospitalization non-compliant converges
  input:
    event_outcome: hospitalization
    requires_hospitalization: true
    is_fatal: false
    days_since_event: 20
    report_submitted: false
    scale: chain
    session_levels: "4,4,3,4"
  expect:
    seriousness: serious
    compliance_status: non_compliant
  expect_halt: Convergence

# Test 3: Non-serious event → no deadline pressure, converges
- name: non-serious event converges
  input:
    event_outcome: mild_rash
    requires_hospitalization: false
    is_fatal: false
    days_since_event: 45
    report_submitted: true
    scale: chain
    session_levels: "4,3,4,4"
  expect:
    compliance_status: compliant
  expect_halt: Convergence
