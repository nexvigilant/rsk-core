name: full-compliance
description: 'Governed full compliance pipeline: ICSR validation → case assessment → seriousness transform → expectedness → expectedness transform → expedited reporting → Guardian bridge → evidence mapping. Governor controls loop depth for iterative compliance assessment. Longest chain as governed process.'
version: 0.1.0
micrograms_dir: ../micrograms

steps:
  - e2a-minimum-criteria
  - case-seriousness
  - transform-seriousness-to-bool
  - expectedness-check
  - transform-expectedness-to-bool
  - expedited-reporting
  - guardian-signal-bridge
  - compliance-evidence-mapper

governor: loop-governor
max_iterations: 3
detect_convergence: true
accumulate: true
trajectory: true

primitive_signature:
  dominant: 'ρ'
  expression: 'ρ(∃(ICSR) → ∂(seriousness) → κ(expectedness) → N(timeline) → π(guardian) → π(evidence)) at ∂(governor)'
  primes: ['ρ', '∃', '∂', 'κ', 'N', 'π', '→']
  arguments: ['identifiable_reporter', 'identifiable_patient', 'suspected_drug', 'adverse_event', 'death', 'hospitalization', 'disability', 'life_threatening', 'congenital_anomaly', 'medically_important', 'event_in_label', 'study_type']

tests:
# Serious unexpected fatal premarket
- name: fatal premarket converges
  input:
    identifiable_reporter: true
    identifiable_patient: true
    suspected_drug: true
    adverse_event: true
    death: true
    hospitalization: false
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: false
    event_class_in_label: false
    study_type: premarket
    scale: chain
    session_levels: "5,5,4,5"
  expect:
    valid_icsr: true
    serious: true
    fatal: true
    timeline: 7_CALENDAR_DAYS
  expect_halt: Convergence

# Non-serious expected postmarket
- name: non-serious expected converges
  input:
    identifiable_reporter: true
    identifiable_patient: true
    suspected_drug: true
    adverse_event: true
    death: false
    hospitalization: false
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: true
    severity_in_label: true
    study_type: postmarket
    scale: chain
    session_levels: "4,4,3,4"
  expect:
    valid_icsr: true
    serious: false
  expect_halt: Convergence

# Invalid ICSR
- name: invalid ICSR halts early
  input:
    identifiable_reporter: false
    identifiable_patient: true
    suspected_drug: true
    adverse_event: true
    death: true
    hospitalization: false
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: false
    study_type: premarket
    scale: chain
    session_levels: "3,3,3,3"
  expect:
    valid_icsr: false
  expect_halt: Convergence
