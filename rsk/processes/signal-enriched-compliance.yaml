name: signal-enriched-compliance
description: 'Governed signal-enriched compliance pipeline: ICSR validation + case assessment + PRR signal detection + expedited reporting + signal-compliance convergence + Guardian bridge + evidence mapping. Compound chain (signal + compliance) with governor.'
version: 0.1.0
micrograms_dir: ../micrograms

steps:
  - e2a-minimum-criteria
  - case-seriousness
  - transform-seriousness-to-bool
  - expectedness-check
  - transform-expectedness-to-bool
  - prr-signal
  - expedited-reporting
  - signal-compliance-bridge
  - guardian-signal-bridge
  - compliance-evidence-mapper

governor: loop-governor
max_iterations: 3
detect_convergence: true
accumulate: true
trajectory: true

primitive_signature:
  dominant: 'ρ'
  expression: 'ρ(∃(ICSR) → ∂(seriousness) → κ(signal) → N(timeline) → κ(convergence) → π(guardian)) at ∂(governor)'
  primes: ['ρ', '∃', '∂', 'κ', 'N', 'π', '→']

tests:
# Signal confirmed + fatal unexpected premarket
- name: signal-confirmed fatal converges
  input:
    identifiable_reporter: true
    identifiable_patient: true
    suspected_drug: true
    adverse_event: true
    death: true
    hospitalization: false
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: false
    event_class_in_label: false
    study_type: premarket
    prr: 8.5
    scale: chain
    session_levels: "5,5,4,5"
  expect:
    valid_icsr: true
    serious: true
    signal_detected: true
    compliance_verdict: CRITICAL
  expect_halt: Convergence

# No signal + non-serious expected
- name: no signal non-serious converges
  input:
    identifiable_reporter: true
    identifiable_patient: true
    suspected_drug: true
    adverse_event: true
    death: false
    hospitalization: false
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: true
    severity_in_label: true
    study_type: postmarket
    prr: 0.8
    scale: chain
    session_levels: "4,4,3,4"
  expect:
    valid_icsr: true
    serious: false
    signal_detected: false
  expect_halt: Convergence

# Signal + serious unexpected postmarket
- name: signal serious postmarket converges
  input:
    identifiable_reporter: true
    identifiable_patient: true
    suspected_drug: true
    adverse_event: true
    death: false
    hospitalization: true
    disability: false
    life_threatening: false
    congenital_anomaly: false
    medically_important: false
    event_in_label: false
    event_class_in_label: false
    study_type: postmarket
    prr: 4.0
    scale: chain
    session_levels: "4,4,4,4"
  expect:
    valid_icsr: true
    serious: true
    signal_detected: true
  expect_halt: Convergence
